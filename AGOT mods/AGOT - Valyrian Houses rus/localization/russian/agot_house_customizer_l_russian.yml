 agot_house_customizer.0026.t:0 "Настройка дома — сильное семя"
 agot_house_customizer.0026.desc:0 "Члены #V дома [ROOT.Char.GetHouse.GetName]#! обладают особой наследственной внешностью. Из поколения в поколение они передавали уникальный облик, отличающий их от других домов.\n\nВыберите, хотите ли вы применить облик сильного семени #V дома [ROOT.Char.GetHouse.GetName]#! к своему персонажу."
 agot_house_customizer.0026.a:0 "Да, пусть мой персонаж выглядит как представитель дома [ROOT.Char.GetHouse.GetName]!"
 agot_house_customizer.0026.a.tt:0 "@warning_icon! #warning Это изменит внешность вашего пользовательского персонажа!#!"
 agot_house_customizer.0026.b:0 "Нет, я хочу сохранить нынешнюю внешность моего персонажа."