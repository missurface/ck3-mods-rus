 agot_house_customizer.0001.t:0 "Настройка дома"
 agot_house_customizer.0001.desc:0 "#P Добро пожаловать в настройку дома#!! Следуйте этим инструкциям, чтобы правильно использовать эту функцию.\n\nЕсли вы хотите играть за #N угасший дом#!, например дом Блэкфайр, выберите этот вариант и найдите дом в регионе его происхождения.\n\nЕсли вы хотите играть за представителя существующего дома, найдите персонажа из этого дома, щёлкните правой кнопкой по его портрету и выберите «Вступить в дом».\n\n@warning_icon! #N Если начать игру бастардом, после появления детей будет создана младшая ветвь вашей династии#!"
 agot_house_customizer.0001.a:0 "Я хочу играть за #N угасший дом#!."
 agot_house_customizer.0001.b:0 "Я хочу играть за #P существующий дом#!."

