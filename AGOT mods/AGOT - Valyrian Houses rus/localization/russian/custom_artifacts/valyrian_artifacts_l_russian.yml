l_russian:
 oblivion_name:0 "Забвение"
 oblivion_description:1 "Забвение — меч из валирийской стали дома Дрейсов, который они привезли с собой, когда бежали из Валирии вместе с Таргариенами. В навершии покоится небольшой кусочек резного драконьего стекла."
 truth_name:0 "Истина"
 truth_description:1 "Истина — меч из валирийской стали дома Рогаре, знатного рода древнего происхождения из Лиса."
 blackscales_name:0 "Чёрная Чешуя"
 blackscales_description:1 "Чёрная Чешуя — меч из валирийской стали дома Визеранд, украшенный богато отделанной гардой в виде драконьего крыла."
 scales_name:0 "Гадюка"
 scales_description:1 "Гадюка — меч из валирийской стали дома Скейлс, украшенный серебряной гардой с двумя аметистами."
 truedrake_sword_name:0 "Лазурная Буря"
 truedrake_sword_description:1 "Лазурная Буря — меч из валирийской стали дома Трудрейк. Этот странный меч из Валирии в бою покрывает клинок лазурно-синим пламенем, способным плавить сталь при касании, а его рукоять, похоже, сделана из редкого чистого серебра тончайшей работы."
 truefyre_sword_name:0 "Очищающее Пламя"
 truefyre_sword_description:1 "Очищающее Пламя — меч из валирийской стали дома Труфайр. Говорят, этот длинный меч был выкован для валирийского драконьего лорда незадолго до Рока, когда тот готовился бежать из родных земель. Однако лорд слишком долго медлил с отъездом, и меч был утрачен, когда настал Рок."
 longwaters_sword_name:0 "Последний Свет"
 longwaters_sword_description:1 "Последний Свет — меч из валирийской стали дома Лонгуотерсов. Клинок этого двуручного меча из валирийской стали выкован просто, но при этом идеально сбалансирован и чрезвычайно смертоносен; его гарда вырезана из драконьей кости, а рукоять обтянута коричневой драконьей кожей."
 kingspyre_sword_name:0 "Костёр Королей"
 kingspyre_sword_description:1 "Родовой клинок дома Квохерисов, Костёр Королей — изящный, но смертоносный длинный меч из валирийской стали с волнистым клинком. Фламберг напоминает и жуткое пепелище, и пламя Харренхолла, а также тревожит противника. Искусный меч для поединков, превосходно подходящий и для турнира, и для войны."
 Pyraeris_sword_name:0 "Огненная Головня"
 Pyraeris_sword_description:1 "Родовой валирийский клинок дома Пираэрисов, знатного рода древнего происхождения из Мира."
 brightfyre_sword_name:0 "Кровавый Шип"
 brightfyre_sword_description:1 "Богато украшенный золотом и драконьим стеклом длинный меч из валирийской стали. Выступающее из рукояти красное драконье стекло часто отвлекает противников, давая владельцу преимущество в бою. Клинок Кровавый Шип был найден при повторной колонизации Гогоссоса на Островах Василиска, в тёмной комнате, где древние валирийцы творили свои тайные чары."
 wildyfre_sword_name:0 "Пламя Смерти"
 wildyfre_sword_description:1 "Родовой клинок дома Вайлдфайров, Пламя Смерти — простой и почти неукрашенный двуручный меч из валирийской стали с длинным и широким клинком, идеально подходящий для рассечения врагов."
 wildfyre_sword2_name:0 "Драконий Сорокопут"
 wildfyre_sword2_description:1 "Большой длинный меч с рукоятью из драконьей кости; его тёмный клинок сияет характерными волнами валирийской стали. Драконий Сорокопут некогда принадлежал неизвестному драконьему военачальнику."
 wildborn_axe_name:0 "Дикая Сталь"
 wildborn_axe_description:1 "Родовое оружие дома Вайлдборнов, Дикая Сталь — искусно выкованная длинная секира из валирийской стали, чей облик основан на древних преданиях Века Героев, легендах о Дюрране Богоборце и королях, что последовали за ним. Свирепая секира, способная рассекать плоть, кости и доспехи; двойное древко украшено бронзой, а лезвие — красным кристаллом, готовым нести смерть всем, кто выступит против её владельца."
 ###Armors####
 drace_armor_name:0 "Доспехи Дрейсов"
 drace_armor_description:1 "Доспехи в традиционном стиле дома Дрейсов, сделанные из стальных пластин, покрытых угольно-чёрной и красной эмалью. На нагруднике изображён чёрный трёхголовый дракон, сжимающий яркую звезду, а по бокам шлема поднимается пара больших чёрных стальных драконьих крыльев. С плеч ниспадает длинный бордовый плащ."
 varezys_armor_name:0 "Доспехи Варезисов"
 varezys_armor_description:1 "Доспехи в традиционном стиле Старой Валирии и дома Варезисов, сделанные из стальных пластин, покрытых угольно-чёрной и золотой эмалью. На нагруднике из оникса выложен чёрный дракон, восстающий из красного пламени, а по бокам шлема поднимается пара больших чёрных стальных драконьих крыльев. С плеч ниспадает длинный плащ из золотой парчи."
 celtigar_armor_name:0 "Доспехи Селтигаров"
 celtigar_armor_description:1 "Доспехи в традиционном стиле дома Селтигаров с Клешни, сделанные из посеребрённых стальных пластин с красной эмалью. На нагруднике выгравирован красный краб, рондели инкрустированы рубинами, а алый плащ закреплён на одном плече."
 velaryon_armor_name:0 "Доспехи Веларионов"
 velaryon_armor_description:1 "Доспехи в традиционном стиле дома Веларионов с Дрифтмарка, сделанные из посеребрённых стальных пластин с синей эмалью. На нагруднике выгравирован белый морской конёк, рондели инкрустированы сапфирами, а синий плащ закреплён на одном плече."
 blackfyre_armor_name:0 "Доспехи Блэкфайров"
 blackfyre_armor_description:1 "Доспехи в традиционном стиле дома Блэкфайров, сделанные из стальных пластин, покрытых угольно-чёрной и красной эмалью. На нагруднике из оникса выложен чёрный трёхголовый дракон, а по бокам шлема поднимается пара больших чёрных стальных драконьих крыльев. С плеч ниспадает длинный плащ глубокого чёрного цвета."
 stark_targaryen_armor_name:0 "Доспехи Зимнего Пламени"
 stark_targaryen_armor_description:1 "Доспехи в традиционном стиле дома Зимнего Пламени, сделанные из угольно-чёрных стальных пластин. На нагруднике эмалью изображён крылатый лютоволк-альбинос, извергающий пламя, а по бокам шлема поднимается пара больших чёрных стальных драконьих крыльев. С плеч ниспадает длинный чисто-белый плащ, отороченный мехом."
 saerys_armor_name:0 "Доспехи Саэрисов"
 saerys_armor_description:1 "Доспехи в традиционном стиле дома Саэрисов, сделанные из стальных пластин, покрытых угольно-чёрной и синей эмалью. На нагруднике эмалью изображены четверочастные гербы с красными трёхголовыми драконами, слоном и тигром, а по бокам шлема поднимается пара больших чёрных стальных драконьих крыльев. С плеч ниспадает длинный богатый синий плащ."
 saerystos_armor_name:0 "Доспехи Саэристосов"
 saerystos_armor_description:1 "Доспехи в традиционном стиле дома Саэристосов, сделанные из угольно-чёрных стальных пластин. На нагруднике эмалью изображён красный трёххоботный слон, извергающий пламя, а по бокам шлема поднимается пара больших чёрных стальных драконьих крыльев. С плеч ниспадает длинный плащ глубокого алого цвета."
 saerynar_armor_name:0 "Доспехи Саэринаров"
 saerynar_armor_description:1 "Доспехи в традиционном стиле дома Саэринаров, сделанные из стальных пластин, покрытых угольно-чёрной и синей эмалью. На нагруднике на синем поле эмалью изображена септа, сжимающая посох, а по бокам шлема поднимается пара больших чёрных стальных драконьих крыльев. С плеч ниспадает длинный плащ цвета морской синевы."
 goldfyre_armor_name:0 "Доспехи Голдфайров"
 goldfyre_description:1 "Доспехи в традиционном стиле дома Голдфайров, сделанные из угольно-чёрных и чисто-золотых эмалированных пластин. С плеч ниспадает длинный чёрно-жёлтый плащ."
 targaryen_armor_name:0 "Доспехи Таргариенов"
 targaryen_description:1 "Доспехи в традиционном стиле дома Таргариенов, сделанные из угольно-чёрных стальных пластин. На нагруднике рубинами выложен красный трёхголовый дракон, а по бокам шлема поднимается пара больших чёрных стальных драконьих крыльев. С плеч ниспадает длинный плащ глубокого алого цвета."
 scales_armor_name:0 "Доспехи Скейлсов"
 scales_armor_description:1 "Доспехи в традиционном стиле дома Скейлсов, сделанные из толстых стальных пластин и кольчуги. Нагрудник покрыт глубокой пурпурной эмалью, а на нём выгравирована змея дома Скейлсов с мечом."
 truedrake_armor_name:0 "Доспехи Трудрейков"
 truedrake_armor_description:1 "Доспехи в традиционном стиле дома Трудрейков, сделанные из толстой валирийской стали. Нагрудник покрыт лазурно-синей эмалью, а в центре, в честь их герба, изображён дракон, держащий меч. Доспехи также исписаны древними рунами, которые, как считается, защищают носителя от вреда. Большие круглые рондели прикрывают уязвимое сочленение руки и груди, а с плеч ниспадает длинный синий плащ."
 truefyre_armor_name:0 "Доспехи Труфайров"
 truefyre_armor_description:1 "Доспехи в традиционном стиле дома Труфайров, сделанные из толстых пластин валирийской стали. На нагруднике, в честь их герба, на поле тёмно-пурпурной эмали изображён набор золотых колоколов. Большие круглые рондели прикрывают уязвимое сочленение руки и груди, по бокам шлема поднимаются стальные драконьи крылья, а с плеч ниспадает длинный пурпурный плащ."
 longwaters_armor_name:0 "Доспехи Лонгуотерсов"
 longwaters_armor_description:1 "Доспехи в традиционном стиле дома Лонгуотерсов, сделанные из толстой сероватой валирийской стали. На нагруднике выложены светло-голубой корабль, синий грот-парус и белый морской конёк — дань гербу их дома, происходящему от Веларионов. Струящийся чёрный плащ с серебряной каймой закреплён на одном плече."
 qoherys_armor_name:0 "Доспехи Квохерисов"
 qoherys_armor_description:1 "Доспехи в традиционном стиле дома Квохерисов, сделанные из угольно-чёрных стальных пластин, с парой больших чёрных стальных драконьих крыльев, поднимающихся по бокам шлема. На нагруднике выложен герб Квохерисов — жестокая насмешка над гербом побеждённого дома Хоаров: огненный косой крест вместо железных цепей и четыре белых черепа, по одному у каждой стороны света. С плеч ниспадает длинный плащ огненно-красного цвета."
 brightfyre_armor_name:0 "Доспехи Брайтфайров"
 brightfyre_armor_description:1 "Доспехи в традиционном стиле дома Брайтфайров, сделанные из оранжево-эмалированной стали, отполированной до яркого блеска. На нагруднике выложено горящее дерево, струящийся плащ дымного цвета закреплён на одном плече, а на кирасе изображён традиционный дракон Валирии."
 wildfyre_armor1_name:0 "Доспехи  Вайлдфайров"
 wildfyre_armor1_description:1 "WIP"
 wildfyre_armor2_name:0 "Доспехи Вайлдфайров 2"
 wildfyre_armor2_description:1 "WIP"
 dragonfyre_armor_name:0 "Доспехи Драгонфайров"
 dragonfyre_armor_description:1 "Доспехи в традиционном стиле дома Драгонфайров, сделанные из толстых пластин, кожи и кольчуги, с меховой подкладкой. Драгонфайры славятся силой, и эти доспехи чрезвычайно велики."
 wildborn_armor_name:0 "Доспехи Вайлдборнов"
 wildborn_armor_description:1 "Доспехи в традиционном стиле дома Вайлдборнов, сделанные из толстых пластин и кольчуги, с меховой подкладкой. На нагруднике выгравированы рычащие головы лютоволков, а на плечи накинут плотный плащ из волчьей шкуры."