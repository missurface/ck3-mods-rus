#  building_godsfort_01_desc:0 "Божья крепость служит свидетельством изобретательности и могущества Речных земель. Говорят, это величайший замок Вестероса, хотя жители Западных земель с этим спорят. Он недвусмысленно показывает, что речные лорды господствуют не только в собственной державе, но и в окрестных землях."

 building_type_river_gate_01:0 "Речные ворота"
 building_type_river_gate_01_desc:0 "Речные ворота расположены близ середины юго-восточной стены и соединяют площадь Рыботорговцев с причалами на Черноводной. Стальная улица начинается от рыночной площади рядом с Речными воротами, а Речной ряд тянется от них до Королевских ворот. За воротами находится рыбный рынок."
 building_river_gate_01:0 "$building_type_river_gate_01$"
 building_river_gate_01_desc:0 "$building_type_river_gate_01_desc$"

 building_type_amsb_hellgate_hall_01:0 "Адовы Врата"
 building_type_amsb_hellgate_hall_01_desc:0 "Родовой замок дома Драйленд, откуда его представители правили как короли Серноводной."

 building_type_amsb_ruins_hellgate_hall_01:0 "$building_type_agot_hellgate_hall_01$"
 building_type_amsb_ruins_hellgate_hall_01_desc:0 "$building_type_agot_hellgate_hall_01_desc$"
 building_amsb_ruins_hellgate_hall_01:0 "Безрассудство Люцифера"
 building_amsb_ruins_hellgate_hall_01_desc:0 "От Адовых Врат остались лишь древние разбитые руины. Когда-то это был величайший из замков в глубоких дюнах Дорна, но во время Дорнийских объединительных войн Нимерия и дом Мартелл сокрушили и Адовы Врата, и дом Драйленд. Ныне руины служат назиданием всем, кто решит бросить вызов Солнцу и Копью, как это сделал последний король Серноводной."

 building_amsb_ruins_hellgate_hall_02:0 "Возрождённый город"
 building_amsb_ruins_hellgate_hall_02_desc:0 "Слишком долго древняя твердыня Серноводной хранила молчание.\n\nВершины над ней всё ещё напоминают об ужасах, которые Мартеллы некогда обрушили на эти земли, но долгий путь к восстановлению величественного творения человеческих рук уже начался."

 building_amsb_ruins_hellgate_hall_03:0 "Величие и изящество"
 building_amsb_ruins_hellgate_hall_03_desc:0 "Пусть работа идёт медленно, гора Адовых Врат постепенно возвращается к жизни.\n\nНа верхних склонах, возвышающихся над городом, вновь появились дворцы наслаждений, септы и всё прочее, без чего не обходится высшее общество.\n\nНовые сооружения возводятся на месте руин, уже высеченных в горе, но их облик вдохновлён ройнарской архитектурой Солнечного Копья."

 building_amsb_ruins_hellgate_hall_04:0 "Золотая башня"
 building_amsb_ruins_hellgate_hall_04_desc:0 "Несмотря на огромные расходы, восстановление вершины Адовых Врат завершено.\n\nНовая крепость способна соперничать с любой другой твердыней, и Адовы Врата вновь гордо возвышаются над землями Дорна."

 building_type_bloodstone_special_01:0 "Чёрная башня Кровавого Камня"
 building_type_bloodstone_special_01_desc:0 "Чёрная башня Кровавого Камня"
 building_bloodstone_special_01:0 "Чёрная башня"
 building_bloodstone_special_01_desc:0 "На Кровавом Камне, крупнейшем из островов Ступеней, стоит давно забытый валирийский форпост, ныне обращённый в руины. Когда-то эта цитадель не уступала Драконьему Камню, но годы запустения повредили башню настолько, что она стала лишь тенью былого величия.\n\nПираты и корсары, бороздящие эти воды, называют её Чёрной башней. С тех пор как Валирийский Фригольд покинул форпост, руины успели послужить бесчисленным пиратским лордам."
 building_bloodstone_special_02:0 "Восстановленная Чёрная башня"
 building_bloodstone_special_02_desc:0 "С помощью драконьего пламени и древних знаний Чёрную башню восстановили в том виде, который она имела во времена Валирийского Фригольда. Трёхлучевая крепость вновь служит одновременно дозорной башней и цитаделью, охраняющей воды Ступеней."
 building_bloodstone_special_03:0 "Цитадель и внешние стены"
 building_bloodstone_special_03_desc:0 "Разрушенные стены валирийской башни вновь защищают цитадель, превращая некогда гордый форпост в резиденцию, достойную любого претендента на корону."
 building_bloodstone_special_04:0 "Чёрная башня Кровавого Камня"
 building_bloodstone_special_04_desc:0 "Чёрная башня Кровавого Камня, восстановленная с помощью драконьего пламени, повторяет валирийские архитектурные формы Драконьего Камня, но уступает ему прочностью: тайны валирийской каменной кладки давно утрачены.\n\nБашня меньше Драконьего Камня, однако её несомненно возводили с помощью драконьего огня. Многие части замка, включая стены, повторяющие укрепления Драконьего Камня, выполнены в драконьих мотивах.\n\nПосле огромных затрат времени и средств Кровавый Камень стал центром торговли на Узком море между Вестеросом и Эссосом. Благодаря значительно расширенному порту правитель Ступеней взимает пошлину со всех проходящих судов."

 building_agot_warg_king_03:0 "Порт Короля-Оборотня"
 building_agot_warg_king_03_desc:0 "Порт, который дом Старк сжёг после того, как Брандон Корабел пропал, отправившись на запад, восстановлен в былом великолепии."
 building_agot_warg_king_04:0 "Крепость Короля-Оборотня"
 building_agot_warg_king_04_desc:0 "Замок Короля-Оборотня вновь отстроен из руин и стал грозной твердыней. Там, где прежде лежали одни развалины, теперь возвышается могучая крепость, окружённая городом."

