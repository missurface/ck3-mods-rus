 building_type_river_gate_01: "Речные Ворота"
 building_type_river_gate_01_desc: "Речные Ворота расположены в центре юго-восточной стены и соединяют Рыбный рынок с причалами на Черноводной. Стальная улица начинается у рыночной площади возле Речных Ворот, а Речной ряд тянется от Речных Ворот до Королевских Ворот. Рыбный рынок находится снаружи ворот."
 building_river_gate_01: "$building_type_river_gate_01$"
 building_river_gate_01_desc: "$building_type_river_gate_01_desc$"
  
 building_type_cm_hellgate_hall_01:0 "Хеллгейт-Холл"
 building_type_cm_hellgate_hall_01_desc:0 "Родовая твердыня дома Драйленд. Именно из этого грозного замка они правили как короли Серы."

 building_type_cm_ruins_hellgate_hall_01:0 "$building_type_agot_hellgate_hall_01$"
 building_type_cm_ruins_hellgate_hall_01_desc:0 "$building_type_agot_hellgate_hall_01_desc$"
 building_cm_ruins_hellgate_hall_01:0 "Безумие Люцифера"
 building_cm_ruins_hellgate_hall_01_desc:0 "От Хеллгейт-Холла остались лишь старые разрушенные руины. Некогда сильнейший из замков, возвышавшихся среди глубоких дюн Дорна, Хеллгейт-Холл и дом Драйленд пали в Дорнийских войнах за объединение под натиском Нимерии и дома Мартелл. Сегодня эти руины служат напоминанием о судьбе тех, кто бросает вызов Солнцу и Копью, как это сделал последний король Серы."

 building_cm_ruins_hellgate_hall_02:0 "Возрождённый город"
 building_cm_ruins_hellgate_hall_02_desc:0 "Слишком долго древняя столица Серы стояла безмолвной.\n\nХотя вершины над ней всё ещё хранят память об ужасах, что Мартеллы обрушили на эти земли давным-давно, долгий путь к восстановлению этого некогда великолепного творения рук человеческих уже начался."

 building_cm_ruins_hellgate_hall_03:0 "Величие и изящество"
 building_cm_ruins_hellgate_hall_03_desc:0 "Хотя дело продвигается медленно, гора Хеллгейт-Холла постепенно возвращается к жизни.\n\nВозвышаясь над городом внизу, верхние склоны Хеллгейт-Холла теперь украшены дворцами удовольствий, храмами и прочими непременными атрибутами высшего общества.\n\nИ хотя всё это возводится на месте руин, уже высеченных в горе, новый облик вдохновлён ройнарской архитектурой Солнечного Копья."

 building_cm_ruins_hellgate_hall_04:0 "Золотая башня"
 building_cm_ruins_hellgate_hall_04_desc:0 "Хотя это стоило огромных средств, вы завершили восстановление вершины Хеллгейт-Холла.\n\nВаш новый донжон не уступает ни одной твердыне в этих землях, и Хеллгейт-Холл вновь гордо возвышается над всем Дорном."
  
 building_type_bloodstone_special_01: "Крепость Кровавого Камня"
 building_type_bloodstone_special_01_desc: "Крепость Кровавого Камня"
 building_bloodstone_special_01: "Крепость Кровавого Камня"
 building_bloodstone_special_01_desc: "Кровавый Камень, крупнейший из Ступенчатых Камней, всегда был убежищем для пиратов и корсаров, бороздящих эти воды. Для защиты Пиратских Лордов здесь была построена крепость."
 building_bloodstone_special_02: "Замок Кровавого Камня"
 building_bloodstone_special_02_desc: "Построенный Королём Ступенчатых Камней и Узкого Моря, этот замок возник после преобразования пиратских притонов Кровавого Камня в феодальные владения."
 building_bloodstone_special_03: "Драконья Цитадель Кровавого Камня"
 building_bloodstone_special_03_desc: "Изначально построенная Деймоном Таргариеном, Королём Ступенчатых Камней и Узкого Моря, крепость демонстрирует ту же валирийскую архитектуру, что и Драконий Камень, однако она не столь прочна из-за утраченных знаний о валирийской кладке.\n\nХотя и значительно меньше Драконьего Замка, Кровавый Камень явно строился с использованием драконьего пламени, и многие элементы крепости явно ориентированы на драконов."
 building_bloodstone_special_04: "Замок Драконьей Цитадели Кровавого Камня"
 building_bloodstone_special_04_desc: "Изначально построенная Деймоном Таргариеном, Королём Ступенчатых Камней и Узкого Моря, крепость демонстрирует ту же валирийскую архитектуру, что и Драконий Камень, однако она не столь прочна из-за утраченных знаний о валирийской кладке.\n\nХотя и значительно меньше Драконьего Замка, Кровавый Камень явно строился с использованием драконьего пламени, и многие элементы крепости явно ориентированы на драконов, включая стены, смоделированные по образцу самого Драконьего Камня.\n\nБлагодаря огромным затратам и времени, Кровавый Камень стал торговым центром Узкого Моря между Вестеросом и Эссосом, где Король Ступенчатых Камней взимает пошлину со всего проходящего судоходства благодаря масштабному расширению порта."
  
 building_agot_warg_king_03: "Порт Короля-Варга"
 building_agot_warg_king_03_desc: "Порт, некогда сожжённый домом Старков после гибели Брандона «Корабела» в плавании на запад, восстановлен в прежнем великолепии."
 building_agot_warg_king_04: "Крепость Короля-Варга"
 building_agot_warg_king_04_desc: "Восстановленная из руин, крепость Короля-Варга вновь стала грозным укреплением. Там, где были лишь руины, теперь возвышаются неприступный замок и окружающий его город."
