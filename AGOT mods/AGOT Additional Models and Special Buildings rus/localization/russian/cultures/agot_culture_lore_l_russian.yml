 agot_culture_summer_valyrian_desc:0 "Ещё до того, как драконьи лорды дома Таргариенов пришли в Вестерос, другие валирийцы уже сделали Закатные земли своим домом. Эти валирийцы переняли многие обычаи коренных вестеросцев, сохранив при этом часть своих традиций и связей со старой Валирийской державой."
