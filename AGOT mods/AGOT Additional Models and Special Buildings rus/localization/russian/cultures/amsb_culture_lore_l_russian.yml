 agot_culture_summer_valyrian_desc:0 "До того как драконьи владыки дома Таргариен прибыли в Вестерос, другие валирийцы уже сделали Закатные земли своим домом. Они переняли многие обычаи коренных жителей Вестероса, сохранив часть собственных традиций и связей с древним Фригольдом."
