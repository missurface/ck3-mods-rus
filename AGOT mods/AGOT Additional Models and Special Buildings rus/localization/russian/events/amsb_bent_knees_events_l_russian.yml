#  amsb_bent_knees.0003.a:0 "Буду ждать прибытия"

 #Вассал отказывается
 amsb_bent_knees.0004.t:0 "Вассал отвергает указ"
 amsb_bent_knees.0004.desc:0 "Я с полным неверием смотрю на послание, принесённое вороном. Письмо от [bent_knees.GetName] сминается в моём кулаке, пока внутри нарастает ярость.\n\n«Я не потерплю такого неуважения!» — кричу я в пустоту, понимая, что без резкого обострения положения сделать почти ничего нельзя.\n\nНо, быть может, именно это и требуется... Возможно, следует преподать урок, чтобы остальные лорды державы знали своё место..."
 amsb_bent_knees.0004.a:0 "Это недопустимо!"
