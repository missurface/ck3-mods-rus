 amsb_dragonpit.0001:0 "Драконье логово построено"
 amsb_dragonpit.0001.t:0 "Драконье логово построено"
 amsb_dragonpit.0001.desc:0 "На основании бывшей Септы Поминовения возведено Драконье логово. Прежний центр городского богослужения теперь готов принять драконов державы. Их появление вновь сделало необходимым логово, где чудовища будут жить вдали от городских простолюдинов.\n\nИ лорды, и простой народ боятся драконов, однако мало кто возражает против строительства Драконьего логова, ставшего величественным памятником могуществу престола."
 amsb_dragonpit.0001.a:0 "Воистину великолепно"

