#  cowbook.1000.desc:0 "Пять великих башен Харренхолла показываются перед моим войском за много лиг. Они тянутся к небесам, и всем ясно: людям и осадным орудиям никогда не взять этот великий город и его могучую крепость.\n\nВоеначальники докладывают, что боевой дух солдат угасает, но я напоминаю им: могущество дома Таргариен никогда не зависело от людей, несущих наши знамёна.\n\nЯ оставляю военный лагерь позади, взбираюсь на Балериона и взмываю в небо. Паря высоко над городом, я уже знаю, как уничтожить этот памятник тщеславию смертных."
