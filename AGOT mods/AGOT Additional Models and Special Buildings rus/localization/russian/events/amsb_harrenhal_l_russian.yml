
l_russian:
 #Начало строительства
 amsb_harrenhal.0001.t:0 "Строительство величайшего замка Вестероса"
 amsb_harrenhal.0001.desc:0 "Передо мной стоит [councillor.GetName] и, держа перо, записывает всё, что я желаю видеть в новой крепости. Так продолжается уже несколько дней: [councillor.GetSheHe] встречается со мной в зале совета, а я перечисляю каждую подробность будущего величайшего замка Вестероса.\n\n«Я хочу пять башен, и каждая должна быть больше предыдущей, настолько высокой, чтобы даже облака не могли от них скрыться! — заявляю я. — Внешние стены должны быть выше самой твердыни «[GetBuilding('casterly_rock_01').GetName]», а башни — возвышаться даже над ними!»\n\nПорой мне кажется, что [councillor.GetNameNoTooltip] считает этот замысел безумием. Такой проект займёт не меньше десяти лет и потребует невиданных со времён Века Героев затрат золота и труда... Но решение принято, и мою волю исполнят.\n\n#Bold ПРИМЕЧАНИЕ: завершение проекта займёт много лет. После окончания строительства произойдёт событие, которое даст замок 5-го уровня и соответствующее особое здание.#!"
 amsb_harrenhal.0001.a:0 "Завтра заложим фундамент..."
 amsb_harrenhal.0001.b:0 "Пора собирать работников..."

 amsb_harrenhal.9998.t:0 "Могучий Харренхолл"
 amsb_harrenhal.9998.desc:0 "Спустя, кажется, целую вечность строительство завершено: [GetBuilding('harrenhal_01').GetName]. Вестерос не видел ничего подобного со времён Века Героев. Огромные чёрные стены вздымаются так высоко, что взгляд с земли вызывает головокружение, а над ними поднимаются пять башен из чёрного камня, чьи кровли пронзают облака, словно пальцы исполинского бога. Вестерос никогда не знал подобного замка; он служит напоминанием о могуществе народа культуры «[ROOT.Char.GetCulture.GetName]».\n\nМногие жители Речных земель погибли на строительстве, но это стало необходимой жертвой во имя верховного божества — [ROOT.Char.GetFaith.HighGodName]. Однако лишь глупец решит, будто местные жители стали любить меня сильнее.\n\nСтоя перед исполинскими стенами, я невольно вспоминаю весь пройденный путь — кровь, жертвы и годы, отданные проекту. Теперь мне предстоит занять место внутри, чтобы никто и никогда не забыл ни моё наследие, ни наследие дома [ROOT.Char.GetDynasty.GetName]..."
 amsb_harrenhal.9998.a:0 "Строительство завершено: [GetBuilding('harrenhal_01').GetName]"
 amsb_harrenhal.9998.b:0 "Новая столица державы — [GetTitleByKey('c_harrenhal').GetNameNoTier]"

 amsb_harrenhal.9997.t:0 "Чёрная крепость"
 amsb_harrenhal.9997.desc:0 "Спустя, кажется, целую вечность строительство завершено: [GetBuilding('generic_harrenhal_01').GetName]. Вестерос не видел ничего подобного со времён Века Героев. Огромные чёрные стены вздымаются так высоко, что взгляд с земли вызывает головокружение, а над ними поднимаются пять башен из чёрного камня, чьи кровли пронзают облака, словно пальцы исполинского бога.\n\nСтоя перед этой твердыней, я понимаю: отныне никто не усомнится в силе и могуществе народа культуры «[ROOT.Char.GetCulture.GetName]». Я невольно вспоминаю весь пройденный путь — золото, ресурсы и годы, потребовавшиеся, чтобы вознести величественную крепость к самым небесам. Этот замок поистине свидетельствует о могуществе и влиянии верховного божества — [ROOT.Char.GetFaith.HighGodName]. Теперь мне предстоит занять место внутри, чтобы никто и никогда не забыл ни моё наследие, ни наследие дома [ROOT.Char.GetDynasty.GetName]..."
 amsb_harrenhal.9997.a:0 "Строительство завершено: [GetBuilding('generic_harrenhal_01').GetName]"
 amsb_harrenhal.9997.b:0 "Новая столица державы — [GetTitleByKey('c_harrenhal').GetNameNoTier]"
