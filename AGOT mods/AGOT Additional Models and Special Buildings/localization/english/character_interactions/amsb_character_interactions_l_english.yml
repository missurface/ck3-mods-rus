 amsb_take_the_black_vassal_interaction_accept_desc_a:0 "[recipent.GetName] chooses to take the vows of a black brother and spend the rest of their life serving the realm at [GetTitleByKey('k_the_wall').GetNameNoTier]"
 amsb_take_the_black_vassal_interaction_accept_desc_b:0 "[recipent.GetName] travels to the wall to serve the realm"

 amsb_take_the_black.decline:0 "[recipient.GetName] chooses to defy your unjust demands and challenges you to a duel to the death"

