  lakehaven_name: "Лейкхейвен — небольшой замок, расположенный у берегов «[Concept( 'gods_eye', 'Божьего Ока' )|E]», он служит идеальным местом для исследования озера."
  quiet_isle_name: "[Concept( 'quiet_isle', 'Тихий Остров' )|E] — остров в устье [Concept( 'the_trident', 'Трезубца' )|E], обитатели острова — кающиеся мужчины, ищущие искупления."
  
  ten_towers_name: "Десять Башен"
  ten_towers_desc: "Хотя каждая башня в Десяти Башнях имеет разную форму и вид, все же можно заблудиться в бесконечных лестницах, залах, стенах и мостах. Тем не менее, это прекрасная возможность поразмышлять о строительстве."
  glimmering_tower_name: "Башня Глиммеринга"
  glimmering_tower_desc: "В то время как другие острова и жители материка нуждаются в маяках, Башня Глиммеринга сама по себе является маяком и башней, маслянистый черный камень башни отражает как лунный, так и солнечный свет в огромном радиусе."
  wolfswood_name: "Сердце [Concept( 'wolfswood', 'Волчьего Леса' )|E]"
  wolfswood_desc: "В центре [Concept( 'wolfswood', 'Волчьего Леса' )|E] нельзя уснуть, каждая ночь звенит бесконечным воем. Леса известны тем, что в них обитает большое количество животных, включая медведей, кабанов, древесных котов, лосей и так далее."
  orkmont_tt_name: "Дом Грейайронов и Хоаров."
  orkmont_tt_desc: "Оркмонт — не самый густонаселенный и не самый богатый из [Concept( 'iron_islands', 'Железных островов' )|E], но он богат лором и рудниками. Каждый житель будет хвастаться тем, что он бастард короля Грейайрона или Хоара."
  queenscrown_tt_name: "Корона Королевы"
  queenscrown_tt_desc: "Башня Корона Королевы расположена на острове в центре озера, известная тем, что когда-то принимала королеву, теперь она принимает пыль и пауков."
  harrenhal_tourney_name: "Турнир в [Concept( 'harrenhal', 'Харренхолле' )|E]"
  harrenhal_tourney_desc: "Великий турнир лорда Уэнта проводился в 281 году во времена «ложной весны», названный величайшим турниром своего времени. Большинству домов Вестероса есть что рассказать о нем."
  jeyne_burning_name: "Сожжение Джейн Пур"
  jeyne_burning_desc: "Во время бесконечной охоты [Concept( 'maegor_the_cruel', 'Мейгора Жестокого' )|E] на верующих молодой капитан [Concept( 'poor_fellows', 'Честных Бедняков' )|E] годами ускользала от Мейгора, но в конце концов была поймана и объявлена ведьмой."
  viserys_birth_name: "Рождение Визериса"
  viserys_birth_desc: "Также известный как Турнир в честь рождения Визериса, грандиозный турнир в честь рождения последнего принца-дракона в Вестеросе. Теперь его помнят за громовые аплодисменты, разрушенную дружбу и ведьм в лесах."
  golden_wedding_name: "Золотая Свадьба"
  golden_wedding_desc: "На седьмой день седьмой луны вдовствующая королева Морского Конька вышла замуж за [Concept( 'robert_baratheon', 'Оленя' )|E]. Празднование известно как Золотая Свадьба как простолюдинам, так и мейстерам, и его помнят за грандиозный турнир и бесконечных драконов в небе."
  pentos_dragon_road_name: "Конец Драконьей Дороги"
  pentos_dragon_road_desc: "Самая западная точка Драконьей дороги заканчивается у ворот [Concept( 'pentos', 'Пентоса' )|E]. Здесь можно начать свой путь по длинной, широкой и бесконечной черной маслянистой дороге на восток."
  
  mde_the_wall: "[Concept( 'the_wall', 'Стена' )|E]"
  mde_the_titan: "[Concept( 'titan_of_braavos', 'Титан Браавоса' )|E]"
  
