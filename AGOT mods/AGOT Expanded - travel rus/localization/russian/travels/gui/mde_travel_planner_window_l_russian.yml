  #battles
 
  historical_battle_of_the_gullet: "Битва в Глотке"
  historical_battle_of_the_gullet_desc: "Во время [Concept( 'dance_of_the_dragons', 'Танца Драконов' )|E] Триархию убедили поддержать [Concept( 'the_greens', 'Зеленых' )|E]. Результатом стала самая кровавая морская битва между [Concept( 'house_velaryon', 'Веларионами' )|E] и [Concept( 'free_cities', 'Вольными Городами' )|E]."
 
  #historical_battle_at_rooks_rest: "Битва у Грачиного Приюта"
  #historical_battle_at_rooks_rest_desc: "Если вы поговорите с простолюдинами, то услышите историю о трех демонах в небе и горящей земле. Другие назовут это Битвой у Грачиного Приюта, где кроваво-красный дракон [Concept( 'meleys', 'Мелеис' )|E] упал с небес."
 
  historical_battle_at_long_lake: "Битва у Длинного Озера"
  historical_battle_at_long_lake_desc: "Хитрый одичалый [Concept( 'raymun_redbeard', 'Реймунд Рыжебородый' )|E] сумел ускользнуть от [Concept( 'nights_watch', 'Ночного Дозора' )|E] и повел войско за [Concept( 'the_wall', 'Стену' )|E]. [Concept( 'house_stark', 'Старкам' )|E] пришлось перехватить и убить этого так называемого «[Concept( 'king_beyond_the_wall', 'Короля-за-Стеной' )|E]»."
 
  historical_battle_ninepenny_stepstones: "Чудовищный Конец"
  historical_battle_ninepenny_stepstones_desc: "Пятое и, надеемся, последнее восстание [Concept( 'house_blackfyre', 'Блэкфайра' )|E] встретило свой конец на этих берегах, когда [Concept( 'house_targaryen', 'Таргариены' )|E] высадились здесь. Молодой [Concept( 'barristan_selmy', 'Барристан Селми' )|E] убил Мейлиса Чудовищного, который был последним мужчиной [Concept( 'house_blackfyre', 'Блэкфайром' )|E]."
 
  historical_battle_of_six_kings: "Битва Шести Королей"
  historical_battle_of_six_kings_desc: "Легенда гласит, что Штормовые Короли обрушились в реки и убили пятерых королей, пытавшихся править грязью. Все это произошло между этой прекрасной парой холмов."
 
  historical_battle_at_the_great_fork: "Битва у Большой Развилки"
  historical_battle_at_the_great_fork_desc: "Битва ознаменовала медленное падение [Concept( 'faith_militant', 'Воинства Веры' )|E]: после того как [Concept( 'balerion', 'Балерион' )|E] обрушился на войско Веры, Вера больше никогда не выставляла большую армию и в конечном итоге была распущена Миротворцем."
 
  historical_battle_storming_of_seagard: "Штурм Сигарда"
  historical_battle_storming_of_seagard_desc: "После победы в Ланниспорте мятежные [Concept( 'house_greyjoy', 'Грейджои' )|E] атаковали Сигард. С молодым сыном короля Бейлона, Родриком, возглавлявшим атаку. Но Кракен не смог свалить Орла, и с мертвым сыном отступил."
 
  historical_battle_at_lordsport: "Битва у Лордспорта"
  historical_battle_at_lordsport_desc: "Битва у Лордспорта ознаменовала начало конца [Concept( 'greyjoy_rebellion', 'Восстания Грейджоя' )|E], [Concept( 'robert_baratheon', 'Олень' )|E] вымылся на берег с яростью. Последствия оставили множество кораблей, разрушенных на пляжах, и порт в руинах."
 
 #  historical_battle_meraxes_fall: "Meraxes’s Fall"
 #  historical_battle_meraxes_fall_desc: "Aegon the Conqueror's first real taste of rule was hearing the news of the death of Rhaenys and Meraxes. An iron bolt went through Meraxes’s eye, and the dragon fell from the skies. Some even suggest the beast's bones can still be found."
 
