  #lairs
  historical_battle_arrax_corpse: "Падение Арракса"
  historical_battle_arrax_corpse_desc: "Простолюдины в близлежащих городах воздвигли алтарь на ближайшем берегу, сделанный из плавника, костей и жженых камней; алтарь посвящен принцу и его дракону."
 
  historical_battle_balerions_lair: "Гнев [Concept( 'rhllor', 'Р\'глора' )|E]"
  historical_battle_balerions_lair_desc: "Во время изгнания [Concept( 'maegor_the_cruel', 'Мейгора Жестокого' )|E] в [Concept( 'pentos', 'Пентос' )|E] он позволил [Concept( 'balerion', 'Балериону' )|E] свободно бродить по Эссосу. Позволяя дракону есть и играть со всем, что он хотел. Теперь некоторые в Эссосе называют этот период Гневом [Concept( 'rhllor', 'Р\'глора' )|E], так как черный «демон» мог однажды сжечь ваш город и никогда не вернуться."
 
  historical_battle_caraxes_lair: "Отдых [Concept( 'caraxes', 'Караксеса' )|E]"
  historical_battle_caraxes_lair_desc: "Не будучи занятым сжиганием и поеданием целых островов на [Concept( 'stepstones', 'Ступенях' )|E], [Concept( 'caraxes', 'Караксес' )|E] создал большое логово. Все еще заметное сегодня своими бесконечными костями и ржавыми сокровищами."
  
  historical_battle_dreamfyre_lair: "Светлый визит [Concept( 'dreamfyre', 'Пламенной Мечты' )|E]"
  historical_battle_dreamfyre_lair_desc: "В течение короткого времени, не раз, а дважды, простолюдины [Concept( 'fair_isle', 'Светлого Острова' )|E] принимали [Concept( 'dreamfyre', 'Пламенную Мечту' )|E] и ее принцессу. Дракон славился тем, что откладывал бесконечное количество яиц, и местные легенды говорят об обмене скота на [Concept( 'dragon_egg', 'яйцо дракона' )|E]."
  
  historical_battle_morning_lair: "Логово [Concept( 'morning', 'Утра' )|E]"
  historical_battle_morning_lair_desc: "[Concept( 'giants_lance', 'Копье Гиганта' )|E] — самая высокая горная вершина в [Concept( 'the_vale', 'Долине' )|E]. Простолюдины рассказывают сказку о драконе, живущем глубоко в его забытых пещерах. Но можно с уверенностью предположить, что он мертв."
  
  historical_battle_tessarion_lair: "Малое логово [Concept( 'tessarion', 'Тессарион' )|E]"
  historical_battle_tessarion_lair_desc: "Хотя великолепный синий дракон [Concept( 'tessarion', 'Тессарион' )|E] жил недалеко от [Concept( 'oldtown', 'Староместа' )|E] лишь короткое время, дракон оставил свой след, построив небольшое логово на вершине холма."
  
  historical_battle_urrax_lair: "Забытое логово Урракса"
  historical_battle_urrax_lair_desc: "Лорды и простолюдины рассказывают сказки о смерти Урракса от руки [Concept( 'serwyn_mirror_shield', 'Сервина Зеркальный Щит' )|E], а некоторые даже рассказывают о большой горной пещере, усеянной костями."
  
  
  
