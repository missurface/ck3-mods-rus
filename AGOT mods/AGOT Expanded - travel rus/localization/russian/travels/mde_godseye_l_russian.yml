l_russian:
 
 mde_godseye.0001.t: "[Concept( 'gods_eye', 'Божье Око' )|E]"
 mde_godseye.0001.desc: "Подъезжая к побережью, я вижу бесконечную гладь спокойной воды, простирающуюся передо мной. Когда солнце касается озера, с его поверхности поднимается слабое мерцание зеленого и синего. То ли от густых водорослей, то ли от зеркального полога окружающего леса, но [Concept( 'gods_eye', 'Божье Око' )|E] кажется... другим. Древним.\n\nЯ сижу верхом на своей лошади, [Select_CString(ROOT.Char.IsFemale, 'погруженная', 'погруженный')] в мысли. Сказки проплывают в моем сознании, сказки о крови и огне, о [Concept( 'old_gods', 'старых богах' )|E] и более темных вещах под тихими водами. Черный лебедь лениво дрейфует возле камышей. Над головой щебечут птицы, и мягкие волны плещутся о берег.\n\nИ теперь я стою перед выбором. Задержаться и исследовать хоть немного это странное место, или двигаться дальше?"
 mde_godseye.0001.a: "Арендовать лодку и команду и направиться к острову!"
 mde_godseye.0001.a.f: "Известный мейстерам как #italic «[Concept( 'isle_of_faces', 'Остров Ликов' )|E]»#!, он священен для последователей [GetReligionByKey('the_pact_religion').GetName]. Никто на памяти живущих не посещал остров. Если вы выберете этот путь, ожидайте либо жуткого приема... либо гнева."
 mde_godseye.0001.b: "Искать тайны в водах."
 mde_godseye.0001.b.f: "Озеру не чужда смерть. Когда Эйгон Завоеватель поджег [Concept( 'harrenhal', 'Харренхол' )|E], камень и стены начали плавиться и взрываться. Позже Мейгор Жестокий сбросил принца Эйгона и Ртуть с неба над этим самым озером. А в песнях Эймонд и Деймон Таргариены исчезли в водах, сцепившись в смерти. Кто знает, какие реликвии лежат внизу?"
 mde_godseye.0001.c: "Двигаться дальше."
 mde_godseye.0001.c.f: "Дорога зовет. Некоторые тайны лучше оставить глубинам."
 
 #isle
 
 mde_godseye.0011.t: "[Concept( 'gods_eye', 'Божье Око' )|E]: [Concept( 'isle_of_faces', 'Остров Ликов' )|E]"
 mde_godseye.0011.desc: "Низкая топь острова #italic выступает#!, когда мы приближаемся, бесконечные замерзшие корни плавают в озере и выходят из него. Остров покрыт слоями зеленых, желтых и красных листьев, закрывающих небо. Кажется, тысяча потерянных лиц наблюдают за нами, когда мы приближаемся.\n\nПересекая спутанное месиво, мы достигаем того, что считаем береговой линией, когда внезапное шипение разносится по острову. Маленький дротик #italic пролетает#! по воздуху и вонзается мне в шею.\n\nВнезапно меня охватывает волна головокружения, и я с трудом удерживаюсь на ногах."
 mde_godseye.0011.a: "#italic «Трусость меня не испугает!»#!"
 mde_godseye.0011.b: "#italic «Назад на воду!»#!"

 mde_godseye.0012.desc: "Мои ноги дрожат, когда я спускаюсь с лодки на берег. Я пытаюсь устоять, поднимая руку к голове, но затем еще одно #italic шипение#! разносится по острову... затем третье, четвертое. Шум нарастает, теперь это постоянное шипение, растущее и растущее. Не приближаться!\n\nВглядываясь между узловатыми стволами и бледными лицами [Concept( 'weirwood', 'чардрев' )|E], я ловлю одно... #bold движение#!.\n\nЗатем еще один укус. Второй дротик. И мир наклоняется. Мое зрение затуманивается, когда земля устремляется мне навстречу..."
 mde_godseye.0012.a: "..."

 mde_godseye.0101.desc: "The local crew I hired and myself, have circled the island twice now. Nothing has piqued our interest.\n\nOnly grass, sand, tangled roots, and endless trees. There will be no easy place to land here, and likely nothing worth the trouble even if there were.\n\nThe longer we linger on the water, the more restless the crew grows. It is clear enough: if I set foot on that island, they will leave me there, without hesitation."
 mde_godseye.0101.a: "Let us return back"
 
 mde_godseye.0102.desc: "I remember standing up in the boat. I remember stepping onto the island; smelling the breeze, watching leaves drift past me. I remember the endless, suffocating forest stretching out before me.\n\nI do not remember how I found myself back on the mainland shores.\n\nYet here I lie now, staring out across the vast lake, the mysterious island still visible in the distance."
 mde_godseye.0102.a: "Lets return to Lakehaven"
 
 mde_godseye.0103.desc: "Slowly, I approach the island. Four oarsmen behind me work in a steady rhythm, pushing the boat across each rolling wave.\n\nNothing is visible on the shore beyond a tangled mass of forest, thick and impenetrable.\n\nSuddenly, sticks come flying, then stones, then arrows. The boat is pelted from all sides. One of the oarsmen screams for us to turn back. I try to shout orders, but something strikes my face. The world blurs, and I collapse to my knees.\n\nWhen I come to my senses, we are nearing the City of Lakehaven once more. Two oarsmen lie dead in the boat. While my vision is diminished."
 mde_godseye.0103.a: "What happened?!"

 mde_godseye.0013.desc: "Низкая топь острова #italic выступает#!, когда мы приближаемся, бесконечные замерзшие корни плавают в озере и выходят из него. Остров покрыт слоями зеленых, желтых и красных листьев, закрывающих небо. Кажется, тысяча потерянных лиц наблюдают за нами, когда мы приближаемся.\n\nМаленькая лодка мягко дрейфует на мягкую землю, и я ступаю в грязь, давя старые листья и хрупкие ветки с каждым шагом.\n\nМои спутники отказались присоединиться ко мне в этом путешествии, и теперь даже нанятая команда лодки отказывается ступать на остров. В одиночестве я продвигаюсь вперед..."
 mde_godseye.0013.a: "Движемся дальше..."
 mde_godseye.0013.b: "Бежать обратно к лодке."
 
 mde_godseye.0014.desc: "Когда я обхожу одно из многих бледных, белых как кость [Concept( 'weirwood', 'чардрев' )|E], я натыкаюсь на фигуру в капюшоне, стоящую на коленях перед вырезанным лицом. Я останавливаюсь и наблюдаю, как он медленно поворачивается к вам...\n\n#italic «Мы знали, что ты [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришел')], мы знали, что ты [Select_CString(ROOT.Char.IsFemale, 'изменила', 'изменил')] свои планы путешествия только ради того, чтобы посетить это место. Корни показывают все...»#!\n\nПока он говорит, начинают собираться птицы, сначала ворон, затем сойка, затем еще дюжина, пока их количество не становится #italic неисчислимым...#!\n\nМое зрение сужается, прикованное к коленопреклоненной фигуре, когда он встает. #italic «Шагни вперед сейчас,»#! шепчет он. #italic «Прими наш дар.»#!"
 mde_godseye.0014.a: "#italic «Я принимаю...»#!"
 mde_godseye.0014.b: "Вернуться так быстро, как только сможете."
 
 mde_godseye.0015.desc: "Его рот застыл в безмолвном крике, глаза вырезаны глубоко и #X кровоточат#! соком, как плачущие раны. Красные следы тянутся вниз по стволу и в мшистую землю внизу. Но именно рот удерживает мой взгляд.\n\nВ разинутой пасти что-то блестит. #bold Чешуя#!, дракон? Нет... этого не может быть.\n\n#italic «Пришло время,»#! говорит фигура в капюшоне позади меня, #italic «Время им вернуться в мир. Ты [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] быть [Select_CString(ROOT.Char.IsFemale, 'той самой', 'тем самым')]. Это твоя судьба.»#!\n\nИ теперь я вижу это ясно. Не зверь, а яйцо. Гладкое, блестящее и невероятно целое. [Concept( 'dragon_egg', 'Яйцо дракона' )|E], спрятанное в корнях богов."
 mde_godseye.0015.a: "Наконец-то...."
 mde_godseye.0015.b: "#italic «Драконы умерли не просто так!»#!"
 
 mde_godseye.0016.desc: "С бесконечными птицами, наблюдающими, с застывшими, плачущими лицами, смотрящими с деревьев, и с солнцем и луной, висящими в небе, фигура в капюшоне говорит:\n\n#italic «Твоя вера обоснована. <Пакт> все еще имеет силу. Прими этот дар и защищай деревья вечно.»#!\n\nИз складок своей мантии он достает лук, полностью вырезанный из [Concept( 'weirwood', 'чардрева' )|E], его поверхность бледна как кость и пронизана красными прожилками. Он гудит с тихим благоговением, оружие одновременно священное и сильное."
 mde_godseye.0016.a: "#italic «Спасибо...»#!"
 mde_godseye.0016.b: "#italic «Это слишком много.»#!"
 
 mde_godseye.0017.desc: "Я подхожу ближе, шаг за шагом. Человек в капюшоне отступает в сторону, открывая лицо [Concept( 'weirwood', 'чардрева' )|E], перед которым он стоял на коленях.\n\n#italic «Садись,»#! шепчет он. #italic «Теперь ты тоже станешь частью корней...»#!\n\nЯ опускаюсь на колени, земля под нами сырая и холодная. Я смотрю вверх на немигающее лицо на дереве...\n\nФигура в капюшоне продолжает: #italic «За этот дар ты [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] присоединиться к корням. Вонзи руки в грязь. Почувствуй вены мира... и #italic открой свой третий глаз.#!»#!"
 mde_godseye.0017.a: "Сделать как он говорит."
 mde_godseye.0017.a.f: "Вы впадете в кому на длительный период времени."
 mde_godseye.0017.b: "Бежать, бежать так быстро, как только сможете."
 
 mde_godseye.0018.desc: "Сознание #X обрушивается#! на меня как #E волна#!. Я хватаю ртом воздух, легкие #XB горят#!, и я шатаюсь вперед на коленях. Я на берегу. #italic Остров?#! Нет, там, прямо впереди, город.\n\nМое тело #X яростно#! дрожит, когда я пытаюсь встать. Мой разум... Мой разум #high полон#!. Переполнен #instruction воспоминаниями#! не моими; о мертвых королях, храбрых рыцарях, скромных простолюдинах. Я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] с ними. #italic Я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] ими.#!\n\nЯ спотыкаюсь вперед, полуслепой, каждый шаг — борьба. Мое зрение дробится, я вижу пять моментов одновременно, пока голос не прорезает туман.\n\n#italic «МОЙ [ROOT.Char.GetTitleTierName]!»#! <name> кричит: #italic «Мы ждали вас! Прошли недели, что случилось с вами?!»#!"
 mde_godseye.0018.a: "Мои корни глубоки..."
 mde_godseye.0018.b: "Это все был дурной сон..."
 
 #lake
  
 mde_godseye.0021.t: "[Concept( 'gods_eye', 'Божье Око' )|E]: Озеро"
 mde_godseye.0021.desc: "Плоскодонка — не редкость в Речных землях. Но на [Concept( 'gods_eye', 'Божьем Оке' )|E] это редкое зрелище. Местные говорят, что дно озера так глубоко, что только весла или паруса могут по-настоящему двигать судно по его темным водам.\n\nПотребовалось немного золота и немного обаяния, но мне удалось арендовать лодку и нанять команду, готовую испытать удачу на озере. Мы отчаливаем, скользя прочь от густых прибрежных сорняков, которые душат край озера. Вскоре мы дрейфуем в открытой воде, водоросли и вещи похуже цепляются за поверхность, как болезненная кожа.\n\nДаже когда солнце высоко над головой, я не вижу больше чем на несколько футов в глубину. Какие бы тайны ни хранило это озеро, они похоронены глубоко внизу.\n\nКаков мой подход здесь?"
 mde_godseye.0021.a: "Несите сети!"
 mde_godseye.0021.a.f: "Мы прочешем дно озера, что бы там ни покоилось, мы найдем это так или иначе."
 mde_godseye.0021.b: "Очистите верх!"
 mde_godseye.0021.b.f: "Мы очистим поверхность от тины и отправим ныряльщиков обыскать мелководье."
 mde_godseye.0021.c: "Исследовать самую глубокую часть."
 mde_godseye.0021.c.f: "Давайте выведем лодку на самые глубокие воды. Если ответы есть, они лежат там, где озеро поглощает свет."
 
 mde_godseye.0022.desc: "Раздается #bold всплеск#!... один из гребцов выбросил сеть за борт, и я наблюдаю, как она медленно дрейфует в темноту внизу. Другие следуют его примеру, забрасывая сети одну за другой. Лодка начинает дрейфовать, линии тянутся за нами, как паутина.\n\nЯ хожу по палубе, пока солнце ползет по небу, тени удлиняются на поверхности воды. Время ползет, пока, наконец, лодка внезапно не вздрагивает. Остановилась, кажется, под тяжестью сетей внизу. Один за другим команда начинает вытаскивать их, просеивая то, что отдало озеро..."
 mde_godseye.0022.a: "Посмотрим, что мы найдем..."
  
 mde_godseye.0023.desc: "Даже когда первая сеть переваливается через борт, я знаю, что нас ждет... #bold ничего.#!\n\nМысль о том, что мы можем поймать что-то ценное в этом огромном, древнем озере, была глупостью. Когда содержимое сетей высыпается на палубу, мои подозрения подтверждаются: рыба, как мертвая, так и живая, случайные водоросли и вонючая куча озерного мусора.\n\nМы молча сворачиваемся и плывем обратно к берегу. Трата монет и времени. Мои подозрения становятся реальностью: рыба, и мертвая, и живая, рыхлые водоросли и даже мусор!"
 mde_godseye.0023.a: "Собраться и плыть обратно к берегу."
  
 mde_godseye.0024.desc: "Мысль о том, чтобы найти что-то стоящее, казалась смехотворной... #italic До этого момента#!. Когда сети поднимают, наружу вываливаются не только рыба и слизь, но и кусочки блестящего металла, ржавые столовые приборы и россыпь старых монет.\n\nНе королевский выкуп, возможно, но достаточно, чтобы продать за скромную сумму, прежде чем мы двинемся дальше."
 mde_godseye.0024.a: "Вы продаете это в местном городе и двигаетесь дальше."
  
 mde_godseye.0025.desc: "Одна сеть за другой приносит только озерную гниль и сломанное дерево. Но последняя сеть сопротивляется. Требуется каждый человек на борту, чтобы втянуть ее, веревка стонет от напряжения.\n\nКогда она наконец прорывает ватерлинию и с тяжелым стуком приземляется на палубу, мы замолкаем. #strong_glow Один большой, маслянистый и странно выглядящий черный камень#! терпеливо лежит на палубе."
 mde_godseye.0025.a: "Собраться и плыть обратно к берегу."
  
 mde_godseye.0026.desc: "По мере того как содержимое каждой сети высыпается на палубу, команда начинает просеивать спутанную массу озерной травы, костей и ржавого лома.\n\nОдин из гребцов затягивает #bold #italic «Медведь и прекрасная дева»#!#!, и вскоре другие присоединяются, их голоса эхом разносится над тихими водами.\n\nЗатем резкий крик прорезает хор.\n\nЯ спешу на звук. Один человек стоит на коленях, глаза широко раскрыты, рука дрожит, когда он поднимает что-то из грязи, почерневшее от времени, но безошибочно узнаваемое по форме.\n\n#bold Корона.#! Потерянная для истории... и теперь найденная снова."
 mde_godseye.0026.a: "Собраться и плыть обратно к берегу."
  
 mde_godseye.0027.desc: "Я замечаю это как раз в тот момент, когда сеть прорывает поверхность, камень слишком гладкий, слишком овальный, чтобы быть естественным.\n\nДаже когда он приземляется на палубу, #strong_glow сверкая#! на солнце, я не могу поверить в то, что вижу. Но вес, слабое #x тепло#!... нет никаких сомнений."
 mde_godseye.0027.a: "[Concept( 'dragon_egg', 'Яйцо дракона' )|E], потерянное в глубине, теперь найдено."
  
 mde_godseye.0028.desc: "По мере того как содержимое каждой сети высыпается на палубу, команда начинает просеивать спутанную массу озерной травы, костей и ржавого лома.\n\nОдин из гребцов затягивает #bold #italic «Медведь и прекрасная дева»#!#!, и вскоре другие присоединяются, их голоса эхом разносится над тихими водами.\n\nПока внезапно один не вскрикивает и не прерывает песню. Кровь брызжет из пореза на его руке, я приказываю двум гребцам перевязать его, прежде чем осматриваю содержимое сетей. Внутри лежит клинок, потерянный для истории, но все еще #high острый#!..."
 mde_godseye.0028.a: "Собраться и плыть обратно к берегу."
  
 #nets death
 mde_godseye.0030.desc: "#bold Всплеск#! эхом разносится по озеру... Не от сети, а от одного из самих гребцов, поскользнувшегося, когда он бросал линь, и упавшего головой вперед в воду.\n\nОстальная часть команды бросается к краю, крича, указывая пальцами. На мгновение я могу только наблюдать, как он бьется и барахтается, поднимая брызги мутной воды.\n\nВода, густая от водорослей и более темных вещей, кружится вокруг него..."
 mde_godseye.0030.a: "#italic «Бросьте ему веревку! Ради [ROOT.Char.GetFaith.FertilityGodName]!»#!"
 mde_godseye.0030.b: "Нырнуть и вытащить его."
 mde_godseye.0030.c: "Пусть спасает себя сам."
 #extra
 mde_godseye.0030.a.a: "Вам удается вытащить его."
 mde_godseye.0030.a.b: "Озеро затягивает вас обоих."
 mde_godseye.0030.b.success: "[ROOT.Char.GetUIName] [Select_CString(ROOT.Char.IsFemale, 'спасла', 'спас')] гребца."
 mde_godseye.0030.b.failure: "Озеро поглощает вас обоих."
  
 mde_godseye.0030.c.a: "Ему удается спастись."
 mde_godseye.0030.c.b: "Озеро затягивает его."
  
 #divers
 mde_godseye.0031.desc: "Плывя вдоль края озера, наш местный гид ведет нас к участку, известному старыми обломками. Гребцы начинают сметать водоросли, покрывающие поверхность, позволяя солнечному свету проникать в глубины внизу.\n\nВнезапно гребцы вытаскивают мешок из козьей шкуры. С привычной легкостью они дико размахивают им, ловя воздух внутрь, прежде чем туго завязать отверстие вокруг узкой металлической соломинки. Затем, не говоря ни слова, они соскальзывают в воду и исчезают под поверхностью."
 mde_godseye.0031.a: "Когда они всплывают, они приносят с собой..."
 mde_godseye.0031.one: "Ныряльщик возвращается ни с чьм полезным."
 mde_godseye.0031.two: "Ныряльщик возвращается с маленькими безделушками!"
 mde_godseye.0031.three: "Ныряльщик возвращается с потерянной короной!"
 mde_godseye.0031.four: "Ныряльщик возвращается с [Concept( 'dragon_egg', 'Яйцом' )|E]?!"
 mde_godseye.0031.five: "Ныряльщик возвращается с мечом?!"
