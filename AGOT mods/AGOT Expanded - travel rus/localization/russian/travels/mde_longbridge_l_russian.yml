# l_russian:

#  mde_longbridge.0010.t: "Торговец сыром"
#  mde_longbridge.0010.desc: "Прилавок за прилавком, крик за криком, торговцы пытаются заманить покупателей.\n\nЯ изо всех сил стараюсь не обращать на них внимания, подгоняя свою свиту вперед, чтобы мы могли добраться до конца моста.\n\nНо когда я смотрю в сторону, я вижу нелепо огромного человека, сидящего за будкой и считающего мешок, тяжелый от монет. Перед ним стоит зазывала, кричащий на смеси языков. Одна фраза прорезается четко: #italic «Отличный сыр! Пентошийский сыр!»#!\n\nИ он не ошибается. Ящики за ящиками, рассыпной сыр и сырные головы стоят вокруг них, как часовые.\n\nТак почему я задерживаюсь?"
#  mde_longbridge.0010.a: "Давай купим немного."
#  mde_longbridge.0010.b: "Ужасный запах."
