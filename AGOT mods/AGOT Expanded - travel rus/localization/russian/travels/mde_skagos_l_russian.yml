l_russian:
 
  mde_skagos.0001.t: "[Concept( 'skagos', 'Скагос' )|E]"
  mde_skagos.0001.desc: "#high Еще до того, как я [Select_CString(ROOT.Char.IsFemale, 'ступила', 'ступил')] на берег острова, тьма, казалось, нависла над ним. Я остаюсь гадать, какое безумие привело меня на самый отдаленный остров во всех [Concept( 'seven_kingdoms', 'Семи Королевствах' )|E]?\n\nОстров — это не что иное, как зазубренная группа скал, торчащих из беспокойного моря, каждая волна грозит поглотить его целиком. То тут, то там пятна зелени цепляются за холмы наверху, и несколько согнутых ветром деревьев стоят, как часовые, на фоне неба.\n\nДетские сказки толпятся в моих мыслях, истории о [Concept( 'unicorns', 'Единорогах' )|E] и [Concept( 'stone_men', 'Каменных людях' )|E], и даже о последнем наблюдении великого зверя [cannibal.GetName], этого ужасного дракона, никогда не прирученного и не объезженного.\n\nИ все же я спрашиваю себя: #italic почему я здесь?#!#!"
  mde_skagos.0001.a: "Искать логово Каннибала."
  mde_skagos.0001.a.f: "Если оно здесь, я найду его, сколько бы времени это ни заняло!"
  mde_skagos.0001.b: "Давайте двигаться дальше."
  mde_skagos.0001.b.f: "Все, что мы найдем, это старые кости..."
 
  mde_skagos.0101.t: "Поиски Каннибала"
  mde_skagos.0101.desc: "От одного небольшого поселения к другому мы идем, торгуя, где должны, задавая вопросы, где можем. Хотя крепкие и маленькие #italic Скагоси#! рады поговорить о [Concept( 'unicorns', 'единорогах' )|E] и драконах, мы еще не видели ни одного.\n\nТем не менее, одна сказка привлекает мое внимание: история об обожженном камне и следах когтей высоко на самой высокой вершине острова. Стоит ли преследовать эту сказку?"
  mde_skagos.0101.a: "Взобраться и обыскать гору!"
  mde_skagos.0101.b: "Давайте уже двигаться дальше."
 
  mde_skagos.0102.desc: "Вверх и вверх мы поднимаемся. Впереди идет местный житель, готовый привести нас к так называемому логову. За мной плетутся два мула, нагруженные провизией для путешествия. Спустя часы, спустя дни, спустя бесчисленные шаги, мы наконец достигаем вершины.\n\nПередо мной зияет огромная дыра в склоне горы, ее устье усеяно костями всех форм и размеров, как внутри, так и снаружи. Скалы почернели, отмечены когтями, покрыты шрамами. И все же, судя по возрасту останков, ничто не шевелилось здесь много лет."
  mde_skagos.0102.a: "Давайте изучим место и двинемся дальше."
 
  mde_skagos.0103.desc: "Вверх и вверх мы поднимаемся. Впереди идет местный житель, готовый привести нас к так называемому логову. За мной плетутся два мула, нагруженные провизией для путешествия. Спустя часы, спустя дни, спустя бесчисленные шаги, мы наконец достигаем вершины.\n\nПередо мной зияет огромная дыра в склоне горы, ее устье усеяно костями всех форм и размеров, как внутри, так и снаружи. Скалы почернели, отмечены когтями, покрыты шрамами. И все же, судя по возрасту останков, ничто не шевелилось здесь много лет.\n\nМои руки покрыты грязью, одежда порвана и пропитана потом, каждая мышца болит. Я просеиваю кости, ржавую кольчугу, сломанные шлемы, сгнившие инструменты, пока что-то не привлекает мое внимание. Чешуя!\n\nВздрогнув, я отпрыгиваю назад, сердце колотится, наполовину ожидая, что какой-то древний зверь восстанет из тьмы. Но когда я подхожу ближе, смахивая пепел и пыль, я вижу это таким, какое оно есть..."
  mde_skagos.0103.a: "Взять это!"
  mde_skagos.0103.b: "Драконы умерли не просто так..."
  mde_skagos.0103.custom: "Вы получаете #high одно#! [Concept( 'dragon_egg', 'яйцо дракона' )|E]."
