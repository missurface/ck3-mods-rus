 #\n\n
 ############ one offs ############
 #lost interest
 mde_dragon.0001.t: "Зачем я здесь?"
 mde_dragon.0001.desc: "Когда я вхожу в Драконью яму, мир будто стихает. Стены пропитаны древним огнём и сыростью, но в голове — пустота. Я теряю всякий интерес. Я даже забываю, что меня привело сюда.\n\nЗачем вообще оседлывать [ridden_dragon.GetName]? Имеет ли это значение? Нужно ли мне вновь отдавать себя на суд драконщиков, позволять их взглядам давить на меня — и чтобы весь мир смотрел?\n\nВсё это кажется нелепостью: клеткой ожиданий, в которой нечего добыть."
 mde_dragon.0001.a: "Нет! Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] лететь."
 mde_dragon.0001.a.tt: "Вы заставите себя сесть в седло."
 mde_dragon.0001.b: "Может, просто побыть наедине с [ridden_dragon.GetName]."
 mde_dragon.0001.c: "Мне не следует быть здесь."
 mde_dragon.0001.b.f: "Вы проведёте вечер наедине со своим драконом."
 mde_dragon.0001.c.f: "Вы вернётесь домой."


 #lunatic fight
 mde_dragon.0002.t: "Летим вместе!"
 mde_dragon.0002.desc: "#high Когда я взбираюсь на [ridden_dragon.GetName] и мы поднимаемся в небо, я чувствую это — идеальную тишину. Спокойствие. Здесь моё место. Здесь я #italic есть#!.\n\nЯ и [ridden_dragon.GetName] — не две сущности, мы одно. Без дракона я ничто. #italic С#! драконом я — всё.\n\nДраконья кровь течёт в нас: во мне, в моём доме, в костях моей династии. И всё же… я сижу здесь, заперт[Select_CString(ROOT.Char.IsFemale, 'а', '')] в седле. Пристёгнут[Select_CString(ROOT.Char.IsFemale, 'а', '')] к клетке из кожи и масла.\n\nНо что, если отпустить? Что, если отстегнуться, бросить поводья на ветер и по-настоящему полететь — #italic не на#! [ridden_dragon.GetName], а вместе с [ridden_dragon.GetName]? Бок о бок. #highlight Так, как и было суждено.#!#!"
 mde_dragon.0002.a: "#S Я — ДРАКОН#!"
 mde_dragon.0002.a.f: "#S И Я ПОКАЖУ ЭТО ВСЕМУ МИРУ.#!"
 mde_dragon.0002.b: "#weak Но у меня же нет крыльев?#!"
 mde_dragon.0002.b.f: "Вы продолжите без происшествий."
 mde_dragon.0002.c: "#X ОГОНЬ ГОРИТ ВО МНЕ.#!"
 mde_dragon.0002.c.f: "Вряд ли кто-то всерьёз поверит, что он и правда — дракон, и всё же эти порывы снова и снова бьют в голову. А что, если я особ[Select_CString(ROOT.Char.IsFemale, 'енная', 'енный')]? Что, если во мне есть что-то, что нужно выпустить наружу? Не обязательно становиться драконом — но стать пламенем, пусть даже метафорическим?"

 #forgot to strap
 mde_dragon.0003.t: "Забыл пристегнуться"
 mde_dragon.0003.desc: "#high Ветер воет, пока мы набираем высоту, и на миг всё кажется правильным. [ridden_dragon.GetName] рвётся вверх с силой, каждый взмах крыльев сотрясает небо.\n\nНо когда мы замедляемся, зависнув в самом сердце облаков, инерция берёт своё. Тело дёргается вперёд — и я соскальзываю, скользя вниз по боку [ridden_dragon.GetName].\n\nТеперь я висю на одной руке; ветер ревёт в ушах, и истина бьёт, как камень: я забыл[Select_CString(ROOT.Char.IsFemale, 'а', '')] пристегнуться.\n\nКак я мог[Select_CString(ROOT.Char.IsFemale, 'ла', '')] быть таким неосторожн[Select_CString(ROOT.Char.IsFemale, 'ой', 'ым')]?#!"
 mde_dragon.0003.a: "#italic Подтянуться.#!"
 mde_dragon.0003.b: "#italic #emp [Glossary( 'Vēzot', 'VEZOT_GLOSS' )], [ridden_dragon.GetName]!#!#!"
 mde_dragon.0003.c: "#italic Отпустить и лететь.#!"
 mde_dragon.0003.toast.a.success: "Вам удаётся подтянуться и приземлиться."
 mde_dragon.0003.toast.a.failure: "Вам не хватает сил подтянуться."
 mde_dragon.0003.toast.b.success: "[ridden_dragon.GetName] поддерживает вас."
 mde_dragon.0003.toast.b.failure: "[ridden_dragon.GetName] не реагирует."
 mde_dragon.0003.a.a: "Вы подтягиваетесь"
 mde_dragon.0003.a.b: "Вы срываетесь и падаете"
 mde_dragon.0003.b.a: "[ridden_dragon.GetName] реагирует"
 mde_dragon.0003.b.b: "Вы срываетесь и падаете"

 #broken strap
 mde_dragon.0004.t: "Порванные ремни"
 mde_dragon.0004.desc: "#high После полёта я останавливаю [ridden_dragon.GetName].\n\nПоглядывая на поля, города и леса внизу, я замечаю и другое: ремни, удерживающие меня в седле, порваны и перерезаны — то ли случайно, то ли нарочно.\n\nПо спине пробегает дрожь: я сижу над облаками, ветер кружит вокруг, а солнце слепит глаза.\n\nОдной ошибки достаточно, чтобы меня швырнуло вниз.#!"
 mde_dragon.0004.a: "Спускаться медленно и осторожно."
 mde_dragon.0004.b: "Я доверяю [ridden_dragon.GetName]."
 mde_dragon.0004.b.f: "Чем крепче связь, тем выше шанс."
 mde_dragon.0004.c: "Продолжать полёт."
 mde_dragon.0004.toast.a.success: "Вам удаётся безопасно спуститься."
 mde_dragon.0004.toast.a.failure: "Одна ошибка — и вас сметает с седла."
 mde_dragon.0004.toast.b.success: "Вас спасает связь."
 mde_dragon.0004.toast.b.failure: "Доверие большому дракону вас подвело."
 mde_dragon.0004.toast.c.success: "Всё идёт как обычно."
 mde_dragon.0004.toast.c.failure: "Одна ошибка — и вас сметает с седла."
 mde_dragon.0004.a.a: "Вы спускаетесь без проблем"
 mde_dragon.0004.a.b: "Вы паникуете и падаете"
 mde_dragon.0004.b.a: "[ridden_dragon.GetName] удерживает вас"
 mde_dragon.0004.b.b: "Вы падаете: [ridden_dragon.GetName] слишком дёргается"
 mde_dragon.0004.c.a: "Опыт удерживает вас в седле"
 mde_dragon.0004.c.b: "Даже сильнейшие однажды падают"

 #missed meal alone
 mde_dragon.0005.t: "Пропущенная кормёжка"
 mde_dragon.0005.desc: "#high Когда я направляюсь к логову [ridden_dragon.GetName], меня внезапно охватывает ужас: я уже почти неделю не кормлю [ridden_dragon.GetName]!\n\nХоть [ridden_dragon.GetName] и способен охотиться сам, регулярный скот делает зверя спокойнее, послушнее… и предотвращает неприятности с местными простолюдинами.\n\nТеперь, когда я приближаюсь к логову, из тени раздаётся низкое шипение. [ridden_dragon.GetName] медленно поднимается, выгибая спину и щуря глаза.#!"
 mde_dragon.0005.a: "Запеть по-валирийски."
 mde_dragon.0005.a.f: "Вы будете петь, пока седлаете дракона и летите."
 mde_dragon.0005.b: "Попытаться оседлать его."
 mde_dragon.0005.toast.a: "Вам удаётся взобраться и немного полетать."
 mde_dragon.0005.toast.b: "Вы срываетесь и с трудом приходите в себя."
 mde_dragon.0005.c: "Запереть его в Драконьей яме."
 mde_dragon.0005.b.a: "[ridden_dragon.GetName] подчиняется"
 mde_dragon.0005.b.b: "Вас грубо сбивают на землю"
 mde_dragon.0005.d: "Просто накормить и уйти."

 #struggle alone
 mde_dragon.0006.t: "Один на один"
 mde_dragon.0006.desc: "#high С охапкой кожаных ремней я иду к месту, где отдыхает [ridden_dragon.GetName]. Жизнь драконьего всадника — это не только битвы и слава. Это кормёжка, успокоение и умение жить рядом с существом огня и ярости.\n\nИ всё же я справляюсь один. [ridden_dragon.GetName] не проявляет ни капли дружелюбия, и половину времени мне кажется, что он отказывает мне просто из упрямства.\n\nПока я с трудом закрепляю седло и начинаю взбираться на спину, зверь шевелится…"
 mde_dragon.0006.a: "#emp [Glossary( 'Dohaerās', 'DOHAERAS_GLOSS' )], [ridden_dragon.GetName]!#!"
 mde_dragon.0006.b: "Держаться крепче и подтянуться."
 mde_dragon.0006.toast.b.success: "Вам удаётся взобраться."
 mde_dragon.0006.toast.b.failure: "Вы срываетесь и с трудом поднимаетесь."
 mde_dragon.0006.c: "Отказаться от мысли лететь сегодня."
 mde_dragon.0006.d: "Запереть его в Драконьей яме."
 mde_dragon.0006.b.a: "[ridden_dragon.GetName] подчиняется"
 mde_dragon.0006.b.b: "Вас грубо сбивают на землю"

 #flying with spouse 1 happy little flying
 mde_dragon.0007.t: "Крылья огня, сердца едины"
 mde_dragon.0007.desc: "#strong_glow Небо #italic гремит#! от ударов крыльев, когда я и мой возлюбленн[Select_CString(spouse.IsFemale, 'ая', 'ый')] [spouse.GetFirstNameNicknamed] поднимаемся вместе на наших драконах — [ridden_dragon.GetName] и [ridden_dragon_spouse.GetName]. Ветер хлещет лицо, пока наши звери летят бок о бок.\n\nС этой высоты всё кажется мелким, а заботы — далёкими. На короткий миг мы не [ROOT.Char.GetTitleTierName] и не [spouse.GetTitleTierName], а две души, связанные кровью, пламенем и любовью.\n\nЯ смотрю на [spouse.GetFirstNameNicknamed] в соседнем небе — и [spouse.GetFirstNameNicknamed] улыбается, яростно и свободно. Нет уз крепче этих: два драконьих всадника, соединённые браком, сердца горят страстью и силой.#!"
 mde_dragon.0007.a: "Станцевать в небе с [spouse.GetFirstNameNicknamed]."
 mde_dragon.0007.b: "Вселить трепет вместе."

 #flying with spouse 2 heirs to valyria
 mde_dragon.0008.t: "Эхо Валирии"
 mde_dragon.0008.desc: "#strong_glow Мой дракон легко проходит сквозь облака, пока мы с [spouse.GetFirstNameNicknamed] поднимаемся над ними — выше птиц, выше любого смертного, которому #bold;italic позволено#! летать.\n\nЗемля уходит из-под нас, и на миг, растянутый в вечность, само время будто сгибается. Я больше не [ROOT.Char.GetName], а [spouse.GetFirstNameNicknamed] — больше не [spouse.GetName]. Мы — наследники Вольного Владения, потомки #r Огня#! и #r Крови#!, летящие на живых #bold;italic богах#! сквозь небо, окрашенное памятью и мифом.\n\nНад нами молча смотрят звёзды. Внизу земля дрожит от благоговения.\n\nМы летим в идеальном унисоне — два дракона, два сердца, одно наследие. Так ли парили когда-то драконьи лорды Валирии?#!"
 mde_dragon.0008.a: "Мы — последние из Валирии!"
 mde_dragon.0008.b: "Мы возродим Вольное Владение!"
 mde_dragon.0008.c: "Драконы правят нами!"
 mde_dragon.0008.d: "Мечта потеряна…"

 #flying with spouse mating on hill
 mde_dragon.0009.t: "Пылающая любовь"
 mde_dragon.0009.desc: "#high Ночь тёплая, воздух густ от запаха пепла и соли, пока наши драконы поднимаются в бархатное небо. Рядом [spouse.GetFirstNameNicknamed] уверенно ведёт [ridden_dragon_spouse.GetName], а лунный свет серебрит лицо и волосы.\n\nДалеко внизу наш[ROOT.Char.Custom('ResidenceBuilding')] спит мирным сном. Но здесь наверху мир молчит — лишь свист ветра, медленный ритм крыльев и редкая тишина двух драконьих всадников, оставшихся наедине в темноте.\n\nМы скользим рядом, вычерчивая в ночи медленные спирали, как танцоры во сне. Когда драконы наконец садятся на высоком холме, мой [spouse.GetTitleTierName] спешивается и притягивает меня ближе.\n\n#italic «Ты и я»,#! — шепчет [spouse.GetFirstNameNicknamed], — #italic «против всего мира».#!#!"
 mde_dragon.0009.a: "#italic «Я люблю тебя»#!"
 mde_dragon.0009.b: "Лечь с [spouse.GetFirstNameNicknamed]."
 mde_dragon.0009.b.tt.lovers: "[spouse.GetFirstNameNicknamed] должен быть вашим любовником или родственной душой!"
 mde_dragon.0009.b.tt.lay: "Вы проводите ночь с [spouse.GetFirstNameNicknamed]."

 #dangerous maneuvors
 mde_dragon.0010.t: "Опасные манёвры"
 mde_dragon.0010.desc: "#high Я подгоняю [ridden_dragon.GetName] выше и быстрее, отбрасывая разум и страх. [ridden_dragon.GetName] пронзительно визжит от восторга, когда я приказываю уйти в крутое пике; ветер рвёт уши. Деревья внизу встают, как копья, край горы — размытая полоса камня и снега. [ridden_dragon.GetName] выворачивает в последний миг — ровно тогда, когда мне и нужно.\n\nНо этого мало.\n\nЯ закручиваю всё более тугие спирали, лечу так низко, что обжигаю верхушки деревьев, мчусь вдоль изгиба реки, пока крылья не режут туман. Дракон рычит в протесте… или в одобрении. Трудно понять за грохотом сердца.\n\nЯ не лечу. Я испытываю смерть.#!"
 mde_dragon.0010.a: "#italic «Я смеюсь в лицо опасности!»#!"
 mde_dragon.0010.a.f: "Вы продолжаете давить."
 mde_dragon.0010.b: "Довольно. Даже я знаю пределы."
 mde_dragon.0010.b.f: "Вы замедлитесь и завершите полёт."
 mde_dragon.0010.toast.a.one: "Вам удаётся выполнить манёвр."
 mde_dragon.0010.toast.a.two: "Вы слегка задеваете препятствие."
 mde_dragon.0010.toast.a.three: "Вас сильно ударяет предмет."
 mde_dragon.0010.a.a: "Вы устраиваете впечатляющее шоу"
 mde_dragon.0010.a.b: "Вы цепляете препятствие"
 mde_dragon.0010.a.c: "Вас сильно ударяет предмет"
 mde_dragon.0010.a.d: "Вы раскалываете череп о препятствие"

 #low altitude over water
 mde_dragon.0011.t: "Крылья над водой"
 mde_dragon.0011.desc: "#high Передо мной тянется море — тёмное и бесконечное. Обычно я предпочитаю горы или равнины, но не сегодня.\n\nЯ наклоняюсь вперёд, и [ridden_dragon.GetName] отвечает. Мы стремительно снижаемся: гладь моря несётся под нами зеркалом. Крылья [ridden_dragon.GetName] бьют всего в нескольких футах над волнами. Ветер и соль жалят лицо, вода превращается в размытое полотно.\n\nМенее уверенный всадник уже поднялся бы. Но я — не менее уверенный.\n\nЯ закладываю крутые виражи над зубчатыми скалами. Брызги хлещут по брюху [ridden_dragon.GetName]. Я опускаюсь так низко, что кончики крыльев касаются поверхности воды. За нами тянется след — маленькая буря.\n\nЯ #italic испытываю#! судьбу. И ещё не закончил[Select_CString(ROOT.Char.IsFemale, 'а', '')].#!"
 mde_dragon.0011.a: "Пусть море попробует забрать меня!"
 mde_dragon.0011.a.f: "Опустить дракона ещё ниже."
 mde_dragon.0011.toast.a.one: "Вы завершаете полёт невредимым."
 mde_dragon.0011.toast.a.two: "Вы получаете лёгкие травмы."
 mde_dragon.0011.b: "Без лишнего."
 mde_dragon.0011.a.a: "Вам удаётся справиться"
 mde_dragon.0011.a.b: "Вы получаете лёгкие травмы"
 mde_dragon.0011.a.c: "Вы падаете в воду и тонете в доспехах"

 #public stunt
 mde_dragon.0012.t: "Небесная сцена"
 mde_dragon.0012.desc: "#high Поля возле [ROOT.Char.Custom('ResidenceBuilding')] заполнены зеваками: крестьянами, купцами, бродячими рыцарями и детьми — все смотрят в небо с распахнутыми глазами.\n\nОни пришли увидеть [ridden_dragon.GetName]. Но я планирую не просто полёт — я планирую зрелище.\n\nОдного рывка поводьев и слова на высоком валирийском достаточно, чтобы [ridden_dragon.GetName] взмыл в небо, взметая грязь, пыль и ветер. Мы петляем и закручиваемся, ныряем и взмываем. Я проскальзываю в узкие каменные арки и выдыхаю пламя в небо, рисуя в воздухе знаки и тени.\n\nТолпа ахает. Дети визжат от восторга. Кто-то кричит от страха. Я лечу на звере огня и смерти — и сейчас я лечу для них.\n\nИ вот… я замечаю край утёса. Разрушенную башню. Место, где можно попытаться сделать то, на что не решался ни один всадник. Стоит ли?#!"
 mde_dragon.0012.a: "Пусть это запомнят на поколения!"
 mde_dragon.0012.a.f: "Попытаться выполнить экстремальный трюк, чтобы поразить толпу."
 mde_dragon.0012.b: "Довольно славы на сегодня."
 mde_dragon.0012.toast.a.one: "Вы завершаете полёт невредимым."
 mde_dragon.0012.toast.a.two: "Вы получаете лёгкие травмы."
 mde_dragon.0012.toast.a.three: "Вы ударяетесь о камень."
 mde_dragon.0012.a.a: "Вы устраиваете впечатляющее шоу"
 mde_dragon.0012.a.b: "Вы получаете лёгкие травмы"
 mde_dragon.0012.a.c: "Вас сильно ударяет препятствие"

 #sacred in pit
 mde_dragon.0013.t: "Страх в яме"
 mde_dragon.0013.desc: "[ridden_dragon.GetName] ждёт передо мной: огромная голова опущена, крылья сложены, хвост чуть подёргивается. Дракон смотрит и ждёт, пока я подойду, заберусь в седло и полечу. Но ноги не идут.\n\nЯ делаю шаг. Останавливаюсь. Выдох дракона звучит, как буря у ушей. Я вижу когти, зубы, его размер. Я помню истории: всадники, сгоревшие заживо; съеденные в середине «связи»; разбитые о камни.\n\nИ внезапно я замираю. Стыд скручивает нутро. На меня смотрят: драконщики, и даже мейстер."
 mde_dragon.0013.a: "Нет. Я должен[Select_CString(ROOT.Char.IsFemale, 'на', '')] лететь."
 mde_dragon.0013.a.f: "Вы заставите себя преодолеть страх и всё равно попытаться взлететь."
 mde_dragon.0013.b: "#italic «Я… я не готов[Select_CString(ROOT.Char.IsFemale, 'а', '')].»#!"
 mde_dragon.0013.b.f: "Вы уходите, и все это видят. Двор услышит об этом…"

 #spouse wants to die
 mde_dragon.0014.t: "Лишь огнём"
 mde_dragon.0014.desc.bigbond: "#strong_glow Я преследую [spouse.GetFirstNameNicknamed] на [ridden_dragon_spouse.GetName], как делал[Select_CString(ROOT.Char.IsFemale, 'а', '')] бесчисленное число раз. Мы летим широкими кругами и скользим вместе по небу.#!"
 mde_dragon.0014.desc.smallbond: "#strong_glow Мы тянем поводья наших драконов — [ridden_dragon.GetName] и [ridden_dragon_spouse.GetName] — и плывём в открытом небе. Я кружу вокруг [spouse.GetFirstNameNicknamed], повторяя каждое движение.#!"
 mde_dragon.0014.desc.end: "#strong_glow \n\nНи одна забота из мира внизу не может достать нас здесь. И всё же, сидя на облаках и глядя друг другу в глаза, [spouse.GetFirstName] наконец признаётся:\n\n#italic «[ROOT.Char.GetFirstName], у меня ломит кости при движении. Моё тело чахнет. Дай мне смерть, достойную валирийской крови.»#!#!"
 mde_dragon.0014.a: "Всё для тебя…"
 mde_dragon.0014.a.tt: "Близкие родственники [spouse.GetFirstNameNicknamed] будут разочарованы."
 mde_dragon.0014.b: "#bold НЕТ, Я НЕ МОГУ!#!"
 mde_dragon.0014.c: "#italic «Уйдём из этого мира вместе…»#!"

 #a joyful moment with wife
 mde_dragon.0015.t: "Радостный миг"
 mde_dragon.0015.desc: "#strong_glow Я натягиваю снаряжение, смеясь и поддразнивая [spouse.GetFirstNameNicknamed], пока мы готовимся. Взявшись за руки, мы выходим из [ROOT.Char.Custom('ResidenceBuilding')], подходим к драконам, садимся — и вскоре [ridden_dragon.GetName] поднимает меня в воздух, а [ridden_dragon_spouse.GetName] держится рядом.\n\nПоднимаясь выше, игра меняется: то я гонюсь за [spouse.GetFirstNameNicknamed], то [spouse.GetFirstNameNicknamed] гонится за мной. Мы взмываем всё выше, пока драконы не переплетают шеи среди облаков, а затем — без предупреждения — бросаются в пике, прямо к земле.#!"
 mde_dragon.0015.a: "Резко потянуть поводья и уйти в сторону."
 mde_dragon.0015.a.tt: "Недоверие не пойдёт на пользу…"
 mde_dragon.0015.toast.a: "Вы уходите в сторону и возвращаетесь."
 mde_dragon.0015.b: "Довериться [spouse.GetFirstNameNicknamed] и драконам…"
 mde_dragon.0015.b.tt: "Что-то может пойти не так?"
 mde_dragon.0015.toast.b: "Драконы выправляют полёт."

 #angry spouse awful snap
 mde_dragon.0016.t: "Жестокий срыв"
 mde_dragon.0016.desc: "#strong_glow И снова я в воздухе, преследую [spouse.GetFirstNameNicknamed] на [ridden_dragon_spouse.GetName]. [spouse.GetFirstNameNicknamed] кружит вокруг меня бесконечными петлями, дразня каждым пролётом.\n\nЧерез некоторое время [spouse.GetFirstNameNicknamed] замедляется и ставит [ridden_dragon_spouse.GetName] прямо перед [ridden_dragon.GetName], преграждая путь. [spouse.GetFirstNameNicknamed] смеётся и кричит: #italic «Ты сегодня не в настроении?»#!#!\n\nВ настроении?! [spouse.GetFirstNameNicknamed] дразнил[Select_CString(spouse.IsFemale, 'а', '')] меня весь полёт — не говоря уже о постоянных жалобах!\n\nТак легко приказать [ridden_dragon.GetName] сломать [ridden_dragon_spouse.GetName] шею…#!"
 mde_dragon.0016.a: "#emp #bold [Glossary( 'Angōs', 'ANGOS_GLOSS' )], [ridden_dragon.GetName]!#!"
 mde_dragon.0016.b: "Игнорировать насмешки [spouse.GetFirstNameNicknamed]."
 
 #clear sky
 mde_dragon.0017.t: "Чистое небо"
 mde_dragon.0017.desc.inpit: "#high Пока [ridden_dragon.GetName] выходит из Драконьей ямы, я смотрю на небо, полностью окрашенное в бирюзу.#!"
 mde_dragon.0017.desc.outpit: "#high Пока [ridden_dragon.GetName] тяжело шагает по равнине, я смотрю на небо, полностью окрашенное в бирюзу.#!"
 mde_dragon.0017.desc: "#high \n\nДаже ветер затих! Сегодня полёт зависит только от нашей силы и умения. Идеальный день, чтобы потренироваться!\n\nЯ кричу: #bold [Glossary( 'Sovês!', 'SOVES_GLOSS' )]#!, — и несколькими могучими взмахами крыльев [ridden_dragon.GetName] мы поднимаемся в воздух, летя изо всех сил. Седло ощущается естественно, небо — гостеприимно. Быть на драконе — словно моё законное место.\n\nЯ — истинн[Select_CString(ROOT.Char.IsFemale, 'ая', 'ый')] драконий всадник!#!"
 mde_dragon.0017.a: "Насладиться моментом."

 #doesn't feel right (to ride)
 mde_dragon.0018.t: "Тяжёлые ощущения"
 mde_dragon.0018.desc: "#high Я лечу. Дракон отвечает на команды. Ветер несёт меня над холмами, морем и зазубренными костями дальних гор.\n\nВетер воет у ушей, как зверь. Каждый поворот на [ridden_dragon.GetName] скручивает живот, и я не могу перестать коситься вниз — на землю, на камни, на страшную пустоту между мной и смертью.\n\nЯ сильнее сжимаю поводья. Дышу сквозь зубы, но кажется, будто [ridden_dragon.GetName] тащит мою душу по небу.\n\nКогда я сажусь и спешиваюсь, ноги дрожат. Зверь рядом фыркает — возможно, раздражённо.\n\nЯ могу сказать, что летал[Select_CString(ROOT.Char.IsFemale, 'а', '')]. Могу даже сказать, что справился хорошо. Но правда проста: #bold я ненавидел[Select_CString(ROOT.Char.IsFemale, 'а', '')] каждую секунду.#!#!"
 mde_dragon.0018.a: "#italic «Я просто [Select_CString(ROOT.Char.IsFemale, 'неудачница', 'неудачник')]…»#!"
 mde_dragon.0018.b: "Я откажусь от полётов…"

 #super relaxing flight
 mde_dragon.0019.t: "Над шумом"
 mde_dragon.0019.desc: "#high На спине [ridden_dragon.GetName] я взмываю в небо, и мир проваливается вниз.\n\nЗдесь нет голосов, нет двора, нет звона клинков, нет непрочитанных писем, нет косых взглядов. Лишь ровный ритм крыльев, низкое дыхание [ridden_dragon.GetName] и открытое небо, укрывающее меня, как мягкое одеяло.\n\nЯ закрываю глаза, впитываю тепло и ловлю собственный медленный пульс. #bold Вот#! он, мир — #italic тишина#!.\n\nНа короткое время я не [ROOT.Char.GetTitleTierName], не всадник и не имя в книге. Я просто… я.#!"
 mde_dragon.0019.a: "Я мог[Select_CString(ROOT.Char.IsFemale, 'ла', '')] бы остаться здесь навсегда."
 mde_dragon.0019.b: "#italic «Небо напомнило мне, кто я.»#!"

 #within the storm
 mde_dragon.0020.t: "Внутри бури"
 mde_dragon.0020.desc: "#high Облака #warning кипят#!, и где-то вдали #alert_trial трещит гром#!. Когда я поднялся в небо мгновение назад, буря уже собиралась. Но драконий всадник дома [ROOT.Char.GetDynastyHouseName] должен быть готов к любой погоде.\n\nПодо мной [ridden_dragon.GetName] подёргивает крыльями, словно нервничает, пока мы скользим по тёмным, катящимся тучам.\n\nЯ веду дракона выше — не из бури, а в неё. Молнии пляшут на краю зрения. Ветер рвёт плащ. Дождь бьёт в лицо, как россыпь крошечных ножей.\n\nИ всё же я держусь в седле. [ridden_dragon.GetName], чувствуя моё спокойствие, тоже выравнивается. Вместе мы не убегаем от бури — мы прошиваем её, как игла шёлк.#!"
 mde_dragon.0020.a: "Идеальная навигация!"
 mde_dragon.0020.b: "#italic #color_red Огонь внутри горит ярче всего.#!#!"
 mde_dragon.0020.b.a: "Дракон внутри меня"
 mde_dragon.0020.b.b: "Какой чудесный сон"

 #watching the skies
 mde_dragon.0021.t: "Смотрящие в небо"
 mde_dragon.0021.desc: "#high [ridden_dragon.GetName] режет небо медленными широкими дугами: достаточно высоко, чтобы не пугать, но достаточно низко, чтобы напоминать о себе. Деревенские замирают в работе и поднимают головы. Торговцы на дорогах останавливаются. Дети машут и прыгают.\n\nЯ здесь не чтобы жечь и завоёвывать. Я здесь, чтобы меня #bold видели#!.\n\nМой зверь чувствует намерение и держится ровно, выдыхая лишь мягкие клубы дыма. Кто-то при дворе может ворчать о моей тяге к вниманию, но дороги становятся тише, а поля — спокойнее.#!"
 mde_dragon.0021.a: "Начать летать регулярно."
 mde_dragon.0021.b: "Одного раза достаточно."

 #only tear drops with wife
 mde_dragon.0022.t: "Лишь слёзы"
 mde_dragon.0022.desc: "#high Под грохот крыльев мы летим. Даже холодный дождь, хлещущий и по всаднику, и по дракону, не способен остудить наше возбуждение.\n\nОглянувшись, я вижу [spouse.GetFirstNameNicknamed] на [ridden_dragon_spouse.GetName], совсем близко. Отличная возможность испытать наши умения вместе.\n\nМы ныряем в облака и выныриваем из них, опускаемся ниже и взмываем выше. То [spouse.GetFirstNameNicknamed] гонится за мной, то я гонюсь за [spouse.GetFirstNameNicknamed]. Мы крутимся и выворачиваемся — и лишь когда небо проясняется и солнце прорывается сквозь тучи, мы наконец спускаемся.#!"
 mde_dragon.0022.a: "#italic «Проведём день вместе!»#!"
 mde_dragon.0022.b: "#italic «Сосредоточимся на тренировке.»#!"

 #endless teasing with wife

 mde_dragon.0023.t: "Бесконечные поддразнивания"
 mde_dragon.0023.desc: "#strong_glow Даже высоко в небе — #italic даже верхом на драконе#! — [spouse.GetFirstNameNicknamed] не перестаёт меня дразнить. Широко улыбаясь, [spouse.GetFirstNameNicknamed] кричит: #italic «Знаешь, что горячее драконьего огня? Я!»#!\n\n[spouse.GetFirstNameNicknamed] не мог[Select_CString(spouse.IsFemale, 'ла', '')] вести себя прилично даже по дороге к драконам. Мне пришлось выслушать разговоры о том, как #italic «вылупить что-то особенное вместе»#! и #italic «поджечь друг друга»#!…\n\nА теперь, с озорным блеском в глазах, [spouse.GetFirstNameNicknamed] зависает напротив на [ridden_dragon_spouse.GetName], явно готовясь выдать очередную грубую шутку.#!"
 mde_dragon.0023.a: "#italic «А как насчёт того, чтобы надеть вот это…»#!"
 mde_dragon.0023.b: "#italic «Детские шутки. Хватит.»#!"

 #your and dragon spouse bond

 mde_dragon.0024.t: "Драконий танец любви"
 mde_dragon.0024.desc: "#strong_glow Чешуя искрится на солнце, а пламя играет в небе. Я сижу на [ridden_dragon.GetName] и лечу широкими дугами над землёй, в знакомом ритме вместе с [spouse.GetFirstNameNicknamed].\n\nМы поднимались в небо много раз: всадник и всадник, дракон и дракон. Но теперь что-то иначе.\n\n[ridden_dragon.GetName] и [ridden_dragon_spouse.GetName] скользят в унисон, крылья режут воздух в идеальной гармонии. Их полёт становится танцем — плавным и инстинктивным, словно их связывает нечто более древнее и глубокое, чем мы. И вдруг они переплетаются: длинные шеи закручиваются вокруг друг друга в яростном — и почти нежном — жесте.\n\nЯ вцепляюсь в седло, поводья впиваются в перчатки. Напротив вижу, как [spouse.GetFirstNameNicknamed] делает то же.\n\nКогда мы наконец садимся и спешиваемся, никто не произносит ни слова. Два дракона снова взмывают — уже без всадников — и кружат вместе в небесах. Взмахи крыльев совпадают.#!"
 mde_dragon.0024.a: "Поощрить их связь"
 mde_dragon.0024.b: "Мы правим этими #italic зверями#!!"

 ############ event chains ############

 #lost dragon
 mde_dragon.0101.t: "Потерянный дракон"
 mde_dragon.0101.desc: "Когда я вхожу в Драконью яму в поисках [ridden_dragon.GetName], я проверяю его обычное место. Осматриваю кормовые площадки. Даже заглядываю в груду драконьего помёта.\n\nНо [ridden_dragon.GetName] нигде нет. И я думаю… как вообще можно потерять дракона?"
 mde_dragon.0101.a: "Найти драконщиков"
 mde_dragon.0101.b: "Я продолжу поиски сам[Select_CString(ROOT.Char.IsFemale, 'а', '')]"
 mde_dragon.0101.b.f: "Не уверен[Select_CString(ROOT.Char.IsFemale, 'а', '')], что найду хоть что-то."

 mde_dragon.0102.desc: "Как и ожидалось, драконщики переставили драконов, чтобы навести порядок в яме и заняться уходом.\n\nКогда они указывают мне на [ridden_dragon.GetName], огромный зверь тяжело шагает вперёд — кажется, его тянет наша связь."
 mde_dragon.0102.a: "Время полёта!"
 mde_dragon.0102.a.f: "Вы приступите к обычному событию полёта."
 mde_dragon.0102.b: "Я потерял[Select_CString(ROOT.Char.IsFemale, 'а', '')] интерес"
 mde_dragon.0102.b.f: "Вы не полетите, но перезарядка всё равно начнётся."

 mde_dragon.0103.desc: "Я брожу по Драконьей яме, как обезглавленная курица, безнадёжно потерявшись — пока внезапно воздух не разрезает рёв. Дракон!\n\nПот остывает на лбу, а [ridden_dragon.GetName] топает ко мне. Похоже, он чувствовал тот же стресс, что и я."

 mde_dragon.0104.desc: "Я иду быстрее. Дышу чаще. Я уже несколько раз прошёл[Select_CString(ROOT.Char.IsFemale, 'а', '')] Драконью яму вдоль и поперёк. Проверил[Select_CString(ROOT.Char.IsFemale, 'а', '')] каждый угол. Заглянул[Select_CString(ROOT.Char.IsFemale, 'а', '')] в каждую клетку. Ничего — только пустота.\n\nИ вот наконец тяжёлые двери со стоном распахиваются. Драконщики входят… и вот он — [ridden_dragon.GetName], целый и невредимый.\n\nЯ подбегаю, требую объяснений и нервно пытаюсь погладить [ridden_dragon.GetName], словно это успокоит хоть кого-то из нас."
 mde_dragon.0104.a: "Что ж… пожалуй, пора взлетать"

 #rough day
 mde_dragon.0201.t: "Тяжёлый день"
 mde_dragon.0201.desc.intro: "Входя в Драконью яму, я приказываю драконщикам подготовить [ridden_dragon.GetName] и закрепить седло.\n\n"
 mde_dragon.0201.desc.huge.bad: "Но им тяжело. Некоторые заметно дрожат. [ridden_dragon.GetName] — огромный, неуправляемый зверь: он щёлкает зубами на драконщиков и швыряет их, как куклу. Ни валирийские слова, ни тычки палками не способны его успокоить."
 mde_dragon.0201.desc.huge: "Но им тяжело: [ridden_dragon.GetName] слишком велик и не желает наклоняться, чтобы драконщики смогли выполнить свою работу."
 mde_dragon.0201.desc.small: "Но им тяжело: [ridden_dragon.GetName] показывает свой нрав — кидается на ближайшего драконщика и отказывается слушать валирийскую речь."
 mde_dragon.0201.desc.fallback: "Но им тяжело: [ridden_dragon.GetName] беспокоен, крылья дёргаются, глаза бегают из стороны в сторону."
 mde_dragon.0201.desc.finish: "\n\nЯ стою ошарашенный. Несмотря на их усилия, седло висит криво, и я молча наблюдаю, как они снова и снова пытаются закрепить его как следует."
 mde_dragon.0201.a: "Помочь им"
 mde_dragon.0201.toast.a.success: "Вы успокаиваете [ridden_dragon.GetName] и летите ненадолго."
 mde_dragon.0201.toast.a.failure: "[ridden_dragon.GetName] швыряет вас, и вы уходите домой."
 mde_dragon.0201.b: "Смотреть, как они мучаются"
 mde_dragon.0201.b.f: "С таким темпом вы вряд ли полетите на [ridden_dragon.GetName] сегодня."
 mde_dragon.0201.custom_tt.a: "Учитываются навыки драконщиков и черты дракона."
 mde_dragon.0201.c: "Окликнуть [ridden_dragon.GetName] на высоком валирийском"
 mde_dragon.0201.toast.c: "Вы успокаиваете [ridden_dragon.GetName] и летите ненадолго."
 mde_dragon.0201.a.a: "Вы успешно седлаете и оседлываете [ridden_dragon.GetName]"
 mde_dragon.0201.a.b: "Вас треплет, как тряпку"
 mde_dragon.0201.b.a: "Они успешно седлают [ridden_dragon.GetName]"
 mde_dragon.0201.b.b: "Они получают травмы в процессе"

 mde_dragon.0202.desc: "Наконец седло закреплено, и [ridden_dragon.GetName] готов к полёту.\n\nНо это зрелище заставляет меня задуматься: стоит ли вообще лететь?"

 #higher to a fault
 mde_dragon.0301.t: "Слишком высоко"
 mde_dragon.0301.desc: "#high Как всегда, когда я лечу на [ridden_dragon.GetName], воздух становится всё разреженнее, чем выше мы поднимаемся. Сердце бьётся быстрее, каждый удар отдаётся в груди, как барабаны войны. Ветер кусает, но я почти не замечаю — я чувствую, как всё во мне оживает.\n\nИ я думаю: насколько высоко мы можем подняться?\n\nНеужели у нас, драконьих всадников, небо без предела? Неужели нет конца нашей силе… нашей досягаемости… нашей мощи?#!"
 mde_dragon.0301.a: "Нужно лететь #S выше!#!"
 mde_dragon.0301.a.f: "Вы попытаетесь подняться ещё выше."
 mde_dragon.0301.b: "Глупость. Пора возвращаться"
 mde_dragon.0301.b.f: "Вы продолжите без происшествий."

 mde_dragon.0302.desc: "#high Когда я приказываю [ridden_dragon.GetName] подняться ещё выше, в голове начинается резкий стук. Будто [ROOT.Char.GetFaith.DeathDeityName] сжимает мой череп со всех сторон, не давая подняться выше предела.\n\n[ridden_dragon.GetName] замедляется и зависает в небе, крылья дрожат. Дыхание становится тяжёлым. Даже мне трудно — каждый вдох как бой, каждый выдох как усилие.\n\nНо… неужели это и есть предел?\n\nВо мне кровь дома [ROOT.Char.GetDynastyHouseName]! Небо — моё. Я не дрогну. Я правлю небесами!#!"
 mde_dragon.0302.a: "#X;bold ВЫШЕ#!"
 mde_dragon.0302.a.f: "Вы попытаетесь стать властелином неба."
 mde_dragon.0302.b: "Я достиг[Select_CString(ROOT.Char.IsFemale, 'ла', '')] предела…"
 mde_dragon.0302.b.f: "Вы попытаетесь спуститься."

 mde_dragon.0303.desc: "#high Я унижен[Select_CString(ROOT.Char.IsFemale, 'а', '')], сломлен[Select_CString(ROOT.Char.IsFemale, 'а', '')] и вынужден признать: я всего лишь [ROOT.Char.GetWomanMan] из плоти и крови. Даже после приземления язык заплетается — слова застревают в горле, а сердце не желает замедлять безумный бег.\n\nИнтересно, хватит ли у меня когда-нибудь смелости снова пройти через такое?#!"
 mde_dragon.0303.a: "Земля… как же я по тебе скучал[Select_CString(ROOT.Char.IsFemale, 'а', '')]!"

 mde_dragon.0304.desc: "#high Я едва успеваю выкрикнуть команду, как [ridden_dragon.GetName] взмахивает крыльями и рвётся вверх, унося нас всё выше. Облака проносятся мимо, впереди открывается бесконечное молочное небо. Здесь моё место!\n\nНо вдруг по лицу течёт вода — не кровь, а струя из носа. Зрение мутнеет, а [ridden_dragon.GetName] продолжает подниматься без паузы. Нужно действовать: потянуть поводья, крикнуть приказ — что угодно!#!"
 mde_dragon.0304.a: "#X;bold ОБУЗДАЙ ЗВЕРЯ#!"
 mde_dragon.0304.a.f: "Теперь вас спасёт только грубая сила!"
 mde_dragon.0304.custom_tt.a: "#italic Учитываются ваши и драконьи черты, размер, доблесть и т. п.#!"
 mde_dragon.0304.toast.a: "Вы покоряете небо!"
 mde_dragon.0304.toast.b: "Вам тяжело спускаться."
 mde_dragon.0304.toast.c: "У вас внутреннее кровотечение."
 mde_dragon.0304.toast.d: "У вас лопается сосуд."
 mde_dragon.0304.a.a: "Вы покоряете небо"
 mde_dragon.0304.a.b: "Вы с трудом спускаетесь"
 mde_dragon.0304.a.c: "У вас внутреннее кровотечение"
 mde_dragon.0304.a.d: "У вас лопается сосуд"

 #pay-per-view
 mde_dragon.0401.t: "Платный просмотр"
 mde_dragon.0401.desc: "#high Подъезжая к Драконьей яме с придворным, я вижу поразительную картину: вдоль внешней стены тянется очередь ремесленников, богатых купцов и даже простых крестьян.\n\nЗаинтересовавшись, я подхожу ближе — и узнаю, что драконщики устроили платные экскурсии по Драконьей яме. Платные! Причём берут немалую монету за обещание «безопасно и вблизи увидеть» то, что внутри.\n\nОни превратили священное место в представление. Землю огня и наследия… в рыночную забаву.#!"
 mde_dragon.0401.a: "Это вопиющее неуважение!"
 mde_dragon.0401.a.f: "Вы прекратите эту затею."
 mde_dragon.0401.b: "Потребовать компенсацию."
 mde_dragon.0401.c: "Казнить главного драконщика."

 mde_dragon.0402.desc: "Наконец толпа расходится, и я остаюсь один. [ridden_dragon.GetName] готов к полёту.\n\nНо это зрелище заставляет меня задуматься: стоит ли вообще лететь?"

 mde_dragon.0403.desc: "#high Прошёл год с тех пор, как я позволил[Select_CString(ROOT.Char.IsFemale, 'а', '')] [head_dragonkeeper.GetNameNicknamed] вести своё маленькое дело и продавать посещения Драконьей ямы.\n\nИ сегодня [head_dragonkeeper.GetNameNicknamed] принёс мою долю прибыли.\n\nВ целом — весьма приятная сделка.#!"
 mde_dragon.0403.a: "Стоило хлопот!"
 mde_dragon.0403.b: "Хватит с меня."

 #strong gust of wind
 mde_dragon.0501.t: "Сильный порыв ветра"
 mde_dragon.0501.desc: "#high После резкого подъёма я оказываюсь в седле [ridden_dragon.GetName] — как делал[Select_CString(ROOT.Char.IsFemale, 'а', '')] бесчисленное число раз. Небо над нами ясное, бесконечное и синее. Ничто не стоит на пути.\n\nНо [ridden_dragon.GetName] — не самый большой дракон, и внезапный свирепый порыв застаёт нас врасплох. В одно мгновение нас крутит вниз, ветер ревёт в ушах.\n\nЯ вцепляюсь в поводья, мышцы натягиваются, сердце колотится. Времени думать нет — лишь секунды до удара о землю, #s жёсткого.#!#!"
 mde_dragon.0501.a: "Тянуть поводья изо всех сил."
 mde_dragon.0501.custom_tt.a: "#p Вы идёте по ветру.#!"
 mde_dragon.0501.b: "Крикнуть [ridden_dragon.GetName]."
 mde_dragon.0501.custom_tt.b: "#p [ridden_dragon.GetName] слышит ваш зов!#!"
 mde_dragon.0501.custom_tt.c: "#n Вы жёстко падаете.#!"

 mde_dragon.0502.desc: "#high И вот мы снова летим над полями, крылья [ridden_dragon.GetName] бьют ровно и гордо подо мной.\n\nОпасность миновала, небо снова наше, и я чувствую, что связь с [ridden_dragon.GetName] стала крепче.#!"
 mde_dragon.0502.a: "Мы живы!"

 mde_dragon.0503.desc: "#high [ridden_dragon.GetName] не реагирует и беспомощно крутится в воздухе, падая по кругу. Никакие взмахи крыльев не останавливают падение — нет контроля, нет грации, лишь тошнотворная тяга вниз.\n\nЭтого не может быть. Я — драконий всадник! Я повелеваю небом! И всё же мой мир разбивается с громким #italic БУМ!#!\n\n…Я открываю глаза. Я жив[Select_CString(ROOT.Char.IsFemale, 'а', '')] — но какой ценой?\n\n[ridden_dragon.GetName] лежит искорёженный, избитый, дышит рваными хрипами. Кости торчат там, где не должны. Но сквозь боль дракон всё же начинает ковылять к дому.#!"
 mde_dragon.0503.a: "#s Ай…#!"

 mde_dragon.0504.desc: "#high Тянуть всё сильнее не помогает — наоборот, [ridden_dragon.GetName] крутится ещё быстрее, вихрем падая вниз. Крылья не раскрываются, не ловят воздух. Мы падаем всё быстрее.\n\nЭтого не может быть. Я — драконий всадник! Я повелеваю небом! Я тяну, бью, кричу — и ничего не работает.\n\nПодняв голову, я вижу, как земля несётся навстречу, и раскрываю рот в последний раз…#!"
 mde_dragon.0504.a: "Валар…"

 #dragon duel heir
 mde_dragon.0601.t: "Неожиданный поворот"
 mde_dragon.0601.desc: "#strong_glow Пока мы с [ridden_dragon.GetName] обнимаем ветер, как делали уже бесчисленное число раз, над нами мелькает тень — появляется и исчезает.\n\nЯ вижу лишь бесконечные облака. Но вскоре тень возвращается, и [enemy_dragonrider.GetFirstNameNicknamed] проносится передо мной, оседлав [enemy_dragon.GetName].\n\n…Даже сквозь рёв ветра я слышу, как [enemy_dragonrider.GetFirstNameNicknamed] кричит: #italic «Твоей тирании конец!»#!#!"
 mde_dragon.0601.a: "#t ЧТО?!#!"
 mde_dragon.0601.a.tt: "#warning Начнётся драконья дуэль.#!"
 mde_dragon.0601.b: "#italic;bold «Я приму чёрное!»#!"

 #embarrassing flight
 mde_dragon.0701.t: "Убогая поездка"
 mde_dragon.0701.desc: "#high Я едва-едва поднялся в небо.\n\nЕщё до того, как крылья дракона расправились полностью, меня схватил страх. Земля уходит слишком быстро, ветер орёт слишком громко, а зверь подо мной кажется не верным скакуном, а брыкающимся чудовищем.\n\nЭто не я. Не понимаю, что со мной, но тело замирает, сомневается, паникует — и, что хуже всего, сдаётся.#!"
 mde_dragon.0701.a: "Кричать команды."

 mde_dragon.0702.desc.intro: "Я бормочу команды — слабые и неуверенные. [ridden_dragon.GetName] колеблется, затем делает неловкую посадку, явно недовольный. Я едва не падаю, спешиваясь; сердце колотится, ноги дрожат."
 mde_dragon.0702.desc.outpit: "\n\nЭто видели зеваки. Я даже слышу смех. Двор обязательно об этом узнает. И хуже всего — [ridden_dragon.GetName] смотрит на меня с чем-то пугающе похожим на презрение."
 mde_dragon.0702.desc.inpit: "\n\nЭто видели драконщики. Я слышу шёпот — без сомнения, двор узнает. И хуже всего — [ridden_dragon.GetName] смотрит на меня с чем-то пугающе похожим на презрение."
 mde_dragon.0702.a: "#italic «Снимите меня с этого немедленно!»#!"
 mde_dragon.0702.a.f: "Вы полностью поддаётесь страху, и дракон это чувствует."
 mde_dragon.0702.b: "#italic «…По крайней мере, я попробовал[Select_CString(ROOT.Char.IsFemale, 'а', '')].»#!"
 mde_dragon.0702.b.f: "Вы пытаетесь сохранить гордость, но ущерб уже нанесён."

 #beneath the rain
 mde_dragon.0801.t: "Под дождём"
 mde_dragon.0801.desc.inpit: "#high Сегодня я собираюсь лететь на [ridden_dragon.GetName]. Но по пути к Драконьей яме небо разрывается, и небеса начинают плакать. Когда я наконец добираюсь до дракона, передо мной встаёт выбор: лететь ли нам сквозь бурю?#!"
 mde_dragon.0801.desc.outpit: "#high Сегодня я собираюсь лететь на [ridden_dragon.GetName]. Но по пути к логову [ridden_dragon.GetName] небо разрывается, и небеса начинают плакать. Когда я наконец добираюсь до дракона, передо мной встаёт выбор: лететь ли нам сквозь бурю?#!"
 mde_dragon.0801.desc: "#high \n\nНе секрет: истинный драконий всадник должен быть готов к любой погоде, а такой дождь — не настоящая угроза для нас.\n\nИ всё же… я колеблюсь.#!"
 mde_dragon.0801.a: "Я полечу!"
 mde_dragon.0801.b: "Лучше вернуться…"
 mde_dragon.0801.b.f: "Вы не полетите, но перезарядка начнётся."

 mde_dragon.0802.desc: "#high Потоки воды хлещут по нам, а мы режем небо с дикой радостью. Почти кажется, будто #S это я#! затягиваю нас то в буревые облака, то снова вырываю наружу.\n\n[ridden_dragon.GetName] ревёт, разрывая мрак вспышкой яркого пламени. Вот оно — вот это и есть жизнь!\n\nКогда нужно, я перекрикиваю вой бури командами, когда нужно — дёргаю поводья, и вместе мы танцуем в дожде, удерживая каждый вираж и каждое пике. С каждым манёвром мы становимся сильнее и готовнее встречать всё, что бросит нам мир.#!"
 mde_dragon.0802.a: "Какое чудо!"