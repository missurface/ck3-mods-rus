 DRAKARYS_GLOSS: "Высокий валирийский: «Дышать огнём»"
 DEMAS_GLOSS: "Высокий валирийский: «Сесть»" #Demās
 SOVES_GLOSS: "Высокий валирийский: «Лететь»" #Sōvēs
