l_russian:
 
 mde_filler_dragon.0002.t: "Шутовское яйцо"
 mde_filler_dragon.0002.desc: "Моя [GetCourtPositionType('wet_nurse_court_position').GetName()] [nursemaid.GetFirstName] #italic врывается#! в комнату, и меня накрывает волна тревоги — а может, и лёгкого раздражения. Воспитывать детей, даже с няньками и слугами, никогда не было легко.\n\nСледом за [nursemaid.GetFirstName] заходят [older_child.GetFirstName] и [younger_child.GetFirstName]. Пока [nursemaid.GetSheHe] пытается объяснить проделку [older_child.GetFirstName], дети срываются в громкую перебранку.\n\nОказывается, [older_child.GetFirstName] подарил[Select_CString(older_child.IsFemale, 'а', '')] [younger_child.GetFirstName] поддельное драконье яйцо «в шутку», и теперь об этом говорит каждый ребёнок в [ROOT.Char.Custom('ResidenceBuilding')]."
 mde_filler_dragon.0002.a: "#italic «Отличная шутка, [older_child.GetFirstName]!»#!"
 mde_filler_dragon.0002.b: "#italic «Хватит этой ерунды, [older_child.GetFirstName].»#!"
 mde_filler_dragon.0002.c: "Какая морока…"

 mde_filler_dragon.0004.t: "Детские требования"
 mde_filler_dragon.0004.desc: "По всему [ROOT.Char.Custom('ResidenceBuilding')] вдруг разносится яростный вой, отдающийся эхом из детской.\n\nЯ бросаюсь туда и вижу [child.GetFirstName] — лицо красное, пальцем обвиняюще тычет в колыбель [egg_child.GetName]. Слёзы текут по щекам, и [child.GetSheHe] кричит: #italic «Не хочу! Хочу красивое яйцо!»#! — одновременно тянется взглядом к моему непристроенному [egg.GetName].\n\nМой [child.Custom('GetDaughterSon')] уже показывает характер и дорогие вкусы! Уступить этой драконьей прихоти или преподать урок благодарности?"
 mde_filler_dragon.0004.a: "Уступить [child.GetFirstNameNoTooltip]."
 mde_filler_dragon.0004.b: "Забрать яйцо обратно."
 mde_filler_dragon.0004.c: "[Select_CString(child.IsFemale, 'Она', 'Он')] забудет об этом завтра."

 mde_filler_dragon.0006.t: "Первое настоящее испытание"
 mde_filler_dragon.0006.desc: "Сегодня я собираюсь выехать вместе со своим [child_rider.Custom('GetDaughterSon')]. Даже для [ROOT.Char.GetTitleTierName] важно находить время для ребёнка.\n\nНо стоит мне войти в Драконью яму, как я застаю там хаос. #italic «Что здесь происходит?»#! — спрашиваю я драконщиков. #italic «Дракон вашего [child_rider.Custom('GetDaughterSon')], [ROOT.Char.GetTitleTierName]… Он… Ну… [child_dragon.GetName] отказывается покидать гнездо!»#!\n\nНеподалёку стоит [child_rider.GetFirstNameNicknamed] — видно, что [child_rider.GetSheHe] нервничает и смущён[Select_CString(child_rider.IsFemale, 'а', '')], отчаянно пытаясь взять своего дракона под контроль.\n\nЭто первое настоящее испытание для [child_rider.GetFirstNameNicknamed]. Я делаю шаг вперёд, удерживая голос спокойным, но твёрдым. #italic «Драконий всадник должен уверенно командовать своим зверем»,#! — говорю я. #italic «Драконы умны и горды, но приказы отдаёшь ты. В твоих словах должна быть сила. Попробуй ещё раз. Говори чётко. Говори решительно.»#!\n\n #italic «Я постараюсь, [child_rider.Custom2('RelationToMeShort', SCOPE.sC('root_char') )]… [Glossary( 'Dohaerās', 'DOHAERAS_GLOSS' )], [child_dragon.GetName]! [Glossary( 'Dohaerās', 'DOHAERAS_GLOSS' )]!»#!"
 mde_filler_dragon.0006.a: "Надеюсь, [child_rider.GetFirstNameNoTooltip] произнесёт всё как надо…"
 mde_filler_dragon.0006.b: "#italic «Дай-ка я возьму это на себя!»#!"
 mde_filler_dragon.0006.a.one: "[child_rider.GetFirstNameNicknamed] справляется с драконом."
 mde_filler_dragon.0006.a.two: "[child_rider.GetFirstNameNicknamed] не справляется с драконом."
 mde_filler_dragon.0006.a.a: "[child_rider.GetFirstNameNicknamed] справляется с драконом"
 mde_filler_dragon.0006.a.b: "[child_rider.GetFirstNameNicknamed] не справляется с драконом"

 mde_filler_dragon.0008.t: "Опасный сон"
 mde_filler_dragon.0008.desc: "Когда утренние колокола разгоняют сон, ко мне в спешке подходит нервная [nursemaid.GetFirstName]. Перебирая пальцами, [nursemaid.GetSheHe] объясняет: [child_lost.GetFirstNameNicknamed] пропал[Select_CString(child_lost.IsFemale, 'а', '')]!\n\n"
 mde_filler_dragon.0008.desc.outpit: "Лишь когда солнце поднимается высоко, я наконец узнаю, где [child_lost.GetFirstNameNicknamed] [Select_CString(child_lost.IsFemale, 'находилась', 'находился')].\n\nОказывается, [child_lost.GetFirstNameNicknamed] провёл[Select_CString(child_lost.IsFemale, 'а', '')] ночь в логове [active_dragon.GetName], прижавшись к боку зверя.\n\nСвидетели даже утверждают, что [child_lost.GetFirstNameNicknamed] разговарива[Select_CString(child_lost.IsFemale, 'ла', 'л')] с драконом и прыгал[Select_CString(child_lost.IsFemale, 'а', '')] у [active_dragon.GetName] на спине!"
 mde_filler_dragon.0008.desc.inpit: "Лишь когда солнце поднимается высоко, я наконец узнаю, где [child_lost.GetFirstNameNicknamed] [Select_CString(child_lost.IsFemale, 'находилась', 'находился')].\n\nОказывается, [child_lost.GetFirstNameNicknamed] провёл[Select_CString(child_lost.IsFemale, 'а', '')] ночь рядом с [active_dragon.GetName] — прямо в Драконьей яме!\n\nЕщё более скандально: [child_lost.GetFirstNameNicknamed] видели карабкающ[Select_CString(child_lost.IsFemale, 'ейся', 'имся')] по спине [random_pit_dragon.GetName], #italic при этом#! смеясь и уворачиваясь от драконщиков."
 mde_filler_dragon.0008.a: "Отругать [child_lost.GetFirstNameNicknamed]"
 mde_filler_dragon.0008.b: "Поощрить такое поведение."
 mde_filler_dragon.0008.c: "Перевести [active_dragon.GetName] в Драконью яму!"
 mde_filler_dragon.0008.b.a: "[child_lost.GetFirstNameNicknamed] начинает видеть драконьи сны"
 mde_filler_dragon.0008.b.b: "Ничего не происходит"

 #ROOT.Char.GetCouncillorPosition( 'councillor_steward' ).GetPositionName]
 mde_filler_dragon.0010.t: "Сытость навеки"
 mde_filler_dragon.0010.desc: "Война тянется без видимого конца, и совет снова и снова поднимает одни и те же вопросы:\n\nпроблемы с распределением еды на рынках, рост цен на всё и усиливающееся недовольство простолюдинов.\n\nТяготы войны ожидаемы, но теперь меня тревожит новое. У простолюдинов появилась безумная мысль: будто #bold тело#! одного дракона могло бы кормить их вечно. Шёпот превращается в разговоры, а разговоры — в опасную надежду. Мёртвый зверь, говорят они, решил бы любую нужду…"
 mde_filler_dragon.0010.a: "Отложить деньги, чтобы удержать недовольство."
 mde_filler_dragon.0010.b: "Никто не посмеет тронуть драконов!"
 mde_filler_dragon.0010.c: "Показать им, что такое драконы #bold на самом деле#!."

 mde_filler_dragon.0011.desc: "На очередном заседании совета до меня наконец доходит хорошая новость: нелепая идея о том, что труп дракона может кормить простолюдинов вечно, почти исчезла с улиц.\n\nПохоже, возросшая численность #italic крыс и прочей мерзкой ползучей дряни#! дала им достаточно «пропитания», чтобы утихомирить голод и отогнать самые безумные мысли.\n\nВ любом случае, дел хватает и поважнее."
 mde_filler_dragon.0011.a: "Следующий вопрос, #italic [ROOT.Char.GetCouncillorPosition( 'councillor_castellan' ).GetPositionName]#!."

 mde_filler_dragon.0012.desc: "Пока я погружён в разговор с советниками, в зал врывается мой [ROOT.Char.GetCouncillorPosition( 'councillor_castellan' ).GetPositionName]. На лице [hand.GetNameNicknamed] — явная паника, пока [hand.GetSheHe] пытается объяснить нам, что случилось.\n\nПростолюдины осмелились #bold ПОСМЕТЬ#! напасть на мою собственность! Ревущая масса голодных, неблагодарных и изменнических — едва ли людей — штурмом взяла Драконью яму!\n\nДраконщики, стража и даже сами драконы отбивались, и земля усыпана телами павших… но донесения утверждают, что #color_red [dead_dragon.GetName]#! был убит.\n\nВыжившие использовали инструменты, оружие, всё, что попадалось под руку, чтобы добраться под священную чешую."
 mde_filler_dragon.0012.a: "Простолюдины заплатят за это!"

 mde_filler_dragon.0014.t: "Уединённое место"
 mde_filler_dragon.0014.desc: "Пока я спокойно сижу за столом, разбирая бесконечные счета и записи, заходит [child.GetFirstName].\n\n#italic «В последнее время ты какой-то напряжённый, [child.Custom2('RelationToMeShort', SCOPE.sC('root_char') )].»#! — замечает [child.GetFirstName]. #italic «Пойдём со мной. Я покажу тебе особое место, которое нашёл вместе с [child_dragon.GetName]. Только на сегодня — пусть бремя понесут другие. Всем иногда нужна передышка: нельзя править каждый день без отдыха.»#!\n\nЯ колеблюсь. Сколько раз я мечтал отбросить эти заботы хотя бы на день? Взмыть в небо на [ridden_dragon.GetName], вдали от сварливых лордов, нескончаемых советов и вечных требований.\n\n#italic «Там спокойно»,#! — продолжает [child.GetFirstName]. #italic «Иногда я просто сижу рядом с [child_dragon.GetName] до заката и смотрю, как он отражается в мелкой воде, пока небо темнеет.»#!\n\nМожет быть… может быть, один день тишины меня не сломает…"
 mde_filler_dragon.0014.a: "#italic «Я хочу увидеть твоё место…»#!"
 mde_filler_dragon.0014.a.a: "В [child.GetFirstNameNicknamed] что-то пробуждается"
 mde_filler_dragon.0014.a.b: "Ничего особенного не происходит"
 mde_filler_dragon.0014.b: "#italic «У меня нет на это времени. Хватит короткого полёта.»#!"

 mde_filler_dragon.0016.t: "Драконий несчастный случай"
 mde_filler_dragon.0016.desc: "Я бросаюсь к конюшням. В суматохе ремней и лихорадочных приказов я вскакиваю в седло и мчусь к Драконьей яме, а свита едва поспевает.\n\nС тех пор, как до меня дошли вести, сердце бьётся всё #italic сильнее#! и #italic сильнее#!. Даже издалека я слышу #x вой#! — не зверя, а ребёнка, которому ломает сердце.\n\nКрик [child.GetFirstNameNicknamed] режет ветер, как нож. И там, среди камня и пепла, лежит изуродованная куча чешуи и сломанных зубов, сжатая в дрожащих руках [child.GetFirstNameNicknamed].\n\n#italic «Я не… я не хотел[Select_CString(child.IsFemale, 'а', '')]!»#! — рыдает [child.GetFirstNameNicknamed]. #italic «Мы… мы играли. Я поскользнул[Select_CString(child.IsFemale, 'ась', 'ся')] и упал[Select_CString(child.IsFemale, 'а', '')] сверху…»#! — выдыхает [child.GetFirstNameNicknamed] сквозь слёзы. #italic «Что я наделал[Select_CString(child.IsFemale, 'а', '')]?!»#!"
 mde_filler_dragon.0016.a: "#italic «Нет…»#!"
 mde_filler_dragon.0016.b: "Выпороть [child.GetFirstNameNicknamed] за ошибку."
 mde_filler_dragon.0016.c: "Покончить с этим…"
 mde_filler_dragon.0016.a.a: "Последствия останутся надолго"
 mde_filler_dragon.0016.a.b: "Ошибаются все"

 mde_filler_dragon.0018.t: "Огненный зверинец"
 mde_filler_dragon.0018.desc: "Когда заседание совета подходит к концу и его участники начинают расходиться, мой [ROOT.Char.GetCouncillorPosition( 'councillor_steward' ).GetPositionName], [steward.GetTitleTierName] [steward.GetNameNicknamed], задерживается с довольно нелепым предложением.\n\nПохоже, мелкие лорды, богатые купцы и даже простые ремесленники отчаянно хотят хотя бы одним глазком — а то и руками — прикоснуться к моему [ridden_dragon.GetName].\n\n[steward.GetNameNicknamed] предлагает превратить это глупое желание в один большой праздник: торжество дома [ROOT.Char.GetDynastyHouseName] и способ наполнить казну золотом.\n\nВсё, что мне нужно… это удержать зверя спокойным."
 mde_filler_dragon.0018.a: "#italic «Ладно. Пусть будет.»#!"
 mde_filler_dragon.0018.b: "Дракон — не часть зверинца."
 mde_filler_dragon.0018.c: "#italic «Может, ты сам его погладишь?»#!"
 mde_filler_dragon.0018.a.a: "Всё проходит хорошо"
 mde_filler_dragon.0018.a.b: "Дракон вырывается"

 mde_filler_dragon.0020.t: "Чахнущий дракон"
 mde_filler_dragon.0020.desc: "#italic «Как?!»#! — требую я. #x «КАК?!»#! — рычу.\n\nНикто не отвечает. Мейстеры суетятся со свитками и бормочут бессмыслицу. Септоны молятся Отцу Свыше, словно святые слова способны починить то, что уже ломается.\n\nДраконы не болеют. Не в сказках и не в летописях. Не в историях, что поют барды и высекли в камне. Но когда я смотрю на [ridden_dragon.GetName], я вижу правду своими глазами.\n\nЗверь шевелится — вяло, медленно; конечности дрожат с каждым вдохом. #italic Я чувствую это тоже#! — где-то глубоко внутри, общую боль, что грызёт кость и дух. Гниль добралась до зубов; они трещат, как старый камень.\n\nЭто не обычная болезнь. Колдовство, яд или что-то ещё #S более мерзкое#!… я не знаю.\n\nНо вопрос липнет к губам, как кровь: как…?"
 mde_filler_dragon.0020.a: "У меня нет слов…"
 mde_filler_dragon.0020.b: "#x Покончить с ним.#!"

 mde_filler_dragon.0022.t: "Новый козёл отпущения"
 mde_filler_dragon.0022.desc: "Я просыпаюсь от #bold ударов#! в дверь, #bold звона#! колоколов с башен и #bold криков#! в панике.\n\nЧума не чужда простолюдинам — они и раньше хоронили родных. Но на этот раз они выбрали нового виновника.\n\n#S Драконов.#!\n\nНочью собралась огромная, вонючая толпа: вилы, топоры, дубины, факелы. Безумие и страх дали им силу. Они хлынули к Драконьей яме, как крысиный потоп.\n\nСтражу смяли и разорвали в хаосе. И даже когтями, огнём и яростью отбиваясь, произошло худшее…"
 mde_filler_dragon.0022.a: "Простолюдины заплатят!"

 mde_filler_dragon.0024.t: "Невозмутимое присутствие"
 mde_filler_dragon.0024.desc: "Кормёжка обычно похожа на управляемый хаос: драконщики осторожно раздают мясо, держа дистанцию.\n\nОднако [ridden_dragon.GetName] проявил удивительное спокойствие. Он терпеливо ждал своей доли, позволяя драконщикам двигаться вокруг почти без признаков раздражения.\n\nВ какой-то момент один из них оступился, и ведро с грохотом упало на камень. Звук резанул, как сталь, но [ridden_dragon.GetName] лишь поднял голову, посмотрел, как человек приходит в себя, и снова вернулся к еде — даже не фыркнув.\n\nТакая выдержка среди людской суеты намекает, что этот зверь необычно спокойно относится к миру людей."
 mde_filler_dragon.0024.a: "Какой славный дракон."
 mde_filler_dragon.0024.b: "Поощрить это."
 mde_filler_dragon.0024.a.tt: "Нрав дракона улучшится."

 mde_filler_dragon.0026.t: "Привередливый едок"
 mde_filler_dragon.0026.desc: "Сегодня в качестве корма принесли козу — обычно молодые драконы любят её больше всего. Но [ridden_dragon.GetName] лишь понюхал тушу и отвернулся, не проявив интереса.\n\nВчера же он без проблем съел предложенного поросёнка.\n\nКормильцы замечают, что это повторяется: дракон явно имеет предпочтения и часто отказывается от вполне годного мяса, если оно ему не по вкусу.\n\nКак бы ни бесило это драконщиков, такая разборчивость невольно снижает потребление — [ridden_dragon.GetName] оказывается необычно умеренным в потребностях."
 mde_filler_dragon.0026.a: "Ладно. Кормить тем, что он ест."
 mde_filler_dragon.0026.b: "Пусть поголодает, пока не начнёт есть всё подряд."
 mde_filler_dragon.0026.b.tt: "Нрав дракона ухудшится на 5."

 mde_filler_dragon.0028.t: "Дикий зверь?"
 mde_filler_dragon.0028.desc: "До меня дошло несколько донесений, и их правдивость трудно отрицать.\n\nМой дракон, [ridden_dragon.GetName], напал на соседнюю ферму, разнёс дом и сарай в поисках скота.\n\nДраконщики настаивают, что зверя хорошо кормили, и утверждают, что это просто его природа.\n\nНо отвечать за случившееся всё равно мне."
 mde_filler_dragon.0028.a: "Простолюдины меня не волнуют."
 mde_filler_dragon.0028.b: "Помочь разорённым семьям."
 mde_filler_dragon.0028.c: "Запереть [ridden_dragon.GetName] в Драконьей яме."
 mde_filler_dragon.0028.c.tt: "Нрав дракона ухудшится на 3."

 mde_filler_dragon.0030.t: "Старый зверь"
 mde_filler_dragon.0030.desc: "Отрицать бессмысленно. Каждый раз, когда я навещаю [ridden_dragon.GetName], зверь двигается с тяжёлой медлительностью — будто камень трётся о камень. Драконщики теперь кормят его с рук, бросая мясо прямо в огромные челюсти, лишь бы он не умер.\n\nИ всё же даже в упадке дракон такой древности приносит престиж… но за цену."
 mde_filler_dragon.0030.a: "Покончить с ним."
 mde_filler_dragon.0030.b: "Принять эту реальность."

