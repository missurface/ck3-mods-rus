 TRAIT_FLAG_DESC_subtract_size_modifier_40:0 "[dragon_size|E]: @dragon_size_icon!#N -40%#!"

 #Congenital traits
 trait_dragon_agile: "Проворный"
 trait_dragon_agile_desc: "Никто не спорит с тем, что у драконов есть разум, и, как и у других существ, кто-то из них может быть умнее, а кто-то — глупее."
 trait_dragon_agile_character_desc: "В каждом движении [ROOT.Char.GetFirstNameNoTooltip] чувствуется почти неуёмная энергия — для дракона [ROOT.Char.GetFirstNameNoTooltip] удивительно резв, и это приносит немало преимуществ."

 trait_dragon_obtuse: "Туповатый"
 trait_dragon_obtuse_desc: "Никто не спорит с тем, что у драконов есть разум, и, как и у других существ, кто-то из них может быть умнее, а кто-то — глупее."
 trait_dragon_obtuse_character_desc: "Пассивный и медлительный до упрямства. [ROOT.Char.GetFirstNameNoTooltip] выполняет приказы лишь тогда, когда сам этого хочет, и ведёт себя так, будто нарочно тянет время."

 trait_dragon_large_wingspan: "Большой размах крыльев"
 trait_dragon_large_wingspan_desc: "Некоторые драконы рождаются с особенно мощными крыльями и буквально «лепят» воздух вокруг себя. Они могут и нырять, и летать быстрее остальных."
 trait_dragon_large_wingspan_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] известен огромным размахом крыльев в полёте: каждый медленный, тяжёлый взмах будто меняет сам воздух."

 trait_dragon_small_wingspan: "Малый размах крыльев"
 trait_dragon_small_wingspan_desc: "Поговаривают, что причиной меньшего и более частого размаха крыльев у некоторых драконов может быть наследственность. В воздухе такие драконы выглядят неустойчиво и обычно даются им полёты тяжелее."
 trait_dragon_small_wingspan_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] известен мелкими, частыми взмахами крыльев: они мешают уверенно отрываться от земли и делают полёт заметно менее устойчивым."

 trait_dragon_thick_scales: "Толстая чешуя"
 trait_dragon_thick_scales_desc: "Как и у людей, драконы рождаются с разной толщиной и размером чешуи. Толстая чешуя лучше защищает от гнили и рукотворного оружия."
 trait_dragon_thick_scales_character_desc: "Если приглядеться, чешуя [ROOT.Char.GetFirstNameNoTooltip] невероятно толстая — некоторые скажут, что крепче замковой стены. Такого дракона крайне трудно подстрелить."

 trait_dragon_thin_scales: "Тонкая чешуя"
 trait_dragon_thin_scales_desc: "Как и у людей, драконы рождаются с разной толщиной и размером чешуи. Тонкая чешуя повышает риск инфекций и других серьёзных бед."
 trait_dragon_thin_scales_character_desc: "Чешуя [ROOT.Char.GetFirstNameNoTooltip] слишком хрупка: под ней легко заводятся паразиты, а любое заражение даётся тяжелее. Такой дракон уязвим и перед болезнями, и на войне."

 trait_dragon_withered_wings: "Ссохшиеся крылья"
 trait_dragon_withered_wings_desc: "Из-за повреждённого яйца или иных причин некоторые драконы рождаются слишком тонкими и хрупкими."
 trait_dragon_withered_wings_character_desc: "Крылья [ROOT.Char.GetFirstNameNoTooltip] болезненно хрупки — этот дракон с трудом поднимается в небо и почти бесполезен во всём, что требует полёта."

 trait_dragon_glowing_scales: "Сияющая чешуя"
 trait_dragon_glowing_scales_desc: "Ещё один редкий врождённый изъян, который часто считают благом: чешуя некоторых драконов отливает, словно стекло."
 trait_dragon_glowing_scales_character_desc: "Чешуя [ROOT.Char.GetFirstNameNoTooltip] необычайно толстая и будто стеклянная — она слепит отражённым светом и сияет, как живой самоцвет."

 trait_dragon_aerodynamic: "Аэродинамичный"
 trait_dragon_aerodynamic_desc: "При всей своей огромности драконы очень по-разному держатся в небе. Одни неповоротливы, а другие режут ветер, словно стрела."
 trait_dragon_aerodynamic_character_desc: "Стройное тело и лёгкая грация в полёте делают [ROOT.Char.GetFirstNameNoTooltip] будто рождённым властвовать в небе: сопротивление воздуху — минимально, скорость — непревзойдённа."

 trait_dragon_toothless: "Истощение"
 trait_dragon_toothless_desc: "Изнуряющая хворь, способная сломить даже самого могучего зверя."
 trait_dragon_toothless_character_desc: "Тяжкая болезнь терзает [ROOT.Char.GetFirstNameNoTooltip], и теперь этому дракону тяжело летать, дышать и есть."

 trait_dragon_picky_eater: "Привередливый в еде"
 trait_dragon_picky_eater_desc: "Драконы едят мясо, но не всякое мясо им по нраву. Некоторые вырабатывают особые привычки, отвергая любую добычу, кроме любимой."
 trait_dragon_picky_eater_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] известен вспыльчивым нравом, если еда не по вкусу: этот дракон крайне привередлив в том, что ест."

 trait_dragon_too_old: "Слишком стар"
 trait_dragon_too_old_desc: "Любое существо со временем стареет, и это случается даже с самыми огромными и свирепыми чудовищами."
 trait_dragon_too_old_character_desc: "Время не пощадило этого дракона. Он громаден, но медлителен, тяжело поднимается в воздух, а прожитые годы сделали его упрямым."

 #flames

 trait_dragon_green_flames: "Зелёное пламя"
 trait_dragon_green_flames_desc: "Древние тексты утверждают, что цвет пламени [dragons_plural|El] отражает его жар: одни горят слабо и тускло, другие же высвобождают невообразимую испепеляющую мощь."
 trait_dragon_green_flames_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] известен жутким зелёным пламенем, способным расплавить всё, что в него попадёт, за считанные мгновения."

 trait_dragon_blue_flames: "Синее пламя"
 trait_dragon_blue_flames_desc: "Древние тексты утверждают, что цвет пламени [dragons_plural|El] отражает его жар: одни горят слабо и тускло, другие же высвобождают невообразимую испепеляющую мощь."
 trait_dragon_blue_flames_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] отмечен ярким синим пламенем — как глубокая синь в самом сердце огня."

 trait_dragon_white_flames: "Белое пламя"
 trait_dragon_white_flames_desc: "Древние тексты утверждают, что цвет пламени [dragons_plural|El] отражает его жар: одни горят слабо и тускло, другие же высвобождают невообразимую испепеляющую мощь."
 trait_dragon_white_flames_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] известен ослепительно белым пламенем — настолько жарким, что оно способно испарить даже самую крепкую броню."

 trait_dragon_yellow_flames: "Жёлтое пламя"
 trait_dragon_yellow_flames_desc: "Древние тексты утверждают, что цвет пламени [dragons_plural|El] отражает его жар: одни горят слабо и тускло, другие же высвобождают невообразимую испепеляющую мощь."
 trait_dragon_yellow_flames_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] отмечен палящим жёлтым пламенем: всё, что в него попадёт, обугливается до неузнаваемости."

 trait_dragon_red_flames: "Красное пламя"
 trait_dragon_red_flames_desc: "Древние тексты утверждают, что цвет пламени [dragons_plural|El] отражает его жар: одни горят слабо и тускло, другие же высвобождают невообразимую испепеляющую мощь."
 trait_dragon_red_flames_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] отмечен слабым красным пламенем: оно едва опаливает то, что попадается на пути."

 trait_dragon_black_flames: "Чёрное пламя"
 trait_dragon_black_flames_desc: "Древние тексты утверждают, что цвет пламени [dragons_plural|El] отражает его жар: одни горят слабо и тускло, другие же высвобождают невообразимую испепеляющую мощь."
 trait_dragon_black_flames_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] известен смертоносным чёрным пламенем, которое уничтожает всё, с чем соприкасается."

 trait_dragon_orange_flames: "Оранжевое пламя"
 trait_dragon_orange_flames_desc: "Древние тексты утверждают, что цвет пламени [dragons_plural|El] отражает его жар: одни горят слабо и тускло, другие же высвобождают невообразимую испепеляющую мощь."
 trait_dragon_orange_flames_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] отмечен обычным оранжевым пламенем: при попадании оно обжигает и обугливает."

 trait_dragon_purple_flames: "Фиолетовое пламя"
 trait_dragon_purple_flames_desc: "Древние тексты утверждают, что цвет пламени [dragons_plural|El] отражает его жар: одни горят слабо и тускло, другие же высвобождают невообразимую испепеляющую мощь."
 trait_dragon_purple_flames_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] известен яростным фиолетовым пламенем: оно взрывается при попадании."

 #size

 trait_dragon_physique_good_4: "Небывалый исполин"
 trait_dragon_physique_good_4_desc: "Легенды часто приукрашивают, но время от времени... рождается подлинная легенда."
 trait_dragon_physique_good_4_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] растёт сверх всякого воображения. Его величественные размеры обречены прогреметь в веках."
 
 trait_dragon_physique_bad_4: "Искалеченный вылупыш"
 trait_dragon_physique_bad_4_desc: "Родившись с ужасно искривлённым телом, этот дракон с трудом дышит, а крылья едва слушаются."
 trait_dragon_physique_bad_4_character_desc: "С того дня, как [ROOT.Char.GetFirstNameNoTooltip] пробил скорлупу, с ним что-то было не так. И сейчас он едва способен двигаться, часто лежа в печальной яме."
