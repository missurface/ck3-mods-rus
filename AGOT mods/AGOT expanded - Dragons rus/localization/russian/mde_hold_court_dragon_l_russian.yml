l_russian:

 mde_hold_court_dragon.0001.t: "Обугленные кости"
 mde_hold_court_dragon.0001.desc: "Когда стража проводит его в зал, мужчина средних лет опускается передо мной на колени. Его тело едва заметно дрожит, а голова склонена так низко, что подбородок почти касается груди.\n\nПеред ним лежит потрёпанная тряпица, которую он медленно разворачивает дрожащими руками.\n\n#italic «Мой мальчик…»#! — шепчет он.\n\n#italic «Громче!»#! — рявкает один из моих стражников, [mde_bad_knight.GetFirstNameNicknamed], но мой взгляд уже прикован к тому, что скрывалось под тканью.\n\nОбугленные кости. Почерневшие, перекрученные. Маленькие. Мужчина сглатывает и пробует снова, и боль густеет в голосе. #italic «Мой сын, ваша милость… его сжёг небесный ящер.»#!\n\nТот же стражник презрительно фыркает. #italic «Это называется дракон, жалкий простолюдин. Прояви уважение…»#!\n\n[Select_CString(mde_bad_knight.IsFemale, 'Она', 'Он')] осекается на полуслове, когда я поднимаюсь со своего места."
 mde_hold_court_dragon.0001.a: "#italic «Тишина! [mde_bad_knight.GetFirstNameNicknamed], ты невыносим. Возмести этому человеку ущерб.»#!"
 mde_hold_court_dragon.0001.b: "#italic «Очевидно, [active_dragon.GetName] бы такого не сделал. Отвести этого человека в темницу.»#!"
 mde_hold_court_dragon.0001.c: "#italic «Хватит. Драконья яма существует, чтобы предотвращать такие трагедии.»#!"
 mde_hold_court_dragon.0001.d: "#italic «Вы оба тратите моё время.»#!"

 mde_hold_court_dragon.0002.t: "Сожжённая деревня"
 mde_hold_court_dragon.0002.desc: "Передо мной на коленях двое мужчин — один старый, другой молодой. Оба потрясены; лица осунулись, глаза пустые.\n\nПервым говорит старший. #italic «Ваша милость… случилась страшная беда. Нашу деревню сравняли с землёй.»#!\n\nОн описывает зверя, что спустился на них, затмив солнце крыльями, и огонь, что падал на дома, как кара. Ошибиться невозможно — это мог быть только [active_dragon.GetName].\n\nСтарик ещё не успевает закончить, как младший перебивает его: в голосе — едкая злость. #italic «И зачем вы пришли?»#! — плюётся он. #italic «Дому [ROOT.Char.GetDynastyHouseName] всегда было плевать на нас. Оглянитесь вокруг: вы правда думаете, что им есть дело до того, что происходит за этими стенами?»#!\n\nСтарший тихо пытается его одёрнуть, но слова не помогают. Спор разгорается прямо при дворе — горе быстро превращается в обвинения."
 mde_hold_court_dragon.0002.a: "Пусть препираются. Их горе ещё может развлечь двор."
 mde_hold_court_dragon.0002.b: "Очевидно, это дело дракона. Возместить им потери."
 mde_hold_court_dragon.0002.c: "Пообещать, что зверя будут лучше контролировать."
 mde_hold_court_dragon.0002.d: "Довольно дерзости — пусть погибнут, как их деревня."

 mde_hold_court_dragon.0003.t: "Странный дар"
 mde_hold_court_dragon.0003.desc: "Передо мной стоит фигура в капюшоне. По голосу и сложению — мужчина, но он упорно не показывает лица.\n\nЕго слова звучат по залу спокойно и уверенно.\n\n #italic «Мой государь… драконы дали нам мир. Драконы дали нам единство. Они были величайшим устрашением.»\n\n«Кто-то всё ещё помнит. Кто-то всё ещё надеется. Кто-то всё ещё поклоняется.»#! \n\nМедленно, нарочито, незнакомец достаёт некий предмет. Я слышу, как шевелятся доспехи — стража напряглась, но это не клинок. Это древняя, тонко выполненная серебристая корона, ловящая свет.\n\n #italic «Небольшая награда»,#! — говорит он, — #italic «от тех, кто всё ещё верит в драконов.»#!"
 mde_hold_court_dragon.0003.a: "Взять корону и казнить еретика."
 mde_hold_court_dragon.0003.b: "Приятно видеть, что драконы всё ещё вдохновляют на верность."
 mde_hold_court_dragon.0003.c: "Скверна и разложение — пусть [active_dragon.GetName] сожжёт их обоих."


