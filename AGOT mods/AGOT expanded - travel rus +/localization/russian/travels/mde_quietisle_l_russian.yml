l_russian:
 
  mde_quietisle.0001.t: "[Concept( 'quiet_isle', 'Тихий Остров' )|E]"
  mde_quietisle.0001.desc: "#high Стоя на берегу, я вдыхаю соль и брызги Крабьего залива, где [Concept( 'the_trident', 'Трезубец' )|E] вытекает из [Concept( 'the_riverlands', 'Речных земель' )|E] в [Concept( 'narrow_sea', 'Узкое море' )|E].\n\nПередо мной лежит остров. Не совсем маленький, не совсем большой, просто остров. Простолюдины называют его [Concept( 'quiet_isle', 'Тихим Островом' )|E], местом, которое, как говорят, наполнено людьми, стремящимися искупить свои прошлые грехи.\n\nДаже сейчас я могу различить их скромную септу и маленькие хижины, разбросанные как камни по земле. Почему я здесь? И что я мог бы вообразить найти в таком месте? Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] идти дальше, но...#!"
  mde_quietisle.0001.a: "Найти лодку в [Concept( 'saltpans', 'Солеварнях' )|E] и посетить остров."
  mde_quietisle.0001.a.f: "Можно переправиться на остров за небольшую плату..."
  mde_quietisle.0001.b: "#italic «Пусть [ROOT.Char.GetFaith.HighGodName] переведет меня»#!"
  mde_quietisle.0001.b.f: "Местные говорят о «тропе веры», по которой жители острова ходят туда и обратно, но достаточно ли я [Select_CString(ROOT.Char.IsFemale, 'предана', 'предан')], чтобы попытаться это сделать?"
  mde_quietisle.0001.c: "Двигаться дальше."
  mde_quietisle.0001.c.f: "Дорога зовет. Некоторые тайны лучше оставить глубинам."
 
 
  #saltspans
  mde_quietisle.0101.t: "[Concept( 'saltpans', 'Солеварни' )|E]"
  mde_quietisle.0101.desc: "Когда моя компания въезжает в город, я сначала проезжаю небольшой острог, затем скудные постройки самого города и, наконец, тесную маленькую гавань.\n\n[Select_CString(ROOT.Char.IsFemale, 'Не впечатленная его размерами и обеспокоенная', 'Не впечатленный его размерами и обеспокоенный')] вонью рыбы и соли, я отправляюсь искать паром на остров, маячащий вдалеке. \n\nЧеловек возле доков кричит: #italic «Переправа! Местный паром в наем! Интересует переправа через [Concept( 'the_trident', 'Трезубец' )|E]! Быстро и безопасно?!»#!\n\nДержу пари, он готов сделать крюк за соответствующую цену..."
  mde_quietisle.0101.a: "Принять предложение."
  mde_quietisle.0101.b: "Продолжить свое путешествие."
 
  mde_quietisle.0102.desc: "Когда моя компания въезжает в город, я сначала проезжаю небольшой острог, затем скудные постройки самого города и, наконец, тесную маленькую гавань.\n\n[Select_CString(ROOT.Char.IsFemale, 'Не впечатленная его размерами и обеспокоенная', 'Не впечатленный его размерами и обеспокоенный')] вонью рыбы и соли, я отправляюсь искать паром на остров, маячащий вдалеке. \n\nКо мне подходит дюжий мужчина с толстой шеей и широкими плечами, с руками гребца. «Да, [ROOT.Char.GetTitleTierName], похоже, вам нужна помощь. Я отвезу вас, куда вам нужно!»"
  mde_quietisle.0102.a: "Принять предложение."
  mde_quietisle.0102.b: "Продолжить свое путешествие."
 
  mde_quietisle.0103.desc: "Когда моя компания въезжает в город, я сначала проезжаю небольшой острог, затем скудные постройки самого города и, наконец, тесную маленькую гавань.\n\n[Select_CString(ROOT.Char.IsFemale, 'Не впечатленная его размерами и обеспокоенная', 'Не впечатленный его размерами и обеспокоенный')] вонью рыбы и соли, я отправляюсь искать паром на остров, маячащий вдалеке. \n\nПосетив местные таверны и поговорив с несколькими настороженными торговцами, вы наконец находите старика, готового переправить вас за определенную плату."
  mde_quietisle.0103.a: "Принять предложение."
  mde_quietisle.0103.b: "Продолжить свое путешествие."
 
  mde_quietisle.0104.desc: "Когда моя компания въезжает в город, я сначала проезжаю небольшой острог, затем скудные постройки самого города и, наконец, тесную маленькую гавань.\n\n[Select_CString(ROOT.Char.IsFemale, 'Не впечатленная его размерами и обеспокоенная', 'Не впечатленный его размерами и обеспокоенный')] вонью рыбы и соли, я отправляюсь искать паром на остров, маячащий вдалеке.\n\nПосле нескольких часов жарки на солнце и разговоров с равнодушными горожанами. Единственная возможность добраться до острова, которую я нашел, — арендовать местную лодку и поплыть туда самому."
  mde_quietisle.0104.a: "Арендовать лодку и начать грести."
  mde_quietisle.0104.b: "Продолжить свое путешествие."
  mde_quietisle.0104.a.a: "Вы благополучно переправляетесь"
  mde_quietisle.0104.a.b: "Вы падаете за борт"
 
 
  #fighting burly man
  mde_quietisle.0110.desc: "Когда мы медленно дрейфуем к острову, мой проводник внезапно достает оружие.\n\n#italic «Ладно, без фокусов,»#! говорит он. #italic «Отдавай свои ценности, и я позволю тебе прыгнуть и доплыть до берега. Иначе... ты труп.»#!\n\n[Select_CString(ROOT.Char.IsFemale, 'Потрясенная', 'Потрясенный')] тем, что эта бесплатная поездка оказалась совсем не такой, я должен действовать быстро. Дать ему то, что он хочет? Или сражаться за свою жизнь?"
  mde_quietisle.0110.a: "Сражаться!"
  mde_quietisle.0110.b: "Дать ему то, что он хочет..."
  mde_quietisle.0110.c: "Попытаться сбежать."
  mde_quietisle.0110.c.a: "Вы успешно доплываете до суши"
  mde_quietisle.0110.c.b: "Вы тонете"
 
 
  #holy walk
  mde_quietisle.0201.t: "Святая Тропа"
  mde_quietisle.0201.desc: "#high Я [Select_CString(ROOT.Char.IsFemale, 'ждала', 'ждал')], пока река успокоится, но [Concept( 'the_trident', 'Трезубец' )|E] все еще несется к Крабьему заливу. Сколько еще я могу ждать?\n\nЯ шагаю к берегу, ища твердую почву, и возношу молчаливую молитву [ROOT.Char.GetFaith.FertilityGodName]. Под поверхностью я вижу дно реки, и медленно в моем сознании начинает обретать форму путь. Я вижу его.\n\nНо [Select_CString(ROOT.Char.IsFemale, 'достойна', 'достоин')] ли я?#!"
  mde_quietisle.0201.a: "Сейчас или никогда..."
  mde_quietisle.0201.a.f: "Ваша вера будет вознаграждена, ваша злоба наказана, осмелитесь ли вы?"
  mde_quietisle.0201.b: "Отступить, вернуться к своим путешествиям."
  mde_quietisle.0201.a.a: "Вам удается благополучно перебраться"
  mde_quietisle.0201.a.b: "Вы поскальзываетесь и падаете"
  mde_quietisle.0201.a.c: "Река уносит вас"
  
  mde_quietisle.0202.desc: "#high Когда я сижу на своей лошади, глядя на мелководье впереди, раздается голос: #italic «[ROOT.Char.GetTitleTierName]! Ищете покаяния? Остров для тех, кто обременен прошлыми грехами.»#!\n\nРядом стоит старик, одной рукой сжимая мешок, перекинутый через плечо, другой опираясь на выветренную трость. Он выглядит так, словно тоже намерен переправиться на остров.\n\n#italic «Братья принимают всех,»#! продолжает он. #italic «Назови свое намерение, и я проведу тебя через воды.»#!\n\nОчевидно честный в своих словах, теперь мне решать...#!"
  mde_quietisle.0202.a: "#italic «Я ищу размышлений о прошлых грехах.»#!"
  mde_quietisle.0202.b: "#italic «Я ищу возможности увидеть и посетить остров в качестве гостя.»#!"
  mde_quietisle.0202.c: "#italic «Я просто любуюсь им издалека.»#!"
 
  mde_quietisle.0203.desc: "#high Передо мной лежит мелкое устье реки. Я стою в сапогах в воде, чувствуя, как маленькие волны мягко разбиваются о мои ноги и берег.\n\nНа какое-то время я закрываю глаза, чувствуя ветер в своих волосах, слушая, как река встречается с морем.\n\nЗатем внезапно я слышу шаги позади себя. Там стоит молодой человек. #italic «Кто ты?»#! кричу я. Он ничего не говорит — только кивает, затем жестикулирует в сторону далекого острова. Через мгновение он входит в воду и начинает переходить ее.\n\nОсмелюсь ли я последовать за ним?#!"
  mde_quietisle.0203.a: "Следовать за молчаливым Братом."
  mde_quietisle.0203.b: "Вернуться к своим путешествиям."
 
  mde_quietisle.0204.desc: "#high Когда я расхаживаю по берегу реки, глядя через мелкое устье, в моем сознании начинает формироваться узор.\n\nЭто не какой-то святой путь, проходимый только благочестивыми. Это просто разбросанная линия поднятых грязевых холмов, скрытых под водой.\n\nВсе, что мне нужно сделать, это проследить путь под поверхностью, и мы сможем переправиться в кратчайшие сроки.#!"
  mde_quietisle.0204.a: "Вы пытаетесь перейти."
  mde_quietisle.0204.b: "Вернуться к своим путешествиям."
 
 
 
 
 
  #the island
  
  mde_quietisle.0301.t: "[Concept( 'quiet_isle', 'Тихий Остров' )|E]"
  mde_quietisle.0301.desc: "И вот так просто я оказываюсь на [Concept( 'quiet_isle', 'Тихом Острове' )|E]. Человек, известный как #italic Старший Брат#!, подходит ко мне, предлагая показать остров.\n\nМаленькие хижины и разбросанные здания стоят в тишине по всей земле. В его сердце стоит скромный семигранный [Concept( 'sept', 'Септрий' )|E], отмеченный символами всех видов преданности и идолопоклонства. Он даже говорит о чем-то, называемом #bold Нора Отшельника#!.\n\nЧто стоит посетить?"
  mde_quietisle.0301.a: "Посетить [Concept( 'sept', 'Септрий' )|E]."
  mde_quietisle.0301.b: "Посетить Нору Отшельника."
  mde_quietisle.0301.b.f: "Известна тем, что содержит различные безделушки и прошлые мечты..."
  mde_quietisle.0301.c: "Совершить небольшую прогулку по острову и вернуться на материк."
  
  
  
  #hermits hole
  mde_quietisle.0401.t: "[Concept( 'quiet_isle', 'Тихий Остров' )|E]: Нора Отшельника"
  mde_quietisle.0401.desc: "#high В низкий холм врезана узкая дверь, настолько маленькая, что человеку, возможно, придется поклониться, чтобы войти. Возможно, в знак уважения к тому, что лежит внутри.\n\nВнутри маленькая пещера выстлана шерстяными коврами, чтобы не пускать холод, а по стенам развешаны выцветшие гобелены. Скромный алтарь стоит у задней стены, окруженный сундуками, столом с двумя стульями и бесконечным ассортиментом безделушек.\n\nХотя ничто конкретное не выделяется, вы уходите с тихим чувством цели и немалой долей покоя.#!"
  mde_quietisle.0401.a: "Посетить другое место."
  mde_quietisle.0401.b: "Двигаться дальше."
  
  mde_quietisle.0402.desc: "#high В низкий холм врезана узкая дверь, настолько маленькая, что человеку, возможно, придется поклониться, чтобы войти. Возможно, в знак уважения к тому, что лежит внутри.\n\nВнутри маленькая пещера выстлана шерстяными коврами, чтобы не пускать холод, а по стенам развешаны выцветшие гобелены. Скромный алтарь стоит у задней стены, окруженный сундуками, столом с двумя стульями и бесконечным ассортиментом безделушек.\n\nМежду парой резных ваз сияет красный отблеск. Наклонившись, чтобы рассмотреть его, я замечаю маленький #X кроваво-красный рубин#!. Может ли это быть? Мог ли один из потерянных рубинов [Concept( 'rhaegar_targaryen', 'Рейгара' )|E] быть выброшен сюда? Это не невозможно...#!"
  mde_quietisle.0402.a: "Украсть его и надеяться, что Братья не заметят."
  mde_quietisle.0402.b: "Убить Старшего Брата и попытаться сбежать с острова."
  mde_quietisle.0402.c: "Оставить его в покое."
  
  mde_quietisle.0403.desc: "#high В низкий холм врезана узкая дверь, настолько маленькая, что человеку, возможно, придется поклониться, чтобы войти. Возможно, в знак уважения к тому, что лежит внутри.\n\nВнутри маленькая пещера выстлана шерстяными коврами, чтобы не пускать холод, а по стенам развешаны выцветшие гобелены. Скромный алтарь стоит у задней стены, окруженный сундуками, столом с двумя стульями и бесконечным ассортиментом безделушек.\n\nКогда мы проходим дальше в пещеру, я замечаю что-то невероятное, чешуя! Может ли это быть? Настоящий дракон? Наклонившись, чтобы рассмотреть его ближе, я понимаю, что это не дракон, а прекрасное [Concept( 'dragon_egg', 'Яйцо' )|E], мерцающее в свете свечей.#!"
  mde_quietisle.0403.a: "Убить Брата и украсть его."
  mde_quietisle.0403.c: "Оставить его в покое."
  
  mde_quietisle.0404.desc: "#high Когда мы продвигаемся глубже в пещеру, мы останавливаемся перед большим сундуком, покрытым толстым слоем пыли и паутины. Старший Брат смахивает ее и медленно поднимает крышку. С тяжелым стуком сундук со скрипом открывается, и изнутри он достает жесткий сверток, обернутый в ткань.\n\nСлой за слоем он снимает ткань, пока, наконец, слабый синий свет не начинает мерцать изнутри.\n\n#italic «Выбросило на берег десятилетия назад...»#! бормочет Старший Брат. #italic «Пришло время для [Select_CString(ROOT.Char.IsFemale, 'новой', 'нового')] [ROOT.Char.GetTitleTierName] пустить это в дело.»#!#!"
  mde_quietisle.0404.a: "Взять это."
  mde_quietisle.0404.b: "#italic «Это слишком много.»#!"
  
  
  #septry
  mde_quietisle.0501.t: "[Concept( 'quiet_isle', 'Тихий Остров' )|E]: [Concept( 'sept', 'Септрий' )|E]"
  mde_quietisle.0501.desc: "[Concept( 'sept', 'Септрий' )|E] маленький, деревянный и местами немного гнилой, но здесь спокойно. Деревянные резные изображения [Concept( 'the_seven', 'Семи' )|E] аспектов выстроились вдоль стен. Рядом с ним стоит скромный клуатр, где Братья спят и едят. Вдалеке неподвижно стоит ветряная мельница.\n\nМеня ведут в главный зал септрия. Семь стен, каждая с алтарем, окружают пространство. Старший Брат преклоняет колени перед [Concept( 'the_smith', 'Кузнецом' )|E] и начинает молиться."
  mde_quietisle.0501.a: "Присоединиться к молитве."
  mde_quietisle.0501.b: "Наблюдать за его молитвой."
  mde_quietisle.0501.c: "#X Убить Брата, украсть безделушки и сбежать.#!"
  
  
  
  
  #prayer
  mde_quietisle.0510.t: "[Concept( 'quiet_isle', 'Тихий Остров' )|E]: Молитва"
  mde_quietisle.0510.desc: "Каждая из семи сторон зала посвящена отдельному аспекту #high [Concept( 'the_seven', 'Семерых Единых' )|E]#!. Все, что я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] сделать, это подойти к алтарю, преклонить колени и помолиться в тишине."
  mde_quietisle.0510.a: "[Concept( 'the_father', 'Отец' )|E]."
  mde_quietisle.0510.b: "[Concept( 'the_mother', 'Мать' )|E]."
  mde_quietisle.0510.c: "[Concept( 'the_warrior', 'Воин' )|E]."
  mde_quietisle.0510.d: "[Concept( 'the_smith', 'Кузнец' )|E]."
  mde_quietisle.0510.e: "[Concept( 'the_maiden', 'Дева' )|E]."
  mde_quietisle.0510.f: "[Concept( 'the_crone', 'Старица' )|E]."
  mde_quietisle.0510.g: "[Concept( 'the_stranger', 'Неведомый' )|E]."
  mde_quietisle.0510.h: "[Concept( 'rhllor', 'Р'глор' )|E]!"
  mde_quietisle.0510.h.f: "Маленькая свеча привлекает ваш взгляд, свет мерцает на ветру, и вы почти можете различить формы в пламени."
  mde_quietisle.0510.i: "Ересь..."
  
  
  
  
  
  #follow-up
  mde_quietisle.1001.t: "[Concept( 'quiet_isle', 'Тихий Остров' )|E]: Божественное Наказание"
  mde_quietisle.1001.desc: "Сбежать с острова было самой легкой частью. Кража — еще легче. А ускакать? Проще всего. Но теперь они догнали, и из этого нет легкого выхода.\n\nПеред моей компанией стоит оборванная линия Святых Братьев, просящих Братьев? или, может быть, Молчаливых Братьев? Кто бы они ни были, они знают, что я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал')].\n\nОдин выходит вперед и кричит: #italic «Покайтесь. Верните то, что вы украли, или пусть [brother.GetFaith.TricksterGodName] судит вас вечно.»#!\n\nИ что теперь? Как я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] с этим разобраться?"
  mde_quietisle.1001.a: "Бросить вызов их лидеру."
  mde_quietisle.1001.b: "Вступить в тотальный бой."
  mde_quietisle.1001.c: "Вернуть это."
  mde_quietisle.1001.d: "Попытаться ускакать."
