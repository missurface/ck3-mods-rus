l_russian:
 
  mde_vale.0001.t: "[Concept( 'mountains_of_the_moon', 'Лунные горы' )|E]"
  mde_vale.0001.desc: "Передо мной лежит долина, зажатая между [Concept( 'mountains_of_the_moon', 'Лунными горами' )|E]. По пути сюда мы слышали сказки и предупреждения о [Concept( 'shadowcats', 'Сумрачных котах' )|E], [Concept( 'mountain_clans', 'Горных кланах' )|E] и даже о драконе или двух.\n\nПики огромными глыбами маячат вдали, их заснеженные вершины пронзают облака. Холодные ветры правят этой долиной, и леса вокруг шепчут о невидимой жизни.\n\nТак почему я здесь? Моя компания и я не в том состоянии, чтобы противостоять большой группе [Concept( 'mountain_clans', 'Горных кланов' )|E]. Что могут скрывать эти горы?"
  mde_vale.0001.a: "Спросить местных о драконах."
  mde_vale.0001.a.f: "Ходили слухи, что драконы [Concept( 'morning', 'Утро' )|E] и [Concept( 'sheepstealer', 'Овцекрад' )|E] жили в этих горах какое-то время. Возможно, у местных простолюдинов есть сказки или намеки на их поведение и повадки."
  mde_vale.0001.b: "Найти [Concept( 'burned_men', 'Обгорелых' )|E]."
  mde_vale.0001.b.f: "Местная легенда гласит, что [Concept( 'mountain_clans', 'Горный клан' )|E] «[Concept( 'burned_men', 'Обгорелые' )|E]» появился в результате того, что обитатели гор поклонялись дракону [sheepstealer.GetName]. Возможно, они расскажут что-то интересное, или, возможно, я сложу голову..."
  mde_vale.0001.c: "Давайте просто продолжим..."
 
 
  ## dragonlore
  mde_vale.0101.t: "[Concept( 'mountains_of_the_moon', 'Лунные горы' )|E]: Драконьи знания"
  mde_vale.0101.desc: "После многих долгих дней, проведенных в походах по холмам, лесам и извилистым горным тропам, мы собрали немало информации у простолюдинов.\n\nНу, #italic информации#!. Большая часть состоит из местных легенд, бесполезных семейных сказок, выдуманной чепухи и, прежде всего, попрошайничества.\n\nПутешественники редки в этих краях, о чем ясно говорят взгляды и настороженные вопросы. Но, по крайней мере, мне удалось избежать неприятностей.\n\nТеперь, с маленьким кусочком головоломки в руках, я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов')] двигаться дальше."
  mde_vale.0101.a: "Еще один кусочек головоломки..."
 
 
 
  #burned men
 
  mde_vale.0201.t: "[Concept( 'mountains_of_the_moon', 'Лунные горы' )|E]: [Concept( 'burned_men', 'Обгорелые' )|E]"
  mde_vale.0201.desc: "Пробираясь через леса, холмы и горы, слушая бесчисленных простолюдинов и пастухов, мы ничего не находим.\n\nДаже если эти горы действительно скрывают дикие кланы, мы не видели и не слышали ни единого признака этого.\n\nЗапасы на исходе, и вой [Concept( 'shadowcats', 'сумрачных котов' )|E] становится ближе, пора спускаться с гор и возвращаться домой."
  mde_vale.0201.a: "Давайте двигаться дальше..."
 
  mde_vale.0202.desc: "Перед вами стоит крупный, деформированный мужчина. Он называет себя #bold «Красные Руки»#! и воображает себя лидером этой оборванной банды воров и дикарей.\n\nВ его тени скрывается банда едва похожих на людей фигур, одетых в гниющие одежды, содранные с разграбленных трупов. Ржавая сталь, заостренный камень или расщепленные палки наполняют их руки.\n\nНо они пришли не сражаться. Пока нет.\n\n#italic «Злото и дары,»#! выкрикивает Красные Руки. #italic «Отдайте нам то, что у вас есть, и благословение Горы Свыше будет вашим. Откажитесь, и мы будем сражаться.»#!\n\nДержу пари, он готов сделать крюк за соответствующую цену..."
  mde_vale.0202.a: "Одарить их великим даром золота."
  mde_vale.0202.b: "Обменять свой артефакт на их."
  mde_vale.0202.c: "Отказаться от любой торговли."
  mde_vale.0202.c.f: "[Concept( 'mountain_clans', 'Горные кланы' )|E] не известны своей вежливостью, это может привести к чему-то плохому..."
  mde_vale.0202.d: "Попытаться отговориться."
  mde_vale.0202.d.f: "Хотя это крайне маловероятно, с [Concept( 'mountain_clans', 'Горными кланами' )|E] #italic МОЖНО#! договориться, если подобрать правильные слова..."
 
  mde_vale.0203.desc: "Перед вами стоит крупный, деформированный мужчина. Он называет себя #bold «Красные Руки»#! и воображает себя лидером этой оборванной банды воров и дикарей.\n\nВ его тени скрывается банда едва похожих на людей фигур, одетых в гниющие одежды, содранные с разграбленных трупов. Ржавая сталь, заостренный камень или расщепленные палки наполняют их руки.\n\n#italic «[Select_CString(ROOT.Char.IsFemale, 'Слабая женщина', 'Слабый человек')], [ROOT.Char.GetTitleTierName]!»#! выкрикивает он. #italic «Сразись со мной! Дружеский поединок — без смертей. Победитель подарит другому великий подарок!»#!\n\nПростое требование. Я наконец [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашел')] их... и все сводится к #bold этому#!? Что случится, если я откажусь?"
  mde_vale.0203.a: "#italic «Тогда потанцуем...»#!"
  mde_vale.0203.b: "Отказаться."
  mde_vale.0203.b.f: "[Concept( 'mountain_clans', 'Горные кланы' )|E] не известны своей вежливостью, это может привести к чему-то плохому..."
  mde_vale.0203.d: "Попытаться отговориться."
  mde_vale.0203.d.f: "Хотя это крайне маловероятно, с [Concept( 'mountain_clans', 'Горными кланами' )|E] #italic МОЖНО#! договориться, если подобрать правильные слова..."
 
  mde_vale.0204.desc: "Крики, плач, вой, бесконечный ор обрушиваются на меня все сразу.\n\nЗасада!\n\nДикарь маячит передо мной, и в его тени стоит оборванная стая едва похожих на людей мужчин. Они носят гниющие одежды, содранные с разграбленных трупов, сжимая ржавую сталь, зазубренный камень или расщепленные палки.\n\n#italic «Сдавай свои безделушки, [Select_CString(ROOT.Char.IsFemale, 'слабая женщина', 'слабый человек')],»#! рычит большой впереди. #italic «Отдай их, и мы, возможно, позволим тебе уйти с этой горы живым...»#!\n"
  mde_vale.0204.a: "Бросить вызов их лидеру."
  mde_vale.0204.b: "Попытаться отговориться."
  mde_vale.0204.b.f: "Хотя это крайне маловероятно, с [Concept( 'mountain_clans', 'Горными кланами' )|E] #italic МОЖНО#! договориться, если подобрать правильные слова..."
  mde_vale.0204.c: "Начать всеобщую драку."
  mde_vale.0204.d: "Сдаться..."
 
 
 
 
 
 
  #after / maintaince
 
  mde_vale.9992.desc: "И вот так просто дикарь лежит мертвым передо мной.\n\nЕго оборванная банда разбегается, как трусы, в деревья, в то время как позади меня раздаются радостные крики.\n\nНо мои глаза не на убегающих людях и не на гордых голосах за моей спиной. Мой взгляд прикован к земле, где что-то странное, что-то #bold чудесное#!, было оставлено горцами..."
  mde_vale.9992.a: "Неужели это правда...?"
  mde_vale.9992.b: "Неужели это правда...?"
 
  mde_vale.9994.desc: "Почти как в игре, мы скрещиваем и скрещиваем мечи. Оба заперты в буре мечей.\n\nНо мне удается сбить дикаря с ног, и [burned_man.Select_CString(burned_man.IsFemale, 'она', 'он')] кричит: #italic «Хватит!»#!\n\nНа своих коленях [burned_man.Select_CString(burned_man.IsFemale, 'она', 'он')] бормочет: #italic «Ты [Select_CString(ROOT.Char.IsFemale, 'победила', 'победил')]... бери [vale_artifact.GetName] и оставь нас в покое.»#! [burned_man.Select_CString(burned_man.IsFemale, 'Её', 'Его')] гордость сломлена, оставлена на пир воронам в долине."
  mde_vale.9994.a: "#italic «Давайте сложим об этом песню!»#!"
  mde_vale.9994.b: "#italic «Давайте сложим об этом песню!»#!"
 
  mde_vale.9995.desc: "Почти как в игре, мы скрещиваем и скрещиваем мечи. Оба заперты в буре мечей.\n\nНо [burned_man.Select_CString(burned_man.IsFemale, 'она', 'он')] сбивает меня с ног. [Select_CString(ROOT.Char.IsFemale, 'Побитая и потрепанная, окровавленная и измученная', 'Побитый и потрепанный, окровавленный и измученный')], у меня нет сил подняться снова, все кончено...\n\nТеперь я отдаю свою цену или принимаю смерть..."
  mde_vale.9995.a: "Отдать цену."
