l_russian:
 
  mde_wonder.0001.t: "[Concept( 'the_wall', 'Стена' )|E]"
  mde_wonder.0001.desc: "Холод достиг меня раньше стены, но теперь я шагаю к ней, и с каждым шагом она нависает надо мной все выше и выше.\n\nОна поистине огромна, и постоянный плач ее стен делает ее очень жуткой.\n\nИ все же я здесь, никто не может отнять это у меня, я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел')] стену и могу жить, чтобы заявить об этом."
  mde_wonder.0001.a: "Одно из чудес человечества..."
 
  mde_wonder.0002.t: "[Concept( 'titan_of_braavos', 'Титан' )|E]"
  mde_wonder.0002.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал')] это.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'достигла', 'достиг')] [Concept( 'titan_of_braavos', 'Титана' )|E], массивного маяка и крепости — нет, массивного воина, охраняющего Браавос.\n\nНикто не может отнять это у меня, и я могу с гордостью сказать, что [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел')] эту массивную статую [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')]."
  mde_wonder.0002.a: "Одно из чудес человечества..."
