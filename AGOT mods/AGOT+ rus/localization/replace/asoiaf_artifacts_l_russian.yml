l_russian:
 vs_seafoam_name:0 "Риптайд"
 vs_seafoam_description:0 "Валирийский стальной меч дома Веларионов украшен их гербом — морским коньком. Этот меч с искусно вырезанной серебряной рукоятью был куплен на доходы многих поколений торговли."
 
 aegon_i_crown_name:0 "Корона Эйгона I"
 aegon_i_crown_description:0 "Корона Эйгона I — тёмный, словно рябящий, обруч из валирийской стали, украшенный квадратными алыми рубинами. Со временем эта корона стала символом законности и власти для монархов Таргариенов."
 aenys_crown_name:0 "Корона Эйниса I"
 aenys_crown_description:0 "Большая и богато украшенная, золотая корона Эйниса I отражает ранний, тревожный мир между Железным троном и Верой. Она несёт лики Семерых и инкрустирована нефритом и жемчугом."
 jaehaerys_crown_name:0 "Корона Джейхейриса I"
 jaehaerys_crown_description:0 "Корона Джейхейриса I — искусно вырезанный золотой обруч, усыпанный сияющими камнями, ровно расставленными по всей окружности. Эта корона — символ процветания, пришедшегося на правление её первого носителя."
 aegon_iii_crown_name:0 "Корона Эйгона III"
 aegon_iii_crown_description:0 "Корона Эйгона III — неброско элегантный тонкий обруч из простого золота, с едва заметной цветочной резьбой по окружности."
 baelors_crown_name:0 "Корона Бейлора I"
 baelors_crown_description:0 "Сложенная из цветов и лоз, опоясывающих голову носителя, корона Бейлора I — само воплощение смирения. Вместо драгоценных камней и металлов она сделана лишь из того, что можно найти в обычном саду."
 aegon_iv_crown_name:0 "Корона Эйгона IV"
 aegon_iv_crown_description:0 "Корона Эйгона IV — крупнейшая из тех, что носили короли Таргариены; она выкована из красного золота и тяжело ложится на голову. Громоздкая и внушительная, она увенчана пиками в виде драконьих голов с мерцающими глазами-камнями."
 maekars_crown_name:0 "Корона Мейкара I"
 maekars_crown_description:0 "Корона Мейкара I груба и воинственна: на простой золотой обруч насажены заострённые чёрные железные пики. Острая и пугающая, она безошибочно предназначена для короля-воина."
 
 rhaegars_armour_name:0 "Доспехи Рейгара"
 rhaegars_armour_description:0 "Доспехи Рейгара Таргариена сделаны из ночной черноты пластин, а кираса украшена рубиновым трёхголовым драконом дома Таргариенов. Под латами — хауберк из золотой кольчуги, а шлем изысканно отделан драконьими мотивами."
 roberts_armour_name:0 "Доспехи Роберта"
 roberts_armour_description:0 "Доспехи Роберта Баратеона просты, но грозны. Носителя защищают крупные стальные пластины, под которыми — кольчужный хауберк. Значительная часть доспехов прикрыта табардом с чёрным оленем дома Баратеонов. Шлем венчают устрашающие оленьи рога — также символ герба Баратеонов."
