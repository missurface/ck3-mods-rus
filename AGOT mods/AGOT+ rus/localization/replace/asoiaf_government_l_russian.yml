l_russian:
 lp_feudal_government:0 "Западный феодализм"
 lp_feudal_government_adjective:0 "Западно-феодальный"
 lp_feudal_government_desc:1 "$game_concept_feudal_desc$\n\n#F Феодализм — это жёсткая социальная структура и форма правления, основанная на королях, лордах и крестьянах. Знать властвует над простонародьем на своей земле через систему вассальной верности и клятв. В этой системе каждый человек обязан нести военную службу своему лорду в обмен на защиту, надел земли и людей, которые будут на ней работать.\n\nЗападный феодализм особенно характерен для Вестероса и уникален тем, что вассалов называют «лордами» независимо от их места в иерархии; самых могущественных из них порой именуют «лордами-парамонтами» или даже жалуют княжескими титулами, как в Дорне."
