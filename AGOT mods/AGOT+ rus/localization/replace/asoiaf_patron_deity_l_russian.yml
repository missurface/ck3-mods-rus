l_russian:
 patron_god_desc_the_father:0 "Отец вершит суд; верующие часто взывают к нему, прося справедливости и мудрости. Большинство чтит его превыше прочих, а некоторые считают «главой» Семерых."
 patron_god_desc_the_mother:0 "Мать — любящая и оберегающая; к ней часто обращаются, желая уберечь близких. С ней также связывают плодородие и иные стороны материнства."
 patron_god_desc_the_warrior:0 "Воин защищает верующих, вселяет отвагу, дарует победу и хранит воинов в пылу боя. К Воину часто обращаются солдаты и рыцари."
 patron_god_desc_the_smith:0 "Кузнец чинит сломанное и приводит мир людей в порядок. Вместе с Воином ему часто молятся о силе и защите, а также просят помощи в ремёслах и промыслах."
 patron_god_desc_the_maiden:0 "Дева покровительствует юным женщинам; ей часто молятся, чтобы она даровала девам мужество и берегла их невинность, либо просят прощения за проступки нечистоты."
 patron_god_desc_the_crone:0 "Старица, со своей священной лампой, ведёт верующих мудростью. Её учение возвышает и поддерживает паству."
 patron_god_desc_the_stranger:0 "Неведомый — ни мужчина ни женщина и одновременно оба, неизвестный и непостижимый. Его лицо — лицо смерти, а его рука ведёт души в иной мир."
