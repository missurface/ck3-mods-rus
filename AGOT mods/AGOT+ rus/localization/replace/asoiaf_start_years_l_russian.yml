 ### 282 г. п.З. / Восстание Роберта ###
 start_year_8282_09_15_desc:0 "Год Ложной Весны миновал, и #italic зима близко#! — вместе с ней вспыхнет искра, что подожжёт Семь Королевств. Принц Рейгар Таргариен похитил Лианну Старк, невесту лорда Роберта Баратеона. Когда её отец и брат отправились на юг, требуя возмещения за похищение, король Эйерис II отказал им в справедливом суде и жестоко казнил обоих. Но когда Безумный Король потребовал головы молодых лордов Эддарда Старка и Роберта Баратеона, лорд Джон Аррен из Долины поднял свои знамёна на мятеж.\n\n#bold Пока война расползается по Вестеросу, словно лесной пожар, именно вам решать судьбу королевства. Ведь когда играешь в игру престолов — побеждаешь или погибаешь.#!"
 ### 284 г. п.З. / Коронованный Олень ###
 start_year_8284_06_02_desc:0 "Война Узурпатора, восстание Роберта — как бы ни называл это простой люд, главное, что #italic всё кончено.#!\n\nТаргариены почти истреблены; их последние отпрыски разбросаны по Вольным городам — юноша с младенцем на руках. Роберт I Баратеон восседает на Железном троне, но вскоре понимает: быть королём куда труднее, чем казалось.\n\n«Честь? Да у меня Семь Королевств под рукой! Один король, Семь Королевств! Думаете, честь удержит их в повиновении? Думаете, мир держится на чести?#bold  Нет — на страхе. На страхе и крови!#!»"
