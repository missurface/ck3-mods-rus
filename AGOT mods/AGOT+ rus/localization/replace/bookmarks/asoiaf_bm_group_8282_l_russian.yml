 agot_bm_group_8282:0 "282 г. п.З."
 agot_bm_8282:0 "Восстание Роберта"
 agot_bm_8282_desc:0 "Год Ложной Весны миновал, и #italic зима близко#! — вместе с ней вспыхнет искра, что подожжёт Семь Королевств. Принц Рейгар Таргариен похитил Лианну Старк, невесту лорда Роберта Баратеона. Когда её отец и брат отправились на юг, требуя возмещения за похищение, король Эйерис II отказал им в справедливом суде и жестоко казнил обоих. Но когда Безумный Король потребовал головы молодых лордов Эддарда Старка и Роберта Баратеона, лорд Джон Аррен из Долины поднял свои знамёна на мятеж.\n\n#bold Пока война расползается по Вестеросу, словно лесной пожар, именно вам решать судьбу королевства. Ведь когда играешь в игру престолов — побеждаешь или погибаешь.#!"
 
 bookmark_282_eddard_stark:0 "Лорд Эддард"
 bookmark_282_eddard_stark_desc:0 "Эддард провёл юность воспитанником Джона Аррена в Долине вместе со своим другом Робертом Баратеоном и прославился непоколебимым чувством чести и справедливости. После похищения его сестры принцем Рейгаром его брат и отец отправились на юг, требуя правосудия у короля Эйериса II. Ответом стала жестокая казнь, и теперь Эйерис требует головы Неда и Роберта. Похищение сестры, убийство родичей и призыв друга заставили Неда поднять Север на войну против Безумного Короля.\n\n#bold Сумеет ли Нед спасти сестру от принца Рейгара — или разделит судьбу отца и брата?#!"
 
 bookmark_282_rhaegar_targaryen:0 "Принц Рейгар"
 bookmark_282_rhaegar_targaryen_desc:0 "Наследник Железного трона, Рейгар красив и умён, любим знатью и простым людом. Но скандал потряс королевство, когда на турнире Рейгар назвал Лианну Старк королевой любви и красоты, разгневав её жениха — лорда Роберта Баратеона. Год спустя Рейгар и Лианна бежали вместе, хотя некоторые считают, что он её похитил. Жестокость его отца разожгла конфликт дальше точки, где возможна дипломатия, и теперь Драконий принц должен спасти свой дом от гибели.\n\n#bold Выиграет ли Рейгар гражданскую войну за свой дом — или его судьба оборвётся?#!"
 
 bookmark_282_aerys_targaryen:0 "Король Эйерис II"
 bookmark_282_aerys_targaryen_desc:0 "Эйерис II начал правление с больших надежд, но после Мятежа в Сумеречном Доле всё резко покатилось под откос. Видя угрозы повсюду, Безумный Король всё сильнее одержим огнём, и когда северяне прибыли требовать правосудия за похищение Лианны Старк, Эйерис приказал жестоко казнить их. Теперь Семь Королевств стоят на пороге гражданской войны, а Безумный Король едва удерживает власть.\n\n#bold Сумеет ли Эйерис перехитрить мятежников, выкорчевать заговорщиков и удержать Железный трон?#!"
 
 bookmark_282_tywin_lannister:0 "Лорд Тайвин"
 bookmark_282_tywin_lannister_desc:0 "Тайвин принёс своему дому уважение после слабого правления отца. Известный расчётливостью и жестокостью, Тайвин ожесточился, когда его жена Джоанна умерла, рожая карлика Тириона. Когда король Эйерис II назначил старшего сына Тайвина, Джейме, в Королевскую гвардию, Тайвин сложил полномочия Десницы и вернулся в Утёс Кастерли. Несмотря на призыв короля к оружию, Тайвин тщательно держится в стороне от войны.\n\n#bold Сумеет ли Тайвин обратить эту войну на пользу дому Ланнистеров и вознести свою династию ещё выше?#!"
 
 bookmark_282_robert_baratheon:0 "Лорд Роберт"
 bookmark_282_robert_baratheon_desc:0 "Будучи воспитанником Джона Аррена в Долине, Роберт подружился с Недом Старком. Ещё молодым он унаследовал Штормовой Предел и быстро снискал славу яростного воина, а также любителя выпивки и женщин. Когда невесту Роберта, Лианну Старк, похитил принц Рейгар, отец и брат Неда были жестоко казнены за требование правосудия у короля Эйериса. Теперь Эйерис требует головы Роберта и Неда, бросая королевство в мятеж.\n\n#bold Решив уничтожить Таргариенов и спасти невесту, Роберту предстоит тяжёлый путь. Но удастся ли ему?#!"
