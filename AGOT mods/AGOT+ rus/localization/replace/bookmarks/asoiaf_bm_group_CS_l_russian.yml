l_russian:
 agot_bm_8284_desc:0 "Война Узурпатора, восстание Роберта — как бы ни называл это простой люд, главное, что #italic всё кончено.#!\n\nТаргариены почти истреблены; их последние отпрыски разбросаны по Вольным городам — юноша с младенцем на руках. Роберт I Баратеон восседает на Железном троне, но вскоре понимает: быть королём куда труднее, чем казалось.\n\n«Честь? Да у меня Семь Королевств под рукой! Один король, Семь Королевств! Думаете, честь удержит их в повиновении? Думаете, мир держится на чести?#bold  Нет — на страхе. На страхе и крови!#!»"
 
 bookmark_king_robert_baratheon:0 "Король Роберт I"
 bookmark_king_robert_baratheon_desc:0 "Да здравствует Роберт I из дома Баратеонов, король андалов, ройнаров и Первых людей, лорд Семи Королевств и Защитник державы! Воссев на Железный трон, Роберт должен объединить королевство, чтобы обеспечить мирное и процветающее правление. Связанный с Ланнистерами королевским браком с прекрасной — пусть и коварной — Серсеей Ланнистер, Роберт обнаруживает, что окружён подхалимами и кое-чем похуже.\n\n#bold Сумеет ли Коронованный Олень оставить дому Баратеонов прочное наследие?#!"
 
 bookmark_284_tywin_lannister:0 "Лорд Тайвин"
 bookmark_284_tywin_lannister_desc:0 "Тайвин Ланнистер, лорд Утёса Кастерли, Щит Ланниспорта и Хранитель Запада, упрочил наследие льва: заключил брачный союз с новокоронованным королём Вестероса Робертом I Баратеоном. Но его дочь Серсея мало заботится о замыслах отца, предпочитая собственные интриги и заговоры. Его золотой сын Джейме навеки останется известен как «Цареубийца». А его наследник, юный Тирион, никогда не станет в глазах отца достойным.\n\n#bold Служа ли державе или вредя ей, как великий лев укрепит будущее своего дома?#!"
 
 bookmark_284_renly_baratheon:0 "Лорд Ренли"
 bookmark_284_renly_baratheon_desc:0 "Ренли Баратеон, семилетний мальчик и новый лорд Штормового Предела, подаёт большие надежды своему роду и родовому гнезду. Харизматичный ребёнок, легко завоёвывающий друзей, Ренли со временем, вероятно, сравняется с Робертом силой и статью. Но сперва ему предстоит пережить смуту первых лет правления старшего брата и выковать собственные союзы.\n\n#bold Как Ренли сумеет доказать свою ценность брату-королю и всем лордам и леди Вестероса, жаждущим королевского внимания?#!"
 
 bookmark_284_stannis_baratheon:0 "Лорд Станнис"
 bookmark_284_stannis_baratheon_desc:0 "Станнис Баратеон, сдержанный человек и новый лорд Драконьего Камня, пережил войну благодаря упорству и решимости. Там, где другие люди голодали бы и сломались, Станнис большую часть года держал оборону Штормового Предела. Роберт почтил его традиционным уделом наследника короля — без княжеского титула — и теперь Станнис занимает место рядом с братом, помогая вести королевство к обновлённому процветанию.\n\n#bold Как новое влияние на Драконьем Камне определит грядущее правление молодого лорда?#!"
 
 bookmark_balon_greyjoy:0 "Лорд Бейлон"
 bookmark_balon_greyjoy_desc:0 "Бейлон Грейджой, лорд Железных островов, жаждет возвращения к Старому Пути. После того как его отец Квеллон тратил годы на сближение с зелёными землями — положив конец грабёжным набегам и захвату рабов, — новый правитель железнорожденных видит шанс при новом короле проложить свой путь по бурным водам после свержения Таргариенов.\n\n#bold С попутным ветром перемен за спиной, как Бейлон впишет своё имя в летописи вестеросской истории?#!"
