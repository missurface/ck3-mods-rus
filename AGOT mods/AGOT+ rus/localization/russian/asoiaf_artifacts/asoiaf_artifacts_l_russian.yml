l_russian:
 asoiaf_sword_ice_description:0 "Валирийский двуручный меч «Лёд», используемый и в войне, и на церемониях, переходил из поколения в поколение в доме Старков и хранился в ножнах, обтянутых волчьей шкурой. На клинке заметен едва различимый рябящий узор валирийской стали, а перекрестье сделано из простого тёмного сплава. Навершие столь же скромно и непритязательно, с минимальной резьбой, а рукоять выполнена из отполированного железного дерева."
 
 asoiaf_sword_heartsbane_description:0 "Гордость дома Тарли — этот валирийский полуторный меч передавался в семье со времён за триста лет до Завоевания и символизирует их воинскую славу. Потускневшая золотая рукоять выкована в форме лука и стрелы: навершие изображает оперение стрелы, а перекрестье — плечи лука. Рукоять богато украшена охотничьими сценами с кабанами и оленями, а хват вырезан из крепкого, выдержанного дерева."
 
 asoiaf_sword_longclaw_description:0 "Родовой клинок дома Мормонтов — валирийский полуторный меч скромной работы, с простым стальным перекрестьем и рукоятью, обтянутой чёрной кожей. Изначально навершие было вырезано в виде головы белого медведя, но в 298 г. п.З. Джиор Мормонт заменил его на голову волка, подарив меч Джону Сноу."
 
 asoiaf_sword_oathkeeper_description:0 "Один из двух валирийских клинков, перекованных из двуручного меча «Лёд», этот длинный меч богато украшен. Перекрестье, рукоять и навершие — из цельного золота с резьбой под львиную гриву; перекрестье расходится, словно коготь, обхватывающий клинок. Золотое навершие выполнено в виде рычащей львиной головы, а концы перекрестья также украшены львиными мордами. В центре — скромный огранённый рубин, окружённый четырьмя маленькими жемчужинами."
 
 asoiaf_sword_widows_wail_description:0 "Один из двух валирийских клинков, перекованных из двуручного меча «Лёд». Этот длинный меч, пусть и короче своего собрата — «Клятвохранителя», — не менее роскошен. Золотое навершие усеяно рубинами и жемчугом, каждый камень удерживается серебряной оправой. Рукоять сформирована из наложенных слоёв золота, а перекрестье также выковано из цельного золота. По перекрестью тянутся резные оленьи рога, сходясь в центре к голове оленя, удерживающей в рогах крупный огранённый рубин."
 
 asoiaf_jaimes_sword_name:0 "Меч Джейме"
 asoiaf_jaimes_sword_description:0 "Этот полуторный меч был выкован для сира Джейме Ланнистера после посвящения в рыцари и стал изящным напоминанием о его грации в бою. Навершие выполнено в виде головы льва, а перекрестье инкрустировано тонким цветочным орнаментом, закручивающимся вокруг и заканчивающимся по обе стороны распускающимися цветами."
 
 asoiaf_targaryen_falchion_name:0 "Таргариенский фальшион"
 asoiaf_targaryen_falchion_description:0 "Этот фальшион выкован для принца Рейгара Таргариена, когда тот начал обучение воинскому делу. У оружия округлое стальное навершие, увенчанное головой дракона. Рукоять и гарда — из простого отполированного тёмного дуба и согнутой стали — куда менее богаты, чем у многих других мечей, но дают более крепкий хват."
 
 asoiaf_sword_krakenfall_name:0 "Кракенфол"
 asoiaf_sword_krakenfall_description:0 "Этот полуторный меч был преподнесён королю Роберту I Баратеону вскоре после победы в Восстании Грейджоев. Рукоять сделана из отполированного дуба и берёзы и увенчана длинным навершием в форме головы кракена с двумя янтарными камнями. Гарда — из простой отполированной стали, с гравировкой в центре и золотыми полусферами на концах."
 
 asoiaf_sword_dark_sister_description:0 "Один из двух валирийских клинков дома Таргариенов — этот стройный и изящный полуторный меч предназначен для женской руки. Гарда выполнена в виде драконьих крыльев из потускневшего золота с лёгкой гравировкой под чешую и сходится в центре к стилизованной драконьей голове. Рукоять обтянута чёрной кожей и увенчана навершием, напоминающим драконье яйцо."
 
 asoiaf_red_priest_necklace_name:0 "Амулет красного жреца"
 asoiaf_red_priest_necklace_description:0 "Этот амулет, выполненный в шестиугольном стиле Асшая, тёплый на ощупь и несёт один алый рубин. Его носят туго на шее; полые шестиугольные звенья тянутся к задней части амулета. Известно, что жрецы Р’глора носят именно такие, и они даруют им неестественно долгую жизнь и юный облик."
 
 asoiaf_aerys_II_crown_name:0 "Корона Эйриса II"
 asoiaf_aerys_II_crown_description:0 "Эта корона, выкованная из потускневшего и потемневшего золота, была создана для молодого и честолюбивого короля Эйриса II Таргариена в начале его правления. Металл отлит в виде языков пламени, закручивающихся вокруг головы носителя. Со временем корона стала отражать противоестественную одержимость Безумного Короля огнём и обрела зловещую славу."
 
 asoiaf_robert_I_crown_description:0 "Заказанная для короля Роберта I Баратеона после восшествия на трон, эта корона сделана из золотых оленьих рогов, охватывающих голову поверх тонко гравированного обруча из яркого золота. Верх обруча украшен отполированными янтарями, каждый со своей парой выступающих рогов, а спереди в корону вделаны два крупных янтарных камня."
 
 asoiaf_renly_crown_description:0 "Сформированная из жилистых золотых рогов, тянущихся к небу, эта корона воплощает образ оленя. Ветви сходятся на тонком золотом обруче, вырезанном так, будто он сделан из окостеневшего рога. Пусть она и не так отполирована и не так усыпана камнями, как другая регалия, но всё равно создаёт сильный и благородный силуэт."
 
 asoiaf_joffrey_I_crown_description:0 "Изящные золотые рога этой короны покоятся на украшенном обруче из яркого золота. Тонкие ветви обрамляют голову носителя и тянутся вверх; некоторые сходятся спереди и сзади, удерживая сияющие янтарные камни. Заказанная для короля Джоффри I Баратеона, она продолжает «олений» королевский мотив, введённый его отцом, но также намекает на наследие Ланнистеров — ярким «львиным» золотом и торжественным силуэтом."
 
 asoiaf_stark_throne_name:0 "Трон Зимы"
 asoiaf_stark_throne_description:0 "Этот трон из резного железного дерева, куда более простой, чем троны южных королей, служил сиденьем дома Старков многие поколения. На спинке — расписные узоры сосен и рычащих волков. Выступающие «уши» трона вырезаны в виде голов лютоволков, поднявших зубастые пасти к небу."
 
 asoiaf_radzig_sword_name:0 "Меч сира [recipient.GetFirstNamePossessive]"
 asoiaf_radzig_sword_description:0 "Изначально выкованный для [recipient.GetFullName], этот полуторный меч стал символом смерти и мести. Его выковал кузнец [creator.GetFirstName] в тот самый день, когда на деревню [creator.GetHerHis] был совершён набег: [creator.GetHerHis] погиб[Select_CString(creator.IsFemale, 'ла', '')] вместе с [creator.GetHerHis] женой, а приёмный сын [creator.GetHerHis] — [henry.GetFirstName] — остался сиротой. Рукоять богато украшена цветочным орнаментом, а восьмигранное навершие несёт герб дома [recipient.GetDynastyHouseName]. На клинке выгравированы слова [recipient.GetDynastyHouseNameNoTooltip]: #italic Король, семья, месть#!."
