 ## Каноничные дети
 game_concept_asoiaf_canon_children_concept:0 "Каноничные дети"
 game_concept_asoiaf_canon_children_concept_desc:0 "Система #bold «Каноничные дети»#! позволяет каноническим персонажам динамически становиться родителями во время игры.\n\nКаноничные дети будут рождаться, если доминирующий партнёр заключит брак с нужным Домом. Например, если Эддард Старк женится на #italic любой#! Талли, у него будут рождаться каноничные дети.\n\nСистема использует обычные циклы беременности/родов CK3, поэтому дети #italic не обязательно#! родятся в тот же год, что и в лоре.\n\nУзнать, как продолжить линию персонажа, можно в описании модификатора «Каноничные дети», который получают участники системы.\n\n@warning_icon! #X Не будет работать, если включена система канонических детей из ванильного AGOT.#!"
 
 game_concept_asoiaf_canon_child_concept:0 "Каноничный ребёнок"
