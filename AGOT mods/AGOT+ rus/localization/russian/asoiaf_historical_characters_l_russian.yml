l_russian:
 ASOIAF_CANON_CHILDREN_CHARACTER_TOOLTIP:0 "#T [asoiaf_canon_child_concept|E]#!\n\n#high [Character.Custom('asoiafCanonChildrenCharacterDesc')]#!\n\n#weak [asoiaf_canon_children_concept|E] рождаются по обычным циклам беременности, поэтому могут существенно отклоняться от своих исторических дат рождения.#!"
 
 historical_character.asoiaf_Stark_84:0 "#bold Рикон Старк#! был лордом Винтерфелла до своей смерти за несколько лет до Танца Драконов. Ему наследовал сын — Криган Старк.\n\n#help Рикону нужно иметь детей от жены из #bold династии Гловеров#! и/или от женщины с культурным наследием #bold Первых людей#! вне брака, чтобы продолжить линию.#!"
 
 historical_character.asoiaf_Stark_86:0 "#bold Криган Старк#!, прозванный #italic Волком Севера#!, был суровым и безупречно честным лордом Винтерфелла. Он всерьёз относился к клятвам своего дома и старательно исполнял их, одновременно защищая королевство от угрозы за Стеной. Чувство долга и необходимость быть настороже на северной границе заставляли его по возможности избегать южных интриг.\n\n#help Чтобы продолжить линию, у Кригана должны быть дети от жены из #bold династии Норри#!, #bold династии Блэквудов#! и/или из #bold дома Старков#!.#!"
 
 historical_character.asoiaf_Stark_87:0 "#bold Беннард Старк#! был вторым ребёнком Рикона Старка и Джиллиан Гловер, он умер от болезни ещё в юности."
 
 historical_character.asoiaf_Stark_88:0 "#bold Сара Сноу#! — якобы бастард-дочь Рикарда Старка; говорили, что она была хороша собой и обладала очаровательным нравом. Неизвестно, существовала ли она на самом деле."
 
 historical_character.asoiaf_Stark_94:0 "#bold Рикон Старк#! был старшим сыном Кригана Старка от первой жены, но не прожил достаточно долго, чтобы унаследовать Винтерфелл. В Завоевании Дорна он сражался смело и яростно и любил песни. Однако внезапная смерть в бою у стен Солнечного Копья на годы погрузила Север в смуту.\n\n#help Чтобы продолжить линию, Рикону нужно иметь детей от жены из #bold династии Мандерли#!.#!\n\n@warning_icon! #X Дети Рикарда будут доступны в системе [asoiaf_canon_children_concept|E] позже.#!"
 
 historical_character.asoiaf_Stark_95:0 "#bold Сарра Старк#! была первенцем Кригана Старка от второй жены — Алисаны Блэквуд."
 
 historical_character.asoiaf_Stark_96:0 "#bold Алис Старк#! была вторым ребёнком Кригана Старка от второй жены — Алисаны Блэквуд."
 
 historical_character.asoiaf_Stark_97:0 "#bold Райя Старк#! была третьим ребёнком Кригана Старка от второй жены — Алисаны Блэквуд."
 
 historical_character.asoiaf_Stark_98:0 "#bold Мария Старк#! была четвёртым ребёнком Кригана Старка от второй жены — Алисаны Блэквуд."
 
 historical_character.asoiaf_Stark_99:0 "#bold Джоннель Старк#!, прозванный #italic Джоннелем Одноглазым#!, был первенцем Кригана Старка от третьей жены — Линары Старк. Со временем он стал лордом Винтерфелла после смерти отца. Период его правления был относительно тихим, но омрачён неудачными попытками обзавестись наследниками в двух браках."
 
 historical_character.asoiaf_Stark_100:0 "#bold Эдрик Старк#! был вторым ребёнком Кригана Старка от третьей жены — Линары Старк.\n\n#help Чтобы продолжить линию, Эдрику нужны дети от жены из #bold дома Старков#!.#!\n\n@warning_icon! #X Дети Эдрика будут доступны в системе [asoiaf_canon_children_concept|E] позже.#!"
 
 historical_character.asoiaf_Stark_101:0 "#bold Лианна Старк#! была третьим ребёнком Кригана Старка от третьей жены — Линары Старк."
 
 historical_character.asoiaf_Stark_102:0 "#bold Бартоган Старк#!, прозванный #italic Бартом Чёрным Мечом#!, был лордом Винтерфелла, который смело повёл войско на Скагос, чтобы подавить восстание на острове. Его стремление действовать решительно и без оглядки привело к преждевременной гибели в бою."
 
 historical_character.asoiaf_Stark_103:0 "#bold Брандон Старк#! был пятым ребёнком Кригана Старка от третьей жены — Линары Старк.\n\n#help Чтобы продолжить линию, Брандону нужны дети от женщины из #bold династии Феннов#! и/или от жены из #bold дома Карстарков#!.#!\n\n@warning_icon! #X Дети Брандона будут доступны в системе [asoiaf_canon_children_concept|E] позже.#!"
 
 historical_character.asoiaf_Stark_1:0 "#bold Рикард Старк#! был суровым и достойным лордом Винтерфелла, известным спокойными манерами и властным присутствием. Некоторые считали его честолюбивым: он стремился вывести Север из изоляции, обручая своих детей с влиятельными южанами. В конце концов он погиб, отправившись на юг требовать правосудия за предполагаемое похищение дочери — и был казнён по приказу своего короля.\n\n#help Чтобы продолжить линию, Рикарду нужно иметь детей от жены из #bold дома Старков#!.#!"
 
 historical_character.asoiaf_Stark_2:0 "#bold Брандон Старк#! был высоким, красивым и горячим юношей, который чаще действовал прежде, чем думал. Он отлично выступал на турнирах и был умелым мечником, часами оттачивая клинок, чтобы сохранить его смертоносную остроту. Он любил долгие верховые прогулки и не стеснялся брать то, что хотел — в том числе женщин."
 
 historical_character.asoiaf_Stark_3:0 "#bold Эддард Старк#!, более известный как #italic Нед#!, стал лордом Винтерфелла после смерти отца и брата. Он человек чести и долга, но приверженность старым северным обычаям часто ставит его поперёк дороги интриганам южных дворов. Прежде всего он ненавидит убийства детей и невинных.\n\n#help Чтобы продолжить линию, Эддарду нужны дети от жены из #bold династии Талли#!.#!"
 
 historical_character.asoiaf_Stark_5:0 "#bold Лианна Старк#! была своевольной юной женщиной с дикой красотой. Она превосходно держалась в седле и при случае даже упражнялась в турнирах на копьях. Цветы всегда были ей по душе, особенно аромат свежих зимних роз. Её независимость определила большую часть жизни и в итоге привела к побегу с наследным принцем, косвенно развязав кровавую гражданскую войну, названную её именем."
 
 historical_character.asoiaf_Stark_4:0 "#bold Бенджен Старк#! был высоким и суровым мужчиной, но при этом дружелюбным — с искрой смеха в глазах. Он был исполнительным, наблюдательным и идеалистичным, со временем став умелым разведчиком Ночного Дозора. Его характер и мастерство вызывали уважение товарищей, которые привыкли полагаться на его умения и советы."
 
 historical_character.asoiaf_Stark_6:0 "#bold Робб Старк#!, прозванный #italic Молодым Волком#!, был Королём Севера, поднявшим мятеж против Железного трона после казни отца. Он был смелым и харизматичным лидером, ценившим семью и долг, но его честь стоила ему поддержки знаменосцев — и в итоге жизни."
 
 historical_character.asoiaf_Stark_7:0 "#bold Джон Сноу#! был бастардом Винтерфелла — мрачным и замкнутым в глазах окружающих. Несмотря на суровую внешность, он добросердечен и честен, с глубоким чувством справедливости и долга. Он верен друзьям и семье, но так и не узнал истинную личность своей матери."
 
 historical_character.asoiaf_Stark_8:0 "#bold Санса Старк#! была красивой и достойной леди, но также наивной и романтичной. Она мечтала о рыцарях, песнях и настоящей любви, но идеалы разбились о суровую реальность мира. Разные фракции ею манипулировали, ей пришлось пережить множество испытаний — и шаг за шагом учиться выживать в игре престолов."
 
 historical_character.asoiaf_Stark_9:0 "#bold Арья Старк#! была упрямой и своенравной девочкой, отвергавшей условности общества: фехтованию она предпочитала рукоделие. Она глубоко ценила семью и друзей и ненавидела тех, кто причинял им вред. Когда семью разорвали, а она потеряла всё, месть стала её орудием справедливости... и её тихой молитвой."
 
 historical_character.asoiaf_Stark_10:0 "#bold Брандон Старк#! был смелым и отважным мальчиком, любившим истории, полные страха и магии. Он мечтал о рыцарстве, битвах и славе, но эти мечты рухнули вместе с его ногами. На их месте пробудилось зелёное зрение — и силы куда более глубокие."
 
 historical_character.asoiaf_Stark_11:0 "#bold Рикон Старк#! был самым младшим и самым диким из детей Старков: ему нравилась игра в мечи и «битвы» понарошку. Он был вспыльчивым и упрямым, но также игривым и заботливым по отношению к семье и друзьям."
