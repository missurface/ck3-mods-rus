l_russian:
 
 asoiaf_maintenance_events_0001:0 "Под гнётом давления"
 asoiaf_maintenance_events_0001_a_desc:0 "Годы беспощадной погони выточили из меня другого человека. Каждый краткий миг безопасности лишь напоминает: убийцы всё время на шаг позади. Вымаливать приют то у одного, то у другого… И сквозь всё это — давящий груз последней надежды династии, величайшей династии, какую когда-либо видел этот мир, лежащий на моих плечах с тех пор, как мне исполнилось семь.\n\n[asoiaf_Targaryen_9.GetFirstName], не осознавая нашей вечной опасности, жила под моей защитой. Я ограждал её от правды о нашей жизни: той, где смерть — на расстоянии вздоха, а доверие — роскошь, которую мы не можем себе позволить. Для неё я — и брат, и отец, и учитель, и щит.\n\nНо годы изгнания взяли своё. Мягкость во мне умерла; доброта стала слабостью, которой я больше не могу себе позволить. Чтобы сестра была в безопасности, а наша династия — жива, мне нужно стать оружием: холодным, безжалостным и несгибаемым."
 asoiaf_maintenance_events_0001_b_desc:0 "Годы беспощадной погони выточили из меня другого человека. Каждый краткий миг безопасности лишь напоминает: убийцы всё время на шаг позади. Вымаливать приют то у одного, то у другого… И сквозь всё это — давящий груз последней надежды династии, величайшей династии, какую когда-либо видел этот мир, лежащий на моих плечах с тех пор, как мне исполнилось семь.\n\nПотеря [asoiaf_Targaryen_9.GetFirstName] ударила сильнее любого клинка. Она была моей последней нитью к прошлому, моей причиной терпеть лишения. Без неё тьма кажется ещё удушливее, а путь вперёд — ещё жестче. Я по-настоящему [Select_CString(ROOT.Char.IsFemale, 'одна', 'один')].\n\nНо годы изгнания взяли своё. Мягкость во мне умерла; доброта стала слабостью, которой я больше не могу себе позволить. Чтобы чтить память сестры и сохранить наше наследие, мне нужно стать оружием: холодным, безжалостным и несгибаемым."
 asoiaf_maintenance_events.0001.a:0 "Нужно идти дальше…"
 
 asoiaf_maintenance_events_0002:0 "Закалка огнём"
 asoiaf_maintenance_events_0002_a_desc:0 "Месяцы жизни в браке пробудили во мне новую силу. Я больше не робкая девочка в тени брата. Союз с [asoiaf_Targaryen_9_spouse.GetFirstName] разжёг во мне власть, о которой я и не подозревала, — власть повелевать, вести и вдохновлять.\n\nЯ больше не просто сестра [asoiaf_Targaryen_8.GetShortUIName]. Я — Дейенерис Бурерождённая, способная править по праву, рождённая из огня и крови. С каждым шагом я чувствую, как тень брата отступает, уступая место моей собственной несгибаемой решимости.\n\nМой путь ясен. Я не стану пешкой в чужой игре. Во мне кровь Древней Валирии, я предвестница новой эпохи — и я сама выкую свою судьбу. Огонь течёт по моим жилам, столь же несокрушимый, как чешуя дракона."
 asoiaf_maintenance_events_0002_b_desc:0 "Месяцы жизни в браке закалили во мне новую силу. Я больше не робкая девочка в тени брата. Союз с [asoiaf_Targaryen_9_spouse.GetFirstName] разжёг во мне власть, о которой я и не подозревала, — власть повелевать, вести и вдохновлять.\n\nШёпот сомнений, что когда-то терзал меня, умолк вместе со смертью брата. Я больше не просто сестра [asoiaf_Targaryen_8.GetShortUIName]. Я — Дейенерис Бурерождённая, способная править по праву и закалённая в горниле огня и крови. С каждым решением, с каждым шагом я чувствую, как тень брата отступает, уступая место моей собственной несгибаемой решимости.\n\nМой путь ясен. Я не стану пешкой в чужой игре. Во мне кровь Древней Валирии, я предвестница новой эпохи — и я выкую свою судьбу упорной волей. Огонь течёт по моим жилам, столь же несокрушимый, как чешуя дракона."
 asoiaf_maintenance_events.0002.a:0 "Меня зовёт будущее…"
 
 asoiaf_maintenance_events_0003:0 "Своим путём"
 asoiaf_maintenance_events_0003_desc:0 "Видеть, как [asoiaf_Targaryen_9.GetFirstName] справляется без меня, — словно ножом по сердцу. Она всегда была моей ответственностью: сестрой, моей заботой. Теперь же она стоит твёрдо, и моя защита ей больше не нужна. День за днём она становится увереннее, сильнее — а я остаюсь в тени, наблюдая, как она перерастает ту опеку, которую мне с таким трудом удавалось ей дать.\n\nЕё решимость должна была бы наполнить меня гордостью, но вместо этого внутри гложет пустота и ощущение утраты смысла.\n\nШёпот, ставящий под сомнение мою ценность, звучит всё громче. Я — #italic Визерис Таргариен#!, и всё же восходящая звезда сестры затмевает мою собственную. Мне нужно найти новый путь — иначе меня поглотит тень, которую она оставляет за собой."
 asoiaf_maintenance_events.0003.a:0 "Меня забывают…"
 
 asoiaf_maintenance_events_0004:0 "Своим путём"
 asoiaf_maintenance_events_0004_desc:0 "Месяцы брака показали, как изменилась [asoiaf_Targaryen_9.GetFirstName]. Она вышла из тени прошлого, сбросив остатки страхов и сомнений. Когда-то неуверенные шаги стали твёрдыми и точными, а в её осанке появилась уверенность, которая заставляет уважать. Робкая девочка исчезла, уступив место женщине, знающей себе цену и осознающей силу, что ей принадлежит.\n\nЭто уже не та [asoiaf_Targaryen_9.GetFirstName], с которой меня связал брак, — теперь в ней есть нечто большее. В этой новой силе есть тихая гордость, и видеть её — удовольствие. Я могу быть рядом, но её судьбу будет определять она сама — с моей помощью или без неё."
 asoiaf_maintenance_events.0004.a:0 "Теперь она сама выбирает свой путь…"
 
 asoiaf_maintenance_events_0005:0 "Судьба прервана"
 asoiaf_maintenance_events_0005_desc:0 "Прошли дни, а я всё ещё не нахожу покоя, вспоминая донесения о том, как предатель, лорд [asoiaf_Baratheon_2.GetFirstName], в бою убил моего сына и наследника — [asoiaf_Targaryen_3.GetFirstName]. Несомненно, в этом замешаны коварные Мартеллы — возможно, даже мой собственный гвардеец, сир [asoiaf_Martell_2.GetFirstName]. Я позабочусь, чтобы их погибель была столь же страшной — огнём и кровью…\n\nТеперь державе как никогда нужен наследник — но должен ли им оставаться принц [asoiaf_Targaryen_11.GetFirstName]? Любой закон престолонаследия скажет «да», но мальчик слишком юн, чтобы служить державе, когда она нуждается в этом сильнее всего. И он наполовину Мартелл… наполовину предатель уже сейчас.\n\nДругие могли забыть, как мой сын в последние годы строил заговоры против меня — хотел свергнуть меня или ещё хуже. Но я не забываю. И не прощаю. Могу ли я доверять тому, что его отпрыск не воткнёт мне нож в спину в самый неожиданный момент?"
 asoiaf_maintenance_events.0005.a:0 "[asoiaf_Targaryen_11.GetFirstName] останется моим наследником, чего бы это ни стоило"
 asoiaf_maintenance_events.0005.b:0 "[asoiaf_Targaryen_8.GetFirstName] — единственный безопасный выбор"
 
 asoiaf_maintenance_events_0006:0 "Невозможный выбор…"
 asoiaf_maintenance_events_0006_desc:0 "После долгих лет унижений и посягательств на моё законное место трон наконец стал моим. Но даже теперь мои права не в безопасности. Среди лордов всё громче шепчут, что сын всегда должен стоять выше дочери.\n\nПрезрение державы почти осязаемо — их неверие в право женщины править. Они боятся, что это значит для их собственной власти и для судьбы их сыновей, и барабаны войны уже начинают звучать…\n\nУ меня есть лишь один способ укрепить свои права, и всё же рука не поднимается отдать приказ. Единственная «вина» моих братьев — то, что они родились. Но именно они стоят на пути моей судьбы. #bold Смогу ли я сделать то, что должно быть сделано?#!"
 asoiaf_maintenance_events.0006.a:0 "[Select_CString(ROOT.Char.IsFemale, 'Я должна', 'Я должен')] укрепить свои права любой ценой"
 asoiaf_maintenance_events.0006.a.tt:0 "#X Вы заключаете в темницу своих братьев и их детей, если они находятся при дворе#!\n@warning_icon! #X Акт [tyranny|E]#!"
 asoiaf_maintenance_events.0006.b:0 "Я не могу…"
 
 asoiaf_maintenance_events_0007:0 "…Чтобы удержать трон"
 asoiaf_maintenance_events_0007_desc:0 "Пришло время сделать то, что должно быть сделано. Редко бывает так, чтобы правильное решение было лёгким. И хотя сердце сжимается, я знаю: другого пути нет. Моё правление, правление моих детей — и сама наша жизнь — будут в безопасности лишь тогда, когда это свершится.\n\nТяжело видеть их перед собой: усталые, изнурённые лица, в которых смешались страх и ненависть. Но я должна смотреть им в глаза, отдавая приказ.\n\nДаже сейчас [asoiaf_alicent.GetFirstName] умоляет сохранить жизни её детям и раздаёт пустые обещания о моём праве на власть. Но время пришло — и всё должно быть доведено до конца."
 asoiaf_maintenance_events.0007.a:0 "Я делаю это ради блага державы"
 asoiaf_maintenance_events.0007.a.tt:0 "#X Ваши заключённые братья и их дети казнены#!\n@warning_icon! #X Чудовищный акт [tyranny|E]#!"
 asoiaf_maintenance_events.0007.b:0 "Нет… #bold НЕТ#!! Я не стану братоубийцей"
 asoiaf_maintenance_events.0007.b.tt:0 "#P #italic Вы освобождаете всех заключённых братьев и их детей#!#!"
 
 asoiaf_maintenance_events_0008:0 "Кровавая ставка"
 asoiaf_maintenance_events_0008_desc:0 "Весть о трагедии в [asoiaf_rhaenyra.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] разносится по королевству, словно лесной пожар. Вскоре после восшествия на Железный трон королева [asoiaf_rhaenyra.GetFirstName] потрясла державу, заточив в темницу и без суда казнив своих братьев.\n\nСлово «тирания» уже срывается с губ многих, и всё же нельзя отрицать: все шёпоты об узурпации оборвались в одночасье. Несомненно, многие потенциальные «делатели королей» теперь проклинают судьбу, обнаружив, что у них попросту нет законного короля, которого можно было бы короновать.\n\nЭта кровавая ставка, возможно, и укрепила трон [asoiaf_rhaenyra.GetFirstNameNoTooltip], но сумеет ли она удержать его?"
 asoiaf_maintenance_events.0008.a:0 "Тревожные вести…"
 
 asoiaf_maintenance_events_0009:0 "Новый Король-за-Стеной"
 asoiaf_maintenance_events_0009_desc:0 "Манс Налётчик, бывший брат Ночного Дозора, дезертировал и бежал за Стену. Решив объединить враждующие кланы одичалых, он провозгласил себя Королём-за-Стеной и собрал под своим началом большое войско.\n\nНикто не знает наверняка, как долго продлится его «правление», но он, похоже, твёрдо намерен объединить разрозненный Вольный народ, пока не стало слишком поздно… будто время поджимает.\n\n#bold Сумеет ли Манс Налётчик объединить кланы и увести их на юг от Стены — или будет разбит о её холодный лёд, как многие до него?#!"
 asoiaf_maintenance_events.0009.a:0 "#italic Ещё один#! король? Тревожные вести…"
 asoiaf_maintenance_events.0009.b:0 "Интересно, что уготовила ему судьба"
 
 asoiaf_maintenance_events_0010:0 "Наконец-то признание"
 asoiaf_maintenance_events_0010_desc:0 "Во время особенно скучного заседания двора моё внимание привлекает человек с чем-то крупным под богато вышитой тканью. Дойдя до своей очереди говорить, он делает шаг вперёд и показывает меч с навершием в виде головы кракена.\n\n«Ваше величество, ваша победа над Грейджоями уже стала легендой. Мы, кузнецы с Улицы Стали, были бы польщены, если бы вы приняли этот дар в память о вашем триумфе — выкованный специально в вашу честь».\n\nОчередная безделушка в общую кучу — и к тому же такая, что подразумевает ответную щедрость. И всё же нельзя отрицать красоту этого клинка…"
 asoiaf_maintenance_events.0010.a:0 "Щедрость следует вознаграждать щедростью @asoiaf_icon_krakenfall!"
 asoiaf_maintenance_events.0010.b:0 "Подарок есть подарок — и ничего больше @asoiaf_icon_krakenfall!"
 asoiaf_maintenance_events.0010.c:0 "Мне не нужен трофей, чтобы помнить свои победы!"
 
 asoiaf_maintenance_events_0011:0 "Наследство бастарда"
 asoiaf_maintenance_events_0011_a_desc:0 "До меня дошла весть: мой отец, [ROOT.Char.GetFather.GetFullName], покинул этот мир. В последние дни он просил [ROOT.Char.GetTopLiege.GetName] узаконить меня, и теперь прибыл королевский указ с печатью монарха.\n\nПергамент потрескивает, когда я разворачиваю его: официальные строки превращают Рамси Сноу в Рамси [ROOT.Char.GetDynasty.GetBaseName] в глазах богов и людей. То, что было отказано мне случайностью рождения, теперь принадлежит мне по праву — древняя твердыня Дредфорта и вся власть, что несёт имя Болтонов.\n\nПоследний поступок отца гарантирует, что его кровь продолжит жить, и я [Select_CString(ROOT.Char.IsFemale, 'намерена', 'намерен')] сделать так, чтобы её #italic помнили#!."
 asoiaf_maintenance_events_0011_b_desc:0 "До меня дошла весть: мой отец, [ROOT.Char.GetFather.GetFullName], покинул этот мир. Среди его последних деяний — подписанный указ, признающий меня законным наследником, и документ уже доставлен с его печатью.\n\nПергамент потрескивает, когда я разворачиваю его: официальные строки превращают Рамси Сноу в Рамси [ROOT.Char.GetDynasty.GetBaseName] в глазах богов и людей. То, что было отказано мне случайностью рождения, теперь принадлежит мне по праву — древняя твердыня Дредфорта и вся власть, что несёт имя Болтонов.\n\nПоследний поступок отца гарантирует, что его кровь продолжит жить, и я [Select_CString(ROOT.Char.IsFemale, 'намерена', 'намерен')] сделать так, чтобы её #italic помнили#!."
 asoiaf_maintenance_events.0011.a:0 "Будущее — моё"
 asoiaf_maintenance_events.0011.tt:0 "Вы были [legitimized|e]"
 
 asoiaf_maintenance_events_0012:0 "Больше не друг"
 asoiaf_maintenance_events_0012_desc:0 "Глядя на сына, [child.GetFirstName], — законного наследника по любому закону богов и людей — я не могу избавиться от горьких мыслей. [asoiaf_rhaenyra.GetFirstName] без стыда пользуется привилегией наследства [asoiaf_rhaenyra.GetHerHis], разгуливая по державе и избегая торжественных обязанностей, ожидаемых от наследника. [asoiaf_rhaenyra.GetSheHe] требует, чтобы все в Красном Замке делали вид, будто это естественно, — женщина, правящая вместо твоего законного сына. А король… он убедил себя, что эта глупость справедлива, и лишь оправдывает промахи [asoiaf_rhaenyra.GetHerHim], пока сияющее право моего мальчика ускользает.\n\nНо я знаю правду… Когда она взойдёт на трон, мои дети станут угрозой её власти — а угрозы короне долго не живут.\n\nДевочка, которую я когда-то называла подругой, стала палачом моего сына."
 asoiaf_maintenance_events.0012.a:0 "[Select_CString(ROOT.Char.IsFemale, 'Я должна', 'Я должен')] защитить своих детей"
 asoiaf_maintenance_events.0012.tt:0 "Ваша [friendship|e] с [asoiaf_rhaenyra.GetFirstName] превратилась в [rivalry|e]"
 
 asoiaf_maintenance_events_0013:0 "Больше не друг"
 asoiaf_maintenance_events_0013_desc:0 "До меня доходят вести о праздновании дня имени моего брата [child.GetFirstNamePossessive] — знак того, что его младенчество осталось позади. Мне бы радоваться за [child.GetHerHim], но вместо этого по спине пробегает холод. С тех пор как [mother.GetTitleAsNameNoTooltip] [mother.GetFirstNamePossessive] стала женой моего отца, [mother.GetSheHe] сделалась холодн[Select_CString(mother.IsFemale, 'ой', 'ым')] и отстранённ[Select_CString(mother.IsFemale, 'ой', 'ым')]; [mother.GetHerHis] тёплые улыбки сменились расчётливыми взглядами. Я пытал[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] сблизиться, но [mother.GetSheHe] отвечает едва прикрытой враждебностью. Лорды шепчут о «законном наследнике» теперь, когда родился принц, словно выбор моего отца ничего не значит. [mother.GetFirstNameNoTooltip] подогревает эти шёпоты — девочка, что когда-то защищала меня, теперь ставит под сомнение само моё право существовать как наследнице.\n\nМеня назвал король. Я — выбранная преемница. И всё же моя самая близкая подруга стала архитектором моего падения."
 asoiaf_maintenance_events.0013.a:0 "Моё право по рождению под угрозой…"
 asoiaf_maintenance_events.0013.tt:0 "Ваша [friendship|e] с [mother.GetFirstName] превратилась в [rivalry|e]"
