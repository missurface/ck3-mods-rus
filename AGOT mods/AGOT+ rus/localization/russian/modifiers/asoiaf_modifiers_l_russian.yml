l_russian:
 asoiaf_fertility_health_boost:0 "Повышение плодовитости и здоровья"
 asoiaf_fertility_health_boost_desc:1 "Временно повышает здоровье и плодовитость, помогая выживать и заводить детей."
 
 asoiaf_health_boost:0 "Крепкое здоровье"
 
 asoiaf_stress_jarred_children:0 "Трупы в банках"
 asoiaf_stress_jarred_children_desc:0 "Этот персонаж хранит тела своих мертворождённых детей, законсервированные в стеклянных банках — тревожащая и святотатственная практика."
 
 #CANON CHILDREN MODIFIERS
 asoiaf_canon_children_pregnancy_negation_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Запрет беременности#!"
 asoiaf_canon_children_pregnancy_negation_modifier_desc:0 "Этот персонаж уже обзавёлся всеми своими каноничными детьми и не заведёт новых, пока не наступит #italic вдовство#!, #italic развод#! или #italic новый брак#!.\n@warning_icon! #X Невозможно иметь детей#!"
 
 asoiaf_Targaryen_28_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Висенья Таргариен#!"
 asoiaf_Targaryen_28_modifier_desc:0 "#bold Висенья Таргариен#! была страстной, суровой и непреклонной девушкой; ходили слухи, что она баловалась колдовством. Её холодная, строгая красота нередко заставляла сравнивать её с младшей сестрой. Несмотря на чужие мнения, она оставалась твёрдой опорой в управлении королевством, которое выковал её брат, и даже подталкивала сына отнять трон у более слабого брата, чтобы у державы был сильный правитель."
 
 asoiaf_Targaryen_27_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_27_modifier_desc:0 "#bold Эйгон Таргариен#!, известный как #italic Завоеватель#!, был харизматичным, решительным и яростно честолюбивым человеком, который основал Семь Королевств и стал их первым королём. Он оставался верен своим сестрам-жёнам, нередко доверяя им управление державой в своё отсутствие и прислушиваясь к их советам. Он был суров к тем, кто бросал ему вызов, но щедр к тем, кто преклонял колено.\n\n#help Эйгон должен иметь детей с женой из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_29_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейнис Таргариен#!"
 asoiaf_Targaryen_29_modifier_desc:0 "#bold Рейнис Таргариен#! была добросердечной, импульсивной и игривой девушкой, склонной к причудам. Она обожала музыку, танцы и поэзию, однако полёты на драконе затмевали все прочие увлечения. Всю жизнь она оставалась преданной своему брату-мужу; говорили, что лишь она владела его сердцем, хоть он и был женат на обеих её сестрах."
 
 asoiaf_Targaryen_30_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйнис Таргариен#!"
 asoiaf_Targaryen_30_modifier_desc:0 "#bold Эйнис Таргариен#! был мягким, учтивым и добрым королём. Желание быть любимым делало его мучительно нерешительным: он постоянно взвешивал последствия каждого решения и думал о том, кто окажется разочарован. Он слишком легко доверял и позволял влиять на себя окружающим, из-за чего часто казался слабым. Несмотря на недостатки, он всю жизнь покровительствовал искусствам, любил музыку и танцы, а также особенно интересовался алхимией, астрономией и астрологией.\n\n#help Эйнис должен иметь детей с женой из #bold Дома Веларионов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_31_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мейгор Таргариен#!"
 asoiaf_Targaryen_31_modifier_desc:0 "#bold Мейгор Таргариен#!, известный как #italic Жестокий#!, был беспощадным, непреклонным и властолюбивым королём. Всю жизнь он жаждал абсолютного господства над всем, что считал своим, и не гнушался самой отвратительной жестокости, чтобы добиться желаемого. Он был скор на обиду, медлителен в прощении и ужасен в гневе. Его гордость своим Домом была несомненна, и он делал всё, чтобы закрепить их власть над недавно покорённым королевством — даже ценой жизней собственных родственников.\n\n#help Мейгор должен иметь детей с женой из #bold династии Харровей#!, женой из #bold династии Вестерлингов#! и/или женой из #bold династии Костейнов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_32_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейна Таргариен#!"
 asoiaf_Targaryen_32_modifier_desc:0 "#bold Рейна Таргариен#! была храброй, свирепой и своевольной девушкой, склонной к мрачным раздумьям. Она ревностно оберегала детей и тех, кого любила, и презирала тех, кому не доверяла. Трагедия за трагедией обрушивались на неё, и со временем она становилась всё более замкнутой и отстранённой от жизни."
 
 asoiaf_Targaryen_33_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_33_modifier_desc:0 "#bold Эйгон Таргариен#!, прозванный #italic Некоронованным#!, был стройным и красивым юношей, решившим во что бы то ни стало отстоять своё право по рождению. Большую часть дней он проводил в воинских упражнениях, поддерживая форму и выглядя истинным королевским принцем — многие отмечали его мастерство с копьём. Он смело бросался за любое дело, но нетерпение и отсутствие стратегического расчёта в конце концов привели его к гибели перед лицом жестокости дяди.\n\n#help Эйгон должен иметь детей с женой из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_34_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Визерис Таргариен#!"
 asoiaf_Targaryen_34_modifier_desc:0 "#bold Визерис Таргариен#! был многообещающим юношей, любимцем простого люда. Попав в плен к дяде, он мужественно выдержал пытки в течение девяти дней."
 
 asoiaf_Targaryen_35_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейхейрис Таргариен#!"
 asoiaf_Targaryen_35_modifier_desc:0 "#bold Джейхейрис Таргариен#!, известный как #italic Миротворец#!, был решительным, трудолюбивым и упрямым королём; его правление стало одним из самых мирных в истории Вестероса. Не по годам мудрый, он был справедлив в речах и щедр к подданным, строил общественные сооружения и делал всё, чтобы обеспечить процветание. Его правление прославляли все, но он не сумел управиться со своей семьёй и быть по-настоящему хорошим отцом для детей.\n\n#help Джейхейрис должен иметь детей с женой из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_36_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Алисанна Таргариен#!"
 asoiaf_Targaryen_36_modifier_desc:0 "#bold Алисанна Таргариен#! была мягкой, доброй и бесстрашной девушкой, любившей своих подданных — и знать, и простолюдинов. Она интересовалась судьбой женщин в королевстве, выслушивала их и многое сделала, чтобы улучшить их положение. Ей нравились музыка, танцы и чтение, но ничто не могло сравниться с её страстью к полётам на драконе."
 
 asoiaf_Targaryen_37_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Вейлла Таргариен#!"
 asoiaf_Targaryen_37_modifier_desc:0 "#bold Вейлла Таргариен#! была шестой по счёту дочерью Эйниса Таргариена и Алисанны Веларион, но умерла во младенчестве. Её смерть глубоко потрясла мать, которая говорила, что ещё одна детская смерть разорвёт ей сердце."
 
 asoiaf_Targaryen_38_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_38_modifier_desc:0 "#bold Эйгон Таргариен#! был первенцем Мейгора Таргариена от его жены Элис Харровей, но родился мёртвым — искривлённым и обезображенным."
 
 asoiaf_Targaryen_40_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейнис Таргариен#!"
 asoiaf_Targaryen_40_modifier_desc:0 "#bold Рейнис Таргариен#! была вторым ребёнком Мейгора Таргариена от его жены Джейны Вестерлинг, но родилась мёртвой — ужасно изувеченной, без рук и ног, с признаками обоих полов."
 
 asoiaf_Targaryen_39_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Визерис Таргариен#!"
 asoiaf_Targaryen_39_modifier_desc:0 "#bold Визерис Таргариен#! был третьим ребёнком Мейгора Таргариена от его жены Элинор Костейн, но родился мёртвым — искривлённым и обезображенным."
 
 asoiaf_Targaryen_41_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйрея Таргариен#!"
 asoiaf_Targaryen_41_modifier_desc:0 "#bold Аэрея Таргариен#! была живой и любопытной девочкой, проводившей дни в псарнях, конюшнях и драконьих загонах. Её нрав был своевольным и упрямым, а язык — дерзким. Шум, звон и суета Королевской Гавани завораживали её и подпитывали стремление к стремительной, полной событий жизни."
 
 asoiaf_Targaryen_42_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейлла Таргариен#!"
 asoiaf_Targaryen_42_modifier_desc:0 "#bold Рейлла Таргариен#! была благочестивой и исполнительной девушкой, посвятившей себя молитве и учению. В детстве ей не требовались наказания и она не попадала в неприятности, а во взрослом возрасте она отдала себя Вере, став септой."
 
 asoiaf_Targaryen_43_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_43_modifier_desc:0 "#bold Эйгон Таргариен#! был первенцем Джейхейриса и Алисанны Таргариен, но умер во младенчестве."
 
 asoiaf_Targaryen_44_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейнерис Таргариен#!"
 asoiaf_Targaryen_44_modifier_desc:0 "#bold Дейнерис Таргариен#! была счастливой, бесконечно любопытной и бесстрашной девочкой. Это был живой и смеющийся ребёнок, приводивший в восторг всех, кто её знал."
 
 asoiaf_Targaryen_45_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эймон Таргариен#!"
 asoiaf_Targaryen_45_modifier_desc:0 "#bold Эймон Таргариен#! был горячим и исполнительным человеком. В детстве он был очень серьёзным, осторожным и послушным, но вырос в истинного таргариенского принца. Он был близок с братом: их часто видели тренирующимися вместе во дворе, и вокруг собирались толпы зевак.\n\n#help Эймон должен иметь детей с женой из #bold династии Баратеонов#!, чтобы продолжить свою линию.#!"Ъ

 asoiaf_Targaryen_46_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бейлон Таргариен#!"
 asoiaf_Targaryen_46_modifier_desc:0 "#bold Бейлон Таргариен#!, прозванный #italic Храбрым#!, был добрым человеком, преданным тем, кого любил. Он был громче и крепче телом, чем старший брат, любил общество и охотно упражнялся в ратном деле. Прозвище, полученное в детстве, ему подходило и по праву: это был смелый и отважный мужчина, никогда не бегавший от драки.\n\n#help Бейлон должен иметь детей с женой из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_47_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Алисса Таргариен#!"
 asoiaf_Targaryen_47_modifier_desc:0 "#bold Алисса Таргариен#! была дерзкой, по-мальчишески задиристой девушкой с сердцем воина. Ей нравилось ездить верхом и фехтовать, а от «дамских» занятий она по возможности уклонялась. Сила, быстрый ум и неудержимый нрав делали её смелой и отважной — она пошла в брата и в любимого человека всей своей жизни."
 
 asoiaf_Targaryen_48_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мейгель Таргариен#!"
 asoiaf_Targaryen_48_modifier_desc:0 "#bold Мейгель Таргариен#! была мягкой, тихой и учёной девушкой. Глубоко благочестивая, она каждую ночь перед сном читала «Семиконечную звезду» и славилась состраданием. Она была необычайно умна и обладала даром к лечению и уходу за больными."
 
 asoiaf_Targaryen_49_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Вейгон Таргариен#!"
 asoiaf_Targaryen_49_modifier_desc:0 "#bold Вейгон Таргариен#!, известный как #italic Без драконный#!, был невзрачным книжником, говорившим прямо и исполнявшим лишь минимум придворных обязанностей. Большую часть времени он проводил в библиотеке, которую предпочитал тренировочным дворам. Он посвящал себя изучению алхимии, астрономии, математики и других тайных искусств, и со временем эти интересы привели его к тому, что он принял обеты мейстера."
 
 asoiaf_Targaryen_50_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейлла Таргариен#!"
 asoiaf_Targaryen_50_modifier_desc:0 "#bold Дейлла Таргариен#! была милой и нежной девушкой с ранимым сердцем. Однако она была также робкой и косноязычной, легко пугалась и быстро начинала плакать. Она любила цветы, но боялась садов из-за пчёл, и страшилась кошек. Позже стало ясно, что она необычайно хрупка — и телом, и умом: она не могла запомнить даже простые молитвы и разражалась слезами от самого мягкого выговора. Единственная беременность настолько её ослабила, что роды начались на две недели раньше срока, а вскоре после них родильная горячка унесла её жизнь."
 
 asoiaf_Targaryen_51_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Сейра Таргариен#!"
 asoiaf_Targaryen_51_modifier_desc:0 "#bold Сейра Таргариен#! была смелой и умной девушкой, но также вспыльчивой и непослушной. Она была упрямой и настойчивой, постоянно искала внимания окружающих и злилась, если его не получала. Искусная манипуляторша, она умела очаровывать людей, чтобы добиться своего — зачастую ей нужны были лишь внимание и утешение, которых девятому ребёнку короля доставалось очень мало.\n\n#help Сейра должна иметь детей с мужчиной #bold лиснийской культуры#!, мужчиной #bold волантийской культуры#! и/или мужчиной из культурной группы #bold андалов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_52_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Визерра Таргариен#!"
 asoiaf_Targaryen_52_modifier_desc:0 "#bold Визерра Таргариен#! была поразительно красивой девушкой, но также безнадёжно тщеславной и самовлюблённой. Ей нравилось сталкивать парней лбами, задавать им глупые задания и заставлять состязаться за её благосклонность. Внутри неё ярко горел огонь амбиций: она обращала своё хитрое изящество в оружие, мечтая однажды стать королевой."
 
 asoiaf_Targaryen_53_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Геймон Таргариен#!"
 asoiaf_Targaryen_53_modifier_desc:0 "#bold Геймон Таргариен#! был одиннадцатым ребёнком Джейхейриса и Алисанны Таргариен, но родился мёртвым."
 
 asoiaf_Targaryen_54_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Валерион Таргариен#!"
 asoiaf_Targaryen_54_modifier_desc:0 "#bold Валерион Таргариен#! был двенадцатым ребёнком Джейхейриса и Алисанны Таргариен, но умер во младенчестве."
 
 asoiaf_Targaryen_55_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Гейль Таргариен#!"
 asoiaf_Targaryen_55_modifier_desc:0 "#bold Гейль Таргариен#!, прозванная #italic Зимние дитя#!, была маленькой, застенчивой и милой девочкой, хотя и слабой, и простоватой. По натуре она была доброй и много лет утешала мать в её бедах, став ей очень близкой. Горе и печаль оказались для неё непосильными чувствами, и в конце концов она покончила с собой после рождения мертворождённого сына.\n\n#help Гейль должна иметь детей с мужчиной #bold простолюдином#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_55_1_modifier:0 "[asoiaf_canon_children_concept|E]: Мертворождённый сын Гейль"
 asoiaf_Targaryen_55_1_modifier_desc:0 "Забеременев от странствующего барда, Гейль тайно родила сына, но ребёнок появился на свет мёртвым. В отчаянии она вошла в воды Черноводного залива и утонула. Королева Алисанна так и не оправилась от потери Гейль: она покинула Королевскую Гавань и умерла менее чем через год."
 
 asoiaf_Targaryen_58_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон#!"
 asoiaf_Targaryen_58_modifier_desc:0 "#bold Эйгон#! был третьим бастардом Сейры Таргариен, рождённым от волантийца."
 
 asoiaf_Targaryen_56_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйлор#!"
 asoiaf_Targaryen_56_modifier_desc:0 "#bold Эйлор#! был первым бастардом Сейры Таргариен, рождённым от лиснийца."

 asoiaf_Targaryen_57_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейкерис#!"
 asoiaf_Targaryen_57_modifier_desc:0 "#bold Джейкерис#! был вторым бастардом Сейры Таргариен, рождённым от лиснийца."
 
 asoiaf_Hammer_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Хью#!"
 asoiaf_Hammer_1_modifier_desc:0 "#bold Хью#!, прозванный #italic Молот#!, был преданным мужем и отцом, доведённым до крайностей надеждой обеспечить безопасность семьи. Завладев драконом, его желание защитить близких постепенно превратилось в ненасытные амбиции: он хотел возвысить себя и жену, что в конце концов привело к предательству и смерти.\n\n#help Хью должен иметь детей с женой #bold культуры песчаных дорнийцев#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Hammer_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дочь Хью#!"
 asoiaf_Hammer_2_modifier_desc:0 "#bold Дочь Хью#! была единственным ребёнком Хью и Кэт. Она давала им обоим смысл бороться, несмотря на все препятствия, но, увы, умерла от болезни ещё в юности."
 
 asoiaf_Targaryen_59_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейнис Таргариен#!"
 asoiaf_Targaryen_59_modifier_desc:0 "#bold Рейнис Таргариен#!, известная как #italic Почти Королева#!, была смелой и проницательной девушкой. Она горячо любила своих детей и усердно выполняла любую задачу, которая перед ней вставала. После того как на Великом совете ей отказали в троне, она годами таила обиду на феодальных лордов Вестероса, хотя со временем и смирилась с новым порядком. Но даже тогда она оставалась яростно независимой и при каждом удобном случае стремилась это доказать."
 
 asoiaf_Targaryen_60_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Визерис Таргариен#!"
 asoiaf_Targaryen_60_modifier_desc:0 "#bold Визерис Таргариен#! был добрым и приветливым королём, любившим охоту и изучение историй. Семьянин до мозга костей, он до последнего дня пытался удержать враждующих родственников едиными. Иногда он жалел, что его правление не было испытано серьёзными бедами, но понимал и огромную ценность мира как такового. В конце концов именно его глубоко укоренившееся упрямство разрушило этот мир: он назвал наследницей старшую дочь вместо сына и тем самым после своей смерти вверг королевство в войну.\n\n#help Визерис должен иметь детей с женой из #bold Дома Арренов (главная ветвь)#! и/или из #bold династии Хайтауэров#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_61_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Деймон Таргариен#!"
 asoiaf_Targaryen_61_modifier_desc:0 "#bold Деймон Таргариен#!, известный как #italic Порочный принц#!, был свирепым и непредсказуемым человеком. Его резкая, агрессивная и беспощадная манера поведения заставляла многих ему не доверять и даже его бояться. Несмотря на репутацию, он всегда хранил глубокую преданность и любовь к своей семье и своему Дому — пусть и не всегда умел это показать.\n\n#help Деймон должен иметь детей с женой из #bold Дома Веларионов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_62_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_62_modifier_desc:0 "#bold Эйгон Таргариен#! был третьим ребёнком Бейлона и Алиссы Таргариен, но родился мёртвым. Роды оставили мать в болезненном состоянии, что в итоге привело к её смерти позже в том же году."
 
 asoiaf_Targaryen_131_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эймон Таргариен#!"
 asoiaf_Targaryen_131_modifier_desc:0 "#bold Эймон Таргариен#! был первенцем короля Визериса и Эммы Аррен, но умер во младенчестве."
 
 asoiaf_Targaryen_63_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейнира Таргариен#!"
 asoiaf_Targaryen_63_modifier_desc:0 "#bold Рейнира Таргариен#! была волевой и независимой девушкой. Она была преданной матерью и растила детей с любовью и заботой. Однако у неё не хватало терпения к тем, кто пытался ею управлять или бросал вызов её воле, и потому она мало кому нравилась среди приверженной традициям вестеросской знати. Несмотря на риски, она упорно прокладывала собственный путь, почти не думая о последствиях своих поступков — пока те не становились неизбежными.\n\n#help Рейнира должна иметь детей с мужчиной из #bold династии Стронгов#! и/или с мужем из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_64_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бейлон Таргариен#!"
 asoiaf_Targaryen_64_modifier_desc:0 "#bold Бейлон Таргариен#! был третьим ребёнком короля Визериса и Эммы Аррен — и последним. Когда Бейлон не мог появиться на свет, а его жизнь была под угрозой, Визерис принял тяжёлое решение пожертвовать жизнью Эммы, чтобы попытаться спасти ребёнка. Жертва оказалась напрасной: Бейлон умер в тот же день, когда родился, оставив после себя лишь новую трагедию."
 
 asoiaf_Targaryen_65_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_65_modifier_desc:0 "#bold Эйгон Таргариен#! был неопытным королём, нередко проводившим часы за пьянством и распутством. Он жаждал принятия со стороны родителей, но ни один из них так и не дал ему нужной любви, из-за чего он не умел нормально выражать свои чувства. Взойдя на трон, он пытался исправиться и править мягко и щедро, но ему не хватало политического образования, чтобы управлять самостоятельно; каждая смерть в семье ломала его всё сильнее, делая импульсивным и опрометчивым.\n\n#help Эйгон должен иметь детей с женой из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_66_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Хелейна Таргариен#!"
 asoiaf_Targaryen_66_modifier_desc:0 "#bold Хелейна Таргариен#! была странной и эксцентричной девушкой, которую редко понимали окружающие. Её тянуло к необычным и причудливым темам, и ей было очень трудно сходиться с людьми и выражать себя. Видения и предзнаменования терзали её сны, но раз за разом она оказывалась бессильной предотвратить их исполнение — тем более, что семья почти не прислушивалась к ней."
 
 asoiaf_Targaryen_67_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эймонд Таргариен#!"
 asoiaf_Targaryen_67_modifier_desc:0 "#bold Эймонд Таргариен#! был смелым, своевольным и непримиримым, но преданным семье. В глубине души у него было более мягкое и благородное сердце, чем у большинства, хотя он старательно прятал это под суровой стоической маской. Он был смертельно опасным мечником и тренировался ежедневно, но не стремился красоваться на турнирах, предпочитая оттачивать мастерство в одиночестве, а оставшееся время посвящать историям и философии."
 
 asoiaf_Targaryen_68_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейрон Таргариен#!"
 asoiaf_Targaryen_68_modifier_desc:0 "#bold Дейрон Таргариен#!, прозванный #italic Отважным#!, был красивым и добрым юношей, верным семье и прилежным в долге. Он рос в тени братьев, но, будучи пажом в Староместе, стал цельным, учтивым и умным молодым человеком. Его яростная любовь к семье порой толкала его на импульсивную месть тем, кто причинял близким вред."
 
 asoiaf_Targaryen_69_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бейла Таргариен#!"
 asoiaf_Targaryen_69_modifier_desc:0 "#bold Бейла Таргариен#! была дикой, своевольной и бесстрашной; она легко вспыхивала и порой нарочно провоцировала окружающих. Ей куда больше нравилась мальчишеская одежда, чем дамская, и её увлечения были в том же духе. Она любила танцы, соколиную охоту и особенно верховую езду — прежде всего на своём драконе."
 
 asoiaf_Targaryen_70_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейна Таргариен#!"
 asoiaf_Targaryen_70_modifier_desc:0 "#bold Рейна Таргариен#! была стройной и грациозной девушкой, любившей танцы и многие дамские занятия при дворе. В детстве она тяжело переживала, что у неё нет дракона, как у остальных родственников, но со временем она привязалась к вылупившемуся дракончику, о котором заботилась и которого никогда не оставляла."
 
 asoiaf_Targaryen_61_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйрион Таргариен#!"
 asoiaf_Targaryen_61_1_modifier_desc:0 "#bold Эйрион Таргариен#! был третьей беременностью Лейны Веларион и дался куда тяжелее первых двух. Когда ребёнок не мог появиться на свет, пентосские лекари убеждали Деймона Таргариена выбрать между смертью матери и ребёнка — или разрезать чрево Лейны, спасая лишь дитя. Он в конце концов отказался, но Лейна уже добралась до своего дракона Вхагар в поисках смерти от драконьего пламени, погубив и себя, и нерождённого ребёнка."
 
 asoiaf_Targaryen_71_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейхейра Таргариен#!"
 asoiaf_Targaryen_71_modifier_desc:0 "#bold Джейхейра Таргариен#! была маленькой и тихой девочкой, которая не плакала и не улыбалась, как другие дети. По мере взросления отмечали её поразительное отсутствие эмоций, но при этом она оставалась добросердечной."
 
 asoiaf_Targaryen_72_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейхейрис Таргариен#!"
 asoiaf_Targaryen_72_modifier_desc:0 "#bold Джейхейрис Таргариен#! был игривым и прилежным мальчиком, любившим строгий распорядок и обычно не переносившим, когда всё шло не так, как он ожидал. Он родился с уродством: на левой руке у него было шесть пальцев, а на каждой ступне — по шесть пальцев.\n\n@warning_icon! #X Уродство Джейхейриса пока отображается чертой «Отметина», пока не будет добавлена лучшая альтернатива.#!"
 
 asoiaf_Targaryen_73_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мейлор Таргариен#!"
 asoiaf_Targaryen_73_modifier_desc:0 "#bold Мейлор Таргариен#! был третьим ребёнком Эйгона и Хелейны. Когда убийцы настигли их, мать в попытке спасти жизнь старшего сына Джейхейриса назвала Мейлора тем, кто должен умереть. Хотя в итоге он не погиб, всю оставшуюся жизнь ему пришлось жить с мрачным знанием о том, что мать предпочла его смерти вместо брата."
 
 asoiaf_Targaryen_75_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейкерис Веларион#!"
 asoiaf_Targaryen_75_modifier_desc:0 "#bold Джейкерис Веларион#! был добродушным, старательным и учёным юношей, серьёзно относившимся к обязанностям своей роли. Не обращая внимания на слухи о своей законности, он изо всех сил защищал семью и оберегал братьев от тех, кто желал им зла. Он был храбр, но рассудителен и стремился доказать, что достоин своего наследства, несмотря на тайную незаконнорождённость."
 
 asoiaf_Targaryen_76_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Люцерис Веларион#!"
 asoiaf_Targaryen_76_modifier_desc:0 "#bold Люцерис Веларион#! был мягким юношей, пытавшимся исполнить свой долг, несмотря на страхи. Он глубоко любил семью и друзей и был готов на многое ради их защиты — даже если приходилось рисковать собой. В детстве он находил удовольствие в насмешках над теми, кого считал слабее себя; с возрастом он старался перерасти эту привычку, но так и не избавился от неё полностью."
 
 asoiaf_Targaryen_77_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джоффри Веларион#!"
 asoiaf_Targaryen_77_modifier_desc:0 "#bold Джоффри Веларион#! был красивым мальчиком и третьим сыном Рейниры."
 
 asoiaf_Targaryen_78_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_78_modifier_desc:0 "#bold Эйгон Таргариен#!, прозванный #italic Драконоборцем#!, был мрачным человеком, редко улыбавшимся и смеявшимся. Изувеченный душой жестокими смертями родителей и братьев, он находил утешение в одиночестве и в отстранённости от окружающих. Он редко проявлял чувства, но лучше всего ему было рядом с братом Визерисом, а любое упоминание драконов приводило его в исполненную горя ярость.\n\n#help Эйгон должен иметь детей с женой из #bold Дома Веларионов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_79_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Визерис Таргариен#!"
 asoiaf_Targaryen_79_modifier_desc:0 "#bold Визерис Таргариен#! был умным, ловким и галантным человеком; с юности его учили владению мечом и правильному управлению. В молодости он был обаятельным, но с возрастом стал суровым, огрубевшим от тягот власти. Он всегда оставался верен семье и преданно служил Десницей короля своему брату и племянникам.\n\n#help Визерис должен иметь детей с женой из #bold Дома Рогар#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_80_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Висенья Таргариен#!"
 asoiaf_Targaryen_80_modifier_desc:0 "#bold Висенья Таргариен#! была шестым ребёнком Рейниры Таргариен. Она родилась после преждевременных родов: ребёнок появился на свет чешуйчатым и уродливым и вскоре умер."
 
 asoiaf_Targaryen_81_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейрон Таргариен#!"
 asoiaf_Targaryen_81_modifier_desc:0 "#bold Дейрон Таргариен#!, известный как #italic Молодой Дракон#!, был красивым, уверенным и харизматичным юным королём. Он одержимо стремился завершить завоевание Вестероса своим Домом и обладал блестящим стратегическим умом, чтобы это осуществить, хотя ему не хватало политической хватки, чтобы полностью усмирить новые владения. Помимо воинских дел, он был и одарённым писателем, записывавшим свои походы изящной прозой прямо в пути."
 
 asoiaf_Targaryen_82_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бейлор Таргариен#!"
 asoiaf_Targaryen_82_modifier_desc:0 "#bold Бейлор Таргариен#!, прозванный #italic Благословенным#!, был глубоко благочестивым королём, превозносившим все добродетели Семи. Он был смиренным и миролюбивым и предпочитал венок из цветов короне из золота. Несмотря на незаметную внешность, ему хватало храбрости рисковать жизнью и переносить тяжкие физические страдания, чтобы спасти семью и сохранить мир. В конце концов именно его рвение погубило его: оно часто переходило в область заблуждений и ставило под сомнение его рассудок."
 
 asoiaf_Targaryen_83_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейна Таргариен#!"
 asoiaf_Targaryen_83_modifier_desc:0 "#bold Дейна Таргариен#!, прозванная #italic Непокорной#!, была красивой и смелой девушкой, по природе своей неукротимой. Вместо дамских занятий при дворе она выбирала верховую езду, стрельбу из лука и атлетику, хотя ей снова и снова отказывали в участии в турнире. Ей нравилось привлекать к себе внимание нарочито театральной одеждой: подражая отцу, она носила всё чёрное, а позднее — всё белое после того, как её брат Бейлор не смог исполнить супружеский долг в их браке."
 
 asoiaf_Targaryen_84_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейна Таргариен#!"
 asoiaf_Targaryen_84_modifier_desc:0 "#bold Рейна Таргариен#! была послушной, кроткой и пассивной девушкой. С юных лет она интересовалась Верой, вышивая на одежде религиозные сцены и предпочитая белое и золотое, чтобы подчеркнуть благочестие. Она не стремилась к приключениям и охотнее оставалась при дворе, занимаясь шитьём и рукоделием."
 
 asoiaf_Targaryen_85_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Элейна Таргариен#!"
 asoiaf_Targaryen_85_modifier_desc:0 "#bold Элейна Таргариен#! была волевой, расчётливой и умной девушкой, понимавшей тонкости управления деньгами. Её способности были несомненны даже для мужчин вокруг неё: многие годы она неофициально исполняла обязанности Мастера над монетой королевства. Всю жизнь её не отпускало очарование драконов: у неё было драконье яйцо, которое она надеялась когда-нибудь увидеть вылупившимся, но этого так и не случилось."
 
 asoiaf_Targaryen_88_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_88_modifier_desc:0 "#bold Эйгон Таргариен#!, известный как #italic Недостойный#!, был красивым и остроумным мужчиной, позволившим похоти и чревоугодию править собой. В юности он был крепок и энергичен и любил охоту, соколиную охоту и танцы, но жадность превратила его в коррумпированного, небрежного и злобного короля. К концу правления он стал настолько чудовищно тучным, что подагра разъедала его плоть и приковала к постели.\n\n#help Эйгон должен иметь детей с женой из #bold Дома Таргариенов#!, с девушкой #bold простолюдинкой#!, с девушкой #bold культуры Летних островов#!, с девушкой из #bold Дома Таргариенов (вне брака)#!, с девушкой из #bold династии Браккенов#!, с девушкой из #bold династии Блэквудов#! и/или с девушкой #bold лиснийской культуры#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Сейчас [asoiaf_canon_children_concept|E] Эйгона включают только его законнорождённых детей и Деймона Блэкфайра.#!"
 
 asoiaf_Targaryen_89_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эймон Таргариен#!"
 asoiaf_Targaryen_89_modifier_desc:0 "#bold Эймон Таргариен#!, прозванный #italic Драконьим Рыцарем#!, был благочестивым и честным человеком и считался лучшим мечником королевства. Он оставался непоколебимо храбр перед лицом самых безнадёжных обстоятельств и верно служил семье до самой смерти, даже когда его унижали или презирали. Поздние поколения стали считать его самым благородным рыцарем из всех, кто когда-либо жил."
 
 asoiaf_Targaryen_90_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Нейрис Таргариен#!"
 asoiaf_Targaryen_90_modifier_desc:0 "#bold Нейрис Таргариен#! была тихой и благочестивой девушкой, известной своей хрупкой, неземной красотой. По природе смиренная, она редко носила украшения, предпочитала простые элегантные платья и убирала волосы в сетку или скрывала под капюшоном. Её слабое здоровье затрудняло рождение детей: она смогла родить лишь двоих живых детей, прежде чем умерла в родах, и у неё было вдвое больше мертворождённых."
 
 asoiaf_Targaryen_91_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейрон Таргариен#!"
 asoiaf_Targaryen_91_modifier_desc:0 "#bold Дейрон Таргариен#!, прозванный #italic Добрым#!, был добрым и вдумчивым королём с тихой внутренней силой. Полный решимости, он твёрдо управлял королевством, заботясь о долгосрочной стабильности, а не о сиюминутном умиротворении. Хотя воином он не был, он оставался культурным и учёным человеком, всегда стремившимся учиться.\n\n#help Дейрон должен иметь детей с женой из #bold династии Мартеллов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_134_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Визерра Таргариен#!"
 asoiaf_Targaryen_134_modifier_desc:0 "#bold Визерра Таргариен#! была вторым ребёнком Эйгона и Нейрис Таргариен, но родилась мёртвой."
 
 asoiaf_Targaryen_132_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Визерис Таргариен#!"
 asoiaf_Targaryen_132_modifier_desc:0 "#bold Визерис Таргариен#!, старший близнец Бейлона, был третьим ребёнком Эйгона и Нейрис Таргариен, но родился мёртвым."
 
 asoiaf_Targaryen_133_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бейлон Таргариен#!"
 asoiaf_Targaryen_133_modifier_desc:0 "#bold Бейлон Таргариен#!, младший близнец Визериса, был четвёртым ребёнком Эйгона и Нейрис Таргариен, но родился мёртвым."
 
 asoiaf_Targaryen_92_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейнерис Таргариен#!"
 asoiaf_Targaryen_92_modifier_desc:0 "#bold Дейнерис Таргариен#! была доброй девушкой, несущей тяжесть долга. Хотя она любила другого, она добровольно отказалась от этой любви ради политического брака, чтобы сохранить мир в королевстве. В течение жизни её часто посещала меланхолия: она думала о том, что могло бы быть с потерянной любовью, но не позволяла этому отвлекать её от долга перед новым мужем и детьми."
 
 asoiaf_Targaryen_93_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эймонд Таргариен#!"
 asoiaf_Targaryen_93_modifier_desc:0 "#bold Эймонд Таргариен#!, младший близнец Дейнерис, был шестым ребёнком Эйгона и Нейрис Таргариен, но родился мёртвым."
 
 asoiaf_Targaryen_135_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Хейгон Таргариен#!"
 asoiaf_Targaryen_135_modifier_desc:0 "#bold Хейгон Таргариен#! был седьмым ребёнком Эйгона и Нейрис Таргариен, но родился мёртвым."
 
 asoiaf_Targaryen_94_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Деймон Блэкфайр#!"
 asoiaf_Targaryen_94_modifier_desc:0 "#bold Деймон Блэкфайр#!, известный как #italic Чёрный Дракон#!, был...\n\n@warning_icon! #X Дети Деймона будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Targaryen_96_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бринден Риверс#!"
 asoiaf_Targaryen_96_modifier_desc:0 "#bold Бринден Риверс#!, известный как #italic Кровавый Ворон#!, был человеком беспощадной эффективности и дальнего расчёта. Непоколебимо верный династии Таргариенов, он использовал всю доступную ему власть, чтобы удержать их на троне, и ради этого прибегал даже к братоубийству и бесчестным убийствам. Говорили, что он балуется тёмным колдовством и обладает почти всеведущим знанием о том, что происходит в Королевской Гавани."
 
 asoiaf_Targaryen_107_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бейлор Таргариен#!"
 asoiaf_Targaryen_107_modifier_desc:0 "#bold Бейлор Таргариен#!, прозванный #italic Сломикопьё#!, был искусным воином и рассудительным человеком. Он был тем, кем желают видеть рыцаря и лорда: легко заслуживал уважение окружающих и был столь же щедр и справедлив, как его отец. Честь глубоко жила в нём — он нередко проявлял милосердие к врагам, если те его заслуживали.\n\n#help Бейлор должен иметь детей с женой из #bold династии Дондаррионов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_108_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйрис Таргариен#!"
 asoiaf_Targaryen_108_modifier_desc:0 "#bold Эйрис Таргариен#! был книжным королём, предпочитавшим чтение правлению. Он часто уединялся в покоях и библиотеках, забывая о простых вещах вроде смены одежды. И всё же, когда пришла война, он не уклонился от командования, хотя слишком торопился карать тех, кто бросал ему вызов, посеяв семена будущих восстаний."
 
 asoiaf_Targaryen_109_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейгель Таргариен#!"
 asoiaf_Targaryen_109_modifier_desc:0 "#bold Рейгель Таргариен#! был кротким и болезненным человеком, известным эксцентричностью и приступами безумия. В отличие от братьев, он не стремился прославиться на ристалищах и был доволен тем, чтобы прожить жизнь королевским принцем.\n\n#help Рейгель должен иметь детей с женой из #bold Дома Арренов (главная ветвь)#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_110_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мейкар Таргариен#!"
 asoiaf_Targaryen_110_modifier_desc:0 "#bold Мейкар Таргариен#!, известный как #italic Наковальня#!, был колючим и нетерпеливым королём, быстро судившим и осуждавшим тех, кто становился у него на пути. Он был вовсе не харизматичен и нелегко заводил союзников, но суровость и воинская доблесть делали его способным полководцем и достойным бойцом.\n\n#help Мейкар должен иметь детей с женой из #bold династии Дейнов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_111_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Валлар Таргариен#!"
 asoiaf_Targaryen_111_modifier_desc:0 "#bold Валлар Таргариен#!, прозванный #italic Юным принцем#!, был первенцем Бейлора Таргариена и Джены Дондаррион. Он старался подражать отцу, стремясь к воинскому совершенству и победам на турнирах. Однако, пытаясь соответствовать имени отца, он так и не смог полностью избавиться от чувства собственной значимости.\n\n#help Валлар должен иметь детей с женой #bold тирошийской культуры#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_112_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Матэрис Таргариен#!"
 asoiaf_Targaryen_112_modifier_desc:0 "#bold Матэрис Таргариен#!, прозванный #italic Ещё более юным принцем#!, был вторым и последним ребёнком Бейлора Таргариена и Джены Дондаррион."
 
 asoiaf_Targaryen_113_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейрон Таргариен#!"
 asoiaf_Targaryen_113_modifier_desc:0 "#bold Дейрон Таргариен#! был первенцем Валлара Таргариена и Кьеры из Тироша, но умер при рождении."
 
 asoiaf_Targaryen_114_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бейлор Таргариен#!"
 asoiaf_Targaryen_114_modifier_desc:0 "#bold Бейлор Таргариен#! был вторым ребёнком Валлара Таргариена и Кьеры из Тироша, но умер при рождении."
 
 asoiaf_Targaryen_115_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйлор Таргариен#!"
 asoiaf_Targaryen_115_modifier_desc:0 "#bold Эйлор Таргариен#! был первенцем Рейгеля Таргариена и Алисы Аррен, а также мягким и добрым юношей. Неразлучный со своей сестрой-близнецом, он часто сопровождал её в приключениях. У него было доброе сердце и прощающий нрав, но он так и не смог дать сестре утешение, в котором она нуждалась после своей случайной смерти от её рук."
 
 asoiaf_Targaryen_116_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйлора Таргариен#!"
 asoiaf_Targaryen_116_modifier_desc:0 "#bold Эйлора Таргариен#! была шумной и отчаянной девушкой, постоянно рисковавшей и стремившейся исследовать неизведанное, что часто оборачивалось ссадинами и синяками. Один из таких случаев унёс жизнь её близнеца и навсегда оставил на ней след."
 
 asoiaf_Targaryen_117_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейнора Таргариен#!"
 asoiaf_Targaryen_117_modifier_desc:0 "#bold Дейнора Таргариен#! была третьим ребёнком Рейгеля Таргариена и Алисы Аррен."
 
 asoiaf_Targaryen_118_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейрон Таргариен#!"
 asoiaf_Targaryen_118_modifier_desc:0 "#bold Дейрон Таргариен#!, прозванный #italic Пьяницей#!, был человеком, раздавленным тяжестью пророчеств. Постоянные вещие сны заставляли его бояться за жизни близких и пытаться предотвратить исполнение судьбы. В итоге это привело к жизни в отстранённости, часто с пьянством и распутством — чтобы забыть о многочисленных бедах.\n\n#help Дейрон должен иметь детей с женой #bold тирошийской культуры#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_119_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйрион Таргариен#!"
 asoiaf_Targaryen_119_modifier_desc:0 "#bold Эйрион Таргариен#!, прозванный #italic Ярким Пламенем#!, был властным, садистичным и высокомерным до самой сути. Его преследовали безумные заблуждения, раздувавшие чувство собственной силы; он даже верил, что является драконом в человеческом облике. Со временем он научился скрывать жестокость за улыбками и учтивостью, но все знали, кто он на самом деле.\n\n#help Эйрион должен иметь детей с женой из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_120_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эймон Таргариен#!"
 asoiaf_Targaryen_120_modifier_desc:0 "#bold Эймон Таргариен#! был исполнительным человеком с быстрым умом и глубокой мудростью. Он выбрал путь самоотверженного знания и посвятил себя служению и долгу, даже если это оставляло его бессильным спасти тех, кого он любил. Доброта давалась ему легко: он судил людей по внутреннему нраву, а не по тому, что о них думало общество."

 asoiaf_Targaryen_121_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейлла Таргариен#!"
 asoiaf_Targaryen_121_modifier_desc:0 "#bold Дейлла Таргариен#! была четвёртым ребёнком Мейкара Таргариена и Дианны Дейн."
 
 asoiaf_Targaryen_122_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_122_modifier_desc:0 "#bold Эйгон Таргариен#!, прозванный #italic Невероятным#!, был смелым человеком с быстрым умом и добрым сердцем. В юности он бывал дерзким, но со временем стал доступным и щедрым королём, заботившимся о долгосрочной стабильности. Его законы и реформы часто игнорировали желания знати, однако на протяжении долгого правления он оставался любим простолюдинами.\n\n#help Эйгон должен иметь детей с женой из #bold династии Блэквудов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_123_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рей Таргариен#!"
 asoiaf_Targaryen_123_modifier_desc:0 "#bold Рей Таргариен#! была шестым ребёнком Мейкара Таргариена и Дианны Дейн."
 
 asoiaf_Targaryen_124_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Вейлла Таргариен#!"
 asoiaf_Targaryen_124_modifier_desc:0 "#bold Вейлла Таргариен#! была милым, но простоватым ребёнком Дейрона Таргариена и Кьеры из Тироша."
 
 asoiaf_Targaryen_125_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мейгор Таргариен#!"
 asoiaf_Targaryen_125_modifier_desc:0 "#bold Мейгор Таргариен#! был единственным ребёнком Эйриона и Дейноры Таргариен. Названный в честь Мейгора Жестокого, он пугал королевство: многие боялись, что, став королём, он унаследует безумие отца."
 
 asoiaf_Targaryen_126_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дункан Таргариен#!"
 asoiaf_Targaryen_126_modifier_desc:0 "#bold Дункан Таргариен#!, прозванный #italic Малым#!, был мягким и способным человеком, отказавшимся от права первородства ради любви. Его растили как будущего короля и вынуждали вступить в выгодный брак, но он предпочёл следовать сердцу и отрёкся от всех притязаний на верховную власть."
 
 asoiaf_Targaryen_127_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейхейрис Таргариен#!"
 asoiaf_Targaryen_127_modifier_desc:0 "#bold Джейхейрис Таргариен#! был мудрым и компетентным королём, но физически слабым. Если бы не его преждевременная смерть, он мог бы стать великим правителем: за короткое правление он дал державе единство, устойчивость и хорошее управление. Как и его братья с сёстрами, он упрямо следовал сердцу и женился на сестре вопреки воле отца.\n\n#help Джейхейрис должен иметь детей с женой из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_128_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Шейра Таргариен#!"
 asoiaf_Targaryen_128_modifier_desc:0 "#bold Шейра Таргариен#! была доброй, но решительной девушкой. Готовая исполнять долг жены, она требовала лишь права выбора — с кем именно быть в браке; она бросила вызов отцу, тайно обвенчавшись с братом и возлюбленным."
 
 asoiaf_Targaryen_129_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейрон Таргариен#!"
 asoiaf_Targaryen_129_modifier_desc:0 "#bold Дейрон Таргариен#! был рождённым воином и искусным рыцарем. Он радовался турнирам и битвам и храбро исполнял свой долг во всём — кроме брака, подобно другим своим братьям и сёстрам. Рыцарские обеты много для него значили: он был полон решимости защищать невинных от разбойников, а королевство — от мятежников."
 
 asoiaf_Targaryen_130_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейлла Таргариен#!"
 asoiaf_Targaryen_130_modifier_desc:0 "#bold Рейлла Таргариен#! была пятым ребёнком Эйгона Таргариена и Беты Блэквуд."
 
 asoiaf_Targaryen_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйрис Таргариен#!"
 asoiaf_Targaryen_1_modifier_desc:0 "#bold Эйрис Таргариен#!, известный как #italic Безумный король#!, начал правление с большими надеждами, а закончил его безумием и трагедией. В юности он был щедрым, глубоко честолюбивым и активно участвовал в управлении, но цепь несчастий сделала его подозрительным, вспыльчивым, садистически жестоким и в конце концов безумным.\n\n#help Эйрис должен иметь детей с женой из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейлла Таргариен#!"
 asoiaf_Targaryen_2_modifier_desc:0 "#bold Рейлла Таргариен#! была исполнительной женой и королевой, но глубоко несчастной своей долей. Против воли выданная замуж за брата, она стойко пережила множество мертворождений и вырастила тех детей, кто у неё остался."
 
 asoiaf_Targaryen_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейгар Таргариен#!"
 asoiaf_Targaryen_3_modifier_desc:0 "#bold Рейгар Таргариен#! был мудрым, добрым и прекрасно образованным человеком, любимым и лордами, и простолюдинами. Честь и ум делали его необычайно харизматичным; он обзавёлся несколькими друзьями, хотя часто предпочитал одиночество. Он глубоко интересовался пророчествами и верил, что от его линии родится #italic Обещанный принц#!.\n\n#help Рейгар должен иметь детей с женой из #bold династии Мартеллов#! и/или с девушкой из #bold Дома Старков#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Targaryen_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Шейна Таргариен#!"
 asoiaf_Targaryen_4_modifier_desc:0 "#bold Шейна Таргариен#! была вторым ребёнком Эйриса и Рейллы Таргариен, но родилась мёртвой."
 
 asoiaf_Targaryen_5_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейрон Таргариен#!"
 asoiaf_Targaryen_5_modifier_desc:0 "#bold Дейрон Таргариен#! был третьим ребёнком Эйриса и Рейллы Таргариен и умер от болезни вскоре после рождения."
 
 asoiaf_Targaryen_6_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_6_modifier_desc:0 "#bold Эйгон Таргариен#! был четвёртым ребёнком Эйриса и Рейллы Таргариен и умер от болезни вскоре после своих первых именин."
 
 asoiaf_Targaryen_7_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейхейрис Таргариен#!"
 asoiaf_Targaryen_7_modifier_desc:0 "#bold Джейхейрис Таргариен#! был пятым ребёнком Эйриса и Рейллы Таргариен и умер от болезни вскоре после рождения."
 
 asoiaf_Targaryen_8_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Визерис Таргариен#!"
 asoiaf_Targaryen_8_modifier_desc:0 "#bold Визерис Таргариен#!, известный как #italic Король-попрошайка#!, был юношей, искалеченным тяготами своего воспитания. После восстания Роберта он бежал и скрывался в Эссосе, отчаянно цепляясь за выживание, растя младшую сестру и избегая убийц. Давление этой жизни сделало его озлобленным, вспыльчивым и жестоким, что в итоге привело к его гибели."
 
 asoiaf_Targaryen_9_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дейнерис Таргариен#!"
 asoiaf_Targaryen_9_modifier_desc:0 "#bold Дейнерис Таргариен#!, известная как #italic Мать драконов#!, была робкой и наивной девочкой, воспитанной старшим братом в изгнании. Через испытания и жертвы она нашла опору и стала уверенной, смелой и честолюбивой правительницей с абсолютным чувством справедливости.\n\n#help Дейнерис должна иметь детей с мужем #bold дотракийской культуры#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Дети Дейнерис будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Targaryen_10_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рейнис Таргариен#!"
 asoiaf_Targaryen_10_modifier_desc:0 "#bold Рейнис Таргариен#! была первенцем Рейгара. Она любила животных и держала собственного котёнка по имени #italic Балерион#!. В отличие от остальных в семье, она выглядела скорее дорнийкой, чем валирийкой — и это раздражало её деда, короля Эйриса II."
 
 asoiaf_Targaryen_11_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эйгон Таргариен#!"
 asoiaf_Targaryen_11_modifier_desc:0 "#bold Эйгон Таргариен#!, скрывавшийся под именем #italic Юный Грифф#!, был смелым, честным и честолюбивым молодым человеком. Его тайно вывезли из Вестероса во время восстания Роберта, и он вырос среди сплочённой группы спутников, которые лепили из него идеального короля, обучая владению оружием, языкам, истории, праву и искусству поэзии."
 
 asoiaf_Velaryon_31_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Корлис Веларион#!"
 asoiaf_Velaryon_31_modifier_desc:0 "#bold Корлис Веларион#!, известный как #italic Морской Змей#!, был гордым и глубоко честолюбивым человеком, одержимым погоней за наследием. Миссией его жизни было увидеть свою династию на Железном троне — даже если тот, кто на нём сидит, не будет иметь ни капли крови Веларионов. Его амбиции принесли Дому огромное богатство и власть, но также и множество бед, которые настроили против него членов собственной расширенной семьи.\n\n#help Корлис должен иметь детей с женой из #bold Дома Таргариенов#! и/или с девушкой из #bold простолюдинов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Velaryon_34_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лейна Веларион#!"
 asoiaf_Velaryon_34_modifier_desc:0 "#bold Лейна Веларион#! была решительной девушкой, преданной матерью и доблестной наездницей на драконе. Она обожала летать и не соглашалась ни на что меньшее, чем жизнь драконьего всадника — даже в смерти. Её чувство юмора и остроумие легко очаровывали окружающих, завоёвывая их расположение."
 
 asoiaf_Velaryon_35_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лейнор Веларион#!"
 asoiaf_Velaryon_35_modifier_desc:0 "#bold Лейнор Веларион#! был добросердечным человеком и гордым всадником дракона. Он искал приключения, где только мог их найти, и по-настоящему чувствовал себя живым лишь с мечом в руке или с драконом под собой. Фехтование и спарринги занимали у него много времени, а ещё он любил слушать истории о людях из далёких земель. Его жажда странствий часто вступала в конфликт с домашними обязанностями, разрывая его между двумя мирами и не давая полностью удовлетвориться ни одним."
 
 asoiaf_Velaryon_43_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Аддам Веларион#!"
 asoiaf_Velaryon_43_modifier_desc:0 "#bold Аддам Веларион#! был смелым и решительным юношей, остававшимся непоколебимо верным своей королеве и семье до самой смерти. Он славился умением убеждать в разговоре, а острому уму соответствовал бойкий язык. Его храбрость и преданность в итоге привели к гибели, когда он попытался доказать свою невиновность после ложного обвинения в измене."
 
 asoiaf_Velaryon_44_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Элин Веларион#!"
 asoiaf_Velaryon_44_modifier_desc:0 "#bold Элин Веларион#!, прозванный #italic Дубовым Кулаком#!, был смелым и упрямым человеком, готовым рискнуть жизнью и конечностями ради тех, кто ему дорог. Он искал приключения, где только мог их найти, всегда стремясь принести славу и себе, и своему Дому. Его приключения включали и многочисленные романы на стороне, что сильно раздражало жену. Однако, несмотря на трудности в отношениях, они неизменно умели мириться — и, по общему мнению, Элин любил её больше всех остальных.\n\n#help Элин должен иметь детей с женой из #bold Дома Таргариенов#! и/или с девушкой из #bold Дома Таргариенов (вне брака)#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Дети Элина будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Stark_84_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рикон Старк#!"
 asoiaf_Stark_84_modifier_desc:0 "#bold Рикон Старк#! был лордом Винтерфелла до своей смерти за несколько лет до Танца Драконов. Ему наследовал сын — Криган Старк.\n\n#help Рикон должен иметь детей с женой из #bold династии Гловеров#! и/или с девушкой из культурной группы наследия #bold Первые люди#! вне брака, чтобы продолжить свою линию.#!"
 
 asoiaf_Stark_86_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Криган Старк#!"
 asoiaf_Stark_86_modifier_desc:0 "#bold Криган Старк#!, прозванный #italic Волком Севера#!, был суровым и непреклонно честным лордом Винтерфелла. Он серьёзно относился к клятвам своего Дома, добросовестно стремясь их исполнить и одновременно защищая королевство от угрозы за Стеной. Чувство долга и желание внимательно следить за северной границей заставляли его по возможности избегать южных интриг.\n\n#help Криган должен иметь детей с женой из #bold династии Норреев#!, из #bold династии Блэквудов#! и/или с девушкой из #bold Дома Старков#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Stark_87_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Беннард Старк#!"
 asoiaf_Stark_87_modifier_desc:0 "#bold Беннард Старк#! был вторым ребёнком Рикона Старка и Гиллианы Гловер и умер от болезни в юном возрасте."
 
 asoiaf_Stark_88_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Сара Сноу#!"
 asoiaf_Stark_88_modifier_desc:0 "#bold Сара Сноу#! якобы была бастард-дочерью Рикарда Старка; говорили, что она была красивой девушкой с обаятельным характером. Неизвестно, существовала ли она на самом деле."
 
 asoiaf_Stark_94_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рикон Старк#!"
 asoiaf_Stark_94_modifier_desc:0 "#bold Рикон Старк#! был старшим сыном Кригана Старка от первого брака, но не прожил достаточно долго, чтобы унаследовать Винтерфелл. Он храбро и яростно сражался во время Завоевания Дорна и любил песни. Однако его внезапная гибель в битве под Солнечным Копьём ввергла Север в смуту на долгие годы.\n\n#help Рикон должен иметь детей с женой из #bold династии Мандерли#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Дети Рикарда будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Stark_95_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Сарра Старк#!"
 asoiaf_Stark_95_modifier_desc:0 "#bold Сарра Старк#! была первым ребёнком Кригана Старка от второго брака с Алисанной Блэквуд."
 
 asoiaf_Stark_96_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Элис Старк#!"
 asoiaf_Stark_96_modifier_desc:0 "#bold Элис Старк#! была вторым ребёнком Кригана Старка от второго брака с Алисанной Блэквуд."
 
 asoiaf_Stark_97_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рая Старк#!"
 asoiaf_Stark_97_modifier_desc:0 "#bold Рая Старк#! была третьим ребёнком Кригана Старка от второго брака с Алисанной Блэквуд."
 
 asoiaf_Stark_98_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мария Старк#!"
 asoiaf_Stark_98_modifier_desc:0 "#bold Мария Старк#! была четвёртым ребёнком Кригана Старка от второго брака с Алисанной Блэквуд."
 
 asoiaf_Stark_99_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джоннель Старк#!"
 asoiaf_Stark_99_modifier_desc:0 "#bold Джоннель Старк#!, прозванный #italic Джоннелем-Одноглазым#!, был первенцем Кригана Старка от третьего брака с Линарой Старк и со временем стал лордом Винтерфелла после смерти отца. Его время в истории прошло без крупных событий, но было омрачено безуспешными попытками обзавестись наследниками от двух жён."
 
 asoiaf_Stark_100_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эдрик Старк#!"
 asoiaf_Stark_100_modifier_desc:0 "#bold Эдрик Старк#! был вторым ребёнком Кригана Старка от третьего брака с Линарой Старк.\n\n#help Эдрик должен иметь детей с женой из #bold Дома Старков#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Дети Эдрика будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Stark_101_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лианна Старк#!"
 asoiaf_Stark_101_modifier_desc:0 "#bold Лианна Старк#! была третьим ребёнком Кригана Старка от третьего брака с Линарой Старк."
 
 asoiaf_Stark_102_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бартоган Старк#!"
 asoiaf_Stark_102_modifier_desc:0 "#bold Бартоган Старк#!, прозванный #italic Бартом Чёрным Мечом#!, был лордом Винтерфелла, который храбро повёл войско на Скагос, чтобы подавить восстание на острове. Его стремление действовать смело и решительно привело к преждевременной гибели в бою."
 
 asoiaf_Stark_103_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Брандон Старк#!"
 asoiaf_Stark_103_modifier_desc:0 "#bold Брандон Старк#! был пятым ребёнком Кригана Старка от третьего брака с Линарой Старк.\n\n#help Брандон должен иметь детей с девушкой из #bold династии Феннов#! и/или с женой из #bold Дома Карстарков#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Дети Брандона будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Stark_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рикард Старк#!"
 asoiaf_Stark_1_modifier_desc:0 "#bold Рикард Старк#! был суровым и достойным лордом Винтерфелла, известным спокойной манерой и в то же время властным присутствием. Некоторые считали его честолюбивым: он стремился вывести Север из изоляции, обручив своих детей с влиятельными южанами. В конце концов он встретил гибель, когда отправился на юг искать справедливости из-за предполагаемого похищения дочери, за что король приказал казнить его.\n\n#help Рикард должен иметь детей с женой из #bold Дома Старков#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Stark_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Брандон Старк#!"
 asoiaf_Stark_2_modifier_desc:0 "#bold Брандон Старк#! был высоким, красивым и вспыльчивым юношей, часто действовавшим сперва, а думавшим потом. Он был отличным копейщиком на турнирах и искусным мечником, часами точившим мастерство, чтобы сохранить смертельную остроту клинка. Он любил долгие верховые поездки и не стеснялся брать то, чего хотел, включая женщин."
 
 asoiaf_Stark_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эддард Старк#!"
 asoiaf_Stark_3_modifier_desc:0 "#bold Эддард Старк#!, более известный как #italic Нед#!, стал лордом Винтерфелла после смерти отца и брата. Он — человек чести и долга, но верность старым северным обычаям часто ставила его в противоречие с интриганами южных дворов. Прежде всего он ненавидит убийство детей и невинных.\n\n#help Эддард должен иметь детей с женой из #bold династии Талли#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Stark_5_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лианна Старк#!"
 asoiaf_Stark_5_modifier_desc:0 "#bold Лианна Старк#! была волевой юной девушкой с дикой красотой. Она отлично держалась в седле и даже упражнялась в турнировой езде, когда могла. Цветы всегда привлекали её, особенно аромат свежих зимних роз. Независимость определила многое в её жизни и в итоге привела к тому, что она сбежала с наследным принцем, косвенно вызвав кровавую гражданскую войну, разгоревшуюся под её именем."
 
 asoiaf_Stark_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бенджен Старк#!"
 asoiaf_Stark_4_modifier_desc:0 "#bold Бенджен Старк#! был высоким и суровым мужчиной, но при этом приветливым, с улыбкой в глазах. Он был исполнительным, наблюдательным и идеалистичным, со временем став опытным разведчиком Ночного Дозора. Его характер и мастерство вызывали уважение товарищей, которые привыкли полагаться на его умения и советы."
 
 asoiaf_Stark_6_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Робб Старк#!"
 asoiaf_Stark_6_modifier_desc:0 "#bold Робб Старк#!, известный как #italic Юный Волк#!, был Королём Севера, поднявшим восстание против Железного трона после казни отца. Он был смелым и харизматичным лидером, ценившим семью и долг, но честь стоила ему поддержки знаменосцев и в итоге — жизни."
 
 asoiaf_Stark_7_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джон Сноу#!"
 asoiaf_Stark_7_modifier_desc:0 "#bold Джон Сноу#! был бастардом Винтерфелла и часто выглядел мрачным и одиноким. Несмотря на суровую внешность, он был добросердечным и честным человеком с глубоким чувством справедливости и долга. Он был верен друзьям и семье, но никогда не знал истинной личности собственной матери."
 
 asoiaf_Stark_8_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Санса Старк#!"
 asoiaf_Stark_8_modifier_desc:0 "#bold Санса Старк#! была красивой и достойной леди, но также наивной и романтичной. Она мечтала о рыцарях, песнях и истинной любви, однако её идеализм был разбит суровой реальностью мира. Её использовали разные силы, ей пришлось вынести множество испытаний, и она медленно училась выживать в игре престолов."
 
 asoiaf_Stark_9_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Арья Старк#!"
 asoiaf_Stark_9_modifier_desc:0 "#bold Арья Старк#! была своевольной и дикой девочкой, отвергавшей общественные приличия и предпочитавшей меч игле. Она глубоко ценила семью и друзей и ненавидела тех, кто причинял им вред. Когда семья была разорвана, а она потеряла всё, месть стала её орудием справедливости… и её безмолвной молитвой."
 
 asoiaf_Stark_10_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Брандон Старк#!"
 asoiaf_Stark_10_modifier_desc:0 "#bold Брандон Старк#! был храбрым и дерзким мальчиком, любившим истории, полные ужаса и магии. Он мечтал о рыцарстве, битвах и славе — но мечты рухнули вместе с его ногами. На их месте зашевелилось зелёновидение и силы куда более глубокие."
 
 asoiaf_Stark_11_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рикон Старк#!"
 asoiaf_Stark_11_modifier_desc:0 "#bold Рикон Старк#! был самым младшим и самым диким из детей Старков; ему нравились игры с мечами и военные забавы. Он был вспыльчивым и упрямым мальчиком, но также игривым и заботливым по отношению к семье и друзьям."
 
 asoiaf_Karstark_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рикард Карстарк#!"
 asoiaf_Karstark_4_modifier_desc:0 "Описание."
 
 asoiaf_Reed_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Хоулен Рид#!"
 asoiaf_Reed_1_modifier_desc:0 "#bold Хоулен Рид#! был храбрым и умным лордом Сторожевой башни Серых Вод, который исполнял свой долг и не просил милостей. В юности он был застенчивым и маленьким, и другие мальчишки дразнили его, но он всегда держал голову высоко, несмотря на насмешки. Упрямо преданный близким, он тщательно хранил доверенную тайну друга — такую, что могла бы начать войну.\n\n#help Хоулен должен иметь детей с женой #bold озёрной культуры#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Reed_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мира Рид#!"
 asoiaf_Reed_2_modifier_desc:0 "#bold Мира Рид#! была храброй, решительной и находчивой девушкой, но при этом недоверчивой: ей часто требовалось много времени, чтобы почувствовать себя рядом с человеком свободно. Она была умелой охотницей и верным другом и оставалась преданной загадочной миссии брата, хотя и не до конца её понимала."
 
 asoiaf_Reed_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Жойен Рид#!"
 asoiaf_Reed_3_modifier_desc:0 "#bold Жойен Рид#! был странным юношей, благословлённым зелёновидением, но проклятым непониманием его знаков. Он обладал спокойным, но твёрдым характером и был решим исполнить свою судьбу в грядущей великой борьбе — какой бы малой ни была его роль. Осознавая своё место в будущих событиях, он был удивительно самоотверженным и охотно помогал другим сыграть их роли вместо того, чтобы тянуть одеяло на себя."
 
 asoiaf_Baratheon_75_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Ормунд Баратеон#!"
 asoiaf_Baratheon_75_modifier_desc:0 "#bold Ормунд Баратеон#! был исполнительным и компетентным лордом Штормового Предела и даже недолго служил Десницей короля.\n\n#help Ормунд должен иметь детей с женой из #bold Дома Таргариенов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Baratheon_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Стеффон Баратеон#!"
 asoiaf_Baratheon_1_modifier_desc:0 "#bold Стеффон Баратеон#! был хорошим человеком и прилежным воином. Семьянин, он исполнял ожидаемый от него долг с честью и всегда оставался верен друзьям, что в итоге и привело к его непреднамеренной гибели.\n\n#help Стеффон должен иметь детей с женой из #bold династии Эстермонтов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Baratheon_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Роберт Баратеон#!"
 asoiaf_Baratheon_2_modifier_desc:0 "#bold Роберт Баратеон#! был похотливым и прожорливым, но при этом весёлым королём: он наслаждался привилегиями своего положения, но ненавидел ответственность, которую оно требовало. Он часто транжирил казну на прихоти и не любил, когда советники пытались обуздать его безрассудные траты.\n\n#help Роберт должен иметь детей с женой из #bold Дома Ланнистеров (главная ветвь)#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Множество бастардов Роберта будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Baratheon_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Станнис Баратеон#!"
 asoiaf_Baratheon_3_modifier_desc:0 "#bold Станнис Баратеон#! был упрямым, твёрдым и лишённым обаяния человеком с огромным чувством долга. Он был умелым военачальником, но его любили немногие, что стоило ему поддержки в последующих войнах. Несмотря на это, честолюбие и холодная беспощадность всегда удерживали его цели в поле зрения.\n\n#help Станнис должен иметь детей с женой из #bold династии Флорентов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Baratheon_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Ренли Баратеон#!"
 asoiaf_Baratheon_4_modifier_desc:0 "#bold Ренли Баратеон#! был харизматичным человеком и искусным политиком, завоёвывавшим верность окружающих добротой и магнетизмом. К насилию и крови он относился с неприязнью, предпочитая сосредоточиться на хорошем управлении и нуждах людей."
 
 asoiaf_Baratheon_2_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Аларик Баратеон#!"
 asoiaf_Baratheon_2_1_modifier_desc:0 "#bold Аларик Баратеон#! был первым и единственным законнорождённым ребёнком Роберта Баратеона и Серсеи Ланнистер. Он очень походил на отца, особенно яростной чёрной шевелюрой, и мать называла его бойцом. Вскоре после рождения его настигла лихорадка, и Аларик не сумел одолеть болезнь."
 
 asoiaf_Baratheon_5_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джоффри Баратеон#!"
 asoiaf_Baratheon_5_modifier_desc:0 "#bold Джоффри Баратеон#! был жестоким королём, которому нравилось демонстрировать власть над беспомощными. С ранних лет он тяготел к насилию и жестокости, мучил мелких животных и шокировал окружающих своей бессердечностью. При всём этом он умел скрывать садистическую натуру и выглядеть истинным благородным юношей."
 
 asoiaf_Baratheon_6_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мирцелла Баратеон#!"
 asoiaf_Baratheon_6_modifier_desc:0 "#bold Мирцелла Баратеон#! была доброй и щедрой девочкой, хорошо приспосабливавшейся к меняющимся обстоятельствам. Как многие юные леди, она мечтала о любви и рыцарстве, но почти не понимала игру престолов, разыгрывавшуюся вокруг неё."
 
 asoiaf_Baratheon_7_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Томмен Баратеон#!"
 asoiaf_Baratheon_7_modifier_desc:0 "#bold Томмен Баратеон#! был милым, но наивным юным королём, который в детстве часто становился жертвой издевательств старшего брата Джоффри. Несмотря на опасности вокруг, Томмен вырос тёплым и щедрым человеком, всегда готовым слушать других и учиться их мудрости."
 
 asoiaf_Baratheon_3_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Петир Баратеон#!"
 asoiaf_Baratheon_3_1_modifier_desc:0 "#bold Петир Баратеон#! был первенцем Станниса Баратеона, но родился мёртвым. После родов его мать, Селиса Флорент, сохранила его тело в стеклянной банке, не желая отпускать."
 
 asoiaf_Baratheon_3_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Томмард Баратеон#!"
 asoiaf_Baratheon_3_2_modifier_desc:0 "#bold Томмард Баратеон#! был вторым сыном Станниса Баратеона, но родился мёртвым. После родов его мать, Селиса Флорент, сохранила его тело в стеклянной банке, не желая отпускать."
 
 asoiaf_Baratheon_3_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эдрик Баратеон#!"
 asoiaf_Baratheon_3_3_modifier_desc:0 "#bold Эдрик Баратеон#! был третьим сыном Станниса Баратеона, но родился мёртвым. После родов его мать, Селиса Флорент, сохранила его тело в стеклянной банке, не желая отпускать."
 
 asoiaf_Baratheon_13_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Ширен Баратеон#!"
 asoiaf_Baratheon_13_modifier_desc:0 "#bold Ширен Баратеон#! была четвёртым ребёнком Станниса Баратеона и единственной, кто пережил роды. Это была любознательная девочка, любившая учиться и всегда видевшая в людях лучшее."
 
 asoiaf_Cole_11_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Кристон Коль#!"
 asoiaf_Cole_11_modifier_desc:0 "#bold Кристон Коль#!, прозванный #italic Делателем королей#!, был гордым, благородным человеком и непревзойдённым воином. Честь была его высшей добродетелью, но он с трудом соответствовал её требованиям, что причиняло ему сильные душевные муки. Он оставался безусловно верен Алисенте Хайтауэр и её детям — одним из немногих, кто проявлял к нему уважение и видел его таким, каким он хотел быть."
 
 asoiaf_Lannister_129_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Титос Ланнистер#!"
 asoiaf_Lannister_129_modifier_desc:0 "#bold Титос Ланнистер#!, прозванный #italic Смеющимся Львом#!, был весёлым лордом Кастерли-Рока, который легко заводил друзей и всегда стремился угодить окружающим, прощая даже обиды. Из-за этого его считали слабовольным и слишком доверчивым; вассалы и придворные часто пользовались этим, что в итоге привело к мятежу против власти Ланнистеров.\n\n#help Титос должен иметь детей с женой из #bold династии Марбрандов#!, чтобы продолжить свою линию.#!"

 asoiaf_Lannister_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Тайвин Ланнистер#!"
 asoiaf_Lannister_1_modifier_desc:0 "#bold Тайвин Ланнистер#! был беспощадным, расчётливым и честолюбивым человеком, всегда стремившимся возвысить свой Дом — даже если ради этого приходилось жертвовать нуждами собственной семьи. Человек своей эпохи, он хотел выковать долговечное наследие, но не сумел передать преемникам свой хитрый прагматизм и в итоге сделал так, что его наследие оказалось недолговечным.\n\n#help Тайвин должен иметь детей с женой из #bold Дома Ланнистеров (главная ветвь)#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Lannister_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Киван Ланнистер#!"
 asoiaf_Lannister_2_modifier_desc:0 "#bold Киван Ланнистер#! был надёжным и серьёзным человеком, но не гордым и не жестоким. Он был компетентным администратором с практическим складом ума и предпочитал мирные решения, вместо того чтобы рисковать полным разорением ради смелых авантюр. Мудрый и проницательный советник, он хорошо понимал игру престолов вокруг него, но часто отказывался участвовать в ней, пока это не становилось абсолютно необходимым.\n\n#help Киван должен иметь детей с женой из #bold династии Свифтов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Lannister_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дженна Ланнистер#!"
 asoiaf_Lannister_3_modifier_desc:0 "#bold Дженна Ланнистер#! была расчётливой и умной девушкой с властной манерой, более чем готовой командовать мужчинами, которых считала бездарными."
 
 asoiaf_Lannister_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Тайгетт Ланнистер#!"
 asoiaf_Lannister_4_modifier_desc:0 "#bold Тайгетт Ланнистер#! был храбрым мечником с дерзким духом. Всю жизнь он пытался быть самим собой и найти место под солнцем, но его неизменно поглощала тень старшего брата, против которой он часто бунтовал.\n\n#help Тайгетт должен иметь детей с женой из #bold династии Марбрандов#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X [asoiaf_canon_children_concept|E] Тайгетта будут добавлены позднее.#!"
 
 asoiaf_Lannister_5_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Герион Ланнистер#!"
 asoiaf_Lannister_5_modifier_desc:0 "#bold Герион Ланнистер#! был смелым, но безрассудным человеком — первым смеялся и заставлял улыбаться окружающих. Он был добр по натуре и быстро владел мечом, участвовал в турнирах и жаждал приключений. Пока братья играли в игру престолов, бесконечно беспокоясь о репутации и славе, он предпочитал вовсе держаться в стороне от подобных распрей."
 
 asoiaf_Lannister_6_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Серсея Ланнистер#!"
 asoiaf_Lannister_6_modifier_desc:0 "#bold Серсея Ланнистер#! была беспощадной, коварной и красивой девушкой, любившей немногих и доверявшей ещё меньшему. Она была необычайно высокомерной и эгоцентричной, считала себя великим стратегом, но невольно оставалась лишь фигурой в игре престолов.\n\n#help Серсея должна иметь детей с мужчиной из #bold Дома Ланнистеров (главная ветвь)#! из своей #bold близкой или дальней родни#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Lannister_7_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейме Ланнистер#!"
 asoiaf_Lannister_7_modifier_desc:0 "#bold Джейме Ланнистер#!, известный как #italic Цареубийца#!, внешне казался холодным, высокомерным и бесчестным человеком, но внутри был совсем другим. Он был человеком действия и искусным мечником, часто принимал импульсивные решения и говорил прямо. Чувство чести жило в нём глубоко, но его часто погребали слои высокомерия и безразличия, выработанные как ответ на пережитые травмы."
 
 asoiaf_Lannister_8_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Тирион Ланнистер#!"
 asoiaf_Lannister_8_modifier_desc:0 "#bold Тирион Ланнистер#!, известный как #italic Бес#!, был необычайно умным человеком, но физически искалеченным. Вместо меча он пользовался сообразительностью и превосходным умом, перехитряя врагов. Он стал искусным и хитрым игроком в игре престолов, но отец постоянно его недооценивал и презирал из-за карликовости."
 
 asoiaf_Lannister_9_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лансель Ланнистер#!"
 asoiaf_Lannister_9_modifier_desc:0 "#bold Лансель Ланнистер#! был заносчивым и жадным юношей. Охотно пользуясь именем и положением, он искал богатство и значимость, где только мог. При этом он был наивен в политике и чаще всего становился пешкой в чужой игре. Получив страшную рану в бою, он нашёл веру и изменил свою жизнь — к добру или к худу."
 
 asoiaf_Lannister_10_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Виллем Ланнистер#!"
 asoiaf_Lannister_10_modifier_desc:0 "#bold Виллем Ланнистер#! был мягким юношей робкого нрава и часто позволял брату-близнецу говорить за двоих, сам же слушал. С детства он был спокойным и сдержанным и предпочитал доверять людям, ожидая от них лучшего."
 
 asoiaf_Lannister_11_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мартин Ланнистер#!"
 asoiaf_Lannister_11_modifier_desc:0 "#bold Мартин Ланнистер#! был добрым и любознательным юношей. Бесконечно любопытный, он не мог удержаться от вопросов, когда чего-то не понимал. В нём была мягкая наивность, заставлявшая доверять другим и принимать их суждения, но когда это было важно, он не боялся постоять за себя и тех, кого любил."
 
 asoiaf_Lannister_12_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейни Ланнистер#!"
 asoiaf_Lannister_12_modifier_desc:0 "#bold Джейни Ланнистер#! была четвёртым ребёнком Кивана Ланнистера и Дорны Свифт."
 
 asoiaf_Arryn_80_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эмма Аррен#!"
 asoiaf_Arryn_80_modifier_desc:0 "#bold Эмма Аррен#! была нежной матерью и исполнительной женой, старавшейся сделать лучшее для семьи и мужа. Как и у её матери, у неё было хрупкое телосложение, из-за чего деторождение давалось тяжело; в конце концов это привело к её смерти, когда последние роды потребовали вмешательства ценой её жизни."
 
 asoiaf_Arryn_84_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейна Аррен#!"
 asoiaf_Arryn_84_modifier_desc:0 "#bold Джейна Аррен#!, известная как #italic Дева Долины#!, была гордой и справедливой леди Долины, не любившей, когда чужаки вмешиваются в её владения. Она умела распознавать ложь, обман и недосказанность и предпочитала прямоту и честность от тех, с кем имела дело."
 
 asoiaf_Arryn_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джон Аррен#!"
 asoiaf_Arryn_3_modifier_desc:0 "#bold Джон Аррен#! был благородным и честным лордом Долины, удержавшим королевство вместе в ранние годы правления короля Роберта I. Все уважали его прилежание, беспристрастие и чувство долга, но он сильно презирал игру престолов и тех, кто в неё играет, и в конце концов сам стал одной из её жертв.\n\n#help Джон должен иметь детей с женой из #bold династии Талли#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Arryn_7_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джейна Аррен#!"
 asoiaf_Arryn_7_modifier_desc:0 "#bold Джейна Аррен#! была первенцем Джона Аррена от первого брака с Джейной Ройс, но родилась мёртвой. Её назвали в честь матери."
 
 asoiaf_Arryn_8_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Робин Аррен#!"
 asoiaf_Arryn_8_modifier_desc:0 "#bold Робин Аррен#!, прозванный #italic Сладким Робином#!, был болезненным и избалованным лордом Долины, которого после преждевременной смерти отца растила исключительно мать — Лиза Талли. Его баловали, ни в чём не отказывали и не приучали к дисциплине до внезапной смерти матери. Такое воспитание сделало его социально неловким и психически нестабильным, однако при правильном наставнике он мог бы прийти к лучшей судьбе."
 
 asoiaf_Arryn_8_alt_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Роберт Аррен#!"
 asoiaf_Arryn_8_alt_modifier_desc:0 "#bold Роберт Аррен#!, прозванный «Сладким Робином», был болезненным и избалованным лордом Долины, которого после преждевременной смерти отца растила исключительно мать — Лиза Талли. Его баловали, ни в чём не отказывали и не приучали к дисциплине до внезапной смерти матери. Такое воспитание сделало его социально неловким и психически нестабильным, однако при правильном наставнике он мог бы прийти к лучшей судьбе."
 
 asoiaf_Arryn_3_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Первое мертворождённое дитя Лизы#!"
 asoiaf_Arryn_3_1_modifier_desc:0 "Этот персонаж был первенцем Лизы Талли и родился мёртвым."
 
 asoiaf_Arryn_3_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Второе мертворождённое дитя Лизы#!"
 asoiaf_Arryn_3_2_modifier_desc:0 "Этот персонаж был вторым ребёнком Лизы Талли и родился мёртвым."
 
 asoiaf_Baelish_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Петир Бейлиш#!"
 asoiaf_Baelish_2_modifier_desc:0 "#bold Петир Бейлиш#! был человеком скромного происхождения, но колоссальных амбиций. Он был хитрым, непредсказуемым, лживым и совершенно беспощадным в погоне за целями. Из-за его тихого влияния начинались и заканчивались войны, а короли поднимались и падали. Он умел надевать дружелюбную маску, но некоторые могли заглянуть за неё и увидеть истинные мотивы."
 
 asoiaf_Hightower_90_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Отто Хайтауэр#!"
 asoiaf_Hightower_90_modifier_desc:0 "#bold Отто Хайтауэр#! был спокойным и расчётливым человеком, исполнительным в обязанностях, но беспощадно честолюбивым. Холодный прагматизм был его сутью: он обращал собственных детей в пешки большой игры. При этом он искренне любил семью и стремился сделать всё, что в его силах, чтобы защитить и возвысить близких.\n\n#help Отто должен иметь детей с женой из #bold династии Флорентов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Hightower_96_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бриндон Хайтауэр#!"
 asoiaf_Hightower_96_modifier_desc:0 "#bold Бриндон Хайтауэр#! был первенцем Отто Хайтауэра и Алири Флорент.\n\n#help Бриндон должен иметь детей с женой #bold культуры просторцев#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Дети Бриндона будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Hightower_97_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Алисента Хайтауэр#!"
 asoiaf_Hightower_97_modifier_desc:0 "#bold Алисента Хайтауэр#! была верной и учёной девушкой, решившей соответствовать ожиданиям окружающих — даже ценой собственного счастья. Она была глубоко благочестива и презирала тех, кто не исполнял долг и не соблюдал нравы. Но одновременно ей самой было трудно всегда поступать так же: она часто видела, как «правильное» вступает в конфликт с политической реальностью вокруг."
 
 asoiaf_Hightower_98_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Майлс Хайтауэр#!"
 asoiaf_Hightower_98_modifier_desc:0 "#bold Майлс Хайтауэр#! был третьим ребёнком Отто Хайтауэра и Алири Флорент.\n\n#help Майлс должен иметь детей с женой #bold культуры просторцев#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Дети Майлса будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Hightower_99_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Гвейн Хайтауэр#!"
 asoiaf_Hightower_99_modifier_desc:0 "#bold Гвейн Хайтауэр#! был гордым и общительным человеком, известным мимолётным высокомерием. При всём этом он всегда был готов признать ошибку и воздать должное там, где это заслужено. Он замечал и ценил труд вне зависимости от того, кто именно его выполнял."
 
 asoiaf_Tyrell_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лютор Тирелл#!"
 asoiaf_Tyrell_4_modifier_desc:0 "#bold Лютор Тирелл#! был добросердечным человеком и лордом Хайгардена. Будучи умел в постели и страстным охотником, он при этом оставался простофилей, не способным уловить тонкости политики и придворных интриг и потому часто полагался на жену, чтобы она решала такие дела за него.\n\n#help Лютор должен иметь детей с женой из #bold династии Редвинов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Tyrell_8_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мейс Тирелл#!"
 asoiaf_Tyrell_8_modifier_desc:0 "#bold Мейс Тирелл#! был приветливым и весёлым лордом Хайгардена, который легко доверял и часто опирался на политическую хватку матери, чтобы править эффективно. Любящий отец и преданный муж, он любил общество и наслаждался едой и песнями. В нём жила и честолюбивая жилка: он был полон решимости увидеть свою дочь королевой.\n\n#help Мейс должен иметь детей с женой из #bold династии Хайтауэров#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Tyrell_9_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Мина Тирелл#!"
 asoiaf_Tyrell_9_modifier_desc:0 "#bold Мина Тирелл#! была вторым ребёнком Лютора Тирелла и Оленны Редвин."
 
 asoiaf_Tyrell_10_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Джанна Тирелл#!"
 asoiaf_Tyrell_10_modifier_desc:0 "#bold Джанна Тирелл#! была третьим ребёнком Лютора Тирелла и Оленны Редвин. Общительная женщина, она любила проводить время с другими, обмениваться сплетнями за чашей вина или в танце. Ей нравилась соколиная охота вместе с другими дамами двора, и она всегда заботилась о своей семье."
 
 asoiaf_Tyrell_11_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Уиллас Тирелл#!"
 asoiaf_Tyrell_11_modifier_desc:0 "#bold Уиллас Тирелл#! был добросердечным человеком, которого готовили править Хайгарденом после отца. Несмотря на давление учиться, он так и не заинтересовался воинскими делами и предпочитал книги, соколиную охоту и другие занятия лорда. Его знали как прощающего и вдумчивого человека, верного семье."
 
 asoiaf_Tyrell_12_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Гарлан Тирелл#!"
 asoiaf_Tyrell_12_modifier_desc:0 "#bold Гарлан Тирелл#! был честным человеком с большим талантом к фехтованию. Он не желал славы и наград и предпочитал оттачивать умения и воинскую доблесть ради них самих. Как и его братья и сёстры, он был твёрдо предан семье и делал всё необходимое, чтобы защитить близких и укрепить положение Дома."
 
 asoiaf_Tyrell_13_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лорас Тирелл#!"
 asoiaf_Tyrell_13_modifier_desc:0 "#bold Лорас Тирелл#!, известный как #italic Рыцарь Цветов#!, был искусным и популярным рыцарем, жившим беззаботно: он ездил по турнирам и проводил время с теми, кто ему дорог. Он был упрямым человеком, но обходительным со всеми вокруг. Лорас также любил изящные вещи: он носил элегантно узорчатые одежды и богато выгравированные доспехи — благодаря богатству отца."
 
 asoiaf_Tyrell_14_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Маргери Тирелл#!"
 asoiaf_Tyrell_14_modifier_desc:0 "#bold Маргери Тирелл#! была умной, доброй и щедрой королевой, умевшей очаровывать людей и завоёвывать их сердца; её любили и простолюдины, и знать. За внешней мягкостью скрывались хитрость и амбиции: она была полна решимости добиться власти королевы и удержать её."
 
 asoiaf_Tarly_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Рэндилл Тарли#!"
 asoiaf_Tarly_1_modifier_desc:0 "#bold Рэндилл Тарли#! был человеком грозной славы и одним из лучших полководцев своего времени. Он держал семью в железной хватке, ценил имя Тарли выше всего и упрямо не принимал отклонений от того, какими, по его мнению, должны быть их ценности. Его беспощадность в исполнении того, что он считал своим долгом, доходила до угроз жизни старшему сыну, когда тот не оправдывал ожиданий.\n\n#help Рэндилл должен иметь детей с женой из #bold династии Флорентов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Tarly_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Сэмвелл Тарли#!"
 asoiaf_Tarly_2_modifier_desc:0 "#bold Сэмвелл Тарли#! был робким, неловким и книжным юношей — казалось, полной противоположностью воинской славе своего Дома. Однако он был также верным, сострадательным и решительным человеком; в нём жила глубоко спрятанная храбрость, которую друзья помогли ему открыть. Больше всего он любил читать и учиться, предпочитая общество мейстеров рыцарям и солдатам."
 
 asoiaf_Tarly_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Талла Тарли#!"
 asoiaf_Tarly_3_modifier_desc:0 "#bold Талла Тарли#! была добросердечной и энергичной девушкой, всегда видевшей в людях лучшее. По натуре щедрая, она была готова отдавать собственные вещи тем, кто нуждался больше, и в процессе быстро становилась с ними друзьями."
 
 asoiaf_Tarly_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Саманта Тарли#!"
 asoiaf_Tarly_4_modifier_desc:0 "#bold Саманта Тарли#! была третьим ребёнком Рэндилла Тарли и Мелессы Флорент."
 
 asoiaf_Tarly_5_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Сансара Тарли#!"
 asoiaf_Tarly_5_modifier_desc:0 "#bold Сансара Тарли#! была четвёртым ребёнком Рэндилла Тарли и Мелессы Флорент."
 
 asoiaf_Tarly_6_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Дикон Тарли#!"
 asoiaf_Tarly_6_modifier_desc:0 "#bold Дикон Тарли#! был добрым и честным юношей, воспитанным истинным лордом-наследником и исполнявшим свой долг. Он хорошо подходил для охоты и воинских дел и обладал упрямой честностью, с которой и ушёл в могилу."
 
 asoiaf_Martell_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Доран Мартелл#!"
 asoiaf_Martell_4_modifier_desc:0 "#bold Доран Мартелл#! был осторожным, задумчивым и тонким человеком, склонным долго размышлять над делами. При этом он не сидел сложа руки: он посвящал себя семье и мести ради неё. Пока чужие пламенные страсти заставляли многих жить лишь настоящим, Доран всегда держал в голове всю картину целиком и нередко казался кротким тем, кто не знал его истинных целей.\n\n#help Доран должен иметь детей с женой #bold норвосийской культуры#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Martell_9_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Арианна Мартелл#!"
 asoiaf_Martell_9_modifier_desc:0 "#bold Арианна Мартелл#! была честолюбивой и любящей приключения девушкой, которой нравилось пользоваться красотой, обвивая мужчин вокруг пальца. Она была столь же смела, как любой мужчина, и готова рискнуть жизнью и конечностями, а также опасностями войны, если это продвигало её цели. Она была близка с дядей и кузенами, но разница в возрасте и напряжение вокруг наследования не позволили ей по-настоящему сблизиться с братьями и сёстрами."
 
 asoiaf_Martell_10_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Квентин Мартелл#!"
 asoiaf_Martell_10_modifier_desc:0 "#bold Квентин Мартелл#! был искренним и исполнительным человеком, но всегда осторожным и полным сомнений. Глубоко преданный друзьям и семье, он делал всё, чтобы заслужить одобрение отца и исполнить ожидаемое от него. Ему было куда комфортнее изучать истории, чем ухаживать за женщинами, и он свободно говорил на нескольких языках."
 
 asoiaf_Martell_11_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Тристан Мартелл#!"
 asoiaf_Martell_11_modifier_desc:0 "#bold Тристан Мартелл#! был галантным юношей и романтиком в душе. Красивый и нежный, он нравился многим женщинам, но сам не интересовался распутством. Вместо этого он был справедлив и исполнителен, верен семье и своей любви и был полностью готов рискнуть жизнью ради их защиты."
 
 asoiaf_Dayne_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Берик Дейн#!"
 asoiaf_Dayne_1_modifier_desc:0 "#bold Берик Дейн#! был отцом Улрика, Артура, Ашары и Аллирии Дейн.\n\n#help Берик должен иметь детей с женой #bold дорнийской культуры#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Dayne_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Улрик Дейн#!"
 asoiaf_Dayne_3_modifier_desc:0 "#bold Улрик Дейн#! был первенцем Берика Дейна и стал лордом Звездопада после отца.\n\n#help Улрик должен иметь детей с женой #bold дорнийской культуры#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Dayne_5_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Артур Дейн#!"
 asoiaf_Dayne_5_modifier_desc:0 "#bold Артур Дейн#!, известный как #italic Меч Зари#!, был смертоносным мечником и рыцарем истинной доблести. Владея легендарным клинком своего Дома, он мог победить почти любого врага и стал предметом восхищения для молодых рыцарей по всем Семи Королевствам."
 
 asoiaf_Dayne_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эшара Дейн#!"
 asoiaf_Dayne_4_modifier_desc:0 "#bold Эшара Дейн#! была ослепительно красивой девушкой с пронзительными глазами. В ней была дружелюбная манера, и её любили многие, хотя она оставалась загадкой и даже самым близким людям так и не становилась по-настоящему понятной. Трагедия завершилась её смертью, когда она бросилась в море с вершины башни, посеяв волну скорби среди всех, кто её знал."
 
 asoiaf_Dayne_6_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Аллирия Дейн#!"
 asoiaf_Dayne_6_modifier_desc:0 "#bold Аллирия Дейн#! была четвёртым ребёнком Берика Дейна."
 
 asoiaf_Dayne_7_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эдрик Дейн#!"
 asoiaf_Dayne_7_modifier_desc:0 "#bold Эдрик Дейн#! был добродушным и воспитанным юным лордом Звездопада, хоть и робким. Он всегда стремился исполнять свой долг и даже продолжал служить оруженосцем своему рыцарю, когда тот стал вне закона."
 
 asoiaf_Tully_1_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Хостер Талли#!"
 asoiaf_Tully_1_modifier_desc:0 "#bold Хостер Талли#! был гордым и глубоко упрямым человеком. Он ставил долг перед Домом превыше всего — даже если это означало разлад с собственным братом или принуждение дочери к выкидышу от бастарда. При всём этом он любил семью и на старости лет сожалел о своих поступках; последнее решение преследовало его до самой смерти.\n\n#help Хостер должен иметь детей с женой из #bold династии Уэнтов#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Tully_9_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бринден Талли#!"
 asoiaf_Tully_9_modifier_desc:0 "#bold Бринден Талли#! был прямолинейным и циничным человеком и никогда не стеснялся выражать мнение. Хотя большинство семьи его любило, отношения со старшим братом были трудными: тот не понимал его стремления к независимости. Тем не менее он был предан семье и был готов сражаться за близких даже против безнадёжных шансов."
 
 asoiaf_Tully_2_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эдмунд Талли#!"
 asoiaf_Tully_2_modifier_desc:0 "#bold Эдмунд Талли#! был первенцем Хостера Талли, но родился мёртвым."
 
 asoiaf_Tully_3_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Денис Талли#!"
 asoiaf_Tully_3_modifier_desc:0 "#bold Денис Талли#! был вторым сыном Хостера Талли, но родился мёртвым."
 
 asoiaf_Tully_4_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Кейтилин Талли#!"
 asoiaf_Tully_4_modifier_desc:0 "#bold Кейтилин Талли#! была исполнительной и сложной девушкой. Хотя она пыталась жить по словам своего Дома, она часто оказывалась с ними в противоречии. Прежде всего она была матерью и была готова на всё, чтобы защитить детей. Ради этого в ней проявлялась и смелость: она могла решиться на дерзкие действия, если это обещало долгосрочную безопасность её детям."
 
 asoiaf_Tully_5_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Леди Каменное Сердце#!"
 asoiaf_Tully_5_modifier_desc:0 "#bold Леди Каменное Сердце#! была мстительной, жестокой и одержимой одной целью девушкой, искривлённой горем из-за гибели детей в прежней жизни, когда она была Кейтилин Талли. После резни она решила добиться смерти каждого Фрея и Ланнистера — и невиновного, и виновного."
 
 asoiaf_Tully_6_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лиза Талли#!"
 asoiaf_Tully_6_modifier_desc:0 "#bold Лиза Талли#! была ревнивой и неуравновешенной девушкой. Бесконечно завидуя старшей сестре, она стала замкнутой, холодной и апатичной и впадала в приступы гнева на тех, кого считала угрозой. Она была глубоко душевно больна и болезненно привязана к сыну: она избаловала его и не позволяла никакой самостоятельности. Её слепая преданность тайному любовнику достигала опасных высот и доходила даже до убийства."
 
 asoiaf_Tully_7_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Эдмур Талли#!"
 asoiaf_Tully_7_modifier_desc:0 "#bold Эдмур Талли#! был добрым, но гордым человеком. Хотя он был компетентным военным лидером, импульсивность часто мешала ему видеть более широкие стратегические замыслы. При этом он оставался исполнительным, верным семье и умел признавать и приносить извинения за ошибки.\n\n@warning_icon! #X Ребёнок Эдмура от Рослин Фрей будет добавлен в канонические дети позднее.#!"
 
 asoiaf_Tully_8_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Патрек Талли#!"
 asoiaf_Tully_8_modifier_desc:0 "#bold Патрек Талли#! был шестым ребёнком Хостера Талли, но родился мёртвым."
 
 asoiaf_Strong_28_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Саймон Стронг#!"
 asoiaf_Strong_28_modifier_desc:0 "#bold Саймон Стронг#! был расчётливым человеком с быстрым умом и высоко ценил верность — и семье, и законному сюзерену. Он добросовестно исполнял обязанности и говорил правду тем, кому служил, даже если это могло навлечь на него их гнев.\n\n#help Саймон должен иметь детей с женой #bold культуры Речных земель#!, чтобы продолжить свою линию.#!\n\n@warning_icon! #X Дети Саймона будут добавлены в [asoiaf_canon_children_concept|E] позднее.#!"
 
 asoiaf_Strong_29_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лионель Стронг#!"
 asoiaf_Strong_29_modifier_desc:0 "#bold Лионель Стронг#! был хорошим и верным лордом Харренхола, а также прилежным советником, способным давать советы без корысти. У него был острый политический ум, но он старался использовать его на службе королю, предлагая честность и прозорливость там, где многие думали лишь об амбициях.\n\n#help Лионель должен иметь детей с женой #bold культуры Речных земель#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Strong_34_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Элис Риверс#!"
 asoiaf_Strong_34_modifier_desc:0 "#bold Элис Риверс#! была загадочной девушкой, окутанной тайнами. Честная до дерзости, она умела задеть людей за живое, но её советы были несомненно мудры. Она была умелой целительницей и, по слухам, ведьмой, которая, казалось, не старела — некоторые считали её куда старше, чем она выглядела. Другие утверждали, что она была бастардом лорда Лионеля Стронга, но убедительных доказательств не было ни у одной версии."
 
 asoiaf_Strong_30_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Харвин Стронг#!"
 asoiaf_Strong_30_modifier_desc:0 "#bold Харвин Стронг#!, прозванный #italic Костоломом#!, был свирепым и отважным человеком, до самоотречения верным тем, кого любил. Несмотря на грубую внешность, у него было заботливое сердце и ласковая рука."
 
 asoiaf_Strong_31_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Ларис Стронг#!"
 asoiaf_Strong_31_modifier_desc:0 "#bold Ларис Стронг#! был хитрым и безжалостным лордом Харренхола, который не видел ничего дурного в убийстве и даже в братоубийстве. Он мастерски надевал дружелюбную маску, чтобы завоевать доверие людей, а затем затягивал их в свою паутину, делая зависимыми от его услуг."
 
 asoiaf_Strong_32_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Кейтилин Стронг#!"
 asoiaf_Strong_32_modifier_desc:0 "#bold Кейтилин Стронг#! была третьим ребёнком Лионеля Стронга."
 
 asoiaf_Strong_33_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Лиза Стронг#!"
 asoiaf_Strong_33_modifier_desc:0 "#bold Лиза Стронг#! была четвёртым ребёнком Лионеля Стронга."
 
 asoiaf_Greyjoy_5_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Бейлон Грейджой#!"
 asoiaf_Greyjoy_5_modifier_desc:0 "#bold Бейлон Грейджой#! был упрямым и гордым лордом Пайка, который не желал видеть дальше собственных амбиций. Его величайшим желанием было править независимым государством железнорождённых и вернуть народу традиции грабежей и набегов. Однако упрямство стало его погибелью: он пренебрегал практичной военной стратегией ради действий, не приносивших значимых выгод, и в итоге обременил войска ненужными потерями и истощением, закрепив поражение.\n\n#help Бейлон должен иметь детей с женой из #bold династии Харлоу#!, чтобы продолжить свою линию.#!"
 
 asoiaf_Greyjoy_11_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Родрик Грейджой#!"
 asoiaf_Greyjoy_11_modifier_desc:0 "#bold Родрик Грейджой#! был суровым человеком, известным пьяными ссорами и храбростью в бою. Как и младший брат, он внушал окружающим и восхищение, и страх."
 
 asoiaf_Greyjoy_12_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Марон Грейджой#!"
 asoiaf_Greyjoy_12_modifier_desc:0 "#bold Марон Грейджой#! был известен жестокими шутками и навязчивой лживостью, а также храбростью перед лицом подавляющих шансов. Как и старший брат, он внушал окружающим и восхищение, и страх."
 
 asoiaf_Greyjoy_13_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Яра Грейджой#!"
 asoiaf_Greyjoy_13_modifier_desc:0 "#bold Яра Грейджой#! была железнорождённой до кончиков ногтей: смелой, умной, решительной и гордой. Она была чрезвычайно упрямой и острой на язык, бросала вызов традициям, становясь свирепой воительницей и твёрдым лидером — она даже командовала собственными кораблями и людьми вдвое старше себя. Несмотря на внешнюю суровость, она глубоко любила семью и была готова на многое ради её защиты."
 asoiaf_Greyjoy_13_alt_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Аша Грейджой#!"
 asoiaf_Greyjoy_13_alt_modifier_desc:0 "#bold Аша Грейджой#! была железнорождённой до кончиков ногтей: смелой, умной, решительной и гордой. Она была чрезвычайно упрямой и острой на язык, бросала вызов традициям, становясь свирепой воительницей и твёрдым лидером — она даже командовала собственными кораблями и людьми вдвое старше себя. Несмотря на внешнюю суровость, она глубоко любила семью и была готова на многое ради её защиты."
 
 asoiaf_Greyjoy_14_modifier:0 "[asoiaf_canon_children_concept|E]: #bold Теон Грейджой#!"
 asoiaf_Greyjoy_14_modifier_desc:0 "#bold Теон Грейджой#! был честолюбивым, высокомерным и тщеславным юношей, но не злым по своей природе. Он тщательно поддерживал образ самоуверенного удалого молодца, однако под внешней уверенностью часто скрывались неуверенность и сомнения. После более чем года жестоких пыток его разум сломался, и он превратился в тихую, сломленную, полубезумную тень прежнего себя."