  agotcities_ruins.1000.t: "[completed_ruin_castamere.GetName]: восстановление завершено"
  agotcities_ruins.1000.a: "Кастамере будет стоять вечно"
  agotcities_ruins.1000.d: "Камень за камнем, кирпич за кирпичом — и вот перед вами полностью возрождённое сооружение, прежде обречённое рассыпаться в забвении и прахе. С помощью мейстеров и каменщиков руины восстановили, стараясь как можно точнее воспроизвести первоначальный облик.\n\n[completed_ruin_castamere.GetName] вновь стоит нерушимо. Шахты уже приносят богатство, а высокие двойные стены хранят нас от опасности.\n\nУсвоив уроки прошлого, мы замуровали старые речные штольни и прорубили новые высоко в горах."

  building_type_broadarch_01: "Замок Широкая Арка"
  building_type_broadarch_01_desc: "В летописях Вестероса древняя крепость Широкая Арка, родовая твердыня дома Стедмон, предстаёт загадочным свидетельством прихотливого хода времени. Основанный ещё до Века Героев замок скрыт туманом древности, а его происхождение окутывает намеренная недосказанность, которую поддерживает дом Стедмон. В семейных архивах хранится необычное утверждение, будто первые фундаменты Широкой Арки заложили у извилистой реки Виль в сумрачные времена Первых людей."

  building_broadarch_01: "Замок Широкая Арка"
  building_broadarch_01_desc: "В летописях Вестероса древняя крепость Широкая Арка, родовая твердыня дома Стедмон, предстаёт загадочным свидетельством прихотливого хода времени. Основанный ещё до Века Героев замок скрыт туманом древности, а его происхождение окутывает намеренная недосказанность, которую поддерживает дом Стедмон. В семейных архивах хранится необычное утверждение, будто первые фундаменты Широкой Арки заложили у извилистой реки Виль в сумрачные времена Первых людей."



  building_type_ironwrath_01: "Крепость Железный Холм"
  building_type_ironwrath_01_desc: "Внушительную крепость Железный Холм возвёл Седрик Форрестер более чем за тысячу лет до Завоевания Эйгона, и многие считают её величайшей на Севере. Говорят, даже Старки Винтерфелльские завидовали красоте и мощи замка, стоящего на опушке величайшего на Севере леса железностволов."

  building_ironwrath_01: "Крепость Железный Холм"
  building_ironwrath_01_desc: "Внушительную крепость Железный Холм возвёл Седрик Форрестер более чем за тысячу лет до Завоевания Эйгона, и многие считают её величайшей на Севере. Говорят, даже Старки Винтерфелльские завидовали красоте и мощи замка, стоящего на опушке величайшего на Севере леса железностволов."

  building_type_hornhill_01: "Замок Рогов Холм"
  building_type_hornhill_01_desc: "Согласно легенде, замок на Роговом Холме построили братья Харлон Охотник и Герндон Рог, близнецы и сыновья Гарта Зеленорукого. В Век Сотни Королевств, до объединения Простора под властью его королей, королевство западных марок простиралось от Рогова Холма до Ночной Песни."

  building_hornhill_01: "Замок Рогов Холм"
  building_hornhill_01_desc: "Согласно легенде, замок на Роговом Холме построили братья Харлон Охотник и Герндон Рог, близнецы и сыновья Гарта Зеленорукого. В Век Сотни Королевств, до объединения Простора под властью его королей, королевство западных марок простиралось от Рогова Холма до Ночной Песни."


  building_type_fanghill_01: "Крепость на Холме Клыка"
  building_type_fanghill_01_desc: "Крепость на Холме Клыка — древний форпост, которым по традиции владеет знаменосец Утёса Кастерли. Укрепление стоит на высоком холме: к востоку от него лежат реки, а к западу — Ланниспорт. Отсюда лорд Холма Клыка может либо перехватить вражеское войско на подступах к городу, либо ударить во фланг нападающим, когда те осадят Ланниспорт."

  building_fanghill_01: "Крепость на Холме Клыка"
  building_fanghill_01_desc: "Крепость на Холме Клыка — древний форпост, которым по традиции владеет знаменосец Утёса Кастерли. Укрепление стоит на высоком холме: к востоку от него лежат реки, а к западу — Ланниспорт. Отсюда лорд Холма Клыка может либо перехватить вражеское войско на подступах к городу, либо ударить во фланг нападающим, когда те осадят Ланниспорт."


  building_type_the_arbor_01: "Порты Арбора"
  building_type_the_arbor_01_desc: "Весь остров Арбор усеян портами и гаванями. Нигде в Вестеросе не растут столь сладкие и сочные виноград и персики. Продажа арборских вин, особенно уникального золотого вина, которое производят только здесь, наполнила казну небольшого острова.\n\nИз-за особого географического положения и скромных размеров по сравнению с крупными городами Вестероса каждый житель Арбора либо выращивает фрукты, либо делает вино, либо строит корабли. Поэтому остров славится лишь двумя вещами: кораблями и вином."

  building_the_arbor_01: "Порты Арбора"
  building_the_arbor_01_desc: "Весь остров Арбор усеян портами и гаванями. Нигде в Вестеросе не растут столь сладкие и сочные виноград и персики. Продажа арборских вин, особенно уникального золотого вина, которое производят только здесь, наполнила казну небольшого острова.\n\nИз-за особого географического положения и скромных размеров по сравнению с крупными городами Вестероса каждый житель Арбора либо выращивает фрукты, либо делает вино, либо строит корабли. Поэтому остров славится лишь двумя вещами: кораблями и вином."

  building_type_cow_runestone_01: "Рунный Камень"
  building_type_cow_runestone_01_desc: "Рунный Камень, древняя вотчина дома Ройс, видел сражения задолго до прихода андалов — и ещё много веков после него."
  building_cow_runestone_01: "Бронзовые Врата"
  building_cow_runestone_01_desc: "Крепость древних Бронзовых королей защищают огромные врата с бронзовыми украшениями и древними рунами, высеченными на камнях надвратной башни."

  building_type_flint_tower_01: "Кремнёвая башня"
  building_type_flint_tower_01_desc: "Кремнёвая башня — старый, обветренный каменный форт и родовая твердыня малого дома Бейлиш. Насмешники называют её Угрюмым фортом. Укрепление настолько тесно, что в нём нет даже окон — лишь несколько бойниц."
  building_flint_tower_01: "Кремнёвая башня"
  building_flint_tower_01_desc: "Кремнёвая башня — старый, обветренный каменный форт и родовая твердыня малого дома Бейлиш. Насмешники называют её Угрюмым фортом. Укрепление настолько тесно, что в нём нет даже окон — лишь несколько бойниц."

  building_type_agot_lonely_light_01:0 "Последний Свет"
  building_type_agot_lonely_light_01_desc:0 "Одинокий Свет, самая западная точка известного мира, служит последним маяком перед тёмной неизвестностью за Закатным морем. Мейстеры и другие учёные считают мир круглым, однако ни одно известное путешествие ещё не завершило такой путь."
  building_agot_lonely_light_01:0 "Дальний маяк"
  building_agot_lonely_light_01_desc:0 "$building_type_agot_lonely_light_01_desc$"
  building_agot_lonely_light_02:0 "Штормовой форпост"
  building_agot_lonely_light_02_desc:0 "На соседнем скальном выступе поднялась вторая башня. Две твердыни связаны верёвочными мостами и несгибаемой волей. Люди Одинокого Света начали укрощать камень и прибой, расширяя далёкий форпост."
  building_agot_lonely_light_03:0 "Закатный Дозор"
  building_agot_lonely_light_03_desc:0 "Теперь против Закатного моря стоят три башни, а их сигнальные огни пылают наперекор смертоносной бездне впереди. Одинокий Свет стал чем-то большим, чем маяк: он несёт дозор на краю мира."
  building_agot_lonely_light_04:0 "Бастион Закатного моря"
  building_agot_lonely_light_04_desc:0 "Там, где прежде стояла одинокая башня, теперь возвышается морской бастион. Скалу обтесали, прибой укротили, и Одинокий Свет вооружился против бурь и вражеских парусов."
  building_agot_lonely_light_05:0 "Крепость на краю света"
  building_agot_lonely_light_05_desc:0 "Одинокий Свет — уже не просто огонёк во тьме, а крепость на краю мира. Её башни поднимаются из разбитого камня, словно рёбра утонувшего левиафана, бросая вызов бескрайнему Закатному морю и всякому, кто выступит против их лорда."

