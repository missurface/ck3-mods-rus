l_russian:

  rule_use_rebuilt_crag: "#V #bold COW-AGOT#!#!: Скала"
  setting_yes_use_rebuilt_crag: "Полностью восстановлена"
  setting_yes_use_rebuilt_crag_desc: "В начале игры Скала представляет собой полностью отстроенный и действующий замок."
  setting_no_use_rebuilt_crag: "Начать с руин"
  setting_no_use_rebuilt_crag_desc: "#P По умолчанию#!: в начале игры Скала представляет собой обветшавший, сильно повреждённый замок, который предстоит восстановить."

  building_ashemark_01: "Эшмарк"
  building_ashemark_01_desc: "Эшмарк — крепость в Западных землях и историческая резиденция дома Марбранд.\n\nБлагодаря стратегическому положению у истоков Камнегонки и над Королевским трактом, ведущим на запад из Речных земель, владелец замка всегда имел большое влияние на восточной границе Западных земель."
  building_type_ashemark_01: "Эшмарк"
  building_type_ashemark_01_desc: "Эшмарк — крепость в Западных землях и историческая резиденция дома Марбранд.\n\nБлагодаря стратегическому положению у истоков Камнегонки и над Королевским трактом, ведущим на запад из Речных земель, владелец замка всегда имел большое влияние на восточной границе Западных земель."

  building_lordsport_01: "Лордспорт"
  building_lordsport_01_desc: "Лордспорт — небольшой портовый город на северном побережье Пайка.\n\nЭто один из немногих настоящих городов Железных островов, крупный торговый центр и средоточие жизни архипелага.\n\nНо даже будучи городом, Лордспорт полон железнорождённых и остаётся суровым местом для любого купца, решившего пристать к берегу и разгрузить товары."
  building_type_lordsport_01: "Лордспорт"
  building_type_lordsport_01_desc: "Лордспорт — небольшой портовый город на северном побережье Пайка.\n\nЭто один из немногих настоящих городов Железных островов, крупный торговый центр и средоточие жизни архипелага.\n\nНо даже будучи городом, Лордспорт полон железнорождённых и остаётся суровым местом для любого купца, решившего пристать к берегу и разгрузить товары."

  building_high_hermitage_01: "Горный Приют"
  building_high_hermitage_01_desc: "Эту древнюю крепость дома Дейн за долгую историю не раз разрушали и отстраивали заново.\n\nГорный Приют издавна служил убежищем Дейнам и их союзникам, занимая стратегически важное место в долине Быстроводной.\n\nПодступиться к замку можно лишь с юга, преодолев коварную Быстроводную, поэтому он ни разу не попал в руки врага."
  building_type_high_hermitage_01: "Горный Приют"
  building_type_high_hermitage_01_desc: "Эту древнюю крепость дома Дейн за долгую историю не раз разрушали и отстраивали заново.\n\nГорный Приют издавна служил убежищем Дейнам и их союзникам, занимая стратегически важное место в долине Быстроводной.\n\nПодступиться к замку можно лишь с юга, преодолев коварную Быстроводную, поэтому он ни разу не попал в руки врага."

  building_type_deepwood_motte_01: "Темнолесье"
  building_type_deepwood_motte_01_desc: "Темнолесье — небольшой замок типа мотт и бейли, построенный домом Гловер на месте, откуда в Век Героев его представители правили как малые короли.\n\nЭтот старый, но не особенно мощный замок стоит в Волчьем лесу на широком округлом холме с плоской вершиной. На вершине возвышается каменный донжон, с одной стороны которого вырастает дозорная башня высотой ещё в пятьдесят футов — самое высокое сооружение по эту сторону северных гор."
  building_deepwood_motte_01: "Темнолесье"
  building_deepwood_motte_01_desc: "Темнолесье — небольшой замок типа мотт и бейли, построенный домом Гловер на месте, откуда в Век Героев его представители правили как малые короли.\n\nЭтот старый, но не особенно мощный замок стоит в Волчьем лесу на широком округлом холме с плоской вершиной. На вершине возвышается каменный донжон, с одной стороны которого вырастает дозорная башня высотой ещё в пятьдесят футов — самое высокое сооружение по эту сторону северных гор."

  building_type_agot_blackhaven_01: "Чёрный Приют"
  building_type_agot_blackhaven_01_desc: "Чёрный Приют, одна из древних крепостей марочных лордов, издавна сдерживал дорнийцев и их налётчиков."
  building_agot_blackhaven_01: "Замок Чёрный Приют"
  building_agot_blackhaven_01_desc: "После того как древнюю крепость сжёг Король-Стервятник — дорнийский разбойник, восставший против короля Эйниса I Таргариена, — замок отстроили заново из тёмного базальта.\n\nНовая крепость стала символом силы и стойкости марочных лордов."


  building_bearisland_01: "Усадьба Мормонтов"
  building_bearisland_01_desc: "Медвежий остров издавна был предметом спора между Севером и Железными островами. Тысячи лет назад им правил северный дом Вудфут, затем остров захватили древние железнорождённые и использовали для господства над Закатным морем, пока дом Мормонт не вернул его Северу силой оружия.\n\nОстровом управляют из Усадьбы Мормонтов, возведённой Мормонтами взамен разрушенного замка Вудфутов.\n\nЭто обнесённый деревянными стенами замок с каменным Большим чертогом под куполом, опирающимся на каркас из огромных брёвен. Вокруг него тянется палисад из камня и дерева."
  building_type_bearisland_01: "Усадьба Мормонтов"
  building_type_bearisland_01_desc: "Медвежий остров издавна был предметом спора между Севером и Железными островами. Тысячи лет назад им правил северный дом Вудфут, затем остров захватили древние железнорождённые и использовали для господства над Закатным морем, пока дом Мормонт не вернул его Северу силой оружия.\n\nОстровом управляют из Усадьбы Мормонтов, возведённой Мормонтами взамен разрушенного замка Вудфутов.\n\nЭто обнесённый деревянными стенами замок с каменным Большим чертогом под куполом, опирающимся на каркас из огромных брёвен. Вокруг него тянется палисад из камня и дерева."

  building_planky_town_special: "Дощатый Город"
  building_planky_town_special_desc: "Дощатый Город — крупнейшее и самое многолюдное поселение Дорна, а также его главная гавань.\n\nОн стоит в устье Зеленокровной. Вместо улиц здесь проложены доски, давшие городу название, а многие дома, чертоги и лавки устроены на шестовых лодках, баржах и торговых судах, связанных пеньковыми канатами и покачивающихся на приливе.\n\nТорговые галеры Вольных городов часто заходят в Дощатый Город, а таинственные сироты Зеленокровной торгуют здесь с купцами из-за Узкого моря."
  building_type_planky_town_special: "Дощатый Город"
  building_type_planky_town_special_desc: "Дощатый Город — крупнейшее и самое многолюдное поселение Дорна, а также его главная гавань.\n\nОн стоит в устье Зеленокровной. Вместо улиц здесь проложены доски, давшие городу название, а многие дома, чертоги и лавки устроены на шестовых лодках, баржах и торговых судах, связанных пеньковыми канатами и покачивающихся на приливе.\n\nТорговые галеры Вольных городов часто заходят в Дощатый Город, а таинственные сироты Зеленокровной торгуют здесь с купцами из-за Узкого моря."

  building_karhold_0l: "Серый вал"
  building_karhold_01_desc: "Кархолд был могучей крепостью ещё до того, как им завладел Карлон Старк. Два укрепления стоят на вершинах огромных холмов и соединены большим мостом из пеньковых канатов и тёсаных брёвен, а сама местность обеспечивает им грозную естественную защиту.\n\nНу и, конечно, не стоит забывать об исполинских стенах."
  building_type_karhold_01_special: "Крепость Кархолд"
  building_type_karhold_01_special_desc: "Кархолд был могучей крепостью ещё до того, как им завладел Карлон Старк. Два укрепления стоят на вершинах огромных холмов и соединены большим мостом из пеньковых канатов и тёсаных брёвен, а сама местность обеспечивает им грозную естественную защиту.\n\nНу и, конечно, не стоит забывать об исполинских стенах."


  building_type_oldstones_old_final: "Руины Старых Камней"
  building_oldstones_old_final: "Руины Старых Камней"
  building_oldstones_old_final_desc:1 "От родовой твердыни дома Мадд, откуда его короли правили Королевством Рек и Холмов, остались лишь фундаменты.\n\nСреди руин стоит огромная резная гробница, в которой погребён последний король Маддов — Тристифер IV.\n\nКамень потрескался и крошится по углам, белеет пятнами лишайника, а дикие розы оплели ноги короля и уже тянутся к его груди."

  building_oldstones_old_new: "Замок Старые Камни"
  building_oldstones_old_new_desc:1 "Наконец исправлено злодеяние, которое древние короли Аррены и их андальские последователи учинили над Старыми Камнями.\n\nЗамок Старые Камни вновь охраняет окрестные земли и стоит дозором над Королевским трактом."

  building_type_oldstones_restored_final: "Замок Старые Камни"
  building_oldstones_restored_final: "Замок Старые Камни"
  building_oldstones_restored_final_desc:1 "Наконец исправлено злодеяние, которое древние короли Аррены и их андальские последователи учинили над Старыми Камнями.\n\nЗамок Старые Камни вновь охраняет окрестные земли и стоит дозором над Королевским трактом."

  building_type_ten_towers_01: "Десять башен"
  building_ten_towers_01: "Десять башен"
  building_ten_towers_01_desc:1 "Десять башен — новейший замок Железных островов. Его построили, чтобы избежать множества смертей от болезней, которые порождала сырость в древнем, часто затопляемом Харлоу-холле.\n\nДля нового замка выбрали более подходящее место, однако спешка строительства и нехватка материалов потребовали необычных решений. В итоге все десять башен замка отличаются друг от друга."


  building_type_palestone_sword_01: "Бледнокаменный Меч"
  building_palestone_sword_01: "Бледнокаменный Меч"
  building_palestone_sword_01_desc:1 "Более десяти тысяч лет назад Дейны проследили путь упавшей звезды до острова в устье Быстроводной, где возвели замковый город Звездопад.\n\nИз металла той звезды выковали легендарный клинок Рассвет, а точное место её падения Дейны отметили величественной башней, видной за много лиг, — Бледнокаменным Мечом.\n\nЭта башня, величайшая в Дорне, и поныне напоминает о богатой истории, могуществе и славе дома Дейн."

  building_type_seagard_01: "Сигард"
  building_seagard_01: "Сигард"
  building_seagard_01_desc:1 "Сигард изначально возвели как грозную крепость для защиты побережья Речных земель от железнорождённых разорителей. Он стоит на утёсах над заливом Железных Людей, а со временем вокруг него вырос процветающий порт, облегчивший торговлю Речных земель с Простором и более далёкими державами.\n\nНа небольшом острове напротив замка возвышается Гулкая башня, названная так из-за огромного бронзового колокола. При виде разорителей или опасной бури его звон созывает горожан и жителей окрестностей под защиту замка."


  building_type_castamere_01: "Кастамере"
  building_type_castamere_01_desc: "Кастамере"

  building_type_24castamere_01: "Кастамере"
  building_type_24castamere_01_desc: "Кастамере"

  building_24castamere_01: "Новый замок"
  building_24castamere_01_desc: "После восстановления руин Новый замок стал вечным свидетельством красоты и могущества, которыми дом Рейн славился на протяжении веков.\n\nЭта скромная, но грозная крепость, в точности повторяющая прежнюю и окружённая двойным кольцом стен, вновь защищает богатства и величие, скрытые под землёй."

  building_24castamere_02: "Львиная гавань"
  building_24castamere_02_desc: "Золото и серебро текут рекой, торговля процветает. Кастамере встаёт в один ряд с великими городами западного побережья — Ланниспортом, Староместом и Арбором.\n\nС основанием Львиной гавани у нас появились порт и причалы, способные соперничать с владениями других великих держав. Наше богатство растёт, а вместе с ним по свету распространяется и наша культура."

  building_24castamere_03: "Сияющий город"
  building_24castamere_03_desc: "Наши богатство, престиж, слава и могущество растут. Расширяя подземные чертоги и окружая себя всё большей роскошью, мы также позолотим башни, чтобы весь мир помнил о величии Кастамере."


  building_agot_castamere_02: "Львиная гавань"
  building_agot_castamere_02_desc: "Золото и серебро текут рекой, торговля процветает. Кастамере встаёт в один ряд с великими городами западного побережья — Ланниспортом, Староместом и Арбором.\n\nС основанием Львиной гавани у нас появились порт и причалы, способные соперничать с владениями других великих держав. Наше богатство растёт, а вместе с ним по свету распространяется и наша культура."

  building_agot_castamere_03: "Сияющий город"
  building_agot_castamere_03_desc: "Наши богатство, престиж, слава и могущество растут. Расширяя подземные чертоги и окружая себя всё большей роскошью, мы также позолотим башни, чтобы весь мир помнил о величии Кастамере."


  building_type_agot_breakwater_01: "Замок Волнолом"
  building_type_agot_breakwater_01_desc: "Замок Волнолом защищает город Систертон на Трёх Сёстрах.\n\nСистертон — маленький и убогий городок, пропитанный запахами свиного навоза и гниющей рыбы. Его улицы сложены из грязи и досок, а дома представляют собой крытые соломой лачуги из плетня и глины. У Виселичных ворот всегда болтаются повешенные с вывалившимися внутренностями.\n\nКак и сам город, замок приспособлен к контрабанде и пиратству, а не к пышности и торжественным церемониям других знатных домов."
  building_agot_breakwater_01: "Замок Волнолом"
  building_agot_breakwater_01_desc: "Замок Волнолом защищает город Систертон на Трёх Сёстрах.\n\nСистертон — маленький и убогий городок, пропитанный запахами свиного навоза и гниющей рыбы. Его улицы сложены из грязи и досок, а дома представляют собой крытые соломой лачуги из плетня и глины. У Виселичных ворот всегда болтаются повешенные с вывалившимися внутренностями.\n\nКак и сам город, замок приспособлен к контрабанде и пиратству, а не к пышности и торжественным церемониям других знатных домов."

  building_type_agot_duskendale_01: "Сумеречный форт"
  building_type_agot_duskendale_01_desc: "Родовая твердыня дома Дарклин, откуда его представители правили как малые короли."
  building_agot_duskendale_01: "Зал Белых мечей"
  building_agot_duskendale_01_desc: "В стенах Сумеречного форта Зал Белых мечей даёт лучшую подготовку будущим рыцарям и воинам.\n\nС самого основания ордена дом Дарклин дал Королевской гвардии немало братьев, а турнирам — множество славных рыцарей, поэтому Зал Белых мечей издавна служит предметом гордости и замка, и города."

  building_type_cow_duskendale_01: "Сумеречный форт"
  building_type_cow_duskendale_01_desc: "Родовая твердыня дома Дарклин, откуда его представители правили как малые короли."
  building_cow_duskendale_01: "Сумеречный форт"
  building_cow_duskendale_01_desc: "В Век Сотни Королевств древний Сумеречный форт в Сумеречном Доле был резиденцией малых королей из дома Дарклин, правивших окрестными землями.\n\nНыне форт остаётся символом могущества Первых людей и важным экономическим центром региона."

  building_type_crag_01: "Скала"
  building_type_crag_01_desc: "Родовая твердыня дома Вестерлинг."
  building_crag_01: "Руины Скалы"
  building_crag_01_desc: "От некогда великой крепости Скалы теперь осталось больше руин, чем замка.\n\nБогатые местные рудники давно иссякли, и средств на устранение ущерба, который веками наносили набеги железнорождённых, не осталось."
  building_crag_02: "Скала"
  building_crag_02_desc: "Хотя внешние укрепления по-прежнему носят следы многовекового запустения, внутренние стены и башни Скалы кропотливо восстановлены.\n\nСердце замка вновь дарит укрытие и безопасность — скромное напоминание о былом могуществе. Казна по-прежнему пуста, но бережливое управление и упорный труд вернули владетелям Скалы часть былой гордости и защиты."
  building_crag_03: "Скала"
  building_crag_03_desc: "Скала вновь блистает великолепием, а её башни и стены возвышаются, как в славные времена.\n\nБывший символ упадка превратился в крепость камня и моря, возрождённую богатством, волей и решимостью. Она снова гордо господствует над побережьем, её знамёна трепещут на солёном ветру, напоминая: Скала выстоит там, где другие рассыпались в прах."

  building_type_crag_full: "Скала"
  building_type_crag_full_desc: "Родовая твердыня дома Вестерлинг."
  building_crag_full: "Скала"
  building_crag_full_desc: "Скала, родовая твердыня дома Вестерлинг, гордо возвышается над волнами Закатного моря. Её башни и зубчатые стены стерегут каменистое побережье, а чертоги хранят память о древнем роде и чести дома, пережившего и удачу, и невзгоды.\n\nПусть Скала никогда не была величайшим замком Западных земель, она остаётся символом стойкости западников: крепкие стены и непоколебимые лорды неустанно охраняют скалистые берега."

  building_type_agot_whitegrove_01: "Белая Роща"
  building_type_agot_whitegrove_01_desc: "Белая Роща — любимое место отдыха дома Пик и самая малая из его твердынь."
  building_agot_whitegrove_01: "Белая Роща"
  building_agot_whitegrove_01_desc: "Белая Роща, укрытая в глубине пышных лесов, испокон веков служила высшим лордам личным охотничьим домом и поместьем для отдыха.\n\nВдали от суеты великих крепостей её небольшие, но изысканные чертоги принимают узкий круг гостей, охотничьи отряды и тех, кто ищет уединения.\n\nОкрестные леса полны дичи, а сады и рощи поместья содержатся в безупречном порядке, поэтому лорды Простора особенно любят отдыхать здесь."

  building_type_agot_dunstonbury_01: "Данстонбери"
  building_type_agot_dunstonbury_01_desc: "Северная резиденция дома Пик, охраняющая важную переправу через Мандер."
  building_agot_dunstonbury_01: "Данстонбери"
  building_agot_dunstonbury_01_desc: "Данстонбери возводился как северное убежище и господствует над важным бродом через Мандер. Его прочные стены охраняют торговлю и путешественников на этой стратегической переправе.\n\nХотя замок строили для обороны, в прежние времена он также служил летней резиденцией: просторные чертоги и сады у реки дарили желанную передышку от южного зноя.\n\nОтсюда лорд Данстонбери надзирает за одной из важнейших дорог Простора, сочетая отдых с бдительностью."

  building_type_cow_rooks_rest_01: "Грачиный Приют"
  building_type_cow_rooks_rest_01_desc: "Грачиный Приют — крепкая прибрежная крепость, с высоты которой открывается широкий вид на море и небеса за пределами Королевских земель. Исторически принадлежавший дому Стонтон замок известен стаями чёрных грачей, гнездящихся в его башнях. Пусть он и не величайшая твердыня Королевских земель, высокие стены и господствующее положение издавна делали его ценным оплотом — и заманчивой целью во время войн."
  building_cow_rooks_rest_01: "Грачиный Приют"
  building_cow_rooks_rest_01_desc: "Грачиный Приют — крепкая прибрежная крепость, с высоты которой открывается широкий вид на море и небеса за пределами Королевских земель. Исторически принадлежавший дому Стонтон замок известен стаями чёрных грачей, гнездящихся в его башнях.\n\nПусть он и не величайшая твердыня Королевских земель, прочные стены издавна делали его ценным оплотом — и заманчивой целью во время войн."



  building_type_agot_rooks_rest_01: "Грачиный Приют"
  building_type_agot_rooks_rest_01_desc: "Грачиный Приют — крепкая прибрежная крепость, с высоты которой открывается широкий вид на море и небеса за пределами Королевских земель. Исторически принадлежавший дому Стонтон замок известен стаями чёрных грачей, гнездящихся в его башнях. Пусть он и не величайшая твердыня Королевских земель, высокие стены и господствующее положение издавна делали его ценным оплотом — и заманчивой целью во время войн."
  building_agot_rooks_rest_01: "Грачиный Приют"
  building_agot_rooks_rest_01_desc: "Грачиный Приют — крепкая прибрежная крепость, с высоты которой открывается широкий вид на море и небеса за пределами Королевских земель. Исторически принадлежавший дому Стонтон замок известен стаями чёрных грачей, гнездящихся в его башнях.\n\nПусть он и не величайшая твердыня Королевских земель, прочные стены издавна делали его ценным оплотом — и заманчивой целью во время войн.\n\nКогда-то крепость стала свидетелем одного из самых известных драконьих сражений в истории державы. Во время Танца Драконов у Грачиного Приюта сошлись Мелеис, Солнечный Огонь и Вхагар: с небес обрушились пламя и ярость, а Почти королева встретила свой конец.\n\nКамни замка давно восстановили, но обугленная память того дня живёт в каждом грачином крике и каждой тени на его стенах."

  building_type_yronwood_01: "Замок Айронвуд"
  building_type_yronwood_01_desc: "В древности замок Айронвуд был резиденцией могущественных королей из дома Айронвуд.\n\nЭта грозная крепость стоит у южного конца Костяного пути, охраняя его от вторжений.\n\nЗащищённые замком земли плодородны и покрыты лесами, а в их недрах залегают железо, олово и серебро. Айронвуд славится чистым, сладким горным воздухом, а на высоких лугах к северу от замка свежо днём и прохладно ночью."
  building_yronwood_01: "Замок Айронвуд"
  building_yronwood_01_desc: "В древности замок Айронвуд был резиденцией могущественных королей из дома Айронвуд.\n\nЭта грозная крепость стоит у южного конца Костяного пути, охраняя его от вторжений.\n\nЗащищённые замком земли плодородны и покрыты лесами, а в их недрах залегают железо, олово и серебро. Айронвуд славится чистым, сладким горным воздухом, а на высоких лугах к северу от замка свежо днём и прохладно ночью."

  building_castamere_01: "Око Неведомого"
  building_castamere_01_desc: "После полного разгрома и уничтожения Кастамере Тайвином Ланнистером лорд Утёса Кастерли приказал разобрать древнюю крепость до основания и затопить шахты.\n\nПоскольку большая часть Кастамере находилась под землёй, о месте некогда великой цитадели теперь напоминает лишь Око Неведомого — огромный проём в приморской горе, служивший первым и древнейшим входом в шахты Кастамере.\n\nНыне Око Неведомого напоминает о смерти, которую несёт Неведомый."
  building_castamere_02: "Новый замок"
  building_castamere_02_desc: "Из-за обширного затопления подземных залов приходится избрать иной путь, чем древние лорды Кастамере: строить на поверхности и врезаться в ту самую гору, где когда-то добывали серебро и золото.\n\nЧтобы никто не забыл о сокровищах в глубине, немного золота, которое ещё удаётся извлечь из шахт, пойдёт на украшение нового дворца — как обещание светлого будущего."
  building_castamere_03: "Великая гавань"
  building_castamere_03_desc: "Новый замок одновременно великолепен и надёжен. Благодаря его выгодному положению лорд Кастамере способен распространять власть и влияние на север Западных земель.\n\nЗатопленные шахты внизу уже не сулят лёгкого богатства, зато защищённая бухта, доступная через Око Неведомого, обещает прибыль от новых торговых путей и при этом легко обороняется."
  building_castamere_04: "Светоч мира"
  building_castamere_04_desc: "Богатства, стекающиеся в Великую гавань, быстро превратили Кастамере в один из величайших мировых центров торговли.\n\nОднако обещание наживы привлекло пиратов и соперников. В ответ у входа в бухту будет возведён великий маяк с дополнительными укреплениями.\n\nТорговые корабли смогут быстрее заходить в гавань, а наши силы — в любой момент выступить на помощь судну, попавшему в беду.\n\nНовый маяк и форт станут для мира светочем — и в прямом, и в переносном смысле."
  building_castamere_05: "Обещание весны... и золота"
  building_castamere_05_desc: "Огромные богатства свободно текут в Великую гавань и позволяют украшать всю провинцию, привлекая сюда величайшие умы мира и владельцев самых тяжёлых кошельков.\n\nГруппа инженеров из Миэрина предложила откачать воду из затопленных шахт.\n\nЧто ещё заманчивее, они утверждают, будто владеют новыми способами укрепления тоннелей, которые позволят копать ещё глубже и вскрыть нетронутые жилы золота и серебра."
  building_castamere_06: "Возрождённый город"
  building_castamere_06_desc: "Богатство и влияние Кастамере теперь не уступают любому другому городу мира. Для потока купцов, ремесленников и простых крестьян, ищущих лучшей доли, требуется новое жильё.\n\nНовый город даст рабочие руки для дальнейшего роста и слуг, которым можно поручить повседневные заботы, избавив нас от этих дел."



  building_type_hightide_01: "Цитадель Высокого Прилива"
  building_type_hightide_01_desc: "Высокий Прилив был резиденцией Морского Змея — лорда Корлиса Велариона, одного из богатейших и могущественнейших лордов Семи Королевств.\n\nНакопив в Эссосе несметные сокровища, Корлис построил Высокий Прилив взамен сырого и тесного родового замка Веларионов на Дрифтмарке и перенёс туда Трон из плавника.\n\nВо время Танца Драконов Веларионы встали на сторону чёрных. После битвы в Глотке зелёные уничтожили Спайстаун, а мирийские и тирошийские воины предали Высокий Прилив огню."
  building_hightide_01: "Замок Высокий Прилив"
  building_hightide_01_desc: "Новый замок, воссоздающий облик прежней цитадели Высокого Прилива, сложен из светлого камня, привезённого из Долины, — того же материала, из которого построено Орлиное Гнездо.\n\nСтройные башни венчают крыши из чеканного серебра, сияющие на солнце. Во время прилива в Черноводном заливе замок соединяет с островом Дрифтмарк лишь узкая дамба.\n\nОстаётся надеяться, что новый замок простоит дольше прежнего."

  stepstoner: "Пират Ступеней"
  agot_tradition_stepstones_name: "Пираты Ступеней"
  agot_tradition_stepstones_desc: "Пираты Ступеней — страшное зрелище для любого торгового судна, пересекающего Узкое море."
  culture_parameter_unlock_maa_stepstone_pirates: "Доступны военные подразделения пиратов Ступеней"


