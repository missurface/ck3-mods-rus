#Colony
 #Colony Buildings
  building_type_local_markets_01:0 "Местные рынки"
  building_local_markets_01:0 "Местные рынки"
  building_local_markets_01_desc:0 "Сеть оживлённых торговых площадей, где купцы предлагают свои товары, крестьяне обменивают урожай, а ремесленники продают свои изделия. Эти рынки составляют экономическое сердце поселения, обеспечивая постоянный поток товаров, монет и процветания."

  building_type_colony_quarries_01:0 "Каменоломни"
  building_colony_quarries_01:0 "Простые каменоломни"
  building_colony_quarries_01_desc:0 "Легкодоступный камень обеспечивает строительными материалами ближайшие постройки."

  building_type_colony_forestry_01:0 "Лесопильни"
  building_colony_forestry_01:0 "Лесоповальные лагеря"
  building_colony_forestry_01_desc:0 "Лесорубы разбили лагерь на опушке леса, обеспечивая непрерывную заготовку древесины."

  building_type_colony_port_01:0 "Порты"
  building_colony_port_01:0 "Колониальная гавань"
  building_colony_port_01_desc:0 "Специализированный порт, способствующий торговле и транспортировке, укрепляющий экономику и связность поселения."
  building_type_colony_port_01_desc:0 "Специализированный порт, способствующий торговле и транспортировке, укрепляющий экономику и связность поселения."

  #Blockers
	lv_wilderness_blocker_effect:0 "@warning_icon! #X Это здание является преградой, которую необходимо устранить, полностью улучшив его, прежде чем поселение можно будет превратить в полноценное владение#!"
  lv_wilderness_blocker_effect_mines:0 "$lv_wilderness_blocker_effect$\n@warning_icon! #X Огненные черви могут появляться каждый год и опустошать поселение#!"
  lv_wilderness_blocker_effect_plague:0 "$lv_wilderness_blocker_effect$\n@warning_icon! #X Каждый год есть шанс вспышки чумы#!"
  lv_wilderness_blocker_effect_raid:0 "$lv_wilderness_blocker_effect$\n@warning_icon! #X Каждый год возможны набеги на поселение#!"
  lv_firewyrm_blocker_effect:0 "@warning_icon! #X Это здание является преградой, которую необходимо устранить, убив огненного червя в этой провинции, прежде чем поселение можно будет превратить в полноценное владение#!"

  #Caves
  building_type_unexplored_caves_01:0 "Неисследованные пещеры"
  building_unexplored_caves_01:0 "Неизведанные глубины"
  building_unexplored_caves_01_desc:0 "Тёмные, извилистые тоннели уходят вглубь под землю, не тронутые ни светом, ни картами. Шёпот эхом разносится среди камней, и каждый шаг рискует пробудить то, что сокрыто. Неизвестность властвует здесь, а опасность — неизбежна."
  building_unexplored_caves_02:0 "Размеченные тоннели"
  building_unexplored_caves_02_desc:0 "Исследователи начали прокладывать путь сквозь мрак. Грубые метки и временные лагеря обозначают границы изученного, но многое остаётся скрытым во тьме. Угроза ослабла — но не исчезла."
  building_unexplored_caves_03:0 "Обследованные пещеры"
  building_unexplored_caves_03_desc:0 "Пещеры раскрыли свои тайны. Пути нанесены на карту, опасности каталогизированы, стабильность достигнута. Хотя осторожность всё ещё уместна, подземные дебри были укрощены."

  #Firewyrms
  building_type_firewyrm_lair:0 "Логово огненного червя"
  building_firewyrm_lair:0 "Логово огненного червя"
  building_firewyrm_lair_desc:0 "Земля изрыта почерневшими тоннелями и дымящимися расщелинами. Огненный червь был замечен или ощутим — обугленный скот, проваленная земля и нарастающий жар предупреждают о его присутствии. Немногие осмеливаются войти."

  building_type_firewyrms_01:0 "Огненные черви"
  building_firewyrms_01:0 "Опалённые норы"
  building_firewyrms_01_desc:0 "Земля изрыта почерневшими тоннелями и дымящимися расщелинами. Огненные черви были замечены или ощутимы — обугленный скот, проваленная земля и нарастающий жар предупреждают об их присутствии. Немногие осмеливаются войти."
  building_firewyrms_02:0 "Обрушенные тоннели"
  building_firewyrms_02_desc:0 "Существа были загнаны глубже или убиты, а многие их тоннели засыпаны или обрушены. Случайные толчки или всплески жара ещё случаются, но худшее позади."
  building_firewyrms_03:0 "Остывшая земля"
  building_firewyrms_03_desc:0 "Земля успокоилась, огонь погас. Огненные черви были истреблены или бежали за пределы досягаемости. Хотя земля всё ещё несёт их шрамы, по ней снова можно ступать без страха."

  #Hostile Swamp
  building_type_swamp:0 "Враждебное болото"

  building_type_swamp_01_01:0 "$building_type_swamp$"
  building_swamp_01_01:0 "Топкая местность"
  building_swamp_01_01_desc:0 "Мягкая, вязкая земля засасывает сапоги и повозки. Продвижение замедляется, строения проседают, а сырость проникает повсюду. Естественная преграда для расширения."
  building_swamp_01_02:0 "Осушённые земли"
  building_swamp_01_02_desc:0 "Прорыты каналы, проложены настилы, и влажная земля начинает подсыхать. Почва ещё неустойчива, но уступает настойчивости и планированию."
  building_swamp_01_03:0 "Отвоёванные болота"
  building_swamp_01_03_desc:0 "Некогда преграда — теперь фундамент. Болото осушено и преобразовано в пригодную местность, готовую принять поселения и линии снабжения."

  building_type_swamp_02_01:0 "$building_type_swamp$"
  building_swamp_02_01:0 "Затопленная трясина"
  building_swamp_02_01_desc:0 "Коварное пространство из грязи и стоячей воды, где каждый шаг грозит падением в топь. Фундаменты гниют, болезни множатся, а передвижение — медленная, удушающая борьба."
  building_swamp_02_02:0 "Укреплённая трясина"
  building_swamp_02_02_desc:0 "Проложены приподнятые тропы и возведены временные опоры, сдерживающие грязь. Земля сопротивляется прогрессу, но упорные усилия прокладывают путь сквозь трясину."
  building_swamp_02_03:0 "Стабилизированная трясина"
  building_swamp_02_03_desc:0 "Земля укреплена, а вода укрощена. Трясина более не грозит поглотить всех, кто ступает в неё. Она всё ещё несёт следы прошлого, но достаточно прочна для развития."

  #Floods
  building_type_lv_floods_01:0 "Наводнения"
  building_lv_floods_01:0 "Затопленная земля"
  building_lv_floods_01_desc:0 "Сильные дожди или подъём воды затопили местность, превратив дороги в реки, а поля — в топь. Поселения отрезаны, а под водой таится опасность."
  building_lv_floods_02:0 "Спадающие воды"
  building_lv_floods_02_desc:0 "Паводковые воды начали отступать, но земля остаётся неустойчивой и коварной. Расчистка началась, однако передвижение и восстановление по-прежнему ограничены."
  building_lv_floods_03:0 "Осушённая местность"
  building_lv_floods_03_desc:0 "Последние воды были отведены или впитались. Земля ещё несёт шрамы и размокла, но по ней снова можно ходить, пахать и строить заново."

  #Noxious Gases
  building_type_noxious_gases:0 "Ядовитые газы"

  building_type_noxious_gases_01_01:0 "$building_type_noxious_gases$"
  building_noxious_gases_01_01:0 "Густая дымка"
  building_noxious_gases_01_01_desc:0 "Далеко от эпицентра извержения вулканические туманы всё ещё скапливаются. Эти испарения стелются низко, просачиваясь в трещины и впадины, ослабляя незащищённых и удушая беспечных. Это тихая угроза — но ничуть не менее реальная."
  building_noxious_gases_01_02:0 "Рассеивающаяся дымка"
  building_noxious_gases_01_02_desc:0 "Туманы колеблются, превращаясь из стены в вуаль. Дышать легче, хотя случайный порыв газа ещё напоминает жалящим укусом о былой опасности. Восстановление идёт, но осторожность должна направлять каждый шаг."
  building_noxious_gases_01_03:0 "Чистый воздух"
  building_noxious_gases_01_03_desc:0 "Время и ветер сделали своё дело. Дымка рассеялась, земля снова дышит свободно. Следы прошлого остаются в пепле и запахе, но ядовитый туман, терзавший эти земли, канул в память."

  building_type_noxious_gases_02_01:0 "$building_type_noxious_gases$"
  building_noxious_gases_02_01:0 "Удушающие испарения"
  building_noxious_gases_02_01_desc:0 "Густые, едкие газы вырываются из вулканической земли, окутывая всё смертельной дымкой. Дышать — пытка, видимость почти нулевая, а жизнь увядает под неумолимым натиском. Лишь безумцы осмелятся ступить в зону удушья."
  building_noxious_gases_02_02:0 "Стойкие испарения"
  building_noxious_gases_02_02_desc:0 "Воздух всё ещё отравлен, но, по какому-то чуду, худшее позади. Сера цепляется за каждый вдох, жжёт глаза и лёгкие. Опасность ещё не миновала — коварная и затяжная — но она уже не смертный приговор."
  building_noxious_gases_02_03:0 "Чистый воздух"
  building_noxious_gases_02_03_desc:0 "Небеса начали проясняться. Лёгкий след серы ещё несёт ветер, но воздух снова пригоден для жизни. Бдительность по-прежнему необходима, но худшее преодолено."

  #Stonemen Encampment
  building_type_stonemen_encampment_01:0 "Лагерь каменных людей"
  building_stonemen_encampment_01:0 "Заражённый лагерь"
  building_stonemen_encampment_01_desc:0 "Скопление разрушенных строений или пещер стало пристанищем каменных людей — искажённых, заразных и враждебных. Ни один здравомыслящий путник не отважится приблизиться без защиты."
  building_stonemen_encampment_02:0 "Карантинная зона"
  building_stonemen_encampment_02_desc:0 "Большинство заражённых были изгнаны или изолированы. Местность по-прежнему опасна, и слухи о проклятьях не утихают, но главная угроза подавлена."
  building_stonemen_encampment_03:0 "Очищенная территория"
  building_stonemen_encampment_03_desc:0 "Лагерь полностью зачищен. Огнём, сталью и мрачной решимостью каменные люди были изгнаны или уничтожены. Земля больше не проклята — по крайней мере, не явно."

  #Bandit Camp
  building_type_bandit_camps_01:0 "Бандитские лагеря"
  building_bandit_camps_01:0 "Разбойничье логово"
  building_bandit_camps_01_desc:0 "Известное убежище бандитов, контрабандистов и дезертиров. Торговые пути небезопасны, а местные жители живут в страхе. Лагерь должен быть разгромлен, прежде чем мир вернётся."
  building_bandit_camps_02:0 "Рассеянные разбойники"
  building_bandit_camps_02_desc:0 "Лагерь частично разрушен. Часть изгоев ещё остаётся, нападая при случае, но их сила угасает. Последний удар выкорчует их."
  building_bandit_camps_03:0 "Безопасная территория"
  building_bandit_camps_03_desc:0 "Последние бандиты разгромлены. Патрули контролируют местность, и порядок восстановлен. Где прежде правили клинки, ныне реют знамёна."

  #Ruined/Abandoned holding
  building_type_ruined_holding:0 "Разрушенное владение"

  building_type_small_ruined_holding_01:0 "$building_type_ruined_holding$"
  building_small_ruined_holding_01:0 "Обветшавшие руины"
  building_small_ruined_holding_01_desc:0 "Некогда небольшой форпост или поместье, ныне не более чем груда камней и зарослей. Руины нестабильны, не охраняются и бесполезны, пока не будут расчищены и укреплены."
  building_small_ruined_holding_02:0 "Укреплённые основания"
  building_small_ruined_holding_02_desc:0 "Были предприняты усилия по укреплению разрушенных стен и расчистке завалов. Хотя до восстановления ещё далеко, строение теперь менее опасно и вскоре может быть возвращено в строй."
  building_small_ruined_holding_03:0 "Восстановленный каркас"
  building_small_ruined_holding_03_desc:0 "Владение безопасно расчищено, основной ремонт завершён. Оно снова пригодно как скромный бастион или поселение — непритязательное, но больше не заброшенное."

  building_type_medium_ruined_holding_01:0 "$building_type_ruined_holding$"
  building_medium_ruined_holding_01:0 "Разбитая крепость"
  building_medium_ruined_holding_01_desc:0 "Этот некогда скромный форт или поместье пришёл в упадок. Его башни покосились, залы безмолвствуют, а в разрухе таятся опасности."
  building_medium_ruined_holding_02:0 "Закреплённая территория"
  building_medium_ruined_holding_02_desc:0 "Худшие угрозы устранены, и место теперь безопасно для обитания или перестройки. Былое величие утрачено, но остов прочности сохранился."
  building_medium_ruined_holding_03:0 "Возвращённое владение"
  building_medium_ruined_holding_03_desc:0 "Упорным трудом и терпением руины укреплены и возвращены к назначению. Они готовы служить вновь, пусть и под новыми знамёнами."

  building_type_large_ruined_holding_01:0 "$building_type_ruined_holding$"
  building_large_ruined_holding_01:0 "Павшее наследие"
  building_large_ruined_holding_01_desc:0 "Место несёт шрамы великого прошлого — древний город или крепость, ныне утраченные во времени. Их величие сопоставимо лишь с опасностями, скрытыми внутри."
  building_large_ruined_holding_02:0 "Укрощённые руины"
  building_large_ruined_holding_02_desc:0 "Расчистка вырвала порядок из хаоса. Великие залы больше не опасны, и пути сквозь завалы расчищены. Руины снова дышат, пусть и слабо."
  building_large_ruined_holding_03:0 "Возрождённая обитель"
  building_large_ruined_holding_03_desc:0 "Место более не руины, а фундамент. Хотя отголоски утраченного величия сохранились, оно теперь служит новой цели — возрождённое по вашему образу, готовое вновь формировать мир."
