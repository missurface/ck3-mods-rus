l_russian:
  restore_gogossos:0 "Провозгласить Десятый город"
  restore_gogossos_tooltip:0 "Восстановить Гогоссос"
  restore_gogossos_desc:0 "Прошли сотни лет после Рока, и Гогоссос наконец возвращается в лоно цивилизации под моим руководством, вновь достойный считаться претендентом на наследие [Concept('valyrian_freehold_short', 'Фригольда')|E]."
  restore_gogossos_choice:0 "Вам будет представлен список вариантов того, как вы хотите восстановить Гогоссос"
  restore_gogossos_confirm:0 "Десятый город восстанет вновь!"

  gogossos_restoration.0001.t:0 "Десятый город возрождён"
  gogossos_restoration.0001.desc:0 "После многих лет и множества золота, потраченных на восстановление не только города, но и всех островов вокруг Гогоссоса, я принёс этому краю богатство и процветание. Теперь, когда пиратские лорды изгнаны, а моя власть над бывшей колонией [Concept('valyrian_freehold_short', 'Фригольда')|E] неоспорима, я провозглашаю Гогоссос вновь достойным былой славы. Жемчужина Соториоса стоит прекраснее всех своих соперничающих держав."
  gogossos_restoration.0001.a:0 "Гогоссос вновь станет Десятым Вольным городом!"
  gogossos_restoration.0001.b:0 "Гогоссос будет процветать лишь через влияние и силу!"
  gogossos_restoration.0001.c:0 "Только твёрдая власть монарха не позволит повторить ошибки работорговцев."
  gogossos_restoration.0001.d:0 "Этот город будет процветать под моей властью."
  gogossos_restoration.0001.d.tooltip:0 "Вы сохраните свою текущую форму правления."

  gogossos_restoration.0002.t:0 "Десятый Вольный город возрождён"
  gogossos_restoration.0002.desc:0 "Некогда разрушенный и опустошённый Красной смертью, Гогоссос вновь стоит гордо. Торговля снова течёт в город, а о восстановлении бывшей валирийской колонии будут рассказывать ещё долгие годы."
  gogossos_restoration.0002.a:0 "Лишь время покажет, что из этого выйдет..."

  expedition_quest:0 "Профинансировать экспедицию"
  expedition_quest_tooltip:0 "Профинансировать экспедицию для исследования старых руин на Островах Василиска"
  expedition_quest_desc:0 "Зов приключений пробуждается во мне, неодолимо влекущий к забытым руинам, о которых рассказывают старые моряцкие байки, — утраченным остаткам Соториоса и Гогоссоса. Места из легенд, окутанные тайной и ужасом, где древние цивилизации некогда процветали, а затем обратились в руины.\n\nЯ почти слышу шёпот неведомых тайн, скрытых под их осыпающимися камнями, и обещание утраченных реликвий, ждущих, когда их откопают. От одной этой мысли сердце начинает биться быстрее.\n\nНужно действовать быстро. Понадобятся карты, припасы и команда, готовая бросить вызов неизвестности. Нельзя терять время — экспедицию нужно готовить немедленно."
  expedition_quest_effect:0 "Вы финансируете экспедицию в Гогоссос"
  expedition_quest_confirm:0 "Впереди сокровища и опасности — как заманчиво..."

  gobshite.1:0 "Зачем ты вообще смотришь? Я же сказал, что это не работает... болван"
