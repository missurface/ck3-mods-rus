l_russian:
 lv_valyria_random_event.0009.t: "Преследуемые тенями"
 lv_valyria_random_event.0009.desc: "Сам по себе ландшафт [haunted_location.GetName] достаточно коварен: растрескавшаяся земля, серные жерла, нестерпимый жар. Но настоящий урон начинает сказываться на вашем разуме. С тех пор как вы впервые ступили сюда несколько дней назад, сон превратился в поле битвы. Каждую ночь вы просыпаетесь в холодном поту, с привкусом меди во рту и затухающим эхом тысячи голосов, кричащих в унисон.\n\nДнём ещё хуже. Местная тишина тяжела, насторожена. Краем глаза вы то и дело ловите едва заметное движение — вспышки алой ткани, мерцание серебряных волос на фоне серых скал. Но стоит повернуть голову — и перед вами лишь клубящийся пепел и руины.\n\nВаши спутники становятся всё более нервными, бормоча о «неспокойной земле» и суде предков. Вы ясно чувствуете, что вторглись в место, которое помнит свою силу... и свою ярость."
 lv_valyria_random_event.0009.a: "Всего лишь проделки света и усталости. Идём дальше."
 lv_valyria_random_event.0009.b: "Нет, это проклятое место. Нам нужно найти другой путь."

 lv_valyria_random_event.0010.t: "Фигуры в красных одеждах"
 lv_valyria_random_event.0010.desc: "Сквозь дымку вы видите их - бледных, с длинными белыми волосами. Их лица резко выделяются на фоне пепла. Темно-красные одежды свисают с их плеч. Они не двигаются. Они только смотрят. Когда вы моргаете, их уже нет."
 lv_valyria_random_event.0010.a: "Они наблюдали за мной."
 lv_valyria_random_event.0010.b: "Я их преемник... или нет?"
 lv_valyria_random_event.0010.c: "Они реальны - более реальны, чем живые."
  
 lv_valyria_random_event.0020.t: "Они снова здесь"
 lv_valyria_random_event.0020.desc: "Вы снова видите их среди руин. Теперь ближе, их белые волосы сверкают в свете огня. Их глаза встречаются с вашими, не моргая. Когда вы приближаетесь, они исчезают, оставляя лишь следы на пепле, которые исчезают у вас на глазах."
 lv_valyria_random_event.0020.a: "Я не выдерживаю их взгляда."
 lv_valyria_random_event.0020.b: "Они испытывают меня - я покажу им, что я достоин."
 lv_valyria_random_event.0020.c: "Да... да, я иду рядом с ними..."
  
 lv_valyria_random_event.0030.t: "Мертвые среди вас"
 lv_valyria_random_event.0030.desc: "На этот раз они не исчезают. Бледные фигуры стоят среди ваших спутников, безмолвные, их красные одежды касаются пепла. Никто больше не реагирует. Их лица обращены только к вам. Вы моргаете - и мир перекашивается. Они исчезли... но вы не уверены, что остались самим собой."
 lv_valyria_random_event.0030.a: "Что все это значит?"
  
 lv_valyria_random_event.0031.t: "Поглощен"
 lv_valyria_random_event.0031.desc: "Фигуры приближаются. Их бледные руки тянутся к вам, и в мгновение ока мир погружается во тьму. Когда ваши спутники смотрят, вас просто нет."
 lv_valyria_random_event.0031.a: "Они уводят меня в пепел."
  
 lv_valyria_random_event.0032.t: "Теперь они живут во мне..."
 lv_valyria_random_event.0032.desc: "Фигуры растворяются в пепле - но вы чувствуете их внутри себя, их голоса шепчут на языке старше человечества. Их глаза смотрят через ваши."
 lv_valyria_random_event.0032.a: "Я не одинок в своем собственном разуме."
  
 lv_valyria_random_event.0033.t: "Проклятый дар"
 lv_valyria_random_event.0033.desc: "Когда фигуры исчезают, что-то остается в пепле - фрагмент Валирии, слабо мерцающий внутренним светом. Вы берете его дрожащими руками, хотя память об их глазах все еще жжет."
 lv_valyria_random_event.0033.a: "Теперь это мое... какой бы ни была цена."
  
  
 lv_valyria_random_event.0040.t: "Дракон в небе"
 lv_valyria_random_event.0040.desc: "Сквозь пелену пепла и дыма обширную тень проплывает по небу. На мгновение облака расступаются, и вы видите широко распростертые крылья, чешую, мерцающую, как расплавленная сталь, дракона, парящего над разрушенным городом. Но стоит вам моргнуть, и все это исчезает, оставляя после себя только тишину и зыбкий мрак. Вы действительно видели это... или только привиделось?"
 lv_valyria_random_event.0040.a: "Реально или нет, я буду помнить это зрелище до последнего дня."
  
  
 lv_valyria_random_event.0050.t: "Исчезающий город"
 lv_valyria_random_event.0050.desc: "Руины меняются у вас на глазах. Черный шпиль, который направлял ваш путь, исчезает, когда вы поворачиваете голову, замененный пустой землей. Улицы, по которым вы шли всего несколько часов назад, ведут в никуда или возвращают туда, откуда вы начали. Ваши спутники шепчут о колдовстве в воздухе."
 lv_valyria_random_event.0050.a: "Оно наблюдает за нами. Оно двигается, когда двигаемся мы."
 lv_valyria_random_event.0050.b: "Рок исказил даже камни."
 lv_valyria_random_event.0050.c: "Да... оно живет. Город дышит вокруг нас."
  
 lv_valyria_random_event.0060.t: "Потерян в Исчезающем городе"
 lv_valyria_random_event.0060.desc: "Вы бродите среди башен, которые меняются, когда на вас не обращают внимания, улиц, которые меняются у вас под ногами. Знакомые лица исчезают, голоса отдаются эхом в неподходящих местах, и кажется, что каждая тропинка ведет все глубже в пепел. Город не желает отпускать вас."
 lv_valyria_random_event.0060.a: "Это место ломает дух."
 lv_valyria_random_event.0060.b: "Город шепчет... и я должен повиноваться."
 lv_valyria_random_event.0060.c: "Через замешательство приходит открытие."
  
 lv_valyria_random_event.0070.t: "Сокровище в пепле"
 lv_valyria_random_event.0070.desc: "Извилистый коридор обрушивается, открывая скрытое хранилище. Разбросанные монеты и наполовину расплавленные украшения сверкают в пепле - remnants валирийского великолепия."
 lv_valyria_random_event.0070.a: "Удача любит смелых."
  
 lv_valyria_random_event.0080.t: "Город забирает свое"
 lv_valyria_random_event.0080.desc: "Голоса ваших спутников становятся приглушенными. Стены складываются вокруг вас, улицы размываются, башни нависают невероятно высоко. Вы кричите, но никто не слышит. Валирия поглощает вас целиком, исчезая в своем изменчивом лабиринте."
 lv_valyria_random_event.0080.a: "..."
  
 lv_valyria_random_event.0090.t: "Тремор в пепле"
 lv_valyria_random_event.0090.desc: "Земля дергается под вашими ногами, и наполненный пеплом воздух разрывается ревом. Стены рушатся, башни наклоняются, и трещины разверзаются, обнажая реки расплавленного огня. Ваши спутники в панике разбегаются, поскольку сами руины грозят поглотить вас."
 lv_valyria_random_event.0090.a: "Бегите, пока земля не поглотила нас!"
 lv_valyria_random_event.0090.b: "В огне могут быть скрыты сокровища..."
 lv_valyria_random_event.0090.c: "Держитесь! Не позволяйте страху сломить нас!"
  
 lv_valyria_random_event.0100.t: "Рой тлеющих дракончиков"
 lv_valyria_random_event.0100.desc: "Облако крошечных драконоподобных существ обрушивается на вас, каждое не больше кулака, но неисчислимое. Они шипят и визжат, кусаются и царапаются, пожирая все живое на своем пути. Пепел и огонь тянутся за ними, когда они движутся подобно живому шторму, безжалостному и ужасающему."
 lv_valyria_random_event.0100.a: "Отразите их... или погибните!"
 lv_valyria_random_event.0100.b: "Попытайтесь поймать несколько... если выживете."
 lv_valyria_random_event.0100.c: "Держитесь вместе и переживите рой."
  
 lv_valyria_random_event.0110.t: "Засада пепельного змея"
 lv_valyria_random_event.0110.desc: "Огромные бледные змеи скользят по пепельным равнинам, внезапно атакуя ваш отряд. Их челюсти щелкают с ужасающей скоростью, а чешуя излучает тепло. Вы должны действовать быстро, если надеетесь выжить."
 lv_valyria_random_event.0110.a: "Стоять и сражаться!"
 lv_valyria_random_event.0110.b: "Бежать и выжить!"
  
 lv_valyria_random_event.0120.t: "Токсичные пары"
 lv_valyria_random_event.0120.desc: "Густой едкий пар сочится из трещин в почерневшей земле, обжигая ваши глаза и горло. Воздух насыщен серой — каждый вдох грозит удушьем. Продвижение вперед может оказаться фатальным, но отступление будет стоить драгоценного времени."
 lv_valyria_random_event.0120.a: "Прикройте рот и пробивайтесь вперед."
 lv_valyria_random_event.0120.b: "Отступите для более безопасных путей."
 lv_valyria_random_event.0120.c: "Сожгите припасы, чтобы замаскировать воздух."
  
 lv_valyria_random_event.0130.t: "Последствия: Болезнь"
 lv_valyria_random_event.0130.desc: "Кашель терзает ваше тело, поскольку болезнь оседает в легких, ослабляя вашу силу."
 lv_valyria_random_event.0130.a: "Соберитесь против лихорадки."
 lv_valyria_random_event.0130.b: "Я чувствую себя слабее с каждым часом."
  
 lv_valyria_random_event.0140.t: "Последствия: Ожоги"
 lv_valyria_random_event.0140.desc: "Тлеющая боль от пепла и серы прожигает вашу кожу. Шрамы горят, напоминая о том, насколько близка была смерть."
 lv_valyria_random_event.0140.a: "Живой, в конечном счете."
  
 lv_valyria_random_event.0150.t: "Последствия: Отступление"
 lv_valyria_random_event.0150.desc: "Вам удалось выбраться из ядовитого воздуха, но память о близости смерти сохраняется, заставляя каждый шаг ощущаться неуверенно."
 lv_valyria_random_event.0150.a: "Мы движемся дальше, разбитые, но живые."
  
 lv_valyria_random_event.0160.t: "Последствия: Пожертвованные припасы"
 lv_valyria_random_event.0160.desc: "Вы сожгли то немногое, что имели, чтобы замаскировать пары. Воздух очистился, но потеря ресурсов теперь преследует каждый шаг пути."
 lv_valyria_random_event.0160.a: "Эта жертва стоила того, чтобы на нее пойти."
 lv_valyria_random_event.0160.b: "Я боюсь того, от чего мы отказались."
