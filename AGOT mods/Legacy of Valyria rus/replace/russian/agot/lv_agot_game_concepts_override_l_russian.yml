l_russian:
   # Night's Watch
   game_concept_nw_govt:0 "Ночной Дозор"
   game_concept_nw_govt_desc:0 "#bold Ночной Дозор#! — военный орден, посвятивший себя охране [Concept('watch_wall', 'Стены')|E] — грандиозного укрепления на северной границе [Concept('seven_kingdoms', 'Семи Королевств')|E], защищающего людские державы от того, что таится [beyond_the_wall|E]. Орден был основан в [Concept('age_of_heroes', 'Эпоху Героев')|E], когда [others|E] были отброшены. Братья #bold Ночного Дозора#! носят исключительно чёрное и известны как #bold чёрные братья#!. О новобранцах, вступающих в #bold Дозор#!, говорят, что они #bold надели чёрное#!.\n\nПри [government_form|E] «$game_concept_nw_govt$» верховный [liege|E] распределяет [land|E] между [vassals|E] для управления и защиты. Только присягнувшие братья Ночного Дозора могут владеть титулами при этой форме правления, а после их смерти титулы возвращаются к сюзерену."
   game_concept_nw_govt_i:0 "@nights_watch_government!"

   # Dragons
   DRAGON_RELATION_IS_WANDERING:0 "[Character.Custom('LV_FirewyrmLocation')]"
   DRAGON_RELATION_IS_WANDERING.FIREWYRM:0 "Рыщет по [Character.GetCurrentLocation.GetName|V]"
   DRAGON_RELATION_IS_WANDERING.VANILLA:0 "Летает над [Character.GetCurrentLocation.GetName|V]"
