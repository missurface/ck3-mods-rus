l_russian:
  reconstruct_small_ruin_tooltip:0 "Чтобы начать восстановление, у вас должно быть не менее 200 золота, и вы должны быть де-юре сюзереном руин (или иметь претензию), либо граничить с руинами, либо иметь [Concept('prestige_level', 'уровень престижа')|E] [GetModifier('prestige_level_3').GetNameWithTooltip|L] и #V $building_type_common_tradeport_01$#! 6-го уровня."
