l_russian:
  # Note: Keep this in the replace/(language)/agot folder to ensure we override the locs AGOT already has
  # Ruin Overrides
  e_ruins:0 "Руины"
  k_ruins:0 "Руины"
  d_ruins:0 "Руины"

  ruin_history_generic:0 "Сам мир усеян руинами — от Вестероса до Эссоса, от Соториоса до Ультоса; они разбросаны по всем землям и всем климатам почти без разбора. Одни некогда были великими крепостями и замками, тысячелетиями противостоявшими врагам, лишь затем пав перед непобедимым противником; другие были сторожевыми башнями и малыми твердынями, разбитыми мелкими набегами и потерянными во времени. Некоторые древнее всякого исчисления и были обращены в руины ещё до самых ранних записей Цитадели или И-Ти — такие как Йин в Соториосе или Стигай в Крае Теней. Падение других произошло куда позднее и было описано учёными как Закатных, так и Рассветных земель. О многих сложены легенды, сказания или песни — о самих руинах или об их последней обороне, но ещё больше лежит забытыми и отвергнутыми всеми певцами.\n\nЧтобы заявить права на разрушенное графство и начать восстановление, откройте окно владения и выберите «Восстановить руины». Когда у вас есть барония с руинами, вы можете улучшить главное здание руин, чтобы начать восстановление.\n\nТолько люди, обезумевшие от честолюбия, страсти к странствиям или тоски по утраченному наследию, осмелятся заявить права на самые опасные руины — например те, что возникли после Рока Валирии. Опытные путешественники или потомки древних драконьих лордов, достаточно ослеплённые, чтобы попытаться, могут начать занятие и отправиться в экспедицию в Валирию."

  # Free City Overrides
  braavos_full_county_control_tt:0 "У вас максимальный [Concept('county_control', 'контроль графства')|E] в $c_braavos$"
  volantis_full_county_control_tt:0 "У вас максимальный [Concept('county_control', 'контроль графства')|E] в $c_old_volantis$ и $c_volantis$"