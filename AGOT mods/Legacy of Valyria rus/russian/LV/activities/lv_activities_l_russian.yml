   # Expedition
   lv_activity_expedition:0 "Экспедиция"
   lv_activity_expedition_host_an_a:0 ""
   lv_activity_expedition_desc:0 "Отправиться за пределы известного — значит заигрывать с удачей и погибелью одновременно. Экспедиции сулят открытия — будь то утраченные реликвии, погребённые в забытых руинах, или плодородные земли, ожидающие поселенцев.\n\nЭкспедиции возглавляются избранным командиром — вами лично или доверенным представителем — а их успех зависит от подготовки, мастерства и толики удачи. Впереди неизвестность... впрочем, как и награда."
   lv_activity_expedition_host_desc:0 "$BULLET_WITH_TAB$Возможность получить [artifacts|E]\n$BULLET_WITH_TAB$Возможность получить [prestige_i] [prestige|E]\n$BULLET_WITH_TAB$Возможность получить [legitimacy_i] [legitimacy|E]"
   lv_activity_expedition_selection_tooltip:0 "Финансировать экспедицию для поиска утраченных сокровищ или разведки земель для будущего заселения.\n\nОжидаемые награды:\n$BULLET_WITH_TAB$[prestige_i] [prestige|E]\n$BULLET_WITH_TAB$[legitimacy_i] [legitimacy|E]"

   expedition_type_valyria:0 "Валирия"
   expedition_type_valyria_desc:0 "Валирийский полуостров — земля тайн и опасностей, где руины некогда великого Валирийского Фригольда ждут своего часа.\n\nЗемли кишат враждебными существами, а местность коварна и непредсказуема — экспедиция должна быть хорошо подготовлена, чтобы выжить."
   expedition_type_rhoyne:0 "Ройна"
   expedition_type_rhoyne_desc:0 "Ройна — могучая река, текущая через сердце Волантиса и руины древних ройнаров.\n\nЭкспедиции предстоит преодолеть коварные течения реки и избежать опасностей, таящихся в её глубинах."
   expedition_type_asshai:0 "Асшай"
   expedition_type_asshai_desc:0 "Асшай — таинственный и древний город на берегах Земель Теней.\n\nЭкспедиции предстоит пробираться по тёмным переулкам города и избегать опасностей, скрывающихся в его тенях."

   activity_expedition_province_desc:0 "Вы спланируете и профинансируете экспедицию в [ROOT.Province.GetName]\nМножество факторов повлияют на результаты"

   hunt_treasure_intent:0 "Поиск сокровищ"
   hunt_treasure_intent_desc:0 "Искать утраченные артефакты и сокровища среди руин."
   chart_area_intent:0 "Картографирование"
   chart_area_intent_desc:0 "Составить карту местности и определить возможные места для поселений."

   expedition_preparation:0 "Подготовка экспедиции"
   expedition_preparation_minimal:0 "Самое необходимое"
   expedition_preparation_minimal_desc:0 "Минимальная экспедиция, налегке и без лишних затрат. Удача благоволит смелым — или везучим."
   expedition_preparation_standard:0 "Надлежащее снаряжение"
   expedition_preparation_standard_desc:0 "Достаточно карт, припасов и наёмных рук. Экспедиция готова к большинству трудностей впереди."
   expedition_preparation_heavy:0 "Полное оснащение"
   expedition_preparation_heavy_desc:0 "Без экономии — опытные проводники, укреплённые обозы и специалисты на все случаи жизни. Если успех можно купить, то именно так."

   expedition_main_phase:0 "Разгар экспедиции"
   expedition_main_phase_desc: "Дни сменяются неделями, пока экспедиция прокладывает забытые дороги, углубляется в руины и встречается с неизведанным. Каждый лагерный костёр и далёкое эхо могут принести удачу — или беду."

   lv_apa_expedition_monument_title: "[first.GetShortUIName|U] [Select_CString(first.IsFemale, 'обнаружила', 'обнаружил' )] полузасыпанный [second.GetCulture.GetCollectiveNoun] монумент"
   lv_apa_expedition_chart_terrain_title: "[first.GetShortUIName|U] [Select_CString(first.IsFemale, 'добилась', 'добился' )] значительного прогресса в картографировании местности [second.GetName]"
   lv_apa_expedition_ruined_roads_title: "[first.GetShortUIName|U] [Select_CString(first.IsFemale, 'обнаружила', 'обнаружил' )] разрушенные дороги, облегчающие передвижение и составление карт"
   lv_apa_expedition_old_map_title: "[first.GetShortUIName|U] [Select_CString(first.IsFemale, 'нашла', 'нашёл' )] старую карту, совпадающую с рельефом местности, что помогло экспедиции"
   lv_apa_expedition_optimal_conditions_title: "[first.GetShortUIName|U] [Select_CString(first.IsFemale, 'определила', 'определил' )], что условия для экспедиции оптимальны"

   lv_apa_expedition_mired_in_mud_title: "Буря превратила окрестные дороги в грязь, застопорив всю экспедицию"
   lv_apa_expedition_missing_supplies_title: "Ночью пропала часть еды и инструментов"
   lv_apa_expedition_heated_argument_title: "Вспыхнул спор о том, каким путём следовать"
   lv_apa_expedition_frightened_animals_title: "Нечто невидимое напугало животных [first.GetShortUINamePossessive], и те разбежались во тьму"

   lv_apa_expedition_night_shift_positive_title: "[first.GetShortUIName|U] [Select_CString(first.IsFemale, 'засиделась', 'засиделся' )] допоздна за работой рядом с [second.GetShortUIName]"
   lv_apa_expedition_night_shift_positive.tt:0 "[first.GetShortUIName|U] [Select_CString(first.IsFemale, 'отлично поладила', 'отлично поладил' )] с [second.GetShortUIName] во время ночной смены, делясь историями и смехом, что скрасило тяготы труда."
   lv_apa_expedition_night_shift_positive.reason: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] нашли общий язык во время экспедиции."

   lv_apa_expedition_campfire_positive_title: "[first.GetShortUIName|U] и [second.GetShortUIName] посидели у костра"
   lv_apa_expedition_campfire_positive.tt:0 "[first.GetShortUIName|U] и [second.GetShortUIName] делились историями и смехом у костра, укрепив свою связь во время экспедиции."
   lv_apa_expedition_campfire_positive.reason: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] посидели у костра во время экспедиции."

   lv_apa_expedition_night_shift_negative_title: "[first.GetShortUIName|U] [Select_CString(first.IsFemale, 'засиделась', 'засиделся' )] допоздна за работой рядом с [second.GetShortUIName]"
   lv_apa_expedition_night_shift_negative.tt:0 "[first.GetShortUIName|U] и [second.GetShortUIName] повздорили во время ночной смены, что привело к жаркой ссоре и испортило обстановку."
   lv_apa_expedition_night_shift_negative.reason: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] повздорили во время экспедиции."

   lv_apa_expedition_foul_weather_title: "Скверная погода замедляет продвижение экспедиции [first.GetShortUINamePossessive]"

   lv_expedition.tt.positive.tiny:0 "Ваша [GetActivityType('lv_activity_expedition').GetName] #P немного продвинулась#!"
   lv_expedition.tt.negative: "На прогресс вашей [GetActivityType('lv_activity_expedition').GetName] #N оказано негативное влияние#!"

   activity_window_character_travel_expedition_leader: "Командир экспедиции\n[Character.GetShortUINameNoTooltip|U]\n[traveling|E] в [Character.GetCurrentLocation.GetName]\n ~[Character.GetTravelPlan.GetData.GetNextDestination.GetEstimatedArrivalDate.GetStringLong|V]"
   activity_window_character_expedition_leader: "Командир экспедиции\n[Character.GetShortUINameNoTooltip|U]"

   TRAVEL_NAME_FOR_lv_activity_expedition:0 "Экспедиция [Character.GetFirstNamePossessiveNoTooltip]"

   lv_valyria_province_expedition_required:0 "Необходимо провести успешную экспедицию, чтобы раскрыть тайны [HoldingView.GetProvince.GetCounty.GetTitle.GetDeJureLiege.GetNameNoTier]"
