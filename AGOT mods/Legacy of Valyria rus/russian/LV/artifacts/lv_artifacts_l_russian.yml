l_russian:
   book_of_dragonlore_name:0 "Книга о драконах"
   book_dragonlore_desc:0 "Тяжёлый, потрёпанный временем фолиант о драконоведении, разведении и приручении драконов, созданный ещё до Рока Валирии. Твёрдая обложка выполнена из валирийской стали — её тёмная, мерцающая поверхность покрыта искусной гравировкой с драконьими мотивами. Несмотря на долговечность стали, страницы внутри несут на себе следы времени — пожелтевшие и хрупкие, с обтрёпанными краями. Некогда яркие чернила поблёкли, но секреты покорения драконов остаются разборчивы, сохранённые непреходящей силой зачарованного переплёта. Эта книга — редкая реликвия, её содержание столь же опасно и могущественно, как и существа, которых она описывает."
   book_of_life_name:0 "Книга жизни"
   book_life_desc:0 "Этот старинный том, посвящённый изучению жизни, здоровья, плодовитости и медицины, был создан в Валирии задолго до её Рока. Хотя кожаная обложка потрескалась и обветшала, страницы внутри хранят самые передовые знания, ведомые миру. Подробные схемы, точные формулы и новаторские теории об исцелении, родовспоможении и долголетии заполняют её хрупкие, пожелтевшие страницы. Несмотря на потрёпанный вид, эта книга остаётся сокровищницей мудрости — её прозрения не имеют себе равных среди трудов нынешних времён. Поблёкшие чернила могут говорить о возрасте, но знания, которые она несёт, вечны — свидетельство непревзойдённого гения валирийских целителей."
   the_dragons_book:0 "Драконья книга"
   the_dragons_book_desc:0 "Этот древний том в переплёте из валирийской стали — сборник драконоведческих знаний, повествующий об истории, разведении и приручении драконов. Его страницы наполнены искусными иллюстрациями и заметками величайших драконьих владык Валирии, увековечивших свой опыт и знания. Обложку книги украшает изображение дракона в полёте, чья чешуя мерцает на свету. Несмотря на возраст, книга пребывает в поразительной сохранности — свидетельство мастерства её создателей. Говорят, что те, кто читает её страницы, обретают глубочайшее понимание драконов и их повадок."

   zz_valyria_dragon_skulls.tt:0 "Только Красный Замок или столица в [Concept('valyrian_freehold_short', 'Фригольде')|E] может выставить этот артефакт."
