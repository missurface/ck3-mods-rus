l_russian:
   #VS Weapons
   vs_torment_name:0 "Мука"
   vs_torment_description:0 "Мука — легендарный клинок из валирийской стали, выкованный Даэмоном Воларом в сердце [GetTitleByKey('k_lokiria').GetNameNoTier], задолго до [Concept('doom', 'Рока')|E]. Его первым владельцем был Таурин — основатель и первый правитель государства, который завладел мечом на заре его существования и объединил разрозненные земли под своей властью. Выкованный из редчайшей валирийской стали, клинок увенчан навершием в виде свирепого дракона, символизирующего мощь и несгибаемую волю.\n\n«Непокорённые, вечно устрашающие»"

   vs_dragon_halberd_name:0 "Драконья алебарда"
   vs_dragon_halberd_description:0 "Древняя алебарда из валирийской стали, которой были вооружены Драконьи Стражи в Древней Валирии."

   vs_abyss_name:0 "Бездна"
   vs_abyss_description:0 "Боевой топор из валирийской стали с рукоятью из чёрного плавника. На обухе топора вырезаны голова и щупальца кракена, а в глазницы вставлены рубины."

   dothraki_arakh_name:0 "Дотракийский аракх"
   dothraki_arakh_description:0 "Традиционное оружие дотракийцев."

   vs_frostbite_hammer_name:0 "Фростбайт"
   vs_frostbite_hammer_description:0 "Фростбайт — легендарное оружие, выкованное из бледно-голубой валирийской стали, свидетельство могущества дома Фростов. Его массивный боёк, имеющий форму вороньего клюва, столь же грозен, как северные ветра, что обрушиваются на его ледяную родину.\n\nНекогда его сжимал в руках последний из королей Фростов — символ династии, правившей из Морозной Крепости. После падения короля его изгнали в [Concept('nw_govt', 'Ночной Дозор')|E], откуда он в конце концов дезертировал, бежав к Клыкам Мороза.\n\nЗатерянный во времени, Морозный Укус исчез бесследно — однако его легенда жива, и шёпот гласит, что оружие сокрыто где-то среди ледяных пустошей, ожидая руки того, кто достоин его силы."

   dragon_tail_name:0 "Драконий Хвост"
   dragon_tail_description:0 "..."
   vs_mages_fire_name:0 "Пламя Мага"
   vs_mages_fire_desc:0 "Одноручная рапира с тонким обоюдоострым клинком, предназначенным для нанесения колющих ударов сквозь оборону противника. Металл гарды покрыт переливающимся покрытием, переходящим от белого к синему, в тон синеве рукояти и навершия. Это оружие невероятной точности, скорее произведение искусства, нежели орудие войны."
