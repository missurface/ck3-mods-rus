l_russian:
  # Braavos
  building_agot_EE_titan_of_braavos:0 "Браавосский Титан"
  building_type_agot_EE_titan_of_braavos:0 "Браавосский Титан"
  building_agot_EE_titan_of_braavos_desc:0 "Включённый знаменитым вестеросским писцом Ломасом Странником в число Рукотворных Чудес, Браавосский Титан является первой линией обороны [Concept('free_city', 'Вольного Города')|E] Браавоса, охраняя узкий вход в лагуну, в которой расположен город. Это колоссальная статуя из гранита и бронзы в облике воина, служащая одновременно крепостью и маяком. Бойницы под бронированной юбкой статуи и стрелковые щели по всему нагруднику обеспечивают практически неприступную оборону от вражеских кораблей, входящих в лагуну."

  building_agot_EE_sealords_palace:0 "Дворец Морского владыки"
  building_type_agot_EE_sealords_palace:0 "Дворец Морского владыки"
  building_agot_EE_sealords_palace_desc:0 "Дворец Морского владыки — резиденция Морского владыки Браавоса. Под куполами и башнями обширного дворца располагается экзотический зверинец с птицами и зверями со всего мира."

  # Volantis
  building_agot_EE_black_walls_of_old_volantis:0 "Чёрные Стены"
  building_type_agot_EE_black_walls_of_old_volantis:0 "Чёрные Стены"
  building_agot_EE_black_walls_of_old_volantis_desc:0 "Сердце Волантиса. Возведённая древним [Concept('valyrian_freehold', 'Валирийским Фригольдом')|E], эта гигантская стена из литого чёрного камня защищает комплекс дворцов, дворов, башен и храмов. Лишь те, чья кровь восходит к валирийским предкам — Древняя Кровь — вправе обитать за ней."
  building_agot_EE_volantis_harbor:0 "Гавань Волантиса"
  building_type_agot_EE_volantis_harbor:0 "Гавань Волантиса"
  building_agot_EE_volantis_harbor_desc:0 "Могущество Волантиса отчасти зиждется на его огромной гавани, особенно благодаря выгодному географическому расположению. Это обширное полумесяцем сооружение возведено прямо у устья Ройны и, говорят, способно вместить в себя весь Браавос."

  building_agot_EE_the_long_bridge:0 "Длинный мост"
  building_type_agot_EE_the_long_bridge:0 "Длинный мост"
  building_agot_EE_the_long_bridge_desc:0 "Длинный мост соединяет две половины Волантиса и является длиннейшим мостом в известном мире. Возведённый [Concept('old_valyria', 'Древней Валирией')|E] в пору её расцвета из литого камня, он, говорят, способен выдержать вес тысячи слонов."

  building_agot_EE_temple_of_the_lord_of_light:0 "Храм Владыки Света"
  building_type_agot_EE_temple_of_the_lord_of_light:0 "Храм Владыки Света"
  building_agot_EE_temple_of_the_lord_of_light_desc:0 "Этот громадный храм возвышается над любым другим зданием в городе. Его ослепительные золотые, красные и оранжевые краски делают его поистине захватывающим зрелищем. Охраняемый Огненной Рукой, этот храм служит Р'глору, Владыке Света, и, возможно, является одним из величайших свидетельств его могущества."

  building_agot_EE_volantis_walls:0 "Стены Волантиса"
  building_type_agot_EE_volantis_walls:0 "Стены Волантиса"
  building_agot_EE_volantis_walls_desc:0 "Хотя и не столь впечатляющие, как стены Старого Волантиса, стены Волантиса заставят любого агрессора дважды подумать, прежде чем штурмовать город."

  # Rhoyne
  building_agot_EE_nymeria_palace_01:0 "Дворец Нимерии"
  building_type_agot_EE_nymeria_palace_01:0 "Дворец Нимерии"
  building_agot_EE_nymeria_palace_01_desc:0 "В сердце Ни Сара лежат руины Дворца Нимерии, заброшенного после того, как [valyrian_freehold|E] разбил принца Гарина во Второй Пряной войне. Его стены из розового и зелёного мрамора, величественные купола и грандиозные шпили ныне стоят призрачной оболочкой былого великолепия. Вся жизнь покинула это место, когда Нимерия бежала в Дорн, оставив некогда гордые залы разрушению."

  building_agot_EE_nymeria_palace_02:0 "Дворец Нимерии"
  building_type_agot_EE_nymeria_palace_02:0 "Дворец Нимерии"
  building_agot_EE_nymeria_palace_02_desc:0 "Вновь гордо возвышаясь в сердце Ни Сара, Дворец Нимерии был тщательно восстановлен — свидетельство стойкости и наследия ройнаров. Яркий зелёный и розовый мрамор сияет на солнце, а величественные купола и вздымающиеся шпили вновь доминируют над горизонтом, почти стирая память о его трагическом прошлом."

  building_agot_EE_palace_of_love_01:0 "Дворец Горя"
  building_type_agot_EE_palace_of_love_01:0 "Дворец Горя"
  building_agot_EE_palace_of_love_01_desc:0 "Дворец Горя стоит мрачным напоминанием о судьбе, постигшей Крояне, город праздников. Его осыпающиеся башни, покрытые мхом и тёмными лозами, не выдают и тени красоты, что некогда воплощал Дворец Любви. Затонувшие статуи и каменные люди теперь населяют его туманные, разрушенные залы."

  building_agot_EE_palace_of_love_02:0 "Дворец Любви"
  building_type_agot_EE_palace_of_love_02:0 "Дворец Любви"
  building_agot_EE_palace_of_love_02_desc:0 "Дворец Любви вновь украшает берега Ройны — захватывающее возрождение былой славы Крояне. Его башни устремлены ввысь, украшенные яркими мозаиками и изящной резьбой, воспевающими жизнь, красоту и любовь. Солнечный свет играет на искрящихся фонтанах, питающих пышные сады, которые изливают цветы на каждую террасу. Под его величественными куполами вновь благословляются браки, наполняя Крояне обещанием нового начала."

  building_agot_EE_bridge_of_dream_01:0 "Мост Мечты"
  building_type_agot_EE_bridge_of_dream_01:0 "Мост Мечты"
  building_agot_EE_bridge_of_dream_01_desc:0 "Некогда соперничавший с Длинным мостом Волантиса, Мост Мечты ныне нависает над Ройной в густом тумане. Его каменные арки, поднимавшиеся на сорок футов над рекой, обрушились под густым мхом и чёрными лозами. Теперь это обитель каменных людей — безмолвный, гниющий памятник утраченной гордости ройнаров."

  building_agot_EE_bridge_of_dream_02:0 "Мост Мечты"
  building_type_agot_EE_bridge_of_dream_02:0 "Мост Мечты"
  building_agot_EE_bridge_of_dream_02_desc:0 "Мост Мечты вновь перекинулся через Ройну во всём своём великолепии. Вздымаясь на сорок футов над рекой, его бледные каменные арки стоят крепкими и непокорными. Пышные сады украшают деревянный настил моста, расцветая цветами всех оттенков. Этот величественный мост, некогда утраченный во времени и разрухе, обрёл новую жизнь — символ ройнарской гордости и стойкости над текучими водами Ройны!"

  # Meereen
  building_agot_EE_great_pyramid_of_meereen:0 "Великая Пирамида Миэрина"
  building_type_agot_EE_great_pyramid_of_meereen:0 "Великая Пирамида Миэрина"
  building_agot_EE_great_pyramid_of_meereen_desc:0 "Безусловно крупнейшее здание в городе, Великая Пирамида Миэрина была возведена небольшой армией рабов, тысяча из которых погибла при строительстве. Пирамида служит административным центром Миэрина, и правители города веками использовали великий Зал для приёма своих подданных."

  # Asshai
  building_stygai_01:0 "Проклятый город Стигай"
  building_type_stygai_01:0 "Стигай"
  building_stygai_01_desc:0 "Стигай — загадочный и древний город, окутанный тьмой в самом сердце Края Теней, остаётся одной из самых устрашающих загадок мира. Непостижимо древний и объятый вечным мраком, город стоит памятником забытой эпохи. Даже самые дерзкие заклинатели теней не осмеливаются ступить на его проклятые улицы. Говорят, что его вздымающиеся шпили и лабиринтные переулки населены демонами и тварями в равной мере. Окутанный тайной, его истинное происхождение и масштаб его тёмных сил остаются загадкой."

  # Gogossos
  building_red_citadel_01:0 "Красная Башня"
  building_type_red_citadel_01:0 "Красная Башня"
  building_red_citadel_01_desc:0 "Крупная прибрежная башня, считающаяся последним уцелевшим остатком некогда могучей крепости, ныне служит главным оплотом города. Хотя бо́льшая часть изначального строения утрачена, этот одинокий бастион стоит — небольшой, но невероятно прочный и легко обороняемый."

  building_red_citadel_02:0 "Красный Редут"
  building_type_red_citadel_02:0 "Красный Редут"
  building_red_citadel_02_desc:0 "Укреплённый прочным деревянным частоколом и сторожевыми башнями поверх старых Алых Руин, этот редут вырос в более грозный оплот, способный выдержать длительные угрозы. Расширенные оборонительные сооружения позволяют вмещать приличный гарнизон, обеспечивая надёжный плацдарм в Гогоссосе."

  building_red_citadel_03:0 "Красная Цитадель"
  building_type_red_citadel_03:0 "Красная Цитадель"
  building_red_citadel_03_desc:0 "Некогда угасающая реликвия, Красная Цитадель отстроена в массивную крепость, господствующую над Гогоссосом. Её стены из валирийского чёрного камня окрашены багрянцем древними кровавыми ритуалами. Шёпот утверждает, что именно здесь зародилась Красная смерть — память о проклятии всё ещё звучит эхом в потаённых палатах. Красная Цитадель — беспощадное сердце Гогоссоса, где власть абсолютна, а мятеж гибнет, не успев зародиться."

  building_pit_of_sorrows_01:0 "Заросшая крепость и руины"
  building_type_pit_of_sorrows_01:0 "Заросшая крепость и руины"
  building_pit_of_sorrows_01_desc:0 "Разрушенная крепость, чьи некогда могучие стены ныне оплетены ползучими лозами и поглощены неумолимым объятием природы, стоит в жуткой тишине. Деревья пустили корни во дворах, их искривлённые ветви цепляются за небо.\n\nНесмотря на разруху, крепость остаётся удивительно обороноспособной — её башни, хоть и обветшалые, по-прежнему внушительны. Полузасыпанные мхом ворота указывают на твердыню, которая не желает полностью сдаваться времени.\n\nНо что-то глубоко неправильное в этом месте. Воздух густ от неестественной неподвижности, от которой мурашки ползут по коже. Тени задерживаются там, где не должны, а шёпот — слишком тихий, чтобы быть ветром — витает среди руин, намекая на тайны, которые лучше не тревожить."

  building_pit_of_sorrows_02:0 "Крепость и раскопки Ямы"
  building_type_pit_of_sorrows_02:0 "Крепость и раскопки Ямы"
  building_pit_of_sorrows_02_desc:0 "По мере расширения работ и расчистки густых зарослей мы сделали поразительное открытие — земля под нами словно уходила бесконечно вниз, сколько бы грязи и обломков мы ни убирали. То, что поначалу казалось лишь растительностью, скрывающей руины, обернулось обширным многоярусным спуском, каждый нижний уровень которого обнажал следы прошлого.\n\nСреди осыпающейся кладки и влажной земли мы откопали бесчисленные кости, происхождение которых неизвестно. С каждым шагом вниз крепла уверенность: это и есть легендарная Яма Скорби, место, о котором шепчутся в страхе."

  building_pit_of_sorrows_03:0 "Яма Скорби"
  building_type_pit_of_sorrows_03:0 "Яма Скорби"
  building_pit_of_sorrows_03_desc:0 "Древняя Яма Скорби, некогда лежавшая в руинах, была кропотливо восстановлена до прежнего зловещего величия. Однако, при всех усилиях по возвращению верхних ярусов, истинные глубины остаются непостижимой бездной. Нижний мрак тянется бесконечно, поглощая свет и звук. Многие дерзнули спуститься в поисках утраченных тайн, но ни один не вернулся рассказать о том, что лежит на дне — если дно вообще существует."

  building_the_toad:0 "Чёрная Жаба"
  building_type_the_toad:0 "Чёрная Жаба"
  building_the_toad_desc:0 "Крупнейшая статуя, когда-либо воздвигнутая на Острове Жаб, возвышается над ландшафтом — монолитная реликвия давно исчезнувшей цивилизации. Высеченная из неизвестного маслянисто-чёрного камня, который блестит даже в отсутствие света, она имеет форму огромной жабы — приземистой, гротескной и пугающе реалистичной. Никто не знает, кто её построил и для какой цели. Ходят шёпотом слухи среди местных — о странных снах, приходящих к тем, кто засыпает слишком близко, о неестественном тепле камня при прикосновении и о глазах, что мерцают под его поверхностью, словно что-то наблюдает изнутри."
  building_type_the_toad_desc:0 "Крупнейшая статуя, когда-либо воздвигнутая на Острове Жаб, возвышается над ландшафтом — монолитная реликвия давно исчезнувшей цивилизации. Высеченная из неизвестного маслянисто-чёрного камня, который блестит даже в отсутствие света, она имеет форму огромной жабы — приземистой, гротескной и пугающе реалистичной. Никто не знает, кто её построил и для какой цели. Ходят шёпотом слухи среди местных — о странных снах, приходящих к тем, кто засыпает слишком близко, о неестественном тепле камня при прикосновении и о глазах, что мерцают под его поверхностью, словно что-то наблюдает изнутри."

  building_ax_hold:0 "Топорный Оплот"
  building_type_ax_hold:0 "Топорный Оплот"
  building_ax_hold_desc:0 "Твердыня дома Ксхоре стоит одновременно убежищем и крепостью — бастион из камня и стали, возведённый для противостояния бурям Островов Василиска. Воздвигнутый на зубчатых утёсах в окружении коварных вод, он был создан не просто как дом, но как несокрушимый оплот, откуда кваатийские пираты Западных островов совершали свои печально известные набеги."

  building_garden_of_malice_01:0 "Огромный заросший форт"
  building_type_garden_of_malice_01:0 "Огромный заросший форт"
  building_garden_of_malice_01_desc:0 "Обширный заросший вал из кольцевой стены окружает руины, его древние камни едва различимы под ползучими лозами и густым мхом. В центре стоит рассыпающийся донжон. Время стёрло всю историю этого места, оставив лишь гнетущее, удушающее безмолвие.\n\nВьющиеся изгороди, одичавшие и неестественные, образуют запутанный лабиринт, чьи тропы смыкаются, словно живые. Среди сплетённой зелени таятся растения невозможных цветов — одни выделяют удушающие споры, другие — яд, обжигающий кожу, а некоторые движутся с пугающей целеустремлённостью.\n\nРуины остаются нетронутыми не потому, что забыты, а потому, что их боятся."

  building_garden_of_malice_02:0 "Сад Злобы"
  building_type_garden_of_malice_02:0 "Сад Злобы"
  building_garden_of_malice_02_desc:0 "Сад Злобы — крепость многоуровневой смерти, выстроенная из промасленного чёрного камня и опоясанная смертоносными укреплениями. Огромный, смещающийся лабиринт из шипастых лоз, ядовитых цветов и вьющихся изгородей окружает её. За лабиринтом — чёрный ров, полный ужасов, и высокие стены. В её ядре стоит валирийский донжон, увенчанный окаменевшим деревом, чьи корни словно питаются самой крепостью. Сад — это место, где сама земля стремится уничтожить непрошеных гостей."

  building_sapphire_quarter:0 "Сапфировый Квартал"
  building_type_sapphire_quarter:0 "Сапфировый Квартал"
  building_sapphire_quarter_desc:0 "Сапфировый Квартал — обширный, обнесённый стенами район на вершине высочайшего холма Гогоссоса. Некогда владение [Concept('dragonlords', 'драконьих лордов')|El], он ныне служит эксклюзивным анклавом для самых именитых рабовладельцев и торговых князей города. Лишь элита вправе обитать за его стенами, где возвышаются лишь великолепные особняки и дворцы из сияющего мрамора, украшенные золотом."

  building_crimson_gate:0 "Багряные Врата"
  building_type_crimson_gate:0 "Багряные Врата"
  building_crimson_gate_desc:0 "Багряные Врата — единственный сухопутный вход в Гогоссос, грозный бастион из валирийского чёрного камня, нависающий над коварным мостом, ведущим в город. Его поверхность поглощает свет, пропитана тёмной магией и окрашена багрянцем древними кровавыми ритуалами. Высотой в 140 футов, надвратное укрепление внушает трепет и ужас. Больше чем преграда, Багряные Врата — памятник забытой мощи Гогоссоса и тёмному наследию Валирии."

  building_glittering_pits_01:0 "Сверкающие Копи"
  building_type_glittering_pits_01:0 "Сверкающие Копи"
  building_glittering_pits_01_desc:0 "Джунгли Гогоссоса и печально известного Острова Слёз — бескрайняя, непокорённая глушь, кишащая и опасностями, и невообразимыми богатствами. Среди самых вожделенных сокровищ — алмазы и сапфиры, мерцающие в глубине земли, словно пленённая суть звёзд. Шахты здесь невелики, но их выработка поразительна — каждая раскопка являет камни ослепительного блеска."

  building_glittering_pits_02:0 "Мерцающие Каверны"
  building_type_glittering_pits_02:0 "Мерцающие Каверны"
  building_glittering_pits_02_desc:0 "По мере роста шахты превращаются в разветвлённую сеть подземных тоннелей, пронизывающих дно джунглей, словно корни древних деревьев наверху. Стены сверкают самоцветами, а скрытые камеры обнажают богатые жилы. Однако чем глубже копают, тем яростнее противится джунглям — корни взламывают стены, ядовитые споры витают в воздухе, а в темноте шевелятся незримые существа."

  building_glittering_pits_03:0 "Звёздные Глубины"
  building_type_glittering_pits_03:0 "Звёздные Глубины"
  building_glittering_pits_03_desc:0 "Звёздные Глубины — богатейшая и опаснейшая часть гогосситских шахт: обширный лабиринт тоннелей и сверкающих каверн, где безупречные сапфиры и массивные алмазы ловят малейший свет, напоминая звёздное небо под землёй. В самых нижних камерах странные толчки, гнетущий жар и шепотки о неестественных вещах сделали некоторые участки запретными. Это место великого богатства и ещё большего риска — где слишком глубокая копка может пробудить то, чему лучше оставаться погребённым."

  building_darkreach_quay_01:0 "Причал Тёмного Досягания"
  building_type_darkreach_quay_01:0 "Причал Тёмного Досягания"
  building_darkreach_quay_01_desc:0 "Причал Тёмного Досягания — скромное, но жизненно важное сердце торговли Гогоссоса, первая ступень портовой инфраструктуры города. Небольшая каменно-деревянная гавань, уходящая в тёмные воды залива, стратегически расположена как главный пункт прибытия для купцов, контрабандистов и искателей удачи."

  building_darkreach_quay_02:0 "Гавань Тёмного Досягания"
  building_type_darkreach_quay_02:0 "Гавань Тёмного Досягания"
  building_darkreach_quay_02_desc:0 "С расширением торговой империи Гогоссоса Гавань Тёмного Досягания превратилась в оживлённый центр коммерции. Причалы укреплены камнем и добротной древесиной, позволяя более крупным торговым судам безопасно швартоваться и разгружать экзотические грузы."

  building_darkreach_quay_03:0 "Порт Чёрного Прилива"
  building_type_darkreach_quay_03:0 "Порт Чёрного Прилива"
  building_darkreach_quay_03_desc:0 "С возрождением Гогоссоса его некогда скромный порт превратился в Порт Чёрного Прилива — колоссальный оплот торговли и морской мощи. Гавань укреплена древним валирийским чёрным камнем, а её могучие стены опоясывают оживлённые доки, обеспечивая непревзойдённую защиту от набегов и осад."

  building_last_dragon_tower_01:0 "Последняя Драконья Башня"
  building_type_last_dragon_tower_01:0 "Последняя Драконья Башня"
  building_last_dragon_tower_01_desc:0 "Последняя уцелевшая Драконья Башня за пределами [Concept('valyria', 'Валирии')|E], возведённая в последние дни перед [Concept('doom', 'Роком')|E], стоит памятником и мощи, и трагедии. Построенная для правящей семьи [Concept('dragonlord', 'повелителей драконов')|E] Гогоссоса, она должна была стать символом их вечного правления — но судьба рассудила иначе. Когда семья погибла в [Concept('doom_of_valyria', 'Роке Валирии')|E], башня обратилась в безмолвную реликвию утраченной империи.\n\nНыне она служит новому хозяину — могущественнейшему Архонту Гогоссоса, который правит с её высот. Драконья Башня — напоминание низшим сословиям, рабам и бунтовщикам о жестокой иерархии города."

  # Valyria
  building_type_valyria_volcano:0 "Один из Четырнадцати Огней"
  building_valyria_volcano_01:0 "Гора Гаэлитокс"
  building_type_valyria_volcano_01:0 "$building_type_valyria_volcano$"
  building_valyria_volcano_01_desc:0 "Гаэлитокс — один из грознейших вулканов среди легендарных Четырнадцати Огней [Concept('valyria', 'Валирии')|E]. Его вершина вечно окутана дымом и пеплом. Склоны изрезаны древними потоками застывшей лавы — следы [Concept('doom', 'Рока')|E]."

  building_valyria_volcano_02:0 "Разалхар"
  building_type_valyria_volcano_02:0 "$building_type_valyria_volcano$"
  building_valyria_volcano_02_desc:0 "Разалхар — крупнейший из Четырнадцати Огней, колосс расплавленной ярости. Его вершина пронзает небеса, а реки лавы текут из огненного ядра. Из-за экстремальных температур добыча невозможна."

  building_valyria_volcano_03:0 "Эпаэкрос"
  building_type_valyria_volcano_03:0 "$building_type_valyria_volcano$"
  building_valyria_volcano_03_desc:0 "Эпаэкрос опаснее прочих — дикая красота с нестабильными утёсами. Тех, кто достигает вершины, ждёт трагический конец из-за гнездящегося огненного червя или [Concept('dragon', 'дракона')|El]. Однако его недра богаты золотом и драгоценными металлами."

  building_valyria_volcano_04:0 "Тартаракс"
  building_type_valyria_volcano_04:0 "$building_type_valyria_volcano$"
  building_valyria_volcano_04_desc:0 "Тартаракс — стройный, но глубокий вулкан, чья причудливая вершина — идеальное гнездовье для огнелюбивых созданий. Его каверны открывают возможности для добычи, но и несут смерть. Сияние его лавы во мраке ночи незабываемо."

  building_valyria_volcano_05:0 "Йонтариос"
  building_type_valyria_volcano_05:0 "$building_type_valyria_volcano$"
  building_valyria_volcano_05_desc:0 "Йонтариос отличался от остальных — мал и невысок, с малым количеством магмы. Однако от него была своя польза: драгоценные минералы и идеальный размер для ритуалов и жертвоприношений."

  building_type_elyria_great_port_01:0 "Великий Порт Элирии"
  building_elyria_great_port_01:0 "Великий Порт Элирии"
  building_elyria_great_port_01_desc:0 "Великий Порт Элирии — огромные верфи, возведённые во времена [Concept('valyrian_freehold_short', 'Фригольда')|E]. После краха [Concept('valyrian_freehold_short', 'Фригольда')|E] этот порт захватил значительную долю торговли Залива Работорговцев."

  building_type_elyria_dragon_palace_01:0 "Драконий Дворец Элирии"
  building_elyria_dragon_palace_01:0 "Драконий Дворец Элирии"
  building_elyria_dragon_palace_01_desc:0 "Драконий Дворец — роскошная резиденция эпохи [Concept('valyrian_freehold_short', 'Фригольда')|E]. Грандиозные покои, пиршественные залы, бассейны, винные погреба. Ныне принадлежит герцогу Элирии."

  building_valyria_dead_volcano_01:0 "Сирабелос"
  building_type_valyria_dead_volcano_01:0 "$building_type_valyria_volcano$"
  building_valyria_dead_volcano_01_desc:0 "Сирабелос — потухший вулкан. Лава давно иссякла, но он богат минералами и может послужить укрытием при набегах или бурях."

  building_valyria_dead_volcano_01_02:0 "Шахты Сирабелоса"
  building_type_valyria_dead_volcano_01_02:0 "$building_type_valyria_volcano$"
  building_valyria_dead_volcano_01_02_desc:0 "Добыча в Сирабелосе восстановлена. Рабы ежедневно спускаются в шахты, извлекая драгоценные металлы для угнетателей."

  building_valyria_dead_volcano_02:0 "Каздарсос"
  building_type_valyria_dead_volcano_02:0 "$building_type_valyria_volcano$"
  building_valyria_dead_volcano_02_desc:0 "Каздарсос некогда был действующим вулканом. Потухший, но не безмолвный — крики огненных червей и, возможно, призраков всё ещё доносятся из его глубин."

  building_valyria_dead_volcano_02_02:0 "Каздарсос"
  building_type_valyria_dead_volcano_02_02:0 "$building_type_valyria_volcano$"
  building_valyria_dead_volcano_02_02_desc:0 "Шахты Каздарсоса вновь работают. Рабы ежедневно добывают богатства для хозяев. Однако рассказы о сверхъестественных тварях внутри вулкана не утихают..."

  building_royal_barracks_of_valyria_01:0 "Разрушенные казармы Валирии"
  building_type_royal_barracks_of_valyria_01:0 "Разрушенные казармы Валирии"
  building_royal_barracks_of_valyria_01_desc:0 "Некогда величественные казармы [Concept('valyrian_freehold_short', 'Фригольда')|E], ныне не более чем груда щебня."
  building_type_royal_barracks_of_valyria_01_desc:0 "Некогда величественные казармы [Concept('valyrian_freehold_short', 'Фригольда')|E], ныне не более чем груда щебня."

  building_royal_barracks_of_valyria_02:0 "Королевские казармы Валирии"
  building_type_royal_barracks_of_valyria_02:0 "Королевские казармы Валирии"
  building_royal_barracks_of_valyria_02_desc:0 "Восстановленные Королевские казармы Валирии вновь полны стражников и солдат."

  building_great_arena_of_valyria_01:0 "Останки Великой Арены"
  building_type_great_arena_of_valyria_01:0 "Останки Великой Арены"
  building_great_arena_of_valyria_01_desc:0 "Некогда великая арена ныне в руинах. Восстановление дорогостояще, но может вернуть народу радость."
  building_type_great_arena_of_valyria_01_desc:0 "Некогда великая арена ныне в руинах. Восстановление дорогостояще, но может вернуть народу радость."

  building_great_arena_of_valyria_02:0 "Великая Арена Валирии"
  building_type_great_arena_of_valyria_02:0 "Великая Арена Валирии"
  building_great_arena_of_valyria_02_desc:0 "Отстроенная Великая Арена привлекает тысячи зрителей на турниры и кровавые игры."

  building_great_library_of_valyria_01:0 "Ветхие руины библиотеки"
  building_type_great_library_of_valyria_01:0 "Ветхие руины библиотеки"
  building_great_library_of_valyria_01_desc:0 "Разрушенные останки великой библиотеки можно восстановить для хранения произведений искусства и литературы."
  building_type_great_library_of_valyria_01_desc:0 "Разрушенные останки великой библиотеки можно восстановить для хранения произведений искусства и литературы."

  building_great_library_of_valyria_02:0 "Великая Библиотека Валирии"
  building_type_great_library_of_valyria_02:0 "Великая Библиотека Валирии"
  building_great_library_of_valyria_02_desc:0 "Восстановленная Великая Библиотека, наполненная произведениями искусства, литературы и философии. Учёные изучают здесь древние тексты."

  building_valyria_veilspire_peak:0 "Пик Завесашпиля"
  building_type_valyria_veilspire_peak:0 "Пик Завесашпиля"
  building_valyria_veilspire_peak_desc:0 "Пик Завесашпиля — высочайшая вершина Валирийского полуострова, даже до [Concept('doom', 'Рока')|E]. Некогда священное паломничество. Говорят, взобравшиеся на вершину возвращаются мудрее."

  building_velakar_resort_01:0 "Старый разрушенный курорт"
  building_type_velakar_resort_01:0 "Старый разрушенный курорт"
  building_velakar_resort_01_desc:0 "Некогда Великий Курорт для [Concept('dragonlords', 'повелителей драконов')|El] и купцов, ныне груда кирпичей."

  building_velakar_resort_02:0 "Блистательный Курорт Велакара"
  building_type_velakar_resort_02:0 "Блистательный Курорт Велакара"
  building_velakar_resort_02_desc:0 "Восстановленный Курорт Велакара приветствует людей богатства и статуса. Вулканическое тепло для купален, тысячи слуг — поистине великолепное зрелище."

  building_aurions_lost_expedition:0 "Затерянная экспедиция Ауриона"
  building_type_aurions_lost_expedition:0 "Затерянная экспедиция Ауриона"
  building_aurions_lost_expedition_desc:0 "Затерянная экспедиция самопровозглашённого Императора Валирии Ауриона Варезиса. Бесплодная равнина — место погребения 30 000 человек, обращённых в груды металла и костей. Адский пейзаж."

  building_type_lokirian_barracks_01:0 "Локирийские казармы"
  building_type_lokirian_barracks_01_desc:0 "Могучие Локирийские казармы, славящиеся качеством своего оружия."
  building_lokirian_barracks_01:0 "Останки казарм"
  building_lokirian_barracks_01_desc:0 "Некогда могучие казармы Локирии, ныне обращённые в груду щебня."
  building_lokirian_barracks_02:0 "Частично восстановленные казармы"
  building_lokirian_barracks_02_desc:0 "Хотя от былого величия мало что осталось, казармы приведены в рабочее состояние. Солдаты тренируются внутри, и их голоса эхом разносятся по недостроенным залам."
  building_lokirian_barracks_03:0 "Могучие казармы Локирии"
  building_lokirian_barracks_03_desc:0 "Казармы Локирии, отстроенные и укреплённые драконьим камнем и валирийской сталью. Солдаты маршируют день и ночь, являя грозное зрелище и кошмар для любого осаждающего."

  building_redwyrms_wrath_01:0 "Разрушенная крепость"
  building_type_redwyrms_wrath_01:0 "Разрушенная крепость"
  building_redwyrms_wrath_01_desc:0 "Гнев Красного червя был грозной крепостью из драконьего камня со шпилями, увенчанными черепами убитых [Concept('dragon', 'драконов')|El]. Управляемая Лордом-Защитником Таурионом из Локирии, она была бастионом войны и господства. Ныне в руинах — лишь тень былого величия."

  building_redwyrms_wrath_02:0 "Гнев Красного червя"
  building_type_redwyrms_wrath_02:0 "Разрушенная крепость"
  building_redwyrms_wrath_02_desc:0 "Гнев Красного червя восстал вновь, его стены из драконьего камня вернули мрачное величие. Вновь увенчанный черепами [Concept('dragon', 'драконов')|El] и багряными знамёнами с гербом Красного Дракона Локирии, он внушает страх и уважение."

  building_valyrian_gate_01:0 "Руины Врат"
  building_type_valyrian_gate_01:0 "Руины Врат"
  building_valyrian_gate_01_desc:0 "Руины некогда великих Врат Валирии, могучего символа богатства и власти, ныне груда кирпичей."
  building_type_valyrian_gate_01_desc:0 "Руины некогда великих Врат Валирии, могучего символа богатства и власти, ныне груда кирпичей."

  building_valyrian_gate_02:0 "Великие Валирийские Врата"
  building_type_valyrian_gate_02:0 "Великие Валирийские Врата"
  building_valyrian_gate_02_desc:0 "Великие Врата Валирии — семь ворот и семь решёток из валирийской стали. Тысячи купцов и путешественников проходят через них. Гигантские статуи великих героев прошлого возвышаются над входом."

  building_great_harbor_of_valyria_01:0 "Бухта для гавани"
  building_type_great_harbor_of_valyria_01:0 "Великая Гавань Валирии"
  building_great_harbor_of_valyria_01_desc:0 "Эта бухта достаточно велика и глубока для строительства великой гавани. Пока здесь нет ничего, кроме рыбы."
  building_type_great_harbor_of_valyria_01_desc:0 "Эта бухта достаточно велика и глубока для строительства великой гавани. Пока здесь нет ничего, кроме рыбы."

  building_great_harbor_of_valyria_02:0 "Доки и ремонтные мастерские"
  building_type_great_harbor_of_valyria_02:0 "Великая Гавань Валирии"
  building_great_harbor_of_valyria_02_desc:0 "Для развития торговли и судостроения мы возведём длинные доки и ремонтные мастерские, а также каюту интенданта для торговли и инспекционную контору для досмотра и налогообложения."

  building_great_harbor_of_valyria_03:0 "Причалы"
  building_type_great_harbor_of_valyria_03:0 "Великая Гавань Валирии"
  building_great_harbor_of_valyria_03_desc:0 "Строительство причалов и расширение инфраструктуры позволит принимать больше кораблей и увеличить торговлю. Причалы также будут использоваться для швартовки военных кораблей флота."

  building_great_harbor_of_valyria_04:0 "Краны и судостроительные припасы"
  building_type_great_harbor_of_valyria_04:0 "Великая Гавань Валирии"
  building_great_harbor_of_valyria_04_desc:0 "Возведение больших кранов значительно повысит эффективность гавани. Судостроительная база рядом с портом ускорит постройку боевых кораблей. С этой Великой Гаванью никто не сможет бросить нам вызов на море."

  building_great_temple_of_valyria_01:0 "Холм для храма"
  building_type_great_temple_of_valyria_01:0 "Драконий Храм Валирии"
  building_great_temple_of_valyria_01_desc:0 "Для поклонения Богам нам нужен Великий Храм. К счастью, рядом с горой Тартаракс есть холм, на котором можно воздвигнуть Великолепный Храм Богам-Драконам. Близость к вулкану — дополнительное преимущество."
  building_type_great_temple_of_valyria_01_desc:0 "Для поклонения Богам нам нужен Великий Храм. К счастью, рядом с горой Тартаракс есть холм, на котором можно воздвигнуть Великолепный Храм Богам-Драконам. Близость к вулкану — дополнительное преимущество."

  building_great_temple_of_valyria_02:0 "Молельный зал и место собраний"
  building_type_great_temple_of_valyria_02:0 "Драконий Храм Валирии"
  building_great_temple_of_valyria_02_desc:0 "Начнём с богато украшенного молельного зала — скульптуры драконов и огня, гобелены с драконами, жаровни и лучший мрамор. Также создадим открытый зал для жертвоприношений."

  building_great_temple_of_valyria_03:0 "Горящая арена"
  building_type_great_temple_of_valyria_03:0 "Драконий Храм Валирии"
  building_great_temple_of_valyria_03_desc:0 "Валирийцы всегда сжигали мёртвых. Кремация в Храме рядом с вулканом — лучший способ почтить ушедших. Колонны с резьбой, экзотические цветы и алтарь из чёрного камня заменят деревянные погребальные костры."

  building_great_temple_of_valyria_04:0 "Статуи драконов"
  building_type_great_temple_of_valyria_04:0 "Драконий Храм Валирии"
  building_great_temple_of_valyria_04_desc:0 "Ни одно здание в Валирии не обходится без статуй драконов. Мы возведём 14 статуй — по одной на каждого Бога. Каждая будет уникальной и величественной."

  building_great_walls_of_valyria_01:0 "Ничтожные останки стены"
  building_type_great_walls_of_valyria_01:0 "Великие Чёрные Каменные Стены Валирии"
  building_great_walls_of_valyria_01_desc:0 "Здесь находятся останки Великих Стен Валирии. Почти ничего не уцелело — стены были разрушены во время [Concept('doom', 'Рока')|E]. Восстановление возможно, но обойдётся очень дорого."

  building_great_walls_of_valyria_02:0 "Великие Чёрные Каменные Стены Валирии"
  building_type_great_walls_of_valyria_02:0 "Великие Чёрные Каменные Стены Валирии"
  building_great_walls_of_valyria_02_desc:0 "Стены Валирии полностью восстановлены — внушительные и обширные, опоясывающие весь город. Столь широки, что двенадцать колесниц могут мчаться бок о бок. Сторожевые башни и рвы дополнительно укрепляют периметр."

  building_great_dragonkeep_of_valyria_01:0 "Площадка для дворца"
  building_type_great_dragonkeep_of_valyria_01:0 "Великий Драконий Замок Валирии"
  building_great_dragonkeep_of_valyria_01_desc:0 "Мы нашли потенциальную площадку для великого дворца. В будущем она станет воплощением величия. Но пока здесь нет ничего примечательного."
  building_type_great_dragonkeep_of_valyria_01_desc:0 "Мы нашли потенциальную площадку для великого дворца. В будущем она станет воплощением величия. Но пока здесь нет ничего примечательного."

  building_great_dragonkeep_of_valyria_02:0 "Закладка фундамента"
  building_type_great_dragonkeep_of_valyria_02:0 "Великий Драконий Замок Валирии"
  building_great_dragonkeep_of_valyria_02_desc:0 "Для правителей этого великого города нужен внушительный дворец. Нет — величайший дворец, какой видел свет. Потребуются рабы и золото, но ресурсы достижимы. Этот дворец станет свидетельством валирийского величия. Мы начнем с крепости и продолжим нашу экспансию оттуда."

  building_great_dragonkeep_of_valyria_03:0 "Внешние стены"
  building_type_great_dragonkeep_of_valyria_03:0 "Великий Драконий Замок Валирии"
  building_great_dragonkeep_of_valyria_03_desc:0 "Чтобы сделать замок неприступным, возведём стены исключительно из чёрного камня. Они будут высокими и толстыми, отражая всех врагов. Разумеется, это будет очень дорогостоящим предприятием."

  building_great_dragonkeep_of_valyria_04:0 "Внутренние стены и убранство"
  building_type_great_dragonkeep_of_valyria_04:0 "Великий Драконий Замок Валирии"
  building_great_dragonkeep_of_valyria_04_desc:0 "Возведены внешние стены — теперь внутренние для усиления обороны. Двери, решётки и бойницы будут построены. Великий замок украсим шелками, гобеленами, трофеями и многим другим для демонстрации великолепия."

  building_procrazion_01:0 "Заброшенный великий замок"
  building_type_procrazion_01:0 "Прокразион"
  building_procrazion_01_desc:0 "Прокразион некогда был бастионом валирийской мощи, стоящим на вершине центральной горы в сердце города. До [Concept('doom', 'Рока')|E] этот великий замок был военным и политическим центром. Хотя его структура в основном сохранилась, время не пощадило некогда славные залы. Каменные мосты разрушены, интерьер обветшал. Однако его возвышенное положение и ограниченное число подходов дают стратегическое преимущество."

  building_procrazion_02:0 "Прокразион"
  building_type_procrazion_02:0 "Прокразион"
  building_procrazion_02_desc:0 "Прокразион восстановлен до прежнего величия. Мосты отстроены, Драконьи Башни вновь действуют, а купольные башни сияют, как до [Concept('doom', 'Рока')|E]. Внутри — все удобства, достойные лорда. Уникальная кузница, вновь направляющая лаву для ковки оружия, делает замок практически неприступным."

  building_eternal_flame_temple_01:0 "Заброшенный храм"
  building_type_eternal_flame_temple_01:0 "Храм Вечного Пламени"
  building_eternal_flame_temple_01_desc:0 "Храм Вечного Пламени был связующим звеном между Древними Богами Валирии и валирийскими воинами. Некогда религиозный центр простого народа, ныне — пыльный и заброшенный, туманное воспоминание о некогда почитаемом Высшем Храме валирийской космогонии."

  building_eternal_flame_temple_02:0 "Храм Вечного Пламени"
  building_type_eternal_flame_temple_02:0 "Храм Вечного Пламени"
  building_eternal_flame_temple_02_desc:0 "Храм Вечного Пламени обновлён и стоит символом мощи, веры и власти. Простой народ наслаждается роскошью и мечтает о драконах прошлого. Воины приходят молиться о ярости и мощи драконов. Храм сияет маяком веры и надежды, а также новой валирийской мощи."

  building_red_guard_barracks_01:0 "Заброшенные казармы"
  building_type_red_guard_barracks_01:0 "Казармы Красной Стражи"
  building_red_guard_barracks_01_desc:0 "Некогда гордая штаб-квартира элитной Красной Стражи города, ныне заброшена у древних городских стен. Время разрушило окрестности, а внутри — обломки бойниц и ржавые конструкции свидетельствуют о запустении после [Concept('doom', 'Рока')|E]. Две Драконьи Башни позади — лишь воспоминание о былой военной мощи."

  building_red_guard_barracks_02:0 "Казармы Красной Стражи"
  building_type_red_guard_barracks_02:0 "Казармы Красной Стражи"
  building_red_guard_barracks_02_desc:0 "Тщательно восстановленные до валирийской мощи, Казармы Красной Стражи — обновлённый дом защитников города. Драконьи Башни источают жизненную силу. Восстановленная элитная Красная Стража поддерживает дисциплину и непревзойдённую славу."

  building_red_guard_training_compound_01:0 "Заброшенный тренировочный комплекс"
  building_type_red_guard_training_compound_01:0 "Тренировочный комплекс Красной Стражи"
  building_red_guard_training_compound_01_desc:0 "Обветшалые стены не способны рассказать о некогда великих Красных Стражах, тренировавшихся здесь. Это комплекс, когда-то полный драконов, воинов и лидеров, ныне заброшен и пуст."

  building_red_guard_training_compound_02:0 "Тренировочный комплекс Красной Стражи"
  building_red_guard_training_compound_02_desc:0 "Сила, честь и мощь — вот что ожидает взглянувшего на восстановленный комплекс. Воины стремятся стать частью элитной Красной Стражи. С величественными колоннами и крышей с красными окнами, комплекс обучает лучших из лучших."

  building_type_zanpur_volcano_01:0 "Гора Занпур"
  building_zanpur_volcano_01:0 "Гора Занпур"
  building_zanpur_volcano_01_desc:0 "Занпур — западный из двух вулканов-близнецов островов Марахай."

  building_type_yovesh_volcano_01:0 "Гора Йовеш"
  building_yovesh_volcano_01:0 "Гора Йовеш"
  building_yovesh_volcano_01_desc:0 "Йовеш — восточный из двух вулканов-близнецов островов Марахай."
