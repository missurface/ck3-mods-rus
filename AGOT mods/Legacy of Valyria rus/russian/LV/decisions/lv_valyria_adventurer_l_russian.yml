colonize_county_or_duchy_decision_desc: "Пришло время пустить корни. Мы больше не будем простыми скитальцами — мы вырубим себе дом, подчинив дикую землю перед нами.\n\nКогда наши военные отряды готовы, а поселенцы полны решимости, мы заявим права на эти земли — сталью, золотом или одной лишь несгибаемой волей. Когда дело будет сделано, мы перестанем быть простыми искателями приключений. Мы станем лордами."
