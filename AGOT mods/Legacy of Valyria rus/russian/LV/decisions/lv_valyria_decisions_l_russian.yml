  lv_restore_valyrian_freehold_decision:0 "Восстановить Валирийский Фригольд"
  lv_restore_valyrian_freehold_decision_desc:0 "На вершине своего могущества Валирийский Фригольд был непревзойдённой, величайшей и господствующей цивилизацией своего времени, более всего известной способностью повелевать бесчисленными драконами во время войны. Его военная и культурная мощь была столь велика, что лишь катаклизм Рока смог положить конец его пятитысячелетнему владычеству над Эссосом. Всё, что осталось от этой великой цивилизации, — дымящиеся шпили великих драконьих лордов и призрачные, покрытые пеплом земли, частично поглощённые Дымным морем.\n\nЕсли сердце Валирии удастся вернуть вместе со значительной частью её бывших владений, никто не сможет оспорить мои притязания и мою власть как истинного и законного правителя Валирийского Фригольда."
  lv_restore_valyrian_freehold_decision_tooltip:0 "[GetTitleByKey('h_valyrian_freehold').GetName] будет восстановлен."
  lv_restore_valyrian_freehold_decision_confirm:0 "Наше время настало"
  lv_restore_valyrian_freehold_decision_effect_tooltip:0 "[GetTitleByKey('h_valyrian_freehold').GetName] будет восстановлен и получит [Concept('de_jure', 'де-юре права')|E] на все удерживаемые сейчас [Concept('empire', 'империи')|E] в Эссосе."

  lv_restore_valyrian_freehold_valyria_requirement_tooltip:0 "Вы должны [Concept('completely_control', 'полностью контролировать')|E] Валирийский полуостров."
  lv_restore_valyrian_freehold_former_colonies_requirement_tooltip:0 "Вы должны [Concept('completely_control', 'полностью контролировать')|E] не менее трёх территорий [Concept('empire', 'имперского')|E] уровня, бывших колониями Валирийского Фригольда."

