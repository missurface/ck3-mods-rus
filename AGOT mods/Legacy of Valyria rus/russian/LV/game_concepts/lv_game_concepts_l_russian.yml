l_russian:
 #Doom
  game_concept_doom_of_valyria:0 "Рок Валирии"
  game_concept_doom_of_valyria_desc:0 "#bold Рок Валирии#!, или просто #bold Рок#!, — катаклизм неизвестной природы, ставший причиной крушения [Concept('valyrian_freehold', 'Валирийского Фригольда')|E], процветавшего пять тысяч лет. Он произошёл примерно за столетие до Завоевания Эйгоном [Concept('westeros', 'Вестероса')|E], в 102 году до З.Э. Заклинания, знания и летописи были утрачены в ходе #bold Рока#!, а за катастрофой последовало Столетие Крови."
  game_concept_doom:0 "Рок"

 #[valyrian_freehold|E]
  game_concept_valyrian_freehold_short:0 "Фригольд"
  game_concept_valyrian_freehold:0 "Валирийский Фригольд"
  game_concept_valyrian_freehold_desc:0 "#bold Валирийский Фригольд#! — великая держава, простиравшаяся на большую часть континента [essos|E], ныне обращённая в руины. Он был уничтожен примерно за сто лет до Завоевания Эйгона, когда его низвергла катастрофа, известная как [doom_of_valyria|E].\n\nВ пору расцвета #bold Валирийский Фригольд#! охватывал бо́льшую часть восточного континента и простирался до нынешних [Concept('free_cities', 'Вольных Городов')|E] и острова Драконий Камень у берегов [Concept('westeros', 'Вестероса')|E]. #bold Фригольд#! формально никогда не был империей, однако для удобства его принято называть таковой.\n\n#bold Фригольд#! был развитой цивилизацией и доминирующей военной и культурной силой известного мира. Его столицей был город Валирия. #bold Фригольдом#! правили лорды-фригольдеры — могущественные знатные семейства. Самыми могущественными из них были [dragonlords|El]."
  game_concept_the_freehold:0 "Фригольд"

 #Dragonlords
  game_concept_dragonlord:0 "Драконий владыка"
  game_concept_dragonlords:0 "Драконьи владыки"
  game_concept_dragonlord_desc:0 "#bold Драконьи владыки#! — [Concept('dragon_riding', 'ездившие на драконах')|El], наиболее могущественные вельможи [Concept('valyrian_freehold', 'Валирийского Фригольда')|E]. Некоторых представителей дома Таргариенов, таких как Эйгон Завоеватель, называли «драконьими владыками» и после [Concept('doom_of_valyria', 'Рока Валирии')|E] и гибели цивилизации."

 #Dragonrider
  game_concept_dragonrider:0 "Драконий наездник"
  game_concept_dragonriders:0 "Драконьи наездники"
  game_concept_dragon_riding:0 "Езда на драконах"
  game_concept_dragonrider_desc:0 "[GetTrait('dragonrider').GetName(GetNullCharacter)] — это человек, чьим ездовым животным является [dragon|E].\n\n[GetTrait('dragonrider').GetName(GetNullCharacter)] встречались среди семей [Concept('dragonlord', 'драконьих владык')|El] в [Concept('valyrian_freehold', 'Валирийском Фригольде')|E], когда [the_freehold|E] был ещё силён.\n\nТаргариены были одной из таких семей драконьих владык, хотя и далеко не самой могущественной, и стали последними известными [GetTrait('dragonrider').GetName(GetNullCharacter)], пережившими [doom_of_valyria|E] и его последствия."

 #Continents
   game_concept_known_world:0 "Известный мир"
   game_concept_three_known_continents:0 "Три известных континента"
   game_concept_known_world_desc:0 "#bold Известный мир#! состоит как минимум из трёх континентов ([westeros|E], [essos|E] и [sothoryos|E]), крупного массива суши ([ulthos|E]) и множества мелких островов.\n\nНи один из четырёх основных массивов суши не был полностью картографирован, и бо́льшая часть мира остаётся неисследованной.\n\nХотя [maesters|El] из [Concept('westeros', 'Вестероса')|E] немало знают о землях далёкого востока, расстояние по-прежнему является проблемой, и за определённой точкой мифы и легенды начинают проникать в их записи."
   #Westeros
    game_concept_westeros:0 "Вестерос"
    game_concept_westerosi:0 "Вестеросский"
    game_concept_westeros_desc:0 "#bold Вестерос#! — один из [Concept('three_known_continents', 'трёх известных континентов')|E] [Concept('known_world', 'известного мира')|E], наряду с [Concept('essos', 'Эссосом')|E] и [Concept('sothoryos', 'Соториосом')|E]. Бо́льшая часть территории #bold Вестероса#! покрыта политическим образованием, известным как [seven_kingdoms|E], а далёкий север за Стеной населён одичалыми.\n\nБлижайшие иностранные государства к #bold Вестеросу#! — [free_cities|E]. К югу от #bold Вестероса#! лежат Летние острова."
    game_concept_seven_kingdoms:0 "Семь Королевств"
    game_concept_seven_kingdoms_desc:0 "#bold Семь Королевств#! — государство на континенте [westeros|E], управляемое монархом с титулом Короля [Concept('andals', 'Андалов')|E], [Concept('rhoynar', 'Ройнаров')|E] и [Concept('first_men', 'Первых Людей')|E], Лорда #bold Семи Королевств#!, восседающим на Железном Троне в столице — Королевской Гавани. Название восходит к временам трёхсотлетней давности, когда Эйгон Завоеватель начал объединять земли [Concept('westeros', 'Вестероса')|E], которыми правили семь независимых королевств, помимо земель [beyond_the_wall|E]. Новое королевство, созданное в результате Завоевания Эйгона, разделено на девять отдельных регионов или провинций."
    game_concept_narrow_sea:0 "Узкое море"
    game_concept_narrow_sea_desc:0 "#bold Узкое море#! — море между континентами [westeros|E] на западе и [essos|E] на востоке. Море относительно узкое и его легко пересечь, однако достаточно широкое, чтобы затруднить масштабные вторжения и военные операции между [Concept('seven_kingdoms', 'Семью Королевствами')|E] и [Concept('free_cities', 'Вольными Городами')|E].\n\nМежду двумя континентами и Портом Иббена ведётся регулярная торговля через #bold Узкое море#!. [Concept('westerosi', 'Вестеросская')|E] знать иногда воспитывается или ищет убежища в городах за водой."
    game_concept_others:0 "Иные"
    game_concept_white_walkers:0 "Белые Ходоки"
    game_concept_cold_gods:0 "Холодные боги"
    game_concept_white_shadows:0 "Белые тени"
    game_concept_cold_shadows:0 "Холодные тени"
    game_concept_others_desc:0 "#bold Иные#!, также известные как #bold Белые Ходоки#!, #bold Холодные боги#!, #bold Белые тени#! и #bold Холодные тени#! — вид человекоподобных существ, обитающих на севере за [Concept('watch_wall', 'Стеной')|E]. Поскольку их не видели уже от шести до восьми тысяч лет, они считаются вымершими."
    game_concept_watch_wall:0 "Стена"
    game_concept_watch_wall_desc:0 "#bold Стена#! — грандиозная преграда, преимущественно изо льда, протянувшаяся вдоль северной границы [Concept('seven_kingdoms', 'Семи Королевств')|E] и отделяющая их от [Concept('wild_lands_beyond', 'Диких земель за Стеной')|E]. #bold Стена#! имеет длину в сто лиг (триста миль) и достигает более семисот футов в самой высокой точке, хотя некоторые блоки основания в холмистых районах, например вблизи Серой Стражи, поднимают её на девятьсот футов.\n\n Одно из девяти Рукотворных Чудес по Ломасу Длинному Шагу, #bold Стену#! охраняют и удерживают Братья [Concept('nw_govt', 'Ночного Дозора')|E], которые патрулируют и стерегут девятнадцать замков от горной цепи Клыков Мороза на западе до Тюленьего залива на востоке. Только Сумеречная Башня, Чёрный Замок и Восточный Дозор-у-Моря имеют гарнизон к началу «#bold Песни Льда и Огня#!». Тех, кто вступил в Дозор, чтобы избежать иного наказания, говорят, что их #bold отправили на Стену#!."
    game_concept_beyond_the_wall:0 "За Стеной"
    game_concept_wild_lands_beyond:0 "Дикие земли за Стеной"
    game_concept_beyond_the_wall_desc:0 "#bold За Стеной#! — общее название самого северного края [Concept('westeros', 'Вестероса')|E], земель к северу от [Concept('watch_wall', 'Стены')|E] и [Concept('seven_kingdoms', 'Семи Королевств')|E]. "
    game_concept_age_of_heroes:0 "Эпоха Героев"
    game_concept_age_of_heroes_desc:0 "#bold Эпоха Героев#! — эра [Concept('westerosi', 'вестеросской')|E] истории, предшествовавшая [Concept('coming_of_the_andals', 'Приходу Андалов')|E]. Она получила своё название от великих мужей и жён, живших в годы мира, наступившего после заключения [Concept('pact', 'Пакта')|E] между [Concept('first_men', 'Первыми Людьми')|E] и [Concept('children_of_the_forest', 'Детьми леса')|E]. Многие знатные дома ведут свою родословную от #bold Эпохи Героев#!, хотя историкам трудно отделить правду от легенд."
    game_concept_dawn_age:0 "Эра Рассвета"
    game_concept_dawn_age_desc:0 "#bold Эра Рассвета#!, также называемая #bold Рассветом Дней#! или #bold рассветными столетиями#! — время неопределённой продолжительности, когда [first_men|E] прибыли из [Concept('essos', 'Эссоса')|E] и начали заселять [westeros|E]. До них [children_of_the_forest|E] — таинственные и крошечные существа со сверхъестественными дарами — населяли эту землю, поклоняясь [Concept('nameless_gods', 'Безымянным Богам')|E] природы и живя с ней в гармонии, возможно, бок о бок с великанами."
    game_concept_long_night:0 "Долгая Ночь"
    game_concept_long_night_desc:0 "#bold Долгая Ночь#! — так [Concept('westerosi', 'вестеросцы')|E] называют период, когда на [known_world|E] пала ужасная тьма. Это произошло во время [Concept('age_of_heroes', 'Эпохи Героев')|E], примерно за восемь тысяч лет до Завоевания Эйгона, в разгар великой зимы, длившейся годами. #bold Долгая Ночь#! продолжалась целое поколение и несла голод и ужас."
    game_concept_first_men:0 "Первые Люди"
    game_concept_first_men_desc:0 "#bold Первые Люди#! — одна из трёх основных этнических групп, от которых произошли люди [Concept('westeros', 'Вестероса')|E], наряду с [Concept('andals', 'Андалами')|E] и [Concept('rhoynar', 'Ройнарами')|E]. #bold Первые Люди#! — культура людей, первыми ступивших на континент. Влияние #bold Первых Людей#! ощущается в [Concept('westeros', 'Вестеросе')|E] по сей день, особенно на Севере. Лорд [Concept('seven_kingdoms', 'Семи Королевств')|E], король на Железном Троне, именуется Королём [Concept('andals', 'Андалов')|E], [Concept('rhoynar', 'Ройнаров')|E] и #bold Первых Людей#!."
    game_concept_andal:0 "Андал"
    game_concept_andals:0 "Андалы"
    game_concept_andal_desc:0 "#bold Андалы#! — одна из трёх основных этнических групп, от которых произошли люди [Concept('westeros', 'Вестероса')|E], наряду с [Concept('first_men', 'Первыми Людьми')|E] и [Concept('rhoynar', 'Ройнарами')|E]. [coming_of_the_andals|E] в [westeros|E] привело к падению многих королевств [Concept('first_men', 'Первых Людей')|E], сложившихся после заключения [Concept('pact', 'Пакта')|E] с [Concept('children_of_the_forest', 'Детьми леса')|E].\n\n#bold Андалы#! также принесли на континент веру в Семерых. Лорд [Concept('seven_kingdoms', 'Семи Королевств')|E], король на Железном Троне, именуется Королём #bold Андалов#!, [Concept('rhoynar', 'Ройнаров')|E] и [Concept('first_men', 'Первых Людей')|E].\n\n[dothraki|E] называют [westeros|E] «Рейш Андали» — землёй #bold Андалов#!."
    game_concept_rhoynar:0 "Ройнары"
    game_concept_rhoynar_desc:0 "#bold Ройнары#! — одна из трёх основных этнических групп, от которых произошли люди [Concept('westeros', 'Вестероса')|E], наряду с [Concept('andals', 'Андалами')|E] и [Concept('first_men', 'Первыми Людьми')|E]. Они были культурой речных людей, обитавших на берегах великой реки #bold Ройны#! в [Concept('essos', 'Эссосе')|E]. Будучи вынужденными бежать на десяти тысячах кораблей во время Ройнийских войн с Валирией, уцелевшие #bold ройнары#! в конце концов осели в Дорне на юге [Concept('westeros', 'Вестероса')|E].\n\n\nХотя большинство #bold ройнаров#! влились в дорнийское общество, особенно среди так называемых «солёных дорнийцев», сироты Зеленокровной сохранили своё ройнийское наследие и язык. Лорд [Concept('seven_kingdoms', 'Семи Королевств')|E], восседающий на Железном Троне, носит титул Короля [Concept('andals', 'Андалов')|E], Ройнаров и [Concept('first_men', 'Первых Людей')|E]."
    game_concept_coming_of_the_andals:0 "Приход Андалов"
    game_concept_coming_of_the_andals_desc:0 "#bold Приход Андалов#!, #bold переход Андалов#! или #bold прибытие Андалов#! — так называют миграцию [Concept('andals', 'Андалов')|E] из [Concept('essos', 'Эссоса')|E] в [westeros|E]. Время этого события оспаривается; одни источники указывают на шесть тысяч лет назад, «Истинная История» утверждает, что это произошло четыре тысячи лет назад, а некоторые [maesters|E], такие как Денестан, полагают, что это было две тысячи лет назад.\n\nМногие мелкие королевства [Concept('first_men', 'Первых Людей')|E] были уничтожены [Concept('andal', 'андальскими')|E] захватчиками, а [children_of_the_forest|E] были оттеснены на север. Однако захват иногда проходил мирно, через браки между [Concept('andals', 'Андалами')|E] и [Concept('first_men', 'Первыми Людьми')|E]."
    game_concept_children_of_the_forest:0 "Дети леса"
    game_concept_children_of_the_forest_desc:0 "#bold Дети леса#!, которых иногда называют просто #bold детьми#! — таинственная нечеловеческая раса, изначально населявшая континент [westeros|E] во время [Concept('dawn_age', 'Эры Рассвета')|E], задолго до прибытия [Concept('first_men', 'Первых Людей')|E] тысячи лет назад. Великаны называют их «вох дак наг грам» (маленький беличий народ). Сами они называют себя #bold те, кто поёт песнь земли#! на Истинном Языке. #bold Детей#! уже сотни лет не видели среди людей."
    game_concept_pact:0 "Пакт"
    game_concept_pact_desc:0 "#bold Пакт Острова Ликов#! положил конец древней войне между [Concept('first_men', 'Первыми Людьми')|E] и [Concept('children_of_the_forest', 'Детьми леса')|E] более 10 000 лет назад. Он был подписан на острове посреди #bold Божьего Ока#!, где на чардревах были вырезаны лики, дабы боги засвидетельствовали договор. Зелёным людям было поручено охранять остров.\n\n#bold Пакт#! длился на протяжении [Concept('age_of_heroes', 'Эпохи Героев')|E], [Concept('long_night', 'Долгой Ночи')|E] и возвышения [Concept('seven_kingdoms', 'Семи Королевств')|E], пока, много веков спустя, [andals|E] не пересекли [narrow_sea|E], принеся великие перемены в [westeros|E]."
    game_concept_old_gods:0 "Старые Боги"
    game_concept_nameless_gods:0 "Безымянные Боги"
    game_concept_old_gods_desc:0 "#bold Старые боги#! — безымянные божества леса, ручья и камня, которым в [Concept('seven_kingdoms', 'Семи Королевствах')|E] по-прежнему поклоняются, главным образом на севере [Concept('westeros', 'Вестероса')|E] и за [Concept('watch_wall', 'Стеной')|E]. Хотя Вера Семерых вытеснила их в большинстве регионов, почитание #bold старых богов#! сохранилось среди северян, болотников и одичалых. Многие [Concept('westerosi', 'вестеросцы')|E] по-прежнему клянутся и старыми, и новыми."

    #Sothoryos
    game_concept_sothoryos:0 "Соториос"
    game_concept_sothoros:0 "Соторос"
    game_concept_sothoryos_desc:0 "#bold Соториос#! или #bold Соторос#! — один из [Concept('three_known_continents', 'трёх известных континентов')|E] мира. Он расположен к юго-востоку от [Concept('westeros', 'Вестероса')|E] и к югу от [Concept('essos', 'Эссоса')|E] за [Concept('summer_sea', 'Летним морем')|E]. К востоку от #bold Соториоса#! лежит южное Нефритовое море. "
   #Essos
    game_concept_essos:0 "Эссос"
    game_concept_essosi:0 "Эссосский"
    game_concept_the_east:0 "Восток"
    game_concept_essos_desc:0 "#bold Эссос#!, часто называемый просто восток — крупнейший из [Concept('three_known_continents', 'трёх известных континентов')|El] мира.\n\nОн лежит к востоку от [Concept('westeros', 'Вестероса')|E] и к северу от [Concept('sothoryos', 'Соториоса')|E] и [Concept('ulthos', 'Ультоса')|E], простираясь от Дрожащего моря на севере до Летнего моря на юге и от Узкого моря на западе до земель вокруг Нефритового моря на востоке, если не дальше.\n\n#bold Эссос#! населён множеством различных народов и обладает обширной и разнообразной географией."
    game_concept_summer_sea:0 "Летнее море"
    game_concept_summer_sea_desc:0 "#bold Летнее море#! — один из главных океанов [Concept('known_world', 'известного мира')|E]. Оно расположено к югу от [Concept('westeros', 'Вестероса')|E] и [Concept('essos', 'Эссоса')|E], разделяя эти континенты от южного массива суши — [Concept('sothoryos', 'Соториоса')|E]. Оно отделено от [Concept('narrow_sea', 'Узкого моря')|E] островами, известными как Ступени, а от Нефритового моря — Кварфийскими проливами. Залив Работорговцев и залив Скорби — крупные заливы #bold Летнего моря#!, а [valyrian_peninsula|E] вдаётся в него."
    #Free cities
     game_concept_free_cities:0 "Вольные Города"
     game_concept_free_city:0 "Вольный Город"
     game_concept_free_cities_desc:0 "#bold Вольные Города#!, также называемые #bold Девять Вольных Городов#! — группа из девяти независимых городов-государств в западном [Concept('essos', 'Эссосе')|E], расположенных к западу от [Concept('dothraki_sea', 'Дотракийского моря')|E] и Расписных гор и к северо-западу от Валирийского полуострова.\n\n#bold Вольные Города#! ведут активную торговлю с [Concept('seven_kingdoms', 'Семью Королевствами')|E] [Concept('westeros', 'Вестероса')|E]. Многие в #bold Вольных Городах#! считают себя более утончёнными, чем вестеросцы, а некоторые и вовсе считают жителей [Concept('seven_kingdoms', 'Семи Королевств')|E] дикарями."
    #Dothraki
     game_concept_dothraki_sea:0 "Дотракийское море"
     game_concept_dothraki_sea_desc:0 "#bold Дотракийское море#!, также известное как #bold Великое Травяное море#!, #bold Проклятые земли#! и #bold Великое запустение#! — обширный внутренний регион континента [Concept('essos', 'Эссос')|E], расположенный к востоку от [Concept('free_cities', 'Вольных Городов')|E], к северу от Залива Работорговцев и к западу от Костяных гор.\n\nЕго ландшафт степей и равнин является родиной кочевого конного народа [Concept('dothraki', 'дотракийцев')|E], который постоянно сражается друг с другом и совершает набеги на окрестные земли."
     game_concept_dothraki:0 "Дотракийцы"
     game_concept_dothraki_desc:0 "#bold Дотракийцы#! — культура кочевых воинов [Concept('essos', 'Эссоса')|E], которые кочуют по бескрайним лугам [Concept('dothraki_sea', 'Дотракийского моря')|E] в ордах, называемых кхаласарами. Жители [Concept('seven_kingdoms', 'Семи Королевств')|E] и [Concept('free_cities', 'Вольных Городов')|E] также называют #bold дотракийцев#! конными владыками."
   #Ulthos
    game_concept_ulthos:0 "Ультос"
    game_concept_ulthos_desc:0 "#bold Ультос#! — массив суши на далёком востоке, который может быть, а может и не быть ещё одним континентом. Он лежит к югу от Асшая и Земель Теней в [Concept('essos', 'Эссосе')|E] и к востоку от [Concept('sothoryos', 'Соториоса')|E]. От Земель Теней его отделяют Шафрановые проливы. Остров Улос расположен в проливах между #bold Ультосом#! и [Concept('essos', 'Эссосом')|E].\n\nО #bold Ультосе#! мало что известно, кроме его расположения и того, что он покрыт густыми джунглями."
   #Valyria
    game_concept_valyria:0 "Валирия"
    game_concept_old_valyria:0 "Древняя Валирия"
    game_concept_valyria_desc:0 "#bold Древняя Валирия#!, изначально известная просто как #bold Валирия#! — столица некогда великой цивилизации, известной как [valyrian_freehold|E]. Город Валирия расположен на восточном континенте [essos|E], к юго-востоку от [Concept('free_cities', 'Вольных Городов')|E], на [valyrian_peninsula|E] — крупном полуострове, уходящем на юг в [summer_sea|E]."
    game_concept_valyrian_peninsula:0 "Валирийский полуостров"
    game_concept_valyrian_peninsula_desc:0 "#bold Валирийский полуостров#! — крупный, широкий мыс, выдающийся на юг от [Concept('essos', 'Эссоса')|E] в [summer_sea|E], сердце ныне исчезнувшего [Concept('valyrian_freehold', 'Валирийского Фригольда')|E] и место расположения его столицы — [Concept('valyria', 'Валирии')|E]. Частично разрушенный во время [Concept('doom', 'Рока')|E], когда образовались многочисленные острова, а низменные земли были затоплены, превратившись в [smoking_sea|E]."
    game_concept_smoking_sea:0 "Дымящееся море"
    game_concept_smoking_sea_desc:0 "#bold Дымящееся море#! — водоём, расположенный непосредственно к югу от [Concept('valyrian_peninsula', 'Валирийского полуострова')|E], у южного побережья [Concept('essos', 'Эссоса')|E]. Оно является частью океана, известного как [summer_sea|E]. Образовавшееся в результате [Concept('doom_of_valyria', 'Рока Валирии')|E], #bold Дымящееся море#! разделяет многочисленные острова, прежде бывшие частью [Concept('valyria', 'Валирии')|E], друг от друга и от материка на севере."

 #Crafting
  game_concept_resources:0 "Ресурсы"
  game_concept_resources_desc:0 "Ресурсы включают [zz_iron|E], [zz_steel|E], [zz_obsidian|E] и [zz_valyrian_steel|E] — запасы материалов державы для крафта. Здания, генерирующие ресурсы, могут быть построены в любой провинции с владением."
  game_concept_crafting_resources_tooltip:0 "@lov_icon_resources!"

  zz_iron:0 "Железо"
  game_concept_zz_iron:0 "$zz_iron$"
  game_concept_zz_iron_desc:0 "Железо — прочный металл, часто используемый для изготовления инструментов и вооружения. Его можно добывать в провинциях с построенным железным рудником. Оно является основой для [Concept('zz_steel', 'стали')|E]."
  game_concept_iron_tooltip:0 "@lov_icon_iron!"
  
  zz_steel:0 "Сталь"
  game_concept_zz_steel:0 "$zz_steel$"
  game_concept_zz_steel_desc:0 "Сталь — твёрдый сплав [Concept('zz_iron', 'железа')|E] и углерода, часто используемый для изготовления оружия и доспехов. Кузницы стали производят сталь и требуют наличия железных рудников для строительства."
  game_concept_steel_tooltip:0 "@lov_icon_steel!"

  zz_obsidian:0 "Обсидиан"
  game_concept_zz_obsidian:0 "$zz_obsidian$"
  game_concept_zz_obsidian_desc:0 "Обсидиан, в простонародье называемый драконьим стеклом — вулканическое стекло, формирующееся под воздействием огромной жары и давления в недрах земли. Провинции с залежами обсидиана — как правило, провинции с вулканами — могут добывать обсидиан в специальных обсидиановых шахтах."
  game_concept_obsidian_tooltip:0 "@lov_icon_obsidian!"

  zz_valyrian_steel:0 "Валирийская сталь"
  game_concept_zz_valyrian_steel:0 "$zz_valyrian_steel$"
  game_concept_zz_valyrian_steel_desc:0 "Валирийская сталь — разновидность [Concept('zz_steel', 'стали')|E] из Валирии, используемая для изготовления оружия и различных предметов непревзойдённого качества. Магия играет роль в её ковке, именно она делает эту сталь особенной и наделяет её магическими свойствами. [dragonlords|E] могут производить валирийскую сталь в специальных кузницах валирийской стали, которые можно построить в провинциях с железными рудниками."
  game_concept_zz_v_steel:0 "Вал. сталь"
  game_concept_v_steel_tooltip:0 "@lov_icon_valyrian_steel!"
