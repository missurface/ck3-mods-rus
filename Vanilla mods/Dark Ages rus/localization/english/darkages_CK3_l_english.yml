darkages_stress_lunacy.01.t1:0 "Stroke!"
darkages_stress_lunacy.01.t2:0 "A Dodged Arrow"
darkages_stress_lunacy.01.desc1:0 "The effects of Stress proved catastrophic for my well being and suddenly I suffered a stroke!\n\nMy life is on the line and even if the best outcome happens, there will be intelectual and physical shortcomings for the future..."
darkages_stress_lunacy.01.desc2:0 "Fortunately, the increase in Stress did not carry any long lasting consequences for my well being!"
darkages_stress_lunacy.01.opta:0 "Help me!"
darkages_stress_lunacy.01.optb:0 "I am safe... for now!"
darkages_stress_lunacy.01.tt:0 "Suffering a stroke mneans you will either die or be limited in your intelectual and physical capacities\n"
darkages_stress_lunacy.01.tt2:0 "Every time you go up a Stress Level there is a 5% chance of suffering a dangerous, crippling and potentially fatal stroke. This time you were lucky.\nBeware there are other risks along the time when you are over 99 Stress points"
darkages_dread_brings_death.01.t:0 "Dread Brings Death"
darkages_dread_brings_death.01.desc:0 "Unfortunately the terror I inspire on others turned against me and has as a direct consequence an insidious action from someone who decided to get rid of me once and for all.\n\nAs such and while at night, in an empty alcove of my [ROOT.Char.Custom('FortifiedBuilding')] lost in my thoughts, I am viciously attacked by a mysterious and dark figure that swiftly approaches me from the shadows. Immediately I am certain his objective is my utter and final demise..."
darkages_dread_brings_death.01.desc2:0 "Unfortunately the terror I inspire on others turned against me and has as a direct consequence an insidious action from someone who decided to get rid of me once and for all.\n\nAs such and while at night, in an empty alcove of my [ROOT.Char.Custom('FortifiedBuilding')] lost in my thoughts, I am viciously attacked by a mysterious and dark figure that swiftly approaches me from the shadows. Immediately I am certain his objective is my utter and final demise.\n\nFortunately, my bodyguard is close to me to offer some protection..."
darkages_dread_brings_death.01.desc3:0 "Unfortunately the terror I inspire on others turned against me and has as a direct consequence an insidious action from someone who decided to get rid of me once and for all.\n\nAs such and while at night, in an empty alcove of my [ROOT.Char.Custom('FortifiedBuilding')] lost in my thoughts, I am viciously attacked by a mysterious and dark figure that swiftly approaches me from the shadows. Immediately I am certain his objective is my utter and final demise.\n\nFortunately, my bodyguards are close to me to offer significant protection..."
darkages_dread_brings_death.01.opta:0 "I must fight for my life!"
darkages_dread_brings_death.01.tt:0 "This event might happen if your Dread is higher than 14. While it is very rare when Dread is low - less than 20 - it will get more common the higher your Dread is. If you have poor Intrigue (less than 8) or poor Prowess (less than 6) you suffer a penalty on your chances of survival. If you have high Intrigue (at least 12) or high Prowess (more than 9) you gain a bonus on your chances of survival, depending on your scores - the higher, the better\n"
darkages_dread_brings_death.02.t:0 "Tyranny Brings Death"
darkages_dread_brings_death.02.desc:0 "Unfortunately my despicable actions caused on others have as a direct consequence a payback from someone sooner rather than later.\n\nAs such and while at night, in an empty alcove of my [ROOT.Char.Custom('FortifiedBuilding')] lost in my thoughts, I am viciously attacked by a sinister and dark figure that swiftly approaches me from the shadows.\n\nImmediately I am certain his objective is my utter and final demise..."
darkages_dread_brings_death.02.desc2:0 "Unfortunately my despicable actions caused on others have as a direct consequence a payback from someone sooner rather than later.\n\nAs such and while at night, in an empty alcove of my [ROOT.Char.Custom('FortifiedBuilding')] lost in my thoughts, I am viciously attacked by a sinister and dark figure that swiftly approaches me from the shadows. Immediately I am certain his objective is my utter and final demise.\n\nFortunately, my bodyguard is close to me to offer some protection..."
darkages_dread_brings_death.02.desc3:0 "Unfortunately my despicable actions caused on others have as a direct consequence a payback from someone sooner rather than later.\n\nAs such and while at night, in an empty alcove of my [ROOT.Char.Custom('FortifiedBuilding')] lost in my thoughts, I am viciously attacked by a sinister and dark figure that swiftly approaches me from the shadows. Immediately I am certain his objective is my utter and final demise.\n\nFortunately, my two bodyguards are close to me to offer relevant additional protection..."
darkages_dread_brings_death.02.opta:0 "I must fight for my life!"
darkages_dread_brings_death.02.tt:0 "This event might happen if your Tyranny is higher than 14. While it is very rare when Tyranny is low, below 5, it will get more common the higher your Tyranny is. If you have poor Intrigue (less than 8) or poor Prowess (less than 6) you suffer a penalty on your chances of survival. If you have high Intrigue (more than 11) or high Prowess (more than 9) you gain a bonus on your chances of survival, depending on your scores - the higher, the better\n"
darkages_rivals_bring_death.01.t:0 "Rival's Revenge"
darkages_rivals_bring_death.01.desc:0 "One day, while strolling in my village during the day to browse some wares at the seasonal market, complimenting known peasants and take a good breath of fresh air, suddenly a dark figure came out from the shadows of a small house and swiftly tries to stab me with what I clearly see is a poisoned dagger.\n\nWhile looking at the danger approaching with horror, my intuition tells me this is the work of my hated enemy, [target_rival.GetName]..."
darkages_rivals_bring_death.01.desc2:0 "One day, while strolling in my village during the day to browse some wares at the seasonal market accompanied by my trusty bodyguard, complimenting known peasants and take a good breath of fresh air, suddenly a dark figure came out from the shadows of a small house and swiftly tries to stab me with what I clearly see is a poisoned dagger.\n\nWhile looking at the danger approaching with horror, my intuition tells me this is the work of my hated enemy, [target_rival.GetName]..."
darkages_rivals_bring_death.01.desc3:0 "One day, while strolling in my village during the day to browse some wares at the seasonal market accompanied by my two trusty bodyguards, complimenting known peasants and take a good breath of fresh air, suddenly a dark figure came out from the shadows of a small house and swiftly tries to stab me with what I clearly see is a poisoned dagger.\n\nWhile looking at the danger approaching with horror, my intuition tells me this is the work of my hated enemy, [target_rival.GetName]..."
darkages_rivals_bring_death.01.opta:0 "I must fight for my life!"
darkages_rivals_bring_death.01.tt:0 "Having Rivals brings an element of serious danger to the player's life. The number of Rivals increases the chance of this event happening and while you have no proof about who ordered the nefarious deed, your intuition is probably right, you just need to prove it. Any Rivals that are either Compassionate, Forgiving, Generous, Just or Craven will never dabble with murder attempts\n"
darkages_rivals_bring_death.01.tt2:0 "Having Nemesis brings an element of serious danger to the player's life. The number of Nemesis increases the chance of this event happening and while you have no proof about who ordered the nefarious deed, your intuition is probably right, you just need to prove it. Contrary to Rivals that are bound by honourable traits, Nemesis always may attempt to kill you independently of their personality...\n"
darkages_control_brings_death.01.t:0 "Serious Trouble in [target_county.GetName]"
darkages_control_brings_death.01.desc:0 "While travelling along my domain in the countryside of the County of [target_county.GetName], our caravan was suddenly ambushed by a band of thugs that seek riches and loot to sell.\n\nUnfortunately, probably these men only know the language of steel. A very dangerous situation indeed..."
darkages_control_brings_death.01.desc_b:0 "While travelling along my domain in the countryside of the County of [target_county.GetName], our caravan was suddenly ambushed by a band of thugs that seek riches and loot to sell.\n\nUnfortunately, probably these men only know the language of steel. A very dangerous situation indeed even if my bodyguard provides additional protection..."
darkages_control_brings_death.01.desc_c:0 "While travelling along my domain in the countryside of the County of [target_county.GetName], our caravan was suddenly ambushed by a band of thugs that seek riches and loot to sell.\n\nUnfortunately, probably these men only know the language of steel. A very dangerous situation indeed even if my two bodyguards provide an additional layer of security..."
darkages_control_brings_death.01.desc2:0 "While travelling along my domain in the countryside of the County of [target_county.GetName], our caravan was suddenly ambushed by a band of discontents with my rule that seek revenge on my person!\n\nUnfortunately, probably these men only know the language of death. A very dangerous situation indeed..."
darkages_control_brings_death.01.desc2_b:0 "While travelling along my domain in the countryside of the County of [target_county.GetName], our caravan was suddenly ambushed by a band of discontents with my rule that seek revenge on my person!\n\nUnfortunately, probably these men only know the language of death. A very dangerous situation indeed even if my single bodyguard provides additional protection..."
darkages_control_brings_death.01.desc2_c:0 "While travelling along my domain in the countryside of the County of [target_county.GetName], our caravan was suddenly ambushed by a band of discontents with my rule that seek revenge on my person!\n\nUnfortunately, probably these men only know the language of death. A very dangerous situation indeed even if my two bodyguards provide an additional layer of protection..."
darkages_control_brings_death.01.opta:0 "We must fight for our lives!"
darkages_control_brings_death.01.optb:0 "Try to outwit part of the bandits using a savvy speech"
darkages_control_brings_death.01.optc:0 "Charge the bandits"
darkages_control_brings_death.01.optd:0 "Pay a princely sum for my life"
darkages_control_brings_death.01.tt:0 "If any of your counties - the more, the higher the risk -  has less than 90 control but none has less than 75, you stand a minimal chance of suffering this attack. However, having countries with very low control - the lesser, the worst - raises additional risks when travelling through them as outlaws rule part of the territory. It was exactly the consequences of that that happened to your character while travelling along the countryside of a dangerous County. Your Martial and your Prowess will serve as modifiers (good, neutral or bad) for picking this option as you fight while leading your party. One of your courtiers or guests might end up dead as a casualty due to this event\n"
darkages_control_brings_death.02.tt:0 "If any of your counties - the more, the higher the risk -  has less than 90 control but none has less than 75, you stand a minimal chance of suffering this attack. However, having countries with very low control - the lesser, the worst - raises additional risks when travelling through them as outlaws rule part of the territory. It was exactly the consequences of that that happened to your character while travelling along the countryside of a dangerous County. Your Learning and your Prowess will serve as modifiers (good, neutral or bad) for picking this option as you attempt to dissuade some of the bandits from fighting.  One of your courtiers or guests might end up dead as a casualty due to this event\n"
darkages_control_brings_death.03.tt:0 "If any of your counties - the more, the higher the risk - has less than 90 control but none has less than 75, you stand a minimal chance of suffering this attack. However, having countries with very low control - the lesser, the worst - raises additional risks when travelling through them as outlaws rule part of the territory. It was exactly the consequences of that that happened to your character while travelling along the countryside of a dangerous County. By taking the physical lead and charging in front of your party against the bandits you will make your Prowess alone capital in the outcome of this action. This option is only available if you are Brave.  One of your courtiers or guests might end up dead as a casualty due to this event\n"
darkages_control_brings_death.04.tt:0 "If any of your counties - the more, the higher the risk - has less than 90 control but none has less than 75, you stand a minimal chance of suffering this attack. However, having countries with very low control - the lesser, the worst - raises additional risks when travelling through them as outlaws rule part of the territory. It was exactly the consequences of that that happened to your character while travelling along the countryside of a dangerous County. By paying a hefty amount of gold you can spare your life and those of your fellow travellers. This option is available based on a random element and also if you are not Greedy and have a significant amount of gold to not become too much in debt, depending on the value asked, which is not always the same\n"
darkages_control_brings_death.01.tt2:0 "If any of your counties - the more, the higher the risk - has less than -15 popular opinion about you there is a chance the malcontents try to attack you. It was exactly the consequences of that that happened to your character while travelling along the countryside of a dangerous County. Your Martial and your Prowess will serve as modifiers (good, neutral or bad) for picking this option as you fight while leading your party. One of your courtiers or guests might end up dead due as a casualty to this event\n"
darkages_control_brings_death.02.tt2:0 "If any of your counties - the more, the higher the risk - has less than -15 popular opinion about you there is a chance the malcontents try to attack you. It was exactly the consequences of that that happened to your character while travelling along the countryside of a dangerous County. Your Learning and your Prowess will serve as modifiers (good, neutral or bad) for picking this option as you attempt to dissuade some of the bandits from fighting. One of your courtiers or guests might end up dead as a casualty due to this event\n"
darkages_control_brings_death.03.tt2:0 "If any of your counties - the more, the higher the risk - has less than -15 popular opinion about you there is a chance the malcontents try to attack you. It was exactly the consequences of that that happened to your character while travelling along the countryside of a dangerous County. By taking the physical lead and charging in front of your party against the bandits you will make your Prowess alone capital in the outcome of this action. This option is only available if you are Brave. One of your courtiers or guests might end up dead as a casualty due to this event\n"
darkages_control_brings_death.04.tt2:0 "If any of your counties - the more, the higher the risk - has less than -15 popular opinion about you there is a chance the malcontents try to attack you. It was exactly the consequences of that that happened to your character while travelling along the countryside of a dangerous County. By paying a hefty amount of gold you can spare your life and those of your fellow travellers. This option is available based on a random element and also if you are not Greedy and have a significant amount of gold to not become too much in debt, depending on the value asked, which is not always the same\n"
darkages_relation_brings_death.01.t:0 "Foreign Death Threat"
darkages_relation_brings_death.01.desc:0 "As I proceed at night across an empty hallway of my [ROOT.Char.Custom('FortifiedBuilding')], a silent shadow materializes from a dark corner, knife in hand, menacingly pointed to my heart. Shouting 'With the best compliments of [target_poor_relation.GetName]!' the ghostly figure strikes at me..."
darkages_relation_brings_death.01.desc2:0 "As I proceed, accompanied by my bodyguard for extra protection, at night across an empty hallway of my [ROOT.Char.Custom('FortifiedBuilding')], a silent shadow materializes from a dark corner, knife in hand, menacingly pointed to my heart. Shouting 'With the best compliments of [target_poor_relation.GetName]!' the ghostly figure strikes at me..."
darkages_relation_brings_death.01.desc3:0 "As I proceed, accompanied by my two bodyguards for extra protection, at night across an empty hallway of my [ROOT.Char.Custom('FortifiedBuilding')], a silent shadow materializes from a dark corner, knife in hand, menacingly pointed to my heart. Shouting 'With the best compliments of [target_poor_relation.GetName]!' the ghostly figure strikes at me..."
darkages_relation_brings_death.01.opta:0 "I must fight for my life!"
darkages_relation_brings_death.01.tt:0 "Having Vassals that dislike you enough - less than -29 opinion - and if they possess some personality traits - Wrathful, Arbitrary, Paranoid, Callous, Sadistic or Vengeful - without being Compassionate, Forgiving, Generous or Craven may lead them to try to make an attempt at your life. Unfortunately and even if the assassin whispered a name you don't have in any way conclusive proof of who actually planned your demise...\n"
darkages_lunacy_brings_death.01.t:0 "The End of the Line"
darkages_lunacy_brings_death.01.desc:0 "Lately, my bouts of lunacy have clouded my judgement more and more. Today, while I was playing with my sword faking a duel with no one I started to wonder what would it feel to be on the receiving end of a fatal blow. Deranged and out of my mind, with a determination brought by madness, I point the sword towards me and make the fatal move..."
darkages_lunacy_brings_death.01.opta:0 "Maybe I've killed myself"
darkages_lunacy_brings_death.01.tt:0 "Lunacy carries plenty of risks. Sudden death is one of them\n"
darkages_depression_brings_death.01.t:0 "The End of the Line"
darkages_depression_brings_death.01.desc:0 "My mind has been restless and lately I have felt an utter despair regarding my life and its future. In a moment of despair, I decide to say goodbye to the world through the use of water hemlock..."
darkages_depression_brings_death.01.opta:0 "I've poisoned myself"
darkages_depression_brings_death.01.tt:0 "Depression always brings the risk of death in a moment of total despair but luck can play a part and the restless soul can be saved from immediate death by becoming severely affected from the poison...\n"
darkages_lunacy_brings_death.02.t:0 "An Unexpected Peril"
darkages_lunacy_brings_death.02.desc:0 "While I am strolling alone lost in my thoughts in a small, remote corridor of my [ROOT.Char.Custom('FortifiedBuilding')], I pass by [target_crazy.GetName] who greets me with a curtly and subdued 'Good evening'. Barely paying attention to this, I advance a few more paces when I hear the rustle of someone moving quickly behind me. I turn my head and can only see a dagger held by [target_crazy.GetName], [target_crazy.GetHerHis] eyes filled with a crazy hate, coming directly for the base of my neck"
darkages_lunacy_brings_death.02b.desc:0 "While I am strolling alone lost in my thoughts in a small, remote corridor of my [ROOT.Char.Custom('FortifiedBuilding')], I pass by [target_crazy.GetName] who greets me with a curtly and subdued 'Good evening'. My paranoid nature forewarned me that something was not quite right and as I advanced a few more paces I turned around just to see the crazy soul holding a dagger and coming for my jugular, [target_crazy.GetHerHis] eyes filled with hate!"
darkages_lunacy_brings_death.02.opta:0 "Only luck can save me..."
darkages_lunacy_brings_death.02.tt:0 "Having Lunatic or Possessed characters in one's own court carry some risks given their unstable state of mind. As you were attacked totally unaware neither your Prowess nor your Intrigue can mitigate the final outcome of this unexpected attack. However, if you are Paranoid your chances of survival are better as your mind is always on high alert for dangerous misgivings"
darkages_sickly_child_dies.01.tt:0 "In the Dark Ages, the death rate of infants was high indeed. As [child.GetName] was born a Sickly child, unfortunately death took [child.GetHerHim] away\n"
darkages_sickly_child_dies.02.tt:0 "In the Dark Ages, the death rate of infants was high indeed. As you were born a Sickly child, unfortunately this is what happened to your character\n"
darkages_sickly_child_dies.01.t:0 "A Future Taken Away"
darkages_sickly_child_dies.01.desc:0 "As I stand in my dining room warming my hands against the fire and lost in my thoughts, a known maid approaches me, tears in her eyes.\n\nAfter an elaborate curtsy, she looks me in the eye and says 'My [ROOT.GetCharacter.GetTitleAsNameNoTooltip], your sickly offspring, the beloved [child.GetName], didn't resist the illness that befell [child.GetHerHim] and died some moments ago...'.\n\nWithout any other words to say, she just stands in front of me, tears flowing, waiting for my next command..."
darkages_sickly_child_dies.01.opta:0 "My poor child..."
darkages_sickly_child_dies.02.desc:0 "I have been a sickly child and small as I am, my body fought with all its strength against the maladys that haunted me. Unfortunately, I lost the battle for my life..."
darkages_sickly_child_dies.02.opta:0 "I close my eyes for the last time"
darkages_diseases_bring_death.01.t:0 "Fatal Disease"
darkages_diseases_bring_death.01.desc:0 "As my body is sapped of its strength by the bubonic plague, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die during the sleep"
darkages_diseases_brings_death.01.opta:0 "May I rest in peace"
darkages_diseases_brings_death.01.optb:0 "I am cured!"
darkages_diseases_death.01.tt:0 "Different illnesses in the middle ages without proper treatment were the frequent cause of death\n"
darkages_diseases_bring_death.02.desc:0 "As my body is sapped of its strength by the smallpox, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die as peacefully as possible, surrounded by my closest ones..."
darkages_diseases_bring_death.03.desc:0 "As my body is sapped of its strength by typhus, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die one morning, while my trusted servants assist me..."
darkages_diseases_bring_death.04.desc:0 "As my body is sapped of its strength by cancer, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die one evening, smelling the scents of candle wax"
darkages_diseases_bring_death.05.desc:0 "As my body is sapped of its strength by pneumonia, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die alone during the night"
darkages_diseases_bring_death.06.desc:0 "As my body is sapped of its strength by consumption, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die peacefully one morning"
darkages_diseases_bring_death.07.desc:0 "As my body is sapped of its strength by leprosy, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die suffering and alone during one afternoon"
darkages_diseases_bring_death.08.desc:0 "As my body is sapped of its strength by gout, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die one day, close to my beloved ones..."
darkages_diseases_bring_death.09.desc:0 "As my body is sapped of its strength by the great pox, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die while in a dellirium brought about by the illness"
darkages_diseases_bring_death.10.t:0 "The Strange Illness"
darkages_diseases_bring_death.10.desc1:0 "As the time passes, fortunately my strength returns, slowly at first, then faster and faster as my illness subside!\n\nToday I ventured outside and basked in the warmth of the sun during the morning, oblivious of the strange illness that befell me.\n\nSuch a pleasant sensation, to feel alive and well...!"
darkages_diseases_bring_death.10.desc2:0 "As my body is sapped of its strength by an unknown illness, I feel ever worse until I cannot leave the bed anymore. Unfortunately, the malady has run its course and I die one afternoon, surrounded by my loved ones..."
darkages_traits_bring_death.01.tt:0 "You will fight the peasant mob, trying to defeat the threat they pose. Having an high Prowess is paramount to lower the chances of your demise.\nYou suffered this event because your character is either Wrathful, Vengeful, Sadistic, Deceitful, Paranoid, Arbitrary, Disloyal or Callous. The more of these traits your character has, the bigger the chance of the event happening\n"
darkages_traits_bring_death.01.t:0 "Popular Revenge"
darkages_traits_bring_death.01.desc:0 "While travelling across my Realm my sixth sense keeps warning me something is not quite right. Unfortunately, my small caravan is ambushed by peasants enraged with my... questionable... personality traits. Cursing them all, I ready my sword..."
darkages_traits_bring_death.01.desc2:0 "While travelling across my Realm accompanied by my watchful bodyguard, my sixth sense keeps warning me something is not quite right. Unfortunately, my small caravan is ambushed by peasants enraged with my... questionable... personality traits. Cursing them all, I ready my sword..."
darkages_traits_bring_death.01.desc3:0 "While travelling across my Realm accompanied, the shadow of my two bodyguards next to mine, my sixth sense keeps warning me something is not quite right. Unfortunately, my small caravan is ambushed by peasants enraged with my... questionable... personality traits. Cursing them all, I ready my sword..."
darkages_traits_bring_death.01.opta:0 "I must fight for my life!"
darkages_traits_bring_death.01.optb:0 "I will use subterfuge and cunning to hide from danger"
darkages_traits_bring_death.02.tt:0 "You attempt to hide and run away taking advantage of the chaos generated. Having an high Intrigue is paramount to lower the chances of you getting caught.\nYou suffered this event because your character is either Wrathful, Vengeful, Sadistic, Deceitful or Callous. The more of these traits your character has, the bigger the chance of the event happening\n"
da_learning_for_all_modifier:0 "Learning"
darkages_lunacy.01.t:0 "Giving Possessions Away"
darkages_lunacy.01.desc:0 "Thanks to my restless mind, lately I have been assaulted by thoughts about giving some of my possessions away. After thinking for long to whom I would bestow the honour to have one of my titles, I am ready to give it away. However, closer persons at court strongly advise me against the whole idea..."
darkages_lunacy.01.opta:0 "I'll follow the voices inside my head"
darkages_lunacy.01.optb:0 "I refrain from implementing my plan"
darkages_lunacy.01.tt1:0 "By making the exhausting effort of controlling your deeper impulses you submit yourself to extreme levels of mental strain and the results are devastating for your stress\n"
darkages_lunacy.02.t:0 "Seize Caravan"
darkages_lunacy.02.desc:0 "After learning that a vassal's trade caravan is going to pass in my domains, my Deranged mind started to entertain the idea of seizing it for my personal benefit. Even if my closest advisors warned me against such action, the more I think about it, the more I like the sound of the idea"
darkages_lunacy.02.opta:0 "Give the order to seize the caravan"
darkages_lunacy.02.optb:0 "Refrain from doing so"
darkages_lunacy.02.tt1:0 "By making the exhausting effort of controlling your deeper impulses you submit yourself to extreme levels of mental strain and the results are devastating for your stress\n"
darkages_lunacy.03.t:0 "The Pleasures of the Flesh"
darkages_lunacy.03.desc:0 "Due to my mental condition, lately my mind is focusing more and more into avoiding the pleasures of the flesh. As my spouse waits for me in bed, I face a choice that will for certain define the rest of my life..."
darkages_lunacy.03.opta:0 "I will embrace celibacy with all my heart, forever"
darkages_lunacy.03.optb:0 "I go against my will and at least do my duty in bed..."
darkages_lunacy.03.tt1:0 "By making the exhausting effort of controlling your deeper impulses you submit yourself to extreme levels of mental strain and the results are devastating for your stress\n"
darkages_opinion_contempt:0 "Utter Contempt"
darkages_lunacy.04.t:0 "The Curse of Mental Instability"
darkages_lunacy.04.desc:0 "As my vassals pass time with me, it becomes impossible to hide my senseless decisions and odd behaviour from them. As a result they progressively lose their faith and ignore me and my words, treating me as someone with a seriously disturbed mind. To sum it up, there is a sense of utter contempt for my person among my vassals. Definitely not a good thing for someone in my position..."
darkages_lunacy.04.opta:0 "I must deal with the consequences of my dementia"
darkages_lunacy.05.t:0 "Avoiding Food"
darkages_lunacy.05.desc:0 "Thanks to my mental instability, some months ago I started to refuse to take food up to the barely minimum to survive. Unfortunately, that brings serious adverse conditions to my health..."
darkages_lunacy.05.opta:0 "Such are the results of my dementia"
extreme_malnourishment:0 "Extreme Malnourishment"
extreme_malnourishment_desc:0 "The weak condition of this character has been worsened significantly due to the refusal to eat"
darkages_lunacy.06.t:0 "Worsening Condition"
darkages_lunacy.06.desc:0 "My refusal to eat properly reaches new heights, as most of the times I force myself to vomit everything I intake. This causes me a severe penalty to my health and I now must be considered as suffering from a very serious condition that might place my life at risk..."
darkages_lunacy.06.opta:0 "My dementia is gaining ground..."
da_varangian_adventurer_trigger:0 "Can only pick this option if 2 of the following are true: At least 12 Martial, at least 20 Dread, Callous, Viking, Greedy, Adventurer, Ambitious, Brave and Arrogant"
darkages_culture_change_brings_death.01.t:0 "Cultural Fanatic Enters the Scene"
darkages_culture_change_brings_death.01.desc:0 "One day, as I was paying a visit to one of the minor dwellings of my capital County, someone manages to bypass my henchmen and swiftly approaches me, dagger in hand, yelling 'this is for you to remember to stop converting the culture of my County, you lowly scum!'. Suddenly, I must fight for my life!"
darkages_culture_change_brings_death.01.desc2:0 "One day, as I was paying a visit to one of the minor dwellings of my capital County, someone manages to bypass my henchmen and swiftly approaches me, dagger in hand, yelling 'this is for you to remember to stop converting the culture of my County, you lowly scum!'. Fortunately, my bodyguard is close by to protect me. Nevertheless, I must fight for my life!"
darkages_culture_change_brings_death.01.desc3:0 "One day, as I was paying a visit to one of the minor dwellings of my capital County, someone manages to bypass my henchmen and swiftly approaches me, dagger in hand, yelling 'this is for you to remember to stop converting the culture of my County, you lowly scum!'. Fortunately, I have two bodyguards close to me. Nevertheless, I must fight for my life!"
darkages_culture_change_brings_death.01.opta:0 "Use your Intrigue to manoeuvre yourself into a better position"
darkages_culture_change_brings_death.01.optb:0 "Use your Diplomacy to influence the fanatic"
darkages_culture_change_brings_death.01.optc:0 "My retinue! To Meeeee!"
darkages_culture_change_brings_death.01.tt:0 "This event happens because you are attempting to convert the culture of a County. As always, there are radicals available to risk everything in order to take revenge on your actions. Your Prowess and Intrigue determine the final outcome of this event\n"
