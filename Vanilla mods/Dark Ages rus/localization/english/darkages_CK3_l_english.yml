setting_darkages_rule_landless_provisions_none_desc:0 "Landless characters don't pay any upkeep in Provisions. Vanilla experience."
setting_darkages_rule_landless_provisions_vlow:0 "Very Low"
setting_darkages_rule_landless_provisions_vlow_desc:0 "Depending on total number of MaA available, landless characters pay a very low number of Provisions every three months."
setting_darkages_rule_landless_provisions_low:0 "Low"
setting_darkages_rule_landless_provisions_low_desc:0 "Depending on total number of MaA available, landless characters pay a Low number of Provisions every three months."
setting_darkages_rule_landless_provisions_average:0 "Average"
setting_darkages_rule_landless_provisions_average_desc:0 "Depending on total number of MaA available, landless characters pay an average number of Provisions every three months."
setting_darkages_rule_landless_provisions_high:0 "High"
