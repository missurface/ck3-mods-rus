darkages_toast.5.tt:0 "You ended up Wounded"
darkages_toast.6.t:0 "Escaped!"
darkages_toast.6.tt:0 "You escaped the attack unscathed"
darkages_toast.7.tt:0 "Your ferocity managed to neutralize the whole political situation"
darkages_toast.8.tt:0 "Your threats sound hollow and now you face a serious political situation, longer"
grant_independence_interaction_darkages:0 "Grant Independence Dark Ages"
grant_independence_interaction_darkages_desc:0 "You can use this to grant independence to whomever you want"
darkages_prison_brings_death.01.t:0 "The Miracle That Never Came"
darkages_prison_brings_death1.01.desc:0 "Being in prison has taken its toll on my state of mind and body. Even if I could withstand for a time the pressures of loneliness and the restraint of my movements, I miss dearly my liberty and how that empowered me to do meaningful things. Poorly fed, feeling I am wasting my life here, desperate to feel the open air without barriers yet again, one day I went to sleep and failed to wake up, thus making it eternal..."
darkages_prison_brings_death2.01.desc:0 "Being in captivity while with a wound was not something that scared me at first. Unfortunately I was not given proper treatment and my body never fully healed. One day, to my despair, gangrene set in and taken by fear I could only watch and feel my life being slowly taken away in a process that lasted less than a fortnight. Finally God's mercy took away my soul, while I was lost in a delirium of my own making..."
darkages_prison_brings_death3.01.desc:0 "While being in prison is already a difficult situation to cope with, my unhealthy condition only added to the risks I took by being imprisoned. Unfortunately my condition started to deteriorate ever faster, until one day, my strength sapped, I died a lonely and slow death..."
darkages_prison_brings_death4.01.desc:0 "Upon arrival at the prison, the guards mocked me for my condition. Unhealthy and wounded, my chance of escaping with life was small indeed and they pointedly remarked that to me. Without any treatment received, I started thinking the same way and unfortunately it became a self fulfiling prophecy. One day, sapped of strength while lying down in my matress suffering horrendously from my sorry condition, I went to sleep to never wake up again..."
darkages_prison_brings_death.01.opta:0 "I die far from my loved and meaningful ones..."
darkages_prison_brings_death.01.tt:0 "While being in prison might always end your life suddenly, your demise might arrive sooner if you are wounded, suffer from any illness, are depressed or are in poor health\n"
darkages_train_knights_decision:0 "Train $knight_culture_player_plural_no_tooltip$"
train_knights_decision_desc:0 "Organize the proper training of $knight_culture_player_plural_no_tooltip$ with less than 21 Prowess along the next year, improving it by spending a major amount of gold on several different mocked combat situations. There is a risk of injury and even death while training."
train_knights_decision_tooltip:0 "Train $knight_culture_player_plural_no_tooltip$ to increase their Prowess"
train_knights_decision_tt:0 "By picking this decision, you will increase the performance of your $knight_culture_player_plural_no_tooltip$ in combat by staging over the next year a comprehensive program of warfare training for them and their retinues. An event will fire when the training ends giving the bonuses and applying possible injuries."
darkages_train_knights_decision_confirm:0 "Let's improve this lot..."
darkages_train_knights.01.t:0 "$knight_culture_player_plural_no_tooltip$ and Retinues Trained"
darkages_train_knights.01.desc:0 "After many months of heavy training and manoeuvering, my cadre of $knight_culture_player_plural_no_tooltip$ is now much more effective in the battlefield. Their Prowess, together with the new capabilities of their retinues have been significantly expanded."
darkages_train_knights.01.opta:0 "Impressive!"
darkages_train_knights.01.tt:0 "Your $knight_culture_player_plural_no_tooltip$ with Prowess lower than 21 will increase it by an amount between 1 and 5. There is also the chance that while training, they have suffered accidents\n"
darkages_train_knights_toast.1.t:0 "Training Accident"
darkages_train_knights_toast.1.tt:0 "[darkages_train_knight.GetName], your $knight_culture_player_no_tooltip$, was wounded while training"
darkages_train_knights_toast.2.t:0 "Fatal Training Accident"
darkages_train_knights_toast.2.tt:0 "[darkages_train_knight.GetName], your former $knight_culture_player_no_tooltip$, lost accidentally [darkages_train_knight.GetHerHis] life while training"
darkages_negotiate_alliance_interaction:0 "Negotiate Alliance"
darkages_train_combat_decision:0 "Practice Sparring With Blademaster"
darkages_train_combat_decision_desc:0 "Hire a Blademaster to improve your own Prowess. Notice the Blademaster can be of different skill and that defines the maximum level you can attain. The Master can be Competent (15 Prowess), Dangerous (20 Prowess), Deadly (25 Prowess) or Elite (30 Prowess)."
darkages_train_combat_decision_tooltip:0 "Improve your Prowess"
darkages_train_combat_decision_tt:0 "Spend about two years training with a Blademaster to improve your Prowess. After the time passes and if your Prowess is not greater than your Master's, you are less than 40 years old, are neither incapable nor a prisoner you might improve it again for about two more years. You can only pick this decision once in your lifetime.\n"
darkages_train_combat_decision_confirm:0 "I want to improve my fighting skills"
darkages_train_combat.01.t:0 "Combat Training"
darkages_train_combat.01.desc1:0 "About two years have passed and your Competent Blademaster with 15 Prowess improved your skills. How much, depends on your effort and ease of understanding the Master's techniques"
darkages_train_combat.01.desc2:0 "About two years have passed and your Dangerous Blademaster with 20 Prowess improved your skills. How much, depends on your effort and ease of understanding the Master's techniques"
darkages_train_combat.01.desc3:0 "About two years have passed and your Deadly Blademaster with 25 Prowess improved your skills. How much, depends on your effort and ease of understanding the Master's techniques"
darkages_train_combat.01.desc4:0 "About two years have passed and your Elite Blademaster with 30 Prowess improved your skills. How much, depends on your effort and ease of understanding the Master's techniques"
darkages_train_combat.01.opta:0 "Continue Training"
darkages_train_combat.01.tt:0 "If your Prowess is lesser than your Master's and you are less than 40 years old, while not being a prisoner nor incapable, you might elect to pay another two years of training. Your Blademaster is recruited at the start of your training and its Prowess is 15 if he is Competent, 20 if he is Dangerous, 25 if he is Deadly and 30 if he is Elite\n"
darkages_train_combat.01.tt2:0 "Besides having always the option to quit your training, if your Prowess is equal or bigger than your Master's, you are imprisoned, have more than 39 years old or are incapable you are forced to quit\n"
darkages_train_combat.01.optb:0 "It is the end of the line, then..."
darkages_add_shrewd_dull.01.t:0 "An Acute Mind"
darkages_add_shrewd_dull.01.desc:0 "As I grow up, in the dealings with other children and even adults, I tend to be acutely aware of their motivations, plots, schemes and intuitively counter - or discreetly support - their final goals and objectives. In the end, my judgement about people and situations seems to be correct most of the time, leading to the advancement of my knowledge and my own plans more often than not..."
darkages_add_shrewd_dull.01.opta:0 "It turns out I am Shrewd!"
darkages_add_shrewd_dull.02.t:0 "A Faulty Mind"
darkages_add_shrewd_dull.02.desc:0 "As I grow up, in the dealings with other children and even adults, I tend to be extremely gullible about their motivations, plots and schemes.\n\nI also fail to evaluate about the personal motivations of each person or how any future scenario will probably end up.\n\nAll in all, my judgement about people and situations seems to be a failure most of the time, leading to my own misguided decisions and opinions under most conditions and circumstances..."
darkages_add_shrewd_dull.02.opta:0 "It turns out I am Dull..." 
darkages_add_deviant.01.t:0 "Devious Carnal Temptations"
darkages_add_deviant.01.desc:0 "Still a young adult and while growing up, I discover some disturbing sexual tastes about myself. These feelings and tastes, summarily shunned by society, are too strong for me to refrain, even if I know them to be revolting among most of my peers and servants. Nevertheless and knowing about the risks, I indulge into these forbidden pleasures as much as occasions arise."
darkages_add_deviant.01.opta:0 "A closely guarded secret..."
darkages_add_deviant.02.tt:0 "The chance of [da_character_discovery_deviant.GetName] keeping to [da_character_discovery_deviant.GetHerHim]self the discovery of your deviancy depends positively on your high Intrigue, on [da_character_discovery_deviant.GetFirstName] low Intrigue, on your Dread - the higher, the better the effect, as long as [da_character_discovery_deviant.GetSheHe] is nor Brave - [da_character_discovery_deviant.GetHerHis] positive opinion of you, and whether [da_character_discovery_deviant.GetSheHe] is your friend, best friend or lover. Conversely, the chances of [da_character_discovery_deviant.GetFirstName] revealing your deviancy increase by [da_character_discovery_deviant.GetHerHis] negative opinion of you, by [da_character_discovery_deviant.GetHerHis] high Intrigue, by being your rival or your nemesis - an almost assured disaster! - [da_character_discovery_deviant.GetHerHis] education in diplomacy or worse, [da_character_discovery_deviant.GetHerHis] education in Intrigue. If [da_character_discovery_deviant.GetFirstName] is also Vengeful, Callous or Sadistic your chances of having your secret revealed increase.\n"
darkages_add_deviant.02.tt2:0 "[da_character_discovery_deviant.GetName] fails to notice something is clearly amiss.\n"
darkages_add_deviant.02.tt3:0 "[da_character_discovery_deviant.GetName] notices your peculiar taste and is informed about your embarrassing secret...but does not automatically turns it public.\n"
darkages_add_deviant.02.tt4:0 "[da_character_discovery_deviant.GetName] notices your peculiar taste and reveals it to the world presenting credible proof\n"
darkages_add_deviant.02.t:0 "Risky Carnal Behaviour"
darkages_add_deviant.02.desc:0 "The opportunity presents itself for me to organize a major orgy of the most extravagant sexual tastes and my impulses drive me to give liberty to my peculiar fancies. Unfortunately, this time things got a bit out of hand and someone of relevance might have discovered my deviancy..."
darkages_add_deviant.02.opta:0 "I indulge in my exquisite carnal pleasures..."
darkages_add_deviant.02.optb:0 "I refrain from organizing the orgy"
darkages_deviant_toast.1.t:0 "Unnoticed!"
darkages_deviant_toast.1.tt:0 "[da_character_discovery_deviant.GetName] never sensed my exquisite carnal pleasures"
darkages_deviant_toast.2.t:0 "Discovered!"
darkages_deviant_toast.2.tt:0 "[da_character_discovery_deviant.GetName] discovered my deviancy but decided to keep it for [da_character_discovery_deviant.GetHerHim]self"
darkages_deviant_toast.3.t:0 "Out in the Open!"
darkages_deviant_toast.3.tt:0 "[da_character_discovery_deviant.GetName] decided to tell everyone about my deviancy..."
darkages_barren1:0 "Fertility"
darkages_barren1_desc:0 "This character has a base 5% chance of being barren (cannot have children). In the case the traits 'Infertile' or 'Impotent' are present the chance is much higher. 'Fecund' characters will not suffer any penalty"
