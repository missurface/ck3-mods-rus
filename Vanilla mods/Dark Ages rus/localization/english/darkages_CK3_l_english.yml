darkages_land_seized:0 "Faith Betrayed"
darkages_land_seized_desc:0 "This character confiscated religious land to sell to the highest bidder"
darkages_seize_land_decision:0 "Confiscate Religious Land"
darkages_seize_land_decision_desc:0 "Confiscate and sell religious land to increase your treasury. At a cost."
darkages_seize_land_decision_tooltip:0 "Creative way to increase your treasury"
darkages_seize_land_decision_confirm:0 "Do it!"
darkages_special_contribution_decision:0 "Ask Vassals a Special Contribution"
darkages_special_contribution_decision_desc:0 "Ask from your vassals a special monetary contribution in the bigger interests of the whole Realm. Your Prestige will take a hit as you are admitting of facing serious difficulties and your Tyranny will increase but you will fill your coffers with gold."
darkages_special_contribution_decision_tooltip:0 "Another way to make some gold"
darkages_special_contribution_decision_confirm:0 "Ask for the gold..."
darkages_special_contribution.01.t:0 "Special Contribution"
darkages_special_contribution.01.desc:0 "After I sent my messengers and diplomats asking my vassals for more funds, I can now proceed to count the amount received..."
darkages_special_contribution.01.opta:0 "1,2,3..."
darkages_special_contribution.01.tt1:0 "Loyal Vassals will comply without getting upset with you. Greedy Vassals will be particularly upset\n"
darkages_corruption_decision:0 "Corrupt to my Advantage"
darkages_corruption_decision_desc:0 "Increase your Treasury, your Prestige, your Piety, your Legitimacy or your Influence by engaging in a complex network of favours, bribes and other illegal actions. Just or Honest Vassals will feel Contempt towards you, while Generous or Content Vassals will feel Unimpressed with you. Long term consequences of this action are affected by your Intrigue." 
darkages_corruption_decision_tooltip:0 "Illegal ways to achieve immediate results"
darkages_corruption_decision_confirm:0 "Corrupt!"
darkages_corruption.01.t:0 "Discreet and Sinful Deeds"
darkages_corruption.01.desc:0 "After I decided to use all means at my disposal to further my objectives, I need to think about what I want to accomplish with my action.\n\nIn the end, how will I corrupt my Realm?"
darkages_corruption.01.opta:0 "I want Gold!"
darkages_corruption.01.optb:0 "I want Prestige!"
darkages_corruption.01.optc:0 "I want Piety!"
darkages_corruption.01.optd:0 "I want Legitimacy!"
darkages_corruption.01.opte:0 "I want Influence!"
darkages_corruption.01.tt1:0 "In a few months - the time it takes for your plan to bring fruits - you will have what you desire. Eventual consequences of your action partly depend on your Intrigue, partly on luck\n"
darkages_corrupt1:0 "Corrupt Ruler"
darkages_corrupt1_desc:0 "This character has recently engaged in Corruption"
darkages_corrupt2:0 "Corrupt Ruler"
darkages_corrupt2_desc:0 "This character has recently engaged in Corruption"
darkages_corrupt3:0 "Corrupt Ruler"
darkages_corrupt3_desc:0 "This character has recently engaged in Corruption"
darkages_corrupt4:0 "Corrupt Ruler"
darkages_corrupt4_desc:0 "This character has recently engaged in Corruption"
darkages_corruption.02.t:0 "A Little Bit of Gold"
darkages_corruption.02.desc:0 "After I proceeded to engage in multiple exchanges of favours, implicit words, tempting promises and all other actions my lack of moral compass could conceive, I was able to raise a sizeable amount of Gold..."
darkages_corruption.02.opta:0 "It is all mine! Mine!"
darkages_corruption.03.t:0 "A Little Bit of Prestige"
darkages_corruption.03.desc:0 "After I proceeded to engage in multiple exchanges of favours, implicit words, tempting promises and all other actions my lack of moral compass could conceive, I was able to amass a very significant amount of Prestige..."
darkages_corruption.03.opta:0 "It is all mine! Mine!"
darkages_corruption.04.t:0 "A Little Bit of Piety"
darkages_corruption.04.desc:0 "After I proceeded to engage in multiple exchanges of favours, implicit words, tempting promises and all other actions my lack of moral compass could conceive, I was able to significantly increase my gravitas in religious matters..."
darkages_corruption.04.opta:0 "It is all mine! Mine!"
darkages_corruption.05.t:0 "A Little Bit of Piety"
darkages_corruption.05.desc:0 "After I proceeded to engage in multiple exchanges of favours, implicit words, tempting promises and all other actions my lack of moral compass could conceive, I was able to significantly increase my Legitimacy..."
darkages_corruption.05.opta:0 "It is all mine! Mine!"
darkages_corruption.06.t:0 "A Little Bit of Influence"
darkages_corruption.06.desc:0 "After I proceeded to engage in multiple exchanges of favours, implicit words, tempting promises and all other actions my lack of moral compass could conceive, I was able to significantly increase my Influence..."
darkages_corruption.06.opta:0 "It is all mine! Mine!"
darkages_corruption.07.t:0 "Intangible Deeds"
darkages_corruption.07.desc:0 "Today I was surprised to see [char_darkages.GetName] waiting me right after my leveé.\n\nAs it turned out it seems that due to my attempts to use #Bold Corruption#! to my favour, I became entangled in a web of favours with [char_darkages.GetHerHim] in the center and now [char_darkages.GetFirstName] is making sure I am owing [char_darkages.GetHerHim] a favour for past important diligencies.\n\nGiven the knowledge [char_darkages.GetSheHe] has about me, my past actions and my future plans, I can't do anything to counter this situation..."
darkages_corruption.07.opta:0 "Sure..."
darkages_corruption.08.t:0 "Damned Decisions"
darkages_corruption.08.desc:0 "I am a firm believer about the uselfulness ot corrupting the Realm to further my objectives.\n\n However, many others are not so enthusiastic about my... shady behaviour.\n\nThis leads to a considerable hit to my Prestige, as social backlash follows my actions..."
darkages_corruption.08.opta:0 "Unfortunately..."
darkages_corruption.09.t:0 "The Price of a Friendship"
darkages_corruption.09.desc:0 "As time passes and the relation with my friend [darkages_friend.GetFirstName] grow more contrived and distant, I have a feeling that [darkages_friend.GetHerHis] knowledge of the ways I pursued to #Bold corrupt#! my Realm were a big let down to [darkages_friend.GetHerHim].\n\nUnfortunately, we are not friends anymore..."
darkages_corruption.09.opta:0 "Unfortunately..."
darkages_corruption.10.t:0 "Impious Behaviour"
darkages_corruption.10.desc:0 "Over the past months I have accrued a bad feeling something was amiss between myself and my religious brethren.\n\nToday I noticed my attempt at #Bold Corrupting#! the Realm to my favour raised severe eyebrows in important places..."
darkages_corruption.10.opta:0 "Not the optimal outcome I had in mind..."
darkages_opinion_impious:0 "Impious"
darkages_corruption.10.tt1:0 "Your Religious Head - if you have one - as well as your [darkages_chaplain.GetCouncilTitle] and all your Zealous Courtiers will think bad of you\n"
darkages_corruption.11.t:0 "Lack of Gravitas"
darkages_corruption.11.desc:0 "My attempts at improving my personal position at the cost of #Bold Corrupting#! the Realm have been seen as a weakness in my moral worth and a certain lacking in leadership.\n\nUnfortunately, my Legitimacy suffers, while my Courtiers look warily upon me..."
darkages_corruption.11.opta:0 "It is what it is..."
darkages_corruption.11.tt1:0 "Besides the displayed penalty, all your adult, non imprisoned Courtiers will be Wary about your devious ways\n"
darkages_improve_life:0 "Social Care"
darkages_improve_life_desc:0 "The ruler of this County is improving the life of the population with different social grants"
darkages_improve_life_decision:0 "Improve Peasants' Life"
darkages_improve_life_decision_tooltip:0 "Ameliorate the life conditions of your peasants"
darkages_improve_life_decision_desc:0 "Through the use of different social measures, improve the lot of your population. Your Vassals that are Compassionate, Just or Zealous and are not Callous, Sadistic or Vengeful will be Impressed. Your vassals that are Callous, Sadistic or Vengeful and not Compassionate, Zealous or Just will be Unimpressed."
darkages_improve_life_decision_confirm:0 "A good deed, indeed!"
darkages_commander_traits_xp.01.t:0 "The Study of War"
darkages_commander_traits_xp.01.desc:0 "Following the complex theoretical and practical military exercises implemented, it is with joy that I reckon my military skills have developed further!\n\nUnder the right circumstances covered by my areas of expertise, my value as a field commander improved."
darkages_commander_traits_xp.01.desc2:0 "As things stand, my Liege planned military exercises to hone our Commander Skills and to better prepare everyone for war.\n\nFollowing the complex theoretical and practical military exercises implemented, it is with joy that I reckon my military skills have developed further!\n\nUnder the right circumstances covered by my areas of expertise, my value as a field commander improved."
darkages_commander_traits_xp.01.opta:0 "A day to remember!"
darkages_commander_traits_xp.01.tt1:0 "You were successful in improving your Commander Traits\n"
darkages_commander_traits_xp.02.t:0 "A Failed Opportunity"
darkages_commander_traits_xp.02.desc:0 "Following the complex theoretical and practical military exercises implemented, it is with dismay that I understand my intelectual capabilities were not enough to grasp the new theoretical concepts introduced.\n\nSadly, I did not improve my Military Skills..."
darkages_commander_traits_xp.02.desc2:0 "As things stand, my Liege planned military exercises to hone our Commander Skills and to better prepare everyone for war.\n\nFollowing the complex theoretical and practical military exercises implemented, it is with dismay that I understand my intelectual capabilities were not enough to grasp the new theoretical concepts introduced.\n\nSadly, I did not improve my Military Skills..."
darkages_commander_traits_xp.02.opta:0 "A day to forget..."
darkages_commander_traits_xp.02.tt1:0 "You failed at improving your Commander Traits\n"
darkages_improve_commander_traits_decision:0 "Train Commander Skills"
darkages_improve_commander_traits_decision_tooltip:0 "Improve Commander Traits"
darkages_improve_commander_traits_decision_desc:0 "Organize a major venture for the next 3 months in order to improve your Commander Skills, all your Courtiers Commander Skills and all your Vassals' Commander Skills. Naturally, only characters already possessing Commander Skills may qualify. Learning plays a major role in the chance of improving a Commander Skills and by how much. Also important for the success of the decision is having a Martial Education. Roughly speaking, any character of Average Learning (>=8 and <12) and without Martial Education will have 50% of chance of improving all his/hers Commander Skills."
darkages_improve_commander_traits_decision_confirm:0 "Organize, plan, implement!"
darkages_mark_dynasty:0 "Favour Dynasty"
darkages_mark_dynasty_desc:0 "If you select this option you will favour this character's dynasty with different bonuses, depending on the game rule picked"
rule_darkages_favoured_dynasties_rule:0 "#B #Bold Dark Ages#!:#! Favoured Dynasties"
setting_darkages_dynasty_disabled:0 "Disabled"
setting_darkages_dynasty_disabled_desc:0 "No Dynasties will ever be favoured."
setting_darkages_dynasty_simple_enabled:0 "Enabled"
setting_darkages_dynasty_simple_enabled_desc:0 "Dynasties selected though Character Interation will have a 30% bonus to Fertility"
setting_darkages_dynasty_plus_enabled:0 "Strong"
setting_darkages_dynasty_plus_enabled_desc:0 "Dynasties selected though Character Interation will have a 30% bonus to Fertility and +3 to all skills"
darkages_m_d_1:0 "Manifest Destiny"
darkages_m_d_1_desc:0 "The Dynasty of this character is favoured by the Gods"
darkages_m_d_2:0 "Manifest Destiny +"
darkages_m_d_2_desc:0 "The Dynasty of this character is heavily favoured by the Gods"

darkages_spouses_up_age.01.t:0 "A Weird Choice"
darkages_spouses_up_age.01.desc:0 "As my marriage plans go ahead, I start sensing some disconfort, both from the highborn as well as from the religious characters of my Realm.\n\nAs it turns out, it seems the difference of ages between me and my bride as well as her own age seems to be a problem to these traditionalist and I might say, castrating souls!\n\nUnfortunately, I cannot go against reality and the truth of the matter is that my decision comes with a heavy price in Prestige..."
darkages_spouses_up_age.01.opta:0 "I will forge ahead!"
darkages_spouses_up_age.01.optb:0 "Time to think about the political implications..."
darkages_spouses_up_age.01.tt1:0 "As your bride is older than 35 and you are more than 10 years younger than her, everybody worthy of their name raises more than an eyebrow regarding your choice\n"


darkages_landless_provisions.01.t:0 "Robbers and Thieves"
darkages_landless_provisions.01.desc:0 "Early morning on a Sunday, I was suddenly woken up by my followers to be warned that a band of robbers assaulted our storages, getting away with many valuable provisions in the process.\n\nFortunately, they were identified as a band of thieves from a nearby village, thus giving me the option to pursue them if I find the prospect enticing..."
darkages_landless_provisions.01.opta:0 "Do nothing"
darkages_landless_provisions.01.tt1:0 "By avoiding any retaliatory measure you will not recover your Provisions, but at least you are not risking your Prestige if your action is unsuccessful\n"
darkages_landless_provisions.01.optb:0 "Steal what was stolen from you..."
darkages_landless_provisions.01.tt2:0 "If successful you will recover your Provisions. The success of this action depends positively on having an Intrigue Education, on your high levels (>=12) of Intrigue Skill and on your Traits Seducer, Torturer, Deceitful, Arbitrary, Brave, Eccentric, Callous, Diligent and Cynical. Hindering your efforts are your low (<8) Intrigue and your Traits Honest, Compassionate, Craven, Generous, Trusting, Lazy and Forgiving\n"
darkages_landless_provisions.01.optc:0 "Assault the thugs' hideout!"
darkages_landless_provisions.01.tt3:0 "If successful you will recover your Provisions and will pillage the thieves' camp. If you fail you might be wounded. The success of this action depends positively on having a Martial Education, on your high levels (>=12) of Martial Skill and on your Traits Gallant, Strategist, Vengeful, Wrathful, Stubborn, Callous, Paranoid and Ambitious\n"
darkages_landless_provisions.01.toast1:0 "You recover your Provisions and gain some Prestige!"
darkages_landless_provisions.01.toast2:0 "You fail and lose Provisions and Prestige..."
darkages_landless_provisions.01.toast3:0 "You recover your provisions and gain Prestige, more Provisions and Gold!"
darkages_landless_provisions.01.toast4:0 "You fail and lose Provisions, Prestige and end up wounded..."
darkages_landless_provisions.02.t:0 "A Tempting Offer"
darkages_landless_provisions.02.desc:0 "Yesterday I received the visit of a high placed servant of [darkages_neighbour_liege.GetName], a ruler that took a particular interest in my endeavours, desiring to buy Provisions from us.\n\nWord spread out like fire in a pile of hay and all my camp followers are now expecting an influx of gold to help our operation. [darkages_leave_1.GetName] is particularly enthusiastic about the possibilities of a deal and has been lobbying me into accepting the offer...\n\nMy careful attention to the details of the deal and the full implications of it are cardinal to how should I proceed onwards."
darkages_landless_provisions.02.opta:0 "Accept the deal"
darkages_landless_provisions.02.optb:0 "Engage in further negotiations"
darkages_landless_provisions.02.optc:0 "Refuse the deal"
darkages_landless_provisions.02.tt1:0 "You haggle with the representative of [darkages_neighbour_liege.GetName]. This can bind you to a better, the same or worse deal than the one presented. Positively influencing your chances of success are your Good Stewardship Skill or better (>=12), your Stewardship Education and your Traits Greedy, Stubborn, Deceitful, Arbitrary and Gregarious. Negatively influencing your attempt at negotiating the deal are your Low Stewardship or worse (<8), and the traits Generous, Honest, Just, Compassionate and Shy\n"
darkages_landless_provisions.02.tt2:0 "You refuse the deal. All your camp followers will become Despondent with your action. At least [darkages_leave_1.GetName] will abandon you - other followers might also leave\n"
darkages_landless_provisions.03.t:0 "Success!"
darkages_landless_provisions.03.desc:0 "I was able to negotiate a better deal than the one originally proposed.\n\nI am really proud of myself!"
darkages_landless_provisions.03.opta:0 "Excellent!"
darkages_landless_provisions.03.tt1:0 "Besides the effects shown, all your Camp Followers will become Impressed with your negotiation abilities\n"
darkages_landless_provisions.04.t:0 "Around in Circles"
darkages_landless_provisions.04.desc:0 "After much haggling and time spent, it was clear that either due to the good negotiating skills of the envoy of [darkages_neighbour_liege.GetName] or my poor trading performance I was unable to improve the deal formerly presented.\n\nI part with my provisions and accept the offered gold."
darkages_landless_provisions.04.opta:0 "It is what it is"
darkages_landless_provisions.05.t:0 "Ruinous Deal"
darkages_landless_provisions.05.desc:0 "The negotiating went poorly and I ended up being played by the emissary of [darkages_neighbour_liege.GetName].\n\nUnfortunately I finally agreed to a worse deal than the one originally presented..."
darkages_landless_provisions.05.opta:0 "Oh... blasted prick!"
darkages_friend_dire_times:0 "Helped with Provisions in dire times"
darkages_disaster_relief_1:0 "Disaster Relief"
darkages_disaster_relief_1_desc:0 "This province received substancial relief during hard times"
darkages_disaster_relief_2:0 "Disaster Relief"
darkages_disaster_relief_2_desc:0 "This province received some relief during hard times"
darkages_landless_provisions.06.t:0 "Disaster in [darkages_target_county.GetName]"
darkages_landless_provisions.06.desc:0 "This afternoon my camp was visited by dignitaries sent by [darkages_picked_ruler.GetName], a nearby ruler, informing me that a major drought is affecting for months the [darkages_target_county.GetName]. With Development and Control of the County decreasing dramatically, the important individuals pleaded for my help with Provisions.\n\nThe mood in my camp is not positive, however. My followers think poorly about [darkages_picked_ruler.GetFirstName] and will not approve the decrease in our stores.\n\nIt is clear my warehouses will substancially decrease their content but one should also factor in the weight of a new friendship in this unforgiving land..."
darkages_landless_provisions.06.opta:0 "Offer all help"
darkages_landless_provisions.06.optb:0 "Offer some help"
darkages_landless_provisions.06.optc:0 "In this harsh world [darkages_picked_ruler.GetFirstName] must fend for [darkages_picked_ruler.GetHerHim]self!"
darkages_landless_provisions.07.t:0 "Rotten Provisions"
darkages_landless_provisions.07.desc:0 "Due to recent poor weather as well as some negligent behaviour, it is now becoming apparent we have lost a significant amount of provisions.\n\nWe need to implement better storage capabilities!"
darkages_landless_provisions.07.opta:0 "Those are bad news..."
darkages_opinion_cynical:0 "Cynical"
darkages_rival_criminal:0 "Gave sanctuary to a known blood criminal"
darkages_landless_provisions.08.t:0 "A Person of Interest"
darkages_landless_provisions.08.desc:0 "Soon before I went to sleep yesterday, my sentries passed me word about a curious late arrival at my camp.\nAs it turned out, the arrival is none other than [darkages_criminal.GetName], a dangerous criminal wanted by a nearby ruler, [darkages_aggrieved_ruler.GetName] of [darkages_aggrieved_ruler.GetHerHis] name.\n\nKnowing beforehand there is a bounty on [darkages_criminal.GetHerHis] head, [darkages_criminal.GetName] proceeded to offer me [darkages_criminal.GetHerHis] services in a tradoff for protection.\nIt is clear this person is talented and will be a very nice asset for my operation but the path ahead forks in different directions..."
darkages_landless_provisions.08.opta:0 "Provide sanctuary to the criminal"
darkages_landless_provisions.08.optb:0 "Accept [darkages_criminal.GetHerHim] and try to soothe [darkages_aggrieved_ruler.GetFirstName] humours"
darkages_landless_provisions.08.optc:0 "Send the criminal on [darkages_criminal.GetHerHis] way"
darkages_landless_provisions.08.optd:0 "Arrest and deliver the criminal to [darkages_aggrieved_ruler.GetName]"
darkages_landless_provisions.08.toast1:0 "I managed to assuage [darkages_aggrieved_ruler.GetName]!"
darkages_landless_provisions.08.toast2:0 "I failed to assuage [darkages_aggrieved_ruler.GetFirstName]. Lost Prestige, gained a new Rival and the chance of serious troubles ahead..."
darkages_landless_provisions.08.tt1:0 "You are adamant into accepting [darkages_criminal.GetName] in your camp\n"
darkages_landless_provisions.08.tt2:0 "Trying to talk your way out of the decision to provide solace to [darkages_criminal.GetName] might prove dangerous if you fail. On top of gaining a Rival, your decision might generate a reckless action from the aggrieved [darkages_aggrieved_ruler.GetName]. Pay attention to [darkages_aggrieved_ruler.GetHerHis] traits. The success of this action is dependent on your above average or better (>=12) Diplomacy Skill and your traits Diplomat, Seducer, Gregarious, Stubborn, Cynical and Humble. Having a Diplomacy Education also helps. Working against your chances are your Low Diplomacy Skill (<8) and your traits Callous, Vengeful, Sadistic, Deceitful, Paranoid and Wrathful. The success chances start a bit tipped against you\n"
darkages_landless_provisions.08.tt3:0 "You refuse sanctuary to [darkages_criminal.GetName] and send [darkages_criminal.GetHerHim] on [darkages_criminal.GetHerHis] way...\n"
darkages_landless_provisions.08.tt4:0 "You capture [darkages_criminal.GetName] and deliver [darkages_criminal.GetHerHim] to [darkages_aggrieved_ruler.GetName], thus condemning [darkages_criminal.GetHerHim] to a certain death\n"
darkages_landless_provisions.09.t:0 "'R' is for 'Revenge'!"
darkages_landless_provisions.09.desc:0 "As I was taking a stroll nearby my camp, I am suddenly accosted by two characters that have only one objective in mind: My Life!\n\nJust before the attack, one of them spites from his mouth:\n'An eye for an eye. With the eternal compliments of [darkages_aggrieved_ruler.GetName]!'"
darkages_landless_provisions.09.desc1:0 "As I was taking a stroll nearby my camp, I am suddenly accosted by two characters that have only one objective in mind: My Life!\n\nJust before the attack, one of them spites from his mouth:\n'An eye for an eye. With the eternal compliments of [darkages_aggrieved_ruler.GetName]!'\n\nFortunately I have my bodyguard with me..."
darkages_landless_provisions.09.desc2:0 "As I was taking a stroll nearby my camp, I am suddenly accosted by two characters that have only one objective in mind: My Life!\n\nJust before the attack, one of them spites from his mouth:\n'An eye for an eye. With the eternal compliments of [darkages_aggrieved_ruler.GetName]!'\n\nFortunately I have my bodyguards with me..."
darkages_landless_provisions.09.opta:0 "Oh, the dice of fate..."
darkages_landless_provisions.09.tt1:0 "There is almost always a residual chance that [darkages_aggrieved_ruler.GetFirstName] orders as assassination attempt against you. Only if [darkages_aggrieved_ruler.GetSheHe] is Compassionate you can entirely avoid this outcome. If [darkages_aggrieved_ruler.GetSheHe] is Vengeful, Callous, WRathful Sadistic or Just, the chances of the assassination attempt being ordered will go up. Good luck!\n"

darkages_nomads.01.t:0 "The Wrath of the Gods"
darkages_nomads.01.desc:0 "Given the harsh weather conditions on my capital, my herd is suffering all sorts of punishments and the kiss of death touches an immense number of animals.\n\nI need to check my coffers to see if I have enough to buy rations and build better conditions for my herd in this time of scarcity... or perhaps my high Learning or some steppe trait saves the day!"
darkages_nomads.01.opta:0 "Damnation!"
darkages_nomads.01.optb:0 "Using my funds I can lessen the suffering"
darkages_nomads.01.optc:0 "I'll use my skills to help my herd"
darkages_nomads.01.tt1:0 "You manage to have in your treasury at least half the gold necessary to lessen the dire effects of the weather\n"
darkages_nomads.01.tt2:0 "You either have at least an above average Learning Skill or have the Seasoned Pastoralist Trait for this option to be active. More than Very Good Learning Skill (>= 18) provides a bonus to your chances as well as the traits Seasoned Pastoralist, Shrewd, Temperate, Patient and Calm. A Learning skill lower than Above Average (<12) provides a penalty that is harsher the less Learning you have. Being Dull also will not help you. Please be aware that failure with your measures will worsen the situation by a very significant amount\n"
darkages_nomads.01.toast1:0 "You managed to save countless animals from a certain death!"
darkages_nomads.01.toast2:0 "Unfortunately, you failed on your efforts to save your herd..."
darkages_nomads.02.t:0 "The Art of the Steal"
darkages_nomads.02.desc:0 "On this glorious morning, I was woken up by a group of my men telling me in hurried words that part of my herd has been stolen over the last few days.\n\nAll eyes are on me while I consider my options..."
darkages_nomads.02.opta:0 "There is nothing we can do..."
darkages_nomads.02.optb:0 "On your horses! We will pursue them!"
darkages_nomads.02.optc:0 "Now, I have a plan for a devious trap..."
darkages_nomads.02.tt0:0 "If you are only seeing this option it means you don't have Above Average Skill (>=12) in Martial or Intrigue and lack the traits Overseer, Brave, Vengeful, Stubborn, Torturer, Deceitful, Eccentric and Disloyal\n"
darkages_nomads.02.tt1:0 "This option is available because you are at least Above Average (>=12) in Martial or have one of the traits Overseer, Brave, Vengeful or Stubborn. Your chances of success are higher if you have one of the previously mentioned traits, are Impatient, are Wrathful or have at least Good (>=15) Martial Skill. Working against you are a lower than Average (<12) Martial Skill and the traits Forgiving, Patient, Calm, Lazy or Craven\n"
darkages_nomads.02.tt2:0 "This option is available because you are at least Above Average (>=12) in Intrigue or have one of the traits Torturer, Deceitful, Eccentric or Disloyal. Your chances of success are higher if you have one of the previously mentioned traits, are Calm, are Patient or have at least Good (>=15) Intrigue Skill. Working against you are a lower than Average (<12) Intrigue Skill and the traits Wrathful, Impatient, Honest, Loyal or Fickle\n"
darkages_nomads.02.toast1:0 "After a successful pursuit I managed to recover my herd!"
darkages_nomads.02.toast2:0 "The pursuit was a failure. I lost my herd and 150 Prestige"
darkages_nomads.02.toast3:0 "The trap was a success, we killed everybody and recovered my herd!"
darkages_nomads.02.toast4:0 "The trap was a failure. I lost my herd and 150 Prestige"

