landless_upkeep_decision_desc:0 "Check your ledgers and accounts to know how much does it cost the maintenance of your MaA in provisions"
landless_upkeep_decision_tooltip:0 "Calculate MaA upkeep"
darkages_startup.07.t:0 "About Provisions and their Management"
darkages_startup.07.desc:0 "As you are playing a Landless Character, you might be paying upkeep concerning the total number of MaA regiments you have employed.\n\nNotice you can select the relevant game rule to define how harsh is this payment and whether you want to play with it at all.\n\nIf you go with the default rules or select one of the 5 levels of payment there, you have available a new decision called 'Calculate Yearly Upkeep' to give you the yearly amount of Provisions that you lose.\nNotice that you will be charged a quarter of this value every three months, so don't get worried if you check your provisions are reduced more than once per year."
darkages_startup.07.opta:0 "So, provisions... with a twist!"
couldnt_resist_the_urge:0 "Couldn't resist the urge..."
darkages_celibacy_loophole.01.t:0 "An Offer Too Good to Pass"
darkages_celibacy_loophole.01.desc:0 "It has been nagging me time and again. The urge of the passion, of the involvement, of the chase and of being chased...\n\nThe cumplicity and sensuality of two bodies playing with each other and forming a single, timeless bond.\n\nIt was then that [temptation.GetName] crossed my path.\nI became enthralled and started thinking, ever more strongly, about leaving my celibacy behind.\n\nThen, after what I can only understand an excuse to be alone with [temptation.GetHerHim] in a discreet place, [temptation.GetSheHe] unbottoned [temptation.GetHerHis] discreet robe and stood before me... in all [temptation.GetHerHis] Glory!"
darkages_celibacy_loophole.01.opta:0 "I'LL PREVAIL OVER MY BASIC INSTINCTS!"
darkages_celibacy_loophole.01.optb:0 "Indulge in absolute pleasure..."
darkages_celibacy_loophole.01.tt1:0 "This event might happen because you are Celibate and are not Chaste. The chances of being tempted increase if you are Deceitful, Arbitrary, Impatient, Gluttonous, Wrathful, Disloyal or Gregarious. The chances are reduced if you are Loyal, Temperate, Just, Honest, Patient, Humble, Shy or Content. Due to your weak force of will, you will be unable to pick again the 'Embrace Celibacy' decision for 10 years\n"
