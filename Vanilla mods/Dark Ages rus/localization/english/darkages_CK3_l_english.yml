darkages_landless_medley.29.t:0 "A Sorry Blunder"
darkages_landless_medley.29.desc1:0 "Unfortunately, the mission trusted to [darkages_candidate_1.GetName] in the court of [darkages_special_ruler.GetName] was a failure.\n\nIn spite of what [darkages_candidate_1.GetName] considers [darkages_candidate_1.GetHerHis] best efforts, in the end a lack of common sense as well as awkwardness lingered in the air.\n\nCertainly this represents a serious loss of Prestige for me"
darkages_landless_medley.29.desc2:0 "Unfortunately, the mission trusted to [darkages_candidate_2.GetName] in the court of [darkages_special_ruler.GetName] was a failure.\n\nIn spite of what [darkages_candidate_2.GetName] considers [darkages_candidate_2.GetHerHis] best efforts, in the end a lack of common sense as well as awkwardness lingered in the air.\n\nCertainly this represents a serious loss of Prestige for me"
darkages_landless_medley.29.desc3:0 "Unfortunately, the mission trusted to [darkages_candidate_3.GetName] in the court of [darkages_special_ruler.GetName] was a failure.\n\nIn spite of what [darkages_candidate_3.GetName] considers [darkages_candidate_3.GetHerHis] best efforts, in the end a lack of common sense as well as awkwardness lingered in the air.\n\nCertainly this represents a serious loss of Prestige for me"
darkages_landless_medley.29.opta:0 "A pity..."
darkages_landless_medley.30.t:0 "A Successful Venture!"
darkages_landless_medley.30.desc1:0 "[darkages_candidate_1.GetName] acted as a true talisman regarding the success of my business with [darkages_special_ruler.GetName]!\n\nAfter a convoluted start, the best efforts of [darkages_candidate_1.GetName] were on display and the matter was settled in my best interests.\n\nNow it is time to bask in the laurels of a well planned action!"
darkages_landless_medley.30.desc2:0 "[darkages_candidate_2.GetName] acted as a true talisman regarding the success of my business with [darkages_special_ruler.GetName]!\n\nAfter a convoluted start, the best efforts of [darkages_candidate_2.GetName] were on display and the matter was settled in my best interests.\n\nNow it is time to bask in the laurels of a well planned action!"
darkages_landless_medley.30.desc3:0 "[darkages_candidate_3.GetName] acted as a true talisman regarding the success of my business with [darkages_special_ruler.GetName]!\n\nAfter a convoluted start, the best efforts of [darkages_candidate_3.GetName] were on display and the matter was settled in my best interests.\n\nNow it is time to bask in the laurels of a well planned action!"
darkages_landless_medley.30.opta:0 "Oh, Goooood!"
