setting_darkages_starting_followers_no:0 "Disabled"
setting_darkages_starting_followers_no_desc:0 "No followers will be generated at game start. Vanilla experience."
rule_darkages_complex_dread:0 "#B #Bold Dark Ages#!:#! Complex Dread"
setting_darkages_complex_dread_active:0 "Enabled"
setting_darkages_complex_dread_active_desc:0 "Dread leads to a progressive erosion of opinion about the ruler on Courtiers and Guests. At the same time a dreadful ruler can choose to 'Intimidate' Vassals and Courtiers to get valuable resources."
setting_darkages_complex_dread_inactive:0 "Disabled"
setting_darkages_complex_dread_inactive_desc:0 "Vanilla experience. The Dread design leads to less effects for and against the player. Notice that you might get assassinated due to high Dread, still. See the game rule 'Murder System'."
