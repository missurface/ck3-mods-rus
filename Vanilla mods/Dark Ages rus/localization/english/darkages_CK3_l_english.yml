darkages_focus.01.t:0 "Long Term Plans"
darkages_focus.01.desc:0 "The time has come for me to plan ahead on what angle of my noble life I will concentrate the efforts over the next decade.\n\nInvesting my fortune in one of the paths available, it is certain my choice will carry deep consequences for my personal achievements as a person and as a ruler..."
darkages_focus.01.opta:0 "I will focus on improving the lot of my Peasants"
darkages_focus.01.optb:0 "I will focus on my Prestige"
darkages_focus.01.optc:0 "I will focus on my Piety"
darkages_focus.01.opte:0 "I will focus on my Lifestyle and Realm Management"
darkages_focus.01.optd:0 "No fancy dreams. I will spare my gold..."
darkages_focus.01.tt1:0 "...but, unless Greedy or Lazy, get stressed at the opportunity lost!\n"
darkages_opinion_focus_people1:0 "Provincial Priority"
darkages_opinion_focus_people1_desc:0 "The Lord of this county is improving the lot of its peasants"
darkages_opinion_focus_people2:0 "Provincial Priority"
darkages_opinion_focus_people2_desc:0 "The Lord of this county is improving the lot of its peasants"
darkages_opinion_focus_people3:0 "Provincial Priority"
darkages_opinion_focus_people3_desc:0 "The Lord of this county is improving the lot of its peasants"
commander_defender_advantage:0 "Commander Defender Advantage"
darkages_friends.01.t:0 "Friend of a Friend"
darkages_friends.01.desc:0 "Today, [friend_darkages.GetFirstName], my dear friend, approached me with an interesting proposal for me to consider.\nAs things stand, [candidate_darkages.GetFirstName], [friend_darkages.GetHerHis] esteemed friend, although of hailing from a very modest family of no consequence, is a very talented fellow that might be a very useful addition to my Court.\n\nOf course there are many angles to consider this question as my Prestige in employing a lowborn will suffer should I accept the offer.\nI can also reap some marginal rewards in terms of the opinion of the Courtly faction of my nobles by discreetly announcing I will forfeit this opportunity...\n\nIn the end, being grateful to my friend, the choice is mine to make."
darkages_friends.01.opta:0 "I value useful men more than their birthstation"
darkages_friends.01.optb:0 "I can spin this to my advantage..."
darkages_friends.01.tt1:0 "You refuse the offer and use it as a way to propel your Prestige and your Courtly Vassals' opinion. Based on your traits, your Stress might change for better or worse\n"
darkages_friends.02.t:0 "Helping Hand"
darkages_friends.02.desc:0 "It was with joy that today I received the visit of my friend [friend_darkages.GetFirstName] and engaged [friend_darkages.GetHerHim] in a lenghty discussion about anything and everything, from the state of the Realm to gossip about my courtiers, passing by this or that reminiscence of the common past.\n\nIt was with a sense of thrill that [friend_darkages.GetSheHe] tried to persuade me into attempting to improve one of my Skills under [friend_darkages.GetHerHis] tutelage.\n\nAll I have to do is to buy some old books about the subject matter and the lessons can start..."
darkages_friends.02.opta:0 "Lets do it!"
darkages_friends.02.optb:0 "I prefer to go fishing..."
darkages_friends.02.tt1:0 "Beware that if you fail to learn anything you'll lose Prestige as everybody will be witness of your failure.\nThe chance of success is influenced positively by being Diligent, Shrewd, Quick, Intelligent, Genius and by a high Skill in Learning (>=12). Negatively, influencing the probabilities are a low Skill in Learning (<8), being Dull, being Lazy, being Slow, being Stupid and being Imbecile\n"
darkages_friends.03.t:0 "A Friend in Need"
darkages_friends.03.desc1:0 "My friend [friend_darkages.GetName] came to me today quite despondent with [friend_darkages.GetHerHis] financial prospects for the near and longer term.\nAs things go, [friend_darkages.GetSheHe] is facing bankruptcy and is asking for my help in directly paying [friend_darkages.GetHerHis] creditors.\n\nNow the great thing about [friend_darkages.GetFirstName] is [friend_darkages.GetHerHis] deep religious connections that, should I decide to help [friend_darkages.GetHerHim], will make my Piety shine brightly as discreet words about my decisive contribution will be spread..."
darkages_friends.03.desc2:0 "My friend [friend_darkages.GetName] came to me today quite despondent with [friend_darkages.GetHerHis] financial prospects for the near and longer term.\nAs things go, [friend_darkages.GetSheHe] is facing bankruptcy and is asking for my help in directly paying [friend_darkages.GetHerHis] creditors.\n\nNow the great thing about [friend_darkages.GetFirstName] is [friend_darkages.GetHerHis] deep religious connections that, should I decide to help [friend_darkages.GetHerHim], will make my Piety shine brightly as discreet words about my decisive contribution will be spread...\n\nBut there is another sweeter possibility here. Based on the details I already know, I might be able to craft an ambitious plan where I will stand to gain more Piety, don't spend a single gold coin and brilliantly take advantage of the situation.\nThe decision is mine to take!"
darkages_friends.03.opta:0 "I'll help you [friend_darkages.GetFirstName]"
darkages_friends.03.optb:0 "Sorry, I can't help you"
darkages_friends.03.optc:0 "Manipulate everybody!"
darkages_friends.03.tt1:0 "This option is available because you have at least 12 in Intrigue Skill, are Deceitful, are a Schemer or are Disloyal.\nThe success of this option depends on the High Intrigue Skill of yourself and of your [spymaster.GetCouncilTitle]\n"
darkages_friends.03.toast1:0 "You were able to manipulate everybody!"
darkages_friends.03.toast2:0 "You failed in your nefarious plan..."
darkages_friends.03.tt2:0 "Your action is successful\n"
darkages_friends.03.tt3:0 "You are exposed as a despicable soul...\n"
darkages_friends.04.t:0 "The Right Word"
darkages_friends.04.desc:0 "It was with joy that I hosted [friend_darkages.GetName], my personal friend, to pass a blissful morning together.\n\nAfter the lunch, [friend_darkages.GetSheHe] proceeded in a most conspirational tone to tell me about [friend_darkages.GetHerHis] plans to improve the Renown of my Bloodline.\nMy interest was piked and it was with a smile that I received the news that some hiperbolic comments were made in different Courts to further my friend's plan.\n\nGiven the state of the whole affair, I must now decide if I let [friend_darkages.GetFirstName] to attempt a real coup in terms of my Renown, if I take advantage of the initial work and earn investment from different foreign nobles or if I simply refuse the whole scheme..."
darkages_friends.04.opta:0 "Accept the offer"
darkages_friends.04.optb:0 "Turn my friend's words into an investment opportunity"
darkages_friends.04.optc:0 "Forbid the whole affair"
darkages_friends.04.tt1:0 "Your base chance to be successful even if not very low, is not high. However, [friend_darkages.GetFirstName]'s good Diplomacy Skill or if [friend_darkages.GetSheHe] has the traits Gregarious, Diplomat, Arrogant, Ambitious, Diligent or Shrewd will substancially increase your chances. Of course, the higher the Diplomacy and the more the Traits, the better\n"
darkages_friends.04.toast1:0 "Your Renown soars!"
darkages_friends.04.toast2:0 "A wasted opportunity..."
darkages_friends.05.tt1:0 "This option is available because you have at least 12 in Intrigue Skill, are Deceitful, are a Schemer or are Disloyal\n"
darkages_friends.05.t:0 "A Useful Friend"
darkages_friends.05.desc1:0 "My enterprising friend [friend_darkages.GetName] came up today to me stating triumphantly [friend_darkages.GetSheHe] pulled a great coup over the last year by soft talking to my vassals, becoming their confider and influence them very favourably towards my person!\n\nThanking deeply my friend for [friend_darkages.GetHerHis] help, my mind, never quiet, immediately started seeing further away than mere opinions... after all, how much does an opinion value?"
darkages_friends.05.desc2:0 "My enterprising friend [friend_darkages.GetName] came up today to me stating triumphantly [friend_darkages.GetSheHe] pulled a great coup over the last year by soft talking to my vassals, becoming their confider and influence them very favourably towards my person!\n\nThanking deeply my friend for [friend_darkages.GetHerHis] help, my mind, never quiet, immediately started seeing further away than mere opinions... after all, how much does an opinion value?\n\nOh joy, but things can even get more interesting!\nHow about using the secrets some of my vassals shared with [friend_darkages.GetFirstName] to blackmail them?"
darkages_friends.05.opta:0 "I'll follow my friend's original idea"
darkages_friends.05.optb:0 "I'll use the leverage to levy an extra tax"
darkages_friends.05.optc:0 "I'll betray my friend and follow a blackmail route"
darkages_trade.01.t:0 "A Far Reaching Proposal"
darkages_trade.01.desc:0 "An exquisite meeting was arranged for today, after lunch. I decided to receive a wealthy foreigner of [trader.GetCulture.GetName] culture to listen to a mentioned trade proposal from [trader.GetHerHim].\n\nAfter being taken by surprise by [trader.GetFirstName]'s command of my language, a very nice exchange of pleasantries followed and then, an interesting trade proposal was presented.\n\nBasically, [trader.GetName] will operate a single long distance trade route between my capital and [trader.GetHerHis] far away lands. Given the distances involved I can only expect a return on my investment after a few years and, if everything works out, I can expect this return to continue for the foreseeable future.\n\nIn the knowledge I need to provide some seed gold, I am going to answer [trader.GetHerHis] proposal tomorrow..."
darkages_trade.01.opta:0 "Accept the deal"
darkages_trade.01.tt1:0 "Even if it is a very straightaway comercial decision, mingling with characters of so far away lands and alien costumes will bring a Prestige penalty to you. For the success of this venture it is important your character have Good or better Stewardship, follows a Stewardship Lifestyle, has a Stewardship Education, is Greedy or is an Administrator. Notice the route might be perfectly profitable even without any of these Skills, Traits or Lifestyle but the odds are not as good\n"
darkages_trade.01.optb:0 "Refuse the proposal"
darkages_trade.01.tt2:0 "If you had better Diplomacy you would gain more from deciding this way"
darkages_trade.01.tt3:0 "With an average Diplomacy you are able to leverage some political benefit from your refusal and increase your Prestige by snubbing the trader\n"
darkages_trade.01.tt4:0 "With a better than average Diplomacy you are able to leverage some political benefit from your refusal and not only you will increase your Prestige but also get the approval of your vassals by snubbing the trader\n"
darkages_trade.01.optc:0 "Confiscate the trader's goods"
darkages_trade.01.tt5:0 "This option is available because you have either at least 12 in the Intrigue Skill, are Deceitful, are Ambitious or are Arbitrary. Acting this way is considered despicable with possible consequences\n"
darkages_trade.01.tt6:0 "This option is available because you are either Callous, Sadistic, Arbitrary or follow an Intrigue Lifestyle. Acting this way is considered despicable with possible consequences\n"
darkages_trade.01.optd:0 "Arrest and ransom the trader"
darkages_trade.02.t:0 "Good Profit!"
darkages_trade.02.desc:0 "Finally the exotic goods have arrived in my capital and I can reap some of the profit promised!\n\nThis gold will help immensely with my finances, I am sure..."
darkages_trade.02.opta:0 "Lets hope it continues like this..."
darkages_trade.03.t:0 "The Final Word from Far Away"
darkages_trade.03.desc:0 "Unfortunately I received word today that the trade rout agreed years ago has been closed. Different factors, from bandits to the relative worth of the commodities, to new objectives of my partner or even health issues might have signaled the route's demise..."
darkages_trade.03.opta:0 "It was good while it lasted"
darkages_trade.04.t:0 "From [trader.GetName], With Love..."
darkages_trade.04.desc:0 "Today I woke up with a strange feeling. Something was not quite right from the sunrise but I could not pinpoint what was it.\n\nUnfortunately, I decided to have some minutes completely alone and retire to a remote spot to organize my thoughts.\n\nIt was then that the ambush was set. In an instant, a scary hooded figure appeared, lifted a crossbow and pointed it to my chest, saying with a coarse voice:\n\n'[trader.GetName] sends [trader.GetHerHis] respects'..."
darkages_trade.04.opta:0 "Mors tua, vita mea!"
darkages_trade.04.tt:0 "You swiftly charge against the assassin, your trusty dagger pointed at his heart. It seems the trader who came to you with a business proposal didn't enjoy the treatment received and decided to take [trader.GetHerHis] revenge. Next time pay attention to the traits and skills of your victims\n"
darkages_trade.04.save:0 "You escape unscathed!"
darkages_trade.05.t:0 "The Industrious Local Council"
darkages_trade.05.desc1:0 "The local council of [darkages_county.GetName] came up today with a request to finance what can be seen as a profitable local business concerning the production of barley.\n\nNow, these subjects have lots of ideas about what to do with my gold and they already placed me in a weak political position regarding the population of the County in general.\n\nAs I can stand to reap some rewards in the midterm I need to decide on this matter."
darkages_trade.05.desc2:0 "The local council of [darkages_county.GetName] came up today with a request to finance what can be seen as a profitable local business concerning the production of parchment.\n\nNow, these subjects have lots of ideas about what to do with my gold and they already placed me in a weak political position regarding the population of the County in general.\n\nAs I can stand to reap some rewards in the midterm I need to decide on this matter."
darkages_trade.05.desc3:0 "The local council of [darkages_county.GetName] came up today with a request to finance what can be seen as a profitable local business concerning the production of furniture.\n\nNow, these subjects have lots of ideas about what to do with my gold and they already placed me in a weak political position regarding the population of the County in general.\n\nAs I can stand to reap some rewards in the midterm I need to decide on this matter."
darkages_trade.05.desc4:0 "The local council of [darkages_county.GetName] came up today with a request to finance what can be seen as a profitable local business concerning the production of dyed textiles.\n\nNow, these subjects have lots of ideas about what to do with my gold and they already placed me in a weak political position regarding the population of the County in general.\n\nAs I can stand to reap some rewards in the midterm I need to decide on this matter."
darkages_trade.05.opta:0 "Accept the request"
darkages_trade.05.optb:0 "Take charge of the plan"
darkages_trade.05.optc:0 "Discredit the local council"
darkages_trade.05.optd:0 "Refuse the request"
darkages_trade.05.opte:0 "Skillfully refuse the request"
darkages_trade.05.tt1:0 "By picking this option you will be doing what the lowly local council of [darkages_county.GetName] asked and will be judged as weak by your peers losing Prestige, besides the gold invested\n"
darkages_trade.05.tt2:0 "This option is available because you have either at least a Stewardship Skill of 12, you are Diligent, Ambitious or an Administrator. You take the reigns of the project, deeply delving into it\n"
darkages_trade.05.tt3:0 "This option is available because you have either a Skill in Intrigue of at least 12, you are Deceitful, Arbitrary, Disloyal or Callous. Using despicable subterfuge, damning lies and sour manipulation, you turn the good intentions of the local council into something akin to treason and find a good excuse that goes well with the peasants of [darkages_county.GetName] to reshape it while avoiding to spend gold\n"
darkages_trade.05.tt4:0 "This option is available because you have less than 12 in the Diplomacy Skill. You refuse the request, facing the local political fallout in the process\n"
darkages_trade.05.tt5:0 "This option is available because you have at least 12 in the Diplomacy Skill. You refuse the proposal but sweeten your words and avoid any bad consequences"
darkages_county_trade_local_council_1:0 "Invested in Barley Trade"
darkages_county_trade_local_council_2:0 "Invested in Parchment Trade"
darkages_county_trade_local_council_3:0 "Invested in Furniture Trade"
darkages_county_trade_local_council_4:0 "Invested in Dyed Textiles Trade"
darkages_county_trade_local_council_1_desc:0 "The owner of this County invested gold at the request of the local council"
darkages_county_trade_local_council_2_desc:0 "The owner of this County invested gold at the request of the local council"
darkages_county_trade_local_council_3_desc:0 "The owner of this County invested gold at the request of the local council"
darkages_county_trade_local_council_4_desc:0 "The owner of this County invested gold at the request of the local council"
darkages_county_trade_local_council_5:0 "Local Council Blamed"
darkages_county_trade_local_council_5_desc:0 "The owner of this County was able to discredit the local council"
darkages_county_trade_local_council_6:0 "Peasants Dejected"
darkages_county_trade_local_council_6_desc:0 "The owner of this County awkwardly refused the plans of the local council"
darkages_trade.06.t:0 "A Long Voyage"
darkages_trade.06.desc:0 "Through the influence of common acquaintances, a certain [darkages_trader.GetName] was able to secure a meeting with me today, where [darkages_trader.GetSheHe] informed me of [darkages_trader.GetHerHis] intention to perform a risky comercial trip to the far away lands of [darkages_ruler.GetName].\n\nThis trader tempted me to invest on [darkages_trader.GetHerHis] venture promising a substancial profit once [darkages_trader.GetSheHe] comes back.\n\nNow it is for me to decide how I will answer the offer..."
darkages_trade.06.opta:0 "Accept the deal"
darkages_trade.06.tt1:0 "Trusting in commoners will be dully noted by your peers, thus your Prestige suffers. In the certainty that chance will play a role , no success is assured and no failure is ever guaranteed, the success of this venture depends on the Stewardship Skill of the trader  as well as his negative Traits Impatient, Wrathful or Lazy\n"
darkages_trade.06.optb:0 "Invest more than asked"
darkages_trade.06.tt2:0 "This option is available because you have either a Stewardship Skill of at least 12, you are Greedy or you are an Administrator. Trusting in commoners will be dully noted by your peers, thus your Prestige suffers. By risking more, you will turn the success a bit less likely but can be assured to receive significantly more if the venture is successful. Chances of success are modified by the same as the option above\n"
darkages_trade.06.optc:0 "Use the caravan to smuggle goods"
darkages_trade.06.tt3:0 "This option is available because you have either an Intrigue Skill of at least 12, you are Deceitful or you are a Schemer. Trusting in commoners will be dully noted by your peers, thus your Prestige suffers. By providing illegal goods to the target market you are gambling the most with the success of the caravan but if successful, the rewards will be immense. The success of this options depends on the trader Intrigue and Stewardship skills as well as his negative Traits Honest, Just or Lazy\n"
darkages_trade.06.optd:0 "Refuse the offer"
darkages_trade.07.t:0 "A Ruinous Investment"
darkages_trade.07.desc1:0 "Unfortunately the trade caravan I invested in suffered a critical setback. In the end, [darkages_trader.GetName] was killed by bandits and all the goods of the caravan lost..."
darkages_trade.07.desc2:0 "Unfortunately the trade caravan I invested so much in suffered a critical setback. In spite of my hopes and my trade gamble, [darkages_trader.GetName] was killed by bandits and all the goods of the caravan lost..."
darkages_trade.07.desc3:0 "Unfortunately the trade caravan I invested in suffered a critical setback. Probably enticed by the illegal valuables carried by the trade caravan, bandtis intercepted and robbed it, killing [darkages_trader.GetName] in the process..."
darkages_death_bandits:0 "was killed by bandits"
darkages_death_smuggler:0 "was captured and killed while smuggling goods"
darkages_death_smuggler_killer:0 "was captured and killed at the orders of [TARGET_CHARACTER.GetUIName] while attempting to smuggle goods"
darkages_trade.07.opta:0 "There goes my gold... and my prestige!"
darkages_trade.08.t:0 "A Successful Journey"
darkages_trade.08.desc1:0 "The caravan I invested in returned today with words - and gold - that underscore its profit!\n\n[darkages_trader.GetName] is now thinking about retiring from risky endeavours..."
darkages_trade.08.desc2:0 "My cunning was proved yet again as word from the caravan I invested so much in talks about a profitable venture!\n\n[darkages_trader.GetName] is now thinking about retiring from risky endeavours..."
darkages_trade.08.desc3:0 "My capital judgement was proved right yet again as word from the caravan I used to smuggle valuable goods talks about a profitable venture!\n\n[darkages_trader.GetName] is now thinking about retiring from risky endeavours..."
darkages_trade.08.opta:0 "Very good!"
darkages_trade.08.optb:0 "A worthy financial risk to take!"
darkages_trade.08.optc:0 "A new market to profitably sell... certain stuff!"
darkages_trade.09.t:0 "A Very Profitable Journey!"
darkages_trade.09.desc1:0 "The caravan I invested in returned today with words - and gold - that underscore its huge profit!\n\n[darkages_trader.GetName] is now thinking about retiring from risky endeavours..."
darkages_trade.09.desc2:0 "My cunning was proved yet again as word from the caravan I invested so much in talks about an extremelly profitable venture!\n\n[darkages_trader.GetName] is now thinking about retiring from risky endeavours..."
darkages_trade.09.desc3:0 "My capital judgement was proved right yet again as word from the caravan I used to smuggle valuable goods talks about an extremelly profitable venture!\n\n[darkages_trader.GetName] is now thinking about retiring from risky endeavours..."
darkages_trade.09.opta:0 "Excellent!"
darkages_trade.09.optb:0 "Brilliant!"
darkages_trade.09.optc:0 "An investment masterly crafted!"
darkages_county_upbeat:0 "Grateful Peasants"
darkages_county_upbeat_desc:0 "Given the financial help they received, the peasants in this County are happy with their ruler"
darkages_county_nohelp:0 "Unsupported Economy"
darkages_county_nohelp_desc:0 "The ruler of this County did not lend help to the local economy in times of need"
darkages_trade.10.t:0 "The Woes of [darkages_trade_county.GetName]"
darkages_trade.10.desc:0 "With its main settlements over populated and the trade being curtailed by many different reasons, the [darkages_trade_county.GetName] is passing by a dire period where the peasants suffer the lack of everything, from food to other less relevant items.\n\nIt was presented to the Council a petition asking for help in terms of financial grants to ease the suffering of all the involved.\n\nAs it is my gold, it is my word that will decide the fate of the matter..."
darkages_trade.10.opta:0 "Quietly provide funds to richest local individuals"
darkages_trade.10.optb:0 "Subsidize the peasants"
darkages_trade.10.optc:0 "Sell excess peasants into slavery"
darkages_trade.10.tt1:0 "This option is available because you are either Callous, Sadistic or a Torturer. You sell part of the population into slavery in order to decrease the number of mouths to feed\n"
darkages_trade.10.optd:0 "Refuse to help"
darkages_county_sold_to_slavery:0 "Enslaved Population"
darkages_county_sold_to_slavery:0 "Peasants of this County were sold into slavery by the Ruler"
darkages_county_merc_traders:0 "Local Mercenaries"
darkages_county_merc_traders_desc:0 "Given the lack of protection from their Lord, the traders of this County are hiring local mercenaries to oversee seasonal markets"
darkages_county_cruel_traders:0 "Cruel Lord"
darkages_county_cruel_traders_desc:0 "As the Lord of this County robbed the local seasonal market, the populace is definitely not happy"
darkages_county_above_traders:0 "Security Effort"
darkages_county_above_traders_desc:0 "The Lord of this County took great pains in managing the security of the seasonal markets of this province"
darkages_trade.11.t:0 "Seasonal Markets"
darkages_trade.11.desc:0 "The local authorities of the [darkages_trade_county.GetName] started organizing seasonal markets last year. The venues were a success and are contributing to the County development and an overall increase of well being for its inhabitants.\n\nNow, there is a request that I provide more protection to the seasonal markets which means a drain in my coffers.\n\nWhat should I do?"
darkages_trade.11.opta:0 "Provide the necessary funds"
darkages_trade.11.optb:0 "Counsel traders to finance their own security"
darkages_trade.11.optc:0 "Go above and beyond what was requested"
darkages_trade.11.optd:0 "Storm the markets and confiscate the goods"
darkages_trade.11.tt1:0 "This option is available because you have at least a Stewardship Skill of 12, are Diligent, are Ambitious or are Generous. You invest heavily on the seasonal markets in a variety of different ways\n"
darkages_trade.11.tt2:0 "This option is available because you are either Callous, Sadistic, Greedy or Avaricious. You ruthlessly take advantage of the situation and confiscate the goods to your own profit\n"
darkages_county_mde:0 "Diplomatic Synergy"
darkages_county_mde_desc:0 "Through a diplomatic approach this County is experiencing a major development effort"
darkages_county_ms:0 "Military Synergy"
darkages_county_ms_desc:0 "Through a martial approach this County is experiencing a major increase in recruits"
darkages_county_ms2:0 "Management Synergy"
darkages_county_ms2_desc:0 "Through a management approach this County is being taxed much more effectively"
darkages_provinces.01.t:0 "A Great Diplomatic Opportunity"
darkages_provinces.01.desc:0 "After discussing the matter with my Councillors, I am thinking about an idea as of late in order to dramatically increase the development improvement in the [darkages_target_province.GetName].\n\nBy using my diplomacy skills, I will be forging a stronger bond between that County and its neighbours, thus facilitating the building of infrastructure there.\n\nOf course, in case of failure, I will face a Prestige hit as I will look poorly, but nothing comes free in this life..."
darkages_provinces.01.opta:0 "Implement the plan"
darkages_provinces.01.optb:0 "Use subterfuge and lies to your advantage"
darkages_provinces.01.optc:0 "Support the plan on your Learning"
darkages_provinces.01.optd:0 "Too costly and risky..."
darkages_provinces.01.tt1:0 "The success of this option depends on your Diplomacy Skill, positively on being Gregarious, Diligent or Ambitious. Negatively impacting the success chance are the traits Shy, Lazy and Content\n"
darkages_provinces.01.tt2:0 "This option is available because you are either Callous, Deceitful, Fickle or Arbitrary. The success of this option depends on your Intrigue Skill, positively on being Disloyal or in having an Intrigue Education. Negatively impacting the success chance are the traits Compassionate, Just and Loyal. The base chance of success of this option is lower than the previous one\n"
darkages_provinces.01.tt3:0 "This option is available because you are either Compassionate, Diligent, Just or Calm. The success of this option depends on your Learning Skill and positively on having a Learning Education. The base chance of success of this option is lower than the top one\n"
darkages_provinces.01.tt4:0 "Besides a possible increase in Stress - depending on your Personality Traits - your loss of Prestige and of Fame, you will lose Opinion with the members of your Council\n"
darkages_provinces.02.t:0 "Success!"
darkages_provinces.02.desc:0 "My attempt to improve the [darkages_target_province.GetName] has been a success and I can now reap the rewards!\n\nGreat news for the population there... and for me, of course!"
darkages_provinces.02.opta:0 "Excellent!"
darkages_provinces.03.t:0 "Failure..."
darkages_provinces.03.desc:0 "My efforts to improve the [darkages_target_province.GetName] ended in failure.\n\nUnfortunately, the whole scheme was too complex to be a recipe for success..."
darkages_provinces.03.opta:0 "A significant misstep..."
darkages_provinces.04.t:0 "A Great Military Opportunity"
darkages_provinces.04.desc:0 "After discussing the matter with my Councillors, I am thinking about an idea as of late in order to dramatically increase the number of levies available in the [darkages_target_province.GetName].\n\nBy using my martial skills, I will be promoting and enticing the peasants of the county to enlist the muster rolls.\n\nOf course, in case of failure, I will face a Prestige hit as I will look poorly, but nothing comes free in this life..."
darkages_provinces.04.tt1:0 "The success of this option depends on your Martial Skill, positively on being Brave, Diligent or Ambitious. Negatively impacting the success chance are the traits Craven, Lazy and Content\n"
darkages_provinces.05.t:0 "A Great Management Opportunity"
darkages_provinces.05.desc:0 "After discussing the matter with my Councillors, I am thinking about an idea as of late in order to improve dramatically the taxes collected in the [darkages_target_province.GetName].\n\nBy using my Stewardship skills, I will be streamlining and implementing a new tax scheme valid for about 10 years.\n\nOf course, in case of failure, I will face a Prestige hit as I will look poorly, but nothing comes free in this life..."
darkages_provinces.05.tt1:0 "The success of this option depends on your Stewardship Skill, positively on being an Administrator, Diligent or Ambitious. Negatively impacting the success chance are the traits Eccentric, Lazy and Content\n"
darkages_provinces.06.t:0 "Matters of Security"
darkages_provinces.06.desc:0 "During the morning today, I granted an audience to the local authorities of the [darkages_target_province_4.GetName] only to be informed that as of late there has been a significant increase in banditry there. They were swift to ask for local measures to cover the difficulties by hiring a special militia to patrol the County.\n\nNow, it occurred to me that the [darkages_target_province_4_1.GetName] has a long standing rivalry with the affected County and my actions to help the [darkages_target_province_4.GetName] might be badly interpreted..."
darkages_provinces.06.opta:0 "Help the [darkages_target_province_4.GetName]"
darkages_provinces.06.optb:0 "Use my Diplomacy"
darkages_provinces.06.optc:0 "Use my Intrigue"
darkages_provinces.06.optd:0 "Refuse to help the [darkages_target_province_4.GetName]"
darkages_provinces.06.tt1:0 "This option is available because you are either a Diplomat, Gregarious, Just, Honest or Diligent. The Success of this option depends on your Diplomacy Skill. You use your Diplomacy to assuage the [darkages_target_province_4_1.GetName] rivalry\n"
darkages_provinces.06.tt2:0 "Failure..."
darkages_provinces.06.toast2:0 "You failed to calm the rivalry..."
darkages_provinces.06.tt3:0 "Success!"
darkages_provinces.06.toast1:0 "You managed to calm the rivalry!"
darkages_provinces.06.tt4:0 "This option is available because you are either a Schemer, Arbitrary, Deceitful, Callous or Ambitious. The Success of this option depends on your Intrigue Skill. You use your Intrigue to deftly lie and manipulate the people of the [darkages_target_province_4_1.GetName]\n"
darkages_county_local_militia:0 "Additional Militia"
darkages_county_local_militia_desc:0 "Due to a spike in robberies in this County, additional militia was hired"
darkages_county_envy:0 "Sour Rivalry"
darkages_county_envy_desc:0 "This County feels aggrieved with its Lord by the attention received by a rival County of the same Domain"
darkages_county_abandoned:0 "Careless Ruler"
darkages_county_abandoned_desc:0 "The Ruler of this County abandoned it in times of need"
darkages_provinces.07.t:0 "Defensive Preparations"
darkages_provinces.07.desc:0 "From time to time a nagging feeling echoes in my head concerning my capability to withstand an attack by a possible enemy in my own territory.\n\nAfter much thought, I planned carefully for that contingence, creating several bastions inside my Domain to provide a defence in depth while harassing the enemy's movements.\n\nOf course, the resources to implement this plan are significant but... doesn't my safety warrant a hefty price?"
darkages_provinces.07.opta:0 "Implement the plan"
darkages_provinces.07.optb:0 "Discard the idea"
darkages_county_layered_defence:0 "Layered Defences"
darkages_county_layered_defence_desc:0 "This County has significant additional defences devised by its Ruler"
darkages_enemies.01.t:0 "Dangerous Whispers"
darkages_enemies.01.desc:0 "Some informers in my Domain came to me today to tell about a meeting that happened not a fortnight ago between my rival [darkages_intriguer.GetName] and my vassals together with my subvassals.\n\nThrough a cunning discourse pointed by some lies, almost all my vassals turned against me with a corresponding decrease in opinion..."
darkages_enemies.01.opta:0 "Outmaneuvered, suffer the loss in silence"
darkages_enemies.01.tt1:0 "All the vassals except the ones with the Loyal trait will become Despondent with you\n"
darkages_enemies.01.optb:0 "Meet with my vassals to clear my name!"
darkages_enemies.01.tt2:0 "This option is available because you are either a Diplomat, Gregarious, Just, Honest, Calm or Pacient. The success chance of this option is based on your Diplomacy. If you fail, all your vassals and sub vassals - excluding Loyal ones - will become Despondent about you\n"
darkages_enemies.01.toast1:0 "You managed to persuade your vassals about your righteous position!"
darkages_enemies.01.toast2:0 "Unfortunately your vassals are not moved by your words..."
darkages_enemies.01.optc:0 "Meet with my vassals and manipulate them"
darkages_enemies.01.tt3:0 "This option is available because you are either a Schemer, Deceitful, Arbitrary, Ambitious, Calm or Patient. The success chance of this option is based on your Intrigue. If you fail, all your vassals and sub vassals - including Loyal ones - will not be happy with your scheme and will become Incensed with you!\n"
darkages_enemies.01.toast3:0 "You managed to manipulate everybody into believing your long list of lies!"
darkages_enemies.01.toast4:0 "Your vassals saw through your wall of lies and are not Despondent but instead Incensed withg you...\n"
darkages_enemies.02.t:0 "The Heist"
darkages_enemies.02.desc:0 "I was informed this morning by my [darkages_stw.GetCouncilTitle] that a major robbery was performed on my treasury earlier in the month.\n\n A swift investigation ran by my [darkages_spm.GetCouncilTitle] brought to light the name of [darkages_robber.GetName], my rival, as the possible mastermind of this daring operation.\n\nOf course, I lack full proof to act accordingly..."
darkages_enemies.02.opta:0 "It is what it is..."
darkages_enemies.02.optb:0 "Plan revenge"
darkages_enemies.02.tt1:0 "You accept your fate\n"
darkages_enemies.02.tt2:0 "You try to save your face planning - and funding! - revenge with the intention to harm the Prestige of your rival\n"
rule_darkages_traits_limit_rule:0 "#B #Bold Dark Ages#!:#! Personality Traits"
setting_darkages_traits_limit_yes:0 "Three Traits"
setting_darkages_traits_limit_no:0 "Unlimited Traits"
setting_darkages_traits_limit_yes_desc:0 "Dark Ages will enforce 3 personality traits for all characters."
setting_darkages_traits_limit_no_desc:0 "There is no limit to the number of personality traits a character might have."
darkages_enemies.03.t:0 "Poisonous Words"
darkages_enemies.03.desc:0 "Today I became aware that my rival [darkages_enemy.GetName] has been spreading lies across the [darkages_county_enemy.GetName]!\n\nUnfortunately, the local officials and other relevant people in the province believed in what [darkages_enemy.GetSheHe] has been saying and the overall opinion there about myself is in the risk of dropping significantly...\n\nWhile I can admit defeat for the time being, I can also try to avoid this evil plan using different strategies, though it is a gamble..."
darkages_enemies.03.opta:0 "Better to avoid risking worse effects..."
darkages_enemies.03.optb:0 "Make a case using my Diplomacy"
darkages_enemies.03.tt1:0 "You try to persuade the local authorities of your truth. The success of this option depends positively on having a high Diplomacy Skill, on being Compassionate, Just, Honest or a Diplomat. Negatively influencing this option is a low Diplomacy Skill, being Callous, Deceitful, Arbitrary or Sadistic. If you fail, you will face worse consequences, both in terms of the County modifier as well as a loss of Prestige\n"
darkages_enemies.03.toast1:0 "You were able to persuade the locals!"
darkages_enemies.03.toast2:0 "You failed in persuading the locals..."
darkages_enemies.03.optc:0 "Make a case using my Martial"
darkages_enemies.03.tt2:0 "You attempt to awe the local authorities into believing in you. The success of this option depends positively on having a high Martial Skill, on being Brave, Arrogant, Wrathful or a Overseer. Negatively influencing this option is a low Martial Skill, being Craven, Humble, Forgiving or Temperate. If you fail, you will face worse consequences, both in terms of the County modifier as well as a loss of Prestige. Finally, the base chance of success for this option is lower than the previous one\n"
darkages_enemies.03.toast3:0 "You were able to awe the locals!"
darkages_enemies.03.toast4:0 "You failed in your action..."
darkages_opinion_county_enemy:0 "Poisonous Words"
darkages_opinion_county_enemy_desc:0 "The ruler of this province has been defamed by a rival"
darkages_enemies.04.t:0 "The Religious Machinations of [darkages_enemy.GetFirstName]"
darkages_enemies.04.desc:0 "Today in the Council I became aware that one of my despicable rivals, [darkages_enemy.GetName], has been defaming me with the religious authorities and [darkages_enemy.GetSheHe] had the nerve to probe very high places.\n\nAs things stand, my Piety is on the line due to the remarkable success of such actions.\n\nI must decide what I'll do regarding this important matter..."
darkages_enemies.04.opta:0 "Better to be silent"
darkages_enemies.04.optb:0 "Influence the religious authorities"
darkages_enemies.04.optc:0 "Lie your way out of the situation"
darkages_enemies.04.tt2:0 "You attempt to deceive the religious authorities in order to avoid the Piety loss. The success of this action depends on your high Intrigue Skill, on being Deceitful, on being a Schemer, on being a Seducer and in having an Intrigue education. Contributing to the failure of this action are your low Intrigue Skill, on being Honest and on being Just\n"
darkages_enemies.04.tt1:0 "You attempt to persuade the religious authorities of your innocence. The success of this action depends on your high Learning Skill, on being Zealous, on being a Scholar, on being a Theologian and on the number of virtuous Personality Traits you have. Contributing to the failure of this action are your low Learning Skill, on being Cynical and on the number of sinful Personality Traits you have\n"
darkages_enemies.04.toast1:0 "You manage to persuade the religious authorities!"
darkages_enemies.04.toast2:0 "You fail to persuade the religious authorities..."
darkages_enemies.04.toast3:0 "You manage to cheat the religious authorities!"
darkages_enemies.04.toast4:0 "You fail to cheat the religious authorities..."
darkages_enemies.05.t:0 "The Evil Whispers of [darkages_enemy.GetFirstName]"
darkages_enemies.05.desc:0 "I was informed today about the nefarious plans of my rival, [darkages_enemy.GetName], to tarnish my reputation among my peers and to slander my own dynasty.\n\nSuch a tall order is only possible because of the dogged pursuit with which [darkages_enemy.GetSheHe] pursues the matter as well as [darkages_enemy.GetHerHis] devious mind. As things stand, the claim is that I am a weak miserable, no more than an uncouth and unlearned soul that happened to rise to some position of prominence through sheer luck...\n\nI must access the possible social damage done to me and decide what to do."
darkages_enemies.05.opta:0 "Do nothing"
darkages_enemies.05.optb:0 "Try to honorably prove my intellectual value"
darkages_enemies.05.optc:0 "Attempt to manipulate the truth in my favour"
darkages_enemies.05.tt2:0 "You attempt to deceive your peers in order to avoid the Prestige and Renown loss. The success of this action depends on your high Intrigue Skill, on being Deceitful, on being a Schemer, on being a Seducer and in having an Intrigue education. Contributing to the failure of this action are your low Intrigue Skill, on being Honest and on being Just\n"
darkages_enemies.05.tt1:0 "You attempt to prove to your peers about your knowledge and sound intellect. The success of this action depends on your high Learning Skill, on being a Poet, on being a Scholar, on being a Diplomat and on having a Learning Education. Contributing to the failure of this action are your low Learning Skill, on being Wrathful and on being Dull\n"
darkages_enemies.05.toast1:0 "You manage to persuade your peers about your knowledge!"
darkages_enemies.05.toast2:0 "You fail to persuade your peers..."
darkages_enemies.05.toast3:0 "You manage to cheat your peers!"
darkages_enemies.05.toast4:0 "You fail to cheat your peers..."
darkages_infertility.03.t:0 "The Dice of Fate"
darkages_infertility.03.desc:0 "I always suspected something was not quite right.\n\nAfter many attempts and countless lies to myself first and foremost, I must come to the conclusion that I am infertile, with all the consequences it has to the future of my Dynasty..."
darkages_infertility.03.opta:0 "Sad... hummmm... how about forging an heir?"
darkages_infertility.05.t:0 "An Undesirable Slackness"
darkages_infertility.05.desc1:0 "After considerable concern and given the ever worse symptoms, fate caught me early in life.\nIt is with a heavy heart and much worry that I am faced with being impotent..."
darkages_infertility.05.desc2:0 "As old age progressively sets in, I must face my body decay and acknowledge that given my... ever more occasional performances... I am now impotent."
darkages_infertility.05.opta:0 "An uphill struggle to conceive an heir!"
darkages_infertility.05.optb:0 "I long for my past, glorious days..."
darkages_startup.01.tt1:0 "Over the first month of the game a series of events explaining some gameplay impactful changes of the mod will be presented for the new player of Dark Ages\n"
darkages_startup.02.t:0 "Violent Death in Dark Ages"
darkages_startup.02.desc:0 "In Dark Ages, your character's life is always on the line both from illnesses as well as less natural means. Covering the... artificial... means here, having rivals, having high Dread, trying to forge a claim, having provinces in your Domain with low control or low opinion, having crazy people as your courtiers, having particularly nasty vassals with very low opinion of you, trying to change the culture of a province or its religion, all turn your character susceptible to murder attempts.\n\nEmploying a good spymaster and one or even better, two bodyguards are good strategies when you have plenty of enemies around or are not very popular due to each and every reason.\n\nIn the knowledge most of the characters will not die due to murder attempts - unless you really crank up on the risks and forfeit your own security - the chance of a violent death is always present across the game.\n\nBe warned."
darkages_startup.02.opta:0 "This will have a significant impact on gameplay"
darkages_startup.03.t:0 "Illness and Fertility in Dark Ages"
darkages_startup.03.desc:0 "In Dark Ages, every character - including your own or that of your spouse! - has a chance of being infertile. Chances are not high of that to happen for one character, but over a campaign it will probably be felt once or twice on average. Mostly, you don't know who is fertile or not, but if time passes and no heir is conceived, you might do well to suspect something is amiss. If that happens, you can always forge an heir through decision after you are at least 40.\n\nBirth is also a critical moment, both for the mothers as well as the newborn. Risks of something running badly are much greater in Dark Ages and the first years of a baby can be critical. Accept it as a sign of the ancient times when the game timeline takes place.\n\nFinally, illnesses will be more frequent in Dark Ages. Most of the time you'll only get 'under the weather' but sometimes, specially if your character is vulnerable due to poor health, old age or nasty traits, a much more dangerous condition might develop."
darkages_startup.03.opta:0 "Bring up your worst!"
darkages_lowborn_spouses.01.t:0 "A Scandalous Marriage"
darkages_lowborn_spouses.01.desc:0 "As my marriage went forward, now I must face the consequences of choosing a Lowborn for Spouse.\n\nSociety does not look well into such prospect and be it for love or for any other reason, my Prestige and the Renown of my dynasty now suffer the nasty effects of such bold, yet shameful move on my part."
darkages_lowborn_spouses.01.desc2:0 "Yet again, after having divorced [spouse.GetName], here I am showing a blattant amount of indecision as I offered marriage to [spouse.GetHerHim] one more time!\n\nUnfortunately, this indecision adds up to the scandalous notion of marrying a Lowborn and this time the consequences cannot be avoided anymore..."
darkages_lowborn_spouses.01.opta:0 "I am ready to answer for my choice!"
darkages_lowborn_spouses.01.optb:0 "No, no... I cannot go ahead with this..."
darkages_lowborn_spouses.02.t:0 "A Scandalous Concubinage"
darkages_lowborn_spouses.02.desc:0 "As my official liaison went forward, now I must face the consequences of choosing a Lowborn for Concubine.\n\nSociety does not look well into such prospect and be it for love or for any other reason, my Prestige and the Renown of my dynasty now suffer the nasty effects of such bold, yet shameful move on my part."
darkages_lowborn_spouses.02.desc2:0 "Yet again, after having rejected [concubine.GetName], here I am showing a blattant amount of indecision as I intend to turn [spouse.GetHerHim] one more time into a concubinage!\n\nUnfortunately, this indecision adds up to the scandalous notion of having a Lowborn as concubine and this time the consequences cannot be avoided anymore..."
darkages_startup.04.t:0 "Marriage in Dark Ages"
darkages_startup.04.desc:0 "In Dark Ages marrying a Lowborn carry severe consequences both for the Prestige of the character as well as the Renown of his/her Dynasty.\n\nChoose well whom you marry and think before you commit into an official relationship with a Lowborn Spouse.\n\nAnd this is all concerning a few major changes from playing CK3 vanilla game. Get ready for a different experience from vanilla CK3 where several hundreds of new challenges, options and decisions will shape your destiny and the destiny of your dynasty!"
darkages_startup.04.opta:0 "Understood"
darkages_stress_lunacy.02.t:0 "The Insidious Stress"
darkages_stress_lunacy.02.desc:0 "The permanent Stress I am immersed into as I go about my everyday's business takes a very significant toll upon my mind and my body.\n\nI am aware of the risks I face but maybe now it is the time to think again and take a calmer aproach to my life..."
darkages_stress_lunacy.02.tt1:0 " If you have more than 99 Stress you run the risk of getting this event. The higher your current Stress score, the higher the chance you get it. The thresholds are at 100, 200 and 300 Stress\n"
darkages_stress_lunacy.02.opta:0 "I should rest, I guess..."
rule_darkages_lowborn_marriages_rule:0 "#B #Bold Dark Ages#!:#! Lowborn Marriages"
setting_darkages_lowborn_marriages_yes:0 "Social Penalty"
setting_darkages_lowborn_marriages_no:0 "No Social Penalty"
setting_darkages_lowborn_marriages_yes_desc:0 "Marrying a Lowborn will lead to Prestige and Renown penalties. Also partly applied to Concubines under some circumstances."
setting_darkages_lowborn_marriages_no_desc:0 "Marrying a Lowborn will not have consequences."
rule_darkages_warfare_stress_rule:0 "#B #Bold Dark Ages#!:#! Offensive Warfare"
setting_darkages_warfare_stress_yes:0 "Stressful"
setting_darkages_warfare_stress_no:0 "Not Stressful"
setting_darkages_warfare_stress_yes_desc:0 "Declaring an offensive war progressively increases stress"
setting_darkages_warfare_stress_no_desc:0 "Declaring an offensive war doesn't have any stress impact"
rule_darkages_murders_rule:0 "#B #Bold Dark Ages#!:#! Murder System"
setting_darkages_murders_yes:0 "Yes"
setting_darkages_murders_halved:0 "Rarer"
setting_darkages_murders_no:0 "No"
setting_darkages_murders_yes_desc:0 "Based on contextual game data your character might suffer different murder attempts."
setting_darkages_murders_halved_desc:0 "The murder attempts will be rarer on average."
setting_darkages_murders_no_desc:0 "Murder attempts will be disabled."
commander_terrain_advantage:0 "Commander Terrain Advantage"
rule_darkages_wr_rule:0 "#B #Bold Dark Ages#!:#! Wound Recovery"
setting_darkages_wr_yes:0 "Active"
setting_darkages_wr_no:0 "Inactive"
setting_darkages_wr_yes_desc:0 "A more realistic system of recovering from wounds is active. Riskier."
setting_darkages_wr_no_desc:0 "Dark Ages wound recovery system is inactive."
rule_darkages_illnesses_rule:0 "#B #Bold Dark Ages#!:#! Health Risk"
setting_darkages_illnesses_yes:0 "Active"
setting_darkages_illnesses_no:0 "Inactive"
setting_darkages_illnesses_yes_desc:0 "Health plays a more proeminent role in the life of all characters. Riskier."
setting_darkages_illnesses_no_desc:0 "Health is much more similar to vanilla CK3."
darkages_dread.01.t:0 "Markets and Fairs"
darkages_dread.01.desc1:0 "Over the last years, security standards across the marketplaces of my Domain have dropped dramatically and finally this state of affairs is causing troubles to the Control of my Counties.\n\nWhile questions about management of property and substantial space for the myriad of local fairs and markets have been raised, sellers and buyers have become restless as of late and more and more clashes with local authorities are being reported.\n\nConsidering the political environment favours a diplomatic solution, I need to decide how will I proceed to deal with this issue."
darkages_dread.01.desc2:0 "Over the last years, security standards across the marketplaces of my Domain have dropped dramatically and finally this state of affairs is causing troubles to the Control of my Counties.\n\nWhile questions about management of property and substantial space for the myriad of local fairs and markets have been raised, sellers and buyers have become restless as of late and more and more clashes with local authorities are being reported.\n\nConsidering the political environment favours a daring, bold approach to regulate and invest in infrastructure, I need to decide how will I proceed to deal with this issue."
darkages_dread.01.desc3:0 "Over the last years, security standards across the marketplaces of my Domain have dropped dramatically and finally this state of affairs is causing troubles to the Control of my Counties.\n\nWhile questions about management of property and substantial space for the myriad of local fairs and markets have been raised, sellers and buyers have become restless as of late and more and more clashes with local authorities are being reported.\n\nConsidering the political environment favours harsh measures, I need to decide how will I proceed to deal with this issue."
darkages_dread.01.desc4:0 "Over the last years, security standards across the marketplaces of my Domain have dropped dramatically and finally this state of affairs is causing troubles to the Control of my Counties.\n\nWhile questions about management of property and substantial space for the myriad of local fairs and markets have been raised, sellers and buyers have become restless as of late and more and more clashes with local authorities are being reported.\n\nConsidering the political environment does not favour in special any particular approach, I need to decide how will I proceed to deal with this issue."
darkages_dread.01.opta:0 "Reinforce the local militias"
darkages_dread.01.optb:0 "Favour a diplomatic approach"
darkages_dread.01.optc:0 "Expand and regulate all the fairs and markets"
darkages_dread.01.optd:0 "Strike harshly on all offenders"
darkages_dread.01.tt1:0 "The success of this option depends positively on your high Diplomatic Skill, on the very high Diplomatic Skill of your [da_dread_chancellor.GetCouncilTitle] and on your traits Gregarious, Calm, Compassionate, Forgiving and Diplomat. Negatively influencing the success of this option is your low Diplomatic Skill and your traits Wrathful, Vengeful, Callous and Arbitrary. The political environment may also influence the success chance\n"
darkages_dread.01.tt2:0 "The success of this option depends positively on your high Stewardship Skill, on the very high Stewardship Skill of your [da_dread_steward.GetCouncilTitle] and on your traits Diligent, Ambitious, Eccentric, Generous and Architect. Negatively influencing the success of this option is your low Stewardship Skill and your traits Lazy, Fickle, Content and Paranoid. The political environment may also influence the success chance\n"
darkages_dread.01.tt3:0 "The success of this option depends positively on your high Intrigue Skill, on the very high Intrigue Skill of your [da_dread_spymaster.GetCouncilTitle] and on your traits Deceitful, Callous, Vengeful, Sadistic and Torturer. Negatively influencing the success of this option is your low Intrigue Skill and your traits Honest, Compassionate, Just and Forgiving. The political environment may also influence the success chance\n"
darkages_county_rage:0 "Senseless Policies"
darkages_county_rage_desc:0 "The population of this County rails against the poor political accumen of the ruler"
darkages_county_cooperative:0 "Bold Cooperation"
darkages_county_cooperative_desc:0 "The population of this County is happy with the policies fostered by the ruler"
darkages_county_purposeful:0 "Above and Beyond"
darkages_county_purposeful_desc:0 "The population of this County is an eager partner to the development of the region"
darkages_dread_toast.01.tt1:0 "You managed to quell the population's grievances"
darkages_dread_toast.01.tt2:0 "You failed to quell the population's grievances..."
darkages_dread_toast.01.tt3:0 "You managed to implement a sound infrastructure plan"
darkages_dread_toast.01.tt4:0 "You failed to implement a sound infrastructure plan"
darkages_dread_toast.01.tt5:0 "You managed to lead the population into submission"
darkages_dread_toast.01.tt6:0 "You failed to lead the population into submission..."
darkages_rl_success:0 "Success"
darkages_rl_failure:0 "Failure"
darkages_dread.02.t:0 "Quarrel in the Council"
darkages_dread.02.desc1:0 "Today in the Council there was a major quarrel when [darkages_dread_councillor.GetName] harshly challenged my views and placed my authority on the line.\n\nAs my [darkages_dread_councillor.GetCouncilTitle] proceeded to demolish my argument in front of everyone, I coldly thought how should I address the matter.\n\nAmong the councillors, the mood was neutral."
darkages_dread.02.desc2:0 "Today in the Council there was a major quarrel when [darkages_dread_councillor.GetName] harshly challenged my views and placed my authority on the line.\n\nAs my [darkages_dread_councillor.GetCouncilTitle] proceeded to demolish my argument in front of everyone, I coldly thought how should I address the matter.\n\nAmong the councillors, the mood was somewhat against me."
darkages_dread.02.desc3:0 "Today in the Council there was a major quarrel when [darkages_dread_councillor.GetName] harshly challenged my views and placed my authority on the line.\n\nAs my [darkages_dread_councillor.GetCouncilTitle] proceeded to demolish my argument in front of everyone, I coldly thought how should I address the matter.\n\nAmong the councillors, the mood was clearly against me."
darkages_dread.02.desc4:0 "Today in the Council there was a major quarrel when [darkages_dread_councillor.GetName] harshly challenged my views and placed my authority on the line.\n\nAs my [darkages_dread_councillor.GetCouncilTitle] proceeded to demolish my argument in front of everyone, I coldly thought how should I address the matter.\n\nI enjoyed the support of most of the Councillors."
darkages_dread.02.desc5:0 "Today in the Council there was a major quarrel when [darkages_dread_councillor.GetName] harshly challenged my views and placed my authority on the line.\n\nAs my [darkages_dread_councillor.GetCouncilTitle] proceeded to demolish my argument in front of everyone, I coldly thought how should I address the matter.\n\nI enjoyed the unconditional support of most of the Councillors."
darkages_dread.02.opta:0 "Instill fear on everyone"
darkages_dread.02.optb:0 "Try to compromise keeping the upper hand"
darkages_dread.02.optc:0 "Conjure an original argument to deal with the issue"
darkages_dread.02.tt1:0 "The success of this option depends positively on having most of the council against you, on your high Intrigue Skill and on your traits Callous, Wrathful, Vengeful, Sadistic, Arrogant and Deceitful. Negatively impacting your chances are you low Intrigue Skill, the high Intrigue Skill of your [darkages_dread_councillor.GetCouncilTitle] and your traits Compassionate, Temperate, Forgiving, Just, Humble and Honest\n"
darkages_dread.02.tt2:0 "The success of this option depends positively on enjoying the support of most of the Council, on your high Diplomacy Skill and on your traits Gregarious, Patient, Trusting, Calm, Just and Honest. Negatively impacting your chances are you low Diplomacy Skill, the high Diplomacy Skill of your [darkages_dread_councillor.GetCouncilTitle] and your traits Callous, Sadistic, Vengeful, Wrathful, Ambitious and Deceitful\n"
darkages_dread.02.tt3:0 "The success of this option depends positively on your high Learning Skill and on your traits Eccentric, Shrewd and Cunning Politician. Negatively impacting your chances are you low Learning Skill, the high Learning Skill of your [darkages_dread_councillor.GetCouncilTitle] and your traits Stubborn, Dull and Impatient\n"
darkages_dread_toast.02.tt1:0 "You successfuly made everyone tremble with fear!"
darkages_dread_toast.02.tt2:0 "You made a very poor show trying to intimidate everyone..."
darkages_dread_toast.02.tt3:0 "You successfuly managed a challenging argument!"
darkages_dread_toast.02.tt4:0 "You failed in your diplomatic approach..."
darkages_dread_toast.02.tt5:0 "Your creative argument positively took the Councillors by surprise!"
darkages_dread_toast.02.tt6:0 "Your clumsy argument failed to impress the Councillors"
darkages_startup.05.t:0 "First Things First"
darkages_startup.05.desc:0 "As they play a crucial role in hundreds of events in Dark Ages, know that your Skill Stats have ratings that enable different bonuses/options at plenty of points in the game.\nAs such, here is a list of ratings for you to have a more precise idea about what your Stats are worth in the mod and how they are treated:\n\n          < 2: Abysmal\n          < 4: Very Poor\n          < 6: Poor\n          < 8: Below Average\n          Between 8 and 11: Average\n          >= 12: Above Average\n          >= 15: Good\n          >= 18: Very Good\n          >= 21: World Class"
darkages_startup.05.opta:0 "Now I know what I am worth!"
darkages_startup.06.t:0 "General Overview"
darkages_startup.06.desc:0 "In Dark Ages the balance of the game is quite different than vanilla so the first counsel I can give you is to avoid playing as careless as before, instead testing the waters and playing carefully for the first decade or so.\n\nYour experience will be always conditioned by the events being experienced and in a bout of bad luck you might suffer heavily immediately after start. I invite you to soldier on, in the knowledge the same events will not fire for some years and the bad luck will eventually run out.\n\nA cardinal suggestion I have for you is to start as a King or an Emperor the first time you try Dark Ages. Make no mistake, while I don't want to turn success impossible - as experienced over decades and centuries - the game is much more challenging and unforgiving, balance is very different and your objectives will be met over a much longer timespan.\n\nWarfare has been totally rebalanced and you must keep in mind that having double the size of the army of your enemy will not give you more than a certain advantage in the great scheme of things.\nHistory is littered with examples where armies with double, triple, quadruple and even a bigger number of soldiers than the enemy were dramatically beaten by the party with the inferior numbers.\nRemember that as in reality, warfare in Dark Ages is a risky affair and unless you can summon the power to have a gargantuan advantage in numbers or even battle points, final victory is never assured from the beginning based on numbers alone. Of course, this also works for you. Being outnumbered is not a certain spell for disaster if you play your cards right, far from it.\nDark Ages default game rule for Warfare is 'Gamey'. My preference goes to the more unforgiving - and harder - 'Realistic' level but I settled for something easier to help players bridge the gap in the experience between vanilla CK3 and Dark Ages. You can also set the game rule to 'Childish'. In this level, battle results are more a matter of summing the battle points of each side to check who wins than a simulation of the harsh realities of warfare.\n\nOn the economic angle, you do well to know that Domain Limits are lowered in Dark Ages, specially from the middle to the late game onwards. Your available gold will be lower, too and many times you simply will not have the resources to max out your buildings and your Masters-at-Arms, while tackling the challenges the new gameplay throws at you.\n\nTake note that in Dark Ages events are very dynamic in nature and the best answer is always changing based on contextual game data, be it your Traits, your Skills, the state of the world around you, data from other participants or dynamic data generated by the event. Choose wisely your options and acknowledge the duty of a Lord many times is not about choosing the best option, but instead picking the less unpalatable one...\n\nFinally, Dark Ages comes with plenty of game rules for you to adapt it to your playstyle. Browse through them and check how best the experience can be conveyed, according to your preferences."
darkages_startup.06.opta:0 "Right!"
darkages_rival_humiliated:0 "[TARGET_CHARACTER.GetShortUIName|U] enraged [CHARACTER.GetShortUIName] by humiliating [CHARACTER.GetHerHim] in front of other vassals."
darkages_rival_humiliated_corresponding:0 "[CHARACTER.GetShortUIName] enraged [TARGET_CHARACTER.GetShortUIName|U] by humiliating [TARGET_CHARACTER.GetHerHim] in front of other vassals."
darkages_rival_attempted_murder:0 "[TARGET_CHARACTER.GetShortUIName|U] enraged [CHARACTER.GetShortUIName] by attempting to murder [CHARACTER.GetHerHim]."
darkages_rival_attempted_murder_corresponding:0 "[CHARACTER.GetShortUIName] enraged [TARGET_CHARACTER.GetShortUIName|U] by attempting to murder [TARGET_CHARACTER.GetHerHim]."
darkages_dread.03.t:0 "A Matter of Respect"
darkages_dread.03.desc1:0 "Today at the quarterly meeting with vassals something very unusual happened.\n\nAn heated argument begun between myself and none other than [darkages_dread_vassal.GetName].\nTo make things worse, the prick started to ridicule and patronize me under the guise of respect and deference!\n\nIncensed with [darkages_dread_vassal.GetHerHis] behaviour, now I need to decide how will I deal with this challenge, as my gravitas is on the line..."
darkages_dread.03.desc2:0 "Today at the quarterly meeting with vassals something very unusual happened.\n\nAn heated argument begun between myself and none other than [darkages_dread_vassal.GetName].\nTo make things worse, the cunt started to ridicule and patronize me under the guise of respect and deference!\n\nIncensed with [darkages_dread_vassal.GetHerHis] behaviour, now I need to decide how will I deal with this challenge, as my gravitas is on the line..."
darkages_dread.03.opta:0 "Threaten and humiliate the vassal in front of everyone"
darkages_dread.03.optb:0 "Adopt a conciliatory posture towards [darkages_dread_vassal.GetFirstName]"
darkages_dread.03.optc:0 "Turn everyone against [darkages_dread_vassal.GetFirstName]"
darkages_dread.03.optd:0 "Icily stare at [darkages_dread_vassal.GetHerHim] and coldly plan [darkages_dread_vassal.GetHerHim] death"
darkages_dread.03.tt1:0 "By adopting this stance you will suffer in Prestige and will see your Dread significantly reduced. Your vassals will see their Liege as weak\n"
darkages_dread.03.tt2:0 "This option is available because you have either a minimum of Intrigue skill of 12, are Deceitful, are a Schemer or are a Cunning Politician. Influencing positively the outcome of this option are your good Intrigue Skill, being Deceitful, being a Schemer, being a Torturer, being Eccentric, being Callous, being a Cunning Politician, being Calm and Being Patient. Negatively influencing the outcome of this option are your Personality traits Wrathful, Impatient and Dull as well as your low Intrigue Skill\n"
darkages_dread.03.tt3:0 "This option is available because you are either Callous, Vengeful, Wrathful or Sadistic. You order your spies to murder your vassal and can expect a result soon. Success depends positively on the good Intrigue of your Spymaster and negatively on your low Intrigue Skill. Expect a high increase of Dread in the near future when your action is known\n"
darkages_dread.03.tt4:0 "This option is available because you are either Callous, Vengeful, Wrathful or Sadistic. As your vassal is also your Spymaster, you can be sure it is not as easy to murder [darkages_dread_vassal.GetHerHim].Success depends on your high Intrigue Skill and failure on the high Intrigue Skill of [darkages_dread_vassal.GetName]\n"
darkages_dread.04.t:0 "A Job Well Done!"
darkages_dread.04.desc:0 "The murder of [darkages_dread_vassal.GetName] was a success. I subtly make sure to be known I was the one ordering it.\n\nI am sure all my vassals understood the message now!"
darkages_dread.04.opta:0 "Tread lightly, you bunch of fools!"
darkages_dread.05.t:0 "A Botched Job..."
darkages_dread.05.desc:0 "The murder of [darkages_dread_vassal.GetName] was a failure. Now all my vassals understand what happened and are definitely not happy with my behaviour, as well as my weakness at intrigue..."
darkages_dread.05.opta:0 "What a situation!"
darkages_dread_toast.03.tt1:0 "You manipulate everyone into harassing [darkages_dread_vassal.GetName]!"
darkages_dread_toast.03.tt2:0 "You failed at your manipulative game..."
darkages_opinion_despirited:0 "Despirited"
darkages_dread.03.tt5:0 "All your vassals will become Livid as they understand your manipulative game\n"
darkages_dread.03.tt6:0 "Your other vassals will be Impressed by your display of leadership\n"
darkages_dread.03.tt7:0 "While [darkages_dread_vassal.GetName] will remain neutral, all your other vassals will become Despirited with your lack of leadership\n"
darkages_dread.03.tt8:0 "Your other vassals will become Wary with your assertive and threatening posture\n"
darkages_dread.04.tt1:0 "Everyone respects you. All your vassals are Impressed with the dangerous person you are\n"
darkages_dread.05.tt1:0 "With your failed gamble, all your Vassals will look at you with Contempt"
darkages_opinion_county_justice_served:0 "Justice Served"
darkages_opinion_county_justice_served_desc:0 "After suffering at the hands of the brigands, the population of this province approves the harsh treatment given"
darkages_county_economic_boon:0 "Economic Boon"
darkages_county_economic_boon_desc:0 "Pardoning the notorious band of brigands and providing limited economic assistance enables the population to move on and the local economy to thrive. There is a lingering disapproval about the pardoning among the most radical elements of the local elite"
darkages_dread.06.t1:0 "The Infamous Band of Brothers"
darkages_dread.06.t2:0 "The Infamous Evil Swords"
darkages_dread.06.t3:0 "The Infamous Bloody Avengers"
darkages_dread.06.t4:0 "The Infamous Wild Bunch"
darkages_dread.06.t5:0 "The Infamous Red Hands"
darkages_dread.06.t6:0 "The Infamous Black Marks"
darkages_dread.06.t7:0 "The Infamous Marked Souls"
darkages_dread.06.t8:0 "The Infamous Glorious Raiders"
darkages_dread.06.t9:0 "The Infamous Silver Pikes"
darkages_dread.06.t10:0 "The Infamous Deadly Mortals"
darkages_dread.06.desc1:0 "For more than a couple of years now a band of brigands self entitled 'The Band of Brothers' has been terrorizing parts of the [darkages_dread_county.GetName]. While robbing peasants and assaulting traders, they also gave a significant amount of coin to settlements within the County, helping people to cope with the hard times.\n\nIn a nice move on the part of my militia and my spies, these bandits were finally caught in a trap brilliantly devised and now they have been captured.\n\nThere are a lot of radical measures demanded, from hanging to pardoning the thieves. The Council is also split on the matter.\nWhat seems amiss is a balanced view of the situation..."
darkages_dread.06.desc2:0 "For more than a couple of years now a band of brigands self entitled 'The Evil Swords' has been terrorizing parts of the [darkages_dread_county.GetName]. While robbing peasants and assaulting traders, they also gave a significant amount of coin to settlements within the County, helping people to cope with the hard times.\n\nIn a nice move on the part of my militia and my spies, these bandits were finally caught in a trap brilliantly devised and now they have been captured.\n\nThere are a lot of radical measures demanded, from hanging to pardoning the thieves. The Council is also split on the matter.\nWhat seems amiss is a balanced view of the situation..."
