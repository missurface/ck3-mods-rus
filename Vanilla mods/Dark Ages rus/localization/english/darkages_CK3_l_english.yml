darkages_minor_nobles.10.t:0 "An Unexpected Boon"
darkages_minor_nobles.10.desc1:0 "It was with joy that I noticed [darkages_minor_noble.GetName] is showing a significant initiative to increase my Piety by spending [darkages_minor_noble.GetHerHis] own resources to further my position.\n\nCertainly a commendable attitude!"
darkages_minor_nobles.10.desc2:0 "It was with joy that I noticed [darkages_minor_noble.GetName] is showing a significant initiative to increase my Prestige by spending [darkages_minor_noble.GetHerHis] own resources to further my position.\n\nCertainly a commendable attitude!"
darkages_minor_nobles.10.opta:0 "May God bless my [darkages_minor_noble.GetCouncilTitle]!"
darkages_minor_nobles.10.optb:0 "A proper behaviour on the part of [darkages_minor_noble.GetFirstName]!"
darkages_minor_nobles.10.tt1:0 "This is happening because [darkages_minor_noble.GetFirstName] has at least -9 opinion about your character. If the opinion is negative the chance of getting this favourable event is reduced. Your minor vassal spends gold to perform this action and is only eligible to do so if [darkages_minor_noble.GetSheHe] has a very significant fortune"
darkages_minor_nobles.11.desc:0 "It was with joy that I noticed [darkages_minor_noble.GetName] is showing a significant initiative to increase my Legitimacy by spending [darkages_minor_noble.GetHerHis] own resources to further my political stance.\n\nCertainly a commendable attitude!"
darkages_minor_nobles.12.desc:0 "It was with joy that I noticed [darkages_minor_noble.GetName] is showing a significant initiative to increase my Treasury by spending [darkages_minor_noble.GetHerHis] own resources to further my financial position.\n\nCertainly a commendable attitude!"
darkages_minor_nobles.13.desc:0 "It was with joy that I noticed [darkages_minor_noble.GetName] is showing a significant initiative to in the diplomacy within my Realm by spending [darkages_minor_noble.GetHerHis] own resources to further my diplomatic standing with my Vassals.\n\nIn truth, [darkages_minor_noble.GetFirstName] managed to make all my Vassals Impressed with me.\n\nA very commendable effort on [darkages_minor_noble.GetHerHis] part!"
darkages_minor_nobles.14.t:0 "An Unexpected Hindrance"
darkages_minor_nobles.14.desc1:0 "It was with dismay that I noticed [darkages_minor_noble.GetName], my [darkages_minor_noble.GetCouncilTitle], has been pulling the strings to decrease my Piety by spending [darkages_minor_noble.GetHerHis] own resources to hinder my position.\n\nThings are not going according to plan..."
darkages_minor_nobles.14.desc2:0 "It was with dismay that I noticed [darkages_minor_noble.GetName] has been pulling the strings to decrease my Prestige by spending [darkages_minor_noble.GetHerHis] own resources to hinder my position.\n\nThings are not going according to plan..."
darkages_minor_nobles.14.opta:0 "May God strike my [darkages_minor_noble.GetCouncilTitle]!"
darkages_minor_nobles.14.optb:0 "A despicable behaviour on the part of [darkages_minor_noble.GetFirstName]!"
darkages_minor_nobles.14.tt1:0 "This is happening because [darkages_minor_noble.GetFirstName] has at most 9 opinion about your character. If the opinion is positive the chance of getting this bad event is reduced. Your minor vassal spends gold to perform this action and is only eligible to do so if [darkages_minor_noble.GetSheHe] has a very significant fortune"
darkages_minor_nobles.15.desc:0 "It was with dismay that I noticed [darkages_minor_noble.GetName] has been pulling the strings to decrease my Legitimacy by spending [darkages_minor_noble.GetHerHis] own resources to hinder my political position.\n\nThings are not going according to plan..."
darkages_minor_nobles.16.desc:0 "It was with dismay that I noticed [darkages_minor_noble.GetName] has been defaming me in my Domain by spending [darkages_minor_noble.GetHerHis] own resources to lower my Control in my lands.\n\nThings are not going according to plan..."
darkages_minor_nobles.17.desc:0 "It was with dismay that I noticed [darkages_minor_noble.GetName] has been influencing my Vassals by spending [darkages_minor_noble.GetHerHis] own resources to lower their Opinion of me.\n\nThings are not going according to plan..."
darkages_minor_nobles.18.desc:0 "It was with joy that I noticed [darkages_padreco.GetName] is showing a significant initiative to increase my Piety by spending [darkages_padreco.GetHerHis] own resources to further my position.\n\nCertainly a commendable attitude!"
darkages_minor_nobles.18.tt1:0 "This event might happen because your [darkages_padreco.GetCouncilTitle] has a very sizable fortune and has at least 10 Opinion of your character"
darkages_minor_nobles.18.opta:0 "May God bless my [darkages_padreco.GetCouncilTitle]!"
darkages_minor_nobles.19.desc:0 "It was with dismay that I noticed [darkages_padreco.GetName] has been pulling the strings to decrease my Piety by spending [darkages_padreco.GetHerHis] own resources to hinder my position.\n\nThings are not going according to plan..."
darkages_minor_nobles.19.tt1:0 "This event might happen because your [darkages_padreco.GetCouncilTitle] has a very sizable fortune and has at most -10 Opinion of your character"
darkages_minor_nobles.19.opta:0 "May God strike my [darkages_padreco.GetCouncilTitle]!"
