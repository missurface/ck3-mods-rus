darkages_piety.12.optb:0 "Oh no...!"
darkages_piety.13.t:0 "A Religious Network"
darkages_piety.13.desc:0 "For a couple of months that I have been aware that my religious subjects were attempting some form of political maneuvre to corner me in some way.\n\nIt was only today that I learned about the extent of their influence in the society of my Realm, when they asked me to fund a network of shrines, small temples across my domain and even alms for the poor to increase their stance with the populace vis-a-vis the nobility.\n\nOutmanoeuvred, now I must decide what I will do in the knowledge that if willing to pay, I will reap important rewards too..."
darkages_piety.13.opta:0 "Provide the funds"
darkages_piety.13.tt1:0 "You fund the plans of the religious dignitaries in your Realm and on top of the piety gain every courtier, guest and vassal that is Zealous will approve of your behaviour. Your religious councillor will also react positively, independently of being Zealous\n"
darkages_piety.13.optb:0 "Deny the whole plan"
darkages_piety.13.tt2:0 "You refuse to go with the plans of your religious dignitaries but given the political leverage they accrued, you will face a substantive piety penalty. Also expect your Zealous courtiers, guests and vassals to be quite displeased with your decision. Your religious councillor will also react negatively, independently of being Zealous. Finally if you are Zealous you will increase your Stress"
darkages_opinion_county_religious_refuse:0 "Religious Advancement's Refusal"
darkages_opinion_county_religious_refuse_desc:0 "Your decision to refuse implementing the will of the Religious authorities is felt among the general populace of this County"
darkages_opinion_spendthrift:0 "Spendthrift"
darkages_opinion_avaricious:0 "Avaricious"
darkages_piety.14.tt1:0 "Your non Zealous vassals, courtiers and guests except for your religious councillor will think you are wasting the Realm resources in this religious gathering and their opinion of you will be affected. Furthermore, the general populace of your domain will not warm to the idea of spending these resources too in what they consider a pointless religious meeting, thus decreasing the county opinion of you within your domain"
darkages_opinion_county_religious_spendthrift:0 "Religious Spendthrift"
darkages_opinion_county_religious_spendthrift_desc:0 "Your populace thinks you are wasting the Realm resources in pointless religious meetings"
darkages_piety.14.opta:0 "Bend to the religious dignitaries' will"
darkages_piety.14.optb:0 "Refuse to pay for the gathering"
darkages_piety.14.tt2:0 "All your Zealous courtiers, guests and vassals will be incensed by your decision. The Religious Councillor will also be incensed, independently of being Zealous"
darkages_piety.14.t:0 "The Religious Gathering"
darkages_piety.14.desc:0 "For some time I am aware the religious dignitaries of my Realm are plotting something behind my back.\nFar from being life threatening, their plans present a political challenge I must overcome.\n\nIn reality they are planning to host a grand religious meeting with foreign religious emissaries in my capital and are asking for me to fund the whole operation. Supporting or not the plan carries good and bad political consequences..."
darkages_add_shrewd_dull.03.t:0 "A Solid Body"
darkages_add_shrewd_dull.03.desc:0 "As I grow up, it becomes progressively clear my constitution is far superior to most of the other children. I run faster, climb higher and jump longer than most!"
darkages_add_shrewd_dull.03.opta:0 "Excellent!"
darkages_add_shrewd_dull.04.t:0 "A Frail Body"
darkages_add_shrewd_dull.04.desc:0 "As I grow up, it becomes progressively clear my constitution is far inferior to most of the other children. I run slower, climb lower and jump shorter than most..."
darkages_add_shrewd_dull.04.opta:0 "Unfortunately..."
darkages_opinion_county_religious_tolerance:0 "Religious Tolerance"
darkages_opinion_county_religious_tolerance_desc:0 "This county is very grateful to the ruler for allowing a measure of religious tolerance in it"
darkages_piety.15.t:0 "Radicals versus Moderates"
darkages_piety.15.desc:0 "Over the last several months, two religious currents started to quarrel for influence within the Realm.\n\nOne of the currents are based on the radical beliefs and want to increase the strict religious following on my domain populace.\nThe other is more moderate in nature and doesn't want to interfere so much with the running of the everyday life of the peasants, as long as a modicum of respect is in place.\n\nUnfortunately I got politically embroiled in the issue as both parties outsmarted me and now I face the need of having to choose sides..."
darkages_piety.15.opta:0 "Side with the radicals"
darkages_piety.15.optb:0 "Side with the moderates"
darkages_piety.15.optc:0 "Diplomatically extricate from the political quarrel"
darkages_piety.15.tt1:0 "By siding with the radicals you will create instability in your domain as people adapt to the new paradigm while gaining Piety for strictly adhere to the religious practices. If you are either Zealous or Callous you will lose some Stress. Conversely, if you are Cynical or Compassionate you will gain stress by favouring the radicals\n"
darkages_piety.15.tt2:0 "By siding with the moderates you will gain the favour of the peasants of your Domain while losing piety for your deliberate avoidance in following your religion to the letter. If you are either Zealous or Callous you will gain some Stress. Conversely, if you are Cynical or Compassionate you will lose stress by favouring the moderates. If you are Zealous you will also lose a level of Piety\n"
darkages_piety.15.tt3:0 "This option is available due to luck and your high Diplomacy. You avoid making a choice\n"
darkages_piety.16.t:0 "Religious Marionette"
darkages_piety.16.desc:0 "For many months the clerics of my Realm have been attempting to lobby me and other members of my dynasty to cede to their requests to have a more prominent role in the affairs of the country.\n\nAt last they were able to politically corner me to decide on the matter. My answer will have a significant impact over different political angles..."
darkages_piety.16.opta:0 "Support the clerics"
darkages_piety.16.optb:0 "Snub the clerics"
darkages_piety.16.optc:0 "Manipulate the clerics avoiding any compromise"
darkages_manipulated_by_clerics:0 "Manipulated by Clerics"
darkages_manipulated_by_clerics_desc:0 "The clerics of the Realm enjoy a great latitude in setting your policies"
darkages_piety.16.tt1:0 "You support the Clerics and let them decide many items of the agenda of your Realm. Your skills are compromised while your piety soars\n"
darkages_piety.16.tt2:0 "You deny the Clerics the power they seek, bringing Renown to your dynasty in doing so. Your piety suffers as a consequence. If you are Zealous you will lose a level of Piety\n"
darkages_piety.16.tt3:0 "This option is available due to luck and your high Intrigue. You avoid making a choice\n"
darkages_modifier_trade_route_1:0 "Minor Trade Route"
darkages_modifier_trade_route_1_desc:0 "A Minor Trade Route was established in this character's Domain, thus increasing the taxes collected from it. In order of importance trade routes can be Minor, Significant, Busy, Major or Rich"
darkages_modifier_trade_route_2:0 "Significant Trade Route"
darkages_modifier_trade_route_2_desc:0 "A Significant Trade Route was established in this character's Domain, thus increasing the taxes collected from it. In order of importance trade routes can be Minor, Significant, Busy, Major or Rich"
darkages_modifier_trade_route_3:0 "Busy Trade Route"
darkages_modifier_trade_route_3_desc:0 "A Busy Trade Route was established in this character's Domain, thus increasing the taxes collected from it. In order of importance trade routes can be Minor, Significant, Busy, Major or Rich"
darkages_modifier_trade_route_4:0 "Major Trade Route"
darkages_modifier_trade_route_4_desc:0 "A Major Trade Route was established in this character's Domain, thus increasing the taxes collected from it. In order of importance trade routes can be Minor, Significant, Busy, Major or Rich"
darkages_modifier_trade_route_5:0 "Rich Trade Route"
darkages_modifier_trade_route_5_desc:0 "A Rich Trade Route was established in this character's Domain, thus increasing the taxes collected from it. In order of importance trade routes can be Minor, Significant, Busy, Major or Rich"
darkages_establish_trade_route_decision:0 "Establish Trade Route"
darkages_establish_trade_route_decision_confirm:0 "Take the risk with this policy"
darkages_establish_trade_route_decision_tooltip:0 "Attempt to establish a trade route within your Domain"
darkages_establish_trade_route_decision_desc:0 "Attempt to establish a trade route within your Domain, increasing the taxes you collect. The certainty of establishing a trade route is not guaranteed and depends positively or negatively on your Stewardship skill and positively on having a Stewardship education. The size of the trade route may vary, again depending in part on your Stewardship skill."
darkages_establish_trade_route.01.t:0 "Abject Failure"
darkages_establish_trade_route.01.desc:0 "My attempt to establish a trade route in my domain was a failure as my political decisions and the actions on the ground were not enough to goad merchants into linking their business from far away places into my Counties."
darkages_establish_trade_route.01.opta:0 "Gold has been thrown away..."
darkages_establish_trade_route.02.t:0 "Minor Success"
darkages_establish_trade_route.02.desc:0 "My attempt to establish a trade route in my domain brought a few merchants to my Counties and a profitable small commercial network has been established!"
darkages_establish_trade_route.02.opta:0 "Not bad at all..."
darkages_establish_trade_route.03.t:0 "Moderate Success"
darkages_establish_trade_route.03.desc:0 "My attempt to establish a trade route in my domain brought some merchants to my Counties and a profitable commercial network has been established!"
darkages_establish_trade_route.03.opta:0 "Good"
darkages_establish_trade_route.04.t:0 "Significant Success"
darkages_establish_trade_route.04.desc:0 "My attempt to establish a trade route in my domain brought many merchants to my Counties and a profitable sizeable commercial network has been established!"
darkages_establish_trade_route.04.opta:0 "Good!"
darkages_establish_trade_route.05.t:0 "Major Success"
darkages_establish_trade_route.05.desc:0 "My attempt to establish a trade route in my domain brought flocks of merchants to my Counties and a very profitable commercial network has been established!"
darkages_establish_trade_route.05.opta:0 "Good!"
darkages_establish_trade_route.06.t:0 "Huge Success!"
darkages_establish_trade_route.06.desc:0 "My attempt to establish a trade route in my domain brought flocks of merchants to my Counties and a very profitable commercial network has been established, dealing with all sorts of precious wares from far away places!"
darkages_establish_trade_route.06.opta:0 "Great!"
darkages_bad_traits_courtier.01.t:0 "The End of the Line"
darkages_bad_traits_courtier.01.desc:0 "One evening, as I stroll alone around the darker recesses of my [ROOT.Char.Custom('FortifiedBuilding')], I pass by [killer.GetName] with a smile on [killer.GetHerHis] face saluting me. Strangely, I sense something odd about [killer.GetHerHim].\n\nAs I entered a small alcove, a menacing shadow moves towards me with a dagger ready to stab my stomach!\n\nIn the nick of the moment, while trying to defend myself, I got a flashback of [killer.GetName] and [killer.GetHerHis] serene but possibly guilty smile on [killer.GetHerHis] face..."
darkages_bad_traits_courtier.01.opta:0 "Only fate can be my ally..."
darkages_bad_traits_courtier.01.tt:0 "While you are warned about who might have ordered the murder, you must find proof of it... if you survive. As it is, an adult courtier or guest with at most -29 opinion of you and one of the following traits: Wrathful, Callous, Sadistic, Paranoid or Vengeful and while not being Compassionate, Forgiving or Generous may try an attempt on your life. With luck playing a defining role, your high Prowess, your high Intrigue, if you have an Intrigue Education or if you follow an Intrigue lifestyle might save you. Conversely, a low Prowess and low Intrigue only serve to condemn you further...\n"
darkages_bad_traits_courtier.02.t:0 "A Serious Warning"
darkages_bad_traits_courtier.02.desc:0 "While in an informal meeting with my [spymaster.GetCouncilTitle], [spymaster.GetName] told me of one of [spymaster.GetHerHis] worries regarding [potential_killer.GetName].\n\nDue to [potential_killer.GetHerHis] poor opinion about myself and thanks to [potential_killer.GetHerHis] personality traits, [spymaster.GetName] fears my life is at risk and no bodyguard can protect me from a threat inside my own court.\n\nAs things stand, [spymaster.GetFirstName] advises me it is wise to sway, dismiss or get rid of [potential_killer.GetName] in order to increase my future security.\n\nIn the knowledge the threat is just theoretical, [spymaster.GetCouncilTitle]s are appointed to see and prepare for dangers at every corner but my life can possibly be on the line I must decide what I will do..."
darkages_bad_traits_courtier.02.opta:0 "Thank you for your warning, [spymaster.GetName]" 
darkages_dynasty_slandered:0 "Dynasty Slandered"
darkages_dynasty_slandered_desc:0 "This character Dynasty name is being slandered"
darkages_renown.01.tt1:0 "By coming up with the gold to save the Dynasty face, every member of your Dynasty will be grateful to you, represented as the eponymous opinion modifier"
darkages_renown.01.tt2:0 "By refusing to pay the gold to save the Dynasty face, the Renown will suffer"
darkages_renown.01.tt3:0 "This option is available if you either have at least 21 Intrigue, you are a Schemer, you are Deceitful or if you follow an Intrigue Lifestyle path. Even if paying upfront the required gold, the way you self promoted and the dubious means by which you solved your dilemma are not consensual within your Dynasty, which means you will not gain any opinion modifier from other Dynasty members, unlike the top option"
darkages_renown.01.tt4:0 "You finance an investigation to uncover who is the mastermind behind the slander of your Dynasty's reputation. The results of the investigation are positively influenced by your high Intrigue, by being a Schemer, by being Deceitful, by your Dread and by the very high (21 or more) Intrigue of your Spymaster. Conversely, factors that contribute for your chance of failure are your low Intrigue, being Forgiving, being Content, being Lazy and having 0 Dread"
darkages_renown.01.optc:0 "Pay more than demanded and subtly promote your interests"
darkages_renown.01.optb:0 "Refuse to pay the requested gold"
darkages_renown.01.opta:0 "Pay the requested gold"
darkages_renown.01.optd:0 "Uncover the mastermind"
darkages_renown.01.t:0 "Dynastic Blackmail"
darkages_renown.01.desc:0 "It all started as small, diffuse and far away gossip about myself but it has progressively coming up in the conversations of the noble houses inside and outside my Realm.\nMatter of factly, my Dynasty name has been tainted by the most vile rumours about the integrity of character of its members.\n\nRecently I have been approached by an intermediary that asked for gold in order for these rumours to slowly stop.\n\nWith the mastermind behind this nefarious plot unknown, I must weight my options..."
darkages_rival_taint_dynasty_reputation:0 "[TARGET_CHARACTER.GetShortUIName|U] enraged [CHARACTER.GetShortUIName] by attempting to taint your Dynasty name."
darkages_renown.02.t:0 "Successful Investigation"
darkages_renown.02.desc:0 "Your investigation about who was the mastermind behind the vile rumours surrounding your Dynasty has been a great success. As facts prove it, the culprit of the whole scheme is none other than [neighbour.GetName]!"
darkages_renown.02.opta:0 "Great!"
darkages_renown.02.tt1:0 "Your fellow dynasty members will be grateful and this manifests itself in their opinion of you"
darkages_renown.03.t:0 "Failed Investigation"
darkages_renown.03.desc:0 "After looking at every nook and cranny, after testing the most weird theories, after sending spies to foreign courts, I have a hand full of nothing as a result of my search to find the mastermind behind the evil rumours surrounding my Dynasty..."
darkages_renown.03.opta:0 "Rats!!!"
darkages_renown.03.tt1:0 "Your failed efforts made your dynasty look even worse than previously as your attempts were interpreted as a form of masking the 'evidence' of the evil rumours surrounding your Dynasty's name. Furthermore, your misguided effort also made you lose some of your own Prestige"
darkages_renown.04.tt2:0 "This option is available because you have either at least 21 in your Learning Skill or have the Scholarship Focus. You use your intellectual capabilities to better influence your dynasty Renown inside and outside your Realm"
darkages_renown.04.tt1:0 "This option is available because you have either at least 21 in your Diplomacy Skill or have the Majesty Focus. You use your Diplomatic capabilities to better influence your dynasty Renown inside and outside your Realm"
darkages_renown.04.tt3:0 "This option is available because you have at least 30 Dread or have the Intimidation Focus. you instil fear in your fellow Dynasty members in order to avoid paying"
darkages_renown.04.opte:0 "instil Fear in your fellow Dynasty members"
darkages_renown.04.optd:0 "Use your Learning instead"
darkages_renown.04.optc:0 "Use your Diplomacy instead"
darkages_renown.04.optb:0 "Refuse to contribute"
darkages_renown.04.opta:0 "Pay your contribution"
darkages_renown.04.desc:0 "A few weeks ago a meeting between the most prominent members of my Dynasty was called and I happily hosted everyone.\n\nAfter much talking, some bickering and a few sweet remembrances of our past, it was decided by majority that everyone would contribute to the strengthening of our dynasty by giving an amount of gold necessary to further our own interests together.\n\nAfter looking at my coffers, the windmills of my mind started rotating..."
darkages_renown.04.t:0 "A New Dynastic Cycle"
darkages_renown.04.tt0:0 "By refusing to contribute with your share of gold for the common good name of your Dynasty, all the other Dynasty members will become incensed with you"
darkages_opinion_county_social_tumults:0 "Social Tumults"
darkages_opinion_county_social_tumults_desc:0 "This county population is restless due to a perceived negligence on their conditions of living by their ruler"
darkages_renown.05.t:0 "Welfare Politics"
darkages_renown.05.desc1:0 "An important peasant leader of my own domain asked for an audience with me to discuss aspects of everyday life that could improve the living conditions of my peasants.\nMoreso, he is involving my entire dynasty in his quest and my actions will be interpreted under that light.\n\nWhile this person sports a diplomatic outlook and above average knowledge, I find the requests and suggestions he makes are a threat to my coffers in spite the positive spin he uses and that can be construed from it all. After all, it is better to have happy peasants than unhappy ones and clearly this person has the backing of a large lot.\n\nAll in all I need to carefully evaluate my options..."
darkages_renown.05.desc2:0 "An important peasant leader of my own domain asked for an audience with me to discuss aspects of everyday life that could improve the living conditions of my peasants.\nMoreso, he is involving my entire dynasty in his quest and my actions will be interpreted under that light.\n\nWhile this person sports a martial outlook and above average knowledge, I find the requests and suggestions he makes are a threat to my coffers in spite the positive spin he uses and that can be construed from it all. After all, it is better to have happy peasants than unhappy ones and clearly this person has the backing of a large lot.\n\nAll in all I need to carefully evaluate my options..."
darkages_renown.05.desc3:0 "An important peasant leader of my own domain asked for an audience with me to discuss aspects of everyday life that could improve the living conditions of my peasants.\nMoreso, he is involving my entire dynasty in his quest and my actions will be interpreted under that light.\n\nWhile this person sports a management outlook and above average knowledge, I find the requests and suggestions he makes are a threat to my coffers in spite the positive spin he uses and that can be construed from it all. After all, it is better to have happy peasants than unhappy ones and clearly this person has the backing of a large lot.\n\nAll in all I need to carefully evaluate my options..."
darkages_renown.05.desc4:0 "An important peasant leader of my own domain asked for an audience with me to discuss aspects of everyday life that could improve the living conditions of my peasants.\nMoreso, he is involving my entire dynasty in his quest and my actions will be interpreted under that light.\n\nWhile this person sports an intrigue outlook and above average knowledge, I find the requests and suggestions he makes are a threat to my coffers in spite the positive spin he uses and that can be construed from it all. After all, it is better to have happy peasants than unhappy ones and clearly this person has the backing of a large lot.\n\nAll in all I need to carefully evaluate my options..."
darkages_renown.05.desc5:0 "An important peasant leader of my own domain asked for an audience with me to discuss aspects of everyday life that could improve the living conditions of my peasants.\nMoreso, he is involving my entire dynasty in his quest and my actions will be interpreted under that light.\n\nWhile this person sports a religious outlook and above average knowledge, I find the requests and suggestions he makes are a threat to my coffers in spite the positive spin he uses and that can be construed from it all. After all, it is better to have happy peasants than unhappy ones and clearly this person has the backing of a large lot.\n\nAll in all I need to carefully evaluate my options..."
darkages_renown.05.opta:0 "Pay for improving the living standards"
darkages_renown.05.optb:0 "Refuse to pay"
darkages_renown.05.optc:0 "Engage the man in a Diplomatic contest"
darkages_renown.05.optd:0 "Engage the man in a Martial contest"
darkages_renown.05.opte:0 "Engage the man in a Stewardship contest"
darkages_renown.05.optf:0 "Engage the man in an Intrigue contest"
darkages_renown.05.optg:0 "Engage the man in a Learning contest"
darkages_renown.05.tt:0 "By contributing to improve the lot of the common peasants in your Domain, your Dynasty Renown will improve but your personal Prestige, as you are ceding politically to simple peasants, suffer\n"
darkages_renown.05.tt0:0 "By refusing to pay you suffer heavy penalties in your Counties but improve your Prestige among your peers\n"
darkages_renown.05.tt1:0 "Besides testing your high Diplomacy, other factors positively influencing the outcome of this argument include having a Diplomatic education, having a Diplomacy lifestyle and being Gregarious. Negatively influencing this argument are your low Diplomacy, having a Martial Education, having a Martial lifestyle and being Shy\n"
darkages_renown.05.tt2:0 "Besides testing your high Martial, other factors positively influencing the outcome of this argument include having a Martial education, having a Martial lifestyle and being Brave. Negatively influencing this argument are your low Martial, having a Diplomacy Education, having a Diplomacy lifestyle and being Craven\n"
darkages_renown.05.tt3:0 "Besides testing your high Stewardship, other factors positively influencing the outcome of this argument include having a Stewardship education, having a Stewardship lifestyle and being Greedy. Negatively influencing this argument are your low Stewardship, having an Intrigue Education, having an Intrigue lifestyle and being Generous\n"
darkages_renown.05.tt4:0 "Besides testing your high Intrigue, other factors positively influencing the outcome of this argument include having an Intrigue education, having an Intrigue lifestyle and being Deceitful. Negatively influencing this argument are your low Intrigue, having a Stewardship Education, having a Stewardship lifestyle and being Honest\n"
darkages_renown.05.tt5:0 "Besides testing your high Learning, other factors positively influencing the outcome of this argument include having a Learning education, having a Learning lifestyle and being either Diligent, Shewd, Quick, Intelligent or Genius. Negatively influencing this argument are your low Learning and having either one of the traits Eager Reveller, Famous Reveller or Legendary Reveller\n"
darkages_renown.06.tt1:0 "In spite of your final agreement on your terms with the peasant's leader, your prestige will suffer as the highest echelons of society always look down at negotiating with simpletons. On the other hand, this compromise is the best you can attain in order to improve your Dynasty's Renown\n"
darkages_renown.06.tt2:0 "By teaching a rhetoric lesson to the peasant's leader and then refusing the deal, your Prestige soars among your peers, even if at the political cost of having serious trouble in your Domain, as most peasants are less than unhappy regarding your final decision\n"
darkages_renown.06.t:0 "Political Breakthrough"
darkages_renown.06.desc:0 "As the peasant's leader starts to argue with me, it was clear my arguments and counter arguments were enough to reach a compromise that might be advantageous for my coffers, my Dynasty's Renown and the pacification of my Domain.\n\nIn the end I feel a bond of empathy towards the man before me and now, with all the political situation cleared, I must make a decision..."
darkages_renown.06.opta:0 "Pay a paltry sum for the improvements requested"
darkages_renown.06.optb:0 "Refuse to pay"
darkages_renown.07.t:0 "Outmanoeuvred in the Negotiation"
darkages_renown.07.desc:0 "The use of my expertise in the subject matter was subpar and the peasant's leader outwitted me at every corner.\nIn the end, as I feel more and more humiliated I understand there is no agreement possible with the man before me."
darkages_renown.07.opta:0 "My best was not enough..."
darkages_renown.07.tt1:0 "You suffer an humiliating defeat across all political line. The consequences are dire both towards how your peers look at you as well as how your peasants feel about your lack of negotiating skills and help"
darkages_renown.08.tt1:0 "By picking this option you will present a speech at the assembly of different Dynasties. Positive results will showcase you personal Prestige and the Dynasty's Renown as a model to follow, while a negative results will cause disastrous consequences for both your Prestige and Renown. Influencing positively your chances are your high Diplomacy, high Learning, being Shrewd, being Patient, being Calm, being Gregarious and being Arrogant. Negatively, a low Diplomacy, a low Learning, being Dull, being Impatient, being Wrathful, being Shy and being Humble contribute to your failure\n"
darkages_renown.08.tt2:0 "By refusing to deliver a speech your Prestige and Renown will suffer, even if in a lesser way than if you present an unsuccessful speech\n"
darkages_renown.08.tt3:0 "This option is available because you have at least 18 in Intrigue or are Eccentric. If you have 21 or more in Intrigue this option will present an even better outcome by avoiding any and all penalties. Don't forget however that a successful speech will bestow very important bonuses in your Prestige and your Dynasty's Renown\n"
darkages_renown.08.tt4:0 "This option is available because you have at least 30 of Dread. In the meeting of Dynasties your own presence and infamy is enough to command respect from everyone involved, thus you get a neutral result in terms of Prestige and Renown and you will also increase your Dread in a significant way\n"
darkages_renown.08.opta:0 "Deliver the speech"
darkages_renown.08.optb:0 "Refuse to deliver a speech"
darkages_renown.08.optc:0 "Creatively find a way out"
darkages_renown.08.optd:0 "I'll instil fear on everyone!"
darkages_renown.08.t:0 "A Matter of Renown"
darkages_renown.08.desc:0 "Over the course of several months the Dynasties of my region are all planning a grand foreign meeting to which of course, I will be invited.\n\nEverybody is expecting me to deliver a speech in the conference explaining how to address matters of state, while delving on my Dynasty History and feats.\n\nI must however decide if the risk of delivering an uninspired speech is worth the hassle and I just let down everybody by attending but staying mute..."
darkages_renown.09.t:0 "Successful Speech!"
darkages_renown.09.desc:0 "When my turn to deliver the speech came, I was able to summon all my skills in order to explain a host of subject matters, always casting my Dynasty in a positive light.\n\nIt was obvious for anyone present that I commanded my words in a wise way and I easily grew my own Prestige as well as the Renown of my Dynasty..."
darkages_renown.09.opta:0 "Impressive result!"
darkages_renown.10.t:0 "A Dismal Failure..."
darkages_renown.10.desc:0 "As I stood at the lectern to present my speech to the dozens of dignitaries present, I felt nervous, unsure and out of place.\n\nNext followed some of the most excruciating and embarrassing moments of my life as my words faltered, my writing revealed itself poor and my deliverance of the boring message was atrocious, to say the least.\n\nIn the end everybody in the hall was at least unimpressed, at most having lots of fun about how I could humiliate myself and my Dynasty name in such a way..."
darkages_renown.10.opta:0 "A pity..."
darkages_renown.11.t:0 "An Artistic Offer"
darkages_renown.11.desc:0 "Today a self styled poet was presented to me desiring to write a large compendium of poems exalting my Dynasty's feats over time.\n\nThis work, if properly done, will increase by a significant amount the Renown of my Dynasty and will be looked upon with envy by everyone else... that is the promise of this [darkages_poet.GetName], at least..."
darkages_renown.11.opta:0 "Commission the work"
darkages_renown.11.optb:0 "I am not a Patron of the Arts"
darkages_renown.11.tt1:0 "Examine carefully [darkages_poet.GetName] in order to evaluate [darkages_poet.GetHerHis] capability to produce a masterpiece, or at the very least a good job. As it stands, there is always the risk of your Dynasty becoming the laughingstock of everyone. To increase the chances of success, look for a high learning skill and the traits Quick, Intelligent, Genius and Poet\n"
darkages_renown.12.t:0 "A Literary Failure"
darkages_renown.12.desc:0 "Unfortunately, [darkages_poet.GetName] proved to be an uninspired poet, creating a piece of trash that was ridiculed by everyone..."
darkages_renown.12.opta:0 "Time to kick [darkages_poet.GetHerHim] in the butt!"
darkages_renown.13.t:0 "A Good Piece of Written Art"
darkages_renown.13.desc:0 "After long, [darkages_poet.GetName] wrote what is a good compilation of poems that will contribute to my Dynasty Renown.\n\nA job well done!"
darkages_renown.13.opta:0 "Good!"
darkages_renown.14.t:0 "[darkages_poet.GetName]'s Magnum Opus"
darkages_renown.14.desc:0 "After a long wait, [darkages_poet.GetName] presented a complex, intricate and inspired collection of poems that greatly improve my Dynasty Renown.\n\nA masterpiece was delivered!"
darkages_renown.14.opta:0 "Excellent!"
darkages_opinion_wary:0 "Wary"
darkages_war.01.t:0 "Martial Involvement"
darkages_war.01.desc:0 "As a consequence of the current state of warfare my Realm is embroiled into, I pass a long time around all types of different martial characters, most of all my Marshall.\n\nIn this time I may be able, if so I choose, to experience the intricacies of warfare planning and thus the real possibility to increase my Martial Skill.\n\nThe question that remains is that if focusing on this area will not bring a penalty in other areas as well..."
darkages_war.01.opta:0 "Let's immerse in the martial world!"
darkages_war.01.optb:0 "Avoid mingling too much with these types..."
darkages_war.01.tt1:0 "Depending on your traits and luck, the expertise you gain from mingling with the military world in warfare conditions might make you suffer in other skills. For you to avoid this undesirable outcome, your chances go up by being Calm, Patient, Diligent, Shrewd, Quick, Intelligent, Genius, having a Military Education or having a Military Lifestyle\n"
darkages_war.01.tt2:0 "By refusing to engage systematically with the military in this time of warfare you lose Prestige thanks to the discreet but powerful complaints of the higher military ranks of your Realm\n"
darkages_war.02.t:0 "Too Focused"
darkages_war.02.desc:0 "By immersing yourself with the military types of your Realm in order to better plan the warfare condition you are currently in, you unfortunately lose touch with matters of Diplomacy and Intrigue that are presently out of your attention orbit.\nUnfortunately, the effects are permanent..."
darkages_war.02.opta:0 "Not good..."
darkages_war.03.t:0 "Too Focused"
darkages_war.03.desc:0 "By immersing yourself with the military types of your Realm in order to better plan the warfare condition you are currently in, you unfortunately lose touch with matters of Stewardship and Learning that are presently out of your attention orbit.\nUnfortunately, the effects are permanent..."
darkages_war.03.opta:0 "Not good..."
darkages_war.04.t:0 "Too Focused"
darkages_war.04.opta:0 "Unfortunately..."
darkages_war.04.desc1:0 "By immersing yourself with the military types of your Realm in order to better plan the warfare condition you are currently in, you regrettably lose touch with matters of Diplomacy that are presently out of your attention orbit.\nUnfortunately, the effects are permanent..."
darkages_war.04.desc2:0 "By immersing yourself with the military types of your Realm in order to better plan the warfare condition you are currently in, you regrettably lose touch with matters of Stewardship that are presently out of your attention orbit.\nUnfortunately, the effects are permanent..."
darkages_war.04.desc3:0 "By immersing yourself with the military types of your Realm in order to better plan the warfare condition you are currently in, you regrettably lose touch with matters of Intrigue that are presently out of your attention orbit.\nUnfortunately, the effects are permanent..."
darkages_war.04.desc4:0 "By immersing yourself with the military types of your Realm in order to better plan the warfare condition you are currently in, you regrettably lose touch with matters of Learning that are presently out of your attention orbit.\nUnfortunately, the effects are permanent..."
darkages_war.05.t:0 "A Sharp Mind, a Focused Asset"
darkages_war.05.desc:0 "By delving with the military ranks of your Realm in order to better plan the warfare condition you are currently in, your sound ideas, suggestions and orders are deemed worthy, good and reasonable by everyone, bringing Prestige on you.\n\nMoreso, while the warfare side of ruling keeps you busy, you manage to not forget all the other sides of running the Realm, thus avoiding focusing too much on the Martial angle of your personality at the cost in some other area of knowledge."
darkages_war.05.opta:0 "Good!"
darkages_war.06.t:0 "The Choices of Warfare"
darkages_war.06.desc:0 "As my Realm faces warfare, I am drawn more and more into the planning of the whole operation and I can overrule any other opinion among my own servants, thanks to my status, at the cost of Prestige among my vassals.\n\nIn the certainty it will be better for my knowldge of military matters to do and test things my way, my behaviour is also a double edged sword..."
darkages_war.06.opta:0 "Do things my own way"
darkages_war.06.optb:0 "Listen to everyone"
darkages_indepth_leadership:0 "In-depth Leadership"
darkages_indepth_leadership_desc:0 "By mingling and studying tactics with the common soldiers, sergeants and Men at Arms this character gains significant knowledge about how the army fights better"
darkages_war.07.t:0 "Teachings of the Common Soldiers"
darkages_war.07.desc:0 "During this dark period of war, it became apparent to me that much would be gained by mingling with the common soldiers, sergeants and men-at-arms, debating tactics with them, checking with whom they were capable of better interacting in the battlefield, their specific capabilities and liabilities.\n\nOf course, mingling, discussing ideas and even worse, seeking the advice of the common soldier will affect my Prestige, which corners me in a dilemma as certainly on the other hand, bypassing this opportunity will stress me..."
darkages_war.07.opta:0 "I'll approach my men"
darkages_war.07.optb:0 "I'll avoid mingling with the common soldiers"
darkages_war.07.tt1:0 "If you are not Arrogant you will suffer some stress. If you are Humble you will suffer even more stress\n"
darkages_defender_advantage:0 "Defensive Manoeuvers"
darkages_defender_advantage_desc:0 "This character has perfected the art of defense with the present composition of the actual army"
darkages_attacker_advantage:0 "Offensive Manoeuvers"
darkages_attacker_advantage_desc:0 "This character has perfected the art of attack with the present composition of the actual army"
darkages_war.08.t:0 "A Matter of Strategy"
darkages_war.08.desc:0 "As the Realm is passing by a state of warfare, it becomes apparent there should be a way to specialize our troops either in defence or in offense.\n\nAs the supreme commander of my army, I am the one who will gain the insights of such training.\n\nThere is a drawback for this, however. As long as I perfect the art of offense or defence with my troops I am not spending time developing my lifestyle path, thus losing important progresses made there.\n\nGiven this situation, I have several paths to consider..."
darkages_war.08.opta:0 "I'll train defensive operations"
darkages_war.08.optb:0 "I'll train offensive operations"
darkages_war.08.optc:0 "I'll avoid wasting time on details"
darkages_war.09.t:0 "Warfare Choices"
darkages_war.09.desc:0 "As the Realm is passing by a state of warfare, I am faced with a choice of ordering my troops to act in an aggressive and callous way against my foes and the enemy population as this will allow me to learn a bit about the Martial Lifestyle or I can take the opposite path, stressing the obligation of my troops to act in a sensitive way to vanquished foes and enemy commoners.\n\nThe choice is mine..."
darkages_war.09.opta:0 "Act aggressively towards our foes"
darkages_war.09.optb:0 "Act with piety towards our foes"
darkages_relation_brings_death.02.t:0 "A Friendly Warning"
darkages_relation_brings_death.02.desc:0 "After being summoned by my [spymaster.GetCouncilTitle], [spymaster.GetName] told me of one of [spymaster.GetHerHis] worries regarding [potential_murder.GetName].\n\nThe careful analysis of this vassal of mine revealed a personality that due to [potential_murder.GetHerHis] poor opinion about myself might place my life at risk.\n\nAs things stand, [spymaster.GetName] advises me it is wise to improve the opinion [potential_murder.GetName] has of myself or use other... non conventional means to get rid of [potential_murder.GetHerHim] in order to increase my future security.\n\nIn the knowledge the threat is just theoretical, [spymaster.GetCouncilTitle]s are appointed to see and prepare for dangers at every corner but my life can possibly be on the line I must decide what I will do..."
darkages_relation_brings_death.02.opta:0 "Thank you kindly for the heads up!"
darkages_rivals_bring_death.02.t:0 "An Ominous Warning"
darkages_rivals_bring_death.02.desc:0 "In a meeting with my [spymaster.GetCouncilTitle], [spymaster.GetName] told me of one of [spymaster.GetHerHis] worries regarding my personal safety.\n\nAs I have accrued rivals or nemesis, there is a risk these persons might plan an assassination on me, not only through a subterfuge scheme, but also by a direct attempt on my life.\n\nAs things stand, [spymaster.GetName] advises me it would be wise to... get rid of my rivals and nemesis in order to increase my future security.\n\nIn the knowledge the threat is just theoretical, [spymaster.GetCouncilTitle]s are appointed to see and prepare for dangers at every corner but my life can possibly be on the line I must decide what I will do..."
darkages_rivals_bring_death.02.opta:0 "Thank you for the warning!"
darkages_event_troop_name_1:0 "Reservoir Dogs"
darkages_war.10.t:0 "Scrapping the Barrel"
darkages_war.10.desc:0 "A thought has been playing in my mind due to these times of war the Realm is experiencing.\n\nAs things stand, I might attempt to form a new contingent of levies by increasing the range of the normal draft age and adding to the lot common criminals whom I provide a pardon, in order to improve the number of troops available for my armies.\n\nThese radical policies comes at a significant cost in Prestige and Piety, as it can be portrayed as desperate and callous measures but the possibility is tempting..."
darkages_war.10.opta:0 "Extend the draft"
darkages_war.10.optb:0 "It is a path I will not tread!"
darkages_increase_county_patrols_decision:0 "Increase County Patrols"
darkages_increase_county_patrols_decision_confirm:0 "Pay for the patrols"
increase_county_patrols_decision_desc:0 "In the present situation where so many Counties of your Domain enjoy so low control, it might be wise to increase the mounted patrols across your Domain in order to more quickly recover from a dangerous situation.\nRemember, low control Counties can pose a life risk if you happen to be travelling in them!"
increase_county_patrols_decision_tooltip:0 "Recover Control in your Counties"
increase_county_patrols_decision_tt:0 "By significantly increasing the mounted patrols on your Domain, the Control of your Counties will increase much faster\n"
darkages_opinion_county_improve_control:0 "Mounted Patrols"
darkages_opinion_county_improve_control_desc:0 "The safety of this county has increased due to an extra number of mounted patrols"
darkages_guardian_changes_culture_religion.01.t:0 "New Ways and Values"
darkages_guardian_changes_culture_religion.01.desc:0 "As I pass my time with my guardian [darkages_guardian.GetName], I progressively adopt more and more aspects of [darkages_guardian.GetHerHis] ways and values.\n\nAfter a certain point, it becomes clear I changed my culture to fit [darkages_guardian.GetName]'s one."
darkages_guardian_changes_culture_religion.01.opta:0 "It is what it is..."
darkages_guardian_changes_culture_religion.02.t:0 "New Ways and Values"
darkages_guardian_changes_culture_religion.02.desc:0 "After spending so much time with [darkages_ward.GetHerHis] guardian, [darkages_guardian.GetName], it becomes clear my child [darkages_ward.GetName] adopted [darkages_guardian.GetHerHis] culture..."
darkages_guardian_changes_culture_religion.02.opta:0 "A risk worth taking, nevertheless..."
darkages_guardian_changes_culture_religion.03.t:0 "A New Faith"
darkages_guardian_changes_culture_religion.03.desc:0 "As I pass my time with my guardian [darkages_guardian.GetName], I progressively adopt more and more aspects of [darkages_guardian.GetHerHis] faith.\n\nAfter a certain point, it becomes clear I changed my faith to fit [darkages_guardian.GetName]'s one."
darkages_guardian_changes_culture_religion.03.opta:0 "It is what it is..."
darkages_guardian_changes_culture_religion.04.t:0 "A Change of Faith"
darkages_guardian_changes_culture_religion.04.desc:0 "After spending so much time with [darkages_ward.GetHerHis] guardian, [darkages_guardian.GetName], it becomes clear my child [darkages_ward.GetName] adopted [darkages_guardian.GetHerHis] faith..."
darkages_guardian_changes_culture_religion.04.opta:0 "A risk worth taking, nevertheless..."
