darkages_piety.11.desc1:0 "As I start discussing the most secret affairs of international level with [pope.GetName], it soon became clear that I could dominate the subject matter much better than [pope.GetHerHim].\n\nWith careful worded sentences I started to bend [pope.GetHerHis] will to my own personal opinions and in the end I was able to shape the Intrigue aspects of my own faith!\n\nGiven my clout and the public nature of our meeting, besides reaping a huge amount of Piety, I will also earn plenty of Prestige..."
