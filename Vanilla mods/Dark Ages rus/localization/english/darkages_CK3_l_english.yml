darkages_genetic_traits.02.t:0 "Intangible Inheritances"
darkages_genetic_traits.02.desc:0 "As time passes and I grow up it becomes clear a weight in my mind is always pushing me down and thus I become permanently Melancholic..."
darkages_genetic_traits.02.opta:0 "As fate has it..."
darkages_genetic_traits.03.desc:0 "As I grow up it becomes clear my mind is often unhinged and my behaviour is far from normal most of the time. I gain the fame among my friends of having lost my marbles at birth.\n\nThus, I end up being a Lunatic..." 
darkages_genetic_traits.04.desc:0 "As I grow up it is clear something is wrong with me. Fits, seizures and strokes are relatively common in my life and some start suggesting a dark devil lies inside my body.\n\nIt turns out I am Possessed..."
darkages_genetic_traits.05.desc:0 "As I grow up it becomes clear that I am not awesome. Sadly, I am Homely"
darkages_genetic_traits.06.desc:0 "As I grow up it becomes apparent that nature has not been kind to me. Sadly, I am Ugly"
darkages_genetic_traits.07.desc:0 "As I grow up I know I have a significant hurddle to bypass in life. While perfectly healthy, my disformed traces betray my Hideous nature..."
darkages_genetic_traits.08.desc:0 "As I grow up I sense the effect of my good fortune in having Comely traces..."
darkages_genetic_traits.09.desc1:0 "As I grow up I sense the effect of my good fortune in having Handsome features..."
darkages_genetic_traits.09.desc2:0 "As I grow up I sense the effect of my good fortune in having Pretty features..."
darkages_genetic_traits.10.desc:0 "As I grow up I sense the effect of my good fortune in having Beautiful features..."
darkages_genetic_traits.11.desc:0 "As I grow up it seems I struggle to understand complex concepts. In any games requiring a bit of thought, I am regularly beaten by most of my friends.\n\nUnfortunately, it turns out I am Slow..."
darkages_genetic_traits.12.desc:0 "As I grow up it seems I struggle to understand day to day events. In any games requiring a bit of thought, I am always beaten by most of my friends.\n\nUnfortunately, it turns out I am Stupid..."
darkages_genetic_traits.13.desc:0 "As I grow up it seems I struggle to understand the most common tasks. In any games requiring a bit of thought, everyone beats be easily.\n\nUnfortunately, it turns out I am Imbecile..."
darkages_genetic_traits.14.desc:0 "As I grow up I seem to grasp abstract concepts a bit faster than most of my friends. It turns out I am Quick!"
darkages_genetic_traits.15.desc:0 "As I grow up I seem to reach sound conclusions faster than most of my friends. It is apparent I need much less effort on intelectual matters to have better results.\n\nIt turns out I am Intelligent!"
darkages_genetic_traits.16.desc:0 "As I grow up I become used to dominate any intellectual exchange with any of my friends with ease. I simply know more, think faster and deliver better solutions than almost everyone.\n\nIt turns out I am a Genius!"
darkages_genetic_traits.17.desc:0 "As I grow up it is apparent I suffer from a weak constitution that makes me prone to bouts of random minor illnesses plaguing my existence. Unfortunately, I am Delicate..."
darkages_genetic_traits.18.desc:0 "As I grow up it is apparent I suffer from a very weak constitution that makes me very vulnerable to bouts of random minor illnesses plaguing my existence. Unfortunately, I am Frail..."
darkages_genetic_traits.19.desc:0 "As I grow up it is apparent I suffer from a ruinous constitution that makes me prey to bouts of random minor illnesses plaguing my existence. Unfortunately, I am Feeble..."
darkages_genetic_traits.20.desc:0 "As I grow up it becomes clear I am Hale and beat many of my friends in physical activities!"
darkages_genetic_traits.21.desc:0 "As I grow up it becomes clear I am Robust and beat most of my friends in physical activities!"
darkages_genetic_traits.22.desc1:0 "As I grow up it becomes clear I am Herculean and beat many of my friends in physical activities!"
darkages_genetic_traits.22.desc2:0 "As I grow up it becomes clear I am Amazonian and beat many of my friends in physical activities!"
darkages_genetic_traits.23.desc:0 "As I grow up I progressively develop a deformation on my back. Unfortunately, I am an Hunchback..."
darkages_genetic_traits.24.desc:0 "As I grow up and learn to talk, it becomes apparent I suffer from a condition that prevents me to spell correctly most of the words. Unfortunately, I suffer from Lisping..."
darkages_genetic_traits.25.desc:0 "As I grow up and learn to talk, it becomes apparent I suffer from a condition that hinders the way I spell the words. Unfortunately and while I sing to perfection, I suffer from Stuttering..."
darkages_genetic_traits.26.desc:0 "As I grow up and my body develops, it becomes apparent I am a Dwarf..."
darkages_genetic_traits.27.desc:0 "As I grow up and my body develops, it becomes apparent I am a Giant..."
darkages_genetic_traits.28.desc:0 "As I grow up, it becomes clear that something is wrong with my body. My deformation points to me the apparent reality that I am Spindly..."
darkages_genetic_traits.29.desc:0 "As I grow up, I suffer from frequent episodes of difficulty in breathing. Unfortunately, I am affected by Wheezing..."
darkages_genetic_traits.30.desc:0 "As I grow up and suffer minor injuries while playing, it becomes apparent my cuts and bruises heal much slower than my friends'. It turns out I am a Bleeder..."
darkages_genetic_traits.31.desc:0 "As I grow up, it took me just a short while to realize that something very wrong went on with my sight. Unfortunately, I am Blind..."
darkages_genetic_traits.32.desc:0 "As I grow up and my sexuality develops, there are many positive signs that point me to be Fecund!"
darkages_genetic_traits.100.t:0 "The fate of [darkages_child_genetic.GetFirstName]"
darkages_genetic_traits.100.desc1:0 "As my child grows up, it becomes clear genetics played a significant role in its development.\nUnfortunately, [darkages_child_genetic.GetFirstName] turns out to be Melancholic..."
darkages_genetic_traits.100.desc2:0 "As my child grows up, it becomes clear genetics played a significant role in its development.\nUnfortunately, [darkages_child_genetic.GetFirstName] turns out to be Lunatic..."
