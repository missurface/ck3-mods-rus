darkages_fabricate_claim_brings_death.01.t:0 "A Claim on my Life"
darkages_fabricate_claim_brings_death.01.desc:0 "In a sunny morning, while I was pausing to take a small rest at a minor dwelling in my domain with my small retinue, someone manages to bypass my henchmen and deftly approaches me, poisoned blade in hand like a devil coming out of oblivion, yelling 'You will not forge any more claims, you rascal!'.\n\nThe quickness of his approach hinted he could very well escape with his evil deed done. In a flash, it occurred to me it might have been a good idea if I had at least a single bodyguard hired. Suddenly, I must fight for my life!"
darkages_fabricate_claim_brings_death.01.desc2:0 "In a sunny morning, while I was pausing to take a small rest at a minor dwelling in my domain with my small retinue, someone manages to bypass my henchmen and deftly approaches me, poisoned blade in hand like a devil coming out of oblivion, yelling 'You will not forge any more claims, you rascal!'.\n\nThe quickness of his approach hinted he could very well escape with his evil deed done. Fortunately, my bodyguard is close by to protect me. Nevertheless, I must fight for my life!"
