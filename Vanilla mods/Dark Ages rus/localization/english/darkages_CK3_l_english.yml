darkages_county_penalty_control.01.t:0 "Crisis in [target_title.GetName]"
darkages_county_penalty_control.01.desc:0 "Trouble is brewing inside my domain as significant segments of the populace, inspired by a dangerous demagogue, are showing their distress about the conditions of living.\n\nThe commoners are refusing to engage with all the bureaucrats running the place, disobeying orders given by the militia and causing all sort of havoc with the general policies being implemented in the region.\n\nThis state of affairs causes significant disturbances in the area. This can lead to dangerous situations for my physical integrity down the road..."
darkages_county_penalty_control.01.opta:0 "We must weather the storm..."
darkages_county_penalty_control.01.optb:0 "Use diplomacy, outperform and eclipse the dangerous demagogue"
darkages_county_penalty_control.01.optc:0 "Use a martial approach and send my elite troops to deal with the populace"
darkages_county_penalty_control.01.optd:0 "Rely on my stewardship, focusing on improving their living conditions"
darkages_county_penalty_control.01.opte:0 "Use my intrigue and order the assassination of the dangerous demagogue"
darkages_county_penalty_control.01.optf:0 "Use my learning and inspire the populace with pious speeches"
darkages_county_penalty_control.01.optg:0 "Terrorize the whole populace into submission"
darkages_county_penalty_control.01.tt:0 "Besides the relevant Stat, the traits Just, Generous, Diligent, Calm, Honest and Compassionate give a bonus to the chance of success. Conversely, the traits Wrathful, Callous, Sadistic, Paranoid, Arbitrary and Vengeful give a penalty to the chances of success\n"
darkages_county_penalty_control.01.tt2:0 "This option is available because either you have a minimum amount of Dread, are Callous, are Sadistic, are Wrathful, are Paranoid or are Vengeful. Its success depends on your Intrigue and the existence of the perks Hard Rule, Dreadful and Malice Implicit. Also the traits Overseer and Torturer give bonuses to the success of this option\n"
darkages_county_penalty_control.02.t:0 "Trouble is Brewing in [target_title.GetName]"
darkages_county_penalty_control.02.desc:0 "Lead by a charismatic populist raised from the crowd that is spreading false rumours about myself, significant segments of the populace seem to believe in the lies and target me as the source of their anger.\n\nThe commoners are refusing to engage with all the bureaucrats running the place, disobeying orders given by the militia and causing all sort of havoc with the general policies being implemented in the region.\n\nAs things stand, this state of affairs causes a significant drop in people's opinion about myself.\nThis can lead to dangerous situations for my physical integrity down the road..."
darkages_opinion_county_penalty1:0 "Considerably Disgruntled Populace"
darkages_opinion_county_penalty2:0 "Substantially Disgruntled Populace"
darkages_opinion_county_penalty3:0 "Majorly Disgruntled Populace"
darkages_opinion_county_penalty4:0 "Hugely Disgruntled Populace"
darkages_opinion_county_penalty1_desc:0 "Thanks to the manipulation of a demagogue in the County, the popular opinion about your government suffers..."
darkages_opinion_county_penalty2_desc:0 "Thanks to the manipulation of a demagogue in the County, the popular opinion about your government suffers..."
darkages_opinion_county_penalty3_desc:0 "Thanks to the manipulation of a demagogue in the County, the popular opinion about your government suffers..."
