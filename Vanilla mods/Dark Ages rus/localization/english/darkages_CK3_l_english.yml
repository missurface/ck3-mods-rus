darkages_basic_ai_income:0 "Basic AI income"
rule_darkages_vassal_taxes_rule:0 "#B #Bold Dark Ages#!:#! Vassal Taxes"
setting_darkages_vassal_taxes_rule_player:0 "Player Only"
setting_darkages_vassal_taxes_rule_player_desc:0 "Vassal taxes are reduced only for the player after 10 vassals, following a principle of diminishing returns."
setting_darkages_vassal_taxes_rule_everyone:0 "Every Landed Character"
setting_darkages_vassal_taxes_rule_everyone_desc:0 "Vassal taxes are reduced for everyone after 10 vassals, following a principle of diminishing returns."
setting_darkages_vassal_taxes_rule_disabled:0 "Disabled"
setting_darkages_vassal_taxes_rule_disabled_desc:0 "This system will be disabled. Vanilla setting. Higher level titles will be much easier to play."
darkages_sensible_adopt_admin_powerful_vassals_reqs_tt:0 "Must have at least 75 opinion from all Powerful Vassals. No powerful vassal may have the Ambitious or Disloyal trait."
darkages_increase_taxes_decision:0 "Increase Domain Taxes"
darkages_increase_taxes_decision_desc:0 "Increase the taxes in your Domain in a ruthless way to fill your coffers. This is possible because your relatively small political footprint prevents a major upheaval among your own suffering populace. After a period of 3 years you will have a chance to revert taxes to normal."
darkages_increase_taxes_decision_tooltip:0 "Earn more gold"
darkages_increase_taxes_decision_confirm:0 "Let's squeaze the peasants!"
darkages_normal_taxes_decision:0 "Revert Taxes to Normal Rates"
darkages_normal_taxes_decision_desc:0 "Abandon the callous policy of demanding exorbitant taxes from the population of your Domain. After 3 years you have the chance to charge exorbitant taxes from your peasants again." 
darkages_normal_taxes_decision_tooltip:0 "Be a nice fellow"
darkages_normal_taxes_decision_confirm:0 "Let's do it!"
darkages_raise_taxes:0 "Ruthless Taxation"
darkages_raise_taxes_desc:0 "This character is squeezing the populace of the Domain in order to earn more than a fair share of gold"
darkages_startup.08.t:0 "Gold Scarcity"
darkages_startup.08.desc:0 "In Dark Ages, under most conditions, gold will not be enough to buy everything. You need to make choices about how to spend your resources, always keeping in mind luck might also play a role in your needs.\n\nIf you are relatively small - a Count or a Duke - you will have the option to pick a decision to harshly increase the taxes of your Domain. Given the consequences over the long term, this is a two edged sword that should be carefully examined.\nThere are other decisions that will complement nicely your Treasury. These include Corrupting your Realm, asking the Vassals for a special contribution, confiscating land from the church, establishing a trade route or even building a pirate fleet. Again, check your Decisions and liquidity is at your fingertips... if you are willing to pay the price!\n\nNotice that if you are an Administrative, Celestial, Mandala or Meritocratic Vassal you'll have every 5 years a special distribution of Gold by your Suserain to compensate for your particularly lower monthly income."
darkages_startup.08.opta:0 "Sure"
darkages_ruthless_taxation.01.t:0 "Reverse of the Coin"
darkages_ruthless_taxation.01.desc:0 "While gold enters my coffers thanks to the higher taxes I charge my subjects, word starts to spread about the squalid conditions my subjects live in.\n\nI start to acquire a notorious reputation and my Prestige suffers..."
darkages_ruthless_taxation.01.opta:0 "Let them talk..."
darkages_ruthless_taxation.01.optb:0 "Attempt to fix the situation"
darkages_ruthless_taxation.01.optc:0 "Better to lower the taxes, after all!"
darkages_ruthless_taxation.01.tt4:0 "With a change of heart - hopefully!- you assign normal taxes to your Domain\n"
darkages_ruthless_taxation.01.tt2:0 "You curb the damage incurred\n"
darkages_ruthless_taxation.01.tt3:0 "You end up in the worst situation\n"
darkages_ruthless_taxation.01.tt1:0 "You make an effort to soften the reputational blow. The success of this action depends on your good Diplomacy (>=12) and on your traits Shrewd and Cunning Politician. An education in Diplomacy also helps. Hindering your chances are your trait Dull and your low Diplomacy (<8). If you fail, the consequences to your Prestige will be even harsher...\n"
darkages_ruthless_taxation.01.toast1:0 "You were successful in curbing the damage incurred!"
darkages_ruthless_taxation.01.toast2:0 "You failed with your charm offensive..."
darkages_ruthless_taxation.02.t:0 "Reverse of the Coin"
darkages_ruthless_taxation.02.desc:0 "As gold pours in my coffers thanks to the extra taxes I am charging my subjects, the religious faction inside my realm has become distressed by the suffer the lack of coin and even food most of my peasants display.\n\nThe plain truth is that common people are suffering while a cotterie of privileged individuals close to me live the good life.\n\nThis is no way to proceed in the eyes of God, my religious dignitaries point out..."
darkages_ruthless_taxation.02.opta:0 "Hypocrites, all of them!"
darkages_ruthless_taxation.02.tt5:0 "You underscore your own religious people live in oppulence while feigning worry for the condition of the lowly peasants\n"
darkages_ruthless_taxation.02.optb:0 "Engage in a teological discussion about the advantages of poverty"
darkages_ruthless_taxation.02.optc:0 "This is a sinful behaviour after all..."
darkages_ruthless_taxation.02.tt4:0 "With a change of heart - hopefully!- you assign normal taxes to your Domain\n"
darkages_ruthless_taxation.02.tt2:0 "You curb the damage incurred\n"
darkages_ruthless_taxation.02.tt3:0 "You end up in the worst situation\n"
darkages_ruthless_taxation.02.tt1:0 "Drawing from your philosophical vein, you make an effort to soften the religious reputation blow. The success of this action depends on your good Learning (>=12) and on your traits Shrewd, Zealous and Cunning Politician. An education in Learning also helps. Hindering your chances are your traits Dull and Cynical and your low Learning (<8). If you fail, the consequences to your Piety will be even harsher...\n"
darkages_ruthless_taxation.02.toast1:0 "You were successful in curbing the damage incurred!"
darkages_ruthless_taxation.02.toast2:0 "You failed with your blatant demagogy..."
darkages_ruthless_taxes:0 "Ruthless Taxes"
darkages_ruthless_taxes_desc:0 "This County is suffering the economic effects of the Ruthless taxation the owner charges. Even if the owner is not charging outrageous taxes anymore, the effects might linger longer"
darkages_ruthless_taxation.03.t:0 "Reverse of the Coin"
darkages_ruthless_taxation.03.desc:0 "As my plan to charge higher taxes from my subjects is implemented, I started noticing a nagging decrease in the economy of my Counties.\n\nAccording to my Council, my fiscal policies are crippling the development of my provinces for several years..."
darkages_ruthless_taxation.03.opta:0 "...but my coffers are full!"
darkages_ruthless_taxation.03.optb:0 "Time to inject gold in the local economies!"
darkages_ruthless_taxation.03.optc:0 "Better to scrap those taxes..."
darkages_ruthless_taxation.03.tt1:0 "Your fiscal policies continue unabated\n"
darkages_ruthless_taxation.03.tt2:0 "You invest in the local economies to cushion the fiscal impact of your policies\n"
darkages_ruthless_taxation.03.tt3:0 "You stop your strict fiscal policies\n"
darkages_ruthless_taxation.04.t:0 "Reverse of the Coin"
darkages_ruthless_taxation.04.desc:0 "The high rate of taxes I charge the direct subjects in my Domain have been noted by my vassals. While Greedy and Callous vassals accept my fiscal policy, other vassals show a particular dislike regarding my behaviour.\n\nAs it turns out, several political, economic and social interests of my Vassals in my own Domain are put in jeopardy by the murderous taxes I charge everyone.\n\nI am risking the opinion of these powerful subjects and need to think very well before proceeding blindly my current policy..."
darkages_ruthless_taxation.04.opta:0 "I charge what I deem appropriate!"
darkages_ruthless_taxation.04.tt5:0 "You keep your high taxes but all your non Greedy and non Callous vassals will be Unimpressed with your behaviour\n"
darkages_ruthless_taxation.04.optb:0 "Attempt to influence your vassals"
darkages_ruthless_taxation.04.tt1:0 "You engage your vassals with an array of fiscal and economic arguments trying to prove your policy is the better for the Realm. This course of action depends positively on your high (>=12) Stewardship, your education in Stewardship, on being Shrewd, on being Gregarious, on being a Cunning Politician and on being a Diplomat. Negatively influencing your chances are your low Stewardship skill (<8) and the traits Dull, Impatient and Fickle\n"
darkages_ruthless_taxation.04.tt2:0 "You avoid all opinion penalties with your Vassals\n"
darkages_ruthless_taxation.04.tt3:0 "All non Greedy, non Callous vassals will see you with Contempt\n"
darkages_ruthless_taxation.04.toast1:0 "You manage to convince your Vassals!"
darkages_ruthless_taxation.04.toast2:0 "Your vassals look at you in a contemptuous way..."
darkages_ruthless_taxation.04.optc:0 "Scrap these taxes..."
darkages_ruthless_taxation.04.tt4:0 "You remove the Ruthless Taxes. Greedy Vassals will be disappointed and you might gain Stress, depending on your Traits\n"
darkages_ruthless_taxation.05.t:0 "Reverse of the Coin"
darkages_ruthless_taxation.05.desc:0 "As I have been graced with a significantly higher tax income, the living conditions in my Domain have progressively degraded.\nSome reports even mention food going scarce, people devolving to barter, all compounded by rising crime.\n\nTo put it plainly, I am now despised in my own lands, while control over my Domain lowers ever more.\n\nI can very well continue to reap the rewards of my harsh tax policy but maybe it is advisable some deep thought for the whole situation."
darkages_ruthless_taxation.05.opta:0 "I continue to support the current taxes"
darkages_ruthless_taxation.05.optb:0 "Spend gold directly in the provinces"
darkages_ruthless_taxation.05.optc:0 "Remove the present taxation to something fairer"
darkages_ruthless_taxation.05.tt1:0 "You go on a spending spree to support yourt populations and reactivate the economy. The people will be grateful and crime will be lower over the long term\n"
darkages_ruthless_taxation.05.tt2:0 "You remove the ruthless taxes. Depending on your traits, you might suffer Stress\n"
darkages_ruthless_taxation.05.tt3:0 "You continue your past policy. Depending on your traits, you might suffer Stress\n"
darkages_county_neg_op_ruth_tax:0 "Restless and Bankrupt"
darkages_county_neg_op_ruth_tax_desc:0 "The owner of this County pursues a callous policy in terms of taxes"
darkages_ruthless_taxation.06.t:0 "Reverse of the Coin"
darkages_ruthless_taxation.06.desc:0 "All the suffering the taxes in my Domain are causing places a toll on my nerves, after all...\n\nI need to carefully consider the policy and judge its merits and drawbacks."
darkages_ruthless_taxation.06.opta:0 "I'll take a bit of stress for the gold!"
darkages_ruthless_taxation.06.optb:0 "Time to review this greedy and callous policy..."
darkages_ruthless_taxation.06.tt1:0 "Depending on your traits you might be Stressed, too... for a last time!"
darkages_rt_investment:0 "Economic Investment"
darkages_rt_investment_desc:0 "The owner of this County is investing extra gold from taxation in infrastructure"
darkages_ruthless_taxation.07.t:0 "An Interesting Turn of Fate"
darkages_ruthless_taxation.07.desc:0 "It is with pleasure that I received reports that my ruthless taxation policy for my Domain provided an unexpected surplus last year.\n\nI can pocket the gold or I can even invest it to ameliorate the economic conditions of my own Counties..."
darkages_ruthless_taxation.07.opta:0 "I'll keep the gold!"
darkages_ruthless_taxation.07.optb:0 "Lets invest it!"
darkages_death_trampled:0 "was trampled to death by a riotous mob"
darkages_ruthless_taxation.08.t:0 "Reverse of the Coin"
darkages_ruthless_taxation.08.desc:0 "As I paid a visit to a village in the suburbs of my capital today, a large mob assembled to protest against the ruthless taxation I am charging in my Domain.\n\nWhile at first I acted nonchallantly and proceeded with the visit deliberately ignoring the hundreds of scoundrels attending, soon the situation got out of control and I ended up facing the throng near the local market.\n\nThe reality is I am facing the approaching crowd, faces full of anger staring at me with a mixture of hate, fear and suffering..."
darkages_ruthless_taxation.08.opta:0 "Stop and face the mob"
darkages_ruthless_taxation.08.optb:0 "Through that side alley, quick!"
darkages_ruthless_taxation.08.optc:0 "RUN AWAY!"
darkages_ruthless_taxation.08.tt1:0 "You run the risk of suffering this event because you are charging Ruthless Taxes. This risky choice presents the highest base chance of death, but if your character has a good Diplomacy or better (>=12), it may prove to be the best option...\n"
darkages_ruthless_taxation.08.tt2:0 "You run the risk of suffering this event because you are charging Ruthless Taxes. You use your high Intrigue (>=12) to save your life down a discreet side alley. Also important is your high Prowess (>=10). Your low Prowess (<6) will penalize you\n"
darkages_ruthless_taxation.08.tt3:0 "You run the risk of suffering this event because you are charging Ruthless Taxes. You simply run away, trying to directly escape the mob. Your Prowess will influence for good (>=10) or bad (<6) your chances. Also an important help is granted if you have the Trait Athletic\n"
darkages_ruthless_taxation.10.t:0 "Profitable Suggestions"
darkages_ruthless_taxation.10.desc:0 "Today, early in the morning, as I was savouring my breakfast, my [darkages_stew738.GetCouncilTitle] approached me and quietly mumbled something about 'ways to make more gold'.\n\nMy interest piked, I asked [darkages_stew738.GetHerHim] to talk [darkages_stew738.GetHerHis] idea out.\n[darkages_stew738.GetFirstName] proceeded to tell me there is always the option of raising taxes significantly in my Domain to help make ends meet with my finances. Also, [darkages_stew738.GetSheHe] proceeded to tell me I could confiscate religious land and then sell it for a profit or maybe I can use corruption to my advantage. Other options include demanding a special tax from my vassals or even financing a Piracy Operation... \n\nI know very well what [darkages_stew738.GetSheHe] is talking about and it is all a balancing act: With [darkages_stew738.GetHerHis] suggestions, more gold will mean other types of trouble in the long run, if I choose to pursue such paths. This of course, if dealing in these shady antics does not affect my moral compass..."
darkages_ruthless_taxation.10.opta:0 "Something to recall from time to time..."
darkages_ruthless_taxation.10.optb:0 "That is a non starter..."
darkages_ruthless_taxation.10.tt1:0 "There are many ways to increase your treasury in Dark Ages. If you want to follow the rules, you may also risk some seed money in establishing a trade route. All the options are available through decisions.\n\nBy picking this option, you will be notified of this opportunity from time to time - never less than 5 years appart\n"
darkages_ruthless_taxation.10.tt2:0 "There are many ways to increase your treasury in Dark Ages. If you want to follow the rules, you may also risk some seed money in establishing a trade route. All the options are available through decisions.\n\nBy picking this option, you will never again be notified in this game about these possibilities\n"
