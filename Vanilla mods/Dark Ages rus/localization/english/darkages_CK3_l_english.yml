darkages_forge_heir_decision:0 "Forge Heir"
darkages_forge_heir_decision_desc:0 "Given you lack a male heir and desperate as you are to continue your bloodline, you may attempt to 'recruit' someone to be your recognized bastard."
darkages_forge_heir_decision_tooltip:0 "Attempt to forge an heir. For requirements select the decision."
darkages_forge_heir_decision_tt:0 "This decision is only active if you either have more then 39 years old, you are Barren or Sterile and have 75 gold if you are a Count, 125 gold if a Duke, 250 gold if a King or 500 gold if an Emperor. If your character has not a single trait from Deceitful, Sadistic, Vengeful, Callous or a Schemer you will suffer an amount of Stress. On the other hand, if your character is Honest, expect the Stress penalty to be really high.\n\nThis is a decision that will last probably more than a year until its outcome. Your good success chance will depend on your Intrigue Skill (>=12), on being a Schemer, on being Deceitful, on being Ambitious, on being Arbitrary, on being Callous, on being Eccentric and on following an Intrigue Lifepath. Low Intrigue (<8) gives a penalty for your chances of success. Without any mentioned traits and with an average intrigue (between 8 and 11) will give you about 75% of finding someone\n"
darkages_forge_heir_decision_confirm:0 "My bloodline really needs this help"
darkages_forge_heir.01.t:0 "The Master Deception"
darkages_forge_heir.01.desc:0 "Desperate for not having children and afraid of dying without an heir, I attempt to find one using my subterfuge skills. Given how sensible this question is, I cannot share this plan with anyone else..."
darkages_forge_heir.01.opta:0 "Attempt to find a newborn"
darkages_forge_heir.01.optb:0 "Attempt to find a child"
darkages_forge_heir.01.optc:0 "Attempt to find a young adult"
darkages_forge_heir.01.tt1:0 "Newborns are perfect candidates... but given the destitute conditions where you'll find one, he can be Sickly and risk an early death in Dark Ages\n"
darkages_forge_heir.01.tt2:0 "A child's education and traits can be molded by your decisions... but given the destitute conditions where you'll find one, he will probably come with an... unsavoury trait or two\n"
darkages_forge_heir.01.tt3:0 "A young adult comes with the full package of education and traits predefined... but given the destitute conditions where you'll find one, his morals will be questionable and he might come with some unsavoury extra trait or two\n"
darkages_forge_heir.02.t:0 "Failure!"
darkages_forge_heir.02.desc:0 "Unfortunately, my quest to find someone who could be presented as my heir was unsuccessful. Hopefully, I'll have time to try again..."
darkages_forge_heir.02.opta:0 "Next time luck will favour me!"
darkages_forge_heir.03.t:0 "Success!"
darkages_forge_heir.03.desc1:0 "After looking for a long time for a newborn to claim as my own son, in a particular rainy night, inside a shabby abode where dirt accumulated in the corners and not even mattresses existed, I found the perfect target. Entering undetected and as the child was left unguarded and asleep, I kidnapped him to a life of luxury..."
darkages_forge_heir.03.opta:0 "My new baby! It's mine, all mine!"
darkages_questionable_bloodline:0 "Questionable Bloodline"
darkages_questionable_bloodline_desc:0 "This character's ascendency is mired in controversy. Many claim he is an impostor."
darkages_ctt1:0 "A new baby that will be your legal heir, will be added to your dynasty and close family\n"
darkages_ctt2:0 "A new child that will be your legal heir, will be added to your dynasty and close family\n"
darkages_ctt3:0 "A young adult that will be your legal heir, will be added to your dynasty and close family\n"
darkages_forge_heir.03.optb:0 "Come with me, my child..."
darkages_forge_heir.03.desc2:0 "After much discreet looking and long travels alone inside my domain, I finally found a small village where in its slums, there was a shack with the perfect candidate. His parents were willing to be paid what for them was a princely sum in order to sell me their son..."
darkages_forge_heir.03.optc:0 "Welcome to the family!"
darkages_forge_heir.03.desc3:0 "After a long and discreet search alone across my domain, I finally found at a miserable tavern some young adult with the right personality to accept the deal I proposed to him. With a wink, a sly smile and an enthusiastic nod he just accepted my proposal outright, measuring the new gold coins in his hand and the promise of a vastly richer life..."
darkages_prestige.01.t:0 "A Lesson in Infamy"
darkages_prestige.01.desc:0 "One day I started to receive word from my messengers and spies that [target_prestige.GetName] is denigrating my name out of enviousness for the significant Prestige I have. It seems [target_prestige.GetSheHe] wants to bolster [target_prestige.GetHerHis] Prestige at my huge expense by ridiculing me at every opportunity.\n\nAfter some time and faced with the possibility of a huge Prestige loss if I don't answer, I am now before a dilemma..."
darkages_prestige.01.opta:0 "Let just time pass and avoid a confrontation"
darkages_opinion_approval:0 "Approval of Behaviour"
darkages_prestige.01.optb:0 "Engage [target_prestige.GetName] by offending [target_prestige.GetHerHis] own capabilities"
darkages_prestige.01.optc:0 "Gracefully outsmart [target_prestige.GetName]"
darkages_prestige.01.optd:0 "Demolish [target_prestige.GetName] arguments"
darkages_prestige.01.tt1:0 "Avoid confrontation in order to keep the big picture in check. After all you don't need new rivals as in Dark Ages those can be dangerous to your life and in the end you can even get a positive opinion of some of your courtiers that are either Just, Content, Forgiving, Compassionate or Lazy about your decision\n"
darkages_prestige.01.tt2:0 "Offend and turn the exchange with [target_prestige.GetName] in a 'mud contest' where both of you lose a little. You may also win a rival, something that can be dangerous to your life in Dark Ages\n"
darkages_prestige.01.tt3:0 "This option is available because [target_prestige.GetName] has less than 12 in Diplomacy and you have at least 21 in Diplomacy or you have the 'Open Minded' Perk or you have the 'Defensive Negotiations' Perk. By picking this option you teach a classy lesson in good manners to your adversary and come out on top. Unfortunately, [target_prestige.GetSheHe] will feel strongly aggrieved and will become your rival, something that can be a threat to your life in Dark Ages\n"
darkages_prestige.01.tt4:0 "This option is available because [target_prestige.GetName] has less than 21 in Learning and you have at least 21 in Learning or you are Wrathful or Callous or Vengeful. You utterly demolish the arguments of your opponent, ridiculing every word uttered against you and make [target_prestige.GetHerHim] look dismal in every court. You'll come out clearly on top. Unfortunately, you will also gain a nemesis, something dangerous to have in the world of Dark Ages\n"
darkages_opinion_disappointed:0 "Disappointed"
darkages_prestige.02.t:0 "A Prestigious Invitation"
darkages_prestige.02.desc1:0 "I have been informed by my Chancellor, some time ago, an important gathering of the most relevant diplomats of the neighbouring polities including mine will take place near my domain.\n\nToday, given my extensive Prestige, I was invited to deliver the opening speech in the cerimony.\nGiven my skills in Diplomatic matters and my general knowledge, I must weight carefully the benefits of accepting the invitation..."
darkages_prestige.02.desc2:0 "I have been informed by my Chancellor, some time ago, an important gathering of the most relevant generals and strategists of the neighbouring polities including mine will take place near my domain.\n\nToday, given my extensive Prestige, I was invited to deliver the opening speech in the cerimony.\nGiven my skills in Martial matters and my general knowledge, I must weight carefully the benefits of accepting the invitation..."
darkages_prestige.02.desc3:0 "I have been informed by my Chancellor, some time ago, an important gathering of the most relevant stewards and traders of the neighbouring polities including mine will take place near my domain.\n\nToday, given my extensive Prestige, I was invited to deliver the opening speech in the cerimony.\nGiven my skills in Stewardship matters and my general knowledge, I must weight carefully the benefits of accepting the invitation..."
darkages_prestige.02.desc4:0 "I have been informed by my Chancellor, some time ago, an important gathering of the most relevant shady individuals - some might be tempted to call them spies but the name is never mentioned - of the neighbouring polities including mine will take place near my domain.\n\nToday, given my extensive Prestige, I was invited to deliver the opening speech in the cerimony.\nGiven my skills in Intrigue matters and my general knowledge, I must weight carefully the benefits of accepting the invitation..."
darkages_prestige.02.desc5:0 "I have been informed by my Chancellor, some time ago, an important gathering of the most relevant philosophers, theologians and thinkers of the neighbouring polities including mine will take place near my domain.\n\nToday, given my extensive Prestige, I was invited to deliver the opening speech in the cerimony.\nGiven my skills in Learning matters, I must weight carefully the benefits of accepting the invitation..."
darkages_prestige.02.opta:0 "The spotlight will be mine!"
darkages_prestige.02.tt1:0 "You will accept the invitation in the knowledge that you may end up basking in the glory of an inspiring speech or going away with your name tainted by a poorly delivered one. Be warned the success or failure of your performance will be affected positively by your relevant skill - 8 to 11 in the skill is considered average chance of success - plus your capabilities in the Learning skill will also have a minor impact - positively or negatively. Also important in a positive way is if you are Gregarious and in a negative way if you are Shy\n"
darkages_prestige.02.optb:0 "Apologetically refuse the invitation"
darkages_prestige.02.tt2:0 "By refusing the invitation you lose immediately a fair amount of Prestige but you will be spared of the harsher humiliation of a boring or illiterate speech. By avoiding to stand up to the occasion, your vassals that are not Shy will also lose opinion about you, as your deeds do not match your Prestige\n"
darkages_opinion_shamed:0 "Shamed"
darkages_prestige.03.t:0 "A Speech for the Ages"
darkages_prestige.03.desc:0 "As I stand in front of the dignified crowd opening the event in the great hall and delivering my speech, I feel at ease with my words and include parables, semantic touches and well placed hyperboles, all delivered within the context of my audience's matter of expertise.\n\nMy bold and sometimes novel statements and conclusions regarding the subject matter utterly captivated the audience.\nI felt confident even to include the suggestion to finance my own endeavours in the related matter to everyone.\n\nIn the end, almost all standing, loud cheers and claps were heard all across the great hall and the organizers came to me showing their utter respect for my performance, while saying the gathering could not have started better."
darkages_prestige.03.opta:0 "I was truly first among equals!"
darkages_prestige.04.t:0 "Utter Disappointment"
darkages_prestige.04.desc:0 "As I stand in front of the dignified crowd opening the event in the great hall and delivering my speech, I soon understand how out of my depth I am, producing a boring and uninspired monologue, which I have had to read as my nerves prevented to deliver my drab content by heart.\n\nWith the wrong intonation, tempered by some stuttering and a monotonous tone, the audience felt dismayed by my performance and time and again I saw here and there people either starting to fall asleep or among those who have a poor opinion about myself, mischievous smiles looking at my public humiliation.\n\nIt was clear my speech was not up to my prestigious standing among the experts convened, by far. In the end, it was a very poorly delivered piece and the audience was the first to point to it by the lack of enthusiasm showed..."
darkages_prestige.04.opta:0 "What a disaster!"
darkages_prestige.04.tt1:0 "On top of the huge Prestige loss, your vassals feel dishonoured by their Liege's pathetic performance and the effects of it will not soon be forgotten\n"
darkages_opinion_embaraced:0 "Embarrassed"
darkages_opinion_proud:0 "Proud"
darkages_prestige.05.t:0 "The Tournament"
darkages_prestige.05.desc:0 "Today, a messenger coming from a nearby Realm came to me presenting an honourable invitation to participate in a major tournament that will have in attendance a significant part of the nobility of several Realms with their respective expensive entourage.\n\nIn the knowledge it is supposed to be a spectacle for a generation, if I am willing to finance my courtiers' expenses and pay a small fee for entry, I may well win a prize, if my Prowess and my luck are up to it.\n\nThere is a significant last sentence in the missive that served to entice the reader to accept the challenge... otherwise one will possibly heard rumours of his own cowardice or poverty. I could not hide my irritation upon reading it, as I was diplomatically cornered!"
darkages_prestige.05.opta:0 "I pickup the gauntlet!"
darkages_prestige.05.optb:0 "I refuse the invitation..."
darkages_prestige.05.tt1:0 "Your Prowess will be tested, as well as your luck. It would be good if you are either Gallant or Brave and not so good if you are Craven. In the end one can always strike lucky, as that will also play a role\n"
darkages_prestige.05.tt2:0 "By picking this option you will lose face among your peers and feel more than just a bit irritated\n"
darkages_nick_the_champion:0 "the Champion"
darkages_prestige.06.t:0 "The Winner Takes It All"
darkages_prestige.06.desc:0 "I entered the contest fully concentrated with mind and body dancing to the same tune, producing incredible feats of arms, defeating opponents one after the other, indifferent to their rank and abilities. All was done with a fluidity that comes only from deep inspiration.\n\nIn the end, with the huge crowd fully cheering me, I was crowned the Champion of the Tournament!" 
darkages_prestige.06.opta:0 "Great!"
darkages_prestige.06.tt:0 "Besides the princely sum received and the huge amount of Prestige you gained, it was with satisfaction that you could see your feat did not pass unnoticed by your vassals\n"
darkages_prestige.07.t:0 "A Strong Showing"
darkages_prestige.07.desc:0 "The contest went very well for me, being able to dispatch opponent after opponent with deft and crafty martial moves. The final bout however went to [target_champion.GetName] after a memorable exchange in the field of battle that lasted for a long time and entertained the huge crowd present. Unfortunately I was bested by [target_champion.GetHerHim]. In the end I was cherished as a dangerous opponent and received the prize for second place."
darkages_prestige.07.opta:0 "Excellent!"
darkages_prestige.08.t:0 "An Honourable Place"
darkages_prestige.08.desc:0 "I started the competition with a strong performance and beat several opponents one after the other. My fighting movements came naturally but I was keenly aware of a weakness that got worse and worse. Unfortunately my left knee suffered a minor injury and I ended up defeated in the semi finals. After that point, in the fight for the third place I somewhat recovered and in a last showing of my mastery I was able to win the combat.\n\nThird place it was, then.\n\nWith my knee still not fully recovered, listening and seeing the huge crowd also rooting for me and my overall performances, I looked with a small hint of envy but mostly with admiration to the winner, [target_champion.GetName]."
darkages_prestige.08.opta:0 "A good show..."
darkages_prestige.09.t:0 "A Failed Venture"
darkages_prestige.09.desc:0 "When I faced the first opponent in the tournament, I became immediately aware my performance would not grant me an honourable place. My movements felt awkward and too slow to face up successfuly the best fighters. After dispatching that poor first fighter, I won sometimes, lost many others but it seemed everyone expected more from me.\n\nTo add insult to injury, I fell badly from my mount in my final combat and suffered a wound. In the end I was unable to secure a spot of honour in the tournament and had no other option than to look with admiration to the winner of the contest, cheered by a huge crowd, none other than [target_champion.GetName]..."
darkages_prestige.09.opta:0 "That's too bad..."
darkages_prestige.10.t:0 "A Shameful Performance"
darkages_prestige.10.desc:0 "I felt very nervous just before the first combat of the tournament, fear consuming myself inside. Unfortunately, my cowardice took over my mind and I was half frozen while my opponent danced around me.\n\nIt was with shame that while trembling, I started to piss myself out of fear.\n\nI became the laughingstock of the huge crowd and my first opponent pulled an easy move on me that I was unable to parry and seriously wounded me.\n\nThat first fight marked the end of the tournament for me with everybody making fun of my 'performance'. In the end, I was miles appart the likes of [target_champion.GetName], the winner of the famed contest."
darkages_prestige.10.opta:0 "Oh...the shame!"
darkages_prestige.10.tt:0 "This disastrous result might happen because you are Craven\n"
darkages_prestige.12.t:0 "A Special Gathering"
darkages_prestige.12.desc:0 "As an extremely well groomed emissary coming from [target_party.GetName] court was presented to me, I immediately sensed something out of the ordinary was afoot. As he proceeded to explain, I was invited to a very restrict party where only the most Prestigious of the diplomatic circle of nearby Lords were present to discuss matters of international relevance in a cozy environment.\n\nHe further stressed to me how important my presence was and patiently waited for my answer to be given at the moment to return to his court to organize everything.\n\nI attempted to hide my dilemma because if I performed poorly, my Prestige would suffer immensely, whereas if in a passable way I would gain nothing.\n\nOf course, there was always the chance to take the center stage of the party, reaping heaps of Prestige in the end..."
darkages_prestige.12.opta:0 "Of course I'll be present!"
darkages_prestige.12.optb:0 "I cannot go, sorry..."
darkages_prestige.12.tt1:0 "You are invited to a very exclusive meeting where your Diplomacy will be strongly tested. Being a Reveller or being Gregarious give bonuses to the whole interaction, while being Shy will present an additional hurdle"
darkages_prestige.12.tt2:0 "Attending the meeting while being Shy causes you some level of distress\n" 
darkages_prestige.12.tt3:0 "By refusing to go you will lose face with your peers and your Prestige suffers significantly"
darkages_opinion_impressed:0 "Impressed"
darkages_prestige.13.t:0 "The Heart of the Meeting"
darkages_prestige.13.desc:0 "When I entered the great hall of [target_party.GetName] and start mingling with the other Lords present, it soon become obvious I was at ease with the subject matters being discussed and always had a witty comment to present whomever I engaged.\n\nSoon it became clear I was the soul of the party as more and more people started discussing the topics that interested me while drinking and eating plenty of superbly presented delicatessen.\n\nAs a conclusion I was the one being on the center stage of the meeting and my Prestige soared!"
darkages_prestige.13.opta:0 "A silver tongue indeed!"
darkages_opinion_unimpressed:0 "Unimpressed"
darkages_prestige.14.t:0 "An Abject Failure"
darkages_prestige.14.desc:0 "Hosted by [target_party.GetName], I was introduced to several distinct Lords of different Realms and as the talk started I felt completely out of my water. After some banalities I entered into a sour mood and everybody started to avoid me.\n\nThe whole affair was a total waste of time and even if at the end I was pleasantly addressed, I knew very well my performance had been a real disaster to my prestige..."
darkages_prestige.14.opta:0 "I should have stayed in my [ROOT.Char.Custom('FortifiedBuilding')]!"
darkages_prestige.15.t:0 "The Invisible One"
darkages_prestige.15.desc:0 "As [target_party.GetName] introduced me to the other prestigious peers present, we started mingling and I felt unable to say anything of real substance. Fortunately, my poised stance while avoiding any major blunder was enough to not be noted too much.\n\nIn the end I was able to pass unnoticed and even if I could not make any bold or smart statements, my Prestige hardly suffered from my very discreet presence."
darkages_prestige.15.opta:0 "At least the food was good..."
darkages_opinion_enraged:0 "Enraged"
darkages_prestige.16.t:0 "The Global Exposition Affair"
darkages_prestige.16.desc:0 "Over the last months both my [target_spymaster.GetCouncilTitle], [target_spymaster.GetName], as well as my [target_chaplain.GetCouncilTitle], [target_chaplain.GetName], have been nagging me with the idea of organizing a major exposition of artifacts that can potentially cover all my diplomatic acquaintances.\n\nAs the gold to organize such an endeavour is a major expense, I have not been convinced of the merits of the idea.\n\nThis pair of servants, however, engaged in all sorts of political intrigue and backstabbing to ensure both the entire council as well as foreign rulers know about the idea, telling the event is going forward, thus framing me into organizing the whole exposition.\n\nMad with the situation, I am now faced with serious consequences if I am not going forward and accept the 'fait accompli'..."
darkages_prestige.16.opta:0 "Organize a low security exposition"
darkages_prestige.16.optb:0 "Organize a medium security exposition"
darkages_prestige.16.optc:0 "Organize a high security exposition"
darkages_prestige.16.optd:0 "Send the whole idea to Hell!"
darkages_prestige.16.tt1:0 "You finance a low security exposition, maximizing the risk of the robbery of an artifact to happen. This risk is influenced either way by your Intrigue and positively whether you are a Schemer. The exposition can also be a success, in which case you will stand to gain a huge amount of Prestige, or a failure, in which case your Fame will suffer. The success of the endeavour is affected positively or negatively by your Learning Skill and positively whether you have a Learning education. If you are a Scholar, a significant bonus will also be given to your chances\n"
darkages_prestige.16.tt2:0 "You finance a medium security exposition, balancing the risk of the robbery of an artifact to happen. This risk is influenced either way by your Intrigue and positively whether you are a Schemer. The exposition can also be a success, in which case you will stand to gain a huge amount of Prestige, or a failure, in which case your Fame will suffer. The success of the endeavour is affected positively or negatively by your Learning Skill and positively whether you have a Learning education. If you are a Scholar, a significant bonus will also be given to your chances\n"
darkages_prestige.16.tt3:0 "You finance a high security exposition, minimizing the risk of the robbery of an artifact to happen. This risk is influenced either way by your Intrigue and positively whether you are a Schemer. The exposition can also be a success, in which case you will stand to gain a huge amount of Prestige, or a failure, in which case your Fame will suffer. The success of the endeavour is affected positively or negatively by your Learning Skill and positively whether you have a Learning education. If you are a Scholar, a significant bonus will also be given to your chances\n"
darkages_prestige.16.tt4:0 "You firmly decline the idea of organizing an exposition of artifacts in your Realm. The huge expectations created by your [target_spymaster.GetCouncilTitle] and your [target_chaplain.GetCouncilTitle] on your council and among your vassals are voided and you suffer heavily because of that. As the whole idea was also spread over foreign rulers, your Prestige and even Fame will be affected\n"
darkages_prestige.17.tt1:0 "You unexpectedly gain some gold as commissions for the sale of some of the artifacts\n"
darkages_prestige.17.t:0 "An Unmistakable Success!"
darkages_prestige.17.desc:0 "The exposition attracted artifacts from across far flung Realms and was a success to the image I project abroad.\n\nPeople from all walks of life, from Kings to traders paid a visit and were amazed by what they saw.\n\nThe cultural intermingling was specially peculiar and business was done between many important dignitaries.\n\nAll in all, the whole endeavour was a huge success. Praise my dedicated [target_spymaster.GetCouncilTitle], [target_spymaster.GetName] and my enlightened [target_chaplain.GetCouncilTitle], [target_chaplain.GetName]!"
darkages_prestige.17.opta:0 "It all went very well!"
darkages_prestige.17.optb:0 "Great!"
darkages_prestige.18.t:0 "A Disastrous Failure..."
darkages_prestige.18.desc:0 "The exposition was poorly organized and was my lack of understanding of cultural matters made it even worse for the experience being conveyed as my inconsistency showed.\n\nMany foreign people were attracted by the bombastic campaign of my [target_spymaster.GetCouncilTitle] and my [target_chaplain.GetCouncilTitle], but the fact of the matter was that almost everyone felt their time very poorly spent.\n\nTo add insult to injury, I was under the weather for most of the week and was nowhere to be seen by the attending parties, most of the times. As [target_robbed.GetName], one of the attendants said it was all 'an ill-fated event'.\n\nIn the end and thanks to the manipulation of my two Councillors and my disastrous performance I lost plenty of Prestige and Fame..."
darkages_prestige.18.opta:0 "These are very bad news..."
darkages_prestige.18.tt:0 "This option is available because you are neither Generous, Forgiving or Compassionate and have more than 29 Dread or are either Deceitful, Paranoid, Wrathful, Sadistic, Callous or Vengeful. You execute your Lord Spiritual and might suffer serious opinion consequences either from your head of faith and your courtiers with positive opinion of [target_chaplain.GetName]"
darkages_prestige.18.optb:0 "Blame and execute your Lord Spiritual"
darkages_opinion_incensed:0 "Incensed"
darkages_opinion_crestfallen:0 "Crestfallen"
darkages_prestige.19.t:0 "The Absolute Disaster!"
darkages_prestige.19.desc:0 "As the exposition was taking place with some aplomb and lots of artifacts in a great hall in my [ROOT.Char.Custom('FortifiedBuilding')] divided into several different rooms, a robbery took place one night, during the rotation of the guard of the precinct.\n\nUnfortunately the damage was done and nothing I could have said could save the exposition...and my face, too.\n\nHaving to pay for the artifacts stolen was the least of my problems.\n\nDamn my futile [target_spymaster.GetCouncilTitle], [target_spymaster.GetName] and my dumb [target_chaplain.GetCouncilTitle], [target_chaplain.GetName]!"
darkages_prestige.19.opta:0 "I am not happy. At all!"
darkages_prestige.19.tt:0 "This option is available because you are neither Generous, Forgiving or Compassionate and have more than 29 Dread or are either Deceitful, Paranoid, Wrathful, Sadistic, Callous or Vengeful. You execute your [target_spymaster.GetCouncilTitle] and might suffer serious opinion consequences from your courtiers with positive opinion of [target_spymaster.GetName]"
darkages_prestige.19.optb:0 "Blame and execute your [target_spymaster.GetCouncilTitle]"
darkages_opinion_dread_1:0 "Dreadful Behaviour"
darkages_opinion_dread_2:0 "Dreadful Behaviour"
darkages_opinion_dread_3:0 "Dreadful Behaviour"
darkages_opinion_dread_4:0 "Dreadful Behaviour"
darkages_opinion_dread_5:0 "Dreadful Behaviour"
darkages_opinion_dread_6:0 "Dreadful Behaviour"
darkages_opinion_dread_7:0 "Dreadful Behaviour"
darkages_opinion_dread_8:0 "Dreadful Behaviour"
darkages_opinion_dread_9:0 "Dreadful Behaviour"
darkages_opinion_dread_10:0 "Dreadful Behaviour"
enforce_interaction_darkages:0 "Intimidate"
enforce_interaction_darkages_desc:0 "Using your Dread in a face to face exchange, you might gain something important out of this character"
darkages_dread_positive_character_interaction.01.t:0 "A Contest of Willpower"
darkages_dread_positive_character_interaction.01.desc:0 "I scheduled a meeting with [recipient.GetName] and ordered [recipient.GetHerHim] to perform a service for me as quickly as possible. My tone was sombre and aggressive and I made a point to show I was not expecting failure..."
darkages_dread_positive_character_interaction.01.opta:0 "Demand Gold"
darkages_dread_positive_character_interaction.01.tt1:0 "This option is available because [recipient.GetName] has more than 125 gold.\nIts success depends on the amount of Dread your character has but also and positively if [recipient.GetName] is Craven, if [recipient.GetSheHe] is Intimidated by you, if you are Sadistic, if you are Callous, if you are Vengeful or if you are Wrathful. If [recipient.GetName] is Brave or you are Compassionate, Forgiving or Generous a penalty to your chances will apply"
darkages_dread_positive_character_interaction.01.optb:0 "Demand Prestige and increase Influence"
darkages_dread_positive_character_interaction.01.tt2:0 "This option is available because [recipient.GetName] has more than 250 prestige.\nIts success depends on the amount of Dread your character has but also and positively if [recipient.GetName] is Craven, if [recipient.GetSheHe] is Intimidated by you, if you are Sadistic, if you are Callous, if you are Vengeful or if you are Wrathful. If [recipient.GetName] is Brave or you are Compassionate, Forgiving or Generous a penalty to your chances will apply"
darkages_dread_positive_character_interaction.01.optc:0 "Demand Piety"
darkages_dread_positive_character_interaction.01.tt3:0 "This option is available because [recipient.GetName] has more than 250 piety.\nIts success depends on the amount of Dread your character has but also and positively if [recipient.GetName] is Craven, Zealous, if [recipient.GetSheHe] is Intimidated by you, if you are Sadistic, if you are Callous, if you are Vengeful or if you are Wrathful. If [recipient.GetName] is Brave or you are Compassionate, Forgiving or Generous a penalty to your chances will apply"
darkages_dread_positive_character_interaction.01.optd:0 "Demand Renown"
darkages_dread_positive_character_interaction.01.tt4:0 "By picking this option and besides a flat refusal, you are betting the Prestige and Diplomacy of [recipient.GetName] is high enough to be a factor in order to increase your dynasty Renown as [recipient.GetSheHe] may cede to your pressure, attempt to do the deed and fail with potential bad consequences for your present Renown.\nIn order to convince [recipient.GetName] to take action, independently of its success, the factors influencing the result are the score of Dread your character has but also and positively if [recipient.GetName] is Craven, if [recipient.GetSheHe] is Intimidated, if you are Sadistic, if you are Callous, if you are Vengeful or if you are Wrathful. If [recipient.GetName] is Brave or you are Compassionate, Generous or Forgiving a penalty to your chances will apply"
darkages_dread_positive_character_interaction.01.opte:0 "Leverage political clout"
darkages_dread_positive_character_interaction.01.tt5:0 "The success of this option depends on the amount of Dread your character has but also and positively if [recipient.GetName] is Craven, Zealous, if [recipient.GetSheHe] is Intimidated by you, if you are Sadistic, if you are Callous, if you are Vengeful, if you are Wrathful and on your good or better (>=12) Intrigue. If [recipient.GetName] is Brave or you are Compassionate, Forgiving or Generous a penalty to your chances will apply. Also reducing your chances of success is you low (<8) or worse Intrigue and at least a good Diplomacy (>=12) of your target\n"
enforce_interaction_darkages_tt:0 "By using your Dread to force the hand of [recipient.GetName] you will raise your Dread by a small amount and will be presented with a choice of demands that may be accomplished by [recipient.GetHerHim].\n\nIts success depends on the amount of Dread your character has but also and positively if [recipient.GetName] is Craven, if [recipient.GetSheHe] is Intimidated by you, if you are Sadistic, if you are Callous, if you are Vengeful or if you are Wrathful. If [recipient.GetName] is Brave or you are Compassionate, Forgiving or Generous a penalty to your chances will apply.\nIf you fail in your demand, be aware that your Prestige will suffer."
darkages_opinion_unhappy:0 "Unhappy"
darkages_dread_positive_character_interaction.02.t:0 "Success!"
darkages_dread_positive_character_interaction.02.desc:0 "Using my willpower and my set of skills I intimidated successfuly [recipient.GetName] into parting with some gold!"
darkages_dread_positive_character_interaction.02.opta:0 "Excellent!"
darkages_dread_positive_character_interaction.03.t:0 "Miserable Failure"
darkages_dread_positive_character_interaction.03.desc:0 "In spite of my efforts to subdue [recipient.GetName] to my will, I was not intimidating enough to force [recipient.GetHerHim] to pay me a lump sum of gold..."
darkages_dread_positive_character_interaction.03.opta:0 "Curses!"
darkages_dread_positive_character_interaction.04.t:0 "Success!"
darkages_dread_positive_character_interaction.04.desc:0 "Using my willpower and my set of skills I intimidated successfuly [recipient.GetName] into actively spreading word of my true and even false deeds, thus improving my Prestige!"
darkages_dread_positive_character_interaction.04.opta:0 "Excellent!"
darkages_dread_positive_character_interaction.05.t:0 "Miserable Failure"
darkages_dread_positive_character_interaction.05.desc:0 "In spite of my efforts to subdue [recipient.GetName] to my will, I was not intimidating enough to force [recipient.GetHerHim] to move [recipient.GetHerHis] ass to improve my Prestige..."
darkages_dread_positive_character_interaction.05.opta:0 "Curses!"
darkages_dread_positive_character_interaction.06.t:0 "Success!"
darkages_dread_positive_character_interaction.06.desc:0 "Using my willpower and my set of skills I intimidated successfuly [recipient.GetName] into actively spreading word of my true and supposed virtues, thus increasing my Piety!"
darkages_dread_positive_character_interaction.06.opta:0 "Excellent!"
darkages_dread_positive_character_interaction.07.t:0 "Miserable Failure"
darkages_dread_positive_character_interaction.07.desc:0 "In spite of my efforts to subdue [recipient.GetName] to my will, I was not intimidating enough to force [recipient.GetHerHim] to move [recipient.GetHerHis] ass to improve my Piety..."
darkages_dread_positive_character_interaction.07.opta:0 "Curses!"
darkages_dread_positive_character_interaction.08.t:0 "Major Success!"
darkages_dread_positive_character_interaction.08.desc:0 "Using my willpower and my set of skills I intimidated successfuly [recipient.GetName] into actively spreading word of my true and supposed virtues and deeds on a larger scale, thus increasing my Dynasty Renown!"
darkages_dread_positive_character_interaction.08.opta:0 "Excellent!"
darkages_dread_positive_character_interaction.09.t:0 "Miserable Failure"
darkages_dread_positive_character_interaction.09.desc:0 "Even if my efforts to subdue [recipient.GetName] to my will were successful, [recipient.GetSheHe] was unable to increase my Dynasty Renown, due to a real lack of interest, a low Prestige or both..."
darkages_dread_positive_character_interaction.09.opta:0 "Unfortunately..."
darkages_dread_positive_character_interaction.10.t:0 "Abject Failure"
darkages_dread_positive_character_interaction.10.desc:0 "In spite of my efforts to subdue [recipient.GetName] to my will, I was not intimidating enough to force [recipient.GetHerHim] to move [recipient.GetHerHis] ass to improve my Dynasty Renown..."
darkages_dread_positive_character_interaction.10.opta:0 "Curses!"
darkages_dread_positive_character_interaction.11.t:0 "Success!"
darkages_dread_positive_character_interaction.11.desc:0 "Using my willpower and my set of skills I intimidated successfuly [recipient.GetName] into avoiding to join any factions for a period of 6 years!"
darkages_dread_positive_character_interaction.11.opta:0 "Excellent!"
darkages_dread_positive_character_interaction.12.t:0 "Miserable Failure"
darkages_dread_positive_character_interaction.12.desc:0 "In spite of my efforts to subdue [recipient.GetName] to my will, I was not intimidating enough to force [recipient.GetHerHim] to swear [recipient.GetSheHe] would not join any factions against me for the near future..."
darkages_dread_positive_character_interaction.12.opta:0 "Curses!"
darkages_opinion_terrified:0 "Terrified"
darkages_opinion_worried:0 "Worried"
darkages_enforce_a_purge_decision:0 "Order a Major Purge"
darkages_enforce_a_purge_decision_tooltip:0 "Order a purge across your Domain in order to dramatically increase your Dread"
darkages_enforce_a_purge_decision_desc:0 "You may start a reign of terror by committing a major purge within your entire Domain and affecting your court. Those summarily judged of treason will suffer an horrendous fate for everyone to fear your rule.\nYour entire court will be terrified of you and their opinion will reflect it.\nDue to the fear you instill, you will be much safer for a period of time regarding the majority of murder events.\n\nThere are however prices to pay for such an action, from the possibility of a swift and brutal retribution in the form of an assassination attempt, to opinion penalties with the parties directly and indirectly involved, ending with your fall in a world of madness. The choice is yours..."
darkages_enforce_a_purge_decision_tt:0 "Besides needing 50 gold to finance your purge, your character can't be either Just, Compassionate, Generous or Forgiving.\nIf you are neither Sadistic, nor Vengeful, nor a Torturer, nor Wrathful, nor follow the Intrigue Lifestyle you will gain Stress from taking this decision."
darkages_enforce_a_purge_decision_confirm:0 "I will rule by fear and demand blind obedience"
darkages_purge.01.t:0 "The Purge in Motion"
darkages_purge.01.desc:0 "One of the courtiers that caught my attention lately due to reasons for possible treason was none other than [killed.GetName].\n\nAs I want to show to everyone who rules in my lands, I was swift to order my soldiers to seize [killed.GetHerHim] at first opportunity and bring [killed.GetName] to the dungeon.\n\nThere, unable to defend [killed.GetHerHim]self, [killed.GetSheHe] will be a work of art in the way the traitor will say goodbye to this life..."
darkages_purge.01.desc2:0 "One of the courtiers that caught my attention lately due to reasons for possible treason was none other than [killed.GetName].\n\nEven at [killed.GetHerHis] young age I sense an imminent danger coming from [killed.GetHerHim].\n\nIn the end and at the least, it will serve as a warning for other children to not mess up with me.\n\nAs things stand, [killed.GetName] young age is not enough to spare [killed.GetHerHim] from... my creative care I can invoke for a small, tender traitor!"
darkages_purge.01.opta:0 "A deserved fate!"
darkages_purge.02.t:0 "A Vicious Revenge"
darkages_purge.02.opta:0 "Rota Fortunae!"
darkages_purge.02.desc1:0 "In the turmoil following my purge, I am deeply aware I can be a target of some murder attempt as retribution. However, with a laid back outlook at the rumours, I didn't care to hire any bodyguards.\n\nUnfortunately the unthinkable comes to happening and one day, I am face to face with an hired sword intent on killing me. Only my Prowess, my Intrigue and my luck can save me from the gates of heaven or hell..."
darkages_purge.02.desc2:0 "In the turmoil following my purge, I am deeply aware I can be a target of some murder attempt as retribution. I am fully confident my bodyguard is there to protect me.\n\nUnfortunately one day things come to worst and I am face to face with an hired sword intent on killing me. Only my bodyguard, my Prowess and my luck can save me from the gates of heaven or hell..."
darkages_purge.02.desc3:0 "In the turmoil following my purge, I am deeply aware I can be a target of some murder attempt as retribution. As I have two bodyguards I know I am as protected as possible.\n\nUnfortunately one day things come to worst and I am face to face with an hired sword intent on killing me. Only my bodyguards, my Prowess and my luck can save me from the gates of heaven or hell..."
darkages_opinion_county_purge:0 "Major Purge"
darkages_opinion_county_purge_desc:0 "The people of this County have been pursued and killed by the ruler in order to keep the 'Realm safe' and in the 'best interests of law and order'"
darkages_apply_harsh_rule_decision:0 "Enforce Harsh Rule"
darkages_apply_harsh_rule_decision_tooltip:0 "Enforce a code of law with strict and punitive sentences in order to increase your Dread"
darkages_apply_harsh_rule_decision_desc:0 "Order a new Law Codex applied in all tribunals of your Domain that enshrines a strict and punitive view of justice. While this policy lasts, your Dread will tend to be at least 20, increasing automatically if necessary.\nYou can only revoke the Harsh Rule after a minimum of 5 years have passed.\n"
darkages_apply_harsh_rule_decision_tt:0 "While applying 'Harsh Rule', if your character is neither Callous, Sadistic or Vengeful, Stress will increase slightly on a yearly basis. If on top of that your character is either Generous, Forgiving, Compassionate or Temperate this yearly increase in Stress will be higher. Your Vassals and Courtiers will have a negative opinion modifier - Wary - due to the harsh justice being applied and its strict penalties.\n"
darkages_apply_harsh_rule_decision_confirm:0 "Sanction it!"
darkages_revoke_harsh_rule_decision:0 "Revoke Harsh Rule"
darkages_revoke_harsh_rule_decision_tooltip:0 "Revoke your harsh rule, ordering the local judges to show more leniency towards crime"
darkages_revoke_harsh_rule_decision_desc:0 "By revoking your previous decision, your tribunals will apply the law in a more lenient way, thus returning the balance to normal.\nYour Dread will suffer a hit, your courtiers and guests will stop being wary and the opinion of your Counties population towards you will improve."
darkages_revoke_harsh_rule_decision_confirm:0 "Revoke it!"
darkages_revoke_harsh_rule_decision_tt:0 "\n"
darkages_opinion_county_harsh_rule:0 "Harsh Rule"
darkages_opinion_county_harsh_rule_desc:0 "The laws in this County are very strict and punitive"
darkages_harsh_rule.02.tt1:0 "By picking this option you will apply harsh laws in every county in your domain. Beware that your courtiers and guests will get wary due to the sudden increase of Dread. For the next 5 years you will not be allowed to revoke the Harsh Rule policy in the decisions menu\n"
darkages_harsh_rule.02.optb:0 "Apply harsh laws across my Domain"
darkages_harsh_rule.02.opta:0 "Revoke harsh laws across my Domain"
darkages_harsh_rule.02.tt2:0 "This event happens because you don't have a single policy set for all the provinces of your Domain regarding the Harsh Rule policy. Most probably you recently added a new province with the 'Harsh Rule' modifier and now it is the time to decide if you want to have the policy implemented across your Domain or not\n"
darkages_harsh_rule.02.t:0 "Policy Decisions"
darkages_harsh_rule.02.desc:0 "As my predecessor at least in some Counties decided to apply harsh laws to keep people in order and the Dread high, it is now my time to review the policy and set a path by my own decision..."
darkages_piety.01.t:0 "Religious Plead for [target_title.GetName]"
darkages_piety.01.desc:0 "A group of religious men requested an audience with me one day to ask for some domain land in the [target_title.GetName], in order to build a small monastery there. While the gold asked is significant, my piety is on the line regarding my answer..."
darkages_piety.01.opta:0 "The gold is yours. Pray for my soul..."
darkages_piety.01.optb:0 "Let's build a network of abbeys, instead!"
darkages_piety.01.optc:0 "I don't have gold to spare for this"
darkages_opinion_county_peaceful:0 "Peaceful County"
darkages_opinion_county_peaceful_desc:0 "The small monastery built on this County brings a peaceful, soothing nature to it"
darkages_opinion_county_abbey:0 "Very Peaceful County"
darkages_opinion_county_abbey_desc:0 "The small network of abbeys built on this County bring a very peaceful, soothing nature to it"
darkages_piety.01.tt1:0 "This option is available because you are Zealous. Zealous courtiers and your [chaplain.GetCouncilTitle], if you have one, will also be happy with this decision"
darkages_piety.01.tt2:0 "If you are Zealous, expect the penalties for refusing to fund the monastery to be much higher, not only with your religious subjects and if it exists, your religious head, but also with your non Cynical courtiers\n"
darkages_piety.01.tt3:0 "Besides the Piety gained, your religious Councillor, if you have one, will be happy with your decision\n"
darkages_opinion_grateful:0 "Grateful"
darkages_opinion_happy:0 "Happy"
darkages_piety.02.t:0 "A Special Religious Favour"
darkages_piety.02.desc1:0 "This afternoon, lost in my thoughts while praying, I was interrupted by a trusted servant with an important missive signed by none other than [pope.GetName].\n\nThe message was about a great religious work that needs sponsors among the powerful faithful, proceeding with a worrisome detailed inquiry about my way of living that can very well be used to evaluate my piousness..."
darkages_piety.02.desc2:0 "This afternoon, lost in my thoughts while praying, I was interrupted by a trusted servant with an important missive signed by none other than [pope.GetName].\n\nThe message was about the urgent need of funds to improve the Godly works in the earthly world, proceeding with a worrisome detailed inquiry about my way of living that can very well be used to evaluate my piousness..."
darkages_piety.02.desc3:0 "This afternoon, lost in my thoughts while praying, I was interrupted by a trusted servant with an important missive signed by none other than [pope.GetName].\n\nThe message was about the urgent need of a purge in my own domain to sift the wheat from the chaff in religious matters, proceeding with a worrisome detailed inquiry about my way of living that can very well be used to evaluate my piousness..."
darkages_piety.02.desc4:0 "This afternoon, lost in my thoughts while praying, I was interrupted by a trusted servant with an important missive signed by none other than [pope.GetName].\n\nThe message was about the direction of my dynasty in matters of faith, encouraging everyone to adhere to the true teachings of God. It proceeded with a worrisome detailed inquiry about my way of living that can very well be used to evaluate my piousness..."
darkages_piety.02.opta:0 "I will sponsor the project and answer the questions"
darkages_piety.02.optb:0 "I will provide the funds and answer the questions"
darkages_piety.02.optc:0 "I will pursue the unbelievers and answer the questions"
darkages_piety.02.optd:0 "I will involve my whole dynasty and answer the questions"
darkages_piety.02.tt1:0 "You will finance the religious works and will answer the questions posed by [pope.GetName]. In time, [pope.GetSheHe] will evaluate your answers and returns to you. The success of this action depends on several factors. Your Diplomacy and Learning Skills influence both positively or negatively. If you are Cynical or have traits that are considered Sins by your religion expect your chances for a good interaction to be lower. Finally, if you have Traits that are considered Virtues by your religion or you are Zealous your chances of success increase. By going ahead and if things go wrong you risk the chance of losing an entire Devotion level"
darkages_piety.02.tt2:0 "You will provide the funds and will answer the questions posed by [pope.GetName].  In time, [pope.GetSheHe] will evaluate your answers and returns to you. The success of this action depends on several factors. Your Diplomacy and Learning Skills influence both positively or negatively. If you are Cynical or have traits that are considered Sins by your religion expect your chances for a good interaction to be lower. Finally, if you have Traits that are considered Virtues by your religion or you are Zealous your chances of success increase. By going ahead and things go wrong you risk the chance of losing an entire Devotion level"
darkages_piety.02.tt3:0 "You will pursue the unbelievers in your domain expelling them and will answer the questions posed by [pope.GetName].  In time, [pope.GetSheHe] will evaluate your answers and returns to you. The success of this action depends on several factors. Your Diplomacy and Learning Skills influence both positively or negatively. If you are Cynical or have traits that are considered Sins by your religion expect your chances for a good interaction to be lower. Finally, if you have Traits that are considered Virtues by your religion or you are Zealous your chances of success increase. By going ahead and things go wrong you risk the chance of losing an entire Devotion level"
darkages_piety.02.tt4:0 "You will involve your whole dynasty in matters of faith and will answer the questions posed by [pope.GetName].  In time, [pope.GetSheHe] will evaluate your answers and returns to you. The success of this action depends on several factors. Your Diplomacy and Learning Skills influence both positively or negatively. If you are Cynical or have traits that are considered Sins by your religion expect your chances for a good interaction to be lower. Finally, if you have Traits that are considered Virtues by your religion or you are Zealous your chances of success increase. By going ahead and things go wrong you risk the chance of losing an entire Devotion level"
darkages_piety.02.tt5:0 "You will refuse [pope.GetName] call and avoid answering the menacing questions. This action is heavily biased against you but your Diplomacy might save you from a religious disaster. A Zealous or a Religious Head with high Piety might prove even harder to convince"
darkages_piety.02.opte:0 "I refuse the call of [pope.GetName]"
darkages_opinion_county_religious_zeal:0 "Religious Zeal"
darkages_opinion_county_religious_zeal_desc:0 "This County has been subject of a thourough search to find and root out followers of false faiths"
darkages_piety.03.t:0 "News From [pope.GetHerHis|U] Holiness"
darkages_piety.03.desc1:0 "After accepting [pope.GetName] request, it was with dismay that I read [pope.GetHerHis] answer concerning the strict questions [pope.GetSheHe] posed me. It was a dismal failure and my Piety and possibly Devotion suffer as a consequence..."
darkages_piety.03.desc2:0 "After accepting [pope.GetName] request, it was with joy that I read [pope.GetHerHis] answer concerning the strict questions [pope.GetSheHe] posed me. I passed [pope.GetHerHis] strict scrutiny and my Piety soars!"
darkages_piety.03.opta:0 "God be great!"
darkages_piety.03.optb:0 "Those are very bad news..."
darkages_piety.03.optc:0 "Atone through funding of more Holy work"
darkages_piety.03.tt1:0 "The chances of losing a level of Devotion are worsened by your low Learning, by you being Cynical, by you having sinful traits and the Religious Head being Zealous"
darkages_piety.04.tt1:0 "The chances of losing a level of Devotion are worsened by your low Learning, by you being Cynical, by you having sinful traits and the Religious Head being Zealous"
darkages_piety.04.t:0 "News From [pope.GetHerHis|U] Holiness"
darkages_piety.04.desc1:0 "After accepting [pope.GetName] request, it was with dismay that I read [pope.GetHerHis] answer concerning the strict questions [pope.GetSheHe] posed me. It was a dismal failure and my Piety and possibly Devotion suffer as a consequence..."
darkages_piety.04.desc2:0 "After accepting [pope.GetName] request, it was with joy that I read [pope.GetHerHis] answer concerning the strict questions [pope.GetSheHe] posed me. I passed [pope.GetHerHis] strict scrutiny and my Devotion soars!"
darkages_piety.04.opta:0 "God be great!"
darkages_piety.04.optb:0 "Those are very bad news..."
darkages_piety.04.optc:0 "Atone through funding of more Holy work"
darkages_piety.05.t:0 "News From [pope.GetHerHis|U] Holiness"
darkages_piety.05.desc1:0 "After accepting [pope.GetName] request, it was with dismay that I read [pope.GetHerHis] answer concerning the strict questions [pope.GetSheHe] posed me. In spite of my following to the letter the request demanded, my missive was a dismal failure and my Piety and possibly Devotion suffer as a consequence..."
darkages_piety.05.desc2:0 "After accepting [pope.GetName] request, it was with joy that I read [pope.GetHerHis] answer concerning the strict questions [pope.GetSheHe] posed me. It seems helped by my crafty missive, the purge success passed my borders and I passed [pope.GetName] strict scrutiny. My Devotion soars!"
darkages_piety.05.opta:0 "God be great!"
darkages_piety.05.optb:0 "Those are very bad news..."
darkages_piety.05.optc:0 "Atone through funding of more Holy work"
darkages_piety.05.tt1:0 "The chances of losing a level of Devotion are worsened by your low Learning, by you being Cynical, by you having sinful traits and the Religious Head being Zealous"
darkages_piety.06.t:0 "News From [pope.GetHerHis|U] Holiness"
darkages_piety.06.desc1:0 "After accepting [pope.GetName] request, it was with dismay that I read [pope.GetHerHis] answer concerning the strict questions [pope.GetSheHe] posed me.\nIn effect I casted my Dynasty in the wrong light failing the questioning of [pope.GetHerHis|U] Holiness, causing damage to our reputation.\n\nMy missive ended up as a dismal failure and both my Dynasty's Renown as wel as my personal Devotion might suffer immensely..."
darkages_piety.06.desc2:0 "After accepting [pope.GetName] request, it was with joy that I read [pope.GetHerHis] answer concerning the strict questions [pope.GetSheHe] posed me. It seems helped by my crafty missive, the deeds of my dynasty helped in passing [pope.GetName] strict scrutiny. My Dynasty's Renown soars!"
darkages_piety.06.opta:0 "God be great!"
darkages_piety.06.optb:0 "Those are very bad news..."
darkages_piety.06.optc:0 "Atone through funding of more Holy work"
darkages_piety.06.tt1:0 "The chances of losing a level of Devotion are worsened by your low Learning, by you being Cynical, by you having sinful traits and the Religious Head being Zealous"
darkages_rival_robbed:0 "[TARGET_CHARACTER.GetShortUIName|U] enraged [CHARACTER.GetShortUIName] by robbing [TARGET_CHARACTER.GetHerHim]."
darkages_rival_offended:0 "[TARGET_CHARACTER.GetShortUIName|U] enraged [CHARACTER.GetShortUIName] by offending [TARGET_CHARACTER.GetHerHim]."
darkages_rival_tried_to_kill_me:0 "[TARGET_CHARACTER.GetShortUIName|U] enraged [CHARACTER.GetShortUIName] by trying to kill [CHARACTER.GetShortUIName]."
darkages_nemesis_offended:0 "[TARGET_CHARACTER.GetShortUIName|U] enraged [CHARACTER.GetShortUIName] by offending [TARGET_CHARACTER.GetHerHim]."
darkages_piety.07.t:0 "The Grey Eminence"
darkages_piety.07.desc1:0 "Exquisite news arrived today in the form of an official missive from [pope.GetName], asking me to spend some time with [pope.GetHerHim] to discuss the grand diplomatic options available for our faith.\n\nEngaging and having the ear of such a notable figure is certainly exciting and can carry great rewards but major risks do exist in the case of failure..."
darkages_piety.07.desc2:0 "Exquisite news arrived today in the form of an official missive from [pope.GetName], asking me to spend some time with [pope.GetHerHim] to discuss the grand warfare options available for our faith.\n\nEngaging and having the ear of such a notable figure is certainly exciting and can carry great rewards but major risks do exist in the case of failure..."
darkages_piety.07.desc3:0 "Exquisite news arrived today in the form of an official missive from [pope.GetName], asking me to spend some time with [pope.GetHerHim] to discuss the grand stewardship options available for our faith.\n\nEngaging and having the ear of such a notable figure is certainly exciting and can carry great rewards but major risks do exist in the case of failure..."
darkages_piety.07.desc4:0 "Exquisite news arrived today in the form of an official missive from [pope.GetName], asking me to spend some time with [pope.GetHerHim] to discuss the grand intrigue options available for our faith.\n\nEngaging and having the ear of such a notable figure is certainly exciting and can carry great rewards but major risks do exist in the case of failure..."
darkages_piety.07.desc5:0 "Exquisite news arrived today in the form of an official missive from [pope.GetName], asking me to spend some time with [pope.GetHerHim] to discuss the grand religious options available for our faith.\n\nEngaging and having the ear of such a notable figure is certainly exciting and can carry great rewards but major risks do exist in the case of failure..."
darkages_piety.07.tt1:0 "You agree and pay for your travel, together with your retinue in a luxurious way in order to influence [pope.GetName]. Evaluate your choice carefully regarding the subject of the discussion, your ability to provide sound counsel within the subject matter and the ability of [pope.GetName] in the same subject. Also important for both parties among related traits in the field of knowledge necessary, is the presence of the Shrewd trait. Finally, following the relevant Lifestyle of the matters being discussed is also important for the probabilities of the final result\n"
darkages_piety.07.opta:0 "I am your humble servant..."
darkages_piety.07.optb:0 "I'll pass this opportunity..."
darkages_piety.07.tt2:0 "By refusing the invitation you immediately fail in the eyes of [pope.GetName], receiving serious penalties for your decision. If you are Zealous expect the consequences to be far worse\n"
darkages_piety.08.tt1:0 "The chance to get this result was modified by the Diplomacy Skill of both you and [pope.GetName], if positive, the higher the difference between both increases your chances of success, if negative, the chances of failure. Also important and in ascending order of importance are the presence of the traits Gregarious, Diplomat and Shrewd for both parties and whether they are following the Diplomacy Lifestyle\n"
darkages_piety.08.t:0 "The Grey Eminence"
darkages_piety.08.desc1:0 "As I start discussing diplomatic affairs of international level with [pope.GetName], it soon became clear that I could dominate the subject matter much better than [pope.GetHerHim].\n\nWith careful worded sentences I started to bend [pope.GetHerHis] will to my own personal opinions and in the end I was able to shape the grand diplomacy of my own faith!\n\nGiven my clout and the public nature of our meeting, besides reaping a huge amount of Piety, I will also earn plenty of Prestige..."
darkages_piety.08.desc2:0 "As I start discussing diplomatic affairs of international level with [pope.GetName], it soon became clear that I was out of my water in the subject matter.\n\nStammering my way with empty sentences and hollow arguments, it soon became clear to me [pope.GetName] sensed [pope.GetHerHis] time was being wasted.\n\nUnfortunately and also given the public nature of the meeting all this affair is an unmitigated disaster!"
darkages_piety.08.opta:0 "God be Blessed!"
darkages_piety.08.optb:0 "Oh no...!"
darkages_piety.09.tt1:0 "The chance to get this result was modified by the Martial Skill of both you and [pope.GetName], if positive, the higher the difference between both increases your chances of success, if negative, the chances of failure. Also important and in ascending order of importance are the presence of the traits Brave, Strategist and Shrewd for both parties and whether they are following the Martial Lifestyle\n"
