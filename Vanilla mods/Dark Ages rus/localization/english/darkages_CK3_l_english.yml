darkages_low_martial.05.tt3:0 "You ask your [darkages_marshal_226.GetCouncilTitle] to intercede on your behalf, distributing gold across your Domain. The success of this option depends positively on your [darkages_marshal_226.GetCouncilTitle] at least very good Martial Skill (>=15) and on [darkages_marshal_226.GetHerHis] traits Brave, Deceitful, Strategist and Cunning Politician. It depends negatively on [darkages_marshal_226.GetHerHis] lower than Very Good Martial Skill (<15) and on [darkages_marshal_226.GetHerHis] traits Craven, Honest, Generous and Dull. This option has a lower base chance of success than the previous one\n"
