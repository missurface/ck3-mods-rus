darkages_gr_lifestyle_150:0 "Lifestyle XP Game Rule"
darkages_gr_lifestyle_200:0 "Lifestyle XP Game Rule"
darkages_gr_lifestyle_250:0 "Lifestyle XP Game Rule"
darkages_province_unimpressed:0 "Insolent Populace"
darkages_province_unimpressed_desc:0 "The population of this province feel a lack of respect about the Liege"
darkages_low_diplomacy.05.t:0 "Awkward Tour"
darkages_low_diplomacy.05.desc:0 "Lately, I have been touring the provinces of my Domain in order to evaluate my holdings and to make the peasantry feel my presence and my rule.\n\nUnfortunately and due to my low Diplomacy, my efforts fell well short of what I had in mind.\n\nWith an embarassing message delivered without a hint of charisma and passion, my subjects sensed my weakness and general view about myself suffered accordingly.\n\nAs time never stops, if I want to salvage a negative situation, I need to act now!"
darkages_low_diplomacy.05.opta:0 "Dismiss the issue"
darkages_low_diplomacy.05.optb:0 "Deceive my subjects with new empty edicts"
darkages_low_diplomacy.05.optc:0 "Ask my [darkages_chancellor_84.GetCouncilTitle] to solve the problem"
darkages_low_diplomacy.05.tt1:0 "Besides the modifier applied to all provinces, if you are not Lazy, Content or Humble you will suffer Stress\n"
darkages_low_diplomacy.05.tt2:0 "You attempt to solve the problem by issuing a flurry of new decrees in  order to show you are in command of your Domain, after all. The success of your action depends on your high Intrigue (>=12), on being Deceitful, Schemer, Eccentric or Shrewd. Negatively influencing your chances are your traits Honest, Just, Stubborn and Dull. Your low Intrigue Skill (<8) will also decrease your chances of success\n"
darkages_low_diplomacy.05.tt3:0 "You ask your [darkages_chancellor_84.GetCouncilTitle] to intercede on your behalf, distributing gold across your Domain. The success of this option depends positively on your [darkages_chancellor_84.GetCouncilTitle] at least very good Diplomacy Skill (>=15) and on [darkages_chancellor_84.GetHerHis] traits Gregarious, Deceitful, Diplomat and Cunning Politician. Negatively influencing your chances of success are the [darkages_chancellor_84.GetCouncilTitle]'s lower than Very Good Diplomacy Skill (<15), and [darkages_chancellor_84.GetHerHis] traits Honest, Just, Generous and Dull. This option has a lower base chance of success than the previous one\n"
darkages_lowdip_toast.05.tt1:0 "You managed to impress your subjects once again!"
darkages_lowdip_toast.05.tt2:0 "You utterly failed to impress your subjects..."
darkages_lowdip_toast.05.tt3:0 "[darkages_chancellor_84.GetFirstName] managed to salvage your poor performance!"
darkages_lowdip_toast.05.tt4:0 "[darkages_chancellor_84.GetFirstName] failed in [darkages_chancellor_84.GetHerHis] mission..."
darkages_low_diplomacy.06.t:0 "Nasty Quarrel"
darkages_low_diplomacy.06.desc:0 "Another day at the Council, another quarrel between myself and [darkages_chancellor_40.GetName], my [darkages_chancellor_40.GetCouncilTitle].\n\nThis time it became clear in my mind [darkages_chancellor_40.GetSheHe] went too far by exploiting my obvious lack of knowlege in Diplomatic matters going to the point of even forcefully ridiculing my ideas and plans.\n\nIn the end, with a spark of fiery defiance in [darkages_chancellor_40.GetHerHis] eyes, [darkages_chancellor_40.GetFirstName] dully presented [darkages_chancellor_40.GetHerHis] resignation from the post as [darkages_chancellor_40.GetCouncilTitle].\nNow I must decide what to do as this can have a myriad of different implications..."
darkages_low_diplomacy.06.opta:0 "Good Riddance!"
darkages_low_diplomacy.06.optb:0 "Ask my spouse to intercede"
darkages_low_diplomacy.06.optc:0 "Beg for [darkages_chancellor_40.GetHerHis] pardon"
darkages_low_diplomacy.06.tt1:0 "You consider the matter finished. Your Councillors with positive opinion of [darkages_chancellor_40.GetFirstName] will be despondent with you while your Councillors with negative opinion of [darkages_chancellor_40.GetHerHim] will signal their approval regarding your decision\n"
darkages_low_diplomacy.06.tt2:0 "You ask your Spouse to influence your [darkages_chancellor_40.GetCouncilTitle]. The chances of this action suceeding depend positively on your Spouse good Diplomacy Skill or better (>=12), and on [darkages_spouse_942.GetHerHis] traits about Beauty, Gregarious, Shrewd, Lustful, Diligent and Diplomat. Your [darkages_chancellor_40.GetCouncilTitle]'s traits Forgiving, Compassionate and Humble also provide a bonus. Negatively influencing the chances of success are your spouse poor Diplomacy Skill or worse (<8) and your [darkages_chancellor_40.GetCouncilTitle]'s traits Vengeful, Arrogant and Callous\n"
darkages_low_diplomacy.06.tt3:0 "You humbly ask for your [darkages_chancellor_40.GetCouncilTitle]'s pardon. The chance of success of this action, that unmodified is bigger than the previous one, depends positively on your traits Humble, Honest, Just and Compassionate and on [darkages_chancellor_40.GetFirstName]'s traits Compassionate, Humble, Forgiving and Loyal. Negatively influencing your chances of success are your traits Callous, Vengeful and Arrogant and your [darkages_chancellor_40.GetCouncilTitle]'s traits Vengeful, Callous and Disloyal\n"
darkages_lowdip_toast.06.tt1:0 "[darkages_spouse_942.GetFirstName] managed to calm down your [darkages_chancellor_40.GetCouncilTitle]!"
darkages_lowdip_toast.06.tt2:0 "[darkages_spouse_942.GetFirstName] failed to calm down your [darkages_chancellor_40.GetCouncilTitle]..."
darkages_lowdip_toast.06.tt3:0 "[darkages_chancellor_40.GetFirstName] pardoned your behaviour!"
darkages_lowdip_toast.06.tt4:0 "[darkages_chancellor_40.GetFirstName] didn't pardon your behaviour..."
darkages_opinion_relieved:0 "Relieved"
darkages_rival_offended_militarily:0 "[TARGET_CHARACTER.GetShortUIName|U] deeply offended [CHARACTER.GetShortUIName] by ridiculing the size and quality of [CHARACTER.GetHerHis] armies."
