darkages_low_stewardship.06.desc:0 "Another day at the Council, another quarrel between myself and [darkages_steward_180.GetName], my [darkages_steward_180.GetCouncilTitle].\n\nThis time it became clear in my mind [darkages_steward_180.GetSheHe] went too far by exploiting my obvious lack of knowlege in Stewardship matters going to the point of even forcefully ridiculing my ideas and plans.\n\nIn the end, with a spark of fiery defiance in [darkages_steward_180.GetHerHis] eyes, [darkages_steward_180.GetFirstName] dully presented [darkages_steward_180.GetHerHis] resignation from the post as [darkages_steward_180.GetCouncilTitle].\nNow I must decide what to do as this can have a myriad of different implications..."
darkages_low_stewardship.06.opta:0 "Good Riddance!"
darkages_low_stewardship.06.optb:0 "Ask my spouse to intercede"
darkages_low_stewardship.06.optc:0 "Beg for [darkages_steward_180.GetHerHis] pardon"
darkages_low_stewardship.06.tt1:0 "You consider the matter finished. Your Councillors with positive opinion of [darkages_steward_180.GetFirstName] will be despondent with you while your Councillors with negative opinion of [darkages_steward_180.GetHerHim] will signal their approval regarding your decision\n"
darkages_low_stewardship.06.tt2:0 "You ask your Spouse to influence your [darkages_steward_180.GetCouncilTitle]. The chances of this action suceeding depend positively on your Spouse good Diplomacy Skill or better (>=12), and on [darkages_spouse_515.GetHerHis] traits about Beauty, Gregarious, Shrewd, Lustful, Diligent and Diplomat. Your [darkages_steward_180.GetCouncilTitle]'s traits Forgiving, Compassionate and Humble also provide a bonus. Negatively influencing the chances of success are your Spouse poor Diplomacy Skill or worse (<8) and your [darkages_steward_180.GetCouncilTitle]'s traits Vengeful, Arrogant and Callous\n"
darkages_low_stewardship.06.tt3:0 "You humbly ask for your [darkages_steward_180.GetCouncilTitle]'s pardon. The chance of success of this action, that unmodified is bigger than the previous one, depends positively on your traits Humble, Honest, Just and Compassionate and on [darkages_steward_180.GetFirstName]'s traits Compassionate, Humble, Forgiving and Loyal. Negatively influencing your chances of success are your traits Callous, Vengeful and Arrogant and your [darkages_steward_180.GetCouncilTitle]'s traits Vengeful, Callous and Disloyal\n"
darkages_lowste_toast.06.tt1:0 "[darkages_spouse_515.GetFirstName] managed to calm down your [darkages_steward_180.GetCouncilTitle]!"
darkages_lowste_toast.06.tt2:0 "[darkages_spouse_515.GetFirstName] failed to calm down your [darkages_steward_180.GetCouncilTitle]..."
darkages_lowste_toast.06.tt3:0 "[darkages_steward_180.GetFirstName] pardoned your behaviour!"
darkages_lowste_toast.06.tt4:0 "[darkages_steward_180.GetFirstName] didn't pardon your behaviour..."
darkages_rival_offended_intrigue:0 "[TARGET_CHARACTER.GetShortUIName|U] deeply offended [CHARACTER.GetShortUIName] by ridiculing the naive and dilletante approach [CHARACTER.GetSheHe] takes in ruling [CHARACTER.GetHerHis] Realm."
darkages_rival_offended_intrigue_corresponding:0 "[CHARACTER.GetShortUIName] deeply offended [TARGET_CHARACTER.GetShortUIName|U] by ridiculing the naive and dilletante  approach [TARGET_CHARACTER.GetSheHe] takes in ruling [TARGET_CHARACTER.GetHerHis] Realm."
darkages_low_intrigue.01.t:0 "A Critical Flaw"
darkages_low_intrigue.01.desc:0 "Recently I discoursed at a gathering with multiple rulers attending and my lack of Intrigue Skill surfaced, while I artlessly criticised, even ridiculed, the way [darkages_ruler_209.GetName] organizes [darkages_ruler_209.GetHerHis] secret services.\n\nUnfortunately, I am now faced with the possibility of permanent opposition, even rivalry from such a ruler and having created this problem, it falls on my shoulders the task of trying to solve it... if I wish so."
darkages_low_intrigue.01.opta:0 "I am not going to take back my words!"
darkages_low_intrigue.01.optb:0 "Retract myself"
darkages_low_intrigue.01.optc:0 "Ask my [darkages_spymaster_637.GetCouncilTitle] to fix the problem"
darkages_low_intrigue.01.tt1:0 "Besides providing financial compensation, you confess your mistake using an original approach and hope that [darkages_ruler_209.GetFirstName] kindly accepts your apologies. The success of this option depends positively on your traits Gregarious, Humble, Eccentric, Temperate, Calm and Patient. Negatively influencing your chances of success are your traits Callous, Wrathful, Deceitful, Arbitrary, Fickle and Impatient\n"
darkages_low_intrigue.01.tt2:0 "Through the good services of [darkages_spymaster_637.GetFirstName] you offer monetary compensation to try to salvage your relation with [darkages_ruler_209.GetFirstName]. This option has a more limited probability of success as you are asking one of your servants to address the aggrieved party. Nevertheless it might present a much better perspective than the previous option, depending on your Traits and the Traits of your [darkages_spymaster_637.GetCouncilTitle]. The success of this option depends only negatively on your [darkages_spymaster_637.GetCouncilTitle] being Callous, Wrathful, Honest, Arbitrary, Fickle and Impatient\n"
darkages_lowint_toast.01.tt1:0 "[darkages_ruler_209.GetName] pardoned you and you even gained some Prestige!"
darkages_lowint_toast.01.tt2:0 "Your excuses were not accepted. You lost Prestige and gained a new enemy..."
darkages_lowint_toast.01.tt3:0 "[darkages_ruler_209.GetName] considers you as a new friend. You gained Prestige!"
darkages_lowint_toast.01.tt4:0 "[darkages_spymaster_637.GetFirstName] managed to save your reputation!"
darkages_lowint_toast.01.tt5:0 "[darkages_spymaster_637.GetFirstName] failed. You lost Prestige and gained a new enemy..."
darkages_low_intrigue.02.t:0 "Ignorance on Display"
darkages_low_intrigue.02.desc:0 "As I was leading a meeting dedicated to the internal security of the Realm with my vassals, the obvious shortcommings regarding my Intrigue Skill quickly asserted themselves and I projected a sorry image about myself, my capabilities regarding subterfuge and the long term operational capabilites of my spies' and informants' networks.\n\nIt soon became apparent I was out of my water and unfortunately I clumsily defended myself and my position by launching a bitter diatribe against my vassals.\n\nEveryone became angry and the meeting had to be adjourned for everyone to cool off..."
darkages_low_intrigue.02.opta:0 "Avoid returning to the subject matter"
darkages_low_intrigue.02.tt3:0 "Every Vassal except Loyal ones will become Disgusted with you\n"
darkages_low_intrigue.02.optb:0 "Send the [darkages_spymaster_045.GetCouncilTitle] to calm my vassals"
darkages_low_intrigue.02.tt1:0 "You send the [darkages_spymaster_045.GetCouncilTitle], together with some funds to calm your vassals. The base chances of success are a bit against you. The success of this option is influenced positively by your [darkages_spymaster_045.GetCouncilTitle]'s Traits Diligent, Patient, Stubborn, Calm and Schemer and for [darkages_spymaster_045.GetHerHis] Brilliant Intrigue Skill (>=18). It is influenced negatively if [darkages_spymaster_045.GetSheHe] has the Traits Callous, Wrathful, Fickle and Impatient as well as if [darkages_spymaster_045.GetSheHe] has less than 15 in [darkages_spymaster_045.GetHerHis] Intrigue Skill. If [darkages_spymaster_045.GetSheHe] is a vassal of yours it will also weight against your chances of success. If a failure, besides the Prestige loss, you will also suffer the same penalty to opinion as in the option above\n"
darkages_low_intrigue.02.optc:0 "Intimidate everyone into submission"
darkages_low_intrigue.02.tt2:0 "You try to instill fear on everyone. While most of your vassals will accept your behaviour without blinking, Brave ones will feel a strong wave of contempt towards you. Be warned that imposing your views through fear might backfire spectacularly, partly depending on your Traits, partly on pure luck\n"
darkages_low_intrigue.03.t:0 "Solving Everyone's Problem"
darkages_low_intrigue.03.desc1:0 "As I was alone working in my library, a sudden feeling of vulnerability came to my mind.\n\nNot a minute had passed when someone dropped from the ceiling claiming that I was a corpse already!\nI barely had time to react when I realized this will be a fight to the death..."
darkages_low_intrigue.03.desc2:0 "As I was guarded by my bodyguard while working in my library, a sudden feeling of vulnerability came to my mind.\n\nNot a minute had passed when someone dropped from the ceiling claiming that I was a corpse already!\nI barely had time to react when I realized this will be a fight to the death..."
darkages_low_intrigue.03.desc3:0 "As I was guarded by my bodyguards while working in my library, a sudden feeling of vulnerability came to my mind.\n\nNot a minute had passed when someone dropped from the ceiling claiming that intimidating everyone was bad for my health!\nI barely had time to react when I realized this will be a fight to the death..."
darkages_low_intrigue.03.opta:0 "Watch out!"
darkages_low_intrigue.03.tt1:0 "You might suffer this event because you recently tried to intimidate your vassals. Someone might have taken it too personally"
darkages_lowint_toast.02.tt1:0 "[darkages_spymaster_045.GetFirstName] managed to pacify everyone and you gained Prestige"
darkages_lowint_toast.02.tt2:0 "[darkages_spymaster_045.GetFirstName] failed and you lose Prestige and Opinion with your Vassals"
darkages_death_warning:0 "Death!"
darkages_low_intrigue.04.t:0 "The Struggling Intrigue"
darkages_low_intrigue.04.desc:0 "Since I know myself, the subtle angles of Intrigue and subterfuge stand beyond my grasp.\n\nI verify that I spend more and more time struggling with this area of my life, as my duties and obligations require me to delve into the subtle matters of intelligence that I end up failing to understand.\n\nNow it is the time to decide how will I deal with this shortcoming in the future."
darkages_low_intrigue.04.opta:0 "Focus on my Intrigue at the cost of other Skills"
darkages_low_intrigue.04.optb:0 "Attempt to manage everything"
darkages_low_intrigue.04.optc:0 "Delegate far more than is desirable"
darkages_low_intrigue.04.tt1:0 "You are seen as a failure in managing the Intrigue aspects of your Realm. Besides the cost in Prestige and the extra cost to support the structure necessary to help you, your Vassals will become despirited by your lack of guidance and involvement\n"
darkages_province_unsafe:0 "Unsafe County"
darkages_province_unsafe_desc:0 "Due to the intrigue failures of the owner and compromising its security, this province suffers from very high banditry"
darkages_low_intrigue.05.t:0 "Awkward Security Policies"
darkages_low_intrigue.05.desc:0 "Lately, I have been touring the provinces of my Domain in order to plan and prepare the internal security of my holdings.\n\nUnfortunately and due to my low Intrigue Skill, my efforts fell well short of what I had in mind...\n\nWith confused orders, half baked decisions and clumsy security policies, my officials sensed my weakness and the enthusiasm of my people was damped, my words and decisions leaving everyone confused.\n\nAs time never stops, if I want to salvage a negative situation, I need to act now!"
darkages_low_intrigue.05.opta:0 "Dismiss the issue"
darkages_low_intrigue.05.optb:0 "Attempt to mend the issue by a new set of policies"
darkages_low_intrigue.05.optc:0 "Ask my [darkages_spymaster_820.GetCouncilTitle] to solve the problem"
darkages_low_intrigue.05.tt1:0 "Besides the modifier applied to all provinces, if you are not Lazy, Content or Humble you will suffer Stress\n"
darkages_low_intrigue.05.tt2:0 "You attempt to solve the problem by issuing a flurry of new decrees in  order to show you are in command of your Domain, after all. The success of your action depends on your high Stewardship (>=12), on being Diligent, Administrator, Eccentric or Shrewd. Negatively influencing your chances are your traits Lazy, Content, Stubborn and Dull. Your low Stewardship Skill (<8) will also decrease your chances of success\n"
darkages_low_intrigue.05.tt3:0 "You ask your [darkages_spymaster_820.GetCouncilTitle] to intercede on your behalf, distributing gold across your Domain. The success of this option depends positively on your [darkages_spymaster_820.GetCouncilTitle] at least very good Intrigue Skill (>=15) and on [darkages_spymaster_820.GetHerHis] traits Diligent, Deceitful, Administrator, Shrewd and Cunning Politician. It depends negatively on [darkages_spymaster_820.GetHerHis] lower than Very Good Intrigue Skill (<15) and on [darkages_spymaster_820.GetHerHis] traits Lazy, Honest, Generous and Dull. This option has a lower base chance of success than the previous one\n"
darkages_lowint_toast.05.tt1:0 "You managed to impress your subjects once again!"
darkages_lowint_toast.05.tt2:0 "You utterly failed to impress your subjects..."
darkages_lowint_toast.05.tt3:0 "[darkages_spymaster_820.GetFirstName] managed to salvage your poor performance!"
darkages_lowint_toast.05.tt4:0 "[darkages_spymaster_820.GetFirstName] failed in [darkages_spymaster_820.GetHerHis] mission..."
