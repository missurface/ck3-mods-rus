darkages_piety.12.t:0 "The Grey Eminence"
darkages_piety.12.desc1:0 "As I start discussing deep theology concepts with far reaching consequences with [pope.GetName], it soon became clear that I could dominate the subject matter much better than [pope.GetHerHim].\n\nWith careful worded sentences I started to bend [pope.GetHerHis] will to my own personal opinions and in the end I was able to shape the theology aspects of my own faith!\n\nGiven my clout and the public nature of our meeting, besides reaping a huge amount of Piety, I will also earn plenty of Prestige..."
