darkages_influence.01.t:0 "Powergames in Diplomacy"
darkages_influence.01.desc:0 "Recently, I was placed in a politically untenable position in internal matters concerning the Realm risking my Influence at large.\n\nIn this political chessboard every action has a price and a reward, which this time didn't work in my favour.\n\nThere are almost no good options for me unless..."
darkages_influence.01.opta:0 "Blame my Council for the political mistake"
darkages_influence.01.tt1:0 "You blame your Council and attempt to avoid any Influence loss, losing Prestige in the process. Predictably, your Councillors will not be happy with you\n"
darkages_influence.01.optb:0 "Accept the situation as it is"
darkages_influence.01.tt2:0 "Yes, unfortunately you will lose a significant amount of influence\n"
darkages_influence.01.optc:0 "...unless I pull a masterstroke in Diplomacy!"
darkages_influence.01.tt3:0 "You attempt to come up with an argument involving your Council and the practical results of your political decisions, attempting to cast everything in a good light.\nThe success of this option depends positively on your High Diplomacy (>=12). As always, the higher, the better. Also having a Diplomacy Education or the Traits Diplomat and Gregarious will help. Negatively influencing the success chances are your Low Diplomacy (<8) - the lower, the worst - and your Traits Impatient and Wrathful\n"
darkages_influence.01.optd:0 "Deftly minimize the political damage"
darkages_influence.01.tt4:0 "This option is available because you are Shrewd\n"
darkages_influence.01.toast1:0 "You dealt masterfully with the situation, even gaining Prestige!"
darkages_influence.01.toast2:0 "You failed miserably in the attempt to mend the political situation..."
darkages_random_list_success:0 "Success"
darkages_random_list_failure:0 "Failure"
darkages_influence.02.t:0 "Gaming Wargames"
darkages_influence.02.desc:0 "I organized a wargame recently, with some influencial people attending, where each Councillor played as the powers in my neighbourhood, while I played with the abstraction of my own Realm.\n\nUnfortunately and due to a poor set of choices and ill luck, my Realm was about to be overrun by enemy forces while I lost my temper and started accusing my Council of cheating with loaded dice!\n\nBy the look of everyone in the room I understand my Prestige and Influence are now on the line..."
darkages_influence.02.opta:0 "Keep the accusation of cheating"
darkages_influence.02.tt1:0 "You keep your accusation your Councillors cheated with loaded dice and attempt to avoid any Influence loss, losing Prestige. Predictably, your Councillors will not be happy with you\n"
darkages_influence.02.optb:0 "Accept my failure in the wargame"
darkages_influence.02.tt2:0 "Yes, unfortunately you will lose a significant amount of influence\n"
darkages_influence.02.optc:0 "Attempt to pull a masterstroke in Strategy!"
darkages_influence.02.tt3:0 "You attempt to come up with some risky strategy gambits involving your forced to come up on top of everyone, snatching victory in the game from the jaws of defeat!\nThe success of this option depends positively on your High Martial (>=12). As always, the higher, the better. Also having a Martial Education or the Traits Strategist and Stubborn will help. Negatively influencing the success chances are your Low Martial (<8) - the lower, the worst - and your Traits Craven and Humble\n"
darkages_influence.02.optd:0 "Deftly minimize the political damage"
darkages_influence.02.tt4:0 "This option is available because you are Shrewd\n"
darkages_influence.02.toast1:0 "You dealt masterfully with the situation, even gaining Prestige!"
darkages_influence.02.toast2:0 "You failed miserably in the attempt to rescue the strategical situation..."
darkages_influence.03.t:0 "A Fateful Meeting"
darkages_influence.03.desc:0 "The scene is set. Claiming I am opening the management of the Realm to all the influencial parties concerned, I opened the usually reserved Council meeting to all important people in my Realm.\n\nUnfortunately, while debating some figures for next year investment, I was caught serioulsy offguard and made a fool of myself, while my Councillors came up as efficient and knowledgeable.\n\nSensing the meetings was sleeping away from my political grasp, I turned against my Councillors, even if that could be a risky gamble..."
darkages_influence.03.opta:0 "Press the point against my Councillors"
darkages_influence.03.tt1:0 "You keep pressing your argument against your Councillors, making them look bad in front of everyone to save your face. The bickering however, certainly makes you lose Prestige even if you can avoid losing Influence if the stars align in your direction. Predictably, your Councillors will not be happy with you\n"
darkages_influence.03.optb:0 "Drop the matter, accepting my failure this time"
darkages_influence.03.tt2:0 "Yes, unfortunately you will lose a significant amount of influence\n"
darkages_influence.03.optc:0 "Attempt to pull a masterstroke in Management!"
darkages_influence.03.tt3:0 "You attempt to conjure a management argument that cleans the matter, making you come away on top, snatching victory in the argument from the jaws of defeat!\nThe success of this option depends positively on your High Stewardship (>=12). As always, the higher, the better. Also having a Stewardship Education or the Traits Administrator and Diligent will help. Negatively influencing the success chances are your Low Stewardship (<8) - the lower, the worst - and your Traits Lazy and Fickle\n"
darkages_influence.03.optd:0 "Deftly minimize the political damage"
darkages_influence.03.tt4:0 "This option is available because you are Shrewd\n"
darkages_influence.03.toast1:0 "You dealt masterfully with the situation, even gaining Prestige!"
darkages_influence.03.toast2:0 "You failed miserably in the management discussion..."
darkages_influence.04.t:0 "Bedfellow's Policy"
darkages_influence.04.desc:0 "Today I am attempting to portray my rule as open and inclusive to improve the opinion of the important people of my Realm. Thus, the inner Council was open for the attendence of people of note.\n\nUnfortunately things derailed early on, when the price of an unnamed agent I have highly placed in a neighbour Realm was placed into question, along with her deliveries.\nUnknown to everyone except my Spymaster, there is the matter of the torrid romance between this agent and the Spymaster of the mentioned neighbour Realm.\n\nIn order to avoid losing my face among so many influential people, I need to conjure up a very good argument concerning this delicate matter. Or maybe the best way to proceed is to blame my Council, complaining about the ignorance of the members without giving an hint of the real matter at hand..."
darkages_influence.04.opta:0 "Disavow my Councillors"
darkages_influence.04.tt1:0 "You make your Councillors look like idiots in front of everyone to save your face. The bickering however, certainly makes you lose Prestige even if you can avoid losing Influence if the stars align in your direction. Predictably, your Councillors will not be happy with you\n"
darkages_influence.04.optb:0 "Keep silent to protect my espionage operation"
darkages_influence.04.tt2:0 "Yes, unfortunately you will lose a significant amount of influence\n"
darkages_influence.04.optc:0 "Attempt to pull a masterstroke in Intrigue!"
darkages_influence.04.tt3:0 "You attempt to conjure an intrigue argument heavily leaning on romance that cleans the matter, making you come away on top, snatching victory in the argument from the jaws of defeat!\nThe success of this option depends positively on your High Intrigue (>=12). As always, the higher, the better. Also having an Intrigue Education or the Traits Seducer and Deceitful will help. Negatively influencing the success chances are your Low Intrigue (<8) - the lower, the worst - and your Traits Honest and Chaste\n"
darkages_influence.04.optd:0 "Deftly minimize the political damage"
darkages_influence.04.tt4:0 "This option is available because you are Shrewd\n"
darkages_influence.04.toast1:0 "You dealt masterfully with the situation, even gaining Prestige!"
darkages_influence.04.toast2:0 "You failed miserably with your sleazy argument..."
darkages_influence.05.t:0 "An Arcane Argument"
darkages_influence.05.desc:0 "As I opened the Council meeting today to other important people of the Realm in order to portray my rule as inclusive and magnanimous, a significant philosophy discussion was raised and my weak initial argument made me look like the fool at the table. \n\nIn order to avoid losing my face among so many influential people, I need to follow with a master stroke in philosophy concerning this delicate matter. Or maybe the best way to proceed is to blame my Council for the unscheduled philosophical debate... "
darkages_influence.05.opta:0 "Blame my Councillors"
darkages_influence.05.tt1:0 "You make your Councillors look like idiots in front of everyone to save your face. The bickering however, certainly makes you lose Prestige even if you can avoid losing Influence if the stars align in your direction. Predictably, your Councillors will not be happy with you\n"
darkages_influence.05.optb:0 "Avoid to meddle more in the matter"
darkages_influence.05.tt2:0 "Yes, unfortunately you will lose a significant amount of influence\n"
darkages_influence.05.optc:0 "Attempt to pull a masterstroke in philosophy!"
darkages_influence.05.tt3:0 "You attempt to conjure an philosophical argument heavily leaning on the old classics that cleans the matter, making you come away on top, snatching victory in the argument from the jaws of defeat!\nThe success of this option depends positively on your High Learning (>=12). As always, the higher, the better. Also having a Learning Education or the Traits Scholar and Stubborn will help. Negatively influencing the success chances are your Low Learning (<8) - the lower, the worst - and your Traits Eccentric and Lazy\n"
darkages_influence.05.optd:0 "Deftly minimize the political damage"
darkages_influence.05.tt4:0 "This option is available because you are Shrewd\n"
darkages_influence.05.toast1:0 "You dealt masterfully with the situation, even gaining Prestige!"
darkages_influence.05.toast2:0 "You failed miserably with your sleazy argument..."
