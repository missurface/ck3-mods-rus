darkages_dread.06.opta:0 "Torture and hang them all"
darkages_dread.06.optb:0 "Pardon them"
darkages_dread.06.optc:0 "Employ them as enforcers"
darkages_dread.06.optd:0 "Send them all to prison"
darkages_dread.06.tt1:0 "You torture the thieves in order to find the location of the loot of the last couple of years. After that, a public hanging will be set in the settlement of the [darkages_dread_county.GetName] that was most affected by the bandit's actions\n"
darkages_dread.06.tt2:0 "You pardon the thieves and provide some seed funds to the coffers of [darkages_dread_county.GetName]. In this way you hope to assuage the people bent on revenge as well as improving the County over the medium term\n"
darkages_dread.06.tt3:0 "This option is available because you have at least 12 in the Intrigue or Martial Skills. You hire secretely these skilled brigands to help your regular militias to enforce your rule over all your Domain, hoping to significantly increase the control of your own Counties\n"
darkages_dread.06.tt4:0 "You tread the middle road. Your population is indifferent to your behaviour but the general gist is to accuse you of being an irresolute ruler. Your Council is split on the matter with each Councillor having a different take on the situation\n"
darkages_dread.07.t:0 "Mortal Dilemma"
darkages_dread.07.desc:0 "Today, as I have finished writing an official letter to one of my vassals, my [darkages_dread_spymaster.GetCouncilTitle] approached me with what [darkages_dread_spymaster.GetSheHe] says are very serious news.\n\n[darkages_dread_spymaster.GetFirstName] proceeded to detail what [darkages_dread_spymaster.GetSheHe] considers as high treason on the part of someone I know very well from my court: [darkages_dread_traitor.GetName].\n\n As I delve deeper in the information provided, it seems some unknown party is planning my murder with the help of my courtier.\n\nHowever, I realize the matter is not definite and in the end I am not sure if I am being lead by my [darkages_dread_spymaster.GetCouncilTitle] to fulfill some hidden agenda or if [darkages_dread_traitor.GetName] is really into assisting some assassin to murder me..."
darkages_dread.07.opta:0 "Arrest and execute [darkages_dread_traitor.GetName]"
darkages_dread.07.optb:0 "Banish [darkages_dread_traitor.GetHerHim]!"
darkages_dread.07.optc:0 "Believe in [darkages_dread_traitor.GetHerHis] innocence"
darkages_dread.07.tt1:0 "You assert your position with a very strong action. This will net you some Prestige but all your Courtiers will be terrified of you. By following this path, you will nip in the bud any murder attempt on your life that might have been planned\n"
darkages_dread.07.tt2:0 "You choose a compromise while attempting to play it as safe as possible. Your Courtiers will be Disgusted by the banishment as, given the circumstancial evidence, they feel indirectly threatened. Even if there is a plot to kill you, the chance for it to materialise will be much lower\n"
darkages_dread.07.tt3:0 "You choose to believe in the innocence of [darkages_dread_traitor.GetName]. To make a sound decision, check if [darkages_dread_traitor.GetSheHe] has the traits Callous, Deceitful, Vengeful or Schemer. Next check if [darkages_dread_traitor.GetSheHe] is your Rival or worse, your Nemesis. Finally check if [darkages_dread_traitor.GetSheHe] has a negative relation with you - the worst, the more suspicious you might become. While all these factors contribute to the likelyhood of [darkages_dread_traitor.GetHerHis] betrayal, the absence of such factors is not enough to place your mind entirely at rest\n"
darkages_dread.08.t:0 "A Knife in the Dark"
darkages_dread.08.desc:0 "Tonight, as my mind toyed with my past decision regarding [darkages_dread_traitor.GetName], while going alone to one of my offices, a dark shadow  materialized in front of me and swiftly pointed a menacing knife against my chest!\n\nThinking [darkages_dread_traitor.GetName] was guilty after all, I have a split second to avoid being killed..."
darkages_dread.08.opta:0 "Quick!"
darkages_dread.08.tt1:0 "You survive the murder attempt!"
darkages_tyranny.01.t:0 "The Solidary Tax"
darkages_tyranny.01.desc1:0 "As of late and worried about the finances of the Realm, my Council is finishing the details of a so called 'Solidary Tax' charged on my Vassals to cover all sorts of expenses I might incur.\n\nThese are not welcome news to my Vassals and I know I am trespassing the social contract my rule is based upon, as I have no legitimacy to impose another tax now...\n\nNoting with amusement my vassals that are represented in the Council presented a proposal that will made them evade this tax, I must decide how will I deal with this matter."
darkages_tyranny.01.desc2:0 "As of late and worried about the finances of the Realm, my Council is finishing the details of a so called 'Solidary Tax' charged on my Vassals to cover all sorts of expenses I might incur.\n\nThese are not welcome news to my Vassals and I know I am trespassing the social contract my rule is based upon, as I have no legitimacy to impose another tax now...\n\nGiven the nuanced approaches this matter may merit, I must now decide how will I deal with it."
darkages_tyranny.01.opta:0 "Collect the Solidary Tax"
darkages_tyranny.01.tt1:0 "You collect the tax without further ado. Your Vassals that are not Councillors will become irritated with you\n"
darkages_tyranny.01.optb:0 "Veto the idea"
darkages_tyranny.01.tt2:0 "You refuse the idea of your Council. It will seem the government is not working close together and will make you lose some Prestige. Your Councillors will not be happy\n"
darkages_tyranny.01.optc:0 "Assuage the Vassals worries"
darkages_tyranny.01.tt3:0 "This option is available because your Diplomacy is at least 12. You use your superior Diplomacy Skill and think out of the box to charge the tax without incurring in Tyranny. The success of this action depends on your very good Diplomacy Skill (>=15), on having the True Ruler Perk, on being Gregarious, Eccentric, Cunning Politician or Diplomat. Having less than Very Good Diplomacy, not following a Diplomacy Lifestyle, being Wrathful, Vengeful, Callous or Arbitrary will hurt your chances\n"
darkages_tyranny.01.optd:0 "Assert my position with a martial display"
darkages_tyranny.01.tt4:0 "This option is available because your Martial is at least 12. You use your superior Martial outlook to convey the message about the true value of the tax. The success of this action depends on your very good Martial Skill (>=15), on having the Hard Rule Perk, on being Brave, Arrogant, Sadistic or Overseer. Having less than very good Martial Skill, not following a Martial Lifestyle, being Fickle, Craven, Compassionate or Just will hurt your chances\n"
darkages_tyranny_toast.01.tt1:0 "You successfuly assuage your Vassal's concerns!"
darkages_tyranny_toast.01.tt2:0 "You failed to assuage your Vassal's concerns..."
darkages_tyranny_toast.01.tt3:0 "You assert your position above and beyond what was expected!"
darkages_tyranny_toast.01.tt4:0 "You failed to assert your position using a Martial posture..."
darkages_tyranny.02.t:0 "The Wretched Ordinances"
darkages_tyranny.02.desc:0 "A big issue was raised yesterday in a formal meeting with my vassals.\n\nAs I presented my political plan for the development of the Realm, I soon met with resistence by my vassals. All in all, they complained about my intromission in their private affairs and property.\nUnfortunately I lost my temper and soon the defence of my position started to be seen as a great sign of tyranny on my part.\n\n[da_tyranny02_councillor.GetFirstName], my [da_tyranny02_councillor.GetCouncilTitle], was present at the table and signaled [da_tyranny02_councillor.GetHerHis] intention to help me solve the matter as smoothly as possible. I must decide quickly what will I do to address this unfortunate situation..."
darkages_tyranny.02.opta:0 "Assert my previous position"
darkages_tyranny.02.tt1:0 "You enforce your political views on your vassals regarding their own possessions. Besides the effects presented, all your vassals' Counties will benefit from a very positive effect for a time\n"
darkages_tyranny.02.optb:0 "Drop the matter and repent from my behaviour"
darkages_tyranny.02.tt2:0 "You stop trying to dictate how your vassals manage their possessions, thus reducing the consequences of your previous faux pas\n"
darkages_tyranny.02.optc:0 "Accept the mediation of my [da_tyranny02_councillor.GetCouncilTitle]"
darkages_tyranny.02.tt3:0 "[da_tyranny02_councillor.GetFirstName] will try to cushion the impact on your Tyranny of your past behaviour while furthering your political agenda. The value of [da_tyranny02_councillor.GetHerHis] main Skill, if at least 15 will provide you with bonus as well as your traits Gregarious, Humble, Diplomat and Shrewd. Conversely, if your [da_tyranny02_councillor.GetCouncilTitle] has a main Skill of less than 15 and you have the traits Fickle, Arrogant, Impatient or Dull, your chances of a successful outcome will be lower\n"
darkages_tyranny.02.optd:0 "Approach the question philosophically"
darkages_tyranny.02.tt4:0 "You try to awe your vassals with your knowledge of the classics as well as the strength of your intellect. Should you succeed, you will suffer a lower Tyranny penalty and will implement your policies on your vassals' dominions. Your chances of being sucessful depend on your good Learning Skill (>=12), on having the Lifestyle Perk Scholarly Circles and on your traits Humble, Patient, Calm and Scholar. If you have a lower than average Learning (<8), a different lifestyle other than a Learning one and among your traits Wrathful, Impatient, Sadistic and Callous you will hurt your chances of success\n"
darkages_tyranny_toast.02.tt1:0 "Your [da_tyranny02_councillor.GetCouncilTitle] was successful!"
darkages_tyranny_toast.02.tt2:0 "Your [da_tyranny02_councillor.GetCouncilTitle] failed..."
darkages_tyranny_toast.02.tt4:0 "You managed to awe everybody into submission!"
darkages_tyranny_toast.02.tt5:0 "You caused a very poor impression on everyone..."
darkages_county_ordinances:0 "The Wretched Ordinances"
darkages_county_ordinances_desc:0 "Ordered by the Liege of the County owner and even if truly positive, there was a lot of political drama surrounding the adoption of this policy"
darkages_tyranny.03.t:0 "Unfortunate Promises"
darkages_tyranny.03.desc1:0 "Presently, I am facing a serious policy dilemma due to the power carried by my own word.\n\nThe matter in question is a complex management proposition, supported in an increase of bureaucracy which will tax the capacity to manage my Domain and that will benefit my vassals while lowering my future provincial incomes.\n\nAs my vassals lobbied the Council for long, I was able until now to postpone the issue while promising I was supportive of the whole scheme, in order to keep everyone happy.\n\nUnfortunately, I am now backed against a wall where I will either enact the policy or refuse it, accruing tyranny in the process..."
darkages_tyranny.03.desc2:0 "Presently, I am facing a serious policy dilemma due to the power carried by my own word.\n\nThe matter in question is a complex management proposition, supported in an increase of bureaucracy which will tax the capacity to manage my Domain and that will benefit my vassals while lowering my future provincial incomes.\n\nAs my vassals lobbied the Council for long, I was able until now to postpone the issue while promising I was supportive of the whole scheme, in order to keep everyone happy.\n\nUnfortunately, I am now backed against a wall where I will either enact the policy or refuse it, accruing tyranny in the process... or maybe there is a third option after all, if I am creative and think out of the box!"
darkages_tyranny.03.opta:0 "Enact the policy"
darkages_tyranny.03.optb:0 "Disavow my word"
darkages_tyranny.03.optc:0 "Present a creative alternative"
darkages_tyranny.03.tt1:0 "You implement the policy. The balance of the treasuries of your vassals will increase\n"
darkages_tyranny.03.tt2:0 "You refuse to implement the policy, backtracking on your word. Your action will increase your Tyranny, thus your vassal's opinion of you. The Councillors that are not your vassals will also be unhappy with you\n"
darkages_tyranny.03.tt3:0 "You act creatively and out of the box in order to fool everybody in a matter of finances. High Stewardship (>=12), having the 'Centralization' Lifestyle Perk, being Greedy, being Eccentric, being Fickle and being an Administrator, all contribute for your possible success. Conversely, having less than 8 in Stewardship, not following a Stewardship Lifestyle, being Generous, being Stubborn, being Honest and being Temperate, all contribute to your possible failure\n"
darkages_tyranny_toast.03.tt1:0 "You manage to gaslight everyone with your mastery of Stewardship and creative thinking!"
darkages_tyranny_toast.03.tt2:0 "Everyone saw through your attempt at mystification..."
darkages_poor_bargain:0 "Poor Bargain"
darkages_poor_bargain_desc:0 "This ruler was cornered into a poor political bargain by its vassals and Councillors"
darkages_political_maneuvering:0 "Political Jockeying"
darkages_political_maneuvering_desc:0 "This ruler managed to reach a compromise with its vassals and Councillors that minimized the political and financial losses of its original posture"
rule_darkages_dangerous_stress_thresholds_rule:0 "#B #Bold Dark Ages#!:#! Dangerous Stress Thresholds"
setting_darkages_dangerous_stress_thresholds_yes:0 "Enabled"
setting_darkages_dangerous_stress_thresholds_no:0 "Disabled"
setting_darkages_dangerous_stress_thresholds_yes_desc:0 "When going up a stress level the character has a 5% chance of suffering a dangerous stroke"
setting_darkages_dangerous_stress_thresholds_no_desc:0 "Going up the stress level is the same as in the base game"
rule_darkages_high_stress_risk_rule:0 "#B #Bold Dark Ages#!:#! High Stress Risks"
setting_darkages_high_stress_risk_yes:0 "Active"
setting_darkages_high_stress_risk_no:0 "Inactive"
setting_darkages_high_stress_risk_yes_desc:0 "When a character is over 99 of Stress there is a chance every year of getting negative events"
setting_darkages_high_stress_risk_no_desc:0 "Stress negative events are turned off"
darkages_levies_curtailed:0 "Levies Curtailed"
darkages_levies_curtailed_desc:0 "This character allowed its vassals to use the agreed vassal levies in their available workforce"
darkages_tyranny.04.t:0 "Missing Soldiers"
darkages_tyranny.04.desc:0 "Recently in a Council meeting I was pressed by everyone to follow up on a promise I raised a long time ago about allowing my Vassals to retain a large number of my due vassal levies as well as financing minor development projects in their lands.\n\nIt is clear to me my vassals have been lobbying hard my Councillors regarding this proposal and I would not be surprised if gold was involved to increase my Councillors willingness to pursue this issue.\n\nAs things stand, I stated I will have a definite answer regarding this matter in the next few days."
darkages_tyranny.04.opta:0 "Veto the Law"
darkages_tyranny.04.tt1:0 "You veto the law, breaking your promise to your vassals. Due to the serious matter at hand, your Tyranny will raise by a potencial hefty amount. Your unlanded Councillors will be disappointed with your decision. Your landed Councillors already suffer an opinion malus with you due to the Tyranny applied\n"
darkages_tyranny.04.optb:0 "Publish the Law"
darkages_tyranny.04.tt2:0 "You publish the law, losing 50% of the vassal levies for the next 10 years, financing your vassal's treasuries and improving the Development progress in one of your Vassal's Counties. Your Vassals will approve of your conduct\n"
darkages_tyranny.04.optc:0 "Use my Dread to cow everyone into submission"
darkages_tyranny.04.tt3:0 "You are dead set in disavowing your promise and will threaten your vassals into accepting it using your Dread. Starting with the odds stacked against you, having the 'Malice Implicit' perk, having high Dread - anything better than 14 already gives a bonus - or having the traits Sadistic, Vengeful, Callous, Wrathful and Torturer will provide you with bonuses to your success. If you have less than 10 Dread, are Compassionate, Just, Forgiving, Generous or Temperate you will suffer further penalties for your chances of success\n"
rule_darkages_pregnancy_rule:0 "#B #Bold Dark Ages#!:#! General Pregnancies"
setting_darkages_pregnancy_highrisk:0 "High Risk"
setting_darkages_pregnancy_lowrisk:0 "Low Risk"
setting_darkages_pregnancy_highrisk_desc:0 "Much like in the middle ages, pregnancies are risky affairs where it is not rare serious complications might develop"
setting_darkages_pregnancy_lowrisk_desc:0 "Chances of something going wrong with a pregnancy are much lowered"
rule_darkages_pregnancy_PC_rule:0 "#B #Bold Dark Ages#!:#! Player Pregnancies"
setting_darkages_pregnancy_PC_highrisk:0 "High Risk"
setting_darkages_pregnancy_PC_lowrisk:0 "Low Risk"
setting_darkages_pregnancy_PC_highrisk_desc:0 "The female Player Character will have a high risk of dying per pregnancy (at most around 6%-7%)"
setting_darkages_pregnancy_PC_lowrisk_desc:0 "The female Player Character will have a lower risk of dying per pregnancy (at most most around 3%-3.5%)"
darkages_tyranny.05.t:0 "The Foul Play"
darkages_tyranny.05.desc:0 "[darkages_vassal_tyr_5.GetName] has been preparing for long a play inspired in the classics of the old times.\n\nI received my invitation this morning but to my surprise and disappointment, even if I am [darkages_vassal_tyr_5.GetHerHis] Liege, it seems I will not attend the spectacle in the place of honour.\n\nI can sense a criticism of sorts and a veiled signal of defiance by all my vassals in this impudence.\nIf I want to look good and reassert my true place in my Realm, I need to take definite measures..."
darkages_tyranny.05.opta:0 "Accept the discreet place reserved for me"
darkages_tyranny.05.tt1:0 "You accept the place [darkages_vassal_tyr_5.GetFirstName] reserved for you in the knowledge this is an affront in the presence of all your vassals to your person and position. Every vassal except the organizer who are not Humble will be embarassed by the situation and you will suffer the respective opinion penalty\n"
darkages_tyranny.05.optb:0 "I will force it to be in the place of honour!"
darkages_tyranny.05.tt2:0 "You will impose yourself as the main attending person of the play, humiliating your vassal\n"
darkages_tyranny.05.optc:0 "Use creativity and guile to be the honoured one"
darkages_tyranny.05.tt3:0 "The success of this option depends positively on your high Intrigue (>=12), on following an Intrigue Lifestyle, on being Eccentric, on being Deceitful, on being Fickle and on being a Schemer. Negatively influencing the outcome is your low Intrigue Skill (<8), on being Honest, on being Stubborn, on being Just and on being Humble\n"
darkages_tyranny_toast.05.tt1:0 "You managed to assert your rightful place!"
darkages_tyranny_toast.05.tt2:0 "You failed to assert your rightful place..."
rule_darkages_vassal_limit_rule:0 "#B #Bold Dark Ages#!:#! Vassal Limit"
setting_darkages_vassal_limit_default:0 "Default"
setting_darkages_vassal_limit_plus5:0 "+5"
setting_darkages_vassal_limit_plus10:0 "+10"
setting_darkages_vassal_limit_plus20:0 "+20"
setting_darkages_vassal_limit_default_desc:0 "The vassal limit related to rank is significantly smaller than vanilla"
setting_darkages_vassal_limit_plus5_desc:0 "The vassal limit related to rank is increased by five"
setting_darkages_vassal_limit_plus10_desc:0 "The vassal limit related to rank is increased by ten"
setting_darkages_vassal_limit_plus20_desc:0 "The vassal limit related to rank is increased by twenty"
rule_darkages_disinheriting_rule:0 "#B #Bold Dark Ages#!:#! Disinheriting Cost"
setting_darkages_disinheriting_default:0 "Increased Costs"
setting_darkages_disinheriting_reduced:0 "Reduced Costs"
setting_darkages_disinheriting_default_desc:0 "The costs of disinheriting an heir are significantly increased from base game"
setting_darkages_disinheriting_reduced_desc:0 "The costs of disinheriting an heir are reduced from Dark Ages default (Increased Costs)"
darkages_rival_offended_diplomatically:0 "[TARGET_CHARACTER.GetShortUIName|U] deeply offended [CHARACTER.GetShortUIName] by commiting more than just a few serious diplomatic blunders that belittled [CHARACTER.GetHerHim]."
darkages_rival_offended_diplomatically_corresponding:0 "[CHARACTER.GetShortUIName] deeply offended [TARGET_CHARACTER.GetShortUIName|U] by commiting more than just a few serious diplomatic blunders that belittled [TARGET_CHARACTER.GetHerHim]."
darkages_friend_make_amends:0 "[TARGET_CHARACTER.GetShortUIName|U] established a strong friendship bond with [CHARACTER.GetShortUIName] by skillfully making amends over a very serious matter with [CHARACTER.GetHerHim]."
darkages_friend_make_amends_corresponding:0 "[CHARACTER.GetShortUIName] established a strong friendship bond with  [TARGET_CHARACTER.GetShortUIName|U] by skillfully making amends over a very serious matter with [TARGET_CHARACTER.GetHerHim]."
darkages_low_diplomacy.01.t:0 "Foreign Affairs Blunder"
darkages_low_diplomacy.01.desc:0 "Due to my low Diplomacy Skill, my recent exchange of letters with [darkages_ruler_01.GetName] took a turn for the worst as I was unable to keep its meaning civil, while avoiding negative interpretations due to poor semantics.\n\nUnfortunately, the present state of affairs points to a very aggrieved person that is bound to consider me [darkages_ruler_01.GetHerHis] rival.\n\nAs accruing rivals can have all sorts of unfortunate consequences, maybe it is a good idea to consider the option of making amends... after all, the original fault was my lack of skill in diplomatic matters."
darkages_low_diplomacy.01.opta:0 "I will not present excuses!"
darkages_low_diplomacy.01.optb:0 "Try to make amends"
darkages_low_diplomacy.01.tt1:0 "You offer monetary compensation to try to salvage the relation. The success of this option depends positively on being Gregarious, Humble, Stubborn, Temperate, Calm and Patient. Negatively impacting your chances are the Traits Callous, Wrathful, Deceitful, Arbitrary, Fickle and Impatient\n"
darkages_low_diplomacy.01.optc:0 "I'll ask my [darkages_chancellor_23.GetCouncilTitle] to intercede..."
darkages_low_diplomacy.01.tt2:0 "Through the good services of [darkages_chancellor_23.GetFirstName] you offer monetary compensation to try to salvage the relation. This option has a more limited probability of success as you are asking one of your servants to address the aggrieved party. Nevertheless it might present a much better perspective than the previous option, depending on your Traits and the Traits of your [darkages_chancellor_23.GetCouncilTitle]. The success of this option depends only negatively on your [darkages_chancellor_23.GetCouncilTitle] being Callous, Wrathful, Deceitful, Arbitrary, Fickle and Impatient\n"
darkages_lowdip_toast.01.tt1:0 "You managed to mend the relationship with [darkages_ruler_01.GetFirstName] while increasing your Prestige!"
darkages_lowdip_toast.01.tt2:0 "Unfortunately, you must concern yourself with a new Rival and you lost more Prestige..."
darkages_lowdip_toast.01.tt3:0 "An unmitigated political victory. [darkages_ruler_01.GetName] considers you as a new friend!"
darkages_lowdip_toast.01.tt4:0 "Your [darkages_chancellor_23.GetCouncilTitle] managed to mend your relationship with [darkages_ruler_01.GetName]!"
darkages_lowdip_toast.01.tt5:0 "Your [darkages_chancellor_23.GetCouncilTitle] failed. You lost more Prestige..."
darkages_low_diplomacy.02.t:0 "A Step Too Far"
darkages_low_diplomacy.02.desc:0 "As I was leading a political meeting with my vassals, the obvious shortcommings regarding my Diplomacy Skill quickly asserted themselves and I projected a sorry image about myself, my policies and my long term objectives.\n\nIt soon became apparent I was out of my water and unfortunately I clumsily defended myself and my position by launching a bitter diatribe against my vassals.\n\nEveryone became angry and the meeting had to be adjourned for everyone to cool off..."
darkages_low_diplomacy.02.opta:0 "Avoid returning to the subject matter"
darkages_low_diplomacy.02.tt3:0 "Every Vassal except Loyal ones will become Disgusted with you\n"
darkages_low_diplomacy.02.optb:0 "Send the [darkages_chancellor_72.GetCouncilTitle] to calm my vassals"
darkages_low_diplomacy.02.tt1:0 "You send the [darkages_chancellor_72.GetCouncilTitle], together with some funds to calm your vassals. The base chances of success are a bit against you. The success of this option is influenced positively by your [darkages_chancellor_72.GetCouncilTitle]'s Traits Gregarious, Patient, Stubborn, Calm and Diplomat and for [darkages_chancellor_72.GetHerHis] Brilliant Diplomacy Skill (>=18). It is influenced negatively if [darkages_chancellor_72.GetSheHe] has the Traits Callous, Wrathful, Fickle and Impatient as well as if [darkages_chancellor_72.GetSheHe] has less than 15 in [darkages_chancellor_72.GetHerHis] Diplomacy Skill. If [darkages_chancellor_72.GetSheHe] is a vassal of yours it will also weight against your chances of success. If a failure, besides the Prestige, loss you will also suffer the same penalty to opinion as in the option above\n"
darkages_low_diplomacy.02.optc:0 "Threaten and intimidate everyone"
darkages_low_diplomacy.02.tt2:0 "You try to instill fear on everyone. While most of your vassals will accept your behaviour without blinking, Brave ones will feel a strong wave of contempt towards you. Be warned that imposing your views through fear might backfire spectacularly, partly depending on your Traits, partly on pure luck\n"
darkages_low_diplomacy.03.t:0 "Solving Everyone's Problem"
darkages_low_diplomacy.03.desc1:0 "As I was alone working in my library, a sudden feeling of vulnerability came to my mind.\n\nNot a minute had passed when someone dropped from the ceiling claiming that I was a corpse already. I barely had time to react when I realized this will be a fight to the death..."
darkages_low_diplomacy.03.desc2:0 "As I was guarded by my bodyguard while working in my library, a sudden feeling of vulnerability came to my mind.\n\nNot a minute had passed when someone dropped from the ceiling claiming that I was a corpse already. I barely had time to react when I realized this will be a fight to the death..."
darkages_low_diplomacy.03.desc3:0 "As I was guarded by my bodyguards while working in my library, a sudden feeling of vulnerability came to my mind.\n\nNot a minute had passed when someone dropped from the ceiling claiming that intimidating everyone was bad for my health. I barely had time to react when I realized this will be a fight to the death..."
darkages_low_diplomacy.03.opta:0 "Danger!"
darkages_low_diplomacy.03.tt1:0 "You suffered this murder attempt as revenge for your appalling behaviour towards your vassals. Your Intrigue Skill, your Prowess, the presence of one or even better two bodyguards and pure luck will determine the chance of living to tell the story\n"
darkages_lowdip_toast.02.tt1:0 "[darkages_chancellor_72.GetFirstName] managed to pacify everyone and you gained Prestige"
darkages_lowdip_toast.02.tt2:0 "[darkages_chancellor_72.GetFirstName] failed and you lose Prestige and Opinion with your Vassals"
darkages_low_dip:0 "Diplomatic Liability"
darkages_low_dip_desc:0 "This character struggles in the other Skills in order to make up for its low Diplomacy Skill"
darkages_low_mar:0 "Martial Liability"
darkages_low_mar_desc:0 "This character struggles in the other Skills in order to make up for its low Martial Skill"
darkages_low_ste:0 "Stewardship Liability"
darkages_low_ste_desc:0 "This character struggles in the other Skills in order to make up for its low Stewardship Skill"
darkages_low_int:0 "Intrigue Liability"
darkages_low_int_desc:0 "This character struggles in the other Skills in order to make up for its low Intrigue Skill"
darkages_low_lea:0 "Learning Liability"
darkages_low_lea_desc:0 "This character struggles in the other Skills in order to make up for its low Learning Skill"
darkages_stressed:0 "Stressed"
darkages_stressed_desc:0 "This character feels the weight of stress due to struggling in one of its Skills"
darkages_low_diplomacy.04.t:0 "The Struggling Diplomacy"
darkages_low_diplomacy.04.desc:0 "Since I know myself, the subtle angles of diplomacy are beyond my understanding.\n\nI verify that I spend more and more time struggling with this area of my life, as my duties and obligations require me to address the diplomacy arena that I end up failing to grasp.\n\nNow it is the time to decide how will I deal with this shortcoming in the future."
darkages_low_diplomacy.04.opta:0 "Focus on my Diplomacy at the cost of other Skills"
darkages_low_diplomacy.04.optb:0 "Attempt to manage everything"
darkages_low_diplomacy.04.optc:0 "Delegate far more than desirable"
darkages_low_diplomacy.04.tt1:0 "You are seen as a failure in managing the Diplomacy of your Realm. Besides the cost in Prestige and the extra cost to support the structure necessary to help you, your Vassals will become despirited by your lack of guidance and involvement\n"
