darkages_religious_change_brings_death.01.desc:0 "One day, as I was paying a visit to one of the minor dwellings of my capital County, someone manages to bypass my henchmen and swiftly approaches me, dagger in hand, yelling 'this is for you to remember to stop converting the religion of my County, you lowly scum!'. In a flash, it occurred to me it might have been a good idea if I had at least a single bodyguard hired. Suddenly, I must fight for my life!"
