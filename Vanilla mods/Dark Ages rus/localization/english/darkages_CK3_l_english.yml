darkages_higher_education.01.t:0 "Above and Beyond"
darkages_higher_education.01.desc:0 "As I delve into the books trying to improve my education in the path set in my infancy, I discover sources that will certainly increase my chances of improving my condition.\n\nHowever, I shudder just to think about the price tag of these new ancient documents.\n\nIn the end, it is only a matter about how much do I value my chances of improvement..."
darkages_higher_education.01.opta:0 "Knowledge is paramount!"
darkages_higher_education.01.optb:0 "It is too expensive..."
darkages_higher_education.02.t:0 "Distracting Activities"
darkages_higher_education.02.desc:0 "Since I decided to try to improve my education, I have been ever more detached from the politics of my Realm.\n\nMy vassals feel acutely this lack of engagement, so I am at a turning point regarding the political consequences of my personal studies..."
darkages_higher_education.02.opta:0 "My success trumps petty politics!"
darkages_higher_education.02.optb:0 "Better to juggle everything"
darkages_higher_education.02.tt1:0 "You decide to favour your learning process, increasing your chances of success, at the cost of staying abreast of the Realm politics. Your vassals will become Irritated with you for 5 years\n"
darkages_higher_education.02.tt2:0 "You decide to pay more attention to the Realm politics\n"
darkages_neglect:0 "Neglected County"
darkages_neglect_desc:0 "Due to other priorities of its Ruler, this County has been neglected with ominous effects"
darkages_higher_education.03.t:0 "Personal Interests"
darkages_higher_education.03.desc:0 "As the studies to improve my education advance, I get more and more embroiled in the minutiae of the subject matter, thus spending less and less ttime with the proper management of my Domain.\n\nUnfortunately, unless I decide to reduce my involvement in my studies, the well being of my holdings and my subjects will suffer..."
darkages_higher_education.03.opta:0 "It is all for a greater purpose!"
darkages_higher_education.03.optb:0 "It is time to redefine priorities"
darkages_higher_education.03.tt1:0 "You decide to delve deeper into your studies, increasing your chances of success, while your Domain suffers from your lack of interest\n"
darkages_higher_education.03.tt2:0 "You decide to split your attention between your studies and the proper management of your Domain\n"
darkages_improve_education_decision:0 "Seek Higher Education"
improve_education_decision_tooltip:0 "Try to raise a level in your Education"
improve_education_decision_desc:0 "You may try to improve your education over the next 7 or 8 months. Depending on luck, your inner talent and some oportunities that might soon arise, you might be succcessful in improving your aptitudes. You have only a single attempt in life to attempt this."
darkages_improve_education_decision_confirm:0 "Time to hit the classics!"
darkages_higher_education.04.t:0 "An Intimate Help"
darkages_higher_education.04.desc:0 "Thanks to the relation I have with my [darkages_spouse_he.GetFirstName], [darkages_spouse_he.GetSheHe] offered [darkages_spouse_he.GetHerHis] support in my studies to improve my education.\n\nThere is however a lingering problem:\nif my other Councillors perceive the influence of my Spouse increasing over me, there might be trouble ahead.\n\nAll in all, I need to decide if the helping hand of [darkages_spouse_he.GetFirstName] is worth the troubles with the rest of the Councillors."
darkages_higher_education.04.opta:0 "Of course I'll accept [darkages_spouse_he.GetHerHis] help!"
darkages_higher_education.04.tt1:0 "This event might be available only if your primary spouse has an opinion of at least 50 of you, is your Soulmate or your Lover. Accepting [darkages_spouse_he.GetHerHis] help improve your chances of success of becoming better at your education subject. You other Councillors will become despirited with you for 5 years, however\n"
darkages_higher_education.04.optb:0 "I tenderly decide to refuse [darkages_spouse_he.GetHerHis] offer..."
darkages_higher_education.04.tt2:0 "Concerned about the political angle, you refuse the offer\n"
darkages_higher_education.05.t:0 "Helping Hand"
darkages_higher_education.05.desc:0 "As [darkages_friend_he.GetFirstName], my friend, noticed my sudden delving into the books to improve my education, [darkages_friend_he.GetSheHe] was adamant in trying to help me with the subject matter. Surprised, I noticed [darkages_friend_he.GetHerHim] collecting all sorts of documents and information about my studies.\n\nIf going forward, this help will improve my chances of being successful but I fear [darkages_friend_he.GetFirstName] is intruding too much into my life and that a personality clash between us might arise with very sad consequences.\n\nCertainly I don't want to lose the friendship of [darkages_friend_he.GetFirstName] but the help [darkages_friend_he.GetSheHe] might give is real and will be accutely felt."
darkages_higher_education.05.opta:0 "Take [darkages_friend_he.GetHerHis] help and hope for the best"
darkages_higher_education.05.optb:0 "Go alone"
darkages_higher_education.05.tt1:0 "While your friend will improve your chances of success in your quest for a better education, there is a risk your friendship is forfeited due to your personalities\n"
darkages_higher_education.05.tt2:0 "You will refuse the help of [darkages_friend_he.GetFirstName]. Your friendship remains assured but you will pursue your education objectives with a lower chance of success\n"
darkages_higher_education.06.t:0 "A Higher Pursuit"
darkages_higher_education.06.desc:0 "The time has come to know if my quest for a higher education is successful or not. Depending on my choices of the last few months as well as a few traits and luck, a final chance is given.\n\nWill I bask in my own success?"
darkages_higher_education.06.opta:0 "Lets evaluate my knowledge!"
darkages_higher_education.06.tt1:0 "Recall that your base chance of success starts at 20%. Besides your decisions regarding recent opportunities you experienced and luck, the traits Shrewd, Diligent and Ambitious give you a small bonus. Conversely, the traits Dull, Content and Lazy give you a small penalty. Good luck with your roll!\n"
darkages_higher_education.06.tt2:0 "You will fail..."
darkages_higher_education_toast.06.toast1:0 "You managed to improve your Education!"
darkages_higher_education_toast.06.toast2:0 "You failed to improve your Education..."
