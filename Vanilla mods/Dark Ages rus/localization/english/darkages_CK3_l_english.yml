darkages_sanction_piracy:0 "Piracy Operation"
darkages_sanction_piracy_desc:0 "This character is financing a piracy operation attacking trade vessels across the seas."
darkages_finance_pirates_decision:0 "Finance Piracy Operation"
darkages_finance_pirates_decision_tooltip:0 "Finance Piracy"
darkages_finance_pirates_decision_desc:0 "You can finance a piracy operation, hiring suitable captains among your men and assembling a pirate fleet that you sponsor and direct. This means mostly your Martial but also your Intrigue in planning the hunting grounds will influence the prey you may capture, netting an income coming at random intervals. In the end, this is a risky business that may bring you vast sums of wealth but also might be destroyed when you least expect. You cannot revoke this decision for the next 3 years"
darkages_finance_pirates_decision_confirm:0 "Finance it!"
darkages_finance_pirates_decision_tt1:0 "You will suffer Stress if you are neither Callous, nor Sadistic, nor Vengeful, nor Arbitrary. Your Vassals, Courtiers or Guests that are adult and either Honest, Just or Compassionate will be incensed by your funding of pirates. Finally, you will also earn a new modifier that signals the upfront consequences of financing piracy.\n"
darkages_stop_finance_pirates_decision:0 "Stop Finance Piracy"
darkages_stop_finance_pirates_decision_desc:0 "You can stop finance piracy at any time. You even recoup a part of your investment as you sell the somewhat battered ships."
darkages_stop_finance_pirates_decision_tooltip:0 "Stop Piracy"
darkages_stop_finance_pirates_decision_confirm:0 "Stop it!"
DEBUG_I_HAVE_MORE_GOLD_TRIGGER:0 "You lack the necessary gold"
darkages_piracy.01.t:0 "The End of Piracy"
darkages_piracy.01.desc:0 "As I recently lost my last Port, I lack the means to control my ships raiding the sea lanes.\nThis means the end of my Pirate Lord career..."
darkages_piracy.01.opta:0 "It was good while it lasted!"
darkages_piracy.02.t:0 "Winds of Plunder"
darkages_piracy.02.desc1:0 "I have noted that as of late, preys to be captured and robbed by my pirate fleet have been seldom seen.\n\nIt seems like the sea lanes we are patrolling are almost empty of merchants to be targeted by my pirate fleet.\n\nThere is also the possibility I am not planning the pirate routes in the most optimal fashion..."
darkages_piracy.02.desc2:0 "I have noted that as of late, with some notable exceptions, preys to be captured and robbed by my pirate fleet have been seen not too often.\n\nWhile the situation could be worse, it seems like the sea lanes we are patrolling are almost empty of merchants to be targeted by my pirate fleet.\n\nThere is also the possibility I am not planning the pirate routes in the most optimal fashion..."
darkages_piracy.02.desc3:0 "I have noted that as of late, my pirate fleet keeps returning with their cargo holds with a good amount of valuables.\nPrizes are also taken with some regularity, which is a nice boon.\n\nAll in all, it is good to be a Pirate Lord at this time!"
darkages_piracy.02.desc4:0 "I have noted that as of late, my pirate fleet keeps returning with their cargo holds with a very good amount of valuables.\n\nPrizes are also taken regularly to the joy of everyone.\n\nAll in all, a great performance!"
darkages_piracy.02.desc5:0 "I have noted that as of late, the sea lanes are teeming with cargo ships and my pirate fleet is taking advantage of this golden opportunity to fill its holds!\n\nPrizes keep arriving in my harbour to the delight of everyone!\n\nMy success is so vast that my infamy keeps spreading in the form of increased Dread!"
darkages_piracy.02.opta:0 "Let's count the plunder!"
darkages_piracy.03.t:0 "A Special Prize"
darkages_piracy.03.desc:0 "I received news today that my pirate fleet captured a prize fully laden with goods and even some treasure in the hold.\n\nCertainly this provides a very welcome extra value in gold, even after splitting the profits with my crews!"
darkages_piracy.03.opta:0 "Very good!"
darkages_piracy.04.t:0 "A Rich Prize"
darkages_piracy.04.desc:0 "I received news today that my pirate fleet captured a prize fully laden with gold and silver in the hold!\n\nI will go to the port to personally check the ship, congratulate my men and divide the plunder. Certainly, this was a capital moment in my life as a Pirate Lord!"
darkages_piracy.04.opta:0 "Great!"
darkages_piracy.05.t:0 "A Moral Dilemma"
darkages_piracy.05.desc:0 "I received reports today that one of my pirate ships captured a prize full of [ROOT.Char.GetFaith.GetAdjective] pilgrims, my own faith.\n\nThe captain of the pirate ship intends to sell everyone into slavery but I know there will be consequences if I authorize such despicable behaviour..."
darkages_piracy.05.opta:0 "Sell everyone into slavery!"
darkages_piracy.05.optb:0 "Free the passengers"
darkages_piracy.05.tt1:0 "Besides the hit in Piety and the raise in Dread, you will cause extreme discontent on your head of faith (if there is one), on your religious councillor, on your adult, Zealous vassals and on your adult, Zealous courtiers and guests. If you are Zealous you will suffer a severe increase of Stress\n"
darkages_piracy.06.tt1:0 "The success of this option depends for better or worse on your Diplomacy and your Martial. It is positively influenced by being a Reveller - the highest rank, the better - by being Brave, by being Shrewd and by being Gregarious. It is negatively influenced by being Craven, by being Shy and by being Dull\n"
darkages_piracy.06.tt2:0 "Several of your pirate captains leave your service and the size of your piracy operation will probably suffer\n"
darkages_piracy.06.t:0 "Hints of Mutiny"
darkages_piracy.06.desc:0 "Several of my pirate captains are becoming restless about what they consider a fair share of the plunder they capture while patrolling the seas. They confront me with their demands and are waiting my answer..."
darkages_piracy.06.opta:0 "Pay all the captains a bonus"
darkages_piracy.06.optb:0 "Try to dissuade the captains of their demands"
darkages_piracy.06.optc:0 "Refuse to cede to their demands"
darkages_piracy.07.t:0 "A Convincing Discussion"
darkages_piracy.07.desc:0 "After talking with my pirate captains about their share of the plunder it became evident I was in the right and their demands were put to rest after being persuaded to return to the seas..."
darkages_piracy.07.opta:0 "A very nice performance!"
darkages_piracy.08.t:0 "A Failed Discussion"
darkages_piracy.08.desc:0 "After talking with my pirate captains about their share of the plunder it became evident they were not giving up on their demands.\n\nDesperate, I immediately offered them some gold to assuage their disposition but to no avail.\n\nThey wanted more, much more and as things stood, they left my service with the result of reducing the scale of my piracy operation..."
darkages_piracy.08.opta:0 "The curs..."
darkages_piracy.08.tt1:0 "The size of your piracy operation will probably suffer\n"
darkages_rival_piracy:0 "Was the target of a piracy operation"
darkages_piracy.10.t:0 "A Special Mission"
darkages_piracy.10.desc:0 "My spies have informed me the waters and ports controlled by [piracy_victim.GetName] are teeming with prey to plunder!\n\nI must decide if it is worth it to target this particular ruler by unleashing all my pirate fleet upon [piracy_victim.GetHerHis] waters and ports..."
darkages_piracy.10.opta:0 "Order your pirate fleet to raid [piracy_victim.GetHerHis] coast!"
darkages_piracy.10.optb:0 "Better avoid making sworn enemies..."
darkages_piracy.09.t:0 "Piracy Setbacks"
darkages_piracy.09.desc:0 "The previous months saw a strong increase in anti-piracy patrols and my fleet has been suffering grievous losses. If I want to continue with the piracy operation, I need to build more ships to make up for the losses..."
darkages_piracy.09.opta:0 "Build them!"
darkages_piracy.09.optb:0 "End the piracy operation"
darkages_raided:0 "Raided by Pirates"
darkages_piracy.11.t:0 "Raided by Pirates!"
darkages_piracy.11.desc:0 "Pirates financed by [pirate.GetName] are plundering our ports, our vessels and our coasts.\nThe attacks carry a significant loss of revenue from taxation across my domain.\n\nThese nefarious acts should not pass without an answer!"
darkages_piracy.11.opta:0 "The despicable [pirate.GetName] is already my Rival!"
darkages_piracy.12.t:0 "Skills of a Pirate Lord"
darkages_piracy.12.desc1:0 "All the time I pass planning, strategizing and developing new tactics while discussing what is best with my pirate captains is contributing for the development of my martial skills. It is with joy that I feel an improvement on that area."
darkages_piracy.12.desc2:0 "All the subterfuge necessary to guess where my pirate captains will strike, the reports I read from my spies posted far away and the guile necessary to plan the pirate operations is having a positive impact on my Intrigue skills. It is with joy that I feel an improvement on that area."
darkages_piracy.12.opta:0 "Excellent!"
darkages_piracy.13.t:0 "A Price to Pay"
darkages_piracy.13.desc1:0 "All the dealings with piracy and the mingling with the crews of my ships have struck a blow to my knowledge of the world at large. Unfortunately, there is a price to pay when I want to be a Pirate Lord..."
darkages_piracy.13.desc2:0 "All the shady dealings with piracy and the despicable acts my fleets commit cause a significant blow in my diplomatic skills. Unfortunately, there is a price to pay when I want to be a Pirate Lord..."
darkages_piracy.13.opta:0 "Rats!"
darkages_piracy.14.t:0 "A Smuggler Operation"
darkages_piracy.14.desc:0 "I have been approached by a group of shady individuals offering me a small fortune that will always be no less than 50 gold.\n\nIn order to get the gold, I need to lend them one of my pirate ships to smuggle a variety of goods into the lands of [smuggler_victim.GetName].\n\nThere are risks associated with the operation and I need to make a choice..."
darkages_piracy.14.opta:0 "Lend the pirate ship and its crew to the smugglers"
darkages_piracy.14.optb:0 "Close the door on them"
darkages_piracy.14.tt1:0 "The success of this option depends for better or worse on your Intrigue and your Martial. It is positively influenced by being Deceitful, by being a Schemer, by being Shrewd, by being Callous and by being Arbitrary. It is negatively influenced by being Impatient, by being Wrathful and by being Dull\n"
darkages_piracy.15.t:0 "Successful Smuggling!"
darkages_piracy.15.desc:0 "My pirate ship escaped undetected in its mission to smuggle different wares into [smuggler_victim.GetName]'s lands.\n\nThe endeavour was a success and now its time to reap my reward!"
darkages_piracy.15.opta:0 "A good amount of gold..."
darkages_piracy.16.t:0 "Ship Captured!"
darkages_piracy.16.desc:0 "While performing its special smuggle mission in [smuggler_victim.GetName]'s waters my pirate ship was detected, boarded and captured. Given the special assurances I gave to everyone involved, now I need to pay the ransoms of everyone and also to get the ship back to my fleet..."
darkages_piracy.16.opta:0 "A bad decision..."
darkages_piracy.17.t:0 "Smugglers Caught!"
darkages_piracy.17.desc:0 "I was awakened at the earliest hours of the day with the news that a band of high profile smugglers were caught in my lands.\n\nThe rascals were in league with none other than [smuggler.GetName] that provided the ship from [smuggler.GetHerHis] pirate fleet. Now I must decide what I do..."
darkages_piracy.17.opta:0 "Use the loot to finance retribution!"
darkages_piracy.17.optb:0 "Just sell the loot..."
darkages_piracy.17.tt1:0 "You use the loot your forces manage to capture to finance an operation to significantly curb the piracy capabilities of [smuggler.GetName]. It will take some months to target [smuggler.GetHerHis] pirate ships but the deed will be done"
darkages_piracy.18.t:0 "Piracy Operation Curtailed!"
darkages_piracy.18.desc:0 "Recently I have noted that my pirate ships have been targeted by a strong fleet paid by [smuggler_victim.GetName], the rascal that managed to destroy my smuggle operation.\n\nThe effects on my pirate operation - and thus, my coffers - are significant and will probably be felt when my next batch of ships enter port..."
darkages_piracy.18.opta:0 "There's nothing to be done..."
darkages_piracy.19.tt1:0 "The success of this option depends for better or worse on your Intrigue and your Martial. It is positively influenced by being Deceitful, by being a Schemer, by being Shrewd, by being Callous and by being Arbitrary. It is negatively influenced by being Impatient, by being Wrathful and by being Dull\n"
darkages_piracy.19.t:0 "A Game of Spies"
darkages_piracy.19.desc:0 "Today, my [spymaster.GetCouncilTitle] approached me and asked for a ship of my pirate fleet to rescue an important spy who is operating in the lands of [hunter.GetName].\n\nAs things stand, if we don't act at once my man will be captured, secrets might be revealed and the damage done to my Prestige will be very significant.\n\nOf course, I can risk my ship, its Captain and its crew in order for everything to be silently solved... as befits the manners of these spies."
darkages_piracy.19.opta:0 "Proceed with the rescue operation"
darkages_piracy.19.optb:0 "Don't risk it"
darkages_piracy.20.t:0 "Successful Rescue!"
darkages_piracy.20.desc:0 "I received word in the first hours of the morning that my rescue operation to extricate a spy from the lands of [hunter.GetName] was a great success!\n\nEven if these matters are always discreet my Prestige is somewhat increased among my men, not least of them my spies. Even my usually dour [spymaster.GetCouncilTitle] looks happy!"
darkages_piracy.20.opta:0 "Excellent!"
darkages_piracy.21.t:0 "Failed Rescue..."
darkages_piracy.21.desc:0 "My attempt to save the spy operating in the lands of [hunter.GetName] ended in a complete disaster with my pirate ship captured and my crew rotting in prison!\n\nDue to the assurances I had made to the families of the involved I need to pay the ransom of everyone and also to recover my ship.\n\nWith the spy captured and revealing my secrets, unfortunately this sorry affair ended in an ignominious failure for me..."
darkages_piracy.21.opta:0 "Oh... my Prestige!"
darkages_piracy.22.t:0 "A Very Important Capture"
darkages_piracy.22.desc:0 "I was awaken today in the middle of the night with critical info regarding a spy operating by [rescuer.GetName] in my territory that was captured, together with the crew and the pirate ship owned by that nefarious character.\n\nThe good news don't stop there, however. Right now the spy is talking and confessing everything about her job and providing important info on the politics of [rescuer.GetName] Realm.\n\nA treasure trove of information that will increase my Prestige!\n\nI will negotiate the ransom of the crew and the ship in order to make some more gold from this great 'coup'!"
darkages_piracy.22.opta:0 "Great news!"
darkages_nick_the_pirate_king:0 "the Pirate King"
darkages_nick_the_pirate_queen:0 "the Pirate Queen"
darkages_piracy.23.t:0 "The Infamous One"
darkages_piracy.23.desc:0 "Thanks to the infamy of your pirate fleet that in a nefarious way makes you rise above your peers, you get famous and people around you show signs of starting to coin a legend about you and your deeds... It all starts with a nickname, after all!"
darkages_piracy.23.opta:0 "Stoke the flames of the legend!"
darkages_piracy.23.optb:0 "This is far below my real merit..."
darkages_piracy.24.t:0 "The Infamy of [player.GetName]"
darkages_piracy.24.desc:0 "As the owner of a pirate fleet my exploits spread far and wide. Ships arriving with plunder, tales of robbery on the high seas, prizes captured, unlucky merchants lead to ruin, all of this may contribute for people to fear me.\n\nIt remains to be seen if I want to be feared or not... after all, fear leads to anger, anger leads to hate... and hate may very well lead to an attempt on my life!"
darkages_piracy.24.opta:0 "Fan the flames of fear!"
darkages_piracy.24.optb:0 "Agree to reduce the tempo of piracy operations"
darkages_piracy.24.optc:0 "Pay compensation to some raided merchants"
darkages_piracy.24.tt1:0 "The Dread of a character may lead to an attempt on [player.GetHerHis] life. The higher the Dread, the higher the probability"
darkages_fleet_involved:0 "Pirate Fleet Supporting War"
darkages_fleet_involved_desc:0 "A pirate fleet owned by this character or an ally is involved in the current war effort by attacking enemy ships, blockading ports helping the enemy and harassing enemy trade routes"
darkages_piracy.25.t:0 "An Helping Hand"
darkages_piracy.25.desc:0 "As we are at war, my ally [ally.GetName] strongly urges me to  use my pirate fleet to cause all sorts of mischief against our enemies, thus increasing our advantage on the battlefield.\n\nIn the knowledge this will either turn my pirate operation much less effective or, if already very modest, demanding an investment in gold, I need to think about the long term implications of this decision..."
darkages_piracy.25.opta:0 "Divert my pirate resources to help war effort"
darkages_piracy.25.optb:0 "Increase piracy funding to help war effort"
darkages_piracy.25.optc:0 "Refuse to divert piracy resources"
darkages_piracy.25.tt1:0 "If you pick this option you, every character that can command one of your armies and your allies, including any of the characters that can command their armies will enjoy a bonus to combat advantage if engaged in a battle. Your piracy regular income might suffer, however\n"
darkages_piracy.25.tt2:0 "By picking this option you are refusing to divert piracy resources to help the war effort, thus causing a loss of Prestige due to your lack of involvement and an increase of Stress due to the higher risks your armies will face on the battlefield"
darkages_piracy.26.t:0 "For the Glory of the Faith!"
darkages_piracy.26.desc:0 "Religious scholars of my [ROOT.Char.GetFaith.GetAdjective] faith have been discussing with me different uses for my piracy operation, outside pure profit.\n\nAfter several meetings, the suggestion that is standing is to divert some of my piracy resources to pursue specifically enemies of our faith, thus giving my venture a religious angle. My own pirate operation will probably be crippled for some time.\n\nAlternatively, I can also fund the building of a few ships in the control of my religious subjects that will terrorize the seas of the unfaithful.\n\nIn the end, it all boils down to my judgement on the matter..."
darkages_piracy.26.opta:0 "Divert the resources"
darkages_piracy.26.optb:0 "Provide the necessary funds"
darkages_piracy.26.optc:0 "Profit trumps faith!"
darkages_piracy.26.tt2:0 "If you are the Head of Faith or you are Zealous you will suffer a large increase in Stress if you pick this option"
darkages_piracy.26.tt1:0 "If you are Cynical you will suffer an increase in Stress if you pick this option"
darkages_opinion_hate:0 "Hate"
darkages_piracy.27.t:0 "A Person of Interest"
darkages_piracy.27.desc:0 "After the latest arrival of a ship from my pirate fleet, a captured man claimed his liege would be willing to ransom him.\n\nWhile credibility was not given at the time, I received today a missive from [darkages_ruler.GetName] offering a good sum of gold for this man who is in effect a valuable advisor that was travelling as a passenger in the captured vessel.\n\nNow that I know the information is true, it is up to me to decide what to do..."
darkages_piracy.27.opta:0 "Demand the ransom from [darkages_ruler.GetName]"
darkages_piracy.27.optb:0 "Sell him in the slave market like everyone else"
darkages_piracy.27.optc:0 "Torture and kill him slowly, sending his head to his Liege"
darkages_piracy.27.tt1:0 "By picking this option, if your character is either Sadistic, or Callous, or Wrathful or Vengeful and is not Greedy you will increase your Stress"
darkages_piracy.27.tt2:0 "This option is available because your character is either Sadistic, or Callous, or Wrathful or Vengeful"
darkages_piracy.28.t:0 "Hunter or Hunted?"
darkages_piracy.28.desc:0 "Some weeks ago I received notice that one of my best pirate Captains was captured in an engagement off the [darkages_enemy.GetName]'s coast.\n\nI now have just received a missive from [darkages_enemy.GetHerHim] asking for a ransom to be paid for this important member of my piracy operation.\n\nIt is up to me to decide his fate, in the knowledge that should I refuse, my 'business' will suffer..."
darkages_piracy.28.opta:0 "Pay the ransom"
darkages_piracy.28.optb:0 "Abandon the Captain to his own luck"
darkages_piracy.28.tt1:0 "If you pick this option and are Greedy you will suffer some Stress"
darkages_fleet_convert:0 "Pirate Fleet Conversion"
darkages_fleet_convert_desc:0 "The Pirate fleet of this character has been converted into a Transport fleet"
darkages_piracy.29.t:0 "Pirate Fleet Conversion"
darkages_piracy.29.desc:0 "In these times of war, [darkages_steward.GetName], my Steward, has advised me that I can turn my Pirate ships into a transport fleet, thus reducing very significantly the cost of transporting my army by sea.\n\nWhether this is an expected prospect or not is up to me to decide..."
darkages_piracy.29.opta:0 "Good idea!"
darkages_piracy.29.optb:0 "I am not interested..."
darkages_opinion_county_pressed:0 "Population Pressed Into Service"
darkages_opinion_county_pressed_desc:0 "The population of this county is pressed into serving on the Pirate Fleet"
darkages_piracy.30.t:0 "Pressed Men"
darkages_piracy.30.desc:0 "Recent rumours of unhappiness within the people of my Domain have reached my ears, as a delegation of my own peasants is received by me.\n\nThey are concerned about being pressed into serving in my pirate fleet against their will and are asking for a bonus in gold to be divided among the pressed men for the next 10 years.\n\nI can accept their value or risk restlessness across my whole Domain..."
darkages_piracy.30.opta:0 "Accept their demands"
darkages_piracy.30.optb:0 "Refuse their demands"
boa_pay_ransom_interaction:0 "Pay Ransom"
darkages_lunacy_brings_death.02.tt3:0 "You are killed!"
darkages_lunacy_brings_death.02.tt2:0 "You escape unscathed"
darkages_train_combat.02.tt1:0 "No luck!"
darkages_train_combat.02.t:0 "Blademaster"
darkages_train_combat.02.desc:0 "Given my relevant Prowess and while I am training to improve it even more, my master attempts to teach me the perfect techniques of fighting, thus giving me a chance, based on his own Prowess, to attain a trait that portraits a certain level of expertise with arms.\n\nFate will decide if I am capable of learning from his teachings..."
darkages_train_combat.02.opta:0 "Let's hope for the best!"
darkages_opinion_county_propaganda:0 "Propaganda"
darkages_opinion_county_propaganda_desc:0 "The Chancellor of the owner of this County has been influencing the populace of the good intentions of the Liege"
darkages_chancellor.01.optb:0 "Publicly rebuke my [chancellor.GetCouncilTitle]'s attempt"
darkages_chancellor.01.opta:0 "Agree to follow my [chancellor.GetCouncilTitle]'s agenda"
darkages_chancellor.01.optc:0 "Gracefully refuse my [chancellor.GetCouncilTitle]'s attempt"
darkages_chancellor.01.t:0 "A Question of Influence"
darkages_chancellor.01.desc:0 "When [chancellor.GetName], my [chancellor.GetCouncilTitle], offered me [chancellor.GetHerHis] full effort and exertion to improve my standing among my peers and the populace of my Domain, in exchange for the furthering of [chancellor.GetHerHis] own personal agenda within the Council, I stand facing a dilemma I must solve.\n\nIf I agree on this pact with my [chancellor.GetCouncilTitle], I will alienate the other Councillors and risk their wrath..."
darkages_chancellor.01.tt1:0 "This option is available because you follow a Diplomacy Lifestyle"
darkages_chancellor.02.t:0 "Major Famine in [target_county_z.GetName]"
darkages_chancellor.02.desc:0 "During a meeting with my [chancellor.GetCouncilTitle], [chancellor.GetSheHe] pointed out to me the numbers of the harvest in [target_county_z.GetName] are extremely poor and the local populace is getting restless with the prospect of a major famine.\n\n[chancellor.GetName] then proceeded to lay out a plan to send [chancellor.GetHerHim] to the affected County in order to soothe the mood there.\n\nIt is plainly obvious there are risks associated with this voyage but in the end all must be done for the good of the Realm..."
darkages_chancellor.02.opta:0 "Send the [chancellor.GetCouncilTitle] to calm the populace"
darkages_chancellor.02.optb:0 "The people of [target_county_z.GetName] must fend for themselves"
darkages_chancellor.02.optc:0 "Develop an economic plan to help the county populace"
darkages_chancellor.03.t:0 "Major Political Success!"
darkages_chancellor.03.desc:0 "The mission my [chancellor.GetCouncilTitle] performed in [target_county_z.GetName] was an unmitigated success!\n\nBy talking and empathizing with the local representatives of the populace [chancellor.GetSheHe] was able to calm the tempers of everyone while my resources were left untouched.\n\nThanks to [chancellor.GetName]'s silver tongue, I achieved a great political victory at the internal level!"
darkages_chancellor.03.opta:0 "Capital!"
darkages_chancellor.04.t:0 "Minor Success"
darkages_chancellor.04.desc:0 "After returning from [target_county_z.GetName] my [chancellor.GetCouncilTitle] reported major difficulties in making [chancellor.GetHerHim]self heard among the rage that consumes my County.\n\nNevertheless, [chancellor.GetName] was able to calm the populace a bit and as a conclusion the voyage was not a total failure."
darkages_chancellor.04.opta:0 "The efforts of my [target_county_z.GetName] should be commended"
darkages_chancellor.05.t:0 "Disaster in [target_county_z.GetName]"
darkages_chancellor.05.desc:0 "A lone hooded rider coming from [target_county_z.GetName] left a terrible signal this morning at the gates of my capital.\n\nUpon opening the bag, my guards discovered inside the head of [chancellor.GetName], my [chancellor.GetCouncilTitle], with a note underscoring the rage felt by the populace of [target_county_z.GetName] and my inability to help them.\n\nThe mission my [chancellor.GetCouncilTitle] attempted to perform was seen as full of empty promises and plenty of emptier words.\n\nIn the face of this, the local mood only got worse than previously..."
darkages_chancellor.05.opta:0 "Poor and unfortunate developments..." 
darkages_chancellor.02.tt1:0 "The success of this option depends on the [chancellor.GetCouncilTitle]'s Diplomacy Skill, whether [chancellor.GetSheHe] has an education in Diplomacy or not, whether [chancellor.GetSheHe] is Shrewd and whether [chancellor.GetSheHe] is Dull"
darkages_spymaster.01.tt1:0 "The success of this option depends on the [spymaster.GetCouncilTitle] very good (>=15) Intrigue and the Traits Schemer, Eccentric and Deceitful. If the agent is captured you must expect a severe loss of Prestige as she is interrogated and confess her allegiance, while blowing away her network\n"
darkages_spymaster.01.tt2:0 "The success of this option depends on the [spymaster.GetCouncilTitle] very good (>=15) Intrigue, [spymaster.GetHerHis] Prowess and whether [spymaster.GetSheHe] is Shrewd or Dull. By picking this option you are placing the life of [spymaster.GetName] on the line\n"
darkages_spymaster.01.t:0 "A Burned Agent"
darkages_spymaster.01.desc:0 "[spymaster.GetName], my valued [spymaster.GetCouncilTitle], came to me with serious information regarding a valuable asset of [spymaster.GetHerHis] spy network in the court of [ruler.GetName] that has been providing accurate information about the region's political environment.\n\nUnfortunately, my [spymaster.GetCouncilTitle] was informed this important agent is now being discreetly investigated by the agents of [ruler.GetName] and probably, in a matter of months, she will be arrested, interrogated and certainly tortured to reveal... unpalatable truths about my spy network, among other valuable information.\n\nAnother agent of mine is already in place to kill the burned agent, thus securely preventing the worst to happen. Of course, given her stellar service so far, maybe I can consider a rescue mission personally lead by my [spymaster.GetCouncilTitle] but the outcome of that is far from being certain..."
darkages_spymaster.01.opta:0 "Signal to murder her"
darkages_spymaster.01.optb:0 "Warn her to flee"
darkages_spymaster.01.optc:0 "Attempt to rescue her"
darkages_spymaster.02.t:0 "A Successful Rescue!"
darkages_spymaster.02.desc1:0 "The rescue of the former secret agent proceeded smoothly and at this time she is being debriefed in a safe place. My [spymaster.GetCouncilTitle] recommends a minor sum to be offered to her in recognition for all her work and loyalty."
darkages_spymaster.02.desc2:0 "After a troubled rescue mission that saw my [spymaster.GetCouncilTitle] wounded, [spymaster.GetSheHe] arrived today telling me about the final success of the rescue mission of the former secret agent operating in the court of [ruler.GetName]. My [spymaster.GetCouncilTitle] recommends a minor sum to be offered to her in recognition for all her work and loyalty."
darkages_spymaster.02.opta:0 "Excellent job [spymaster.GetName]!"
darkages_spymaster.02.optb:0 "Great! Now to give this agent a special bonus..."
darkages_spymaster.02.tt1:0 "By picking this option your vassals that are not Greedy, Vengeful, Wrathful or Sadistic will approve of your decision getting a positive opinion modifier towards you. If your character is either Greedy, Vengeful, Wrathful or Sadistic you will suffer a Stress penalty\n"
darkages_spymaster.04.t:0 "An Utter Failure"
darkages_spymaster.04.desc:0 "A single survivor of the mission under the command of [spymaster.GetName] to rescue an important spy told me about the failure of the whole operation, the wipe out of the rescue team and the demise of my [spymaster.GetCouncilTitle] in the process.\n\nThis blunder, together with the capture of my valuable agent causes my Prestige to drop considerably... and I am in search for a new [spymaster.GetCouncilTitle]."
darkages_spymaster.04.opta:0 "Sad news..."
darkages_spymaster.03.t:0 "Unsuccessful Mission"
darkages_spymaster.03.desc:0 "After coming from [spymaster.GetHerHis] mission in the lands of [ruler.GetName], [spymaster.GetName], my [spymaster.GetCouncilTitle], reports about the failure of the mission and the capture of our agent there.\n\nAs my team fortunately returned without casualties, it is unfortunately expected that my agent will reveal any secrets she may possess regarding our spy networks, among other information.\n\nAs soon as my secrets are revealed I will receive a very significant blow to my Prestige..."
darkages_spymaster.03.opta:0 "Unfortunately..."
darkages_opinion_county_bad_harvest:0 "Bad Harvest"
darkages_opinion_county_bad_harvest_desc:0 "Faced with the famine caused by a bad harvest and without the prospect from proper outside help, the population of this County is not happy."
darkages_loyal_disloyal.01.t:0 "The Question of Loyalty"
darkages_loyal_disloyal.01.desc:0 "As I grow up, I find myself more bound to my word and honour, keeping my oaths towards other people or institutions and generally striving to be true towards everyone.\n\nThis rigid and demanding posture leads my personality to gravitate towards a loyal profile..."
darkages_loyal_disloyal.01.opta:0 "I have pride in my new trait"
darkages_loyal_disloyal.01.optb:0 "I go counter against my personality to avoid it"
darkages_loyal_disloyal.02.t:0 "A Question of Disloyalty"
darkages_loyal_disloyal.02.desc:0 "As I grow up, my independent outlook and my personal choices take full precedence over moral bindings of any sort.\n\nMy free will and detachment from moral obligations leads my personality to gravitate towards a disloyal profile..."
darkages_loyal_disloyal.02.opta:0 "I am what I am!"
darkages_loyal_disloyal.02.optb:0 "I go counter against my personality to avoid it"
darkages_relation_brings_death.01.tt2:0 "Your character is murdered"
darkages_dread_brings_death.03.t:0 "A Wise Warning"
darkages_dread_brings_death.03.desc:0 "My [spymaster.GetCouncilTitle] approaches me one day and whispers an advice regarding my way of governing the realm.\n\nIn [spymaster.GetHerHis] words, I should pay attention to the Dread I inspire on my subjects as it can lead to a sudden attempt on my life. The more the Dread, the bigger the chances are.\n\nIn the knowledge [spymaster.GetName] is paid to worry about possible developments and is alerted to every probability however small, I know I must proceed with caution..."
darkages_dread_brings_death.03.opta:0 "Thank you for the warning!"
darkages_dread_brings_death.04.t:0 "A Meaningful Warning"
darkages_dread_brings_death.04.desc:0 "My [spymaster.GetCouncilTitle] approaches me one day and whispers an advice regarding my way of governing the realm.\n\nIn [spymaster.GetHerHis] words, I should pay attention to the Tyranny I inflict on my subjects as it can lead to a sudden attempt on my life. The more the Tyranny, the bigger the chances are.\n\nIn the knowledge [spymaster.GetName] is paid to worry about possible developments and is alerted to every probability however small, I know I must proceed with caution..."
darkages_dread_brings_death.04.opta:0 "I'll keep your words in my mind..."
darkages_rival_diplomatic_blunder:0 "[TARGET_CHARACTER.GetShortUIName|U] and [CHARACTER.GetShortUIName] have a long standing disagreement regarding a diplomatic blunder."
darkages_chancellor.06.tt1:0 "The success of this option depends positively on the [chancellor.GetCouncilTitle]'s high Diplomacy Skill, whether [chancellor.GetSheHe] is a Diplomat and whether [chancellor.GetSheHe] is Shrewd. Negatively, whether the [chancellor.GetCouncilTitle] has a low Diplomacy Skill, whether [chancellor.GetSheHe] lacks an education in Diplomacy, whether [chancellor.GetSheHe] is Dull and whether [chancellor.GetSheHe] lacks any Dread"
darkages_chancellor.06.t:0 "A Serious Diplomatic Blunder"
darkages_chancellor.06.desc:0 "Recently an embassy I sent to the court of [ruler.GetName] was extremely incompetent in dealing with the political situation and caused a serious diplomatic blunder, accutely offending [ruler.GetHerHim].\n\nYesterday I received a missive from this aggrieved ruler stating in clear terms that unless I make amends, eternal hate will be in place between us.\n\nKnowing beforehand that sending my [chancellor.GetCouncilTitle] might backfire, turning a very bad situation to worst, I need to plan how I deal with this matter..."
darkages_chancellor.06.opta:0 "Send my [chancellor.GetCouncilTitle] to fix the issue"
darkages_chancellor.06.optb:0 "Pay a monetary compensation"
darkages_chancellor.06.optc:0 "Ignore the issue"
darkages_chancellor.07.t:0 "A Mended Relation"
darkages_chancellor.07.desc:0 "My [chancellor.GetCouncilTitle] reported today of a major success in [chancellor.GetHerHis] mission to assuage the feelings of [ruler.GetName]!\n\n[chancellor.GetSheHe|U] made a point in informing me how the matter was entirely cleared, stating my mind can be at rest regarding this issue."
darkages_chancellor.07.opta:0 "Excellent, [chancellor.GetFirstName]!"
darkages_chancellor.08.t:0 "Mixed Results"
darkages_chancellor.08.desc:0 "[chancellor.GetName], my [chancellor.GetCouncilTitle], arrived today from the court of [ruler.GetName] and was quickly lead to me to make [chancellor.GetHerHis] report.\n\nAlthough the worst consequences were avoided, it was clear [chancellor.GetSheHe] was unable to convince [ruler.GetName] of my good intentions in sending the embassy in first place.\n\nIn the end and although I avoided gaining a new rival, [ruler.GetName] has developed a lasting poor impression of me."
darkages_chancellor.08.opta:0 "Is the glass half filled or half empty?"
darkages_chancellor.09.t:0 "From Bad to Worst"
darkages_chancellor.09.desc:0 "To my chagrin, [chancellor.GetName] returned today from the court of [ruler.GetName] and was quick to inform me the mission was an utter failure.\n\nAfter being insulted by [ruler.GetName] [ruler.GetHerHim]self, my [chancellor.GetCouncilTitle] took an assertive stance thinking [chancellor.GetSheHe] would be successful in stating our reasons.\n\nUnfortunately the situation only got worse and in the end [chancellor.GetName] is grateful for leaving with [chancellor.GetHerHis] skin intact..."
darkages_chancellor.09.opta:0 "An unfortunate turn of events..."
darkages_chancellor.10.t:0 "A Private Initiative"
darkages_chancellor.10.desc:0 "I became aware today that [chancellor.GetName], my [chancellor.GetCouncilTitle], is planning to host a meeting with my foreign neighbors to discuss matters of political and diplomatic interest.\n\nAs [chancellor.GetSheHe] already probed everyone into attending, I am left with the option of funding the meeting or facing the loss of Prestige if I balk at this possibility.\n\nAs I feel a bit aggrieved regarding my [chancellor.GetCouncilTitle]'s behaviour, I need to make a decision now."
darkages_chancellor.10.opta:0 "Let the [chancellor.GetCouncilTitle] organize the meeting"
darkages_chancellor.10.optb:0 "Get personally involved"
darkages_chancellor.10.optc:0 "Do not fund the meeting"
darkages_chancellor.10.tt1:0 "You send the [chancellor.GetCouncilTitle] to welcome everyone and deliver the speech. By doing so you can reap or lose some Prestige, depending on the ability of your [chancellor.GetCouncilTitle]. The success of this option depends on your [chancellor.GetCouncilTitle]'s Diplomacy Skill, on whether [chancellor.GetSheHe] is Shrewd, Dull and whether [chancellor.GetSheHe] lacks an education in Diplomacy\n"
darkages_chancellor.10.tt2:0 "You take the lead on the meeting delivering your own speech. You can reap a significant amount of Prestige or risk more if you fail to cause a good impression. The success of this option depends on your Diplomacy Skill, on whether you are Shrewd, Dull, on your lack of an education in Diplomacy and whether you follow a Diplomatic Lifestyle or not\n"
darkages_chancellor.10.tt3:0 "You refuse to entertain your [chancellor.GetCouncilTitle] shenanigans. Depending on your Personality Traits, you might lose Stress\n"
darkages_chancellor.11.t:0 "A Successful Meeting"
darkages_chancellor.11.desc:0 "The meeting with my foreign neighbours was a diplomatic coup for me!\n\nMy [chancellor.GetCouncilTitle] was able to deliver an inspired speech and a lot of common ground was found among everyone. Some important deals were reached and I stand to profit from the insights gained in terms of diplomacy and strategic thinking.\n\nAll in all a major success!"
darkages_chancellor.11.tt1:0 "Besides the displayed consequences, every top foreign independent neighbour of yours will increase the opinion about you"
darkages_regional_meeting:0 "Successful Regional Meeting"
darkages_regional_meeting_desc:0 "You organized a meeting with your neighbours that was a success"
darkages_chancellor.11.opta:0 "Great!"
darkages_chancellor.12.t:0 "A Major Flop"
darkages_chancellor.12.desc:0 "The meeting with my foreign neighbours was an embarrassing mess for me.\n\nMy [chancellor.GetCouncilTitle] made a fool of [chancellor.GetHerHim]self in front of every foreign dignitary present.\n\nAll in all a significant failure that will decrease my Prestige..."
darkages_chancellor.12.opta:0 "I need to have a word or three with my [chancellor.GetCouncilTitle]..."
darkages_chancellor.13.t:0 "A Great Performance"
darkages_chancellor.13.desc:0 "The meeting with my foreign neighbours was a diplomatic coup for me!\n\nI was able to deliver an inspired speech and a lot of common ground was found among everyone. Some important deals were reached and I stand to profit from the insights gained in terms of diplomacy and strategic thinking.\n\nAll in all a major success!"
darkages_chancellor.13.tt1:0 "Besides the displayed consequences, every top foreign independent neighbour of yours will increase the opinion about you"
darkages_chancellor.13.opta:0 "Great!"
darkages_chancellor.14.t:0 "A Major Flop"
darkages_chancellor.14.desc:0 "The meeting with my foreign neighbours was an embarrassing mess for me.\n\nI made a fool of myself in front of every foreign dignitary present.\n\nAll in all a significant failure that will decrease my Prestige..."
darkages_chancellor.14.opta:0 "A missed opportunity..."
darkages_chancellor.15.t:0 "Internal Schemes"
darkages_chancellor.15.desc:0 "[chancellor.GetName], my valuable [chancellor.GetCouncilTitle], came to me with the idea for an initiative to use some guile and cunning to improve my standing among my vassals.\n\nThe plan calls for a risky move where I will first lose some Prestige thanks to an apparent political mistake, to later be portrayed as the victim of a falsehood, thus manipulating my vassals into improving their opinions about me and recouping the lost Prestige.\n\nIn the knowledge I am not the one calling the shots, I must make a decision about giving the green light to this political maneuvre."
darkages_chancellor.15.opta:0 "Go ahead, [chancellor.GetFirstName]!"
darkages_chancellor.15.optb:0 "I'll involve myself further"
darkages_chancellor.15.optc:0 "No way to go ahead with this..."
darkages_chancellor.15.tt3:0 "You refuse to go ahead with the plan. If you are either Gregarious, or Diligent, or Shrewd, or Diplomat, or Deceitful or Schemer or if you follow a Diplomacy Lifestyle you will increase your Stress\n"
darkages_chancellor.15.tt2:0 "You green light the plan and involve yourself further in the whole manipulation. It will give more chances of success but if your [chancellor.GetCouncilTitle]'s plan fails you will suffer further consequences. The success of the plan depends positively on the high Diplomacy of your [chancellor.GetCouncilTitle], on [chancellor.GetHerHim] being Shrewd, and to a lesser extent on your high Diplomacy and on your high Dread. Conversely, the failure depends on the [chancellor.GetCouncilTitle] medium to low Diplomacy, on [chancellor.GetHerHim] being Dull, on [chancellor.GetHerHis] lack of a Diplomatic Education, on your low Diplomacy Skill and on your nil Dread. The modifiers of your [chancellor.GetCouncilTitle] impact more than your own\n"
darkages_chancellor.15.tt1:0 "You green light the plan. The success of the plan depends positively on the high Diplomacy of your [chancellor.GetCouncilTitle], on [chancellor.GetHerHim] being Shrewd and to a lesser extent on your high Diplomacy and on your high Dread. Conversely, the failure depends on the [chancellor.GetCouncilTitle] medium to low Diplomacy, on [chancellor.GetHerHim] being Dull, on [chancellor.GetHerHis] lack of a Diplomatic Education, on your low Diplomacy Skill and on your nil Dread. The modifiers of your [chancellor.GetCouncilTitle] impact more than your own\n"
darkages_opinion_disgusted:0 "Disgusted"
darkages_chancellor.16.t:0 "Successful Plan"
darkages_chancellor.16.desc:0 "My [chancellor.GetCouncilTitle]'s plan was a great success and my vassals were fooled into believing in the whole story.\n\nThese are sound news to my own credibility among my vassals!"
darkages_chancellor.16.opta:0 "Prime!"
darkages_chancellor.17.t:0 "Failed Plan"
darkages_chancellor.17.desc1:0 "My [chancellor.GetCouncilTitle]'s plan was a huge disaster and my vassals saw through the whole mystification...\n\nUnfortunately, my Prestige suffers and everybody is disgusted with my attitude..."
darkages_chancellor.17.desc2:0 "My [chancellor.GetCouncilTitle]'s plan was a huge disaster and my vassals saw through the whole mystification...\n\nThe consequences of this failure are significantly harsher due to my personal involvement in the whole lie.\n\nUnfortunately, my Prestige suffers dearly and everybody is enraged by my attitude..."
darkages_chancellor.17.opta:0 "Oh no!"
darkages_spymaster.05.t:0 "An Important Arrest"
darkages_spymaster.05.desc1:0 "For a long time my [spymaster.GetCouncilTitle] has been trying to capture an elusive spy.\nFor long, she proved to be a shadow that only left hints long after her operations were finished.\n\nFinally she committed a mistake that lead [spymaster.GetName] to discover she is an agent and a relative of [enemy_ruler.GetName].\n\nAn arrest was made and now it is up to me what to do with this... unpalatable character."
darkages_spymaster.05.desc2:0 "For a long time my [spymaster.GetCouncilTitle] has been trying to capture an elusive spy.\nFor long, he proved to be a shadow that only left hints long after his operations were finished.\n\nFinally he committed a mistake that lead [spymaster.GetName] to discover he is an agent and a relative of [enemy_ruler.GetName].\n\nAn arrest was made and now it is up to me what to do with this... unpalatable character."
darkages_spymaster.05.opta:0 "Scheme to convince the spy to cooperate"
darkages_spymaster.05.optb:0 "Seduce the spy to cooperate with us"
darkages_spymaster.05.optc:0 "Torture the spy to steal all information"
darkages_spymaster.05.optd:0 "Ransom the spy"
darkages_spymaster.05.tt1:0 "Positively influencing this outcome are your [spymaster.GetCouncilTitle]'s Intrigue Skill and whether [spymaster.GetSheHe] is a Schemer or Deceitful. Negatively influencing this option is whether your [spymaster.GetCouncilTitle] has an average or worse Intrigue Skill, whether [spymaster.GetSheHe] lacks an Intrigue Education and whether [spymaster.GetSheHe] is Honest or Just"
darkages_spymaster.05.tt2:0 "Positively influencing this outcome are your [spymaster.GetCouncilTitle]'s Intrigue Skill and whether [spymaster.GetSheHe] is a Seducer or Lustful. Negatively influencing this option is whether your [spymaster.GetCouncilTitle] has an average or worse Intrigue Skill, whether [spymaster.GetSheHe] lacks an Intrigue Education and whether [spymaster.GetSheHe] is Wrathful or Chaste"
darkages_spymaster.05.tt3:0 "This option provides better base success chance than the above ones. If your character is either Compassionate, Forgiving, Just or Honest there will be an increase in Stress. Positively influencing this outcome are your [spymaster.GetCouncilTitle]'s Intrigue Skill and whether [spymaster.GetSheHe] is a Torturer or Sadistic. Negatively influencing this option is whether your [spymaster.GetCouncilTitle] has an average or worse Intrigue Skill, whether [spymaster.GetSheHe] lacks an Intrigue Education and whether [spymaster.GetSheHe] is Compassionate or Forgiving\n"
darkages_powerful_spy_network_defeated:0 "Powerful Spy Network Defeated"
darkages_powerful_spy_network_defeated_desc:0 "The spymaster of this character managed to disband a powerful spy network operating in the realm"
darkages_spymaster.06.t:0 "Spy Confesses"
darkages_spymaster.06.desc1:0 "Thanks to the great efforts of my [spymaster.GetCouncilTitle], the enemy spy confessed everything!\n\nAs she revealed the info we manage to capture the whole network.\n\nOf particular interest is the fact that my own courtier [another_spy.GetName] was also spying for [enemy_ruler.GetName] thus betraying my personal trust in [another_spy.GetHerHim]..."
darkages_spymaster.06.desc2:0 "Thanks to the great efforts of my [spymaster.GetCouncilTitle], the enemy spy confessed everything!\n\nAs he revealed the info we manage to capture the whole network.\n\nOf particular interest is the fact that my own courtier [another_spy.GetName] was also spying for [enemy_ruler.GetName] thus betraying my personal trust in [another_spy.GetHerHim]..."
darkages_spymaster.06.opta:0 "Praise the whole operation and forgive [another_spy.GetName]"
darkages_spymaster.06.optb:0 "Praise the whole operation and execute [another_spy.GetName]"
darkages_failed_interrogation:0 "Failed Interrogation"
darkages_failed_interrogation_desc:0 "The spymaster of this character was unable to get information out of a captured enemy spy"
darkages_spymaster.07.t:0 "Failed Interrogation"
darkages_spymaster.07.desc1:0 "The interrogation of the foreign spy at the service of [enemy_ruler.GetName] was a failure as she refuses to provide further information of her involvement, thus protecting the whole network.\n\nUnfortunately the only consolation prize we have is to let this important spy to rot in my dungeons..."
darkages_spymaster.07.desc2:0 "The interrogation of the foreign spy at the service of [enemy_ruler.GetName] was a failure as he refused to provide further information of her involvement, thus protecting the whole network.\n\nUnfortunately the only consolation prize we have is to let this important spy to rot in my dungeons..."
darkages_spymaster.07.opta:0 "A pyrrhic victory..."
darkages_spymaster.08.t:0 "A Stranded Relative"
darkages_spymaster.08.desc:0 "My [spymaster.GetCouncilTitle] asked for an urgent meeting today regarding a very valuable foreign asset [spymaster.GetSheHe] controls who is from my Dynasty and that is working for me undercover in the court of [darkages_ruler.GetName].\n\nThe spy in question is none other than [family.GetName] and the problem is that we have information that [family.GetSheHe] is about to be discovered, arrested and probably killed.\n\n[spymaster.GetName] is asking me to fund a special and dangerous mission to rescue [spymaster.GetHerHis] agent and save [family.GetHerHim] from an horrible fate..."
darkages_spymaster.08.opta:0 "Proceed with the mission"
darkages_spymaster.08.optb:0 "I'll personally lead the mission"
darkages_spymaster.08.optc:0 "Forget [family.GetName]"
darkages_spymaster.08.tt1:0 "You order your [spymaster.GetCouncilTitle] to execute the mission. The success depends on [spymaster.GetHerHis] high Intrigue Skill, on [spymaster.GetHerHis] high Prowess and on being Brave. The failure of the mission depends on your [spymaster.GetCouncilTitle] medium to low Intrigue Skill, on a low Prowess, on the lack of an Intrigue Education and on your [spymaster.GetCouncilTitle] being Craven"
darkages_spymaster.08.tt2:0 "Sensing an opportunity to bask in a lot of Prestige, you will plan and participate in the whole operation. The success depends on your high Intrigue Skill, on your high Prowess and on being Brave. The failure of the mission depends on your low Intrigue Skill, on a low Prowess, on the lack of an Intrigue Education and on being Craven"
darkages_spymaster.08.tt3:0 "You abandon your relative to [family.GetHerHis] own fate. If you are Compassionate, Just, Honest or Loyal your Stress will increase"
darkages_spymaster.11.tt1:0 "Will increase Stress if your character is not Cynical\n"
darkages_spymaster.09.t:0 "A Bridge Too Far"
darkages_spymaster.09.desc:0 "[spymaster.GetName] returned from the dangerous mission in [darkages_ruler.GetName]'s lands reporting more than half the rescue team dead and a mission failure.\n\nUnfortunately I was unable to save [family.GetName]..."
darkages_spymaster.09.opta:0 "It brings me great pain..."
darkages_spymaster.10.t:0 "A Successful Extrication"
darkages_spymaster.10.desc:0 "My [spymaster.GetCouncilTitle] arrived today from the dangerous mission performed in the lands of [darkages_ruler.GetName] reporting a huge success!\n\nIn effect, [spymaster.GetName] was able to plan and execute a great mission, saving the life of [family.GetName] and bringing Prestige to me and my own Dynasty!"
darkages_spymaster.10.opta:0 "Excellent job!"
darkages_spymaster.11.t:0 "A Bridge Too Far"
darkages_spymaster.11.desc1:0 "The risky mission I planned and commanded into [darkages_ruler.GetName]'s territory was a failure. A few of my party lost their lives but I was fortunate to escape unscathed. Unfortunately, we were unable to rescue [family.GetName]..."
darkages_spymaster.11.desc2:0 "The risky mission I planned and commanded into [darkages_ruler.GetName]'s territory was a failure. Some of my party lost their lives and I was fortunate to escape only lightly wounded. Unfortunately, we were unable to rescue [family.GetName]..."
darkages_spymaster.11.desc3:0 "The risky mission I planned and commanded into [darkages_ruler.GetName]'s territory was a failure. My party suffered considerable casualties and I paid a significant price with my blood. Unfortunately, we were unable to rescue [family.GetName]..."
darkages_spymaster.11.desc4:0 "The risky mission I planned and commanded into [darkages_ruler.GetName]'s territory was a failure. Most of my party was wiped out and I arrived at my capital barely alive. Unfortunately, we were unable to rescue [family.GetName]..."
darkages_spymaster.11.opta:0 "A personal failure..."
darkages_spymaster.12.t:0 "A Living Legend"
darkages_spymaster.12.desc1:0 "In a monumental action, I personally commanded the rescue party that entered deeply into [darkages_ruler.GetName]'s territory to save [family.GetName] from a certain death.\n\nWhat's more, everyone in the party escaped unscathed from such a dangerous mission!"
darkages_spymaster.12.desc2:0 "In a monumental action, I personally commanded the rescue party that entered deeply into [darkages_ruler.GetName]'s territory to save [family.GetName] from a certain death.\n\nA few lives were lost in the party but I escaped weith only light wounds from such a dangerous mission!"
darkages_spymaster.12.desc3:0 "In a monumental action, I personally commanded the rescue party that entered deeply into [darkages_ruler.GetName]'s territory to save [family.GetName] from a certain death.\n\nWe took moderate casualties and I paid a significant price with my blood as a toll for undertaking such a dangerous mission!"
darkages_spymaster.12.desc4:0 "In a monumental action, I personally commanded the rescue party that entered deeply into [darkages_ruler.GetName]'s territory to save [family.GetName] from a certain death.\n\nHalf of my party was wipoed out and I escaped with my life hanging by a thread.\n\nSuch was the price to pay for undertaking such a dangerous mission!"
darkages_spymaster.12.opta:0 "What an heroic deed!"
darkages_intrusive_internal_security:0 "Intrusive Internal Security"
darkages_internal_security:0 "Expanded Internal Security"
darkages_internal_security_desc:0 "The internal security of this character's realm is heightened and more competent than normal"
darkages_spymaster.14.t:0 "Internal Security"
darkages_spymaster.14.desc:0 "In this week's personal briefing my [spymaster.GetCouncilTitle] warned me the internal security of my Realm could very well be improved if I provide the necessary funds to expand the list of informers within my borders.\n\n[spymaster.GetFirstName] continued stating that while the sum demanded is significant, my safety should be placed at the center of my policy and the gold provided would be enough to pay the expenses for a period around 10 years.\n\nIn the knowledge my vassals will not be happy with more intrusion over their own domain, we agreed I would think over the matter and came up with a final decision soon..."
darkages_spymaster.14.opta:0 "Expand the internal security of the Realm"
darkages_spymaster.14.optb:0 "Dismiss the idea"
darkages_spymaster.14.tt1:0 "An increase of Stress happens if your character is either Paranoid, Deceitful, Callous, Arbitrary or Disloyal\n"
trait_darkages_hero:0 "Hero"
trait_darkages_hero_desc:1 "Others look upon the example set by this character and rein in their awe"
trait_darkages_hero_character_desc:0 "Others look upon the example set by [ROOT.GetCharacter.GetNameNoTooltip] and rein in their awe"
trait_darkages_experienced_politician:0 "Cunning Politician"
trait_darkages_experienced_politician_desc:0 "This character delved deeply in the intricacies of politics and gained very relevant experience in the process"
trait_darkages_experienced_politician_character_desc:0 "[ROOT.GetCharacter.GetNameNoTooltip] delved deeply in the intricacies of politics and gained very relevant experience in the process"
darkages_death_heroic:0 "Died performing an heroic deed"
darkages_hero.01.t:0 "Heroic Deed"
darkages_hero.01.desc1:0 "One day when I was strolling in the company of [courtier.GetName] a shadow materialized in front of us, crossbow in hand.\n\n With the bolt pointing at the heart of my poor companion, my instinct immediately told me it was a murder attempt on [courtier.GetHerHis] life..."
darkages_hero.01.desc2:0 "One day when I was strolling along a large pond in the company of [courtier.GetName], I left [courtier.GetHerHim] for an instant and when I came back I saw my poor courtier inside the pond lacking any swimming knowledge and furiously fighting to come to the surface.\n\nLooking to the whole scene, I was certain someone tried to kill [courtier.GetName]!\n\nWithout any knowledge of swimming I stood there, looking at the hapless soul drowning [courtier.GetHerHim]self in the water..."
darkages_hero.01.desc3:0 "One day when I was visiting a tower that sorely needed remodelations in the company of [courtier.GetName], I left [courtier.GetHerHim] for an instant and when I came back I saw my poor courtier dangling from the battlement of the balcony, feet dangling in the air.\n\nUpon closer inspection I saw [courtier.GetHerHis] assassin dead ten meters down on the ground.\n\nI tried to help [courtier.GetName] but it soon became clear the attempt was a very risky one as I might fall down too..."
darkages_hero.01.desc4:0 "One day when I was hunting in the company of [courtier.GetName], I spotted someone conceled within the trees with a bow pointed in the direction of my courtier.\n\n In an instant I knew this was a murder attempt on [courtier.GetHerHis] life..."
darkages_hero.01.opta1:0 "Throw my body between the assassin and my courtier!"
darkages_hero.01.opta2:0 "Jump to the water and try to save my courtier!"
darkages_hero.01.opta3:0 "Continue my efforts to save the courtier, even if I fall!"
darkages_hero.01.opta4:0 "Throw my body between the assassin and my courtier!"
darkages_hero.01.optb:0 "Do nothing..."
darkages_hero.01.tt1:0 "You risk your life in order to save [courtier.GetName]"
darkages_spymaster.15.t:0 "Sweet, Manipulative Lies"
darkages_spymaster.15.desc:0 "In my morning briefing, my [spymaster.GetCouncilTitle] brought to my attention the possibility of executing an operation to frame [framed.GetName], thus decreasing immensely [framed.GetHerHis] Prestige and most important of all, to turn [framed.GetHerHis] vassals against [framed.GetHerHim]self.\n\nWhile the plan proves to be expensive, the damage done might be the prelude of a more direct means of attack and will probably cause lots of problems to the ruler.\n\nIn the knowledge there are no certainties before the mission is attempted I am faced with the dilemma of sanctioning the operation or not..."
darkages_spymaster.15.opta:0 "Sanction the operation!"
darkages_spymaster.15.optb:0 "Better to avoid unnecessary risks..."
darkages_spymaster.15.tt2:0 "If your character is either Deceitful, Callous, Sadistic, Arbitrary or Schemer there is a penalty to Stress incurred by picking this option\n"
darkages_spymaster.15.tt1:0 "This option only tests the [spymaster.GetCouncilTitle] skills, stats and traits. The success of this option is influenced negatively by a medium to low Intrigue Stat, by the lack of an Intrigue Education, by being Dull, Just, Honest, Slow, Loyal, Stupid or Imbecile. Positively influencing the outcome is a high Intrigue Skill, being Deceitful, Arbitrary, Disloyal or a Schemer\n"
darkages_reason_rival_framed:0 "[TARGET_CHARACTER.GetShortUIName|U] enraged [CHARACTER.GetShortUIName|U] by attempting to frame [TARGET_CHARACTER.GetHerHim]."
darkages_spymaster.16.t:0 "Dangerous Failure"
darkages_spymaster.16.desc:0 "My attempts to frame [framed.GetName] suffered a final setback when [framed.GetHerHis] Spymaster was successful in discovering who was behind the plot.\n\nAs [framed.GetSheHe] became aware of what was going on, [framed.GetFirstName] was keen to expose me to [framed.GetHerHis] social circle and the plan of my [spymaster.GetCouncilTitle] was foiled..."
darkages_spymaster.16.opta:0 "I even accrued a new rival..."
darkages_opinion_framed:0 "Framed!"
darkages_framed:0 "Framed!"
darkages_framed_desc:0 "This character has been framed and the social skills suffer immensely"
darkages_spymaster.17.t:0 "A Ruined Reputation!"
darkages_spymaster.17.desc:0 "My [spymaster.GetCouncilTitle] plan to frame [framed.GetName] was a complete success and now [framed.GetSheHe] is feeling the whole effects in [framed.GetHerHis] reputation.\n\nAt this point [framed.GetHerHis] social circle treat [framed.GetName] as a pariah!"
darkages_spymaster.17.opta:0 "Congrats to my dear [spymaster.GetFirstName]!"
darkages_spymaster.19.t:0 "A Failed Attempt"
darkages_spymaster.19.desc:0 "[spymaster.GetName], my valorous [spymaster.GetCouncilTitle], warned me just in time that a complex operation to frame me was underway on the orders of none other than [darkages_schemer.GetName].\n\nI swiftly rounded my Council, my Court and my Vassals to warn them of the nefarious plot.\n\nFortunately it all ended well thanks to the efforts of my [spymaster.GetCouncilTitle]!"
darkages_spymaster.21.desc:0 "My own gut feelings and subtle intuition guided the investigation into the attempt to cause my social disgrace.\n\nBesides the resounding success of my quest, I was able to pinpoint the mastermind behind such nefarious deed.\n\nIt was none other than the vile [darkages_schemer.GetName]!\n\nI was swift to round my Council, my Court and my Vassals to warn them of this whole affair."
darkages_spymaster.19.opta:0 "A job magnificently done!"
darkages_spymaster.19.optb:0 "I want the blood of that rascal!"
darkages_spymaster.20.desc:0 "The distant looks, the compromised sentences, the distance everyone keeps from me, the whispers on my back...\n\nIt took me a while but now I am certain that a complex defamation plot was planned to target me and unfortunately it was successful!\n\nI have been framed by the lies of someone that stands in the shadows, waiting for the time to strike..."
darkages_spymaster.20.t:0 "Framed!"
darkages_spymaster.20.opta:0 "Rats!"
darkages_spymaster.18.t:0 "A Serious Warning"
darkages_spymaster.18.desc:0 "My [spymaster.GetCouncilTitle] arrived today at the inner Council and pressed me to discuss a matter only with [spymaster.GetHerHim].\n\nAs it stands, there is a plot being devised by an unknown agent that is trying to defame and frame me, thus causing havoc in my personal relations.\n\nOf major concern will be the reaction of my Vassals as the balance of power within my Realm might change abruptly.\n\nIn the knowledge there is still time for my [spymaster.GetCouncilTitle] to prevent the horrible deed, I must be on my guard for the worst to happen."
darkages_spymaster.18.opta:0 "Provide additional funds for the investigation"
darkages_spymaster.18.optb:0 "Trust in the present resources available to [spymaster.GetFirstName]"
darkages_spymaster.18.optc:0 "Take the investigation in my own hands"
darkages_spymaster.18.tt2:0 "The success of this option depends on your [spymaster.GetCouncilTitle]'s Intrigue Skill and on [spymaster.GetHerHim] being a Schemer. Your Vassals, Courtiers and Guests will become wary regarding the investigation underway\n"
darkages_spymaster.18.tt1:0 "Thanks to your tight control of the finances for this operation, you will save precious gold this way. The success of this option depends on your Intrigue Skill and on being a Schemer. Beware any positive or negative effects influence more than those of the first option.  Your Vassals, Courtiers and Guests will become wary regarding the investigation underway\n"
darkages_marshal.01.tt1:0 "The success of this action is positively influenced by a high Learning, by being Patient, by being Diligent, by being a Scholar, and by being Quick, Intelligent or a Genius. Negatively influencing the success of this option is a low Learning Skill, being Impatient, being Lazy, being Slow, being Stupid or being Imbecile\n"
darkages_marshal.01.t:0 "A Chance to Learn"
darkages_marshal.01.desc:0 "Recently my [marshal.GetCouncilTitle] came up with the idea of hiring a very talented individual to teach some of us in my Realm the arts of guerrilla warfare.\n\nNow, the important bit is that I am supposed to attend the whole class, thus improving my skills in this particular type of warfare.\n\nOf course, if I fail to learn the subject matter, I will cause a bad impression that soon will be made public.\n\nIn the end and to protect my status, I'll either refuse financing the course for everyone or accept and participate in all the endeavour..."
darkages_marshal.01.optb:0 "Refuse to finance the course"
darkages_marshal.01.opta:0 "Organize the course"
darkages_marshal_guerrilla:0 "Guerrilla Tactics"
darkages_marshal_guerrilla_desc:0 "This character has a deep understanding of guerrilla warfare"
darkages_marshal.02.t:0 "Lessons Learned"
darkages_marshal.02.desc:0 "Thanks to the idea of [marshal.GetName] - my dedicated [marshal.GetCouncilTitle] - and my dedication to study over the last months I was able to learn all the intricacies of guerrilla warfare and can now apply what I learn in real life conditions.\n\nIn the end, while I risked my gold and my Prestige on it, this project was a huge success!"
darkages_marshal.02.opta:0 "Excellent!"
darkages_marshal.03.tt1:0 "Besides the Prestige and Stress hits, all the Councillors and Vassals that are not Compassionate or Forgiving will be unimpressed by your lack of capability to learn about guerrilla warfare\n"
darkages_marshal.03.t:0 " A Stain on Your Military Knowledge"
darkages_marshal.03.desc:0 "I have attended the learning sessions about guerrilla warfare but was unable to understand the key concepts of it.\nIn the end it was clear that the subject matter eluded me..."
darkages_marshal.03.opta:0 "Unfortunately it was a dismal failure..."
darkages_marshal.04.t:0 "Advanced Recruiting Centres"
darkages_marshal.04.desc:0 "[marshal.GetName], my enterprising [marshal.GetCouncilTitle], came up yesterday with a plan to increase the amount of levies at my orders for a period of 10 years.\n\nThis means an upfront investment on the recruit centres present in my vassal's lands to place a premium that will entice more people to join my army.\n\nAs the matter rests in the hands of [marshal.GetFirstName] and in the knowledge this effort can strike a sensible chord with my vassals, I can only hope that [marshal.GetSheHe] performs well..."
darkages_marshal.04.opta:0 "Go ahead with the plan, [marshal.GetFirstName]!"
darkages_marshal.04.optb:0 "Better to avoid nagging my vassals"
darkages_marshal.02.tt1:0 "The success of this action will depend only on your [marshal.GetCouncilTitle] capabilities. It is influenced positively by [marshal.GetHerHis] high Martial and Diplomacy Skills and by having some Dread. It is influenced negatively by having a medium or low Martial Skill or a low Diplomacy Skill\n"
darkages_marshal_levies:0 "Expansive Recruit Centres"
darkages_marshal_levies_desc:0 "This character has expansive recruit centres across the vassal's lands"
darkages_opinion_irritated:0 "Irritated"
darkages_marshal.05.t:0 "A Great Performance"
darkages_marshal.05.desc:0 "[marshal.GetName] was able to persuade my vassals of the benign intentions of our actions and as thing stand I will have at my disposal a much bigger recruit base than in the past for the next ten years!"
darkages_marshal.05.opta:0 "A job well done, [marshal.GetCouncilTitle]!"
darkages_marshal.06.t:0 "The Antics of my [marshal.GetCouncilTitle]"
darkages_marshal.06.desc:0 "[marshal.GetName] failed miserably into persuading my vassals of the benign intentions of our actions.\n\nIn effect, [marshal.GetSheHe] blundered [marshal.GetHerHis] way in dealing with everyone, acting rashly and senselessly at times.\n\nIn the end my vassal's opinion of me suffered a setback..."
darkages_marshal.06.opta:0 "A costly mistake!"
darkages_marshal.07.t:0 "Lessons of Warfare"
darkages_marshal.07.desc:0 "In yesterday meeting, [marshal.GetName], my useful [marshal.GetCouncilTitle], suggested he could teach me [marshal.GetHerHis] trade, thus preparing me better for a warfare life, if I spend time everyday close to [marshal.GetHerHim] while [marshal.GetSheHe] performs [marshal.GetHerHis] job.\n\nBesides attracting the envy of the other Councillors, the offer is tempting but certainly by spending so much time with [marshal.GetHerHim] I will neglect other areas of managing my Realm..."
darkages_opinion_envy:0 "Envy"
darkages_marshal.07.opta:0 "Plunge into martial matters"
darkages_marshal.07.optb:0 "Refuse the suggestion of the [marshal.GetCouncilTitle]"
darkages_marshal.07.tt1:0 "Your refusal creates an awkward working environment between you and your [marshal.GetCouncilTitle] that leads to difficulties in your pursuit of knowledge in martial matters\n" 
darkages_marshal_martial_focus:0 "Martial Focus"
darkages_marshal_martial_focus_desc:0 "This character is spending a significant amount of time studying military matters at the cost of other areas"
darkages_marshal.08.t:0 "Créme de la Créme"
darkages_marshal.08.desc:0 "My enterprising [marshal.GetCouncilTitle] shared with me an idea [marshal.GetSheHe] came up with regarding the improvement of my less performant $knight_culture_player_plural_no_tooltip$ and their retinues.\n\nIn [marshal.GetHerHis] suggestion, [marshal.GetName] told me [marshal.GetSheHe] would provide intensive theoretical knowledge to the $knight_culture_player_plural_no_tooltip$ and their retinues over a period of one month hoping to improve their Prowess.\n\nOf course, given the nature of the subject at hand, the Learning Skill of each $knight_culture_player_no_tooltip$ would be tested to see how effective the train become.\n\nNow I am faced with the decision to green light the training as that will cost a significant amount of resources."
darkages_marshal.08.opta:0 "Agree to provide the funds"
darkages_marshal.08.optb:0 "Don't support the idea"
darkages_marshal.08.tt1:0 "All your $knight_culture_player_plural_no_tooltip$ with less than 17 Prowess will have a chance of improving it, influenced by their Learning Skill\n"
darkages_marshal.09.t:0 "Training Finished"
darkages_marshal.09.desc:0 "The intensive training is now almost complete and I can check my cadre of $knight_culture_player_plural_no_tooltip$ to see how each one has improved..."
darkages_marshal.09.opta:0 "See them in action"
darkages_marshal.09.tt1:0 "After pressing the option you can go check how much each $knight_culture_player_plural_no_tooltip$ has improved\n"
darkages_lack_of_cohesive_strength:0 "Lack of Cohesive Strength"
darkages_lack_of_cohesive_strength_desc:0 "The armies this character command don't form a seamless entity with this character's martial Skill"
darkages_marshal.10.t:0 "Lack of Cohesion"
darkages_marshal.10.desc:0 "My [marshal.GetCouncilTitle] reports my troops lack training with the current commanders in the realm.\n\nThis will cause a significant degradation of performance on the battlefield if commanded by the present cadre of generals, myself included.\n\nIf I so choose, I can address this situation by staging complex and expensive manoeuvres with everyone involved."
darkages_marshal.10.opta:0 "Pay for the manoeuvres"
darkages_marshal.10.optb:0 "Allow fighting standards to slip"
darkages_opinion_county_building_investments:0 "Construction Investments"
darkages_opinion_county_building_investments_desc:0 "A very significant amount of construction infrastructure has been assigned to this County"
darkages_steward.01.tt1:0 "Influencing positively the outcome of this option is the good Stewardship Skill of the [steward.GetCouncilTitle] and the existence of [steward.GetHerHis] Architect trait. Influencing negatively the outcome of this option is an average to low Stewardship Skill of the [steward.GetCouncilTitle] and the lack of a Stewardship education\n"
darkages_steward.01.tt2:0 "The Ruler can be inspired by the [steward.GetCouncilTitle] ideas and plans and implement everything based in the vision conjured. In this case and if successful, an increase in Prestige and Renown are to be expected. Influencing positively the outcome of this option is the good Stewardship Skill of the Ruler and whether the ruler has the trait Architect. Influencing negatively the outcome of this option is a low Stewardship Skill of the Ruler and the lack of a Stewardship education\n"
darkages_steward.01.t:0 "The Great Construction Plan"
darkages_steward.01.desc:0 "By today's mid morning I was approached by my [steward.GetCouncilTitle] with a radical idea to implement a plan developing the core foundations to provide my Domain Counties' with the basis for a special building of new infrastructure there.\n\nIn effect and following [steward.GetHerHis] guidelines, I can invest now a significant sum of gold to enjoy lower construction costs for the next ten years in my Counties.\n\nOf course, it will all depend on [steward.GetName]'s skill to pull off the whole trick... or perhaps and taking a page from the original plans, it will depend on my own skills and traits!"
darkages_steward.01.opta:0 "I'll ask [steward.GetFirstName] to implement the plan"
darkages_steward.01.optb:0 "I will implement the plan"
darkages_steward.01.optc:0 "I'll pass this opportunity"
darkages_steward.02.t:0 "Successful Plan"
darkages_steward.02.desc:0 "My [steward.GetCouncilTitle] ingenuity lead to [steward.GetHerHis] plan to develop the infrastructure of my Domain to be a huge success!\n\nNow it is up to me to take advantage of the efforts of [steward.GetName]!"
darkages_steward.02.opta:0 "Brilliant!"
darkages_steward.03.t:0 "A Huge Letdown"
darkages_steward.03.desc:0 "My [steward.GetCouncilTitle] miserably failed in planning and implementing the expansive infrastructure operation [steward.GetSheHe] was overseing for my Domain.\n\nSignificant resources were squandered, time was lost and my patience with [steward.GetName] grows thin, very thin..."
darkages_steward.03.opta:0 "Rats!"
darkages_steward.04.t:0 "Successful Plan"
darkages_steward.04.desc:0 "As I took over the plan of my [steward.GetCouncilTitle], I spent the next weeks diligently making every arrangement for everything to happen in order to develop the infrastructure of my Domain.\n\nIn the end I was totally successful and now I can reap the laurels of my victory..."
darkages_steward.04.opta:0 "Great news!"
darkages_steward.05.t:0 "Miserable Failure"
darkages_steward.05.desc:0 "As I took over the plan of my [steward.GetCouncilTitle], I spent the next weeks trying to make the arrangements for everything to happen in order to develop the infrastructure of my Domain.\n\nUnfortunately, I fell short of the objectives and all the resources poured into this plan were wasted..."
darkages_steward.05.opta:0 "Such a loss..."
darkages_tax_plan1:0 "Efficient Tax Plan"
darkages_tax_plan1_desc:0 "This character has a sound tax plan executed in the Domain and it will take some time for the population to find new, creative ways to avoid segments of the taxation"
darkages_tax_plan2:0 "Efficient Tax Plan"
darkages_tax_plan2_desc:0 "This character has a sound tax plan executed in the Domain and it will take some time for the population to find new, creative ways to avoid segments of the taxation"
darkages_tax_plan3:0 "Efficient Tax Plan"
darkages_tax_plan3_desc:0 "This character has a sound tax plan executed in the Domain and it will take some time for the population to find new, creative ways to avoid segments of the taxation"
darkages_tax_plan4:0 "Efficient Tax Plan"
darkages_tax_plan4_desc:0 "This character has a sound tax plan executed in the Domain and it will take some time for the population to find new, creative ways to avoid segments of the taxation"
darkages_tax_plan5:0 "Efficient Tax Plan"
darkages_tax_plan5_desc:0 "This character has a sound tax plan executed in the Domain and it will take some time for the population to find new, creative ways to avoid segments of the taxation"
darkages_steward.06.t:0 "Improved Taxation Plan"
darkages_steward.06.desc:0 "My faithful [steward.GetCouncilTitle], [steward.GetName], presented me recently with an elaborate and sound plan to improve the taxation of my Domain.\n\nIn the knowledge it will be costing me something upfront, I must decide whether I implement the plan, whether I can improve on it by delving on the matter myself but risking the startup gold, or whether I take advantage of it, studying this masterpiece to help improve my Stewardship..."
darkages_steward.06.desc2:0 "My faithful [steward.GetCouncilTitle], [steward.GetName], presented me recently with an elaborate and sound plan to improve the taxation of my Domain.\n\nIn the knowledge it will be costing me something upfront, I must decide whether I implement the plan or whether I can improve on it by delving on the matter myself but risking the startup gold or if I flatly refuse the idea..."
darkages_steward.06.opta:0 "Implement it"
darkages_steward.06.optb:0 "Improve it"
darkages_steward.06.optc:0 "Study it"
darkages_steward.06.optd:0 "Refuse the idea"
darkages_steward.06.tt1:0 "The possible penalties in Stress given by the Traits represent the forfeit of the two previous choices in this event. Of course if your character attained a Learning Education, engaging in theoretical studies will be very welcome\n"
darkages_steward.06.tt2:0 "The possible penalties in Stress given by the Traits represent the forfeit of the first two choices in this event. Of course, doing nothing can be good for your Stress if you are Lazy, Dull or Content\n"
darkages_steward.07.t:0 "The Special Tax"
darkages_steward.07.desc:0 "[steward.GetName], my important [steward.GetCouncilTitle], presented me today with a proposal to implement a special tax to be paid by my subjects in my Domain, that will bring a very sizeable amount of gold to my coffers in some months.\n\nHowever, this tax is far from being reasonable and one can expect resistance to the collectors in my counties.\n\nWith the assurance that I can even demand to collect more than my [steward.GetCouncilTitle] originally planned, I must make a decision on how to proceed..."
darkages_steward.07.opta:0 "Implement the original plan"
darkages_steward.07.optb:0 "Demand even more"
darkages_steward.07.optc:0 "Refuse the whole plan"
darkages_opinion_county_special_tax_1:0 "Harsh Special Tax"
darkages_opinion_county_special_tax_1_desc:0 "A painful special tax was levied from this county. The population is far from happy."
darkages_opinion_county_special_tax_2:0 "Egregious Special Tax"
darkages_opinion_county_special_tax_2_desc:0 "An exorbitant special tax was levied from this county. The population is far from happy."
darkages_steward.08.t:0 "Report of the Special Tax"
darkages_steward.08.desc:0 "My fortune grew significantly with my subjects paying for it. All in all, I have more gold to spend as I see fit!"
darkages_steward.08.opta:0 "A good income source!"
darkages_opinion_county_major_relief_efforts:0 "Major Relief Efforts"
darkages_opinion_county_major_relief_efforts_desc:0 "After a major flooding that affected this county, its Ruler decided to implement a comprehensive plan to help the population"
darkages_steward.09.optb:0 "My peasants will fend for themselves"
darkages_steward.09.opta:0 "Order [steward.GetFirstName] to implement the plan"
darkages_steward.09.t:0 "Catastrophic Flooding"
darkages_steward.09.desc:0 "Over the past month my Domain has been under intense rain that caused catastrophic floodings and a major social disaster as the Control over my Counties show.\n\nUnfortunately, roads were ravaged, houses and government buildings were destroyed, militias that assured local safety were wiped out and financial losses to the general populace were enormous.\n\nMy [steward.GetCouncilTitle] came up with a relief plan that will help the communities affected and that will restore a semblance of order again in my Domain. What will I do?"
darkages_opinion_county_major_development:0 "Major Infrastructure Effort"
darkages_opinion_county_major_development_desc:0 "This County is implementing a plan to increase its development, attracting a large number of peasants to its capital"
darkages_steward.10.t:0 "The Development Plan"
darkages_steward.10.desc:0 "Over the last months I have noticed my [steward.GetCouncilTitle] has been lobbying the whole Council for a tentative plan [steward.GetSheHe] has been developing to improve my Domain and that includes areas where every one of my Councillors will have a say.\n\nNow that the plan has been presented, I find it to include a host of factors and variables that together provide a sound foundation that will help immensely in the development of my Domain.\n\nIn the knowledge all the Council is eager to implement the plan but that it will carry a price tag, I must decide what to do."
darkages_steward.10.opta:0 "Order the Council to implement the plan"
darkages_steward.10.optb:0 "Refuse the whole idea"
darkages_court_chaplain_toast_a.1.t:0 "Improvement in Skill"
darkages_court_chaplain_toast_a.1.tt:0 "[religious.GetFirstName] helped you increase by 1 in the relevant Skill"
darkages_court_chaplain_toast_c.1.t:0 "Great Improvement in Skill"
darkages_court_chaplain_toast_c.1.tt:0 "[religious.GetFirstName] helped you increase by 2 in the relevant Skill"
darkages_court_chaplain_toast_b.1.t:0 "Failure at Learning"
darkages_court_chaplain_toast_b.1.tt:0 "Under the tutelage of [religious.GetFirstName] you were unable to improve the relevant Skill. Your Prestige suffers."
darkages_court_chaplain.01.t:0 "The Tutor"
darkages_court_chaplain.01.desc1:0 "My faithful [religious.GetCouncilTitle], [religious.GetName], came up with a suggestion to help me learn more about Diplomacy.\n\nThis means an expansion of my library as my books at present don't cover the subject matter entirely..."
darkages_court_chaplain.01.desc2:0 "My faithful [religious.GetCouncilTitle], [religious.GetName], came up with a suggestion to help me learn more about Warfare.\n\nThis means an expansion of my library as my books at present don't cover the subject matter entirely..."
darkages_court_chaplain.01.desc3:0 "My faithful [religious.GetCouncilTitle], [religious.GetName], came up with a suggestion to help me learn more about Stewardship.\n\nThis means an expansion of my library as my books at present don't cover the subject matter entirely..."
darkages_court_chaplain.01.desc4:0 "My faithful [religious.GetCouncilTitle], [religious.GetName], came up with a suggestion to help me learn more about Subterfuge.\n\nThis means an expansion of my library as my books at present don't cover the subject matter entirely..."
darkages_court_chaplain.01.desc5:0 "My faithful [religious.GetCouncilTitle], [religious.GetName], came up with a suggestion to help me learn more about General Knowledge.\n\nThis means an expansion of my library as my books at present don't cover the subject matter entirely..."
darkages_court_chaplain.01.opta:0 "Delve into the details of the subject matter"
darkages_court_chaplain.01.optb:0 "Dismiss the suggestion"
darkages_opinion_county_religious_militia:0 "Religious Militia"
darkages_opinion_county_religious_militia_desc:0 "There is a religious militia established in this County"
darkages_court_chaplain.02.t:0 "The Religious Militia"
darkages_court_chaplain.02.desc:0 "A fortnight ago my [religious.GetCouncilTitle] presented me with an idea to establish a religious militia in my Domain, tasked with the enforcement of the strict adherence to the dogmas of the faith.\n\nFacing the opposition of all the other Councillors, [religious.GetName] defended [religious.GetHerHis] plan pointing to the increased levels of Control achieved if such measure is taken.\n\nIt is now for me to decide..."
darkages_court_chaplain.02.opta:0 "Go ahead with the idea"
darkages_court_chaplain.02.optb:0 "It is not going to happen"
darkages_court_chaplain.03.t:0 "The Spiritual Retreat"
darkages_court_chaplain.03.desc:0 "Yesterday, my faithful [religious.GetCouncilTitle] appeared before me offering to provide holy guidance and insightful contemplation in a spiritual retreat lasting some weeks over the next months.\n\n[religious.GetName] was adamant the time is right for me to cleanse myself of any sinful thoughts that later will reflect on my deeds.\n\nI should start by contributing to the religious work in my Domain by providing a sizeable amount of gold.\n\nIt is up to me now to decide what I will do."
darkages_court_chaplain.03.opta:0 "Experience the spiritual retreat"
darkages_court_chaplain.03.optb:0 "I have more important things to attend to"
darkages_court_chaplain.03.tt1:0 "The success of the spiritual retreat depends on the very high level of Learning of the [religious.GetCouncilTitle], on the high Learning of the character and on being Calm, Patient or Stubborn. Negatively modifying the chances of success are the Low Learning of the character and on being Fickle, Impatient or Wrathful\n"
darkages_spiritual_retreat_positive:0 "One with Oneself"
darkages_spiritual_retreat_positive_desc:0 "Thanks to the guidance and inner peace provided by a spiritual retreat, this character is inspired to perform great deeds"
darkages_spiritual_retreat_negative:0 "Spiritually Distressed"
darkages_spiritual_retreat_negative_desc:0 "This character is very distressed due to the failure of the spiritual retreat to assuage the soul"
darkages_court_chaplain.04.t:0 "Rewarding Spiritual Retreat"
darkages_court_chaplain.04.desc:0 "My spiritual retreat was a major success and I must congratulate my kind [religious.GetCouncilTitle] to have guided me across my sins, nightmares and inner doubts until I reached a total understanding of myself and my position in the world.\n\nWith my faith renewed, it is now up to me to continue on my life path, living the way God taught us!"
darkages_court_chaplain.04.opta:0 "I bask in the light of God!"
darkages_court_chaplain.05.t:0 "Distressing Spiritual Retreat"
darkages_court_chaplain.05.desc:0 "In performing a spiritual retreat with [religious.GetName] I sought spiritual guidance but found a void, I sought inner peace but felt none and I searched for a spiritual insight but found a shroud of darkness over my heart.\n\nUnfortunately, the retreat was a major error and now I must live anguished with my doubts and failures..."
darkages_court_chaplain.05.opta:0 "So sorry..."
darkages_nick_the_charitable:0 "the Charitable"
darkages_court_chaplain.06.t:0 "Alms for the Poor"
darkages_court_chaplain.06.desc:0 "[religious.GetFirstName], my trusty [religious.GetCouncilTitle], has been entertaining a pet project of [religious.GetHerHim]self that at its core will fund a network of organizations across my Domain that will attempt to improve the lot of the poorest inside my lands.\n\nAs the cost will increase with my Domain size, I must analyse carefully the whole bill to see if funding this network for 10 years will be worth it..."
darkages_court_chaplain.06.opta:0 "Fund it"
darkages_court_chaplain.06.optb:0 "Don't fund it"
darkages_opinion_county_welfare_network:0 "Welfare Network"
darkages_opinion_county_welfare_network_desc:0 "This county has a welfare network to assist those in need"
darkages_court_chaplain.07.t:0 "Gold for Piety"
darkages_court_chaplain.07.desc:0 "My pious [religious.GetCouncilTitle] came recently to me to share the plans [religious.GetHerHis] religious peers across the world have regarding the improvement of our Holy Sites.\n\nAs it stands, every ruler of our faith is set to contribute with an amount of gold to finance the construction of more imposing structures.\n\nNow the question is about how shall I proceed?"
darkages_court_chaplain.07.opta:0 "Provide the requested gold"
darkages_court_chaplain.07.optb:0 "Donate more than requested"
darkages_court_chaplain.07.optc:0 "Refuse to provide the gold"
darkages_spouse_angry:0 "Angry Spouse"
darkages_spouse_angry_desc:0 "The spouse of this character conditions his actions now and for the future due to a significant quarrel"
darkages_spouse.01.t:0 "An Angered Spouse"
darkages_spouse.01.desc:0 "While we both lingered in bed in the early hours of the morning, [spouse.GetName] whispered in my ear very bad things about one of my courtiers, [courtier.GetName].\n\nAs [spouse.GetSheHe] planted the seeds of hate, I became aware that [spouse.GetHerHis] plan is to seductively plead that I summarily dismiss the courtier that unfortunately had incurred in [spouse.GetHerHis] wrath.\n\nIn the knowledge this decision will carry political consequences, among other factors on my councillors who will not look kindly to me if I acede to my spouse's arbitrary demands, I will need to make a decision about this unforeseen challenge..."
darkages_spouse.01.opta:0 "Cede to my spouse's request"
darkages_spouse.01.optb:0 "Refuse my spouse's request"
darkages_spouse.01.optc:0 "Try to influence my spouse to drop the matter"
darkages_spouse.01.tt1:0 "The success of this option depends on several factors about you and your spouse that will act counter to each other. Your Intrigue and Diplomacy will influence the outcome both positively and negatively. Also of major impact is the presence for both of you of the traits Schemer and Diplomat."
darkages_spouse.02.t:0 "Outmanoeuvred by Spouse"
darkages_spouse.02.desc:0 "As I proceeded to attempt to persuade my [spouse.GetFirstName] about the political difficulties of getting rid of [courtier.GetFirstName], my spouse skillfully dodged my arguments and managed to convince me of [courtier.GetHerHis] position.\n\nIn the end I became convinced about the need to dismiss [courtier.GetName]..."
darkages_spouse.02.opta:0 "It will be done at once, my dear!"
darkages_spouse.03.t:0 "A Silver Tongue"
darkages_spouse.03.desc:0 "My attempt to persuade my [spouse.GetFirstName] about the political difficulties of getting rid of [courtier.GetFirstName] was a complete success!\n\nIn the end, [spouse.GetSheHe] readily agreed [spouse.GetSheHe] acted impulsively and without knowing the full implications of such decision..."
darkages_spouse.03.opta:0 "Glad you share my point of view, my darling!"
darkages_spouse.04.tt1:0 "By picking this option, if your character has negative opinion of the heir and is either Disloyal, Sadistic, Arbitrary, Deceitful or Callous the stress will increase\n" 
darkages_spouse.04.t:0 "A Most Serious Request"
darkages_spouse.04.desc:0 "Today during the private lunch with my spouse, I felt an eerie sensation along my spine when [spouse.GetSheHe] suggested that [heir.GetName] is not fit to rule.\n\n[spouse.GetFirstName] went about a long list of shortcommings [spouse.GetSheHe] finds in my Heir and attempted to persuade me of [spouse.GetHerHis] sound reasoning.\n\nIn the knowledge my decision can have important political consequences in the future and that my spouse will not be the least happy with a refusal, I must make my mind on this..."
darkages_spouse.04.opta:0 "I cede to [spouse.GetFirstName] pressure"
darkages_spouse.04.optb:0 "I rule here, dammit!"
darkages_spouse.04.tt2:0 "You disinherit [heir.GetName]. This request was done because you Spouse is neither Compassionate, Forgiving, Just nor Loyal\n"
darkages_spouse.05.t:0 "Of Vanity and Pride"
darkages_spouse.05.desc:0 "This morning, as I was preparing to leave our bedroom to ride my trusty mare around the neighbourhood of my holding, [spouse.GetFirstName], still undressed, placed [spouse.GetHerHis] arms around my torso and whispered in my ear my palaces were in need of a significant renewal in terms of luxuries.\n\nI know for a fact this is a dead horse often beaten by my spouse but this time [spouse.GetSheHe] enlisted all remotely influent people in my Realm to support [spouse.GetHerHis] request.\n\nCornered by the deft political move of my Spouse, I am now pressed to give a definite answer..."
darkages_spouse.05.opta:0 "I'll provide the funds my darling..."
darkages_spouse.05.optb:0 "No way to throw gold away like that!"
darkages_spouse.05.tt1:0 "Besides the displayed effects below, by picking this option, every adult Vassal, Courtier and Guest will increase opinion about the Ruler\n"
darkages_spouse.05.tt2:0 "Besides the displayed effects below, by picking this option, every adult Vassal, Courtier and Guest will decrease opinion about the Ruler\n"
darkages_opinion_county_reforms:0 "Social Reforms"
darkages_opinion_county_reforms_desc:0 "The Spouse of the Ruler implemented with the gold from the treasury some social reforms in the Domain"
darkages_spouse_embassy:0 "Effective Itinerant Embassy"
darkages_spouse_embassy_desc:0 "The Spouse of this character is furthering the Renown of the Ruler's dynasty far and wide"
darkages_spouse.07.t:0 "The Newbie Ambassador"
darkages_spouse.07.desc:0 "Yesterday while taking a private dinner with my Spouse, [spouse.GetFirstName] suggested to me [spouse.GetSheHe] wanted to take a leading role as an Ambassador to foreign Courts, with the objective of improving my Dynasty Renown.\n\nAs my informers already told me, this is a pet project of [spouse.GetHerHim] for long and [spouse.GetSheHe] has been manoeuvering for this objective by stoking approval within anyone important enough in my Court to have a say regarding the matter.\n\nWith the certainty I must decide on this matter, this places me in a delicate position should I refuse this request as my Prestige will be at stake..."
darkages_spouse.07.opta:0 "Your wish is my command, my darling!"
darkages_spouse.07.optb:0 "Sorry, we must spend gold where it matters..."
darkages_spouse.07.optc:0 "Let's find a compromise..."
darkages_spouse.06.t:0 "A Good Deed"
darkages_spouse.06.desc:0 "[spouse.GetFirstName], my Spouse, approached me today with an exquisite political idea that might serve for me to reap some benefits.\n\nAs things stand, [spouse.GetHerHis] plan is to implement some social reforms in order to alleviate the sufferings of the common peasant, thus increasing their general well being. Always with a step ahead planned, [spouse.GetSheHe] already involved powerful religious dignitaries in order to find help to implement the plan.\n\nI am now faced with the decision to judge if the necessary gold to place everything in motion is worth it..."
darkages_spouse.06.opta:0 "Let's do some good to our peasants"
darkages_spouse.06.optb:0 "It is not worth it"
darkages_more_illnesses.01.t:0 "Strange Lack of Vigour"
darkages_more_illnesses.01.desc:0 "I woke up today with sore limbs, experiencing vomits, persistent cough and with an extreme lack of energy. Probably this is just a passing ailment but there is always the nagging possibility of being something far worse..."
darkages_more_illnesses.01.opta:0 "Hopefully everything will be allright..."
darkages_more_illnesses.02.t:0 "My Old Self!"
darkages_more_illnesses.02.desc:0 "Fortunately the illness that affected me disappeared progressively over the last few days. With a sigh of relief, I return to my normal life and duties!"
darkages_more_illnesses.02.opta:0 "Great news!"
darkages_more_illnesses.03.t:0 "A Dark Grasp on Life"
darkages_more_illnesses.03.desc:0 "Unfortunately, my condition has deteriorated further over the last few days. Half expecting the bad news and with an ominous stance, this morning I was diagnosed with a serious condition..."
darkages_more_illnesses.03.opta:0 "I am in the hands of God..."
darkages_traits_bring_death.02.t:0 "An Important Warning"
darkages_traits_bring_death.02.desc:0 "As I am strolling around my fortress with my [spymaster.GetCouncilTitle], [spymaster.GetName] parted with me one of [spymaster.GetHerHis] worries regarding my personal safety.\n\nAs I have a certain personality type, I am prone to be the victim of dangerous plots to take my life. Unfortunately and since I will not stop being what I am, [spymaster.GetName] counsels me to hire one or even better, two bodyguards to increase my personal safety.\n\nIn the knowledge the threat is just theoretical, [spymaster.GetCouncilTitle]s are appointed to see and prepare for dangers at every corner but my life can possibly be on the line I must decide what I will do..."
darkages_traits_bring_death.02.opta:0 "Thank you for the warning"
darkages_traits_bring_death.02.tt1:0 "If your character is either Vengeful, Wrathful, Callous, Sadistic, Deceitful, Paranoid or Arbitrary there is a chance that an assassination attempt be planned against him/her. The first four traits increase the chance of a murder attempt\n"
darkages_bankrupt.01.t:0 "Bankruptcy"
darkages_bankrupt.01.desc:0 "Whether by remaining insolvent for long or as a consequence of a recent bankruptcy, my Prestige as well as my Dynasty's Renown suffer a grievous loss.\n\nI need to quickly bounce back to positive balances in my treasury!"
darkages_bankrupt.01.opta:0 "Those are bad news..."
darkages_bankrupt.01.tt1:0 "If you fall below -49 gold you will suffer the consequences of being insolvent. Every five years you remain insolvent will have the same effect\n"
SKILL_POINT_FROM_ME_TORTURING_GAIN_CHANCE:3 "When you [torture|E] someone:\n$TAB$#V [EmptyScope.ScriptValue('dark_insights_stat_increase_chance')|0]%#! chance to gain either [intrigue_i]#P 1#! [intrigue|E] or [prowess_i]#P 1#! [prowess|E] (Max 3 each)"
darkages_control_brings_death.03.t:0 "A Subtle Warning"
darkages_control_brings_death.03.desc:0 "My [spymaster.GetCouncilTitle] approaches me one day and voice [spymaster.GetHerHis] concerns about the muddled situation in parts of my Domain.\n\nAs things stand, [spymaster.GetSheHe] proceeded to detail how the Control in my provinces dropped enough that brigands and other lowly thieves took advantage of the fact in order to establish themselves and imperil the travels of everyone, including myself. My [spymaster.GetCouncilTitle] suggested that I improve the Control in all provinces I own and that I hire one or even better, two bodyguards.\n\nIn the knowledge [spymaster.GetName] is paid to worry about possible developments and is alerted to every probability however small, I know I must proceed with caution..."
darkages_control_brings_death.03.opta:0 "Thank you for the tip, [spymaster.GetFirstName]!"
darkages_control_brings_death.03.tt10:0 "If one of the provinces of your Domain has less than 90 Control, you run the risk of suffering a murder attempt while travelling across your lands. While the chance is minimal if the Control is bigger than 75 for a single province, the progressive deterioration of Control and the increase of provinces with low Control also causes an increase of the chance of a life threatening event to happen\n"
darkages_control_brings_death.04.t:0 "A Personal Warning"
darkages_control_brings_death.04.desc:0 "My [spymaster.GetCouncilTitle] approaches me one day and voice [spymaster.GetHerHis] concerns about the poor Popular Opinion I have in parts of my Domain.\n\nAs things stand, [spymaster.GetSheHe] proceeded to detail how my frequent and necessary travels across my lands might be used by disgruntled individuals to attempt to ambush me and place my life in danger.\n\nMy [spymaster.GetCouncilTitle] suggested that I improve the county Popular Opinion in the unhappy provinces I own - a Decision to that effect is available - and that I hire one or even better, two bodyguards.\n\nIn the knowledge [spymaster.GetName] is paid to worry about possible developments and is alerted to every probability however small, I know I must proceed with caution..."
darkages_control_brings_death.04.opta:0 "I hear you loud and clear, my dear [spymaster.GetFirstName]!"
darkages_control_brings_death.04.tt1:0 "If one of the provinces of your Domain has less than -15 Popular Opinion of you, you run the risk of suffering a murder attempt while travelling across your lands. While the chance is minimal if the Popular Opinion is bigger than -25 for a single province, the progressive deterioration of Popular Opinion and the increase of provinces with low Popular Opinion also causes an increase of the chance of a life threatening event to happen\n"
darkages_more_illnesses.01.4:0 "A Brighter Day"
darkages_more_illnesses.04.desc:0 "As the weeks pass, I feel my body growing stronger and stronger until the day I stop coughing and the pressure upon my chest is lifted.\n\nFortunately, I was able to beat Pneumonia and will live to tell the story!"
darkages_more_illnesses.04.opta:0 "I can count myself lucky"
darkages_more_illnesses.01.5:0 "Until My Last Breath"
darkages_more_illnesses.05.desc:0 "As Pneumonia starts spreading in my lungs I feel worse and worse with the passing of each day.\n\nSoon it became clear it was only a matter of time until the disease rans its course and kills me.\n\nI am now breathing my last laboured breath..."
darkages_more_illnesses.05.opta:0 "Curtain"
darkages_county_opinion_war_exhaustion1:0 "War Exhaustion"
darkages_county_opinion_war_exhaustion1_desc:0 "The effects the present offensive war has on this province"
darkages_county_opinion_war_exhaustion2:0 "War Exhaustion"
darkages_county_opinion_war_exhaustion2_desc:0 "The effects the present offensive war has on this province"
darkages_county_opinion_war_exhaustion3:0 "War Exhaustion"
darkages_county_opinion_war_exhaustion3_desc:0 "The effects the present offensive war has on this province"
darkages_county_opinion_war_exhaustion4:0 "War Exhaustion"
darkages_county_opinion_war_exhaustion4_desc:0 "The effects the present offensive war has on this province"
darkages_war.11.t:0 "Undesirable Effects of War"
darkages_war.11.desc:0 "My offensive wars are progressively causing economic and social impacts on the population of my Domain.\n\nForced conscription, lack of people to tend to the fields and services and a general feeling of despair are causing a significant toll on my populace.\n\nAs things stand, I cannot further avoid some pernicious effects of the unpopular war I am fighting on the population I lead..."
darkages_war.11.opta:0 "Let's hope the war doesn't last long"
darkages_war.11.tt1:0 "This event only happens because you are fighting an offensive war. The modifiers applied will be removed soon after the Realm is at peace again\n"
darkages_war.13.t:0 "The Price of Loyalty"
darkages_war.13.desc:0 "As I proceed with my offensive wars, my vassals start becoming more and more despondent regarding their support for the carnage I started.\n\nI have reached a point where no more political manoeuvering is enough to quell their utter distaste for the present state of affairs..."
darkages_war.13.opta:0 "Hopefully, the wars will end soon..."
darkages_war.13.tt1:0 "This event only happens because you are fighting an offensive war. Every one of your vassals except the Brave and Wrathful will display a very bad modifier as they are fed up with your offensive wars. Soon after you are at peace, this opinion modifier will disappear\n"
darkages_opinion_war_exhaustion:0 "Warmonger"
darkages_war.15.t:0 "Betraying an Ally Trust"
darkages_war.15.desc:0 "As war rages in the Realm of [ally.GetName] without my help, my ally starts complaining about my lack of engagement.\n\nUnfortunately, things go from bad to worse and today I received a missive from [ally.GetHerHim] stating [ally.GetSheHe] will make a public accusation of betrayal that will certainly have far reaching effects upon my prestige..."
darkages_war.15.opta:0 "I will not budge"
darkages_war.15.optb:0 "I will finance [ally.GetHerHis] war efforts"
rival_poor_opinion:0 "Poor opinion devolved into rivalry"
darkages_vassals_turn_rivals.01.t:0 "A Turn for the Worst"
darkages_vassals_turn_rivals.01.desc:0 "As the opinion of [vassal.GetName] about me is very low, it progressively devolves into a deep hatred and now a rivalry has started to form..."
darkages_vassals_turn_rivals.01.opta:0 "Somebody to keep an eye on"
darkages_vassals_turn_rivals.01.tt1:0 "Any Vassal that has less than -74 opinion of your character has a probability to turn into a Rival. The probability is bigger the worst the opinion is\n"
darkages_development_10:0 "Sustained Development"
darkages_development_10_desc:0 "This County has adequate public infrastructure to continue its development"
darkages_development_20:0 "Sustained Development"
darkages_development_20_desc:0 "This County has adequate public infrastructure to continue its development"
