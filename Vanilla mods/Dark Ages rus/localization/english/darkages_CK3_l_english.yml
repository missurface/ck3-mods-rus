darkages_low_martial.01.t:0 "A Martial Offense"
darkages_low_martial.01.desc:0 "Recently I discoursed at a gathering with multiple rulers attending and my lack of martial knowledge surfaced, while I artlessly criticised, even ridiculed, the armed forces of [darkages_ruler_155.GetName].\n\nUnfortunately, I am now faced with the possibility of permanent opposition, even rivalry from such a ruler and having created this problem, it falls on my shoulders the task of trying to solve it... if I wish so."
darkages_low_martial.01.opta:0 "I am not going to take back my words!"
darkages_low_martial.01.optb:0 "Retract myself"
darkages_low_martial.01.optc:0 "Ask my [darkages_marshal_540.GetCouncilTitle] to fix the problem"
darkages_low_martial.01.tt1:0 "Besides providing financial compensation, you confess your mistake using an original approach and hope that [darkages_ruler_155.GetFirstName] kindly accepts your apologies. The success of this option depends positively on your traits Gregarious, Humble, Eccentric, Temperate, Calm and Patient. Negatively influencing your chances of success are your traits Callous, Wrathful, Deceitful, Arbitrary, Fickle and Impatient\n"
darkages_low_martial.01.tt2:0 "Through the good services of [darkages_marshal_540.GetFirstName] you offer monetary compensation to try to salvage your relation with [darkages_ruler_155.GetFirstName]. This option has a more limited probability of success as you are asking one of your servants to address the aggrieved party. Nevertheless it might present a much better perspective than the previous option, depending on your Traits and the Traits of your [darkages_marshal_540.GetCouncilTitle]. The success of this option depends only negatively on your [darkages_marshal_540.GetCouncilTitle] being Callous, Wrathful, Deceitful, Arbitrary, Fickle and Impatient\n"
darkages_lowmar_toast.01.tt1:0 "[darkages_ruler_155.GetName] pardoned you and you even gained some Prestige!"
darkages_lowmar_toast.01.tt2:0 "Your excuses were not accepted. You lost Prestige again..."
darkages_lowmar_toast.01.tt3:0 "[darkages_ruler_155.GetName] considers you as a new friend. You gained Prestige!"
darkages_lowmar_toast.01.tt4:0 "[darkages_marshal_540.GetFirstName] managed to save your reputation!"
darkages_lowmar_toast.01.tt5:0 "[darkages_marshal_540.GetFirstName] failed. You lost more Prestige..."
darkages_low_martial.02.t:0 "Tactless Comments"
darkages_low_martial.02.desc:0 "As I was leading an operational meeting with my vassals commanding some of their elite regiments, the obvious shortcommings regarding my Martial Skill quickly asserted themselves and I projected a sorry image about myself, my operational capabilities of leading our armies and my long term strategical objectives.\n\nIt soon became apparent I was out of my water and unfortunately I clumsily defended myself and my position by launching a bitter diatribe against my vassals.\n\nEveryone became angry and the meeting had to be adjourned for everyone to cool off..."
darkages_low_martial.02.opta:0 "Avoid returning to the subject matter"
darkages_low_martial.02.tt3:0 "Every Vassal except Loyal ones will become Disgusted with you\n"
darkages_low_martial.02.optb:0 "Send the [darkages_marshal_608.GetCouncilTitle] to calm my vassals"
darkages_low_martial.02.tt1:0 "You send the [darkages_marshal_608.GetCouncilTitle], together with some funds to calm your vassals. The base chances of success are a bit against you. The success of this option is influenced positively by your [darkages_marshal_608.GetCouncilTitle]'s Traits Gregarious, Patient, Stubborn, Calm and Diplomat and for [darkages_marshal_608.GetHerHis] Brilliant Martial Skill (>=18). It is influenced negatively if [darkages_marshal_608.GetSheHe] has the Traits Callous, Wrathful, Fickle and Impatient as well as if [darkages_marshal_608.GetSheHe] has less than 15 in [darkages_marshal_608.GetHerHis] Martial Skill. If [darkages_marshal_608.GetSheHe] is a vassal of yours it will also weight against your chances of success. If a failure, besides the Prestige loss, you will also suffer the same penalty to opinion as in the option above\n"
darkages_low_martial.02.optc:0 "Intimidate everyone into submission"
darkages_low_martial.02.tt2:0 "You try to instill fear on everyone. While most of your vassals will accept your behaviour without blinking, Brave ones will feel a strong wave of contempt towards you. Be warned that imposing your views through fear might backfire spectacularly, partly depending on your Traits, partly on pure luck\n"
darkages_low_martial.03.t:0 "Solving Everyone's Problem"
darkages_low_martial.03.desc1:0 "As I was alone working in my library, a sudden feeling of vulnerability came to my mind.\n\nNot a minute had passed when someone dropped from the ceiling claiming that I was a corpse already!\nI barely had time to react when I realized this will be a fight to the death..."
darkages_low_martial.03.desc2:0 "As I was guarded by my bodyguard while working in my library, a sudden feeling of vulnerability came to my mind.\n\nNot a minute had passed when someone dropped from the ceiling claiming that I was a corpse already!\nI barely had time to react when I realized this will be a fight to the death..."
darkages_low_martial.03.desc3:0 "As I was guarded by my bodyguards while working in my library, a sudden feeling of vulnerability came to my mind.\n\nNot a minute had passed when someone dropped from the ceiling claiming that intimidating everyone was bad for my health!\nI barely had time to react when I realized this will be a fight to the death..."
darkages_low_martial.03.opta:0 "Watch out!"
darkages_low_martial.03.tt1:0 "You suffered this murder attempt as revenge for your appalling behaviour towards your vassals. Your Intrigue Skill, your Prowess, the presence of one or even better two bodyguards and pure luck will determine the chance of living to tell the story\n"
darkages_lowmar_toast.02.tt1:0 "[darkages_marshal_608.GetFirstName] managed to pacify everyone and you gained Prestige"
darkages_lowmar_toast.02.tt2:0 "[darkages_marshal_608.GetFirstName] failed and you lose Prestige and Opinion with your Vassals"
darkages_low_martial.04.t:0 "The Struggling Martial"
darkages_low_martial.04.desc:0 "Since I know myself, the subtle angles of warfare and its organization are beyond my grasp.\n\nI verify that I spend more and more time struggling with this area of my life, as my duties and obligations require me to address the martial arena that I end up failing to understand.\n\nNow it is the time to decide how will I deal with this shortcoming in the future."
darkages_low_martial.04.opta:0 "Focus on my Martial at the cost of other Skills"
darkages_low_martial.04.optb:0 "Attempt to manage everything"
darkages_low_martial.04.optc:0 "Delegate far more than the desirable amount"
darkages_low_martial.04.tt1:0 "You are seen as a failure in managing the Martial aspects of your Realm. Besides the cost in Prestige and the extra cost to support the structure necessary to help you, your Vassals will become despirited by your lack of guidance and involvement\n"
darkages_province_unprepared:0 "Unqualified Militias"
darkages_province_unprepared_desc:0 "Due to the very weak martial capacity of the ruler, the militias in this province are far from being in a ready state"
darkages_low_martial.05.t:0 "Awkward Command"
darkages_low_martial.05.desc:0 "Lately, I have been touring the provinces of my Domain in order to issue the best possible orders to my militias and armies there.\n\nUnfortunately and due to my low Martial Skill, my efforts fell well short of what I had in mind...\n\nWith confused orders, half baked decisions and clumsy military policies, my recruits and local command staff sensed my weakness and the readiness of everyone expectedly dropped.\n\nAs time never stops, if I want to salvage a negative situation, I need to act now!"
darkages_low_martial.05.opta:0 "Dismiss the issue"
darkages_low_martial.05.optb:0 "Deceive my subjects with new empty edicts"
darkages_low_martial.05.optc:0 "Ask my [darkages_marshal_226.GetCouncilTitle] to solve the problem"
darkages_low_martial.05.tt1:0 "Besides the modifier applied to all provinces, if you are not Lazy, Content or Humble you will suffer Stress\n"
