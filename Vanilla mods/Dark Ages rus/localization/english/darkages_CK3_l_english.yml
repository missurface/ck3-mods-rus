darkages_loyal_disloyal.03.opta1:0 "An interesting development!"
darkages_loyal_disloyal.03.opta2:0 "A damning weakness..."
darkages_loyal_disloyal.04.t:0 "An Unreliable Soul"
darkages_loyal_disloyal.04.desc:0 "As my [darkages_non_genetic_char.GetFirstName] grows up it becomes apparent to everyone my child is Disloyal..."
darkages_loyal_disloyal.04.optb:0 "I am so disappointed..."
