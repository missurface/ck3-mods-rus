darkages_province_aimless_desc:0 "The owner of this County failed in establishing good cultural and religious policies here"
darkages_low_learning.06.t:0 "Nasty Quarrel"
darkages_low_learning.06.desc:0 "Another day at the Council, another quarrel between myself and [darkages_cc_585.GetName], my [darkages_cc_585.GetCouncilTitle].\n\nThis time it became clear in my mind [darkages_cc_585.GetSheHe] went too far by exploiting my obvious lack of knowlege in Learning matters going to the point of even forcefully ridiculing my ideas and plans.\n\nIn the end, with a spark of fiery defiance in [darkages_cc_585.GetHerHis] eyes, [darkages_cc_585.GetFirstName] dully presented [darkages_cc_585.GetHerHis] resignation from the post as [darkages_cc_585.GetCouncilTitle].\nNow I must decide what to do as this can have a myriad of different implications..."
darkages_low_learning.06.opta:0 "Good Riddance!"
darkages_low_learning.06.optb:0 "Ask my spouse to intercede"
darkages_low_learning.06.optc:0 "Beg for [darkages_cc_585.GetHerHis] pardon"
darkages_low_learning.06.tt1:0 "You consider the matter finished. Your Councillors with positive opinion of [darkages_cc_585.GetFirstName] will be despondent with you while your Councillors with negative opinion of [darkages_cc_585.GetHerHim] will signal their approval regarding your decision\n"
darkages_low_learning.06.tt2:0 "You ask your Spouse to influence your [darkages_cc_585.GetCouncilTitle]. The chances of this action suceeding depend positively on your Spouse good Diplomacy Skill or better (>=12), and on [darkages_spouse_709.GetHerHis] traits about Beauty, Gregarious, Shrewd, Lustful, Diligent and Diplomat. Your [darkages_cc_585.GetCouncilTitle]'s traits Forgiving, Compassionate and Humble also provide a bonus. Negatively influencing the chances of success are your Spouse poor Diplomacy Skill or worse (<8) and your [darkages_cc_585.GetCouncilTitle]'s traits Vengeful, Arrogant and Callous\n"
darkages_low_learning.06.tt3:0 "You humbly ask for your [darkages_cc_585.GetCouncilTitle]'s pardon. The chance of success of this action, that unmodified is bigger than the previous one, depends positively on your traits Humble, Honest, Just and Compassionate and on [darkages_cc_585.GetFirstName]'s traits Compassionate, Humble, Forgiving and Loyal. Negatively influencing your chances of success are your traits Callous, Vengeful and Arrogant and your [darkages_cc_585.GetCouncilTitle]'s traits Vengeful, Callous and Disloyal\n"
darkages_lowlea_toast.06.tt1:0 "[darkages_spouse_709.GetFirstName] managed to calm down your [darkages_cc_585.GetCouncilTitle]!"
darkages_lowlea_toast.06.tt2:0 "[darkages_spouse_709.GetFirstName] failed to calm down your [darkages_cc_585.GetCouncilTitle]..."
darkages_lowlea_toast.06.tt3:0 "[darkages_cc_585.GetFirstName] pardoned your behaviour!"
darkages_lowlea_toast.06.tt4:0 "[darkages_cc_585.GetFirstName] didn't pardon your behaviour..."
darkages_hooks.01.t:0 "Old Debts"
darkages_hooks.01.desc:0 "Today, while I was going about the vicinity of my castle, [darkages_hooker.GetName] approached me and asked for a few minutes of my time.\nAs I agreed, [darkages_hooker.GetSheHe] recalled the debt I have towards [darkages_hooker.GetHerHim] and stated it was now time that I help [darkages_hooker.GetHerHim] in an hour of need.\n\nAs things stand, what [darkages_hooker.GetFirstName] wants is gold..."
darkages_hooks.01.opta:0 "Match your word with your deed"
darkages_hooks.01.optb:0 "Avoid paying"
darkages_hooks.01.tt1:0 "By picking this option, you will suffer a Prestige loss for not being up to your word. Depending on your traits, you may also suffer Stress. Renown will also suffer if the Dynasty of both characters is different. In this case, the amount of Renown lost depends on your highest title rank\n"
darkages_hooks.02.tt1:0 "By picking this option, you will suffer a Prestige loss for not being up to your word. Depending on your traits, you may also suffer Stress. Renown will also suffer if the Dynasty of both characters is different. In this case, the amount of Renown lost depends on your highest title rank\n"
darkages_hooks.02.t:0 "Public Promotion"
darkages_hooks.02.desc:0 "As I was settling some administrative matters in my office, I was informed that [darkages_hooker.GetName] was waiting to give me a word.\n\nUpon admittance to my presence, [darkages_hooker.GetSheHe] proceeded to remind me that I owed [darkages_hooker.GetHerHim] a favour, something that I could not forget.\n\nAs fate has it, it seems [darkages_hooker.GetFirstName] wants me to promote [darkages_hooker.GetHerHim], increasing [darkages_hooker.GetHerHis] Prestige.\nOf course, doing that will reduce my own Fame as I will seem to be bowing to the whims of this person..."
darkages_hooks.02.opta:0 "I gave my word"
darkages_hooks.02.optb:0 "No way I am going ahead with that!"
darkages_hooks.03.tt1:0 "By picking this option, you will suffer a Prestige loss for not being up to your word. Depending on your traits, you may also suffer Stress. Renown will also suffer if the Dynasty of both characters is different. In this case, the amount of Renown lost depends on your highest title rank\n"
darkages_hooks.03.t:0 "A Word With the Divine"
darkages_hooks.03.desc:0 "Yesterday, I received the visit of none other than [darkages_hooker.GetName]. After the required pleasantries, [darkages_hooker.GetSheHe] proceeded to ask me to pay the favour I owe [darkages_hooker.GetHerHim] by presenting [darkages_hooker.GetHerHim] to some high religious representatives I know about.\n\nAll this is nice and dandy, but I know my Piety will be placed on the line if I give a word about [darkages_hooker.GetName] to these people..."
darkages_hooks.03.opta:0 "I'll do it"
darkages_hooks.03.optb:0 "No way I am going ahead with that!"
darkages_hooks.04.tt1:0 "[darkages_hooker.GetFirstName] forgave the favour you owed [darkages_hooker.GetHerHim]. This happened because [darkages_hooker.GetSheHe] is neither Ambitious, Callous, Greedy or Disloyal. If [darkages_hooker.GetSheHe] is Generous, Compassionate or Content the chances of reaching this decision are higher\n"
darkages_hooks.04.t:0 "A Magnanimous Action"
darkages_hooks.04.desc:0 "This morning, while I was supervising some work in my garden, I was interrupted by [darkages_hooker.GetName].\n\nI was not happy with the unannounced visit but a sense of dread piked my interest. After all, I do owed [darkages_hooker.GetHerHim] a favour and was wary of what would possibly be demanded.\n\nIn the end, however, I was surprised by the good deed [darkages_hooker.GetFirstName] performed. With a frank smile [darkages_hooker.GetSheHe] just said to me [darkages_hooker.GetSheHe] had been thinking about it all and in the great scheme of things I owed [darkages_hooker.GetHerHim] nothing after all!"
darkages_hooks.04.opta:0 "I am truly touched..."
rule_darkages_pagan_reformation_hs:0 "#B #Bold Dark Ages#!:#! Pagan Reformation"
setting_darkages_pagan_reformation_hs_3:0 "3 Holy Sites"
setting_darkages_pagan_reformation_hs_3_desc:0 "Pagans need to control at least 3 holy sites to reform their faith. Vanilla setting."
setting_darkages_pagan_reformation_hs_2:0 "2 Holy Sites"
setting_darkages_pagan_reformation_hs_2_desc:0 "Pagans need to control at least 2 holy sites to reform their faith. Easier."
setting_darkages_pagan_reformation_hs_1:0 "1 Holy Site"
setting_darkages_pagan_reformation_hs_1_desc:0 "Pagans need to control at least one holy site to reform their faith. Easiest."
setting_darkages_pagan_reformation_hs_0:0 "Not Required"
setting_darkages_pagan_reformation_hs_0_desc:0 "Pagans do not need to control any holy sites to reform their faith."
setting_darkages_pagan_reformation_hs_4:0 "4 Holy Sites"
setting_darkages_pagan_reformation_hs_4_desc:0 "Pagans need to control at least 4 holy sites to reform their faith. Harder."
setting_darkages_pagan_reformation_hs_5:0 "5 Holy Sites"
setting_darkages_pagan_reformation_hs_5_desc:0 "Pagans need to control at least 5 holy sites to reform their faith. Hardest."
rule_darkages_infertility_rule:0 "#B #Bold Dark Ages#!:#! Infertility"
setting_darkages_infertility_rule_default:0 "Default"
setting_darkages_infertility_rule_default_desc:0 "5% of all characters are Infertile. This will be unknown and maybe revealed later in life."
setting_darkages_infertility_rule_no:0 "No"
setting_darkages_infertility_rule_no_desc:0 "Infertile characters are governed by simpler vanilla rules and will be exceedingly rare."
darkages_legitimacy.02.t:0 "The Justice Ordinances"
darkages_legitimacy.02.desc:0 "For some time now it has been mentioned across several meetings in different places of the Realm about the need to enact significant justice reforms in order to pave the way for a smoother trade environment and better overall security in the provincies.\n\nIf at start I didn't commit myself with this line of thought, fearful of the potencial drain my coffers could suffer, lately I started creating the expectation this reform would go forward.\n\nNow in a close collaboration between my Council and my Vassals, a proper document, with full expenses calculated, is on the table and everybody is looking at me to sign it..."
darkages_legitimacy.02.opta:0 "Sign it"
darkages_legitimacy.02.optb:0 "Refuse to sign it"
darkages_legitimacy.02.optc:0 "Threaten everyone into forgetting the matter!"
darkages_legitimacy.02.optd:0 "Cajole everyone into forgetting the matter..."
darkages_legitimacy.02.tt3:0 "You implement the measures and on top of the displayed effects,all your vassals also increase control in their holdings, while becoming Impressed with your behaviour\n"
darkages_legitimacy.02.tt2:0 "This option is available because you are either a Diplomat, a Schemer, Deceitful, Gregarious, or a Cunning Politician. You manipulate everyone into keeping the status quo, refusing the idea presented. Every vassal that is either Shrewd, a Schemer, Deceitful, Cynical, Disloyal or a Cunning Politician will see through your deception and become Incensed with you\n"
darkages_legitimacy.02.tt1:0 "This option is available because you have at least 25 Dread. You scare everyone into giving up this plan. Vassals that are Brave, Just, Honest, Compassionate or Disloyal will become Incensed with you. Notice that vassals that are Craven will never become Incensed\n"
darkages_legitimacy.03.t:0 "Inconvenient Spouse"
darkages_legitimacy.03.desc:0 "Recently my [darkages_spouse_023.GetFirstName] made several important public remarks of political nature that deeply offended my vassals and shook the entire government structure of my Realm.\n\nIn the knowledge my spouse is not going to recant [darkages_spouse_023.GetHerHis] words and with my credibility towards my vassals and my lower subjects on the line, I must decide how to proceed, given the very significant political challenge I face."
darkages_legitimacy.03.opta:0 "Do nothing"
darkages_legitimacy.03.optb:0 "Empathicaly disavow [darkages_spouse_023.GetFirstName] words"
darkages_legitimacy.03.optc:0 "Instill fear in everyone's hearts!"
darkages_legitimacy.03.tt1:0 "Besides the visible effects, all your non Loyal vassals will be Enraged with you while your spouse will be Happy with you\n"
darkages_legitimacy.03.tt2:0 "Besides the visible effects, all your non Disloyal vassals will express Approval of your action while your Spouse will be Enraged with you\n"
darkages_legitimacy.03.tt3:0 "This option is available because you have at least 25 of Dread. Besides the visible effects, all your vassals and your spouse will be Wary of your behaviour\n"
darkages_legitimacy.04.t:0 "Mastering the Pulpit"
darkages_legitimacy.04.desc:0 "The day to deliver an inspiring and meaningful speech addressing the past History of my Realm, what is our place in the world and what lies ahead for the Realm in the future has arrived with much fanfarre, thanks to the promises I've been doing to everyone.\n\nNow that I face such daring enterprise, I need to pick from the two most important subject matters at present to delve into the intricacies of it all, while keeping everyone enthralled in what I am about to say.\n\nMy Vassals, Courtiers and even foreign dignitaries all look expectant for my speech!"
darkages_legitimacy.04.opta:0 "Address diplomatic matters"
darkages_legitimacy.04.optb:0 "Address warfare details"
darkages_legitimacy.04.optc:0 "Address management issues"
darkages_legitimacy.04.optd:0 "Address security concerns"
darkages_legitimacy.04.opte:0 "Address religious topics"
darkages_legitimacy.04.optf:0 "Boldly improvise"
darkages_legitimacy.04.optg:0 "Reduce the speech to a few awkward platitudes"
darkages_legitimacy.04.tt1:0 "The success of the speech depends on your good or better (>=12) Diplomacy Skill and your Traits Poet, Cunning Politician and Gregarious. Conversely, if you have low or worse (<8) Diplomacy Skill or if you don't have a Diplomatic Education your chances of success will be lowered. Legitimacy and Prestige are on the line as well as the opinion of Vassals and Courtiers that might be Impressed or Disappointed, depending on your performance\n"
darkages_legitimacy.04.tt2:0 "The success of the speech depends on your good or better (>=12) Martial Skill and your Traits Poet, Cunning Politician and Arrogant. Conversely, if you have low or worse (<8) Martial Skill or if you don't have a Martial Education your chances of success will be lowered. Legitimacy and Prestige are on the line as well as the opinion of Vassals and Courtiers that might be Impressed or Disappointed, depending on your performance\n"
darkages_legitimacy.04.tt3:0 "The success of the speech depends on your good or better (>=12) Stewardship Skill and your Traits Poet, Cunning Politician and Diligent. Conversely, if you have low or worse (<8) Stewardship Skill or if you don't have a Stewardship Education your chances of success will be lowered. Legitimacy and Prestige are on the line as well as the opinion of Vassals and Courtiers that might be Impressed or Disappointed, depending on your performance\n"
darkages_legitimacy.04.tt4:0 "The success of the speech depends on your good or better (>=12) Intrigue Skill and your Traits Poet, Cunning Politician and Deceitful. Conversely, if you have low or worse (<8) Intrigue Skill or if you don't have a Intrigue Education your chances of success will be lowered. Legitimacy and Prestige are on the line as well as the opinion of Vassals and Courtiers that might be Impressed or Disappointed, depending on your performance\n"
darkages_legitimacy.04.tt5:0 "The success of the speech depends on your good or better (>=12) Learning Skill and your Traits Poet, Cunning Politician and Zealous. Conversely, if you have low or worse (<8) Learning Skill or if you don't have a Learning Education your chances of success will be lowered. Legitimacy and Prestige are on the line as well as the opinion of Vassals and Courtiers that might be Impressed or Disappointed, depending on your performance\n"
darkages_legitimacy.04.tt6:0 "This option is available because you are Eccentric. The base chances of success of this option are better than the above two. You will increase your chances of success for each Skill score that is at least Good (>=15) and also if you have the Poet trait.  Conversely, for each skill score Below Average (<8) you will suffer a penalty for your chances of success. Legitimacy and Prestige are on the line as well as the opinion of Vassals and Courtiers that might be Impressed or Disappointed, depending on your performance\n"
darkages_legitimacy.04.tt7:0 "You play it safe and refuse to delve deeper in all subject matters. Vassals and Courtiers will be disappointed but the Legitimacy lost will be less drastic than a failure in the previous options\n"
darkages_legitimacy.04.toast1:0 "The speech is an unmitigated success. You gain Legitimacy and Prestige!"
darkages_legitimacy.04.toast2:0 "The speech is an abysmal failure. You lose Legitimacy and Prestige..."
darkages_legitimacy.05.t:0 "A Meaningful Farewell"
darkages_legitimacy.05.desc:0 "One of my most trusted servents, the commoner [da_servant.GetName], is finally ending his service after more than 40 years of standing by my side.\n\nAlways with a witty remark and very fast thinking, I cannot remember my life without this dedicated subject of mine.\n\nAs he is a well loved worker by everyone, it is expected and much talked about that I provide him with a nice farewell party as well as some coin for him to live well his remaining days in this world..."
darkages_legitimacy.05.opta:0 "Organize a fairwell party and provide some coin"
darkages_legitimacy.05.optb:0 "Appoint him as Seneschal"
darkages_legitimacy.05.optc:0 "He only did his duty"
darkages_legitimacy.05.tt1:0 "You throw a party and everybody is going to gauge your sensibility to address the subject matter in a proper way. This action has its success dependent on your high Diplomacy (>=12), on you being Gregarious, on being a Diplomat and on having a Diplomatic Education. Its failure depends on your low Diplomacy (<8), on being Callous and on being Sadistic. If successful you will gain Legitimacy, if unsuccessful you will lose Prestige while your Vassals and Courtiers will become Disappointed with you\n"
darkages_legitimacy.05.tt2:0 "You appoint [da_servant.GetName] as your Seneschal and necessarily give him a minor noble title. On principle, both your Courtiers as your Vassals will object the sound of this so the success chances of this option start as lower than the first option. The success of this action depends on your high Stewardship (>=12), on being Diligent, on being an Administrator and on having a Stewardship Education. The failurew of this action depends on your low Stewardship (<8), on being Arrogant and on being Vengeful. If successful you will gain Legitimacy, if unsuccessful you will lose Prestige while your Vassals and Courtiers will become Disappointed with you\n"
darkages_legitimacy.05.tt3:0 "You allow [da_servant.GetName] to slip away into total anonymity. On top of possible different stress impact due to your traits, your servants will be unhappy with your lack of gratitude and you will lose Legitimacy\n"
darkages_unhappy_servants:0 "Unhappy Servants"
darkages_unhappy_servants_desc:0 "The servants of this character are unhappy with their liege's lack of gratitude. They will not obey with all due diligence"
darkages_legitimacy.05.toast1:0 "The party was a total success. You gain Legitimacy!"
darkages_legitimacy.05.toast2:0 "The party was a total wreck. A Prestige loss while Vassals and Courtiers become Disappointed with you..."
darkages_legitimacy.05.toast3:0 "You skillfully promoted [da_servant.GetName]. You gain Legitimacy!"
darkages_legitimacy.05.toast4:0 "You disastrously knighted a lowly commoner. A Prestige and Opinion loss..."
darkages_opinion_utterly_loyal:0 "Utterly Loyal"
darkages_legitimacy.07.t:0 "Rulership Validated"
darkages_legitimacy.07.desc1:0 "In spite of [da_councillor.GetName] modest Diplomacy, [da_councillor.GetHerHis] skills have been shinning and as proof of it, my #G Legitimacy#! increases!"
darkages_legitimacy.07.desc2:0 "Thanks to [da_councillor.GetName] remarkable Diplomacy, it is no wonder than my #G Legitimacy#! increases!"
darkages_legitimacy.08.t:0 "Rulership Discredited"
darkages_legitimacy.08.desc1:0 "It comes as no surprise due to [da_councillor.GetName] not stellar Diplomacy skill that my #G Legitimacy#! suffers..."
darkages_legitimacy.08.desc2:0 "In spite of [da_councillor.GetName] stellar Diplomacy, [da_councillor.GetSheHe] managed to botch my #G Legitimacy#!..."
darkages_legitimacy.06.t:0 "Losing Face"
darkages_legitimacy.06.desc:0 "After a long period when I heavily criticized [darkages_critic.GetName], fate and deft political maneuvering decided that my Councillors started to lobby me to accept this man in my court.\n\nWhile I never committed myself to the notion, I feel the pressure to accept someone whom I so much despise within close quarters.\n\nOf course, accepting means a significant dent in my credibility given what I have been saying about [darkages_critic.GetName] for years, but the political implications of a refusal might be damning..."
darkages_legitimacy.06.opta:0 "Accept the man in my Court"
darkages_legitimacy.06.tt1:0 "You accept [darkages_critic.GetName] in your Court, losing face in the process. While your Councillors will be happy with your decision, you might also gain Stress\n"
darkages_legitimacy.06.optb:0 "Find a good excuse to dismiss the notion"
darkages_legitimacy.06.tt2:0 "The success of this option depends on your good or better Intrigue Skill (>=12), on being Deceitful, Schemer, Cunning Politician and having an Intrigue Education. Working against your chances is a Below Average or worse Intrigue Skill (<8)\n"
darkages_legitimacy.06.toast1:0 "You managed to find a good excuse and even gained Prestige in the process!"
darkages_legitimacy.06.toast2:0 "Your argument didn't persuade anyone. You lose Legitimacy and your Concillors will be Unimpressed with you..."
darkages_legitimacy.06.optc:0 "Come up with a creative excuse"
darkages_legitimacy.06.tt3:0 "This option is available because you are Eccentric. With base values, success chance is higher than the previous option. Chances are positively modified by a good or better Diplomacy (>=12), by being Gregarious, Diplomat, Cunning Politician and having a Diplomatic Education. Working against your chances are a low or worse (<8) Diplomacy Skill\n"
darkages_legitimacy.06.toast3:0 "You managed to impress everyone with your exotic reasons and even gain Prestige!"
darkages_legitimacy.06.toast4:0 "You failed to impress anyone. You lose Legitimacy and your Councillors will be Unimpressed with you..."
darkages_legitimacy.06.optd:0 "Threaten these feeble attempts at manipulation!"
darkages_legitimacy.06.tt4:0 "This option is available because you have at least 15 Dread. You refuse to allow [darkages_critic.GetName] to join your Court, threatening everyone. In terms of base success chance this option lies in the middle ground between the previous two. The success of this option depends on your high Dread, on being Callous, Vengeful, Sadistic and Torturer. Working against your chances are your traits Compassionate, Just, Temperate and Humble\n"
darkages_legitimacy.06.tt41:0 "This option is available because you have at least 15 Dread. You refuse to allow [darkages_critic.GetName] to join your Court, threatening everyone. In terms of base success chance this option is a bit better than the previous one. The success of this option depends on your high Dread, on being Callous, Vengeful, Sadistic and Torturer. Working against your chances are your traits Compassionate, Just, Temperate and Humble\n"
darkages_legitimacy.06.toast5:0 "You instill fear in the hearts of every Councillor and even gain Prestige in the process!"
darkages_legitimacy.06.toast6:0 "You failed to intimidate your Unimpressed Councillors and lose Legitimacy and Dread..."
darkages_legitimacy.09.t:0 "The Annals of History"
darkages_legitimacy.09.desc:0 "Recently, a dangerous malcontent with a penchant for difamation has been weaving the most wicked tales about my family and linneage across several important Courts, including those of my vassals.\n\nAs my Legitimacy is on the line, I need to decide how to deal with the situation..."
darkages_legitimacy.09.opta:0 "Do nothing"
darkages_legitimacy.09.optb:0 "Try to refute the accusations"
darkages_legitimacy.09.tt1:0 "Success of this option depends on your above average Diplomacy and Learning Skills (>=12) and also on your Traits Scholar, Diplomat and Cunning Politician. Failure chance is increased by having a below average Diplomacy and Learning Skills (<8)\n"
darkages_legitimacy.09.optc:0 "Order an assassination attempt"
darkages_legitimacy.09.tt2:0 "This option has a slightly lower base chance of success than the previous one. Success of this option depends on your above average Intrigue and Martial Skills (>=12) and also on your Traits Deceitful, Brave, Strategist and Schemer. Failure chance is increased by having a below average Intrigue and Martial Skills (<8)\n"
darkages_legitimacy.10.t:0 "Success!"
darkages_legitimacy.10.desc:0 "After being taken by surprise by the insidious suggestions that were being made about my family and linneage, I was swift to address the matter in a very effective way.\n\nDebunking old myths, clearing not so old defamations and quenching new malignant suggestions, I was able to turn the tables of the argument and the one being discredited was the one spreading the falsehoods in the first place.\n\nIn the end, I managed to cover myself and my dynasty in glory!"
darkages_legitimacy.10.opta:0 "Oh, good!"
darkages_legitimacy.11.t:0 "Failure..."
darkages_legitimacy.11.desc:0 "After being taken by surprise by the insidious suggestions that were being made about my family and linneage, I botched my attempt to correct the rumours being spread. In a pointless exercise of negation, with artless arguments and an inefective approach, I could sense my Legitimacy being affected every time I tried to address the situation..."
darkages_legitimacy.11.opta:0 "Oh, no..."
darkages_legitimacy.12.t:0 "Success!"
darkages_legitimacy.12.desc:0 "The murder attempt to address the prick that was spreading lies about my linneage was a success.\nI was assured he died a slow and painful death.\n\nNow to commend the loyal servants who performed the deed..."
darkages_legitimacy.12.opta:0 "Great job!"
darkages_legitimacy.13.t:0 "Failure..."
darkages_legitimacy.13.desc:0 "Unfortunately my attempt to kill the prick who was spreading lies about my linneage was not successful.\nIn a very unprofessional job, my hit squad was killed by a mob that came to protect the target.\n\nIn the end, this murder attempt became just another peeble in the long list of heavy stones that brings down my Legitimacy..."
darkages_legitimacy.13.opta:0 "I am surrounded by idiots!"
darkages_tyranny_toast.04.tt1:0 "Once I made veiled theats, everybody fell in line. I've accrued a minor amount of Tyranny"
darkages_tyranny_toast.04.tt2:0 "My attempt backfired from a political and a substantive way. I face very significant Prestige and Tyranny penalties" 
rule_darkages_grace_period:0 "#B #Bold Dark Ages#!:#! Grace Period"
setting_darkages_grace_period_rule_5:0 "5 years"
setting_darkages_grace_period_rule_5_desc:0 "A particular challenging set of events will not happen during the first 5 years of the game"
setting_darkages_grace_period_rule_10:0 "10 years"
setting_darkages_grace_period_rule_10_desc:0 "A particular challenging set of events will not happen during the first 10 years of the game"
setting_darkages_grace_period_rule_15:0 "15 years"
setting_darkages_grace_period_rule_15_desc:0 "A particular challenging set of events will not happen during the first 15 years of the game"
setting_darkages_grace_period_rule_20:0 "20 years"
setting_darkages_grace_period_rule_20_desc:0 "A particular challenging set of events will not happen during the first 20 years of the game"
setting_darkages_grace_period_rule_25:0 "25 years"
setting_darkages_grace_period_rule_25_desc:0 "A particular challenging set of events will not happen during the first 25 years of the game"
setting_darkages_grace_period_rule_forever:0 "Forever"
setting_darkages_grace_period_rule_forever_desc:0 "A particular challenging set of events will not happen during the game"
setting_darkages_grace_period_rule_0:0 "Off"
setting_darkages_grace_period_rule_0_desc:0 "You may get all events at game start"
darkages_steward.12.t:0 "Deep Pockets"
darkages_steward.12.desc:0 "My reliable [da_steward.GetCouncilTitle] came to me today worried about my financial policies.\nPresently my funds are too low to deal safely with any unforeseeable event.\n\nAs [da_steward.GetSheHe] explained, it is wise if I save a good amount of gold to address serious matters that might appear when least expected.\n\nWithout delving too deeply about how I manage my treasury, [da_steward.GetFirstName] tells me that at present and judging by my monthly income, the gold reserves are low..."
darkages_steward.12.opta:0 "Thank you for the information"
darkages_steward.12.optb:0 "Don't meddle in my affairs again!"
darkages_steward.12.tt1:0 "Your [da_steward.GetCouncilTitle] will not inform you anymore about your financial status. Notice that your heir, once played by you, will be warned again\n"
darkages_rival_abused_my_generosity:0 "[CHARACTER.GetShortUIName] abused the generosity of [TARGET_CHARACTER.GetShortUIName|U]."
darkages_vassals.01.t:0 "An Act of Kindness"
darkages_vassals.01.desc:0 "Today after a particularly tasty lunch I was surprised by the unanounced visit of [da_vassal_generic.GetName], my Vassal.\n\nFearing some bad news, I started receiving him in a cold manner, only to learn from [da_vassal_generic.GetHerHis] words [da_vassal_generic.GetSheHe] came with the best of intentions.\n\nAs the pleasant exchange continued, I learned this kind soul, who has a favourable opinion of me, wanted to contribute a special donation of 50 gold to the Realm's coffers!\n\nNow, how should I proceed?"
darkages_vassals.01.opta:0 "Gratefully accept the donation"
darkages_vassals.01.optb:0 "I want moooore... much mooore!"
darkages_vassals.01.optc:0 "Kindly and nobly refuse"
darkages_vassals.01.tt1:0 "You demand more from your Vassal. The success of this action depends partly on your high Intrige (>=12), on being a Torturer and on your high Dread (>=20). Low (<10) or worse, nil Dread as well as low Intrigue (<8) will reduce your chances of success. Beware the vassal will become livid with your demand and might take it as a personal offense, depending partly on [da_vassal_generic.GetHerHis] traits and final opinion. Higher risk if you face a Callous, Vengeful, Arrogant, Brave vassal; lower risk if you face a Craven, Forgiving, Content, Compassionate one\n"
darkages_vassals.01.toast1:0 "You managed to make [da_vassal_generic.GetFirstName] pay 125 gold!"
darkages_vassals.01.toast2:0 "You failed on your demand..."
darkages_vassals.02.t:0 "A Greedy Master"
darkages_vassals.02.desc:0 "Sadly [da_vassal_generic.GetName] took my abuse of [da_vassal_generic.GetHerHis] generosity personaly.\nThe seeds of hate have been planted and nurtured..."
darkages_vassals.02.opta:0 "I've gained a new rival!"
darkages_opinion_despicable_criminal:0 "Despicable Criminal"
darkages_opinion_outraged:0 "Outraged"
darkages_vassals.03.t:0 "A United Front"
darkages_vassals.03.desc:0 "Recently I became aware that a new idea has been forming for some time among my vassals as the result of conversations between them that can pose significant challenges to my rule.\n\nAs things stand, they want to form a so called 'Vassal Chamber' to discuss matters of interest to them and negotiate together with me.\n\nThis is of course an encroachment on my authority and will lead to the curbing of my actions and the further degradation of my uncontested rule.\n\nGiven the high expectations created, there is no golden lining in the options I face..."
darkages_vassals.03.opta:0 "Accept the new political body"
darkages_vassals.03.optb:0 "Forbid the new political body"
darkages_vassals.03.optc:0 "Negotiate the structure of the new political body"
darkages_vassals.03.tt1:0 "You attempt to creatively negotiate the powers of the new body. The succcess of this option depends on your high Diplomacy (>=12) on being a Diplomat, Gregarious, Cunning Politician and Eccentric. Contributing to your failure are your low Diplomacy (<8) and the traits Callous, Vengeful, Sadistic and Arbitrary\n"
darkages_vassals.03.tt2:0 "All your direct Vassals will become Outraged, gaining a penalty of -40 to their opinion of you for 20 years\n"
darkages_vassals.03.toast1:0 "You were successful in the negotiation with your Vassals!"
darkages_vassals.03.toast2:0 "You failed in the negotiation with your Vassals..."
darkages_vassal_chamber1:0 "Vassal Chamber"
darkages_vassal_chamber1_desc:0 "The Vassals of this character formed a political entity to better negotiate matters of common interest"
darkages_vassal_chamber2:0 "Negotiated Vassal Chamber"
darkages_vassal_chamber2_desc:0 "The Vassals of this character formed a political entity to better negotiate matters of common interest"
darkages_friend_protected:0 "[CHARACTER.GetShortUIName] protected the honour of [TARGET_CHARACTER.GetShortUIName|U] from despicable peers."
darkages_vassals.04.t:0 "Balance of Power"
darkages_vassals.04.desc:0 "Yet again in another meeting with all my vassals, I notice poor [da_vassal_abused.GetName] being abused by all [da_vassal_abused.GetHerHis] peers, who gang up on [da_vassal_abused.GetHerHim] like a pack of wolves mangling a poor lamb.\n\nLately I started to sense this cruel gang trying to enlist me in the offenses and jokes being made at the expense of [da_vassal_abused.GetFirstName].\n\nToday it reached a point where I am cornered into defining a stance on this side issue, that on top of it all, does not advance anybody's true agenda..."
darkages_vassals.04.opta:0 "Side with the abused vassal"
darkages_vassals.04.optb:0 "Join the fun of - almost - everyone"
darkages_vassals.04.optc:0 "Avoid the situation"
darkages_vassals.04.optd:0 "Deftly avoid the situation"
darkages_vassals.04.tt1:0 "You gallantly side with [da_vassal_abused.GetFirstName], defending [da_vassal_abused.GetHerHim] and signaling you will not tolerate the behaviour of everyone else. Besides the effects shown, all your other Vassals will become Despirited with your stance\n"
darkages_vassals.04.tt2:0 "You make fun of poor [da_vassal_abused.GetFirstName], empathizing with all your other vassals. Besides the effects shown, all your vassals except the abused one will become Impressed with your support\n"
darkages_vassals.04.tt3:0 "You avoid commiting yourself and in the process look weak both to the majority of the vassals as well as the abused one. Everyone will become Unimpressed with your stance\n"
darkages_vassals.04.tt4:0 "This option is available because you are Shrewd. You skillfully avoid commiting yourself in this matter and give a serious rebuke to everyone that accurately hit its mark\n"
darkages_vassals.05.t:0 "The Drums of War"
darkages_vassals.05.desc:0 "Early in the evening today, I received word from my vassals they want to forge an agreement with me in which they provide me with a much higher number of levies for the long term in exchange for an upfront payment to them in order to finance their projects.\n\nIt is now late at night and the decision I am about to take is preventing me from sleeping.\nWhat should I do?"
darkages_vassals.05.opta:0 "Accept the proposal"
darkages_vassals.05.optb:0 "Negotiate it"
darkages_vassals.05.optc:0 "Force the thing"
darkages_vassals.05.optd:0 "Refuse the whole scheme"
darkages_vassals.05.tt1:0 "You negotiate the proposal and will pay up to a maximum of 10 gold. The success of this option depends on your good Diplomacy Skill (>=12), on being Shrewd, on being a Diplomat and on being Gregarious. A low Diplomacy (<8) will be a liability to your chances and if you fail in the negotiations your Vassals will have the opinion of you reduced\n"
darkages_vassals.05.tt2:0 "You negotiate the proposal and will pay up to a maximum of 25 gold. The success of this option depends on your good Diplomacy Skill (>=12), on being Shrewd, on being a Diplomat and on being Gregarious. A low Diplomacy (<8) will be a liability to your chances and if you fail in the negotiations your Vassals will have the opinion of you reduced\n"
darkages_vassals.05.tt3:0 "You negotiate the proposal and will pay up to a maximum of 40 gold. The success of this option depends on your good Diplomacy Skill (>=12), on being Shrewd, on being a Diplomat and on being Gregarious. A low Diplomacy (<8) will be a liability to your chances and if you fail in the negotiations your Vassals will have the opinion of you reduced\n"
darkages_vassals.05.tt4:0 "You negotiate the proposal and will pay up to a maximum of 65 gold. The success of this option depends on your good Diplomacy Skill (>=12), on being Shrewd, on being a Diplomat and on being Gregarious. A low Diplomacy (<8) will be a liability to your chances and if you fail in the negotiations your Vassals will have the opinion of you reduced\n"
darkages_vassals.05.tt5:0 "You negotiate the proposal and will pay up to a maximum of 90 gold. The success of this option depends on your good Diplomacy Skill (>=12), on being Shrewd, on being a Diplomat and on being Gregarious. A low Diplomacy (<8) will be a liability to your chances and if you fail in the negotiations your Vassals will have the opinion of you reduced\n"
darkages_vassals.05.tt6:0 "You negotiate the proposal and will pay up to a maximum of 135 gold. The success of this option depends on your good Diplomacy Skill (>=12), on being Shrewd, on being a Diplomat and on being Gregarious. A low Diplomacy (<8) will be a liability to your chances and if you fail in the negotiations your Vassals will have the opinion of you reduced\n"
darkages_vassals.05.tt7:0 "This option is only available because your Dread is at least 20. You attempt to intimidate your Vassals into giving the extra levies without compensation. The success of this option depends on your good Intrigue (>=12) and on being a Torturer, Vengeful or Callous. A low Intrigue (<8) will contribute to the failure of this option. If failing, your Vassals will become Enraged with you and you face a loss of Prestige as well as Dread. Beware this option might fail spectacularly\n"
darkages_vassals.05.toast1:0 "You managed to secure a great deal with your vassals!"
darkages_vassals.05.toast2:0 "You failed in the negotiations with your vassals..."
darkages_vassals.05.toast3:0 "You intimidate your vassals into giving you the levies!"
darkages_vassals.05.toast4:0 "You failed to intimidate your vassals and look ridiculous and weak..."
darkages_vassals.06.t:0 "The Beating"
darkages_vassals.06.desc:0 "Today, as I visited the dog kennels alone and confident in my own security, a few individuals hidding in the shadows assaulted me with clubs and left me severely injured... as I was trying to understand what was going on, one of the thugs whispered in my ear:\n\n'Stop intimidating your good and kind vassals... or else, the mosty resourceful of them might finish definitively the lesson taught today.'"
darkages_vassals.06.opta:0 "Ouch!"
darkages_vassals_levy_improvements1:0 "Expanded Levies"
darkages_vassals_levy_improvements1_desc:0 "The Vassals of this character offered the chance of dramatically increase the levies available"
darkages_vassals_levy_improvements2:0 "Expanded Levies"
darkages_vassals_levy_improvements2_desc:0 "The Vassals of this character offered the chance of substancially increase the levies available"
darkages_vassal_economic_plan:0 "Comprehensive Economic Plan"
darkages_vassal_economic_plan_desc:0 "One of the vassals of the Realm came up with a very effective economic plan"
darkages_vassals.07.t:0 "The Master Plan of [da_vassal_planner.GetFirstName]"
darkages_vassals.07.desc:0 "Recently my Council was approached by [da_vassal_planner.GetName], my Vassal, with an ambitious and sound plan to develop all my Realm.\n\nProbably I should have felt happy with this contribution but the cocky personality of my Vassal presented this plan at my own expense in terms of Prestige and Legitimacy.\n\nIn the end, I face the difficult decision of favouring the improvement of my entire Realm or my own political position..."
darkages_vassals.07.opta:0 "Agree to the plan"
darkages_vassals.07.optb:0 "Veto the plan"
