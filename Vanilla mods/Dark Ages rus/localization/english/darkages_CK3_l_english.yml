darkages_add_shrewd_dull.06.opta:0 "An handicap that needs to be defeated..."
darkages_add_shrewd_dull.07.t:0 "A Turn for the Best"
darkages_add_shrewd_dull.07.desc:0 "As my [darkages_non_genetic_char.GetFirstName] grows up it becomes apparent to everyone my child is Strong..."
