darkages_development_90:0 "Sustained Development"
darkages_development_90_desc:0 "This County has adequate public infrastructure to continue its development"
darkages_development_penalty:0 "Development Curtailed"
darkages_development_penalty_desc:0 "The public infrastructure of this County cannot sustain its present Development"
darkages_check_development.01.t:0 "The Demands of Urbanization"
darkages_check_development.01.desc:0 "As the [my_county.GetName] increases its development, there are several additional needs in terms of infrastructure for the County to achieve its full potential.\n\nRoads, bridges, aqueducts, public baths, sewers, basic healthcare facilities and much more are in demand across the County in order for it to continue to grow.\n\nUnfortunately, all these facilities cost gold and I am the one who is required to foot the bill..."
darkages_check_development.01.opta:0 "It is for the good of the Realm"
darkages_check_development.01.optb:0 "I'll postpone this..."
darkages_check_development.01.tt1:0 "As the level of Development of this County reaches 10, additional support infrastructure must be built in order for it to continue its sustained growth\n"
darkages_check_development.01.tt2:0 "As the level of Development of this County reaches 20, additional support infrastructure must be built in order for it to continue its sustained growth\n"
darkages_check_development.01.tt3:0 "As the level of Development of this County reaches 30, additional support infrastructure must be built in order for it to continue its sustained growth\n"
darkages_check_development.01.tt4:0 "As the level of Development of this County reaches 40, additional support infrastructure must be built in order for it to continue its sustained growth\n"
darkages_check_development.01.tt5:0 "As the level of Development of this County reaches 50, additional support infrastructure must be built in order for it to continue its sustained growth\n"
darkages_check_development.01.tt6:0 "As the level of Development of this County reaches 60, additional support infrastructure must be built in order for it to continue its sustained growth\n"
darkages_check_development.01.tt7:0 "As the level of Development of this County reaches 70, additional support infrastructure must be built in order for it to continue its sustained growth\n"
darkages_check_development.01.tt8:0 "As the level of Development of this County reaches 80, additional support infrastructure must be built in order for it to continue its sustained growth\n"
darkages_check_development.01.tt9:0 "As the level of Development of this County reaches 90, additional support infrastructure must be built in order for it to continue its sustained growth\n"
darkages_check_development.01.tt1_special:0 "As the level of Development of this County reaches 10, additional support infrastructure must be built in order for it to continue its sustained growth. The cost to invest in [my_county.GetName] is significantly reduced because you are either an Architect or have at least a Stewardship of 21\n"
darkages_check_development.01.tt2_special:0 "As the level of Development of this County reaches 20, additional support infrastructure must be built in order for it to continue its sustained growth. The cost to invest in [my_county.GetName] is significantly reduced because you are either an Architect or have at least a Stewardship of 21\n"
darkages_check_development.01.tt3_special:0 "As the level of Development of this County reaches 30, additional support infrastructure must be built in order for it to continue its sustained growth. The cost to invest in [my_county.GetName] is significantly reduced because you are either an Architect or have at least a Stewardship of 21\n"
darkages_check_development.01.tt4_special:0 "As the level of Development of this County reaches 40, additional support infrastructure must be built in order for it to continue its sustained growth. The cost to invest in [my_county.GetName] is significantly reduced because you are either an Architect or have at least a Stewardship of 21\n"
darkages_check_development.01.tt5_special:0 "As the level of Development of this County reaches 50, additional support infrastructure must be built in order for it to continue its sustained growth. The cost to invest in [my_county.GetName] is significantly reduced because you are either an Architect or have at least a Stewardship of 21\n"
darkages_check_development.01.tt6_special:0 "As the level of Development of this County reaches 60, additional support infrastructure must be built in order for it to continue its sustained growth. The cost to invest in [my_county.GetName] is significantly reduced because you are either an Architect or have at least a Stewardship of 21\n"
darkages_check_development.01.tt7_special:0 "As the level of Development of this County reaches 70, additional support infrastructure must be built in order for it to continue its sustained growth. The cost to invest in [my_county.GetName] is significantly reduced because you are either an Architect or have at least a Stewardship of 21\n"
darkages_check_development.01.tt8_special:0 "As the level of Development of this County reaches 80, additional support infrastructure must be built in order for it to continue its sustained growth. The cost to invest in [my_county.GetName] is significantly reduced because you are either an Architect or have at least a Stewardship of 21\n"
darkages_check_development.01.tt9_special:0 "As the level of Development of this County reaches 90, additional support infrastructure must be built in order for it to continue its sustained growth. The cost to invest in [my_county.GetName] is significantly reduced because you are either an Architect or have at least a Stewardship of 21\n"
darkages_check_development.01.optc:0 "Let's do it at reduced costs"
darkages_check_development.02.t:0 "The Path to Development"
darkages_check_development.02.desc1:0 "As an accomplished Architect, the feelings for the progressive Development of my Counties lie deep in my heart.\n\nLooking over my whole Domain I see some Counties are in need of better infrastructure to continue to develop unhindered.\n\nRoads, bridges, aqueducts, public baths, sewers, basic healthcare facilities and much more are in dire demand across my possessions and through my architectural mastery I can project and implement them in the most streamlined way.\n\nThe lenders trust my capacity to implement these ambitious changes in my Domain and are willing to fork the gold if necessary.\n\nI can now seize the moment and push my Realm forward!"
darkages_check_development.02.desc2:0 "As someone with almost peerless Stewardship, the feelings for the progressive Development of my Counties lie deep in my heart.\n\nLooking over my whole Domain I see some Counties are in need of better infrastructure to continue to develop unhindered.\n\nRoads, bridges, aqueducts, public baths, sewers, basic healthcare facilities and much more are in dire demand across my possessions and applying my Stewardship mastery I can project and implement them in the most streamlined way.\n\nThe lenders trust my capacity to implement these ambitious changes in my Domain and are willing to fork the gold if necessary.\n\nI can now seize the moment and push my Realm forward!"
darkages_check_development.02.desc3:0 "As an accomplished architect and a visionary builder with almost peerless Stewardship, the feelings for the progressive Development of my Counties lie deep in my heart.\n\nLooking over my whole Domain I see some Counties are in need of better infrastructure to continue to develop unhindered.\n\nRoads, bridges, aqueducts, public baths, sewers, basic healthcare facilities and much more are in dire demand across my possessions and applying my brilliant Skills and Traits I can project and implement them in the most streamlined way.\n\nThe lenders trust my capacity to implement these ambitious changes in my Domain and are willing to fork the gold if necessary.\n\nI can now seize the moment and push my Realm forward!"
darkages_check_development.02.opta:0 "I'll confidently give the next step!"
darkages_check_development.02.optb:0 "It's not something urgent..."
darkages_check_development.02.tt1:0 "This event happens because you have either the Architect trait or you have Stewarship of at least 21. You have the opportunity of upgrading your Counties' infrastructure and continue their development unhindered for a small fraction of the price usually paid\n"
darkages_check_development.04.opta:0 "It is what it is..."
darkages_check_development.04.t:0 "Lack of Infrastructure"
darkages_check_development.04.desc:0 "My recent dismissal of developing significant infrastructure in [my_county.GetName] - or my lack of funds to finance the operation - lead to the progressive abandonment of the region as a vibrant community that could ascend to the next stages of development.\n\nUnfortunately, my decision led to significant problems to the outlook of the County..."
darkages_wound_recovery.01.t:0 "A Wounded Spirit"
darkages_wound_recovery.01.desc:0 "As I lie in bed constrained by my wounds, I have time to reflect on the meaning of life and how tenuous my grasp of it all is.\n\nMy fate rests partly on my constitution, partly on the care I receive but mostly on luck.\n\nAs time passes, a conclusion approaches but in the end I am ready to accept my destiny..."
darkages_wound_recovery.01.opta:0 "Let's hope for the best..."
darkages_chancellor.18.t:0 "An Eye for Talent"
darkages_chancellor.18.desc:0 "As I am savouring lunch in the company of [chancellor.GetName], my [chancellor.GetCouncilTitle] proceeds to tell me about a great aquaintance of [chancellor.GetHerHim] that would fit perfectly in my Court.\n\nAs we finish our dishes, [chancellor.GetSheHe] goes on about the great qualities this philosopher displays and how perhaps he could be employed as a trusted advisor in my council.\n\nOf course, this man is probably his friend and my savvy [chancellor.GetCouncilTitle] will leverage a favour on me if I make a move to hire [chancellor.GetHerHis] philosopher.\n\nHowever, this can be an opportunity to add a new personality to my Court or even my Council..."
darkages_chancellor.18.opta:0 "I'll hire him!"
darkages_chancellor.18.optb:0 "Dismiss the notion, [chancellor.GetFirstName]..."
darkages_court_chaplain.08.t:0 "An Eye for Talent"
darkages_court_chaplain.08.desc:0 "As I am savouring dinner in the company of [court_chaplain.GetName], my [court_chaplain.GetCouncilTitle] proceeds to tell me about a great aquaintance of [court_chaplain.GetHerHim] that would fit perfectly in my Court.\n\nAs we finish our dishes, [court_chaplain.GetSheHe] goes on about the great qualities this shady individual displays and how perhaps he could be employed as a trusted advisor in my council.\n\nOf course, this man is probably his friend and my savvy [court_chaplain.GetCouncilTitle] will leverage a favour on me if I make a move to hire [court_chaplain.GetHerHis] discreet character.\n\nHowever, this can be an opportunity to add a new personality to my Court or even my Council..."
darkages_court_chaplain.08.opta:0 "I'll hire him!"
darkages_court_chaplain.08.optb:0 "Dismiss the notion, [court_chaplain.GetFirstName]..."
darkages_marshal.11.t:0 "An Eye for Talent"
darkages_marshal.11.desc:0 "This morning [marshal.GetName] asked me to have a private word about a matter that might interest me concerning my Court and even the ruling of the Realm.\n\nWith my curiosity piqued, I listened my [marshal.GetCouncilTitle] presenting me a man with a meticulous and organized spirit in the person of [candidate.GetName].\n\nI was told this man could be a good addition to my Court or even, if I felt so inclined and given his talents, to be invited as a Councillor.\n\nOf course I am sure old [marshal.GetFirstName] is rooting for someone who increases [marshal.GetHerHis] personal clout, perhaps even a friend but in all truth this is a matter that might interest me, indeed..."
darkages_marshal.11.opta:0 "I'll hire him!"
darkages_marshal.11.optb:0 "Dismiss the notion, [marshal.GetFirstName]..."
darkages_spymaster.22.t:0 "An Eye for Talent"
darkages_spymaster.22.desc:0 "In the late hours of the evening, while I was taking air from the reinvigorating northern winds, my [spymaster.GetCouncilTitle] silently approached me with a sly smile on [spymaster.GetHerHis] face.\n\nIt seems [spymaster.GetName] would like to introduce me to someone [spymaster.GetSheHe] knows well and have a high opinion about. This person is named [candidate.GetName] and has a reputation as a very sound commander.\n\nUpon my questioning, it seems he learned his ropes as a mercenary captain that never had a chance to serve under a proper noble banner.\n\nMy [spymaster.GetCouncilTitle] might be willing to place a friend in a powerful position inside my Court or even my Council but I know how hard it might be to find proper commanders these days..."
darkages_spymaster.22.opta:0 "I'll hire him!"
darkages_spymaster.22.optb:0 "Dismiss the notion, [spymaster.GetFirstName]..." 
darkages_steward.11.t:0 "An Eye for Talent"
darkages_steward.11.desc:0 "As I was browsing some scrolls during the afternoon in my private office, [steward.GetName] knocked on the door, asking me to discuss a matter of some importance.\n\nAs I invited my [steward.GetCouncilTitle] to sit and be at ease, I could not miss [steward.GetHerHis] eager expression as [steward.GetSheHe] proceeded to present me a certain person of interest that might be a good candidate to be included in my Court or even Council.\n\nAs the matter was fully explained, [candidate.GetName] seems to be rather talented but probably also a friend of [steward.GetFirstName] that my crafty [steward.GetCouncilTitle] wants included in the court politics..."
darkages_steward.11.opta:0 "I'll hire him!"
darkages_steward.11.optb:0 "Dismiss the notion, [steward.GetFirstName]..." 
darkages_spouse.08.t:0 "An Eye for Talent"
darkages_spouse.08.desc:0 "After a night of lovemaking, during the morning my sensual [spouse.GetCouncilTitle] whispered temptingly in my ear that [spouse.GetSheHe] knows about a certain girl that failed to be introduced to Court thanks to some muddy intrigue, but that has a set of nice skills and traits that might be useful inside our circle.\n\n After all, one should always look for talented individuals to rely on, should the occasion arise.\n\nAs my cunning [spouse.GetCouncilTitle] is probably also advancing [spouse.GetHerHis] own agenda promoting a friend, the fact of the matter is this girl named [candidate.GetName] really shows significant promise, even if including this notorious woman in our Court will cost me Prestige..."
darkages_spouse.08.opta:0 "I'll welcome her!"
darkages_spouse.08.optb:0 "Dismiss the notion, [spouse.GetFirstName]..."
darkages_councillors_negative_opinion.01.t:0 "Poisonous Rumours"
darkages_councillors_negative_opinion.01.desc:0 "Recently I detected an attempt by someone that can only be part of my Council to smear me among the Courtiers, Guests and Vassals of mine that are susceptible to be influenced.\n\nThis bad word about me can only be spoken out of contempt about my person which, without proof, points perhaps to [councillor_prey.GetName].\n\nI must be on my guard about possible future attempts to defame me again, while perhaps a reshuffle of the Council positions to accomodate someone with better opinion of myself is in order..."
darkages_councillors_negative_opinion.01.opta:0 "I am not happy at all..."
darkages_councillors_negative_opinion.01.optb:0 "Let's contain the damage done!"
darkages_councillors_negative_opinion.01.optc:0 "Attempt to disclose the true intriguer..."
darkages_councillors_negative_opinion.01.tt1:0 "Besides the effects displayed, every Courtier, Guest and Vassal of yours that are susceptible to a good intrigue will be Disgusted with you\n"
darkages_councillors_negative_opinion.01.tt2:0 "This option is available because you are either Gregarious, Diligent, Ambitious, Diplomat or you have at least a Diplomacy of 12. You attempt to influence positively the people involved. Besides the stated consequences, there is a chance based on your Diplomacy Skill (the higher the Diplomacy, the lower the chance) and in your Diplomacy Education (lowers the chance), that every Courtier, Guest and Vassal of yours that are susceptible to a good intrigue will be Disgusted with you\n"
darkages_councillors_negative_opinion.01.tt3:0 "This option is available because you are either Vengeful, Wrathful, Callous, Schemer or you have at least an Intrigue of 12. While you will suffer the consequences of the bad word being said about you among those that are susceptible to it, you will attempt to discover and find proof about who is really behind this intrigue. The success of this action depends positively on your high level of Intrigue, on your level of Dread - anything better than 15 will provide a bonus, with higher Dread granting bigger bonuses - and on having an Intrigue Education. Negatively impacting the success chance, low levels of Dread (less than 10), being Lazy, being Compassionate or being Trusting will have an impact. Your Prestige will be affected depending on the success of this action\n"
darkages_councillors_negative_opinion.02.t:0 "A Rascal Uncovered!"
darkages_councillors_negative_opinion.02.desc:0 "My inquiry into the matter of the rumours circulating about myself was a successful act of ingenious investigation and thinking!\n\nIt was with a sense of victory, relief but at the same time disgust that I learned about the antics of [councillor.GetName] concerning the lies [councillor.GetSheHe] spread about me...\n\nNow, at the very least, compensation is in order!"
darkages_councillors_negative_opinion.02.opta:0 "A job well done!"
darkages_councillors_negative_opinion.03.t:0 "Lies Without a Trace"
darkages_councillors_negative_opinion.03.desc:0 "My inquiry into the matter of the rumours circulating about myself reached dead ends, protected by a shield of lies, half truths and speculative thinking.\n\nUnfortunately and given the broad reach of my investigation with this failure I am the one whose Prestige will be greatly affected..."
darkages_councillors_negative_opinion.03.opta:0 "If I ever catch the culprit..."
darkages_councillors_negative_opinion.04.t:0 "Embezzlement"
darkages_councillors_negative_opinion.04.desc:0 "Out of a lack of respect and opinion, I discovered today after much study and browsing the Realm's accounts that one of the members of my Council spent far more than he or she was allotted to.\n\nI am far from happy and I suspect [councillor.GetName] is behind these outrageous expenses!\n\nNevertheless, the whole scam was masterfully done and I have no proof against [councillor.GetHerHim]..."
darkages_councillors_negative_opinion.04.opta:0 "Suffer the loss in silence"
darkages_councillors_negative_opinion.04.optb:0 "Mend the situation using my skills"
darkages_councillors_negative_opinion.04.optc:0 "Accuse and persecute [councillor.GetFirstName]!"
darkages_councillors_negative_opinion.04.tt1:0 "You will publicly reveal the swindle and you can expect the whole scheme will stop\n"
darkages_councillors_negative_opinion.04.tt2:0 "This option is available because you are either an Administrator, Greedy, Diligent or have at least 12 in the Stewardship Skill. You will attempt to cut your losses whenever possible by persuading all innocent involved parties to reach a financial agreement with you\n"
darkages_councillors_negative_opinion.04.tt3:0 "This option is available because you are either Paranoid, Callous, Vengeful, Arbitrary or Deceitful. You will imprison your suspect without proof, together with more individuals that are probably innocent in order to boost your Prestige. You will confiscate a part of what was stolen from all the involved parties. Of course there are other issues with this option. Don't forget that high Dread and Tyranny can also lead to murder attempts on your character\n"
darkages_councillors_negative_opinion.05.tt4:0 "No Prestige loss"
darkages_councillors_negative_opinion.05.t:0 "A Tainted Outlook"
darkages_councillors_negative_opinion.05.desc:0 "First I noticed the hints with unease, then I noted the clues with anger and finally I confirmed someone on my Council is clearly attempting to harm my Prestige by spreading half truths and lies about my person among my peers.\n\nWhile I have tried to discover who is the guilty member of the council, the rascal covered his - or her - tracks very well and my investigation came to naugh.\n\nThis being said, I have a strong suspicion about the actions of [councillor.GetName]... is [councillor.GetSheHe] the traitor?"
darkages_councillors_negative_opinion.05.opta:0 "I will recover my Prestige in time..."
darkages_councillors_negative_opinion.05.optb:0 "My political expertise will save me"
darkages_councillors_negative_opinion.05.optc:0 "I'll arrest my Councillor!"
darkages_councillors_negative_opinion.05.tt3:0 "This option is available because you are either Paranoid, Callous, Vengeful, Arbitrary or Deceitful. You will imprison your suspect without proof, together with more individuals that are probably innocent in order to partly avoid the Prestige loss. Of course there are other issues with this option. Don't forget that high Dread and Tyranny can also lead to murder attempts on your character\n"
darkages_councillors_negative_opinion.05.tt2:0 "This option is available because you are either a Diplomat, Gregarious, Diligent or you have at least 12 in your Diplomacy Skill. You attempt to mend your relations with your peers, the success of which depends on your Diplomacy Skill and on other factors directly or indirectly related with the task\n"
darkages_councillors_negative_opinion.05.tt1:0 "You will publicly reveal what you know and the actions of the traitor will probably stop\n"
darkages_councillors_negative_opinion.06.t:0 "Religious Misgivings"
darkages_councillors_negative_opinion.06.desc:0 "Recently I became aware about the uneasiness of all religious dignitaries regarding my conduct.\n\nThis is extremely aggrieving as I find no fault in my decisions concerning any religious matter.\n\nAs things stand, I learned that someone inside my Council is diminishing my stand among the religious elites and my Piety suffers.\n\nGiven the poor opinion about me, I think the main suspect of such nefarious act is none other than [councillor.GetName].\nNow I need to decide what I'll do..."
darkages_councillors_negative_opinion.06.opta:0 "Accept my fate and give the other cheek"
darkages_councillors_negative_opinion.06.optb:0 "Try to mend the situation"
darkages_councillors_negative_opinion.06.optc:0 "I'll arrest [councillor.GetFirstName]!"
darkages_councillors_negative_opinion.06.tt3:0 "This option is available because you are either Paranoid, Callous, Vengeful, Arbitrary or Deceitful, or have at least 20 of Dread. You will imprison your suspect without proof, together with more individuals that are probably innocent in order to partly avoid the Piety loss. Of course there are other issues with this option. Don't forget that high Dread and Tyranny can also lead to murder attempts on your character\n"
darkages_councillors_negative_opinion.06.tt2:0 "This option is available because you are either a Theologian, Zealous, Diligent or you have at least 12 in your Learning Skill. You attempt to mend your relations with the religious authorities, the success of which depends on your Learning Skill and other factors directly or indirectly related with the task\n"
darkages_councillors_negative_opinion.06.tt1:0 "You will publicly reveal what you know and the actions of the traitor will probably stop\n"
darkages_councillors_negative_opinion.06.tt4:0 "No Piety Loss"
darkages_councillors_negative_opinion.07.t:0 "Dynastic Gamble"
darkages_councillors_negative_opinion.07.desc:0 "Recently I became aware of rumours emanating from my Council that mar my Dynasty's Renown, with vitriol being spread about my capabilities of managing my Realm.\n\nAfter a cursive private investigation into the matter, I was unable to pinpoint the guilty Councillor but I suspect [councillor.GetName] is behind this scheme.\n\nI must be on my guard about Councillors with poor opinion of me..."
darkages_councillors_negative_opinion.07.opta:0 "I can only care for the future..."
darkages_councillors_negative_opinion.07.optb:0 "Attempt to mitigate the damage"
darkages_councillors_negative_opinion.07.optc:0 "Time to accuse [councillor.GetFirstName]!"
darkages_councillors_negative_opinion.07.tt3:0 "This option is available because you are either Paranoid, Callous, Vengeful, Arbitrary or Deceitful. You will imprison your suspect without proof, together with more individuals that are probably innocent in order to partly avoid the Renown loss. Of course there are other issues with this option. Don't forget that high Dread and Tyranny can also lead to murder attempts on your character\n"
darkages_councillors_negative_opinion.07.tt2:0 "This option is available because you are either August, Arrogant, Diligent or you have at least 12 in your Diplomacy Skill. You attempt to come clean of the rumours surrounding your competence and that of your Dynasty, the success of which depends on your Diplomacy Skill and other factors directly or indirectly related with the task\n"
darkages_councillors_negative_opinion.07.tt1:0 "You will publicly reveal what you know and the actions of the traitor will probably stop\n"
darkages_councillors_negative_opinion.07.tt4:0 "No Renown Loss"
darkages_county_tax_cut:0 "Tax Cut"
darkages_county_tax_cut_desc:0 "This County has its taxes significantly reduced"
darkages_tax_break:0 "Provide a Tax Break"
tax_break_decision_tooltip:0 "Provide a tax break to unhappy provinces in your Domain"
tax_break_desc:0 "With Popular Opinion running very low in some of your Provinces, maybe it is time to give your population a time to rejoice in order to avoid less pleasant consequences such as murder attempts.\n\nIt will cost a significant income but personal safety comes first!"
darkages_tax_break_confirm:0 "It is wiser to play safe"
darkages_assemble_estates:0 "Assemble the Estates of the Realm"
darkages_assemble_estates_desc:0 "I can summon the different social factions inside my Realm in order to attempt to set a constructive and very favourable policy agenda over the long term. I will have the opportunity to select the agenda of the meeting in a follow up event. If I proactively organize the meeting through this decision I will have an higher chance of success than if reacting to a demand of the various factions of the Realm. Once organized, for 10 years another meeting cannot be organized. The chance of success depends positively on my Skills higher than 11 and negatively on my Skills lower than 8."
darkages_assemble_estates_decision_tooltip:0 "Summon the Estates of the Realm for a host of benefits"
darkages_assemble_estates_confirm:0 "Organize the whole affair"
darkages_county_despondent:0 "Despondent Political Environment"
darkages_county_despondent_desc:0 "The social parties of this County feel aggrieved because their Ruler lacks the initiative to hold the Estates of Realm for a long time"
darkages_estates_of_the_realm.01.t:0 "A Special Demand"
darkages_estates_of_the_realm.01.desc:0 "My vassals as well as lower segments of society are getting restless as for a long time I have not assembled the Estates of the Realm to plan our strategy over the long term.\n\nThis is a costly affair and things can go sour for me if I lack the ability to cause a good impression on everyone.\n\nI must weight carefully the pros and cons of organizing the whole affair..."
darkages_estates_of_the_realm.01.opta:0 "Summon everybody to the palace!"
darkages_estates_of_the_realm.01.optb:0 "Not going to organize it at this time..."
darkages_estates_of_the_realm.01.tt1:0 "Besides the effects presented below, all vassals and sub vassals of your Realm will be incensed by your refusal to assemble the Estates of the Realm. You will not be able to pick the Assemble the Estates of the Realm Decision for 2 years\n"
darkages_county_estates_1:0 "Estates of the Realm"
darkages_county_estates_1_desc:0 "The effects of a successful grand meeting of all the interested factions of the Realm"
darkages_county_estates_2:0 "Estates of the Realm"
darkages_county_estates_2_desc:0 "The effects of a successful grand meeting of all the interested factions of the Realm"
darkages_county_estates_3:0 "Estates of the Realm"
darkages_county_estates_3_desc:0 "The effects of a successful grand meeting of all the interested factions of the Realm"
darkages_county_estates_4:0 "Estates of the Realm"
darkages_county_estates_4_desc:0 "The effects of a successful grand meeting of all the interested factions of the Realm"
darkages_county_estates_5:0 "Estates of the Realm"
darkages_county_estates_5_desc:0 "The effects of a successful grand meeting of all the interested factions of the Realm"
darkages_county_estates_6:0 "Estates of the Realm"
darkages_county_estates_6_desc:0 "The effects of a successful grand meeting of all the interested factions of the Realm"
darkages_county_estates_7:0 "Estates of the Realm"
darkages_county_estates_7_desc:0 "The effects of a successful grand meeting of all the interested factions of the Realm"
darkages_county_estates_8:0 "Estates of the Realm"
darkages_county_estates_8_desc:0 "The effects of a successful grand meeting of all the interested factions of the Realm"
darkages_estates_of_the_realm.02.t:0 "A Successful Enterprise"
darkages_estates_of_the_realm.02.desc:0 "I was able to lead the work at the Estates of the Realm in a most professional and enlightened way!\n\nSeveral important policies were implemented, a general feeling of cooperation was forged and in the end I was able to impress everyone with my leadership skills!\n\nNow it is time to turn into reality what was planned."
darkages_estates_of_the_realm.02.opta:0 "Great news!"
darkages_estates_of_the_realm.02.tt1:0 "Besides the displayed effects every vassal and sub vassal of the Realm will be happy with you. Also, inside their own Domains, the same policy that was approved in the Estates will be applied there, too\n"
darkages_estates_of_the_realm.03.t:0 "Mixed Feelings"
darkages_estates_of_the_realm.03.desc:0 "As the Estates of the Realm were assembled, it soon became clear the discussions were going on and on without any significant breakthroughs.\n\nEveryone was entrenched in their own positions and the ability to compromise was almost nil.\n\nIt was also apparent that I was unable to steer and lead the discussions in order to present a more positive result.\n\n All in all, it was a frustrating affair where nothing truly relevant was accomplished..."
darkages_estates_of_the_realm.03.opta:0 "It was all for naught..."
darkages_estates_of_the_realm.04.t:0 "An Abysmal Failure"
darkages_estates_of_the_realm.04.desc:0 "The Estates of the Realm assembly has been a sad affair where my opinions are countered, my decisions are disregarded and I risk being a political puppet of my own Realm factions, be they noble or common.\n\nIn the end it has been an expensive affair where nothing so far as been accomplished and where I am politically losing the reigns over my own subjects..."
darkages_estates_of_the_realm.04.opta:0 "What a costly blunder..."
darkages_estates_of_the_realm.04.optb:0 "Assert my political will!"
darkages_estates_of_the_realm.04.tt1:0 "This option is available because you have at least a Dread of 30, are Callous, are Sadistic, are Vengeful or are Arbitrary. You assert your position instiling fear on everyone and avoid being manipulated in the process\n"
darkages_estates_realm_lost:0 "Politically Outmanoeuvred"
darkages_estates_realm_lost_desc:0 "This character was manipulated by everyone in the recent Estates of the Realm assembly"
darkages_estates_of_the_realm.05.t:0 "A Timely Warning"
darkages_estates_of_the_realm.05.desc:0 "One morning, while strolling along my capital in the company of [spymaster.GetFirstName], my [spymaster.GetCouncilTitle] mentioned a subject that [spymaster.GetSheHe] said was nagging [spymaster.GetHerHim] for some time.\n\nAs it soon became clear, [spymaster.GetFirstName] is worried about the pressure the various factions in my Realm might exert on me to assemble the costly Estates of the Realm in order to discuss matters of long term policy concerning everyone.\n\nIn the knowledge this request will only be voiced if my treasury supports the venture, it is clear from a political point of view that I will reap additional rewards in terms of Prestige and chances of success if I am the one taking the Decision to Assemble the Estates of the Realm instead of reacting to the factions' demands.\n\n As I have been warned, my [spymaster.GetCouncilTitle] claims [spymaster.GetHerHis] mind is now at rest..."
darkages_estates_of_the_realm.05.opta:0 "Thank you for your worry, [spymaster.GetFirstName]!"
darkages_councillors_negative_opinion.08.t:0 "A Crucial Warning"
darkages_councillors_negative_opinion.08.desc:0 "As I was reading an important report, my mind suddenly concentrated on a counsel provided by my [spymaster.GetCouncilTitle].\n\nAs things turned out, [spymaster.GetName] warned me about the political dangers of having Councillors with negative opinion of me providing advice and managing my policies.\n\nAs unforeseen consequences might arise, my [spymaster.GetCouncilTitle] cautioned me to get rid of such Councillors or to improve their opinion about me..."
darkages_councillors_negative_opinion.08.opta:0 "Thank you for your advice!"
darkages_check_development.01.tt10:0 "If you are seeing only this option in the event it means you would be too much into debt after paying for the improvements in [my_county.GetName], thus you have no option other than refuse. Increasing the Development tier, something that happens roughly every ten points of Development, is an expensive - very expensive at high levels - project\n"
darkages_opinion_range_1:0 "Distance"
darkages_opinion_range_2:0 "Distance"
darkages_opinion_range_3:0 "Distance"
darkages_opinion_range_4:0 "Distance"
darkages_opinion_range_5:0 "Distance"
darkages_check_development.04.tt1:0 "Development in the province will progressively lower until the next rounded dozen for the duration of the 'Development Curtailed' county modifier\n"
darkages_check_development.05.t:0 "A Sage Advice"
darkages_check_development.05.desc:0 "During the morning briefing today, my [steward.GetCouncilTitle] made an important point regarding the management of my Domain. Something that highlights the cost of major infrastructure investments for my Counties to reach their full potential.\n\nAs it is, I must be prepared to fund major infrastructure projects every ten levels for the provinces to continue their Development. Unless I have a Stewardship of 21 or I am an Architect - costs then are halved - the calculated minimum gold I must have on the treasury to be able to fund such Development per province is the following:\n\n          Development 10-19: 25 gold\n          Development 20-29: 75 gold\n          Development 30-39: 125 gold\n          Development 40-49: 150 gold\n          Development 50-59: 200 gold\n          Development 60-69: 250 gold\n          Development 70-79: 300 gold\n          Development 80-89: 450 gold\n          Development > 89: 750 gold\n\n[steward.GetFirstName] also made a point in telling me these values might not be enough to cover the full price required, but at least [steward.GetSheHe] guarantees my treasury can support the eventual debt incurred."
darkages_check_development.05.opta:0 "Thank you very much for the information!"
darkages_check_development.05.optb:0 "Please don't bug me more with those boring numbers..."
darkages_dread_brings_death.01.optz:0 "Magnificent job, [spymaster.GetFirstName]!"
darkages_save_roll.tt:0 "Your spies were able to foil the action that may well have caused your demise. The chance for this to happen depends positively on your [spymaster.GetCouncilTitle] very high Intrigue - only something better than 17 qualifies for a bonus - and on being a Schemer. Your own high Intrigue - better than 11 - also increases the chances of this outcome. Affecting negatively this outcome are your low Intrigue - less than 8 - and your [spymaster.GetCouncilTitle] Intrigue lower than 15. As you were about to be facing your own death, you might be understandably shaken, depending on your Personality Traits\n"
darkages_dread_brings_death.02.desc4:0 "As I was departing for a small trip at night to see the stars in a small hill across the nearest river [spymaster.GetName], my [spymaster.GetCouncilTitle], was swift to catch my attention.\n\nAs things stand, it seems an assassination attempt on my person was prevented at the last minute by my spies!\n\nThe assassin paid with his life but it was clear the motivation for this murder attempt was my high Tyranny, or so my [spymaster.GetCouncilTitle] reported..."
darkages_dread_brings_death.01.desc4:0 "Soon after I had taken my dinner and while I was preparing to attend a religious ceremony close to my [ROOT.Char.Custom('FortifiedBuilding')], [spymaster.GetName], my [spymaster.GetCouncilTitle], was swift to catch my attention.\n\nAs things stand, it seems an assassination attempt on my person was prevented at the last minute by my spies!\n\nThe assassin paid with his life but it was clear the motivation for this murder attempt was the Dread I inspire on everyone, or so my [spymaster.GetCouncilTitle] reported..."
darkages_rivals_bring_death.01.desc4:0 "This afternoon, while I was travelling between provinces in my Domain to administer my holdings, [spymaster.GetName], my [spymaster.GetCouncilTitle], was swift to catch my attention.\n\nAs things stand, it seems an assassination attempt on my person was prevented at the last minute by my spies!\n\nThe assassin paid with his life but there is some speculative proof that [target_rival.GetName] planned this vile action, or so my [spymaster.GetCouncilTitle] reported..."
darkages_rivals_bring_death.03.t:0 "Nemesis' Revenge"
darkages_experienced_politician.01.t:0 "Dabbling in Politics"
darkages_experienced_politician.01.desc1:0 "As my position requires, deeply involving myself in the politics of the Realm, I exchange arguments, present ideas, defend my viewpoints and politically backstab other Councillors' arguments.\n\nUnfortunately, I don't seem to grasp entirely the political angle of the question and it becomes clearer and clearer to me that I will never be a great politician..."
darkages_experienced_politician.01.opta:0 "My strengths lie elsewhere"
darkages_experienced_politician.01.tt1:0 "By consequence of being a titled character or to have a seat on your Liege's Council, you had a chance to grasp the political angle of every decision being made about the Realm. Unfortunately, you are not up to the task and depending on your personality this realization might come with some stress attached\n"
darkages_experienced_politician.01.tt2:0 "By consequence of being a titled character or to have a seat on your Liege's Council, you had a chance to grasp the political angle of every decision being made about the Realm. After years of toiling, you know that you are up to the task!\n"
darkages_experienced_politician.01.optb:0 "Remarkable!"
darkages_experienced_politician.01.desc2:0 "As my position requires, deeply involving myself in the politics of the Realm, I exchange arguments, present ideas, defend my viewpoints and politically backstab other Councillors' arguments.\n\nWith time I slowly mastered the art of political manoeuvre to reach my objectives, thus I increased my political effectiveness in all spheres of knowledge."
darkages_experienced_politician.02.t:0 "Political Savvy"
darkages_experienced_politician.02.desc:0 "As I take notice of the performances of [character.GetName] in the Council or among informal Vassal's meetings, I sense [character.GetSheHe] is ever more influential in the decisions being made and the advice being given to me.\n\nIt is no wonder that this political mastery improves [character.GetHerHis] contribution and longstanding influence at large."
darkages_experienced_politician.02.opta:0 "A talented one..."
darkages_experienced_politician.02.tt:0 "[character.GetFirstName] gained the trait 'Cunning Politician'"
darkages_control_brings_death.01.desc_d:0 "As I am travelling inside my Domain in the lands of [target_county.GetName] to oversee a minor building project, my [spymaster.GetCouncilTitle] approaches me and claims we need to plan again our route as there are bandits ahead waiting to ambush us.\n\nAs things come to light, my spies were able to detect these outlaws and the safest option for us is to avoid them altogether.\n\nFeeling this was a close call, it is obvious to me the County is not safe due to a  less than optimal level of Control..."
darkages_rivals_bring_death.02._z:0 "As I am travelling inside my Domain in the lands of [target_county.GetName] to oversee a minor building project, my [spymaster.GetCouncilTitle] approaches me and claims we need to plan again our route as there are angry peasants ahead waiting to ambush us.\n\nAs things come to light, my spies were able to detect these vermin and the safest option for us is to avoid them altogether.\n\nFeeling this was a close call, it is obvious to me the County is not safe for me due to a the poor Opinion the locals have about my person..."
darkages_culture_change_brings_death.01.desc4:0 "As I was on my way to a nearby village today to check on an aggrieved family that was cruelly robbed, my [spymaster.GetCouncilTitle] pushed me aside with a serious stare.\n\nAfter a while, [spymaster.GetSheHe] was adamant telling me an assassin was caught two hours ago planning to murder me in the nearby village.\n\nThe thug paid with his life after being 'rudely' interrogated and it was clear the motivation for this murder attempt was the #color_red Cultural Conversion#! I have ordered in one of my Provinces.\n\nUnfortunately, the wretch died before singing the names of the involved parties..."
darkages_religious_change_brings_death.01.desc4:0 "As I was on my way to a nearby village today to pay a visit to a cherished acquaintance that was ill, my [spymaster.GetCouncilTitle] briskly warned me about a murder attempt against me being thwarted at the last minute.\n\nAfter some commotion, [spymaster.GetSheHe] was adamant telling me an assassin was caught planning to murder me in the nearby village.\n\nThe thug paid with his life after being 'creatively' interrogated and it was clear he was a religious fanatic hailing from the province where I have ordered a #color_red Religious Conversion#!.\nThese type of ambitious policies can lead to dangerous implications down the road..."
darkages_relation_brings_death.01.desc4:0 "While I was preparing to leave my [ROOT.Char.Custom('FortifiedBuilding')] to attend a ceremony at the local market just outside the walls, I was interrupted by [spymaster.GetName], together with [spymaster.GetHerHis] entourage and in the most urgent tone.\n\nAfter I calmed everyone down, I got the final word that a murder attempt against me was prevented by my internal security at the last moment!\n\nMy [spymaster.GetCouncilTitle] continued to explain the fatal interrogation of the assassin, together with a few material clues, pointed the wicked deed was ordered from one of my vassals that probably is aggrieved enough with me and that has a personality capable of planning such despicable act..."
darkages_fabricate_claim_brings_death.desc4:0 "As I was preparing to go alone fishing on a small pond near my [ROOT.Char.Custom('FortifiedBuilding')], my [spymaster.GetCouncilTitle] appeared suddenly and told me to change my schedule as there were cardinal clues regarding a possible murder being attempted against my life today!\n\nAs things stand, [spymaster.GetName] has been monitoring the situation abroad and there were indications for some time the secret mission I gave [chaplain.GetName], my [chaplain.GetCouncilTitle], has caused a dangerous revenge from foreign parties.\n\nUnfortunately, it was not possible to catch the assassin to learn more about the whole scheme and who has been involved from our side..."
darkages_traits_bring_death.01.desc4:0 "My informers, lead by [spymaster.GetName], told me to avoid being seen in public in the next weeks as agitators have been fanning the flames of hate with my commoners and peasants.\n\nMy [spymaster.GetCouncilTitle] told me there are major issues with my personality and my day to day behaviour that causes the populace to revolt against my rule and threaten my life.\n\nIt seems this time I escaped but next time I might have an unpleasant and dangerous surprise..."
darkages_stress_reduction_player.02.t:0 "The Intricacies of Stress"
darkages_stress_reduction_player.02.desc:0 "As I am embarking in the management of my Realm, my Councillors asked me to pay a cardinal attention to my Stress.\n\nI was informed that my Stress will slowly go up if I engage in offensive wars that tax my intellect, my emotions and my morals, whereas if I am at peace it will slowly decrease along the time.\n\nOf course, the rate of accruing Stress for offensive warfare is very different if someone is a Compassionate, Forgiving individual or if one is a Callous, Sadistic one.\nIn the first case, the Stress will build up much faster than the last one.\n\nSimilarly, when at peace, a Calm, Patient individual will lose Stress much faster than a Wrathful, Impatient one.\n\nWith the certainty these variations will happen silently and along the life of a character, that Stressed characters on average live shorter lifes than unstressed ones, one must be careful to consider his or her behaviour in the world of Dark Ages..."
darkages_stress_reduction_player.02.opta:0 "I take notice of the advice"
darkages_swap_traits.01.t:0 "A Day of Intimate Reckoning"
darkages_swap_traits.01.desc:0 "As I stand naked and curled together with my intimate acquaintance after a night of passionate lovemaking, I ponder if the void I feel inside me is worth the jolt I experience upon giving way to my own lust...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.01.opta:0 "Rubbish! I am what I am!"
darkages_swap_traits.01.optb:0 "A change of priorities might be in order..."
darkages_swap_traits.01.optc:0 "I'll embrace what I once despised..."
darkages_swap_traits.tt1:0 "You don't change your personality but this experience leaves you somewhat shaken\n"
darkages_swap_traits.tt2:0 "You decide to suppress an angle of your personality and a new personality trait will manifest itself. Understandably, this change causes significant distress\n"
darkages_swap_traits.tt3:0 "You decide to radically change your personality and adopt views contrary to what you have always cherished. As might be expected, this radical change causes very serious consequences\n"
darkages_swap_traits.02.desc:0 "As I restrain myself yet another time after a tempting and seductive soul offers a promise of pleasure and bliss, I feel a sting of guilt and wonder if I am losing too much about the color and savour of living...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.03.desc:0 "Another meal, another experience about eating as much as possible, savouring as many flavours as my tongue and my stomach can humanely endure...\n\nIs this what I want for myself?\nBesides and given the bouts of inactivity after such courses, it cannot be that healthy nor appropriate for someone with my responsibilities...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.04.desc:0 "As I took some vegetables together with a parsimonious amount of plain meat in the place of a proper lunch, I ponder if my restrained outlook on life is not castrating my soul in some way.\n\nAfter all, what is the meaning of life if not experience the most pleasure one can take from so many different circumstances and opportunities that randomly sprout up?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.05.desc:0 "I refused yet again to be moved by a plea for help from a childhood friend of a much lower condition.\nAs I think about her need to feed her children and the paltry sum that she lacks, I start getting goosebumps and feeling an hint of doubt about myself and my values.\n\nMaybe I am not parsimonious at all. Maybe I am downright Greedy and value too much material wealth over other, more commendable bonds?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.06.desc:0 "After some time spent calculating the accounts of my household, I cannot fail to notice too much gold is being wasted due to the carefree way I deal with it.\n\nIn fact, I am starting to question my behaviour: am I a good person that treasures the true emotions in life or am I simply a fool with a soft heart that gets abused everywhere and by everyone?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.07.desc:0 "Another day passes without a single mark left by myself on it. My low initiative is the cardinal aspect that governs my life, my relationships and my - absent - deeds. Deeply distrubed, I look to the past and see how pointless my life has been, how devoid of purpose.\nAs my candle of life burns, I feel I am wasting the wax away, day by day, without care.\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.08.desc:0 "As I busily go from one enterprise to the next, I start getting a nagging feeling that all my efforts are devoid of a grand purpose, it seems every effort I make counts for nothing in the grand scheme of things.\nWhat if I slowed down, enjoying more the passing of time, spending more time with things that could provide me with a bigger purpose to my soul?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.09.desc:0 "As I am standing in my bedroom cooling off another busy meeting with my Council, I ponder about my aggressive tirades, forceful arguments and booming voice with which I commanded the whole meeting.\n\nIt is clear that I am used to enforce my positions through my menacing attitude and not by sound arguments, seldom keeping a responsible outlook towards those who serve me.\nI look to myself and start questioning my behaviour over all these years...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.10.desc:0 "Always calm, always composed, always respectful. It seems great and perfect when one examines such behaviour but keeping this stance has been getting on my nerves as of late.\n\nWould it not be more worthy if I let some emotion permeate my conduct? Could I be more persuasive in a number of instances if I emotionally engaged more with the people around me?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.11.desc:0 "Events in life pass by myself as my patience let everything flow, everything placed in the true scope of our insignificance.\n\nUnfortunately, many take this positive trait as a sign of weakness and ever and ever push a bit further, plan a bit deeper, act a bit bolder... too bolder.\nAs things stand and considering my outlook on life I feel I am at a crossroads now...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.12.desc:0 "Again and while waiting for the Council to assemble, I am already getting nervous, thinking too much on what is going to happen, who will play what role in this new challenge of today. Everyday is a challenge for my nerves.\n\nMy impatience takes its toll on my mind and actually I know in whispers I am accused of acting to rashly without thinking over the whole consequences of my acts.\nThis makes me think. This makes me feel... pity... of myself.\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.13.desc:0 "My past was spent feeling superior to others. I am distant, aloof and always have a sharp word at the tip of my tongue to make others feel inferior.\n\nUnfortunately, I feel an emptiness as I can't seem to be able to establish a true link with other people as nobody but sycophants approach me to she their joys, their sorrows... their life.\nDoubts and cracks have appeared in my previously unconquerable soul.\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.14.desc:0 "Always the unassuming character. Always meek, submissive and... weak.\n\nYes, that is what I have been for so long!\nPerhaps people of my birth and station need to be much more decisive and colourful than what I have been. This sting I feel upon my soul is nagging me to no end.\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.15.desc:0 "After another meeting with my close relatives, I look back at the latest web of deceit and lies I spread to control and manipulate everyone, everywhere. At the core, I am addicted to telling stories, letting my other personality traits to decide whether these lies and white or black.\n\nMaybe I am a coward wall of mirrors that I use to escape the harshness of reality?\nCan I continue living without fooling myself first of all?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.16.desc:0 "Oh yes, the peace of mind of being honest. The moral high ground. Unfortunately it doesn't work out that way.\nPeople know me as an upfront soul while in some ways and others helping themselves at my expense.\n\nBesides, sometimes truth it too important to forgo being protected by a ring of effective lies.\nI have failed there.\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.17.desc:0 "And here we are again. My lack of moral fiber betrayed my intentions and my objectives had yet again to be postponed.\n\nThis lack of courage, the fear that has a solid grip in my heart has been blocking the fulfilment of my destiny.\nIf only I could place my will and my heart into changing something about me, this would be it...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.18.desc:0 "Yes, it is glamorous to be valiant, to be brave. Unfortunately it also means sometimes I overestimate my capabilities.\n\nAs life keeps telling me again and again, if I overreach, destiny punishes me.\nMaybe a different, less assertive approach would be better suited to my responsibilities after all?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.19.desc:0 "Another meeting, another self inflicted punishment. It is so wrong that I struggle to make myself heard, to be assertive and to the point in social environments.\n\nEverytime I talk, I do so in such a constrained way. Also, why am I always hiding from personal contact? After all, I only get a single chance to cause a good first impression. And I usually fail at that.\nIn a life driven by politics, my shyness is a huge liasbility, this is the real truth...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.20.desc:0 "Always the soul of the gathering. Always shinning in social meetings. Always witty with more than a small hint of charm to it.\n\nEvenso, my behaviour has lead me into some tight spots as my proclivity to talk devolves into talking too much, far too much...\n\nMaybe a new approach is in order? Maybe I can curb this tendency to be the center of the attention everytime I arrive...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.21.desc:0 "Another rainy morning to temper conveniently my restless mood as I crave for a new objective...\nNever happy, always searching for more. More riches, more power, more recognition, more relevance. I want more.\n\nUnfortunately this behaviour, while granting me some successes here and there, is a trap carefully designed by my mind to imprison me in a dungeon of almost permanent unhappiness with a few, even if illusive, bouts of bliss. Is this the life I want to live?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.22.desc:0 "It feels good to just experience life as it is, without particularly crafty plans, few objectives and less responsibilities.\nUnfortunately, my position in society demnds more from me than this contented personality can deliver.\n\nI am here to make History, to fulfil my destiny, to lead my subjects and my dynasty to glory!\nOtherwise I am fated to be a nobody, a nonentity with a small place in the footnotes of History...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.23.desc:0 "I do what I want, decide how I want everything and treat everybody in a mercurial, situational way. There is no moral compass to me, my limits are only set by what is going on in my heart in any given moment.\n\nThis lack of references, while serving me well in a few instances leaves much to be desired in a handful of other ones too...\nbesides, all this lack of cohesion in my behaviour leaves me emotionally lost from time to time.\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.24.desc:0 "After deciding carefully a few important matters in my last Council, I must say that my sense of justice is one of the main issues I care about.\nThis strictness curbs my personality in many ways and my almost ascetic outlook prevents me from savouring life as I should...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.25.desc:0 "Always chasing ghosts. Even earlier today, while basking in the sun together with some of my servants, I tried to guess their motivations, speculate about how they stared and acted towards me.\n\nMy wary behaviour - some call it paranoid! - places a toll upon my nerves. I would be so much more happy if I could avoid worrying in most of the situations, otherwise my social life turns into a game of mirrors where I can never be certain about who truly wish me bad.\nUnfortunately, I am at the mercy of my imagination...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.26.desc:0 "The way I trust everyone makes me easy prey for those who thrive by manipulating my gullible nature.\nIn a position of high responsibility my behaviour can be a fatal mistake.\n\nI would be much better served if my nature was not so trusting, instead carefully analyzing the true motivations of those who can affect my life and my objectives.\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.27.desc:0 "Always a kind word. My heart is always open to give a friendly advice, to hear everyone's grievances, to mend the mental wounds everyone suffer from time to time.\n\nI have misgivings about my behaviour, however.\nIt is as if in my hours of need I don't receive the same as I give away when everybody needs me.\nPerhaps I am surrounded by a bunch of ungrateful souls. Or maybe human nature is not so kind as my compassionate personality shows...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.28.desc:0 "I don't care for the suffering of others, I don't blink for what must be done independently of the consequences for any third party. Unfortunately, my callous nature is usually met with some form of retribution or other... unpalatable stances.\n\nPerhaps if I change my nature a little bit I am more successful in life?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.29.desc:0 "Oh yes, how I love to feel the pain in other person's eyes. The jolt of amusement I feel from observing the misery of others...\n\nUnfortunately, even if inflicting suffering is for me a work of art, I must be honest with myself and note that the consequences of this trait of mine are seldom the best for my interests...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.31.desc:0 "What should I believe in when I have faith in nothing at all? Religion, friendships, the nature of other persons, philosophy...\n\nI only trust my own rationality at the expense of being too caustic with everyone else. For my own good it might be sensible to end this charade and embrace something, follow some ideal, however small.\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.32.desc:0 "Oh yes, it is so conforting to have deep faith and allow it to explain everything under its own light. However, I fear over my life this light has blinded me more than actually enlightened my way in most circumstances. How about being a bit more sceptic and rational when I approach day-to-day situations?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.33.desc:0 "After another Council meeting where I imposed my points of view over everyone, I could not fail to sense the disgust my Councillors displayed about the way I ran the plenary.\n\nSome call me stubborn, others call me resolute in my ideas but the fact of the matter is that my inflexibility has lead over time to some awkward decisions and downright ill conceived plans.\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.34.desc:0 "It is very difficult for someone to predict how will I react to some event, circumstance or emergency.\nThis volatile nature has helped me somewhat, but also makes everything harder as nobody knows where I stand upon any important matter.\n\nPerhaps I would be more effective if I strived to curb this fickleness and conjure a common ground and pattern to my decisions?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.35.desc:0 "Retribution. Here is a word that matters the most to me. After some minimal slight has been done to me, I always seek revenge.\nIn a devious way, it brings peace to my soul.\n\nHowever is this behaviour the best course of action in the great scheme of things? What did I lose so far in so many instances because of this abrasive trait?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.36.desc:0 "Always the nice guy. Always ready to forgive, always willing to forget.\nIn the end, I am someone who is pushed around, perhaps too far in many instances. How about getting serious in regards to the slights everybody always impose on me?\nAfter all, who is in charge here?\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_swap_traits.37.desc:0 "For all my life since childhood that I have been the odd factor in any social environment.\nIt seems I never fit, even if sometimes my far fetched ideas and hunches prove to be correct beyond reproach.\nI have paid dearly for this eccentricity in terms of the day to day relations with my acquaintances as well as my subjects.\nI wonder what I would gain if I forced myself to become more predictable and socially reliable...\n\nAnalyzing my whole life through this new angle, I feel an anguish burning deep inside myself... Who am I? Who do I want to be?"
darkages_add_gold.01.t:0 "Lawless Bounty"
darkages_add_gold.01.desc:0 "Living in a chaotic and undeveloped society, in the relative anonymity of holding only lower titles, there are many instances where I can simply force the hand of my unimportant subjects out of something valuable without losing much credibility.\n\nNothing to feel guilty about. These are simply the rules of life at present times..."
darkages_add_gold.01.opta:0 "A nice complement to my coffers!"
darkages_add_gold.01.tt1:0 "Before the High Middle Ages, while your capital county has less than 20 development and you are only a modest Count or an unimpressive Duke, you can expect to experience this event every few years\n"
darkages_add_gold.01.optb:0 "I am better than that..."
darkages_hire_character:0 "Recruit Specialist"
hire_character_decision_tooltip:0 "You can attempt to recruit a character specialized in a field of knowledge"
hire_character_desc:0 "By enacting this decision you will pay a small sum upfront to finance the search of someone having at least a 3 star education in the Skill you pick.\nA Prestige hit will be suffered due to the perceived weakness of valuable courtiers in your Court.\nIn the case you hire someone, your vassals that are either Callous, Paranoid, Ambitious, Greedy or Disloyal will not be pleased by the new arrival...\n"
darkages_hire_character_confirm:0 "Start the search!"
darkages_recruit_character.01.t:0 "Looking for Talent"
darkages_recruit_character.01.desc:0 "After giving the order to search for a talented individual, I need to provide my men with the type of person I am seeking.\n\nI know I must be patient as some months might pass until results are achieved.\n\nThe success of finding someone that fulfils what I want is partly dependent on my own Prestige and Piety, as the more Prestigious and Pious I am, the easier it is to convince someone to work for me..."
darkages_recruit_character.01.opta:0 "Find me a negotiator"
darkages_recruit_character.01.optb:0 "Find me a warrior"
darkages_recruit_character.01.optc:0 "Find me a warden"
darkages_recruit_character.01.optd:0 "Find me a shady character"
darkages_recruit_character.01.opte:0 "Find me a scholar"
darkages_recruit_character_toast_failure.t:0 "Failure!"
darkages_recruit_character_toast_failure.tt:0 "Your agents were unable to find anyone suitable available for hire"
darkages_recruit_character.02.t:0 "A Suitable Candidate"
darkages_recruit_character.02.desc:0 "My agents found [specialist.GetName], someone who possibly fit what I am looking for to enliven my court.\n\nThe decision to keep [specialist.GetHerHim] is mine alone..."
darkages_recruit_character.02.opta:0 "Hire [specialist.GetHerHim]!"
darkages_recruit_character.02.optb:0 "Dismiss [specialist.GetHerHim]!"
darkages_opinion_envious:0 "Envious"
darkages_loans.01.t:0 "A Loan Offer"
darkages_loans.01.desc:0 "After a careful search, I was discreetly pointed to a cadre of very rich men who could lend the Realm some gold. Of course, my credit goes only so far, based on my main title.\n\nI am dully informed that if I don't repay the loan with the interest in a few years, a special commission will be charged immediately."
darkages_loans.01.optx:0 "On second thought, I am not interested..."
darkages_loans.01.opta:0 "A paltry sum of 100 gold"
darkages_loans.01.optb:0 "A modest sum of 250 gold"
darkages_loans.01.optc:0 "A substantial sum of 500 gold"
darkages_loans.01.optd:0 "A princely sum of 1000 gold"
darkages_loans.01.opta.tt1:0 "You will have a decision to be taken anytime - as long as you have enough funds - to repay 125 gold. Beware that your debts carry over to your primary heir\n"
darkages_loans.01.opta.tt2:0 "You will have a decision to be taken anytime - as long as you have enough funds - to repay 312 gold. Beware that your debts carry over to your primary heir\n"
darkages_loans.01.opta.tt3:0 "You will have a decision to be taken anytime - as long as you have enough funds - to repay 650 gold. Beware that your debts carry over to your primary heir\n"
darkages_loans.01.opta.tt4:0 "You will have a decision to be taken anytime - as long as you have enough funds - to repay 1250 gold. Beware that your debts carry over to your primary heir\n"
darkages_loans.06.t:0 "A Loan Gone Too Far"
darkages_loans.06.desc:0 "Not very good news after my morning stroll.\nAs the loan contracted is long overdue, the lender requests a premium interest to cover his losses."
darkages_loans.06.opta:0 "I'll pay this special interest..."
darkages_loans.06.optb:0 "I'll not pay this sum!"
darkages_loans.06.tt1:0 "If you refuse to pay this special interest and on top of the displayed effects, every vassal of yours that is not Loyal will decrease the opinion of you\n"
darkages_loan_dec:0 "Borrow Gold"
darkages_loan_dec_tt:0 "Meet with rich people to loan you gold"
darkages_loan_dec_desc:0 "I can meet with important people that can lend me some gold. The amount depends on the rank of my main title.\nIt will take around a month for the meeting with the lenders to take place.\n\nOf course there are some drawbacks to this policy but I am in charge of the Realm, here..."
darkages_loan_count:0 "Indebted"
darkages_loan_count_desc:0 "This character owes gold to a lender, tarnishing his and his dynasty's reputation"
darkages_loan_duke:0 "Indebted"
darkages_loan_duke_desc:0 "This character owes gold to a lender, tarnishing his and his dynasty's reputation"
darkages_loan_king:0 "Indebted"
darkages_loan_king_desc:0 "This character owes gold to a lender, tarnishing his and his dynasty's reputation"
darkages_loan_emperor:0 "Indebted"
darkages_loan_emperor_desc:0 "This character owes gold to a lender, tarnishing his and his dynasty's reputation"
darkages_repay_loan_dec:0 "Repay Loan"
darkages_repay_loan_dec_desc:0 "You can choose to repay the gold that you owe the lenders... with interest, of course"
darkages_repay_loan_dec_tt:0 "Pay what you owe"
darkages_loan_dec_confirm:0 "Let's start the search"
darkages_repay_loan_dec_confirm:0 "Pay my debt"
darkages_loan_dec_tt2:0 "You will be offered the chance to refuse the loan at the meeting with the lenders in about a month, so nothing is final for now."
darkages_loans.07.t:0 "An Important Reminder"
darkages_loans.07.desc:0 "Today after lunch I was looking at some numbers with [darkages_stew.GetFirstName], my [darkages_stew.GetCouncilTitle], when [darkages_stew.GetSheHe] informed  me now my finances are in good enough shape to repay my outstanding loan.\n\nPerhaps this is a sound occasion to meet the lenders and settle the issue once and for all through the decision..."
darkages_loans.07.opta:0 "Thank you, [darkages_stew.GetFirstName]!"
darkages_train_combat.03.t:0 "Unexpected Setback"
darkages_train_combat.03.desc:0 "My mock combats in order to train my Prowess caused me an injury... hopefully I will recover quickly!"
darkages_train_combat.03.opta:0 "The risks of practicing combat..."
darkages_opinion_livid:0 "Livid"
darkages_border_raids.01.t:0 "Unsuccessful Raid"
darkages_border_raids.01.desc:0 "Unfortunately, the planned border raids against our neighbours were not successful.\n\nAfter the poor show of my unskilled raiders, my Prestige somewhat suffers..."
darkages_border_raids.01.opta:0 "Next time it will be for real!"
darkages_border_raids.02.t:0 "Successful Raid!"
darkages_border_raids.02.desc:0 "The border raids I carefully planned were a success.\nWhile the amount of gold gained is not much, it will help fill our coffers... and it is also good for my Prestige!"
darkages_border_raids.02.opta:0 "Excellent!"
darkages_border_raids.03.t:0 "Clumsy Raid Attempt"
darkages_border_raids.03.desc:0 "After capturing a pair of peasants hailing form the lands of [raider.GetName], I learned about who was responsible for the unsuccessful attempt to raid my borderlands..."
darkages_border_raids.03.opta:0 "Maybe it is time for payback..."
darkages_border_raids.04.t:0 "Trouble in the Borderlands"
darkages_border_raids.04.desc:0 "Raids in my borderlands were reported recently.\nThe rascals were seen by witnesses to retreat inside the lands of [raider.GetName].\n\nThe damage was minor but nevertheless there is nothing to celebrate, quite the contrary..."
darkages_border_raids.04.opta:0 "Maybe it is time for payback..."
darkages_plan_border_raid:0 "Plan Border Raid"
darkages_plan_border_raid_desc:0 "I can plan minor raids along my borders in order to plunder some gold and increase my Prestige. This can be a good way to add some really needed funds to my coffers.\n\nThe chances of success depend on my Martial Skill, on my Intrigue skill and positively, on having the Reaver trait."
darkages_plan_border_raid_tt:0 "Plan a minor raid that will serve to at least improve a bit the paltry economy of your holdings"
darkages_plan_border_raid_confirm:0 "Do it!"
darkages_plan_border_raid_decision_tt:0 "From planning to execution, it will take a couple of months for the raids to be performed.\n"
darkages_border_raids.05.t:0 "Trespassing the Fence"
darkages_border_raids.05.desc:0 "This morning, [darkages_mars.GetFirstName] had an interesting conversation with me, where my [darkages_mars.GetCouncilTitle] underscored the possibility of planning border raids in order to increase my Gold and Prestige.\n\nThis is only possible because I am still a minor force at the world stage and fortunately, in our age and time laws and customs are very fluid and forgiving of such minor aggressions.\n\nWhile one cannot hope to become rich with such minor endeavours, it is true the raids can provide some direly needed funds and Prestige to me.\n\nI just need to pick the right decision in order to plan a border raid..."
darkages_border_raids.05.tt1:0 "While you are in the tribal era and your highest title is Count or similar, you are able to plan border raids through decision every 5 years"
darkages_border_raids.05.opta:0 "An idea worth considering..."
darkages_border_raids.05.optb:0 "Don't bother me with that idea anymore"
darkages_border_raids.05.tt2:0 "You will never again be disturbed with this tip anymore"
darkages_resting:0 "Resting"
darkages_resting_desc:0 "This character is taking some months off the most demanding work\n"
darkages_rest:0 "Rest a bit"
darkages_rest_desc:0 "You can decide to avoid the most pressing matters of ruling in order to rest a little and reduce stress. Of course, your capability to rule will be severely hindered during the time of your escapade."
darkages_rest_tt:0 "Rest for six months"
darkages_rest_confirm:0 "Time to unwind..."
darkages_bungabunga:0 "Odd Tastes"
darkages_bungabunga_desc:0 "This character participated recently in a lascivious orgy"
darkages_add_deviant.04.t:0 "Hints of an Odd Party"
darkages_add_deviant.04.desc1:0 "Recently I was approached by [organizer.GetName] who seemed to suggest an invitation to a... curious party organized by [organizer.GetHerHim]self and that had the raucous participation of several people, all willing to engage in all sorts of... creative sexual intercourse.\n\nI can't vouch for this interpretation, as much of the conversation was just innuendo that could have other more mundane meaning.\n\nNow, [organizer.GetName] is waiting for an answer. Will I attend this party?"
darkages_add_deviant.04.desc2:0 "Yet again, I am invited by [organizer.GetName] to enjoy a tempting sex party in [organizer.GetHerHis] secluded villa...\n\nThe venue looks promising with some dozen participants dressed or undressed to suit their tastes and allure.\n\nIn the knowledge there is always the risk of getting denounced, I must decide if I will follow my dark instincts or not."
darkages_add_deviant.04.opta:0 "Indeed I will!"
darkages_add_deviant.04.optb:0 "Not my type, really..."
darkages_add_deviant.04.tt1:0 "By participating in this orgy you will have a deviant secret from this point on..."
darkages_startup.01.t:0 "Welcome to Dark Ages!"
darkages_startup.01.desc:0 "Greetings,\n\nYou are about to start a journey a bit different from vanilla Crusader Kings.\n\nHopefully, the stories weaved by the engine number crunching and your choices will lead to more varied and interesting results.\n\nThe difficulty also increases, as several systems are designed to turn the player's character life harder and more challenging.\n\nIf this is your first time with Dark Ages, consider playing with a King or Emperor and perhaps select the Easy level on the Dark Ages "Difficulty" game rule. You will need to adapt your style of play to the vast changes to game balance Dark Ages introduces and you are better off if you start the game in a consolidated and easier position.\n\nEnjoy the ride!"
darkages_startup.01.opta:0 "Provide me with some helpful pointers..."
darkages_startup.01.optb:0 "I am a veteran of Dark Ages already!"
darkages_recruit_character.01.tt1:0 "The amount of Prestige and Piety your character has will have a big impact in the success of the search"
darkages_council.01.t:0 "A Matter of Respect"
darkages_council.01.desc:0 "Today, while the Council was assembled, we delved in several different matters and the overall tone and passion in the discussion was raised ever more, with the notorious [councillor.GetName], sporting a bad attitude towards me, raising [councillor.GetHerHis] voice higher and higher.\n\nUnfortunately, the exchange reached a point where [councillor.GetSheHe] demonstrated full spite and utter contempt for my person and from then on, I knew my Prestige was on the line.\n\nWith news of such a slight reaching out of this meeting, I need to decide what to do..."
darkages_council.01.opta:0 "Allow the issue to pass"
darkages_council.01.optb:0 "Try to outwit [councillor.GetFirstName]"
darkages_council.01.tt1:0 "The success of this option depends on the Diplomacy and on the traits Cunning Politician, Shrewd and Dull of both characters\n"
darkages_council.tt1:0 "You outwit [councillor.GetFirstName]\n"
darkages_council.tt2:0 "Your words feel hollow\n"
darkages_opinion_disrespectful:0 "Disrespectful"
darkages_council.01.optc:0 "Make a veiled threat against [councillor.GetFirstName]"
darkages_council.01.tt2:0 "This option is available because you have at least 25 in Dread\n"
darkages_success.toast:0 "Success!"
darkages_failure.toast:0 "Failure..."
darkages_council.01.toast1:0 "You crush [councillor.GetFirstName] with your arguments!"
darkages_council.01.toast2:0 "You ended up being ridiculed by [councillor.GetFirstName]..."
trait_darkages_pirate:0 "Infamous Pirate"
trait_darkages_pirate_desc:0 "This character commands a powerful pirate fleet"
trait_darkages_pirate_character_desc:0 "[ROOT.GetCharacter.GetNameNoTooltip] commands a powerful pirate fleet"
darkages_council.02.tt1:0 "With the odds at start turned against you - after all [councillor.GetFirstName] is a Cunning Politician - the success of this option depends on the Diplomacy and on the traits Cunning Politician, Shrewd, Schemer and Dull of both characters\n"
darkages_council.02.toast1:0 "You managed to reach a successful compromise!"
darkages_council.02.toast2:0 "You failed to reach a successful compromise..."
darkages_council.02.t:0 "A Talented Councillor"
darkages_council.02.desc:0 "While meeting with my Councillors, it was apparent the savvy [councillor.GetName] is having plans of [councillor.GetHerHis] own regarding the management of my Domain.\n\nIn fact, [councillor.GetHerHis] ideas are sound from an economic point of view and my coffers will stand to gain if I cede to [councillor.GetHerHis] will.\n\nThere are other considerations, however, that might counsel other approach.\n\nIn the end, the decision to challenge [councillor.GetFirstName] is mine and mine only..."
darkages_council.02.opta:0 "Let [councillor.GetName] have [councillor.GetHerHis] way..."
darkages_council.02.optb:0 "Veto the Councillor's idea"
darkages_council.02.optc:0 "Reach for a great compromise"
darkages_council.02.tt2:0 "This option is available because you have either an education in diplomacy, have at least 12 in the Diplomacy Skill, are Gregarious, are a Diplomat or are a Cunning Politician. The success depends on your Diplomacy Skill and on having any the three traits described above - the more, the better\n"
darkages_council.01.toast3:0 "You finish off your Councillor's idea in style!"
darkages_council.01.toast4:0 "In spite of killing your Councillor's idea, you come off as unreasonable and arbitrary..."
darkages_council.02.tt9:0 "You come off as dictatorial and unreasonable...\n"
darkages_council.02.tt10:0 "You silence [councillor.GetName] in style!\n"
darkages_council_diplomacy:0 "Successful Diplomatic Agenda"
darkages_council_diplomacy_desc:0 "This character set in motion with the help of the Council a successful diplomatic agenda for the medium term"
darkages_council_martial:0 "Successful Martial Agenda"
darkages_council_martial_desc:0 "This character set in motion with the help of the Council a successful martial agenda for the medium term"
darkages_council_stewardship:0 "Successful Governance Agenda"
darkages_council_stewardship_desc:0 "This character set in motion with the help of the Council a successful governance agenda for the medium term"
darkages_council_intrigue:0 "Successful Classified Agenda"
darkages_council_intrigue_desc:0 "This character set in motion with the help of the Council a successful classified agenda for the medium term"
darkages_council_learning:0 "Successful Religious Agenda"
darkages_council_learning_desc:0 "This character set in motion with the help of the Council a successful religious agenda for the medium term"
darkages_council.03.t:0 "A Great Synergy"
darkages_council.03.desc1:0 "As the recent council meetings have been very rewarding and successful, there is a golden opportunity to place this intangible synergy to good use.\n\nRight now a comprehensive policy for the mid term concerning diplomacy is ready to be implemented and I stand to profit from its effects.\n\nThere is always the nagging reality of my compromise with the Council to be twisted by my detractors as a sign of failure but should I really be concerned with that angle given the benefits reaped?"
darkages_council.03.desc2:0 "As the recent council meetings have been very rewarding and successful, there is a golden opportunity to place this intangible synergy to good use.\n\nRight now a comprehensive policy for the mid term concerning warfare is ready to be implemented and I stand to profit from its effects.\n\nThere is always the nagging reality of my compromise with the Council to be twisted by my detractors as a sign of failure but should I really be concerned with that angle given the benefits reaped?"
darkages_council.03.desc3:0 "As the recent council meetings have been very rewarding and successful, there is a golden opportunity to place this intangible synergy to good use.\n\nRight now a comprehensive policy for the mid term concerning governance is ready to be implemented and I stand to profit from its effects.\n\nThere is always the nagging reality of my compromise with the Council to be twisted by my detractors as a sign of failure but should I really be concerned with that angle given the benefits reaped?"
darkages_council.03.desc4:0 "As the recent council meetings have been very rewarding and successful, there is a golden opportunity to place this intangible synergy to good use.\n\nRight now a comprehensive policy for the mid term concerning intrigue is ready to be implemented and I stand to profit from its effects.\n\nThere is always the nagging reality of my compromise with the Council to be twisted by my detractors as a sign of failure but should I really be concerned with that angle given the benefits reaped?"
darkages_council.03.desc5:0 "As the recent council meetings have been very rewarding and successful, there is a golden opportunity to place this intangible synergy to good use.\n\nRight now a comprehensive policy for the mid term concerning religious matters is ready to be implemented and I stand to profit from its effects.\n\nThere is always the nagging reality of my compromise with the Council to be twisted by my detractors as a sign of failure but should I really be concerned with that angle given the benefits reaped?"
darkages_council.03.opta:0 "Implement the ideas presented"
darkages_council.03.optb:0 "Manipulate the council"
darkages_council.03.optc:0 "Refuse the ideas presented"
darkages_council.03.tt1:0 "This option is available because you have at least 15 Intrigue, are a Schemer or are Deceitful. You channel the goodwill of the meetings to benefit over the long term on the subject matter discussed\n"
darkages_council.03.tt2:0 "You veto the Council's ideas in order to gain political leverage\n"
darkages_dilettante:0 "Dilettante Ruler"
darkages_dilettante_desc:0 "This character cultivates only a superficial interest about matters of State and looks to be out of the water in managing the Realm"
darkages_council.04.t:0 "A Challenging Debate"
darkages_council.04.desc1:0 "The debate today in the Council is about some serious diplomatic matters.\n\nThe subject matter demands a deep knowledge of Diplomatic theory concepts being discussed as well as a lot of abstract thinking.\n\nI know this is a challenging subject and I must decide how will I approach the discussion..."
darkages_council.04.desc2:0 "The debate today in the Council is about some serious warfare matters.\n\nThe subject matter demands a deep knowledge of Martial theory concepts being discussed as well as a lot of abstract thinking.\n\nI know this is a challenging subject and I must decide how will I approach the discussion..."
darkages_council.04.desc3:0 "The debate today in the Council is about some serious management matters.\n\nThe subject matter demands a deep knowledge of Stewardship theory concepts being discussed as well as a lot of abstract thinking.\n\nI know this is a challenging subject and I must decide how will I approach the discussion..."
darkages_council.04.desc4:0 "The debate today in the Council is about some serious subterfuge matters.\n\nThe subject matter demands a deep knowledge of Intrigue theory concepts being discussed as well as a lot of abstract thinking.\n\nI know this is a challenging subject and I must decide how will I approach the discussion..."
darkages_council.04.desc5:0 "The debate today in the Council is about some serious religious matters.\n\nThe subject matter demands a deep knowledge of Learning theory concepts being discussed as well as a lot of abstract thinking.\n\nI know this is a challenging subject and I must decide how will I approach the discussion..."
darkages_council.04.opta:0 "Involve deeply in the debate"
darkages_council.04.optb:0 "Pretend to know about the subject matter"
darkages_council.04.optc:0 "Admit your lack of knowledge and stay mum"
darkages_council.04.tt1:0 "To be successful and earn an important amount of Prestige by showing your knowledge, you need to have a high Diplomacy Skill, be a Diplomat, be Shrewd, be Gregarious or be Compassionate. Conversely, if you have a low Diplomacy Skill, you are Shy, Dull, Callous or Sadistic, you have less chances of impressing the Council and lose Prestige, instead\n"
darkages_council.04.tt2:0 "To be successful and earn an important amount of Prestige by showing your knowledge, you need to have a high Martial Skill, be a Strategist, be Shrewd, be Brave or be Wrathful. Conversely, if you have a low Martial Skill, you are Craven, Dull, Compassionate or Temperate, you have less chances of impressing the Council and lose Prestige, instead\n"
darkages_council.04.tt3:0 "To be successful and earn an important amount of Prestige by showing your knowledge, you need to have a high Stewardship Skill, be an Administrator, be Shrewd, be Greedy or be Temperate. Conversely, if you have a low Stewardship Skill, you are Generous, Dull, Forgiving or Impatient, you have less chances of impressing the Council and lose Prestige, instead\n"
darkages_council.04.tt4:0 "To be successful and earn an important amount of Prestige by showing your knowledge, you need to have a high Intrigue Skill, be a Schemer, be Shrewd, be Deceitful or be Patient. Conversely, if you have a low Intrigue Skill, you are Honest, Dull, Wrathful or Just, you have less chances of impressing the Council and lose Prestige, instead\n"
darkages_council.04.tt5:0 "To be successful and earn an important amount of Prestige by showing your knowledge, you need to have a high Learning Skill, be a Theologian, be Shrewd, be Zealous or be Diligent. Conversely, if you have a low Stewardship Skill, you are Cynical, Dull, Lazy or Fickle, you have less chances of impressing the Council and lose Prestige, instead\n"
darkages_council.04.tt6:0 "You involve yourself lightly in the discussion picking the right cues for a commentary here and there. Depending on your high Intrigue and the Traits Deceitful, Arbitrary, Fickle, Schemer, Shrewd and Cunning Politician, you might pass the image of knowing much more than what you actually know about the subject matter. If you get caught pretending you know about the issues at hand, you will suffer the consequences\n"
darkages_council.04.tt7:0 "You refuse to engage in the discussion, fully admitting your lack of knowledge. Honest, Just, Compassionate, Forgiving and Loyal Councillors and Vassals will be positively impressed by your sincerity\n"
darkages_council.04.toast1:0 "You mastered the debate and reap a significant amount of Prestige!"
darkages_council.04.toast2:0 "You failed miserably in the debate and lose a significant amount of Prestige..."
rule_darkages_murder_warnings_rule:0 "#B #Bold Dark Ages#!:#! Warnings"
setting_darkages_murder_warnings_yes:0 "Yes"
setting_darkages_murder_warnings_no:0 "No"
setting_darkages_murder_warnings_yes_desc:0 "If there is a Spymaster the player will receive murder warnings."
setting_darkages_murder_warnings_no_desc:0 "The player will not receive murder warnings."
darkages_council.05.t:0 "To Forge a Legend"
darkages_council.05.desc:0 "I was approached today by [councillor.GetName], my friendly [councillor.GetCouncilTitle], that is working to further my Renown in a balanced and effective way.\n\nI was amazed at the concerted steps performed by my Councillors lead by [councillor.GetFirstName] and was glad such a great chance presents at this point in time!\n\nWhile everybody did a great job so far, I must provide funds for the enterprise to have some chance of success... unless..."
darkages_council.05.opta:0 "Provide the funds"
darkages_council.05.optb:0 "...unless I threaten them to solve the issue without funds!"
darkages_council.05.optc:0 "It is not worth the effort..."
darkages_council.05.tt1:0 "The success of this action depends on your Diplomacy - for better or worse - on being a Cunning Politician and on following a Diplomacy Lifestyle\n"
darkages_council.05.tt2:0 "The success of this action depends on your high Dread (>= 20), on being a Torturer, Callous, Sadistic, Cunning Politician or on following an Intrigue Lifestyle. Contributing to a failure are your low Dread (<15), being Dull or the Councillor being Brave, Wrathful, Callous and Cunning Politician\n"
darkages_council.05.tt3:0 "By picking this option, if you are not Lazy you will accrue Stress. If you are Lazy however, you will have your Stress reduced, the amount depending also on your two other Personality Traits\n"
darkages_council.05.toastdesc.01:0 "You will succeed!\n"
darkages_council.05.toastdesc.02:0 "You will fail...\n"
darkages_council.05.toast1:0 "You gain an impressive amount of Renown!"
darkages_council.05.toast2:0 "You lose impressive amounts of Prestige and Renown..."
darkages_council.05.toast3:0 "You gain an impressive amount of Renown!"
darkages_council.05.toast4:0 "You failed to gain Renown..."
darkages_death_purge:0 "met an horrible end in a purge"
darkages_death_purge_killer:0 "met an horrible end in a sanguine purge at the orders of [TARGET_CHARACTER.GetUIName]"
negotiate_alliance_darkages:0 "Establish Alliance"
negotiate_alliance_darkages_desc:0 "You can attempt to establish an alliance with [recipient.GetFirstName] as long as you finance the political move."
negotiate_alliance_darkages_tt:0 "To be successful with this interaction you need to rely on the positive difference in rank to your target, your high Diplomacy, on the very high Diplomacy of your Chancellor, on the good opinion of your target about you, on being a Diplomat, on being Shrewd and on being Gregarious. Conversely, the number of alliances you already have, the low Diplomacy of your target, the negative rank to your target, a negative opinion your target has about you or if you are Dull provide penalties to the attempt. Without any modifiers the chances are slightly stacked against your offer."
darkages_alliances.01.t:0 "To Forge a Mutual Bond"
darkages_alliances.01.desc:0 "...And here we are. Both delegations trying to see if they can reach an agreement that materializes into an Alliance. The intricacies are many, the political implications are aplenty and the hurdles are relevant.\n\nNevertheless, both sides are now negotiating an act with political impact for the future..."
darkages_alliances.01.opta:0 "I'll give my best!"
darkages_alliances.01.optb:0 "Better to cancel the whole thing..."
darkages_alliances.02.t:0 "A Brighter Future Together!"
darkages_alliances.02.desc:0 "The negotiations were difficult but in what I believe was good faith.\n\nThe sum I parted to impress [recipient.GetName] was money well spent.\n\nIn the end we were happy to compliment ourselves as partners and allies!"
darkages_alliances.02.opta:0 "Excellent!"
darkages_alliances.03.t:0 "A Way to Nowhere..."
darkages_alliances.03.desc:0 "In spite the small fortune I spent to finance this whole meeting and impress [recipient.GetName], from the start it became clear there were significant political obstacles to the success of our negotiation.\n\nUnfortunately it all boiled down to a matter of trust... or lack thereoff. In the end it was a failure..."
darkages_alliances.03.opta:0 "An opportunity lost..."
NOT_TEXT_DESC_darkages_interaction_relation_fail:0 "The characters must have an opinion of at least -15 of each other"
darkages_bankrupt.02.t:0 "At the End of My Tether"
darkages_bankrupt.02.desc:0 "With the present level of our treasury comes the lack of funds for the most basic services in my Domain.\n\nIt was with disgust but no surprise that I learned there are not enough funds to keep the militia patrols assuring the safety of my provinces.\nTo add insult to the injury, its is clear the [darkages_county.GetName] is losing its former Development..."
darkages_bankrupt.02.opta:0 "No funds, no joy..."
darkages_bankrupt.02.optb:0 "Use my Prestige to influence the militia"
darkages_bankrupt.02.tt1:0 "This option is available because you have at least 250 Prestige\n"
darkages_opinion_county_bankrupt1:0 "Serious Economic Woes"
darkages_opinion_county_bankrupt1_desc:0 "As the Lord of this County faces a bankruptcy, artisans, commoners and peasants feel the economic hardships involved and a deep sense of inequity"
darkages_opinion_county_bankrupt2:0 "Serious Economic Woes"
darkages_opinion_county_bankrupt2_desc:0 "As the Lord of this County faces a bankruptcy, artisans, commoners and peasants feel the economic hardships involved and a deep sense of inequity"
darkages_opinion_county_bankrupt3:0 "Serious Economic Woes"
darkages_opinion_county_bankrupt3_desc:0 "As the Lord of this County faces a bankruptcy, artisans, commoners and peasants feel the economic hardships involved and a deep sense of inequity"
darkages_opinion_county_bankrupt4:0 "Serious Economic Woes"
darkages_opinion_county_bankrupt4_desc:0 "As the Lord of this County faces a bankruptcy, artisans, commoners and peasants feel the economic hardships involved and a deep sense of inequity"
darkages_opinion_county_bankrupt5:0 "Serious Economic Woes"
darkages_opinion_county_bankrupt5_desc:0 "As the Lord of this County faces a bankruptcy, artisans, commoners and peasants feel the economic hardships involved and a deep sense of inequity"
darkages_bankrupt.03.t:0 "Economic Consequences"
darkages_bankrupt.03.desc:0 "With my bankruptcy and inability to properly manage my assets, my Domain feels the lack of available coin.\n\nAs my court, in a myriad of ways, is one of the prime drivers of the local economies, my subjects feel quite aggrieved towards the hardships they are experiencing..."
darkages_bankrupt.03.opta:0 "We need time to recover"
darkages_bankrupt.03.optb:0 "We can take more debt to alleviate the situation"
darkages_bankrupt.04.t:0 "Spiritual Reckoning"
darkages_bankrupt.04.desc:0 "As I face bankruptcy, today I was confronted by my [religious.GetCouncilTitle] about my lack of sense regarding with my empty treasury.\n\nSparing no words and claiming to be inspired by [ROOT.Char.GetFaith.HighGodName], [religious.GetName] made clear [religious.GetHerHis] disappointment and how my path towards salvation was now farther, much farther, to be reached..."
darkages_bankrupt.04.opta:0 "Accept the rebuke meekly"
darkages_bankrupt.04.optb:0 "Try to manipulate the [religious.GetCouncilTitle]"
darkages_bankrupt.04.optc:0 "Attempt to fast talk the [religious.GetCouncilTitle]"
darkages_bankrupt.04.optd:0 "Engage the [religious.GetCouncilTitle] in a theological debate"
darkages_bankrupt.04.tt1:0 "This option is available because you have at least 12 in Intrigue.\nThe success of this option depends on your traits Deceitful and Schemer as well as your very high Intrigue. Increasing the failure chance are your Honest and Just personality traits as well as a not so high Intrigue\n"
darkages_bankrupt.04.toast1:0 "You were successful in your action and only lose 60 Piety!"
darkages_bankrupt.04.toast2:0 "You failed in your action and lose 500 Piety and a full level of Devotion..."
darkages_bankrupt.04.tt2:0 "This option is available because you have at least 12 in Diplomacy.\nThe success of this option depends on your traits Gregarious and Diplomat as well as your very high Diplomacy. Increasing the failure chance are your Shy and Arbitrary personality traits as well as a not so high Diplomacy\n"
darkages_bankrupt.04.tt3:0 "This option is available because you have at least 12 in Learning.\nThe success of this option depends on your traits Zealous and Theologian as well as your very high Learning. Increasing the failure chance are your Cynical and Arrogant personality traits as well as a not so high Learning\n"
darkages_opinion_despondent:0 "Despondent"
darkages_bankrupt.05.t:0 "Grasping at Straws"
darkages_bankrupt.05.desc:0 "As my bankruptcy is becoming apparent to everyone, as the economy of my Realm suffers thanks to my mismanagement, my Vassals grow restless and discontent up to the point of confronting me with my... questionable financial decisions.\n\nOnly remarkable skills will allow me to escape from the wrath of this ungrateful noble mob!"
darkages_bankrupt.05.opta:0 "Unfortunately I lack such skills"
darkages_bankrupt.05.optz:0 "Better to play it safe"
darkages_bankrupt.05.optb:0 "Use my military to impress the Vassals"
darkages_bankrupt.05.optc:0 "Present a sound management plan to my Vassals"
darkages_bankrupt.05.tt1:0 "This option is available because you have at least 12 in Martial.\nThe success of this option depends on your traits Brave and Strategist as well as your very high Martial Skill. Increasing the failure chance are your Craven and Humble personality traits as well as a not so high Martial Skill\n"
darkages_bankrupt.05.tt2:0 "This option is available because you have at least 12 in Stewardship.\nThe success of this option depends on your traits Greedy and Administrator as well as your very high Stewardship Skill. Increasing the failure chance are your Generous and Impatient personality traits as well as a not so high Stewardship Skill\n"
darkages_bankrupt.05.toast1:0 "You manage to assuage your Vassal's concerns and escape with a small opinion penalty. Congrats!"
darkages_bankrupt.05.toast2:0 "You lose all Tribal or Feudal Authority over your vassals as well as a lasting and nasty opinion penalty. Not good at all!"
