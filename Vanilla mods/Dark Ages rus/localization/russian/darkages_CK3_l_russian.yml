darkages_basic_ai_income:0 "Базовый доход ИИ"
rule_darkages_vassal_taxes_rule:0 "#B #Bold Dark Ages#!:#! Налоги Вассалов"
setting_darkages_vassal_taxes_rule_player:0 "Только Игрок"
setting_darkages_vassal_taxes_rule_player_desc:0 "Налоги вассалов снижаются только для игрока после 10 вассалов, следуя принципу убывающей доходности."
setting_darkages_vassal_taxes_rule_everyone:0 "Каждый землевладелец"
setting_darkages_vassal_taxes_rule_everyone_desc:0 "Налоги вассалов снижаются для всех после 10 вассалов, следуя принципу убывающей доходности."
setting_darkages_vassal_taxes_rule_disabled:0 "Отключено"
setting_darkages_vassal_taxes_rule_disabled_desc:0 "Эта система будет отключена. Ванильная настройка. Играть за титулы более высокого уровня будет намного проще."
darkages_sensible_adopt_admin_powerful_vassals_reqs_tt:0 "Должно быть не менее 75 мнения от всех Могущественных вассалов. Ни один могущественный вассал не может иметь черту Амбициозный или Неверный."
darkages_increase_taxes_decision:0 "Повысить налоги домена"
darkages_increase_taxes_decision_desc:0 "Безжалостно увеличьте налоги в вашем Домене, чтобы наполнить казну. Это возможно, потому что ваше относительно небольшое политическое присутствие предотвращает крупные волнения среди вашего страдающего населения. Через 3 года у вас будет шанс вернуть налоги к норме."
darkages_increase_taxes_decision_tooltip:0 "Заработать больше золота"
darkages_increase_taxes_decision_confirm:0 "Давайте выжмем крестьян!"
darkages_normal_taxes_decision:0 "Вернуть налоги к нормальным ставкам"
darkages_normal_taxes_decision_desc:0 "Откажитесь от черствой политики требования непомерных налогов с населения вашего Домена. Через 3 года у вас снова будет шанс взимать непомерные налоги с крестьян."
darkages_normal_taxes_decision_tooltip:0 "Быть хорошим парнем"
darkages_normal_taxes_decision_confirm:0 "Давайте сделаем это!"
darkages_raise_taxes:0 "Безжалостное налогообложение"
darkages_raise_taxes_desc:0 "Этот персонаж выжимает население Домена, чтобы заработать больше, чем справедливая доля золота"
darkages_startup.08.t:0 "Нехватка золота"
darkages_startup.08.desc:0 "В Dark Ages, при большинстве условий, золота не будет хватать, чтобы купить все. Вам нужно делать выбор, как тратить свои ресурсы, всегда помня, что удача также может сыграть роль в ваших потребностях.\n\nЕсли вы относительно малы - Граф или Герцог - у вас будет возможность выбрать решение резко повысить налоги вашего Домена. Учитывая последствия в долгосрочной перспективе, это обоюдоострый меч, который следует тщательно изучить.\nЕсть и другие решения, которые хорошо дополнят вашу Казну. К ним относятся Коррупция в вашей Державе, запрос у Вассалов специального взноса, конфискация земель у церкви, создание торгового пути или даже строительство пиратского флота. Опять же, проверьте свои Решения, и ликвидность будет у вас под рукой... если вы готовы заплатить цену!\n\nОбратите внимание, что если вы являетесь Административным, Небесным, Мандала или Меритократическим Вассалом, каждые 5 лет ваш Сюзерен будет проводить специальное распределение Золота, чтобы компенсировать ваш особенно низкий ежемесячный доход."
darkages_startup.08.opta:0 "Конечно"
darkages_ruthless_taxation.01.t:0 "Обратная сторона медали"
darkages_ruthless_taxation.01.desc:0 "Пока золото поступает в мою казну благодаря более высоким налогам, которые я взимаю со своих подданных, начинают распространяться слухи об убогих условиях, в которых живут мои подданные.\n\nЯ начинаю приобретать печальную репутацию, и мой Престиж страдает..."
darkages_ruthless_taxation.01.opta:0 "Пусть говорят..."
darkages_ruthless_taxation.01.optb:0 "Попытаться исправить ситуацию"
darkages_ruthless_taxation.01.optc:0 "Лучше все-таки снизить налоги!"
darkages_ruthless_taxation.01.tt4:0 "Сменив гнев на милость - надеюсь! - вы назначаете нормальные налоги своему Домену\n"
darkages_ruthless_taxation.01.tt2:0 "Вы сдерживаете понесенный ущерб\n"
darkages_ruthless_taxation.01.tt3:0 "Вы оказываетесь в худшей ситуации\n"
darkages_ruthless_taxation.01.tt1:0 "Вы прилагаете усилия, чтобы смягчить репутационный удар. Успех этого действия зависит от вашей хорошей Дипломатии (>=12) и от ваших черт Проницательный и Хитрый политик. Образование в Дипломатии также помогает. Вашим шансам мешают ваша черта Недогадливый и ваша низкая Дипломатия (<8). Если вы потерпите неудачу, последствия для вашего Престижа будут еще более суровыми...\n"
darkages_ruthless_taxation.01.toast1:0 "Вам удалось сдержать понесенный ущерб!"
darkages_ruthless_taxation.01.toast2:0 "Вы потерпели неудачу со своим обаятельным наступлением..."
darkages_ruthless_taxation.02.t:0 "Обратная сторона медали"
darkages_ruthless_taxation.02.desc:0 "Поскольку золото льется в мою казну благодаря дополнительным налогам, которые я взимаю со своих подданных, религиозная фракция внутри моей державы обеспокоена страданиями от нехватки монет и даже еды, которые демонстрирует большинство моих крестьян.\n\nПростая правда заключается в том, что простые люди страдают, в то время как клика привилегированных людей, близких ко мне, живет хорошей жизнью.\n\nЭто не тот путь, по которому следует идти в глазах Бога, отмечают мои религиозные сановники..."
darkages_ruthless_taxation.02.opta:0 "Лицемеры, все они!"
darkages_ruthless_taxation.02.tt5:0 "Вы подчеркиваете, что ваши собственные религиозные люди живут в роскоши, притворяясь обеспокоенными состоянием простых крестьян\n"
darkages_ruthless_taxation.02.optb:0 "Вступить в теологическую дискуссию о преимуществах бедности"
darkages_ruthless_taxation.02.optc:0 "В конце концов, это греховное поведение..."
darkages_ruthless_taxation.02.tt4:0 "Сменив гнев на милость - надеюсь! - вы назначаете нормальные налоги своему Домену\n"
darkages_ruthless_taxation.02.tt2:0 "Вы сдерживаете понесенный ущерб\n"
darkages_ruthless_taxation.02.tt3:0 "Вы оказываетесь в худшей ситуации\n"
darkages_ruthless_taxation.02.tt1:0 "Опираясь на свою философскую жилку, вы прилагаете усилия, чтобы смягчить удар по религиозной репутации. Успех этого действия зависит от вашей хорошей Учености (>=12) и от ваших черт Проницательный, Ревностный и Хитрый политик. Образование в Учености также помогает. Вашим шансам мешают ваши черты Недогадливый и Циничный и ваша низкая Ученость (<8). Если вы потерпите неудачу, последствия для вашего Благочестия будут еще более суровыми...\n"
darkages_ruthless_taxation.02.toast1:0 "Вам удалось сдержать понесенный ущерб!"
darkages_ruthless_taxation.02.toast2:0 "Вы потерпели неудачу со своей вопиющей демагогией..."
darkages_ruthless_taxes:0 "Безжалостные налоги"
darkages_ruthless_taxes_desc:0 "Это Графство страдает от экономических последствий Безжалостного налогообложения, взимаемого владельцем. Даже если владелец больше не взимает возмутительные налоги, последствия могут сохраняться дольше"
darkages_ruthless_taxation.03.t:0 "Обратная сторона медали"
darkages_ruthless_taxation.03.desc:0 "По мере реализации моего плана по взиманию более высоких налогов с моих подданных, я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] замечать тревожный спад в экономике моих Графств.\n\nПо мнению моего Совета, моя фискальная политика калечит развитие моих провинций на несколько лет..."
darkages_ruthless_taxation.03.opta:0 "...зато мои закрома полны!"
darkages_ruthless_taxation.03.optb:0 "Время влить золото в местную экономику!"
darkages_ruthless_taxation.03.optc:0 "Лучше отменить эти налоги..."
darkages_ruthless_taxation.03.tt1:0 "Ваша фискальная политика продолжается без изменений\n"
darkages_ruthless_taxation.03.tt2:0 "Вы инвестируете в местную экономику, чтобы смягчить фискальное воздействие вашей политики\n"
darkages_ruthless_taxation.03.tt3:0 "Вы прекращаете свою жесткую фискальную политику\n"
darkages_ruthless_taxation.04.t:0 "Обратная сторона медали"
darkages_ruthless_taxation.04.desc:0 "Высокая ставка налогов, которую я взимаю с прямых подданных в моем Домене, была замечена моими вассалами. В то время как Жадные и Черствые вассалы принимают мою фискальную политику, другие вассалы проявляют особую неприязнь к моему поведению.\n\nКак оказалось, несколько политических, экономических и социальных интересов моих Вассалов в моем собственном Домене поставлены под угрозу убийственными налогами, которые я взимаю со всех.\n\nЯ рискую мнением этих могущественных подданных и [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] очень хорошо подумать, прежде чем слепо продолжать свою текущую политику..."
darkages_ruthless_taxation.04.opta:0 "Я взимаю то, что считаю нужным!"
darkages_ruthless_taxation.04.tt5:0 "Вы сохраняете свои высокие налоги, но все ваши не Жадные и не Черствые вассалы будут не впечатлены вашим поведением\n"
darkages_ruthless_taxation.04.optb:0 "Попытаться повлиять на своих вассалов"
darkages_ruthless_taxation.04.tt1:0 "Вы вовлекаете своих вассалов в ряд фискальных и экономических аргументов, пытаясь доказать, что ваша политика лучше для Державы. Этот курс действий положительно зависит от вашего высокого (>=12) Управления, вашего образования в Управлении, от того, что вы Проницательны, Общительны, являетесь Хитрым политиком и Дипломатом. Отрицательно влияют на ваши шансы ваш низкий навык Управления (<8) и черты Недогадливый, Нетерпеливый и Переменчивый\n"
darkages_ruthless_taxation.04.tt2:0 "Вы избегаете всех штрафов к мнению ваших Вассалов\n"
darkages_ruthless_taxation.04.tt3:0 "Все не Жадные, не Черствые вассалы будут смотреть на вас с Презрением\n"
darkages_ruthless_taxation.04.toast1:0 "Вам удалось убедить своих Вассалов!"
darkages_ruthless_taxation.04.toast2:0 "Ваши вассалы смотрят на вас с презрением..."
darkages_ruthless_taxation.04.optc:0 "Отменить эти налоги..."
darkages_ruthless_taxation.04.tt4:0 "Вы отменяете Безжалостные Налоги. Жадные Вассалы будут разочарованы, и вы можете получить Стресс, в зависимости от ваших Черт\n"
darkages_ruthless_taxation.05.t:0 "Обратная сторона медали"
darkages_ruthless_taxation.05.desc:0 "Поскольку я [Select_CString(ROOT.Char.IsFemale, 'была вознаграждена', 'был вознагражден' )] значительно более высоким доходом от налогов, условия жизни в моем Домене постепенно ухудшаются.\nВ некоторых отчетах даже упоминается нехватка продовольствия, люди переходят на бартер, и все это усугубляется ростом преступности.\n\nПопросту говоря, меня теперь презирают в моих собственных землях, в то время как контроль над моим Доменом падает все больше.\n\nЯ вполне могу продолжать пожинать плоды своей жесткой налоговой политики, но, возможно, стоит глубоко задуматься над всей ситуацией."
darkages_ruthless_taxation.05.opta:0 "Я продолжаю поддерживать текущие налоги"
darkages_ruthless_taxation.05.optb:0 "Тратить золото непосредственно в провинциях"
darkages_ruthless_taxation.05.optc:0 "Сменить нынешнее налогообложение на что-то более справедливое"
darkages_ruthless_taxation.05.tt1:0 "Вы начинаете активно тратить средства, чтобы поддержать свое население и оживить экономику. Люди будут благодарны, и преступность снизится в долгосрочной перспективе\n"
darkages_ruthless_taxation.05.tt2:0 "Вы отменяете безжалостные налоги. В зависимости от ваших черт, вы можете получить Стресс\n"
darkages_ruthless_taxation.05.tt3:0 "Вы продолжаете свою прошлую политику. В зависимости от ваших черт, вы можете получить Стресс\n"
darkages_county_neg_op_ruth_tax:0 "Беспорядки и Банкротство"
darkages_county_neg_op_ruth_tax_desc:0 "Владелец этого Графства проводит черствую политику в отношении налогов"
darkages_ruthless_taxation.06.t:0 "Обратная сторона медали"
darkages_ruthless_taxation.06.desc:0 "В конце концов, все страдания, которые налоги в моем Домене причиняют, сказываются на моих нервах...\n\nМне нужно тщательно обдумать эту политику и оценить её достоинства и недостатки."
darkages_ruthless_taxation.06.opta:0 "Я приму немного стресса ради золота!"
darkages_ruthless_taxation.06.optb:0 "Пора пересмотреть эту жадную и черствую политику..."
darkages_ruthless_taxation.06.tt1:0 "В зависимости от ваших черт вы тоже можете испытать Стресс... в последний раз!"
darkages_rt_investment:0 "Экономические инвестиции"
darkages_rt_investment_desc:0 "Владелец этого Графства инвестирует дополнительное золото от налогообложения в инфраструктуру"
darkages_ruthless_taxation.07.t:0 "Интересный поворот судьбы"
darkages_ruthless_taxation.07.desc:0 "С удовольствием я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] отчеты о том, что моя безжалостная налоговая политика в моем Домене обеспечила неожиданный профицит в прошлом году.\n\nЯ могу прикарманить золото или даже инвестировать его, чтобы улучшить экономические условия моих собственных Графств..."
darkages_ruthless_taxation.07.opta:0 "Я оставлю золото себе!"
darkages_ruthless_taxation.07.optb:0 "Давайте инвестируем его!"
darkages_death_trampled:0 "[Select_CString(ROOT.Char.IsFemale, 'была затоптана', 'был затоптан' )] насмерть бунтующей толпой"
darkages_ruthless_taxation.08.t:0 "Обратная сторона медали"
darkages_ruthless_taxation.08.desc:0 "Когда я сегодня [Select_CString(ROOT.Char.IsFemale, 'посетила', 'посетил' )] деревню в пригороде моей столицы, собралась большая толпа, чтобы протестовать против безжалостного налогообложения, которое я взимаю в своем Домене.\n\nХотя поначалу я [Select_CString(ROOT.Char.IsFemale, 'вела', 'вел' )] себя небрежно и [Select_CString(ROOT.Char.IsFemale, 'продолжала', 'продолжал' )] визит, намеренно игнорируя сотни присутствующих негодяев, вскоре ситуация вышла из-под контроля, и я [Select_CString(ROOT.Char.IsFemale, 'оказалась', 'оказался' )] лицом к лицу с толпой возле местного рынка.\n\nРеальность такова, что я стою перед приближающейся толпой, лица которой полны гнева, смотрящей на меня со смесью ненависти, страха и страдания..."
darkages_ruthless_taxation.08.opta:0 "Остановиться и встретиться с толпой"
darkages_ruthless_taxation.08.optb:0 "Вон в тот переулок, быстро!"
darkages_ruthless_taxation.08.optc:0 "БЕЖАТЬ!"
darkages_ruthless_taxation.08.tt1:0 "Вы рискуете столкнуться с этим событием, потому что взимаете Безжалостные Налоги. Этот рискованный выбор представляет самый высокий базовый шанс смерти, но если у вашего персонажа хорошая Дипломатия или выше (>=12), это может оказаться лучшим вариантом...\n"
darkages_ruthless_taxation.08.tt2:0 "Вы рискуете столкнуться с этим событием, потому что взимаете Безжалостные Налоги. Вы используете свою высокую Интригу (>=12), чтобы спасти свою жизнь в неприметном переулке. Также важна ваша высокая доблесть (>=10). Ваша низкая Доблесть (<6) накажет вас\n"
darkages_ruthless_taxation.08.tt3:0 "Вы рискуете столкнуться с этим событием, потому что взимаете Безжалостные Налоги. Вы просто убегаете, пытаясь напрямую скрыться от толпы. Ваша Доблесть повлияет к лучшему (>=10) или к худшему (<6) на ваши шансы. Также важная помощь предоставляется, если у вас есть Черта Атлет\n"
darkages_ruthless_taxation.10.t:0 "Выгодные предложения"
darkages_ruthless_taxation.10.desc:0 "Сегодня, рано утром, когда я [Select_CString(ROOT.Char.IsFemale, 'наслаждалась', 'наслаждался' )] завтраком, мой [darkages_stew738.GetCouncilTitle] [Select_CString(ROOT.Char.IsFemale, 'подошла', 'подошел' )] ко мне и тихо [Select_CString(darkages_stew738.IsFemale, 'пробормотала', 'пробормотал' )] что-то о «способах заработать больше золота».\n\nМой интерес возрос, и я [Select_CString(ROOT.Char.IsFemale, 'попросила', 'попросил' )] [darkages_stew738.GetHerHim] высказать [darkages_stew738.GetHerHis] идею.\n[darkages_stew738.GetFirstName] [Select_CString(darkages_stew738.IsFemale, 'продолжила', 'продолжил' )], сказав мне, что всегда есть возможность значительно повысить налоги в моем Домене, чтобы помочь свести концы с концами в моих финансах. Также [darkages_stew738.GetSheHe] [Select_CString(darkages_stew738.IsFemale, 'продолжила', 'продолжил' )], сказав мне, что я [Select_CString(ROOT.Char.IsFemale, 'могла бы', 'мог бы' )] конфисковать религиозные земли, а затем продать их с прибылью, или, может быть, я [Select_CString(ROOT.Char.IsFemale, 'могла бы', 'мог бы' )] использовать коррупцию в своих интересах. Другие варианты включают требование особого налога с моих вассалов или даже финансирование пиратской операции... \n\nЯ очень хорошо знаю, о чем [darkages_stew738.GetSheHe] говорит, и это все балансирование: с [darkages_stew738.GetHerHis] предложениями больше золота будет означать другие виды проблем в долгосрочной перспективе, если я решу пойти по такому пути. Это, конечно, если участие в этих сомнительных выходках не повлияет на мой моральный компас..."
darkages_ruthless_taxation.10.opta:0 "О кое-чем стоит вспоминать время от времени..."
darkages_ruthless_taxation.10.optb:0 "Это никуда не годится..."
darkages_ruthless_taxation.10.tt1:0 "В Dark Ages есть много способов увеличить свою казну. Если вы хотите следовать правилам, вы также можете рискнуть стартовым капиталом при создании торгового пути. Все варианты доступны через решения.\n\nВыбрав этот вариант, вы будете получать уведомления об этой возможности время от времени - не реже, чем раз в 5 лет\n"
darkages_ruthless_taxation.10.tt2:0 "В Dark Ages есть много способов увеличить свою казну. Если вы хотите следовать правилам, вы также можете рискнуть стартовым капиталом при создании торгового пути. Все варианты доступны через решения.\n\nВыбрав этот вариант, вы больше никогда в этой игре не будете получать уведомления об этих возможностях\n"
