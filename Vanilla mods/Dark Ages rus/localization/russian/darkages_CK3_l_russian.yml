darkages_piety.02.tt4:0 "Вы вовлечете всю свою династию в вопросы веры и ответите на вопросы, поставленные [pope.GetName]. Со временем [Select_CString(pope.IsFemale, 'она оценит', 'он оценит')] ваши ответы и свяжется с вами. Успех этого действия зависит от нескольких факторов. Ваши навыки [Concept('diplomacy', 'Дипломатии')|E] и [Concept('learning', 'Учености')|E] влияют как положительно, так и отрицательно. Если вы [Concept('cynical', 'Циничны')|E] или имеете свойства, которые считаются грехами в вашей религии, ожидайте, что ваши шансы на хорошее взаимодействие будут ниже. Наконец, если у вас есть свойства, которые считаются добродетелями в вашей религии, или вы [Concept('zealous', 'Фанатик')|E], ваши шансы на успех возрастают. Действуя, если что-то пойдет не так, вы рискуете потерять целый уровень [Concept('devotion', 'Набожности')|E]"
darkages_piety.02.tt5:0 "Вы откажетесь от призыва [pope.GetName] и избежите ответов на грозные вопросы. Это действие сильно настроит против вас, но ваша [Concept('diplomacy', 'Дипломатия')|E] может спасти вас от религиозной катастрофы. [Concept('zealous', 'Фанатика')|E] или главу конфессии с высоким [Concept('piety', 'Благочестием')|E] может оказаться еще труднее убедить"
darkages_piety.02.opte:0 "Я отвергаю призыв [pope.GetName]"
darkages_opinion_county_religious_zeal:0 "Религиозное рвение"
darkages_opinion_county_religious_zeal_desc:0 "В этом графстве был проведен тщательный обыск с целью найти и искоренить последователей ложной веры"
darkages_piety.03.t:0 "Вести от [pope.GetHerHis|U] Святейшества"
darkages_piety.03.desc1:0 "После принятия просьбы [pope.GetName], я с разочарованием [Select_CString(ROOT.Char.IsFemale, 'прочитала', 'прочитал')] [Select_CString(pope.IsFemale, 'ее', 'его')] ответ, касающийся строгих вопросов, которые [Select_CString(pope.IsFemale, 'она мне задала', 'он мне задал')]. Это был полный провал, и мое [Concept('piety', 'Благочестие')|E] и, возможно, [Concept('devotion', 'Набожность')|E] страдают как следствие..."
darkages_piety.03.desc2:0 "После принятия просьбы [pope.GetName], я с радостью [Select_CString(ROOT.Char.IsFemale, 'прочитала', 'прочитал')] [Select_CString(pope.IsFemale, 'ее', 'его')] ответ, касающийся строгих вопросов, которые [Select_CString(pope.IsFemale, 'она мне задала', 'он мне задал')]. Я [Select_CString(ROOT.Char.IsFemale, 'прошла', 'прошел')] [Select_CString(pope.IsFemale, 'ее', 'его')] строгую проверку, и мое [Concept('piety', 'Благочестие')|E] стремительно растет!"
