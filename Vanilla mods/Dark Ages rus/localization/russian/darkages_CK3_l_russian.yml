enforce_interaction_darkages:0 "Запугать"
enforce_interaction_darkages_desc:0 "Используя свой [Concept('dread', 'Ужас')|E] в личном разговоре, вы можете получить что-то важное от этого персонажа"
darkages_dread_positive_character_interaction.01.t:0 "Состязание воли"
darkages_dread_positive_character_interaction.01.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'назначила', 'назначил')] встречу с [recipient.GetName] и [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал')] [Select_CString(recipient.IsFemale, 'ей', 'ему')] выполнить услугу для меня как можно быстрее. Мой тон был мрачным и агрессивным, и я [Select_CString(ROOT.Char.IsFemale, 'подчеркнула', 'подчеркнул')], что не приемлю отказа..."
darkages_dread_positive_character_interaction.01.opta:0 "Потребовать золото"
darkages_dread_positive_character_interaction.01.tt1:0 "Эта опция доступна, потому что у [recipient.GetName] более 125 золота.\nЕе успех зависит от количества [Concept('dread', 'Ужаса')|E] у вашего персонажа, а также положительно, если [recipient.GetName] [Concept('craven', 'Трус')|E], если [Select_CString(recipient.IsFemale, 'она напугана', 'он напуган')] вами, если вы [Concept('sadistic', 'Садист')|E], если вы [Concept('callous', 'Черствый')|E], если вы [Concept('vengeful', 'Мстительный')|E] или если вы [Concept('wrathful', 'Гневный')|E]. Если [recipient.GetName] [Concept('brave', 'Отважный')|E] или вы [Concept('compassionate', 'Сострадательный')|E], [Concept('forgiving', 'Всепрощающий')|E] или [Concept('generous', 'Щедрый')|E], будет применен штраф к вашим шансам"
darkages_dread_positive_character_interaction.01.optb:0 "Потребовать [Concept('prestige', 'Престиж')|E] и увеличить влияние"
darkages_dread_positive_character_interaction.01.tt2:0 "Эта опция доступна, потому что у [recipient.GetName] более 250 престижа.\nЕе успех зависит от количества [Concept('dread', 'Ужаса')|E] у вашего персонажа, а также положительно, если [recipient.GetName] [Concept('craven', 'Трус')|E], если [Select_CString(recipient.IsFemale, 'она напугана', 'он напуган')] вами, если вы [Concept('sadistic', 'Садист')|E], если вы [Concept('callous', 'Черствый')|E], если вы [Concept('vengeful', 'Мстительный')|E] или если вы [Concept('wrathful', 'Гневный')|E]. Если [recipient.GetName] [Concept('brave', 'Отважный')|E] или вы [Concept('compassionate', 'Сострадательный')|E], [Concept('forgiving', 'Всепрощающий')|E] или [Concept('generous', 'Щедрый')|E], будет применен штраф к вашим шансам"
darkages_dread_positive_character_interaction.01.optc:0 "Потребовать [Concept('piety', 'Благочестие')|E]"
darkages_dread_positive_character_interaction.01.tt3:0 "Эта опция доступна, потому что у [recipient.GetName] более 250 благочестия.\nЕе успех зависит от количества [Concept('dread', 'Ужаса')|E] у вашего персонажа, а также положительно, если [recipient.GetName] [Concept('craven', 'Трус')|E], [Concept('zealous', 'Фанатик')|E], если [Select_CString(recipient.IsFemale, 'она напугана', 'он напуган')] вами, если вы [Concept('sadistic', 'Садист')|E], если вы [Concept('callous', 'Черствый')|E], если вы [Concept('vengeful', 'Мстительный')|E] или если вы [Concept('wrathful', 'Гневный')|E]. Если [recipient.GetName] [Concept('brave', 'Отважный')|E] или вы [Concept('compassionate', 'Сострадательный')|E], [Concept('forgiving', 'Всепрощающий')|E] или [Concept('generous', 'Щедрый')|E], будет применен штраф к вашим шансам"
darkages_dread_positive_character_interaction.01.optd:0 "Потребовать [Concept('renown', 'Признание')|E]"
darkages_dread_positive_character_interaction.01.tt4:0 "Выбрав этот вариант, помимо прямого отказа, вы делаете ставку на то, что [Concept('prestige', 'Престиж')|E] и [Concept('diplomacy', 'Дипломатия')|E] [recipient.GetName] достаточно высоки, чтобы стать фактором для повышения [Concept('renown', 'Признания')|E] вашей династии, так как [Select_CString(recipient.IsFemale, 'она', 'он')] может уступить вашему давлению, попытаться совершить поступок и потерпеть неудачу с потенциально плохими последствиями для вашего нынешнего [Concept('renown', 'Признания')|E].\nЧтобы убедить [recipient.GetName] принять меры, независимо от результата, факторами, влияющими на исход, являются уровень [Concept('dread', 'Ужас')|E] вашего персонажа, а также положительно, если [recipient.GetName] [Concept('craven', 'Трус')|E], если [Select_CString(recipient.IsFemale, 'она напугана', 'он напуган')], если вы [Concept('sadistic', 'Садист')|E], если вы [Concept('callous', 'Черствый')|E], если вы [Concept('vengeful', 'Мстительный')|E] или если вы [Concept('wrathful', 'Гневный')|E]. Если [recipient.GetName] [Concept('brave', 'Отважный')|E] или вы [Concept('compassionate', 'Сострадательный')|E], [Concept('generous', 'Щедрый')|E] или [Concept('forgiving', 'Всепрощающий')|E], будет применен штраф к вашим шансам"
darkages_dread_positive_character_interaction.01.opte:0 "Использовать политическое влияние"
darkages_dread_positive_character_interaction.01.tt5:0 "Успех этой опции зависит от количества [Concept('dread', 'Ужаса')|E] у вашего персонажа, а также положительно, если [recipient.GetName] [Concept('craven', 'Трус')|E], [Concept('zealous', 'Фанатик')|E], если [Select_CString(recipient.IsFemale, 'она напугана', 'он напуган')] вами, если вы [Concept('sadistic', 'Садист')|E], если вы [Concept('callous', 'Черствый')|E], если вы [Concept('vengeful', 'Мстительный')|E], если вы [Concept('wrathful', 'Гневный')|E] и от вашей хорошей или лучшей (>=12) [Concept('intrigue', 'Интриги')|E]. Если [recipient.GetName] [Concept('brave', 'Отважный')|E] или вы [Concept('compassionate', 'Сострадательный')|E], [Concept('forgiving', 'Всепрощающий')|E] или [Concept('generous', 'Щедрый')|E], будет применен штраф к вашим шансам. Также снижает шансы успеха ваша низкая (<8) или хуже [Concept('intrigue', 'Интрига')|E] и как минимум хорошая [Concept('diplomacy', 'Дипломатия')|E] (>=12) вашей цели\n"
enforce_interaction_darkages_tt:0 "Используя свой [Concept('dread', 'Ужас')|E], чтобы надавить на [recipient.GetName], вы повысите свой [Concept('dread', 'Ужас')|E] на небольшую величину и получите выбор требований, которые могут быть выполнены [Select_CString(recipient.IsFemale, 'ею', 'им')].\n\nЕго успех зависит от количества [Concept('dread', 'Ужаса')|E] у вашего персонажа, а также положительно, если [recipient.GetName] [Concept('craven', 'Трус')|E], если [Select_CString(recipient.IsFemale, 'она напугана', 'он напуган')] вами, если вы [Concept('sadistic', 'Садист')|E], если вы [Concept('callous', 'Черствый')|E], если вы [Concept('vengeful', 'Мстительный')|E] или если вы [Concept('wrathful', 'Гневный')|E]. Если [recipient.GetName] [Concept('brave', 'Отважный')|E] или вы [Concept('compassionate', 'Сострадательный')|E], [Concept('forgiving', 'Всепрощающий')|E] или [Concept('generous', 'Щедрый')|E], будет применен штраф к вашим шансам.\nЕсли вы потерпите неудачу в своем требовании, знайте, что ваш [Concept('prestige', 'Престиж')|E] пострадает."
darkages_opinion_unhappy:0 "Недовольство"
darkages_dread_positive_character_interaction.02.t:0 "Успех!"
darkages_dread_positive_character_interaction.02.desc:0 "Используя свою силу воли и свои навыки, я успешно [Select_CString(ROOT.Char.IsFemale, 'запугала', 'запугал')] [recipient.GetName], заставив расстаться с некоторым количеством золота!"
darkages_dread_positive_character_interaction.02.opta:0 "Превосходно!"
darkages_dread_positive_character_interaction.03.t:0 "Жалкий провал"
darkages_dread_positive_character_interaction.03.desc:0 "Несмотря на мои усилия подчинить [recipient.GetName] своей воле, я [Select_CString(ROOT.Char.IsFemale, 'была недостаточно пугающей', 'был недостаточно пугающим')], чтобы заставить [Select_CString(recipient.IsFemale, 'ее', 'его')] заплатить мне круглую сумму золота..."
darkages_dread_positive_character_interaction.03.opta:0 "Проклятье!"
darkages_dread_positive_character_interaction.04.t:0 "Успех!"
darkages_dread_positive_character_interaction.04.desc:0 "Используя свою силу воли и свои навыки, я успешно [Select_CString(ROOT.Char.IsFemale, 'запугала', 'запугал')] [recipient.GetName], заставив активно распространять слухи о моих истинных и даже ложных деяниях, тем самым повышая мой [Concept('prestige', 'Престиж')|E]!"
darkages_dread_positive_character_interaction.04.opta:0 "Превосходно!"
darkages_dread_positive_character_interaction.05.t:0 "Жалкий провал"
darkages_dread_positive_character_interaction.05.desc:0 "Несмотря на мои усилия подчинить [recipient.GetName] своей воле, я [Select_CString(ROOT.Char.IsFemale, 'была недостаточно пугающей', 'был недостаточно пугающим')], чтобы заставить [Select_CString(recipient.IsFemale, 'ее', 'его')] пошевелить [Select_CString(recipient.IsFemale, 'своей', 'своей')] задницей, чтобы улучшить мой [Concept('prestige', 'Престиж')|E]..."
darkages_dread_positive_character_interaction.05.opta:0 "Проклятье!"
darkages_dread_positive_character_interaction.06.t:0 "Успех!"
darkages_dread_positive_character_interaction.06.desc:0 "Используя свою силу воли и свои навыки, я успешно [Select_CString(ROOT.Char.IsFemale, 'запугала', 'запугал')] [recipient.GetName], заставив активно распространять слухи о моих истинных и предполагаемых добродетелях, тем самым повышая мое [Concept('piety', 'Благочестие')|E]!"
darkages_dread_positive_character_interaction.06.opta:0 "Превосходно!"
darkages_dread_positive_character_interaction.07.t:0 "Жалкий провал"
darkages_dread_positive_character_interaction.07.desc:0 "Несмотря на мои усилия подчинить [recipient.GetName] своей воле, я [Select_CString(ROOT.Char.IsFemale, 'была недостаточно пугающей', 'был недостаточно пугающим')], чтобы заставить [Select_CString(recipient.IsFemale, 'ее', 'его')] пошевелить [Select_CString(recipient.IsFemale, 'своей', 'своей')] задницей, чтобы улучшить мое [Concept('piety', 'Благочестие')|E]..."
darkages_dread_positive_character_interaction.07.opta:0 "Проклятье!"
darkages_dread_positive_character_interaction.08.t:0 "Большой успех!"
darkages_dread_positive_character_interaction.08.desc:0 "Используя свою силу воли и свои навыки, я успешно [Select_CString(ROOT.Char.IsFemale, 'запугала', 'запугал')] [recipient.GetName], заставив активно распространять слухи о моих истинных и предполагаемых добродетелях и деяниях в более широком масштабе, тем самым повышая [Concept('renown', 'Признание')|E] моей династии!"
darkages_dread_positive_character_interaction.08.opta:0 "Превосходно!"
darkages_dread_positive_character_interaction.09.t:0 "Жалкий провал"
darkages_dread_positive_character_interaction.09.desc:0 "Даже если мои усилия подчинить [recipient.GetName] своей воле увенчались успехом, [Select_CString(recipient.IsFemale, 'она была не в состоянии', 'он был не в состоянии')] увеличить [Concept('renown', 'Признание')|E] моей династии из-за реального отсутствия интереса, низкого [Concept('prestige', 'Престижа')|E] или того и другого..."
darkages_dread_positive_character_interaction.09.opta:0 "К сожалению..."
darkages_dread_positive_character_interaction.10.t:0 "Полный провал"
darkages_dread_positive_character_interaction.10.desc:0 "Несмотря на мои усилия подчинить [recipient.GetName] своей воле, я [Select_CString(ROOT.Char.IsFemale, 'была недостаточно пугающей', 'был недостаточно пугающим')], чтобы заставить [Select_CString(recipient.IsFemale, 'ее', 'его')] пошевелить [Select_CString(recipient.IsFemale, 'своей', 'своей')] задницей, чтобы улучшить [Concept('renown', 'Признание')|E] моей династии..."
darkages_dread_positive_character_interaction.10.opta:0 "Проклятье!"
darkages_dread_positive_character_interaction.11.t:0 "Успех!"
darkages_dread_positive_character_interaction.11.desc:0 "Используя свою силу воли и свои навыки, я успешно [Select_CString(ROOT.Char.IsFemale, 'запугала', 'запугал')] [recipient.GetName], заставив избегать вступления в какие-либо фракции сроком на 6 лет!"
darkages_dread_positive_character_interaction.11.opta:0 "Превосходно!"
darkages_dread_positive_character_interaction.12.t:0 "Жалкий провал"
darkages_dread_positive_character_interaction.12.desc:0 "Несмотря на мои усилия подчинить [recipient.GetName] своей воле, я [Select_CString(ROOT.Char.IsFemale, 'была недостаточно пугающей', 'был недостаточно пугающим')], чтобы заставить [Select_CString(recipient.IsFemale, 'ее', 'его')] поклясться, что [Select_CString(recipient.IsFemale, 'она', 'он')] не вступит ни в какие фракции против меня в ближайшем будущем..."
darkages_dread_positive_character_interaction.12.opta:0 "Проклятье!"
darkages_opinion_terrified:0 "В ужасе"
darkages_opinion_worried:0 "Обеспокоен"
darkages_enforce_a_purge_decision:0 "Устроить большую чистку"
darkages_enforce_a_purge_decision_tooltip:0 "Устроить чистку во всем вашем домене, чтобы значительно увеличить ваш [Concept('dread', 'Ужас')|E]"
darkages_enforce_a_purge_decision_desc:0 "Вы можете начать террор, совершив большую чистку во всем вашем домене и затронув ваш двор. Те, кого без суда и следствия сочтут виновными в измене, постигнет ужасная участь, чтобы все боялись вашего правления.\nВесь ваш двор будет в ужасе от вас, и их мнение будет соответствовать этому.\nБлагодаря страху, который вы внушаете, вы будете в гораздо большей безопасности в течение некоторого времени от большинства событий, связанных с убийствами.\n\nОднако за такие действия придется платить: от возможности быстрого и жестокого возмездия в виде попытки убийства до штрафов к мнению прямо и косвенно вовлеченных сторон, и заканчивая вашим падением в мир безумия. Выбор за вами..."
darkages_enforce_a_purge_decision_tt:0 "Помимо 50 золотых для финансирования вашей чистки, ваш персонаж не может быть [Concept('just', 'Справедливым')|E], [Concept('compassionate', 'Сострадательным')|E], [Concept('generous', 'Щедрым')|E] или [Concept('forgiving', 'Всепрощающим')|E].\nЕсли вы не [Concept('sadistic', 'Садист')|E], не [Concept('vengeful', 'Мстительный')|E], не обладаете свойством [Concept('torturer', 'Пыточных дел мастер')|E], не [Concept('wrathful', 'Гневный')|E] и не ведете образ жизни [Concept('intrigue_lifestyle_name', 'Интриги')|E], вы получите [Concept('stress', 'Стресс')|E] от этого решения."
darkages_enforce_a_purge_decision_confirm:0 "Я буду править страхом и требовать слепого подчинения"
darkages_purge.01.t:0 "Чистка начинается"
darkages_purge.01.desc:0 "Одним из придворных, привлекших мое внимание в последнее время из-за возможной измены, [Select_CString(killed.IsFemale, 'была', 'был')] не кто иной, как [killed.GetName].\n\nПоскольку я хочу показать всем, кто правит в моих землях, я без промедления [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал')] своим солдатам схватить [Select_CString(killed.IsFemale, 'ее', 'его')] при первой возможности и бросить [killed.GetName] в темницу.\n\nТам, не в силах защитить себя, [Select_CString(killed.IsFemale, 'она станет', 'он станет')] произведением искусства в том, как предатель попрощается с этой жизнью..."
darkages_purge.01.desc2:0 "Одним из придворных, привлекших мое внимание в последнее время из-за возможной измены, [Select_CString(killed.IsFemale, 'была', 'был')] не кто иной, как [killed.GetName].\n\nДаже в [Select_CString(killed.IsFemale, 'ее', 'его')] юном возрасте я чувствую исходящую от [Select_CString(killed.IsFemale, 'нее', 'него')] неминуемую опасность.\n\nВ конце концов, это, по крайней мере, послужит предупреждением другим детям не связываться со мной.\n\nКак обстоят дела, юный возраст [killed.GetName] недостаточен, чтобы уберечь [Select_CString(killed.IsFemale, 'ее', 'его')] от... моей изобретательной заботы, которую я могу проявить к маленькому, нежному предателю!"
darkages_purge.01.opta:0 "Заслуженная участь!"
darkages_purge.02.t:0 "Жестокая месть"
darkages_purge.02.opta:0 "Rota Fortunae!"
darkages_purge.02.desc1:0 "В суматохе, последовавшей за моей чисткой, я глубоко [Select_CString(ROOT.Char.IsFemale, 'осознаю', 'осознаю')], что могу стать мишенью какой-нибудь попытки убийства в качестве возмездия. Однако, беззаботно относясь к слухам, я не [Select_CString(ROOT.Char.IsFemale, 'позаботилась', 'позаботился')] нанять телохранителей.\n\nК сожалению, немыслимое происходит, и однажды я сталкиваюсь лицом к лицу с наемным убийцей, намеревающимся убить меня. Только моя [Concept('prowess', 'Доблесть')|E], моя [Concept('intrigue', 'Интрига')|E] и моя удача могут спасти меня от врат рая или ада..."
darkages_purge.02.desc2:0 "В суматохе, последовавшей за моей чисткой, я глубоко [Select_CString(ROOT.Char.IsFemale, 'осознаю', 'осознаю')], что могу стать мишенью какой-нибудь попытки убийства в качестве возмездия. Я полностью [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')], что мой телохранитель здесь, чтобы защитить меня.\n\nК сожалению, однажды случается худшее, и я сталкиваюсь лицом к лицу с наемным убийцей, намеревающимся убить меня. Только мой телохранитель, моя [Concept('prowess', 'Доблесть')|E] и моя удача могут спасти меня от врат рая или ада..."
darkages_purge.02.desc3:0 "В суматохе, последовавшей за моей чисткой, я глубоко [Select_CString(ROOT.Char.IsFemale, 'осознаю', 'осознаю')], что могу стать мишенью какой-нибудь попытки убийства в качестве возмездия. Поскольку у меня есть два телохранителя, я [Select_CString(ROOT.Char.IsFemale, 'знаю', 'знаю')], что [Select_CString(ROOT.Char.IsFemale, 'защищена', 'защищен')] насколько это возможно.\n\nК сожалению, однажды случается худшее, и я сталкиваюсь лицом к лицу с наемным убийцей, намеревающимся убить меня. Только мои телохранители, моя [Concept('prowess', 'Доблесть')|E] и моя удача могут спасти меня от врат рая или ада..."
darkages_opinion_county_purge:0 "Большая чистка"
darkages_opinion_county_purge_desc:0 "Жители этого графства преследовались и убивались правителем ради «безопасности державы» и в «интересах закона и порядка»"
darkages_apply_harsh_rule_decision:0 "Ввести суровое правление"
darkages_apply_harsh_rule_decision_tooltip:0 "Ввести свод законов со строгими и карательными приговорами, чтобы увеличить ваш [Concept('dread', 'Ужас')|E]"
darkages_apply_harsh_rule_decision_desc:0 "Приказать применить новый свод законов во всех судах вашего домена, который закрепляет строгий и карательный взгляд на правосудие. Пока действует эта политика, ваш [Concept('dread', 'Ужас')|E] будет стремиться быть не менее 20, автоматически увеличиваясь при необходимости.\nВы сможете отменить суровое правление только по прошествии как минимум 5 лет.\n"
darkages_apply_harsh_rule_decision_tt:0 "При применении «сурового правления», если ваш персонаж не [Concept('callous', 'Черствый')|E], [Concept('sadistic', 'Садист')|E] или [Concept('vengeful', 'Мстительный')|E], [Concept('stress', 'Стресс')|E] будет немного увеличиваться ежегодно. Если, ко всему прочему, ваш персонаж [Concept('generous', 'Щедрый')|E], [Concept('forgiving', 'Всепрощающий')|E], [Concept('compassionate', 'Сострадательный')|E] или [Concept('temperate', 'Сдержанный')|E], это ежегодное увеличение [Concept('stress', 'Стресса')|E] будет выше. Ваши вассалы и придворные получат отрицательный модификатор мнения — Настороженность — из-за сурового правосудия и строгих наказаний.\n"
darkages_apply_harsh_rule_decision_confirm:0 "Утвердить!"
darkages_revoke_harsh_rule_decision:0 "Отменить суровое правление"
darkages_revoke_harsh_rule_decision_tooltip:0 "Отменить суровое правление, приказав местным судьям проявлять больше снисхождения к преступлениям"
darkages_revoke_harsh_rule_decision_desc:0 "Отменив ваше предыдущее решение, ваши суды будут применять закон более мягко, возвращая баланс к норме.\nВаш [Concept('dread', 'Ужас')|E] пострадает, ваши придворные и гости перестанут быть настороженными, а мнение населения ваших графств о вас улучшится."
darkages_revoke_harsh_rule_decision_confirm:0 "Отменить!"
darkages_revoke_harsh_rule_decision_tt:0 "\n"
darkages_opinion_county_harsh_rule:0 "Суровое правление"
darkages_opinion_county_harsh_rule_desc:0 "Законы в этом графстве очень строгие и карательные"
darkages_harsh_rule.02.tt1:0 "Выбрав этот вариант, вы примените суровые законы в каждом графстве вашего домена. Остерегайтесь того, что ваши придворные и гости станут настороженными из-за внезапного роста [Concept('dread', 'Ужаса')|E]. В течение следующих 5 лет вам не будет разрешено отменить политику сурового правления в меню решений\n"
darkages_harsh_rule.02.optb:0 "Применить суровые законы во всем моем домене"
darkages_harsh_rule.02.opta:0 "Отменить суровые законы во всем моем домене"
darkages_harsh_rule.02.tt2:0 "Это событие происходит потому, что у вас нет единой политики касательно сурового правления для всех провинций вашего домена. Вероятно, вы недавно присоединили новую провинцию с модификатором «Суровое правление», и теперь пришло время решить, хотите ли вы применять эту политику во всем вашем домене или нет\n"
darkages_harsh_rule.02.t:0 "Политические решения"
darkages_harsh_rule.02.desc:0 "Поскольку мой предшественник, по крайней мере в некоторых графствах, решил применить суровые законы, чтобы поддерживать порядок среди людей и высокий [Concept('dread', 'Ужас')|E], теперь пришло мое время пересмотреть политику и определить путь своим собственным решением..."
darkages_piety.01.t:0 "Религиозная просьба касательно [target_title.GetName]"
darkages_piety.01.desc:0 "Группа религиозных людей однажды попросила аудиенции у меня, чтобы попросить немного земли в [target_title.GetName], дабы построить там небольшой монастырь. Хотя запрашиваемое золото значительно, на кону стоит мое [Concept('piety', 'Благочестие')|E] в зависимости от моего ответа..."
darkages_piety.01.opta:0 "Золото ваше. Молитесь за мою душу..."
darkages_piety.01.optb:0 "Давайте лучше построим сеть аббатств!"
darkages_piety.01.optc:0 "У меня нет лишнего золота для этого"
darkages_opinion_county_peaceful:0 "Мирное графство"
darkages_opinion_county_peaceful_desc:0 "Небольшой монастырь, построенный в этом графстве, привносит в него мир и покой"
darkages_opinion_county_abbey:0 "Очень мирное графство"
darkages_opinion_county_abbey_desc:0 "Небольшая сеть аббатств, построенная в этом графстве, привносит в него глубокий мир и покой"
darkages_piety.01.tt1:0 "Эта опция доступна, потому что вы [Concept('zealous', 'Фанатик')|E]. [Concept('zealous', 'Фанатичные')|E] придворные и ваш [chaplain.GetCouncilTitle], если он у вас есть, также будут довольны этим решением"
darkages_piety.01.tt2:0 "Если вы [Concept('zealous', 'Фанатик')|E], ожидайте, что штрафы за отказ финансировать монастырь будут намного выше, не только со стороны ваших религиозных подданных и, если он существует, вашего главой конфессии, но и со стороны ваших не [Concept('cynical', 'Циничных')|E] придворных\n"
darkages_piety.01.tt3:0 "Помимо полученного [Concept('piety', 'Благочестия')|E], ваш религиозный советник, если он у вас есть, будет доволен вашим решением\n"
darkages_opinion_grateful:0 "Признателен"
darkages_opinion_happy:0 "Счастлив"
darkages_piety.02.t:0 "Особая религиозная милость"
darkages_piety.02.desc1:0 "Этим днём, погрузившись в свои мысли во время молитвы, я [Select_CString(ROOT.Char.IsFemale, 'была прервана', 'был прерван')] доверенным слугой с важным посланием, подписанным не кем иным, как [pope.GetName].\n\nПослание касалось великой религиозной работы, которая нуждается в спонсорах среди могущественных верующих, и переходило к тревожно подробному расспросу о моем образе жизни, который очень хорошо может быть использован для оценки моей набожности..."
darkages_piety.02.desc2:0 "Этим днём, погрузившись в свои мысли во время молитвы, я [Select_CString(ROOT.Char.IsFemale, 'была прервана', 'был прерван')] доверенным слугой с важным посланием, подписанным не кем иным, как [pope.GetName].\n\nПослание касалось срочной необходимости в средствах для улучшения Божественных дел в земном мире, и переходило к тревожно подробному расспросу о моем образе жизни, который очень хорошо может быть использован для оценки моей набожности..."
darkages_piety.02.desc3:0 "Этим днём, погрузившись в свои мысли во время молитвы, я [Select_CString(ROOT.Char.IsFemale, 'была прервана', 'был прерван')] доверенным слугой с важным посланием, подписанным не кем иным, как [pope.GetName].\n\nПослание касалось срочной необходимости чистки в моем собственном домене, чтобы отделить зерна от плевел в религиозных вопросах, и переходило к тревожно подробному расспросу о моем образе жизни, который очень хорошо может быть использован для оценки моей набожности..."
darkages_piety.02.desc4:0 "Этим днём, погрузившись в свои мысли во время молитвы, я [Select_CString(ROOT.Char.IsFemale, 'была прервана', 'был прерван')] доверенным слугой с важным посланием, подписанным не кем иным, как [pope.GetName].\n\nПослание касалось направления моей династии в вопросах веры, призывая всех придерживаться истинных учений Бога. Оно переходило к тревожно подробному расспросу о моем образе жизни, который очень хорошо может быть использован для оценки моей набожности..."
darkages_piety.02.opta:0 "Я проспонсирую проект и отвечу на вопросы"
darkages_piety.02.optb:0 "Я предоставлю средства и отвечу на вопросы"
darkages_piety.02.optc:0 "Я буду преследовать неверующих и отвечу на вопросы"
darkages_piety.02.optd:0 "Я привлеку всю свою династию и отвечу на вопросы"
darkages_piety.02.tt1:0 "Вы профинансируете религиозные работы и ответите на вопросы, поставленные [pope.GetName]. Со временем [Select_CString(pope.IsFemale, 'она оценит', 'он оценит')] ваши ответы и свяжется с вами. Успех этого действия зависит от нескольких факторов. Ваши навыки [Concept('diplomacy', 'Дипломатии')|E] и [Concept('learning', 'Учености')|E] влияют как положительно, так и отрицательно. Если вы [Concept('cynical', 'Циничны')|E] или имеете свойства, которые считаются грехами в вашей религии, ожидайте, что ваши шансы на хорошее взаимодействие будут ниже. Наконец, если у вас есть свойства, которые считаются добродетелями в вашей религии, или вы [Concept('zealous', 'Фанатик')|E], ваши шансы на успех возрастают. Действуя, если что-то пойдет не так, вы рискуете потерять целый уровень [Concept('devotion', 'Набожности')|E]"
darkages_piety.02.tt2:0 "Вы предоставите средства и ответите на вопросы, поставленные [pope.GetName]. Со временем [Select_CString(pope.IsFemale, 'она оценит', 'он оценит')] ваши ответы и свяжется с вами. Успех этого действия зависит от нескольких факторов. Ваши навыки [Concept('diplomacy', 'Дипломатии')|E] и [Concept('learning', 'Учености')|E] влияют как положительно, так и отрицательно. Если вы [Concept('cynical', 'Циничны')|E] или имеете свойства, которые считаются грехами в вашей религии, ожидайте, что ваши шансы на хорошее взаимодействие будут ниже. Наконец, если у вас есть свойства, которые считаются добродетелями в вашей религии, или вы [Concept('zealous', 'Фанатик')|E], ваши шансы на успех возрастают. Действуя, если что-то пойдет не так, вы рискуете потерять целый уровень [Concept('devotion', 'Набожности')|E]"
