darkages_piety.06.desc1:0 "После принятия просьбы [pope.GetName], я с разочарованием [Select_CString(ROOT.Char.IsFemale, 'прочитала', 'прочитал')] [Select_CString(pope.IsFemale, 'ее', 'его')] ответ, касающийся строгих вопросов, которые [Select_CString(pope.IsFemale, 'она мне задала', 'он мне задал')].\nВ сущности, я [Select_CString(ROOT.Char.IsFemale, 'выставила', 'выставил')] свою Династию в дурном свете, провалив опрос [Select_CString(pope.IsFemale, 'Ее', 'Его')] Святейшества, нанеся ущерб нашей репутации.\n\nМое послание закончилось полным провалом, и как [Concept('dynasty_prestige', 'Признание')|E] моей Династии, так и моя личная [Concept('devotion', 'Набожность')|E] могут безмерно пострадать..."
darkages_piety.06.desc2:0 "После принятия просьбы [pope.GetName], я с радостью [Select_CString(ROOT.Char.IsFemale, 'прочитала', 'прочитал')] [Select_CString(pope.IsFemale, 'ее', 'его')] ответ, касающийся строгих вопросов, которые [Select_CString(pope.IsFemale, 'она мне задала', 'он мне задал')]. Похоже, благодаря моему искусному посланию, деяния моей династии помогли пройти [Select_CString(pope.IsFemale, 'ее', 'его')] строгую проверку. [Concept('dynasty_prestige', 'Признание')|E] моей Династии стремительно растет!"
