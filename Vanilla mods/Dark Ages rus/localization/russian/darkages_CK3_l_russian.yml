darkages_dread.02.tt1:0 "Успех этого варианта положительно зависит от того, что большая часть совета настроена против вас, от вашего высокого Навыка Интриги и от ваших черт Черствый, Гневный, Мстительный, Садист, Высокомерный и Обманщик. Отрицательно влияют на ваши шансы ваш низкий Навык Интриги, высокий Навык Интриги вашего [darkages_dread_councillor.GetCouncilTitle|i] и ваши черты Сострадательный, Сдержанный, Прощающий, Справедливый, Смиренный и Честный\n"
darkages_dread.02.tt2:0 "Успех этого варианта положительно зависит от поддержки большинства Совета, от вашего высокого Навыка Дипломатии и от ваших черт Общительный, Терпеливый, Доверчивый, Спокойный, Справедливый и Честный. Отрицательно влияют на ваши шансы ваш низкий Навык Дипломатии, высокий Навык Дипломатии вашего [darkages_dread_councillor.GetCouncilTitle|i] и ваши черты Черствый, Садист, Мстительный, Гневный, Амбициозный и Обманщик\n"
darkages_dread.02.tt3:0 "Успех этого варианта положительно зависит от вашего высокого Навыка Учености и от ваших черт Эксцентричный, Проницательный и Хитрый политик. Отрицательно влияют на ваши шансы ваш низкий Навык Учености, высокий Навык Учености вашего [darkages_dread_councillor.GetCouncilTitle|i] и ваши черты Упрямый, Тупой и Нетерпеливый\n"
