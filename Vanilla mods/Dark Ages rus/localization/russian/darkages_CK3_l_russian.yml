darkages_landless_upkeep_decision:0 "Рассчитать годовые расходы на припасы"
darkages_landless_upkeep_decision_confirm:0 "Углубиться в книги!"
landless_upkeep_decision_desc:0 "Проверьте свои книги и счета, чтобы узнать, сколько стоит содержание ваших профессиональных войск в припасах"
landless_upkeep_decision_tooltip:0 "Рассчитать содержание профессиональных войск"
darkages_startup.07.t:0 "О припасах и управлении ими"
darkages_startup.07.desc:0 "Поскольку вы играете за Безземельного персонажа, вы можете платить за содержание, касающееся общего количества нанятых вами полков профессиональных войск.\n\nОбратите внимание, что вы можете выбрать соответствующее правило игры, чтобы определить, насколько жесткой будет эта плата и хотите ли вы вообще играть с ней.\n\nЕсли вы выберете правила по умолчанию или один из 5 уровней оплаты, вам станет доступно новое решение под названием 'Рассчитать годовые расходы', чтобы узнать годовое количество Припасов, которое вы теряете.\nОбратите внимание, что с вас будет взиматься четверть этой суммы каждые три месяца, поэтому не беспокойтесь, если заметите, что ваши припасы уменьшаются чаще, чем раз в год."
darkages_startup.07.opta:0 "Итак, припасы... с изюминкой!"
couldnt_resist_the_urge:0 "Не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] устоять..."
darkages_celibacy_loophole.01.t:0 "Предложение, слишком хорошее, чтобы отказаться"
darkages_celibacy_loophole.01.desc:0 "Это мучило меня снова и снова. Жажда страсти, вовлеченности, погони и того, чтобы быть [Select_CString(ROOT.Char.IsFemale, 'преследуемой', 'преследуемым' )]...\n\nСоучастие и чувственность двух тел, играющих друг с другом и образующих единую, вневременную связь.\n\nИменно тогда [temptation.GetName] [Select_CString(temptation.IsFemale, 'пересекла', 'пересек' )] мой путь.\nЯ [Select_CString(ROOT.Char.IsFemale, 'была очарована', 'был очарован' )] и [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] думать, все сильнее, о том, чтобы оставить свое целомудрие позади.\n\nЗатем, после того, что я могу понять только как предлог остаться наедине с [Select_CString(temptation.IsFemale, 'ней', 'ним' )] в укромном месте, [temptation.GetSheHe] [Select_CString(temptation.IsFemale, 'расстегнула', 'расстегнул' )] [Select_CString(temptation.IsFemale, 'свою', 'свою' )] скромную мантию и [Select_CString(temptation.IsFemale, 'предстала', 'предстал' )] передо мной... во всей [Select_CString(temptation.IsFemale, 'своей', 'своей' )] Красе!"
darkages_celibacy_loophole.01.opta:0 "Я ВОЗОБЛАДАЮ НАД СВОИМИ ИНСТИНКТАМИ!"
darkages_celibacy_loophole.01.optb:0 "Предаться абсолютному удовольствию..."
darkages_celibacy_loophole.01.tt1:0 "Это событие может произойти, потому что вы Целибатны и не Целомудренны. Шансы быть искушенным возрастают, если вы Лживы, Произвольны, Нетерпеливы, Прожорливы, Гневны, Неверны или Общительны. Шансы снижаются, если вы Верны, Сдержанны, Справедливы, Честны, Терпеливы, Смиренны, Застенчивы или Спокойны. Из-за вашей слабой силы воли вы не сможете снова выбрать решение 'Принять целибат' в течение 10 лет\n"
rule_darkages_easy_mode:0 "#B #Bold Dark Ages#!:#! Сложность"
setting_darkages_easy_mode_active:0 "Легкая"
setting_darkages_easy_mode_active_desc:0 "Игрок получит +1 к лимиту домена, +1 рыцаря, +25% к налогам с домена, +25% к ежемесячному опыту образа жизни, +25% к ежемесячному признанию и +25% к размеру ополчения."
setting_darkages_easy_mode_inactive:0 "Нормальная"
setting_darkages_easy_mode_inactive_desc:0 "Настоящее дело. Сливки общества!"
setting_darkages_easy_mode_apocaliptic:0 "Апокалиптическая"
setting_darkages_easy_mode_apocaliptic_desc:0 "Не для слабонервных. Хотя автор Dark Ages не будет играть на этом уровне, мазохисты лоббировали его включение."
darkages_easy_mode:0 "Легкий режим"
darkages_easy_mode_desc:0 "Сложность Dark Ages - Легкая"
