setting_darkages_levy_size_33_desc:0 "Размер ополчения будет немного увеличен. Эффект будет более выражен по мере того, как провинции увеличивают свое развитие."
setting_darkages_levy_size_50:0 "Умеренное увеличение"
setting_darkages_levy_size_50_desc:0 "Размер ополчения будет умеренно увеличен. Эффект будет более выражен по мере того, как провинции увеличивают свое развитие."
setting_darkages_levy_size_100:0 "Сильное увеличение"
