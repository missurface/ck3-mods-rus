darkages_focus_piety1_desc:0 "Этот персонаж сосредоточен на получении Благочестия"
darkages_focus_piety2:0 "Фокус на Благочестие"
darkages_focus_piety2_desc:0 "Этот персонаж сосредоточен на получении Благочестия"
