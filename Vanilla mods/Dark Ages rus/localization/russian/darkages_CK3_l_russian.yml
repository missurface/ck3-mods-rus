darkages_piety.05.desc1:0 "После принятия просьбы [pope.GetName], я с разочарованием [Select_CString(ROOT.Char.IsFemale, 'прочитала', 'прочитал')] [Select_CString(pope.IsFemale, 'ее', 'его')] ответ, касающийся строгих вопросов, которые [Select_CString(pope.IsFemale, 'она мне задала', 'он мне задал')]. Несмотря на то, что я следую букве просьбы, мое послание было полным провалом, и мое [Concept('piety', 'Благочестие')|E] и, возможно, [Concept('devotion', 'Набожность')|E] страдают как следствие..."
darkages_piety.05.desc2:0 "После принятия просьбы [pope.GetName], я с радостью [Select_CString(ROOT.Char.IsFemale, 'прочитала', 'прочитал')] [Select_CString(pope.IsFemale, 'ее', 'его')] ответ, касающийся строгих вопросов, которые [Select_CString(pope.IsFemale, 'она мне задала', 'он мне задал')]. Похоже, благодаря моему искусному посланию, успех чистки вышел за мои границы, и я [Select_CString(ROOT.Char.IsFemale, 'прошла', 'прошел')] [Select_CString(pope.IsFemale, 'ее', 'его')] строгую проверку. Моя [Concept('devotion', 'Набожность')|E] стремительно растет!"
