darkages_dread.01.tt1:0 "Успех этого варианта положительно зависит от вашего высокого Навыка Дипломатии, от очень высокого Навыка Дипломатии вашего [da_dread_chancellor.GetCouncilTitle|i] и от ваших черт Общительный, Спокойный, Сострадательный, Прощающий и Дипломат. Отрицательно влияет на успех этого варианта ваш низкий Навык Дипломатии и ваши черты Гневный, Мстительный, Черствый и Произвольный. Политическая обстановка также может повлиять на шанс успеха\n"
darkages_dread.01.tt2:0 "Успех этого варианта положительно зависит от вашего высокого Навыка Управления, от очень высокого Навыка Управления вашего [da_dread_steward.GetCouncilTitle|i] и от ваших черт Усердный, Амбициозный, Эксцентричный, Щедрый и Архитектор. Отрицательно влияет на успех этого варианта ваш низкий Навык Управления и ваши черты Ленивый, Переменчивый, Смиренный и Параноик. Политическая обстановка также может повлиять на шанс успеха\n"
darkages_dread.01.tt3:0 "Успех этого варианта положительно зависит от вашего высокого Навыка Интриги, от очень высокого Навыка Интриги вашего [da_dread_spymaster.GetCouncilTitle|i] и от ваших черт Обманщик, Черствый, Мстительный, Садист и Пыточных дел мастер. Отрицательно влияет на успех этого варианта ваш низкий Навык Интриги и ваши черты Честный, Сострадательный, Справедливый и Прощающий. Политическая обстановка также может повлиять на шанс успеха\n"
