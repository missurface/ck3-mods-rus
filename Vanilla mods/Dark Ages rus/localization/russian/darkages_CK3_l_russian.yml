darkages_apocaliptic_mode_player:0 "Апокалиптический режим"
darkages_apocaliptic_mode_player_desc:0 "Сложность Dark Ages - Апокалиптическая"
rule_darkages_influence:0 "#B #Bold Dark Ages#!:#! Влияние"
setting_darkages_influence_normal:0 "Нормальное"
setting_darkages_influence_normal_desc:0 "ИИ не получит никаких специальных бонусов к Влиянию."
setting_darkages_influence_small:0 "Малый бонус"
setting_darkages_influence_small_desc:0 "ИИ получит малый бонус к Влиянию."
setting_darkages_influence_medium:0 "Средний бонус"
setting_darkages_influence_medium_desc:0 "ИИ получит значительный бонус к Влиянию."
setting_darkages_influence_large:0 "Большой бонус"
setting_darkages_influence_large_desc:0 "ИИ получит большой бонус к Влиянию."
influence_lvl_1:0 "Правило игры: Влияние"
influence_lvl_2:0 "Правило игры: Влияние"
influence_lvl_3:0 "Правило игры: Влияние"
darkages_higher_education.01.t:0 "За пределы возможного"
darkages_higher_education.01.desc:0 "Углубляясь в книги в попытке улучшить свое образование по пути, проложенному в моем детстве, я [Select_CString(ROOT.Char.IsFemale, 'обнаружила', 'обнаружил' )] источники, которые, несомненно, увеличат мои шансы на улучшение моего состояния.\n\nОднако я дрожу, просто думая о цене этих новых древних документов.\n\nВ конце концов, вопрос лишь в том, насколько я ценю свои шансы на улучшение..."
darkages_higher_education.01.opta:0 "Знания превыше всего!"
darkages_higher_education.01.optb:0 "Это слишком дорого..."
darkages_higher_education.02.t:0 "Отвлекающие занятия"
darkages_higher_education.02.desc:0 "С тех пор как я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] попытаться улучшить свое образование, я все больше [Select_CString(ROOT.Char.IsFemale, 'отстранялась', 'отстранялся' )] от политики моей Державы.\n\nМои вассалы остро чувствуют это отсутствие участия, поэтому я нахожусь на перепутье относительно политических последствий моих личных занятий..."
darkages_higher_education.02.opta:0 "Мой успех важнее мелочной политики!"
darkages_higher_education.02.optb:0 "Лучше успевать всё"
darkages_higher_education.02.tt1:0 "Вы решаете отдать предпочтение процессу обучения, увеличивая свои шансы на успех, ценой того, что не будете в курсе политики Державы. Ваши вассалы будут Раздражены вами в течение 5 лет\n"
darkages_higher_education.02.tt2:0 "Вы решаете уделять больше внимания политике Державы\n"
darkages_neglect:0 "Заброшенное графство"
darkages_neglect_desc:0 "Из-за других приоритетов Правителя это Графство было заброшено, что привело к зловещим последствиям"
darkages_higher_education.03.t:0 "Личные интересы"
darkages_higher_education.03.desc:0 "По мере того как мои занятия по улучшению образования продвигаются, я все больше и больше погружаюсь в детали предмета, тратя все меньше и меньше времени на надлежащее управление моим Доменом.\n\nК сожалению, если я не решу уменьшить свое участие в учебе, благосостояние моих владений и моих подданных пострадает..."
darkages_higher_education.03.opta:0 "Это все ради высшей цели!"
darkages_higher_education.03.optb:0 "Пора пересмотреть приоритеты"
darkages_higher_education.03.tt1:0 "Вы решаете углубиться в учебу, увеличивая свои шансы на успех, в то время как ваш Домен страдает от вашего отсутствия интереса\n"
darkages_higher_education.03.tt2:0 "Вы решаете разделить свое внимание между учебой и надлежащим управлением вашим Доменом\n"
darkages_improve_education_decision:0 "Получить высшее образование"
improve_education_decision_tooltip:0 "Попытаться повысить уровень своего Образования"
improve_education_decision_desc:0 "Вы можете попытаться улучшить свое образование в течение следующих 7 или 8 месяцев. В зависимости от удачи, вашего врожденного таланта и некоторых возможностей, которые могут скоро появиться, вы можете преуспеть в улучшении своих способностей. У вас есть только одна попытка в жизни сделать это."
darkages_improve_education_decision_confirm:0 "Пора взяться за классику!"
darkages_higher_education.04.t:0 "Интимная помощь"
darkages_higher_education.04.desc:0 "Благодаря отношениям с [Select_CString(darkages_spouse_he.IsFemale, 'моей', 'моим' )] [darkages_spouse_he.GetFirstName], [darkages_spouse_he.GetSheHe] [Select_CString(darkages_spouse_he.IsFemale, 'предложила', 'предложил' )] [Select_CString(darkages_spouse_he.IsFemale, 'свою', 'свою' )] поддержку в моих занятиях по улучшению образования.\n\nОднако есть одна постоянная проблема:\nесли мои другие Советники заметят, что влияние [Select_CString(darkages_spouse_he.IsFemale, 'моей супруги', 'моего супруга' )] на меня растет, могут возникнуть неприятности.\n\nВ целом, мне нужно решить, стоит ли помощь [darkages_spouse_he.GetFirstName] проблем с остальными Советниками."
darkages_higher_education.04.opta:0 "Конечно, я приму [Select_CString(darkages_spouse_he.IsFemale, 'её', 'его' )] помощь!"
darkages_higher_education.04.tt1:0 "Это событие может быть доступно только в том случае, если мнение вашего основного супруга о вас не менее 50, он является вашей Родственной душой или Любовником. Принятие [Select_CString(darkages_spouse_he.IsFemale, 'её', 'его' )] помощи увеличит ваши шансы на успех в улучшении образования. Однако другие ваши Советники разочаруются в вас на 5 лет\n"
darkages_higher_education.04.optb:0 "Я нежно решаю отказаться от [Select_CString(darkages_spouse_he.IsFemale, 'её', 'его' )] предложения..."
darkages_higher_education.04.tt2:0 "Беспокоясь о политической стороне, вы отказываетесь от предложения\n"
darkages_higher_education.05.t:0 "Рука помощи"
darkages_higher_education.05.desc:0 "Когда [darkages_friend_he.GetFirstName], [Select_CString(darkages_friend_he.IsFemale, 'моя подруга', 'мой друг' )], [Select_CString(darkages_friend_he.IsFemale, 'заметила', 'заметил' )], что я внезапно [Select_CString(ROOT.Char.IsFemale, 'углубилась', 'углубился' )] в книги для улучшения своего образования, [darkages_friend_he.GetSheHe] [Select_CString(darkages_friend_he.IsFemale, 'была непреклонна', 'был непреклонен' )] в [Select_CString(darkages_friend_he.IsFemale, 'своей', 'своей' )] попытке помочь мне с предметом. С удивлением я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], как [darkages_friend_he.GetSheHe] собирает всевозможные документы и информацию о моих занятиях.\n\nЕсли так пойдет и дальше, эта помощь повысит мои шансы на успех, но я боюсь, что [darkages_friend_he.GetFirstName] слишком вмешивается в мою жизнь, и что между нами может возникнуть конфликт характеров с очень печальными последствиями.\n\nКонечно, я не хочу терять дружбу [darkages_friend_he.GetFirstName], но помощь, которую [darkages_friend_he.GetSheHe] может оказать, реальна и будет остро ощущаться."
darkages_higher_education.05.opta:0 "Принять [Select_CString(darkages_friend_he.IsFemale, 'её', 'его' )] помощь и надеяться на лучшее"
darkages_higher_education.05.optb:0 "Идти в одиночку"
darkages_higher_education.05.tt1:0 "Хотя [Select_CString(darkages_friend_he.IsFemale, 'ваша подруга', 'ваш друг' )] повысит ваши шансы на успех в стремлении к лучшему образованию, существует риск, что ваша дружба будет утрачена из-за ваших характеров\n"
darkages_higher_education.05.tt2:0 "Вы откажетесь от помощи [darkages_friend_he.GetFirstName]. Ваша дружба останется незыблемой, но вы продолжите достигать своих целей в образовании с меньшими шансами на успех\n"
darkages_higher_education.06.t:0 "Высшее стремление"
darkages_higher_education.06.desc:0 "Пришло время узнать, увенчались ли мои поиски высшего образования успехом или нет. В зависимости от моего выбора в последние несколько месяцев, а также от некоторых черт и удачи, дается последний шанс.\n\nБуду ли я купаться в лучах собственного успеха?"
darkages_higher_education.06.opta:0 "Давайте оценим мои знания!"
darkages_higher_education.06.tt1:0 "Помните, что ваш базовый шанс на успех составляет 20%. Помимо ваших решений относительно недавних возможностей и удачи, черты Проницательный, Прилежный и Амбициозный дают вам небольшой бонус. Напротив, черты Недогадливый, Спокойный и Ленивый накладывают небольшой штраф. Удачи с вашим броском!\n"
darkages_higher_education.06.tt2:0 "Вы потерпите неудачу..."
darkages_higher_education_toast.06.toast1:0 "Вам удалось улучшить свое Образование!"
darkages_higher_education_toast.06.toast2:0 "Вам не удалось улучшить свое Образование..."
rule_admin_dissolution_rule:0 "#B #Bold Dark Ages#!:#! Административный Роспуск"
admin_dissolution_rule_desc:0 "Включает или отключает фракцию Роспуска для административных правительств."
setting_admin_dissolution_rule_on:0 "Включено"
setting_admin_dissolution_rule_on_desc:0 "Включает фракцию Роспуска для административных правительств."
setting_admin_dissolution_rule_off:0 "Отключено"
setting_admin_dissolution_rule_off_desc:0 "Отключает фракцию Роспуска для административных правительств."
rule_admin_independence_rule:0 "#B #Bold Dark Ages#!:#! Административная Независимость"
admin_independence_rule_desc:0 "Включает или отключает фракцию Независимости для административных правительств."
setting_admin_independence_rule_on:0 "Включено"
setting_admin_independence_rule_on_desc:0 "Включает фракцию Независимости для административных правительств."
setting_admin_independence_rule_off:0 "Отключено"
setting_admin_independence_rule_off_desc:0 "Отключает фракцию Независимости для административных правительств."
rule_advantage_damage_effect:0 "#B #Bold Dark Ages#!:#! Военное дело"
setting_advantage_damage_effect_2:0 "Детское"
setting_advantage_damage_effect_2_desc:0 "Война будет почти такой же предсказуемой, как вычисление суммы боевых очков обеих сторон. Намного проще."
setting_advantage_damage_effect_5:0 "Игровое"
setting_advantage_damage_effect_5_desc:0 "Война будет предсказуемой и отчасти детерминированным результатом суммы боевых очков обеих сторон. Проще."
setting_advantage_damage_effect_7:0 "Реалистичное"
setting_advantage_damage_effect_7_desc:0 "Война будет реалистичной и гораздо более непредсказуемой. Будут случаться неожиданности. Предсказатель битвы будет гораздо менее надежным, и зрелость игрока будет испытана. Сложнее."
darkages_dynast_legitimize_bastard_interaction_desc:2 "$dynasty_interaction_header$Объявить [recipient.GetShortUINameNoTooltip] $game_concept_legitimized_bastard$ за счет Признания, Легитимности и, если Административное правительство, Влияния\n\n#weak Это доступно, потому что [recipient.GetSheHe] является [Concept( 'bastard', 'Бастардом' )|E] моей [Concept( 'dynasty', 'Династии' )|E]#!"
darkages_influence.01.t:0 "Силовые игры в Дипломатии"
darkages_influence.01.desc:0 "Недавно я [Select_CString(ROOT.Char.IsFemale, 'была поставлена', 'был поставлен' )] в политически несостоятельное положение во внутренних делах Державы, рискуя своим Влиянием в целом.\n\nНа этой политической шахматной доске у каждого действия есть цена и награда, которая на этот раз сработала не в мою пользу.\n\nУ меня почти нет хороших вариантов, если только..."
darkages_influence.01.opta:0 "Обвинить мой Совет в политической ошибке"
darkages_influence.01.tt1:0 "Вы обвиняете свой Совет и пытаетесь избежать потери Влияния, теряя при этом Престиж. Как и следовало ожидать, ваши Советники не будут довольны вами\n"
darkages_influence.01.optb:0 "Принять ситуацию как есть"
darkages_influence.01.tt2:0 "Да, к сожалению, вы потеряете значительное количество влияния\n"
darkages_influence.01.optc:0 "...если только я не совершу мастерский ход в Дипломатии!"
darkages_influence.01.tt3:0 "Вы пытаетесь придумать аргумент, вовлекающий ваш Совет и практические результаты ваших политических решений, пытаясь представить все в хорошем свете.\nУспех этого варианта положительно зависит от вашей Высокой Дипломатии (>=12). Как всегда, чем выше, тем лучше. Также поможет наличие Дипломатического Образования или Черты Дипломат и Общительный. Отрицательно влияют на шансы успеха ваша Низкая Дипломатия (<8) - чем ниже, тем хуже - и ваши Черты Нетерпеливый и Гневный\n"
darkages_influence.01.optd:0 "Ловко минимизировать политический ущерб"
darkages_influence.01.tt4:0 "Этот вариант доступен, потому что вы Проницательны\n"
darkages_influence.01.toast1:0 "Вы мастерски справились с ситуацией, даже получив Престиж!"
darkages_influence.01.toast2:0 "Вы с треском провалили попытку исправить политическую ситуацию..."
darkages_random_list_success:0 "Успех"
darkages_random_list_failure:0 "Провал"
darkages_influence.02.t:0 "Игры в военные игры"
darkages_influence.02.desc:0 "Недавно я [Select_CString(ROOT.Char.IsFemale, 'организовала', 'организовал' )] военную игру с участием влиятельных людей, где каждый Советник играл за державы по соседству, а я [Select_CString(ROOT.Char.IsFemale, 'играла', 'играл' )] с абстракцией моей собственной Державы.\n\nК сожалению, из-за неудачного набора решений и невезения, моя Держава была вот-вот захвачена вражескими силами, когда я [Select_CString(ROOT.Char.IsFemale, 'потеряла', 'потерял' )] самообладание и [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] обвинять свой Совет в жульничестве с краплеными костями!\n\nСудя по взглядам всех присутствующих в комнате, я [Select_CString(ROOT.Char.IsFemale, 'понимаю', 'понимаю' )], что мой Престиж и Влияние теперь на кону..."
darkages_influence.02.opta:0 "Продолжать обвинять в жульничестве"
darkages_influence.02.tt1:0 "Вы продолжаете обвинять своих Советников в том, что они жульничали с краплеными костями, и пытаетесь избежать потери Влияния, теряя при этом Престиж. Как и следовало ожидать, ваши Советники не будут довольны вами\n"
darkages_influence.02.optb:0 "Принять свое поражение в военной игре"
darkages_influence.02.tt2:0 "Да, к сожалению, вы потеряете значительное количество влияния\n"
darkages_influence.02.optc:0 "Попытаться совершить мастерский ход в Стратегии!"
darkages_influence.02.tt3:0 "Вы пытаетесь придумать какие-то рискованные стратегические гамбиты, вовлекая их, чтобы оказаться выше всех, вырывая победу в игре из пасти поражения!\nУспех этого варианта положительно зависит от вашего Высокого Военного дела (>=12). Как всегда, чем выше, тем лучше. Также поможет наличие Военного Образования или Черты Стратег и Упрямый. Отрицательно влияют на шансы успеха ваше Низкое Военное дело (<8) - чем ниже, тем хуже - и ваши Черты Трусливый и Смиренный\n"
darkages_influence.02.optd:0 "Ловко минимизировать политический ущерб"
darkages_influence.02.tt4:0 "Этот вариант доступен, потому что вы Проницательны\n"
darkages_influence.02.toast1:0 "Вы мастерски справились с ситуацией, даже получив Престиж!"
darkages_influence.02.toast2:0 "Вам не удалось даже близко спасти стратегическую ситуацию..."
darkages_influence.03.t:0 "Судьбоносная встреча"
darkages_influence.03.desc:0 "Сцена готова. Утверждая, что я [Select_CString(ROOT.Char.IsFemale, 'открываю', 'открываю' )] управление Державой для всех заинтересованных влиятельных сторон, я [Select_CString(ROOT.Char.IsFemale, 'открыла', 'открыл' )] обычно закрытое заседание Совета для всех важных людей в моей Державе.\n\nК сожалению, обсуждая некоторые цифры для инвестиций на следующий год, я [Select_CString(ROOT.Char.IsFemale, 'была застигнута', 'был застигнут' )] врасплох и [Select_CString(ROOT.Char.IsFemale, 'выставила', 'выставил' )] себя [Select_CString(ROOT.Char.IsFemale, 'дурой', 'дураком' )], в то время как мои Советники проявили себя эффективными и знающими.\n\nЧувствуя, что встречи ускользают из моих политических рук, я [Select_CString(ROOT.Char.IsFemale, 'обернулась', 'обернулся' )] против своих Советников, даже если это могло быть рискованной авантюрой..."
darkages_influence.03.opta:0 "Продолжать давить на своих Советников"
darkages_influence.03.tt1:0 "Вы продолжаете настаивать на своем аргументе против своих Советников, заставляя их выглядеть плохо перед всеми, чтобы сохранить свое лицо. Однако препирательства, безусловно, заставляют вас терять Престиж, даже если вы сможете избежать потери Влияния, если звезды сойдутся в вашу пользу. Как и следовало ожидать, ваши Советники не будут довольны вами\n"
darkages_influence.03.optb:0 "Оставить этот вопрос, приняв свою неудачу на этот раз"
darkages_influence.03.tt2:0 "Да, к сожалению, вы потеряете значительное количество влияния\n"
darkages_influence.03.optc:0 "Попытаться совершить мастерский ход в Управлении!"
darkages_influence.03.tt3:0 "Вы пытаетесь придумать аргумент управления, который проясняет ситуацию, заставляя вас выйти победителем, вырывая победу в споре из пасти поражения!\nУспех этого варианта положительно зависит от вашего Высокого Управления (>=12). Как всегда, чем выше, тем лучше. Также поможет наличие Образования в Управлении или Черты Администратор и Прилежный. Отрицательно влияют на шансы успеха ваше Низкое Управление (<8) - чем ниже, тем хуже - и ваши Черты Ленивый и Переменчивый\n"
darkages_influence.03.optd:0 "Ловко минимизировать политический ущерб"
darkages_influence.03.tt4:0 "Этот вариант доступен, потому что вы Проницательны\n"
darkages_influence.03.toast1:0 "Вы мастерски справились с ситуацией, даже получив Престиж!"
darkages_influence.03.toast2:0 "Вы с треском провалились в дискуссии об управлении..."
darkages_influence.04.t:0 "Политика странных союзов"
darkages_influence.04.desc:0 "Сегодня я [Select_CString(ROOT.Char.IsFemale, 'пытаюсь', 'пытаюсь' )] представить свое правление как открытое и инклюзивное, чтобы улучшить мнение важных людей моей Державы. Таким образом, внутренний Совет был открыт для посещения знатными людьми.\n\nК сожалению, все пошло не так с самого начала, когда цена неназванного агента, которого я [Select_CString(ROOT.Char.IsFemale, 'внедрила', 'внедрил' )] высоко в соседней Державе, была поставлена под сомнение, наряду с её донесениями.\nНикому, кроме моего Тайного советника, не известно о бурном романе между этим агентом и Тайным советником упомянутой соседней Державы.\n\nЧтобы не потерять лицо среди стольких влиятельных людей, мне нужно придумать очень хороший аргумент по этому деликатному вопросу. Или, может быть, лучший способ действовать — обвинить мой Совет, жалуясь на невежество его членов, не давая намека на реальную суть дела..."
darkages_influence.04.opta:0 "Отречься от своих Советников"
darkages_influence.04.tt1:0 "Вы выставляете своих Советников идиотами перед всеми, чтобы сохранить свое лицо. Однако препирательства, безусловно, заставляют вас терять Престиж, даже если вы сможете избежать потери Влияния, если звезды сойдутся в вашу пользу. Как и следовало ожидать, ваши Советники не будут довольны вами\n"
darkages_influence.04.optb:0 "Молчать, чтобы защитить мою шпионскую операцию"
darkages_influence.04.tt2:0 "Да, к сожалению, вы потеряете значительное количество влияния\n"
darkages_influence.04.optc:0 "Попытаться совершить мастерский ход в Интригах!"
darkages_influence.04.tt3:0 "Вы пытаетесь придумать интригующий аргумент, сильно опирающийся на романтику, который проясняет ситуацию, заставляя вас выйти победителем, вырывая победу в споре из пасти поражения!\nУспех этого варианта положительно зависит от вашей Высокой Интриги (>=12). Как всегда, чем выше, тем лучше. Также поможет наличие Образования в Интригах или Черты Соблазнитель и Лживый. Отрицательно влияют на шансы успеха ваша Низкая Интрига (<8) - чем ниже, тем хуже - и ваши Черты Честный и Целомудренный\n"
darkages_influence.04.optd:0 "Ловко минимизировать политический ущерб"
darkages_influence.04.tt4:0 "Этот вариант доступен, потому что вы Проницательны\n"
darkages_influence.04.toast1:0 "Вы мастерски справились с ситуацией, даже получив Престиж!"
darkages_influence.04.toast2:0 "Вы с треском провалились со своим дешевым аргументом..."
darkages_influence.05.t:0 "Тайный аргумент"
darkages_influence.05.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'открыла', 'открыл' )] сегодня заседание Совета для других важных людей Державы, чтобы представить свое правление как инклюзивное и великодушное, была поднята значительная философская дискуссия, и мой слабый первоначальный аргумент выставил меня [Select_CString(ROOT.Char.IsFemale, 'дурой', 'дураком' )] за столом.\n\nЧтобы не потерять лицо среди стольких влиятельных людей, мне нужно совершить мастерский ход в философии касательно этого деликатного вопроса. Или, может быть, лучший способ действовать — обвинить мой Совет в незапланированных философских дебатах... "
darkages_influence.05.opta:0 "Обвинить моих Советников"
darkages_influence.05.tt1:0 "Вы выставляете своих Советников идиотами перед всеми, чтобы сохранить свое лицо. Однако препирательства, безусловно, заставляют вас терять Престиж, даже если вы сможете избежать потери Влияния, если звезды сойдутся в вашу пользу. Как и следовало ожидать, ваши Советники не будут довольны вами\n"
darkages_influence.05.optb:0 "Избегать дальнейшего вмешательства в это дело"
darkages_influence.05.tt2:0 "Да, к сожалению, вы потеряете значительное количество влияния\n"
darkages_influence.05.optc:0 "Попытаться совершить мастерский ход в философии!"
darkages_influence.05.tt3:0 "Вы пытаетесь придумать философский аргумент, сильно опирающийся на старую классику, который проясняет ситуацию, заставляя вас выйти победителем, вырывая победу в споре из пасти поражения!\nУспех этого варианта положительно зависит от вашей Высокой Учености (>=12). Как всегда, чем выше, тем лучше. Также поможет наличие Образования в Учености или Черты Ученый и Упрямый. Отрицательно влияют на шансы успеха ваша Низкая Ученость (<8) - чем ниже, тем хуже - и ваши Черты Эксцентричный и Ленивый\n"
darkages_influence.05.optd:0 "Ловко минимизировать политический ущерб"
darkages_influence.05.tt4:0 "Этот вариант доступен, потому что вы Проницательны\n"
darkages_influence.05.toast1:0 "Вы мастерски справились с ситуацией, даже получив Престиж!"
darkages_influence.05.toast2:0 "Вы с треском провалились со своим дешевым аргументом..."
darkages_vassals_bureaucracy_1:0 "Правительственная Бюрократия"
darkages_vassals_bureaucracy_1_desc:0 "Из налогов вассалов вычитается определенная сумма золота, так как у этого персонажа от 10 до 15 вассалов"
