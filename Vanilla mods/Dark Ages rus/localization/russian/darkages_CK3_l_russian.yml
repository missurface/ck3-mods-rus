darkages_opinion_focus_people3_desc:0 "Лорд этого графства улучшает участь своих крестьян"
commander_defender_advantage:0 "Преимущество командира обороны"
darkages_friends.01.t:0 "Друг друга"
darkages_friends.01.desc:0 "Сегодня [friend_darkages.GetFirstName], [Select_CString(friend_darkages.IsFemale, 'моя дорогая подруга', 'мой дорогой друг')], [Select_CString(friend_darkages.IsFemale, 'обратилась', 'обратился')] ко мне с интересным предложением для рассмотрения.\nКак обстоят дела, [candidate_darkages.GetFirstName], [Select_CString(friend_darkages.IsFemale, 'ее', 'его')] [Select_CString(candidate_darkages.IsFemale, 'уважаемая подруга', 'уважаемый друг')], хотя и [Select_CString(candidate_darkages.IsFemale, 'происходит', 'происходит')] из очень скромной семьи и не имеет веса, [Select_CString(candidate_darkages.IsFemale, 'является очень талантливой личностью', 'является очень талантливым малым')], [Select_CString(candidate_darkages.IsFemale, 'которая', 'который')] может стать очень полезным дополнением к моему Двору.\n\nКонечно, есть много сторон, с которых стоит рассмотреть этот вопрос, так как мой Престиж от найма простолюдина пострадает, если я [Select_CString(ROOT.Char.IsFemale, 'приму', 'приму')] предложение.\nЯ также могу получить некоторую маргинальную выгоду в плане мнения придворной фракции моих дворян, если осторожно объявлю, что откажусь от этой возможности...\n\nВ конце концов, будучи [Select_CString(ROOT.Char.IsFemale, 'благодарной', 'благодарным')] [Select_CString(friend_darkages.IsFemale, 'моей подруге', 'моему другу')], выбор за мной."
darkages_friends.01.opta:0 "Я ценю полезных людей больше, чем их происхождение"
darkages_friends.01.optb:0 "Я могу повернуть это в свою пользу..."
darkages_friends.01.tt1:0 "Вы отказываетесь от предложения и используете его как способ повысить свой Престиж и мнение своих Придворных вассалов. В зависимости от ваших черт, ваш Стресс может измениться в лучшую или худшую сторону\n"
darkages_friends.02.t:0 "Рука помощи"
darkages_friends.02.desc:0 "С радостью я [Select_CString(ROOT.Char.IsFemale, 'приняла', 'принял')] сегодня [Select_CString(ROOT.Char.IsFemale, 'свою подругу', 'своего друга')] [friend_darkages.GetFirstName] и [Select_CString(ROOT.Char.IsFemale, 'вовлекла', 'вовлек')] [friend_darkages.GetHerHim] в долгую дискуссию обо всем на свете, от состояния Державы до сплетен о моих придворных, проходя мимо того или иного воспоминания об общем прошлом.\n\nС трепетом я [Select_CString(ROOT.Char.IsFemale, 'восприняла', 'воспринял')] то, что [friend_darkages.GetSheHe] [Select_CString(friend_darkages.IsFemale, 'пыталась', 'пытался')] уговорить меня попытаться улучшить один из моих Навыков под [friend_darkages.GetHerHis] опекой.\n\nВсе, что мне нужно сделать, это купить несколько старых книг по предмету, и уроки могут начаться..."
darkages_friends.02.opta:0 "Давайте сделаем это!"
darkages_friends.02.optb:0 "Я предпочитаю пойти на рыбалку..."
darkages_friends.02.tt1:0 "Имейте в виду, что если вы ничего не узнаете, вы потеряете Престиж, так как все будут свидетелями вашей неудачи.\nНа шанс успеха положительно влияют черты Усердный, Проницательный, Сметливый, Разумный, Гениальный и высокий Навык Учености (>=12). Отрицательно влияют на вероятность низкий Навык Учености (<8), черты Тупой, Ленивый, Медлительный, Глупый и Имбецил\n"
darkages_friends.03.t:0 "Друг в беде"
darkages_friends.03.desc1:0 "[Select_CString(friend_darkages.IsFemale, 'Моя подруга', 'Мой друг')] [friend_darkages.GetName] [Select_CString(friend_darkages.IsFemale, 'пришла', 'пришел')] ко мне сегодня довольно [Select_CString(friend_darkages.IsFemale, 'удрученная', 'удрученный')] [friend_darkages.GetHerHis] финансовыми перспективами на ближайшую и долгосрочную перспективу.\nКак обстоят дела, [friend_darkages.GetSheHe] стоит перед лицом банкротства и просит моей помощи в непосредственной оплате [friend_darkages.GetHerHis] кредиторам.\n\nТеперь самое замечательное в [friend_darkages.GetFirstName] — это [friend_darkages.GetHerHis] глубокие религиозные связи, которые, если я решу помочь [friend_darkages.GetHerHim], заставят мое Благочестие ярко сиять, поскольку будут распространяться скромные слова о моем решающем вкладе..."
darkages_friends.03.desc2:0 "[Select_CString(friend_darkages.IsFemale, 'Моя подруга', 'Мой друг')] [friend_darkages.GetName] [Select_CString(friend_darkages.IsFemale, 'пришла', 'пришел')] ко мне сегодня довольно [Select_CString(friend_darkages.IsFemale, 'удрученная', 'удрученный')] [friend_darkages.GetHerHis] финансовыми перспективами на ближайшую и долгосрочную перспективу.\nКак обстоят дела, [friend_darkages.GetSheHe] стоит перед лицом банкротства и просит моей помощи в непосредственной оплате [friend_darkages.GetHerHis] кредиторам.\n\nТеперь самое замечательное в [friend_darkages.GetFirstName] — это [friend_darkages.GetHerHis] глубокие религиозные связи, которые, если я решу помочь [friend_darkages.GetHerHim], заставят мое Благочестие ярко сиять, поскольку будут распространяться скромные слова о моем решающем вкладе...\n\nНо здесь есть еще одна более сладкая возможность. Основываясь на деталях, которые я уже знаю, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] бы разработать амбициозный план, в котором я получу больше Благочестия, не потрачу ни одной золотой монеты и блестяще воспользуюсь ситуацией.\nРешение за мной!"
darkages_friends.03.opta:0 "Я помогу тебе, [friend_darkages.GetFirstName]"
darkages_friends.03.optb:0 "Извини, я не могу тебе помочь"
darkages_friends.03.optc:0 "Манипулировать всеми!"
darkages_friends.03.tt1:0 "Этот вариант доступен, потому что у вас не менее 12 Навыка Интриги, вы Обманщик, Интриган или Нелояльный.\nУспех этого варианта зависит от высокого Навыка Интриги у вас и у вашего [spymaster.GetCouncilTitle|g]\n"
darkages_friends.03.toast1:0 "Вам удалось манипулировать всеми!"
darkages_friends.03.toast2:0 "Вы потерпели неудачу в своем гнусном плане..."
darkages_friends.03.tt2:0 "Ваше действие успешно\n"
darkages_friends.03.tt3:0 "Вы разоблачены как презренная душа...\n"
darkages_friends.04.t:0 "Правильное слово"
darkages_friends.04.desc:0 "С радостью я [Select_CString(ROOT.Char.IsFemale, 'приняла', 'принял')] [friend_darkages.GetName|a], [Select_CString(friend_darkages.IsFemale, 'свою личную подругу', 'своего личного друга')], чтобы провести блаженное утро вместе.\n\nПосле обеда [friend_darkages.GetSheHe] [Select_CString(friend_darkages.IsFemale, 'продолжила', 'продолжил')] самым заговорщическим тоном рассказывать мне о [friend_darkages.GetHerHis] планах улучшить Известность моей Родословной.\nМой интерес был подогрет, и с улыбкой я [Select_CString(ROOT.Char.IsFemale, 'восприняла', 'воспринял')] новость о том, что при разных Дворах были сделаны некие гиперболические комментарии для продвижения плана [Select_CString(friend_darkages.IsFemale, 'моей подруги', 'моего друга')].\n\nУчитывая состояние всего дела, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] теперь решить, позволю ли я [friend_darkages.GetFirstName|d] попытаться совершить настоящий переворот в плане моей Известности, воспользуюсь ли я первоначальной работой и получу инвестиции от разных иностранных дворян или просто откажусь от всей схемы..."
darkages_friends.04.opta:0 "Принять предложение"
darkages_friends.04.optb:0 "Превратить слова [Select_CString(friend_darkages.IsFemale, 'моей подруги', 'моего друга')] в инвестиционную возможность"
darkages_friends.04.optc:0 "Запретить все это дело"
darkages_friends.04.tt1:0 "Ваш базовый шанс на успех, даже если он не очень низкий, не высок. Однако хороший Навык Дипломатии [friend_darkages.GetFirstName|g] или наличие у [Select_CString(friend_darkages.IsFemale, 'нее', 'него')] черт Общительный, Дипломат, Высокомерный, Амбициозный, Усердный или Проницательный существенно увеличат ваши шансы. Конечно, чем выше Дипломатия и чем больше черт, тем лучше\n"
darkages_friends.04.toast1:0 "Ваша Известность взлетает!"
darkages_friends.04.toast2:0 "Упущенная возможность..."
darkages_friends.05.tt1:0 "Этот вариант доступен, потому что у вас не менее 12 Навыка Интриги, вы Обманщик, Интриган или Нелояльный\n"
darkages_friends.05.t:0 "Полезный друг"
darkages_friends.05.desc1:0 "[Select_CString(friend_darkages.IsFemale, 'Моя предприимчивая подруга', 'Мой предприимчивый друг')] [friend_darkages.GetName] [Select_CString(friend_darkages.IsFemale, 'пришла', 'пришел')] сегодня ко мне, торжествующе заявив, что [friend_darkages.GetSheHe] [Select_CString(friend_darkages.IsFemale, 'совершила', 'совершил')] большой переворот за последний год, мягко поговорив с моими вассалами, став их доверенным лицом и очень благотворно повлияв на них в отношении моей персоны!\n\nГлубоко поблагодарив [Select_CString(friend_darkages.IsFemale, 'мою подругу', 'моего друга')] за [friend_darkages.GetHerHis] помощь, мой разум, никогда не спокойный, немедленно начал видеть дальше, чем простые мнения... в конце концов, сколько стоит мнение?"
darkages_friends.05.desc2:0 "[Select_CString(friend_darkages.IsFemale, 'Моя предприимчивая подруга', 'Мой предприимчивый друг')] [friend_darkages.GetName] [Select_CString(friend_darkages.IsFemale, 'пришла', 'пришел')] сегодня ко мне, торжествующе заявив, что [friend_darkages.GetSheHe] [Select_CString(friend_darkages.IsFemale, 'совершила', 'совершил')] большой переворот за последний год, мягко поговорив с моими вассалами, став их доверенным лицом и очень благотворно повлияв на них в отношении моей персоны!\n\nГлубоко поблагодарив [Select_CString(friend_darkages.IsFemale, 'мою подругу', 'моего друга')] за [friend_darkages.GetHerHis] помощь, мой разум, никогда не спокойный, немедленно начал видеть дальше, чем простые мнения... в конце концов, сколько стоит мнение?\n\nО радость, но все может стать еще интереснее!\nКак насчет использования секретов, которыми некоторые из мои вассалов поделились с [friend_darkages.GetFirstName|i], чтобы шантажировать их?"
darkages_friends.05.opta:0 "Я последую первоначальной идее [Select_CString(friend_darkages.IsFemale, 'моей подруги', 'моего друга')]"
darkages_friends.05.optb:0 "Я использую рычаги давления, чтобы ввести дополнительный налог"
darkages_friends.05.optc:0 "Я предам [Select_CString(friend_darkages.IsFemale, 'свою подругу', 'своего друга')] и пойду путем шантажа"
darkages_trade.01.t:0 "Далеко идущее предложение"
darkages_trade.01.desc:0 "Изысканная встреча была организована на сегодня, после обеда. Я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил')] принять богатого иностранца, принадлежащего к культуре [trader.GetCulture.GetName], чтобы выслушать упомянутое торговое предложение от [trader.GetHerHim].\n\nПосле того, как я [Select_CString(ROOT.Char.IsFemale, 'была застигнута', 'был застигнут')] врасплох владением [trader.GetFirstName|g] моим языком, последовал очень приятный обмен любезностями, а затем было представлено интересное торговое предложение.\n\nВ основном, [trader.GetName] будет управлять одним дальним торговым маршрутом между моей столицей и [trader.GetHerHis] далекими землями. Учитывая расстояния, я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] ожидать возврата моих инвестиций только через несколько лет, и, если все получится, я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] ожидать, что этот возврат продолжится в обозримом будущем.\n\nЗная, что мне нужно предоставить немного начального золота, я собираюсь ответить на [trader.GetHerHis] предложение завтра..."
darkages_trade.01.opta:0 "Принять сделку"
darkages_trade.01.tt1:0 "Даже если это очень прямолинейное коммерческое решение, общение с персонажами из столь далеких земель и в чуждых костюмах принесет вам штраф к Престижу. Для успеха этого предприятия важно, чтобы ваш персонаж имел Хорошее или лучшее Управление, следовал Образу жизни Управления, имел Образование в Управлении, был Жадным или Администратором. Обратите внимание, что маршрут может быть совершенно прибыльным даже без любого из этих Навыков, Черт или Образа жизни, но шансы не так хороши\n"
darkages_trade.01.optb:0 "Отказаться от предложения"
darkages_trade.01.tt2:0 "Если бы у вас была лучшая Дипломатия, вы бы выиграли больше от такого решения"
darkages_trade.01.tt3:0 "Обладая средней Дипломатией, вы можете извлечь некоторую политическую выгоду из своего отказа и увеличить свой Престиж, пренебрежительно отнесясь к торговцу\n"
darkages_trade.01.tt4:0 "Обладая Дипломатией выше средней, вы можете извлечь некоторую политическую выгоду из своего отказа, и не только увеличите свой Престиж, но и получите одобрение своих вассалов, пренебрежительно отнесясь к торговцу\n"
darkages_trade.01.optc:0 "Конфисковать товары торговца"
darkages_trade.01.tt5:0 "Этот вариант доступен, потому что у вас либо не менее 12 Навыка Интриги, вы Обманщик, Амбициозный или Произвольный. Действие таким образом считается презренным с возможными последствиями\n"
darkages_trade.01.tt6:0 "Этот вариант доступен, потому что вы либо Черствый, Садист, Произвольный, либо следуете Образу жизни Интриги. Действие таким образом считается презренным с возможными последствиями\n"
darkages_trade.01.optd:0 "Арестовать торговца и потребовать выкуп"
darkages_trade.02.t:0 "Хорошая прибыль!"
darkages_trade.02.desc:0 "Наконец-то экзотические товары прибыли в мою столицу, и я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] получить часть обещанной прибыли!\n\nЭто золото безмерно поможет моим финансам, я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')]..."
darkages_trade.02.opta:0 "Будем надеяться, что так и продолжится..."
darkages_trade.03.t:0 "Последнее слово издалека"
darkages_trade.03.desc:0 "К сожалению, сегодня я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] известие, что торговый путь, согласованный много лет назад, был закрыт. Различные факторы, от бандитов до относительной ценности товаров, новых целей моего партнера или даже проблем со здоровьем, могли послужить сигналом к гибели маршрута..."
darkages_trade.03.opta:0 "Это было хорошо, пока длилось"
darkages_trade.04.t:0 "От [trader.GetName], с любовью..."
darkages_trade.04.desc:0 "Сегодня я [Select_CString(ROOT.Char.IsFemale, 'проснулась', 'проснулся')] со странным чувством. Что-то было не так с самого восхода солнца, но я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] точно определить, что именно.\n\nК сожалению, я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил')] побыть несколько минут в полном одиночестве и удалиться в отдаленное место, чтобы привести свои мысли в порядок.\n\nИменно тогда и была устроена засада. В одно мгновение появилась страшная фигура в капюшоне, подняла арбалет и направила его мне в грудь, сказав грубым голосом:\n\n'[trader.GetName] шлет [trader.GetHerHis] почтение'..."
darkages_trade.04.opta:0 "Mors tua, vita mea!"
darkages_trade.04.tt:0 "Вы быстро бросаетесь на убийцу, направив свой верный кинжал ему в сердце. Похоже, торговцу, который пришел к вам с деловым предложением, не понравилось полученное обращение, и [Select_CString(trader.IsFemale, 'она решила', 'он решил')] отомстить. В следующий раз обращайте внимание на черты и навыки ваших жертв\n"
darkages_trade.04.save:0 "Вы спасаетесь невредимым!"
darkages_trade.05.t:0 "Трудолюбивый местный совет"
darkages_trade.05.desc1:0 "Местный совет графства [darkages_county.GetName] обратился сегодня с просьбой профинансировать то, что можно рассматривать как прибыльный местный бизнес, касающийся производства ячменя.\n\nТеперь у этих подданных есть много идей о том, что делать с моим золотом, и они уже поставили меня в слабое политическое положение в отношении населения Графства в целом.\n\nПоскольку я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] рассчитывать на получение некоторой награды в среднесрочной перспективе, мне нужно принять решение по этому вопросу."
darkages_trade.05.desc2:0 "Местный совет графства [darkages_county.GetName] обратился сегодня с просьбой профинансировать то, что можно рассматривать как прибыльный местный бизнес, касающийся производства пергамента.\n\nТеперь у этих подданных есть много идей о том, что делать с моим золотом, и они уже поставили меня в слабое политическое положение в отношении населения Графства в целом.\n\nПоскольку я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] рассчитывать на получение некоторой награды в среднесрочной перспективе, мне нужно принять решение по этому вопросу."
darkages_trade.05.desc3:0 "Местный совет графства [darkages_county.GetName] обратился сегодня с просьбой профинансировать то, что можно рассматривать как прибыльный местный бизнес, касающийся производства мебели.\n\nТеперь у этих подданных есть много идей о том, что делать с моим золотом, и они уже поставили меня в слабое политическое положение в отношении населения Графства в целом.\n\nПоскольку я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] рассчитывать на получение некоторой награды в среднесрочной перспективе, мне нужно принять решение по этому вопросу."
darkages_trade.05.desc4:0 "Местный совет графства [darkages_county.GetName] обратился сегодня с просьбой профинансировать то, что можно рассматривать как прибыльный местный бизнес, касающийся производства окрашенных тканей.\n\nТеперь у этих подданных есть много идей о том, что делать с моим золотом, и они уже поставили меня в слабое политическое положение в отношении населения Графства в целом.\n\nПоскольку я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] рассчитывать на получение некоторой награды в среднесрочной перспективе, мне нужно принять решение по этому вопросу."
darkages_trade.05.opta:0 "Принять просьбу"
darkages_trade.05.optb:0 "Взять план под свой контроль"
darkages_trade.05.optc:0 "Дискредитировать местный совет"
darkages_trade.05.optd:0 "Отказать в просьбе"
darkages_trade.05.opte:0 "Искусно отказать в просьбе"
darkages_trade.05.tt1:0 "Выбрав этот вариант, вы сделаете то, о чем просил скромный местный совет графства [darkages_county.GetName], и будете оценены своим окружением как слабый, теряя Престиж, помимо инвестированного золота\n"
darkages_trade.05.tt2:0 "Этот вариант доступен, потому что у вас либо Навык Управления не менее 12, вы Усердный, Амбициозный или Администратор. Вы берете бразды правления проектом, глубоко погружаясь в него\n"
darkages_trade.05.tt3:0 "Этот вариант доступен, потому что у вас либо Навык Интриги не менее 12, вы Обманщик, Произвольный, Нелояльный или Черствый. Используя гнусные уловки, проклятую ложь и кислую манипуляцию, вы превращаете благие намерения местного совета во что-то сродни измене и находите хорошее оправдание, которое хорошо воспринимается крестьянами графства [darkages_county.GetName], чтобы переформировать его, избегая при этом траты золота\n"
darkages_trade.05.tt4:0 "Этот вариант доступен, потому что у вас менее 12 Навыка Дипломатии. Вы отказываете в просьбе, сталкиваясь в процессе с местными политическими последствиями\n"
darkages_trade.05.tt5:0 "Этот вариант доступен, потому что у вас не менее 12 Навыка Дипломатии. Вы отказываете в предложении, но подслащиваете свои слова и избегаете любых плохих последствий"
darkages_county_trade_local_council_1:0 "Инвестиции в торговлю ячменем"
darkages_county_trade_local_council_2:0 "Инвестиции в торговлю пергаментом"
darkages_county_trade_local_council_3:0 "Инвестиции в торговлю мебелью"
darkages_county_trade_local_council_4:0 "Инвестиции в торговлю окрашенными тканями"
darkages_county_trade_local_council_1_desc:0 "Владелец этого Графства инвестировал золото по просьбе местного совета"
darkages_county_trade_local_council_2_desc:0 "Владелец этого Графства инвестировал золото по просьбе местного совета"
darkages_county_trade_local_council_3_desc:0 "Владелец этого Графства инвестировал золото по просьбе местного совета"
darkages_county_trade_local_council_4_desc:0 "Владелец этого Графства инвестировал золото по просьбе местного совета"
darkages_county_trade_local_council_5:0 "Местный совет обвинен"
darkages_county_trade_local_council_5_desc:0 "Владелец этого Графства смог дискредитировать местный совет"
darkages_county_trade_local_council_6:0 "Крестьяне удручены"
darkages_county_trade_local_council_6_desc:0 "Владелец этого Графства неловко отказал планам местного совета"
darkages_trade.06.t:0 "Долгое путешествие"
darkages_trade.06.desc:0 "Благодаря влиянию общих знакомых, некий [darkages_trader.GetName] [Select_CString(darkages_trader.IsFemale, 'смогла', 'смог')] добиться встречи со мной сегодня, где [darkages_trader.GetSheHe] [Select_CString(darkages_trader.IsFemale, 'сообщила', 'сообщил')] мне о [darkages_trader.GetHerHis] намерении совершить рискованное коммерческое путешествие в далекие земли [darkages_ruler.GetName].\n\nЭтот торговец [Select_CString(darkages_trader.IsFemale, 'искушала', 'искушал')] меня инвестировать в [darkages_trader.GetHerHis] предприятие, обещая существенную прибыль, как только [darkages_trader.GetSheHe] вернется.\n\nТеперь мне решать, как я отвечу на предложение..."
darkages_trade.06.opta:0 "Принять сделку"
darkages_trade.06.tt1:0 "Доверие к простолюдинам будет прохладно встречено вашим окружением, поэтому ваш Престиж пострадает. В уверенности, что случай сыграет свою роль, никакой успех не гарантирован и никакая неудача никогда не гарантирована, успех этого предприятия зависит от Навыка Управления торговца, а также его отрицательных Черт Нетерпеливый, Гневный или Ленивый\n"
darkages_trade.06.optb:0 "Инвестировать больше, чем просили"
darkages_trade.06.tt2:0 "Этот вариант доступен, потому что у вас либо Навык Управления не менее 12, вы Жадный или вы Администратор. Доверие к простолюдинам будет прохладно встречено вашим окружением, поэтому ваш Престиж пострадает. Рискуя большим, вы сделаете успех немного менее вероятным, но можете быть уверены, что получите значительно больше, если предприятие будет успешным. Шансы на успех модифицируются тем же, что и в варианте выше\n"
darkages_trade.06.optc:0 "Использовать караван для контрабанды товаров"
darkages_trade.06.tt3:0 "Этот вариант доступен, потому что у вас либо Навык Интриги не менее 12, вы Обманщик или вы Интриган. Доверие к простолюдинам будет прохладно встречено вашим окружением, поэтому ваш Престиж пострадает. Предоставляя незаконные товары на целевой рынок, вы больше всего рискуете успехом каравана, но в случае успеха награда будет огромной. Успех этого варианта зависит от навыков Интриги и Управления торговца, а также его отрицательных Черт Честный, Справедливый или Ленивый\n"
darkages_trade.06.optd:0 "Отказать в предложении"
darkages_trade.07.t:0 "Разорительная инвестиция"
darkages_trade.07.desc1:0 "К сожалению, торговый караван, в который я [Select_CString(ROOT.Char.IsFemale, 'инвестировала', 'инвестировал')], понес критическую неудачу. В конце концов, [darkages_trader.GetName] [Select_CString(darkages_trader.IsFemale, 'была убита', 'был убит')] бандитами, и все товары каравана потеряны..."
darkages_trade.07.desc2:0 "К сожалению, торговый караван, в который я так много [Select_CString(ROOT.Char.IsFemale, 'инвестировала', 'инвестировал')], понес критическую неудачу. Несмотря на мои надежды и мою торговую авантюру, [darkages_trader.GetName] [Select_CString(darkages_trader.IsFemale, 'была убита', 'был убит')] бандитами, и все товары каравана потеряны..."
darkages_trade.07.desc3:0 "К сожалению, торговый караван, в который я [Select_CString(ROOT.Char.IsFemale, 'инвестировала', 'инвестировал')], понес критическую неудачу. Вероятно, соблазненные незаконными ценностями, перевозимыми торговым караваном, бандиты перехватили и ограбили его, убив [darkages_trader.GetName] в процессе..."
darkages_death_bandits:0 "[Select_CString(ROOT.Char.IsFemale, 'была убита', 'был убит')] бандитами"
darkages_death_smuggler:0 "[Select_CString(ROOT.Char.IsFemale, 'была схвачена и убита', 'был схвачен и убит')] при контрабанде товаров"
darkages_death_smuggler_killer:0 "[Select_CString(ROOT.Char.IsFemale, 'была схвачена и убита', 'был схвачен и убит')] по приказу [TARGET_CHARACTER.GetUIName] при попытке контрабанды товаров"
darkages_trade.07.opta:0 "Вот и ушло мое золото... и мой престиж!"
darkages_trade.08.t:0 "Успешное путешествие"
darkages_trade.08.desc1:0 "Караван, в который я [Select_CString(ROOT.Char.IsFemale, 'инвестировала', 'инвестировал')], вернулся сегодня со словами - и золотом - которые подчеркивают его прибыль!\n\n[darkages_trader.GetName] теперь думает об уходе от рискованных предприятий..."
darkages_trade.08.desc2:0 "Моя хитрость снова оправдала себя, так как весть от каравана, в который я так много [Select_CString(ROOT.Char.IsFemale, 'инвестировала', 'инвестировал')], говорит о прибыльном предприятии!\n\n[darkages_trader.GetName] теперь думает об уходе от рискованных предприятий..."
darkages_trade.08.desc3:0 "Мое капитальное суждение снова оправдалось, так как весть от каравана, который я [Select_CString(ROOT.Char.IsFemale, 'использовала', 'использовал')] для контрабанды ценных товаров, говорит о прибыльном предприятии!\n\n[darkages_trader.GetName] теперь думает об уходе от рискованных предприятий..."
darkages_trade.08.opta:0 "Очень хорошо!"
darkages_trade.08.optb:0 "Стоило пойти на такой финансовый риск!"
darkages_trade.08.optc:0 "Новый рынок для прибыльной продажи... определенных вещей!"
darkages_trade.09.t:0 "Очень прибыльное путешествие!"
darkages_trade.09.desc1:0 "Караван, в который я [Select_CString(ROOT.Char.IsFemale, 'инвестировала', 'инвестировал')], вернулся сегодня со словами - и золотом - которые подчеркивают его огромную прибыль!\n\n[darkages_trader.GetName] теперь думает об уходе от рискованных предприятий..."
darkages_trade.09.desc2:0 "Моя хитрость снова оправдала себя, так как весть от каравана, в который я так много [Select_CString(ROOT.Char.IsFemale, 'инвестировала', 'инвестировал')], говорит о чрезвычайно прибыльном предприятии!\n\n[darkages_trader.GetName] теперь думает об уходе от рискованных предприятий..."
darkages_trade.09.desc3:0 "Мое капитальное суждение снова оправдалось, так как весть от каравана, который я [Select_CString(ROOT.Char.IsFemale, 'использовала', 'использовал')] для контрабанды ценных товаров, говорит о чрезвычайно прибыльном предприятии!\n\n[darkages_trader.GetName] теперь думает об уходе от рискованных предприятий..."
darkages_trade.09.opta:0 "Отлично!"
darkages_trade.09.optb:0 "Блестяще!"
darkages_trade.09.optc:0 "Мастерски созданная инвестиция!"
darkages_county_upbeat:0 "Благодарные крестьяне"
darkages_county_upbeat_desc:0 "Учитывая полученную финансовую помощь, крестьяне в этом Графстве довольны своим правителем"
darkages_county_nohelp:0 "Неподдерживаемая экономика"
darkages_county_nohelp_desc:0 "Правитель этого Графства не оказал помощь местной экономике в трудную минуту"
darkages_trade.10.t:0 "Беды [darkages_trade_county.GetName|g]"
darkages_trade.10.desc:0 "С перенаселенными основными поселениями и торговлей, сокращенной по многим разным причинам, [darkages_trade_county.GetName] переживает тяжелый период, когда крестьяне страдают от нехватки всего, от еды до других менее важных предметов.\n\nСовету была представлена петиция с просьбой о помощи в виде финансовых грантов для облегчения страданий всех причастных.\n\nПоскольку это мое золото, именно мое слово решит судьбу этого дела..."
darkages_trade.10.opta:0 "Тихо предоставить средства самым богатым местным жителям"
darkages_trade.10.optb:0 "Субсидировать крестьян"
darkages_trade.10.optc:0 "Продать лишних крестьян в рабство"
darkages_trade.10.tt1:0 "Этот вариант доступен, потому что вы либо Черствый, Садист или Пыточных дел мастер. Вы продаете часть населения в рабство, чтобы уменьшить количество ртов, которые нужно кормить\n"
darkages_trade.10.optd:0 "Отказать в помощи"
darkages_county_sold_to_slavery:0 "Порабощенное население"
darkages_county_sold_to_slavery_desc:0 "Крестьяне этого Графства были проданы в рабство Правителем"
darkages_county_merc_traders:0 "Местные наемники"
darkages_county_merc_traders_desc:0 "Учитывая отсутствие защиты со стороны Лорда, торговцы этого Графства нанимают местных наемников для охраны сезонных рынков"
darkages_county_cruel_traders:0 "Жестокий Лорд"
darkages_county_cruel_traders_desc:0 "Поскольку Лорд этого Графства ограбил местный сезонный рынок, население определенно не довольно"
darkages_county_above_traders:0 "Усилия по безопасности"
darkages_county_above_traders_desc:0 "Лорд этого Графства приложил большие усилия для обеспечения безопасности сезонных рынков этой провинции"
darkages_trade.11.t:0 "Сезонные рынки"
darkages_trade.11.desc:0 "Местные власти [darkages_trade_county.GetName|g] начали организовывать сезонные рынки в прошлом году. Площадки имели успех и способствуют развитию Графства и общему повышению благосостояния его жителей.\n\nТеперь поступила просьба, чтобы я [Select_CString(ROOT.Char.IsFemale, 'предоставила', 'предоставил')] больше защиты сезонным рынкам, что означает отток средств из моей казны.\n\nЧто мне делать?"
darkages_trade.11.opta:0 "Предоставить необходимые средства"
darkages_trade.11.optb:0 "Посоветовать торговцам самим финансировать свою безопасность"
darkages_trade.11.optc:0 "Сделать больше, чем требовалось"
darkages_trade.11.optd:0 "Штурмовать рынки и конфисковать товары"
darkages_trade.11.tt1:0 "Этот вариант доступен, потому что у вас не менее 12 Навыка Управления, вы Усердный, Амбициозный или Щедрый. Вы вкладываете значительные средства в сезонные рынки различными способами\n"
darkages_trade.11.tt2:0 "Этот вариант доступен, потому что вы либо Черствый, Садист, Жадный или Алчный. Вы безжалостно пользуетесь ситуацией и конфискуете товары для собственной выгоды\n"
darkages_county_mde:0 "Дипломатическая синергия"
darkages_county_mde_desc:0 "Благодаря дипломатическому подходу это Графство переживает масштабные усилия по развитию"
darkages_county_ms:0 "Военная синергия"
darkages_county_ms_desc:0 "Благодаря военному подходу это Графство переживает значительный рост числа рекрутов"
darkages_county_ms2:0 "Управленческая синергия"
darkages_county_ms2_desc:0 "Благодаря управленческому подходу это Графство облагается налогами гораздо эффективнее"
darkages_provinces.01.t:0 "Великая дипломатическая возможность"
darkages_provinces.01.desc:0 "Обсудив этот вопрос с моими советниками, я в последнее время [Select_CString(ROOT.Char.IsFemale, 'обдумывала', 'обдумывал')] идею, как резко увеличить улучшение развития в [darkages_target_province.GetName|l].\n\nИспользуя свои дипломатические навыки, я налажу более прочную связь между этим Графством и его соседями, тем самым способствуя строительству там инфраструктуры.\n\nКонечно, в случае неудачи я столкнусь с ударом по Престижу, так как буду выглядеть плохо, но в этой жизни ничего не дается бесплатно..."
darkages_provinces.01.opta:0 "Реализовать план"
darkages_provinces.01.optb:0 "Использовать уловки и ложь в своих интересах"
darkages_provinces.01.optc:0 "Поддержать план своей Ученостью"
darkages_provinces.01.optd:0 "Слишком дорого и рискованно..."
darkages_provinces.01.tt1:0 "Успех этого варианта зависит от вашего Навыка Дипломатии, положительно влияют черты Общительный, Усердный или Амбициозный. Отрицательно влияют на шанс успеха черты Застенчивый, Ленивый и Смиренный\n"
darkages_provinces.01.tt2:0 "Этот вариант доступен, потому что вы Черствый, Обманщик, Переменчивый или Произвольный. Успех этого варианта зависит от вашего Навыка Интриги, положительно влияет черта Нелояльный или наличие Образования в Интриге. Отрицательно влияют на шанс успеха черты Сострадательный, Справедливый и Лояльный. Базовый шанс успеха этого варианта ниже, чем у предыдущего\n"
darkages_provinces.01.tt3:0 "Этот вариант доступен, потому что вы Сострадательный, Усердный, Справедливый или Спокойный. Успех этого варианта зависит от вашего Навыка Учености и положительно влияет наличие Образования в Учености. Базовый шанс успеха этого варианта ниже, чем у первого\n"
darkages_provinces.01.tt4:0 "Помимо возможного увеличения Стресса - в зависимости от ваших Черт Характера - потери Престижа и Славы, вы потеряете Мнение членов вашего Совета\n"
darkages_provinces.02.t:0 "Успех!"
darkages_provinces.02.desc:0 "Моя попытка улучшить [darkages_target_province.GetName|a] увенчалась успехом, и теперь я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] пожать плоды! \n\nОтличные новости для тамошнего населения... и для меня, конечно!"
darkages_provinces.02.opta:0 "Отлично!"
darkages_provinces.03.t:0 "Неудача..."
darkages_provinces.03.desc:0 "Мои усилия по улучшению [darkages_target_province.GetName|g] закончились неудачей.\n\nК сожалению, вся схема оказалась слишком сложной, чтобы стать рецептом успеха..."
darkages_provinces.03.opta:0 "Значительная оплошность..."
darkages_provinces.04.t:0 "Великая военная возможность"
darkages_provinces.04.desc:0 "Обсудив этот вопрос с моими советниками, я в последнее время [Select_CString(ROOT.Char.IsFemale, 'обдумывала', 'обдумывал')] идею, как резко увеличить количество ополчения, доступного в [darkages_target_province.GetName|l].\n\nИспользуя свои военные навыки, я буду поощрять и заманивать крестьян графства записываться в списки сбора.\n\nКонечно, в случае неудачи я столкнусь с ударом по Престижу, так как буду выглядеть плохо, но в этой жизни ничего не дается бесплатно..."
darkages_provinces.04.tt1:0 "Успех этого варианта зависит от вашего Военного навыка, положительно влияют черты Храбрый, Усердный или Амбициозный. Отрицательно влияют на шанс успеха черты Трусливый, Ленивый и Смиренный\n"
darkages_provinces.05.t:0 "Великая возможность управления"
darkages_provinces.05.desc:0 "Обсудив этот вопрос с моими советниками, я в последнее время [Select_CString(ROOT.Char.IsFemale, 'обдумывала', 'обдумывал')] идею, как резко улучшить сбор налогов в [darkages_target_province.GetName|l].\n\nИспользуя свои навыки Управления, я упорядочу и внедрю новую налоговую схему, действующую около 10 лет.\n\nКонечно, в случае неудачи я столкнусь с ударом по Престижу, так как буду выглядеть плохо, но в этой жизни ничего не дается бесплатно..."
darkages_provinces.05.tt1:0 "Успех этого варианта зависит от вашего Навыка Управления, положительно влияет наличие черт Администратор, Усердный или Амбициозный. Отрицательно влияют на шанс успеха черты Эксцентричный, Ленивый и Смиренный\n"
darkages_provinces.06.t:0 "Вопросы безопасности"
darkages_provinces.06.desc:0 "Сегодня утром я [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал')] аудиенцию местным властям [darkages_target_province_4.GetName|g] только для того, чтобы узнать, что в последнее время там значительно возрос бандитизм. Они поспешили попросить о местных мерах, чтобы справиться с трудностями, наняв специальную милицию для патрулирования Графства.\n\nТеперь мне пришло в голову, что [darkages_target_province_4_1.GetName] имеет давнее соперничество с пострадавшим Графством, и мои действия по помощи [darkages_target_province_4.GetName|d] могут быть истолкованы неверно..."
darkages_provinces.06.opta:0 "Помочь [darkages_target_province_4.GetName|d]"
darkages_provinces.06.optb:0 "Использовать свою Дипломатию"
darkages_provinces.06.optc:0 "Использовать свою Интригу"
darkages_provinces.06.optd:0 "Отказать в помощи [darkages_target_province_4.GetName|d]"
darkages_provinces.06.tt1:0 "Этот вариант доступен, потому что вы Дипломат, Общительный, Справедливый, Честный или Усердный. Успех этого варианта зависит от вашего Навыка Дипломатии. Вы используете свою Дипломатию, чтобы успокоить соперничество [darkages_target_province_4_1.GetName|g]\n"
darkages_provinces.06.tt2:0 "Неудача..."
darkages_provinces.06.toast2:0 "Вам не удалось успокоить соперничество..."
darkages_provinces.06.tt3:0 "Успех!"
darkages_provinces.06.toast1:0 "Вам удалось успокоить соперничество!"
darkages_provinces.06.tt4:0 "Этот вариант доступен, потому что вы Интриган, Произвольный, Обманщик, Черствый или Амбициозный. Успех этого варианта зависит от вашего Навыка Интриги. Вы используете свою Интригу, чтобы ловко лгать и манипулировать людьми [darkages_target_province_4_1.GetName|g]\n"
darkages_county_local_militia:0 "Дополнительная милиция"
darkages_county_local_militia_desc:0 "Из-за всплеска грабежей в этом Графстве была нанята дополнительная милиция"
darkages_county_envy:0 "Острое соперничество"
darkages_county_envy_desc:0 "Это Графство чувствует себя обиженным своим Лордом из-за внимания, оказанного соперничающему Графству того же Домена"
darkages_county_abandoned:0 "Беспечный Правитель"
darkages_county_abandoned_desc:0 "Правитель этого Графства бросил его в трудную минуту"
darkages_provinces.07.t:0 "Оборонительные приготовления"
darkages_provinces.07.desc:0 "Время от времени в моей голове раздается назойливая мысль о моей способности противостоять нападению возможного врага на моей собственной территории.\n\nПосле долгих раздумий я тщательно [Select_CString(ROOT.Char.IsFemale, 'спланировала', 'спланировал')] эту возможность, создав несколько бастионов внутри моего Домена, чтобы обеспечить глубокую оборону и мешать передвижениям врага.\n\nКонечно, ресурсы для реализации этого плана значительны, но... разве моя безопасность не стоит дорого?"
darkages_provinces.07.opta:0 "Реализовать план"
darkages_provinces.07.optb:0 "Отбросить идею"
darkages_county_layered_defence:0 "Эшелонированная оборона"
darkages_county_layered_defence_desc:0 "Это Графство имеет значительные дополнительные оборонительные сооружения, разработанные его Правителем"
darkages_enemies.01.t:0 "Опасный шепот"
darkages_enemies.01.desc:0 "Некоторые информаторы в моем Домене пришли ко мне сегодня, чтобы рассказать о встрече, которая произошла не более двух недель назад между моим соперником [darkages_intriguer.GetName|i] и моими вассалами вместе с моими субвассалами.\n\nБлагодаря хитрому дискурсу, усеянному ложью, почти все мои вассалы обратились против меня с соответствующим снижением мнения..."
darkages_enemies.01.opta:0 "Меня перехитрили, стерпеть потерю молча"
darkages_enemies.01.tt1:0 "Все вассалы, кроме тех, у кого есть черта Лояльный, получат мнение Уныние по отношению к вам\n"
darkages_enemies.01.optb:0 "Встретиться с вассалами, чтобы очистить свое имя!"
darkages_enemies.01.tt2:0 "Этот вариант доступен, потому что вы Дипломат, Общительный, Справедливый, Честный, Спокойный или Терпеливый. Шанс успеха этого варианта основан на вашей Дипломатии. Если вы потерпите неудачу, все ваши вассалы и субвассалы - за исключением Лояльных - получат мнение Уныние по отношению к вам\n"
darkages_enemies.01.toast1:0 "Вам удалось убедить вассалов в своей правоте!"
darkages_enemies.01.toast2:0 "К сожалению, ваши вассалы не тронуты вашими словами..."
darkages_enemies.01.optc:0 "Встретиться с вассалами и манипулировать ими"
darkages_enemies.01.tt3:0 "Этот вариант доступен, потому что вы Интриган, Обманщик, Произвольный, Амбициозный, Спокойный или Терпеливый. Шанс успеха этого варианта основан на вашей Интриге. Если вы потерпите неудачу, все ваши вассалы и субвассалы - включая Лояльных - не будут довольны вашей схемой и станут Разгневанными на вас!\n"
darkages_enemies.01.toast3:0 "Вам удалось манипулировать всеми, заставив поверить в ваш длинный список лжи!"
darkages_enemies.01.toast4:0 "Ваши вассалы увидели вашу ложь насквозь и не в Унынии, а в Гневе на вас...\n"
darkages_enemies.02.t:0 "Ограбление"
darkages_enemies.02.desc:0 "Сегодня утром [darkages_stw.GetCouncilTitle] [Select_CString(ROOT.Char.IsFemale, 'сообщила', 'сообщил')] мне, что ранее в этом месяце в моей казне было совершено крупное ограбление.\n\nБыстрое расследование, проведенное моим [darkages_spm.GetCouncilTitle|i], выявило имя [darkages_robber.GetName], моего соперника, как возможного организатора этой дерзкой операции.\n\nКонечно, у меня нет полных доказательств, чтобы действовать соответствующим образом..."
darkages_enemies.02.opta:0 "Будь что будет..."
darkages_enemies.02.optb:0 "Планировать месть"
darkages_enemies.02.tt1:0 "Вы принимаете свою судьбу\n"
darkages_enemies.02.tt2:0 "Вы пытаетесь сохранить лицо, планируя - и финансируя! - месть с намерением нанести ущерб Престижу вашего соперника\n"
rule_darkages_traits_limit_rule:0 "#B #Bold Темные Века#!:#! Черты Характера"
setting_darkages_traits_limit_yes:0 "Три Черты"
setting_darkages_traits_limit_no:0 "Неограниченные Черты"
setting_darkages_traits_limit_yes_desc:0 "Темные Века обеспечат наличие 3 черт характера для всех персонажей."
setting_darkages_traits_limit_no_desc:0 "Нет ограничений на количество черт характера, которые может иметь персонаж."
darkages_enemies.03.t:0 "Ядовитые слова"
darkages_enemies.03.desc:0 "Сегодня мне стало известно, что мой соперник [darkages_enemy.GetName] распространяет ложь по всему [darkages_county_enemy.GetName|l]!\n\nК сожалению, местные чиновники и другие важные люди в провинции поверили в то, что [darkages_enemy.GetSheHe] [Select_CString(darkages_enemy.IsFemale, 'говорила', 'говорил')], и общее мнение обо мне там рискует значительно упасть...\n\nХотя я могу признать поражение на данный момент, я также могу попытаться избежать этого злого плана, используя другие стратегии, хотя это и авантюра..."
darkages_enemies.03.opta:0 "Лучше не рисковать худшими последствиями..."
darkages_enemies.03.optb:0 "Доказать свою правоту, используя Дипломатию"
darkages_enemies.03.tt1:0 "Вы пытаетесь убедить местные власти в своей правоте. Успех этого варианта положительно зависит от наличия высокого Навыка Дипломатии, от того, являетесь ли вы Сострадательным, Справедливым, Честным или Дипломатом. Отрицательно влияет на этот вариант низкий Навык Дипломатии, наличие черт Черствый, Обманщик, Произвольный или Садист. Если вы потерпите неудачу, вы столкнетесь с худшими последствиями, как с точки зрения модификатора Графства, так и с точки зрения потери Престижа\n"
darkages_enemies.03.toast1:0 "Вам удалось убедить местных жителей!"
darkages_enemies.03.toast2:0 "Вам не удалось убедить местных жителей..."
darkages_enemies.03.optc:0 "Доказать свою правоту, используя Военный навык"
darkages_enemies.03.tt2:0 "Вы пытаетесь внушить местным властям благоговение, чтобы они поверили в вас. Успех этого варианта положительно зависит от наличия высокого Военного Навыка, от того, являетесь ли вы Храбрым, Высокомерным, Гневным или Надсмотрщиком. Отрицательно влияет на этот вариант низкий Военный Навык, наличие черт Трусливый, Смиренный, Прощающий или Сдержанный. Если вы потерпите неудачу, вы столкнетесь с худшими последствиями, как с точки зрения модификатора Графства, так и с точки зрения потери Престижа. Наконец, базовый шанс успеха для этого варианта ниже, чем для предыдущего\n"
darkages_enemies.03.toast3:0 "Вам удалось внушить благоговение местным жителям!"
darkages_enemies.03.toast4:0 "Вы потерпели неудачу в своих действиях..."
darkages_opinion_county_enemy:0 "Ядовитые слова"
darkages_opinion_county_enemy_desc:0 "Правитель этой провинции был оклеветан соперником"
darkages_enemies.04.t:0 "Религиозные махинации [darkages_enemy.GetFirstName|g]"
darkages_enemies.04.desc:0 "Сегодня в Совете мне стало известно, что один из моих презренных соперников, [darkages_enemy.GetName], клевещет на меня перед религиозными властями, и у [darkages_enemy.GetHerHim] хватило наглости зондировать очень высокие места.\n\nВ нынешнем положении мое Благочестие под угрозой из-за выдающегося успеха таких действий.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что я буду делать в этом важном вопросе..."
darkages_enemies.04.opta:0 "Лучше промолчать"
darkages_enemies.04.optb:0 "Повлиять на религиозные власти"
darkages_enemies.04.optc:0 "Выпутаться из ситуации с помощью лжи"
darkages_enemies.04.tt2:0 "Вы пытаетесь обмануть религиозные власти, чтобы избежать потери Благочестия. Успех этого действия зависит от вашего высокого Навыка Интриги, от того, являетесь ли вы Обманщиком, Интриганом, Соблазнителем, и от наличия Образования в Интриге. Способствуют неудаче этого действия ваш низкий Навык Интриги, то, что вы Честный и Справедливый\n"
darkages_enemies.04.tt1:0 "Вы пытаетесь убедить религиозные власти в своей невиновности. Успех этого действия зависит от вашего высокого Навыка Учености, от того, являетесь ли вы Ревностным, Ученым, Теологом, и от количества добродетельных Черт Характера, которые у вас есть. Способствуют неудаче этого действия ваш низкий Навык Учености, то, что вы Циничный, и количество греховных Черт Характера, которые у вас есть\n"
darkages_enemies.04.toast1:0 "Вам удалось убедить религиозные власти!"
darkages_enemies.04.toast2:0 "Вам не удалось убедить религиозные власти..."
darkages_enemies.04.toast3:0 "Вам удалось обмануть религиозные власти!"
darkages_enemies.04.toast4:0 "Вам не удалось обмануть религиозные власти..."
darkages_enemies.05.t:0 "Злой шепот [darkages_enemy.GetFirstName|g]"
darkages_enemies.05.desc:0 "Мне сегодня сообщили о гнусных планах моего соперника, [darkages_enemy.GetName|g], запятнать мою репутацию среди моих пэров и оклеветать мою собственную династию.\n\nТакая высокая задача возможна только из-за того упорства, с которым [darkages_enemy.GetSheHe] преследует это дело, а также из-за [darkages_enemy.GetHerHis] коварного ума. В нынешнем положении утверждается, что я [Select_CString(ROOT.Char.IsFemale, 'слабая и ничтожная', 'слабый и ничтожный')], не более чем невежественная и неученая душа, которой посчастливилось подняться на какое-то видное положение благодаря чистому везению...\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] оценить возможный социальный ущерб, нанесенный мне, и решить, что делать."
darkages_enemies.05.opta:0 "Ничего не делать"
darkages_enemies.05.optb:0 "Попытаться с честью доказать свою интеллектуальную ценность"
darkages_enemies.05.optc:0 "Попытаться манипулировать правдой в свою пользу"
darkages_enemies.05.tt2:0 "Вы пытаетесь обмануть своих пэров, чтобы избежать потери Престижа и Признания. Успех этого действия зависит от вашего высокого Навыка Интриги, от того, являетесь ли вы Обманщиком, Интриганом, Соблазнителем, и от наличия Образования в Интриге. Способствуют неудаче этого действия ваш низкий Навык Интриги, то, что вы Честный и Справедливый\n"
darkages_enemies.05.tt1:0 "Вы пытаетесь доказать своим пэрам свои знания и здравый интеллект. Успех этого действия зависит от вашего высокого Навыка Учености, от того, являетесь ли вы Поэтом, Ученым, Дипломатом, и от наличия Образования в Учености. Способствуют неудаче этого действия ваш низкий Навык Учености, то, что вы Гневный и Тупой\n"
darkages_enemies.05.toast1:0 "Вам удалось убедить своих пэров в своих знаниях!"
darkages_enemies.05.toast2:0 "Вам не удалось убедить своих пэров..."
darkages_enemies.05.toast3:0 "Вам удалось обмануть своих пэров!"
darkages_enemies.05.toast4:0 "Вам не удалось обмануть своих пэров..."
darkages_infertility.03.t:0 "Кости Судьбы"
darkages_infertility.03.desc:0 "Я всегда [Select_CString(ROOT.Char.IsFemale, 'подозревала', 'подозревал')], что что-то не так.\n\nПосле многих попыток и бесчисленной лжи, прежде всего самому себе, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] прийти к выводу, что я [Select_CString(ROOT.Char.IsFemale, 'бесплодна', 'бесплоден')], со всеми последствиями, которые это имеет для будущего моей Династии..."
darkages_infertility.03.opta:0 "Печально... хм... как насчет того, чтобы подделать наследника?"
darkages_infertility.05.t:0 "Нежелательная слабость"
darkages_infertility.05.desc1:0 "После значительного беспокойства и учитывая все ухудшающиеся симптомы, судьба настигла меня в раннем возрасте.\nС тяжелым сердцем и большим беспокойством я сталкиваюсь с импотенцией..."
darkages_infertility.05.desc2:0 "По мере того как старость постепенно наступает, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] столкнуться с увяданием своего тела и признать, что, учитывая мои... все более редкие успехи... я теперь [Select_CString(ROOT.Char.IsFemale, 'неспособна', 'импотент')]."
darkages_infertility.05.opta:0 "Тяжелая борьба за зачатие наследника!"
darkages_infertility.05.optb:0 "Я тоскую по своим прошлым, славным дням..."
darkages_startup.01.tt1:0 "В течение первого месяца игры новому игроку Dark Ages будет представлена серия событий, объясняющих некоторые важные для геймплея изменения мода\n"
darkages_startup.02.t:0 "Насильственная смерть в Dark Ages"
darkages_startup.02.desc:0 "В Dark Ages жизнь вашего персонажа всегда находится под угрозой как из-за болезней, так и из-за менее естественных причин. Говоря об... искусственных... средствах здесь: наличие соперников, высокий Ужас, попытка сфабриковать претензию, наличие провинций в вашем Домене с низким контролем или низким мнением, наличие сумасшедших людей в качестве придворных, наличие особенно противных вассалов с очень низким мнением о вас, попытка сменить культуру провинции или ее религию - все это делает вашего персонажа восприимчивым к попыткам убийства.\n\nНайм хорошего тайного советника и одного или, что еще лучше, двух телохранителей - хорошие стратегии, когда вокруг много врагов или вы не очень популярны по той или иной причине.\n\nПомните, что большинство персонажей не умрут из-за попыток убийства - если только вы действительно не взвинтите риски и не пожертвуете своей безопасностью, - но шанс насильственной смерти всегда присутствует в игре.\n\nБудьте осторожны."
darkages_startup.02.opta:0 "Это окажет значительное влияние на геймплей"
darkages_startup.03.t:0 "Болезни и фертильность в Dark Ages"
darkages_startup.03.desc:0 "В Dark Ages каждый персонаж - включая вашего собственного или вашего супруга! - имеет шанс быть бесплодным. Шансы на это не велики для одного персонажа, но за кампанию это, вероятно, будет ощущаться в среднем один или два раза. В основном, вы не знаете, кто плодовит, а кто нет, но если время идет, а наследник не зачат, вы можете заподозрить неладное. Если это произойдет, вы всегда можете подделать наследника через решение, когда вам исполнится не менее 40 лет.\n\nРождение также является критическим моментом, как для матерей, так и для новорожденных. Риски того, что что-то пойдет не так, намного выше в Dark Ages, и первые годы жизни ребенка могут быть критическими. Примите это как знак древних времен, когда происходит действие игры.\n\nНаконец, болезни будут чаще встречаться в Dark Ages. Большую часть времени вы будете просто 'нездоровы', но иногда, особенно если ваш персонаж уязвим из-за плохого здоровья, старости или неприятных черт, может развиться гораздо более опасное состояние."
darkages_startup.03.opta:0 "Покажи все, на что способен!"
darkages_lowborn_spouses.01.t:0 "Скандальный брак"
darkages_lowborn_spouses.01.desc:0 "Поскольку мой брак был заключен, теперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] столкнуться с последствиями выбора Простолюдина в качестве Cупруга.\n\nОбщество не одобряет такую перспективу, и будь то по любви или по любой другой причине, мой Престиж и Признание моей династии теперь страдают от неприятных последствий такого смелого, но постыдного шага с моей стороны."
darkages_lowborn_spouses.01.desc2:0 "И снова, после развода с [spouse.GetName], я выказываю вопиющую нерешительность, предлагая [spouse.GetHerHim] брак еще раз!\n\nК сожалению, эта нерешительность добавляется к скандальному понятию женитьбы на Простолюдине, и на этот раз последствий больше не избежать..."
darkages_lowborn_spouses.01.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов')] ответить за свой выбор!"
darkages_lowborn_spouses.01.optb:0 "Нет, нет... я не могу пойти на это..."
darkages_lowborn_spouses.02.t:0 "Скандальное сожительство"
darkages_lowborn_spouses.02.desc:0 "Поскольку моя официальная связь продолжилась, теперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] столкнуться с последствиями выбора Простолюдина в качестве Наложницы.\n\nОбщество не одобряет такую перспективу, и будь то по любви или по любой другой причине, мой Престиж и Признание моей династии теперь страдают от неприятных последствий такого смелого, но постыдного шага с моей стороны."
darkages_lowborn_spouses.02.desc2:0 "И снова, отвергнув [concubine.GetName], я выказываю вопиющую нерешительность, намереваясь превратить [spouse.GetHerHim] еще раз в наложницу!\n\nК сожалению, эта нерешительность добавляется к скандальному понятию иметь Простолюдина в наложницах, и на этот раз последствий больше не избежать..."
darkages_startup.04.t:0 "Брак в Dark Ages"
darkages_startup.04.desc:0 "В Dark Ages брак с Простолюдином несет серьезные последствия как для Престижа персонажа, так и для Признания его/ее Династии.\n\nВыбирайте тщательно, на ком жениться, и подумайте, прежде чем вступать в официальные отношения с супругом-Простолюдином.\n\nИ это все, что касается нескольких основных изменений по сравнению с ванильной игрой CK3. Приготовьтесь к иному опыту по сравнению с ванильной CK3, где несколько сотен новых вызовов, опций и решений определят вашу судьбу и судьбу вашей династии!"
darkages_startup.04.opta:0 "Понятно"
darkages_stress_lunacy.02.t:0 "Коварный стресс"
darkages_stress_lunacy.02.desc:0 "Постоянный Стресс, в который я [Select_CString(ROOT.Char.IsFemale, 'погружена', 'погружен')], занимаясь своими повседневными делами, наносит очень значительный урон моему разуму и телу.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'осознаю', 'осознаю')] риски, с которыми сталкиваюсь, но, может быть, сейчас самое время подумать снова и подойти к своей жизни более спокойно..."
darkages_stress_lunacy.02.tt1:0 "Если у вас более 99 Стресса, вы рискуете получить это событие. Чем выше ваш текущий уровень Стресса, тем выше шанс его получить. Пороги находятся на уровнях 100, 200 и 300 Стресса\n"
darkages_stress_lunacy.02.opta:0 "Полагаю, мне стоит отдохнуть..."
rule_darkages_lowborn_marriages_rule:0 "#B #Bold Темные Века#!:#! Браки с Простолюдинами"
setting_darkages_lowborn_marriages_yes:0 "Социальный штраф"
setting_darkages_lowborn_marriages_no:0 "Нет социального штрафа"
setting_darkages_lowborn_marriages_yes_desc:0 "Брак с Простолюдином приведет к штрафам Престижа и Признания. Также частично применяется к Наложницам при определенных обстоятельствах."
setting_darkages_lowborn_marriages_no_desc:0 "Брак с Простолюдином не будет иметь последствий."
rule_darkages_warfare_stress_rule:0 "#B #Bold Темные Века#!:#! Наступательная война"
setting_darkages_warfare_stress_yes:0 "Стрессовая"
setting_darkages_warfare_stress_no:0 "Не стрессовая"
setting_darkages_warfare_stress_yes_desc:0 "Объявление наступательной войны постепенно увеличивает стресс"
setting_darkages_warfare_stress_no_desc:0 "Объявление наступательной войны не влияет на стресс"
