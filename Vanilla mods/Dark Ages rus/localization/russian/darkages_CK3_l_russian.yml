darkages_province_unimpressed_desc:0 "Население этой провинции не испытывает уважения к Сюзерену"
darkages_low_diplomacy.05.t:0 "Неловкая поездка"
darkages_low_diplomacy.05.desc:0 "В последнее время я [Select_CString(ROOT.Char.IsFemale, 'объезжала', 'объезжал')] провинции своего Домена, чтобы оценить свои владения и заставить крестьян почувствовать мое присутствие и мое правление.\n\nК сожалению, из-за моей низкой Дипломатии мои усилия не увенчались успехом.\n\nС неловким посланием, переданным без намека на харизму и страсть, мои подданные почувствовали мою слабость, и общее мнение обо мне соответственно пострадало.\n\nВремя не стоит на месте, если я [Select_CString(ROOT.Char.IsFemale, 'хочу', 'хочу')] спасти негативную ситуацию, мне нужно действовать сейчас!"
darkages_low_diplomacy.05.opta:0 "Проигнорировать проблему"
darkages_low_diplomacy.05.optb:0 "Обмануть моих подданных новыми пустыми указами"
darkages_low_diplomacy.05.optc:0 "Попросить моего [darkages_chancellor_84.GetCouncilTitle|U] решить проблему"
darkages_low_diplomacy.05.tt1:0 "Помимо модификатора, применяемого ко всем провинциям, если вы не Ленивый, Довольный или Смиренный, вы получите Стресс\n"
darkages_low_diplomacy.05.tt2:0 "Вы пытаетесь решить проблему, выпуская шквал новых указов, чтобы показать, что вы все-таки контролируете свой Домен. Успех ваших действий зависит от вашей высокой Интриги (>=12), от того, являетесь ли вы Обманщиком, Интриганом, Эксцентричным или Проницательным. Отрицательно влияют на ваши шансы черты Честный, Справедливый, Упрямый и Тупой. Ваш низкий Навык Интриги (<8) также снизит ваши шансы на успех\n"
darkages_low_diplomacy.05.tt3:0 "Вы просите своего [darkages_chancellor_84.GetCouncilTitle|U] вмешаться от вашего имени, раздавая золото по всему вашему Домену. Успех этого варианта положительно зависит от того, что ваш [darkages_chancellor_84.GetCouncilTitle] имеет как минимум очень хороший Навык Дипломатии (>=15) и от [darkages_chancellor_84.GetHerHis] черт Общительный, Обманщик, Дипломат и Хитрый политик. Отрицательно влияют на ваши шансы [darkages_chancellor_84.GetCouncilTitle] с Навыком Дипломатии ниже Очень хорошего (<15), и [darkages_chancellor_84.GetHerHis] черты Честный, Справедливый, Щедрый и Тупой. Этот вариант имеет меньший базовый шанс на успех, чем предыдущий\n"
darkages_lowdip_toast.05.tt1:0 "Вам удалось снова впечатлить своих подданных!"
darkages_lowdip_toast.05.tt2:0 "Вам совершенно не удалось впечатлить своих подданных..."
darkages_lowdip_toast.05.tt3:0 "[darkages_chancellor_84.GetFirstName] [Select_CString(darkages_chancellor_84.IsFemale, 'сумела', 'сумел')] спасти ваше плохое выступление!"
darkages_lowdip_toast.05.tt4:0 "[darkages_chancellor_84.GetFirstName] [Select_CString(darkages_chancellor_84.IsFemale, 'потерпела', 'потерпел')] неудачу в своей миссии..."
darkages_low_diplomacy.06.t:0 "Гадкая ссора"
darkages_low_diplomacy.06.desc:0 "Еще один день в Совете, еще одна ссора между мной и [darkages_chancellor_40.GetName], моим [darkages_chancellor_40.GetCouncilTitle|U].\n\nНа этот раз мне стало ясно, что [darkages_chancellor_40.GetSheHe] [Select_CString(darkages_chancellor_40.IsFemale, 'зашла', 'зашел')] слишком далеко, эксплуатируя мою очевидную неосведомленность в Дипломатических вопросах, доходя даже до сильного высмеивания моих идей и планов.\n\nВ конце концов, с искрой огненного неповиновения в [darkages_chancellor_40.GetHerHis] глазах, [darkages_chancellor_40.GetFirstName] сухо [Select_CString(darkages_chancellor_40.IsFemale, 'представила', 'представил')] свою отставку с поста [darkages_chancellor_40.GetCouncilTitle|U].\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что делать, так как это может иметь множество различных последствий..."
darkages_low_diplomacy.06.opta:0 "Скатертью дорога!"
darkages_low_diplomacy.06.optb:0 "Попросить супруга вмешаться"
darkages_low_diplomacy.06.optc:0 "Умолять о [darkages_chancellor_40.GetHerHis] прощении"
darkages_low_diplomacy.06.tt1:0 "Вы считаете дело решенным. Ваши Советники с положительным мнением о [darkages_chancellor_40.GetFirstName] будут удручены вами, в то время как ваши Советники с отрицательным мнением о [darkages_chancellor_40.GetHerHim] выразят одобрение вашим решением\n"
darkages_low_diplomacy.06.tt2:0 "Вы просите своего Супруга повлиять на вашего [darkages_chancellor_40.GetCouncilTitle|U]. Шансы на успех этого действия положительно зависят от хорошего Навыка Дипломатии вашего Супруга или выше (>=12), а также от [darkages_spouse_942.GetHerHis] черт Красивый, Общительный, Проницательный, Похотливый, Усердный и Дипломат. Черты вашего [darkages_chancellor_40.GetCouncilTitle|U] Всепрощающий, Сострадательный и Смиренный также дают бонус. Отрицательно влияют на шансы успеха плохой Навык Дипломатии вашего супруга или ниже (<8) и черты вашего [darkages_chancellor_40.GetCouncilTitle|U] Мстительный, Высокомерный и Черствый\n"
darkages_low_diplomacy.06.tt3:0 "Вы смиренно просите прощения у вашего [darkages_chancellor_40.GetCouncilTitle|U]. Шанс успеха этого действия, который без модификаторов выше, чем у предыдущего, положительно зависит от ваших черт Смиренный, Честный, Справедливый и Сострадательный и от черт [darkages_chancellor_40.GetFirstName|U] Сострадательный, Смиренный, Всепрощающий и Лояльный. Отрицательно влияют на ваши шансы черты Черствый, Мстительный и Высокомерный и черты вашего [darkages_chancellor_40.GetCouncilTitle|U] Мстительный, Черствый и Нелояльный\n"
darkages_lowdip_toast.06.tt1:0 "[darkages_spouse_942.GetFirstName] [Select_CString(darkages_spouse_942.IsFemale, 'удалось', 'удалось')] успокоить вашего [darkages_chancellor_40.GetCouncilTitle|U]!"
darkages_lowdip_toast.06.tt2:0 "[darkages_spouse_942.GetFirstName] не [Select_CString(darkages_spouse_942.IsFemale, 'удалось', 'удалось')] успокоить вашего [darkages_chancellor_40.GetCouncilTitle|U]..."
darkages_lowdip_toast.06.tt3:0 "[darkages_chancellor_40.GetFirstName] [Select_CString(darkages_chancellor_40.IsFemale, 'простила', 'простил')] ваше поведение!"
darkages_lowdip_toast.06.tt4:0 "[darkages_chancellor_40.GetFirstName] не [Select_CString(darkages_chancellor_40.IsFemale, 'простила', 'простил')] ваше поведение..."
darkages_opinion_relieved:0 "Облегчение"
darkages_rival_offended_militarily:0 "[TARGET_CHARACTER.GetShortUIName|U] глубоко [Select_CString(TARGET_CHARACTER.IsFemale, 'обидела', 'обидел')] [CHARACTER.GetShortUIName], высмеивая размер и качество [CHARACTER.GetHerHis] армий."
darkages_rival_offended_militarily_corresponding:0 "[CHARACTER.GetShortUIName] глубоко [Select_CString(CHARACTER.IsFemale, 'обидела', 'обидел')] [TARGET_CHARACTER.GetShortUIName|U], высмеивая размер и качество [TARGET_CHARACTER.GetHerHis] армий."
darkages_low_martial.01.t:0 "Военное оскорбление"
darkages_low_martial.01.desc:0 "Недавно я [Select_CString(ROOT.Char.IsFemale, 'выступала', 'выступал')] на собрании с участием многих правителей, и мое отсутствие военных знаний проявилось, когда я безыскусно [Select_CString(ROOT.Char.IsFemale, 'критиковала', 'критиковал')], даже высмеивал, вооруженные силы [darkages_ruler_155.GetName].\n\nК сожалению, сейчас я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с возможностью постоянной оппозиции, даже соперничества со стороны такого правителя, и, создав эту проблему, на мои плечи ложится задача попытаться ее решить... если я этого пожелаю."
darkages_low_martial.01.opta:0 "Я не собираюсь брать свои слова обратно!"
darkages_low_martial.01.optb:0 "Взять свои слова назад"
darkages_low_martial.01.optc:0 "Попросить моего [darkages_marshal_540.GetCouncilTitle|U] решить проблему"
darkages_low_martial.01.tt1:0 "Помимо предоставления финансовой компенсации, вы признаете свою ошибку, используя оригинальный подход, и надеетесь, что [darkages_ruler_155.GetFirstName] любезно примет ваши извинения. Успех этого варианта положительно зависит от ваших черт Общительный, Смиренный, Эксцентричный, Сдержанный, Спокойный и Терпеливый. Отрицательно влияют на ваши шансы на успех ваши черты Черствый, Гневный, Обманщик, Произвольный, Переменчивый и Нетерпеливый\n"
darkages_low_martial.01.tt2:0 "Благодаря добрым услугам [darkages_marshal_540.GetFirstName] вы предлагаете денежную компенсацию, чтобы попытаться спасти ваши отношения с [darkages_ruler_155.GetFirstName]. Этот вариант имеет более ограниченную вероятность успеха, так как вы просите одного из своих слуг обратиться к обиженной стороне. Тем не менее, это может представлять гораздо лучшую перспективу, чем предыдущий вариант, в зависимости от ваших Черт и Черт вашего [darkages_marshal_540.GetCouncilTitle]. Успех этого варианта зависит только отрицательно от того, является ли ваш [darkages_marshal_540.GetCouncilTitle] Черствым, Гневным, Обманщиком, Произвольным, Переменчивым и Нетерпеливым\n"
darkages_lowmar_toast.01.tt1:0 "[darkages_ruler_155.GetName] [Select_CString(darkages_ruler_155.IsFemale, 'простила', 'простил')] вас, и вы даже получили немного Престижа!"
darkages_lowmar_toast.01.tt2:0 "Ваши извинения не были приняты. Вы снова потеряли Престиж..."
darkages_lowmar_toast.01.tt3:0 "[darkages_ruler_155.GetName] считает вас своим новым другом. Вы получили Престиж!"
darkages_lowmar_toast.01.tt4:0 "[darkages_marshal_540.GetFirstName] [Select_CString(darkages_marshal_540.IsFemale, 'сумела', 'сумел')] спасти вашу репутацию!"
darkages_lowmar_toast.01.tt5:0 "[darkages_marshal_540.GetFirstName] [Select_CString(darkages_marshal_540.IsFemale, 'потерпела', 'потерпел')] неудачу. Вы потеряли больше Престижа..."
darkages_low_martial.02.t:0 "Бестактные комментарии"
darkages_low_martial.02.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'проводила', 'проводил')] оперативное совещание с моими вассалами, командующими некоторыми из их элитных полков, очевидные недостатки моего Военного Навыка быстро проявились, и я [Select_CString(ROOT.Char.IsFemale, 'создала', 'создал')] жалкое впечатление о себе, своих оперативных способностях руководить нашими армиями и своих долгосрочных стратегических целях.\n\nВскоре стало очевидно, что я не в своей тарелке, и, к сожалению, я неуклюже [Select_CString(ROOT.Char.IsFemale, 'защищалась', 'защищался')] и свою позицию, разразившись гневной тирадой против моих вассалов.\n\nВсе разозлились, и встречу пришлось прервать, чтобы все остыли..."
darkages_low_martial.02.opta:0 "Избегать возвращения к теме"
darkages_low_martial.02.tt3:0 "Каждый Вассал, кроме Лояльных, почувствует к вам отвращение\n"
darkages_low_martial.02.optb:0 "Послать [darkages_marshal_608.GetCouncilTitle|U], чтобы успокоить моих вассалов"
darkages_low_martial.02.tt1:0 "Вы посылаете [darkages_marshal_608.GetCouncilTitle|U] вместе с некоторыми средствами, чтобы успокоить ваших вассалов. Базовые шансы на успех немного не в вашу пользу. На успех этого варианта положительно влияют черты вашего [darkages_marshal_608.GetCouncilTitle] Общительный, Терпеливый, Упрямый, Спокойный и Дипломат, а также [darkages_marshal_608.GetHerHis] Блестящий Военный Навык (>=18). Отрицательно влияет, если [darkages_marshal_608.GetSheHe] имеет черты Черствый, Гневный, Переменчивый и Нетерпеливый, а также если [darkages_marshal_608.GetSheHe] имеет менее 15 в [darkages_marshal_608.GetHerHis] Военном Навыке. Если [darkages_marshal_608.GetSheHe] является вашим вассалом, это также снизит ваши шансы на успех. В случае неудачи, помимо потери Престижа, вы также получите такой же штраф к мнению, как и в варианте выше\n"
darkages_low_martial.02.optc:0 "Запугать всех до подчинения"
darkages_low_martial.02.tt2:0 "Вы пытаетесь внушить всем страх. В то время как большинство ваших вассалов примут ваше поведение, не моргнув глазом, Храбрые почувствуют к вам сильное презрение. Будьте осторожны: навязывание своих взглядов через страх может иметь впечатляющие обратные последствия, отчасти зависящие от ваших Черт, отчасти от чистой удачи\n"
darkages_low_martial.03.t:0 "Решение всеобщих проблем"
darkages_low_martial.03.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в одиночестве в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_martial.03.desc2:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охранял', 'охранял')] мой телохранитель, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_martial.03.desc3:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охраняли', 'охраняли')] мои телохранители, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что запугивание всех вредно для моего здоровья! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_martial.03.opta:0 "Берегись!"
darkages_low_martial.03.tt1:0 "Вы подверглись этому покушению в качестве мести за свое ужасное поведение по отношению к вассалам. Ваш Навык Интриги, ваша Доблесть, присутствие одного или еще лучше двух телохранителей и чистая удача определят шанс выжить и рассказать эту историю\n"
darkages_lowmar_toast.02.tt1:0 "[darkages_marshal_608.GetFirstName] [Select_CString(darkages_marshal_608.IsFemale, 'сумела', 'сумел')] всех успокоить, и вы получили Престиж"
darkages_lowmar_toast.02.tt2:0 "[darkages_marshal_608.GetFirstName] [Select_CString(darkages_marshal_608.IsFemale, 'потерпела', 'потерпел')] неудачу, и вы теряете Престиж и Мнение ваших Вассалов"
darkages_low_martial.04.t:0 "Борьба с военным делом"
darkages_low_martial.04.desc:0 "Сколько я себя помню, тонкости военного дела и его организации выше моего понимания.\n\nЯ убеждаюсь, что трачу все больше и больше времени, борясь с этой областью своей жизни, поскольку мои обязанности требуют от меня заниматься военной ареной, которую я в конечном итоге не могу постичь.\n\nТеперь пришло время решить, как я буду справляться с этим недостатком в будущем."
darkages_low_martial.04.opta:0 "Сосредоточиться на моем Военном деле за счет других Навыков"
darkages_low_martial.04.optb:0 "Попытаться управлять всем"
darkages_low_martial.04.optc:0 "Делегировать гораздо больше, чем желательно"
darkages_low_martial.04.tt1:0 "Вас считают неудачником в управлении Военными аспектами вашей Державы. Помимо затрат Престижа и дополнительных расходов на поддержку структуры, необходимой для помощи вам, ваши Вассалы падут духом из-за отсутствия вашего руководства и участия\n"
darkages_province_unprepared:0 "Неквалифицированное ополчение"
darkages_province_unprepared_desc:0 "Из-за очень слабых военных способностей правителя ополчение в этой провинции далеко от состояния готовности"
darkages_low_martial.05.t:0 "Неловкое командование"
darkages_low_martial.05.desc:0 "В последнее время я [Select_CString(ROOT.Char.IsFemale, 'объезжала', 'объезжал')] провинции своего Домена, чтобы отдать наилучшие возможные приказы моим ополченцам и армиям.\n\nК сожалению, из-за моего низкого Военного Навыка мои усилия не увенчались успехом...\n\nПутаные приказы, непродуманные решения и неуклюжая военная политика привели к тому, что мои новобранцы и местный командный состав почувствовали мою слабость, и готовность всех ожидаемо упала.\n\nВремя не стоит на месте, если я [Select_CString(ROOT.Char.IsFemale, 'хочу', 'хочу')] спасти негативную ситуацию, мне нужно действовать сейчас!"
darkages_low_martial.05.opta:0 "Проигнорировать проблему"
darkages_low_martial.05.optb:0 "Обмануть моих подданных новыми пустыми указами"
darkages_low_martial.05.optc:0 "Попросить моего [darkages_marshal_226.GetCouncilTitle|U] решить проблему"
darkages_low_martial.05.tt1:0 "Помимо модификатора, применяемого ко всем провинциям, если вы не Ленивый, Довольный или Смиренный, вы получите Стресс\n"
darkages_low_martial.05.tt2:0 "Вы пытаетесь решить проблему, выпуская шквал новых указов, чтобы показать, что вы все-таки контролируете свой Домен. Успех ваших действий зависит от вашей высокой Интриги (>=12), от того, являетесь ли вы Обманщиком, Интриганом, Эксцентричным или Проницательным. Отрицательно влияют на ваши шансы черты Честный, Справедливый, Упрямый и Тупой. Ваш низкий Навык Интриги (<8) также снизит ваши шансы на успех\n"
darkages_low_martial.05.tt3:0 "Вы просите своего [darkages_marshal_226.GetCouncilTitle|U] вмешаться от вашего имени, раздавая золото по всему вашему Домену. Успех этого варианта положительно зависит от того, что ваш [darkages_marshal_226.GetCouncilTitle] имеет как минимум очень хороший Военный Навык (>=15) и от [darkages_marshal_226.GetHerHis] черт Храбрый, Обманщик, Стратег и Хитрый политик. Отрицательно влияют на ваши шансы [darkages_marshal_226.GetHerHis] Военный Навык ниже Очень хорошего (<15) и [darkages_marshal_226.GetHerHis] черты Трусливый, Честный, Щедрый и Тупой. Этот вариант имеет меньший базовый шанс на успех, чем предыдущий\n"
darkages_lowmar_toast.05.tt1:0 "Вам удалось снова впечатлить своих подданных!"
darkages_lowmar_toast.05.tt2:0 "Вам совершенно не удалось впечатлить своих подданных..."
darkages_lowmar_toast.05.tt3:0 "[darkages_marshal_226.GetFirstName] [Select_CString(darkages_marshal_226.IsFemale, 'сумела', 'сумел')] спасти ваше плохое выступление!"
darkages_lowmar_toast.05.tt4:0 "[darkages_marshal_226.GetFirstName] [Select_CString(darkages_marshal_226.IsFemale, 'потерпела', 'потерпел')] неудачу в своей миссии..."
darkages_low_martial.06.t:0 "Гадкая ссора"
darkages_low_martial.06.desc:0 "Еще один день в Совете, еще одна ссора между мной и [darkages_marshal_504.GetName], моим [darkages_marshal_504.GetCouncilTitle|U].\n\nНа этот раз мне стало ясно, что [darkages_marshal_504.GetSheHe] [Select_CString(darkages_marshal_504.IsFemale, 'зашла', 'зашел')] слишком далеко, эксплуатируя мою очевидную неосведомленность в Военных вопросах, доходя даже до сильного высмеивания моих идей и планов.\n\nВ конце концов, с искрой огненного неповиновения в [darkages_marshal_504.GetHerHis] глазах, [darkages_marshal_504.GetFirstName] сухо [Select_CString(darkages_marshal_504.IsFemale, 'представила', 'представил')] свою отставку с поста [darkages_marshal_504.GetCouncilTitle|U].\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что делать, так как это может иметь множество различных последствий..."
darkages_low_martial.06.opta:0 "Скатертью дорога!"
darkages_low_martial.06.optb:0 "Попросить супруга вмешаться"
darkages_low_martial.06.optc:0 "Умолять о [darkages_marshal_504.GetHerHis] прощении"
darkages_low_martial.06.tt1:0 "Вы считаете дело решенным. Ваши Советники с положительным мнением о [darkages_marshal_504.GetFirstName] будут удручены вами, в то время как ваши Советники с отрицательным мнением о [darkages_marshal_504.GetHerHim] выразят одобрение вашим решением\n"
darkages_low_martial.06.tt2:0 "Вы просите своего Супруга повлиять на вашего [darkages_marshal_504.GetCouncilTitle|U]. Шансы на успех этого действия положительно зависят от хорошего Навыка Дипломатии вашего Супруга или выше (>=12), а также от [darkages_spouse_718.GetHerHis] черт Красивый, Общительный, Проницательный, Похотливый, Усердный и Дипломат. Черты вашего [darkages_marshal_504.GetCouncilTitle|U] Всепрощающий, Сострадательный и Смиренный также дают бонус. Отрицательно влияют на шансы успеха плохой Навык Дипломатии вашего супруга или ниже (<8) и черты вашего [darkages_marshal_504.GetCouncilTitle|U] Мстительный, Высокомерный и Черствый\n"
darkages_low_martial.06.tt3:0 "Вы смиренно просите прощения у вашего [darkages_marshal_504.GetCouncilTitle|U]. Шанс успеха этого действия, который без модификаторов выше, чем у предыдущего, положительно зависит от ваших черт Смиренный, Честный, Справедливый и Сострадательный и от черт [darkages_marshal_504.GetFirstName|U] Сострадательный, Смиренный, Всепрощающий и Лояльный. Отрицательно влияют на ваши шансы черты Черствый, Мстительный и Высокомерный и черты вашего [darkages_marshal_504.GetCouncilTitle|U] Мстительный, Черствый и Нелояльный\n"
darkages_lowmar_toast.06.tt1:0 "[darkages_spouse_718.GetFirstName] [Select_CString(darkages_spouse_718.IsFemale, 'сумела', 'сумел')] успокоить вашего [darkages_marshal_504.GetCouncilTitle|U]!"
darkages_lowmar_toast.06.tt2:0 "[darkages_spouse_718.GetFirstName] не [Select_CString(darkages_spouse_718.IsFemale, 'удалось', 'удалось')] успокоить вашего [darkages_marshal_504.GetCouncilTitle|U]..."
darkages_lowmar_toast.06.tt3:0 "[darkages_marshal_504.GetFirstName] [Select_CString(darkages_marshal_504.IsFemale, 'простила', 'простил')] ваше поведение!"
darkages_lowmar_toast.06.tt4:0 "[darkages_marshal_504.GetFirstName] не [Select_CString(darkages_marshal_504.IsFemale, 'простила', 'простил')] ваше поведение..."
darkages_rival_offended_management:0 "[TARGET_CHARACTER.GetShortUIName|U] глубоко [Select_CString(TARGET_CHARACTER.IsFemale, 'обидела', 'обидел')] [CHARACTER.GetShortUIName], высмеивая управленческий подход, который [CHARACTER.GetSheHe] использует в управлении [CHARACTER.GetHerHis] Державой."
darkages_rival_offended_management_corresponding:0 "[CHARACTER.GetShortUIName] глубоко [Select_CString(CHARACTER.IsFemale, 'обидела', 'обидел')] [TARGET_CHARACTER.GetShortUIName|U], высмеивая управленческий подход, который [TARGET_CHARACTER.GetSheHe] использует в управлении [TARGET_CHARACTER.GetHerHis] Державой."
darkages_low_stewardship.01.t:0 "[ROOT.GetCharacter.GetTitleAsNameNoTooltip] дураков"
darkages_low_stewardship.01.desc:0 "Недавно я [Select_CString(ROOT.Char.IsFemale, 'выступала', 'выступал')] на собрании с участием многих правителей, и мое отсутствие управленческих знаний проявилось, когда я безыскусно [Select_CString(ROOT.Char.IsFemale, 'критиковала', 'критиковал')], даже высмеивал, организационные способности не кого иного, как [darkages_ruler_319.GetName].\n\nК сожалению, сейчас я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с возможностью постоянной оппозиции, даже соперничества со стороны такого правителя, и, создав эту проблему, на мои плечи ложится задача попытаться ее решить... если я этого пожелаю."
darkages_low_stewardship.01.opta:0 "Я не собираюсь брать свои слова обратно!"
darkages_low_stewardship.01.optb:0 "Взять свои слова назад"
darkages_low_stewardship.01.optc:0 "Попросить моего [darkages_steward_434.GetCouncilTitle|U] решить проблему"
darkages_low_stewardship.01.tt1:0 "Помимо предоставления финансовой компенсации, вы признаете свою ошибку, используя оригинальный подход, и надеетесь, что [darkages_ruler_319.GetFirstName] любезно примет ваши извинения. Успех этого варианта положительно зависит от ваших черт Общительный, Смиренный, Эксцентричный, Сдержанный, Спокойный и Терпеливый. Отрицательно влияют на ваши шансы на успех ваши черты Черствый, Гневный, Обманщик, Произвольный, Переменчивый и Нетерпеливый\n"
darkages_low_stewardship.01.tt2:0 "Благодаря добрым услугам [darkages_steward_434.GetFirstName] вы предлагаете денежную компенсацию, чтобы попытаться спасти ваши отношения с [darkages_ruler_319.GetFirstName]. Этот вариант имеет более ограниченную вероятность успеха, так как вы просите одного из своих слуг обратиться к обиженной стороне. Тем не менее, это может представлять гораздо лучшую перспективу, чем предыдущий вариант, в зависимости от ваших Черт и Черт вашего [darkages_steward_434.GetCouncilTitle]. Успех этого варианта зависит только отрицательно от того, является ли ваш [darkages_steward_434.GetCouncilTitle] Черствым, Гневным, Обманщиком, Произвольным, Переменчивым и Нетерпеливым\n"
darkages_lowste_toast.01.tt1:0 "[darkages_ruler_319.GetName] [Select_CString(darkages_ruler_319.IsFemale, 'простила', 'простил')] вас, и вы даже получили немного Престижа!"
darkages_lowste_toast.01.tt2:0 "Ваши извинения не были приняты. Вы снова потеряли Престиж..."
darkages_lowste_toast.01.tt3:0 "[darkages_ruler_319.GetName] считает вас своим новым другом. Вы получили Престиж!"
darkages_lowste_toast.01.tt4:0 "[darkages_steward_434.GetFirstName] [Select_CString(darkages_steward_434.IsFemale, 'сумела', 'сумел')] спасти вашу репутацию!"
darkages_lowste_toast.01.tt5:0 "[darkages_steward_434.GetFirstName] [Select_CString(darkages_steward_434.IsFemale, 'потерпела', 'потерпел')] неудачу. Вы потеряли больше Престижа..."
darkages_low_stewardship.02.t:0 "Невежество напоказ"
darkages_low_stewardship.02.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'проводила', 'проводил')] встречу, посвященную управлению Державой с моими вассалами, очевидные недостатки моего Навыка Управления быстро проявились, и я [Select_CString(ROOT.Char.IsFemale, 'создала', 'создал')] жалкое впечатление о себе, своих управленческих способностях и своих долгосрочных целях развития.\n\nВскоре стало очевидно, что я не в своей тарелке, и, к сожалению, я неуклюже [Select_CString(ROOT.Char.IsFemale, 'защищалась', 'защищался')] и свою позицию, разразившись резкой тирадой против моих вассалов.\n\nВсе разозлились, и встречу пришлось прервать, чтобы все остыли..."
darkages_low_stewardship.02.opta:0 "Избегать возвращения к теме"
darkages_low_stewardship.02.tt3:0 "Каждый Вассал, кроме Лояльных, почувствует к вам отвращение\n"
darkages_low_stewardship.02.optb:0 "Послать [darkages_steward_962.GetCouncilTitle|U], чтобы успокоить моих вассалов"
darkages_low_stewardship.02.tt1:0 "Вы посылаете [darkages_steward_962.GetCouncilTitle|U] вместе с некоторыми средствами, чтобы успокоить ваших вассалов. Базовые шансы на успех немного не в вашу пользу. На успех этого варианта положительно влияют черты вашего [darkages_steward_962.GetCouncilTitle] Усердный, Терпеливый, Упрямый, Спокойный и Управленец, а также [darkages_steward_962.GetHerHis] Блестящий Навык Управления (>=18). Отрицательно влияет, если [darkages_steward_962.GetSheHe] имеет черты Черствый, Гневный, Переменчивый и Нетерпеливый, а также если [darkages_steward_962.GetSheHe] имеет менее 15 в [darkages_steward_962.GetHerHis] Навыке Управления. Если [darkages_steward_962.GetSheHe] является вашим вассалом, это также снизит ваши шансы на успех. В случае неудачи, помимо потери Престижа, вы также получите такой же штраф к мнению, как и в варианте выше\n"
darkages_low_stewardship.02.optc:0 "Запугать всех до подчинения"
darkages_low_stewardship.02.tt2:0 "Вы пытаетесь внушить всем страх. В то время как большинство ваших вассалов примут ваше поведение, не моргнув глазом, Храбрые почувствуют к вам сильное презрение. Будьте осторожны: навязывание своих взглядов через страх может иметь впечатляющие обратные последствия, отчасти зависящие от ваших Черт, отчасти от чистой удачи\n"
darkages_low_stewardship.03.t:0 "Решение всеобщих проблем"
darkages_low_stewardship.03.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в одиночестве в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_stewardship.03.desc2:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охранял', 'охранял')] мой телохранитель, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_stewardship.03.desc3:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охраняли', 'охраняли')] мои телохранители, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что запугивание всех вредно для моего здоровья! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_stewardship.03.opta:0 "Берегись!"
darkages_low_stewardship.03.tt1:0 "Вы подверглись этому покушению в качестве мести за свое ужасное поведение по отношению к вассалам. Ваш Навык Интриги, ваша Доблесть, присутствие одного или еще лучше двух телохранителей и чистая удача определят шанс выжить и рассказать эту историю\n"
darkages_lowste_toast.02.tt1:0 "[darkages_steward_962.GetFirstName] [Select_CString(darkages_steward_962.IsFemale, 'сумела', 'сумел')] всех успокоить, и вы получили Престиж"
darkages_lowste_toast.02.tt2:0 "[darkages_steward_962.GetFirstName] [Select_CString(darkages_steward_962.IsFemale, 'потерпела', 'потерпел')] неудачу, и вы теряете Престиж и Мнение ваших Вассалов"
darkages_low_stewardship.04.t:0 "Борьба с управлением"
darkages_low_stewardship.04.desc:0 "Сколько я себя помню, тонкости управления и Управления мне недоступны.\n\nЯ убеждаюсь, что трачу все больше и больше времени, борясь с этой областью своей жизни, поскольку мои обязанности требуют от меня заниматься управленческой ареной, которую я в конечном итоге не могу постичь.\n\nТеперь пришло время решить, как я буду справляться с этим недостатком в будущем."
darkages_low_stewardship.04.opta:0 "Сосредоточиться на моем Управлении за счет других Навыков"
darkages_low_stewardship.04.optb:0 "Попытаться управлять всем"
darkages_low_stewardship.04.optc:0 "Делегировать гораздо больше, чем желательно"
darkages_low_stewardship.04.tt1:0 "Вас считают неудачником в управлении аспектами Управления вашей Державы. Помимо затрат Престижа и дополнительных расходов на поддержку структуры, необходимой для помощи вам, ваши Вассалы падут духом из-за отсутствия вашего руководства и участия\n"
darkages_province_chaotic:0 "Хаотичная администрация"
darkages_province_chaotic_desc:0 "Из-за плохого управления правителя эта провинция переживает смутные времена на организационном уровне"
darkages_low_stewardship.05.t:0 "Неловкое управление"
darkages_low_stewardship.05.desc:0 "В последнее время я [Select_CString(ROOT.Char.IsFemale, 'объезжала', 'объезжал')] провинции своего Домена, чтобы спланировать и подготовить управление моими владениями.\n\nК сожалению, из-за моего низкого Навыка Управления мои усилия не увенчались успехом...\n\nПутаные приказы, непродуманные решения и неуклюжая политика управления привели к тому, что мои чиновники почувствовали мою слабость, а энтузиазм моих людей угас, мои слова и решения оставили всех в замешательстве.\n\nВремя не стоит на месте, если я [Select_CString(ROOT.Char.IsFemale, 'хочу', 'хочу')] спасти негативную ситуацию, мне нужно действовать сейчас!"
darkages_low_stewardship.05.opta:0 "Проигнорировать проблему"
darkages_low_stewardship.05.optb:0 "Обмануть моих подданных новыми пустыми указами"
darkages_low_stewardship.05.optc:0 "Попросить моего [darkages_steward_473.GetCouncilTitle|U] решить проблему"
darkages_low_stewardship.05.tt1:0 "Помимо модификатора, применяемого ко всем провинциям, если вы не Ленивый, Довольный или Смиренный, вы получите Стресс\n"
darkages_low_stewardship.05.tt2:0 "Вы пытаетесь решить проблему, выпуская шквал новых указов, чтобы показать, что вы все-таки контролируете свой Домен. Успех ваших действий зависит от вашей высокой Интриги (>=12), от того, являетесь ли вы Обманщиком, Интриганом, Эксцентричным или Проницательным. Отрицательно влияют на ваши шансы черты Честный, Справедливый, Упрямый и Тупой. Ваш низкий Навык Интриги (<8) также снизит ваши шансы на успех\n"
darkages_low_stewardship.05.tt3:0 "Вы просите своего [darkages_steward_473.GetCouncilTitle|U] вмешаться от вашего имени, раздавая золото по всему вашему Домену. Успех этого варианта положительно зависит от того, что ваш [darkages_steward_473.GetCouncilTitle] имеет как минимум очень хороший Навык Управления (>=15) и от [darkages_steward_473.GetHerHis] черт Усердный, Обманщик, Управленец и Хитрый политик. Отрицательно влияют на ваши шансы [darkages_steward_473.GetHerHis] Навык Управления ниже Очень хорошего (<15) и [darkages_steward_473.GetHerHis] черты Ленивый, Честный, Щедрый и Тупой. Этот вариант имеет меньший базовый шанс на успех, чем предыдущий\n"
darkages_lowste_toast.05.tt1:0 "Вам удалось снова впечатлить своих подданных!"
darkages_lowste_toast.05.tt2:0 "Вам совершенно не удалось впечатлить своих подданных..."
darkages_lowste_toast.05.tt3:0 "[darkages_steward_473.GetFirstName] [Select_CString(darkages_steward_473.IsFemale, 'сумела', 'сумел')] спасти ваше плохое выступление!"
darkages_lowste_toast.05.tt4:0 "[darkages_steward_473.GetFirstName] [Select_CString(darkages_steward_473.IsFemale, 'потерпела', 'потерпел')] неудачу в своей миссии..."
darkages_low_stewardship.06.t:0 "Гадкая ссора"
darkages_low_stewardship.06.desc:0 "Еще один день в Совете, еще одна ссора между мной и [darkages_steward_180.GetName], моим [darkages_steward_180.GetCouncilTitle|U].\n\nНа этот раз мне стало ясно, что [darkages_steward_180.GetSheHe] [Select_CString(darkages_steward_180.IsFemale, 'зашла', 'зашел')] слишком далеко, эксплуатируя мою очевидную неосведомленность в Вопросах Управления, доходя даже до сильного высмеивания моих идей и планов.\n\nВ конце концов, с искрой огненного неповиновения в [darkages_steward_180.GetHerHis] глазах, [darkages_steward_180.GetFirstName] сухо [Select_CString(darkages_steward_180.IsFemale, 'представила', 'представил')] свою отставку с поста [darkages_steward_180.GetCouncilTitle|U].\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что делать, так как это может иметь множество различных последствий..."
darkages_low_stewardship.06.opta:0 "Скатертью дорога!"
darkages_low_stewardship.06.optb:0 "Попросить супруга вмешаться"
darkages_low_stewardship.06.optc:0 "Умолять о [darkages_steward_180.GetHerHis] прощении"
darkages_low_stewardship.06.tt1:0 "Вы считаете дело решенным. Ваши Советники с положительным мнением о [darkages_steward_180.GetFirstName] будут удручены вами, в то время как ваши Советники с отрицательным мнением о [darkages_steward_180.GetHerHim] выразят одобрение вашим решением\n"
darkages_low_stewardship.06.tt2:0 "Вы просите своего Супруга повлиять на вашего [darkages_steward_180.GetCouncilTitle|U]. Шансы на успех этого действия положительно зависят от хорошего Навыка Дипломатии вашего Супруга или выше (>=12), а также от [darkages_spouse_515.GetHerHis] черт Красивый, Общительный, Проницательный, Похотливый, Усердный и Дипломат. Черты вашего [darkages_steward_180.GetCouncilTitle|U] Всепрощающий, Сострадательный и Смиренный также дают бонус. Отрицательно влияют на шансы успеха плохой Навык Дипломатии вашего супруга или ниже (<8) и черты вашего [darkages_steward_180.GetCouncilTitle|U] Мстительный, Высокомерный и Черствый\n"
darkages_low_stewardship.06.tt3:0 "Вы смиренно просите прощения у вашего [darkages_steward_180.GetCouncilTitle|U]. Шанс успеха этого действия, который без модификаторов выше, чем у предыдущего, положительно зависит от ваших черт Смиренный, Честный, Справедливый и Сострадательный и от черт [darkages_steward_180.GetFirstName|U] Сострадательный, Смиренный, Всепрощающий и Лояльный. Отрицательно влияют на ваши шансы черты Черствый, Мстительный и Высокомерный и черты вашего [darkages_steward_180.GetCouncilTitle|U] Мстительный, Черствый и Нелояльный\n"
darkages_lowste_toast.06.tt1:0 "[darkages_spouse_515.GetFirstName] [Select_CString(darkages_spouse_515.IsFemale, 'сумела', 'сумел')] успокоить вашего [darkages_steward_180.GetCouncilTitle|U]!"
darkages_lowste_toast.06.tt2:0 "[darkages_spouse_515.GetFirstName] не [Select_CString(darkages_spouse_515.IsFemale, 'смогла', 'смог')] успокоить вашего [darkages_steward_180.GetCouncilTitle|U]..."
darkages_lowste_toast.06.tt3:0 "[darkages_steward_180.GetFirstName] [Select_CString(darkages_steward_180.IsFemale, 'простила', 'простил')] ваше поведение!"
darkages_lowste_toast.06.tt4:0 "[darkages_steward_180.GetFirstName] не [Select_CString(darkages_steward_180.IsFemale, 'простила', 'простил')] ваше поведение..."
darkages_rival_offended_intrigue:0 "[TARGET_CHARACTER.GetShortUIName|U] глубоко [Select_CString(TARGET_CHARACTER.IsFemale, 'оскорбила', 'оскорбил')] [CHARACTER.GetShortUIName], высмеяв наивный и дилетантский подход, который [CHARACTER.GetSheHe] использует в управлении своей Державой."
darkages_rival_offended_intrigue_corresponding:0 "[CHARACTER.GetShortUIName] глубоко [Select_CString(CHARACTER.IsFemale, 'оскорбила', 'оскорбил')] [TARGET_CHARACTER.GetShortUIName|U], высмеяв наивный и дилетантский подход, который [TARGET_CHARACTER.GetSheHe] использует в управлении своей Державой."
darkages_low_intrigue.01.t:0 "Критический недостаток"
darkages_low_intrigue.01.desc:0 "Недавно я [Select_CString(ROOT.Char.IsFemale, 'выступала', 'выступал')] на собрании с участием нескольких правителей, и мой недостаток Навыка Интриги проявился, когда я безыскусно [Select_CString(ROOT.Char.IsFemale, 'раскритиковала', 'раскритиковал')], даже [Select_CString(ROOT.Char.IsFemale, 'высмеяла', 'высмеял')], то, как [darkages_ruler_209.GetName] организует свои секретные службы.\n\nК сожалению, теперь я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с возможностью постоянной оппозиции, даже соперничества со стороны такого правителя, и, создав эту проблему, на мои плечи ложится задача попытаться решить ее... если я этого захочу."
darkages_low_intrigue.01.opta:0 "Я не собираюсь брать свои слова обратно!"
darkages_low_intrigue.01.optb:0 "Взять свои слова назад"
darkages_low_intrigue.01.optc:0 "Попросить моего [darkages_spymaster_637.GetCouncilTitle|U] решить проблему"
darkages_low_intrigue.01.tt1:0 "Помимо предоставления финансовой компенсации, вы признаете свою ошибку, используя оригинальный подход, и надеетесь, что [darkages_ruler_209.GetFirstName] любезно примет ваши извинения. Успех этого варианта положительно зависит от ваших черт Общительный, Смиренный, Эксцентричный, Сдержанный, Спокойный и Терпеливый. Отрицательно влияют на ваши шансы на успех ваши черты Черствый, Гневный, Обманщик, Произвольный, Переменчивый и Нетерпеливый\n"
darkages_low_intrigue.01.tt2:0 "Благодаря добрым услугам [darkages_spymaster_637.GetFirstName] вы предлагаете денежную компенсацию, чтобы попытаться спасти ваши отношения с [darkages_ruler_209.GetFirstName]. Этот вариант имеет более ограниченную вероятность успеха, так как вы просите одного из своих слуг обратиться к обиженной стороне. Тем не менее, это может представлять гораздо лучшую перспективу, чем предыдущий вариант, в зависимости от ваших Черт и Черт вашего [darkages_spymaster_637.GetCouncilTitle]. Успех этого варианта зависит только отрицательно от того, является ли ваш [darkages_spymaster_637.GetCouncilTitle] Черствым, Гневным, Честным, Произвольным, Переменчивым и Нетерпеливым\n"
darkages_lowint_toast.01.tt1:0 "[darkages_ruler_209.GetName] [Select_CString(darkages_ruler_209.IsFemale, 'простила', 'простил')] вас, и вы даже получили немного Престижа!"
darkages_lowint_toast.01.tt2:0 "Ваши извинения не были приняты. Вы потеряли Престиж и нажили нового врага..."
darkages_lowint_toast.01.tt3:0 "[darkages_ruler_209.GetName] считает вас своим новым другом. Вы получили Престиж!"
darkages_lowint_toast.01.tt4:0 "[darkages_spymaster_637.GetFirstName] [Select_CString(darkages_spymaster_637.IsFemale, 'сумела', 'сумел')] спасти вашу репутацию!"
darkages_lowint_toast.01.tt5:0 "[darkages_spymaster_637.GetFirstName] [Select_CString(darkages_spymaster_637.IsFemale, 'потерпела', 'потерпел')] неудачу. Вы потеряли Престиж и нажили нового врага..."
darkages_low_intrigue.02.t:0 "Невежество напоказ"
darkages_low_intrigue.02.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'проводила', 'проводил')] встречу, посвященную внутренней безопасности Державы с моими вассалами, очевидные недостатки моего Навыка Интриги быстро проявились, и я [Select_CString(ROOT.Char.IsFemale, 'создала', 'создал')] жалкое впечатление о себе, своих способностях к уловкам и долгосрочных оперативных возможностях моих сетей шпионов и информаторов.\n\nВскоре стало очевидно, что я не в своей тарелке, и, к сожалению, я неуклюже [Select_CString(ROOT.Char.IsFemale, 'защищалась', 'защищался')] и свою позицию, разразившись резкой тирадой против моих вассалов.\n\nВсе разозлились, и встречу пришлось прервать, чтобы все остыли..."
darkages_low_intrigue.02.opta:0 "Избегать возвращения к теме"
darkages_low_intrigue.02.tt3:0 "Каждый Вассал, кроме Лояльных, почувствует к вам отвращение\n"
darkages_low_intrigue.02.optb:0 "Послать [darkages_spymaster_045.GetCouncilTitle|U], чтобы успокоить моих вассалов"
darkages_low_intrigue.02.tt1:0 "Вы посылаете [darkages_spymaster_045.GetCouncilTitle|U] вместе с некоторыми средствами, чтобы успокоить ваших вассалов. Базовые шансы на успех немного не в вашу пользу. На успех этого варианта положительно влияют черты вашего [darkages_spymaster_045.GetCouncilTitle] Усердный, Терпеливый, Упрямый, Спокойный и Интриган, а также [darkages_spymaster_045.GetHerHis] Блестящий Навык Интриги (>=18). Отрицательно влияет, если [darkages_spymaster_045.GetSheHe] имеет черты Черствый, Гневный, Переменчивый и Нетерпеливый, а также если [darkages_spymaster_045.GetSheHe] имеет менее 15 в [darkages_spymaster_045.GetHerHis] Навыке Интриги. Если [darkages_spymaster_045.GetSheHe] является вашим вассалом, это также снизит ваши шансы на успех. В случае неудачи, помимо потери Престижа, вы также получите такой же штраф к мнению, как и в варианте выше\n"
darkages_low_intrigue.02.optc:0 "Запугать всех до подчинения"
darkages_low_intrigue.02.tt2:0 "Вы пытаетесь внушить всем страх. В то время как большинство ваших вассалов примут ваше поведение, не моргнув глазом, Храбрые почувствуют к вам сильное презрение. Будьте осторожны: навязывание своих взглядов через страх может иметь впечатляющие обратные последствия, отчасти зависящие от ваших Черт, отчасти от чистой удачи\n"
darkages_low_intrigue.03.t:0 "Решение всеобщих проблем"
darkages_low_intrigue.03.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в одиночестве в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_intrigue.03.desc2:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охранял', 'охранял')] мой телохранитель, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_intrigue.03.desc3:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охраняли', 'охраняли')] мои телохранители, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что запугивание всех вредно для моего здоровья! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_intrigue.03.opta:0 "Берегись!"
darkages_low_intrigue.03.tt1:0 "Вы могли пострадать от этого события, потому что недавно пытались запугать своих вассалов. Кто-то мог воспринять это слишком лично"
darkages_lowint_toast.02.tt1:0 "[darkages_spymaster_045.GetFirstName] [Select_CString(darkages_spymaster_045.IsFemale, 'сумела', 'сумел')] всех успокоить, и вы получили Престиж"
darkages_lowint_toast.02.tt2:0 "[darkages_spymaster_045.GetFirstName] [Select_CString(darkages_spymaster_045.IsFemale, 'потерпела', 'потерпел')] неудачу, и вы теряете Престиж и Мнение ваших Вассалов"
darkages_death_warning:0 "Смерть!"
darkages_low_intrigue.04.t:0 "Борьба с интригами"
darkages_low_intrigue.04.desc:0 "Сколько я себя помню, тонкие грани Интриги и уловок мне недоступны.\n\nЯ убеждаюсь, что трачу все больше и больше времени, борясь с этой областью своей жизни, поскольку мои обязанности требуют от меня вникать в тонкие вопросы разведки, которые я в конечном итоге не могу понять.\n\nТеперь пришло время решить, как я буду справляться с этим недостатком в будущем."
darkages_low_intrigue.04.opta:0 "Сосредоточиться на моей Интриге за счет других Навыков"
darkages_low_intrigue.04.optb:0 "Попытаться управлять всем"
darkages_low_intrigue.04.optc:0 "Делегировать гораздо больше, чем желательно"
darkages_low_intrigue.04.tt1:0 "Вас считают неудачником в управлении аспектами Интриги вашей Державы. Помимо затрат Престижа и дополнительных расходов на поддержку структуры, необходимой для помощи вам, ваши Вассалы падут духом из-за отсутствия вашего руководства и участия\n"
darkages_province_unsafe:0 "Небезопасное графство"
darkages_province_unsafe_desc:0 "Из-за неудач в интригах владельца и нарушения безопасности, эта провинция страдает от очень высокого бандитизма"
darkages_low_intrigue.05.t:0 "Неловкая политика безопасности"
darkages_low_intrigue.05.desc:0 "В последнее время я [Select_CString(ROOT.Char.IsFemale, 'объезжала', 'объезжал')] провинции своего Домена, чтобы спланировать и подготовить внутреннюю безопасность моих владений.\n\nК сожалению, из-за моего низкого Навыка Интриги мои усилия не увенчались успехом...\n\nПутаные приказы, непродуманные решения и неуклюжая политика безопасности привели к тому, что мои чиновники почувствовали мою слабость, а энтузиазм моих людей угас, мои слова и решения оставили всех в замешательстве.\n\nВремя не стоит на месте, если я [Select_CString(ROOT.Char.IsFemale, 'хочу', 'хочу')] спасти негативную ситуацию, мне нужно действовать сейчас!"
darkages_low_intrigue.05.opta:0 "Проигнорировать проблему"
darkages_low_intrigue.05.optb:0 "Попытаться исправить проблему новым набором политик"
darkages_low_intrigue.05.optc:0 "Попросить моего [darkages_spymaster_820.GetCouncilTitle|U] решить проблему"
darkages_low_intrigue.05.tt1:0 "Помимо модификатора, применяемого ко всем провинциям, если вы не Ленивый, Довольный или Смиренный, вы получите Стресс\n"
darkages_low_intrigue.05.tt2:0 "Вы пытаетесь решить проблему, выпуская шквал новых указов, чтобы показать, что вы все-таки контролируете свой Домен. Успех ваших действий зависит от вашей высокой Интриги (>=12), от того, являетесь ли вы Усердным, Управленцем, Эксцентричным или Проницательным. Отрицательно влияют на ваши шансы черты Ленивый, Довольный, Упрямый и Тупой. Ваш низкий Навык Интриги (<8) также снизит ваши шансы на успех\n"
darkages_low_intrigue.05.tt3:0 "Вы просите своего [darkages_spymaster_820.GetCouncilTitle|U] вмешаться от вашего имени, раздавая золото по всему вашему Домену. Успех этого варианта положительно зависит от того, что ваш [darkages_spymaster_820.GetCouncilTitle] имеет как минимум очень хороший Навык Интриги (>=15) и от [darkages_spymaster_820.GetHerHis] черт Усердный, Обманщик, Управленец, Проницательный и Хитрый политик. Отрицательно влияют на ваши шансы [darkages_spymaster_820.GetHerHis] Навык Интриги ниже Очень хорошего (<15) и [darkages_spymaster_820.GetHerHis] черты Ленивый, Честный, Щедрый и Тупой. Этот вариант имеет меньший базовый шанс на успех, чем предыдущий\n"
darkages_lowint_toast.05.tt1:0 "Вам удалось снова впечатлить своих подданных!"
darkages_lowint_toast.05.tt2:0 "Вам совершенно не удалось впечатлить своих подданных..."
darkages_lowint_toast.05.tt3:0 "[darkages_spymaster_820.GetFirstName] [Select_CString(darkages_spymaster_820.IsFemale, 'сумела', 'сумел')] спасти ваше плохое выступление!"
darkages_lowint_toast.05.tt4:0 "[darkages_spymaster_820.GetFirstName] [Select_CString(darkages_spymaster_820.IsFemale, 'потерпела', 'потерпел')] неудачу в своей миссии..."
darkages_low_intrigue.06.t:0 "Гадкая ссора"
darkages_low_intrigue.06.desc:0 "Еще один день в Совете, еще одна ссора между мной и [darkages_spymaster_054.GetName], моим [darkages_spymaster_054.GetCouncilTitle|U].\n\nНа этот раз мне стало ясно, что [darkages_spymaster_054.GetSheHe] [Select_CString(darkages_spymaster_054.IsFemale, 'зашла', 'зашел')] слишком далеко, эксплуатируя мою очевидную неосведомленность в Вопросах Интриги, доходя даже до сильного высмеивания моих идей и планов.\n\nВ конце концов, с искрой огненного неповиновения в [darkages_spymaster_054.GetHerHis] глазах, [darkages_spymaster_054.GetFirstName] сухо [Select_CString(darkages_spymaster_054.IsFemale, 'представила', 'представил')] свою отставку с поста [darkages_spymaster_054.GetCouncilTitle|U].\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что делать, так как это может иметь множество различных последствий..."
darkages_low_intrigue.06.opta:0 "Скатертью дорога!"
darkages_low_intrigue.06.optb:0 "Попросить супруга вмешаться"
darkages_low_intrigue.06.optc:0 "Умолять о [darkages_spymaster_054.GetHerHis] прощении"
darkages_low_intrigue.06.tt1:0 "Вы считаете дело решенным. Ваши Советники с положительным мнением о [darkages_spymaster_054.GetFirstName] будут удручены вами, в то время как ваши Советники с отрицательным мнением о [darkages_spymaster_054.GetHerHim] выразят одобрение вашим решением\n"
darkages_low_intrigue.06.tt2:0 "Вы просите своего Супруга повлиять на вашего [darkages_spymaster_054.GetCouncilTitle|U]. Шансы на успех этого действия положительно зависят от хорошего Навыка Дипломатии вашего Супруга или выше (>=12), а также от [darkages_spouse_321.GetHerHis] черт Красивый, Общительный, Проницательный, Похотливый, Усердный и Дипломат. Черты вашего [darkages_spymaster_054.GetCouncilTitle|U] Всепрощающий, Сострадательный и Смиренный также дают бонус. Отрицательно влияют на шансы успеха плохой Навык Дипломатии вашего супруга или ниже (<8) и черты вашего [darkages_spymaster_054.GetCouncilTitle|U] Мстительный, Высокомерный и Черствый\n"
darkages_low_intrigue.06.tt3:0 "Вы смиренно просите прощения у вашего [darkages_spymaster_054.GetCouncilTitle|U]. Шанс успеха этого действия, который без модификаторов выше, чем у предыдущего, положительно зависит от ваших черт Смиренный, Честный, Справедливый и Сострадательный и от черт [darkages_spymaster_054.GetFirstName|U] Сострадательный, Смиренный, Всепрощающий и Лояльный. Отрицательно влияют на ваши шансы черты Черствый, Мстительный и Высокомерный и черты вашего [darkages_spymaster_054.GetCouncilTitle|U] Мстительный, Черствый и Нелояльный\n"
darkages_lowint_toast.06.tt1:0 "[darkages_spouse_321.GetFirstName] [Select_CString(darkages_spouse_321.IsFemale, 'сумела', 'сумел')] успокоить вашего [darkages_spymaster_054.GetCouncilTitle|U]!"
darkages_lowint_toast.06.tt2:0 "[darkages_spouse_321.GetFirstName] не [Select_CString(darkages_spouse_321.IsFemale, 'смогла', 'смог')] успокоить вашего [darkages_spymaster_054.GetCouncilTitle|U]..."
darkages_lowint_toast.06.tt3:0 "[darkages_spymaster_054.GetFirstName] [Select_CString(darkages_spymaster_054.IsFemale, 'простила', 'простил')] ваше поведение!"
darkages_lowint_toast.06.tt4:0 "[darkages_spymaster_054.GetFirstName] не [Select_CString(darkages_spymaster_054.IsFemale, 'простила', 'простил')] ваше поведение..."
game_rule_category_Dark_Ages:0 "Тёмные века"
rule_darkages_children_mortality_rule:0 "#B #Bold Тёмные века#!:#! Смертность детей"
setting_darkages_children_mortality_default:0 "Нормальная"
setting_darkages_children_mortality_reduced:0 "Сниженная"
setting_darkages_children_mortality_default_desc:0 "Ранняя жизнь в Средневековье была полна опасностей, и значительная часть младенцев никогда не достигала совершеннолетия"
setting_darkages_children_mortality_reduced_desc:0 "Риски умереть совсем маленьким значительно ниже"
darkages_rival_offended_learning:0 "[TARGET_CHARACTER.GetShortUIName|U] глубоко [Select_CString(TARGET_CHARACTER.IsFemale, 'оскорбила', 'оскорбил')] [CHARACTER.GetShortUIName], высмеяв [CHARACTER.GetHerHis] интеллект."
darkages_rival_offended_learning_corresponding:0 "[CHARACTER.GetShortUIName] глубоко [Select_CString(CHARACTER.IsFemale, 'оскорбила', 'оскорбил')] [TARGET_CHARACTER.GetShortUIName|U], высмеяв [TARGET_CHARACTER.GetHerHis] интеллект."
darkages_low_learning.01.t:0 "Слова на ветер"
darkages_low_learning.01.desc:0 "Недавно я [Select_CString(ROOT.Char.IsFemale, 'выступала', 'выступал')] на собрании с участием нескольких правителей, и мой недостаток Навыка Учености проявился, когда я безыскусно [Select_CString(ROOT.Char.IsFemale, 'раскритиковала', 'раскритиковал')], даже [Select_CString(ROOT.Char.IsFemale, 'высмеяла', 'высмеял')] интеллект [darkages_ruler_738.GetName].\n\nК сожалению, теперь я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с возможностью постоянной оппозиции, даже соперничества со стороны такого правителя, и, создав эту проблему, на мои плечи ложится задача попытаться решить ее... если я этого захочу."
darkages_low_learning.01.opta:0 "Я не собираюсь брать свои слова обратно!"
darkages_low_learning.01.optb:0 "Взять свои слова назад"
darkages_low_learning.01.optc:0 "Попросить моего [darkages_learning_080.GetCouncilTitle|U] решить проблему"
darkages_low_learning.01.tt1:0 "Помимо предоставления финансовой компенсации, вы признаете свою ошибку, используя оригинальный подход, и надеетесь, что [darkages_ruler_738.GetFirstName] любезно примет ваши извинения. Успех этого варианта положительно зависит от ваших черт Общительный, Смиренный, Эксцентричный, Сдержанный, Спокойный и Терпеливый. Отрицательно влияют на ваши шансы на успех ваши черты Черствый, Гневный, Обманщик, Произвольный, Переменчивый и Нетерпеливый\n"
darkages_low_learning.01.tt2:0 "Благодаря добрым услугам [darkages_learning_080.GetFirstName] вы предлагаете денежную компенсацию, чтобы попытаться спасти ваши отношения с [darkages_ruler_738.GetFirstName]. Этот вариант имеет более ограниченную вероятность успеха, так как вы просите одного из своих слуг обратиться к обиженной стороне. Тем не менее, это может представлять гораздо лучшую перспективу, чем предыдущий вариант, в зависимости от ваших Черт и Черт вашего [darkages_learning_080.GetCouncilTitle]. Успех этого варианта зависит только отрицательно от того, является ли ваш [darkages_learning_080.GetCouncilTitle] Черствым, Гневным, Честным, Произвольным, Переменчивым и Нетерпеливым\n"
darkages_lowlea_toast.01.tt1:0 "[darkages_ruler_738.GetName] [Select_CString(darkages_ruler_738.IsFemale, 'простила', 'простил')] вас, и вы даже получили немного Благочестия!"
darkages_lowlea_toast.01.tt2:0 "Ваши извинения не были приняты. Вы потеряли Благочестие и нажили нового врага..."
darkages_lowlea_toast.01.tt3:0 "[darkages_ruler_738.GetName] считает вас своим новым другом. Вы получили Благочестие!"
darkages_lowlea_toast.01.tt4:0 "[darkages_learning_080.GetFirstName] [Select_CString(darkages_learning_080.IsFemale, 'сумела', 'сумел')] спасти вашу репутацию!"
darkages_lowlea_toast.01.tt5:0 "[darkages_learning_080.GetFirstName] [Select_CString(darkages_learning_080.IsFemale, 'потерпела', 'потерпел')] неудачу. Вы потеряли Благочестие и нажили нового врага..."
darkages_low_learning.02.t:0 "Дефицит знаний"
darkages_low_learning.02.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'проводила', 'проводил')] встречу, посвященную культуре, религии и знаниям в моих владениях с моими вассалами, очевидные недостатки моего Навыка Учености быстро проявились, и я [Select_CString(ROOT.Char.IsFemale, 'создала', 'создал')] жалкое впечатление о себе, своих способностях в академических вопросах и долгосрочных религиозных и культурных мероприятиях в моей Державе.\n\nВскоре стало очевидно, что я не в своей тарелке, и, к сожалению, я неуклюже [Select_CString(ROOT.Char.IsFemale, 'защищалась', 'защищался')] и свою позицию, разразившись резкой тирадой против моих вассалов.\n\nВсе разозлились, и встречу пришлось прервать, чтобы все остыли..."
darkages_low_learning.02.opta:0 "Избегать возвращения к теме"
darkages_low_learning.02.tt3:0 "Каждый Вассал, кроме Лояльных, почувствует к вам отвращение\n"
darkages_low_learning.02.optb:0 "Послать [darkages_learning_365.GetCouncilTitle|U], чтобы успокоить моих вассалов"
darkages_low_learning.02.tt1:0 "Вы посылаете [darkages_learning_365.GetCouncilTitle|U] вместе с некоторыми средствами, чтобы успокоить ваших вассалов. Базовые шансы на успех немного не в вашу пользу. На успех этого варианта положительно влияют черты вашего [darkages_learning_365.GetCouncilTitle] Усердный, Терпеливый, Упрямый, Спокойный и Ученый, а также [darkages_learning_365.GetHerHis] Блестящий Навык Учености (>=18). Отрицательно влияет, если [darkages_learning_365.GetSheHe] имеет черты Черствый, Гневный, Переменчивый и Нетерпеливый, а также если [darkages_learning_365.GetSheHe] имеет менее 15 в [darkages_learning_365.GetHerHis] Навыке Учености. Если [darkages_learning_365.GetSheHe] является вашим вассалом, это также снизит ваши шансы на успех. В случае неудачи, помимо потери Благочестия, вы также получите такой же штраф к мнению, как и в варианте выше\n"
darkages_low_learning.02.optc:0 "Запугать всех до подчинения"
darkages_low_learning.02.tt2:0 "Вы пытаетесь внушить всем страх. В то время как большинство ваших вассалов примут ваше поведение, не моргнув глазом, Храбрые почувствуют к вам сильное презрение. Будьте осторожны: навязывание своих взглядов через страх может иметь впечатляющие обратные последствия, отчасти зависящие от ваших Черт, отчасти от чистой удачи\n"
darkages_lowlea_toast.02.tt1:0 "[darkages_learning_365.GetFirstName] [Select_CString(darkages_learning_365.IsFemale, 'сумела', 'сумел')] всех успокоить, и вы получили Благочестие"
darkages_lowlea_toast.02.tt2:0 "[darkages_learning_365.GetFirstName] [Select_CString(darkages_learning_365.IsFemale, 'потерпела', 'потерпел')] неудачу, и вы теряете Благочестие и Мнение ваших Вассалов"
darkages_low_learning.03.t:0 "Решение всеобщих проблем"
darkages_low_learning.03.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в одиночестве в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_learning.03.desc2:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охранял', 'охранял')] мой телохранитель, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_learning.03.desc3:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охраняли', 'охраняли')] мои телохранители, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что запугивание всех вредно для моего здоровья! Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_learning.03.opta:0 "Берегись!"
darkages_low_learning.03.tt1:0 "Вы могли пострадать от этого события, потому что недавно пытались запугать своих вассалов. Кто-то мог воспринять это слишком лично"
darkages_low_learning.04.t:0 "Борьба за знания"
darkages_low_learning.04.desc:0 "Сколько я себя помню, тонкости Учености и стремление к интеллектуальным знаниям мне недоступны.\n\nЯ убеждаюсь, что трачу все больше и больше времени, борясь с этой областью своей жизни, поскольку мои обязанности требуют от меня вникать в тонкие вопросы академических знаний, которые я в конечном итоге не могу понять.\n\nТеперь пришло время решить, как я буду справляться с этим недостатком в будущем."
darkages_low_learning.04.opta:0 "Сосредоточиться на моей Учености за счет других Навыков"
darkages_low_learning.04.optb:0 "Попытаться управлять всем"
darkages_low_learning.04.optc:0 "Делегировать гораздо больше, чем желательно"
darkages_low_learning.04.tt1:0 "Вас считают неудачником в управлении аспектами Учености вашей Державы. Помимо затрат Благочестия и дополнительных расходов на поддержку структуры, необходимой для помощи вам, ваши Вассалы падут духом из-за отсутствия вашего руководства и участия\n"
darkages_low_learning.05.t:0 "Полное отсутствие вдохновения"
darkages_low_learning.05.desc:0 "В последнее время я [Select_CString(ROOT.Char.IsFemale, 'объезжала', 'объезжал')] провинции своего Домена, чтобы улучшить религиозные и культурные аспекты моего правления.\n\nК сожалению, из-за моего низкого Навыка Учености мои усилия не увенчались успехом...\n\nПутаные приказы, непродуманные решения и неуклюжая религиозная и культурная политика привели к тому, что мои чиновники почувствовали мою слабость, а энтузиазм моих людей угас, мои слова и решения оставили всех в замешательстве.\n\nВремя не стоит на месте, если я [Select_CString(ROOT.Char.IsFemale, 'хочу', 'хочу')] спасти негативную ситуацию, мне нужно действовать сейчас!"
darkages_low_learning.05.opta:0 "Проигнорировать проблему"
darkages_low_learning.05.optb:0 "Обмануть моих подданных новыми пустыми указами"
darkages_low_learning.05.optc:0 "Попросить моего [darkages_courtchaplain_484.GetCouncilTitle|U] решить проблему"
darkages_low_learning.05.tt1:0 "Помимо модификатора, применяемого ко всем провинциям, если вы не Ленивый, Довольный или Смиренный, вы получите Стресс\n"
darkages_low_learning.05.tt2:0 "Вы пытаетесь решить проблему, выпуская шквал новых указов, чтобы показать, что вы все-таки контролируете свой Домен. Успех ваших действий зависит от вашей высокой Интриги (>=12), от того, являетесь ли вы Обманщиком, Интриганом, Эксцентричным или Проницательным. Отрицательно влияют на ваши шансы черты Честный, Справедливый, Упрямый и Тупой. Ваш низкий Навык Интриги (<8) также снизит ваши шансы на успех\n"
darkages_low_learning.05.tt3:0 "Вы просите своего [darkages_courtchaplain_484.GetCouncilTitle|U] вмешаться от вашего имени, раздавая золото по всему вашему Домену. Успех этого варианта положительно зависит от того, что ваш [darkages_courtchaplain_484.GetCouncilTitle] имеет как минимум очень хороший Навык Учености (>=15) и от [darkages_courtchaplain_484.GetHerHis] черт Усердный, Обманщик, Ученый и Хитрый политик. Отрицательно влияют на ваши шансы [darkages_courtchaplain_484.GetHerHis] Навык Управления ниже Очень хорошего (<15) и [darkages_courtchaplain_484.GetHerHis] черты Ленивый, Честный, Щедрый и Тупой. Этот вариант имеет меньший базовый шанс на успех, чем предыдущий\n"
darkages_lowlea_toast.05.tt1:0 "Вам удалось снова впечатлить своих подданных!"
darkages_lowlea_toast.05.tt2:0 "Вам совершенно не удалось впечатлить своих подданных..."
darkages_lowlea_toast.05.tt3:0 "[darkages_courtchaplain_484.GetFirstName] [Select_CString(darkages_courtchaplain_484.IsFemale, 'сумела', 'сумел')] спасти ваше плохое выступление!"
darkages_lowlea_toast.05.tt4:0 "[darkages_courtchaplain_484.GetFirstName] [Select_CString(darkages_courtchaplain_484.IsFemale, 'потерпела', 'потерпел')] неудачу в своей миссии..."
darkages_province_aimless:0 "Бесцельная политика"
darkages_province_aimless_desc:0 "Владелец этого Графства не смог установить здесь хорошую культурную и религиозную политику"
darkages_low_learning.06.t:0 "Гадкая ссора"
darkages_low_learning.06.desc:0 "Еще один день в Совете, еще одна ссора между мной и [darkages_cc_585.GetName], моим [darkages_cc_585.GetCouncilTitle|U].\n\nНа этот раз мне стало ясно, что [darkages_cc_585.GetSheHe] [Select_CString(darkages_cc_585.IsFemale, 'зашла', 'зашел')] слишком далеко, эксплуатируя мою очевидную неосведомленность в Вопросах Учености, доходя даже до сильного высмеивания моих идей и планов.\n\nВ конце концов, с искрой огненного неповиновения в [darkages_cc_585.GetHerHis] глазах, [darkages_cc_585.GetFirstName] сухо [Select_CString(darkages_cc_585.IsFemale, 'представила', 'представил')] свою отставку с поста [darkages_cc_585.GetCouncilTitle|U].\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что делать, так как это может иметь множество различных последствий..."
darkages_low_learning.06.opta:0 "Скатертью дорога!"
darkages_low_learning.06.optb:0 "Попросить супруга вмешаться"
darkages_low_learning.06.optc:0 "Умолять о [darkages_cc_585.GetHerHis] прощении"
darkages_low_learning.06.tt1:0 "Вы считаете дело решенным. Ваши Советники с положительным мнением о [darkages_cc_585.GetFirstName] будут удручены вами, в то время как ваши Советники с отрицательным мнением о [darkages_cc_585.GetHerHim] выразят одобрение вашим решением\n"
darkages_low_learning.06.tt2:0 "Вы просите своего Супруга повлиять на вашего [darkages_cc_585.GetCouncilTitle|U]. Шансы на успех этого действия положительно зависят от хорошего Навыка Дипломатии вашего Супруга или выше (>=12), а также от [darkages_spouse_709.GetHerHis] черт Красивый, Общительный, Проницательный, Похотливый, Усердный и Дипломат. Черты вашего [darkages_cc_585.GetCouncilTitle|U] Всепрощающий, Сострадательный и Смиренный также дают бонус. Отрицательно влияют на шансы успеха плохой Навык Дипломатии вашего супруга или ниже (<8) и черты вашего [darkages_cc_585.GetCouncilTitle|U] Мстительный, Высокомерный и Черствый\n"
darkages_low_learning.06.tt3:0 "Вы смиренно просите прощения у вашего [darkages_cc_585.GetCouncilTitle|U]. Шанс успеха этого действия, который без модификаторов выше, чем у предыдущего, положительно зависит от ваших черт Смиренный, Честный, Справедливый и Сострадательный и от черт [darkages_cc_585.GetFirstName|U] Сострадательный, Смиренный, Всепрощающий и Лояльный. Отрицательно влияют на ваши шансы черты Черствый, Мстительный и Высокомерный и черты вашего [darkages_cc_585.GetCouncilTitle|U] Мстительный, Черствый и Нелояльный\n"
darkages_lowlea_toast.06.tt1:0 "[darkages_spouse_709.GetFirstName] [Select_CString(darkages_spouse_709.IsFemale, 'сумела', 'сумел')] успокоить вашего [darkages_cc_585.GetCouncilTitle|U]!"
darkages_lowlea_toast.06.tt2:0 "[darkages_spouse_709.GetFirstName] не [Select_CString(darkages_spouse_709.IsFemale, 'смогла', 'смог')] успокоить вашего [darkages_cc_585.GetCouncilTitle|U]..."
darkages_lowlea_toast.06.tt3:0 "[darkages_cc_585.GetFirstName] [Select_CString(darkages_cc_585.IsFemale, 'простила', 'простил')] ваше поведение!"
darkages_lowlea_toast.06.tt4:0 "[darkages_cc_585.GetFirstName] не [Select_CString(darkages_cc_585.IsFemale, 'простила', 'простил')] ваше поведение..."
darkages_hooks.01.t:0 "Старые долги"
darkages_hooks.01.desc:0 "Сегодня, когда я [Select_CString(ROOT.Char.IsFemale, 'прогуливалась', 'прогуливался')] в окрестностях своего замка, ко мне [Select_CString(darkages_hooker.IsFemale, 'подошла', 'подошел')] [darkages_hooker.GetName] и [Select_CString(darkages_hooker.IsFemale, 'попросила', 'попросил')] уделить мне несколько минут.\nКогда я [Select_CString(ROOT.Char.IsFemale, 'согласилась', 'согласился')], [darkages_hooker.GetSheHe] [Select_CString(darkages_hooker.IsFemale, 'напомнила', 'напомнил')] о долге, который я имею перед [darkages_hooker.GetHerHim], и [Select_CString(darkages_hooker.IsFemale, 'заявила', 'заявил')], что пришло время мне помочь [darkages_hooker.GetHerHim] в трудную минуту.\n\nКак обстоят дела, то, что [darkages_hooker.GetFirstName] хочет, — это золото..."
darkages_hooks.01.opta:0 "Подкрепить свои слова делом"
darkages_hooks.01.optb:0 "Избежать оплаты"
darkages_hooks.01.tt1:0 "Выбрав этот вариант, вы потеряете Престиж за то, что не сдержали свое слово. В зависимости от ваших черт, вы также можете получить Стресс. Известность также пострадает, если Династия обоих персонажей отличается. В этом случае количество потерянной Известности зависит от вашего высшего ранга титула\n"
darkages_hooks.02.tt1:0 "Выбрав этот вариант, вы потеряете Престиж за то, что не сдержали свое слово. В зависимости от ваших черт, вы также можете получить Стресс. Известность также пострадает, если Династия обоих персонажей отличается. В этом случае количество потерянной Известности зависит от вашего высшего ранга титула\n"
darkages_hooks.02.t:0 "Публичное повышение"
darkages_hooks.02.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'решала', 'решал')] некоторые административные вопросы в своем кабинете, мне сообщили, что [darkages_hooker.GetName] [Select_CString(darkages_hooker.IsFemale, 'ждала', 'ждал')] меня, чтобы перекинуться словечком.\n\nПосле того, как меня допустили к моему присутствию, [darkages_hooker.GetSheHe] [Select_CString(darkages_hooker.IsFemale, 'продолжила', 'продолжил')] напоминать мне, что я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] [darkages_hooker.GetHerHim] услугу, о которой я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] забыть.\n\nВолею судьбы, похоже, [darkages_hooker.GetFirstName] хочет, чтобы я [Select_CString(ROOT.Char.IsFemale, 'повысила', 'повысил')] [darkages_hooker.GetHerHim], увеличив [darkages_hooker.GetHerHis] Престиж.\nКонечно, это уменьшит мою собственную Славу, так как я буду выглядеть [Select_CString(ROOT.Char.IsFemale, 'потакающей', 'потакающим')] прихотям этого человека..."
darkages_hooks.02.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал')] слово"
darkages_hooks.02.optb:0 "Ни за что не пойду на это!"
darkages_hooks.03.tt1:0 "Выбрав этот вариант, вы потеряете Престиж за то, что не сдержали свое слово. В зависимости от ваших черт, вы также можете получить Стресс. Известность также пострадает, если Династия обоих персонажей отличается. В этом случае количество потерянной Известности зависит от вашего высшего ранга титула\n"
darkages_hooks.03.t:0 "Слово с Божественным"
darkages_hooks.03.desc:0 "Вчера меня [Select_CString(darkages_hooker.IsFemale, 'посетила', 'посетил')] не кто иной, как [darkages_hooker.GetName]. После обязательных любезностей [darkages_hooker.GetSheHe] [Select_CString(darkages_hooker.IsFemale, 'продолжила', 'продолжил')] просить меня вернуть долг, который я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] [darkages_hooker.GetHerHim], представив [darkages_hooker.GetHerHim] некоторым высокопоставленным религиозным представителям, которых я [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал')].\n\nВсе это хорошо и замечательно, но я знаю, что мое Благочестие будет поставлено на кон, если я замолвлю слово о [darkages_hooker.GetName] этим людям..."
darkages_hooks.03.opta:0 "Я сделаю это"
darkages_hooks.03.optb:0 "Ни за что не пойду на это!"
darkages_hooks.04.tt1:0 "[darkages_hooker.GetFirstName] [Select_CString(darkages_hooker.IsFemale, 'простила', 'простил')] долг, который вы [Select_CString(ROOT.Char.IsFemale, 'были должны', 'были должны')] [darkages_hooker.GetHerHim]. Это произошло потому, что [darkages_hooker.GetSheHe] не является Амбициозным, Черствым, Жадным или Нелояльным. Если [darkages_hooker.GetSheHe] Щедрый, Сострадательный или Довольный, шансы на такое решение выше\n"
darkages_hooks.04.t:0 "Великодушный поступок"
darkages_hooks.04.desc:0 "Этим утром, пока я [Select_CString(ROOT.Char.IsFemale, 'руководила', 'руководил')] некоторыми работами в своем саду, меня [Select_CString(darkages_hooker.IsFemale, 'прервала', 'прервал')] [darkages_hooker.GetName].\n\nЯ не [Select_CString(ROOT.Char.IsFemale, 'была рада', 'был рад')] непрошенному визиту, но чувство страха подогрело мой интерес. В конце концов, я [Select_CString(ROOT.Char.IsFemale, 'была должна', 'был должен')] [darkages_hooker.GetHerHim] услугу и [Select_CString(ROOT.Char.IsFemale, 'опасалась', 'опасался')] того, что, возможно, потребуется.\n\nВ конце концов, однако, я [Select_CString(ROOT.Char.IsFemale, 'была удивлена', 'был удивлен')] добрым поступком, который [Select_CString(darkages_hooker.IsFemale, 'совершила', 'совершил')] [darkages_hooker.GetFirstName]. С откровенной улыбкой [darkages_hooker.GetSheHe] просто [Select_CString(darkages_hooker.IsFemale, 'сказала', 'сказал')] мне, что [darkages_hooker.GetSheHe] [Select_CString(darkages_hooker.IsFemale, 'думала', 'думал')] об этом, и по большому счету я ничего [darkages_hooker.GetHerHim] не [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')]!"
darkages_hooks.04.opta:0 "Я действительно [Select_CString(ROOT.Char.IsFemale, 'тронута', 'тронут')]..."
rule_darkages_pagan_reformation_hs:0 "#B #Bold Тёмные века#!:#! Реформация язычества"
setting_darkages_pagan_reformation_hs_3:0 "3 Священных места"
setting_darkages_pagan_reformation_hs_3_desc:0 "Язычникам нужно контролировать как минимум 3 священных места, чтобы реформировать свою веру. Ванильная настройка."
setting_darkages_pagan_reformation_hs_2:0 "2 Священных места"
setting_darkages_pagan_reformation_hs_2_desc:0 "Язычникам нужно контролировать как минимум 2 священных места, чтобы реформировать свою веру. Легче."
setting_darkages_pagan_reformation_hs_1:0 "1 Священное место"
setting_darkages_pagan_reformation_hs_1_desc:0 "Язычникам нужно контролировать как минимум одно священное место, чтобы реформировать свою веру. Легчайшая."
setting_darkages_pagan_reformation_hs_0:0 "Не требуется"
setting_darkages_pagan_reformation_hs_0_desc:0 "Язычникам не нужно контролировать священные места, чтобы реформировать свою веру."
setting_darkages_pagan_reformation_hs_4:0 "4 Священных места"
setting_darkages_pagan_reformation_hs_4_desc:0 "Язычникам нужно контролировать как минимум 4 священных места, чтобы реформировать свою веру. Сложнее."
setting_darkages_pagan_reformation_hs_5:0 "5 Священных мест"
setting_darkages_pagan_reformation_hs_5_desc:0 "Язычникам нужно контролировать как минимум 5 священных мест, чтобы реформировать свою веру. Сложнейшая."
rule_darkages_infertility_rule:0 "#B #Bold Тёмные века#!:#! Бесплодие"
setting_darkages_infertility_rule_default:0 "По умолчанию"
setting_darkages_infertility_rule_default_desc:0 "5% всех персонажей бесплодны. Это будет неизвестно и может раскрыться позже в жизни."
setting_darkages_infertility_rule_no:0 "Нет"
setting_darkages_infertility_rule_no_desc:0 "Бесплодные персонажи регулируются более простыми ванильными правилами и будут чрезвычайно редки."
darkages_legitimacy.02.t:0 "Указы о правосудии"
darkages_legitimacy.02.desc:0 "Уже некоторое время на нескольких собраниях в разных частях Державы упоминается о необходимости принятия значительных реформ правосудия, чтобы проложить путь к более гладкой торговле и лучшей общей безопасности в провинциях.\n\nЕсли в начале я не [Select_CString(ROOT.Char.IsFemale, 'придерживалась', 'придерживался')] этой мысли, опасаясь потенциального истощения моей казны, то в последнее время я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] создавать ожидание, что эта реформа пойдет вперед.\n\nТеперь в тесном сотрудничестве между моим Советом и моими Вассалами на столе лежит надлежащий документ с полным расчетом расходов, и все смотрят на меня, чтобы я [Select_CString(ROOT.Char.IsFemale, 'подписала', 'подписал')] его..."
darkages_legitimacy.02.opta:0 "Подписать"
darkages_legitimacy.02.optb:0 "Отказаться подписывать"
darkages_legitimacy.02.optc:0 "Пригрозить всем, чтобы забыли об этом!"
darkages_legitimacy.02.optd:0 "Уговорить всех забыть об этом..."
darkages_legitimacy.02.tt3:0 "Вы принимаете меры, и помимо отображаемых эффектов, все ваши вассалы также увеличивают контроль в своих владениях, будучи Впечатленными вашим поведением\n"
darkages_legitimacy.02.tt2:0 "Этот вариант доступен, потому что вы Дипломат, Интриган, Обманщик, Общительный или Хитрый политик. Вы манипулируете всеми, чтобы сохранить статус-кво, отказываясь от предложенной идеи. Каждый вассал, который является Проницательным, Интриганом, Обманщиком, Циничным, Нелояльным или Хитрым политиком, раскусит ваш обман и будет Разгневан на вас\n"
darkages_legitimacy.02.tt1:0 "Этот вариант доступен, потому что у вас есть как минимум 25 Ужаса. Вы пугаете всех, чтобы они отказались от этого плана. Вассалы, которые являются Храбрыми, Справедливыми, Честными, Сострадательными или Нелояльными, будут Разгневаны на вас. Обратите внимание, что вассалы, которые являются Трусами, никогда не будут Разгневаны\n"
darkages_legitimacy.03.t:0 "Неудобный супруг"
darkages_legitimacy.03.desc:0 "Недавно мой [darkages_spouse_023.GetFirstName] [Select_CString(darkages_spouse_023.IsFemale, 'сделала', 'сделал')] несколько важных публичных замечаний политического характера, которые глубоко оскорбили моих вассалов и потрясли всю правительственную структуру моей Державы.\n\nЗная, что мой супруг не собирается отказываться от своих слов, и ставя на кон мою репутацию перед моими вассалами и моими низшими подданными, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как действовать, учитывая очень серьезный политический вызов, с которым я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')]."
darkages_legitimacy.03.opta:0 "Ничего не делать"
darkages_legitimacy.03.optb:0 "Решительно отвергнуть слова [darkages_spouse_023.GetFirstName]"
darkages_legitimacy.03.optc:0 "Вселить страх в сердца каждого!"
darkages_legitimacy.03.tt1:0 "Помимо видимых эффектов, все ваши не Лояльные вассалы будут В ярости на вас, в то время как ваш супруг будет Счастлив с вами\n"
darkages_legitimacy.03.tt2:0 "Помимо видимых эффектов, все ваши не Нелояльные вассалы выразят Одобрение вашим действиям, в то время как ваш Супруг будет В ярости на вас\n"
darkages_legitimacy.03.tt3:0 "Этот вариант доступен, потому что у вас есть как минимум 25 Ужаса. Помимо видимых эффектов, все ваши вассалы и ваш супруг будут Насторожены вашим поведением\n"
darkages_legitimacy.04.t:0 "Ораторское мастерство"
darkages_legitimacy.04.desc:0 "День, когда нужно произнести вдохновляющую и значимую речь, посвященную прошлой Истории моей Державы, нашему месту в мире и тому, что ждет Державу в будущем, настал с большой помпой, благодаря обещаниям, которые я [Select_CString(ROOT.Char.IsFemale, 'давала', 'давал')] всем.\n\nТеперь, когда я стою перед таким смелым предприятием, мне нужно выбрать одну из двух наиболее важных тем в настоящее время, чтобы вникнуть в ее тонкости, удерживая всех очарованными тем, что я собираюсь сказать.\n\nМои Вассалы, Придворные и даже иностранные сановники с нетерпением ждут моей речи!"
darkages_legitimacy.04.opta:0 "Обратиться к дипломатическим вопросам"
darkages_legitimacy.04.optb:0 "Обратиться к деталям войны"
darkages_legitimacy.04.optc:0 "Обратиться к вопросам управления"
darkages_legitimacy.04.optd:0 "Обратиться к вопросам безопасности"
darkages_legitimacy.04.opte:0 "Обратиться к религиозным темам"
darkages_legitimacy.04.optf:0 "Смело импровизировать"
darkages_legitimacy.04.optg:0 "Свести речь к нескольким неловким банальностям"
darkages_legitimacy.04.tt1:0 "Успех речи зависит от вашего хорошего или лучшего (>=12) Навыка Дипломатии и ваших Черт Поэт, Хитрый политик и Общительный. И наоборот, если у вас низкий или худший (<8) Навык Дипломатии или если у вас нет Дипломатического образования, ваши шансы на успех будут снижены. Лигитимность и Престиж поставлены на карту, а также мнение Вассалов и Придворных, которые могут быть Впечатлены или Разочарованы, в зависимости от вашего выступления\n"
darkages_legitimacy.04.tt2:0 "Успех речи зависит от вашего хорошего или лучшего (>=12) Навыка Военного дела и ваших Черт Поэт, Хитрый политик и Высокомерный. И наоборот, если у вас низкий или худший (<8) Навык Военного дела или если у вас нет Военного образования, ваши шансы на успех будут снижены. Лигитимность и Престиж поставлены на карту, а также мнение Вассалов и Придворных, которые могут быть Впечатлены или Разочарованы, в зависимости от вашего выступления\n"
darkages_legitimacy.04.tt3:0 "Успех речи зависит от вашего хорошего или лучшего (>=12) Навыка Управления и ваших Черт Поэт, Хитрый политик и Усердный. И наоборот, если у вас низкий или худший (<8) Навык Управления или если у вас нет Образования в Управлении, ваши шансы на успех будут снижены. Лигитимность и Престиж поставлены на карту, а также мнение Вассалов и Придворных, которые могут быть Впечатлены или Разочарованы, в зависимости от вашего выступления\n"
darkages_legitimacy.04.tt4:0 "Успех речи зависит от вашего хорошего или лучшего (>=12) Навыка Интриги и ваших Черт Поэт, Хитрый политик и Обманщик. И наоборот, если у вас низкий или худший (<8) Навык Интриги или если у вас нет Образования в Интригах, ваши шансы на успех будут снижены. Лигитимность и Престиж поставлены на карту, а также мнение Вассалов и Придворных, которые могут быть Впечатлены или Разочарованы, в зависимости от вашего выступления\n"
darkages_legitimacy.04.tt5:0 "Успех речи зависит от вашего хорошего или лучшего (>=12) Навыка Учености и ваших Черт Поэт, Хитрый политик и Фанатичный. И наоборот, если у вас низкий или худший (<8) Навык Учености или если у вас нет Образования в Учености, ваши шансы на успех будут снижены. Лигитимность и Престиж поставлены на карту, а также мнение Вассалов и Придворных, которые могут быть Впечатлены или Разочарованы, в зависимости от вашего выступления\n"
darkages_legitimacy.04.tt6:0 "Этот вариант доступен, потому что вы Эксцентричный. Базовые шансы успеха этого варианта лучше, чем у двух вышеперечисленных. Вы увеличите свои шансы на успех за каждый показатель Навыка, который как минимум Хороший (>=15), а также если у вас есть черта Поэт. И наоборот, за каждый показатель навыка Ниже среднего (<8) вы получите штраф к своим шансам на успех. Лигитимность и Престиж поставлены на карту, а также мнение Вассалов и Придворных, которые могут быть Впечатлены или Разочарованы, в зависимости от вашего выступления\n"
darkages_legitimacy.04.tt7:0 "Вы действуете осторожно и отказываетесь углубляться во все темы. Вассалы и Придворные будут разочарованы, но потеря Легитимности будет менее радикальной, чем провал в предыдущих вариантах\n"
darkages_legitimacy.04.toast1:0 "Речь имеет абсолютный успех. Вы получаете Легитимность и Престиж!"
darkages_legitimacy.04.toast2:0 "Речь - полный провал. Вы теряете Легитимность и Престиж..."
darkages_legitimacy.05.t:0 "Значимое прощание"
darkages_legitimacy.05.desc:0 "Один из моих самых доверенных слуг, простолюдин [da_servant.GetName], наконец заканчивает свою службу после более чем 40 лет пребывания рядом со мной.\n\nВсегда с остроумным замечанием и очень быстрым мышлением, я не могу вспомнить свою жизнь без этого моего преданного подданного.\n\nПоскольку он является любимым работником всех, ожидается и много говорится о том, что я [Select_CString(ROOT.Char.IsFemale, 'должна устроить', 'должен устроить')] ему хорошую прощальную вечеринку, а также дать немного монет, чтобы он мог хорошо прожить свои оставшиеся дни в этом мире..."
darkages_legitimacy.05.opta:0 "Организовать прощальную вечеринку и дать немного монет"
darkages_legitimacy.05.optb:0 "Назначить его Сенешалем"
darkages_legitimacy.05.optc:0 "Он лишь выполнял свой долг"
darkages_legitimacy.05.tt1:0 "Вы устраиваете вечеринку, и все будут оценивать вашу чуткость к решению этого вопроса должным образом. Успех этого действия зависит от вашей высокой Дипломатии (>=12), от того, являетесь ли вы Общительным, Дипломатом и имеете ли Дипломатическое образование. Его провал зависит от вашей низкой Дипломатии (<8), от того, являетесь ли вы Черствым и Садистом. В случае успеха вы получите Легитимность, в случае неудачи вы потеряете Престиж, в то время как ваши Вассалы и Придворные будут Разочарованы вами\n"
darkages_legitimacy.05.tt2:0 "Вы назначаете [da_servant.GetName] своим Сенешалем и обязательно даете ему малый дворянский титул. В принципе, как ваши Придворные, так и ваши Вассалы будут возражать против этого, поэтому шансы на успех этого варианта начинаются ниже, чем у первого варианта. Успех этого действия зависит от вашего высокого Управления (>=12), от того, являетесь ли вы Усердным, Администратором и имеете ли Образование в Управлении. Провал этого действия зависит от вашего низкого Управления (<8), от того, являетесь ли вы Высокомерным и Мстительным. В случае успеха вы получите Легитимность, в случае неудачи вы потеряете Престиж, в то время как ваши Вассалы и Придворные будут Разочарованы вами\n"
darkages_legitimacy.05.tt3:0 "Вы позволяете [da_servant.GetName] уйти в полную безвестность. Помимо возможного различного влияния стресса из-за ваших черт, ваши слуги будут недовольны вашим отсутствием благодарности, и вы потеряете Легитимность\n"
darkages_unhappy_servants:0 "Несчастные слуги"
darkages_unhappy_servants_desc:0 "Слуги этого персонажа недовольны отсутствием благодарности своего сюзерена. Они не будут подчиняться со всей должной осмотрительностью"
darkages_legitimacy.05.toast1:0 "Вечеринка прошла с полным успехом. Вы получаете Легитимность!"
darkages_legitimacy.05.toast2:0 "Вечеринка была полным провалом. Потеря Престижа, в то время как Вассалы и Придворные разочарованы вами..."
darkages_legitimacy.05.toast3:0 "Вы умело повысили [da_servant.GetName]. Вы получаете Легитимность!"
darkages_legitimacy.05.toast4:0 "Вы катастрофически посвятили в рыцари низкого простолюдина. Потеря Престижа и Мнения..."
darkages_opinion_utterly_loyal:0 "Абсолютно лоялен"
darkages_legitimacy.07.t:0 "Правление подтверждено"
darkages_legitimacy.07.desc1:0 "Несмотря на скромную Дипломатию [da_councillor.GetName], [da_councillor.GetHerHis] навыки сияли, и в подтверждение этого моя #G Легитимность#! растет!"
darkages_legitimacy.07.desc2:0 "Благодаря замечательной Дипломатии [da_councillor.GetName], неудивительно, что моя #G Легитимность#! растет!"
darkages_legitimacy.08.t:0 "Правление дискредитировано"
darkages_legitimacy.08.desc1:0 "Неудивительно, что из-за не самого блестящего навыка Дипломатии [da_councillor.GetName] моя #G Легитимность#! страдает..."
darkages_legitimacy.08.desc2:0 "Несмотря на блестящую Дипломатию [da_councillor.GetName], [da_councillor.GetSheHe] [Select_CString(da_councillor.IsFemale, 'сумела', 'сумел')] испортить мою #G Легитимность#!..."
darkages_legitimacy.06.t:0 "Потеря лица"
darkages_legitimacy.06.desc:0 "После долгого периода, когда я резко [Select_CString(ROOT.Char.IsFemale, 'критиковала', 'критиковал')] [darkages_critic.GetName], судьба и ловкое политическое маневрирование решили, что мои Советники начали лоббировать меня принять этого человека в мой двор.\n\nХотя я никогда не [Select_CString(ROOT.Char.IsFemale, 'склонялась', 'склонялся')] к этой мысли, я чувствую давление принять кого-то, кого я так презираю, в близком окружении.\n\nКонечно, принятие означает значительный удар по моей репутации, учитывая то, что я [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил')] о [darkages_critic.GetName] годами, но политические последствия отказа могут быть губительными..."
darkages_legitimacy.06.opta:0 "Принять человека в мой Двор"
darkages_legitimacy.06.tt1:0 "Вы принимаете [darkages_critic.GetName] в свой Двор, теряя лицо в процессе. Хотя ваши Советники будут довольны вашим решением, вы также можете получить Стресс\n"
darkages_legitimacy.06.optb:0 "Найти хороший предлог, чтобы отмахнуться от этой идеи"
darkages_legitimacy.06.tt2:0 "Успех этого варианта зависит от вашего хорошего или лучшего Навыка Интриги (>=12), от того, являетесь ли вы Обманщиком, Интриганом, Хитрым политиком и имеете ли Образование в Интригах. Против ваших шансов работает Навык Интриги Ниже среднего или хуже (<8)\n"
darkages_legitimacy.06.toast1:0 "Вам удалось найти хороший предлог и даже получить Престиж в процессе!"
darkages_legitimacy.06.toast2:0 "Ваш аргумент никого не убедил. Вы теряете Легитимность, и ваши Советники будут Не впечатлены вами..."
darkages_legitimacy.06.optc:0 "Придумать творческий предлог"
darkages_legitimacy.06.tt3:0 "Этот вариант доступен, потому что вы Эксцентричный. С базовыми значениями шанс успеха выше, чем у предыдущего варианта. Шансы положительно модифицируются хорошей или лучшей Дипломатией (>=12), тем, что вы Общительный, Дипломат, Хитрый политик и имеете Дипломатическое образование. Против ваших шансов работает низкий или худший (<8) Навык Дипломатии\n"
darkages_legitimacy.06.toast3:0 "Вам удалось впечатлить всех своими экзотическими причинами и даже получить Престиж!"
darkages_legitimacy.06.toast4:0 "Вам не удалось никого впечатлить. Вы теряете Легитимность, и ваши Советники будут Не впечатлены вами..."
darkages_legitimacy.06.optd:0 "Пригрозить этим жалким попыткам манипуляции!"
darkages_legitimacy.06.tt4:0 "Этот вариант доступен, потому что у вас есть как минимум 15 Ужаса. Вы отказываетесь позволить [darkages_critic.GetName] присоединиться к вашему Двору, угрожая всем. С точки зрения базового шанса успеха этот вариант находится посередине между двумя предыдущими. Успех этого варианта зависит от вашего высокого Ужаса, от того, являетесь ли вы Черствым, Мстительным, Садистом и Пытателем. Против ваших шансов работают ваши черты Сострадательный, Справедливый, Сдержанный и Смиренный\n"
darkages_legitimacy.06.tt41:0 "Этот вариант доступен, потому что у вас есть как минимум 15 Ужаса. Вы отказываетесь позволить [darkages_critic.GetName] присоединиться к вашему Двору, угрожая всем. С точки зрения базового шанса успеха этот вариант немного лучше предыдущего. Успех этого варианта зависит от вашего высокого Ужаса, от того, являетесь ли вы Черствым, Мстительным, Садистом и Пытателем. Против ваших шансов работают ваши черты Сострадательный, Справедливый, Сдержанный и Смиренный\n"
darkages_legitimacy.06.toast5:0 "Вы вселяете страх в сердца каждого Советника и даже получаете Престиж в процессе!"
darkages_legitimacy.06.toast6:0 "Вам не удалось запугать ваших Не впечатленных Советников, и вы теряете Легитимность и Ужас..."
darkages_legitimacy.09.t:0 "Анналы истории"
darkages_legitimacy.09.desc:0 "Недавно опасный недовольный, склонный к клевете, плел самые злобные сказки о моей семье и родословной в нескольких важных Дворах, включая дворы моих вассалов.\n\nПоскольку моя Легитимность поставлена на карту, мне нужно решить, как справиться с этой ситуацией..."
darkages_legitimacy.09.opta:0 "Ничего не делать"
darkages_legitimacy.09.optb:0 "Попытаться опровергнуть обвинения"
darkages_legitimacy.09.tt1:0 "Успех этого варианта зависит от ваших Навыков Дипломатии и Учености выше среднего (>=12), а также от ваших Черт Ученый, Дипломат и Хитрый политик. Шанс неудачи увеличивается при наличии Навыков Дипломатии и Учености ниже среднего (<8)\n"
darkages_legitimacy.09.optc:0 "Приказать совершить покушение"
darkages_legitimacy.09.tt2:0 "Этот вариант имеет немного меньший базовый шанс успеха, чем предыдущий. Успех этого варианта зависит от вашего навыка [Concept( 'intrigue', 'Интриги' )|E] и [Concept( 'martial', 'Военного дела' )|E] выше среднего (>=12), а также от ваших свойств [Concept( 'deceitful', 'Вероломная' )|E], [Concept( 'brave', 'Отважная' )|E], [Concept( 'strategist', 'Стратег' )|E] и [Concept( 'schemer', 'Интриган' )|E]. Шанс провала увеличивается, если ваш навык [Concept( 'intrigue', 'Интриги' )|E] и [Concept( 'martial', 'Военного дела' )|E] ниже среднего (<8)\n"
darkages_legitimacy.10.t:0 "Успех!"
darkages_legitimacy.10.desc:0 "[Select_CString(ROOT.Char.IsFemale, 'Захваченная', 'Захваченный' )] врасплох коварными намёками, которые делались о моей семье и моем происхождении, я [Select_CString(ROOT.Char.IsFemale, 'поспешила', 'поспешил' )] решить этот вопрос очень эффективным способом.\n\nРазвенчивая старые мифы, очищая от не столь старой клеветы и подавляя новые злобные инсинуации, мне [Select_CString(ROOT.Char.IsFemale, 'удалось', 'удалось' )] перевернуть ситуацию, и тот, кого дискредитировали, оказался тем, кто распространял ложь в первую очередь.\n\nВ конце концов, я [Select_CString(ROOT.Char.IsFemale, 'сумела', 'сумел' )] покрыть себя и свою династию славой!"
darkages_legitimacy.10.opta:0 "О, хорошо!"
darkages_legitimacy.11.t:0 "Провал..."
darkages_legitimacy.11.desc:0 "[Select_CString(ROOT.Char.IsFemale, 'Захваченная', 'Захваченный' )] врасплох коварными намёками, которые делались о моей семье и моем происхождении, я [Select_CString(ROOT.Char.IsFemale, 'провалила', 'провалил' )] свою попытку исправить распространяемые слухи. В бессмысленном упражнении отрицания, с безыскусными аргументами и неэффективным подходом, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] чувствовать, как страдает моя [legitimacy|E] каждый раз, когда я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] разрешить ситуацию..."
darkages_legitimacy.11.opta:0 "О, нет..."
darkages_legitimacy.12.t:0 "Успех!"
darkages_legitimacy.12.desc:0 "Попутка убить придурка, который распространял ложь о моем происхождении, увенчалась успехом.\nМне доложили, что он умер медленной и мучительной смертью.\n\nТеперь нужно наградить верных слуг, которые выполнили это дело..."
darkages_legitimacy.12.opta:0 "Отличная работа!"
darkages_legitimacy.13.t:0 "Провал..."
darkages_legitimacy.13.desc:0 "К сожалению, моя попытка убить придурка, который распространял ложь о моем происхождении, не увенчалась успехом.\nВ ходе очень непрофессиональной работы мой отряд убийц был перебит толпой, пришедшей защитить цель.\n\nВ конце концов, эта попытка убийства стала лишь еще одним камешком в длинном списке тяжких камней, тянущих вниз мою [legitimacy|E]..."
darkages_legitimacy.13.opta:0 "Меня окружают идиоты!"
darkages_tyranny_toast.04.tt1:0 "Как только я [Select_CString(ROOT.Char.IsFemale, 'высказала', 'высказал' )] завуалированные угрозы, все подчинились. Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] небольшое количество [Concept( 'tyranny', 'Тирании' )|E]"
darkages_tyranny_toast.04.tt2:0 "Моя попытка имела обратный эффект как с политической, так и с существенной точки зрения. Меня ждут очень значительные штрафы к [Concept( 'prestige', 'Престижу' )|E] и [Concept( 'tyranny', 'Тирании' )|E]" 
rule_darkages_grace_period:0 "#B #Bold Dark Ages#!:#! Льготный период"
setting_darkages_grace_period_rule_5:0 "5 лет"
setting_darkages_grace_period_rule_5_desc:0 "Особо сложный набор событий не будет происходить в течение первых 5 лет игры"
setting_darkages_grace_period_rule_10:0 "10 лет"
setting_darkages_grace_period_rule_10_desc:0 "Особо сложный набор событий не будет происходить в течение первых 10 лет игры"
setting_darkages_grace_period_rule_15:0 "15 лет"
setting_darkages_grace_period_rule_15_desc:0 "Особо сложный набор событий не будет происходить в течение первых 15 лет игры"
setting_darkages_grace_period_rule_20:0 "20 лет"
setting_darkages_grace_period_rule_20_desc:0 "Особо сложный набор событий не будет происходить в течение первых 20 лет игры"
setting_darkages_grace_period_rule_25:0 "25 лет"
setting_darkages_grace_period_rule_25_desc:0 "Особо сложный набор событий не будет происходить в течение первых 25 лет игры"
setting_darkages_grace_period_rule_forever:0 "Навсегда"
setting_darkages_grace_period_rule_forever_desc:0 "Особо сложный набор событий не будет происходить в течение игры"
setting_darkages_grace_period_rule_0:0 "Откл."
setting_darkages_grace_period_rule_0_desc:0 "Вы можете получить все события с начала игры"
darkages_steward.12.t:0 "Глубокие карманы"
darkages_steward.12.desc:0 "Мой надежный [da_steward.GetCouncilTitle] [Select_CString(da_steward.IsFemale, 'пришла', 'пришел' )] ко мне сегодня, обеспокоенный моей финансовой политикой.\nВ настоящее время моих средств слишком мало, чтобы безопасно справиться с любым непредвиденным событием.\n\nКак [da_steward.GetSheHe] [Select_CString(da_steward.IsFemale, 'объяснила', 'объяснил' )], разумно будет, если я сберегу хорошую сумму золота для решения серьезных вопросов, которые могут возникнуть, когда их меньше всего ожидаешь.\n\nНе углубляясь слишком сильно в то, как я управляю своей казной, [da_steward.GetFirstName] говорит мне, что в настоящее время, судя по моему ежемесячному доходу, запасы золота низки..."
darkages_steward.12.opta:0 "Спасибо за информацию"
darkages_steward.12.optb:0 "Не вмешивайся в мои дела снова!"
darkages_steward.12.tt1:0 "Ваш [da_steward.GetCouncilTitle] больше не будет информировать вас о вашем финансовом состоянии. Обратите внимание, что ваш наследник, когда вы будете играть за него, снова будет предупрежден\n"
darkages_rival_abused_my_generosity:0 "[CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsFemale, 'злоупотребила', 'злоупотребил' )] щедростью [TARGET_CHARACTER.GetShortUIName|U]."
darkages_vassals.01.t:0 "Акт доброты"
darkages_vassals.01.desc:0 "Сегодня после особенно вкусного обеда я [Select_CString(ROOT.Char.IsFemale, 'была удивлена', 'был удивлен' )] неожиданным визитом [da_vassal_generic.GetName], моего Вассала.\n\nОпасаясь плохих новостей, я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] принимать [Select_CString(da_vassal_generic.IsFemale, 'её', 'его' )] холодно, но [Select_CString(da_vassal_generic.IsFemale, 'узнала', 'узнал' )] из [Select_CString(da_vassal_generic.IsFemale, 'её', 'его' )] слов, что [da_vassal_generic.GetSheHe] [Select_CString(da_vassal_generic.IsFemale, 'пришла', 'пришел' )] с лучшими намерениями.\n\nПо мере того как приятная беседа продолжалась, я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )], что эта добрая душа, у которой обо мне хорошее мнение, [Select_CString(da_vassal_generic.IsFemale, 'хотела', 'хотел' )] внести особое пожертвование в 50 золотых в казну Державы!\n\nТеперь, как мне поступить?"
darkages_vassals.01.opta:0 "С благодарностью принять пожертвование"
darkages_vassals.01.optb:0 "Я хочу бооольше... гораздо бооольше!"
darkages_vassals.01.optc:0 "Вежливо и благородно отказаться"
darkages_vassals.01.tt1:0 "Вы требуете большего от своего Вассала. Успех этого действия частично зависит от вашего высокого навыка [Concept( 'intrigue', 'Интриги' )|E] (>=12), от того, являетесь ли вы [Concept( 'torturer', 'Пыточных дел мастером' )|E] и от вашего высокого [Concept( 'dread', 'Ужаса' )|E] (>=20). Низкий (<10) или, что еще хуже, нулевой [dread|E], а также низкая [Concept( 'intrigue', 'Интрига' )|E] (<8) снизят ваши шансы на успех. Берегитесь, вассал придет в ярость от вашего требования и может принять это как личное оскорбление, что частично зависит от [Select_CString(da_vassal_generic.IsFemale, 'её', 'его' )] свойств и итогового мнения. Риск выше, если вы столкнетесь с [Concept( 'callous', 'Черствым' )|E], [Concept( 'vengeful', 'Мстительным' )|E], [Concept( 'arrogant', 'Заносчивым' )|E], [Concept( 'brave', 'Отважным' )|E] вассалом; риск ниже, если вы столкнетесь с [Concept( 'craven', 'Трусливым' )|E], [Concept( 'forgiving', 'Всепрощающим' )|E], [Concept( 'content', 'Смиренным' )|E] или [Concept( 'compassionate', 'Сострадательным' )|E]\n"
darkages_vassals.01.toast1:0 "Вам удалось заставить [da_vassal_generic.GetFirstName] заплатить 125 золотых!"
darkages_vassals.01.toast2:0 "Вы провалились в своем требовании..."
darkages_vassals.02.t:0 "Жадный господин"
darkages_vassals.02.desc:0 "К сожалению, [da_vassal_generic.GetName] [Select_CString(da_vassal_generic.IsFemale, 'восприняла', 'воспринял' )] моё злоупотребление [Select_CString(da_vassal_generic.IsFemale, 'её', 'его' )] щедростью лично.\nСемена ненависти были посеяны и взращены..."
darkages_vassals.02.opta:0 "У меня появился новый соперник!"
darkages_opinion_despicable_criminal:0 "Презренный преступник"
darkages_opinion_outraged:0 "В ярости"
darkages_vassals.03.t:0 "Единый фронт"
darkages_vassals.03.desc:0 "Недавно мне стало известно, что среди моих вассалов уже некоторое время формируется новая идея в результате бесед между ними, которая может создать значительные проблемы для моего правления.\n\nВ нынешнем положении они хотят сформировать так называемую 'Палату вассалов' для обсуждения интересующих их вопросов и совместных переговоров со мной.\n\nЭто, конечно, является посягательством на мою власть и приведет к ограничению моих действий и дальнейшей деградации моего неоспоримого правления.\n\nУчитывая созданные высокие ожидания, в вариантах, с которыми я сталкиваюсь, нет ничего хорошего..."
darkages_vassals.03.opta:0 "Принять новый политический орган"
darkages_vassals.03.optb:0 "Запретить новый политический орган"
darkages_vassals.03.optc:0 "Обсудить структуру нового политического органа"
darkages_vassals.03.tt1:0 "Вы пытаетесь творчески подойти к переговорам о полномочиях нового органа. Успех этого варианта зависит от вашего высокого навыка [Concept( 'diplomacy', 'Дипломатии' )|E] (>=12), от того, являетесь ли вы [Concept( 'diplomat', 'Дипломатом' )|E], [Concept( 'gregarious', 'Общительным' )|E], [Concept( 'cunning_politician', 'Хитрым политиком' )|E] и [Concept( 'eccentric', 'Эксцентричным' )|E]. Вашей неудаче способствуют низкий навык [Concept( 'diplomacy', 'Дипломатии' )|E] (<8) и свойства [Concept( 'callous', 'Черствый' )|E], [Concept( 'vengeful', 'Мстительный' )|E], [Concept( 'sadistic', 'Садист' )|E] и [Concept( 'arbitrary', 'Самодур' )|E]\n"
darkages_vassals.03.tt2:0 "Все ваши прямые Вассалы придут [Concept( 'outraged', 'В ярость' )|E], получив штраф -40 к их мнению о вас на 20 лет\n"
darkages_vassals.03.toast1:0 "Вы успешно провели переговоры со своими Вассалами!"
darkages_vassals.03.toast2:0 "Вы провалили переговоры со своими Вассалами..."
darkages_vassal_chamber1:0 "Палата вассалов"
darkages_vassal_chamber1_desc:0 "Вассалы этого персонажа сформировали политическое образование для улучшения переговоров по вопросам общего интереса"
darkages_vassal_chamber2:0 "Обговорённая Палата вассалов"
darkages_vassal_chamber2_desc:0 "Вассалы этого персонажа сформировали политическое образование для улучшения переговоров по вопросам общего интереса"
darkages_friend_protected:0 "[CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsFemale, 'защитила', 'защитил' )] честь [TARGET_CHARACTER.GetShortUIName|U] от презренных сверстников."
darkages_vassals.04.t:0 "Баланс сил"
darkages_vassals.04.desc:0 "И снова на очередной встрече со всеми моими вассалами я замечаю, как над [Select_CString(da_vassal_abused.IsFemale, 'несчастной', 'несчастным' )] [da_vassal_abused.GetName] издеваются все [Select_CString(da_vassal_abused.IsFemale, 'её', 'его' )] сверстники, которые нападают на [Select_CString(da_vassal_abused.IsFemale, 'неё', 'него' )], как стая волков, терзающая [Select_CString(da_vassal_abused.IsFemale, 'бедную овечку', 'бедного ягненка' )].\n\nВ последнее время я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] чувствовать, что эта жестокая банда пытается втянуть меня в оскорбления и шутки, отпускаемые за счет [da_vassal_abused.GetFirstName].\n\nСегодня это достигло точки, когда меня загоняют в угол, заставляя определить позицию по этому побочному вопросу, который, ко всему прочему, не продвигает ничью истинную повестку дня..."
darkages_vassals.04.opta:0 "Встать на сторону обиженного вассала"
darkages_vassals.04.optb:0 "Присоединиться к веселью - почти - всех остальных"
darkages_vassals.04.optc:0 "Избежать ситуации"
darkages_vassals.04.optd:0 "Ловко избежать ситуации"
darkages_vassals.04.tt1:0 "Вы галантно встаете на сторону [da_vassal_abused.GetFirstName], защищая [Select_CString(da_vassal_abused.IsFemale, 'её', 'его' )] и давая понять, что не потерпите поведения всех остальных. Помимо показанных эффектов, все остальные ваши Вассалы станут Удрученными вашей позицией\n"
darkages_vassals.04.tt2:0 "Вы высмеиваете [Select_CString(da_vassal_abused.IsFemale, 'несчастную', 'несчастного' )] [da_vassal_abused.GetFirstName], сопереживая всем остальным вашим вассалам. Помимо показанных эффектов, все ваши вассалы, кроме обиженного, будут Впечатлены вашей поддержкой\n"
darkages_vassals.04.tt3:0 "Вы избегаете принятия обязательств и в процессе выглядите слабым как для большинства вассалов, так и для обиженного. Все будут Не впечатлены вашей позицией\n"
darkages_vassals.04.tt4:0 "Этот вариант доступен, потому что вы [Concept( 'shrewd', 'Проницательны' )|E]. Вы умело избегаете принятия обязательств в этом вопросе и даете серьезный отпор всем, который точно попал в цель\n"
darkages_vassals.05.t:0 "Барабаны войны"
darkages_vassals.05.desc:0 "Сегодня рано вечером я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие от моих вассалов, что они хотят заключить со мной соглашение, по которому они предоставят мне гораздо большее количество ополченцев на долгий срок в обмен на авансовый платеж им для финансирования их проектов.\n\nСейчас уже поздняя ночь, и решение, которое я собираюсь принять, не дает мне спать.\nЧто мне делать?"
darkages_vassals.05.opta:0 "Принять предложение"
darkages_vassals.05.optb:0 "Обсудить его"
darkages_vassals.05.optc:0 "Форсировать событие"
darkages_vassals.05.optd:0 "Отказаться от всей затеи"
darkages_vassals.05.tt1:0 "Вы обсуждаете предложение и заплатите максимум 10 золотых. Успех этого варианта зависит от вашего хорошего навыка [Concept( 'diplomacy', 'Дипломатии' )|E] (>=12), от того, являетесь ли вы [Concept( 'shrewd', 'Проницательным' )|E], [Concept( 'diplomat', 'Дипломатом' )|E] и [Concept( 'gregarious', 'Общительным' )|E]. Низкий навык [Concept( 'diplomacy', 'Дипломатии' )|E] (<8) помешает вашим шансам, и если вы потерпите неудачу в переговорах, мнение ваших Вассалов о вас ухудшится\n"
darkages_vassals.05.tt2:0 "Вы обсуждаете предложение и заплатите максимум 25 золотых. Успех этого варианта зависит от вашего хорошего навыка [Concept( 'diplomacy', 'Дипломатии' )|E] (>=12), от того, являетесь ли вы [Concept( 'shrewd', 'Проницательным' )|E], [Concept( 'diplomat', 'Дипломатом' )|E] и [Concept( 'gregarious', 'Общительным' )|E]. Низкий навык [Concept( 'diplomacy', 'Дипломатии' )|E] (<8) помешает вашим шансам, и если вы потерпите неудачу в переговорах, мнение ваших Вассалов о вас ухудшится\n"
darkages_vassals.05.tt3:0 "Вы обсуждаете предложение и заплатите максимум 40 золотых. Успех этого варианта зависит от вашего хорошего навыка [Concept( 'diplomacy', 'Дипломатии' )|E] (>=12), от того, являетесь ли вы [Concept( 'shrewd', 'Проницательным' )|E], [Concept( 'diplomat', 'Дипломатом' )|E] и [Concept( 'gregarious', 'Общительным' )|E]. Низкий навык [Concept( 'diplomacy', 'Дипломатии' )|E] (<8) помешает вашим шансам, и если вы потерпите неудачу в переговорах, мнение ваших Вассалов о вас ухудшится\n"
darkages_vassals.05.tt4:0 "Вы обсуждаете предложение и заплатите максимум 65 золотых. Успех этого варианта зависит от вашего хорошего навыка [Concept( 'diplomacy', 'Дипломатии' )|E] (>=12), от того, являетесь ли вы [Concept( 'shrewd', 'Проницательным' )|E], [Concept( 'diplomat', 'Дипломатом' )|E] и [Concept( 'gregarious', 'Общительным' )|E]. Низкий навык [Concept( 'diplomacy', 'Дипломатии' )|E] (<8) помешает вашим шансам, и если вы потерпите неудачу в переговорах, мнение ваших Вассалов о вас ухудшится\n"
darkages_vassals.05.tt5:0 "Вы обсуждаете предложение и заплатите максимум 90 золотых. Успех этого варианта зависит от вашего хорошего навыка [Concept( 'diplomacy', 'Дипломатии' )|E] (>=12), от того, являетесь ли вы [Concept( 'shrewd', 'Проницательным' )|E], [Concept( 'diplomat', 'Дипломатом' )|E] и [Concept( 'gregarious', 'Общительным' )|E]. Низкий навык [Concept( 'diplomacy', 'Дипломатии' )|E] (<8) помешает вашим шансам, и если вы потерпите неудачу в переговорах, мнение ваших Вассалов о вас ухудшится\n"
darkages_vassals.05.tt6:0 "Вы обсуждаете предложение и заплатите максимум 135 золотых. Успех этого варианта зависит от вашего хорошего навыка [Concept( 'diplomacy', 'Дипломатии' )|E] (>=12), от того, являетесь ли вы [Concept( 'shrewd', 'Проницательным' )|E], [Concept( 'diplomat', 'Дипломатом' )|E] и [Concept( 'gregarious', 'Общительным' )|E]. Низкий навык [Concept( 'diplomacy', 'Дипломатии' )|E] (<8) помешает вашим шансам, и если вы потерпите неудачу в переговорах, мнение ваших Вассалов о вас ухудшится\n"
darkages_vassals.05.tt7:0 "Этот вариант доступен только потому, что ваш [Concept( 'dread', 'Ужас' )|E] составляет не менее 20. Вы пытаетесь запугать своих Вассалов, чтобы они предоставили дополнительные ополчения без компенсации. Успех этого варианта зависит от вашего хорошего навыка [Concept( 'intrigue', 'Интриги' )|E] (>=12) и от того, являетесь ли вы [Concept( 'torturer', 'Пыточных дел мастером' )|E], [Concept( 'vengeful', 'Мстительным' )|E] или [Concept( 'callous', 'Черствым' )|E]. Низкий навык [Concept( 'intrigue', 'Интриги' )|E] (<8) будет способствовать провалу этого варианта. В случае неудачи ваши Вассалы придут в [Concept( 'enraged', 'Ярость' )|E] на вас, и вас ждет потеря [Concept( 'prestige', 'Престижа' )|E], а также [Concept( 'dread', 'Ужаса' )|E]. Берегитесь, этот вариант может с треском провалиться\n"
darkages_vassals.05.toast1:0 "Вам удалось заключить отличную сделку со своими вассалами!"
darkages_vassals.05.toast2:0 "Вы провалили переговоры со своими вассалами..."
darkages_vassals.05.toast3:0 "Вы запугали своих вассалов, заставив их дать вам ополчение!"
darkages_vassals.05.toast4:0 "Вам не удалось запугать своих вассалов, и вы выглядите смешным и слабым..."
darkages_vassals.06.t:0 "Избиение"
darkages_vassals.06.desc:0 "Сегодня, когда я посещал псарню один и уверенный в собственной безопасности, несколько личностей, прячущихся в тени, напали на меня с дубинками и оставили меня тяжело [Select_CString(ROOT.Char.IsFemale, 'раненой', 'раненным' )]... когда я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] понять, что происходит, один из головорезов прошептал мне на ухо:\n\n'Перестань запугивать своих добрых и хороших вассалов... иначе самые изобретательные из них могут окончательно преподать урок сегодня.'"
darkages_vassals.06.opta:0 "Ай!"
darkages_vassals_levy_improvements1:0 "Расширенное ополчение"
darkages_vassals_levy_improvements1_desc:0 "Вассалы этого персонажа предложили возможность значительно увеличить доступное ополчение"
darkages_vassals_levy_improvements2:0 "Расширенное ополчение"
darkages_vassals_levy_improvements2_desc:0 "Вассалы этого персонажа предложили возможность существенно увеличить доступное ополчение"
darkages_vassal_economic_plan:0 "Всеобъемлющий экономический план"
darkages_vassal_economic_plan_desc:0 "Один из вассалов Державы придумал очень эффективный экономический план"
darkages_vassals.07.t:0 "Генеральный план [da_vassal_planner.GetFirstName]"
darkages_vassals.07.desc:0 "Недавно ко мне в Совет [Select_CString(da_vassal_planner.IsFemale, 'обратилась', 'обратился' )] [da_vassal_planner.GetName], мой Вассал, с амбициозным и разумным планом развития всей моей Державы.\n\nВероятно, мне следовало бы радоваться этому вкладу, но дерзкий характер моего Вассала [Select_CString(da_vassal_planner.IsFemale, 'преподнесла', 'преподнес' )] этот план за мой счет с точки зрения [Concept( 'prestige', 'Престижа' )|E] и [legitimacy|E].\n\nВ конце концов, я стою перед трудным решением: отдать предпочтение улучшению всей моей Державы или моему собственному политическому положению..."
darkages_vassals.07.opta:0 "Согласиться с планом"
darkages_vassals.07.optb:0 "Наложить вето на план"
