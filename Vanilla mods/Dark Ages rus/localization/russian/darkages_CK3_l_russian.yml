darkages_opinion_wise:0 "Wise"
darkages_landless_medley.31.t:0 "Love Story"
darkages_landless_medley.31.desc:0 "While I was strolling along my camp one morning, I was approached by [darkages_follower_inlove.GetName] with an esquisite request.\n\nAs it turns out, he is deep in love with one [darkages_lover.GetName] and intends to bring his lover to the camp.\n\nWhile in principle I have nothing against this state of affairs, it seems most of my followers think she brings ill luck for our plans.\n\nNow I need to make a choice between the two lovers and the poor opinion and morale their relatioship will bring to my camp..."
darkages_landless_medley.31.opta:0 "What a beautiful tale of love!"
darkages_landless_medley.31.optb:0 "Our operation stands first and foremost!"
darkages_landless_medley.31.tt1:0 "You allow the two sweet lovers to organize their life among the party. Given their superstition, part of your followers will think pretty badly about you permanently\n"
darkages_landless_medley.31.tt2:0 "You forbid [darkages_follower_inlove.GetName] from marrying [darkages_lover.GetName] and join your camp. [darkages_follower_inlove.GetName] will make a decision about staying with you or abandoning everything for his love. The same superstitious followers will approve your behavior\n"
custom.every_courtier.limit1:0 "Every [courtier|E] that is not Loyal"
custom.every_vassal.limit1:0 "Every [vassal|E] that is not Loyal"
darkages_landless_medley.32.t:0 "The Runaway"
darkages_landless_medley.32.desc:0 "As we were settling for the night around the campfire, a silhouette appeared in the dark, lean, confident and assertive.\n\nAfter a small awkward moment, [darkages_runaway.GetSheHe] proceeded to present [darkages_runaway.GetHerHim]self: [darkages_runaway.GetName] was [darkages_runaway.GetHerHis] name and [darkages_runaway.GetSheHe] was a runaway from the dungeons of [darkages_ruler.GetName].\n\nAt this time I perfectly recalled words that passed about a very dangerous criminal that had escaped from [darkages_ruler.GetFirstName]'s prison recently.\n\nUnabated by our reserve, [darkages_runaway.GetName] proceeded to offer [darkages_runaway.GetHerHis] services in exchange for our protection or at the very least, our help in [darkages_runaway.GetHerHis] escape.\nWith a menacing stance, [darkages_runaway.GetSheHe] awaits for my final word..."
darkages_landless_medley.32.opta:0 "Welcome [darkages_runaway.GetHerHim] to the camp"
darkages_landless_medley.32.optb:0 "Attempt to capture [darkages_runaway.GetName]"
darkages_landless_medley.32.optc:0 "Provide help in [darkages_runaway.GetHerHis] escape"
darkages_landless_medley.32.tt1:0 "The success of this action depends positively on your Above Average or better Intrigue (>=12) and on your Traits Deceitful, Torturer and Seducer. Negatively impacting your chances are you Below Average or worse Intrigue and your Traits Honest and Trusting as well as the runaway Trait Paranoid\n" 
darkages_landless_medley.32.tt2:0 "[darkages_runaway.GetName] pays you some gold in exchange for your help\n"
darkages_landless_medley.33.t:0 "[darkages_runaway.GetName] Captured!"
darkages_landless_medley.33.desc:0 "With a skillful display of Intrigue and cold blood, I was able to capture the dangerous bandit!\n\n[darkages_ruler.GetName] is very willing to pay a price for [darkages_runaway.GetHerHis] head!"
darkages_landless_medley.33.opta:0 "A good deed, indeed!"
darkages_landless_medley.34.t:0 "A Fateful Decision"
darkages_landless_medley.34.desc:0 "Unfortunately [darkages_runaway.GetName] soon understood we were set to capture [darkages_runaway.GetHerHim] and was quick to react and escape. Worse still, my brave follower, [darkages_follower.GetName], attempted to grab [darkages_runaway.GetHerHim] but was quickly killed with a dagger through [darkages_follower.GetHerHis] throat..."
darkages_landless_medley.34.opta:0 "Poor [darkages_follower.GetName]..."
darkages_landless_medley.35.t:0 "Life on the Line"
darkages_landless_medley.35.desc:0 ""Unfortunately [darkages_runaway.GetName] soon understood we were set to capture [darkages_runaway.GetHerHim] and was quick to react and escape.\n\nAs I stood between [darkages_runaway.GetHerHim] and safety, [darkages_runaway.GetSheHe] attacked me mercilessly..."
darkages_landless_medley.35.opta:0 "Now for the moment of truth!"
darkages_landless_medley.35.tt1:0 "Your chances of survival depend on your High Prowess (>=10) and on the presence of one or even better, two bodyguards. [darkages_runaway.GetName]'s own High Prowess (>=10) will weight against your chances"
darkages_landless_medley.35.tt2:0 "You escaped injury!"
darkages_landless_medley.35.toast1:0 "You escaped injury!"
darkages_landless_medley.35.toast2:0 "You were wounded!"
darkages_landless_medley.35.toast3:0 "You were killed..."
darkages_landless_medley.36.t:0 "A Rascal 'till the End"
darkages_landless_medley.36.desc:0 "Today at night we noticed [darkages_runaway.GetName] was missing. The bad news were just starting to come. Unfortunately soon it became apparent that we were robbed by that thief!\n\nHow I lament the way I helped that scum by allowing [darkages_runaway.GetHerHim] to join us a few months back..."
darkages_landless_medley.36.opta:0 "I was naive..."
darkages_opinion_naive:0 "Naive"
custom.every_follower.limit12:0 "Every [courtier|E]"
darkages_conflicting_followers:0 "Conflicting Followers"
darkages_conflicting_followers_desc:0 "The followers of this character ressent the lack of support given to them"
darkages_plus_dip:0 "Diplomatic Tuition"
darkages_plus_dip_desc:0 "This character attended successfully lessons of Diplomacy"
darkages_plus_mar:0 "Martial Tuition"
darkages_plus_mar_desc:0 "This character attended successfully lessons of Martial"
darkages_plus_ste:0 "Stewardship Tuition"
darkages_plus_ste_desc:0 "This character attended successfully lessons of Stewardship"
darkages_plus_int:0 "Intrigue Tuition"
darkages_plus_int_desc:0 "This character attended successfully lessons of Intrigue"
darkages_plus_lea:0 "Learning Tuition"
darkages_plus_lea_desc:0 "This character attended successfully lessons of Learning"
darkages_plus_overall:0 "General Tuition"
darkages_plus_overall_desc:0 "This character paid for the followers to learn an area of expertise and benefitted in the process, too"
darkages_landless_medley.37.t:0 "A Little Bit of Knowledge"
darkages_landless_medley.37.desc:0 "Today, after some of my followers returned from the nearest town, they were quite enthusiastic about meeting there a renowned savant who offered to teach them about his areas of expertise... for a fee, of course.\n\nNow I have all the camp agitated by this prospect and it is clear my own followers want very much this tutoring.\n\nWhether I will greenlight their plans is up to me, of course..."
darkages_landless_medley.37.opta:0 "Mentor everyone in Diplomacy"
darkages_landless_medley.37.optb:0 "Mentor everyone in Warfare"
darkages_landless_medley.37.optc:0 "Mentor everyone in Management"
darkages_landless_medley.37.optd:0 "Mentor everyone in Subterfuge"
darkages_landless_medley.37.opte:0 "Mentor everyone in Philosophy"
darkages_landless_medley.37.optf:0 "Forget the silly notion!"
darkages_landless_medley.37.tt1:0 "The success of this chance for each adult, non prisioner, non incapable follower depends on his or her Above Average or better Learning Skill and on the Traits Diligent, Ambitious and Shrewd. Negatively impacting the chances of each follower are his or her Below Average or worse Learning Skill and the Traits Lazy, Content and Dull\n"
darkages_landless_medley.38.t:0 "The Class of Followers"
darkages_landless_medley.38.desc:0 "After the renowned tutor spent several weeks with my followers, it is time to check who will benefit from his teachings."
darkages_landless_medley.38.opta:0 "Hopefully a large number profited from my largesse..."
darkages_opinion_despair:0 "Despair"
darkages_opinion_uneasy:0 "Uneasy"
darkages_landless_medley.39.t:0 "It's the End of the World..."
darkages_landless_medley.39.desc:0 "Today a stranger approached our camp and I immediately sensed trouble on the horizon.\n\nAs it stands, this person is a self styled prophet who claims the end of the world is near.\n\nTo his credit, he displays a certain command of the language and can be very persuasive. I look around and see several followers deeply entranced by the prophet's sentences.\n\nCertainly, this will have a poor effect on my followers..."
darkages_landless_medley.39.opta:0 "I'll use my Diplomacy to discredit the 'prophet'"
darkages_landless_medley.39.optb:0 "I'll use my Learning to bash his arguments"
darkages_landless_medley.39.optc:0 "I'll kill this self styled 'prophet'"
darkages_landless_medley.39.optd:0 "I'll just let it pass"
darkages_landless_medley.39.tt1:0 "Increasing your chances of being successful are your Above Average or better Diplomacy (>=12), and your Traits Gregarious, Fickle and Shrewd. Hindering your chances are your Below Average or worse Diplomacy (<8) and your Traits Stubborn, Eccentric and Dull\n"
darkages_landless_medley.39.tt2:0 "Increasing your chances of being successful are your Above Average or better Learning (>=12), and your Traits Shy, Zealous and Shrewd. Hindering your chances are your Below Average or worse Learning and your Traits Cynical, Impatient and Dull. This option has a slightly better base chance of success than the previous one\n"
darkages_landless_medley.39.tt3:0 "You attempt to kill the prick. Success depends positively on your traits Callous, Vengeful, Wrathful and Torturer as well as in your high Prowess or better (>= 10). Lowering your chances are the Traits Compassionate, Forgiving and Craven as well as your Low Prowess (<6)\n"
darkages_landless_medley.39.tt4:0 "Not willing to risk some bad outcome, you will just let the whole thing pass. Your followers with less than 8 Learning will be very highly affected while your followers with average Learning (8-11) will be somewhat affected by the prophet's words\n"
darkages_landless_medley.39.toast1:0 "You killed the 'Prophet' and use the fact to prove he was fake!"
darkages_landless_medley.39.toast2:0 "You failed to kill the prophet... bad things will happen..."
darkages_landless_medley.40.t:0 "Success!"
darkages_landless_medley.40.desc:0 "I managed to outwit the 'prophet', exposing him as the fraud he is!\nMy followers see through his lies while my Piety and Prestige soars!\n\nIn the end, diminished in authority, the con man leaves silently my camp, head low in shame."
darkages_landless_medley.40.opta:0 "Bravo!"
darkages_landless_medley.40.tt1:0 "Your most savvy courtiers (Learning >=12) particularly appreciate your display and react accordingly\n"
darkages_landless_medley.41.t:0 "Failure..."
darkages_landless_medley.41.desc:0 "Unfortunately I was outwitted and outsmarted by the so called 'prophet' and looked completely out of my water during the argument.\n\nGrasping at straws and seething inside, I ended up being silenced by everybody's calls..."
darkages_landless_medley.41.opta:0 "A poor show..."
darkages_landless_medley.41.tt1:0 "My Prestige and Piety suffer heavily while my followers reaction turns against me: The less endowed ones (Learning < 12) became Enraged while all the rest became Wary\n"
darkages_landless_medley.42.t:0 "Prophet Escaped!"
darkages_landless_medley.42.desc:0 "Unfortunately I fumbled with my dagger and the prophet ran away in the night to his safety!\n\nEveryone in the camp is now buying the prophet's story about the end of the world and will be in Despair about it. People blame me for the attack and for the ill omen that now may befall my group...\n"
darkages_landless_medley.42.opta:0 "What a bunch of gullible fools!"
darkages_opinion_disapproval:0 "Disapproval"
darkages_landless_medley.43.t:0 "A Meaningful Recommendation"
darkages_landless_medley.43.desc:0 "As I was strolling along my camp in the morning, I was suddenly interrupted by [darkages_courtier.GetName] who claimed [darkages_courtier.GetSheHe] had an important resquest to make.\n\nAfter a lengthy explanation, it was apparent my follower wanted my positive relation with [darkages_ruler.GetName] was put to good use in order to allow a relative of [darkages_courtier.GetHerHim] to be allowed into the court of [darkages_ruler.GetFirstName].\n\n[darkages_courtier.GetName] continued by summoning an heavy purse with shinning gold coins inside asking me to deliver it to [darkages_ruler.GetFirstName] to 'grease the cogs' and help reaching a successful result..."
darkages_landless_medley.43.opta:0 "I kindly smile and accept the request"
darkages_landless_medley.43.optb:0 "I accept the request but keep the gold for myself"
darkages_landless_medley.43.optc:0 "I flatly refuse the request"
darkages_landless_medley.43.tt1:0 "The base chance of success is affected positively bu my Above Average or better Diplomacy (>=12) and by my traits Cunning Politician, Diplomat, Gregarious and Calm. Lowering my chances of success are my Below Average or worse Diplomacy (<8) and my Traits Wrathful, Impatient and Deceitful\n"
darkages_landless_medley.43.tt2:0 "The chance of success of this option is lower than the previous option and the factors affecting it are exactly the same. While the base chances are low, this path might lead to a political disaster inside and outside the camp. Monitor closely the personality of [darkages_courtier.GetName]. Characters versed in Intrigue might raise the risks\n"
darkages_landless_medley.44.t:0 "A Most Successful Outcome!"
darkages_landless_medley.44.desc:0 "After presenting the relative of [darkages_courtier.GetName] to [darkages_ruler.GetName] while performing some backroom dealing with the ruler, I was able to secure a position in [darkages_ruler.GetHerHis] Court.\n\nAll parties seem to be happy with my services and I can count with another political victory to my cause!"
darkages_landless_medley.44.opta:0 "My silver tongue is shinning!"
darkages_landless_medley.45.t:0 "An Undesired Outcome!"
darkages_landless_medley.45.desc:0 "After presenting the relative of [darkages_courtier.GetName] to [darkages_ruler.GetName] while performing some backroom dealing with the ruler, it became apparent I was out of my water with my arguments.\n\nUnfortunately all parties concerned ended up aggrieved with my performance..."
darkages_landless_medley.45.opta:0 "I tried my best..."
darkages_landless_medley.46.t:0 "A Political Disaster!"
darkages_landless_medley.46.desc:0 "As I pocketed the gold given by [darkages_courtier.GetName] to further [darkages_courtier.GetHerHis] relative position in the Court of [darkages_ruler.GetName], I forgot the issue until it raised its ugly head today.\n\nAs it turned out [darkages_courtier.GetName] made some discreet inquiries and reached the conclusion the gold given to me did not reach [darkages_ruler.GetName].\n\nWorse still, my titled acquaintance was warned of my stealing, while the news of my indecent behaviour spread like fire in a haystack across my followers..."
darkages_landless_medley.46.opta:0 "Oh no!"
darkages_county_streamlined_management:0 "Streamlined Management"
darkages_county_streamlined_management_desc:0 "A talented aventurer devised a sound economic plan for this County"
darkages_rival_cheat_ledgers:0 "[TARGET_CHARACTER.GetShortUIName|U] cheated [CHARACTER.GetShortUIName] by manipulating the Realm's ledgers."
darkages_landless_medley.47.t:0 "Economic Accumen"
darkages_landless_medley.47.desc:0 "During my travels around the geography where my party is operating, I came to meet [darkages_lord.GetName] and after some pleasant tea and biscuits our conversation turned to more serious matters.\n\nWith merit or not, my talk about properly managing the ledgers of my operation impressed [darkages_lord.GetFirstName] and [darkages_lord.GetSheHe] decided to ask me if I could overhaul [darkages_lord.GetHerHis] accountancy books in order to improve the economic outlook of [darkages_lord.GetHerHis] Realm.\n\nI need to think over the challenge ahead."
darkages_landless_medley.47.opta:0 "Attempt to deliver a cautious plan"
darkages_landless_medley.47.optb:0 "Attempt to summon something more radical"
darkages_landless_medley.47.optc:0 "Attempt to steal by fudging the ledgers"
darkages_landless_medley.47.optd:0 "Refuse to help"
darkages_landless_medley.47.tt1:0 "The success of this option depends positively on your Above Average or better Stewardship (>=12) and on your Traits Diligent, Ambitious, Administrator and Cunning Politician. Working against your success are the Below Average or worse Stewardship (<8) and the Traits Lazy, Content and Stubborn\n"
darkages_landless_medley.47.tt2:0 "The base chances of success of this option are lower than the previous one. The success of this option depends positively on your Above Average or better Stewardship (>=12) and on your Traits Eccentric, Fickle, Shrewd, Architect and Cunning Politician. Working against your success are the Below Average or worse Stewardship (<8) and the Traits Temperate, Paranoid, Cynical and Dull\n"
darkages_landless_medley.47.tt3:0 "The base chances of success of this option are the lowest of all. The success of this option depends positively on your Above Average or better Intrigue (>=12) and on your Traits Deceitful, Arbitrary, Greedy, Callous and Avaricious. Working against your success are the Below Average or worse Intrigue (<8) and the Traits Honest, Just, Generous and Trusting\n"
darkages_landless_medley.48.t:0 "A Comprehensive Economic Plan"
darkages_landless_medley.48.desc:0 "After delving into the books and numbers of the Realm of [darkages_lord.GetName], I was able to streamline processes, cut bureaucracy and improve efficiency.\n\nIt is with pleasure that I can say I performed a stellar job!"
darkages_landless_medley.48.opta:0 "Very, very good!"
darkages_landless_medley.49.t:0 "A Failed Help"
darkages_landless_medley.49.desc:0 "After delving into the books and numbers of the Realm of [darkages_lord.GetName], I was unable to improve the economic situation of his holdings.\n\nUnfortunately, I need to face my own failure..."
darkages_landless_medley.49.opta:0 "...not good!"
darkages_landless_medley.50.t:0 "Scheme Discovered!"
darkages_landless_medley.50.desc:0 "My creative accounting about the books and ledgers of the Realm of [darkages_lord.GetName] was discovered and [darkages_lord.GetHerHis] reaction was swift... and dangerous.\n\nAs I was riding my horse close to our encampment, I was assaulted by two men with the intent on killing me. Unfortunately, not employing any bodyguards, I was alone at the time..."
darkages_landless_medley.50.desc1:0 "My creative accounting about the books and ledgers of the Realm of [darkages_lord.GetName] was discovered and [darkages_lord.GetHerHis] reaction was swift... and dangerous.\n\nAs I was riding my horse close to our encampment, I was assaulted by two men with the intent on killing me. Fortunately, my bodyguard grants me a measure of protection..."
darkages_landless_medley.50.desc2:0 "My creative accounting about the books and ledgers of the Realm of [darkages_lord.GetName] was discovered and [darkages_lord.GetHerHis] reaction was swift... and dangerous.\n\nAs I was riding my horse close to our encampment, I was assaulted by two men with the intent on killing me. Fortunately, both my bodyguards grants me a measure of protection..."
darkages_landless_medley.50.opta:0 "My life is in danger!"
darkages_landless_medley.50.tt1:0 "Above Average or better Prowess (>=10) will decrease your chances of being killed. The existence of one or even better two bodyguards also improve your odds. Also your Above Average Intrigue (>=12) contribute to your survival. Finally and concerning positive modifiers, the Paranoid Trait also confers protection. Working against your chances are your Below Average Prowess (<6), Below Average Intrigue (<8) and the trait Trusting\n"
darkages_landless_medley.51.t:0 "A Meaningful Farewell"
darkages_landless_medley.51.desc:0 "Today at night, as I was smothering the embers of the campfire, [darkages_follower.GetName] approaches me and simply states [darkages_follower.GetSheHe] desires to quit the camp and move on with [darkages_follower.GetHerHis] life.\n\nI naturally probed [darkages_follower.GetHerHim] about [darkages_follower.GetHerHis] motives and was greeted by an array of reasons, ranging from the philosophical to the practical ones.\n\nNow I need to decide what to do, as [darkages_follower.GetName] is clearly a valuable member of my band of followers..."
darkages_landless_medley.51.opta:0 "Accept [darkages_follower.GetHerHis] decision"
darkages_landless_medley.51.optb:0 "Use personal management skills to persuade [darkages_follower.GetHerHim] to stay"
darkages_landless_medley.51.optc:0 "Engage [darkages_follower.GetName] in a philosophical discussion"
darkages_landless_medley.51.optd:0 "Ask [darkages_follower.GetHerHim] to state [darkages_follower.GetHerHis] price"
darkages_landless_medley.51.tt1:0 "All your followers that have a positive opinion of [darkages_follower.GetName] will suffer an Opinion penalty with you\n"
darkages_landless_medley.51.tt2:0 "The success of this option will depend positively on your Above Average or better (>=12) Stewardship Skill and on your traits Gregarious, Fickle, Temperate and Calm. Negatively influencing your success chances are you Below Average or worse (<8) Stewardship Skill and your traits Wrathful, Deceitful, Arbitrary and Cynical\n"
darkages_landless_medley.51.tt3:0 "The success of this option will depend positively on your Above Average or better (>=12) Learning Skill, as well as on [darkages_follower.GetName] Below Average or worse (<8) Learning Skill and on your traits Cynical, Eccentric, Patient and Shy. Negatively influencing your success chances are you Below Average or worse (<8) Learning Skill, as well as [darkages_follower.GetName] Above Average or better Learning Skill (>=12) and your traits Stubborn, Deceitful, Arbitrary and Zealous\n"
darkages_landless_medley.52.t:0 "Bridging Our Differences"
darkages_landless_medley.52.desc:0 "Due to my strong argumentative capabilities, I was able to persuade [darkages_follower.GetName] to stay in my band!"
darkages_landless_medley.52.opta:0 "Good news!"
darkages_landless_medley.53.t:0 "A Bridge Too Far"
darkages_landless_medley.53.desc:0 "In spite of my attempts to persuade [darkages_follower.GetName], [darkages_follower.GetSheHe] was not affected by my words and in the end kept [darkages_follower.GetHerHis] decision to move out of my camp.\n\nWith a heavy heart I observed [darkages_follower.GetHerHim] packing [darkages_follower.GetHerHis] belongings and disappear in the night..."
darkages_landless_medley.53.opta:0 "Unfortunately..."
darkages_poor_negotiator:0 "Poor Negotiator"
darkages_poor_negotiator_desc:0 "This character was unable to reach an important deal"
darkages_landless_medley.54.t:0 "A Tempting Offer"
darkages_landless_medley.54.desc:0 "Today I met an envoy from the 'Merciless Firebrands', a rival band from a nearby home base. After some backroom deal with [darkages_follower.GetName], my follower, this band offers me an amount of gold for [darkages_follower.GetHerHis] departure from my band to join theirs.\n\nThis offer is being done because [darkages_follower.GetName] insists I need to be compensated for the loss, even if [darkages_follower.GetSheHe] has been only mildly interested in the offer.\n\nI need now to decide how shall I proceed..."
darkages_landless_medley.54.opta:0 "Accept the offer"
darkages_landless_medley.54.optb:0 "Ask for more gold"
darkages_landless_medley.54.optc:0 "Refuse the offer"
darkages_landless_medley.54.tt1:0 "Without modifiers the probabilites for success are not bright. The success of this action depends positively on your Above Average or better (>=12) Stewardship and on your Traits Greedy, Diligent, Ambitious, Shrewd and Avaricious. Negvatively affecting the outcome is your Below Average (<8) or worse Stewardship and your trait Dull\n"
darkages_landless_medley.54.tt2:0 "You refuse the offer and [darkages_follower.GetName] accepts it without issues. Your other followers that have a negative opinion of [darkages_follower.GetHerHim] however have strong feelings about not getting rid of an unwelcome presence\n"
darkages_landless_medley.54.toast1:0 "The negotiation was successful!"
darkages_landless_medley.54.toast2:0 "The negotiation lead to nowhere..."
darkages_benefits.01.t:0 "The Fruits of Abundance"
darkages_benefits.01.desc:0 "As befits the imperiousness of our form of Government, a special source of income is made available directly from our esteemed Suserain, [darkages_topliege.GetName].\n\nIt is with a grateful spirit that we reap the harvest of our political superiority!"
darkages_benefits.01.opta:0 "Good news!"
darkages_benefits.01.tt1:0 "As your Government is Celestial and you are a Vassal, you can expect special dividends to be granted by [darkages_topliege.GetName] every 5 years\n"
darkages_benefits.01.tt2:0 "As your Government is Administrative and you are a Vassal, you can expect special dividends to be granted by [darkages_topliege.GetName] every 5 years\n"
darkages_benefits.01.tt3:0 "As your Government is Meritocratic and you are a Vassal, you can expect special dividends to be granted by [darkages_topliege.GetName] every 5 years\n"
darkages_benefits.01.tt4:0 "As your Government is Mandala and you are a Vassal, you can expect special dividends to be granted by [darkages_topliege.GetName] every 5 years\n"
darkages_landless_murders.01.tt:0 "While you are warned about who might have ordered the murder, you must find proof of it... if you survive. As it is, any adult Follower with at most -29 opinion of you and one of the following traits: Wrathful, Callous, Sadistic, Paranoid or Vengeful and while not being Compassionate, Forgiving or Generous may try an attempt on your life. With luck playing a defining role, your high Prowess, your high Intrigue, if you have an Intrigue Education or if you follow an Intrigue lifestyle might save you. Conversely, a low Prowess and low Intrigue only serve to condemn you further...\n"
darkages_landless_murders.01.desc:0 "One evening, as I stroll alone climbing a small hill close to my camp, I sense [killer.GetName] approaching with a smile on [killer.GetHerHis] face saluting me. Strangely, I sense something odd about [killer.GetHerHim].\n\nAs I turned to observe a particular tree, a menacing shadow moves towards me with a dagger ready to stab my back!\n\nIn the nick of the moment, while trying to defend myself, I got a flashback of [killer.GetName] and [killer.GetHerHis] serene but guilty smile on [killer.GetHerHis] face..."
darkages_landless_murders.02.desc:0 "One day, while strolling at night close to my campfire to relax a bit, suddenly a dark figure came out from the shadows of a small, decrepit house and swiftly tried to stab me with what I clearly see is a poisoned dagger.\n\nWhile looking at the danger approaching with horror, my intuition tells me this is the work of my hated enemy, [target_rival.GetName]..."
darkages_landless_murders.02.desc2:0 "One day, while strolling at night close to my campfire to relax a bit, enjoying as company my bodyguard, suddenly a dark figure came out from the shadows of a small, decrepit house and swiftly tried to stab me with what I clearly see is a poisoned dagger.\n\nWhile looking at the danger approaching with horror, my intuition tells me this is the work of my hated enemy, [target_rival.GetName]..."
darkages_landless_murders.02.desc3:0 "One day, while strolling at night close to my campfire to relax a bit, enjoying as company both my bodyguards, suddenly a dark figure came out from the shadows of a small, decrepit house and swiftly tried to stab me with what I clearly see is a poisoned dagger.\n\nWhile looking at the danger approaching with horror, my intuition tells me this is the work of my hated enemy, [target_rival.GetName]..."
darkages_landless_murders.04.desc:0 "Unfortunately the terror I inspire on others turned against me and has as a direct consequence an insidious action from someone who decided to get rid of me once and for all.\n\nAs such and while at night, while I am resting in my spacious tent, a vicious shadow materializes swiftly approaching me, its intent perfectly clear: My life."
darkages_landless_murders.04.desc2:0 "Unfortunately the terror I inspire on others turned against me and has as a direct consequence an insidious action from someone who decided to get rid of me once and for all.\n\nAs such and while at night, while I am resting in my spacious tent, a vicious shadow materializes swiftly approaching me, its intent perfectly clear: My life.\n\nFortunately, my bodyguard is close to me and offers some protection..."
darkages_landless_murders.04.desc3:0 "Unfortunately the terror I inspire on others turned against me and has as a direct consequence an insidious action from someone who decided to get rid of me once and for all.\n\nAs such and while at night, while I am resting in my spacious tent, a vicious shadow materializes swiftly approaching me, its intent perfectly clear: My life.\n\nFortunately, my bodyguards are close to me and offer significant protection..."
darkages_landless_murders.04.opta:0 "ALARM!!!!"
darkages_landless_murders.04.tt:0 "This event might happen if your Dread is higher than 49. If you have poor Intrigue (less than 8) or poor Prowess (less than 6) you suffer a penalty on your chances of survival. If you have high Intrigue (at least 12) or high Prowess (more than 9) you gain a bonus on your chances of survival, depending on your scores - the higher, the better\n"
darkages_landless_murders.05.tt:0 "You will fight the party of assassins, trying to defeat the threat they pose while catching them by surprise with you attack. Having an high Prowess is paramount to lower the chances of your demise. Having bodyguards available grant you bonuses.\nYou suffered this event because your character is either Wrathful, Vengeful, Sadistic, Deceitful, Paranoid, Arbitrary, Disloyal or Callous. The more of these traits your character has, the bigger the chance of the event happening\n"
darkages_landless_murders.05.tt2:0 "You will try to hide in the shadows, running away from the scene while any bodyguards you might have provide a diversion to keep you safer. The success of this action depends on both your Intrigue, as well as on your Prowess. Having bodyguards available grant you bonuses.\nYou suffered this event because your character is either Wrathful, Vengeful, Sadistic, Deceitful, Paranoid, Arbitrary, Disloyal or Callous. The more of these traits your character has, the bigger the chance of the event happening\n"
darkages_landless_murders.05.t:0 "Tainted Personality"
darkages_landless_murders.05.desc:0 "While resting at night close to my camp, in my favourite spot near a great tree, I managed to hear a minor ruffle nor far from me.\n\nSome instants later I began to realize something was amiss.\n\nMy misgivings gave way to alarm when I sensed a few shadows almost at arms length. My inner self told me this had all the hallmarks of a murder attempt. On ME.\n\nQuickly I..."
darkages_landless_murders.05.desc2:0 "While resting at night close to my camp, in my favourite spot, near a great tree, I managed to hear a minor ruffle nor far from me.\n\nSome instants later I began to realize something was amiss. My bodyguard stared at me and frowned.\n\nMy misgivings gave way to alarm when I sensed a few shadows almost at arms length. My inner self told me this had all the hallmarks of a murder attempt. On ME.\n\nQuickly I..."
darkages_landless_murders.05.desc3:0 "While resting at night close to my camp, in my favourite spot, near a great tree, I managed to hear a minor ruffle nor far from me.\n\nSome instants later I began to realize something was amiss. My bodyguards stared at one another and swiftly prepared.\n\nMy misgivings gave way to alarm when I sensed a few shadows almost at arms length. My inner self told me this had all the hallmarks of a murder attempt. On ME.\n\nQuickly I..."
darkages_landless_murders.05.opta:0 "...surprise and attack the scroundels!"
darkages_landless_murders.05.optb:0 "...use subterfuge and cunning to blend into the shadows."



