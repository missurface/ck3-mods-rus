darkages_seek_secondary_spouse.01.t:0 "A Potential Companion"
darkages_seek_secondary_spouse.01.desc:0 "After some diplomatic arrangements, I was able to find [darkages_potential_spouse.GetName], someone I must decide if it is worth to be taken for spouse or concubine..."
darkages_seek_secondary_spouse.01.opta:0 "A good candidate!"
darkages_seek_secondary_spouse.01.optb:0 "I'll pass..."

darkages_desire_to_please:0 "Desire to please"

darkages_focus_people:0 "Focus on Peasants"
darkages_focus_people_desc:0 "The long term plans of this character is centered on improving the lot of the peasants"

darkages_landless_medley.01.t:0 "The Play"
darkages_landless_medley.01.desc:0 "Nights at the camp can be fun, sometimes full of comedy, in other occasions with sincere displays of companionship.\n\nOver the last weeks my companions started getting all enthusiastic about the planning and rehearsal of a play to present to the peasants of nearby villages, maybe even to a local Lord and his court.\n\nI allowed this plan to develop, even somewhat committing myself to the proposition. As one would expect, it will rest on me the responsibility of writing the play and organising the whole affair.\n\nNow that everyone is excited about the prospect, what should I do?"
darkages_landless_medley.01.opta:0 "I'll write a martial piece!"
darkages_landless_medley.01.optb:0 "I'll write over a diplomatic theme!"
darkages_landless_medley.01.optc:0 "I'll write a play centering on trade!"
darkages_landless_medley.01.optd:0 "I'll write a romance, full of innuendo!"
darkages_landless_medley.01.opte:0 "I'll write a serious, philosophical essay!"
darkages_landless_medley.01.optf:0 "I'll repress my thespian vein instead..."
darkages_landless_medley.01.tt1:0 "Your followers will be Happy with you. The success of this choice depends on your Above Average Martial (>=12) or better, as well as in the trait Poet. Negatively, a Below Average Martial or worse will impose a penalty on your success chances. By default the chances start a bit biased against you.\n"
darkages_landless_medley.01.tt2:0 "Your followers will be Happy with you. The success of this choice depends on your Above Average Diplomacy (>=12) or better, as well as in the trait Poet. Negatively, a Below Average Diplomacy or worse will impose a penalty on your success chances. By default the chances start a bit biased against you.\n"
darkages_landless_medley.01.tt3:0 "Your followers will be Happy with you. The success of this choice depends on your Above Average Stewardship (>=12) or better, as well as in the trait Poet. Negatively, a Below Average Stewardship or worse will impose a penalty on your success chances. By default the chances start a bit biased against you.\n"
darkages_landless_medley.01.tt4:0 "Your followers will be Happy with you. The success of this choice depends on your Above Average Intrigue (>=12) r better, as well as in the trait Poet. Negatively, a Below Average Intrigue or worse will impose a penalty on your success chances. By default the chances start a bit biased against you.\n"
darkages_landless_medley.01.tt5:0 "Your followers will be Happy with you. The success of this choice depends on your Above Average Learning (>=12) or better, as well as in the trait Poet. Negatively, a Below Average Learning or worse will impose a penalty on your success chances. By default the chances start a bit biased against you.\n"
darkages_landless_medley.01.tt6:0 "Your followers will be Disgusted with you\n"
darkages_nick_the_thespian:0 "the Thespian"
darkages_opinion_delighted:0 "Delighted"
darkages_landless_medley.02.t:0 "A Rapturous Applause!"
darkages_landless_medley.02.desc1:0 "The play our band organized was a major success!\n\nA sizeable amout of Prestige and gold were acquired and as I am the leader of the troupe, I stand to gain the most from everyone. My fellow camp followers are Delighted with me and my fame reached even [darkages_ruler.GetName], who was significantly moved by our display!"
darkages_landless_medley.02.desc2:0 "The play our band organized was a major success!\n\nA sizeable amout of Prestige and gold were acquired and as I am the leader of the troupe, I stand to gain the most from everyone. My fellow camp followers are Delighted with me.\n\nAll in all, it was a risk worth taking!"
darkages_landless_medley.02.opta:0 "Henceforth, I shall be known as 'the Thespian', then!"
darkages_landless_medley.02.optb:0 "Great! but I do not fancy the nickname..."
darkages_landless_medley.03.t:0 "A Successful Play!"
darkages_landless_medley.03.desc1:0 "After presenting the play to nearby audiences, it is with my utmost happiness that the whole spectacle was very well received allowing me to make some Gold and earn some Prestige in the process!\n\nThe endeavour was even able to catch the eye of a nearby ruler, [darkages_ruler.GetName], that got significantly Impressed with our performance..."
darkages_landless_medley.03.desc2:0 "After presenting the play to nearby audiences, it is with my utmost happiness that the whole spectacle was very well received allowing me to make some Gold and earn some Prestige in the process!"
darkages_landless_medley.03.opta:0 "Those are good news!"
darkages_landless_medley.04.t:0 "A Failed Venture"
darkages_landless_medley.04.desc1:0 "After carefully thinking and then writing my play, my band of brothers enthusiastically rehearsed the play.\n\nUnfortunately, the underlying theme of my piece could be construed as a critique to the powers of the land. Retrospectively, it is no wonder it was ill received: the peasants never understood what was all about while the educated Lords became outraged with my viper tongue and the restlessness it might generate among their populace...\n\nUnfortunately my followers became Despondent with this whole affair. On top of it, the likes of [darkages_ruler1.GetName], [darkages_ruler2.GetName] and [darkages_ruler3.GetName] were particularly affected by my writings..."
darkages_landless_medley.04.desc2:0 "After carefully thinking and then writing my play, my band of brothers enthusiastically rehearsed the play.\n\nUnfortunately, all the endeavour was a drab attempt without a spark of creativity or even coherence.\n\nTo put it simply, I am faced with a failure.\n\nUnfortunately my followers became Despondent with this whole affair..."
darkages_landless_medley.04.opta:0 "Next time we shall try... singing!"
darkages_landless_medley.05.t:0 "An Unexpected Visit"
darkages_landless_medley.05.desc:0 "Yesterday, when all the camp was getting ready to go to bed, our routine was interrupted by the sudden appearance of a visitor.\nPoorly dressed, in a sorry state, [darkages_drunkard.GetName] claimed [darkages_drunkard.GetSheHe] was robbed in the road and lacks a place to call home. When asked about [darkages_drunkard.GetHerHis] plans, [darkages_drunkard.GetSheHe] suggested joining our camp as a follower stating [darkages_drunkard.GetHerHis] fee.\nAll things considered, there are clear incoherences in [darkages_drunkard.GetHerHis] discourse, turning apparent [darkages_drunkard.GetHerHis] problem with alcohol.\n\n Looking attentively at my followers, I must decide about the fate of this visit as my decision will carry consequences to the opinion of my band about me for long..."
darkages_landless_medley.05.opta:0 "Accept [darkages_drunkard.GetHerHim] in the camp as a brother"
darkages_landless_medley.05.optb:0 "Refuse [darkages_drunkard.GetHerHis] stay but provide some help"
darkages_landless_medley.05.optc:0 "Coldly send [darkages_drunkard.GetHerHim] on [darkages_drunkard.GetHerHis] way"
darkages_landless_medley.05.tt1:0 "The reaction of your followers to the recruitment depends on their traits and their opinion of [darkages_drunkard.GetName]. The future success of this action depends on how well [darkages_drunkard.GetSheHe] mingles with everyone and is positively or negatively influenced by [darkages_drunkard.GetHerHis] Diplomacy as well as [darkages_drunkard.GetHerHis] traits Gregarious (positive) and Shy (negative). Your own Diplomacy will also influence a bit in the process, both positively (>=12) or negatively (<8)\n"
darkages_landless_medley.06.t:0 "A Sociable Fellow"
darkages_landless_medley.06.desc:0 "As the months pass, it becomes clear [darkages_drunkard.GetName] is fully integrated in the camp!\n\nWhile the naysayers continue to hold a grudge about my acceptance of [darkages_drunkard.GetHerHim] in the camp, it was a worthy deed in the end!"
darkages_landless_medley.06.opta:0 "Good!"
darkages_landless_medley.07.t:0 "An Unlucky Cove"
darkages_landless_medley.07.desc:0 "As the months pass, it becomes clear [darkages_drunkard.GetName] is not able to mingle with the rest ofd my followers. I end up spending extra time and effort with [darkages_drunkard.GetHerHim], while in the camp everyone makes a joke out of the situation..."
darkages_landless_medley.07.opta:0 "Oh well..."
darkages_landless_medley.07.tt1:0 "Your followers that previously were supporters of the idea of accepting [darkages_drunkard.GetName] in the camp now turn on you\n"
darkages_modifier_stressfull_situation:0 "Stressfull Times"
darkages_modifier_stressfull_situation_desc:0 "This character needs to spend extra time with a follower"
darkages_landless_medley.17.t:0 "Unexpected Farewell"
darkages_landless_medley.17.desc:0 "Lately, as the weeks pass by in the camp, there is an increase of tension between my Second, [darkages_companion.GetName], and myself. The root of the problem seem to be conflicting views on the purpose of life, ethics and moral stances.\n\nToday a huge discussion happened where [darkages_companion.GetSheHe] simply decided to leave our camp. Mumbling curses while packing [darkages_companion.GetHerHis] belongings, it is clear [darkages_companion.GetName] is quite upset about our different ways.\n\nNow I need to decide what to do..."
darkages_landless_medley.17.opta:0 "Good riddance, loser!"
darkages_landless_medley.17.tt0:0 "You make no effort about convincing [darkages_companion.GetName] to stay. Followers that have a positive opinion of [darkages_companion.GetHerHim] will not enjoy the outcome\n"
darkages_landless_medley.17.optb:0 "Engage [darkages_companion.GetName] in a last philosophical argument"
darkages_landless_medley.17.tt1:0 "You attempt to assuage [darkages_companion.GetName] philosophical concerns using your Learning. Success of this option depends on your above average Learning or better (Learning >= 12) and on your Traits Gregarious, Diplomat, Temperate and Just. Working against your chances of success are the above average or better Learning of [darkages_companion.GetName] and [darkages_companion.GetHerHis] traits Callous and Wrathful\n"
darkages_landless_medley.17.tt2:0 "You persuaded [darkages_companion.GetName] to stay.\n"
darkages_landless_medley.17.tt3:0 "You failed to convince [darkages_companion.GetName] to stay...\n"
darkages_landless_medley.17.optc:0 "Deceive [darkages_companion.GetName] into staying"
darkages_landless_medley.17.tt4:0 "You attempt to cheat [darkages_companion.GetName], flatly lying to [darkages_companion.GetHerHim]. Success of this option depends on your above average Intrigue or better (Intrigue >= 12) and on your Traits Deceitful, Seducer, Eccentric and Arbitrary. Working against your chances of success are the above average or better Intrigue of [darkages_companion.GetName] and [darkages_companion.GetHerHis] traits Honest and Just\n"
darkages_landless_medley.17.tt5:0 "You deceived [darkages_companion.GetName]\n"
darkages_landless_medley.17.tt6:0 "You failed to deceive [darkages_companion.GetName]...\n"
darkages_landless_medley.17.optd:0 "Offer [darkages_companion.GetHerHim] 100 gold to stay"
darkages_landless_medley.17.tt7:0 "You try to buy [darkages_companion.GetName]'s allegiance with gold. Notice the success of this option will not remove the opinion penalty of [darkages_companion.GetHerHim] to me. The success of this option depends positively on [darkages_companion.GetHerHis] above average Stewardship and on [darkages_companion.GetHerHis] Traits Ambitious, Greedy, Arbitrary, Fickle and Loyal. Negatively, the chances consider [darkages_companion.GetHerHis] Below Average Stewardship and [darkages_companion.GetHerHis] Traits Content, Just, Generous, Stubborn and Disloyal\n"
darkages_landless_medley.17.tt8:0 "[darkages_companion.GetName] accepts your offer\n"
darkages_landless_medley.17.tt9:0 "[darkages_companion.GetName] refuses your offer...\n"
darkages_opinion_relieved:0 "Relieved"
darkages_modifier_babysitting:0 "Babysitting"
darkages_modifier_babysitting_desc:0 "This character spends an immense amount of time and resources helping another character getting along with other camp followers"
darkages_landless_medley.18.t:0 "Sense and Sensibility"
darkages_landless_medley.18.desc:0 "As the time moves on, it becomes ever more clear that [darkages_officer.GetName] is developing serious troubles in getting on with several other camp followers.\n\nIn fact the situation reaches a point that it becomes detrimental to the whole mood of my companions.\n\nIt is apparent I have a problem in my hands that needs to be solved..."
darkages_landless_medley.18.opta:0 "Dismiss the loser!"
darkages_landless_medley.18.tt1:0 "[darkages_officer.GetName] will be sent away. Other followers that have a positive opinion of [darkages_officer.GetHerHim] will be Disappointed with you. Friends of [darkages_officer.GetName] will become Enraged with you\n"
darkages_landless_medley.18.optb:0 "Deal with [darkages_officer.GetHerHim] with Martial purpose"
darkages_landless_medley.18.tt2:0 "You infuse a Martial discipline in the way you deal with the situation. Improving your odds of success are your Above Average or better (>= 12) Martial and your traits Arrogant, Callous, Sadistic and Vengeful. Working against your chances are your Below Average or worse (<8) Martial and the Traits Compassionate, Temperate, Fickle and Stubborn. This option has a slightly lower base chance of success than the next one\n"
darkages_landless_medley.18.optc:0 "Attempt to manage the feelings of everyone"
darkages_landless_medley.18.tt3:0 "You attempt to coach the group into a better understanding, instilling them with your purpose. The success of this option will depend on your Above Average Stewardship (>=12) anbd on your Traits Administrator, Gregarious, Just and Honest. Working againt your chances are a Below Average or worse Stewardship (<8) and the Traits Callous, Sadistic, Deceitful and Eccentric\n"
darkages_landless_medley.18.toast1:0 "Everybody falls in line!"
darkages_landless_medley.18.toast2:0 "A poor show of leadership..."
darkages_landless_medley.18.toast3:0 "Great cunning in addressing the problem!"
darkages_landless_medley.18.toast4:0 "An insensible mind leads to poor results..."
darkages_opinion_dissent:0 "Dissent"
darkages_rl_die:0 "You die..."
darkages_rl_spared:0 "Your life is spared!"
darkages_rl_youkill:0 "You kill your enemy!"
darkages_rl_youdefeated:0 "You stand defeated..."
darkages_landless_medley.19.t:0 "An Eye for an Eye"
darkages_landless_medley.19.desc:0 "What seemed a normal day in the camp today devolved into tragedy...\n\nA nasty discussion between [darkages_murderer.GetName] and [darkages_victim.GetName] made the former to draw [darkages_murderer.GetHerHis] stilleto and proceed to pierce through the eye the unfortunate [darkages_victim.GetName].\n\nAs the horrible deed was performed, [darkages_murderer.GetName] turned to me smiling and defiantly said: 'It was the last time this bugger annoyed someone'. Spitting on the corpse, [darkages_murderer.GetSheHe] awaited my reaction.\n\nShocked, I was deeply aware it was not only [darkages_murderer.GetName]. Everybody else in the camp had their eyes on me..."
darkages_landless_medley.19.opta:0 "Do nothing"
darkages_landless_medley.19.optb:0 "Dismiss the murderer"
darkages_landless_medley.19.optc:0 "Challenge [darkages_murderer.GetName] to a duel to death"
darkages_landless_medley.19.tt1:0 "This course of action might end up in your death. There will be a duel where both yours and [darkages_murderer.GetName] Prowess will be compared to lead to a final result\n"
darkages_opinion_weakling:0 "Weakling"
darkages_landless_medley.20.t:0 "Duel Won!"
darkages_landless_medley.20.desc:0 "Even as [darkages_murderer.GetName] mounted a dangerous attack, I was able to turn the tables and after a good kick on [darkages_murderer.GetHerHis] stomach I was able to overpower [darkages_murderer.GetHerHim].\n\nAs I stand up with my trusty sword on [darkages_murderer.GetHerHis] neck, [darkages_murderer.GetSheHe] keeps my stare, the eyes full of hatred and still... defiance."
darkages_landless_medley.20.opta:0 "Mors tua, vita mea!"
darkages_landless_medley.20.optb:0 "Spare [darkages_murderer.GetHerHim]"
darkages_landless_medley.21.t:0 "Duel Lost..."
darkages_landless_medley.21.desc:0 "As the duel started, soon it became evident [darkages_murderer.GetName] form and finesse were much above what I could invoke today. Kneeling, after losing my sword, I am now the mercy of this killer..."
darkages_landless_medley.21.opta:0 "The unbereable lapse of time..."
darkages_landless_medley.22.t:0 "Thief in Our Ranks!"
darkages_landless_medley.22.desc:0 "Today, as I went through the accounts and balances of my band, I noticed for the first time some gold is missing from my bottom line.\n\nWithout knowing who is doing it, it is plain one of my followers is a lowly thief!\n\nIn the knowledge this scheme might continue in the future, I need to tread with caution lest I hurt the sensibilities of the group..."
darkages_landless_medley.22.opta:0 "Eventually it will pass..."
darkages_landless_medley.22.optb:0 "Engage everyone in a moral lesson"
darkages_landless_medley.22.optc:0 "Investigate the matter"
darkages_landless_medley.22.tt1:0 "You forget the issue in the hope the robbery will eventually end.\nWhile this is true and you don't risk further effects due to unsuccessful actions - except the possible continuation of the thievery - there are consequences for this behaviour. If the thief is either Deceitful, Arbitrary or Greedy the chances for the thievery to continue are greater\n"
darkages_landless_medley.22.tt2:0 "You will test your Learning to be effective with your philosophy. Helping your chances are your Above Average or better Learning (>=12) and your traits Scholar and Poet. Negatively influencing your chances are your Below Average or worse Learning (<8) as well as the trait Impatient. Base chances of success are against you\n"
darkages_landless_medley.22.tt3:0 "You will test your Intrigue to be effective with your investigation to uncover the thief. Helping your chances are your Above Average or better Intrigue (>=12) and your traits Schemer, Shrewd and Stubborn. Negatively influencing your chances are your Below Average or worse Intrigue (<8) as well as the trait Fickle. Base chances of success are heavily stacked against you\n"
darkages_landless_medley.23.t:0 "Thief Strikes Again!"
darkages_landless_medley.23.desc:0 "Unfortunately the thief again robbed me of my gold!\n\nIn the knowledge that this will eventually stop, I need to think if this situation merits the pursuance of other types of action..."
darkages_landless_medley.23.opta:0 "Continue to ignore the matter..."
darkages_landless_medley.24.t:0 "Successful Speech!"
darkages_landless_medley.24.desc:0 "My discourse on morals and ethics really impacted the entirety of my followers!\n\nI managed to grab their attention with parables and logical arguments to persuade the rat among the ranks about the futility of continuing this theft.\n\nGiven my impact on the audience I now know this nefarious behaviour will probably stop. As I empathically pass my eyes through my followers, I cannot forget one of them is a traitor, however..."
darkages_landless_medley.24.opta:0 "A very good performance!"
darkages_landless_medley.25.t:0 "Failed Speech..."
darkages_landless_medley.25.desc:0 "After all my efforts, it is with a heavy heart that I intimately know my preaching about morals and ethics failed to strike a chord with this band of rascals...\n\nI must be prepared for the possibility of the thief to strike again."
darkages_landless_medley.25.opta:0 "I am no Cicerus..."
darkages_landless_medley.26.t:0 "Successful Investigation!"
darkages_landless_medley.26.desc1:0 "After a series of interviews with every one of my followers, my brilliant conclusion lead me to the rascal who has been robbing me!\n\nIt is no other than [darkages_thief.GetName]! Now that [darkages_thief.GetSheHe] is under guard, I need to think about what to do with [darkages_thief.GetHerHim]..."
darkages_landless_medley.26.desc2:0 "After a series of interviews with every one of my followers, my brilliant conclusion lead me to the rascal who has been robbing me!\n\nTo mny surprise, it was no other than [darkages_thief.GetName]!\n\n Unfortunately at this time it is beyond my powers to deal with [darkages_thief.GetHerHim]..."
darkages_landless_medley.26.opta:0 "Dismiss the thief!"
darkages_landless_medley.26.optb:0 "Pardon [darkages_thief.GetHerHim]"
darkages_landless_medley.26.optc:0 "Kill the bastard!"
darkages_landless_medley.26.optd:0 "Too late to deal with the thief..."
darkages_landless_medley.27.t:0 "Road Leading to Nowhere"
darkages_landless_medley.27.desc:0 "After a series of interviews with every one of my followers where I pressed everyonbe with a suspicious behaviour, I am at a loss about the culprit of this robbery\n\nAs might be expected, my followers are not happy to be treated with such suspicion.\n\nAfter all was said and done, I must steel myself for the possibility of the robbery to continue..."
darkages_landless_medley.27.opta:0 "Definitely not the best outcome..."
darkages_landless_medley.27.tt1:0 "The thief might strike again... or maybe he or she considers the risks of further action too high!\n"
darkages_landless_medley.28.t:0 "A Special Mission"
darkages_landless_medley.28.desc1:0 "Recently, a particular opportunity appeared related with [darkages_special_ruler.GetName]. As it turns out, I can profit from a good deal with [darkages_special_ruler.GetHerHim] but [darkages_special_ruler.GetSheHe] suggested one of my followers deal with the matter.\nThus cornered, I know I must trust someone to address the situation.\n\nTo gauge my chances, today at lunch I searched for volunteers to perform the deed. Three names came forward. The nice [darkages_candidate_1.GetFirstName], the useful [darkages_candidate_2.GetFirstName] and the steady [darkages_candidate_3.GetFirstName].\n\nAn important detail is the nature of the matter at hand requires a diplomatic and prestigious care..."
darkages_landless_medley.28.desc2:0 "Recently, a particular opportunity appeared related with [darkages_special_ruler.GetName]. As it turns out, I can profit from a good deal with [darkages_special_ruler.GetHerHim] but [darkages_special_ruler.GetSheHe] suggested one of my followers deal with the matter.\nThus cornered, I know I must trust someone to address the situation.\n\nTo gauge my chances, today at lunch I searched for volunteers to perform the deed. Three names came forward. The nice [darkages_candidate_1.GetFirstName], the useful [darkages_candidate_2.GetFirstName] and the steady [darkages_candidate_3.GetFirstName].\n\nAn important detail is the nature of the matter at hand requires a martial and decisive care..."
darkages_landless_medley.28.desc3:0 "Recently, a particular opportunity appeared related with [darkages_special_ruler.GetName]. As it turns out, I can profit from a good deal with [darkages_special_ruler.GetHerHim] but [darkages_special_ruler.GetSheHe] suggested one of my followers deal with the matter.\nThus cornered, I know I must trust someone to address the situation.\n\nTo gauge my chances, today at lunch I searched for volunteers to perform the deed. Three names came forward. The nice [darkages_candidate_1.GetFirstName], the useful [darkages_candidate_2.GetFirstName] and the steady [darkages_candidate_3.GetFirstName].\n\nAn important detail is the nature of the matter at hand requires a management and detailed care..."
darkages_landless_medley.28.desc4:0 "Recently, a particular opportunity appeared related with [darkages_special_ruler.GetName]. As it turns out, I can profit from a good deal with [darkages_special_ruler.GetHerHim] but [darkages_special_ruler.GetSheHe] suggested one of my followers deal with the matter.\nThus cornered, I know I must trust someone to address the situation.\n\nTo gauge my chances, today at lunch I searched for volunteers to perform the deed. Three names came forward. The nice [darkages_candidate_1.GetFirstName], the useful [darkages_candidate_2.GetFirstName] and the steady [darkages_candidate_3.GetFirstName].\n\nAn important detail is the nature of the matter at hand requires intrigue and a sensible care..."
darkages_landless_medley.28.desc5:0 "Recently, a particular opportunity appeared related with [darkages_special_ruler.GetName]. As it turns out, I can profit from a good deal with [darkages_special_ruler.GetHerHim] but [darkages_special_ruler.GetSheHe] suggested one of my followers deal with the matter.\nThus cornered, I know I must trust someone to address the situation.\n\nTo gauge my chances, today at lunch I searched for volunteers to perform the deed. Three names came forward. The nice [darkages_candidate_1.GetFirstName], the useful [darkages_candidate_2.GetFirstName] and the steady [darkages_candidate_3.GetFirstName].\n\nAn important detail is the nature of the matter at hand requires a religious and arcane care..."
darkages_landless_medley.28.opta:0 "I'll pick [darkages_candidate_1.GetFirstName]!"
darkages_landless_medley.28.optb:0 "[darkages_candidate_2.GetFirstName] seems to be best suited..."
darkages_landless_medley.28.optc:0 "My choice falls on [darkages_candidate_3.GetFirstName]"
darkages_landless_medley.28.optd:0 "I'll pass this opportunity"
darkages_landless_medley.28.tt1:0 "Your chances of success are influenced by the Above Average or better Diplomacy (>=12) of [darkages_candidate_1.GetName], [darkages_candidate_1.GetHerHis] positive opinion of you - the more, the bigger [darkages_candidate_1.GetHerHis] effort in reaching a good deal - and [darkages_candidate_1.GetHerHis] Traits Gregarious, Gluttonous, Honest and Diplomat. Working against your chances are [darkages_candidate_1.GetHerHis] Below Average or worse Diplomacy (<8), [darkages_candidate_1.GetHerHis] poor opinion of you - the worse the less concerned [darkages_candidate_1.GetSheHe] is about a failure - and [darkages_candidate_1.GetHerHis] traits Shy, Eccentric and Impatient\n"
darkages_landless_medley.28.tt2:0 "Your chances of success are influenced by the Above Average or better Martial (>=12) of [darkages_candidate_1.GetName], [darkages_candidate_1.GetHerHis] positive opinion of you - the more, the bigger [darkages_candidate_1.GetHerHis] effort in reaching a good deal - and [darkages_candidate_1.GetHerHis] Traits Brave, Arrogant, Temperate and Gallant. Working against your chances are [darkages_candidate_1.GetHerHis] Below Average or worse Martial (<8), [darkages_candidate_1.GetHerHis] poor opinion of you - the worse the less concerned [darkages_candidate_1.GetSheHe] is about a failure - and [darkages_candidate_1.GetHerHis] traits Craven, Humble and Fickle\n"
darkages_landless_medley.28.tt3:0 "Your chances of success are influenced by the Above Average or better Stewardship (>=12) of [darkages_candidate_1.GetName], [darkages_candidate_1.GetHerHis] positive opinion of you - the more, the bigger [darkages_candidate_1.GetHerHis] effort in reaching a good deal - and [darkages_candidate_1.GetHerHis] Traits Diligent, Ambitious, Calm and Avaricious. Working against your chances are [darkages_candidate_1.GetHerHis] Below Average or worse Stewardship (<8), [darkages_candidate_1.GetHerHis] poor opinion of you - the worse the less concerned [darkages_candidate_1.GetSheHe] is about a failure - and [darkages_candidate_1.GetHerHis] traits Content, Generous and Stubborn\n"
darkages_landless_medley.28.tt4:0 "Your chances of success are influenced by the Above Average or better Intrigue (>=12) of [darkages_candidate_1.GetName], [darkages_candidate_1.GetHerHis] positive opinion of you - the more, the bigger [darkages_candidate_1.GetHerHis] effort in reaching a good deal - and [darkages_candidate_1.GetHerHis] Traits Deceitful, Fickle, Arbitrary and Seducer. Working against your chances are [darkages_candidate_1.GetHerHis] Below Average or worse Diplomacy (<8), [darkages_candidate_1.GetHerHis] poor opinion of you - the worse the less concerned [darkages_candidate_1.GetSheHe] is about a failure - and [darkages_candidate_1.GetHerHis] traits Honest, Just and Trusting\n"
darkages_landless_medley.28.tt5:0 "Your chances of success are influenced by the Above Average or better Learning (>=12) of [darkages_candidate_1.GetName], [darkages_candidate_1.GetHerHis] positive opinion of you - the more, the bigger [darkages_candidate_1.GetHerHis] effort in reaching a good deal - and [darkages_candidate_1.GetHerHis] Traits Shy, Eccentric, Humble and Theologian. Working against your chances are [darkages_candidate_1.GetHerHis] Below Average or worse Diplomacy (<8), [darkages_candidate_1.GetHerHis] poor opinion of you - the worse the less concerned [darkages_candidate_1.GetSheHe] is about a failure - and [darkages_candidate_1.GetHerHis] traits Gregarious, Gluttonous and Lustful\n"
darkages_landless_medley.28.tt6:0 "Your chances of success are influenced by the Above Average or better Diplomacy (>=12) of [darkages_candidate_2.GetName], [darkages_candidate_2.GetHerHis] positive opinion of you - the more, the bigger [darkages_candidate_2.GetHerHis] effort in reaching a good deal - and [darkages_candidate_2.GetHerHis] Traits Gregarious, Gluttonous, Honest and Diplomat. Working against your chances are [darkages_candidate_2.GetHerHis] Below Average or worse Diplomacy (<8), [darkages_candidate_2.GetHerHis] poor opinion of you - the worse the less concerned [darkages_candidate_2.GetSheHe] is about a failure - and [darkages_candidate_2.GetHerHis] traits Shy, Eccentric and Impatient\n"
darkages_landless_medley.28.tt7:0 "Your chances of success are influenced by the Above Average or better Martial (>=12) of [darkages_candidate_2.GetName], [darkages_candidate_2.GetHerHis] positive opinion of you - the more, the bigger [darkages_candidate_2.GetHerHis] effort in reaching a good deal - and [darkages_candidate_2.GetHerHis] Traits Brave, Arrogant, Temperate and Gallant. Working against your chances are [darkages_candidate_2.GetHerHis] Below Average or worse Martial (<8), [darkages_candidate_2.GetHerHis] poor opinion of you - the worse the less concerned [darkages_candidate_2.GetSheHe] is about a failure - and [darkages_candidate_2.GetHerHis] traits Craven, Humble and Fickle\n"
darkages_landless_medley.28.tt8:0 "Your chances of success are influenced by the Above Average or better Stewardship (>=12) of [darkages_candidate_2.GetName], [darkages_candidate_2.GetHerHis] positive opinion of you - the more, the bigger [darkages_candidate_2.GetHerHis] effort in reaching a good deal - and [darkages_candidate_2.GetHerHis] Traits Diligent, Ambitious, Calm and Avaricious. Working against your chances are [darkages_candidate_2.GetHerHis] Below Average or worse Stewardship (<8), [darkages_candidate_2.GetHerHis] poor opinion of you - the worse the less concerned [darkages_candidate_2.GetSheHe] is about a failure - and [darkages_candidate_2.GetHerHis] traits Content, Generous and Stubborn\n"
