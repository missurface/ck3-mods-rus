darkages_focus_piety3_desc:0 "Этот персонаж сосредоточен на получении Благочестия"
darkages_focus_lifestyle1:0 "Личный фокус"
darkages_focus_lifestyle1_desc:0 "Этот персонаж сосредоточен на своем Образе жизни и управлении Державой"
darkages_focus_lifestyle2:0 "Личный фокус"
darkages_focus_lifestyle2_desc:0 "Этот персонаж сосредоточен на своем Образе жизни и управлении Державой"
darkages_focus_lifestyle3:0 "Личный фокус"
darkages_focus_lifestyle3_desc:0 "Этот персонаж сосредоточен на своем Образе жизни и управлении Державой"
darkages_focus_lifestyle4:0 "Личный фокус"
darkages_focus_lifestyle4_desc:0 "Этот персонаж сосредоточен на своем Образе жизни и управлении Державой"
darkages_focus.01.t:0 "Долгосрочные планы"
darkages_focus.01.desc:0 "Пришло время мне спланировать заранее, на какой стороне моей благородной жизни я [Select_CString(ROOT.Char.IsFemale, 'сосредоточу', 'сосредоточу')] усилия в следующем десятилетии.\n\nВкладывая мое состояние в один из доступных путей, несомненно, мой выбор повлечет за собой глубокие последствия для моих личных достижений как человека и как правителя..."
darkages_focus.01.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'сосредоточусь', 'сосредоточусь')] на улучшении участи моих крестьян"
darkages_focus.01.optb:0 "Я [Select_CString(ROOT.Char.IsFemale, 'сосредоточусь', 'сосредоточусь')] на своем Престиже"
darkages_focus.01.optc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'сосредоточусь', 'сосредоточусь')] на своем Благочестии"
darkages_focus.01.opte:0 "Я [Select_CString(ROOT.Char.IsFemale, 'сосредоточусь', 'сосредоточусь')] на своем Образе жизни и управлении Державой"
darkages_focus.01.optd:0 "Никаких причудливых мечтаний. Я [Select_CString(ROOT.Char.IsFemale, 'сберегу', 'сберегу')] свое золото..."
darkages_focus.01.tt1:0 "...но, если только вы не Жадный или Ленивый, получите стресс от упущенной возможности!\n"
darkages_opinion_focus_people1:0 "Провинциальный приоритет"
darkages_opinion_focus_people1_desc:0 "Лорд этого графства улучшает участь своих крестьян"
darkages_opinion_focus_people2:0 "Провинциальный приоритет"
darkages_opinion_focus_people2_desc:0 "Лорд этого графства улучшает участь своих крестьян"
