darkages_startup.05.t:0 "Первым делом"
darkages_startup.05.desc:0 "Поскольку они играют решающую роль в сотнях событий в Dark Ages, знайте, что ваши Навыки имеют рейтинги, которые позволяют получать различные бонусы/опции во множестве моментов игры.\nТаким образом, вот список рейтингов, чтобы вы имели более точное представление о том, чего стоят ваши Навыки в моде и как они оцениваются:\n\n          < 2: Ужасно\n          < 4: Очень плохо\n          < 6: Плохо\n          < 8: Ниже среднего\n          От 8 до 11: Средне\n          >= 12: Выше среднего\n          >= 15: Хорошо\n          >= 18: Очень хорошо\n          >= 21: Мировой уровень"
darkages_startup.05.opta:0 "Теперь я знаю, чего я стою!"
darkages_startup.06.t:0 "Общий обзор"
darkages_startup.06.desc:0 "В Dark Ages баланс игры совершенно иной, чем в ванильной версии, поэтому первый совет, который я могу вам дать, - избегать беспечной игры, как раньше, вместо этого прощупывая почву и играя осторожно в течение первого десятилетия или около того.\n\nВаш опыт всегда будет обусловлен происходящими событиями, и в случае полосы неудач вы можете сильно пострадать сразу после старта. Я приглашаю вас не сдаваться, зная, что одни и те же события не будут происходить в течение нескольких лет, и полоса неудач в конечном итоге закончится.\n\nГлавное предложение, которое у меня есть для вас, - начните как Король или Император, когда вы впервые пробуете Dark Ages. Не заблуждайтесь, хотя я не хочу делать успех невозможным - как это происходило на протяжении десятилетий и столетий - игра намного сложнее и беспощаднее, баланс очень отличается, и ваши цели будут достигнуты за гораздо более длительный промежуток времени.\n\nВойна была полностью перебалансирована, и вы должны помнить, что наличие армии вдвое больше, чем у вашего врага, не даст вам ничего, кроме определенного преимущества в общей картине вещей.\nИстория полна примеров, когда армии с двойным, тройным, четверным и даже большим количеством солдат, чем у врага, были драматически разбиты стороной с меньшими силами.\nПомните, что, как и в реальности, война в Dark Ages - дело рискованное, и если вы не сможете собрать силы, чтобы иметь гигантское преимущество в численности или даже в очках битвы, окончательная победа никогда не гарантирована с самого начала только на основе чисел. Конечно, это работает и на вас. Быть в меньшинстве - это не верный путь к катастрофе, если вы правильно разыграете свои карты, далеко не так.\nПравило игры по умолчанию для Войны в Dark Ages - 'Геймерский'. Я предпочитаю более беспощадный - и сложный - уровень 'Реалистичный', но я остановился на чем-то более легком, чтобы помочь игрокам преодолеть разрыв в опыте между ванильной CK3 и Dark Ages. Вы также можете установить правило игры на 'Детский'. На этом уровне результаты битвы - это скорее вопрос суммирования боевых очков каждой стороны, чтобы проверить, кто победит, чем симуляция суровых реалий войны.\n\nЧто касается экономической стороны, вам полезно знать, что Лимиты Домена снижены в Dark Ages, особенно с середины до конца игры. Ваше доступное золото тоже будет ниже, и часто у вас просто не будет ресурсов, чтобы максимально улучшить свои здания и своих Воителей, одновременно справляясь с проблемами, которые подбрасывает вам новый геймплей.\n\nПримите во внимание, что в Dark Ages события очень динамичны по своей природе, и лучший ответ всегда меняется в зависимости от контекстных данных игры, будь то ваши Черты характера, ваши Навыки, состояние мира вокруг вас, данные от других участников или динамические данные, генерируемые событием. Выбирайте свои варианты с умом и признайте, что долг Лорда часто заключается не в выборе лучшего варианта, а в выборе менее неприятного...\n\nНаконец, Dark Ages поставляется с множеством правил игры, чтобы вы могли адаптировать его под свой стиль игры. Просмотрите их и проверьте, как лучше всего передать опыт в соответствии с вашими предпочтениями."
