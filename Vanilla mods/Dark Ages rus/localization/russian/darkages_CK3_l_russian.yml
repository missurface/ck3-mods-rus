rule_darkages_vassal_distance:0 "#B #Bold Dark Ages#!:#! Политическая сплоченность"
setting_darkages_vassal_distance_on:0 "Вкл"
setting_darkages_vassal_distance_on_desc:0 "Расстояние от столицы Державы влияет на Мнение вассалов. Никаких штрафов для Вассалов, которые являются Друзьями, Любовниками, Родственными душами, Справедливыми, Спокойными или Верными."
setting_darkages_vassal_distance_off:0 "Откл"
setting_darkages_vassal_distance_off_desc:0 "Расстояние не является фактором политической сплоченности Державы. Как в оригинале."
rule_darkages_provisions_upkeep:0 "#B #Bold Dark Ages#!:#! Содержание припасов"
setting_darkages_rule_landless_provisions_none:0 "Нет содержания"
setting_darkages_rule_landless_provisions_none_desc:0 "Безземельные персонажи не платят за содержание припасов. Как в оригинале."
setting_darkages_rule_landless_provisions_vlow:0 "Очень низкое"
setting_darkages_rule_landless_provisions_vlow_desc:0 "В зависимости от общего количества доступных профессиональных войск, безземельные персонажи платят очень небольшое количество Припасов каждые три месяца."
setting_darkages_rule_landless_provisions_low:0 "Низкое"
setting_darkages_rule_landless_provisions_low_desc:0 "В зависимости от общего количества доступных профессиональных войск, безземельные персонажи платят небольшое количество Припасов каждые три месяца."
setting_darkages_rule_landless_provisions_average:0 "Среднее"
setting_darkages_rule_landless_provisions_average_desc:0 "В зависимости от общего количества доступных профессиональных войск, безземельные персонажи платят среднее количество Припасов каждые три месяца."
setting_darkages_rule_landless_provisions_high:0 "Высокое"
setting_darkages_rule_landless_provisions_high_desc:0 "В зависимости от общего количества доступных профессиональных войск, безземельные персонажи платят большое количество Припасов каждые три месяца."
setting_darkages_rule_landless_provisions_vhigh:0 "Очень высокое"
setting_darkages_rule_landless_provisions_vhigh_desc:0 "В зависимости от общего количества доступных профессиональных войск, безземельные персонажи платят очень большое количество Припасов каждые три месяца."
darkages_opinion_long_time_companion:0 "Давний знакомый"
rule_darkages_talented_courtiers:0 "#B #Bold Dark Ages#!:#! Талантливые придворные"
setting_darkages_talented_courtiers_yes:0 "Включено"
setting_darkages_talented_courtiers_yes_desc:0 "Если вы играете за персонажа с землями, в начале игры будет сгенерирована группа новых придворных. В среднем, Двор улучшит свои возможности."
setting_darkages_talented_courtiers_no:0 "Отключено"
setting_darkages_talented_courtiers_no_desc:0 "Заметные придворные генерироваться не будут. Как в оригинале."
rule_darkages_starting_followers:0 "#B #Bold Dark Ages#!:#! Стартовые последователи"
setting_darkages_starting_followers_yes:0 "Включено"
setting_darkages_starting_followers_yes_desc:0 "Все безземельные авантюристы начнут игру как минимум с тремя последователями."
setting_darkages_starting_followers_no:0 "Отключено"
setting_darkages_starting_followers_no_desc:0 "Последователи не будут генерироваться в начале игры. Как в оригинале."
rule_darkages_complex_dread:0 "#B #Bold Dark Ages#!:#! Сложный Ужас"
setting_darkages_complex_dread_active:0 "Включено"
setting_darkages_complex_dread_active_desc:0 "Ужас приводит к прогрессирующему снижению мнения о правителе у Придворных и Гостей. В то же время ужасающий правитель может 'Запугать' Вассалов и Придворных, чтобы получить ценные ресурсы."
setting_darkages_complex_dread_inactive:0 "Отключено"
setting_darkages_complex_dread_inactive_desc:0 "Как в оригинале. Дизайн Ужаса имеет меньше эффектов для и против игрока. Обратите внимание, что вас все равно могут убить из-за высокого Ужаса. См. правило игры 'Система убийств'."
