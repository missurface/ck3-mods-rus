darkages_rival_attempted_murder:0 "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsFemale, 'разозлила', 'разозлил')] [CHARACTER.GetShortUIName], попытавшись убить [CHARACTER.GetHerHim]."
darkages_rival_attempted_murder_corresponding:0 "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsFemale, 'разозлила', 'разозлил')] [TARGET_CHARACTER.GetShortUIName], попытавшись убить [TARGET_CHARACTER.GetHerHim]."
darkages_dread.03.t:0 "Вопрос уважения"
darkages_dread.03.desc1:0 "Сегодня на ежеквартальной встрече с вассалами произошло нечто весьма необычное.\n\nНачался жаркий спор между мной и не кем иным, как [darkages_dread_vassal.GetName].\nЧто еще хуже, этот кретин начал высмеивать и поучать меня под видом уважения и почтения!\n\nРазгневавшись на [darkages_dread_vassal.GetHerHis] поведение, теперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я справлюсь с этим вызовом, поскольку мой авторитет на кону..."
darkages_dread.03.desc2:0 "Сегодня на ежеквартальной встрече с вассалами произошло нечто весьма необычное.\n\nНачался жаркий спор между мной и не кем иным, как [darkages_dread_vassal.GetName].\nЧто еще хуже, эта стерва начала высмеивать и поучать меня под видом уважения и почтения!\n\nРазгневавшись на [darkages_dread_vassal.GetHerHis] поведение, теперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я справлюсь с этим вызовом, поскольку мой авторитет на кону..."
darkages_dread.03.opta:0 "Угрожать и унизить вассала перед всеми"
darkages_dread.03.optb:0 "Принять примирительную позицию по отношению к [darkages_dread_vassal.GetFirstName|d]"
darkages_dread.03.optc:0 "Настроить всех против [darkages_dread_vassal.GetFirstName|g]"
darkages_dread.03.optd:0 "Ледяным взглядом посмотреть на [darkages_dread_vassal.GetHerHim] и холодно спланировать [darkages_dread_vassal.GetHerHis] смерть"
darkages_dread.03.tt1:0 "Приняв эту позицию, вы пострадаете в Престиже и увидите, как ваш Ужас значительно уменьшится. Ваши вассалы увидят в своем Сюзерене слабака\n"
darkages_dread.03.tt2:0 "Этот вариант доступен, потому что у вас либо минимальный навык Интриги 12, либо вы Обманщик, либо Интриган, либо Хитрый политик. Положительно влияют на исход этого варианта ваш хороший Навык Интриги, черты Обманщик, Интриган, Пыточных дел мастер, Эксцентричный, Черствый, Хитрый политик, Спокойный и Терпеливый. Отрицательно влияют на исход этого варианта ваши Черты Характера Гневный, Нетерпеливый и Тупой, а также ваш низкий Навык Интриги\n"
darkages_dread.03.tt3:0 "Этот вариант доступен, потому что вы либо Черствый, Мстительный, Гневный или Садист. Вы приказываете своим шпионам убить вашего вассала и можете ожидать результата в ближайшее время. Успех положительно зависит от хорошей Интриги вашего Тайного советника и отрицательно от вашего низкого Навыка Интриги. Ожидайте сильного увеличения Ужаса в ближайшем будущем, когда о вашем действии станет известно\n"
darkages_dread.03.tt4:0 "Этот вариант доступен, потому что вы либо Черствый, Мстительный, Гневный или Садист. Поскольку ваш вассал также является вашим Тайным советником, вы можете быть уверены, что убить [darkages_dread_vassal.GetHerHim] не так-то просто. Успех зависит от вашего высокого Навыка Интриги, а неудача - от высокого Навыка Интриги [darkages_dread_vassal.GetName|g]\n"
darkages_dread.04.t:0 "Хорошо выполненная работа!"
darkages_dread.04.desc:0 "Убийство [darkages_dread_vassal.GetName|g] прошло успешно. Я тонко даю понять, что это я [Select_CString(ROOT.Char.IsFemale, 'заказала', 'заказал')] его.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')], что все мои вассалы теперь поняли послание!"
darkages_dread.04.opta:0 "Ведите себя осторожно, кучка дураков!"
darkages_dread.05.t:0 "Неудачная работа..."
darkages_dread.05.desc:0 "Убийство [darkages_dread_vassal.GetName|g] провалилось. Теперь все мои вассалы понимают, что произошло, и определенно не довольны моим поведением, а также моей слабостью в интригах..."
darkages_dread.05.opta:0 "Какая ситуация!"
darkages_dread_toast.03.tt1:0 "Вы манипулируете всеми, заставляя преследовать [darkages_dread_vassal.GetName|g]!"
darkages_dread_toast.03.tt2:0 "Вы потерпели неудачу в своей манипулятивной игре..."
darkages_opinion_despirited:0 "Уныние"
darkages_dread.03.tt5:0 "Все ваши вассалы станут Взбешенными, так как поймут вашу манипулятивную игру\n"
darkages_dread.03.tt6:0 "Ваши другие вассалы будут Впечатлены вашей демонстрацией лидерства\n"
darkages_dread.03.tt7:0 "В то время как [darkages_dread_vassal.GetName] останется [Select_CString(darkages_dread_vassal.IsFemale, 'нейтральной', 'нейтральным')], все остальные ваши вассалы придут в Уныние от вашего отсутствия лидерства\n"
darkages_dread.03.tt8:0 "Ваши другие вассалы станут Настороженными из-за вашей напористой и угрожающей позиции\n"
darkages_dread.04.tt1:0 "Все уважают вас. Все ваши вассалы Впечатлены тем, какой вы опасный человек\n"
darkages_dread.05.tt1:0 "Из-за вашей неудачной авантюры все ваши Вассалы будут смотреть на вас с Презрением"
darkages_opinion_county_justice_served:0 "Справедливость восторжествовала"
darkages_opinion_county_justice_served_desc:0 "После страданий от рук разбойников население этой провинции одобряет суровое обращение с ними"
darkages_county_economic_boon:0 "Экономическое благо"
darkages_county_economic_boon_desc:0 "Помилование печально известной банды разбойников и предоставление ограниченной экономической помощи позволяет населению жить дальше, а местной экономике процветать. Среди наиболее радикальных элементов местной элиты сохраняется неодобрение по поводу помилования"
darkages_dread.06.t1:0 "Печально известная Банда Братьев"
darkages_dread.06.t2:0 "Печально известные Злые Мечи"
darkages_dread.06.t3:0 "Печально известные Кровавые Мстители"
darkages_dread.06.t4:0 "Печально известная Дикая Банда"
darkages_dread.06.t5:0 "Печально известные Красные Руки"
darkages_dread.06.t6:0 "Печально известные Черные Метки"
darkages_dread.06.t7:0 "Печально известные Меченые Души"
darkages_dread.06.t8:0 "Печально известные Славные Налетчики"
darkages_dread.06.t9:0 "Печально известные Серебряные Пики"
darkages_dread.06.t10:0 "Печально известные Смертоносные Смертные"
darkages_dread.06.desc1:0 "Уже больше пары лет банда разбойников, именующая себя «Банда Братьев», терроризирует части [darkages_dread_county.GetName|l]. Грабя крестьян и нападая на торговцев, они также отдавали значительную сумму монет поселениям в Графстве, помогая людям справляться с тяжелыми временами.\n\nБлагодаря отличному ходу моего ополчения и моих шпионов, эти бандиты наконец-то попали в блестяще разработанную ловушку, и теперь они схвачены.\n\nТребуется множество радикальных мер, от повешения до помилования воров. Совет также разделился во мнениях по этому вопросу.\nЧего не хватает, так это взвешенного взгляда на ситуацию..."
darkages_dread.06.desc2:0 "Уже больше пары лет банда разбойников, именующая себя «Злые Мечи», терроризирует части [darkages_dread_county.GetName|l]. Грабя крестьян и нападая на торговцев, они также отдавали значительную сумму монет поселениям в Графстве, помогая людям справляться с тяжелыми временами.\n\nБлагодаря отличному ходу моего ополчения и моих шпионов, эти бандиты наконец-то попали в блестяще разработанную ловушку, и теперь они схвачены.\n\nТребуется множество радикальных мер, от повешения до помилования воров. Совет также разделился во мнениях по этому вопросу.\nЧего не хватает, так это взвешенного взгляда на ситуацию..."
