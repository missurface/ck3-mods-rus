setting_darkages_education_rule_yes:0 "По умолчанию"
setting_darkages_education_rule_yes_desc:0 "Подопечные могут унаследовать культуру или религию Опекуна, в зависимости от судьбы."
setting_darkages_education_rule_no:0 "Нет наследования"
setting_darkages_education_rule_no_desc:0 "Подопечные никогда не наследуют культуру или религию Опекуна, если игрок не установит это в интерфейсе. Ванильное поведение."
rule_darkages_music:0 "#B #Bold Dark Ages#!:#! Музыка"
setting_darkages_rule_music_yes:0 "Полный саундтрек"
setting_darkages_rule_music_yes_desc:0 "Игра будет воспроизводиться с 146 дополнительными тематическими музыкальными композициями"
setting_darkages_rule_music_no:0 "Базовая CK3"
setting_darkages_rule_music_no_desc:0 "Игра будет воспроизводиться только с оригинальным саундтреком"
darkages_genetic_traits.02.t:0 "Нематериальное наследство"
darkages_genetic_traits.02.desc:0 "С течением времени, по мере того как я взрослею, становится ясно, что груз в моем разуме всегда давит на меня, и, таким образом, я становлюсь постоянно [Select_CString(ROOT.Char.IsFemale, 'Меланхоличной', 'Меланхоличным' )]..."
darkages_genetic_traits.02.opta:0 "Такова судьба..."
darkages_genetic_traits.03.desc:0 "По мере того как я взрослею, становится ясно, что мой рассудок часто помрачается, и мое поведение большую часть времени далеко от нормального. Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] славу среди моих друзей того, кто [Select_CString(ROOT.Char.IsFemale, 'потеряла', 'потерял' )] рассудок при рождении.\n\nТаким образом, я становлюсь [Select_CString(ROOT.Char.IsFemale, 'Безумной', 'Безумным' )]..." 
darkages_genetic_traits.04.desc:0 "По мере того как я взрослею, становится ясно, что со мной что-то не так. Припадки, судороги и удары относительно обычны в моей жизни, и некоторые начинают предполагать, что темный дьявол сидит внутри моего тела.\n\nОказывается, я [Select_CString(ROOT.Char.IsFemale, 'Одержимая', 'Одержимый' )]..."
darkages_genetic_traits.05.desc:0 "По мере того как я взрослею, становится ясно, что я не [Select_CString(ROOT.Char.IsFemale, 'потрясающая', 'потрясающий' )]. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'Невзрачная', 'Невзрачный' )]"
darkages_genetic_traits.06.desc:0 "По мере того как я взрослею, становится очевидным, что природа не была добра ко мне. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'Уродливая', 'Уродливый' )]"
darkages_genetic_traits.07.desc:0 "По мере взросления я знаю, что мне предстоит преодолеть значительное препятствие в жизни. Будучи совершенно [Select_CString(ROOT.Char.IsFemale, 'здоровой', 'здоровым' )], мои деформированные черты выдают мою [Select_CString(ROOT.Char.IsFemale, 'Омерзительную', 'Омерзительную' )] природу..."
darkages_genetic_traits.08.desc:0 "По мере взросления я чувствую последствия своей удачи, обладая [Select_CString(ROOT.Char.IsFemale, 'Миловидными', 'Миловидными' )] чертами..."
darkages_genetic_traits.09.desc1:0 "По мере взросления я чувствую последствия своей удачи, обладая [Select_CString(ROOT.Char.IsFemale, 'Красивыми', 'Красивыми' )] чертами..."
darkages_genetic_traits.09.desc2:0 "По мере взросления я чувствую последствия своей удачи, обладая [Select_CString(ROOT.Char.IsFemale, 'Симпатичными', 'Симпатичными' )] чертами..."
darkages_genetic_traits.10.desc:0 "По мере взросления я чувствую последствия своей удачи, обладая [Select_CString(ROOT.Char.IsFemale, 'Прекрасными', 'Прекрасными' )] чертами..."
darkages_genetic_traits.11.desc:0 "По мере того как я взрослею, кажется, что мне трудно понимать сложные концепции. В любых играх, требующих немного размышлений, меня регулярно обыгрывает большинство моих друзей.\n\nК сожалению, оказывается, что я [Select_CString(ROOT.Char.IsFemale, 'Недогадливая', 'Недогадливый' )]..."
darkages_genetic_traits.12.desc:0 "По мере того как я взрослею, кажется, что мне трудно понимать повседневные события. В любых играх, требующих немного размышлений, меня всегда обыгрывает большинство моих друзей.\n\nК сожалению, оказывается, что я [Select_CString(ROOT.Char.IsFemale, 'Глупая', 'Глупый' )]..."
darkages_genetic_traits.13.desc:0 "По мере того как я взрослею, кажется, что мне трудно понимать самые обычные задачи. В любых играх, требующих немного размышлений, все легко обыгрывают меня.\n\nК сожалению, оказывается, что я [Select_CString(ROOT.Char.IsFemale, 'Имбецил', 'Имбецил' )]..."
darkages_genetic_traits.14.desc:0 "По мере взросления мне кажется, что я схватываю абстрактные концепции немного быстрее, чем большинство моих друзей. Оказывается, я [Select_CString(ROOT.Char.IsFemale, 'Смышленая', 'Смышленый' )]!"
darkages_genetic_traits.15.desc:0 "По мере взросления мне кажется, что я прихожу к здравым выводам быстрее, чем большинство моих друзей. Очевидно, что мне нужно гораздо меньше усилий в интеллектуальных вопросах, чтобы иметь лучшие результаты.\n\nОказывается, я [Select_CString(ROOT.Char.IsFemale, 'Интеллектуалка', 'Интеллектуал' )]!"
darkages_genetic_traits.16.desc:0 "По мере взросления я привыкаю с легкостью доминировать в любом интеллектуальном обмене с любым из моих друзей. Я просто знаю больше, думаю быстрее и выдаю лучшие решения, чем почти все.\n\nОказывается, я [Select_CString(ROOT.Char.IsFemale, 'Гениальная', 'Гениальный' )]!"
darkages_genetic_traits.17.desc:0 "По мере того как я взрослею, становится очевидным, что я страдаю от слабой конституции, которая делает меня [Select_CString(ROOT.Char.IsFemale, 'склонной', 'склонным' )] к приступам случайных мелких болезней, отравляющих мое существование. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'Хрупкая', 'Хрупкий' )]..."
darkages_genetic_traits.18.desc:0 "По мере того как я взрослею, становится очевидным, что я страдаю от очень слабой конституции, которая делает меня очень [Select_CString(ROOT.Char.IsFemale, 'уязвимой', 'уязвимым' )] к приступам случайных мелких болезней, отравляющих мое существование. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'Хилая', 'Хилый' )]..."
darkages_genetic_traits.19.desc:0 "По мере того как я взрослею, становится очевидным, что я страдаю от разрушительной конституции, которая делает меня жертвой приступов случайных мелких болезней, отравляющих мое существование. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'Болезненная', 'Болезненный' )]..."
darkages_genetic_traits.20.desc:0 "По мере взросления становится ясно, что я [Select_CString(ROOT.Char.IsFemale, 'Здоровая', 'Здоровый' )] и побеждаю многих своих друзей в физических упражнениях!"
darkages_genetic_traits.21.desc:0 "По мере взросления становится ясно, что я [Select_CString(ROOT.Char.IsFemale, 'Крепкая', 'Крепкий' )] и побеждаю большинство своих друзей в физических упражнениях!"
darkages_genetic_traits.22.desc1:0 "По мере взросления становится ясно, что я [Select_CString(ROOT.Char.IsFemale, 'Силачка', 'Силач' )] и побеждаю многих своих друзей в физических упражнениях!"
darkages_genetic_traits.22.desc2:0 "По мере взросления становится ясно, что я [Select_CString(ROOT.Char.IsFemale, 'Амазонка', 'Амазонка' )] и побеждаю многих своих друзей в физических упражнениях!"
darkages_genetic_traits.23.desc:0 "По мере взросления у меня постепенно развивается деформация на спине. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'Горбунья', 'Горбун' )]..."
darkages_genetic_traits.24.desc:0 "По мере того как я взрослею и учусь говорить, становится очевидным, что я страдаю от состояния, которое мешает мне правильно произносить большинство слов. К сожалению, я страдаю от [Concept( 'lisping', 'Шепелявости' )|E]..."
darkages_genetic_traits.25.desc:0 "По мере того как я взрослею и учусь говорить, становится очевидным, что я страдаю от состояния, которое мешает тому, как я произношу слова. К сожалению, и хотя я пою в совершенстве, я страдаю от [Concept( 'stuttering', 'Заикания' )|E]..."
darkages_genetic_traits.26.desc:0 "По мере того как я взрослею и мое тело развивается, становится очевидным, что я [Select_CString(ROOT.Char.IsFemale, 'Карлица', 'Карлик' )]..."
darkages_genetic_traits.27.desc:0 "По мере того как я взрослею и мое тело развивается, становится очевидным, что я [Select_CString(ROOT.Char.IsFemale, 'Великанша', 'Великан' )]..."
darkages_genetic_traits.28.desc:0 "По мере того как я взрослею, становится ясно, что с моим телом что-то не так. Моя деформация указывает мне на очевидную реальность, что я [Select_CString(ROOT.Char.IsFemale, 'Тщедушная', 'Тщедушный' )]..."
darkages_genetic_traits.29.desc:0 "По мере взросления я страдаю от частых эпизодов затрудненного дыхания. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'Астматик', 'Астматик' )]..."
darkages_genetic_traits.30.desc:0 "По мере того как я взрослею и получаю мелкие травмы во время игры, становится очевидным, что мои порезы и синяки заживают гораздо медленнее, чем у моих друзей. Оказывается, я [Select_CString(ROOT.Char.IsFemale, 'Гемофилик', 'Гемофилик' )]..."
darkages_genetic_traits.31.desc:0 "По мере взросления мне потребовалось совсем немного времени, чтобы понять, что с моим зрением что-то совсем не так. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'Слепая', 'Слепой' )]..."
darkages_genetic_traits.32.desc:0 "По мере того как я взрослею и моя сексуальность развивается, появляется много положительных признаков, указывающих на то, что я [Select_CString(ROOT.Char.IsFemale, 'Плодовитая', 'Плодовитый' )]!"
darkages_genetic_traits.100.t:0 "Судьба [darkages_child_genetic.GetFirstName]"
darkages_genetic_traits.100.desc1:0 "По мере того как мой ребенок взрослеет, становится ясно, что генетика сыграла значительную роль в его развитии.\nК сожалению, [darkages_child_genetic.GetFirstName] [Select_CString(darkages_child_genetic.IsFemale, 'оказалась', 'оказался' )] [Select_CString(darkages_child_genetic.IsFemale, 'Меланхоличной', 'Меланхоликом' )]..."
darkages_genetic_traits.100.desc2:0 "По мере того как мой ребенок взрослеет, становится ясно, что генетика сыграла значительную роль в его развитии.\nК сожалению, [darkages_child_genetic.GetFirstName] [Select_CString(darkages_child_genetic.IsFemale, 'оказалась', 'оказался' )] [Select_CString(darkages_child_genetic.IsFemale, 'Безумной', 'Безумным' )]..."
