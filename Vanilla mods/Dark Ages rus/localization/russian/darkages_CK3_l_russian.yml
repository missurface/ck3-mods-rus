darkages_piety.07.t:0 "Серый кардинал"
darkages_piety.07.desc1:0 "Сегодня пришли изысканные новости в форме официального послания от [pope.GetName], в котором меня просят провести некоторое время с [pope.GetHerHim], чтобы обсудить великие дипломатические варианты, доступные для нашей веры.\n\nОбщение и внимание такой заметной фигуры, безусловно, захватывает и может принести большие награды, но существуют серьезные риски в случае неудачи..."
darkages_piety.07.desc2:0 "Сегодня пришли изысканные новости в форме официального послания от [pope.GetName], в котором меня просят провести некоторое время с [pope.GetHerHim], чтобы обсудить великие военные варианты, доступные для нашей веры.\n\nОбщение и внимание такой заметной фигуры, безусловно, захватывает и может принести большие награды, но существуют серьезные риски в случае неудачи..."
darkages_piety.07.desc3:0 "Сегодня пришли изысканные новости в форме официального послания от [pope.GetName], в котором меня просят провести некоторое время с [pope.GetHerHim], чтобы обсудить великие варианты управления, доступные для нашей веры.\n\nОбщение и внимание такой заметной фигуры, безусловно, захватывает и может принести большие награды, но существуют серьезные риски в случае неудачи..."
darkages_piety.07.desc4:0 "Сегодня пришли изысканные новости в форме официального послания от [pope.GetName], в котором меня просят провести некоторое время с [pope.GetHerHim], чтобы обсудить великие варианты интриг, доступные для нашей веры.\n\nОбщение и внимание такой заметной фигуры, безусловно, захватывает и может принести большие награды, но существуют серьезные риски в случае неудачи..."
darkages_piety.07.desc5:0 "Сегодня пришли изысканные новости в форме официального послания от [pope.GetName], в котором меня просят провести некоторое время с [pope.GetHerHim], чтобы обсудить великие религиозные варианты, доступные для нашей веры.\n\nОбщение и внимание такой заметной фигуры, безусловно, захватывает и может принести большие награды, но существуют серьезные риски в случае неудачи..."
darkages_piety.07.tt1:0 "Вы соглашаетесь и оплачиваете свое путешествие вместе со своей свитой в роскошной манере, чтобы повлиять на [pope.GetName]. Тщательно оцените свой выбор касательно предмета обсуждения, вашу способность дать здравый совет в рамках предмета и способности [pope.GetName] в том же предмете. Также важным для обеих сторон среди связанных свойств в области необходимых знаний является наличие свойства [Concept('shrewd', 'Проницательность')|E]. Наконец, следование соответствующему Образу жизни обсуждаемых вопросов также важно для вероятностей конечного результата\n"
darkages_piety.07.opta:0 "Я ваш покорный слуга..."
darkages_piety.07.optb:0 "Я упущу эту возможность..."
darkages_piety.07.tt2:0 "Отказавшись от приглашения, вы немедленно потерпите неудачу в глазах [pope.GetName], получив серьезные штрафы за свое решение. Если вы [Concept('zealous', 'Фанатик')|E], ожидайте, что последствия будут намного хуже\n"
darkages_piety.08.tt1:0 "Шанс получить этот результат был изменен [Concept('diplomacy', 'Дипломатией')|E] как вас, так и [pope.GetName]; если положительно, то чем больше разница между обоими, тем выше ваши шансы на успех, если отрицательно - шансы на неудачу. Также важными и в порядке возрастания важности являются наличие свойств [Concept('gregarious', 'Общительность')|E], [Concept('diplomat', 'Дипломат')|E] и [Concept('shrewd', 'Проницательность')|E] для обеих сторон и то, следуют ли они Образу жизни Дипломатии\n"
darkages_piety.08.t:0 "Серый кардинал"
darkages_piety.08.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать дипломатические дела международного уровня с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] доминировать в предмете обсуждения намного лучше, чем [pope.GetSheHe].\n\nТщательно сформулированными фразами я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] склонять [Select_CString(pope.IsFemale, 'ее', 'его')] волю к моим личным мнениям, и в конце концов [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] сформировать великую дипломатию моей собственной веры!\n\nУчитывая мое влияние и публичный характер нашей встречи, помимо получения огромного количества [Concept('piety', 'Благочестия')|E], я также заработаю много [Concept('prestige', 'Престижа')|E]..."
darkages_piety.08.desc2:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать дипломатические дела международного уровня с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] не в своей тарелке в предмете обсуждения.\n\nЗаикаясь пустыми фразами и полыми аргументами, вскоре мне стало ясно, что [pope.GetName] [Select_CString(pope.IsFemale, 'почувствовала', 'почувствовал')], что [Select_CString(pope.IsFemale, 'ее', 'его')] время тратится впустую.\n\nК сожалению, и также учитывая публичный характер встречи, все это дело - полная катастрофа!"
darkages_piety.08.opta:0 "Благословен Господь!"
darkages_piety.08.optb:0 "О нет...!"
darkages_piety.09.tt1:0 "Шанс получить этот результат был изменен [Concept('martial', 'Военным делом')|E] как вас, так и [pope.GetName]; если положительно, то чем больше разница между обоими, тем выше ваши шансы на успех, если отрицательно - шансы на неудачу. Также важными и в порядке возрастания важности являются наличие свойств [Concept('brave', 'Отвага')|E], [Concept('strategist', 'Стратег')|E] и [Concept('shrewd', 'Проницательность')|E] для обеих сторон и то, следуют ли они Образу жизни Военного дела\n"
darkages_piety.09.t:0 "Серый кардинал"
darkages_piety.09.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать военные дела международного уровня с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] доминировать в предмете обсуждения намного лучше, чем [pope.GetSheHe].\n\nТщательно сформулированными фразами я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] склонять [Select_CString(pope.IsFemale, 'ее', 'его')] волю к моим личным мнениям, и в конце концов [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] сформировать великую стратегию моей собственной веры!\n\nУчитывая мое влияние и публичный характер нашей встречи, помимо получения огромного количества [Concept('piety', 'Благочестия')|E], я также заработаю много [Concept('prestige', 'Престижа')|E]..."
darkages_piety.09.desc2:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать военные дела международного уровня с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] не в своей тарелке в предмете обсуждения.\n\nЗаикаясь пустыми фразами и полыми аргументами, вскоре мне стало ясно, что [pope.GetName] [Select_CString(pope.IsFemale, 'почувствовала', 'почувствовал')], что [Select_CString(pope.IsFemale, 'ее', 'его')] время тратится впустую.\n\nК сожалению, и также учитывая публичный характер встречи, все это дело - полная катастрофа!"
darkages_piety.09.opta:0 "Благословен Господь!"
darkages_piety.09.optb:0 "О нет...!"
darkages_piety.10.tt1:0 "Шанс получить этот результат был изменен [Concept('stewardship', 'Управлением')|E] как вас, так и [pope.GetName]; если положительно, то чем больше разница между обоими, тем выше ваши шансы на успех, если отрицательно - шансы на неудачу. Также важными и в порядке возрастания важности являются наличие свойств [Concept('diligent', 'Усердие')|E], [Concept('administrator', 'Администратор')|E] и [Concept('shrewd', 'Проницательность')|E] для обеих сторон и то, следуют ли они Образу жизни Управления\n"
darkages_piety.10.t:0 "Серый кардинал"
darkages_piety.10.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать дела управления международного уровня с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] доминировать в предмете обсуждения намного лучше, чем [pope.GetSheHe].\n\nТщательно сформулированными фразами я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] склонять [Select_CString(pope.IsFemale, 'ее', 'его')] волю к моим личным мнениям, и в конце концов [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] сформировать аспекты управления моей собственной веры!\n\nУчитывая мое влияние и публичный характер нашей встречи, помимо получения огромного количества [Concept('piety', 'Благочестия')|E], я также заработаю много [Concept('prestige', 'Престижа')|E]..."
darkages_piety.10.desc2:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать дела управления международного уровня с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] не в своей тарелке в предмете обсуждения.\n\nЗаикаясь пустыми фразами и полыми аргументами, вскоре мне стало ясно, что [pope.GetName] [Select_CString(pope.IsFemale, 'почувствовала', 'почувствовал')], что [Select_CString(pope.IsFemale, 'ее', 'его')] время тратится впустую.\n\nК сожалению, и также учитывая публичный характер встречи, все это дело - полная катастрофа!"
