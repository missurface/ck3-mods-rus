darkages_check_development.01.optc:0 "Давай сделаем это с меньшими затратами"
darkages_check_development.02.t:0 "Путь к развитию"
darkages_check_development.02.desc1:0 "Как опытный Архитектор, я глубоко в сердце [Select_CString(ROOT.Char.IsFemale, 'переживаю', 'переживаю')] за прогрессивное Развитие моих Графств.\n\nОглядывая весь мой Домен, я вижу, что некоторые Графства нуждаются в лучшей инфраструктуре для беспрепятственного продолжения развития.\n\nДороги, мосты, акведуки, общественные бани, канализация, основные медицинские учреждения и многое другое крайне востребованы во всех моих владениях, и благодаря моему архитектурному мастерству я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] спроектировать и реализовать их самым рациональным способом.\n\nКредиторы доверяют моей способности осуществить эти амбициозные изменения в моем Домене и готовы раскошелиться, если это необходимо.\n\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] воспользоваться моментом и продвинуть свою Державу вперед!"
darkages_check_development.02.desc2:0 "Как человек с почти несравненным Управлением, я глубоко в сердце [Select_CString(ROOT.Char.IsFemale, 'переживаю', 'переживаю')] за прогрессивное Развитие моих Графств.\n\nОглядывая весь мой Домен, я вижу, что некоторые Графства нуждаются в лучшей инфраструктуре для беспрепятственного продолжения развития.\n\nДороги, мосты, акведуки, общественные бани, канализация, основные медицинские учреждения и многое другое крайне востребованы во всех моих владениях, и, применяя свое мастерство Управления, я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] спроектировать и реализовать их самым рациональным способом.\n\nКредиторы доверяют моей способности осуществить эти амбициозные изменения в моем Домене и готовы раскошелиться, если это необходимо.\n\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] воспользоваться моментом и продвинуть свою Державу вперед!"
darkages_check_development.02.desc3:0 "Как опытный архитектор и дальновидный строитель с почти несравненным Управлением, я глубоко в сердце [Select_CString(ROOT.Char.IsFemale, 'переживаю', 'переживаю')] за прогрессивное Развитие моих Графств.\n\nОглядывая весь мой Домен, я вижу, что некоторые Графства нуждаются в лучшей инфраструктуре для беспрепятственного продолжения развития.\n\nДороги, мосты, акведуки, общественные бани, канализация, основные медицинские учреждения и многое другое крайне востребованы во всех моих владениях, и, применяя свои блестящие Навыки и Черты, я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] спроектировать и реализовать их самым рациональным способом.\n\nКредиторы доверяют моей способности осуществить эти амбициозные изменения в моем Домене и готовы раскошелиться, если это необходимо.\n\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] воспользоваться моментом и продвинуть свою Державу вперед!"
darkages_check_development.02.opta:0 "Я уверенно сделаю следующий шаг!"
darkages_check_development.02.optb:0 "Это не что-то срочное..."
darkages_check_development.02.tt1:0 "Это событие происходит потому, что у вас есть либо черта Архитектор, либо Управление не менее 21. У вас есть возможность улучшить инфраструктуру ваших Графств и беспрепятственно продолжать их развитие за небольшую часть от обычно уплачиваемой цены\n"
darkages_check_development.04.opta:0 "Что есть, то есть..."
darkages_check_development.04.t:0 "Отсутствие инфраструктуры"
darkages_check_development.04.desc:0 "Мой недавний отказ от развития значительной инфраструктуры в [my_county.GetName] - или нехватка средств для финансирования операции - привели к постепенному превращению региона в заброшенный, который мог бы подняться на следующие стадии развития.\n\nК сожалению, мое решение привело к значительным проблемам в перспективах Графства..."
darkages_wound_recovery.01.t:0 "Раненый дух"
darkages_wound_recovery.01.desc:0 "Лежа в постели, скованный ранами, у меня есть время поразмыслить о смысле жизни и о том, насколько слаба моя хватка за нее.\n\nМоя судьба отчасти зависит от моего телосложения, отчасти от ухода, который я получаю, но в основном от удачи.\n\nВремя идет, развязка приближается, но в конце концов я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов')] принять свою судьбу..."
darkages_wound_recovery.01.opta:0 "Будем надеяться на лучшее..."
darkages_chancellor.18.t:0 "Глаз на таланты"
darkages_chancellor.18.desc:0 "Пока я наслаждаюсь обедом в компании [chancellor.GetName|d], мой [chancellor.GetCouncilTitle] начинает рассказывать мне об одном своем отличном знакомом, который идеально вписался бы в мой Двор.\n\nКогда мы заканчиваем трапезу, [chancellor.GetSheHe] продолжает рассказывать о великих качествах, которые демонстрирует этот философ, и о том, как, возможно, его можно было бы нанять в качестве доверенного советника в мой совет.\n\nКонечно, этот человек, вероятно, [Select_CString(chancellor.IsFemale, 'ее', 'его')] друг, и мой сообразительный [chancellor.GetCouncilTitle] использует это, чтобы получить от меня одолжение, если я сделаю шаг, чтобы нанять [chancellor.GetHerHis] философа.\n\nОднако это может быть возможностью добавить новую личность в мой Двор или даже в мой Совет..."
darkages_chancellor.18.opta:0 "Я найму его!"
darkages_chancellor.18.optb:0 "Оставь эту мысль, [chancellor.GetFirstName]..."
darkages_court_chaplain.08.t:0 "Глаз на таланты"
darkages_court_chaplain.08.desc:0 "Пока я наслаждаюсь ужином в компании [court_chaplain.GetName|d], мой [court_chaplain.GetCouncilTitle] начинает рассказывать мне об одном своем отличном знакомом, который идеально вписался бы в мой Двор.\n\nКогда мы заканчиваем трапезу, [court_chaplain.GetSheHe] продолжает рассказывать о великих качествах, которые демонстрирует этот подозрительный человек, и о том, как, возможно, его можно было бы нанять в качестве доверенного советника в мой совет.\n\nКонечно, этот человек, вероятно, [Select_CString(court_chaplain.IsFemale, 'ее', 'его')] друг, и мой сообразительный [court_chaplain.GetCouncilTitle] использует это, чтобы получить от меня одолжение, если я сделаю шаг, чтобы нанять [court_chaplain.GetHerHis] скрытного персонажа.\n\nОднако это может быть возможностью добавить новую личность в мой Двор или даже в мой Совет..."
darkages_court_chaplain.08.opta:0 "Я найму его!"
darkages_court_chaplain.08.optb:0 "Оставь эту мысль, [court_chaplain.GetFirstName]..."
darkages_marshal.11.t:0 "Глаз на таланты"
darkages_marshal.11.desc:0 "Сегодня утром [marshal.GetName] [Select_CString(marshal.IsFemale, 'попросила', 'попросил')] меня переговорить наедине по делу, которое может меня заинтересовать в отношении моего Двора и даже управления Державой.\n\nС разгоревшимся любопытством я [Select_CString(ROOT.Char.IsFemale, 'слушала', 'слушал')], как мой [marshal.GetCouncilTitle] представляет мне человека с дотошным и организованным духом в лице [candidate.GetName|d].\n\nМне сказали, что этот человек может стать хорошим дополнением к моему Двору или даже, если я так [Select_CString(ROOT.Char.IsFemale, 'захочу', 'захочу')] и учитывая его таланты, быть приглашенным в качестве Советника.\n\nКонечно, я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')], что [Select_CString(marshal.IsFemale, 'старая', 'старый')] [marshal.GetFirstName] болеет за того, кто увеличивает [marshal.GetHerHis] личное влияние, возможно, даже друга, но, по правде говоря, это действительно может меня заинтересовать..."
darkages_marshal.11.opta:0 "Я найму его!"
darkages_marshal.11.optb:0 "Оставь эту мысль, [marshal.GetFirstName]..."
darkages_spymaster.22.t:0 "Глаз на таланты"
darkages_spymaster.22.desc:0 "Поздним вечером, когда я [Select_CString(ROOT.Char.IsFemale, 'дышала', 'дышал')] бодрящим северным ветром, мой [spymaster.GetCouncilTitle] молча [Select_CString(spymaster.IsFemale, 'подошла', 'подошел')] ко мне с хитрой улыбкой на лице.\n\nПохоже, [spymaster.GetName] [Select_CString(spymaster.IsFemale, 'хотела', 'хотел')] бы познакомить меня с кем-то, кого [spymaster.GetSheHe] хорошо знает и о ком высокого мнения. Этого человека зовут [candidate.GetName], и он имеет репутацию очень надежного командира.\n\nНа мои расспросы выяснилось, что он набрался опыта как капитан наемников, которому так и не довелось служить под знаменем настоящего дворянина.\n\nМой [spymaster.GetCouncilTitle], возможно, [Select_CString(spymaster.IsFemale, 'готова', 'готов')] пристроить друга на влиятельную должность при моем Дворе или даже в моем Совете, но я знаю, как трудно в наши дни найти достойных командиров..."
darkages_spymaster.22.opta:0 "Я найму его!"
darkages_spymaster.22.optb:0 "Оставь эту мысль, [spymaster.GetFirstName]..." 
darkages_steward.11.t:0 "Глаз на таланты"
darkages_steward.11.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'просматривала', 'просматривал')] свитки днем в своем личном кабинете, [steward.GetName] [Select_CString(steward.IsFemale, 'постучала', 'постучал')] в дверь, прося меня обсудить дело некоторой важности.\n\nПригласив [steward.GetCouncilTitle|d] присесть и расслабиться, я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] не заметить [steward.GetHerHis] нетерпеливого выражения лица, когда [steward.GetSheHe] [Select_CString(steward.IsFemale, 'начала', 'начал')] представлять мне некоего интересного человека, который мог бы стать хорошим кандидатом для включения в мой Двор или даже Совет.\n\nКогда дело было полностью объяснено, [candidate.GetName] [Select_CString(steward.IsFemale, 'показался', 'показался')] довольно талантливым, но, вероятно, также другом [steward.GetFirstName|d], которого мой хитрый [steward.GetCouncilTitle] хочет включить в придворную политику..."
darkages_steward.11.opta:0 "Я найму его!"
darkages_steward.11.optb:0 "Оставь эту мысль, [steward.GetFirstName]..." 
darkages_spouse.08.t:0 "Глаз на таланты"
darkages_spouse.08.desc:0 "После ночи любви, утром мой чувственный [spouse.GetCouncilTitle] соблазнительно прошептал мне на ухо, что [spouse.GetSheHe] знает об одной девушке, которую не удалось представить ко Двору из-за какой-то грязной интриги, но которая обладает набором хороших навыков и черт, которые могут быть полезны в нашем кругу.\n\nВ конце концов, всегда нужно искать талантливых людей, на которых можно положиться, если представится случай.\n\nПоскольку мой хитрый [spouse.GetCouncilTitle], вероятно, также продвигает [spouse.GetHerHis] собственные планы, продвигая подругу, дело в том, что эта девушка по имени [candidate.GetName] действительно подает большие надежды, даже если включение этой печально известной женщины в наш Двор будет стоить мне Престижа..."
darkages_spouse.08.opta:0 "Я приму ее!"
darkages_spouse.08.optb:0 "Оставь эту мысль, [spouse.GetFirstName]..."
darkages_councillors_negative_opinion.01.t:0 "Ядовитые слухи"
darkages_councillors_negative_opinion.01.desc:0 "Недавно я [Select_CString(ROOT.Char.IsFemale, 'обнаружила', 'обнаружил')] попытку кого-то, кто может быть только частью моего Совета, очернить меня среди моих Придворных, Гостей и Вассалов, которые подвержены влиянию.\n\nЭто дурное слово обо мне может быть сказано только из презрения к моей персоне, что без доказательств указывает, возможно, на [councillor_prey.GetName|d].\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] быть начеку относительно возможных будущих попыток снова опорочить меня, в то время как, возможно, перестановка должностей в Совете, чтобы разместить кого-то с лучшим мнением обо мне, была бы уместной..."
darkages_councillors_negative_opinion.01.opta:0 "Я совсем не [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад')]."
darkages_councillors_negative_opinion.01.optb:0 "Давайте сдержим нанесенный ущерб!"
darkages_councillors_negative_opinion.01.optc:0 "Попытаться раскрыть истинного интригана..."
darkages_councillors_negative_opinion.01.tt1:0 "Помимо показанных эффектов, каждый ваш Придворный, Гость и Вассал, восприимчивый к хорошей интриге, будет испытывать к вам Отвращение\n"
darkages_councillors_negative_opinion.01.tt2:0 "Эта опция доступна, потому что вы Общительны, Усердны, Амбициозны, Дипломат или у вас Дипломатия не менее 12. Вы пытаетесь положительно повлиять на вовлеченных людей. Помимо указанных последствий, существует вероятность, основанная на вашем Навыке Дипломатии (чем выше Дипломатия, тем ниже вероятность) и на вашем Образовании в Дипломатии (снижает вероятность), что каждый ваш Придворный, Гость и Вассал, восприимчивый к хорошей интриге, будет испытывать к вам Отвращение\n"
darkages_councillors_negative_opinion.01.tt3:0 "Эта опция доступна, потому что вы Мстительны, Гневны, Черствы, Интриган или у вас Интрига не менее 12. Хотя вы пострадаете от последствий сказанного о вас дурного слова среди тех, кто к нему восприимчив, вы попытаетесь выяснить и найти доказательства того, кто на самом деле стоит за этой интригой. Успех этого действия положительно зависит от вашего высокого уровня Интриги, от вашего уровня Ужаса - все, что выше 15, даст бонус, причем более высокий Ужас дает большие бонусы - и от наличия Образования в Интриге. Отрицательно влияют на шанс успеха, низкие уровни Ужаса (менее 10), Лень, Сострадание или Доверчивость. Ваш Престиж будет затронут в зависимости от успеха этого действия\n"
darkages_councillors_negative_opinion.02.t:0 "Негодяй раскрыт!"
darkages_councillors_negative_opinion.02.desc:0 "Мое расследование по поводу слухов, циркулирующих обо мне, было успешным актом изобретательного расследования и мышления!\n\nС чувством победы, облегчения, но в то же время отвращения я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал')] о выходках [councillor.GetName|d] касательно лжи, которую [councillor.GetSheHe] [Select_CString(councillor.IsFemale, 'распространяла', 'распространял')] обо мне...\n\nТеперь, по крайней мере, полагается компенсация!"
darkages_councillors_negative_opinion.02.opta:0 "Отличная работа!"
darkages_councillors_negative_opinion.03.t:0 "Ложь без следа"
darkages_councillors_negative_opinion.03.desc:0 "Мое расследование по поводу слухов, циркулирующих обо мне, зашло в тупик, защищенный щитом лжи, полуправды и спекулятивного мышления.\n\nК сожалению, и учитывая широкий охват моего расследования, при этой неудаче именно мой Престиж сильно пострадает..."
darkages_councillors_negative_opinion.03.opta:0 "Если я когда-нибудь поймаю виновного..."
darkages_councillors_negative_opinion.04.t:0 "Растрата"
darkages_councillors_negative_opinion.04.desc:0 "Из-за отсутствия уважения и мнения, я [Select_CString(ROOT.Char.IsFemale, 'обнаружила', 'обнаружил')] сегодня после долгих исследований и просмотра счетов Державы, что один из членов моего Совета потратил гораздо больше, чем ему или ей было выделено.\n\nЯ далеко не [Select_CString(ROOT.Char.IsFemale, 'счастлива', 'счастлив')] и подозреваю, что [councillor.GetName] стоит за этими возмутительными расходами!\n\nТем не менее, вся афера была мастерски проделана, и у меня нет доказательств против [councillor.GetHerHim]..."
darkages_councillors_negative_opinion.04.opta:0 "Перенести потерю молча"
darkages_councillors_negative_opinion.04.optb:0 "Исправить ситуацию, используя свои навыки"
darkages_councillors_negative_opinion.04.optc:0 "Обвинить и преследовать [councillor.GetFirstName|d]!"
darkages_councillors_negative_opinion.04.tt1:0 "Вы публично раскроете мошенничество, и можно ожидать, что вся схема прекратится\n"
darkages_councillors_negative_opinion.04.tt2:0 "Эта опция доступна, потому что вы Администратор, Жадны, Усердны или имеете не менее 12 в Навыке Управления. Вы попытаетесь сократить свои потери, когда это возможно, убедив все невиновные вовлеченные стороны прийти к финансовому соглашению с вами\n"
darkages_councillors_negative_opinion.04.tt3:0 "Эта опция доступна, потому что вы Параноик, Черствы, Мстительны, Деспотичны или Лживы. Вы заключите в тюрьму своего подозреваемого без доказательств вместе с другими людьми, которые, вероятно, невиновны, чтобы повысить свой Престиж. Вы конфискуете часть украденного у всех вовлеченных сторон. Конечно, с этим вариантом есть и другие проблемы. Не забывайте, что высокий Ужас и Тирания также могут привести к покушениям на вашего персонажа\n"
darkages_councillors_negative_opinion.05.tt4:0 "Нет потери Престижа"
darkages_councillors_negative_opinion.05.t:0 "Испорченный взгляд"
darkages_councillors_negative_opinion.05.desc:0 "Сначала я с беспокойством [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')] намеки, затем с гневом [Select_CString(ROOT.Char.IsFemale, 'отметила', 'отметил')] улики, и, наконец, я [Select_CString(ROOT.Char.IsFemale, 'подтвердила', 'подтвердил')], что кто-то из моего Совета явно пытается нанести вред моему Престижу, распространяя полуправду и ложь о моей персоне среди моих пэров.\n\nХотя я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался')] выяснить, кто является виновным членом совета, негодяй очень хорошо замел свои следы, и мое расследование ни к чему не привело.\n\nПри этом у меня сильное подозрение насчет действий [councillor.GetName]... [councillor.GetSheHe] предатель?"
darkages_councillors_negative_opinion.05.opta:0 "Я восстановлю свой Престиж со временем..."
darkages_councillors_negative_opinion.05.optb:0 "Мой политический опыт спасет меня"
darkages_councillors_negative_opinion.05.optc:0 "Я арестую своего Советника!"
darkages_councillors_negative_opinion.05.tt3:0 "Эта опция доступна, потому что вы Параноик, Черствы, Мстительны, Деспотичны или Лживы. Вы заключите в тюрьму своего подозреваемого без доказательств вместе с другими людьми, которые, вероятно, невиновны, чтобы частично избежать потери Престижа. Конечно, с этим вариантом есть и другие проблемы. Не забывайте, что высокий Ужас и Тирания также могут привести к покушениям на вашего персонажа\n"
darkages_councillors_negative_opinion.05.tt2:0 "Эта опция доступна, потому что вы Дипломат, Общительны, Усердны или имеете не менее 12 в Навыке Дипломатии. Вы пытаетесь наладить отношения со своими пэрами, успех чего зависит от вашего Навыка Дипломатии и от других факторов, прямо или косвенно связанных с задачей\n"
darkages_councillors_negative_opinion.05.tt1:0 "Вы публично раскроете то, что знаете, и действия предателя, вероятно, прекратятся\n"
darkages_councillors_negative_opinion.06.t:0 "Религиозные опасения"
darkages_councillors_negative_opinion.06.desc:0 "Недавно мне стало известно о беспокойстве всех религиозных сановников по поводу моего поведения.\n\nЭто крайне огорчает, так как я не [Select_CString(ROOT.Char.IsFemale, 'нахожу', 'нахожу')] никакой ошибки в своих решениях касательно любого религиозного вопроса.\n\nВ настоящее время я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал')], что кто-то внутри моего Совета умаляет мое положение среди религиозных элит, и мое Благочестие страдает.\n\nУчитывая плохое мнение обо мне, я думаю, что главным подозреваемым в таком гнусном поступке является не кто иной, как [councillor.GetName].\nТеперь мне нужно решить, что я буду делать..."
darkages_councillors_negative_opinion.06.opta:0 "Принять свою судьбу и подставить другую щеку"
darkages_councillors_negative_opinion.06.optb:0 "Попытаться исправить ситуацию"
darkages_councillors_negative_opinion.06.optc:0 "Я арестую [councillor.GetFirstName|d]!"
darkages_councillors_negative_opinion.06.tt3:0 "Эта опция доступна, потому что вы Параноик, Черствы, Мстительны, Деспотичны или Лживы, или имеете не менее 20 Ужаса. Вы заключите в тюрьму своего подозреваемого без доказательств вместе с другими людьми, которые, вероятно, невиновны, чтобы частично избежать потери Благочестия. Конечно, с этим вариантом есть и другие проблемы. Не забывайте, что высокий Ужас и Тирания также могут привести к покушениям на вашего персонажа\n"
darkages_councillors_negative_opinion.06.tt2:0 "Эта опция доступна, потому что вы Теолог, Ревностны, Усердны или имеете не менее 12 в Навыке Учености. Вы пытаетесь наладить отношения с религиозными властями, успех чего зависит от вашего Навыка Учености и других факторов, прямо или косвенно связанных с задачей\n"
darkages_councillors_negative_opinion.06.tt1:0 "Вы публично раскроете то, что знаете, и действия предателя, вероятно, прекратятся\n"
darkages_councillors_negative_opinion.06.tt4:0 "Нет потери Благочестия"
darkages_councillors_negative_opinion.07.t:0 "Династическая авантюра"
darkages_councillors_negative_opinion.07.desc:0 "Недавно мне стало известно о слухах, исходящих из моего Совета, которые портили Признание моей Династии, распространяя язвительные замечания о моих способностях управлять моей Державой.\n\nПосле беглого частного расследования я не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] точно определить виновного Советника, но подозреваю, что [councillor.GetName] стоит за этой схемой.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] быть начеку относительно Советников с плохим мнением обо мне..."
darkages_councillors_negative_opinion.07.opta:0 "Я могу заботиться только о будущем..."
darkages_councillors_negative_opinion.07.optb:0 "Попытаться смягчить ущерб"
darkages_councillors_negative_opinion.07.optc:0 "Время обвинить [councillor.GetFirstName|d]!"
darkages_councillors_negative_opinion.07.tt3:0 "Эта опция доступна, потому что вы Параноик, Черствы, Мстительны, Деспотичны или Лживы. Вы заключите в тюрьму своего подозреваемого без доказательств вместе с другими людьми, которые, вероятно, невиновны, чтобы частично избежать потери Признания. Конечно, с этим вариантом есть и другие проблемы. Не забывайте, что высокий Ужас и Тирания также могут привести к покушениям на вашего персонажа\n"
darkages_councillors_negative_opinion.07.tt2:0 "Эта опция доступна, потому что вы Август, Высокомерный, Усердны или имеете не менее 12 в Навыке Дипломатии. Вы пытаетесь опровергнуть слухи, окружающие вашу компетентность и компетентность вашей Династии, успех чего зависит от вашего Навыка Дипломатии и других факторов, прямо или косвенно связанных с задачей\n"
darkages_councillors_negative_opinion.07.tt1:0 "Вы публично раскроете то, что знаете, и действия предателя, вероятно, прекратятся\n"
darkages_councillors_negative_opinion.07.tt4:0 "Нет потери Признания"
darkages_county_tax_cut:0 "Снижение налогов"
darkages_county_tax_cut_desc:0 "Налоги в этом Графстве значительно снижены"
darkages_tax_break:0 "Предоставить налоговые льготы"
tax_break_decision_tooltip:0 "Предоставить налоговые льготы недовольным провинциям в вашем Домене"
tax_break_desc:0 "Поскольку Народное мнение очень низкое в некоторых ваших Провинциях, возможно, пришло время дать вашему населению время порадоваться, чтобы избежать менее приятных последствий, таких как покушения на убийство.\n\nЭто будет стоить значительного дохода, но личная безопасность превыше всего!"
darkages_tax_break_confirm:0 "Разумнее перестраховаться"
darkages_assemble_estates:0 "Созвать Сословия Державы"
darkages_assemble_estates_desc:0 "Я могу созвать различные социальные фракции внутри моей Державы, чтобы попытаться установить конструктивную и очень благоприятную политическую повестку дня в долгосрочной перспективе. У меня будет возможность выбрать повестку дня встречи в следующем событии. Если я проактивно организую встречу с помощью этого решения, у меня будет больше шансов на успех, чем если я буду реагировать на требования различных фракций Державы. После организации, в течение 10 лет другую встречу организовать нельзя. Шанс на успех положительно зависит от моих Навыков выше 11 и отрицательно от моих Навыков ниже 8."
darkages_assemble_estates_decision_tooltip:0 "Созвать Сословия Державы для получения множества преимуществ"
darkages_assemble_estates_confirm:0 "Организовать все дело"
darkages_county_despondent:0 "Унылая политическая обстановка"
darkages_county_despondent_desc:0 "Социальные партии этого Графства чувствуют себя обиженными, потому что их Правителю не хватает инициативы для проведения Сословий Державы в течение долгого времени"
darkages_estates_of_the_realm.01.t:0 "Особое требование"
darkages_estates_of_the_realm.01.desc:0 "Мои вассалы, а также низшие слои общества становятся беспокойными, поскольку я давно не [Select_CString(ROOT.Char.IsFemale, 'созывала', 'созывал')] Сословия Державы для планирования нашей стратегии в долгосрочной перспективе.\n\nЭто дорогостоящее дело, и все может пойти наперекосяк, если мне не хватит способности произвести хорошее впечатление на всех.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] тщательно взвесить все за и против организации всего этого дела..."
darkages_estates_of_the_realm.01.opta:0 "Созвать всех во дворец!"
darkages_estates_of_the_realm.01.optb:0 "Не собираюсь организовывать это сейчас..."
darkages_estates_of_the_realm.01.tt1:0 "Помимо представленных ниже эффектов, все вассалы и субвассалы вашей Державы будут разгневаны вашим отказом созвать Сословия Державы. Вы не сможете выбрать Решение Созвать Сословия Державы в течение 2 лет\n"
darkages_county_estates_1:0 "Сословия Державы"
darkages_county_estates_1_desc:0 "Последствия успешного грандиозного собрания всех заинтересованных фракций Державы"
darkages_county_estates_2:0 "Сословия Державы"
darkages_county_estates_2_desc:0 "Последствия успешного грандиозного собрания всех заинтересованных фракций Державы"
darkages_county_estates_3:0 "Сословия Державы"
darkages_county_estates_3_desc:0 "Последствия успешного грандиозного собрания всех заинтересованных фракций Державы"
darkages_county_estates_4:0 "Сословия Державы"
darkages_county_estates_4_desc:0 "Последствия успешного грандиозного собрания всех заинтересованных фракций Державы"
darkages_county_estates_5:0 "Сословия Державы"
darkages_county_estates_5_desc:0 "Последствия успешного грандиозного собрания всех заинтересованных фракций Державы"
darkages_county_estates_6:0 "Сословия Державы"
darkages_county_estates_6_desc:0 "Последствия успешного грандиозного собрания всех заинтересованных фракций Державы"
darkages_county_estates_7:0 "Сословия Державы"
darkages_county_estates_7_desc:0 "Последствия успешного грандиозного собрания всех заинтересованных фракций Державы"
darkages_county_estates_8:0 "Сословия Державы"
darkages_county_estates_8_desc:0 "Последствия успешного грандиозного собрания всех заинтересованных фракций Державы"
darkages_estates_of_the_realm.02.t:0 "Успешное предприятие"
darkages_estates_of_the_realm.02.desc:0 "Мне удалось руководить работой Сословий Державы самым профессиональным и просвещенным образом!\n\nБыл внедрен ряд важных политик, возникло общее чувство сотрудничества, и в конце концов мне удалось всех впечатлить своими лидерскими качествами!\n\nТеперь пришло время воплотить задуманное в реальность."
darkages_estates_of_the_realm.02.opta:0 "Отличные новости!"
darkages_estates_of_the_realm.02.tt1:0 "Помимо показанных эффектов, каждый вассал и субвассал Державы будет доволен вами. Также, в их собственных Доменах будет применяться та же политика, которая была одобрена в Сословиях\n"
darkages_estates_of_the_realm.03.t:0 "Смешанные чувства"
darkages_estates_of_the_realm.03.desc:0 "Когда Сословия Державы собрались, вскоре стало ясно, что дискуссии продолжаются и продолжаются без каких-либо значительных прорывов.\n\nВсе окопались на своих позициях, и способность к компромиссу была почти нулевой.\n\nТакже было очевидно, что я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] направлять и вести дискуссии, чтобы представить более положительный результат.\n\nВ общем, это было разочаровывающее дело, где не было достигнуто ничего по-настоящему важного..."
darkages_estates_of_the_realm.03.opta:0 "Все было напрасно..."
darkages_estates_of_the_realm.04.t:0 "Ужасный провал"
darkages_estates_of_the_realm.04.desc:0 "Собрание Сословий Державы было печальным событием, где моим мнениям противостояли, мои решения игнорировались, и я рискую стать политической марионеткой фракций собственной Державы, будь то дворянских или простолюдинов.\n\nВ конце концов, это было дорогостоящее мероприятие, на котором пока ничего не было достигнуто, и где я политически теряю власть над своими подданными..."
darkages_estates_of_the_realm.04.opta:0 "Какая дорогостоящая ошибка..."
darkages_estates_of_the_realm.04.optb:0 "Утвердить свою политическую волю!"
darkages_estates_of_the_realm.04.tt1:0 "Эта опция доступна, потому что у вас не менее 30 Ужаса, вы Черствы, Садист, Мстительны или Деспотичны. Вы отстаиваете свою позицию, внушая страх всем, и избегаете манипуляций в процессе\n"
darkages_estates_realm_lost:0 "Политически переигран"
darkages_estates_realm_lost_desc:0 "Этим персонажем манипулировали все на недавнем собрании Сословий Державы"
darkages_estates_of_the_realm.05.t:0 "Своевременное предупреждение"
darkages_estates_of_the_realm.05.desc:0 "Однажды утром, прогуливаясь по моей столице в компании [spymaster.GetFirstName|d], мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'упомянула', 'упомянул')] тему, которая, по [Select_CString(spymaster.IsFemale, 'ее', 'его')] словам, беспокоила [spymaster.GetHerHim] некоторое время.\n\nКак вскоре выяснилось, [spymaster.GetFirstName] беспокоится о давлении, которое различные фракции в моей Державе могут оказать на меня, чтобы я [Select_CString(ROOT.Char.IsFemale, 'созвала', 'созвал')] дорогостоящие Сословия Державы для обсуждения вопросов долгосрочной политики, касающихся всех.\n\nЗная, что эта просьба будет озвучена только в том случае, если моя казна поддержит это предприятие, с политической точки зрения ясно, что я получу дополнительные награды в виде Престижа и шансов на успех, если я буду [Select_CString(ROOT.Char.IsFemale, 'той', 'тем')], кто примет решение Созвать Сословия Державы, вместо того чтобы реагировать на требования фракций.\n\nТак как я [Select_CString(ROOT.Char.IsFemale, 'была предупреждена', 'был предупрежден')], мой [spymaster.GetCouncilTitle] утверждает, что теперь [Select_CString(spymaster.IsFemale, 'ее', 'его')] душа спокойна..."
darkages_estates_of_the_realm.05.opta:0 "Спасибо за твое беспокойство, [spymaster.GetFirstName]!"
darkages_councillors_negative_opinion.08.t:0 "Важное предупреждение"
darkages_councillors_negative_opinion.08.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'читала', 'читал')] важный отчет, мой разум внезапно сосредоточился на совете, данном моим [spymaster.GetCouncilTitle|d].\n\nКак оказалось, [spymaster.GetName] [Select_CString(spymaster.IsFemale, 'предупредила', 'предупредил')] меня о политических опасностях наличия Советников с отрицательным мнением обо мне, дающих советы и управляющих моей политикой.\n\nПоскольку могут возникнуть непредвиденные последствия, мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'предостерегла', 'предостерег')] меня избавиться от таких Советников или улучшить их мнение обо мне..."
darkages_councillors_negative_opinion.08.opta:0 "Спасибо за твой совет!"
darkages_check_development.01.tt10:0 "Если вы видите в событии только этот вариант, это означает, что вы залезете в слишком большие долги после оплаты улучшений в [my_county.GetName], поэтому у вас нет другого выбора, кроме как отказаться. Увеличение уровня Развития, что происходит примерно каждые десять пунктов Развития, является дорогим - очень дорогим на высоких уровнях - проектом\n"
darkages_opinion_range_1:0 "Расстояние"
darkages_opinion_range_2:0 "Расстояние"
darkages_opinion_range_3:0 "Расстояние"
darkages_opinion_range_4:0 "Расстояние"
darkages_opinion_range_5:0 "Расстояние"
darkages_check_development.04.tt1:0 "Развитие в провинции будет постепенно снижаться до следующего круглого десятка в течение действия модификатора графства 'Развитие ограничено'\n"
darkages_check_development.05.t:0 "Мудрый совет"
darkages_check_development.05.desc:0 "Во время утреннего инструктажа сегодня мой [steward.GetCouncilTitle] [Select_CString(steward.IsFemale, 'сделала', 'сделал')] важное замечание относительно управления моим Доменом. То, что подчеркивает стоимость крупных инвестиций в инфраструктуру для того, чтобы мои Графства полностью реализовали свой потенциал.\n\nКак бы то ни было, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] быть [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов')] финансировать крупные инфраструктурные проекты каждые десять уровней, чтобы провинции продолжали свое Развитие. Если у меня нет Управления 21 или я не Архитектор - тогда затраты сокращаются вдвое - расчетное минимальное количество золота, которое я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] иметь в казне, чтобы иметь возможность финансировать такое Развитие на провинцию, следующее:\n\n          Развитие 10-19: 25 золотых\n          Развитие 20-29: 75 золотых\n          Развитие 30-39: 125 золотых\n          Развитие 40-49: 150 золотых\n          Развитие 50-59: 200 золотых\n          Развитие 60-69: 250 золотых\n          Развитие 70-79: 300 золотых\n          Развитие 80-89: 450 золотых\n          Развитие > 89: 750 золотых\n\n[steward.GetFirstName] также [Select_CString(steward.IsFemale, 'сделала', 'сделал')] акцент на том, что этих сумм может быть недостаточно для покрытия полной требуемой цены, но, по крайней мере, [steward.GetSheHe] гарантирует, что моя казна сможет поддержать возможный возникший долг."
darkages_check_development.05.opta:0 "Большое спасибо за информацию!"
darkages_check_development.05.optb:0 "Пожалуйста, не донимай меня больше этими скучными цифрами..."
darkages_dread_brings_death.01.optz:0 "Великолепная работа, [spymaster.GetFirstName]!"
darkages_save_roll.tt:0 "Ваши шпионы смогли предотвратить действие, которое вполне могло привести к вашей гибели. Вероятность того, что это произойдет, положительно зависит от очень высокой Интриги вашего [spymaster.GetCouncilTitle|d] - только значение выше 17 дает бонус - и от того, является ли он Интриганом. Ваша собственная высокая Интрига - выше 11 - также увеличивает шансы на такой исход. Отрицательно влияют на этот исход ваша низкая Интрига - менее 8 - и Интрига вашего [spymaster.GetCouncilTitle|d] ниже 15. Поскольку вы были на грани смерти, вы можете быть по понятным причинам потрясены, в зависимости от ваших Личностных Черт\n"
darkages_dread_brings_death.02.desc4:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'отправлялась', 'отправлялся')] в небольшое ночное путешествие, чтобы посмотреть на звезды на небольшом холме через ближайшую реку, [spymaster.GetName], мой [spymaster.GetCouncilTitle], быстро [Select_CString(spymaster.IsFemale, 'привлекла', 'привлек')] мое внимание.\n\nВ настоящее время, похоже, покушение на мою персону было предотвращено в последнюю минуту моими шпионами!\n\nУбийца поплатился жизнью, но было ясно, что мотивом для этого покушения была моя высокая Тирания, или так [Select_CString(spymaster.IsFemale, 'доложила', 'доложил')] мой [spymaster.GetCouncilTitle]..."
darkages_dread_brings_death.01.desc4:0 "Вскоре после того, как я [Select_CString(ROOT.Char.IsFemale, 'поужинала', 'поужинал')] и [Select_CString(ROOT.Char.IsFemale, 'готовилась', 'готовился')] посетить религиозную церемонию недалеко от моего [ROOT.Char.Custom('FortifiedBuilding')], [spymaster.GetName], мой [spymaster.GetCouncilTitle], быстро [Select_CString(spymaster.IsFemale, 'привлекла', 'привлек')] мое внимание.\n\nВ настоящее время, похоже, покушение на мою персону было предотвращено в последнюю минуту моими шпионами!\n\nУбийца поплатился жизнью, но было ясно, что мотивом для этого покушения был Ужас, который я внушаю всем, или так [Select_CString(spymaster.IsFemale, 'доложила', 'доложил')] мой [spymaster.GetCouncilTitle]..."
darkages_rivals_bring_death.01.desc4:0 "Сегодня днем, пока я [Select_CString(ROOT.Char.IsFemale, 'путешествовала', 'путешествовал')] между провинциями в моем Домене, чтобы управлять своими владениями, [spymaster.GetName], мой [spymaster.GetCouncilTitle], быстро [Select_CString(spymaster.IsFemale, 'привлекла', 'привлек')] мое внимание.\n\nВ настоящее время, похоже, покушение на мою персону было предотвращено в последнюю минуту моими шпионами!\n\nУбийца поплатился жизнью, но есть некоторые гипотетические доказательства того, что [target_rival.GetName] [Select_CString(target_rival.IsFemale, 'спланировала', 'спланировал')] это гнусное действие, или так [Select_CString(spymaster.IsFemale, 'доложила', 'доложил')] мой [spymaster.GetCouncilTitle]..."
darkages_rivals_bring_death.03.t:0 "Месть Немезиды"
darkages_experienced_politician.01.t:0 "Занятия политикой"
darkages_experienced_politician.01.desc1:0 "Как того требует мое положение, глубоко вовлекая себя в политику Державы, я обмениваюсь аргументами, излагаю идеи, защищаю свои точки зрения и политически наношу удары в спину аргументам других Советников.\n\nК сожалению, я, кажется, не совсем [Select_CString(ROOT.Char.IsFemale, 'понимаю', 'понимаю')] политический аспект вопроса, и мне становится все яснее и яснее, что я никогда не буду [Select_CString(ROOT.Char.IsFemale, 'великиим политиком', 'великим политиком')]..."
darkages_experienced_politician.01.opta:0 "Мои сильные стороны в другом"
darkages_experienced_politician.01.tt1:0 "Вследствие того, что вы титулованный персонаж или занимаете место в Совете вашего Сюзерена, у вас был шанс понять политический аспект каждого решения, принимаемого в отношении Державы. К сожалению, вы не справились с задачей, и в зависимости от вашей личности это осознание может сопровождаться некоторым стрессом\n"
darkages_experienced_politician.01.tt2:0 "Вследствие того, что вы титулованный персонаж или занимаете место в Совете вашего Сюзерена, у вас был шанс понять политический аспект каждого решения, принимаемого в отношении Державы. После многих лет труда вы знаете, что справляетесь с задачей!\n"
darkages_experienced_politician.01.optb:0 "Замечательно!"
darkages_experienced_politician.01.desc2:0 "Как того требует мое положение, глубоко вовлекая себя в политику Державы, я обмениваюсь аргументами, излагаю идеи, защищаю свои точки зрения и политически наношу удары в спину аргументам других Советников.\n\nСо временем я медленно [Select_CString(ROOT.Char.IsFemale, 'освоила', 'освоил')] искусство политического маневра для достижения своих целей, тем самым повысив свою политическую эффективность во всех сферах знаний."
darkages_experienced_politician.02.t:0 "Политическая смекалка"
darkages_experienced_politician.02.desc:0 "Наблюдая за выступлениями [character.GetName|d] в Совете или на неформальных встречах Вассалов, я чувствую, что [character.GetSheHe] становится все более [Select_CString(character.IsFemale, 'влиятельной', 'влиятельным')] в принимаемых решениях и советах, даваемых мне.\n\nНеудивительно, что это политическое мастерство повышает [character.GetHerHis] вклад и долгосрочное влияние в целом."
darkages_experienced_politician.02.opta:0 "[Select_CString(character.IsFemale, 'Талантливая', 'Талантливый')]..."
darkages_experienced_politician.02.tt:0 "[character.GetFirstName] получает черту 'Хитрый политик'"
darkages_control_brings_death.01.desc_d:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'путешествовала', 'путешествовал')] по своему Домену в землях [target_county.GetName], чтобы проконтролировать небольшой строительный проект, мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'подошла', 'подошел')] ко мне и [Select_CString(spymaster.IsFemale, 'заявила', 'заявил')], что нам нужно снова спланировать наш маршрут, так как впереди нас ждут бандиты, чтобы устроить засаду.\n\nКак выяснилось, мои шпионы смогли обнаружить этих преступников, и самый безопасный вариант для нас - полностью их избежать.\n\nЧувствуя, что это было близко, мне очевидно, что Графство небезопасно из-за менее чем оптимального уровня Контроля..."
darkages_rivals_bring_death.02._z:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'путешествовала', 'путешествовал')] по своему Домену в землях [target_county.GetName], чтобы проконтролировать небольшой строительный проект, мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'подошла', 'подошел')] ко мне и [Select_CString(spymaster.IsFemale, 'заявила', 'заявил')], что нам нужно снова спланировать наш маршрут, так как впереди нас ждут разгневанные крестьяне, чтобы устроить засаду.\n\nКак выяснилось, мои шпионы смогли обнаружить этих паразитов, и самый безопасный вариант для нас - полностью их избежать.\n\nЧувствуя, что это было близко, мне очевидно, что Графство небезопасно для меня из-за плохого Мнения местных жителей о моей персоне..."
darkages_culture_change_brings_death.01.desc4:0 "Когда я сегодня [Select_CString(ROOT.Char.IsFemale, 'направлялась', 'направлялся')] в соседнюю деревню, чтобы проведать пострадавшую семью, которую жестоко ограбили, мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'отодвинула', 'отодвинул')] меня в сторону с серьезным взглядом.\n\nЧерез некоторое время [spymaster.GetSheHe] твердо [Select_CString(spymaster.IsFemale, 'сказала', 'сказал')] мне, что убийца был пойман два часа назад, планируя убить меня в соседней деревне.\n\nБандит поплатился жизнью после того, как его 'грубо' допросили, и было ясно, что мотивом для этого покушения была #color_red Культурная конверсия#!, которую я [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал')] провести в одной из моих Провинций.\n\nК сожалению, негодяй умер до того, как назвал имена причастных лиц..."
darkages_religious_change_brings_death.01.desc4:0 "Когда я сегодня [Select_CString(ROOT.Char.IsFemale, 'направлялась', 'направлялся')] в соседнюю деревню, чтобы навестить дорогого знакомого, который был болен, мой [spymaster.GetCouncilTitle] поспешно [Select_CString(spymaster.IsFemale, 'предупредила', 'предупредил')] меня о покушении на меня, предотвращенном в последнюю минуту.\n\nПосле некоторого переполоха [spymaster.GetSheHe] твердо [Select_CString(spymaster.IsFemale, 'сказала', 'сказал')] мне, что убийца был пойман, планируя убить меня в соседней деревне.\n\nБандит поплатился жизнью после того, как его 'творчески' допросили, и было ясно, что он был религиозным фанатиком родом из провинции, где я [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал')] провести #color_red Религиозную конверсию#!.\nТакого рода амбициозная политика может привести к опасным последствиям в будущем..."
darkages_relation_brings_death.01.desc4:0 "Пока я [Select_CString(ROOT.Char.IsFemale, 'готовилась', 'готовился')] покинуть свой [ROOT.Char.Custom('FortifiedBuilding')], чтобы посетить церемонию на местном рынке прямо за стенами, меня [Select_CString(spymaster.IsFemale, 'прервала', 'прервал')] [spymaster.GetName] вместе со своей свитой и в самом срочном тоне.\n\nПосле того, как я [Select_CString(ROOT.Char.IsFemale, 'успокоила', 'успокоил')] всех, я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] окончательное известие о том, что покушение на меня было предотвращено моей внутренней охраной в последний момент!\n\nМой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'продолжила', 'продолжил')] объяснять, что фатальный допрос убийцы вместе с несколькими вещественными доказательствами указал на то, что злодеяние было заказано одним из моих вассалов, который, вероятно, достаточно обижен на меня и имеет личность, способную спланировать такой подлый акт..."
darkages_fabricate_claim_brings_death.desc4:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'собиралась', 'собирался')] пойти в одиночку порыбачить на небольшом пруду рядом с моим [ROOT.Char.Custom('FortifiedBuilding')], внезапно [Select_CString(spymaster.IsFemale, 'появилась', 'появился')] мой [spymaster.GetCouncilTitle] и [Select_CString(spymaster.IsFemale, 'велела', 'велел')] мне изменить расписание, так как были важные улики относительно возможного покушения на мою жизнь сегодня!\n\nВ настоящее время [spymaster.GetName] [Select_CString(spymaster.IsFemale, 'следила', 'следил')] за ситуацией за границей, и в течение некоторого времени были признаки того, что секретная миссия, которую я [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал')] [chaplain.GetName|d], моему [chaplain.GetCouncilTitle|d], вызвала опасную месть со стороны иностранных сторон.\n\nК сожалению, не удалось поймать убийцу, чтобы узнать больше о всей схеме и о том, кто был вовлечен с нашей стороны..."
darkages_traits_bring_death.01.desc4:0 "Мои информаторы во главе с [spymaster.GetName|d] посоветовали мне избегать появления на публике в ближайшие недели, так как агитаторы разжигают пламя ненависти среди моих простолюдинов и крестьян.\n\nМой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'сказала', 'сказал')] мне, что существуют серьезные проблемы с моей личностью и моим повседневным поведением, которые заставляют население восставать против моего правления и угрожать моей жизни.\n\nПохоже, в этот раз я [Select_CString(ROOT.Char.IsFemale, 'избежала', 'избежал')] опасности, но в следующий раз меня может ждать неприятный и опасный сюрприз..."
darkages_stress_reduction_player.02.t:0 "Тонкости стресса"
darkages_stress_reduction_player.02.desc:0 "Приступая к управлению своей Державой, мои Советники попросили меня обратить пристальное внимание на мой Стресс.\n\nМне сообщили, что мой Стресс будет медленно расти, если я буду участвовать в наступательных войнах, которые нагружают мой интеллект, мои эмоции и мою мораль, тогда как если я буду в мире, он будет медленно уменьшаться со временем.\n\nКонечно, скорость накопления Стресса при наступательной войне сильно отличается, если кто-то является Сострадательным, Прощающим человеком или если он Черствый, Садист.\nВ первом случае Стресс будет накапливаться гораздо быстрее, чем в последнем.\n\nТочно так же, находясь в мире, Спокойный, Терпеливый человек будет терять Стресс гораздо быстрее, чем Гневный, Нетерпеливый.\n\nС уверенностью, что эти вариации будут происходить незаметно и на протяжении жизни персонажа, и что персонажи в состоянии Стресса в среднем живут меньше, чем те, кто не испытывает стресса, нужно быть осторожным и обдумывать свое поведение в мире Темных Веков..."
darkages_stress_reduction_player.02.opta:0 "Я принимаю совет к сведению"
darkages_swap_traits.01.t:0 "День интимной расплаты"
darkages_swap_traits.01.desc:0 "Когда я лежу [Select_CString(ROOT.Char.IsFemale, 'обнаженная', 'обнаженный')] и свернувшись калачиком вместе со своим интимным знакомым после ночи страстной любви, я размышляю, стоит ли пустота, которую я чувствую внутри себя, того толчка, который я испытываю, давая волю своей собственной похоти...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.01.opta:0 "Чушь! Я есть то, что я есть!"
darkages_swap_traits.01.optb:0 "Возможно, стоит сменить приоритеты..."
darkages_swap_traits.01.optc:0 "Я приму то, что когда-то [Select_CString(ROOT.Char.IsFemale, 'презирала', 'презирал')]..."
darkages_swap_traits.tt1:0 "Вы не меняете свою личность, но этот опыт оставляет вас несколько потрясенным\n"
darkages_swap_traits.tt2:0 "Вы решаете подавить одну сторону своей личности, и проявится новая черта личности. Понятно, что это изменение вызывает значительный дистресс\n"
darkages_swap_traits.tt3:0 "Вы решаете радикально изменить свою личность и принять взгляды, противоположные тем, которые вы всегда лелеяли. Как и следовало ожидать, это радикальное изменение вызывает очень серьезные последствия\n"
darkages_swap_traits.02.desc:0 "Сдерживая себя в очередной раз после того, как искушающая и соблазнительная душа предлагает обещание удовольствия и блаженства, я чувствую укол вины и задаюсь вопросом, не теряю ли я слишком много цвета и вкуса жизни...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.03.desc:0 "Еще один прием пищи, еще один опыт поедания как можно большего количества еды, наслаждаясь столькими вкусами, сколько мой язык и мой желудок могут вынести...\n\nЭто ли то, чего я хочу для себя?\nКроме того, и учитывая приступы бездействия после таких курсов, это не может быть ни здоровым, ни уместным для кого-то с моими обязанностями...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.04.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'ела', 'ел')] немного овощей вместе со скудным количеством простого мяса вместо нормального обеда, я [Select_CString(ROOT.Char.IsFemale, 'задумалась', 'задумался')], не кастрирует ли мой сдержанный взгляд на жизнь мою душу каким-то образом.\n\nВ конце концов, в чем смысл жизни, если не испытывать наибольшее удовольствие, которое можно получить от множества различных обстоятельств и возможностей, которые случайно возникают?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.05.desc:0 "Я снова [Select_CString(ROOT.Char.IsFemale, 'отказалась', 'отказался')] быть [Select_CString(ROOT.Char.IsFemale, 'тронутой', 'тронутым')] мольбой о помощи от друга детства гораздо более низкого положения.\nДумая о ее нужде кормить своих детей и о той ничтожной сумме, которой ей не хватает, у меня начинают бежать мурашки по коже, и я чувствую намек на сомнение в себе и своих ценностях.\n\nМожет быть, я вовсе не [Select_CString(ROOT.Char.IsFemale, 'бережливая', 'бережливый')]. Может быть, я просто [Select_CString(ROOT.Char.IsFemale, 'жадная', 'жадный')] и ценю материальное богатство слишком высоко по сравнению с другими, более достойными узами?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.06.desc:0 "Потратив некоторое время на подсчет счетов моего домохозяйства, я не могу не заметить, что слишком много золота тратится впустую из-за беззаботного обращения с ним.\n\nНа самом деле, я начинаю подвергать сомнению свое поведение: хороший ли я человек, который дорожит истинными эмоциями в жизни, или я просто [Select_CString(ROOT.Char.IsFemale, 'дура', 'дурак')] с мягким сердцем, которым злоупотребляют везде и все?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.07.desc:0 "Проходит еще один день, не оставив на нем ни единого моего следа. Моя низкая инициатива - это кардинальный аспект, который управляет моей жизнью, моими отношениями и моими - отсутствующими - делами. Глубоко [Select_CString(ROOT.Char.IsFemale, 'обеспокоенная', 'обеспокоенный')], я смотрю в прошлое и вижу, насколько бессмысленной была моя жизнь, насколько лишенной цели.\nПока горит свеча моей жизни, я чувствую, что я трачу воск впустую, день за днем, без забот.\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.08.desc:0 "Когда я деловито перехожу от одного предприятия к другому, у меня начинает возникать назойливое чувство, что все мои усилия лишены великой цели, кажется, каждое мое усилие ничего не значит в великой схеме вещей.\nЧто, если бы я [Select_CString(ROOT.Char.IsFemale, 'замедлилась', 'замедлился')], больше наслаждаясь течением времени, проводя больше времени с вещами, которые могли бы дать мне большую цель для моей души?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.09.desc:0 "Стоя в своей спальне и остывая после очередной напряженной встречи с моим Советом, я размышляю о своих агрессивных тирадах, силовых аргументах и громовом голосе, с которым я [Select_CString(ROOT.Char.IsFemale, 'командовала', 'командовал')] всем собранием.\n\nЯсно, что я [Select_CString(ROOT.Char.IsFemale, 'привыкла', 'привык')] навязывать свои позиции своим угрожающим отношением, а не здравыми аргументами, редко сохраняя ответственный взгляд по отношению к тем, кто мне служит.\nЯ смотрю на себя и начинаю сомневаться в своем поведении за все эти годы...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.10.desc:0 "Всегда [Select_CString(ROOT.Char.IsFemale, 'спокойная', 'спокойный')], всегда [Select_CString(ROOT.Char.IsFemale, 'сдержанная', 'сдержанный')], всегда [Select_CString(ROOT.Char.IsFemale, 'уважительная', 'уважительный')]. Кажется великолепным и совершенным, когда рассматриваешь такое поведение, но сохранение этой позиции в последнее время действует мне на нервы.\n\nНе было бы более достойным, если бы я [Select_CString(ROOT.Char.IsFemale, 'позволила', 'позволил')] некоторым эмоциям проникнуть в мое поведение? [Select_CString(ROOT.Char.IsFemale, 'Могла', 'Мог')] бы я быть более [Select_CString(ROOT.Char.IsFemale, 'убедительной', 'убедительным')] в ряде случаев, если бы я эмоционально больше [Select_CString(ROOT.Char.IsFemale, 'взаимодействовала', 'взаимодействовал')] с людьми вокруг меня?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.11.desc:0 "События в жизни проходят мимо меня, поскольку мое терпение позволяет всему течь, все помещено в истинный масштаб нашей незначительности.\n\nК сожалению, многие воспринимают эту положительную черту как признак слабости и все больше и больше давят, планируют немного глубже, действуют немного смелее... слишком смело.\nВ нынешнем положении и учитывая мой взгляд на жизнь, я чувствую, что сейчас нахожусь на перепутье...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.12.desc:0 "Снова, ожидая собрания Совета, я уже нервничаю, слишком много думая о том, что произойдет, кто какую роль сыграет в этом новом вызове сегодняшнего дня. Каждый день - это испытание для моих нервов.\n\nМое нетерпение сказывается на моем разуме, и на самом деле я знаю, что шепотом меня обвиняют в том, что я действую опрометчиво, не обдумывая все последствия своих поступков.\nЭто заставляет меня задуматься. Это заставляет меня чувствовать... жалость... к себе.\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.13.desc:0 "Мое прошлое прошло в чувстве превосходства над другими. Я [Select_CString(ROOT.Char.IsFemale, 'далекая', 'далекий')], [Select_CString(ROOT.Char.IsFemale, 'отстраненная', 'отстраненный')], и у меня всегда есть острое слово на кончике языка, чтобы заставить других чувствовать себя неполноценными.\n\nК сожалению, я чувствую пустоту, так как я, кажется, не могу установить истинную связь с другими людьми, поскольку никто, кроме льстецов, не приближается ко мне, чтобы разделить свои радости, свои печали... свою жизнь.\nСомнения и трещины появились в моей ранее непокоренной душе.\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.14.desc:0 "Всегда скромный персонаж. Всегда [Select_CString(ROOT.Char.IsFemale, 'кроткая', 'кроткий')], [Select_CString(ROOT.Char.IsFemale, 'покорная', 'покорный')] и... [Select_CString(ROOT.Char.IsFemale, 'слабая', 'слабый')].\n\nДа, это то, чем я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] так долго!\nВозможно, людям моего рождения и положения нужно быть гораздо более решительными и яркими, чем я. Это жало, которое я чувствую в своей душе, донимает меня бесконечно.\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.15.desc:0 "После еще одной встречи с моими близкими родственниками я оглядываюсь на последнюю паутину обмана и лжи, которую я [Select_CString(ROOT.Char.IsFemale, 'распространила', 'распространил')], чтобы контролировать и манипулировать всеми, везде. В глубине души я [Select_CString(ROOT.Char.IsFemale, 'зависима', 'зависим')] от рассказывания историй, позволяя другим чертам моей личности решать, является ли эта ложь белой или черной.\n\nМожет быть, я трусливая стена зеркал, которую я использую, чтобы убежать от суровости реальности?\nМогу ли я продолжать жить, не обманывая прежде всего саму себя?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.16.desc:0 "О да, душевное спокойствие от честности. Моральное превосходство. К сожалению, так не получается.\nЛюди знают меня как прямолинейную душу, в то время как некоторые так или иначе помогают себе за мой счет.\n\nКроме того, иногда правда слишком важна, чтобы отказаться от защиты кольцом эффективной лжи.\nЯ потерпел неудачу в этом.\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.17.desc:0 "И вот мы снова здесь. Мое отсутствие моральной стойкости предало мои намерения, и мои цели снова пришлось отложить.\n\nЭто отсутствие мужества, страх, который прочно захватил мое сердце, блокирует исполнение моей судьбы.\nЕсли бы только я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] вложить свою волю и сердце в то, чтобы что-то изменить в себе, это было бы оно...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.18.desc:0 "Да, это гламурно быть доблестным, быть храбрым. К сожалению, это также означает, что иногда я переоцениваю свои возможности.\n\nПоскольку жизнь продолжает говорить мне снова и снова, если я захожу слишком далеко, судьба наказывает меня.\nМожет быть, другой, менее напористый подход лучше подошел бы к моим обязанностям в конце концов?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.19.desc:0 "Еще одна встреча, еще одно самонаказание. Это так неправильно, что я изо всех сил пытаюсь заставить себя быть услышанным, быть напористым и говорить по существу в социальной среде.\n\nКаждый раз, когда я говорю, я делаю это так скованно. Кроме того, почему я всегда прячусь от личного контакта? В конце концов, у меня есть только один шанс произвести хорошее первое впечатление. И я обычно терплю в этом неудачу.\nВ жизни, движимой политикой, моя застенчивость - огромная помеха, это настоящая правда...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.20.desc:0 "Всегда душа компании. Всегда [Select_CString(ROOT.Char.IsFemale, 'блистала', 'блистал')] на светских встречах. Всегда [Select_CString(ROOT.Char.IsFemale, 'остроумна', 'остроумен')] с более чем небольшим намеком на обаяние.\n\nТем не менее, мое поведение завело меня в некоторые трудные ситуации, поскольку моя склонность говорить перерастает в слишком много разговоров, слишком много...\n\nМожет быть, нужен новый подход? Может быть, я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] обуздать эту тенденцию быть в центре внимания каждый раз, когда я прихожу...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.21.desc:0 "Еще одно дождливое утро, чтобы удобно умерить мое беспокойное настроение, пока я жажду новой цели...\nНикогда не счастлив, всегда ищу большего. Больше богатств, больше власти, больше признания, больше значимости. Я хочу большего.\n\nК сожалению, это поведение, хотя и приносит мне некоторые успехи здесь и там, является ловушкой, тщательно разработанной моим разумом, чтобы заключить меня в темницу почти постоянного несчастья с несколькими, пусть даже иллюзорными, приступами блаженства. Это та жизнь, которую я хочу прожить?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.22.desc:0 "Приятно просто проживать жизнь такой, какая она есть, без особо хитрых планов, с небольшим количеством целей и меньшей ответственностью.\nК сожалению, мое положение в обществе требует от меня большего, чем может дать эта довольная личность.\n\nЯ здесь, чтобы вершить Историю, чтобы исполнить свое предназначение, чтобы привести своих подданных и свою династию к славе!\nВ противном случае я обречен быть никем, ничтожеством с маленьким местом в сносках Истории...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.23.desc:0 "Я делаю то, что хочу, решаю, как хочу все, и отношусь ко всем переменчиво, ситуативно. У меня нет морального компаса, мои пределы устанавливаются только тем, что происходит в моем сердце в любой момент времени.\n\nЭто отсутствие ориентиров, хотя и служит мне хорошую службу в некоторых случаях, оставляет желать лучшего в ряде других...\nкроме того, все это отсутствие сплоченности в моем поведении время от времени оставляет меня эмоционально [Select_CString(ROOT.Char.IsFemale, 'потерянной', 'потерянным')].\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.24.desc:0 "Тщательно решив несколько важных вопросов в моем последнем Совете, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] сказать, что мое чувство справедливости - одна из главных проблем, которые меня волнуют.\nЭта строгость во многом сдерживает мою личность, и мой почти аскетический взгляд мешает мне наслаждаться жизнью так, как я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')]...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.25.desc:0 "Всегда гоняюсь за призраками. Даже сегодня, греясь на солнце вместе с некоторыми из моих слуг, я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался')] угадать их мотивы, размышлять о том, как они смотрели и действовали по отношению ко мне.\n\nМое настороженное поведение - некоторые называют его параноидальным! - сказывается на моих нервах. Я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] бы намного счастливее, если бы [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] не волноваться в большинстве ситуаций, иначе моя социальная жизнь превращается в игру зеркал, где я никогда не могу быть [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')] в том, кто действительно желает мне зла.\nК сожалению, я во власти своего воображения...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.26.desc:0 "То, как я доверяю всем, делает меня легкой добычей для тех, кто процветает, манипулируя моей доверчивой натурой.\nВ должности с высокой ответственностью моё поведение может стать роковой ошибкой.\n\nМне бы гораздо лучше послужило, если бы моя натура не была такой доверчивой, а вместо этого тщательно анализировала истинные мотивы тех, кто может повлиять на мою жизнь и мои цели.\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.27.desc:0 "Всегда доброе слово. Мое сердце всегда открыто, чтобы дать дружеский совет, выслушать жалобы каждого, залечить душевные раны, от которых все страдают время от времени.\n\nОднако у меня есть опасения по поводу моего поведения.\nЭто как будто в часы моей нужды я не получаю того же, что отдаю, когда я нужна всем.\nВозможно, меня окружает кучка неблагодарных душ. Или, может быть, человеческая натура не так добра, как показывает моя сострадательная личность...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.28.desc:0 "Меня не волнуют страдания других, я не моргну глазом ради того, что должно быть сделано независимо от последствий для любой третьей стороны. К сожалению, моя черствая натура обычно встречает ту или иную форму возмездия... неприятные позиции.\n\nВозможно, если я немного изменю свою натуру, я буду более [Select_CString(ROOT.Char.IsFemale, 'успешна', 'успешен')] в жизни?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.29.desc:0 "О да, как я люблю чувствовать боль в глазах другого человека. Толчок веселья, который я чувствую, наблюдая за страданиями других...\n\nК сожалению, даже если причинение страданий для меня является произведением искусства, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] быть [Select_CString(ROOT.Char.IsFemale, 'честна', 'честен')] с [Select_CString(ROOT.Char.IsFemale, 'самой', 'самим')] собой и заметить, что последствия этой моей черты редко бывают лучшими для моих интересов...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.31.desc:0 "Во что мне верить, когда я вообще ни во что не верю? Религия, дружба, природа других людей, философия...\n\nЯ доверяю только своей собственной рациональности ценой того, что я слишком [Select_CString(ROOT.Char.IsFemale, 'едка', 'едок')] со всеми остальными. Для моего же блага было бы разумно закончить этот маскарад и принять что-то, следовать какому-то идеалу, каким бы маленьким он ни был.\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.32.desc:0 "О да, так утешительно иметь глубокую веру и позволять ей объяснять все в своем собственном свете. Однако я боюсь, что за мою жизнь этот свет ослепил меня больше, чем на самом деле осветил мой путь в большинстве обстоятельств. Как насчет того, чтобы быть немного более скептиком и рациональным, когда я подхожу к повседневным ситуам?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.33.desc:0 "После очередного заседания Совета, где я [Select_CString(ROOT.Char.IsFemale, 'навязала', 'навязал')] свои точки зрения всем, я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] не заметить отвращение, которое мои Советники проявляли по поводу того, как я [Select_CString(ROOT.Char.IsFemale, 'вела', 'вел')] пленарное заседание.\n\nНекоторые называют меня [Select_CString(ROOT.Char.IsFemale, 'упрямой', 'упрямым')], другие называют меня [Select_CString(ROOT.Char.IsFemale, 'решительной', 'решительным')] в своих идеях, но суть в том, что моя непреклонность со временем привела к некоторым неловким решениям и прямо-таки плохо продуманным планам.\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.34.desc:0 "Кому-то очень трудно предсказать, как я отреагирую на какое-то событие, обстоятельство или чрезвычайную ситуацию.\nЭта изменчивая натура мне в чем-то помогла, но и все усложняет, так как никто не знает, где я стою по какому-либо важному вопросу.\n\nМожет быть, я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] бы более [Select_CString(ROOT.Char.IsFemale, 'эффективна', 'эффективен')], если бы [Select_CString(ROOT.Char.IsFemale, 'стремилась', 'стремился')] обуздать это непостоянство и найти общую почву и шаблон для своих решений?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.35.desc:0 "Возмездие. Вот слово, которое для меня важнее всего. После того, как мне было нанесено какое-то минимальное оскорбление, я всегда ищу мести.\nХитрым образом это приносит мир моей душе.\n\nОднако является ли это поведение лучшим курсом действий в великой схеме вещей? Что я [Select_CString(ROOT.Char.IsFemale, 'потеряла', 'потерял')] до сих пор во многих случаях из-за этой резкой черты?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.36.desc:0 "Всегда хороший парень. Всегда [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов')] простить, всегда [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов')] забыть.\nВ конце концов, я тот, кем помыкают, возможно, слишком далеко во многих случаях. Как насчет того, чтобы стать серьезным в отношении оскорблений, которые все всегда навязывают мне?\nВ конце концов, кто здесь главный?\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_swap_traits.37.desc:0 "Всю свою жизнь с детства я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] странным фактором в любой социальной среде.\nКажется, я никогда не подхожу, даже если иногда мои надуманные идеи и догадки оказываются безупречно верными.\nЯ дорого [Select_CString(ROOT.Char.IsFemale, 'заплатила', 'заплатил')] за эту эксцентричность с точки зрения повседневных отношений с моими знакомыми, а также с моими подданными.\nИнтересно, что бы я [Select_CString(ROOT.Char.IsFemale, 'выиграла', 'выиграл')], если бы [Select_CString(ROOT.Char.IsFemale, 'заставила', 'заставил')] себя стать более предсказуемым и социально надежным...\n\nАнализируя всю свою жизнь под этим новым углом, я чувствую тоску, сжигающую меня глубоко внутри... Кто я? Кем я хочу быть?"
darkages_add_gold.01.t:0 "Беззаконная добыча"
darkages_add_gold.01.desc:0 "Живя в хаотичном и неразвитом обществе, в относительной анонимности владения лишь низшими титулами, есть много случаев, когда я могу просто вырвать у своих незначительных подданных что-то ценное, не теряя при этом особого авторитета.\n\nНечего чувствовать себя виноватым. Это просто правила жизни в нынешнее время..."
darkages_add_gold.01.opta:0 "Приятное дополнение к моей казне!"
darkages_add_gold.01.tt1:0 "До Высокого Средневековья, пока в вашем столичном графстве уровень развития меньше 20, и вы всего лишь скромный Граф или невпечатляющий Герцог, вы можете ожидать, что это событие будет происходить каждые несколько лет\n"
darkages_add_gold.01.optb:0 "Я лучше этого..."
darkages_hire_character:0 "Нанять специалиста"
hire_character_decision_tooltip:0 "Вы можете попытаться нанять персонажа, специализирующегося в какой-либо области знаний"
hire_character_desc:0 "Приняв это решение, вы заплатите небольшую сумму авансом, чтобы профинансировать поиск кого-то, имеющего как минимум 3-звездочное образование в выбранном вами Навыке.\nПострадает Престиж из-за воспринимаемой слабости ценных придворных при вашем Дворе.\nВ случае, если вы наймете кого-то, ваши вассалы, которые либо Черствые, Параноидальные, Амбициозные, Жадные или Нелояльные, не будут довольны новым прибытием...\n"
darkages_hire_character_confirm:0 "Начать поиск!"
darkages_recruit_character.01.t:0 "Поиск талантов"
darkages_recruit_character.01.desc:0 "Отдав приказ искать талантливого человека, мне нужно сообщить своим людям, какого типа человека я ищу.\n\nЯ знаю, что [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] быть [Select_CString(ROOT.Char.IsFemale, 'терпелива', 'терпелив')], так как могут пройти месяцы, пока не будут достигнуты результаты.\n\nУспех в поиске того, кто соответствует моим требованиям, частично зависит от моего собственного Престижа и Благочестия, так как чем более [Select_CString(ROOT.Char.IsFemale, 'престижна', 'престижен')] и [Select_CString(ROOT.Char.IsFemale, 'благочестива', 'благочестив')] я, тем легче убедить кого-то работать на меня..."
darkages_recruit_character.01.opta:0 "Найдите мне переговорщика"
darkages_recruit_character.01.optb:0 "Найдите мне воина"
darkages_recruit_character.01.optc:0 "Найдите мне стража"
darkages_recruit_character.01.optd:0 "Найдите мне теневого персонажа"
darkages_recruit_character.01.opte:0 "Найдите мне ученого"
darkages_recruit_character_toast_failure.t:0 "Неудача!"
darkages_recruit_character_toast_failure.tt:0 "Ваши агенты не смогли найти никого подходящего для найма"
darkages_recruit_character.02.t:0 "Подходящий кандидат"
darkages_recruit_character.02.desc:0 "Мои агенты нашли [specialist.GetName|d], кого-то, кто, возможно, подходит под то, что я ищу, чтобы оживить мой двор.\n\nРешение оставить [specialist.GetHerHim] - только за мной..."
darkages_recruit_character.02.opta:0 "Нанять [specialist.GetHerHis]!"
darkages_recruit_character.02.optb:0 "Отвергнуть [specialist.GetHerHim]!"
darkages_opinion_envious:0 "Завистливый"
darkages_loans.01.t:0 "Предложение займа"
darkages_loans.01.desc:0 "После тщательного поиска мне незаметно указали на группу очень богатых людей, которые могли бы одолжить Державе немного золота. Конечно, мой кредит ограничен, основываясь на моем основном титуле.\n\nМеня сухо проинформировали, что если я не верну долг с процентами через несколько лет, будет немедленно взыскана специальная комиссия."
darkages_loans.01.optx:0 "Подумав, я не [Select_CString(ROOT.Char.IsFemale, 'заинтересована', 'заинтересован')]..."
darkages_loans.01.opta:0 "Ничтожная сумма в 100 золотых"
darkages_loans.01.optb:0 "Скромная сумма в 250 золотых"
darkages_loans.01.optc:0 "Существенная сумма в 500 золотых"
darkages_loans.01.optd:0 "Царская сумма в 1000 золотых"
darkages_loans.01.opta.tt1:0 "У вас будет решение, которое можно принять в любое время - при наличии достаточных средств - чтобы вернуть 125 золотых. Помните, что ваши долги переходят к вашему первичному наследнику\n"
darkages_loans.01.opta.tt2:0 "У вас будет решение, которое можно принять в любое время - при наличии достаточных средств - чтобы вернуть 312 золотых. Помните, что ваши долги переходят к вашему первичному наследнику\n"
darkages_loans.01.opta.tt3:0 "У вас будет решение, которое можно принять в любое время - при наличии достаточных средств - чтобы вернуть 650 золотых. Помните, что ваши долги переходят к вашему первичному наследнику\n"
darkages_loans.01.opta.tt4:0 "У вас будет решение, которое можно принять в любое время - при наличии достаточных средств - чтобы вернуть 1250 золотых. Помните, что ваши долги переходят к вашему первичному наследнику\n"
darkages_loans.06.t:0 "Займ зашел слишком далеко"
darkages_loans.06.desc:0 "Не очень хорошие новости после моей утренней прогулки.\nПоскольку срок погашения взятого займа давно истек, кредитор требует премиальные проценты для покрытия своих убытков."
darkages_loans.06.opta:0 "Я заплачу этот специальный процент..."
darkages_loans.06.optb:0 "Я не буду платить эту сумму!"
darkages_loans.06.tt1:0 "Если вы откажетесь платить этот специальный процент, то помимо отображаемых эффектов, каждый ваш вассал, который не является Лояльным, ухудшит мнение о вас\n"
darkages_loan_dec:0 "Занять золото"
darkages_loan_dec_tt:0 "Встретиться с богатыми людьми, чтобы одолжить золото"
darkages_loan_dec_desc:0 "Я могу встретиться с важными людьми, которые могут одолжить мне немного золота. Сумма зависит от ранга моего основного титула.\nВстреча с кредиторами состоится примерно через месяц.\n\nКонечно, у этой политики есть некоторые недостатки, но я здесь управляю Державой..."
darkages_loan_count:0 "В долгах"
darkages_loan_count_desc:0 "Этот персонаж должен золото кредитору, пятная свою репутацию и репутацию своей династии"
darkages_loan_duke:0 "В долгах"
darkages_loan_duke_desc:0 "Этот персонаж должен золото кредитору, пятная свою репутацию и репутацию своей династии"
darkages_loan_king:0 "В долгах"
darkages_loan_king_desc:0 "Этот персонаж должен золото кредитору, пятная свою репутацию и репутацию своей династии"
darkages_loan_emperor:0 "В долгах"
darkages_loan_emperor_desc:0 "Этот персонаж должен золото кредитору, пятная свою репутацию и репутацию своей династии"
darkages_repay_loan_dec:0 "Вернуть долг"
darkages_repay_loan_dec_desc:0 "Вы можете решить вернуть золото, которое вы должны кредиторам... с процентами, конечно"
darkages_repay_loan_dec_tt:0 "Заплатить то, что вы должны"
darkages_loan_dec_confirm:0 "Давайте начнем поиск"
darkages_repay_loan_dec_confirm:0 "Оплатить мой долг"
darkages_loan_dec_tt2:0 "Вам будет предложена возможность отказаться от займа на встрече с кредиторами примерно через месяц, так что пока ничего окончательного."
darkages_loans.07.t:0 "Важное напоминание"
darkages_loans.07.desc:0 "Сегодня после обеда я [Select_CString(ROOT.Char.IsFemale, 'просматривала', 'просматривал')] некоторые цифры с [darkages_stew.GetFirstName|d], моим [darkages_stew.GetCouncilTitle|d], когда [darkages_stew.GetSheHe] [Select_CString(darkages_stew.IsFemale, 'сообщила', 'сообщил')] мне, что теперь мои финансы в достаточно хорошем состоянии, чтобы погасить непогашенный долг.\n\nВозможно, это хороший повод встретиться с кредиторами и решить этот вопрос раз и навсегда посредством решения..."
darkages_loans.07.opta:0 "Спасибо, [darkages_stew.GetFirstName]!"
darkages_train_combat.03.t:0 "Неожиданная неудача"
darkages_train_combat.03.desc:0 "Мои тренировочные бои для повышения Доблести привели к травме... надеюсь, я быстро поправлюсь!"
darkages_train_combat.03.opta:0 "Риски боевой подготовки..."
darkages_opinion_livid:0 "В ярости"
darkages_border_raids.01.t:0 "Неудачный налет"
darkages_border_raids.01.desc:0 "К сожалению, запланированные пограничные налеты на наших соседей не увенчались успехом.\n\nПосле плохого выступления моих неумелых налетчиков мой Престиж несколько пострадал..."
darkages_border_raids.01.opta:0 "В следующий раз все будет по-настоящему!"
darkages_border_raids.02.t:0 "Успешный налет!"
darkages_border_raids.02.desc:0 "Пограничные налеты, которые я тщательно [Select_CString(ROOT.Char.IsFemale, 'спланировала', 'спланировал')], увенчались успехом.\nХотя количество полученного золота невелико, это поможет пополнить нашу казну... и это также хорошо для моего Престижа!"
darkages_border_raids.02.opta:0 "Отлично!"
darkages_border_raids.03.t:0 "Неуклюжая попытка налета"
darkages_border_raids.03.desc:0 "Захватив пару крестьян родом из земель [raider.GetName|d], я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал')] о том, кто был ответственен за неудачную попытку совершить налет на мои приграничные земли..."
darkages_border_raids.03.opta:0 "Может быть, пришло время расплаты..."
darkages_border_raids.04.t:0 "Проблемы на границе"
darkages_border_raids.04.desc:0 "Недавно сообщалось о налетах на мои приграничные земли.\nСвидетели видели, как негодяи отступали в земли [raider.GetName|d].\n\nУщерб был незначительным, но, тем не менее, праздновать нечего, совсем наоборот..."
darkages_border_raids.04.opta:0 "Может быть, пришло время расплаты..."
darkages_plan_border_raid:0 "Планировать пограничный налет"
darkages_plan_border_raid_desc:0 "Я могу спланировать небольшие налеты вдоль своих границ, чтобы награбить немного золота и повысить свой Престиж. Это может быть хорошим способом добавить немного действительно необходимых средств в мою казну.\n\nШансы на успех зависят от моего Военного навыка, от моего навыка Интриги и положительно от наличия черты 'Разбойник'."
darkages_plan_border_raid_tt:0 "Спланировать небольшой налет, который послужит хотя бы немного для улучшения жалкой экономики ваших владений"
darkages_plan_border_raid_confirm:0 "Сделать это!"
darkages_plan_border_raid_decision_tt:0 "От планирования до исполнения пройдет пара месяцев, прежде чем налеты будут совершены.\n"
darkages_border_raids.05.t:0 "Пересечение ограды"
darkages_border_raids.05.desc:0 "Сегодня утром у меня состоялся интересный разговор с [darkages_mars.GetFirstName|d], где мой [darkages_mars.GetCouncilTitle|d] [Select_CString(darkages_mars.IsFemale, 'подчеркнула', 'подчеркнул')] возможность планирования пограничных налетов с целью увеличения моего Золота и Престижа.\n\nЭто возможно только потому, что я все еще второстепенная сила на мировой арене, и, к счастью, в наш век и время законы и обычаи очень подвижны и прощают такие мелкие агрессии.\n\nХотя нельзя надеяться разбогатеть с помощью таких мелких предприятий, это правда, что налеты могут обеспечить мне некоторые крайне необходимые средства и Престиж.\n\nМне просто нужно принять правильное решение, чтобы спланировать пограничный налет..."
darkages_border_raids.05.tt1:0 "Пока вы находитесь в племенной эре и ваш высший титул - Граф или аналогичный, вы можете планировать пограничные налеты через решение каждые 5 лет"
darkages_border_raids.05.opta:0 "Идея, заслуживающая внимания..."
darkages_border_raids.05.optb:0 "Не докучайте мне больше этой идеей"
darkages_border_raids.05.tt2:0 "Вас больше никогда не побеспокоят этим советом"
darkages_resting:0 "Отдых"
darkages_resting_desc:0 "Этот персонаж берет несколько месяцев отдыха от самой сложной работы\n"
darkages_rest:0 "Немного отдохнуть"
darkages_rest_desc:0 "Вы можете решить избежать самых насущных вопросов правления, чтобы немного отдохнуть и уменьшить стресс. Конечно, ваша способность править будет серьезно ограничена во время вашей эскапады."
darkages_rest_tt:0 "Отдохнуть шесть месяцев"
darkages_rest_confirm:0 "Пора расслабиться..."
darkages_bungabunga:0 "Странные вкусы"
darkages_bungabunga_desc:0 "Этот персонаж недавно участвовал в развратной оргии"
darkages_add_deviant.04.t:0 "Намеки на странную вечеринку"
darkages_add_deviant.04.desc1:0 "Недавно ко мне [Select_CString(organizer.IsFemale, 'обратилась', 'обратился')] [organizer.GetName], [Select_CString(organizer.IsFemale, 'которая', 'который')], казалось, [Select_CString(organizer.IsFemale, 'намекала', 'намекал')] на приглашение на... любопытную вечеринку, организованную [Select_CString(organizer.IsFemale, 'ею', 'им')] [Select_CString(organizer.IsFemale, 'самой', 'самим')], и в которой шумно участвовали несколько человек, все готовые вступить во всевозможные... творческие половые сношения.\n\nЯ не могу ручаться за эту интерпретацию, так как большая часть разговора была просто инсинуацией, которая могла иметь и другой, более обыденный смысл.\n\nТеперь [organizer.GetName] ждет ответа. Пойду ли я на эту вечеринку?"
darkages_add_deviant.04.desc2:0 "И снова меня приглашает [organizer.GetName], чтобы насладиться заманчивой секс-вечеринкой на [organizer.GetHerHis] уединенной вилле...\n\nМесто выглядит многообещающе, с дюжиной участников, одетых или раздетых в соответствии с их вкусами и обаянием.\n\nЗная, что всегда есть риск быть разоблаченным, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, буду ли я следовать своим темным инстинктам или нет."
darkages_add_deviant.04.opta:0 "Конечно, я пойду!"
darkages_add_deviant.04.optb:0 "Не совсем в моем вкусе..."
darkages_add_deviant.04.tt1:0 "Участвуя в этой оргии, с этого момента у вас будет секрет извращенца..."
darkages_startup.01.t:0 "Добро пожаловать в Dark Ages!"
darkages_startup.01.desc:0 "Приветствую,\n\nВы собираетесь начать путешествие, немного отличное от ванильного Crusader Kings.\n\nНадеемся, что истории, сотканные движком игры и вашим выбором, приведут к более разнообразным и интересным результатам.\n\nСложность также возрастает, поскольку некоторые системы призваны сделать жизнь персонажа игрока сложнее и труднее.\n\nЕсли вы впервые играете в Dark Ages, рассмотрите возможность игры за Короля или Императора и, возможно, выберите Легкий уровень в игровом правиле "Сложность" Dark Ages. Вам нужно будет адаптировать свой стиль игры к огромным изменениям баланса игры, которые вводит Dark Ages, и вам будет лучше, если вы начнете игру в консолидированной и более легкой позиции.\n\nНаслаждайтесь поездкой!"
darkages_startup.01.opta:0 "Дайте мне несколько полезных советов..."
darkages_startup.01.optb:0 "Я уже ветеран Dark Ages!"
darkages_recruit_character.01.tt1:0 "Количество Престижа и Благочестия вашего персонажа будет иметь большое влияние на успех поиска"
darkages_council.01.t:0 "Вопрос уважения"
darkages_council.01.desc:0 "Сегодня, когда Совет был в сборе, мы углубились в несколько разных вопросов, и общий тон и страсть в обсуждении поднимались все выше, причем печально известный [councillor.GetName], демонстрируя плохое отношение ко мне, [Select_CString(councillor.IsFemale, 'повышала', 'повышал')] свой голос все выше и выше.\n\nК сожалению, обмен мнениями достиг точки, когда [councillor.GetSheHe] [Select_CString(councillor.IsFemale, 'продемонстрировала', 'продемонстрировал')] полную злобу и полное презрение к моей персоне, и с тех пор я [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал')], что на кону мой Престиж.\n\nУчитывая, что новости о таком оскорблении вышли за пределы этой встречи, мне нужно решить, что делать..."
darkages_council.01.opta:0 "Позволить вопросу пройти мимо"
darkages_council.01.optb:0 "Попытаться перехитрить [councillor.GetFirstName|a]"
darkages_council.01.tt1:0 "Успех этого варианта зависит от Дипломатии и от черт Хитрый политик, Проницательный и Тупой обоих персонажей\n"
darkages_council.tt1:0 "Вы перехитрили [councillor.GetFirstName|a]\n"
darkages_council.tt2:0 "Ваши слова звучат пусто\n"
darkages_opinion_disrespectful:0 "Неуважительный"
darkages_council.01.optc:0 "Сделать завуалированную угрозу против [councillor.GetFirstName|d]"
darkages_council.01.tt2:0 "Этот вариант доступен, потому что у вас не менее 25 Ужаса\n"
darkages_success.toast:0 "Успех!"
darkages_failure.toast:0 "Неудача..."
darkages_council.01.toast1:0 "Вы сокрушили [councillor.GetFirstName|a] своими аргументами!"
darkages_council.01.toast2:0 "В итоге [councillor.GetFirstName] [Select_CString(councillor.IsFemale, 'выставила', 'выставил')] вас на посмешище..."
trait_darkages_pirate:0 "Печально известный пират"
trait_darkages_pirate_desc:0 "Этот персонаж командует мощным пиратским флотом"
trait_darkages_pirate_character_desc:0 "[ROOT.GetCharacter.GetNameNoTooltip] командует мощным пиратским флотом"
darkages_council.02.tt1:0 "Поскольку шансы в начале против вас - в конце концов, [councillor.GetFirstName] - Хитрый политик - успех этого варианта зависит от Дипломатии и от черт Хитрый политик, Проницательный, Интриган и Тупой обоих персонажей\n"
darkages_council.02.toast1:0 "Вам удалось достичь успешного компромисса!"
darkages_council.02.toast2:0 "Вам не удалось достичь успешного компромисса..."
darkages_council.02.t:0 "Талантливый советник"
darkages_council.02.desc:0 "Во время встречи с моими советниками стало очевидно, что [Select_CString(councillor.IsFemale, 'смышленая', 'смышленый')] [councillor.GetName] имеет свои собственные планы относительно управления моим Доменом.\n\nНа самом деле, [councillor.GetHerHis] идеи разумны с экономической точки зрения, и моя казна выиграет, если я уступлю [councillor.GetHerHis] воле.\n\nОднако есть и другие соображения, которые могут посоветовать другой подход.\n\nВ конце концов, решение бросить вызов [councillor.GetFirstName|d] - только мое..."
darkages_council.02.opta:0 "Позволить [councillor.GetName|d] действовать по-своему..."
darkages_council.02.optb:0 "Наложить вето на идею Советника"
darkages_council.02.optc:0 "Достичь большого компромисса"
darkages_council.02.tt2:0 "Вам доступен этот вариант, потому что у вас есть образование в области дипломатии, навык Дипломатии не менее 12, вы Общительный, Дипломат или Хитрый политик. Успех зависит от вашего навыка Дипломатии и наличия любых трех черт, описанных выше - чем больше, тем лучше\n"
darkages_council.01.toast3:0 "Вы стильно прикончили идею вашего Советника!"
darkages_council.01.toast4:0 "Несмотря на то, что вы убили идею вашего Советника, вы выглядите необоснованным и своевольным..."
darkages_council.02.tt9:0 "Вы выглядите диктатором и необоснованным...\n"
darkages_council.02.tt10:0 "Вы стильно заткнули [councillor.GetName|a]!\n"
darkages_council_diplomacy:0 "Успешная дипломатическая повестка"
darkages_council_diplomacy_desc:0 "Этот персонаж с помощью Совета запустил успешную дипломатическую повестку на среднесрочную перспективу"
darkages_council_martial:0 "Успешная военная повестка"
darkages_council_martial_desc:0 "Этот персонаж с помощью Совета запустил успешную военную повестку на среднесрочную перспективу"
darkages_council_stewardship:0 "Успешная управленческая повестка"
darkages_council_stewardship_desc:0 "Этот персонаж с помощью Совета запустил успешную управленческую повестку на среднесрочную перспективу"
darkages_council_intrigue:0 "Успешная секретная повестка"
darkages_council_intrigue_desc:0 "Этот персонаж с помощью Совета запустил успешную секретную повестку на среднесрочную перспективу"
darkages_council_learning:0 "Успешная религиозная повестка"
darkages_council_learning_desc:0 "Этот персонаж с помощью Совета запустил успешную религиозную повестку на среднесрочную перспективу"
darkages_council.03.t:0 "Великая синергия"
darkages_council.03.desc1:0 "Поскольку недавние заседания совета были очень полезными и успешными, появилась прекрасная возможность использовать эту нематериальную синергию с пользой.\n\nПрямо сейчас готова к реализации комплексная политика на среднесрочную перспективу, касающаяся дипломатии, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] извлечь выгоду из ее эффектов.\n\nВсегда есть назойливая реальность того, что мой компромисс с Советом будет искажен моими недоброжелателями как признак неудачи, но действительно ли мне стоит беспокоиться об этой стороне, учитывая полученные выгоды?"
darkages_council.03.desc2:0 "Поскольку недавние заседания совета были очень полезными и успешными, появилась прекрасная возможность использовать эту нематериальную синергию с пользой.\n\nПрямо сейчас готова к реализации комплексная политика на среднесрочную перспективу, касающаяся войны, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] извлечь выгоду из ее эффектов.\n\nВсегда есть назойливая реальность того, что мой компромисс с Советом будет искажен моими недоброжелателями как признак неудачи, но действительно ли мне стоит беспокоиться об этой стороне, учитывая полученные выгоды?"
darkages_council.03.desc3:0 "Поскольку недавние заседания совета были очень полезными и успешными, появилась прекрасная возможность использовать эту нематериальную синергию с пользой.\n\nПрямо сейчас готова к реализации комплексная политика на среднесрочную перспективу, касающаяся управления, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] извлечь выгоду из ее эффектов.\n\nВсегда есть назойливая реальность того, что мой компромисс с Советом будет искажен моими недоброжелателями как признак неудачи, но действительно ли мне стоит беспокоиться об этой стороне, учитывая полученные выгоды?"
darkages_council.03.desc4:0 "Поскольку недавние заседания совета были очень полезными и успешными, появилась прекрасная возможность использовать эту нематериальную синергию с пользой.\n\nПрямо сейчас готова к реализации комплексная политика на среднесрочную перспективу, касающаяся интриг, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] извлечь выгоду из ее эффектов.\n\nВсегда есть назойливая реальность того, что мой компромисс с Советом будет искажен моими недоброжелателями как признак неудачи, но действительно ли мне стоит беспокоиться об этой стороне, учитывая полученные выгоды?"
darkages_council.03.desc5:0 "Поскольку недавние заседания совета были очень полезными и успешными, появилась прекрасная возможность использовать эту нематериальную синергию с пользой.\n\nПрямо сейчас готова к реализации комплексная политика на среднесрочную перспективу, касающаяся религиозных вопросов, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] извлечь выгоду из ее эффектов.\n\nВсегда есть назойливая реальность того, что мой компромисс с Советом будет искажен моими недоброжелателями как признак неудачи, но действительно ли мне стоит беспокоиться об этой стороне, учитывая полученные выгоды?"
darkages_council.03.opta:0 "Реализовать представленные идеи"
darkages_council.03.optb:0 "Манипулировать советом"
darkages_council.03.optc:0 "Отказаться от представленных идей"
darkages_council.03.tt1:0 "Этот вариант доступен, потому что у вас не менее 15 Интриги, вы Интриган или Обманщик. Вы направляете добрую волю встреч на пользу в долгосрочной перспективе по обсуждаемому предмету\n"
darkages_council.03.tt2:0 "Вы накладываете вето на идеи Совета, чтобы получить политический рычаг\n"
darkages_dilettante:0 "Правитель-дилетант"
darkages_dilettante_desc:0 "Этот персонаж культивирует лишь поверхностный интерес к вопросам Государства и выглядит беспомощным в управлении Державой"
darkages_council.04.t:0 "Сложные дебаты"
darkages_council.04.desc1:0 "Дебаты сегодня в Совете касаются некоторых серьезных дипломатических вопросов.\n\nПредмет обсуждения требует глубокого знания обсуждаемых концепций дипломатической теории, а также большого абстрактного мышления.\n\nЯ знаю, что это сложная тема, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я подойду к обсуждению..."
darkages_council.04.desc2:0 "Дебаты сегодня в Совете касаются некоторых серьезных военных вопросов.\n\nПредмет обсуждения требует глубокого знания обсуждаемых концепций военной теории, а также большого абстрактного мышления.\n\nЯ знаю, что это сложная тема, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я подойду к обсуждению..."
darkages_council.04.desc3:0 "Дебаты сегодня в Совете касаются некоторых серьезных вопросов управления.\n\nПредмет обсуждения требует глубокого знания обсуждаемых концепций теории управления, а также большого абстрактного мышления.\n\nЯ знаю, что это сложная тема, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я подойду к обсуждению..."
darkages_council.04.desc4:0 "Дебаты сегодня в Совете касаются некоторых серьезных вопросов интриг.\n\nПредмет обсуждения требует глубокого знания обсуждаемых концепций теории интриг, а также большого абстрактного мышления.\n\nЯ знаю, что это сложная тема, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я подойду к обсуждению..."
darkages_council.04.desc5:0 "Дебаты сегодня в Совете касаются некоторых серьезных религиозных вопросов.\n\nПредмет обсуждения требует глубокого знания обсуждаемых концепций богословской теории, а также большого абстрактного мышления.\n\nЯ знаю, что это сложная тема, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я подойду к обсуждению..."
darkages_council.04.opta:0 "Глубоко вовлечься в дебаты"
darkages_council.04.optb:0 "Притвориться, что знаете о предмете"
darkages_council.04.optc:0 "Признать свое незнание и промолчать"
darkages_council.04.tt1:0 "Чтобы добиться успеха и заработать значительное количество Престижа, продемонстрировав свои знания, вам нужно иметь высокий навык Дипломатии, быть Дипломатом, Проницательным, Общительным или Сострадательным. И наоборот, если у вас низкий навык Дипломатии, вы Застенчивый, Тупой, Черствый или Садист, у вас меньше шансов произвести впечатление на Совет и вместо этого потерять Престиж\n"
darkages_council.04.tt2:0 "Чтобы добиться успеха и заработать значительное количество Престижа, продемонстрировав свои знания, вам нужно иметь высокий Военный навык, быть Стратегом, Проницательным, Храбрым или Гневным. И наоборот, если у вас низкий Военный навык, вы Трусливый, Тупой, Сострадательный или Сдержанный, у вас меньше шансов произвести впечатление на Совет и вместо этого потерять Престиж\n"
darkages_council.04.tt3:0 "Чтобы добиться успеха и заработать значительное количество Престижа, продемонстрировав свои знания, вам нужно иметь высокий навык Управления, быть Администратором, Проницательным, Жадным или Сдержанным. И наоборот, если у вас низкий навык Управления, вы Щедрый, Тупой, Всепрощающий или Нетерпеливый, у вас меньше шансов произвести впечатление на Совет и вместо этого потерять Престиж\n"
darkages_council.04.tt4:0 "Чтобы добиться успеха и заработать значительное количество Престижа, продемонстрировав свои знания, вам нужно иметь высокий навык Интриги, быть Интриганом, Проницательным, Обманщиком или Терпеливым. И наоборот, если у вас низкий навык Интриги, вы Честный, Тупой, Гневный или Справедливый, у вас меньше шансов произвести впечатление на Совет и вместо этого потерять Престиж\n"
darkages_council.04.tt5:0 "Чтобы добиться успеха и заработать значительное количество Престижа, продемонстрировав свои знания, вам нужно иметь высокий навык Учености, быть Теологом, Проницательным, Фанатичным или Усердным. И наоборот, если у вас низкий навык Учености, вы Циничный, Тупой, Ленивый или Переменчивый, у вас меньше шансов произвести впечатление на Совет и вместо этого потерять Престиж\n"
darkages_council.04.tt6:0 "Вы слегка участвуете в обсуждении, выбирая правильные моменты для комментариев здесь и там. В зависимости от вашей высокой Интриги и черт Обманщик, Произольный, Переменчивый, Интриган, Проницательный и Хитрый политик, вы можете создать образ того, кто знает гораздо больше, чем вы на самом деле знаете о предмете. Если вас поймают на притворстве, что вы знаете о текущих вопросах, вы пострадаете от последствий\n"
darkages_council.04.tt7:0 "Вы отказываетесь вступать в дискуссию, полностью признавая свое незнание. Честные, Справедливые, Сострадательные, Всепрощающие и Лояльные Советники и Вассалы будут положительно впечатлены вашей искренностью\n"
darkages_council.04.toast1:0 "Вы овладели дебатами и пожинаете значительное количество Престижа!"
darkages_council.04.toast2:0 "Вы с треском провалились в дебатах и теряете значительное количество Престижа..."
rule_darkages_murder_warnings_rule:0 "#B #Bold Dark Ages#!:#! Предупреждения"
setting_darkages_murder_warnings_yes:0 "Да"
setting_darkages_murder_warnings_no:0 "Нет"
setting_darkages_murder_warnings_yes_desc:0 "Если есть Тайный советник, игрок будет получать предупреждения об убийстве."
setting_darkages_murder_warnings_no_desc:0 "Игрок не будет получать предупреждения об убийстве."
darkages_council.05.t:0 "Выковать легенду"
darkages_council.05.desc:0 "Сегодня ко мне [Select_CString(councillor.IsFemale, 'обратилась', 'обратился')] [councillor.GetName], [Select_CString(councillor.IsFemale, 'моя дружелюбная', 'мой дружелюбный')] [councillor.GetCouncilTitle], [Select_CString(councillor.IsFemale, 'которая', 'который')] работает над тем, чтобы способствовать росту моей Известности сбалансированным и эффективным образом.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'была поражена', 'был поражен')] согласованными шагами, предпринятыми моими советниками во главе с [councillor.GetFirstName|d], и [Select_CString(ROOT.Char.IsFemale, 'была рада', 'был рад')], что такой отличный шанс представился в этот момент времени!\n\nХотя все отлично поработали до сих пор, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] предоставить средства для предприятия, чтобы иметь хоть какой-то шанс на успех... если только..."
darkages_council.05.opta:0 "Предоставить средства"
darkages_council.05.optb:0 "...если только я не буду угрожать им решить вопрос без средств!"
darkages_council.05.optc:0 "Это не стоит усилий..."
darkages_council.05.tt1:0 "Успех этого действия зависит от вашей Дипломатии - к лучшему или к худшему - от того, являетесь ли вы Хитрым политиком и следуете ли вы образу жизни Дипломатии\n"
darkages_council.05.tt2:0 "Успех этого действия зависит от вашего высокого Ужаса (>= 20), от того, являетесь ли вы Пыточных дел мастером, Черствым, Садистом, Хитрым политиком или от следования образу жизни Интриги. Неудаче способствуют ваш низкий Ужас (<15), если вы Тупой или если Советник Храбрый, Гневный, Черствый и Хитрый политик\n"
darkages_council.05.tt3:0 "Выбрав этот вариант, если вы не Ленивый, вы получите Стресс. Однако, если вы Ленивый, ваш Стресс уменьшится, количество зависит также от двух других ваших черт личности\n"
darkages_council.05.toastdesc.01:0 "Вы добьетесь успеха!\n"
darkages_council.05.toastdesc.02:0 "Вы потерпите неудачу...\n"
darkages_council.05.toast1:0 "Вы получаете впечатляющее количество Известности!"
darkages_council.05.toast2:0 "Вы теряете впечатляющее количество Престижа и Известности..."
darkages_council.05.toast3:0 "Вы получаете впечатляющее количество Известности!"
darkages_council.05.toast4:0 "Вам не удалось получить Известность..."
darkages_death_purge:0 "[Select_CString(ROOT.Char.IsFemale, 'встретила', 'встретил')] ужасный конец в чистке"
darkages_death_purge_killer:0 "[Select_CString(ROOT.Char.IsFemale, 'встретила', 'встретил')] ужасный конец в кровавой чистке по приказу [TARGET_CHARACTER.GetUIName]"
negotiate_alliance_darkages:0 "Заключить союз"
negotiate_alliance_darkages_desc:0 "Вы можете попытаться заключить союз с [recipient.GetFirstName|i], если профинансируете этот политический шаг."
negotiate_alliance_darkages_tt:0 "Чтобы добиться успеха в этом взаимодействии, вам нужно полагаться на положительную разницу в ранге с вашей целью, вашу высокую Дипломатию, на очень высокую Дипломатию вашего Канцлера, на хорошее мнение вашей цели о вас, на то, что вы Дипломат, Проницательный и Общительный. И наоборот, количество союзов, которые у вас уже есть, низкая Дипломатия вашей цели, отрицательный ранг к вашей цели, отрицательное мнение, которое ваша цель имеет о вас, или если вы Тупой, создают штрафы для попытки. Без каких-либо модификаторов шансы немного не в пользу вашего предложения."
darkages_alliances.01.t:0 "Выковать взаимные узы"
darkages_alliances.01.desc:0 "...И вот мы здесь. Обе делегации пытаются понять, могут ли они прийти к соглашению, которое материализуется в Союз. Тонкостей много, политических последствий предостаточно, и препятствия существенны.\n\nТем не менее, обе стороны сейчас ведут переговоры об акте с политическими последствиями для будущего..."
darkages_alliances.01.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'сделаю', 'сделаю')] все возможное!"
darkages_alliances.01.optb:0 "Лучше отменить все это..."
darkages_alliances.02.t:0 "Светлое будущее вместе!"
darkages_alliances.02.desc:0 "Переговоры были трудными, но, как я полагаю, добросовестными.\n\nСумма, с которой я [Select_CString(ROOT.Char.IsFemale, 'рассталась', 'расстался')], чтобы впечатлить [recipient.GetName|a], была потрачена не зря.\n\nВ конце концов, мы были рады приветствовать друг друга как партнеры и союзники!"
darkages_alliances.02.opta:0 "Отлично!"
darkages_alliances.03.t:0 "Путь в никуда..."
darkages_alliances.03.desc:0 "Несмотря на небольшое состояние, которое я [Select_CString(ROOT.Char.IsFemale, 'потратила', 'потратил')], чтобы профинансировать всю эту встречу и впечатлить [recipient.GetName|a], с самого начала стало ясно, что существуют значительные политические препятствия для успеха наших переговоров.\n\nК сожалению, все свелось к вопросу доверия... или его отсутствия. В конце концов, это был провал..."
darkages_alliances.03.opta:0 "Упущенная возможность..."
NOT_TEXT_DESC_darkages_interaction_relation_fail:0 "Персонажи должны иметь мнение друг о друге не менее -15"
darkages_bankrupt.02.t:0 "На грани краха"
darkages_bankrupt.02.desc:0 "С нынешним уровнем нашей казны приходит нехватка средств на самые основные услуги в моем Домене.\n\nС отвращением, но без удивления я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал')], что средств не хватает, чтобы сохранить патрули ополчения, обеспечивающие безопасность моих провинций.\nВ довершение всего, ясно, что [darkages_county.GetName] теряет свое прежнее Развитие..."
darkages_bankrupt.02.opta:0 "Нет средств, нет радости..."
darkages_bankrupt.02.optb:0 "Использовать мой Престиж, чтобы повлиять на ополчение"
darkages_bankrupt.02.tt1:0 "Этот вариант доступен, потому что у вас не менее 250 Престижа\n"
darkages_opinion_county_bankrupt1:0 "Серьезные экономические проблемы"
darkages_opinion_county_bankrupt1_desc:0 "Поскольку Лорд этого Графства сталкивается с банкротством, ремесленники, простолюдины и крестьяне чувствуют связанные с этим экономические трудности и глубокое чувство несправедливости"
darkages_opinion_county_bankrupt2:0 "Серьезные экономические проблемы"
darkages_opinion_county_bankrupt2_desc:0 "Поскольку Лорд этого Графства сталкивается с банкротством, ремесленники, простолюдины и крестьяне чувствуют связанные с этим экономические трудности и глубокое чувство несправедливости"
darkages_opinion_county_bankrupt3:0 "Серьезные экономические проблемы"
darkages_opinion_county_bankrupt3_desc:0 "Поскольку Лорд этого Графства сталкивается с банкротством, ремесленники, простолюдины и крестьяне чувствуют связанные с этим экономические трудности и глубокое чувство несправедливости"
darkages_opinion_county_bankrupt4:0 "Серьезные экономические проблемы"
darkages_opinion_county_bankrupt4_desc:0 "Поскольку Лорд этого Графства сталкивается с банкротством, ремесленники, простолюдины и крестьяне чувствуют связанные с этим экономические трудности и глубокое чувство несправедливости"
darkages_opinion_county_bankrupt5:0 "Серьезные экономические проблемы"
darkages_opinion_county_bankrupt5_desc:0 "Поскольку Лорд этого Графства сталкивается с банкротством, ремесленники, простолюдины и крестьяне чувствуют связанные с этим экономические трудности и глубокое чувство несправедливости"
darkages_bankrupt.03.t:0 "Экономические последствия"
darkages_bankrupt.03.desc:0 "С моим банкротством и неспособностью правильно управлять своими активами мой Домен ощущает нехватку доступной монеты.\n\nПоскольку мой двор, множеством способов, является одним из главных драйверов местной экономики, мои подданные чувствуют себя весьма обиженными из-за трудностей, которые они испытывают..."
darkages_bankrupt.03.opta:0 "Нам нужно время, чтобы восстановиться"
darkages_bankrupt.03.optb:0 "Мы можем взять еще долг, чтобы облегчить ситуацию"
darkages_bankrupt.04.t:0 "Духовная расплата"
darkages_bankrupt.04.desc:0 "Столкнувшись с банкротством, сегодня я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с моим [religious.GetCouncilTitle|i], который упрекнул меня в отсутствии здравого смысла в отношении моей пустой казны.\n\nНе жалея слов и утверждая, что [Select_CString(religious.IsFemale, 'вдохновлена', 'вдохновлен')] [ROOT.Char.GetFaith.HighGodName|i], [religious.GetName] [Select_CString(religious.IsFemale, 'дала', 'дал')] понять [religious.GetHerHis] разочарование и то, как мой путь к спасению стал теперь дальше, намного дальше, чтобы быть достигнутым..."
darkages_bankrupt.04.opta:0 "Кротко принять упрек"
darkages_bankrupt.04.optb:0 "Попытаться манипулировать [religious.GetCouncilTitle|i]"
darkages_bankrupt.04.optc:0 "Попытаться заговорить зубы [religious.GetCouncilTitle|d]"
darkages_bankrupt.04.optd:0 "Вступить с [religious.GetCouncilTitle|i] в теологический дебат"
darkages_bankrupt.04.tt1:0 "Этот вариант доступен, потому что у вас не менее 12 Интриги.\nУспех этого варианта зависит от ваших черт Обманщик и Интриган, а также от вашей очень высокой Интриги. Увеличивают шанс неудачи ваши черты личности Честный и Справедливый, а также не очень высокая Интрига\n"
darkages_bankrupt.04.toast1:0 "Вы преуспели в своем действии и теряете только 60 Благочестия!"
darkages_bankrupt.04.toast2:0 "Вы потерпели неудачу в своем действии и теряете 500 Благочестия и полный уровень Набожности..."
darkages_bankrupt.04.tt2:0 "Этот вариант доступен, потому что у вас не менее 12 Дипломатии.\nУспех этого варианта зависит от ваших черт Общительный и Дипломат, а также от вашей очень высокой Дипломатии. Увеличивают шанс неудачи ваши черты личности Застенчивый и Произвольный, а также не очень высокая Дипломатия\n"
darkages_bankrupt.04.tt3:0 "Этот вариант доступен, потому что у вас не менее 12 Учености.\nУспех этого варианта зависит от ваших черт Фанатичный и Теолог, а также от вашей очень высокой Учености. Увеличивают шанс неудачи ваши черты личности Циничный и Высокомерный, а также не очень высокая Ученость\n"
darkages_opinion_despondent:0 "Уныние"
darkages_bankrupt.05.t:0 "Хватаясь за соломинку"
darkages_bankrupt.05.desc:0 "Поскольку мое банкротство становится очевидным для всех, поскольку экономика моей Державы страдает из-за моего неумелого управления, мои вассалы становятся беспокойными и недовольными вплоть до того, что предъявляют мне претензии по поводу моих... сомнительных финансовых решений.\n\nТолько выдающиеся навыки позволят мне спастись от гнева этой неблагодарной дворянской толпы!"
darkages_bankrupt.05.opta:0 "К сожалению, мне не хватает таких навыков"
darkages_bankrupt.05.optz:0 "Лучше действовать наверняка"
darkages_bankrupt.05.optb:0 "Использовать свою армию, чтобы впечатлить вассалов"
darkages_bankrupt.05.optc:0 "Представить разумный план управления моим вассалам"
darkages_bankrupt.05.tt1:0 "Этот вариант доступен, потому что у вас не менее 12 Военного навыка.\nУспех этого варианта зависит от ваших черт Храбрый и Стратег, а также от вашего очень высокого Военного навыка. Увеличивают шанс неудачи ваши черты личности Трусливый и Смиренный, а также не очень высокий Военный навык\n"
darkages_bankrupt.05.tt2:0 "Этот вариант доступен, потому что у вас не менее 12 Управления.\nУспех этого варианта зависит от ваших черт Жадный и Администратор, а также от вашего очень высокого навыка Управления. Увеличивают шанс неудачи ваши черты личности Щедрый и Нетерпеливый, а также не очень высокий навык Управления\n"
darkages_bankrupt.05.toast1:0 "Вам удается успокоить опасения вашего вассала и отделаться небольшим штрафом к мнению. Поздравляем!"
darkages_bankrupt.05.toast2:0 "Вы теряете весь Авторитет племени или Короны над вашими вассалами, а также получаете длительный и неприятный штраф к мнению. Совсем не хорошо!"
darkages_focus_prestige1:0 "Фокус на Престиж"
darkages_focus_prestige1_desc:0 "Этот персонаж сосредоточен на получении Престижа"
darkages_focus_prestige2:0 "Фокус на Престиж"
darkages_focus_prestige2_desc:0 "Этот персонаж сосредоточен на получении Престижа"
