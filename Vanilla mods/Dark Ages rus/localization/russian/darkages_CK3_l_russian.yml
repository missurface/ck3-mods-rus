darkages_check_development.01.t:0 "Требования урбанизации"
darkages_check_development.01.desc:0 "По мере того как [my_county.GetName] увеличивает свое развитие, возникает несколько дополнительных потребностей в инфраструктуре, чтобы Графство полностью реализовало свой потенциал.\n\nДороги, мосты, акведуки, общественные бани, канализация, основные медицинские учреждения и многое другое востребованы по всему Графству, чтобы оно продолжало расти.\n\nК сожалению, все эти сооружения стоят золота, и я [Select_CString(ROOT.Char.IsFemale, 'та', 'тот')], кто [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] оплатить счет..."
darkages_check_development.01.opta:0 "Это на благо Державы"
darkages_check_development.01.optb:0 "Я отложу это..."
darkages_check_development.01.tt1:0 "Поскольку уровень Развития этого Графства достигает 10, необходимо построить дополнительную вспомогательную инфраструктуру, чтобы оно продолжало свой устойчивый рост\n"
