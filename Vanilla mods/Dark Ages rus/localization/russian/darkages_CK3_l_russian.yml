darkages_piety.10.optb:0 "О нет...!"
darkages_piety.11.tt1:0 "Шанс получить этот результат был изменен [Concept('intrigue', 'Интригами')|E] как вас, так и [pope.GetName]; если положительно, то чем больше разница между обоими, тем выше ваши шансы на успех, если отрицательно - шансы на неудачу. Также важными и в порядке возрастания важности являются наличие свойств [Concept('deceitful', 'Вероломство')|E], [Concept('schemer', 'Интриган')|E] и [Concept('shrewd', 'Проницательность')|E] для обеих сторон и то, следуют ли они Образу жизни Интриг\n"
darkages_piety.11.t:0 "Серый кардинал"
darkages_piety.11.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать самые тайные дела международного уровня с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] доминировать в предмете обсуждения намного лучше, чем [pope.GetSheHe].\n\nТщательно сформулированными фразами я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] склонять [Select_CString(pope.IsFemale, 'ее', 'его')] волю к моим личным мнениям, и в конце концов [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] сформировать аспекты Интриг моей собственной веры!\n\nУчитывая мое влияние и публичный характер нашей встречи, помимо получения огромного количества [Concept('piety', 'Благочестия')|E], я также заработаю много [Concept('prestige', 'Престижа')|E]..."
darkages_piety.11.desc2:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать самые тайные дела международного уровня с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] не в своей тарелке в предмете обсуждения.\n\nЗаикаясь пустыми фразами и полыми аргументами, вскоре мне стало ясно, что [pope.GetName] [Select_CString(pope.IsFemale, 'почувствовала', 'почувствовал')], что [Select_CString(pope.IsFemale, 'ее', 'его')] время тратится впустую.\n\nК сожалению, и также учитывая публичный характер встречи, все это дело - полная катастрофа!"
darkages_piety.11.opta:0 "Благословен Господь!"
darkages_piety.11.optb:0 "О нет...!"
darkages_piety.12.tt1:0 "Шанс получить этот результат был изменен [Concept('learning', 'Ученостью')|E] как вас, так и [pope.GetName]; если положительно, то чем больше разница между обоими, тем выше ваши шансы на успех, если отрицательно - шансы на неудачу. Также важными и в порядке возрастания важности являются наличие свойств [Concept('zealous', 'Фанатик')|E], [Concept('theologian', 'Теолог')|E] и [Concept('shrewd', 'Проницательность')|E] для обеих сторон и то, следуют ли они Образу жизни Учености\n"
darkages_piety.12.t:0 "Серый кардинал"
darkages_piety.12.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать глубокие теологические концепции с далеко идущими последствиями с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] доминировать в предмете обсуждения намного лучше, чем [pope.GetSheHe].\n\nТщательно сформулированными фразами я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] склонять [Select_CString(pope.IsFemale, 'ее', 'его')] волю к моим личным мнениям, и в конце концов [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] сформировать аспекты теологии моей собственной веры!\n\nУчитывая мое влияние и публичный характер нашей встречи, помимо получения огромного количества [Concept('piety', 'Благочестия')|E], я также заработаю много [Concept('prestige', 'Престижа')|E]..."
darkages_piety.12.desc2:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] обсуждать глубокие теологические концепции с далеко идущими последствиями с [pope.GetName], вскоре стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] не в своей тарелке в предмете обсуждения.\n\nЗаикаясь пустыми фразами и полыми аргументами, вскоре мне стало ясно, что [pope.GetName] [Select_CString(pope.IsFemale, 'почувствовала', 'почувствовал')], что [Select_CString(pope.IsFemale, 'ее', 'его')] время тратится впустую.\n\nК сожалению, и также учитывая публичный характер встречи, все это дело - полная катастрофа!"
darkages_piety.12.opta:0 "Благословен Господь!"
darkages_piety.12.optb:0 "О нет...!"
darkages_piety.13.t:0 "Религиозная сеть"
darkages_piety.13.desc:0 "Уже пару месяцев я [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал')], что мои религиозные подданные предпринимают какую-то политическую уловку, чтобы загнать меня в угол.\n\nТолько сегодня я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал')] о масштабах их влияния в обществе моего Государства, когда они попросили меня профинансировать сеть святилищ, небольших храмов по всему моему домену и даже подаяние для бедных, чтобы повысить свою репутацию среди населения по отношению к знати.\n\nОбойденный в маневре, теперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что я буду делать, зная, что если я соглашусь платить, я тоже получу важные награды..."
darkages_piety.13.opta:0 "Предоставить средства"
darkages_piety.13.tt1:0 "Вы финансируете планы религиозных сановников в вашем Государстве, и помимо получения [Concept('piety', 'Благочестия')|E], каждый придворный, гость и вассал, являющийся [Concept('zealous', 'Фанатиком')|E], одобрит ваше поведение. Ваш религиозный советник также отреагирует положительно, независимо от того, является ли он [Concept('zealous', 'Фанатиком')|E]\n"
darkages_piety.13.optb:0 "Отклонить весь план"
darkages_piety.13.tt2:0 "Вы отказываетесь следовать планам ваших религиозных сановников, но, учитывая накопленный ими политический рычаг, вы столкнетесь со значительным штрафом к [Concept('piety', 'Благочестию')|E]. Также ожидайте, что ваши [Concept('zealous', 'Фанатичные')|E] придворные, гости и вассалы будут весьма недовольны вашим решением. Ваш религиозный советник также отреагирует отрицательно, независимо от того, является ли он [Concept('zealous', 'Фанатиком')|E]. Наконец, если вы [Concept('zealous', 'Фанатик')|E], вы увеличите свой [Concept('stress', 'Стресс')|E]"
darkages_opinion_county_religious_refuse:0 "Отказ в религиозном продвижении"
darkages_opinion_county_religious_refuse_desc:0 "Ваше решение отказаться от выполнения воли религиозных властей ощущается среди простого населения этого графства"
darkages_opinion_spendthrift:0 "Транжира"
darkages_opinion_avaricious:0 "Скупой"
darkages_piety.14.tt1:0 "Ваши не [Concept('zealous', 'Фанатичные')|E] вассалы, придворные и гости, за исключением вашего религиозного советника, подумают, что вы тратите ресурсы Государства на это религиозное собрание, и их мнение о вас пострадает. Кроме того, общее население вашего домена не примет идею тратить эти ресурсы на то, что они считают бессмысленной религиозной встречей, тем самым снижая мнение графства о вас в вашем домене"
darkages_opinion_county_religious_spendthrift:0 "Религиозное расточительство"
darkages_opinion_county_religious_spendthrift_desc:0 "Ваше население считает, что вы тратите ресурсы Государства на бессмысленные религиозные встречи"
darkages_piety.14.opta:0 "Подчиниться воле религиозных сановников"
darkages_piety.14.optb:0 "Отказаться платить за собрание"
darkages_piety.14.tt2:0 "Все ваши [Concept('zealous', 'Фанатичные')|E] придворные, гости и вассалы будут возмущены вашим решением. Религиозный советник также будет возмущен, независимо от того, является ли он [Concept('zealous', 'Фанатиком')|E]"
darkages_piety.14.t:0 "Религиозное собрание"
darkages_piety.14.desc:0 "С некоторого времени я [Select_CString(ROOT.Char.IsFemale, 'знаю', 'знаю')], что религиозные сановники моего Государства замышляют что-то за моей спиной.\nДалекие от угрозы жизни, их планы представляют собой политический вызов, который я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] преодолеть.\n\nНа самом деле они планируют провести великое религиозное собрание с иностранными религиозными эмиссарами в моей столице и просят меня профинансировать всю операцию. Поддержка или отказ от плана несет в себе хорошие и плохие политические последствия..."
darkages_add_shrewd_dull.03.t:0 "Крепкое тело"
darkages_add_shrewd_dull.03.desc:0 "По мере того как я взрослею, становится все яснее, что моя конституция намного превосходит большинство других детей. Я бегаю быстрее, забираюсь выше и прыгаю дальше, чем большинство!"
darkages_add_shrewd_dull.03.opta:0 "Отлично!"
darkages_add_shrewd_dull.04.t:0 "Хрупкое тело"
darkages_add_shrewd_dull.04.desc:0 "По мере того как я взрослею, становится все яснее, что моя конституция намного уступает большинству других детей. Я бегаю медленнее, забираюсь ниже и прыгаю ближе, чем большинство..."
darkages_add_shrewd_dull.04.opta:0 "К сожалению..."
darkages_opinion_county_religious_tolerance:0 "Религиозная терпимость"
darkages_opinion_county_religious_tolerance_desc:0 "Это графство очень благодарно правителю за проявление некоторой религиозной терпимости в нем"
darkages_piety.15.t:0 "Радикалы против умеренных"
darkages_piety.15.desc:0 "За последние несколько месяцев два религиозных течения начали соперничать за влияние в Государстве.\n\nОдно из течений основано на радикальных убеждениях и хочет усилить строгое религиозное следование среди населения моего домена.\nДругое носит более умеренный характер и не хочет так сильно вмешиваться в повседневную жизнь крестьян, пока сохраняется хоть какое-то уважение.\n\nК сожалению, я политически [Select_CString(ROOT.Char.IsFemale, 'оказалась втянута', 'оказался втянут')] в этот вопрос, так как обе стороны перехитрили меня, и теперь я стою перед необходимостью выбирать сторону..."
darkages_piety.15.opta:0 "Принять сторону радикалов"
darkages_piety.15.optb:0 "Принять сторону умеренных"
darkages_piety.15.optc:0 "Дипломатично выпутаться из политической ссоры"
darkages_piety.15.tt1:0 "Приняв сторону радикалов, вы создадите нестабильность в своем домене, так как люди адаптируются к новой парадигме, получая при этом [Concept('piety', 'Благочестие')|E] за строгое соблюдение религиозных практик. Если вы [Concept('zealous', 'Фанатичны')|E] или [Concept('callous', 'Черствы')|E], вы потеряете немного [Concept('stress', 'Стресса')|E]. И наоборот, если вы [Concept('cynical', 'Циничны')|E] или [Concept('compassionate', 'Сострадательны')|E], вы получите стресс, поддерживая радикалов\n"
darkages_piety.15.tt2:0 "Приняв сторону умеренных, вы получите благосклонность крестьян своего Домена, теряя при этом [Concept('piety', 'Благочестие')|E] за ваше намеренное уклонение от строгого следования своей религии. Если вы [Concept('zealous', 'Фанатичны')|E] или [Concept('callous', 'Черствы')|E], вы получите немного [Concept('stress', 'Стресса')|E]. И наоборот, если вы [Concept('cynical', 'Циничны')|E] или [Concept('compassionate', 'Сострадательны')|E], вы потеряете стресс, поддерживая умеренных. Если вы [Concept('zealous', 'Фанатик')|E], вы также потеряете уровень [Concept('piety', 'Благочестия')|E]\n"
darkages_piety.15.tt3:0 "Эта опция доступна благодаря удаче и вашей высокой [Concept('diplomacy', 'Дипломатии')|E]. Вы избегаете выбора\n"
darkages_piety.16.t:0 "Религиозная марионетка"
darkages_piety.16.desc:0 "В течение многих месяцев клирики моего Государства пытались лоббировать меня и других членов моей династии, чтобы уступить их просьбам о более заметной роли в делах страны.\n\nНаконец, им удалось политически загнать меня в угол, чтобы решить этот вопрос. Мой ответ окажет значительное влияние на различные политические аспекты..."
darkages_piety.16.opta:0 "Поддержать клириков"
darkages_piety.16.optb:0 "Отказать клирикам"
darkages_piety.16.optc:0 "Манипулировать клириками, избегая компромиссов"
darkages_manipulated_by_clerics:0 "Манипулируемый клириками"
darkages_manipulated_by_clerics_desc:0 "Клирики Государства пользуются большой свободой в определении вашей политики"
darkages_piety.16.tt1:0 "Вы поддерживаете Клириков и позволяете им решать многие вопросы повестки дня вашего Государства. Ваши навыки скомпрометированы, в то время как ваше [Concept('piety', 'Благочестие')|E] стремительно растет\n"
darkages_piety.16.tt2:0 "Вы отказываете Клирикам во власти, которую они ищут, принося [Concept('dynasty_prestige', 'Признание')|E] вашей династии тем самым. В результате страдает ваше [Concept('piety', 'Благочестие')|E]. Если вы [Concept('zealous', 'Фанатик')|E], вы потеряете уровень [Concept('piety', 'Благочестия')|E]\n"
darkages_piety.16.tt3:0 "Эта опция доступна благодаря удаче и вашей высокой [Concept('intrigue', 'Интриге')|E]. Вы избегаете выбора\n"
darkages_modifier_trade_route_1:0 "Малый торговый путь"
darkages_modifier_trade_route_1_desc:0 "В домене этого персонажа был установлен Малый торговый путь, что увеличило собираемые с него налоги. В порядке значимости торговые пути могут быть Малыми, Значительными, Оживленными, Крупными или Богатыми."
darkages_modifier_trade_route_2:0 "Значительный торговый путь"
darkages_modifier_trade_route_2_desc:0 "В домене этого персонажа был установлен Значительный торговый путь, что увеличило собираемые с него налоги. В порядке значимости торговые пути могут быть Малыми, Значительными, Оживленными, Крупными или Богатыми."
darkages_modifier_trade_route_3:0 "Оживленный торговый путь"
darkages_modifier_trade_route_3_desc:0 "В домене этого персонажа был установлен Оживленный торговый путь, что увеличило собираемые с него налоги. В порядке значимости торговые пути могут быть Малыми, Значительными, Оживленными, Крупными или Богатыми."
darkages_modifier_trade_route_4:0 "Крупный торговый путь"
darkages_modifier_trade_route_4_desc:0 "В домене этого персонажа был установлен Крупный торговый путь, что увеличило собираемые с него налоги. В порядке значимости торговые пути могут быть Малыми, Значительными, Оживленными, Крупными или Богатыми."
darkages_modifier_trade_route_5:0 "Богатый торговый путь"
darkages_modifier_trade_route_5_desc:0 "В домене этого персонажа был установлен Богатый торговый путь, что увеличило собираемые с него налоги. В порядке значимости торговые пути могут быть Малыми, Значительными, Оживленными, Крупными или Богатыми."
darkages_establish_trade_route_decision:0 "Установить торговый путь"
darkages_establish_trade_route_decision_confirm:0 "Рискнуть с этой политикой"
darkages_establish_trade_route_decision_tooltip:0 "Попытаться установить торговый путь в вашем Домене"
darkages_establish_trade_route_decision_desc:0 "Попытаться установить торговый путь в вашем Домене, увеличивая налоги, которые вы собираете. Уверенность в установке торгового пути не гарантирована и зависит положительно или отрицательно от вашего навыка [Concept('stewardship', 'Управления')|E] и положительно от наличия образования в сфере Управления. Размер торгового пути может варьироваться, опять же частично завися от вашего навыка [Concept('stewardship', 'Управления')|E]."
darkages_establish_trade_route.01.t:0 "Полный провал"
darkages_establish_trade_route.01.desc:0 "Моя попытка установить торговый путь в моем домене провалилась, так как моих политических решений и действий на местах оказалось недостаточно, чтобы побудить купцов связать свой бизнес из далеких мест с моими графствами."
darkages_establish_trade_route.01.opta:0 "Золото было выброшено на ветер..."
darkages_establish_trade_route.02.t:0 "Небольшой успех"
darkages_establish_trade_route.02.desc:0 "Моя попытка установить торговый путь в моем домене привела нескольких купцов в мои графства, и была создана прибыльная небольшая торговая сеть!"
darkages_establish_trade_route.02.opta:0 "Совсем неплохо..."
darkages_establish_trade_route.03.t:0 "Умеренный успех"
darkages_establish_trade_route.03.desc:0 "Моя попытка установить торговый путь в моем домене привела некоторых купцов в мои графства, и была создана прибыльная торговая сеть!"
darkages_establish_trade_route.03.opta:0 "Хорошо"
darkages_establish_trade_route.04.t:0 "Значительный успех"
darkages_establish_trade_route.04.desc:0 "Моя попытка установить торговый путь в моем домене привела многих купцов в мои графства, и была создана прибыльная крупная торговая сеть!"
darkages_establish_trade_route.04.opta:0 "Хорошо!"
darkages_establish_trade_route.05.t:0 "Большой успех"
darkages_establish_trade_route.05.desc:0 "Моя попытка установить торговый путь в моем домене привела толпы купцов в мои графства, и была создана очень прибыльная торговая сеть!"
darkages_establish_trade_route.05.opta:0 "Хорошо!"
darkages_establish_trade_route.06.t:0 "Огромный успех!"
darkages_establish_trade_route.06.desc:0 "Моя попытка установить торговый путь в моем домене привела толпы купцов в мои графства, и была создана очень прибыльная торговая сеть, торгующая всевозможными драгоценными товарами из далеких мест!"
darkages_establish_trade_route.06.opta:0 "Отлично!"
darkages_bad_traits_courtier.01.t:0 "Конец пути"
darkages_bad_traits_courtier.01.desc:0 "Однажды вечером, когда я в одиночестве [Select_CString(ROOT.Char.IsFemale, 'прогуливалась', 'прогуливался')] по темным закоулкам моего [ROOT.Char.Custom('FortifiedBuilding')], я [Select_CString(ROOT.Char.IsFemale, 'прошла', 'прошел')] мимо [killer.GetName] с улыбкой на [Select_CString(killer.IsFemale, 'ее', 'его')] лице, приветствуя меня. Странно, но я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал')] что-то странное в [Select_CString(killer.IsFemale, 'ней', 'нем')].\n\nКогда я [Select_CString(ROOT.Char.IsFemale, 'вошла', 'вошел')] в небольшую нишу, угрожающая тень двинулась ко мне с кинжалом, готовым вонзиться мне в живот!\n\nВ последний момент, пытаясь защититься, я [Select_CString(ROOT.Char.IsFemale, 'вспомнила', 'вспомнил')] [killer.GetName] и [Select_CString(killer.IsFemale, 'ее', 'его')] безмятежную, но, возможно, виноватую улыбку на лице..."
darkages_bad_traits_courtier.01.opta:0 "Только судьба может быть моим союзником..."
darkages_bad_traits_courtier.01.tt:0 "Хотя вы предупреждены о том, кто мог заказать убийство, вы должны найти доказательства этого... если выживете. Как бы то ни было, взрослый придворный или гость с мнением о вас не выше -29 и одним из следующих свойств: [Concept('wrathful', 'Гнев')|E], [Concept('callous', 'Черствость')|E], [Concept('sadistic', 'Садизм')|E], [Concept('paranoid', 'Паранойя')|E] или [Concept('vengeful', 'Мстительность')|E], и при этом не являющийся [Concept('compassionate', 'Сострадательным')|E], [Concept('forgiving', 'Всепрощающим')|E] или [Concept('generous', 'Щедрым')|E], может попытаться совершить покушение на вашу жизнь. Удача играет определяющую роль, но ваша высокая [Concept('prowess', 'Доблесть')|E], высокая [Concept('intrigue', 'Интрига')|E], наличие образования в сфере [Concept('intrigue', 'Интриг')|E] или следование образу жизни [Concept('intrigue', 'Интриг')|E] могут вас спасти. И наоборот, низкая [Concept('prowess', 'Доблесть')|E] и низкая [Concept('intrigue', 'Интрига')|E] лишь усугубят ваше положение...\n"
darkages_bad_traits_courtier.02.t:0 "Серьезное предупреждение"
darkages_bad_traits_courtier.02.desc:0 "Во время неофициальной встречи с моим [spymaster.GetCouncilTitle], [spymaster.GetName] [Select_CString(spymaster.IsFemale, 'рассказала', 'рассказал')] мне об одном из своих опасений касательно [potential_killer.GetName].\n\nИз-за [Select_CString(potential_killer.IsFemale, 'ее', 'его')] плохого мнения обо мне и благодаря [Select_CString(potential_killer.IsFemale, 'ее', 'его')] чертам характера, [spymaster.GetName] опасается, что моя жизнь в опасности, и никакой телохранитель не может защитить меня от угрозы внутри моего собственного двора.\n\nВ сложившейся ситуации [spymaster.GetFirstName] советует мне, что разумно было бы повлиять, прогнать или избавиться от [potential_killer.GetName], чтобы повысить мою будущую безопасность.\n\nПонимая, что угроза лишь теоретическая, [spymaster.GetCouncilTitle] назначаются, чтобы видеть и готовиться к опасностям на каждом углу, но моя жизнь может быть на кону, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что я буду делать..."
darkages_bad_traits_courtier.02.opta:0 "Спасибо за предупреждение, [spymaster.GetName]"
darkages_dynasty_slandered:0 "Династия оклеветана"
darkages_dynasty_slandered_desc:0 "Имя династии этого персонажа оклеветано"
darkages_renown.01.tt1:0 "Предоставив золото для спасения репутации Династии, каждый член вашей Династии будет вам благодарен, что будет представлено одноименным модификатором мнения"
darkages_renown.01.tt2:0 "Отказавшись платить золото для спасения репутации Династии, [Concept('dynasty_prestige', 'Признание')|E] пострадает"
darkages_renown.01.tt3:0 "Эта опция доступна, если у вас есть как минимум 21 [Concept('intrigue', 'Интриги')|E], вы [Concept('schemer', 'Интриган')|E], [Concept('deceitful', 'Вероломны')|E] или если вы следуете по пути Образа жизни [Concept('intrigue', 'Интриг')|E]. Даже если вы заплатите требуемое золото авансом, то, как вы занимались саморекламой, и сомнительные средства, с помощью которых вы решили свою дилемму, не вызывают одобрения внутри вашей Династии, что означает, что вы не получите никакого модификатора мнения от других членов Династии, в отличие от верхней опции"
darkages_renown.01.tt4:0 "Вы финансируете расследование, чтобы выяснить, кто является вдохновителем клеветы на репутацию вашей Династии. На результаты расследования положительно влияют ваша высокая [Concept('intrigue', 'Интрига')|E], то, что вы [Concept('schemer', 'Интриган')|E], [Concept('deceitful', 'Вероломны')|E], ваш [Concept('dread', 'Ужас')|E] и очень высокая (21 или более) [Concept('intrigue', 'Интрига')|E] вашего Тайного советника. И наоборот, факторы, способствующие вашему шансу на неудачу: ваша низкая [Concept('intrigue', 'Интрига')|E], то, что вы [Concept('forgiving', 'Всепрощающий')|E], [Concept('content', 'Сдержанный')|E], [Concept('lazy', 'Ленивый')|E] и имеете 0 [Concept('dread', 'Ужаса')|E]"
darkages_renown.01.optc:0 "Заплатить больше, чем требуется, и тонко продвигать свои интересы"
darkages_renown.01.optb:0 "Отказаться платить требуемое золото"
darkages_renown.01.opta:0 "Заплатить требуемое золото"
darkages_renown.01.optd:0 "Раскрыть вдохновителя"
darkages_renown.01.t:0 "Династический шантаж"
darkages_renown.01.desc:0 "Все начиналось как маленькие, расплывчатые и далекие сплетни обо мне, но постепенно они стали появляться в разговорах благородных домов внутри и за пределами моего Государства.\nПо сути, имя моей Династии было запятнано самыми гнусными слухами о честности ее членов.\n\nНедавно ко мне [Select_CString(ROOT.Char.IsFemale, 'обратился посредник, который попросил', 'обратился посредник, который попросил')] золота, чтобы эти слухи потихоньку прекратились.\n\nПоскольку вдохновитель этого гнусного заговора неизвестен, я [Select_CString(ROOT.Char.IsFemale, 'должна взвесить свои варианты', 'должен взвесить свои варианты')]..."
darkages_rival_taint_dynasty_reputation:0 "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsFemale, 'разозлила', 'разозлил')] [CHARACTER.GetShortUIName], пытаясь запятнать имя вашей Династии."
darkages_renown.02.t:0 "Успешное расследование"
darkages_renown.02.desc:0 "Ваше расследование о том, кто был вдохновителем гнусных слухов, окружающих вашу Династию, увенчалось большим успехом. Как доказывают факты, виновником всей схемы является не кто иной, как [neighbour.GetName]!"
darkages_renown.02.opta:0 "Отлично!"
darkages_renown.02.tt1:0 "Ваши товарищи по Династии будут благодарны, и это проявится в их мнении о вас"
darkages_renown.03.t:0 "Провальное расследование"
darkages_renown.03.desc:0 "Осмотрев каждый закоулок, проверив самые странные теории, отправив шпионов к иностранным дворам, я остался ни с чем в результате моих поисков вдохновителя злых слухов, окружающих мою Династию..."
darkages_renown.03.opta:0 "Крысы!!!"
darkages_renown.03.tt1:0 "Ваши неудачные усилия выставили вашу династию в еще худшем свете, чем раньше, так как ваши попытки были истолкованы как форма сокрытия 'доказательств' злых слухов, окружающих имя вашей Династии. Кроме того, ваши ошибочные усилия также заставили вас потерять часть собственного Престижа"
darkages_renown.04.tt2:0 "Эта опция доступна, потому что у вас есть как минимум 21 [Concept('learning', 'Учености')|E] или фокус на Ученость. Вы используете свои интеллектуальные способности, чтобы лучше влиять на [Concept('dynasty_prestige', 'Признание')|E] своей династии внутри и за пределами вашего Государства"
darkages_renown.04.tt1:0 "Эта опция доступна, потому что у вас есть как минимум 21 [Concept('diplomacy', 'Дипломатии')|E] или фокус на Величие. Вы используете свои Дипломатические способности, чтобы лучше влиять на [Concept('dynasty_prestige', 'Признание')|E] своей династии внутри и за пределами вашего Государства"
darkages_renown.04.tt3:0 "Эта опция доступна, потому что у вас есть как минимум 30 [Concept('dread', 'Ужаса')|E] или фокус на Запугивание. Вы внушаете страх своим товарищам по Династии, чтобы избежать оплаты"
darkages_renown.04.opte:0 "Внушить страх своим товарищам по Династии"
darkages_renown.04.optd:0 "Использовать свою Ученость вместо этого"
darkages_renown.04.optc:0 "Использовать свою Дипломатию вместо этого"
darkages_renown.04.optb:0 "Отказаться делать взнос"
darkages_renown.04.opta:0 "Внести свой вклад"
darkages_renown.04.desc:0 "Несколько недель назад была созвана встреча самых выдающихся членов моей Династии, и я с радостью [Select_CString(ROOT.Char.IsFemale, 'приняла', 'принял')] всех у себя.\n\nПосле долгих разговоров, некоторых препирательств и нескольких сладких воспоминаний о нашем прошлом, большинством было решено, что каждый внесет свой вклад в укрепление нашей династии, предоставив сумму золота, необходимую для продвижения наших общих интересов.\n\nЗаглянув в свою сокровищницу, я [Select_CString(ROOT.Char.IsFemale, 'задумалась', 'задумался')]..."
darkages_renown.04.t:0 "Новый династический цикл"
darkages_renown.04.tt0:0 "Отказавшись внести свою долю золота на благо доброго имени вашей Династии, все остальные члены Династии будут возмущены вами"
darkages_opinion_county_social_tumults:0 "Социальные волнения"
darkages_opinion_county_social_tumults_desc:0 "Население этого графства беспокойно из-за предполагаемого пренебрежения их правителя к условиям их жизни"
darkages_renown.05.t:0 "Политика благосостояния"
darkages_renown.05.desc1:0 "Важный крестьянский лидер моего собственного домена попросил аудиенции со мной, чтобы обсудить аспекты повседневной жизни, которые могли бы улучшить условия жизни моих крестьян.\nБолее того, он вовлекает всю мою династию в свой поиск, и мои действия будут истолкованы в этом свете.\n\nХотя этот человек имеет дипломатический вид и знания выше среднего, я нахожу просьбы и предложения, которые он делает, угрозой для моей казны, несмотря на позитивный оборот, который он использует и который можно из этого извлечь. В конце концов, лучше иметь счастливых крестьян, чем несчастных, и очевидно, что этого человека поддерживает множество людей.\n\nВ общем, мне нужно тщательно оценить свои варианты..."
darkages_renown.05.desc2:0 "Важный крестьянский лидер моего собственного домена попросил аудиенции со мной, чтобы обсудить аспекты повседневной жизни, которые могли бы улучшить условия жизни моих крестьян.\nБолее того, он вовлекает всю мою династию в свой поиск, и мои действия будут истолкованы в этом свете.\n\nХотя этот человек имеет военный вид и знания выше среднего, я нахожу просьбы и предложения, которые он делает, угрозой для моей казны, несмотря на позитивный оборот, который он использует и который можно из этого извлечь. В конце концов, лучше иметь счастливых крестьян, чем несчастных, и очевидно, что этого человека поддерживает множество людей.\n\nВ общем, мне нужно тщательно оценить свои варианты..."
darkages_renown.05.desc3:0 "Важный крестьянский лидер моего собственного домена попросил аудиенции со мной, чтобы обсудить аспекты повседневной жизни, которые могли бы улучшить условия жизни моих крестьян.\nБолее того, он вовлекает всю мою династию в свой поиск, и мои действия будут истолкованы в этом свете.\n\nХотя этот человек имеет вид управленца и знания выше среднего, я нахожу просьбы и предложения, которые он делает, угрозой для моей казны, несмотря на позитивный оборот, который он использует и который можно из этого извлечь. В конце концов, лучше иметь счастливых крестьян, чем несчастных, и очевидно, что этого человека поддерживает множество людей.\n\nВ общем, мне нужно тщательно оценить свои варианты..."
darkages_renown.05.desc4:0 "Важный крестьянский лидер моего собственного домена попросил аудиенции со мной, чтобы обсудить аспекты повседневной жизни, которые могли бы улучшить условия жизни моих крестьян.\nБолее того, он вовлекает всю мою династию в свой поиск, и мои действия будут истолкованы в этом свете.\n\nХотя этот человек имеет вид интригана и знания выше среднего, я нахожу просьбы и предложения, которые он делает, угрозой для моей казны, несмотря на позитивный оборот, который он использует и который можно из этого извлечь. В конце концов, лучше иметь счастливых крестьян, чем несчастных, и очевидно, что этого человека поддерживает множество людей.\n\nВ общем, мне нужно тщательно оценить свои варианты..."
darkages_renown.05.desc5:0 "Важный крестьянский лидер моего собственного домена попросил аудиенции со мной, чтобы обсудить аспекты повседневной жизни, которые могли бы улучшить условия жизни моих крестьян.\nБолее того, он вовлекает всю мою династию в свой поиск, и мои действия будут истолкованы в этом свете.\n\nХотя этот человек имеет религиозный вид и знания выше среднего, я нахожу просьбы и предложения, которые он делает, угрозой для моей казны, несмотря на позитивный оборот, который он использует и который можно из этого извлечь. В конце концов, лучше иметь счастливых крестьян, чем несчастных, и очевидно, что этого человека поддерживает множество людей.\n\nВ общем, мне нужно тщательно оценить свои варианты..."
darkages_renown.05.opta:0 "Заплатить за улучшение условий жизни"
darkages_renown.05.optb:0 "Отказаться платить"
darkages_renown.05.optc:0 "Вступить с человеком в дипломатический спор"
darkages_renown.05.optd:0 "Вступить с человеком в военный спор"
darkages_renown.05.opte:0 "Вступить с человеком в управленческий спор"
darkages_renown.05.optf:0 "Вступить с человеком в интриганский спор"
darkages_renown.05.optg:0 "Вступить с человеком в ученый спор"
darkages_renown.05.tt:0 "Сделав вклад в улучшение участи простых крестьян в вашем Домене, [Concept('dynasty_prestige', 'Признание')|E] вашей Династии улучшится, но ваш личный [Concept('prestige', 'Престиж')|E], так как вы политически уступаете простым крестьянам, пострадает\n"
darkages_renown.05.tt0:0 "Отказавшись платить, вы понесете тяжелые штрафы в своих графствах, но улучшите свой [Concept('prestige', 'Престиж')|E] среди равных\n"
darkages_renown.05.tt1:0 "Помимо проверки вашей высокой [Concept('diplomacy', 'Дипломатии')|E], другие факторы, положительно влияющие на исход этого спора, включают наличие Дипломатического образования, следование образу жизни Дипломатии и общительность. Отрицательно влияют на этот спор ваша низкая [Concept('diplomacy', 'Дипломатия')|E], наличие Военного образования, следование образу жизни Военного дела и застенчивость\n"
darkages_renown.05.tt2:0 "Помимо проверки вашего высокого [Concept('martial', 'Военного дела')|E], другие факторы, положительно влияющие на исход этого спора, включают наличие Военного образования, следование образу жизни Военного дела и отвагу. Отрицательно влияют на этот спор ваше низкое [Concept('martial', 'Военное дело')|E], наличие Дипломатического образования, следование образу жизни Дипломатии и трусость\n"
darkages_renown.05.tt3:0 "Помимо проверки вашего высокого [Concept('stewardship', 'Управления')|E], другие факторы, положительно влияющие на исход этого спора, включают наличие образования в сфере Управления, следование образу жизни Управления и жадность. Отрицательно влияют на этот спор ваше низкое [Concept('stewardship', 'Управление')|E], наличие образования в сфере Интриг, следование образу жизни Интриг и щедрость\n"
darkages_renown.05.tt4:0 "Помимо проверки вашей высокой [Concept('intrigue', 'Интриги')|E], другие факторы, положительно влияющие на исход этого спора, включают наличие образования в сфере Интриг, следование образу жизни Интриг и вероломство. Отрицательно влияют на этот спор ваша низкая [Concept('intrigue', 'Интрига')|E], наличие образования в сфере Управления, следование образу жизни Управления и честность\n"
darkages_renown.05.tt5:0 "Помимо проверки вашей высокой [Concept('learning', 'Учености')|E], другие факторы, положительно влияющие на исход этого спора, включают наличие образования в сфере Учености, следование образу жизни Учености и наличие свойств Усердный, Проницательный, Смекалистый, Интеллектуал или Гений. Отрицательно влияют на этот спор ваша низкая [Concept('learning', 'Ученость')|E] и наличие одного из свойств Начинающий гуляка, Известный гуляка или Легендарный гуляка\n"
darkages_renown.06.tt1:0 "Несмотря на ваше окончательное согласие на ваших условиях с лидером крестьян, ваш престиж пострадает, так как высшие эшелоны общества всегда смотрят свысока на переговоры с простолюдинами. С другой стороны, этот компромисс - лучшее, чего вы можете достичь, чтобы улучшить [Concept('dynasty_prestige', 'Признание')|E] вашей Династии\n"
darkages_renown.06.tt2:0 "Преподав урок риторики лидеру крестьян, а затем отказавшись от сделки, ваш [Concept('prestige', 'Престиж')|E] взлетит среди равных, даже если ценой серьезных проблем в вашем Домене, так как большинство крестьян будут крайне недовольны вашим окончательным решением\n"
darkages_renown.06.t:0 "Политический прорыв"
darkages_renown.06.desc:0 "Когда лидер крестьян начал спорить со мной, стало ясно, что моих аргументов и контраргументов достаточно, чтобы достичь компромисса, который может быть выгодным для моей казны, [Concept('dynasty_prestige', 'Признания')|E] моей Династии и умиротворения моего Домена.\n\nВ конце концов, я чувствую сочувствие к человеку передо мной, и теперь, когда вся политическая ситуация прояснилась, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] принять решение..."
darkages_renown.06.opta:0 "Заплатить ничтожную сумму за запрошенные улучшения"
darkages_renown.06.optb:0 "Отказаться платить"
darkages_renown.07.t:0 "Обойденный в переговорах"
darkages_renown.07.desc:0 "Использование моих знаний в предмете обсуждения было посредственным, и лидер крестьян перехитрил меня на каждом шагу.\nВ конце концов, чувствуя себя все более униженным, я понимаю, что с человеком передо мной невозможно договориться."
darkages_renown.07.opta:0 "Моих стараний было недостаточно..."
darkages_renown.07.tt1:0 "Вы терпите унизительное поражение по всей политической линии. Последствия ужасны как для того, как ваши равные смотрят на вас, так и для того, что ваши крестьяне чувствуют по поводу вашего отсутствия навыков ведения переговоров и помощи"
darkages_renown.08.tt1:0 "Выбрав эту опцию, вы произнесете речь на собрании различных Династий. Положительные результаты покажут ваш личный [Concept('prestige', 'Престиж')|E] и [Concept('dynasty_prestige', 'Признание')|E] Династии как образец для подражания, в то время как отрицательные результаты приведут к катастрофическим последствиям как для вашего Престижа, так и для Признания. Положительно влияют на ваши шансы высокая [Concept('diplomacy', 'Дипломатия')|E], высокая [Concept('learning', 'Ученость')|E], наличие свойств Проницательный, Терпеливый, Спокойный, Общительный и Заносчивый. Отрицательно влияют на ваш успех низкая [Concept('diplomacy', 'Дипломатия')|E], низкая [Concept('learning', 'Ученость')|E], наличие свойств Тупой, Нетерпеливый, Гневный, Застенчивый и Скромный\n"
darkages_renown.08.tt2:0 "Отказ от произнесения речи нанесет ущерб вашему Престижу и Признанию, даже если в меньшей степени, чем неудачная речь\n"
darkages_renown.08.tt3:0 "Эта опция доступна, потому что у вас есть как минимум 18 [Concept('intrigue', 'Интриги')|E] или вы Эксцентричны. Если у вас 21 или более Интриги, эта опция даст еще лучший результат, избегая любых штрафов. Не забывайте, однако, что успешная речь дарует очень важные бонусы к вашему Престижу и Признанию вашей Династии\n"
darkages_renown.08.tt4:0 "Эта опция доступна, потому что у вас есть как минимум 30 [Concept('dread', 'Ужаса')|E]. На встрече Династий вашего присутствия и дурной славы достаточно, чтобы внушить уважение всем участникам, поэтому вы получите нейтральный результат в плане Престижа и Признания, а также значительно увеличите свой Ужас\n"
darkages_renown.08.opta:0 "Произнести речь"
darkages_renown.08.optb:0 "Отказаться произносить речь"
darkages_renown.08.optc:0 "Творчески найти выход"
darkages_renown.08.optd:0 "Я внушу всем страх!"
darkages_renown.08.t:0 "Вопрос Признания"
darkages_renown.08.desc:0 "В течение нескольких месяцев Династии моего региона планируют грандиозную встречу, на которую, конечно же, [Select_CString(ROOT.Char.IsFemale, 'была приглашена и я', 'был приглашен и я')].\n\nВсе ожидают, что я выступлю на конференции с речью, объясняющей, как решать государственные вопросы, углубляясь в историю и подвиги моей Династии.\n\nОднако я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, стоит ли риск произнесения безвкусной речи этих хлопот, или мне просто подвести всех, придя, но промолчав..."
darkages_renown.09.t:0 "Успешная речь!"
darkages_renown.09.desc:0 "Когда пришла моя очередь произносить речь, я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] призвать все свои навыки, чтобы объяснить множество вопросов, всегда выставляя свою Династию в положительном свете.\n\nВсем присутствующим было очевидно, что я мудро [Select_CString(ROOT.Char.IsFemale, 'владела', 'владел')] словом, и я легко [Select_CString(ROOT.Char.IsFemale, 'увеличила', 'увеличил')] свой личный Престиж, а также Признание моей Династии..."
darkages_renown.09.opta:0 "Впечатляющий результат!"
darkages_renown.10.t:0 "Позорный провал..."
darkages_renown.10.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'встала', 'встал')] за кафедру, чтобы представить свою речь десяткам присутствующих сановников, я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал')] нервозность, неуверенность и неуместность.\n\nЗатем последовали одни из самых мучительных и неловких моментов в моей жизни, так как мой голос дрожал, мой текст оказался слабым, а моя подача скучного сообщения была, мягко говоря, отвратительной.\n\nВ конце концов, все в зале были, как минимум, не впечатлены, а, скорее всего, очень весело обсуждали, как я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] так унизить себя и имя своей Династии..."
darkages_renown.10.opta:0 "Жаль..."
darkages_renown.11.t:0 "Художественное предложение"
darkages_renown.11.desc:0 "Сегодня ко мне [Select_CString(ROOT.Char.IsFemale, 'явился', 'явился')] самопровозглашенный поэт, желающий написать большой сборник стихов, прославляющий подвиги моей Династии с течением времени.\n\nЭта работа, если она будет выполнена должным образом, значительно увеличит Признание моей Династии и вызовет зависть у всех остальных... по крайней мере, таково обещание [darkages_poet.GetGenitiveName]..."
darkages_renown.11.opta:0 "Заказать работу"
darkages_renown.11.optb:0 "Я не покровитель искусств"
darkages_renown.11.tt1:0 "Внимательно изучите [darkages_poet.GetAccusativeName], чтобы оценить [darkages_poet.GetHerHis] способность создать шедевр или, по крайней мере, хорошую работу. В нынешнем виде всегда есть риск, что ваша Династия станет посмешищем для всех. Чтобы увеличить шансы на успех, ищите высокий навык Учености и свойства Смекалистый, Интеллектуал, Гений и Поэт\n"
darkages_renown.12.t:0 "Литературный провал"
darkages_renown.12.desc:0 "К сожалению, [darkages_poet.GetName] [Select_CString(darkages_poet.IsFemale, 'оказалась лишенной', 'оказался лишенным')] вдохновения поэтом, создав мусор, который был высмеян всеми..."
darkages_renown.12.opta:0 "Пора дать [darkages_poet.GetHerHim] пинка под зад!"
darkages_renown.13.t:0 "Хорошее произведение письменного искусства"
darkages_renown.13.desc:0 "Спустя долгое время [darkages_poet.GetName] [Select_CString(darkages_poet.IsFemale, 'написала', 'написал')] хорошую подборку стихов, которая поспособствует Признанию моей Династии.\n\nОтличная работа!"
darkages_renown.13.opta:0 "Хорошо!"
darkages_renown.14.t:0 "Magnum Opus [darkages_poet.GetGenitiveName]"
darkages_renown.14.desc:0 "После долгого ожидания [darkages_poet.GetName] [Select_CString(darkages_poet.IsFemale, 'представила', 'представил')] сложную, запутанную и вдохновенную коллекцию стихов, которые значительно улучшают Признание моей Династии.\n\nБыл создан шедевр!"
darkages_renown.14.opta:0 "Отлично!"
darkages_opinion_wary:0 "Настороженность"
darkages_war.01.t:0 "Военное участие"
darkages_war.01.desc:0 "Вследствие текущего состояния войны, в которое втянуто мое Государство, я провожу много времени в окружении всевозможных военных персонажей, прежде всего моего Маршала.\n\nВ это время я могу, если захочу, познать тонкости военного планирования и, таким образом, получить реальную возможность повысить свой навык Военного дела.\n\nОстается вопрос: не принесет ли сосредоточение на этой области штрафов и в других областях..."
darkages_war.01.opta:0 "Давайте погрузимся в военный мир!"
darkages_war.01.optb:0 "Избегать слишком тесного общения с этими типами..."
darkages_war.01.tt1:0 "В зависимости от ваших свойств и удачи, опыт, который вы получаете от общения с военным миром в условиях войны, может заставить вас пострадать в других навыках. Чтобы избежать этого нежелательного исхода, ваши шансы повышаются, если вы Спокойный, Терпеливый, Усердный, Смекалистый, Интеллектуал, Гений, имеете Военное образование или ведете Военный образ жизни\n"
darkages_war.01.tt2:0 "Отказываясь систематически взаимодействовать с военными в это военное время, вы теряете Престиж из-за сдержанных, но сильных жалоб высших военных чинов вашего Государства\n"
darkages_war.02.t:0 "Слишком сфокусирован"
darkages_war.02.desc:0 "Погружаясь в военные дела вашего Государства, чтобы лучше планировать текущие военные действия, вы, к сожалению, теряете связь с вопросами Дипломатии и Интриг, которые в настоящее время находятся вне вашей орбиты внимания.\nК сожалению, эффекты постоянны..."
darkages_war.02.opta:0 "Нехорошо..."
darkages_war.03.t:0 "Слишком сфокусирован"
darkages_war.03.desc:0 "Погружаясь в военные дела вашего Государства, чтобы лучше планировать текущие военные действия, вы, к сожалению, теряете связь с вопросами Управления и Учености, которые в настоящее время находятся вне вашей орбиты внимания.\nК сожалению, эффекты постоянны..."
darkages_war.03.opta:0 "Нехорошо..."
darkages_war.04.t:0 "Слишком сфокусирован"
darkages_war.04.opta:0 "К сожалению..."
darkages_war.04.desc1:0 "Погружаясь в военные дела вашего Государства, чтобы лучше планировать текущие военные действия, вы, к сожалению, теряете связь с вопросами Дипломатии, которые в настоящее время находятся вне вашей орбиты внимания.\nК сожалению, эффекты постоянны..."
darkages_war.04.desc2:0 "Погружаясь в военные дела вашего Государства, чтобы лучше планировать текущие военные действия, вы, к сожалению, теряете связь с вопросами Управления, которые в настоящее время находятся вне вашей орбиты внимания.\nК сожалению, эффекты постоянны..."
darkages_war.04.desc3:0 "Погружаясь в военные дела вашего Государства, чтобы лучше планировать текущие военные действия, вы, к сожалению, теряете связь с вопросами Интриг, которые в настоящее время находятся вне вашей орбиты внимания.\nК сожалению, эффекты постоянны..."
darkages_war.04.desc4:0 "Погружаясь в военные дела вашего Государства, чтобы лучше планировать текущие военные действия, вы, к сожалению, теряете связь с вопросами Учености, которые в настоящее время находятся вне вашей орбиты внимания.\nК сожалению, эффекты постоянны..."
darkages_war.05.t:0 "Острый ум, сфокусированный актив"
darkages_war.05.desc:0 "Вникая в дела военных чинов вашего Государства, чтобы лучше планировать текущие военные действия, ваши здравые идеи, предложения и приказы признаются достойными, хорошими и разумными всеми, принося вам Престиж.\n\nБолее того, пока военная сторона правления занимает вас, вам удается не забывать обо всех других сторонах управления Государством, избегая, таким образом, слишком сильного акцента на военной стороне вашей личности в ущерб какой-либо другой области знаний."
darkages_war.05.opta:0 "Хорошо!"
darkages_war.06.t:0 "Выбор войны"
darkages_war.06.desc:0 "Так как мое Государство столкнулось с войной, меня все больше затягивает планирование всей операции, и я могу отменить любое другое мнение среди моих слуг, благодаря моему статусу, ценой Престижа среди моих вассалов.\n\nУверенность в том, что для моего знания военных дел будет лучше делать и проверять все по-своему, является обоюдоострым мечом..."
darkages_war.06.opta:0 "Делать все по-своему"
darkages_war.06.optb:0 "Выслушать всех"
darkages_indepth_leadership:0 "Глубокое лидерство"
darkages_indepth_leadership_desc:0 "Общаясь и изучая тактику вместе с простыми солдатами, сержантами и ополченцами, этот персонаж получает значительные знания о том, как армии сражаться лучше"
darkages_war.07.t:0 "Учения простых солдат"
darkages_war.07.desc:0 "В этот темный период войны мне стало очевидно, что можно многое получить, общаясь с простыми солдатами, сержантами и ополченцами, обсуждая с ними тактику, проверяя, с кем они лучше взаимодействуют на поле боя, их конкретные возможности и недостатки.\n\nКонечно, общение, обсуждение идей и, что еще хуже, поиск совета у простого солдата повлияет на мой Престиж, что загоняет меня в тупик, так как, с другой стороны, упущение этой возможности вызовет у меня стресс..."
darkages_war.07.opta:0 "Я пойду к своим людям"
darkages_war.07.optb:0 "Я буду избегать общения с простыми солдатами"
darkages_war.07.tt1:0 "Если вы не Заносчивы, вы получите стресс. Если вы Скромны, вы получите еще больше стресса\n"
darkages_defender_advantage:0 "Оборонительные маневры"
darkages_defender_advantage_desc:0 "Этот персонаж усовершенствовал искусство обороны с текущим составом армии"
darkages_attacker_advantage:0 "Наступательные маневры"
darkages_attacker_advantage_desc:0 "Этот персонаж усовершенствовал искусство наступления с текущим составом армии"
darkages_war.08.t:0 "Вопрос стратегии"
darkages_war.08.desc:0 "Поскольку Государство находится в состоянии войны, становится очевидным, что должен быть способ специализировать наши войска либо в обороне, либо в наступлении.\n\nКак верховный главнокомандующий своей армией, я тот, кто получит знания от такой подготовки.\n\nОднако у этого есть недостаток. Пока я совершенствую искусство наступления или обороны со своими войсками, я не трачу время на развитие своего пути Образа жизни, теряя при этом важный прогресс.\n\nУчитывая эту ситуацию, мне нужно рассмотреть несколько путей..."
darkages_war.08.opta:0 "Я буду тренировать оборонительные операции"
darkages_war.08.optb:0 "Я буду тренировать наступательные операции"
darkages_war.08.optc:0 "Я не буду тратить время на мелочи"
darkages_war.09.t:0 "Выбор войны"
darkages_war.09.desc:0 "Поскольку Государство проходит через состояние войны, я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с выбором: приказать своим войскам действовать агрессивно и безжалостно против моих врагов и вражеского населения, так как это позволит мне немного узнать о Военном Образе жизни, или я могу пойти противоположным путем, подчеркивая обязанность моих войск действовать снисходительно к побежденным врагам и вражеским простолюдинам.\n\nВыбор за мной..."
darkages_war.09.opta:0 "Действовать агрессивно по отношению к нашим врагам"
darkages_war.09.optb:0 "Действовать благочестиво по отношению к нашим врагам"
darkages_relation_brings_death.02.t:0 "Дружеское предупреждение"
darkages_relation_brings_death.02.desc:0 "Будучи [Select_CString(ROOT.Char.IsFemale, 'призванной', 'призванным')] моим [spymaster.GetCouncilTitle|d], [spymaster.GetName] [Select_CString(spymaster.IsFemale, 'рассказала', 'рассказал')] мне об одной из своих тревог относительно [potential_murder.GetName].\n\nТщательный анализ этого моего вассала выявил личность, которая из-за своего плохого мнения обо мне может подвергнуть мою жизнь риску.\n\nКак обстоят дела, [spymaster.GetName] советует мне, что разумно улучшить мнение [potential_murder.GetName] обо мне или использовать другие... нетрадиционные средства, чтобы избавиться от [potential_murder.GetHerHim], дабы повысить мою будущую безопасность.\n\nЗная, что угроза всего лишь теоретическая, [spymaster.GetCouncilTitle]s назначаются, чтобы видеть и готовиться к опасностям на каждом углу, но моя жизнь, возможно, на кону, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что я буду делать..."
darkages_relation_brings_death.02.opta:0 "Большое спасибо за предупреждение!"
darkages_rivals_bring_death.02.t:0 "Зловещее предупреждение"
darkages_rivals_bring_death.02.desc:0 "На встрече с моим [spymaster.GetCouncilTitle|d], [spymaster.GetName] [Select_CString(spymaster.IsFemale, 'рассказала', 'рассказал')] мне об одной из [spymaster.GetHerHis] тревог относительно моей личной безопасности.\n\nТак как я [Select_CString(ROOT.Char.IsFemale, 'нажила', 'нажил')] соперников или заклятых врагов, есть риск, что эти люди могут спланировать убийство меня, не только через схему интриг, но и путем прямого покушения на мою жизнь.\n\nПри нынешнем положении дел [spymaster.GetName] советует мне, что было бы разумно... избавиться от моих соперников и заклятых врагов, чтобы повысить мою будущую безопасность.\n\nЗная, что угроза всего лишь теоретическая, [spymaster.GetCouncilTitle] назначаются, чтобы видеть и готовиться к опасностям на каждом углу, но моя жизнь, возможно, на кону, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что я буду делать..."
darkages_rivals_bring_death.02.opta:0 "Спасибо за предупреждение!"
darkages_event_troop_name_1:0 "Бешеные псы"
darkages_war.10.t:0 "Скрести по сусекам"
darkages_war.10.desc:0 "Одна мысль не дает мне покоя в эти военные времена, которые переживает Государство.\n\nПри нынешнем положении дел я [Select_CString(ROOT.Char.IsFemale, 'могла бы попытаться', 'мог бы попытаться')] сформировать новый контингент ополченцев, увеличив диапазон нормального призывного возраста и добавив к ним обычных преступников, которым я предоставляю помилование, чтобы улучшить количество войск, доступных для моих армий.\n\nЭти радикальные меры обходятся значительной ценой в Престиже и Благочестии, так как они могут быть изображены как отчаянные и безжалостные меры, но возможность заманчива..."
darkages_war.10.opta:0 "Продлить призыв"
darkages_war.10.optb:0 "Я не пойду по этому пути!"
darkages_increase_county_patrols_decision:0 "Увеличить патрули в графстве"
darkages_increase_county_patrols_decision_confirm:0 "Заплатить за патрули"
increase_county_patrols_decision_desc:0 "В нынешней ситуации, когда так много графств вашего Домена имеют такой низкий контроль, может быть разумно увеличить конные патрули по всему вашему Домену, чтобы быстрее восстановиться после опасной ситуации.\nПомните, графства с низким контролем могут представлять опасность для жизни, если вы будете путешествовать по ним!"
increase_county_patrols_decision_tooltip:0 "Восстановить Контроль в ваших графствах"
increase_county_patrols_decision_tt:0 "Значительно увеличив конные патрули в вашем Домене, Контроль в ваших графствах будет расти намного быстрее\n"
darkages_opinion_county_improve_control:0 "Конные патрули"
darkages_opinion_county_improve_control_desc:0 "Безопасность этого графства повысилась благодаря дополнительному количеству конных патрулей"
darkages_guardian_changes_culture_religion.01.t:0 "Новые пути и ценности"
darkages_guardian_changes_culture_religion.01.desc:0 "Проводя время со своим опекуном [darkages_guardian.GetName], я постепенно перенимаю все больше и больше аспектов [darkages_guardian.GetHerHis] путей и ценностей.\n\nПосле определенного момента становится ясно, что я [Select_CString(ROOT.Char.IsFemale, 'сменила', 'сменил')] свою культуру, чтобы соответствовать [darkages_guardian.GetName]..."
darkages_guardian_changes_culture_religion.01.opta:0 "Что есть, то есть..."
darkages_guardian_changes_culture_religion.02.t:0 "Новые пути и ценности"
darkages_guardian_changes_culture_religion.02.desc:0 "Проведя так много времени со своим опекуном, [darkages_guardian.GetName], становится ясно, что мой ребенок [darkages_ward.GetName] [Select_CString(darkages_ward.IsFemale, 'переняла', 'перенял')] культуру [darkages_guardian.GetGenitiveName]..."
darkages_guardian_changes_culture_religion.02.opta:0 "Тем не менее, риск того стоит..."
darkages_guardian_changes_culture_religion.03.t:0 "Новая Вера"
darkages_guardian_changes_culture_religion.03.desc:0 "Проводя время со своим опекуном [darkages_guardian.GetName], я постепенно перенимаю все больше и больше аспектов [darkages_guardian.GetHerHis] веры.\n\nПосле определенного момента становится ясно, что я [Select_CString(ROOT.Char.IsFemale, 'сменила', 'сменил')] свою веру, чтобы соответствовать вере [darkages_guardian.GetName]."
darkages_guardian_changes_culture_religion.03.opta:0 "Что есть, то есть..."
darkages_guardian_changes_culture_religion.04.t:0 "Смена Веры"
darkages_guardian_changes_culture_religion.04.desc:0 "Проведя так много времени со своим опекуном, [darkages_guardian.GetName], становится ясно, что мой ребенок [darkages_ward.GetName] [Select_CString(darkages_ward.IsFemale, 'переняла', 'перенял')] веру [darkages_guardian.GetGenitiveName]..."
darkages_guardian_changes_culture_religion.04.opta:0 "Тем не менее, риск того стоит..."
