rule_darkages_genetics:0 "#B #Bold Dark Ages#!:#! Отложенная генетика"
setting_darkages_rule_genetics_yes:0 "Вкл"
setting_darkages_rule_genetics_yes_desc:0 "Генетические свойства будут появляться в детстве. Никакого влияния на частоту."
setting_darkages_rule_genetics_no:0 "Откл"
setting_darkages_rule_genetics_no_desc:0 "Генетические свойства будут появляться сразу после рождения. Как в оригинальной CK3."
darkages_minor_nobles.10.t:0 "Неожиданное благо"
darkages_minor_nobles.10.desc1:0 "С радостью я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName] проявляет значительную инициативу, чтобы увеличить мое [Concept( 'piety', 'Благочестие' )|E], тратя собственные ресурсы для укрепления моего положения.\n\nКонечно же, похвальное отношение!"
darkages_minor_nobles.10.desc2:0 "С радостью я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName] проявляет значительную инициативу, чтобы увеличить мой [Concept( 'prestige', 'Престиж' )|E], тратя собственные ресурсы для укрепления моего положения.\n\nКонечно же, похвальное отношение!"
darkages_minor_nobles.10.opta:0 "Да благословит Господь: [darkages_minor_noble.GetCouncilTitle]!"
darkages_minor_nobles.10.optb:0 "Достойное поведение со стороны [darkages_minor_noble.GetFirstName]!"
darkages_minor_nobles.10.tt1:0 "Это происходит потому, что [darkages_minor_noble.GetFirstName] имеет мнение о вашем персонаже не менее -9. Если мнение отрицательное, шанс получить это благоприятное событие снижается. Ваш мелкий вассал тратит золото для выполнения этого действия и имеет право делать это только в том случае, если [darkages_minor_noble.GetSheHe] обладает весьма значительным состоянием"
darkages_minor_nobles.11.desc:0 "С радостью я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName] проявляет значительную инициативу, чтобы увеличить мою [legitimacy|E], тратя собственные ресурсы для укрепления моей политической позиции.\n\nКонечно же, похвальное отношение!"
darkages_minor_nobles.12.desc:0 "С радостью я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName] проявляет значительную инициативу, чтобы пополнить мою казну, тратя собственные ресурсы для укрепления моего финансового положения.\n\nКонечно же, похвальное отношение!"
darkages_minor_nobles.13.desc:0 "С радостью я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName] проявляет значительную инициативу в дипломатии внутри моей Державы, тратя собственные ресурсы для укрепления моего дипломатического положения среди моих Вассалов.\n\nПо правде говоря, [darkages_minor_noble.GetFirstName] [Select_CString(darkages_minor_noble.IsFemale, 'сумела', 'сумел' )] сделать так, чтобы все мои Вассалы были Впечатлены мной.\n\nОчень похвальное усилие с [Select_CString(darkages_minor_noble.IsFemale, 'её', 'его' )] стороны!"
darkages_minor_nobles.14.t:0 "Неожиданная помеха"
darkages_minor_nobles.14.desc1:0 "С тревогой я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName], мой [darkages_minor_noble.GetCouncilTitle], плетет интриги, чтобы уменьшить мое [Concept( 'piety', 'Благочестие' )|E], тратя собственные ресурсы, чтобы подорвать мое положение.\n\nДела идут не по плану..."
darkages_minor_nobles.14.desc2:0 "С тревогой я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName] плетет интриги, чтобы уменьшить мой [Concept( 'prestige', 'Престиж' )|E], тратя собственные ресурсы, чтобы подорвать мое положение.\n\nДела идут не по плану..."
darkages_minor_nobles.14.opta:0 "Пусть Бог покарает: [darkages_minor_noble.GetCouncilTitle]!"
darkages_minor_nobles.14.optb:0 "Презренное поведение со стороны [darkages_minor_noble.GetFirstName]!"
darkages_minor_nobles.14.tt1:0 "Это происходит потому, что [darkages_minor_noble.GetFirstName] имеет мнение о вашем персонаже не более 9. Если мнение положительное, шанс получить это плохое событие снижается. Ваш мелкий вассал тратит золото для выполнения этого действия и имеет право делать это только в том случае, если [darkages_minor_noble.GetSheHe] обладает весьма значительным состоянием"
darkages_minor_nobles.15.desc:0 "С тревогой я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName] плетет интриги, чтобы уменьшить мою [legitimacy|E], тратя собственные ресурсы, чтобы подорвать мою политическую позицию.\n\nДела идут не по плану..."
darkages_minor_nobles.16.desc:0 "С тревогой я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName] порочит меня в моем Домене, тратя собственные ресурсы, чтобы снизить мой [Concept( 'control', 'Контроль' )|E] в моих землях.\n\nДела идут не по плану..."
darkages_minor_nobles.17.desc:0 "С тревогой я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_minor_noble.GetName] влияет на моих Вассалов, тратя собственные ресурсы, чтобы снизить их Мнение обо мне.\n\nДела идут не по плану..."
darkages_minor_nobles.18.desc:0 "С радостью я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_padreco.GetName] проявляет значительную инициативу, чтобы увеличить мое [Concept( 'piety', 'Благочестие' )|E], тратя собственные ресурсы для укрепления моего положения.\n\nКонечно же, похвальное отношение!"
darkages_minor_nobles.18.tt1:0 "Это событие может произойти, потому что ваш [darkages_padreco.GetCouncilTitle] имеет весьма внушительное состояние и мнение о вашем персонаже не менее 10"
darkages_minor_nobles.18.opta:0 "Да благословит Господь: [darkages_padreco.GetCouncilTitle]!"
darkages_minor_nobles.19.desc:0 "С тревогой я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [darkages_padreco.GetName] плетет интриги, чтобы уменьшить мое [Concept( 'piety', 'Благочестие' )|E], тратя собственные ресурсы, чтобы подорвать мое положение.\n\nДела идут не по плану..."
darkages_minor_nobles.19.tt1:0 "Это событие может произойти, потому что ваш [darkages_padreco.GetCouncilTitle] имеет весьма внушительное состояние и мнение о вашем персонаже не более -10"
darkages_minor_nobles.19.opta:0 "Пусть Бог покарает: [darkages_padreco.GetCouncilTitle]!"
