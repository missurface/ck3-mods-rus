darkages_dread.02.t:0 "Ссора в Совете"
darkages_dread.02.desc1:0 "Сегодня в Совете произошла крупная ссора, когда [darkages_dread_councillor.GetName] резко [Select_CString(darkages_dread_councillor.IsFemale, 'оспорила', 'оспорил')] мои взгляды и [Select_CString(darkages_dread_councillor.IsFemale, 'поставила', 'поставил')] мой авторитет под угрозу.\n\nПока [darkages_dread_councillor.GetCouncilTitle] [Select_CString(darkages_dread_councillor.IsFemale, 'в пух и прах разбивала', 'в пух и прах разбивал')] мои аргументы перед всеми, я [Select_CString(ROOT.Char.IsFemale, 'холодно думала', 'холодно думал')], как мне решить этот вопрос.\n\nСреди советников настроение было нейтральным."
darkages_dread.02.desc2:0 "Сегодня в Совете произошла крупная ссора, когда [darkages_dread_councillor.GetName] резко [Select_CString(darkages_dread_councillor.IsFemale, 'оспорила', 'оспорил')] мои взгляды и [Select_CString(darkages_dread_councillor.IsFemale, 'поставила', 'поставил')] мой авторитет под угрозу.\n\nПока [darkages_dread_councillor.GetCouncilTitle] [Select_CString(darkages_dread_councillor.IsFemale, 'в пух и прах разбивала', 'в пух и прах разбивал')] мои аргументы перед всеми, я [Select_CString(ROOT.Char.IsFemale, 'холодно думала', 'холодно думал')], как мне решить этот вопрос.\n\nСреди советников настроение было несколько против меня."
darkages_dread.02.desc3:0 "Сегодня в Совете произошла крупная ссора, когда [darkages_dread_councillor.GetName] резко [Select_CString(darkages_dread_councillor.IsFemale, 'оспорила', 'оспорил')] мои взгляды и [Select_CString(darkages_dread_councillor.IsFemale, 'поставила', 'поставил')] мой авторитет под угрозу.\n\nПока [darkages_dread_councillor.GetCouncilTitle] [Select_CString(darkages_dread_councillor.IsFemale, 'в пух и прах разбивала', 'в пух и прах разбивал')] мои аргументы перед всеми, я [Select_CString(ROOT.Char.IsFemale, 'холодно думала', 'холодно думал')], как мне решить этот вопрос.\n\nСреди советников настроение было явно против меня."
darkages_dread.02.desc4:0 "Сегодня в Совете произошла крупная ссора, когда [darkages_dread_councillor.GetName] резко [Select_CString(darkages_dread_councillor.IsFemale, 'оспорила', 'оспорил')] мои взгляды и [Select_CString(darkages_dread_councillor.IsFemale, 'поставила', 'поставил')] мой авторитет под угрозу.\n\nПока [darkages_dread_councillor.GetCouncilTitle] [Select_CString(darkages_dread_councillor.IsFemale, 'в пух и прах разбивала', 'в пух и прах разбивал')] мои аргументы перед всеми, я [Select_CString(ROOT.Char.IsFemale, 'холодно думала', 'холодно думал')], как мне решить этот вопрос.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'пользовалась', 'пользовался')] поддержкой большинства Советников."
darkages_dread.02.desc5:0 "Сегодня в Совете произошла крупная ссора, когда [darkages_dread_councillor.GetName] резко [Select_CString(darkages_dread_councillor.IsFemale, 'оспорила', 'оспорил')] мои взгляды и [Select_CString(darkages_dread_councillor.IsFemale, 'поставила', 'поставил')] мой авторитет под угрозу.\n\nПока [darkages_dread_councillor.GetCouncilTitle] [Select_CString(darkages_dread_councillor.IsFemale, 'в пух и прах разбивала', 'в пух и прах разбивал')] мои аргументы перед всеми, я [Select_CString(ROOT.Char.IsFemale, 'холодно думала', 'холодно думал')], как мне решить этот вопрос.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'пользовалась', 'пользовался')] безоговорочной поддержкой большинства Советников."
