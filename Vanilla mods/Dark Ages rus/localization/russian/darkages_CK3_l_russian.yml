darkages_dread.01.t:0 "Рынки и ярмарки"
darkages_dread.01.desc1:0 "За последние годы стандарты безопасности на рынках моего Домена резко упали, и, наконец, это положение дел вызывает проблемы с Контролем в моих Графствах.\n\nХотя поднимались вопросы об управлении собственностью и значительном пространстве для бесчисленных местных ярмарок и рынков, продавцы и покупатели в последнее время стали беспокойными, и сообщается о все большем количестве столкновений с местными властями.\n\nУчитывая, что политическая обстановка благоприятствует дипломатическому решению, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я буду действовать, чтобы справиться с этой проблемой."
darkages_dread.01.desc2:0 "За последние годы стандарты безопасности на рынках моего Домена резко упали, и, наконец, это положение дел вызывает проблемы с Контролем в моих Графствах.\n\nХотя поднимались вопросы об управлении собственностью и значительном пространстве для бесчисленных местных ярмарок и рынков, продавцы и покупатели в последнее время стали беспокойными, и сообщается о все большем количестве столкновений с местными властями.\n\nУчитывая, что политическая обстановка благоприятствует смелому, дерзкому подходу к регулированию и инвестированию в инфраструктуру, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я буду действовать, чтобы справиться с этой проблемой."
darkages_dread.01.desc3:0 "За последние годы стандарты безопасности на рынках моего Домена резко упали, и, наконец, это положение дел вызывает проблемы с Контролем в моих Графствах.\n\nХотя поднимались вопросы об управлении собственностью и значительном пространстве для бесчисленных местных ярмарок и рынков, продавцы и покупатели в последнее время стали беспокойными, и сообщается о все большем количестве столкновений с местными властями.\n\nУчитывая, что политическая обстановка благоприятствует жестким мерам, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я буду действовать, чтобы справиться с этой проблемой."
darkages_dread.01.desc4:0 "За последние годы стандарты безопасности на рынках моего Домена резко упали, и, наконец, это положение дел вызывает проблемы с Контролем в моих Графствах.\n\nХотя поднимались вопросы об управлении собственностью и значительном пространстве для бесчисленных местных ярмарок и рынков, продавцы и покупатели в последнее время стали беспокойными, и сообщается о все большем количестве столкновений с местными властями.\n\nУчитывая, что политическая обстановка не благоприятствует особо никакому конкретному подходу, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я буду действовать, чтобы справиться с этой проблемой."
