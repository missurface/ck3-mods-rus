darkages_sanction_piracy:0 "Пиратская операция"
darkages_sanction_piracy_desc:0 "Этот персонаж финансирует пиратскую операцию, нападающую на торговые суда в морях."
darkages_finance_pirates_decision:0 "Финансировать пиратскую операцию"
darkages_finance_pirates_decision_tooltip:0 "Финансировать пиратство"
darkages_finance_pirates_decision_desc:0 "Вы можете профинансировать пиратскую операцию, наняв подходящих капитанов из числа своих людей и собрав пиратский флот, который вы будете спонсировать и направлять. Это означает, что в основном ваш Военный навык, но также и Интрига в планировании охотничьих угодий будут влиять на добычу, которую вы можете захватить, принося доход через случайные промежутки времени. В конце концов, это рискованный бизнес, который может принести вам огромные суммы богатства, но также может быть уничтожен, когда вы меньше всего этого ожидаете. Вы не можете отменить это решение в течение следующих 3 лет"
darkages_finance_pirates_decision_confirm:0 "Финансировать!"
darkages_finance_pirates_decision_tt1:0 "Вы получите Стресс, если вы не Черствый, не Садист, не Мстительный и не Произольный. Ваши Вассалы, Придворные или Гости, которые являются взрослыми и Честными, Справедливыми или Сострадательными, будут разгневаны вашим финансированием пиратов. Наконец, вы также получите новый модификатор, который сигнализирует о немедленных последствиях финансирования пиратства.\n"
darkages_stop_finance_pirates_decision:0 "Прекратить финансирование пиратства"
darkages_stop_finance_pirates_decision_desc:0 "Вы можете прекратить финансирование пиратства в любое время. Вы даже вернете часть своих инвестиций, продав несколько потрепанные корабли."
darkages_stop_finance_pirates_decision_tooltip:0 "Остановить пиратство"
darkages_stop_finance_pirates_decision_confirm:0 "Прекратить!"
DEBUG_I_HAVE_MORE_GOLD_TRIGGER:0 "Вам не хватает золота"
darkages_piracy.01.t:0 "Конец пиратства"
darkages_piracy.01.desc:0 "Поскольку я недавно [Select_CString(ROOT.Char.IsFemale, 'потеряла', 'потерял')] свой последний Порт, у меня нет средств контролировать мои корабли, совершающие набеги на морские пути.\nЭто означает конец моей карьеры Пиратского Лорда..."
darkages_piracy.01.opta:0 "Было хорошо, пока это продолжалось!"
darkages_piracy.02.t:0 "Ветры грабежа"
darkages_piracy.02.desc1:0 "Я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], что в последнее время добыча, которую можно захватить и ограбить моим пиратским флотом, попадается редко.\n\nПохоже, что морские пути, которые мы патрулируем, почти пусты от торговцев, на которых может нацелиться мой пиратский флот.\n\nТакже есть вероятность, что я не совсем оптимально планирую пиратские маршруты..."
darkages_piracy.02.desc2:0 "Я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], что в последнее время, за некоторыми заметными исключениями, добыча, которую можно захватить и ограбить моим пиратским флотом, попадается не слишком часто.\n\nХотя ситуация могла бы быть хуже, похоже, что морские пути, которые мы патрулируем, почти пусты от торговцев, на которых может нацелиться мой пиратский флот.\n\nТакже есть вероятность, что я не совсем оптимально планирую пиратские маршруты..."
darkages_piracy.02.desc3:0 "Я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], что в последнее время мой пиратский флот продолжает возвращаться с трюмами, полными хорошего количества ценностей.\nПризы также захватываются с некоторой регулярностью, что является приятным бонусом.\n\nВ общем, хорошо быть Пиратским Лордом в это время!"
darkages_piracy.02.desc4:0 "Я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], что в последнее время мой пиратский флот продолжает возвращаться с трюмами, полными очень хорошего количества ценностей.\n\nПризы также захватываются регулярно, к радости всех.\n\nВ общем, отличный результат!"
darkages_piracy.02.desc5:0 "Я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], что в последнее время морские пути кишат торговыми судами, и мой пиратский флот пользуется этой золотой возможностью, чтобы наполнить свои трюмы!\n\nПризы продолжают прибывать в мою гавань к восторгу всех!\n\nМой успех настолько велик, что моя дурная слава продолжает распространяться в виде возросшего Ужаса!"
darkages_piracy.02.opta:0 "Давайте посчитаем добычу!"
darkages_piracy.03.t:0 "Особый приз"
darkages_piracy.03.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] сегодня известие, что мой пиратский флот захватил приз, полностью нагруженный товарами и даже с некоторыми сокровищами в трюме.\n\nБезусловно, это дает очень желанную дополнительную ценность в золоте, даже после раздела прибыли с моими командами!"
darkages_piracy.03.opta:0 "Очень хорошо!"
darkages_piracy.04.t:0 "Богатый приз"
darkages_piracy.04.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] сегодня известие, что мой пиратский флот захватил приз, полностью нагруженный золотом и серебром в трюме!\n\nЯ отправлюсь в порт, чтобы лично осмотреть корабль, поздравить своих людей и разделить добычу. Безусловно, это был важный момент в моей жизни как Пиратского Лорда!"
darkages_piracy.04.opta:0 "Отлично!"
darkages_piracy.05.t:0 "Моральная дилемма"
darkages_piracy.05.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] сегодня отчеты о том, что один из моих пиратских кораблей захватил приз, полный [ROOT.Char.GetFaith.GetAdjective] паломников, моей собственной веры.\n\nКапитан пиратского корабля намерен продать всех в рабство, но я знаю, что будут последствия, если я разрешу такое подлое поведение..."
darkages_piracy.05.opta:0 "Продать всех в рабство!"
darkages_piracy.05.optb:0 "Освободить пассажиров"
darkages_piracy.05.tt1:0 "Помимо удара по Благочестию и повышения Ужаса, вы вызовете крайнее недовольство у вашего главы конфессии (если он есть), у вашего религиозного советника, у ваших взрослых, Рьяных вассалов и у ваших взрослых, Рьяных придворных и гостей. Если вы Рьяный, вы испытаете сильное увеличение Стресса\n"
darkages_piracy.06.tt1:0 "Успех этой опции зависит, к лучшему или худшему, от вашей Дипломатии и вашего Военного дела. Положительно влияет наличие свойства Гуляка - чем выше ранг, тем лучше - наличие свойств Храбрый, Проницательный и Общительный. Отрицательно влияет наличие свойств Трусливый, Застенчивый и Тупой\n"
darkages_piracy.06.tt2:0 "Несколько ваших пиратских капитанов покидают вашу службу, и масштаб вашей пиратской операции, вероятно, пострадает\n"
darkages_piracy.06.t:0 "Намеки на мятеж"
darkages_piracy.06.desc:0 "Несколько моих пиратских капитанов начинают беспокоиться о том, что они считают справедливой долей добычи, которую они захватывают, патрулируя моря. Они предъявляют мне свои требования и ждут моего ответа..."
darkages_piracy.06.opta:0 "Выплатить всем капитанам бонус"
darkages_piracy.06.optb:0 "Попытаться отговорить капитанов от их требований"
darkages_piracy.06.optc:0 "Отказываюсь уступать их требованиям"
darkages_piracy.07.t:0 "Убедительная дискуссия"
darkages_piracy.07.desc:0 "После разговора с моими пиратскими капитанами об их доле добычи стало очевидно, что я [Select_CString(ROOT.Char.IsFemale, 'была права', 'был прав')], и их требования были отложены после того, как их убедили вернуться в моря..."
darkages_piracy.07.opta:0 "Очень хорошее представление!"
darkages_piracy.08.t:0 "Неудачная дискуссия"
darkages_piracy.08.desc:0 "После разговора с моими пиратскими капитанами об их доле добычи стало очевидно, что они не собираются отказываться от своих требований.\n\nВ отчаянии я немедленно [Select_CString(ROOT.Char.IsFemale, 'предложила', 'предложил')] им немного золота, чтобы успокоить их нрав, но безрезультатно.\n\nОни хотели большего, намного большего, и, учитывая обстоятельства, они покинули мою службу, в результате чего масштаб моей пиратской операции сократился..."
darkages_piracy.08.opta:0 "Псы..."
darkages_piracy.08.tt1:0 "Масштаб вашей пиратской операции, вероятно, пострадает\n"
darkages_rival_piracy:0 "Был целью пиратской операции"
darkages_piracy.10.t:0 "Особая миссия"
darkages_piracy.10.desc:0 "Мои шпионы сообщили мне, что воды и порты, контролируемые [piracy_victim.GetName], кишат добычей для грабежа!\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, стоит ли нацеливаться на этого конкретного правителя, обрушив весь мой пиратский флот на [piracy_victim.GetHerHis] воды и порты..."
darkages_piracy.10.opta:0 "Приказать своему пиратскому флоту совершить набег на [piracy_victim.GetHerHis] побережье!"
darkages_piracy.10.optb:0 "Лучше избегать появления заклятых врагов..."
darkages_piracy.09.t:0 "Неудачи пиратства"
darkages_piracy.09.desc:0 "В предыдущие месяцы наблюдался сильный рост патрулей по борьбе с пиратством, и мой флот понес тяжелые потери. Если я хочу продолжать пиратскую операцию, мне нужно построить больше кораблей, чтобы восполнить потери..."
darkages_piracy.09.opta:0 "Построить их!"
darkages_piracy.09.optb:0 "Завершить пиратскую операцию"
darkages_raided:0 "Ограблен пиратами"
darkages_piracy.11.t:0 "Ограблены пиратами!"
darkages_piracy.11.desc:0 "Пираты, финансируемые [pirate.GetName], грабят наши порты, наши суда и наши побережья.\nНападения влекут за собой значительную потерю доходов от налогообложения во всем моем домене.\n\nЭти гнусные действия не должны остаться без ответа!"
darkages_piracy.11.opta:0 "Презренный [pirate.GetName] уже является моим Соперником!"
darkages_piracy.12.t:0 "Навыки Пиратского Лорда"
darkages_piracy.12.desc1:0 "Все время, которое я провожу, планируя, разрабатывая стратегию и новые тактики, обсуждая с моими пиратскими капитанами, что лучше, способствует развитию моих военных навыков. С радостью я чувствую улучшение в этой области."
darkages_piracy.12.desc2:0 "Все уловки, необходимые для того, чтобы угадать, где нанесут удар мои пиратские капитаны, отчеты, которые я читаю от своих шпионов, размещенных далеко, и хитрость, необходимая для планирования пиратских операций, оказывают положительное влияние на мои навыки Интриги. С радостью я чувствую улучшение в этой области."
darkages_piracy.12.opta:0 "Отлично!"
darkages_piracy.13.t:0 "Цена, которую нужно заплатить"
darkages_piracy.13.desc1:0 "Все дела, связанные с пиратством, и общение с командами моих кораблей нанесли удар по моему знанию мира в целом. К сожалению, приходится платить цену, когда я хочу быть Пиратским Лордом..."
darkages_piracy.13.desc2:0 "Все темные дела, связанные с пиратством, и гнусные поступки, которые совершают мои флоты, наносят значительный удар по моим дипломатическим навыкам. К сожалению, приходится платить цену, когда я хочу быть Пиратским Лордом..."
darkages_piracy.13.opta:0 "Черт!"
darkages_piracy.14.t:0 "Контрабандная операция"
darkages_piracy.14.desc:0 "Ко мне [Select_CString(ROOT.Char.IsFemale, 'обратилась', 'обратился')] группа подозрительных личностей, предлагающих мне небольшое состояние, которое всегда будет не менее 50 золотых.\n\nЧтобы получить золото, мне нужно одолжить им один из моих пиратских кораблей для контрабанды различных товаров в земли [smuggler_victim.GetName].\n\nС операцией связаны риски, и мне нужно сделать выбор..."
darkages_piracy.14.opta:0 "Одолжить пиратский корабль и его команду контрабандистам"
darkages_piracy.14.optb:0 "Закрыть перед ними дверь"
darkages_piracy.14.tt1:0 "Успех этой опции зависит, к лучшему или худшему, от вашей Интриги и вашего Военного дела. Положительно влияет наличие свойств Лживый, Интриган, Проницательный, Черствый и Произвольный. Отрицательно влияет наличие свойств Нетерпеливый, Гневный и Тупой\n"
darkages_piracy.15.t:0 "Успешная контрабанда!"
darkages_piracy.15.desc:0 "Мой пиратский корабль остался незамеченным в своей миссии по контрабанде различных товаров в земли [smuggler_victim.GetName].\n\nПредприятие увенчалось успехом, и теперь пришло время пожинать плоды!"
darkages_piracy.15.opta:0 "Хорошее количество золота..."
darkages_piracy.16.t:0 "Корабль захвачен!"
darkages_piracy.16.desc:0 "Во время выполнения специальной контрабандной миссии в водах [smuggler_victim.GetName] мой пиратский корабль был обнаружен, взят на абордаж и захвачен. Учитывая особые гарантии, которые я [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал')] всем участникам, теперь мне нужно выплатить выкуп за всех, а также вернуть корабль в мой флот..."
darkages_piracy.16.opta:0 "Плохое решение..."
darkages_piracy.17.t:0 "Контрабандисты пойманы!"
darkages_piracy.17.desc:0 "Меня разбудили рано утром новостью о том, что в моих землях была поймана банда крупных контрабандистов.\n\nНегодяи были в сговоре не с кем иным, как с [smuggler.GetName], [Select_CString(smuggler.IsFemale, 'которая предоставила', 'который предоставил')] корабль из своего пиратского флота. Теперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что мне делать..."
darkages_piracy.17.opta:0 "Использовать добычу для финансирования возмездия!"
darkages_piracy.17.optb:0 "Просто продать добычу..."
darkages_piracy.17.tt1:0 "Вы используете добычу, которую удалось захватить вашим силам, для финансирования операции по значительному ограничению пиратских возможностей [smuggler.GetName]. Потребуется несколько месяцев, чтобы нацелиться на [smuggler.GetHerHis] пиратские корабли, но дело будет сделано"
darkages_piracy.18.t:0 "Пиратская операция свернута!"
darkages_piracy.18.desc:0 "Недавно я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], что мои пиратские корабли стали мишенью сильного флота, оплаченного [smuggler_victim.GetName], негодяем, которому удалось уничтожить мою контрабандную операцию.\n\nВлияние на мою пиратскую операцию - и, следовательно, на мою казну - значительно, и, вероятно, будет ощущаться, когда моя следующая партия кораблей войдет в порт..."
darkages_piracy.18.opta:0 "Ничего не поделаешь..."
darkages_piracy.19.tt1:0 "Успех этой опции зависит, к лучшему или худшему, от вашей Интриги и вашего Военного дела. Положительно влияет наличие свойств Лживый, Интриган, Проницательный, Черствый и Произвольный. Отрицательно влияет наличие свойств Нетерпеливый, Гневный и Тупой\n"
darkages_piracy.19.t:0 "Игра шпионов"
darkages_piracy.19.desc:0 "Сегодня мой [spymaster.GetCouncilTitle|d] [Select_CString(ROOT.Char.IsFemale, 'обратилась', 'обратился')] ко мне с просьбой о корабле моего пиратского флота для спасения важного шпиона, действующего в землях [hunter.GetName].\n\nВ сложившейся ситуации, если мы не будем действовать немедленно, мой человек будет схвачен, секреты могут быть раскрыты, и ущерб, нанесенный моему Престижу, будет очень значительным.\n\nКонечно, я могу рискнуть своим кораблем, его Капитаном и командой, ради того, чтобы все было тихо решено... как подобает манерам этих шпионов."
darkages_piracy.19.opta:0 "Продолжить спасательную операцию"
darkages_piracy.19.optb:0 "Не рисковать"
darkages_piracy.20.t:0 "Успешное спасение!"
darkages_piracy.20.desc:0 "В первые часы утра я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] известие, что моя спасательная операция по вызволению шпиона из земель [hunter.GetName] прошла с большим успехом!\n\nДаже если эти вопросы всегда скрытны, мой Престиж несколько возрос среди моих людей, не в последнюю очередь среди шпионов. Даже мой обычно угрюмый [spymaster.GetCouncilTitle|d] выглядит счастливым!"
darkages_piracy.20.opta:0 "Отлично!"
darkages_piracy.21.t:0 "Неудачное спасение..."
darkages_piracy.21.desc:0 "Моя попытка спасти шпиона, действующего в землях [hunter.GetName], закончилась полной катастрофой: мой пиратский корабль был захвачен, а моя команда гниет в тюрьме!\n\nИз-за гарантий, которые я [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал')] семьям участников, мне нужно заплатить выкуп за всех, а также вернуть свой корабль.\n\nПоскольку шпион схвачен и раскрывает мои секреты, к сожалению, это печальное дело закончилось для меня позорным провалом..."
darkages_piracy.21.opta:0 "Ох... мой Престиж!"
darkages_piracy.22.t:0 "Очень важный захват"
darkages_piracy.22.desc:0 "Меня разбудили сегодня посреди ночи важной информацией о шпионе, действующем от имени [rescuer.GetName] на моей территории, который был схвачен вместе с командой и пиратским кораблем, принадлежащим этому гнусному персонажу.\n\nХорошие новости на этом не заканчиваются. Прямо сейчас шпион говорит и признается во всем о своей работе и предоставляет важную информацию о политике Государства [rescuer.GetName].\n\nКладезь информации, который увеличит мой Престиж!\n\nЯ буду вести переговоры о выкупе команды и корабля, чтобы заработать еще немного золота на этом великом 'перевороте'!"
darkages_piracy.22.opta:0 "Отличные новости!"
darkages_nick_the_pirate_king:0 "Король Пиратов"
darkages_nick_the_pirate_queen:0 "Королева Пиратов"
darkages_piracy.23.t:0 "Печально известный"
darkages_piracy.23.desc:0 "Благодаря дурной славе вашего пиратского флота, которая гнусным образом возвышает вас над сверстниками, вы становитесь известным, и люди вокруг вас начинают слагать легенды о вас и ваших деяниях... В конце концов, все начинается с прозвища!"
darkages_piracy.23.opta:0 "Раздуть пламя легенды!"
darkages_piracy.23.optb:0 "Это намного ниже моих реальных заслуг..."
darkages_piracy.24.t:0 "Дурная слава [player.GetGenitiveName]"
darkages_piracy.24.desc:0 "Как владельца пиратского флота, мои подвиги распространяются повсюду. Корабли, прибывающие с добычей, рассказы о грабежах в открытом море, захваченные призы, разоренные торговцы - все это может способствовать тому, что люди будут бояться меня.\n\nОстается выяснить, [Select_CString(ROOT.Char.IsFemale, 'хочу ли я', 'хочу ли я')], чтобы меня боялись или нет... в конце концов, страх ведет к гневу, гнев ведет к ненависти... а ненависть вполне может привести к покушению на мою жизнь!"
darkages_piracy.24.opta:0 "Раздуть пламя страха!"
darkages_piracy.24.optb:0 "Согласиться снизить темп пиратских операций"
darkages_piracy.24.optc:0 "Выплатить компенсацию некоторым ограбленным торговцам"
darkages_piracy.24.tt1:0 "Ужас персонажа может привести к покушению на [Select_CString(player.IsFemale, 'ее', 'его')] жизнь. Чем выше Ужас, тем выше вероятность"
darkages_fleet_involved:0 "Пиратский флот поддерживает войну"
darkages_fleet_involved_desc:0 "Пиратский флот, принадлежащий этому персонажу или союзнику, участвует в текущих военных усилиях, атакуя вражеские корабли, блокируя порты, помогающие врагу, и преследуя вражеские торговые пути"
darkages_piracy.25.t:0 "Рука помощи"
darkages_piracy.25.desc:0 "Поскольку мы находимся в состоянии войны, мой союзник [ally.GetName] настоятельно призывает меня использовать мой пиратский флот, чтобы причинить всевозможные неприятности нашим врагам, тем самым увеличив наше преимущество на поле боя.\n\nЗная, что это либо сделает мою пиратскую операцию гораздо менее эффективной, либо, если она уже очень скромная, потребует вложений золота, мне нужно подумать о долгосрочных последствиях этого решения..."
darkages_piracy.25.opta:0 "Направить свои пиратские ресурсы на помощь военным усилиям"
darkages_piracy.25.optb:0 "Увеличить финансирование пиратства, чтобы помочь военным усилиям"
darkages_piracy.25.optc:0 "Отказаться перенаправлять пиратские ресурсы"
darkages_piracy.25.tt1:0 "Если вы выберете эту опцию, вы, каждый персонаж, который может командовать одной из ваших армий, и ваши союзники, включая любого из персонажей, которые могут командовать своими армиями, получите бонус к боевому преимуществу, если вступите в битву. Однако ваш регулярный доход от пиратства может пострадать\n"
darkages_piracy.25.tt2:0 "Выбирая эту опцию, вы отказываетесь перенаправлять пиратские ресурсы на помощь военным усилиям, что вызывает потерю Престижа из-за вашего неучастия и увеличение Стресса из-за более высоких рисков, с которыми ваши армии столкнутся на поле боя"
darkages_piracy.26.t:0 "Во славу Веры!"
darkages_piracy.26.desc:0 "Религиозные ученые моей [ROOT.Char.GetFaith.GetAdjective] веры обсуждали со мной различные варианты использования моей пиратской операции, помимо чистой прибыли.\n\nПосле нескольких встреч осталось предложение направить часть моих пиратских ресурсов на преследование именно врагов нашей веры, придав моему предприятию религиозный оттенок. Моя собственная пиратская операция, вероятно, будет парализована на некоторое время.\n\nВ качестве альтернативы я также могу финансировать строительство нескольких кораблей под контролем моих религиозных подданных, которые будут терроризировать моря неверных.\n\nВ конце концов, все сводится к моему суждению по этому вопросу..."
darkages_piracy.26.opta:0 "Направить ресурсы"
darkages_piracy.26.optb:0 "Предоставить необходимые средства"
darkages_piracy.26.optc:0 "Прибыль важнее веры!"
darkages_piracy.26.tt2:0 "Если вы Глава конфессии или Рьяный, вы испытаете значительное увеличение Стресса, если выберете эту опцию"
darkages_piracy.26.tt1:0 "Если вы Циничны, вы испытаете увеличение Стресса, если выберете эту опцию"
darkages_opinion_hate:0 "Ненависть"
darkages_piracy.27.t:0 "Особо важная персона"
darkages_piracy.27.desc:0 "После последнего прибытия корабля из моего пиратского флота, захваченный человек заявил, что его сюзерен готов заплатить за него выкуп.\n\nХотя в то время доверия этому не придали, сегодня я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] послание от [darkages_ruler.GetName], предлагающее хорошую сумму золота за этого человека, который на самом деле является ценным советником, путешествовавшим в качестве пассажира на захваченном судне.\n\nТеперь, когда я знаю, что информация верна, мне решать, что делать..."
darkages_piracy.27.opta:0 "Потребовать выкуп у [darkages_ruler.GetGenitiveName]"
darkages_piracy.27.optb:0 "Продать его на невольничьем рынке, как и всех остальных"
darkages_piracy.27.optc:0 "Пытать и медленно убивать его, отправив его голову его Сюзерену"
darkages_piracy.27.tt1:0 "Выбрав эту опцию, если ваш персонаж Садист, или Черствый, или Гневный, или Мстительный и не Жадный, вы увеличите свой Стресс"
darkages_piracy.27.tt2:0 "Эта опция доступна, потому что ваш персонаж Садист, или Черствый, или Гневный, или Мстительный"
darkages_piracy.28.t:0 "Охотник или Жертва?"
darkages_piracy.28.desc:0 "Несколько недель назад я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] уведомление, что один из моих лучших пиратских капитанов был захвачен в стычке у побережья [darkages_enemy.GetName].\n\nЯ только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] послание от [darkages_enemy.GetGenitiveName] с требованием выкупа за этого важного члена моей пиратской операции.\n\nМне решать его судьбу, зная, что если я откажусь, мой 'бизнес' пострадает..."
darkages_piracy.28.opta:0 "Заплатить выкуп"
darkages_piracy.28.optb:0 "Бросить капитана на произвол судьбы"
darkages_piracy.28.tt1:0 "Если вы выберете эту опцию и вы Жадный, вы испытаете некоторый Стресс"
darkages_fleet_convert:0 "Преобразование пиратского флота"
darkages_fleet_convert_desc:0 "Пиратский флот этого персонажа был преобразован в транспортный флот"
darkages_piracy.29.t:0 "Преобразование пиратского флота"
darkages_piracy.29.desc:0 "В эти времена войны [darkages_steward.GetName], мой Управляющий, [Select_CString(darkages_steward.IsFemale, 'посоветовала', 'посоветовал')] мне, что я могу превратить свои Пиратские корабли в транспортный флот, тем самым очень значительно снизив стоимость транспортировки моей армии по морю.\n\nЯвляется ли это ожидаемой перспективой или нет, решать мне..."
darkages_piracy.29.opta:0 "Хорошая идея!"
darkages_piracy.29.optb:0 "Мне это не интересно..."
darkages_opinion_county_pressed:0 "Население принуждено к службе"
darkages_opinion_county_pressed_desc:0 "Население этого графства принуждено служить в Пиратском флоте"
darkages_piracy.30.t:0 "Принужденные люди"
darkages_piracy.30.desc:0 "Недавние слухи о недовольстве среди людей моего Домена достигли моих ушей, когда делегация моих собственных крестьян была принята мной.\n\nОни обеспокоены тем, что их принуждают служить в моем пиратском флоте против их воли, и просят бонус в золоте, который будет разделен между принужденными людьми в течение следующих 10 лет.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] принять их требования или рискнуть беспорядками во всем моем Домене..."
darkages_piracy.30.opta:0 "Принять их требования"
darkages_piracy.30.optb:0 "Отказать в их требованиях"
boa_pay_ransom_interaction:0 "Заплатить выкуп"
darkages_lunacy_brings_death.02.tt3:0 "Вы убиты!"
darkages_lunacy_brings_death.02.tt2:0 "Вы избегаете повреждений"
darkages_train_combat.02.tt1:0 "Не повезло!"
darkages_train_combat.02.t:0 "Мастер клинка"
darkages_train_combat.02.desc:0 "Учитывая мою соответствующую Доблесть и то, что я тренируюсь, чтобы улучшить ее еще больше, мой учитель пытается научить меня идеальным техникам боя, давая мне шанс, основанный на его собственной Доблести, получить свойство, которое характеризует определенный уровень мастерства владения оружием.\n\nСудьба решит, [Select_CString(ROOT.Char.IsFemale, 'способна', 'способен')] ли я учиться на его уроках..."
darkages_train_combat.02.opta:0 "Будем надеяться на лучшее!"
darkages_opinion_county_propaganda:0 "Пропаганда"
darkages_opinion_county_propaganda_desc:0 "Канцлер владельца этого графства убеждал население в добрых намерениях Сюзерена"
darkages_chancellor.01.optb:0 "Публично осудить попытку моего [chancellor.GetCouncilTitle|d]"
darkages_chancellor.01.opta:0 "Согласиться следовать повестке моего [chancellor.GetCouncilTitle|d]"
darkages_chancellor.01.optc:0 "Вежливо отказаться от попытки моего [chancellor.GetCouncilTitle|d]"
darkages_chancellor.01.t:0 "Вопрос влияния"
darkages_chancellor.01.desc:0 "Когда [chancellor.GetName], мой [chancellor.GetCouncilTitle], [Select_CString(chancellor.IsFemale, 'предложила', 'предложил')] мне [chancellor.GetHerHis] полные усилия и старания для улучшения моего положения среди моих сверстников и населения моего Домена в обмен на продвижение [chancellor.GetHerHis] собственной личной повестки в Совете, я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с дилеммой, которую я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить.\n\nЕсли я соглашусь на этот договор с моим [chancellor.GetCouncilTitle|d], я оттолкну других Советников и рискую их гневом..."
darkages_chancellor.01.tt1:0 "Эта опция доступна, потому что вы следуете образу жизни Дипломатии"
darkages_chancellor.02.t:0 "Крупный голод в [target_county_z.GetName]"
darkages_chancellor.02.desc:0 "Во время встречи с моим [chancellor.GetCouncilTitle|d], [chancellor.GetSheHe] [Select_CString(chancellor.IsFemale, 'указала', 'указал')] мне, что показатели урожая в [target_county_z.GetName] крайне низки и местное население беспокоится о перспективе крупного голода.\n\nЗатем [chancellor.GetName] [Select_CString(chancellor.IsFemale, 'продолжила', 'продолжил')] излагать план отправки [chancellor.GetHerHim] в пострадавшее Графство, чтобы успокоить там настроение.\n\nОчевидно, что с этим путешествием связаны риски, но в конечном итоге все должно быть сделано на благо Державы..."
darkages_chancellor.02.opta:0 "Отправить [chancellor.GetCouncilTitle|d] успокоить население"
darkages_chancellor.02.optb:0 "Люди [target_county_z.GetName] должны сами о себе позаботиться"
darkages_chancellor.02.optc:0 "Разработать экономический план помощи населению графства"
darkages_chancellor.03.t:0 "Крупный политический успех!"
darkages_chancellor.03.desc:0 "Миссия, которую мой [chancellor.GetCouncilTitle] [Select_CString(chancellor.IsFemale, 'выполнила', 'выполнил')] в [target_county_z.GetName], увенчалась полным успехом!\n\nРазговаривая и сопереживая местным представителям населения, [chancellor.GetSheHe] [Select_CString(chancellor.IsFemale, 'смогла', 'смог')] успокоить всех, при этом мои ресурсы остались нетронутыми.\n\nБлагодаря красноречию [chancellor.GetName], я [Select_CString(ROOT.Char.IsFemale, 'достигла', 'достиг')] великой политической победы на внутреннем уровне!"
darkages_chancellor.03.opta:0 "Превосходно!"
darkages_chancellor.04.t:0 "Незначительный успех"
darkages_chancellor.04.desc:0 "Вернувшись из [target_county_z.GetName], мой [chancellor.GetCouncilTitle] [Select_CString(chancellor.IsFemale, 'сообщила', 'сообщил')] о серьезных трудностях в том, чтобы заставить услышать себя среди ярости, охватившей мое Графство.\n\nТем не менее, [chancellor.GetName] [Select_CString(chancellor.IsFemale, 'смогла', 'смог')] немного успокоить население, и в итоге путешествие не стало полным провалом."
darkages_chancellor.04.opta:0 "Усилия в [target_county_z.GetName] заслуживают похвалы"
darkages_chancellor.05.t:0 "Катастрофа в [target_county_z.GetName]"
darkages_chancellor.05.desc:0 "Одинокий всадник в капюшоне, прибывший из [target_county_z.GetName], оставил ужасный знак сегодня утром у ворот моей столицы.\n\nОткрыв мешок, мои стражники обнаружили внутри голову [chancellor.GetName], моего [chancellor.GetCouncilTitle|d], с запиской, подчеркивающей ярость, которую испытывает население [target_county_z.GetName], и мою неспособность помочь им.\n\nМиссия, которую [Select_CString(chancellor.IsFemale, 'пыталась', 'пытался')] выполнить мой [chancellor.GetCouncilTitle], была воспринята как полная пустых обещаний и еще более пустых слов.\n\nПеред лицом этого, местные настроения стали только хуже, чем раньше..."
darkages_chancellor.05.opta:0 "Печальное развитие событий..." 
darkages_chancellor.02.tt1:0 "Успех этой опции зависит от Навыка Дипломатии [chancellor.GetCouncilTitle|d], от того, имеет ли [chancellor.GetSheHe] образование в Дипломатии или нет, [Select_CString(chancellor.IsFemale, 'является ли она Проницательной', 'является ли он Проницательным')] и [Select_CString(chancellor.IsFemale, 'является ли она Тупой', 'является ли он Тупым')]"
darkages_spymaster.01.tt1:0 "Успех этой опции зависит от очень хорошей (>=15) Интриги [spymaster.GetCouncilTitle|d] и черт Интриган, Эксцентричный и Лживый. Если агент будет захвачен, вы должны ожидать серьезной потери Престижа, так как ее допросят, и она признается в своей верности, сдав свою сеть\n"
darkages_spymaster.01.tt2:0 "Успех этой опции зависит от очень хорошей (>=15) Интриги [spymaster.GetCouncilTitle|d], [spymaster.GetHerHis] Доблести и того, [Select_CString(spymaster.IsFemale, 'является ли она Проницательной или Тупой', 'является ли он Проницательным или Тупым')]. Выбирая эту опцию, вы ставите на кон жизнь [spymaster.GetName]\n"
darkages_spymaster.01.t:0 "Раскрытый агент"
darkages_spymaster.01.desc:0 "[spymaster.GetName], мой ценный [spymaster.GetCouncilTitle], [Select_CString(spymaster.IsFemale, 'пришла', 'пришел')] ко мне с серьезной информацией о ценном активе [spymaster.GetHerHis] шпионской сети при дворе [ruler.GetName], который предоставлял точную информацию о политической обстановке в регионе.\n\nК сожалению, моему [spymaster.GetCouncilTitle|d] сообщили, что этот важный агент сейчас скрытно расследуется агентами [ruler.GetName] и, вероятно, через несколько месяцев ее арестуют, допросят и, безусловно, будут пытать, чтобы раскрыть... неприятную правду о моей шпионской сети, среди прочей ценной информации.\n\nДругой мой агент уже на месте, чтобы убить раскрытого агента, тем самым надежно предотвратив худшее. Конечно, учитывая ее безупречную службу до сих пор, может быть, я могу рассмотреть миссию спасения, лично возглавляемую моим [spymaster.GetCouncilTitle|d], но исход этого далек от определенности..."
darkages_spymaster.01.opta:0 "Дать сигнал убить ее"
darkages_spymaster.01.optb:0 "Предупредить ее бежать"
darkages_spymaster.01.optc:0 "Попытаться спасти ее"
darkages_spymaster.02.t:0 "Успешное спасение!"
darkages_spymaster.02.desc1:0 "Спасение бывшего секретного агента прошло гладко, и в настоящее время она проходит дебрифинг в безопасном месте. Мой [spymaster.GetCouncilTitle] рекомендует предложить ей небольшую сумму в благодарность за всю ее работу и верность."
darkages_spymaster.02.desc2:0 "После проблемной спасательной миссии, в которой мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'была ранена', 'был ранен')], [spymaster.GetSheHe] [Select_CString(spymaster.IsFemale, 'прибыла', 'прибыл')] сегодня, сообщив мне об окончательном успехе миссии по спасению бывшего секретного агента, действовавшего при дворе [ruler.GetName]. Мой [spymaster.GetCouncilTitle] рекомендует предложить ей небольшую сумму в благодарность за всю ее работу и верность."
darkages_spymaster.02.opta:0 "Отличная работа, [spymaster.GetName]!"
darkages_spymaster.02.optb:0 "Отлично! Теперь дадим этому агенту особый бонус..."
darkages_spymaster.02.tt1:0 "Выбирая эту опцию, ваши вассалы, которые не являются Жадными, Мстительными, Гневными или Садистами, одобрят ваше решение, получив положительный модификатор мнения к вам. Если ваш персонаж Жадный, Мстительный, Гневный или Садист, вы получите штраф к Стрессу\n"
darkages_spymaster.04.t:0 "Полный провал"
darkages_spymaster.04.desc:0 "Единственный выживший в миссии под командованием [spymaster.GetName] по спасению важного шпиона рассказал мне о провале всей операции, уничтожении спасательной команды и гибели моего [spymaster.GetCouncilTitle|d] в процессе.\n\nЭта ошибка, вместе с захватом моего ценного агента, приводит к значительному падению моего Престижа... и я ищу нового [spymaster.GetCouncilTitle|d]."
darkages_spymaster.04.opta:0 "Печальные новости..."
darkages_spymaster.03.t:0 "Неудачная миссия"
darkages_spymaster.03.desc:0 "Вернувшись из [spymaster.GetHerHis] миссии в землях [ruler.GetName], [spymaster.GetName], мой [spymaster.GetCouncilTitle], [Select_CString(spymaster.IsFemale, 'сообщила', 'сообщил')] о провале миссии и захвате нашего агента там.\n\nВ то время как моя команда, к счастью, вернулась без потерь, к сожалению, ожидается, что мой агент раскроет все секреты, которыми она может обладать относительно наших шпионских сетей, среди прочей информации.\n\nКак только мои секреты будут раскрыты, я получу очень значительный удар по Престижу..."
darkages_spymaster.03.opta:0 "К сожалению..."
darkages_opinion_county_bad_harvest:0 "Плохой урожай"
darkages_opinion_county_bad_harvest_desc:0 "Столкнувшись с голодом, вызванным плохим урожаем, и без перспективы надлежащей помощи извне, население этого Графства недовольно."
darkages_loyal_disloyal.01.t:0 "Вопрос лояльности"
darkages_loyal_disloyal.01.desc:0 "Взрослея, я нахожу себя более [Select_CString(ROOT.Char.IsFemale, 'верной', 'верным')] своему слову и чести, соблюдая клятвы по отношению к другим людям или учреждениям и вообще стремясь быть [Select_CString(ROOT.Char.IsFemale, 'правдивой', 'правдивым')] по отношению ко всем.\n\nЭта жесткая и требовательная позиция ведет мою личность к лояльному профилю..."
darkages_loyal_disloyal.01.opta:0 "Я горжусь своим новым свойством"
darkages_loyal_disloyal.01.optb:0 "Я иду против своей личности, чтобы избежать этого"
darkages_loyal_disloyal.02.t:0 "Вопрос нелояльности"
darkages_loyal_disloyal.02.desc:0 "Взрослея, мой независимый взгляд и личный выбор берут верх над любыми моральными обязательствами.\n\nМоя свободная воля и отстраненность от моральных обязательств ведут мою личность к нелояльному профилю..."
darkages_loyal_disloyal.02.opta:0 "Я то, кто я есть!"
darkages_loyal_disloyal.02.optb:0 "Я иду против своей личности, чтобы избежать этого"
darkages_relation_brings_death.01.tt2:0 "Ваш персонаж убит"
darkages_dread_brings_death.03.t:0 "Мудрое предупреждение"
darkages_dread_brings_death.03.desc:0 "Мой [spymaster.GetCouncilTitle] подходит ко мне однажды и шепчет совет относительно моего способа управления государством.\n\nПо [spymaster.GetHerHis] словам, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] обращать внимание на Ужас, который я внушаю своим подданным, так как это может привести к внезапному покушению на мою жизнь. Чем больше Ужаса, тем выше шансы.\n\nЗная, что [spymaster.GetName] получает плату за то, чтобы беспокоиться о возможных событиях, и предупрежден о любой вероятности, какой бы маленькой она ни была, я знаю, что [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] действовать с осторожностью..."
darkages_dread_brings_death.03.opta:0 "Спасибо за предупреждение!"
darkages_dread_brings_death.04.t:0 "Значимое предупреждение"
darkages_dread_brings_death.04.desc:0 "Мой [spymaster.GetCouncilTitle] подходит ко мне однажды и шепчет совет относительно моего способа управления государством.\n\nПо [spymaster.GetHerHis] словам, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] обращать внимание на Тиранию, которую я причиняю своим подданным, так как это может привести к внезапному покушению на мою жизнь. Чем больше Тирании, тем выше шансы.\n\nЗная, что [spymaster.GetName] получает плату за то, чтобы беспокоиться о возможных событиях, и предупрежден о любой вероятности, какой бы маленькой она ни была, я знаю, что [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] действовать с осторожностью..."
darkages_dread_brings_death.04.opta:0 "Я буду помнить твои слова..."
darkages_rival_diplomatic_blunder:0 "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName] имеют давние разногласия относительно дипломатической ошибки."
darkages_chancellor.06.tt1:0 "Успех этой опции положительно зависит от высокого Навыка Дипломатии [chancellor.GetCouncilTitle|d], от того, является ли [chancellor.GetSheHe] Дипломатом и является ли [chancellor.GetSheHe] Проницательным. Отрицательно зависит от того, имеет ли [chancellor.GetCouncilTitle] низкий Навык Дипломатии, не имеет ли [chancellor.GetSheHe] образования в Дипломатии, является ли [chancellor.GetSheHe] Тупым и не имеет ли [chancellor.GetSheHe] никакого Ужаса"
darkages_chancellor.06.t:0 "Серьезная дипломатическая ошибка"
darkages_chancellor.06.desc:0 "Недавно посольство, которое я [Select_CString(ROOT.Char.IsFemale, 'отправила', 'отправил')] ко двору [ruler.GetName], проявило крайнюю некомпетентность в решении политической ситуации и совершило серьезную дипломатическую ошибку, остро оскорбив [ruler.GetHerHim].\n\nВчера я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] послание от этого обиженного правителя, в котором ясно сказано, что, если я не заглажу вину, между нами воцарится вечная ненависть.\n\nЗаранее зная, что отправка моего [chancellor.GetCouncilTitle|d] может иметь неприятные последствия, превратив очень плохую ситуацию в худшую, мне нужно спланировать, как я решу этот вопрос..."
darkages_chancellor.06.opta:0 "Отправить моего [chancellor.GetCouncilTitle|d] исправить проблему"
darkages_chancellor.06.optb:0 "Выплатить денежную компенсацию"
darkages_chancellor.06.optc:0 "Игнорировать проблему"
darkages_chancellor.07.t:0 "Исправленные отношения"
darkages_chancellor.07.desc:0 "Мой [chancellor.GetCouncilTitle] [Select_CString(chancellor.IsFemale, 'сообщила', 'сообщил')] сегодня о крупном успехе в [chancellor.GetHerHis] миссии по успокоению чувств [ruler.GetName]!\n\n[chancellor.GetSheHe|U] особо [Select_CString(chancellor.IsFemale, 'отметила', 'отметил')], что проинформировал меня о том, что вопрос был полностью улажен, заявив, что я могу быть [Select_CString(ROOT.Char.IsFemale, 'спокойна', 'спокоен')] в отношении этого вопроса."
darkages_chancellor.07.opta:0 "Отлично, [chancellor.GetFirstName]!"
darkages_chancellor.08.t:0 "Смешанные результаты"
darkages_chancellor.08.desc:0 "[chancellor.GetName], мой [chancellor.GetCouncilTitle], [Select_CString(chancellor.IsFemale, 'прибыла', 'прибыл')] сегодня от двора [ruler.GetName] и [Select_CString(chancellor.IsFemale, 'была быстро проведена', 'был быстро проведен')] ко мне, чтобы сделать [chancellor.GetHerHis] отчет.\n\nХотя худших последствий удалось избежать, было ясно, что [chancellor.GetSheHe] [Select_CString(chancellor.IsFemale, 'не смогла', 'не смог')] убедить [ruler.GetName] в моих добрых намерениях при отправке посольства в первую очередь.\n\nВ конце концов, хотя я  [Select_CString(ROOT.Char.IsFemale, 'избежала', 'избежал')] появления нового соперника, у [ruler.GetName] сложилось обо мне устойчивое плохое впечатление."
darkages_chancellor.08.opta:0 "Стакан наполовину полон или наполовину пуст?"
darkages_chancellor.09.t:0 "От плохого к худшему"
darkages_chancellor.09.desc:0 "К моему огорчению, [chancellor.GetName] [Select_CString(chancellor.IsFemale, 'вернулась', 'вернулся')] сегодня от двора [ruler.GetName] и поспешил сообщить мне, что миссия была полным провалом.\n\nПосле оскорбления со стороны самого [ruler.GetName], мой [chancellor.GetCouncilTitle] [Select_CString(chancellor.IsFemale, 'заняла', 'занял')] напористую позицию, думая, что [chancellor.GetSheHe] добьется успеха в изложении наших причин.\n\nК сожалению, ситуация только ухудшилась, и в конце концов [chancellor.GetName] [Select_CString(chancellor.IsFemale, 'благодарна', 'благодарен')] за то, что [Select_CString(chancellor.IsFemale, 'ушла', 'ушел')] с целой шкурой..."
darkages_chancellor.09.opta:0 "Неудачный поворот событий..."
darkages_chancellor.10.t:0 "Частная инициатива"
darkages_chancellor.10.desc:0 "Мне стало известно сегодня, что [chancellor.GetName], мой [chancellor.GetCouncilTitle], планирует провести встречу с моими иностранными соседями для обсуждения вопросов, представляющих политический и дипломатический интерес.\n\nПоскольку [chancellor.GetSheHe] уже [Select_CString(chancellor.IsFemale, 'прощупала', 'прощупал')] всех на предмет присутствия, мне остается либо финансировать встречу, либо столкнуться с потерей Престижа, если я откажусь от этой возможности.\n\nПоскольку я чувствую себя немного [Select_CString(ROOT.Char.IsFemale, 'обиженной', 'обиженным')] поведением моего [chancellor.GetCouncilTitle|d], мне нужно принять решение сейчас."
darkages_chancellor.10.opta:0 "Пусть [chancellor.GetCouncilTitle] организует встречу"
darkages_chancellor.10.optb:0 "Принять личное участие"
darkages_chancellor.10.optc:0 "Не финансировать встречу"
darkages_chancellor.10.tt1:0 "Вы отправляете [chancellor.GetCouncilTitle|d] приветствовать всех и произнести речь. Поступая так, вы можете получить или потерять часть Престижа, в зависимости от способностей вашего [chancellor.GetCouncilTitle|d]. Успех этой опции зависит от Навыка Дипломатии вашего [chancellor.GetCouncilTitle|d], от того, является ли [chancellor.GetSheHe] Проницательным, Тупым и не имеет ли [chancellor.GetSheHe] образования в Дипломатии\n"
darkages_chancellor.10.tt2:0 "Вы берете на себя руководство встречей, произнося свою собственную речь. Вы можете получить значительное количество Престижа или рискнуть большим, если вам не удастся произвести хорошее впечатление. Успех этой опции зависит от вашего Навыка Дипломатии, от того, являетесь ли вы Проницательным, Тупым, от отсутствия у вас образования в Дипломатии и следуете ли вы образу жизни Дипломатии или нет\n"
darkages_chancellor.10.tt3:0 "Вы отказываетесь терпеть выходки вашего [chancellor.GetCouncilTitle|d]. В зависимости от ваших свойств личности, вы можете потерять Стресс\n"
darkages_chancellor.11.t:0 "Успешная встреча"
darkages_chancellor.11.desc:0 "Встреча с моими иностранными соседями стала для меня дипломатическим переворотом!\n\nМой [chancellor.GetCouncilTitle] [Select_CString(chancellor.IsFemale, 'смогла', 'смог')] произнести вдохновенную речь, и было найдено много общего между всеми. Были достигнуты некоторые важные сделки, и я получу выгоду от полученных знаний в плане дипломатии и стратегического мышления.\n\nВ общем, крупный успех!"
darkages_chancellor.11.tt1:0 "Помимо отображаемых последствий, каждый главный иностранный независимый сосед улучшит свое мнение о вас"
darkages_regional_meeting:0 "Успешная региональная встреча"
darkages_regional_meeting_desc:0 "Вы организовали встречу с соседями, которая прошла успешно"
darkages_chancellor.11.opta:0 "Отлично!"
darkages_chancellor.12.t:0 "Крупный провал"
darkages_chancellor.12.desc:0 "Встреча с моими иностранными соседями стала для меня позорным бардаком.\n\nМой [chancellor.GetCouncilTitle] [Select_CString(chancellor.IsFemale, 'выставила', 'выставил')] себя на посмешище перед каждым присутствующим иностранным сановником.\n\nВ общем, значительный провал, который снизит мой Престиж..."
darkages_chancellor.12.opta:0 "Мне нужно перекинуться парой слов с моим [chancellor.GetCouncilTitle|d]..."
darkages_chancellor.13.t:0 "Великолепное выступление"
darkages_chancellor.13.desc:0 "Встреча с моими иностранными соседями стала для меня дипломатическим переворотом!\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] произнести вдохновенную речь, и было найдено много общего между всеми. Были достигнуты некоторые важные сделки, и я получу выгоду от полученных знаний в плане дипломатии и стратегического мышления.\n\nВ общем, крупный успех!"
darkages_chancellor.13.tt1:0 "Помимо отображаемых последствий, каждый главный иностранный независимый сосед улучшит свое мнение о вас"
darkages_chancellor.13.opta:0 "Отлично!"
darkages_chancellor.14.t:0 "Крупный провал"
darkages_chancellor.14.desc:0 "Встреча с моими иностранными соседями стала для меня позорным бардаком.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'выставила', 'выставил')] себя на посмешище перед каждым присутствующим иностранным сановником.\n\nВ общем, значительный провал, который снизит мой Престиж..."
darkages_chancellor.14.opta:0 "Упущенная возможность..."
darkages_chancellor.15.t:0 "Внутренние интриги"
darkages_chancellor.15.desc:0 "[chancellor.GetName], мой ценный [chancellor.GetCouncilTitle], [Select_CString(chancellor.IsFemale, 'пришла', 'пришел')] ко мне с идеей инициативы использовать немного хитрости и коварства, чтобы улучшить мое положение среди моих вассалов.\n\nПлан требует рискованного шага, когда я сначала потеряю немного Престижа из-за явной политической ошибки, чтобы позже быть [Select_CString(ROOT.Char.IsFemale, 'изображенной', 'изображенным')] жертвой лжи, тем самым манипулируя моими вассалами, чтобы улучшить их мнение обо мне и вернуть утраченный Престиж.\n\nЗная, что не я командую парадом, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] принять решение о даче зеленого света этому политическому маневру."
darkages_chancellor.15.opta:0 "Действуй, [chancellor.GetFirstName]!"
darkages_chancellor.15.optb:0 "Я буду участвовать дальше"
darkages_chancellor.15.optc:0 "Никакого продолжения этого..."
darkages_chancellor.15.tt3:0 "Вы отказываетесь продолжать план. Если вы Общительны, или Прилежны, или Проницательны, или Дипломат, или Лживы, или Интриган, или если вы следуете дипломатическому образу жизни, вы увеличите свой Стресс\n"
darkages_chancellor.15.tt2:0 "Вы даете зеленый свет плану и вовлекаете себя в манипуляцию. Это даст больше шансов на успех, но если план вашего [chancellor.GetCouncilTitle|d] провалится, вы понесете дальнейшие последствия. Успех плана положительно зависит от высокой Дипломатии вашего [chancellor.GetCouncilTitle|d], от того, что [chancellor.GetSheHe] Проницательный, и в меньшей степени от вашей высокой Дипломатии и от вашего высокого Ужаса. И наоборот, провал зависит от средней или низкой Дипломатии [chancellor.GetCouncilTitle|d], от того, что [chancellor.GetSheHe] Тупой, от отсутствия у [chancellor.GetHerHim] дипломатического образования, от вашего низкого Навыка Дипломатии и от вашего нулевого Ужаса. Модификаторы вашего [chancellor.GetCouncilTitle|d] влияют больше, чем ваши собственные\n"
darkages_chancellor.15.tt1:0 "Вы даете зеленый свет плану. Успех плана положительно зависит от высокой Дипломатии вашего [chancellor.GetCouncilTitle|d], от того, что [chancellor.GetSheHe] Проницательный, и в меньшей степени от вашей высокой Дипломатии и от вашего высокого Ужаса. И наоборот, провал зависит от средней или низкой Дипломатии [chancellor.GetCouncilTitle|d], от того, что [chancellor.GetSheHe] Тупой, от отсутствия у [chancellor.GetHerHim] дипломатического образования, от вашего низкого Навыка Дипломатии и от вашего нулевого Ужаса. Модификаторы вашего [chancellor.GetCouncilTitle|d] влияют больше, чем ваши собственные\n"
darkages_opinion_disgusted:0 "Отвращение"
darkages_chancellor.16.t:0 "Успешный план"
darkages_chancellor.16.desc:0 "План моего [chancellor.GetCouncilTitle|d] увенчался большим успехом, и мои вассалы были одурачены, поверив во всю эту историю.\n\nЭто отличные новости для моего авторитета среди моих вассалов!"
darkages_chancellor.16.opta:0 "Превосходно!"
darkages_chancellor.17.t:0 "Проваленный план"
darkages_chancellor.17.desc1:0 "План моего [chancellor.GetCouncilTitle|d] оказался огромной катастрофой, и мои вассалы раскусили всю мистификацию...\n\nК сожалению, мой Престиж страдает, и все испытывают отвращение к моему отношению..."
darkages_chancellor.17.desc2:0 "План моего [chancellor.GetCouncilTitle|d] оказался огромной катастрофой, и мои вассалы раскусили всю мистификацию...\n\nПоследствия этого провала значительно суровее из-за моего личного участия во всей этой лжи.\n\nК сожалению, мой Престиж сильно страдает, и все разъярены моим отношением..."
darkages_chancellor.17.opta:0 "О нет!"
darkages_spymaster.05.t:0 "Важный арест"
darkages_spymaster.05.desc1:0 "Долгое время мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'пыталась', 'пытался')] поймать неуловимого шпиона.\nДолгое время она [Select_CString(spymaster.IsFemale, 'оказывалась', 'оказывался')] тенью, оставлявшей лишь намеки спустя долгое время после завершения своих операций.\n\nНаконец она совершила ошибку, которая привела [spymaster.GetName] к открытию, что она агент и родственница [enemy_ruler.GetName].\n\nБыл произведен арест, и теперь мне решать, что делать с этим... неприятным персонажем."
darkages_spymaster.05.desc2:0 "Долгое время мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'пыталась', 'пытался')] поймать неуловимого шпиона.\nДолгое время он [Select_CString(spymaster.IsFemale, 'оказывался', 'оказывался')] тенью, оставлявшей лишь намеки спустя долгое время после завершения своих операций.\n\nНаконец он совершил ошибку, которая привела [spymaster.GetName] к открытию, что он агент и родственник [enemy_ruler.GetName].\n\nБыл произведен арест, и теперь мне решать, что делать с этим... неприятным персонажем."
darkages_spymaster.05.opta:0 "Интриговать, чтобы убедить шпиона сотрудничать"
darkages_spymaster.05.optb:0 "Соблазнить шпиона, чтобы сотрудничать с нами"
darkages_spymaster.05.optc:0 "Пытать шпиона, чтобы украсть всю информацию"
darkages_spymaster.05.optd:0 "Выкупить шпиона"
darkages_spymaster.05.tt1:0 "Положительно на этот результат влияют Навык Интриги вашего [spymaster.GetCouncilTitle|d] и то, является ли [spymaster.GetSheHe] Интриганом или Лживым. Отрицательно влияет на этот вариант то, имеет ли ваш [spymaster.GetCouncilTitle] средний или худший Навык Интриги, не имеет ли [spymaster.GetSheHe] образования в Интриге и является ли [spymaster.GetSheHe] Честным или Справедливым"
darkages_spymaster.05.tt2:0 "Положительно на этот результат влияют Навык Интриги вашего [spymaster.GetCouncilTitle|d] и то, является ли [spymaster.GetSheHe] Соблазнителем или Похотливым. Отрицательно влияет на этот вариант то, имеет ли ваш [spymaster.GetCouncilTitle] средний или худший Навык Интриги, не имеет ли [spymaster.GetSheHe] образования в Интриге и является ли [spymaster.GetSheHe] Гневным или Целомудренным"
darkages_spymaster.05.tt3:0 "Этот вариант дает лучший базовый шанс на успех, чем вышеперечисленные. Если ваш персонаж Сострадательный, Прощающий, Справедливый или Честный, произойдет увеличение Стресса. Положительно на этот результат влияют Навык Интриги вашего [spymaster.GetCouncilTitle|d] и то, является ли [spymaster.GetSheHe] Пытателем или Садистом. Отрицательно влияет на этот вариант то, имеет ли ваш [spymaster.GetCouncilTitle] средний или худший Навык Интриги, не имеет ли [spymaster.GetSheHe] образования в Интриге и является ли [spymaster.GetSheHe] Сострадательным или Прощающим\n"
darkages_powerful_spy_network_defeated:0 "Могущественная шпионская сеть побеждена"
darkages_powerful_spy_network_defeated_desc:0 "Тайный советник этого персонажа сумел распустить могущественную шпионскую сеть, действовавшую в державе"
darkages_spymaster.06.t:0 "Шпион признается"
darkages_spymaster.06.desc1:0 "Благодаря огромным усилиям моего [spymaster.GetCouncilTitle|d], вражеский шпион признался во всем!\n\nПоскольку она раскрыла информацию, нам удалось захватить всю сеть.\n\nОсобый интерес представляет тот факт, что мой собственный придворный [another_spy.GetName] также шпионил для [enemy_ruler.GetName], тем самым предав мое личное доверие к [another_spy.GetHerHim]..."
darkages_spymaster.06.desc2:0 "Благодаря огромным усилиям моего [spymaster.GetCouncilTitle|d], вражеский шпион признался во всем!\n\nПоскольку он раскрыл информацию, нам удалось захватить всю сеть.\n\nОсобый интерес представляет тот факт, что мой собственный придворный [another_spy.GetName] также шпионил для [enemy_ruler.GetName], тем самым предав мое личное доверие к [another_spy.GetHerHim]..."
darkages_spymaster.06.opta:0 "Похвалить всю операцию и простить [another_spy.GetName]"
darkages_spymaster.06.optb:0 "Похвалить всю операцию и казнить [another_spy.GetName]"
darkages_failed_interrogation:0 "Проваленный допрос"
darkages_failed_interrogation_desc:0 "Тайный советник этого персонажа не смог получить информацию от захваченного вражеского шпиона"
darkages_spymaster.07.t:0 "Проваленный допрос"
darkages_spymaster.07.desc1:0 "Допрос иностранного шпиона на службе [enemy_ruler.GetName] провалился, так как она отказалась предоставить дальнейшую информацию о своем участии, тем самым защитив всю сеть.\n\nК сожалению, единственный утешительный приз, который у нас есть, — это оставить этого важного шпиона гнить в моих темницах..."
darkages_spymaster.07.desc2:0 "Допрос иностранного шпиона на службе [enemy_ruler.GetName] провалился, так как он отказался предоставить дальнейшую информацию о своем участии, тем самым защитив всю сеть.\n\nК сожалению, единственный утешительный приз, который у нас есть, — это оставить этого важного шпиона гнить в моих темницах..."
darkages_spymaster.07.opta:0 "Пиррова победа..."
darkages_spymaster.08.t:0 "Попавший в беду родственник"
darkages_spymaster.08.desc:0 "Мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'попросила', 'попросил')] сегодня о срочной встрече по поводу очень ценного иностранного актива под [spymaster.GetHerHis] контролем, который принадлежит моей Династии и работает на меня под прикрытием при дворе [darkages_ruler.GetName].\n\nШпион, о котором идет речь, — не кто иной, как [family.GetName], и проблема в том, что у нас есть информация, что [family.GetSheHe] вот-вот будет [Select_CString(family.IsFemale, 'раскрыта, арестована и, вероятно, убита', 'раскрыт, арестован и, вероятно, убит')].\n\n[spymaster.GetName] просит меня профинансировать специальную и опасную миссию по спасению [spymaster.GetHerHis] агента и спасению [family.GetHerHim] от ужасной участи..."
darkages_spymaster.08.opta:0 "Продолжать миссию"
darkages_spymaster.08.optb:0 "Я лично возглавлю миссию"
darkages_spymaster.08.optc:0 "Забыть [family.GetName]"
darkages_spymaster.08.tt1:0 "Вы приказываете своему [spymaster.GetCouncilTitle|d] выполнить миссию. Успех зависит от [spymaster.GetHerHis] высокого Навыка Интриги, от [spymaster.GetHerHis] высокой Доблести и от того, является ли [spymaster.GetSheHe] Отважным. Провал миссии зависит от среднего или низкого Навыка Интриги вашего [spymaster.GetCouncilTitle|d], от низкой Доблести, от отсутствия образования в Интриге и от того, является ли ваш [spymaster.GetCouncilTitle] Трусливым"
darkages_spymaster.08.tt2:0 "Чувствуя возможность получить много Престижа, вы будете планировать и участвовать во всей операции. Успех зависит от вашего высокого Навыка Интриги, от вашей высокой Доблести и от того, являетесь ли вы Отважным. Провал миссии зависит от вашего низкого Навыка Интриги, от низкой Доблести, от отсутствия образования в Интриге и от того, являетесь ли вы Трусливым"
darkages_spymaster.08.tt3:0 "Вы оставляете своего родственника на произвол судьбы. Если вы Сострадательный, Справедливый, Честный или Лояльный, ваш Стресс увеличится"
darkages_spymaster.11.tt1:0 "Увеличит Стресс, если ваш персонаж не Циничный\n"
darkages_spymaster.09.t:0 "Слишком далеко"
darkages_spymaster.09.desc:0 "[spymaster.GetName] [Select_CString(spymaster.IsFemale, 'вернулась', 'вернулся')] из опасной миссии в землях [darkages_ruler.GetName], сообщив о гибели более половины спасательной команды и провале миссии.\n\nК сожалению, мне не удалось спасти [family.GetName]..."
darkages_spymaster.09.opta:0 "Это причиняет мне сильную боль..."
darkages_spymaster.10.t:0 "Успешное извлечение"
darkages_spymaster.10.desc:0 "Мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'прибыла', 'прибыл')] сегодня из опасной миссии, выполненной в землях [darkages_ruler.GetName], сообщив о огромном успехе!\n\nДействительно, [spymaster.GetName] [Select_CString(spymaster.IsFemale, 'смогла', 'смог')] спланировать и выполнить великую миссию, спася жизнь [family.GetName] и принеся Престиж мне и моей собственной Династии!"
darkages_spymaster.10.opta:0 "Отличная работа!"
darkages_spymaster.11.t:0 "Слишком далеко"
darkages_spymaster.11.desc1:0 "Рискованная миссия, которую я [Select_CString(ROOT.Char.IsFemale, 'спланировала и которой командовала', 'спланировал и которой командовал')] на территории [darkages_ruler.GetName], провалилась. Несколько человек из моего отряда погибли, но мне посчастливилось [Select_CString(ROOT.Char.IsFemale, 'избежать', 'избежать')] ранений. К сожалению, нам не удалось спасти [family.GetName]..."
darkages_spymaster.11.desc2:0 "Рискованная миссия, которую я [Select_CString(ROOT.Char.IsFemale, 'спланировала и которой командовала', 'спланировал и которой командовал')] на территории [darkages_ruler.GetName], провалилась. Некоторые из моего отряда погибли, и мне посчастливилось [Select_CString(ROOT.Char.IsFemale, 'отделаться', 'отделаться')] лишь легкими ранениями. К сожалению, нам не удалось спасти [family.GetName]..."
darkages_spymaster.11.desc3:0 "Рискованная миссия, которую я [Select_CString(ROOT.Char.IsFemale, 'спланировала и которой командовала', 'спланировал и которой командовал')] на территории [darkages_ruler.GetName], провалилась. Мой отряд понес значительные потери, и я [Select_CString(ROOT.Char.IsFemale, 'заплатила', 'заплатил')] значительную цену своей кровью. К сожалению, нам не удалось спасти [family.GetName]..."
darkages_spymaster.11.desc4:0 "Рискованная миссия, которую я [Select_CString(ROOT.Char.IsFemale, 'спланировала и которой командовала', 'спланировал и которой командовал')] на территории [darkages_ruler.GetName], провалилась. Большая часть моего отряда была уничтожена, и я [Select_CString(ROOT.Char.IsFemale, 'добралась', 'добрался')] до своей столицы едва [Select_CString(ROOT.Char.IsFemale, 'живой', 'живым')]. К сожалению, нам не удалось спасти [family.GetName]..."
darkages_spymaster.11.opta:0 "Личный провал..."
darkages_spymaster.12.t:0 "Живая легенда"
darkages_spymaster.12.desc1:0 "В ходе грандиозной акции я лично [Select_CString(ROOT.Char.IsFemale, 'командовала', 'командовал')] спасательным отрядом, который глубоко проник на территорию [darkages_ruler.GetName], чтобы спасти [family.GetName] от верной смерти.\n\nБолее того, все в отряде вернулись из такой опасной миссии невредимыми!"
darkages_spymaster.12.desc2:0 "В ходе грандиозной акции я лично [Select_CString(ROOT.Char.IsFemale, 'командовала', 'командовал')] спасательным отрядом, который глубоко проник на территорию [darkages_ruler.GetName], чтобы спасти [family.GetName] от верной смерти.\n\nВ отряде было потеряно несколько жизней, но я [Select_CString(ROOT.Char.IsFemale, 'отделалась', 'отделался')] лишь легкими ранениями в такой опасной миссии!"
darkages_spymaster.12.desc3:0 "В ходе грандиозной акции я лично [Select_CString(ROOT.Char.IsFemale, 'командовала', 'командовал')] спасательным отрядом, который глубоко проник на территорию [darkages_ruler.GetName], чтобы спасти [family.GetName] от верной смерти.\n\nМы понесли умеренные потери, и я [Select_CString(ROOT.Char.IsFemale, 'заплатила', 'заплатил')] значительную цену своей кровью в качестве платы за выполнение такой опасной миссии!"
darkages_spymaster.12.desc4:0 "В ходе грандиозной акции я лично [Select_CString(ROOT.Char.IsFemale, 'командовала', 'командовал')] спасательным отрядом, который глубоко проник на территорию [darkages_ruler.GetName], чтобы спасти [family.GetName] от верной смерти.\n\nПоловина моего отряда была уничтожена, и я [Select_CString(ROOT.Char.IsFemale, 'спаслась', 'спасся')], когда моя жизнь висела на волоске.\n\nТакова была цена за выполнение такой опасной миссии!"
darkages_spymaster.12.opta:0 "Какой героический поступок!"
darkages_intrusive_internal_security:0 "Навязчивая внутренняя безопасность"
darkages_internal_security:0 "Расширенная внутренняя безопасность"
darkages_internal_security_desc:0 "Внутренняя безопасность державы этого персонажа усилена и более компетентна, чем обычно"
darkages_spymaster.14.t:0 "Внутренняя безопасность"
darkages_spymaster.14.desc:0 "На личном брифинге на этой неделе мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'предупредила', 'предупредил')] меня, что внутренняя безопасность моей Державы вполне может быть улучшена, если я предоставлю необходимые средства для расширения списка информаторов в моих границах.\n\n[spymaster.GetFirstName] [Select_CString(spymaster.IsFemale, 'продолжила', 'продолжил')], заявив, что, хотя требуемая сумма значительна, моя безопасность должна быть в центре моей политики, и предоставленного золота хватит на покрытие расходов на период около 10 лет.\n\nЗная, что мои вассалы не будут рады большему вмешательству в их собственные домены, мы договорились, что я обдумаю этот вопрос и вскоре приму окончательное решение..."
darkages_spymaster.14.opta:0 "Расширить внутреннюю безопасность Державы"
darkages_spymaster.14.optb:0 "Отбросить эту идею"
darkages_spymaster.14.tt1:0 "Увеличение Стресса происходит, если ваш персонаж Параноик, Лживый, Черствый, Деспотичный или Нелояльный\n"
trait_darkages_hero:0 "Герой"
trait_darkages_hero_desc:1 "Другие смотрят на пример, поданный этим персонажем, и сдерживают свое благоговение"
trait_darkages_hero_character_desc:0 "Другие смотрят на пример, поданный [ROOT.GetCharacter.GetNameNoTooltip|d], и сдерживают свое благоговение"
trait_darkages_experienced_politician:0 "Хитрый политик"
trait_darkages_experienced_politician_desc:0 "Этот персонаж глубоко вник в тонкости политики и приобрел очень важный опыт в этом процессе"
trait_darkages_experienced_politician_character_desc:0 "[ROOT.GetCharacter.GetNameNoTooltip] глубоко [Select_CString(ROOT.Char.IsFemale, 'вникла', 'вник')] в тонкости политики и [Select_CString(ROOT.Char.IsFemale, 'приобрела', 'приобрел')] очень важный опыт в этом процессе"
darkages_death_heroic:0 "Погиб, совершая героический поступок"
darkages_hero.01.t:0 "Героический поступок"
darkages_hero.01.desc1:0 "Однажды, когда я [Select_CString(ROOT.Char.IsFemale, 'прогуливалась', 'прогуливался')] в компании [courtier.GetName], перед нами материализовалась тень с арбалетом в руке.\n\nС болтом, нацеленным в сердце моего бедного спутника, мой инстинкт немедленно подсказал мне, что это было покушение на [courtier.GetHerHis] жизнь..."
darkages_hero.01.desc2:0 "Однажды, когда я [Select_CString(ROOT.Char.IsFemale, 'прогуливалась', 'прогуливался')] вдоль большого пруда в компании [courtier.GetName], я [Select_CString(ROOT.Char.IsFemale, 'оставила', 'оставил')] [courtier.GetHerHim] на мгновение, и когда я [Select_CString(ROOT.Char.IsFemale, 'вернулась', 'вернулся')], то [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел')] моего бедного придворного в пруду, не умеющего плавать и яростно борющегося за то, чтобы вынырнуть на поверхность.\n\nГлядя на всю сцену, я [Select_CString(ROOT.Char.IsFemale, 'была уверена', 'был уверен')], что кто-то пытался убить [courtier.GetName]!\n\nНе умея плавать, я [Select_CString(ROOT.Char.IsFemale, 'стояла', 'стоял')] там, глядя на несчастную душу, тонущую в воде..."
darkages_hero.01.desc3:0 "Однажды, когда я [Select_CString(ROOT.Char.IsFemale, 'посещала', 'посещал')] башню, которая остро нуждалась в переделке, в компании [courtier.GetName], я [Select_CString(ROOT.Char.IsFemale, 'оставила', 'оставил')] [courtier.GetHerHim] на мгновение, и когда я [Select_CString(ROOT.Char.IsFemale, 'вернулась', 'вернулся')], то [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел')] моего бедного придворного, свисающего с зубцов балкона, ноги болтались в воздухе.\n\nПри ближайшем рассмотрении я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел')] убийцу [courtier.GetHerHis], мертвого в десяти метрах внизу на земле.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался')] помочь [courtier.GetName], но вскоре стало ясно, что попытка была очень рискованной, так как я тоже [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] упасть..."
darkages_hero.01.desc4:0 "Однажды, когда я [Select_CString(ROOT.Char.IsFemale, 'охотилась', 'охотился')] в компании [courtier.GetName], я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')] кого-то, скрывающегося среди деревьев с луком, направленным в сторону моего придворного.\n\nВ одно мгновение я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это было покушение на [courtier.GetHerHis] жизнь..."
darkages_hero.01.opta1:0 "Броситься между убийцей и моим придворным!"
darkages_hero.01.opta2:0 "Прыгнуть в воду и попытаться спасти моего придворного!"
darkages_hero.01.opta3:0 "Продолжать попытки спасти придворного, даже если я упаду!"
darkages_hero.01.opta4:0 "Броситься между убийцей и моим придворным!"
darkages_hero.01.optb:0 "Ничего не делать..."
darkages_hero.01.tt1:0 "Вы рискуете своей жизнью, чтобы спасти [courtier.GetName]"
darkages_spymaster.15.t:0 "Сладкая, манипулятивная ложь"
darkages_spymaster.15.desc:0 "На моем утреннем брифинге мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'обратила', 'обратил')] мое внимание на возможность проведения операции по подставе [framed.GetName], тем самым значительно снизив [framed.GetHerHis] Престиж и, что самое важное, настроив [framed.GetHerHis] вассалов против [framed.GetHerHim] самого.\n\nХотя план оказывается дорогостоящим, нанесенный ущерб может стать прелюдией к более прямым средствам атаки и, вероятно, вызовет множество проблем у правителя.\n\nЗная, что нет никакой уверенности до начала миссии, я [Select_CString(ROOT.Char.IsFemale, 'стою', 'стою')] перед дилеммой: санкционировать операцию или нет..."
darkages_spymaster.15.opta:0 "Санкционировать операцию!"
darkages_spymaster.15.optb:0 "Лучше избегать ненужных рисков..."
darkages_spymaster.15.tt2:0 "Если ваш персонаж Лживый, Черствый, Садист, Деспотичный или Интриган, при выборе этого варианта налагается штраф к Стрессу\n"
darkages_spymaster.15.tt1:0 "Этот вариант проверяет только навыки, характеристики и свойства [spymaster.GetCouncilTitle|d]. На успех этого варианта отрицательно влияют средний или низкий Навык Интриги, отсутствие образования в Интриге, то, что он Тупой, Справедливый, Честный, Медлительный, Лояльный, Глупый или Имбецил. Положительно влияет высокий Навык Интриги, то, что он Лживый, Деспотичный, Нелояльный или Интриган\n"
darkages_reason_rival_framed:0 "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsFemale, 'разозлила', 'разозлил')] [CHARACTER.GetShortUIName|U], пытаясь подставить [TARGET_CHARACTER.GetHerHim]."
darkages_spymaster.16.t:0 "Опасный провал"
darkages_spymaster.16.desc:0 "Мои попытки подставить [framed.GetName] потерпели окончательную неудачу, когда [framed.GetHerHis] Тайный советник [Select_CString(framed.GetSpymaster.IsFemale, 'сумела', 'сумел')] выяснить, кто стоял за заговором.\n\nКак только [framed.GetSheHe] [Select_CString(framed.IsFemale, 'узнала', 'узнал')] о происходящем, [framed.GetFirstName] [Select_CString(framed.IsFemale, 'стремилась', 'стремился')] разоблачить меня перед [framed.GetHerHis] кругом общения, и план моего [spymaster.GetCouncilTitle|d] был сорван..."
darkages_spymaster.16.opta:0 "Я даже [Select_CString(ROOT.Char.IsFemale, 'нажила', 'нажил')] нового соперника..."
darkages_opinion_framed:0 "Подстава!"
darkages_framed:0 "Подставлен!"
darkages_framed_desc:0 "Этого персонажа подставили, и его социальные навыки сильно страдают"
darkages_spymaster.17.t:0 "Разрушенная репутация!"
darkages_spymaster.17.desc:0 "План моего [spymaster.GetCouncilTitle|d] подставить [framed.GetName] увенчался полным успехом, и теперь [framed.GetSheHe] ощущает все последствия для [framed.GetHerHis] репутации.\n\nНа данный момент [framed.GetHerHis] круг общения относится к [framed.GetName] как к изгою!"
darkages_spymaster.17.opta:0 "Поздравления моему дорогому [spymaster.GetFirstName|d]!"
darkages_spymaster.19.t:0 "Неудачная попытка"
darkages_spymaster.19.desc:0 "[spymaster.GetName], мой доблестный [spymaster.GetCouncilTitle], вовремя [Select_CString(spymaster.IsFemale, 'предупредила', 'предупредил')] меня, что сложная операция по моей подставе проводится по приказу не кого иного, как [darkages_schemer.GetName].\n\nЯ быстро [Select_CString(ROOT.Char.IsFemale, 'собрала', 'собрал')] свой Совет, свой Двор и своих Вассалов, чтобы предупредить их о гнусном заговоре.\n\nК счастью, все закончилось хорошо благодаря усилиям моего [spymaster.GetCouncilTitle|d]!"
darkages_spymaster.21.desc:0 "Мои собственные внутренние чувства и тонкая интуиция направили расследование попытки вызвать мой социальный позор.\n\nПомимо оглушительного успеха моих поисков, я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] точно определить организатора такого гнусного деяния.\n\nЭто был не кто иной, как подлый [darkages_schemer.GetName]!\n\nЯ быстро [Select_CString(ROOT.Char.IsFemale, 'собрала', 'собрал')] свой Совет, свой Двор и своих Вассалов, чтобы предупредить их об этом деле."
darkages_spymaster.19.opta:0 "Великолепно выполненная работа!"
darkages_spymaster.19.optb:0 "Я хочу крови этого негодяя!"
darkages_spymaster.20.desc:0 "Отстраненные взгляды, скомпрометированные фразы, дистанция, которую все держат от меня, шепотки за моей спиной...\n\nМне потребовалось некоторое время, но теперь я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')], что сложный заговор с целью клеветы был спланирован против меня, и, к сожалению, он увенчался успехом!\n\nМеня подставили ложью того, кто стоит в тени, ожидая времени для удара..."
darkages_spymaster.20.t:0 "Подстава!"
darkages_spymaster.20.opta:0 "Черт!"
darkages_spymaster.18.t:0 "Серьезное предупреждение"
darkages_spymaster.18.desc:0 "Мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'прибыла', 'прибыл')] сегодня на внутренний Совет и [Select_CString(spymaster.IsFemale, 'настояла', 'настоял')] на обсуждении вопроса только с [spymaster.GetHerHim].\n\nВ настоящее время неизвестным агентом разрабатывается заговор с целью опорочить и подставить меня, тем самым вызвав хаос в моих личных отношениях.\n\nОсобую озабоченность вызовет реакция моих Вассалов, поскольку баланс сил в моей Державе может резко измениться.\n\nЗная, что у моего [spymaster.GetCouncilTitle|d] еще есть время предотвратить ужасное деяние, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] быть начеку, чтобы не случилось худшего."
darkages_spymaster.18.opta:0 "Предоставить дополнительные средства для расследования"
darkages_spymaster.18.optb:0 "Довериться имеющимся ресурсам у [spymaster.GetFirstName|d]"
darkages_spymaster.18.optc:0 "Взять расследование в свои руки"
darkages_spymaster.18.tt2:0 "Успех этого варианта зависит от Навыка Интриги вашего [spymaster.GetCouncilTitle|d] и от того, является ли [spymaster.GetSheHe] Интриганом. Ваши Вассалы, Придворные и Гости станут осторожны в отношении проводимого расследования\n"
darkages_spymaster.18.tt1:0 "Благодаря вашему жесткому контролю финансов для этой операции, вы сэкономите драгоценное золото. Успех этого варианта зависит от вашего Навыка Интриги и от того, являетесь ли вы Интриганом. Остерегайтесь любых положительных или отрицательных эффектов, влияющих больше, чем в первом варианте. Ваши Вассалы, Придворные и Гости станут осторожны в отношении проводимого расследования\n"
darkages_marshal.01.tt1:0 "Положительно на успех этого действия влияют высокая Ученость, наличие черт Терпеливый, Прилежный, Ученый, а также Сообразительный, Интеллектуал или Гениальный. Отрицательно влияет на успех этого варианта низкий Навык Учености, наличие черт Нетерпеливый, Ленивый, Медлительный, Глупый или Имбецил\n"
darkages_marshal.01.t:0 "Шанс научиться"
darkages_marshal.01.desc:0 "Недавно мой [marshal.GetCouncilTitle] [Select_CString(marshal.IsFemale, 'выступила', 'выступил')] с идеей нанять очень талантливого человека, чтобы обучить некоторых из нас в моей Державе искусству партизанской войны.\n\nТеперь самое важное то, что я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] посещать весь курс, тем самым улучшая свои навыки в этом конкретном виде войны.\n\nКонечно, если я не смогу усвоить предмет, я произведу плохое впечатление, которое вскоре станет достоянием общественности.\n\nВ конце концов, чтобы защитить свой статус, я либо откажусь финансировать курс для всех, либо приму и буду участвовать во всем этом начинании..."
darkages_marshal.01.optb:0 "Отказаться финансировать курс"
darkages_marshal.01.opta:0 "Организовать курс"
darkages_marshal_guerrilla:0 "Партизанская тактика"
darkages_marshal_guerrilla_desc:0 "Этот персонаж глубоко понимает партизанскую войну"
darkages_marshal.02.t:0 "Усвоенные уроки"
darkages_marshal.02.desc:0 "Благодаря идее [marshal.GetName] - моего преданного [marshal.GetCouncilTitle|d] - и моей преданности учебе за последние месяцы я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] изучить все тонкости партизанской войны и теперь могу применять полученные знания в реальных условиях.\n\nВ конце концов, хотя я [Select_CString(ROOT.Char.IsFemale, 'рисковала', 'рисковал')] своим золотом и своим Престижем, этот проект имел огромный успех!"
darkages_marshal.02.opta:0 "Отлично!"
darkages_marshal.03.tt1:0 "Помимо ударов по Престижу и Стрессу, все Советники и Вассалы, которые не являются Сострадательными или Прощающими, будут не впечатлены вашей неспособностью узнать о партизанской войне\n"
darkages_marshal.03.t:0 "Пятно на ваших военных знаниях"
darkages_marshal.03.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'посещала', 'посещал')] учебные занятия по партизанской войне, но не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] понять ее ключевые концепции.\nВ конце концов стало ясно, что предмет ускользнул от меня..."
darkages_marshal.03.opta:0 "К сожалению, это был мрачный провал..."
darkages_marshal.04.t:0 "Продвинутые центры вербовки"
darkages_marshal.04.desc:0 "[marshal.GetName], мой предприимчивый [marshal.GetCouncilTitle], вчера [Select_CString(marshal.IsFemale, 'предложила', 'предложил')] план увеличения количества ополченцев в моем распоряжении сроком на 10 лет.\n\nЭто означает авансовые инвестиции в центры вербовки, находящиеся на землях моих вассалов, для выплаты премии, которая привлечет больше людей в мою армию.\n\nПоскольку дело находится в руках [marshal.GetFirstName], и зная, что это усилие может затронуть чувствительную струну моих вассалов, я могу только надеяться, что [marshal.GetSheHe] справится хорошо..."
darkages_marshal.04.opta:0 "Действуй по плану, [marshal.GetFirstName]!"
darkages_marshal.04.optb:0 "Лучше не донимать моих вассалов"
darkages_marshal.02.tt1:0 "Успех этого действия будет зависеть только от способностей вашего [marshal.GetCouncilTitle|d]. На него положительно влияют [marshal.GetHerHis] высокие Навыки Военного дела и Дипломатии, а также наличие некоторого Ужаса. Отрицательно влияет средний или низкий Навык Военного дела или низкий Навык Дипломатии\n"
darkages_marshal_levies:0 "Обширные центры вербовки"
darkages_marshal_levies_desc:0 "У этого персонажа есть обширные центры вербовки на землях вассалов"
darkages_opinion_irritated:0 "Раздражение"
darkages_marshal.05.t:0 "Великолепное выступление"
darkages_marshal.05.desc:0 "[marshal.GetName] [Select_CString(marshal.IsFemale, 'смогла', 'смог')] убедить моих вассалов в благих намерениях наших действий, и в сложившейся ситуации в моем распоряжении будет гораздо большая база новобранцев, чем в прошлом, на следующие десять лет!"
darkages_marshal.05.opta:0 "Отличная работа, [marshal.GetCouncilTitle]!"
darkages_marshal.06.t:0 "Выходки моего [marshal.GetCouncilTitle|d]"
darkages_marshal.06.desc:0 "[marshal.GetName] с треском [Select_CString(marshal.IsFemale, 'провалилась', 'провалился')] в убеждении моих вассалов в благих намерениях наших действий.\n\nПо сути, [marshal.GetSheHe] [Select_CString(marshal.IsFemale, 'наломала', 'наломал')] дров в общении со всеми, действуя опрометчиво и порой бессмысленно.\n\nВ конце концов, мнение моих вассалов обо мне пострадало..."
darkages_marshal.06.opta:0 "Дорогостоящая ошибка!"
darkages_marshal.07.t:0 "Уроки войны"
darkages_marshal.07.desc:0 "На вчерашней встрече [marshal.GetName], мой полезный [marshal.GetCouncilTitle], [Select_CString(marshal.IsFemale, 'предложила, что она могла бы', 'предложил, что он мог бы')] научить меня [marshal.GetHerHis] ремеслу, тем самым лучше подготовив меня к военной жизни, если я буду проводить время каждый день рядом с [marshal.GetHerHim], пока [marshal.GetSheHe] выполняет свою работу.\n\nПомимо зависти других советников, предложение заманчиво, но, безусловно, проводя с [marshal.GetHerHim] так много времени, я буду пренебрегать другими областями управления моей Державой..."
darkages_opinion_envy:0 "Зависть"
darkages_marshal.07.opta:0 "Погрузиться в военные дела"
darkages_marshal.07.optb:0 "Отказаться от предложения [marshal.GetCouncilTitle|d]"
darkages_marshal.07.tt1:0 "Ваш отказ создает неловкую рабочую атмосферу между вами и вашим [marshal.GetCouncilTitle|d], что приводит к трудностям в вашем стремлении к знаниям в военных вопросах\n" 
darkages_marshal_martial_focus:0 "Военный фокус"
darkages_marshal_martial_focus_desc:0 "Этот персонаж тратит значительное количество времени на изучение военных вопросов в ущерб другим областям"
darkages_marshal.08.t:0 "Лучшие из лучших"
darkages_marshal.08.desc:0 "Мой предприимчивый [marshal.GetCouncilTitle] [Select_CString(marshal.IsFemale, 'поделилась', 'поделился')] со мной идеей, которая пришла [marshal.GetHerHim] в голову по поводу улучшения моих менее эффективных $knight_culture_player_plural_no_tooltip$ и их свит.\n\nВ своем предложении [marshal.GetName] [Select_CString(marshal.IsFemale, 'сказала', 'сказал')] мне, что [marshal.GetSheHe] предоставит интенсивные теоретические знания $knight_culture_player_plural_no_tooltip$ и их свитам в течение одного месяца, надеясь улучшить их Доблесть.\n\nКонечно, учитывая характер предмета, Навык Учености каждого $knight_culture_player_no_tooltip$ будет проверен, чтобы увидеть, насколько эффективным стало обучение.\n\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] принять решение дать зеленый свет обучению, так как это будет стоить значительного количества ресурсов."
darkages_marshal.08.opta:0 "Согласиться предоставить средства"
darkages_marshal.08.optb:0 "Не поддерживать идею"
darkages_marshal.08.tt1:0 "Все ваши $knight_culture_player_plural_no_tooltip$ с Доблестью менее 17 получат шанс улучшить ее, на что влияет их Навык Учености\n"
darkages_marshal.09.t:0 "Обучение завершено"
darkages_marshal.09.desc:0 "Интенсивное обучение почти завершено, и я могу проверить свои кадры $knight_culture_player_plural_no_tooltip$, чтобы увидеть, как каждый из них улучшился..."
darkages_marshal.09.opta:0 "Увидеть их в деле"
darkages_marshal.09.tt1:0 "Нажав на опцию, вы можете проверить, насколько улучшился каждый из $knight_culture_player_plural_no_tooltip$\n"
darkages_lack_of_cohesive_strength:0 "Нехватка сплоченной силы"
darkages_lack_of_cohesive_strength_desc:0 "Армии, которыми командует этот персонаж, не образуют единого целого с военным навыком этого персонажа"
darkages_marshal.10.t:0 "Нехватка сплоченности"
darkages_marshal.10.desc:0 "Мой [marshal.GetCouncilTitle] сообщает, что моим войскам не хватает подготовки с нынешними командирами в державе.\n\nЭто приведет к значительному ухудшению эффективности на поле боя, если ими будут командовать нынешние генералы, включая меня.\n\nЕсли я захочу, я могу исправить эту ситуацию, устроив сложные и дорогостоящие маневры со всеми участниками."
darkages_marshal.10.opta:0 "Оплатить маневры"
darkages_marshal.10.optb:0 "Позволить боевым стандартам снизиться"
darkages_opinion_county_building_investments:0 "Инвестиции в строительство"
darkages_opinion_county_building_investments_desc:0 "В этом графстве было выделено очень значительное количество строительной инфраструктуры"
darkages_steward.01.tt1:0 "Положительно на исход этого варианта влияют хороший Навык Управления [steward.GetCouncilTitle|d] и наличие у [steward.GetHerHim] черты Архитектор. Отрицательно на исход этого варианта влияют средний или низкий Навык Управления [steward.GetCouncilTitle|d] и отсутствие образования в Управлении\n"
darkages_steward.01.tt2:0 "Правитель может вдохновиться идеями и планами [steward.GetCouncilTitle|d] и реализовать все, основываясь на созданном видении. В этом случае и в случае успеха следует ожидать увеличения Престижа и Признания. Положительно на исход этого варианта влияют хороший Навык Управления Правителя и наличие у него черты Архитектор. Отрицательно на исход этого варианта влияют низкий Навык Управления Правителя и отсутствие образования в Управлении\n"
darkages_steward.01.t:0 "Великий план строительства"
darkages_steward.01.desc:0 "Сегодня к середине утра ко мне [Select_CString(steward.IsFemale, 'подошла', 'подошел')] мой [steward.GetCouncilTitle] с радикальной идеей реализовать план по развитию основных фундаментов, чтобы обеспечить графства моего Домена основой для специального строительства новой инфраструктуры там.\n\nПо сути, следуя [steward.GetHerHis] рекомендациям, я могу инвестировать сейчас значительную сумму золота, чтобы получить более низкие затраты на строительство в течение следующих десяти лет в моих графствах.\n\nКонечно, все будет зависеть от умения [steward.GetName] провернуть весь этот трюк... или, возможно, взяв страницу из оригинальных планов, это будет зависеть от моих собственных навыков и черт!"
darkages_steward.01.opta:0 "Я попрошу [steward.GetFirstName|d] реализовать этот план"
darkages_steward.01.optb:0 "Я реализую этот план"
darkages_steward.01.optc:0 "Я упущу эту возможность"
darkages_steward.02.t:0 "Успешный план"
darkages_steward.02.desc:0 "Изобретательность моего [steward.GetCouncilTitle|d] привела к тому, что [steward.GetHerHis] план по развитию инфраструктуры моего Домена имел огромный успех!\n\nТеперь мне предстоит воспользоваться результатами усилий [steward.GetName]!"
darkages_steward.02.opta:0 "Блестяще!"
darkages_steward.03.t:0 "Огромное разочарование"
darkages_steward.03.desc:0 "Мой [steward.GetCouncilTitle] с треском [Select_CString(steward.IsFemale, 'провалилась', 'провалился')] в планировании и реализации масштабной инфраструктурной операции, которую [steward.GetSheHe] [Select_CString(steward.IsFemale, 'курировала', 'курировал')] для моего Домена.\n\nЗначительные ресурсы были растрачены впустую, время потеряно, и мое терпение по отношению к [steward.GetName] становится все тоньше и тоньше..."
darkages_steward.03.opta:0 "Проклятье!"
darkages_steward.04.t:0 "Успешный план"
darkages_steward.04.desc:0 "Взяв на себя план моего [steward.GetCouncilTitle|d], я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провел')] следующие недели, усердно организуя всё для развития инфраструктуры моего Домена.\n\nВ конце концов, я [Select_CString(ROOT.Char.IsFemale, 'добилась', 'добился')] полного успеха, и теперь могу пожинать лавры своей победы..."
darkages_steward.04.opta:0 "Отличные новости!"
darkages_steward.05.t:0 "Жалкий провал"
darkages_steward.05.desc:0 "Взяв на себя план моего [steward.GetCouncilTitle|d], я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провел')] следующие недели, пытаясь организовать всё для развития инфраструктуры моего Домена.\n\nК сожалению, я не [Select_CString(ROOT.Char.IsFemale, 'справилась', 'справился')] с задачами, и все ресурсы, вложенные в этот план, были потрачены впустую..."
darkages_steward.05.opta:0 "Какая потеря..."
darkages_tax_plan1:0 "Эффективный налоговый план"
darkages_tax_plan1_desc:0 "У этого персонажа в Домене действует разумный налоговый план, и населению потребуется некоторое время, чтобы найти новые, творческие способы избежать части налогообложения"
darkages_tax_plan2:0 "Эффективный налоговый план"
darkages_tax_plan2_desc:0 "У этого персонажа в Домене действует разумный налоговый план, и населению потребуется некоторое время, чтобы найти новые, творческие способы избежать части налогообложения"
darkages_tax_plan3:0 "Эффективный налоговый план"
darkages_tax_plan3_desc:0 "У этого персонажа в Домене действует разумный налоговый план, и населению потребуется некоторое время, чтобы найти новые, творческие способы избежать части налогообложения"
darkages_tax_plan4:0 "Эффективный налоговый план"
darkages_tax_plan4_desc:0 "У этого персонажа в Домене действует разумный налоговый план, и населению потребуется некоторое время, чтобы найти новые, творческие способы избежать части налогообложения"
darkages_tax_plan5:0 "Эффективный налоговый план"
darkages_tax_plan5_desc:0 "У этого персонажа в Домене действует разумный налоговый план, и населению потребуется некоторое время, чтобы найти новые, творческие способы избежать части налогообложения"
darkages_steward.06.t:0 "Улучшенный план налогообложения"
darkages_steward.06.desc:0 "Мой верный [steward.GetCouncilTitle], [steward.GetName], недавно [Select_CString(steward.IsFemale, 'представила', 'представил')] мне тщательно разработанный и разумный план по улучшению налогообложения моего Домена.\n\nЗная, что это будет стоить мне чего-то авансом, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, реализовать ли план, могу ли я улучшить его, углубившись в этот вопрос [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')], но рискуя начальным золотом, или же воспользоваться им, изучив этот шедевр, чтобы помочь улучшить свое Управление..."
darkages_steward.06.desc2:0 "Мой верный [steward.GetCouncilTitle], [steward.GetName], недавно [Select_CString(steward.IsFemale, 'представила', 'представил')] мне тщательно разработанный и разумный план по улучшению налогообложения моего Домена.\n\nЗная, что это будет стоить мне чего-то авансом, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, реализовать ли план, или я [Select_CString(ROOT.Char.IsFemale, 'могу', 'могу')] улучшить его, углубившись в этот вопрос [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')], но рискуя начальным золотом, или же категорически отказаться от идеи..."
darkages_steward.06.opta:0 "Реализовать его"
darkages_steward.06.optb:0 "Улучшить его"
darkages_steward.06.optc:0 "Изучить его"
darkages_steward.06.optd:0 "Отказаться от идеи"
darkages_steward.06.tt1:0 "Возможные штрафы к Стрессу, даваемые чертами, представляют собой отказ от двух предыдущих выборов в этом событии. Конечно, если ваш персонаж получил образование в Учености, занятие теоретическими исследованиями будет очень кстати\n"
darkages_steward.06.tt2:0 "Возможные штрафы к Стрессу, даваемые чертами, представляют собой отказ от первых двух выборов в этом событии. Конечно, бездействие может быть полезно для вашего Стресса, если вы Ленивый, Глупый или Сдержанный\n"
darkages_steward.07.t:0 "Специальный налог"
darkages_steward.07.desc:0 "[steward.GetName], мой важный [steward.GetCouncilTitle], [Select_CString(steward.IsFemale, 'представила', 'представил')] мне сегодня предложение ввести специальный налог, который должны будут платить мои подданные в моем Домене, что принесет очень значительную сумму золота в мою казну через несколько месяцев.\n\nОднако этот налог далек от разумного, и можно ожидать сопротивления сборщикам в моих графствах.\n\nИмея заверения, что я могу даже потребовать собрать больше, чем первоначально [Select_CString(steward.IsFemale, 'планировала', 'планировал')] мой [steward.GetCouncilTitle], я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] принять решение, как действовать..."
darkages_steward.07.opta:0 "Реализовать первоначальный план"
darkages_steward.07.optb:0 "Потребовать еще больше"
darkages_steward.07.optc:0 "Отказаться от всего плана"
darkages_opinion_county_special_tax_1:0 "Суровый специальный налог"
darkages_opinion_county_special_tax_1_desc:0 "С этого графства взимался болезненный специальный налог. Население далеко не в восторге."
darkages_opinion_county_special_tax_2:0 "Вопиющий специальный налог"
darkages_opinion_county_special_tax_2_desc:0 "С этого графства взимался непомерный специальный налог. Население далеко не в восторге."
darkages_steward.08.t:0 "Отчет о специальном налоге"
darkages_steward.08.desc:0 "Мое состояние значительно выросло благодаря тому, что за него заплатили мои подданные. В целом, у меня больше золота, чтобы тратить его так, как я считаю нужным!"
darkages_steward.08.opta:0 "Хороший источник дохода!"
darkages_opinion_county_major_relief_efforts:0 "Крупные усилия по оказанию помощи"
darkages_opinion_county_major_relief_efforts_desc:0 "После сильного наводнения, затронувшего это графство, его Правитель решил реализовать комплексный план помощи населению"
darkages_steward.09.optb:0 "Мои крестьяне сами о себе позаботятся"
darkages_steward.09.opta:0 "Приказать [steward.GetFirstName|d] реализовать план"
darkages_steward.09.t:0 "Катастрофическое наводнение"
darkages_steward.09.desc:0 "В течение последнего месяца мой Домен находился под проливными дождями, которые вызвали катастрофические наводнения и крупное социальное бедствие, как показывает Контроль над моими графствами.\n\nК сожалению, дороги были разрушены, дома и правительственные здания уничтожены, ополчение, обеспечивавшее местную безопасность, было уничтожено, а финансовые потери для всего населения были огромными.\n\nМой [steward.GetCouncilTitle] [Select_CString(steward.IsFemale, 'разработала', 'разработал')] план помощи, который поможет пострадавшим общинам и снова восстановит подобие порядка в моем Домене. Что я буду делать?"
darkages_opinion_county_major_development:0 "Крупные инфраструктурные усилия"
darkages_opinion_county_major_development_desc:0 "Это графство реализует план по увеличению своего развития, привлекая большое количество крестьян в свою столицу"
darkages_steward.10.t:0 "План развития"
darkages_steward.10.desc:0 "За последние месяцы я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], что мой [steward.GetCouncilTitle] [Select_CString(steward.IsFemale, 'лоббировала', 'лоббировал')] в Совете предварительный план, который [steward.GetSheHe] [Select_CString(steward.IsFemale, 'разрабатывала', 'разрабатывал')] для улучшения моего Домена, и который включает области, где каждый из моих советников будет иметь право голоса.\n\nТеперь, когда план представлен, я [Select_CString(ROOT.Char.IsFemale, 'нахожу', 'нахожу')], что он включает в себя множество факторов и переменных, которые вместе обеспечивают прочную основу, которая очень поможет в развитии моего Домена.\n\nЗная, что весь Совет жаждет реализовать план, но что у него будет своя цена, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что делать."
darkages_steward.10.opta:0 "Приказать Совету реализовать план"
darkages_steward.10.optb:0 "Отказаться от всей идеи"
darkages_court_chaplain_toast_a.1.t:0 "Улучшение навыка"
darkages_court_chaplain_toast_a.1.tt:0 "[religious.GetFirstName] [Select_CString(religious.IsFemale, 'помогла', 'помог')] вам увеличить соответствующий Навык на 1"
darkages_court_chaplain_toast_c.1.t:0 "Значительное улучшение навыка"
darkages_court_chaplain_toast_c.1.tt:0 "[religious.GetFirstName] [Select_CString(religious.IsFemale, 'помогла', 'помог')] вам увеличить соответствующий Навык на 2"
darkages_court_chaplain_toast_b.1.t:0 "Неудача в обучении"
darkages_court_chaplain_toast_b.1.tt:0 "Под опекой [religious.GetFirstName|d] вы не смогли улучшить соответствующий Навык. Ваш Престиж страдает."
darkages_court_chaplain.01.t:0 "Наставник"
darkages_court_chaplain.01.desc1:0 "Мой верный [religious.GetCouncilTitle], [religious.GetName], [Select_CString(religious.IsFemale, 'выступила', 'выступил')] с предложением помочь мне узнать больше о Дипломатии.\n\nЭто означает расширение моей библиотеки, так как мои книги в настоящее время не охватывают предмет полностью..."
darkages_court_chaplain.01.desc2:0 "Мой верный [religious.GetCouncilTitle], [religious.GetName], [Select_CString(religious.IsFemale, 'выступила', 'выступил')] с предложением помочь мне узнать больше о Военном деле.\n\nЭто означает расширение моей библиотеки, так как мои книги в настоящее время не охватывают предмет полностью..."
darkages_court_chaplain.01.desc3:0 "Мой верный [religious.GetCouncilTitle], [religious.GetName], [Select_CString(religious.IsFemale, 'выступила', 'выступил')] с предложением помочь мне узнать больше об Управлении.\n\nЭто означает расширение моей библиотеки, так как мои книги в настоящее время не охватывают предмет полностью..."
darkages_court_chaplain.01.desc4:0 "Мой верный [religious.GetCouncilTitle], [religious.GetName], [Select_CString(religious.IsFemale, 'выступила', 'выступил')] с предложением помочь мне узнать больше об Интригах.\n\nЭто означает расширение моей библиотеки, так как мои книги в настоящее время не охватывают предмет полностью..."
darkages_court_chaplain.01.desc5:0 "Мой верный [religious.GetCouncilTitle], [religious.GetName], [Select_CString(religious.IsFemale, 'выступила', 'выступил')] с предложением помочь мне узнать больше об Общих знаниях.\n\nЭто означает расширение моей библиотеки, так как мои книги в настоящее время не охватывают предмет полностью..."
darkages_court_chaplain.01.opta:0 "Углубиться в детали предмета"
darkages_court_chaplain.01.optb:0 "Отклонить предложение"
darkages_opinion_county_religious_militia:0 "Религиозное ополчение"
darkages_opinion_county_religious_militia_desc:0 "В этом графстве создано религиозное ополчение"
darkages_court_chaplain.02.t:0 "Религиозное ополчение"
darkages_court_chaplain.02.desc:0 "Две недели назад мой [religious.GetCouncilTitle] [Select_CString(religious.IsFemale, 'представила', 'представил')] мне идею создания религиозного ополчения в моем Домене, которому будет поручено обеспечивать строгое соблюдение догматов веры.\n\nСтолкнувшись с противодействием всех остальных советников, [religious.GetName] [Select_CString(religious.IsFemale, 'защищала', 'защищал')] [religious.GetHerHis] план, указывая на повышение уровня Контроля, которого можно достичь, если такая мера будет принята.\n\nТеперь мне решать..."
darkages_court_chaplain.02.opta:0 "Реализовать эту идею"
darkages_court_chaplain.02.optb:0 "Этого не произойдет"
darkages_court_chaplain.03.t:0 "Духовное уединение"
darkages_court_chaplain.03.desc:0 "Вчера мой верный [religious.GetCouncilTitle] [Select_CString(religious.IsFemale, 'предстала', 'предстал')] передо мной, предлагая обеспечить святое руководство и глубокое созерцание в духовном уединении, которое продлится несколько недель в течение следующих месяцев.\n\n[religious.GetName] [Select_CString(religious.IsFemale, 'была непреклонна', 'был непреклонен')] в том, что настало время очистить себя от любых греховных мыслей, которые позже отразятся на моих делах.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] начать с того, что внесу свой вклад в религиозную работу в моем Домене, предоставив значительную сумму золота.\n\nТеперь мне решать, что я буду делать."
darkages_court_chaplain.03.opta:0 "Пройти духовное уединение"
darkages_court_chaplain.03.optb:0 "У меня есть более важные дела"
darkages_court_chaplain.03.tt1:0 "Успех духовного уединения зависит от очень высокого уровня Учености [religious.GetCouncilTitle|d], от высокой Учености персонажа и от того, является ли он Спокойным, Терпеливым или Упрямым. Отрицательно влияют на шансы успеха низкая Ученость персонажа и то, что он Переменчивый, Нетерпеливый или Гневный\n"
darkages_spiritual_retreat_positive:0 "В гармонии с собой"
darkages_spiritual_retreat_positive_desc:0 "Благодаря руководству и внутреннему миру, обеспечиваемому духовным уединением, этот персонаж вдохновлен на совершение великих дел"
darkages_spiritual_retreat_negative:0 "Духовное расстройство"
darkages_spiritual_retreat_negative_desc:0 "Этот персонаж очень расстроен из-за того, что духовное уединение не смогло успокоить душу"
darkages_court_chaplain.04.t:0 "Благодатное духовное уединение"
darkages_court_chaplain.04.desc:0 "Мое духовное уединение имело большой успех, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] поздравить моего доброго [religious.GetCouncilTitle|d] с тем, что [Select_CString(religious.IsFemale, 'она провела', 'он провел')] меня через мои грехи, кошмары и внутренние сомнения, пока я не [Select_CString(ROOT.Char.IsFemale, 'достигла', 'достиг')] полного понимания [Select_CString(ROOT.Char.IsFemale, 'самой', 'самого')] себя и своего положения в мире.\n\nС обновленной верой теперь мне предстоит продолжить свой жизненный путь, живя так, как учил нас Бог!"
darkages_court_chaplain.04.opta:0 "Я греюсь в свете Божьем!"
darkages_court_chaplain.05.t:0 "Тревожное духовное уединение"
darkages_court_chaplain.05.desc:0 "Совершая духовное уединение с [religious.GetName], я [Select_CString(ROOT.Char.IsFemale, 'искала', 'искал')] духовного руководства, но [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашел')] пустоту, я [Select_CString(ROOT.Char.IsFemale, 'искала', 'искал')] внутреннего мира, но не [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал')] его, и я [Select_CString(ROOT.Char.IsFemale, 'искала', 'искал')] духовного прозрения, но [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашел')] пелену тьмы над своим сердцем.\n\nК сожалению, уединение было большой ошибкой, и теперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] жить, мучаясь своими сомнениями и неудачами..."
darkages_court_chaplain.05.opta:0 "Так жаль..."
darkages_nick_the_charitable:0 "Милосердный"
darkages_court_chaplain.06.t:0 "Милостыня для бедных"
darkages_court_chaplain.06.desc:0 "[religious.GetFirstName], мой надежный [religious.GetCouncilTitle], [Select_CString(religious.IsFemale, 'вынашивала', 'вынашивал')] свой любимый проект, который по своей сути будет финансировать сеть организаций по всему моему Домену, которые попытаются улучшить участь беднейших на моих землях.\n\nПоскольку стоимость будет расти вместе с размером моего Домена, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] тщательно проанализировать весь счет, чтобы увидеть, стоит ли финансирование этой сети в течение 10 лет..."
darkages_court_chaplain.06.opta:0 "Финансировать"
darkages_court_chaplain.06.optb:0 "Не финансировать"
darkages_opinion_county_welfare_network:0 "Сеть благосостояния"
darkages_opinion_county_welfare_network_desc:0 "В этом графстве есть сеть благосостояния для помощи нуждающимся"
darkages_court_chaplain.07.t:0 "Золото за Благочестие"
darkages_court_chaplain.07.desc:0 "Мой благочестивый [religious.GetCouncilTitle] недавно [Select_CString(religious.IsFemale, 'пришла', 'пришел')] ко мне, чтобы поделиться планами, которые [religious.GetHerHis] религиозные коллеги по всему миру имеют относительно улучшения наших Святых мест.\n\nВ настоящее время каждый правитель нашей веры должен внести определенное количество золота для финансирования строительства более внушительных сооружений.\n\nТеперь вопрос в том, как мне поступить?"
darkages_court_chaplain.07.opta:0 "Предоставить запрошенное золото"
darkages_court_chaplain.07.optb:0 "Пожертвовать больше, чем требовалось"
darkages_court_chaplain.07.optc:0 "Отказаться предоставить золото"
darkages_spouse_angry:0 "Разгневанный супруг"
darkages_spouse_angry_desc:0 "Супруг этого персонажа обусловливает его действия сейчас и в будущем из-за серьезной ссоры"
darkages_spouse.01.t:0 "Разгневанный супруг"
darkages_spouse.01.desc:0 "Пока мы оба нежились в постели ранним утром, [spouse.GetName] [Select_CString(spouse.IsFemale, 'прошептала', 'прошептал')] мне на ухо очень плохие вещи об одном из моих придворных, [courtier.GetName].\n\nПока [spouse.GetSheHe] [Select_CString(spouse.IsFemale, 'сеяла', 'сеял')] семена ненависти, я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что [spouse.GetHerHis] план состоит в том, чтобы соблазнительно умолять меня немедленно уволить придворного, который, к сожалению, [Select_CString(courtier.IsFemale, 'навлекла', 'навлек')] на себя [spouse.GetHerHis] гнев.\n\nЗная, что это решение повлечет за собой политические последствия, среди прочего, для моих советников, которые не будут смотреть на меня благосклонно, если я уступлю произвольным требованиям моего супруга, мне нужно будет принять решение об этом непредвиденном вызове..."
darkages_spouse.01.opta:0 "Уступить просьбе супруга"
darkages_spouse.01.optb:0 "Отказать в просьбе супругу"
darkages_spouse.01.optc:0 "Попытаться повлиять на супруга, чтобы [spouse.GetSheHe] [Select_CString(spouse.IsFemale, 'оставила', 'оставил')] это дело"
darkages_spouse.01.tt1:0 "Успех этого варианта зависит от нескольких факторов, касающихся вас и вашего супруга, которые будут действовать друг против друга. Ваши Интриги и Дипломатия будут влиять на исход как положительно, так и отрицательно. Также большое влияние оказывает наличие у вас обоих черт Интриган и Дипломат."
darkages_spouse.02.t:0 "Перехитрен супругом"
darkages_spouse.02.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался')] убедить [spouse.GetFirstName|d] в политических трудностях избавления от [courtier.GetFirstName|d], мой супруг умело [Select_CString(spouse.IsFemale, 'уклонилась', 'уклонился')] от моих аргументов и [Select_CString(spouse.IsFemale, 'сумела', 'сумел')] убедить меня в [courtier.GetHerHis] позиции.\n\nВ конце концов я [Select_CString(ROOT.Char.IsFemale, 'убедилась', 'убедился')] в необходимости уволить [courtier.GetName]..."
darkages_spouse.02.opta:0 "Это будет сделано немедленно, дорогая!"
darkages_spouse.03.t:0 "Красноречие"
darkages_spouse.03.desc:0 "Моя попытка убедить [spouse.GetFirstName|d] в политических трудностях избавления от [courtier.GetFirstName|d] увенчалась полным успехом!\n\nВ конце концов, [spouse.GetSheHe] с готовностью [Select_CString(spouse.IsFemale, 'согласилась', 'согласился')], что [Select_CString(spouse.IsFemale, 'действовала', 'действовал')] импульсивно и не зная всех последствий такого решения..."
darkages_spouse.03.opta:0 "[Select_CString(ROOT.Char.IsFemale, 'Рада', 'Рад')], что ты разделяешь мою точку зрения, [Select_CString(spouse.IsFemale, 'моя дорогая', 'мой дорогой')]!"
darkages_spouse.04.tt1:0 "При выборе этого варианта, если у вашего персонажа отрицательное мнение о наследнике и он является Нелояльным, Садистом, Деспотичным, Лживым или Черствым, стресс увеличится\n" 
darkages_spouse.04.t:0 "Серьезнейшая просьба"
darkages_spouse.04.desc:0 "Сегодня во время частного обеда с моим супругом я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал')] жуткое ощущение по спине, когда [spouse.GetSheHe] [Select_CString(spouse.IsFemale, 'предположила', 'предположил')], что [heir.GetName] не годен для правления.\n\n[spouse.GetFirstName] [Select_CString(spouse.IsFemale, 'прошлась', 'прошелся')] по длинному списку недостатков, которые [spouse.GetSheHe] находит в моем Наследнике, и [Select_CString(spouse.IsFemale, 'попыталась', 'попытался')] убедить меня в [spouse.GetHerHis] здравых рассуждениях.\n\nЗная, что мое решение может иметь важные политические последствия в будущем и что мой супруг не будет ни капли [Select_CString(spouse.IsFemale, 'счастлива', 'счастлив')] отказом, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] принять решение по этому поводу..."
darkages_spouse.04.opta:0 "Я уступаю давлению [spouse.GetFirstName|d]"
darkages_spouse.04.optb:0 "Я здесь правлю, черт возьми!"
darkages_spouse.04.tt2:0 "Вы лишаете наследства [heir.GetName|d]. Эта просьба была сделана, потому что ваш Супруг не является ни Сострадательным, ни Прощающим, ни Справедливым, ни Лояльным\n"
darkages_spouse.05.t:0 "О тщеславии и гордости"
darkages_spouse.05.desc:0 "Этим утром, когда я [Select_CString(ROOT.Char.IsFemale, 'готовилась', 'готовился')] покинуть нашу спальню, чтобы объехать верхом на своей верной кобыле окрестности моего владения, [spouse.GetFirstName], все еще без одежды, [Select_CString(spouse.IsFemale, 'обвила', 'обвил')] [spouse.GetHerHis] руки вокруг моего торса и [Select_CString(spouse.IsFemale, 'прошептала', 'прошептал')] мне на ухо, что мои дворцы нуждаются в значительном обновлении в плане роскоши.\n\nЯ точно знаю, что это заезженная пластинка моего супруга, но на этот раз [spouse.GetSheHe] [Select_CString(spouse.IsFemale, 'заручилась', 'заручился')] поддержкой всех хоть сколько-нибудь влиятельных людей в моей Державе, чтобы поддержать [spouse.GetHerHis] просьбу.\n\nЗагнанный в угол ловким политическим ходом моего Супруга, я теперь [Select_CString(ROOT.Char.IsFemale, 'вынуждена', 'вынужден')] дать определённый ответ..."
darkages_spouse.05.opta:0 "Я предоставлю средства, [Select_CString(spouse.IsFemale, 'моя дорогая', 'мой дорогой')]..."
darkages_spouse.05.optb:0 "Нельзя так разбрасываться золотом!"
darkages_spouse.05.tt1:0 "Помимо отображаемых ниже эффектов, при выборе этого варианта каждый взрослый Вассал, Придворный и Гость улучшит мнение о Правителе\n"
darkages_spouse.05.tt2:0 "Помимо отображаемых ниже эффектов, при выборе этого варианта каждый взрослый Вассал, Придворный и Гость ухудшит мнение о Правителе\n"
darkages_opinion_county_reforms:0 "Социальные реформы"
darkages_opinion_county_reforms_desc:0 "Супруг Правителя реализовал на золото из казны некоторые социальные реформы в Домене"
darkages_spouse_embassy:0 "Эффективное странствующее посольство"
darkages_spouse_embassy_desc:0 "Супруг этого персонажа продвигает Признание династии Правителя повсюду"
darkages_spouse.07.t:0 "Посол-новичок"
darkages_spouse.07.desc:0 "Вчера во время частного ужина с моим Супругом [spouse.GetFirstName] [Select_CString(spouse.IsFemale, 'предложила', 'предложил')] мне, что [spouse.GetSheHe] [Select_CString(spouse.IsFemale, 'хотела бы', 'хотел бы')] взять на себя ведущую роль Посла при иностранных Дворах с целью улучшения Признания моей Династии.\n\nКак мне уже сообщили мои осведомители, это [spouse.GetHerHis] давний любимый проект, и [spouse.GetSheHe] [Select_CString(spouse.IsFemale, 'маневрировала', 'маневрировал')] для достижения этой цели, добиваясь одобрения у всех, кто достаточно важен при моем Дворе, чтобы иметь право голоса в этом вопросе.\n\nС уверенностью, что я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] принять решение по этому вопросу, это ставит меня в щекотливое положение, если я откажу в этой просьбе, так как на кону будет мой Престиж..."
darkages_spouse.07.opta:0 "Твое желание для меня закон, [Select_CString(spouse.IsFemale, 'моя дорогая', 'мой дорогой')]!"
darkages_spouse.07.optb:0 "Извини, мы должны тратить золото на важные вещи..."
darkages_spouse.07.optc:0 "Давай найдем компромисс..."
darkages_spouse.06.t:0 "Доброе дело"
darkages_spouse.06.desc:0 "[spouse.GetFirstName], мой Супруг, [Select_CString(spouse.IsFemale, 'обратилась', 'обратился')] ко мне сегодня с изысканной политической идеей, которая может послужить мне, чтобы пожинать некоторые плоды.\n\nВ сложившейся ситуации [spouse.GetHerHis] план состоит в том, чтобы провести некоторые социальные реформы, чтобы облегчить страдания простых крестьян, тем самым повысив их общее благосостояние. Всегда планируя на шаг вперед, [spouse.GetSheHe] уже [Select_CString(spouse.IsFemale, 'привлекла', 'привлек')] могущественных религиозных сановников, чтобы найти помощь в реализации плана.\n\nТеперь мне предстоит решить, стоит ли того необходимое золото, чтобы привести все в движение..."
darkages_spouse.06.opta:0 "Давай сделаем что-нибудь хорошее для наших крестьян"
darkages_spouse.06.optb:0 "Это того не стоит"
darkages_more_illnesses.01.t:0 "Странный упадок сил"
darkages_more_illnesses.01.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'проснулась', 'проснулся')] сегодня с болью в конечностях, рвотой, постоянным кашлем и крайней нехваткой энергии. Вероятно, это просто проходящий недуг, всегда есть навязчивая вероятность того, что это что-то гораздо худшее..."
darkages_more_illnesses.01.opta:0 "Надеюсь, все будет хорошо..."
darkages_more_illnesses.02.t:0 "Моё прежнее Я!"
darkages_more_illnesses.02.desc:0 "К счастью, болезнь, поразившая меня, постепенно исчезла за последние несколько дней. С вздохом облегчения я возвращаюсь к своей нормальной жизни и обязанностям!"
darkages_more_illnesses.02.opta:0 "Отличные новости!"
darkages_more_illnesses.03.t:0 "Темная хватка жизни"
darkages_more_illnesses.03.desc:0 "К сожалению, мое состояние еще больше ухудшилось за последние несколько дней. Наполовину ожидая плохих новостей и с зловещим предчувствием, сегодня утром мне поставили диагноз серьезного заболевания..."
darkages_more_illnesses.03.opta:0 "Я в руках Божьих..."
darkages_traits_bring_death.02.t:0 "Важное предупреждение"
darkages_traits_bring_death.02.desc:0 "Прогуливаясь по своей крепости с моим [spymaster.GetCouncilTitle|d], [spymaster.GetName] [Select_CString(spymaster.IsFemale, 'поделилась', 'поделился')] со мной одним из [spymaster.GetHerHis] опасений относительно моей личной безопасности.\n\nПоскольку у меня определенный тип личности, я склонен стать жертвой опасных заговоров с целью лишить меня жизни. К сожалению, и поскольку я не перестану быть тем, кто я есть, [spymaster.GetName] советует мне нанять одного или, еще лучше, двух телохранителей, чтобы повысить мою личную безопасность.\n\nЗная, что угроза лишь теоретическая, [spymaster.GetCouncilTitle] назначаются, чтобы видеть и готовиться к опасностям на каждом углу, но моя жизнь, возможно, может быть на кону, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, что я буду делать..."
darkages_traits_bring_death.02.opta:0 "Спасибо за предупреждение"
darkages_traits_bring_death.02.tt1:0 "Если ваш персонаж является Мстительным, Гневным, Черствым, Садистом, Лживым, Параноиком или Деспотичным, существует вероятность того, что против него/нее будет спланировано покушение. Первые четыре черты увеличивают вероятность покушения\n"
darkages_bankrupt.01.t:0 "Банкротство"
darkages_bankrupt.01.desc:0 "Будь то из-за долгой неплатежеспособности или как следствие недавнего банкротства, мой Престиж, а также Признание моей Династии несут тяжкую утрату.\n\nМне нужно быстро вернуться к положительному балансу в моей казне!"
darkages_bankrupt.01.opta:0 "Это плохие новости..."
darkages_bankrupt.01.tt1:0 "Если у вас будет меньше -49 золотых, вы пострадаете от последствий неплатежеспособности. Каждые пять лет вашей неплатежеспособности будут иметь тот же эффект\n"
SKILL_POINT_FROM_ME_TORTURING_GAIN_CHANCE:3 "Когда вы [torture|E] кого-то:\n$TAB$#V [EmptyScope.ScriptValue('dark_insights_stat_increase_chance')|0]%#! шанс получить [intrigue_i]#P 1#! к [Concept('intrigue', 'интриге')|E] или [prowess_i]#P 1#! к [Concept('prowess', 'доблести')|E] (Макс. 3 каждого)"
darkages_control_brings_death.03.t:0 "Тонкое предупреждение"
darkages_control_brings_death.03.desc:0 "Мой [spymaster.GetCouncilTitle] однажды [Select_CString(spymaster.IsFemale, 'подошла', 'подошел')] ко мне и [Select_CString(spymaster.IsFemale, 'высказала', 'высказал')] свои опасения по поводу запутанной ситуации в частях моего Домена.\n\nВ настоящее время [spymaster.GetSheHe] [Select_CString(spymaster.IsFemale, 'подробно рассказала', 'подробно рассказал')], как Контроль в моих провинциях упал настолько, что разбойники и другие низкие воры воспользовались этим фактом, чтобы обосноваться и подвергнуть опасности путешествия всех, включая меня. Мой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'предложила', 'предложил')], чтобы я [Select_CString(ROOT.Char.IsFemale, 'улучшила', 'улучшил')] Контроль во всех провинциях, которыми я владею, и чтобы я [Select_CString(ROOT.Char.IsFemale, 'наняла', 'нанял')] одного или, еще лучше, двух телохранителей.\n\nЗная, что [spymaster.GetName] получает плату за беспокойство о возможных событиях и предупрежден о каждой вероятности, какой бы малой она ни была, я знаю, что [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] действовать с осторожностью..."
darkages_control_brings_death.03.opta:0 "Спасибо за совет, [spymaster.GetFirstName]!"
darkages_control_brings_death.03.tt10:0 "Если в одной из провинций вашего Домена Контроль меньше 90, вы рискуете подвергнуться покушению во время путешествия по своим землям. Хотя вероятность минимальна, если Контроль выше 75 для одной провинции, прогрессирующее ухудшение Контроля и увеличение количества провинций с низким Контролем также вызывает увеличение вероятности того, что произойдет опасное для жизни событие\n"
darkages_control_brings_death.04.t:0 "Личное предупреждение"
darkages_control_brings_death.04.desc:0 "Мой [spymaster.GetCouncilTitle] однажды [Select_CString(spymaster.IsFemale, 'подошла', 'подошел')] ко мне и [Select_CString(spymaster.IsFemale, 'высказала', 'высказал')] свои опасения по поводу плохого Народного мнения обо мне в частях моего Домена.\n\nВ настоящее время [spymaster.GetSheHe] [Select_CString(spymaster.IsFemale, 'подробно рассказала', 'подробно рассказал')], как мои частые и необходимые путешествия по моим землям могут быть использованы недовольными людьми для попытки устроить засаду и подвергнуть мою жизнь опасности.\n\nМой [spymaster.GetCouncilTitle] [Select_CString(spymaster.IsFemale, 'предложила', 'предложил')], чтобы я [Select_CString(ROOT.Char.IsFemale, 'улучшила', 'улучшил')] Народное мнение в несчастливых провинциях, которыми я владею - Решение для этого доступно - и чтобы я [Select_CString(ROOT.Char.IsFemale, 'наняла', 'нанял')] одного или, еще лучше, двух телохранителей.\n\nЗная, что [spymaster.GetName] получает плату за беспокойство о возможных событиях и предупрежден о каждой вероятности, какой бы малой она ни была, я знаю, что [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] действовать с осторожностью..."
darkages_control_brings_death.04.opta:0 "Я слышу тебя громко и ясно, [Select_CString(spymaster.IsFemale, 'моя дорогая', 'мой дорогой')] [spymaster.GetFirstName]!"
darkages_control_brings_death.04.tt1:0 "Если в одной из провинций вашего Домена Народное мнение о вас меньше -15, вы рискуете подвергнуться покушению во время путешествия по своим землям. Хотя вероятность минимальна, если Народное мнение выше -25 для одной провинции, прогрессирующее ухудшение Народного мнения и увеличение количества провинций с низким Народным мнением также вызывает увеличение вероятности того, что произойдет опасное для жизни событие\n"
darkages_more_illnesses.01.4:0 "День посветлее"
darkages_more_illnesses.04.desc:0 "Шли недели, и я [Select_CString(ROOT.Char.IsFemale, 'чувствовала', 'чувствовал')], как мое тело становится все сильнее и сильнее, пока в один день я не [Select_CString(ROOT.Char.IsFemale, 'перестала', 'перестал')] кашлять, и давление в груди исчезло.\n\nК счастью, мне удалось победить Пневмонию, и я буду жить, чтобы рассказать эту историю!"
darkages_more_illnesses.04.opta:0 "Я могу считать себя [Select_CString(ROOT.Char.IsFemale, 'счастливицей', 'счастливчиком')]"
darkages_more_illnesses.01.5:0 "До моего последнего вздоха"
darkages_more_illnesses.05.desc:0 "По мере того как пневмония начинает распространяться в легких, мне становится все хуже и хуже с каждым днем.\n\nВскоре стало ясно, что это лишь вопрос времени, когда болезнь возьмет свое и убьет меня.\n\nСейчас я делаю свой последний тяжелый вздох..."
darkages_more_illnesses.05.opta:0 "Занавес"
darkages_county_opinion_war_exhaustion1:0 "Военная усталость"
darkages_county_opinion_war_exhaustion1_desc:0 "Последствия нынешней наступательной войны для этой провинции"
darkages_county_opinion_war_exhaustion2:0 "Военная усталость"
darkages_county_opinion_war_exhaustion2_desc:0 "Последствия нынешней наступательной войны для этой провинции"
darkages_county_opinion_war_exhaustion3:0 "Военная усталость"
darkages_county_opinion_war_exhaustion3_desc:0 "Последствия нынешней наступательной войны для этой провинции"
darkages_county_opinion_war_exhaustion4:0 "Военная усталость"
darkages_county_opinion_war_exhaustion4_desc:0 "Последствия нынешней наступательной войны для этой провинции"
darkages_war.11.t:0 "Нежелательные последствия войны"
darkages_war.11.desc:0 "Мои наступательные войны постепенно оказывают экономическое и социальное воздействие на население моего Домена.\n\nПринудительный призыв, нехватка людей для обработки полей и обслуживания, а также общее чувство отчаяния наносят значительный урон моему населению.\n\nВ сложившейся ситуации я не могу больше избегать некоторых пагубных последствий непопулярной войны, которую я веду, для населения, которое я возглавляю..."
darkages_war.11.opta:0 "Будем надеяться, что война не продлится долго"
darkages_war.11.tt1:0 "Это событие происходит только потому, что вы ведете наступательную войну. Примененные модификаторы будут удалены вскоре после того, как в Державе снова воцарится мир\n"
darkages_war.13.t:0 "Цена верности"
darkages_war.13.desc:0 "По мере того как я продолжаю свои наступательные войны, мои вассалы становятся все более и более унылыми в отношении их поддержки бойни, которую я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')].\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'достигла', 'достиг')] точки, когда никакие политические маневры не достаточны, чтобы подавить их полное отвращение к нынешнему положению дел..."
darkages_war.13.opta:0 "Надеюсь, войны скоро закончатся..."
darkages_war.13.tt1:0 "Это событие происходит только потому, что вы ведете наступательную войну. Каждый из ваших вассалов, кроме Храбрых и Гневных, покажет очень плохой модификатор, так как они сыты по горло вашими наступательными войнами. Вскоре после того, как вы окажетесь в мире, этот модификатор мнения исчезнет\n"
darkages_opinion_war_exhaustion:0 "Поджигатель войны"
darkages_war.15.t:0 "Предательство доверия союзника"
darkages_war.15.desc:0 "Поскольку война бушует в Державе [ally.GetName|d] без моей помощи, мой союзник начинает жаловаться на мое отсутствие участия.\n\nК сожалению, дела идут все хуже и хуже, и сегодня я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] послание от [ally.GetHerHim], в котором говорилось, что [ally.GetSheHe] выдвинет публичное обвинение в предательстве, что, безусловно, будет иметь далеко идущие последствия для моего престижа..."
darkages_war.15.opta:0 "Я не сдвинусь с места"
darkages_war.15.optb:0 "Я буду финансировать [ally.GetHerHis] военные усилия"
rival_poor_opinion:0 "Плохое мнение переросло в соперничество"
darkages_vassals_turn_rivals.01.t:0 "Поворот к худшему"
darkages_vassals_turn_rivals.01.desc:0 "Поскольку мнение [vassal.GetName|d] обо мне очень низкое, оно постепенно перерастает в глубокую ненависть, и теперь начало формироваться соперничество..."
darkages_vassals_turn_rivals.01.opta:0 "За кем-то нужно присматривать"
darkages_vassals_turn_rivals.01.tt1:0 "Любой Вассал, имеющий мнение о вашем персонаже менее -74, имеет вероятность превратиться в Соперника. Вероятность тем выше, чем хуже мнение\n"
