l_russian:
forced_regent:0 "Принудительный регент"
DA_COURT_CHAPLAIN_SANCTIONED_LOOPHOLES_PERK:0 "Сюзерен: достоинство «Оправданные лазейки»"
darkages_death_prison:0 "Смерть в заключении"
darkages_death_prison_killer:0 "Смерть в заключении"
DA_DEPENDS_ON_LIEGE_SANCTIONED_LOOPHOLES_PERK:0 "Увеличивает на 50% базовую (база + бонус [Concept('learning', 'учености')|E]) скорость получения [Concept('claim', 'претензии')|E]"
da_martial_or_zealous_trigger:0 "Вы должны иметь не менее 12 [Concept('martial', 'военного дела')|E], или не менее 20 [Concept('dread', 'ужаса')|E], или свойство «[Concept('zealous', 'Ревностный')|E]», или «[Concept('ambitious', 'Амбициозный')|E]», или «[Concept('brave', 'Отважный')|E]»"
da_claim_war_trigger:0 "Вы должны иметь достоинство «Bellum Justum», или 12 [Concept('martial', 'военного дела')|E], или быть «[Concept('ambitious', 'Амбициозным')|E]», или «[Concept('greedy', 'Жадным')|E]», или «[Concept('wrathful', 'Гневным')|E]», или «[Concept('brave', 'Отважным')|E]», или «[Concept('callous', 'Черствым')|E]», или «[Concept('deceitful', 'Вероломным')|E]»"
da_cb_invasion_trigger:0 "Вы должны иметь не менее 12 [Concept('martial', 'военного дела')|E], или не менее 20 [Concept('dread', 'ужаса')|E], или быть «[Concept('ambitious', 'Амбициозным')|E]», или «[Concept('brave', 'Отважным')|E]», или «[Concept('callous', 'Черствым')|E]»"
da_diplomacy_lifestyle_diplomacy_12_trigger:0 "Требуется не менее 12 [Concept('diplomacy', 'дипломатии')|E], чтобы выбрать это достоинство"
da_tribal_subjugation_trigger:0 "Вы должны иметь не менее 12 [Concept('martial', 'военного дела')|E], или не менее 20 [Concept('dread', 'ужаса')|E], или быть «[Concept('wrathful', 'Гневным')|E]», или «[Concept('arbitrary', 'Своенравным')|E]», или «[Concept('vengeful', 'Мстительным')|E]»"
da_conquest_trigger:0 "Вы должны иметь не менее 20 [Concept('dread', 'ужаса')|E], или 12 [Concept('martial', 'военного дела')|E], или быть «[Concept('ambitious', 'Амбициозным')|E]», или «[Concept('greedy', 'Жадным')|E]», или «[Concept('brave', 'Отважным')|E]»"
darkages_stress_lunacy.01.t1:0 "Удар!"
darkages_stress_lunacy.01.t2:0 "Пронесло"
darkages_stress_lunacy.01.desc1:0 "Последствия [Concept('stress', 'стресса')|E] оказались катастрофическими для моего здоровья, и внезапно меня хватил удар!\n\nМоя жизнь висит на волоске, и даже при лучшем исходе в будущем меня ждут умственные и физические недостатки..."
darkages_stress_lunacy.01.desc2:0 "К счастью, повышение [Concept('stress', 'стресса')|E] не повлекло за собой долгосрочных последствий для моего здоровья!"
darkages_stress_lunacy.01.opta:0 "Помогите мне!"
darkages_stress_lunacy.01.optb:0 "Я в безопасности... пока что!"
darkages_stress_lunacy.01.tt:0 "Инсульт означает, что вы либо умрете, либо будете ограничены в своих умственных и физических возможностях\n"
darkages_stress_lunacy.01.tt2:0 "Каждый раз, когда вы повышаете уровень [Concept('stress', 'стресса')|E], существует 5% шанс получить опасный, калечащий и потенциально смертельный удар. На этот раз вам повезло.\nПомните, что существуют и другие риски, когда у вас более 99 очков [Concept('stress', 'стресса')|E]"
darkages_dread_brings_death.01.t:0 "Ужас несет смерть"
darkages_dread_brings_death.01.desc:0 "К несчастью, ужас, который я внушаю другим, обернулся против меня. Прямым следствием этого стала коварная попытка кого-то избавиться от меня раз и навсегда.\n\nНочью, в пустой нише [ROOT.Char.Custom('FortifiedBuilding')], погрузившись в мысли, я [Select_CString(ROOT.Char.IsFemale, 'подверглась', 'подвергся')] жестокому нападению таинственной темной фигуры, стремительно приближающейся из теней. Я сразу [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что цель — моя окончательная гибель..."
darkages_dread_brings_death.01.desc2:0 "К несчастью, ужас, который я внушаю другим, обернулся против меня. Прямым следствием этого стала коварная попытка кого-то избавиться от меня раз и навсегда.\n\nНочью, в пустой нише [ROOT.Char.Custom('FortifiedBuilding')], погрузившись в мысли, я [Select_CString(ROOT.Char.IsFemale, 'подверглась', 'подвергся')] жестокому нападению таинственной темной фигуры, стремительно приближающейся из теней. Я сразу [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что цель — моя окончательная гибель.\n\nК счастью, мой телохранитель рядом и готов меня защитить..."
darkages_dread_brings_death.01.desc3:0 "К несчастью, ужас, который я внушаю другим, обернулся против меня. Прямым следствием этого стала коварная попытка кого-то избавиться от меня раз и навсегда.\n\nНочью, в пустой нише [ROOT.Char.Custom('FortifiedBuilding')], погрузившись в мысли, я [Select_CString(ROOT.Char.IsFemale, 'подверглась', 'подвергся')] жестокому нападению таинственной темной фигуры, стремительно приближающейся из теней. Я сразу [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что цель — моя окончательная гибель.\n\nК счастью, мои телохранители рядом и обеспечивают надежную защиту..."
darkages_dread_brings_death.01.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] бороться за свою жизнь!"
darkages_dread_brings_death.01.tt:0 "Это событие может произойти, если ваш [Concept('dread', 'ужас')|E] выше 14. Хотя это очень редко при низком ужасе (менее 20), это становится все более частым с ростом вашего ужаса. Если у вас низкая [Concept('intrigue', 'интрига')|E] (менее 8) или низкая [Concept('prowess', 'доблесть')|E] (менее 6), вы получаете штраф к шансам на выживание. Если у вас высокая [Concept('intrigue', 'интрига')|E] (не менее 12) или высокая [Concept('prowess', 'доблесть')|E] (более 9), вы получаете бонус к шансам на выживание, в зависимости от ваших показателей - тем лучше, чем они выше\n"
darkages_dread_brings_death.02.t:0 "Тирания несет смерть"
darkages_dread_brings_death.02.desc:0 "К несчастью, мои презренные действия по отношению к другим имеют прямое последствие — расплату от кого-то, скорее рано, чем поздно.\n\nНочью, в пустой нише [ROOT.Char.Custom('FortifiedBuilding')], погрузившись в мысли, я [Select_CString(ROOT.Char.IsFemale, 'подверглась', 'подвергся')] жестокому нападению зловещей темной фигуры, стремительно приближающейся из теней.\n\nЯ сразу [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что цель — моя окончательная гибель..."
darkages_dread_brings_death.02.desc2:0 "К несчастью, мои презренные действия по отношению к другим имеют прямое последствие — расплату от кого-то, скорее рано, чем поздно.\n\nНочью, в пустой нише [ROOT.Char.Custom('FortifiedBuilding')], погрузившись в мысли, я [Select_CString(ROOT.Char.IsFemale, 'подверглась', 'подвергся')] жестокому нападению зловещей темной фигуры, стремительно приближающейся из теней. Я сразу [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что цель — моя окончательная гибель.\n\nК счастью, мой телохранитель рядом и готов меня защитить..."
darkages_dread_brings_death.02.desc3:0 "К несчастью, мои презренные действия по отношению к другим имеют прямое последствие — расплату от кого-то, скорее рано, чем поздно.\n\nНочью, в пустой нише [ROOT.Char.Custom('FortifiedBuilding')], погрузившись в мысли, я [Select_CString(ROOT.Char.IsFemale, 'подверглась', 'подвергся')] жестокому нападению зловещей темной фигуры, стремительно приближающейся из теней. Я сразу [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что цель — моя окончательная гибель.\n\nК счастью, мои два телохранителя рядом и обеспечивают надежную защиту..."
darkages_dread_brings_death.02.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] бороться за свою жизнь!"
darkages_dread_brings_death.02.tt:0 "Это событие может произойти, если ваша [Concept('tyranny', 'тирания')|E] выше 14. Хотя это очень редко при низкой тирании (ниже 5), это становится все более частым с ростом вашей тирании. Если у вас низкая [Concept('intrigue', 'интрига')|E] (менее 8) или низкая [Concept('prowess', 'доблесть')|E] (менее 6), вы получаете штраф к шансам на выживание. Если у вас высокая [Concept('intrigue', 'интрига')|E] (более 11) или высокая [Concept('prowess', 'доблесть')|E] (более 9), вы получаете бонус к шансам на выживание, в зависимости от ваших показателей - тем лучше, чем они выше\n"
darkages_rivals_bring_death.01.t:0 "Месть соперника"
darkages_rivals_bring_death.01.desc:0 "Однажды, прогуливаясь по своей деревне днем, чтобы осмотреть товары на сезонном рынке, поприветствовать знакомых крестьян и подышать свежим воздухом, я вдруг [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], как темная фигура вышла из тени маленького дома и попыталась ударить меня тем, что явно было отравленным кинжалом.\n\nС ужасом глядя на приближающуюся опасность, нутром я [Select_CString(ROOT.Char.IsFemale, 'почуяла', 'почуял')], что это дело рук [Select_CString(ROOT.Char.IsFemale, 'моего', 'моего')] заклятого врага, [target_rival.GetName]..."
darkages_rivals_bring_death.01.desc2:0 "Однажды, прогуливаясь по своей деревне днем, чтобы осмотреть товары на сезонном рынке в сопровождении моего верного телохранителя, поприветствовать знакомых крестьян и подышать свежим воздухом, я вдруг [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], как темная фигура вышла из тени маленького дома и попыталась ударить меня тем, что явно было отравленным кинжалом.\n\nС ужасом глядя на приближающуюся опасность, нутром я [Select_CString(ROOT.Char.IsFemale, 'почуяла', 'почуял')], что это дело рук [Select_CString(ROOT.Char.IsFemale, 'моего', 'моего')] заклятого врага, [target_rival.GetName]..."
darkages_rivals_bring_death.01.desc3:0 "Однажды, прогуливаясь по своей деревне днем, чтобы осмотреть товары на сезонном рынке в сопровождении моих двух верных телохранителей, поприветствовать знакомых крестьян и подышать свежим воздухом, я вдруг [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], как темная фигура вышла из тени маленького дома и попыталась ударить меня тем, что явно было отравленным кинжалом.\n\nС ужасом глядя на приближающуюся опасность, нутром я [Select_CString(ROOT.Char.IsFemale, 'почуяла', 'почуял')], что это дело рук [Select_CString(ROOT.Char.IsFemale, 'моего', 'моего')] заклятого врага, [target_rival.GetName]..."
darkages_rivals_bring_death.01.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] бороться за свою жизнь!"
darkages_rivals_bring_death.01.tt:0 "Наличие [Concept('rivals', 'соперников')|E] привносит элемент серьезной опасности в жизнь игрока. Количество соперников увеличивает шанс возникновения этого события, и хотя у вас нет доказательств того, кто заказал это гнусное дело, ваша интуиция, вероятно, права, вам просто нужно это доказать. Любые соперники, которые являются «[Concept('compassionate', 'Сострадательными')|E]», «[Concept('forgiving', 'Всепрощающими')|E]», «[Concept('generous', 'Щедрыми')|E]», «[Concept('just', 'Справедливыми')|E]» или «[Concept('craven', 'Трусливыми')|E]», никогда не будут пытаться убить вас\n"
darkages_rivals_bring_death.01.tt2:0 "Наличие [Concept('nemesis', 'заклятого врага')|E] привносит элемент серьезной опасности в жизнь игрока. Количество заклятых врагов увеличивает шанс возникновения этого события, и хотя у вас нет доказательств того, кто заказал это гнусное дело, ваша интуиция, вероятно, права, вам просто нужно это доказать. В отличие от соперников, связанных благородными чертами, заклятые враги всегда могут попытаться убить вас, независимо от их личности...\n"
darkages_control_brings_death.01.t:0 "Серьезные проблемы в графстве [target_county.GetName]"
darkages_control_brings_death.01.desc:0 "Во время путешествия по моим владениям в сельской местности графства [target_county.GetName], наш караван внезапно попал в засаду банды головорезов, ищущих богатства и добычи.\n\nК сожалению, эти люди, вероятно, понимают только язык стали. Действительно очень опасная ситуация..."
darkages_control_brings_death.01.desc_b:0 "Во время путешествия по моим владениям в сельской местности графства [target_county.GetName], наш караван внезапно попал в засаду банды головорезов, ищущих богатства и добычи.\n\nК сожалению, эти люди, вероятно, понимают только язык стали. Действительно очень опасная ситуация, даже если мой телохранитель обеспечивает дополнительную защиту..."
darkages_control_brings_death.01.desc_c:0 "Во время путешествия по моим владениям в сельской местности графства [target_county.GetName], наш караван внезапно попал в засаду банды головорезов, ищущих богатства и добычи.\n\nК сожалению, эти люди, вероятно, понимают только язык стали. Действительно очень опасная ситуация, даже если мои два телохранителя обеспечивают дополнительный уровень безопасности..."
darkages_control_brings_death.01.desc2:0 "Во время путешествия по моим владениям в сельской местности графства [target_county.GetName], наш караван внезапно попал в засаду банды недовольных моим правлением, жаждущих отомстить мне лично!\n\nК сожалению, эти люди, вероятно, понимают только язык смерти. Действительно очень опасная ситуация..."
darkages_control_brings_death.01.desc2_b:0 "Во время путешествия по моим владениям в сельской местности графства [target_county.GetName], наш караван внезапно попал в засаду банды недовольных моим правлением, жаждущих отомстить мне лично!\n\nК сожалению, эти люди, вероятно, понимают только язык смерти. Действительно очень опасная ситуация, даже если мой одинокий телохранитель обеспечивает дополнительную защиту..."
darkages_control_brings_death.01.desc2_c:0 "Во время путешествия по моим владениям в сельской местности графства [target_county.GetName], наш караван внезапно попал в засаду банды недовольных моим правлением, жаждущих отомстить мне лично!\n\nК сожалению, эти люди, вероятно, понимают только язык смерти. Действительно очень опасная ситуация, даже если мои два телохранителя обеспечивают дополнительный уровень защиты..."
darkages_control_brings_death.01.opta:0 "Мы должны бороться за наши жизни!"
darkages_control_brings_death.01.optb:0 "Попытаться перехитрить часть бандитов умной речью"
darkages_control_brings_death.01.optc:0 "Атаковать бандитов"
darkages_control_brings_death.01.optd:0 "Заплатить кругленькую сумму за мою жизнь"
darkages_control_brings_death.01.tt:0 "Если в каком-либо из ваших графств (чем больше, тем выше риск) [Concept('control', 'контроль')|E] ниже 90, но ни в одном не ниже 75, у вас есть минимальный шанс подвергнуться этому нападению. Однако наличие графств с очень низким контролем (чем ниже, тем хуже) повышает риски при путешествии через них, поскольку преступники правят частью территории. Именно это и случилось с вашим персонажем во время путешествия по сельской местности опасного графства. Ваши [Concept('martial', 'военное дело')|E] и [Concept('prowess', 'доблесть')|E] будут служить модификаторами (хорошими, нейтральными или плохими) при выборе этого варианта, так как вы сражаетесь во главе своего отряда. Один из ваших придворных или гостей может погибнуть в результате этого события\n"
darkages_control_brings_death.02.tt:0 "Если в каком-либо из ваших графств (чем больше, тем выше риск) [Concept('control', 'контроль')|E] ниже 90, но ни в одном не ниже 75, у вас есть минимальный шанс подвергнуться этому нападению. Однако наличие графств с очень низким контролем (чем ниже, тем хуже) повышает риски при путешествии через них, поскольку преступники правят частью территории. Именно это и случилось с вашим персонажем во время путешествия по сельской местности опасного графства. Ваша [Concept('learning', 'ученость')|E] и [Concept('prowess', 'доблесть')|E] будут служить модификаторами (хорошими, нейтральными или плохими) при выборе этого варианта, пока вы пытаетесь отговорить некоторых бандитов от драки. Один из ваших придворных или гостей может погибнуть в результате этого события\n"
darkages_control_brings_death.03.tt:0 "Если в каком-либо из ваших графств (чем больше, тем выше риск) [Concept('control', 'контроль')|E] ниже 90, но ни в одном не ниже 75, у вас есть минимальный шанс подвергнуться этому нападению. Однако наличие графств с очень низким контролем (чем ниже, тем хуже) повышает риски при путешествии через них, поскольку преступники правят частью территории. Именно это и случилось с вашим персонажем во время путешествия по сельской местности опасного графства. Взяв на себя инициативу и бросившись в атаку на бандитов впереди своего отряда, вы сделаете свою [Concept('prowess', 'доблесть')|E] единственным решающим фактором в исходе этого действия. Этот вариант доступен только если вы [Concept('brave', 'Отважны')|E]. Один из ваших придворных или гостей может погибнуть в результате этого события\n"
darkages_control_brings_death.04.tt:0 "Если в каком-либо из ваших графств (чем больше, тем выше риск) [Concept('control', 'контроль')|E] ниже 90, но ни в одном не ниже 75, у вас есть минимальный шанс подвергнуться этому нападению. Однако наличие графств с очень низким контролем (чем ниже, тем хуже) повышает риски при путешествии через них, поскольку преступники правят частью территории. Именно это и случилось с вашим персонажем во время путешествия по сельской местности опасного графства. Вы расстанетесь со значительным количеством [Concept('gold', 'золота')|E], чтобы спасти свою жизнь, но ваши спутники и охранники могут быть не так удачливы, так как бандиты нападут на них первыми, пока вы спасаетесь бегством. Один из ваших придворных или гостей может погибнуть в результате этого события\n"
darkages_control_brings_death.01.tt2:0 "Если в каком-либо из ваших графств (чем больше, тем выше риск) [Concept('county_opinion', 'народное мнение')|E] о вас ниже -15, есть шанс, что недовольные попытаются напасть на вас. Именно это и случилось с вашим персонажем во время путешествия по сельской местности опасного графства. Ваши [Concept('martial', 'военное дело')|E] и [Concept('prowess', 'доблесть')|E] будут служить модификаторами (хорошими, нейтральными или плохими) при выборе этого варианта, так как вы сражаетесь во главе своего отряда. Один из ваших придворных или гостей может погибнуть в результате этого события\n"
darkages_control_brings_death.02.tt2:0 "Если в каком-либо из ваших графств (чем больше, тем выше риск) [Concept('county_opinion', 'народное мнение')|E] о вас ниже -15, есть шанс, что недовольные попытаются напасть на вас. Именно это и случилось с вашим персонажем во время путешествия по сельской местности опасного графства. Ваша [Concept('learning', 'ученость')|E] и [Concept('prowess', 'доблесть')|E] будут служить модификаторами (хорошими, нейтральными или плохими) при выборе этого варианта, пока вы пытаетесь отговорить некоторых бандитов от драки. Один из ваших придворных или гостей может погибнуть в результате этого события\n"
darkages_control_brings_death.03.tt2:0 "Если в каком-либо из ваших графств (чем больше, тем выше риск) [Concept('county_opinion', 'народное мнение')|E] о вас ниже -15, есть шанс, что недовольные попытаются напасть на вас. Именно это и случилось с вашим персонажем во время путешествия по сельской местности опасного графства. Взяв на себя инициативу и бросившись в атаку на бандитов впереди своего отряда, вы сделаете свою [Concept('prowess', 'доблесть')|E] единственным решающим фактором в исходе этого действия. Этот вариант доступен только если вы [Concept('brave', 'Отважны')|E]. Один из ваших придворных или гостей может погибнуть в результате этого события\n"
darkages_control_brings_death.04.tt2:0 "Если в каком-либо из ваших графств (чем больше, тем выше риск) [Concept('county_opinion', 'народное мнение')|E] о вас ниже -15, есть шанс, что недовольные попытаются напасть на вас. Именно это и случилось с вашим персонажем во время путешествия по сельской местности опасного графства. Вы расстанетесь со значительным количеством [Concept('gold', 'золота')|E], чтобы спасти свою жизнь, но ваши спутники и охранники могут быть не так удачливы, так как бандиты нападут на них первыми, пока вы спасаетесь бегством. Один из ваших придворных или гостей может погибнуть в результате этого события\n"
darkages_relation_brings_death.01.t:0 "Иностранная угроза"
darkages_relation_brings_death.01.desc:0 "Когда я иду ночью по пустому коридору моего [ROOT.Char.Custom('FortifiedBuilding')], из темного угла бесшумно появляется тень с ножом в руке, угрожающе направленным мне в сердце. Крикнув «С наилучшими пожеланиями от [target_poor_relation.GetName]!», призрачная фигура бросается на меня..."
darkages_relation_brings_death.01.desc2:0 "Когда я иду в сопровождении моего телохранителя ночью по пустому коридору моего [ROOT.Char.Custom('FortifiedBuilding')], из темного угла бесшумно появляется тень с ножом в руке, угрожающе направленным мне в сердце. Крикнув «С наилучшими пожеланиями от [target_poor_relation.GetName]!», призрачная фигура бросается на меня..."
darkages_relation_brings_death.01.desc3:0 "Когда я иду в сопровождении моих двух телохранителей ночью по пустому коридору моего [ROOT.Char.Custom('FortifiedBuilding')], из темного угла бесшумно появляется тень с ножом в руке, угрожающе направленным мне в сердце. Крикнув «С наилучшими пожеланиями от [target_poor_relation.GetName]!», призрачная фигура бросается на меня..."
darkages_relation_brings_death.01.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] бороться за свою жизнь!"
darkages_relation_brings_death.01.tt:0 "Наличие вассалов, которые вас достаточно сильно ненавидят - с мнением ниже -29 - и имеют определенные свойства личности (Вспыльчивый, Своенравный, Параноик, Черствый, Садист или Мстительный), не будучи при этом Сострадательным, Всепрощающим, Щедрым или Трусливым, может привести к тому, что они попытаются покуситься на вашу жизнь. К сожалению, даже если убийца прошептал имя, у вас нет никаких убедительных доказательств того, кто на самом деле спланировал вашу кончину...\n"
darkages_lunacy_brings_death.01.t:0 "Конец пути"
darkages_lunacy_brings_death.01.desc:0 "В последнее время приступы безумия все больше затуманивают мой рассудок. Сегодня, играя с мечом и имитируя дуэль с пустотой, я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] гадать, каково это — получить смертельный удар. Обезумев и потеряв рассудок, с решимостью, порожденной сумасшествием, я направляю меч на себя и делаю роковое движение..."
darkages_lunacy_brings_death.01.opta:0 "Возможно, я [Select_CString(ROOT.Char.IsFemale, 'убила', 'убил')] [Select_CString(ROOT.Char.IsFemale, 'саму', 'самого')] себя"
darkages_lunacy_brings_death.01.tt:0 "Безумие несет в себе множество рисков. Внезапная смерть — один из них\n"
darkages_depression_brings_death.01.t:0 "Конец пути"
darkages_depression_brings_death.01.desc:0 "Мой разум не знает покоя, и в последнее время я [Select_CString(ROOT.Char.IsFemale, 'чувствовала', 'чувствовал')] полное отчаяние относительно моей жизни и будущего. В момент безысходности я решаю попрощаться с миром с помощью веха..."
darkages_depression_brings_death.01.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'отравила', 'отравил')] [Select_CString(ROOT.Char.IsFemale, 'саму', 'самого')] себя"
darkages_depression_brings_death.01.tt:0 "Депрессия всегда несет риск смерти в момент полного отчаяния, но удача может сыграть свою роль, и мятущаяся душа может быть спасена от немедленной смерти, но серьезно пострадать от яда...\n"
darkages_lunacy_brings_death.02.t:0 "Неожиданная угроза"
darkages_lunacy_brings_death.02.desc:0 "Гуляя в одиночестве, погрузившись в мысли, в маленьком удаленном коридоре моего [ROOT.Char.Custom('FortifiedBuilding')], я прохожу мимо [target_crazy.GetName], [Select_CString(target_crazy.IsFemale, 'которая', 'который')] коротко и тихо приветствует меня: «Добрый вечер». Едва обратив на это внимание, я прохожу еще несколько шагов, когда слышу шорох быстрого движения позади себя. Я поворачиваю голову и вижу лишь кинжал в руке [target_crazy.GetName], [Select_CString(target_crazy.IsFemale, 'ее', 'его')] глаза, полные безумной ненависти, и удар, нацеленный мне в основание шеи"
darkages_lunacy_brings_death.02b.desc:0 "Гуляя в одиночестве, погрузившись в мысли, в маленьком удаленном коридоре моего [ROOT.Char.Custom('FortifiedBuilding')], я прохожу мимо [target_crazy.GetName], [Select_CString(target_crazy.IsFemale, 'которая', 'который')] коротко и тихо приветствует меня: «Добрый вечер». Моя паранойя предупредила меня, что что-то не так, и, пройдя еще несколько шагов, я [Select_CString(ROOT.Char.IsFemale, 'обернулась', 'обернулся')], чтобы увидеть безумца с кинжалом, целящегося мне в яремную вену, с глазами, полными ненависти!"
darkages_lunacy_brings_death.02.opta:0 "Только удача может спасти меня..."
darkages_lunacy_brings_death.02.tt:0 "Наличие при дворе безумных или одержимых персонажей несет определенные риски, учитывая их нестабильное психическое состояние. Так как вы были атакованы совершенно внезапно, ни ваша Доблесть, ни Интрига не могут повлиять на исход этой неожиданной атаки. Однако, если вы Параноик, ваши шансы на выживание выше, так как ваш разум всегда настороже в ожидании опасности"
darkages_sickly_child_dies.01.tt:0 "В Темные века смертность младенцев была действительно высокой. Поскольку [child.GetName] [Select_CString(child.IsFemale, 'была болезненным ребенком', 'был болезненным ребенком')], к несчастью, смерть забрала [child.GetHerHim]...\n"
darkages_sickly_child_dies.02.tt:0 "В Темные века смертность младенцев была действительно высокой. Поскольку вы родились болезненным ребенком, к несчастью, это то, что случилось с вашим персонажем\n"
darkages_sickly_child_dies.01.t:0 "Украденное будущее"
darkages_sickly_child_dies.01.desc:0 "Стою в столовой, грея руки у огня и погрузившись в свои мысли, как ко мне подходит знакомая служанка со слезами на глазах.\n\nСделав сложный реверанс, она смотрит мне в глаза и говорит: «[ROOT.GetCharacter.GetTitleAsNameNoTooltip], [Select_CString(child.IsFemale, 'ваша болезненная дочь', 'ваш болезненный сын')], [Select_CString(child.IsFemale, 'любимая', 'любимый')] [child.GetName], не [Select_CString(child.IsFemale, 'смогла', 'смог')] справиться с болезнью и [Select_CString(child.IsFemale, 'умерла', 'умер')] несколько мгновений назад...».\n\nНе говоря больше ни слова, она просто стоит передо мной, глотая слезы, ожидая моих приказаний..."
darkages_sickly_child_dies.01.opta:0 "[Select_CString(child.IsFemale, 'Моя бедная девочка', 'Мой бедный мальчик')]..."
darkages_sickly_child_dies.02.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'была болезненным ребенком', 'был болезненным ребенком')], и, будучи мал, мое тело изо всех сил боролось с недугами, преследовавшими меня. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'проиграла', 'проиграл')] битву за свою жизнь..."
darkages_sickly_child_dies.02.opta:0 "Я закрываю глаза в последний раз"
darkages_diseases_bring_death.01.t:0 "Смертельная болезнь"
darkages_diseases_bring_death.01.desc:0 "По мере того как бубонная чума лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я умираю во сне"
darkages_diseases_brings_death.01.opta:0 "Покойся с миром"
darkages_diseases_brings_death.01.optb:0 "Я [Select_CString(ROOT.Char.IsFemale, 'исцелена', 'исцелен')]!"
darkages_diseases_death.01.tt:0 "Различные болезни в средние века без надлежащего лечения часто становились причиной смерти\n"
darkages_diseases_bring_death.02.desc:0 "По мере того как оспа лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я умираю настолько мирно, насколько это возможно, в окружении самых близких..."
darkages_diseases_bring_death.03.desc:0 "По мере того как сыпной тиф лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я умираю однажды утром, пока мои верные слуги помогают мне..."
darkages_diseases_bring_death.04.desc:0 "По мере того как рак лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я умираю однажды вечером, вдыхая запах свечного воска"
darkages_diseases_bring_death.05.desc:0 "По мере того как пневмония лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я умираю в одиночестве ночью"
darkages_diseases_bring_death.06.desc:0 "По мере того как чахотка лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я мирно умираю однажды утром"
darkages_diseases_bring_death.07.desc:0 "По мере того как проказа лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я умираю в муках и одиночестве однажды днем"
darkages_diseases_bring_death.08.desc:0 "По мере того как подагра лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я умираю однажды днем, рядом со своими любимыми..."
darkages_diseases_bring_death.09.desc:0 "По мере того как сифилис лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я умираю в бреду, вызванном болезнью"
darkages_diseases_bring_death.10.t:0 "Странная болезнь"
darkages_diseases_bring_death.10.desc1:0 "Время идет, и, к счастью, силы возвращаются ко мне — сначала медленно, потом все быстрее, пока болезнь отступает!\n\nСегодня я [Select_CString(ROOT.Char.IsFemale, 'вышла', 'вышел')] на улицу и [Select_CString(ROOT.Char.IsFemale, 'насладилась', 'насладился')] теплом утреннего солнца, забыв о странном недуге.\n\nКакое приятное чувство — быть [Select_CString(ROOT.Char.IsFemale, 'живой и здоровой', 'живым и здоровым')]...!"
darkages_diseases_bring_death.10.desc2:0 "По мере того как неизвестная болезнь лишает мое тело сил, мне становится все хуже, пока я не перестаю вставать с постели. К несчастью, болезнь взяла свое, и я умираю однажды днем, в окружении моих близких..."
darkages_traits_bring_death.01.tt:0 "Вы сразитесь с разъяренной толпой крестьян, пытаясь устранить исходящую от них угрозу. Высокая [Concept('prowess', 'доблесть')|E] имеет первостепенное значение для снижения шансов вашей гибели.\nВы столкнулись с этим событием, потому что ваш персонаж либо [Concept('wrathful', 'Гневный')|E], либо [Concept('vengeful', 'Мстительный')|E], либо [Concept('sadistic', 'Садист')|E], либо [Concept('deceitful', 'Вероломный')|E], либо [Concept('paranoid', 'Параноик')|E], либо [Concept('arbitrary', 'Своенравный')|E], либо [Concept('fickle', 'Неверный')|E], либо [Concept('callous', 'Черствый')|E]. Чем больше у вас таких черт, тем выше шанс возникновения этого события\n"
darkages_traits_bring_death.01.t:0 "Месть народа"
darkages_traits_bring_death.01.desc:0 "Во время путешествия по моему государству мое шестое чувство не перестает предупреждать меня, что что-то не так. К несчастью, моя небольшая процессия попадает в засаду крестьян, разъяренных моими... сомнительными... чертами личности. Проклиная их всех, я [Select_CString(ROOT.Char.IsFemale, 'обнажила', 'обнажил')] свой меч..."
darkages_traits_bring_death.01.desc2:0 "Во время путешествия по моему государству в сопровождении моего бдительного телохранителя, мое шестое чувство не перестает предупреждать меня, что что-то не так. К несчастью, моя небольшая процессия попадает в засаду крестьян, разъяренных моими... сомнительными... чертами личности. Проклиная их всех, я [Select_CString(ROOT.Char.IsFemale, 'обнажила', 'обнажил')] свой меч..."
darkages_traits_bring_death.01.desc3:0 "Во время путешествия по моему государству в сопровождении двух моих телохранителей, мое шестое чувство не перестает предупреждать меня, что что-то не так. К несчастью, моя небольшая процессия попадает в засаду крестьян, разъяренных моими... сомнительными... чертами личности. Проклиная их всех, я [Select_CString(ROOT.Char.IsFemale, 'обнажила', 'обнажил')] свой меч..."
darkages_traits_bring_death.01.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] бороться за свою жизнь!"
darkages_traits_bring_death.01.optb:0 "Я использую хитрость и коварство, чтобы скрыться от опасности"
darkages_traits_bring_death.02.tt:0 "Вы пытаетесь спрятаться и убежать, воспользовавшись возникшим хаосом. Высокая [Concept('intrigue', 'интрига')|E] имеет первостепенное значение для снижения шансов быть пойманным.\nВы столкнулись с этим событием, потому что ваш персонаж либо [Concept('wrathful', 'Гневный')|E], либо [Concept('vengeful', 'Мстительный')|E], либо [Concept('sadistic', 'Садист')|E], либо [Concept('deceitful', 'Вероломный')|E], либо [Concept('callous', 'Черствый')|E]. Чем больше у вас таких черт, тем выше шанс возникновения этого события\n"
da_learning_for_all_modifier:0 "Ученость"
darkages_lunacy.01.t:0 "Раздача имущества"
darkages_lunacy.01.desc:0 "Из-за моего беспокойного разума в последнее время меня посещают мысли о том, чтобы раздать часть моего имущества. После долгих раздумий о том, кому я [Select_CString(ROOT.Char.IsFemale, 'оказала', 'оказал')] бы честь владеть одним из моих титулов, я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов')] отдать его даром. Однако близкие люди при дворе настоятельно отговаривают меня от этой идеи..."
darkages_lunacy.01.opta:0 "Я послушаюсь голосов в своей голове"
darkages_lunacy.01.optb:0 "Я воздержусь от выполнения своего плана"
darkages_lunacy.01.tt1:0 "Прилагая изнурительные усилия для контроля своих глубоких импульсов, вы подвергаете себя экстремальному умственному напряжению, и результаты разрушительны для вашего [Concept('stress', 'стресса')|E]\n"
darkages_lunacy.02.t:0 "Захват каравана"
darkages_lunacy.02.desc:0 "Узнав, что торговый караван вассала собирается пройти через мои владения, мой безумный разум начал вынашивать идею захватить его для моей личной выгоды. Даже если мои ближайшие советники предостерегали меня от таких действий, чем больше я думаю об этом, тем больше мне нравится эта идея"
darkages_lunacy.02.opta:0 "Отдать приказ захватить караван"
darkages_lunacy.02.optb:0 "Воздержаться от этого"
darkages_lunacy.02.tt1:0 "Прилагая изнурительные усилия для контроля своих глубоких импульсов, вы подвергаете себя экстремальному умственному напряжению, и результаты разрушительны для вашего [Concept('stress', 'стресса')|E]\n"
darkages_lunacy.03.t:0 "Плотские утехи"
darkages_lunacy.03.desc:0 "Из-за моего душевного состояния, в последнее время мой разум все больше и больше сосредотачивается на избегании плотских утех. Пока мой супруг ждет меня в постели, я стою перед выбором, который наверняка определит остаток моей жизни..."
darkages_lunacy.03.opta:0 "Я приму целибат всем сердцем, навсегда"
darkages_lunacy.03.optb:0 "Я пойду против своей воли и по крайней мере исполню свой супружеский долг..."
darkages_lunacy.03.tt1:0 "Прилагая изнурительные усилия для контроля своих глубоких импульсов, вы подвергаете себя экстремальному умственному напряжению, и результаты разрушительны для вашего [Concept('stress', 'стресса')|E]\n"
darkages_opinion_contempt:0 "Полное презрение"
darkages_lunacy.04.t:0 "Проклятие душевной нестабильности"
darkages_lunacy.04.desc:0 "Поскольку мои вассалы проводят время со мной, становится невозможным скрывать от них мои бессмысленные решения и странное поведение. В результате они постепенно теряют веру и игнорируют меня и мои слова, относясь ко мне как к человеку с серьезно нарушенной психикой. В общем, среди моих вассалов царит чувство полного презрения к моей персоне. Определенно ничего хорошего для того, кто находится в моем положении..."
darkages_lunacy.04.opta:0 "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] справиться с последствиями своего слабоумия"
darkages_lunacy.05.t:0 "Отказ от еды"
darkages_lunacy.05.desc:0 "Из-за моей душевной нестабильности несколько месяцев назад я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] отказываться от еды, сводя ее к минимуму, необходимому для выживания. К несчастью, это привело к серьезным неблагоприятным последствиям для моего здоровья..."
darkages_lunacy.05.opta:0 "Таковы последствия моего слабоумия"
extreme_malnourishment:0 "Крайнее истощение"
extreme_malnourishment_desc:0 "Слабое состояние этого персонажа значительно ухудшилось из-за отказа от еды"
darkages_lunacy.06.t:0 "Ухудшение состояния"
darkages_lunacy.06.desc:0 "Мой отказ от нормального питания достигает новых высот, так как большую часть времени я заставляю себя исторгнуть все, что съедаю. Это наносит серьезный ущерб моему здоровью, и теперь мое состояние следует считать очень серьезным, что может поставить мою жизнь под угрозу..."
darkages_lunacy.06.opta:0 "Мое слабоумие берет верх..."
da_varangian_adventurer_trigger:0 "Можно выбрать этот вариант только если верны 2 из следующих условий: Не менее 12 [Concept('martial', 'военного дела')|E], не менее 20 [Concept('dread', 'ужаса')|E], [Concept('callous', 'Черствый')|E], Викинг, [Concept('greedy', 'Жадный')|E], Искатель приключений, [Concept('ambitious', 'Амбициозный')|E], [Concept('brave', 'Отважный')|E] и [Concept('arrogant', 'Заносчивый')|E]"
darkages_culture_change_brings_death.01.t:0 "В игру вступает фанатик культуры"
darkages_culture_change_brings_death.01.desc:0 "Однажды, когда я посещал одно из малых поселений столичного графства, кому-то удалось обойти мою охрану и быстро приблизиться ко мне с кинжалом в руке, крича: «Это тебе, чтобы ты помнил, грязный подонок, что нельзя менять культуру моего графства!». Внезапно мне приходится бороться за свою жизнь!"
darkages_culture_change_brings_death.01.desc2:0 "Однажды, когда я посещал одно из малых поселений столичного графства, кому-то удалось обойти мою охрану и быстро приблизиться ко мне с кинжалом в руке, крича: «Это тебе, чтобы ты помнил, грязный подонок, что нельзя менять культуру моего графства!». К счастью, мой телохранитель рядом, чтобы защитить меня. Тем не менее, мне приходится бороться за свою жизнь!"
darkages_culture_change_brings_death.01.desc3:0 "Однажды, когда я посещал одно из малых поселений столичного графства, кому-то удалось обойти мою охрану и быстро приблизиться ко мне с кинжалом в руке, крича: «Это тебе, чтобы ты помнил, грязный подонок, что нельзя менять культуру моего графства!». К счастью, у меня два телохранителя рядом со мной. Тем не менее, мне приходится бороться за свою жизнь!"
darkages_culture_change_brings_death.01.opta:0 "Использовать свою Интригу, чтобы занять более выгодную позицию"
darkages_culture_change_brings_death.01.optb:0 "Использовать свою Дипломатию, чтобы повлиять на фанатика"
darkages_culture_change_brings_death.01.optc:0 "Моя свита! Ко мне-е-е!"
darkages_culture_change_brings_death.01.tt:0 "Это событие происходит потому, что вы пытаетесь сменить культуру графства. Как всегда, есть радикалы, готовые рискнуть всем, чтобы отомстить за ваши действия. Ваша [Concept('prowess', 'доблесть')|E] и [Concept('intrigue', 'интрига')|E] определяют итоговый исход этого события\n"
darkages_culture_change_brings_death.02.tt:0 "Это событие происходит потому, что вы пытаетесь сменить культуру графства. Как всегда, есть радикалы, готовые рискнуть всем, чтобы отомстить за ваши действия. Ваша [Concept('prowess', 'доблесть')|E] и [Concept('diplomacy', 'дипломатия')|E] определяют итоговый исход этого события\n"
darkages_culture_change_brings_death.03.tt:0 "Это событие происходит потому, что вы пытаетесь сменить культуру графства. Как всегда, есть радикалы, готовые рискнуть всем, чтобы отомстить за ваши действия. Ваша [Concept('prowess', 'доблесть')|E] и [Concept('martial', 'военное дело')|E] определяют итоговый исход этого события\n"
darkages_religious_change_brings_death.01.t:0 "В игру вступает религиозный фанатик"
darkages_religious_change_brings_death.01.desc:0 "Однажды, когда я посещал одно из малых поселений столичного графства, кому-то удалось обойти мою охрану и быстро приблизиться ко мне с кинжалом в руке, крича: «Это тебе, чтобы ты помнил, грязный подонок, что нельзя менять религию моего графства!». В одно мгновение мне пришло в голову, что, возможно, было бы неплохой идеей нанять хотя бы одного телохранителя. Внезапно мне приходится бороться за свою жизнь!"
darkages_religious_change_brings_death.01.desc2:0 "Однажды, когда я посещал одно из малых поселений столичного графства, кому-то удалось обойти мою охрану и быстро приблизиться ко мне с кинжалом в руке, крича: «Это тебе, чтобы ты помнил, грязный подонок, что нельзя менять религию моего графства!». К счастью, мой телохранитель рядом, чтобы защитить меня. Тем не менее, мне приходится бороться за свою жизнь!"
darkages_religious_change_brings_death.01.desc3:0 "Однажды, когда я посещал одно из малых поселений столичного графства, кому-то удалось обойти мою охрану и быстро приблизиться ко мне с кинжалом в руке, крича: «Это тебе, чтобы ты помнил, грязный подонок, что нельзя менять религию моего графства!». К счастью, у меня два телохранителя рядом со мной. Тем не менее, мне приходится бороться за свою жизнь!"
darkages_religious_change_brings_death.01.opta:0 "Использовать свою Интригу, чтобы занять более выгодную позицию"
darkages_religious_change_brings_death.01.optb:0 "Использовать свою Дипломатию, чтобы повлиять на фанатика"
darkages_religious_change_brings_death.01.optc:0 "Моя свита! Ко мне-е-е!"
darkages_religious_change_brings_death.01.tt:0 "Это событие происходит потому, что вы пытаетесь сменить религию графства. Некоторые черты, такие как [Concept('callous', 'Черствый')|E], [Concept('wrathful', 'Гневный')|E], [Concept('deceitful', 'Вероломный')|E], [Concept('arbitrary', 'Своенравный')|E], [Concept('vengeful', 'Мстительный')|E], [Concept('sadistic', 'Садист')|E], [Concept('paranoid', 'Параноик')|E] и [Concept('zealous', 'Ревностный')|E] увеличивают шанс возникновения этого события. Как всегда, есть радикалы, готовые рискнуть всем, чтобы отомстить за ваши действия. Ваша [Concept('prowess', 'доблесть')|E] и [Concept('intrigue', 'интрига')|E] определяют итоговый исход этого события\n"
darkages_religious_change_brings_death.02.tt:0 "Это событие происходит потому, что вы пытаетесь сменить религию графства. Некоторые черты, такие как [Concept('callous', 'Черствый')|E], [Concept('wrathful', 'Гневный')|E], [Concept('deceitful', 'Вероломный')|E], [Concept('arbitrary', 'Своенравный')|E], [Concept('vengeful', 'Мстительный')|E], [Concept('sadistic', 'Садист')|E], [Concept('paranoid', 'Параноик')|E] и [Concept('zealous', 'Ревностный')|E] увеличивают шанс возникновения этого события. Как всегда, есть радикалы, готовые рискнуть всем, чтобы отомстить за ваши действия. Ваша [Concept('prowess', 'доблесть')|E] и [Concept('diplomacy', 'дипломатия')|E] определяют итоговый исход этого события\n"
darkages_religious_change_brings_death.03.tt:0 "Это событие происходит потому, что вы пытаетесь сменить религию графства. Некоторые черты, такие как [Concept('callous', 'Черствый')|E], [Concept('wrathful', 'Гневный')|E], [Concept('deceitful', 'Вероломный')|E], [Concept('arbitrary', 'Своенравный')|E], [Concept('vengeful', 'Мстительный')|E], [Concept('sadistic', 'Садист')|E], [Concept('paranoid', 'Параноик')|E] и [Concept('zealous', 'Ревностный')|E] увеличивают шанс возникновения этого события. Как всегда, есть радикалы, готовые рискнуть всем, чтобы отомстить за ваши действия. Ваша [Concept('prowess', 'доблесть')|E] и [Concept('martial', 'военное дело')|E] определяют итоговый исход этого события\n"
darkages_fabricate_claim_brings_death.01.t:0 "Претензия на мою жизнь"
darkages_fabricate_claim_brings_death.01.desc:0 "Солнечным утром, пока я [Select_CString(ROOT.Char.IsFemale, 'отдыхала', 'отдыхал')] в небольшом жилище в своих владениях со своей небольшой свитой, кому-то удалось обойти мою охрану и ловко приблизиться ко мне с отравленным клинком в руке, словно дьявол, явившийся из небытия, с криком: «Ты больше не будешь фальсифицировать претензии, негодяй!». \n\nСтремительность его приближения намекала, что он вполне может скрыться после своего злодеяния. Внезапно мне пришло в голову, что, возможно, было бы неплохо нанять хотя бы одного телохранителя. Внезапно мне приходится бороться за свою жизнь!"
darkages_fabricate_claim_brings_death.01.desc2:0 "Солнечным утром, пока я [Select_CString(ROOT.Char.IsFemale, 'отдыхала', 'отдыхал')] в небольшом жилище в своих владениях со своей небольшой свитой, кому-то удалось обойти мою охрану и ловко приблизиться ко мне с отравленным клинком в руке, словно дьявол, явившийся из небытия, с криком: «Ты больше не будешь фальсифицировать претензии, негодяй!». \n\nСтремительность его приближения намекала, что он вполне может скрыться после своего злодеяния. К счастью, мой телохранитель рядом, чтобы защитить меня. Тем не менее, мне приходится бороться за свою жизнь!"
darkages_fabricate_claim_brings_death.01.desc3:0 "Солнечным утром, пока я [Select_CString(ROOT.Char.IsFemale, 'отдыхала', 'отдыхал')] в небольшом жилище в своих владениях со своей небольшой свитой, кому-то удалось обойти мою охрану и ловко приблизиться ко мне с отравленным клинком, словно дьявол, явившийся из небытия, с криком: «Ты больше не будешь фальсифицировать претензии, негодяй!». \n\nСтремительность его приближения намекала, что он вполне может скрыться после своего злодеяния. К счастью, у меня два телохранителя рядом со мной. Тем не менее, мне приходится бороться за свою жизнь!"
darkages_fabricate_claim_brings_death.01.opta:0 "Использовать свою Интригу, чтобы занять более выгодную позицию"
darkages_fabricate_claim_brings_death.01.optb:0 "Использовать свою Дипломатию, чтобы успокоить противника"
darkages_fabricate_claim_brings_death.01.optc:0 "Обнажить клинок и двинуться на убийцу"
darkages_fabricate_claim_brings_death.01.tt:0 "Это событие происходит потому, что вы пытаетесь сфальсифицировать претензию на графство. Некоторые черты, такие как [Concept('callous', 'Черствый')|E], [Concept('wrathful', 'Гневный')|E], [Concept('vengeful', 'Мстительный')|E] и [Concept('sadistic', 'Садист')|E] увеличивают шанс возникновения этого события. Черты [Concept('deceitful', 'Вероломный')|E] или Инитриган снижают шанс возникновения этого события, как и наличие достоинства «Умелец». Ваша [Concept('prowess', 'доблесть')|E] и [Concept('intrigue', 'интрига')|E] определяют итоговый исход этого покушения\n"
darkages_fabricate_claim_brings_death.02.tt:0 "Это событие происходит потому, что вы пытаетесь сфальсифицировать претензию на графство. Некоторые черты, такие как [Concept('callous', 'Черствый')|E], [Concept('wrathful', 'Гневный')|E], [Concept('vengeful', 'Мстительный')|E] и [Concept('sadistic', 'Садист')|E] увеличивают шанс возникновения этого события. Черты [Concept('deceitful', 'Вероломный')|E] или Инитриган снижают шанс возникновения этого события, как и наличие достоинства «Умелец». Ваша [Concept('prowess', 'доблесть')|E] и [Concept('diplomacy', 'дипломатия')|E] определяют итоговый исход этого покушения\n"
darkages_fabricate_claim_brings_death.03.tt:0 "Это событие происходит потому, что вы пытаетесь сфальсифицировать претензию на графство. Некоторые черты, такие как [Concept('callous', 'Черствый')|E], [Concept('wrathful', 'Гневный')|E], [Concept('vengeful', 'Мстительный')|E] и [Concept('sadistic', 'Садист')|E] увеличивают шанс возникновения этого события. Черты [Concept('deceitful', 'Вероломный')|E] или Инитриган снижают шанс возникновения этого события, как и наличие достоинства «Умелец». Ваша [Concept('prowess', 'доблесть')|E] и [Concept('martial', 'военное дело')|E] определяют итоговый исход этого покушения\n"
court_grandeur_level_5_desc:2 "[courtiers|E], прожившие при [Concept('royal_court', 'королевском дворе')|E] 10 лет, получают особую [Concept('trait', 'черту')|E], основанную на [Concept('court_type', 'типе двора')|E]"
court_grandeur_level_8_desc:2 "[courtiers|E], прожившие при [Concept('royal_court', 'королевском дворе')|E] 10 лет, получают более мощную особую [Concept('trait', 'черту')|E], основанную на [Concept('court_type', 'типе двора')|E]"
