darkages_vassals_bureaucracy_4:0 "Правительственная Бюрократия"
darkages_vassals_bureaucracy_4_desc:0 "Из налогов вассалов вычитается определенная сумма золота, так как у этого персонажа от 25 до 30 вассалов"
darkages_vassals_bureaucracy_5:0 "Правительственная Бюрократия"
darkages_vassals_bureaucracy_5_desc:0 "Из налогов вассалов вычитается определенная сумма золота, так как у этого персонажа от 30 до 35 вассалов"
darkages_vassals_bureaucracy_6:0 "Правительственная Бюрократия"
darkages_vassals_bureaucracy_6_desc:0 "Из налогов вассалов вычитается определенная сумма золота, так как у этого персонажа от 35 до 40 вассалов"
darkages_vassals_bureaucracy_7:0 "Правительственная Бюрократия"
darkages_vassals_bureaucracy_7_desc:0 "Из налогов вассалов вычитается определенная сумма золота, так как у этого персонажа от 40 до 45 вассалов"
darkages_vassals_bureaucracy_8:0 "Правительственная Бюрократия"
darkages_vassals_bureaucracy_8_desc:0 "Из налогов вассалов вычитается определенная сумма золота, так как у этого персонажа от 45 до 50 вассалов"
darkages_vassals_bureaucracy_9:0 "Правительственная Бюрократия"
darkages_vassals_bureaucracy_9_desc:0 "Из налогов вассалов вычитается определенная сумма золота, так как у этого персонажа от 50 до 55 вассалов"
darkages_vassals_bureaucracy_10:0 "Правительственная Бюрократия"
