darkages_rival_offended_diplomatically:0 "[TARGET_CHARACTER.GetShortUIName|U] глубоко [Select_CString(TARGET_CHARACTER.IsFemale, 'обидела', 'обидел')] [CHARACTER.GetShortUIName], совершив более чем несколько серьезных дипломатических оплошностей, которые принизили [CHARACTER.GetHerHim]."
darkages_rival_offended_diplomatically_corresponding:0 "[CHARACTER.GetShortUIName|U] глубоко [Select_CString(CHARACTER.IsFemale, 'обидела', 'обидел')] [TARGET_CHARACTER.GetShortUIName], совершив более чем несколько серьезных дипломатических оплошностей, которые принизили [TARGET_CHARACTER.GetHerHim]."
darkages_friend_make_amends:0 "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsFemale, 'установила', 'установил')] крепкую дружбу с [CHARACTER.GetShortUIName], умело загладив вину в очень серьезном вопросе с [CHARACTER.GetHerHim]."
darkages_friend_make_amends_corresponding:0 "[CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsFemale, 'установила', 'установил')] крепкую дружбу с  [TARGET_CHARACTER.GetShortUIName|U], умело загладив вину в очень серьезном вопросе с [TARGET_CHARACTER.GetHerHim]."
darkages_low_diplomacy.01.t:0 "Оплошность в иностранных делах"
darkages_low_diplomacy.01.desc:0 "Из-за моего низкого Навыка Дипломатии, мой недавний обмен письмами с [darkages_ruler_01.GetName|i] принял худший оборот, так как я не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] сохранить вежливый тон, избегая негативных толкований из-за плохой семантики.\n\nК сожалению, нынешнее положение дел указывает на очень обиженного человека, который непременно сочтет меня своим соперником.\n\nПоскольку появление соперников может иметь всевозможные неприятные последствия, может быть, хорошей идеей будет рассмотреть вариант загладить вину... в конце концов, изначальной ошибкой было мое отсутствие навыков в дипломатических вопросах."
darkages_low_diplomacy.01.opta:0 "Я не буду оправдываться!"
darkages_low_diplomacy.01.optb:0 "Попытаться загладить вину"
darkages_low_diplomacy.01.tt1:0 "Вы предлагаете денежную компенсацию, чтобы попытаться спасти отношения. Успех этого варианта положительно зависит от того, являетесь ли вы Общительным, Смиренным, Упрямым, Сдержанным, Спокойным и Терпеливым. Отрицательно влияют на ваши шансы Черты Черствый, Гневный, Обманщик, Произвольный, Переменчивый и Нетерпеливый\n"
darkages_low_diplomacy.01.optc:0 "Я попрошу своего [darkages_chancellor_23.GetCouncilTitle|g] вмешаться..."
darkages_low_diplomacy.01.tt2:0 "Благодаря добрым услугам [darkages_chancellor_23.GetFirstName|g] вы предлагаете денежную компенсацию, чтобы попытаться спасти отношения. Этот вариант имеет более ограниченную вероятность успеха, так как вы просите одного из своих слуг обратиться к обиженной стороне. Тем не менее, это может представлять гораздо лучшую перспективу, чем предыдущий вариант, в зависимости от ваших Черт и Черт вашего [darkages_chancellor_23.GetCouncilTitle|g]. Успех этого варианта зависит только отрицательно от того, является ли ваш [darkages_chancellor_23.GetCouncilTitle] Черствым, Гневным, Обманщиком, Произвольным, Переменчивым и Нетерпеливым\n"
darkages_lowdip_toast.01.tt1:0 "Вам удалось наладить отношения с [darkages_ruler_01.GetFirstName|i], увеличив свой Престиж!"
darkages_lowdip_toast.01.tt2:0 "К сожалению, вам придется беспокоиться о новом Сопернике, и вы потеряли больше Престижа..."
darkages_lowdip_toast.01.tt3:0 "Полная политическая победа. [darkages_ruler_01.GetName] считает вас своим новым другом!"
darkages_lowdip_toast.01.tt4:0 "Ваш [darkages_chancellor_23.GetCouncilTitle] [Select_CString(darkages_chancellor_23.IsFemale, 'сумела', 'сумел')] наладить ваши отношения с [darkages_ruler_01.GetName|i]!"
darkages_lowdip_toast.01.tt5:0 "Ваш [darkages_chancellor_23.GetCouncilTitle] [Select_CString(darkages_chancellor_23.IsFemale, 'потерпела', 'потерпел')] неудачу. Вы потеряли больше Престижа..."
darkages_low_diplomacy.02.t:0 "Слишком далеко"
darkages_low_diplomacy.02.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'вела', 'вел')] политическую встречу с моими вассалами, очевидные недостатки моего Навыка Дипломатии быстро проявились, и я [Select_CString(ROOT.Char.IsFemale, 'создала', 'создал')] жалкое впечатление о себе, своей политике и своих долгосрочных целях.\n\nВскоре стало очевидно, что я не в своей тарелке, и, к сожалению, я неуклюже [Select_CString(ROOT.Char.IsFemale, 'защищалась', 'защищался')] и свою позицию, разразившись гневной тирадой против моих вассалов.\n\nВсе разозлились, и встречу пришлось прервать, чтобы все остыли..."
darkages_low_diplomacy.02.opta:0 "Избегать возвращения к теме"
darkages_low_diplomacy.02.tt3:0 "Каждый Вассал, кроме Лояльных, почувствует к вам отвращение\n"
darkages_low_diplomacy.02.optb:0 "Послать [darkages_chancellor_72.GetCouncilTitle|U], чтобы успокоить моих вассалов"
darkages_low_diplomacy.02.tt1:0 "Вы посылаете [darkages_chancellor_72.GetCouncilTitle|U] вместе с некоторыми средствами, чтобы успокоить ваших вассалов. Базовые шансы на успех немного не в вашу пользу. На успех этого варианта положительно влияют черты вашего [darkages_chancellor_72.GetCouncilTitle] Общительный, Терпеливый, Упрямый, Спокойный и Дипломат, а также [darkages_chancellor_72.GetHerHis] Блестящий Навык Дипломатии (>=18). Отрицательно влияет, если [darkages_chancellor_72.GetSheHe] имеет черты Черствый, Гневный, Переменчивый и Нетерпеливый, а также если [darkages_chancellor_72.GetSheHe] имеет менее 15 в [darkages_chancellor_72.GetHerHis] Навыке Дипломатии. Если [darkages_chancellor_72.GetSheHe] является вашим вассалом, это также снизит ваши шансы на успех. В случае неудачи, помимо потери Престижа, вы также получите такой же штраф к мнению, как и в варианте выше\n"
darkages_low_diplomacy.02.optc:0 "Угрожать и запугивать всех"
darkages_low_diplomacy.02.tt2:0 "Вы пытаетесь внушить всем страх. В то время как большинство ваших вассалов примут ваше поведение, не моргнув глазом, Храбрые почувствуют к вам сильное презрение. Будьте осторожны: навязывание своих взглядов через страх может иметь впечатляющие обратные последствия, отчасти зависящие от ваших Черт, отчасти от чистой удачи\n"
darkages_low_diplomacy.03.t:0 "Решение всеобщих проблем"
darkages_low_diplomacy.03.desc1:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в одиночестве в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп. Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_diplomacy.03.desc2:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охранял', 'охранял')] мой телохранитель, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что я уже труп. Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_diplomacy.03.desc3:0 "Пока меня [Select_CString(ROOT.Char.IsFemale, 'охраняли', 'охраняли')] мои телохранители, пока я [Select_CString(ROOT.Char.IsFemale, 'работала', 'работал')] в своей библиотеке, мне в голову пришло внезапное чувство уязвимости.\n\nНе прошло и минуты, как кто-то спрыгнул с потолка, заявляя, что запугивание всех вредно для моего здоровья. Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел')] среагировать, когда [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что это будет бой насмерть..."
darkages_low_diplomacy.03.opta:0 "Опасность!"
darkages_low_diplomacy.03.tt1:0 "Вы подверглись этому покушению в качестве мести за свое ужасное поведение по отношению к вассалам. Ваш Навык Интриги, ваша Доблесть, присутствие одного или еще лучше двух телохранителей и чистая удача определят шанс выжить и рассказать эту историю\n"
darkages_lowdip_toast.02.tt1:0 "[darkages_chancellor_72.GetFirstName] [Select_CString(darkages_chancellor_72.IsFemale, 'сумела', 'сумел')] всех успокоить, и вы получили Престиж"
darkages_lowdip_toast.02.tt2:0 "[darkages_chancellor_72.GetFirstName] [Select_CString(darkages_chancellor_72.IsFemale, 'потерпела', 'потерпел')] неудачу, и вы теряете Престиж и Мнение ваших Вассалов"
darkages_low_dip:0 "Дипломатическая обуза"
darkages_low_dip_desc:0 "Этот персонаж испытывает трудности в других Навыках, чтобы компенсировать свой низкий Навык Дипломатии"
darkages_low_mar:0 "Военная обуза"
darkages_low_mar_desc:0 "Этот персонаж испытывает трудности в других Навыках, чтобы компенсировать свой низкий Навык Военного дела"
darkages_low_ste:0 "Управленческая обуза"
darkages_low_ste_desc:0 "Этот персонаж испытывает трудности в других Навыках, чтобы компенсировать свой низкий Навык Управления"
darkages_low_int:0 "Обуза в интригах"
darkages_low_int_desc:0 "Этот персонаж испытывает трудности в других Навыках, чтобы компенсировать свой низкий Навык Интриги"
darkages_low_lea:0 "Обуза в учености"
darkages_low_lea_desc:0 "Этот персонаж испытывает трудности в других Навыках, чтобы компенсировать свой низкий Навык Учености"
darkages_stressed:0 "Стресс"
darkages_stressed_desc:0 "Этот персонаж чувствует тяжесть стресса из-за трудностей в одном из своих Навыков"
darkages_low_diplomacy.04.t:0 "Борьба с дипломатией"
darkages_low_diplomacy.04.desc:0 "Сколько я себя помню, тонкости дипломатии выше моего понимания.\n\nЯ убеждаюсь, что трачу все больше и больше времени, борясь с этой областью своей жизни, поскольку мои обязанности требуют от меня заниматься дипломатической ареной, которую я в конечном итоге не могу постичь.\n\nТеперь пришло время решить, как я буду справляться с этим недостатком в будущем."
darkages_low_diplomacy.04.opta:0 "Сосредоточиться на моей Дипломатии за счет других Навыков"
darkages_low_diplomacy.04.optb:0 "Попытаться управлять всем"
darkages_low_diplomacy.04.optc:0 "Делегировать гораздо больше, чем желательно"
darkages_low_diplomacy.04.tt1:0 "Вас считают неудачником в управлении Дипломатией вашей Державы. Помимо затрат Престижа и дополнительных расходов на поддержку структуры, необходимой для помощи вам, ваши Вассалы падут духом из-за отсутствия вашего руководства и участия\n"
