darkages_weak_leader_desc:0 "This character's recent political actions were unimpressive at best"
darkages_impressive_leader:0 "Impressive Leader"
darkages_impressive_leader_desc:0 "This character's recent political actions were something to behold"
darkages_opinion_jinxed:0 "Jinxed Leader"
