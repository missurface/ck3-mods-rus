darkages_land_seized:0 "Предательство веры"
darkages_land_seized_desc:0 "Этот персонаж конфисковал религиозные земли, чтобы продать их тому, кто больше заплатит"
darkages_seize_land_decision:0 "Конфисковать религиозные земли"
darkages_seize_land_decision_desc:0 "Конфисковать и продать религиозные земли, чтобы увеличить свою казну. За определенную цену."
darkages_seize_land_decision_tooltip:0 "Творческий способ увеличить свою казну"
darkages_seize_land_decision_confirm:0 "Сделать это!"
darkages_special_contribution_decision:0 "Попросить у Вассалов особый взнос"
darkages_special_contribution_decision_desc:0 "Попросите у своих вассалов особый денежный взнос в больших интересах всей Державы. Ваш Престиж пострадает, так как вы признаете, что столкнулись с серьезными трудностями, и ваша Тирания возрастет, но вы наполните свою казну золотом."
darkages_special_contribution_decision_tooltip:0 "Еще один способ заработать немного золота"
darkages_special_contribution_decision_confirm:0 "Попросить золота..."
darkages_special_contribution.01.t:0 "Особый взнос"
darkages_special_contribution.01.desc:0 "После того, как я [Select_CString(ROOT.Char.IsFemale, 'отправила', 'отправил' )] своих гонцов и дипломатов с просьбой к моим вассалам о дополнительных средствах, я могу теперь приступить к подсчету полученной суммы..."
darkages_special_contribution.01.opta:0 "1,2,3..."
darkages_special_contribution.01.tt1:0 "Верные Вассалы подчинятся, не расстроившись на вас. Жадные Вассалы будут особенно расстроены\n"
darkages_corruption_decision:0 "Использовать коррупцию в своих интересах"
darkages_corruption_decision_desc:0 "Увеличьте свою Казну, свой Престиж, свое Благочестие, свою Легитимность или свое Влияние, участвуя в сложной сети одолжений, взяток и других незаконных действий. Справедливые или Честные Вассалы будут испытывать Презрение к вам, в то время как Щедрые или Сдержанные Вассалы будут Не впечатлены вами. Долгосрочные последствия этого действия зависят от вашей Интриги."
darkages_corruption_decision_tooltip:0 "Незаконные способы достижения немедленных результатов"
darkages_corruption_decision_confirm:0 "Коррумпировать!"
darkages_corruption.01.t:0 "Скрытные и греховные деяния"
darkages_corruption.01.desc:0 "После того, как я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] использовать все имеющиеся в моем распоряжении средства для достижения своих целей, мне нужно подумать о том, чего я [Select_CString(ROOT.Char.IsFemale, 'хочу', 'хочу' )] достичь своим действием.\n\nВ конце концов, как я [Select_CString(ROOT.Char.IsFemale, 'буду', 'буду' )] развращать свою Державу?"
darkages_corruption.01.opta:0 "Я хочу Золота!"
darkages_corruption.01.optb:0 "Я хочу Престижа!"
darkages_corruption.01.optc:0 "Я хочу Благочестия!"
darkages_corruption.01.optd:0 "Я хочу Легитимности!"
darkages_corruption.01.opte:0 "Я хочу Влияния!"
darkages_corruption.01.tt1:0 "Через несколько месяцев - время, необходимое для того, чтобы ваш план принес плоды - у вас будет то, чего вы желаете. Конечные последствия вашего действия частично зависят от вашей Интриги, частично от удачи\n"
darkages_corrupt1:0 "Коррумпированный правитель"
darkages_corrupt1_desc:0 "Этот персонаж недавно был замешан в Коррупции"
darkages_corrupt2:0 "Коррумпированный правитель"
darkages_corrupt2_desc:0 "Этот персонаж недавно был замешан в Коррупции"
darkages_corrupt3:0 "Коррумпированный правитель"
darkages_corrupt3_desc:0 "Этот персонаж недавно был замешан в Коррупции"
darkages_corrupt4:0 "Коррумпированный правитель"
darkages_corrupt4_desc:0 "Этот персонаж недавно был замешан в Коррупции"
darkages_corruption.02.t:0 "Немного Золота"
darkages_corruption.02.desc:0 "После того, как я [Select_CString(ROOT.Char.IsFemale, 'продолжила', 'продолжил' )] участвовать в многочисленных обменах любезностями, неявных словах, заманчивых обещаниях и всех других действиях, которые могло придумать мое отсутствие морального компаса, я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] собрать значительную сумму Золота..."
darkages_corruption.02.opta:0 "Это все мое! Мое!"
darkages_corruption.03.t:0 "Немного Престижа"
darkages_corruption.03.desc:0 "После того, как я [Select_CString(ROOT.Char.IsFemale, 'продолжила', 'продолжил' )] участвовать в многочисленных обменах любезностями, неявных словах, заманчивых обещаниях и всех других действиях, которые могло придумать мое отсутствие морального компаса, я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] накопить очень значительное количество Престижа..."
darkages_corruption.03.opta:0 "Это все мое! Мое!"
darkages_corruption.04.t:0 "Немного Благочестия"
darkages_corruption.04.desc:0 "После того, как я [Select_CString(ROOT.Char.IsFemale, 'продолжила', 'продолжил' )] участвовать в многочисленных обменах любезностями, неявных словах, заманчивых обещаниях и всех других действиях, которые могло придумать мое отсутствие морального компаса, я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] значительно увеличить свой авторитет в религиозных вопросах..."
darkages_corruption.04.opta:0 "Это все мое! Мое!"
darkages_corruption.05.t:0 "Немного Легитимности"
darkages_corruption.05.desc:0 "После того, как я [Select_CString(ROOT.Char.IsFemale, 'продолжила', 'продолжил' )] участвовать в многочисленных обменах любезностями, неявных словах, заманчивых обещаниях и всех других действиях, которые могло придумать мое отсутствие морального компаса, я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] значительно увеличить свою Легитимность..."
darkages_corruption.05.opta:0 "Это все мое! Мое!"
darkages_corruption.06.t:0 "Немного Влияния"
darkages_corruption.06.desc:0 "После того, как я [Select_CString(ROOT.Char.IsFemale, 'продолжила', 'продолжил' )] участвовать в многочисленных обменах любезностями, неявных словах, заманчивых обещаниях и всех других действиях, которые могло придумать мое отсутствие морального компаса, я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] значительно увеличить свое Влияние..."
darkages_corruption.06.opta:0 "Это все мое! Мое!"
darkages_corruption.07.t:0 "Нематериальные деяния"
darkages_corruption.07.desc:0 "Сегодня я [Select_CString(ROOT.Char.IsFemale, 'была удивлена', 'был удивлен' )], увидев [char_darkages.GetName], [Select_CString(char_darkages.IsFemale, 'ожидающую', 'ожидающего' )] меня сразу после моего приема.\n\nКак оказалось, похоже, что из-за моих попыток использовать #Bold Коррупцию#! в свою пользу, я [Select_CString(ROOT.Char.IsFemale, 'оказалась впутана', 'оказался впутан' )] в паутину одолжений с [char_darkages.GetHerHim] в центре, и теперь [char_darkages.GetFirstName] следит за тем, чтобы я [Select_CString(ROOT.Char.IsFemale, 'задолжала', 'задолжал' )] [char_darkages.GetHerHim] услугу за прошлые важные поручения.\n\nУчитывая знания, которые [char_darkages.GetSheHe] имеет обо мне, моих прошлых действиях и моих будущих планах, я ничего не могу сделать, чтобы противостоять этой ситуации..."
darkages_corruption.07.opta:0 "Конечно..."
darkages_corruption.08.t:0 "Проклятые решения"
darkages_corruption.08.desc:0 "Я твердо [Select_CString(ROOT.Char.IsFemale, 'верю', 'верю' )] в полезность развращения Державы для достижения своих целей.\n\n Однако многие другие не испытывают такого энтузиазма по поводу моего... сомнительного поведения.\n\nЭто приводит к значительному удару по моему Престижу, поскольку за моими действиями следует общественная реакция..."
darkages_corruption.08.opta:0 "К сожалению..."
darkages_corruption.09.t:0 "Цена дружбы"
darkages_corruption.09.desc:0 "По мере того, как проходит время, и отношения с моим другом [darkages_friend.GetFirstName] становятся все более натянутыми и далекими, у меня возникает чувство, что [darkages_friend.GetHerHis] знание о способах, которыми я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] #Bold развратить#! свою Державу, стало для [darkages_friend.GetHerHim] большим разочарованием.\n\nК сожалению, мы больше не друзья..."
darkages_corruption.09.opta:0 "К сожалению..."
darkages_corruption.10.t:0 "Нечестивое поведение"
darkages_corruption.10.desc:0 "За последние месяцы у меня накопилось нехорошее предчувствие, что между мной и моими религиозными собратьями что-то не так.\n\nСегодня я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что моя попытка #Bold Развратить#! Державу в свою пользу вызвала суровое неодобрение в важных местах..."
darkages_corruption.10.opta:0 "Не тот оптимальный результат, который я [Select_CString(ROOT.Char.IsFemale, 'имела', 'имел' )] в виду..."
darkages_opinion_impious:0 "Нечестивый"
darkages_corruption.10.tt1:0 "Ваш Глава конфессии - если он у вас есть - а также ваш [darkages_chaplain.GetCouncilTitle] и все ваши Ревностные Придворные будут плохо думать о вас\n"
darkages_corruption.11.t:0 "Отсутствие авторитета"
darkages_corruption.11.desc:0 "Мои попытки улучшить свое личное положение ценой #Bold Развращения#! Державы были расценены как слабость моих моральных ценностей и определенный недостаток лидерских качеств.\n\nК сожалению, моя Легитимность страдает, в то время как мои Придворные смотрят на меня с опаской..."
darkages_corruption.11.opta:0 "Это то, что есть..."
darkages_corruption.11.tt1:0 "Помимо отображаемого штрафа, все ваши взрослые, не находящиеся в заключении Придворные будут с Опаской относиться к вашим коварным путям\n"
darkages_improve_life:0 "Социальная забота"
darkages_improve_life_desc:0 "Правитель этого Графства улучшает жизнь населения с помощью различных социальных грантов"
darkages_improve_life_decision:0 "Улучшить жизнь крестьян"
darkages_improve_life_decision_tooltip:0 "Улучшить условия жизни ваших крестьян"
darkages_improve_life_decision_desc:0 "С помощью различных социальных мер улучшите участь вашего населения. Ваши Вассалы, которые являются Сострадательными, Справедливыми или Ревностными и не являются Черствыми, Садистами или Мстительными, будут Впечатлены. Ваши вассалы, которые являются Черствыми, Садистами или Мстительными и не являются Сострадательными, Ревностными или Справедливыми, будут Не впечатлены."
darkages_improve_life_decision_confirm:0 "Действительно доброе дело!"
darkages_commander_traits_xp.01.t:0 "Изучение войны"
darkages_commander_traits_xp.01.desc:0 "После проведенных сложных теоретических и практических военных учений я с радостью [Select_CString(ROOT.Char.IsFemale, 'осознаю', 'осознаю' )], что мои военные навыки получили дальнейшее развитие!\n\nПри подходящих обстоятельствах, охватываемых моими областями знаний, моя ценность как полевого командира повысилась."
darkages_commander_traits_xp.01.desc2:0 "В сложившейся ситуации мой Сюзерен [Select_CString(ROOT.Char.IsFemale, 'запланировала', 'запланировал' )] военные учения, чтобы отточить наши Командирские Навыки и лучше подготовить всех к войне.\n\nПосле проведенных сложных теоретических и практических военных учений я с радостью [Select_CString(ROOT.Char.IsFemale, 'осознаю', 'осознаю' )], что мои военные навыки получили дальнейшее развитие!\n\nПри подходящих обстоятельствах, охватываемых моими областями знаний, моя ценность как полевого командира повысилась."
darkages_commander_traits_xp.01.opta:0 "День, который стоит запомнить!"
darkages_commander_traits_xp.01.tt1:0 "Вам удалось улучшить свои Командирские Черты\n"
darkages_commander_traits_xp.02.t:0 "Упущенная возможность"
darkages_commander_traits_xp.02.desc:0 "После проведенных сложных теоретических и практических военных учений я с огорчением [Select_CString(ROOT.Char.IsFemale, 'понимаю', 'понимаю' )], что моих интеллектуальных способностей было недостаточно, чтобы усвоить новые теоретические концепции.\n\nК сожалению, я не [Select_CString(ROOT.Char.IsFemale, 'улучшила', 'улучшил' )] свои Военные Навыки..."
darkages_commander_traits_xp.02.desc2:0 "В сложившейся ситуации мой Сюзерен [Select_CString(ROOT.Char.IsFemale, 'запланировала', 'запланировал' )] военные учения, чтобы отточить наши Командирские Навыки и лучше подготовить всех к войне.\n\nПосле проведенных сложных теоретических и практических военных учений я с огорчением [Select_CString(ROOT.Char.IsFemale, 'понимаю', 'понимаю' )], что моих интеллектуальных способностей было недостаточно, чтобы усвоить новые теоретические концепции.\n\nК сожалению, я не [Select_CString(ROOT.Char.IsFemale, 'улучшила', 'улучшил' )] свои Военные Навыки..."
darkages_commander_traits_xp.02.opta:0 "День, который стоит забыть..."
darkages_commander_traits_xp.02.tt1:0 "Вам не удалось улучшить свои Командирские Черты\n"
darkages_improve_commander_traits_decision:0 "Тренировать Командирские Навыки"
darkages_improve_commander_traits_decision_tooltip:0 "Улучшить Командирские Черты"
darkages_improve_commander_traits_decision_desc:0 "Организуйте крупное мероприятие на следующие 3 месяца, чтобы улучшить свои Командирские Навыки, Командирские Навыки всех ваших Придворных и Командирские Навыки всех ваших Вассалов. Естественно, могут претендовать только персонажи, уже обладающие Командирскими Навыками. Ученость играет важную роль в шансе улучшения Командирских Навыков и в том, насколько сильно. Также важным для успеха решения является наличие Военного Образования. Грубо говоря, любой персонаж со Средней Ученостью (>=8 и <12) и без Военного Образования будет иметь 50% шанс улучшить все свои Командирские Навыки."
darkages_improve_commander_traits_decision_confirm:0 "Организовать, спланировать, реализовать!"
darkages_mark_dynasty:0 "Оказать благосклонность Династии"
darkages_mark_dynasty_desc:0 "Если вы выберете этот вариант, вы окажете благосклонность династии этого персонажа с помощью различных бонусов, в зависимости от выбранного правила игры"
rule_darkages_favoured_dynasties_rule:0 "#B #Bold Dark Ages#!:#! Благосклонность Династиям"
setting_darkages_dynasty_disabled:0 "Отключено"
setting_darkages_dynasty_disabled_desc:0 "Никакие Династии никогда не будут пользоваться благосклонностью."
setting_darkages_dynasty_simple_enabled:0 "Включено"
setting_darkages_dynasty_simple_enabled_desc:0 "Династии, выбранные через Взаимодействие с Персонажем, будут иметь 30% бонус к Плодовитости"
setting_darkages_dynasty_plus_enabled:0 "Сильно"
setting_darkages_dynasty_plus_enabled_desc:0 "Династии, выбранные через Взаимодействие с Персонажем, будут иметь 30% бонус к Плодовитости и +3 ко всем навыкам"
darkages_m_d_1:0 "Манифест Судьбы"
darkages_m_d_1_desc:0 "Династия этого персонажа пользуется благосклонностью Богов"
darkages_m_d_2:0 "Манифест Судьбы +"
darkages_m_d_2_desc:0 "Династия этого персонажа пользуется сильной благосклонностью Богов"
 
darkages_spouses_up_age.01.t:0 "Странный выбор"
darkages_spouses_up_age.01.desc:0 "По мере того, как мои брачные планы продвигаются вперед, я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] чувствовать некоторый дискомфорт, как со стороны благородных, так и со стороны религиозных персонажей моей Державы.\n\nКак оказалось, похоже, что разница в возрасте между мной и [Select_CString(ROOT.Char.IsFemale, 'моим женихом', 'моей невестой' )], а также [Select_CString(ROOT.Char.IsFemale, 'его', 'ее' )] собственный возраст кажутся проблемой, для этих традиционалистов и, я [Select_CString(ROOT.Char.IsFemale, 'могла бы сказать', 'мог бы сказать' )], кастрирующих душ!\n\nК сожалению, я не могу идти против реальности, и правда заключается в том, что мое решение дается дорогой ценой в плане Престижа..."
darkages_spouses_up_age.01.opta:0 "Я буду двигаться вперед!"
darkages_spouses_up_age.01.optb:0 "Пора подумать о политических последствиях..."
darkages_spouses_up_age.01.tt1:0 "Поскольку [Select_CString(ROOT.Char.IsFemale, 'ваш жених старше', 'ваша невеста старше' )] 35 лет, и вы более чем на 10 лет моложе [Select_CString(ROOT.Char.IsFemale, 'него', 'нее' )], все достойные своего имени поднимают более чем одну бровь по поводу вашего выбора\n"


darkages_landless_provisions.01.t:0 "Грабители и Воры"
darkages_landless_provisions.01.desc:0 "Рано утром в воскресенье я [Select_CString(ROOT.Char.IsFemale, 'была внезапно разбужена', 'был внезапно разбужен' )] своими последователями, чтобы быть [Select_CString(ROOT.Char.IsFemale, 'предупрежденной', 'предупрежденным' )], что банда грабителей напала на наши хранилища, унеся с собой много ценных припасов.\n\nК счастью, они были опознаны как банда воров из соседней деревни, что дает мне возможность преследовать их, если я [Select_CString(ROOT.Char.IsFemale, 'найду', 'найду' )] эту перспективу заманчивой..."
darkages_landless_provisions.01.opta:0 "Ничего не делать"
darkages_landless_provisions.01.tt1:0 "Избегая каких-либо ответных мер, вы не вернете свои Припасы, но, по крайней мере, вы не рискуете своим Престижем, если ваши действия окажутся неудачными\n"
darkages_landless_provisions.01.optb:0 "Украсть то, что было украдено у вас..."
darkages_landless_provisions.01.tt2:0 "В случае успеха вы вернете свои Припасы. Успех этого действия положительно зависит от наличия Образования в Интриге, от вашего высокого уровня (>=12) Навыка Интриги и от ваших Черт Соблазнитель, Пытатель, Вероломный, Произвольный, Храбрый, Эксцентричный, Черствый, Усердный и Циничный. Вашим усилиям мешают ваша низкая (<8) Интрига и ваши Черты Честный, Сострадательный, Трусливый, Щедрый, Доверчивый, Ленивый и Прощающий\n"
darkages_landless_provisions.01.optc:0 "Штурмовать убежище бандитов!"
darkages_landless_provisions.01.tt3:0 "В случае успеха вы вернете свои Припасы и разграбите лагерь воров. Если вы потерпите неудачу, вы можете быть ранены. Успех этого действия положительно зависит от наличия Военного Образования, от вашего высокого уровня (>=12) Военного Навыка и от ваших Черт Галантный, Стратег, Мстительный, Гневный, Упрямый, Черствый, Параноидальный и Амбициозный\n"
darkages_landless_provisions.01.toast1:0 "Вы возвращаете свои Припасы и получаете немного Престижа!"
darkages_landless_provisions.01.toast2:0 "Вы терпите неудачу и теряете Припасы и Престиж..."
darkages_landless_provisions.01.toast3:0 "Вы возвращаете свои припасы и получаете Престиж, больше Припасов и Золота!"
darkages_landless_provisions.01.toast4:0 "Вы терпите неудачу и теряете Припасы, Престиж и оказываетесь ранены..."
darkages_landless_provisions.02.t:0 "Заманчивое предложение"
darkages_landless_provisions.02.desc:0 "Вчера мне [Select_CString(ROOT.Char.IsFemale, 'нанес', 'нанес' )] визит высокопоставленный слуга [darkages_neighbour_liege.GetName], правителя, который [Select_CString(darkages_neighbour_liege.IsFemale, 'проявила', 'проявил' )] особый интерес к моим начинаниям, желая купить у нас Припасы.\n\nСлух распространился, как огонь в стоге сена, и все мои лагерные последователи теперь ожидают притока золота, чтобы помочь нашей операции. [darkages_leave_1.GetName] с особым энтузиазмом [Select_CString(darkages_leave_1.IsFemale, 'относится', 'относится' )] к возможностям сделки и [Select_CString(darkages_leave_1.IsFemale, 'лоббировала', 'лоббировал' )] меня принять предложение...\n\nМое тщательное внимание к деталям сделки и ее полным последствиям имеет решающее значение для того, как мне следует действовать дальше."
darkages_landless_provisions.02.opta:0 "Принять сделку"
darkages_landless_provisions.02.optb:0 "Вступить в дальнейшие переговоры"
darkages_landless_provisions.02.optc:0 "Отказаться от сделки"
darkages_landless_provisions.02.tt1:0 "Вы торгуетесь с представителем [darkages_neighbour_liege.GetName]. Это может связать вас с лучшей, той же или худшей сделкой, чем та, что была представлена. Положительно влияют на ваши шансы на успех ваш Хороший Навык Управления или лучше (>=12), ваше Образование в Управлении и ваши Черты Жадный, Упрямый, Вероломный, Произвольный и Общительный. Отрицательно влияют на вашу попытку договориться о сделке ваше Низкое Управление или хуже (<8) и черты Щедрый, Честный, Справедливый, Сострадательный и Застенчивый\n"
darkages_landless_provisions.02.tt2:0 "Вы отказываетесь от сделки. Все ваши лагерные последователи будут Удручены вашим действием. По крайней мере [darkages_leave_1.GetName] покинет вас - другие последователи также могут уйти\n"
darkages_landless_provisions.03.t:0 "Успех!"
darkages_landless_provisions.03.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] договориться о лучшей сделке, чем та, что была первоначально предложена.\n\nЯ действительно [Select_CString(ROOT.Char.IsFemale, 'горжусь', 'горжусь' )] собой!"
darkages_landless_provisions.03.opta:0 "Отлично!"
darkages_landless_provisions.03.tt1:0 "Помимо показанных эффектов, все ваши Лагерные Последователи будут Впечатлены вашими способностями к переговорам\n"
darkages_landless_provisions.04.t:0 "Хождение по кругу"
darkages_landless_provisions.04.desc:0 "После долгих торгов и потраченного времени стало ясно, что либо из-за хороших навыков ведения переговоров посланника [darkages_neighbour_liege.GetName], либо из-за моей плохой торговой эффективности я не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] улучшить сделку, представленную ранее.\n\nЯ расстаюсь со своими припасами и принимаю предложенное золото."
darkages_landless_provisions.04.opta:0 "Это то, что есть"
darkages_landless_provisions.05.t:0 "Разорительная сделка"
darkages_landless_provisions.05.desc:0 "Переговоры прошли плохо, и в итоге меня [Select_CString(ROOT.Char.IsFemale, 'обвел', 'обвел' )] вокруг пальца эмиссар [darkages_neighbour_liege.GetName].\n\nК сожалению, я наконец [Select_CString(ROOT.Char.IsFemale, 'согласилась', 'согласился' )] на худшую сделку, чем та, что была первоначально представлена..."
darkages_landless_provisions.05.opta:0 "О... проклятый придурок!"
darkages_friend_dire_times:0 "Помощь припасами в тяжелые времена"
darkages_disaster_relief_1:0 "Помощь при бедствиях"
darkages_disaster_relief_1_desc:0 "Эта провинция получила существенную помощь в трудные времена"
darkages_disaster_relief_2:0 "Disaster Relief"
darkages_disaster_relief_2_desc:0 "This province received some relief during hard times"
darkages_landless_provisions.06.t:0 "Disaster in [darkages_target_county.GetName]"
darkages_landless_provisions.06.desc:0 "This afternoon my camp was visited by dignitaries sent by [darkages_picked_ruler.GetName], a nearby ruler, informing me that a major drought is affecting for months the [darkages_target_county.GetName]. With Development and Control of the County decreasing dramatically, the important individuals pleaded for my help with Provisions.\n\nThe mood in my camp is not positive, however. My followers think poorly about [darkages_picked_ruler.GetFirstName] and will not approve the decrease in our stores.\n\nIt is clear my warehouses will substancially decrease their content but one should also factor in the weight of a new friendship in this unforgiving land..."
darkages_landless_provisions.06.opta:0 "Offer all help"
darkages_landless_provisions.06.optb:0 "Offer some help"
darkages_landless_provisions.06.optc:0 "In this harsh world [darkages_picked_ruler.GetFirstName] must fend for [darkages_picked_ruler.GetHerHim]self!"
darkages_landless_provisions.07.t:0 "Rotten Provisions"
darkages_landless_provisions.07.desc:0 "Due to recent poor weather as well as some negligent behaviour, it is now becoming apparent we have lost a significant amount of provisions.\n\nWe need to implement better storage capabilities!"
darkages_landless_provisions.07.opta:0 "Those are bad news..."
darkages_opinion_cynical:0 "Cynical"
darkages_rival_criminal:0 "Gave sanctuary to a known blood criminal"
darkages_landless_provisions.08.t:0 "A Person of Interest"
darkages_landless_provisions.08.desc:0 "Soon before I went to sleep yesterday, my sentries passed me word about a curious late arrival at my camp.\nAs it turned out, the arrival is none other than [darkages_criminal.GetName], a dangerous criminal wanted by a nearby ruler, [darkages_aggrieved_ruler.GetName] of [darkages_aggrieved_ruler.GetHerHis] name.\n\nKnowing beforehand there is a bounty on [darkages_criminal.GetHerHis] head, [darkages_criminal.GetName] proceeded to offer me [darkages_criminal.GetHerHis] services in a tradoff for protection.\nIt is clear this person is talented and will be a very nice asset for my operation but the path ahead forks in different directions..."
darkages_landless_provisions.08.opta:0 "Provide sanctuary to the criminal"
darkages_landless_provisions.08.optb:0 "Accept [darkages_criminal.GetHerHim] and try to soothe [darkages_aggrieved_ruler.GetFirstName] humours"
darkages_landless_provisions.08.optc:0 "Send the criminal on [darkages_criminal.GetHerHis] way"
darkages_landless_provisions.08.optd:0 "Arrest and deliver the criminal to [darkages_aggrieved_ruler.GetName]"
darkages_landless_provisions.08.toast1:0 "I managed to assuage [darkages_aggrieved_ruler.GetName]!"
darkages_landless_provisions.08.toast2:0 "I failed to assuage [darkages_aggrieved_ruler.GetFirstName]. Lost Prestige, gained a new Rival and the chance of serious troubles ahead..."
darkages_landless_provisions.08.tt1:0 "You are adamant into accepting [darkages_criminal.GetName] in your camp\n"
darkages_landless_provisions.08.tt2:0 "Trying to talk your way out of the decision to provide solace to [darkages_criminal.GetName] might prove dangerous if you fail. On top of gaining a Rival, your decision might generate a reckless action from the aggrieved [darkages_aggrieved_ruler.GetName]. Pay attention to [darkages_aggrieved_ruler.GetHerHis] traits. The success of this action is dependent on your above average or better (>=12) Diplomacy Skill and your traits Diplomat, Seducer, Gregarious, Stubborn, Cynical and Humble. Having a Diplomacy Education also helps. Working against your chances are your Low Diplomacy Skill (<8) and your traits Callous, Vengeful, Sadistic, Deceitful, Paranoid and Wrathful. The success chances start a bit tipped against you\n"
darkages_landless_provisions.08.tt3:0 "You refuse sanctuary to [darkages_criminal.GetName] and send [darkages_criminal.GetHerHim] on [darkages_criminal.GetHerHis] way...\n"
darkages_landless_provisions.08.tt4:0 "You capture [darkages_criminal.GetName] and deliver [darkages_criminal.GetHerHim] to [darkages_aggrieved_ruler.GetName], thus condemning [darkages_criminal.GetHerHim] to a certain death\n"
darkages_landless_provisions.09.t:0 "'R' is for 'Revenge'!"
darkages_landless_provisions.09.desc:0 "As I was taking a stroll nearby my camp, I am suddenly accosted by two characters that have only one objective in mind: My Life!\n\nJust before the attack, one of them spites from his mouth:\n'An eye for an eye. With the eternal compliments of [darkages_aggrieved_ruler.GetName]!'"
darkages_landless_provisions.09.desc1:0 "As I was taking a stroll nearby my camp, I am suddenly accosted by two characters that have only one objective in mind: My Life!\n\nJust before the attack, one of them spites from his mouth:\n'An eye for an eye. With the eternal compliments of [darkages_aggrieved_ruler.GetName]!'\n\nFortunately I have my bodyguard with me..."
darkages_landless_provisions.09.desc2:0 "As I was taking a stroll nearby my camp, I am suddenly accosted by two characters that have only one objective in mind: My Life!\n\nJust before the attack, one of them spites from his mouth:\n'An eye for an eye. With the eternal compliments of [darkages_aggrieved_ruler.GetName]!'\n\nFortunately I have my bodyguards with me..."
darkages_landless_provisions.09.opta:0 "Oh, the dice of fate..."
darkages_landless_provisions.09.tt1:0 "There is almost always a residual chance that [darkages_aggrieved_ruler.GetFirstName] orders as assassination attempt against you. Only if [darkages_aggrieved_ruler.GetSheHe] is Compassionate you can entirely avoid this outcome. If [darkages_aggrieved_ruler.GetSheHe] is Vengeful, Callous, WRathful Sadistic or Just, the chances of the assassination attempt being ordered will go up. Good luck!\n"

darkages_nomads.01.t:0 "The Wrath of the Gods"
darkages_nomads.01.desc:0 "Given the harsh weather conditions on my capital, my herd is suffering all sorts of punishments and the kiss of death touches an immense number of animals.\n\nI need to check my coffers to see if I have enough to buy rations and build better conditions for my herd in this time of scarcity... or perhaps my high Learning or some steppe trait saves the day!"
darkages_nomads.01.opta:0 "Damnation!"
darkages_nomads.01.optb:0 "Using my funds I can lessen the suffering"
darkages_nomads.01.optc:0 "I'll use my skills to help my herd"
darkages_nomads.01.tt1:0 "You manage to have in your treasury at least half the gold necessary to lessen the dire effects of the weather\n"
darkages_nomads.01.tt2:0 "You either have at least an above average Learning Skill or have the Seasoned Pastoralist Trait for this option to be active. More than Very Good Learning Skill (>= 18) provides a bonus to your chances as well as the traits Seasoned Pastoralist, Shrewd, Temperate, Patient and Calm. A Learning skill lower than Above Average (<12) provides a penalty that is harsher the less Learning you have. Being Dull also will not help you. Please be aware that failure with your measures will worsen the situation by a very significant amount\n"
darkages_nomads.01.toast1:0 "You managed to save countless animals from a certain death!"
darkages_nomads.01.toast2:0 "Unfortunately, you failed on your efforts to save your herd..."
darkages_nomads.02.t:0 "The Art of the Steal"
darkages_nomads.02.desc:0 "On this glorious morning, I was woken up by a group of my men telling me in hurried words that part of my herd has been stolen over the last few days.\n\nAll eyes are on me while I consider my options..."
darkages_nomads.02.opta:0 "There is nothing we can do..."
darkages_nomads.02.optb:0 "On your horses! We will pursue them!"
darkages_nomads.02.optc:0 "Now, I have a plan for a devious trap..."
darkages_nomads.02.tt0:0 "If you are only seeing this option it means you don't have Above Average Skill (>=12) in Martial or Intrigue and lack the traits Overseer, Brave, Vengeful, Stubborn, Torturer, Deceitful, Eccentric and Disloyal\n"
darkages_nomads.02.tt1:0 "This option is available because you are at least Above Average (>=12) in Martial or have one of the traits Overseer, Brave, Vengeful or Stubborn. Your chances of success are higher if you have one of the previously mentioned traits, are Impatient, are Wrathful or have at least Good (>=15) Martial Skill. Working against you are a lower than Average (<12) Martial Skill and the traits Forgiving, Patient, Calm, Lazy or Craven\n"
darkages_nomads.02.tt2:0 "This option is available because you are at least Above Average (>=12) in Intrigue or have one of the traits Torturer, Deceitful, Eccentric or Disloyal. Your chances of success are higher if you have one of the previously mentioned traits, are Calm, are Patient or have at least Good (>=15) Intrigue Skill. Working against you are a lower than Average (<12) Intrigue Skill and the traits Wrathful, Impatient, Honest, Loyal or Fickle\n"
darkages_nomads.02.toast1:0 "After a successful pursuit I managed to recover my herd!"
darkages_nomads.02.toast2:0 "The pursuit was a failure. I lost my herd and 150 Prestige"
darkages_nomads.02.toast3:0 "The trap was a success, we killed everybody and recovered my herd!"
darkages_nomads.02.toast4:0 "The trap was a failure. I lost my herd and 150 Prestige"

