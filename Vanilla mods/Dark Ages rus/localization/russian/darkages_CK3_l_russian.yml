darkages_check_development.01.tt9:0 "Поскольку уровень Развития этого Графства достигает 90, необходимо построить дополнительную вспомогательную инфраструктуру, чтобы оно продолжало свой устойчивый рост\n"
darkages_check_development.01.tt1_special:0 "Поскольку уровень Развития этого Графства достигает 10, необходимо построить дополнительную вспомогательную инфраструктуру, чтобы оно продолжало свой устойчивый рост. Стоимость инвестиций в [my_county.GetName] значительно снижена, потому что вы либо Архитектор, либо имеете Управление не менее 21\n"
