darkages_county_penalty_control.01.t:0 "Кризис в [target_title.GetName]"
darkages_county_penalty_control.01.desc:0 "В моих владениях назревают неприятности, так как значительная часть населения, вдохновленная опасным демагогом, выражает свое недовольство условиями жизни.\n\nПростолюдины отказываются взаимодействовать с чиновниками, управляющими этим местом, не подчиняются приказам ополчения и сеют хаос в проводимой в регионе политике.\n\nТакое положение дел вызывает значительные беспорядки в районе. Это может привести к опасным ситуациям для моей физической неприкосновенности в будущем..."
darkages_county_penalty_control.01.opta:0 "Мы должны пережить эту бурю..."
darkages_county_penalty_control.01.optb:0 "Использовать дипломатию, превзойти и затмить опасного демагога"
darkages_county_penalty_control.01.optc:0 "Использовать военный подход и послать элитные войска разобраться с населением"
darkages_county_penalty_control.01.optd:0 "Положиться на управление, сосредоточившись на улучшении условий их жизни"
darkages_county_penalty_control.01.opte:0 "Использовать интригу и приказать убить опасного демагога"
darkages_county_penalty_control.01.optf:0 "Использовать ученость и вдохновить народ благочестивыми речами"
darkages_county_penalty_control.01.optg:0 "Затерроризировать все население и подчинить его"
darkages_county_penalty_control.01.tt:0 "Помимо соответствующего навыка, черты [Concept('just', 'Справедливый')|E], [Concept('generous', 'Щедрый')|E], [Concept('diligent', 'Усердный')|E], [Concept('calm', 'Сдержанный')|E], [Concept('honest', 'Честный')|E] и [Concept('compassionate', 'Сострадательный')|E] дают бонус к шансу успеха. Напротив, черты [Concept('wrathful', 'Гневный')|E], [Concept('callous', 'Черствый')|E], [Concept('sadistic', 'Садист')|E], [Concept('paranoid', 'Параноик')|E], [Concept('arbitrary', 'Своенравный')|E] и [Concept('vengeful', 'Мстительный')|E] дают штраф к шансам успеха\n"
darkages_county_penalty_control.01.tt2:0 "Этот вариант доступен, потому что у вас есть минимальный уровень [Concept('dread', 'ужаса')|E], либо вы [Concept('callous', 'Черствый')|E], [Concept('sadistic', 'Садист')|E], [Concept('wrathful', 'Гневный')|E], [Concept('paranoid', 'Параноик')|E] или [Concept('vengeful', 'Мстительный')|E]. Успех зависит от вашей [Concept('intrigue', 'интриги')|E] и наличия достоинств «Жесткое правление», «Устрашение» и «Подразумеваемая злоба». Также черты [Concept('overseer', 'Надзиратель')|E] и [Concept('torturer', 'Пыточных дел мастер')|E] дают бонусы к успеху этого варианта\n"
darkages_county_penalty_control.02.t:0 "В [target_title.GetName] назревают неприятности"
darkages_county_penalty_control.02.desc:0 "Под предводительством харизматичного популиста, вышедшего из толпы и распространяющего ложные слухи обо мне, значительная часть населения, похоже, верит лжи и считает меня источником своего гнева.\n\nПростолюдины отказываются взаимодействовать с чиновниками, управляющими этим местом, не подчиняются приказам ополчения и сеют хаос в проводимой в регионе политике.\n\nПри нынешнем положении дел такое состояние вещей вызывает значительное падение мнения людей обо мне.\nЭто может привести к опасным ситуациям для моей физической неприкосновенности в будущем..."
darkages_opinion_county_penalty1:0 "Значительно недовольное население"
darkages_opinion_county_penalty2:0 "Существенно недовольное население"
darkages_opinion_county_penalty3:0 "Серьезно недовольное население"
darkages_opinion_county_penalty4:0 "Чрезвычайно недовольное население"
darkages_opinion_county_penalty1_desc:0 "Благодаря манипуляциям демагога в графстве, народное мнение о вашем правлении страдает..."
darkages_opinion_county_penalty2_desc:0 "Благодаря манипуляциям демагога в графстве, народное мнение о вашем правлении страдает..."
darkages_opinion_county_penalty3_desc:0 "Благодаря манипуляциям демагога в графстве, народное мнение о вашем правлении страдает..."
darkages_opinion_county_penalty4_desc:0 "Благодаря манипуляциям демагога в графстве, народное мнение о вашем правлении страдает..."
darkages_toast.1.t:0 "Успех!"
darkages_toast.1.tt:0 "Вы отделались меньшим из двух зол и избежали худших наказаний"
darkages_toast.2.t:0 "Провал..."
darkages_toast.2.tt:0 "Вы оказались в худшей ситуации и теряете 125 [Concept('prestige', 'престижа')|E]"
darkages_toast.3.t:0 "Ранен"
darkages_toast.3.tt:0 "Вы получили [Concept('severely_injured', 'Тяжелое ранение')|E]"
darkages_toast.4.tt:0 "Вы оказались [Concept('near_death', 'при смерти')|E]"
darkages_toast.5.tt:0 "Вы были [Concept('wounded', 'ранены')|E]"
darkages_toast.6.t:0 "Сбежал!"
darkages_toast.6.tt:0 "Вы избежали нападения невредимым"
darkages_toast.7.tt:0 "Ваша свирепость позволила нейтрализовать всю политическую ситуацию"
darkages_toast.8.tt:0 "Ваши угрозы звучат пусто, и теперь вы сталкиваетесь с серьезной политической ситуацией, которая продлится дольше"
grant_independence_interaction_darkages:0 "Даровать независимость (Dark Ages)"
grant_independence_interaction_darkages_desc:0 "Вы можете использовать это, чтобы даровать независимость кому угодно"
darkages_prison_brings_death.01.t:0 "Чудо, которое так и не случилось"
darkages_prison_brings_death1.01.desc:0 "Пребывание в тюрьме сказалось на моем душевном и физическом состоянии. Даже если я какое-то время [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] выдерживать давление одиночества и ограничение свободы передвижения, я сильно скучаю по своей свободе и по тому, как она позволяла мне делать значимые вещи. Плохо питаясь, чувствуя, что трачу здесь свою жизнь впустую, отчаянно желая снова почувствовать открытый воздух без преград, однажды я [Select_CString(ROOT.Char.IsFemale, 'легла', 'лег')] спать и не [Select_CString(ROOT.Char.IsFemale, 'проснулась', 'проснулся')], что сделало мой сон вечным..."
darkages_prison_brings_death2.01.desc:0 "Пребывание в плену с раной поначалу меня не пугало. К несчастью, мне не оказали должного лечения, и мое тело так и не исцелилось полностью. Однажды, к моему отчаянию, началась гангрена, и, охваченный страхом, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] лишь наблюдать и чувствовать, как жизнь медленно покидает меня в процессе, который длился меньше двух недель. Наконец, милость Божья забрала мою душу, пока я [Select_CString(ROOT.Char.IsFemale, 'была потеряна', 'был потерян')] в бреду, созданном мной же..."
darkages_prison_brings_death3.01.desc:0 "Хотя пребывание в тюрьме само по себе тяжелое испытание, мое нездоровое состояние лишь усугубило риски, которым я [Select_CString(ROOT.Char.IsFemale, 'подвергалась', 'подвергался')] в заключении. К несчастью, мое состояние начало ухудшаться все быстрее, пока однажды, лишившись сил, я не [Select_CString(ROOT.Char.IsFemale, 'умерла', 'умер')] одинокой и медленной смертью..."
darkages_prison_brings_death4.01.desc:0 "По прибытии в тюрьму стражники насмехались над моим состоянием. Нездоровый и раненый, мои шансы выбраться живым были действительно малы, и они прямо указывали мне на это. Не получая никакого лечения, я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] думать так же, и, к сожалению, это стало самоисполняющимся пророчеством. Однажды, обессилев и лежа на матрасе, ужасно страдая от своего жалкого состояния, я [Select_CString(ROOT.Char.IsFemale, 'уснула', 'уснул')], чтобы больше никогда не проснуться..."
darkages_prison_brings_death.01.opta:0 "Я умираю вдалеке от своих любимых и значимых людей..."
darkages_prison_brings_death.01.tt:0 "Хотя пребывание в тюрьме всегда может внезапно оборвать вашу жизнь, ваша кончина может наступить раньше, если вы ранены, страдаете от какой-либо болезни, находитесь в депрессии или имеете слабое здоровье\n"
darkages_train_knights_decision:0 "Тренировать $knight_culture_player_plural_no_tooltip$"
train_knights_decision_desc:0 "Организовать надлежащую тренировку для $knight_culture_player_plural_no_tooltip$ с [Concept('prowess', 'доблестью')|E] менее 21 в течение следующего года, улучшая ее путем траты значительного количества золота на различные имитации боевых ситуаций. Существует риск травм и даже смерти во время тренировки."
train_knights_decision_tooltip:0 "Тренировать $knight_culture_player_plural_no_tooltip$, чтобы увеличить их [Concept('prowess', 'доблесть')|E]"
train_knights_decision_tt:0 "Выбрав это решение, вы повысите эффективность ваших $knight_culture_player_plural_no_tooltip$ в бою, организовав для них и их свит комплексную программу военной подготовки в течение следующего года. По окончании тренировки произойдет событие, которое даст бонусы и применит возможные травмы."
darkages_train_knights_decision_confirm:0 "Давайте улучшим их..."
darkages_train_knights.01.t:0 "$knight_culture_player_plural_no_tooltip$ и свита обучены"
darkages_train_knights.01.desc:0 "После многих месяцев тяжелых тренировок и маневров мой отряд $knight_culture_player_plural_no_tooltip$ теперь гораздо эффективнее на поле боя. Их [Concept('prowess', 'доблесть')|E] вместе с новыми возможностями их свит были значительно расширены."
darkages_train_knights.01.opta:0 "Впечатляет!"
darkages_train_knights.01.tt:0 "Ваши $knight_culture_player_plural_no_tooltip$ с [Concept('prowess', 'доблестью')|E] ниже 21 увеличат ее на величину от 1 до 5. Также есть шанс, что во время тренировки они пострадали от несчастных случаев\n"
darkages_train_knights_toast.1.t:0 "Несчастный случай на тренировке"
darkages_train_knights_toast.1.tt:0 "[darkages_train_knight.GetName], $knight_culture_player_no_tooltip$ у вас на службе, [Select_CString(darkages_train_knight.IsFemale, 'получила', 'получил')] ранение во время тренировки"
darkages_train_knights_toast.2.t:0 "Смертельный несчастный случай на тренировке"
darkages_train_knights_toast.2.tt:0 "[darkages_train_knight.GetName], ваш бывший $knight_culture_player_no_tooltip$, случайно [Select_CString(darkages_train_knight.IsFemale, 'лишилась', 'лишился')] жизни во время тренировки"
darkages_negotiate_alliance_interaction:0 "Вести переговоры о союзе"
darkages_train_combat_decision:0 "Практиковаться в спарринге с мастером клинка"
darkages_train_combat_decision_desc:0 "Нанять мастера клинка, чтобы улучшить свою [Concept('prowess', 'доблесть')|E]. Обратите внимание, что мастер клинка может иметь разные навыки, и это определяет максимальный уровень, которого вы можете достичь. Мастер может быть Компетентным (15 доблести), Опасным (20 доблести), Смертоносным (25 доблести) или Элитным (30 доблести)."
darkages_train_combat_decision_tooltip:0 "Улучшить свою [Concept('prowess', 'доблесть')|E]"
darkages_train_combat_decision_tt:0 "Потратьте около двух лет на тренировки с мастером клинка, чтобы улучшить свою [Concept('prowess', 'доблесть')|E]. По прошествии времени, если ваша доблесть не превышает доблесть мастера, вам меньше 40 лет, вы не [Concept('incapable', 'недееспособны')|E] и не в тюрьме, вы можете улучшить ее снова еще примерно за два года. Вы можете выбрать это решение только один раз в жизни.\n"
darkages_train_combat_decision_confirm:0 "Я хочу улучшить свои боевые навыки"
darkages_train_combat.01.t:0 "Боевая подготовка"
darkages_train_combat.01.desc1:0 "Прошло около двух лет, и ваш Компетентный мастер клинка с 15 [Concept('prowess', 'доблести')|E] улучшил ваши навыки. Насколько сильно — зависит от ваших усилий и легкости понимания техник мастера"
darkages_train_combat.01.desc2:0 "Прошло около двух лет, и ваш Опасный мастер клинка с 20 [Concept('prowess', 'доблести')|E] улучшил ваши навыки. Насколько сильно — зависит от ваших усилий и легкости понимания техник мастера"
darkages_train_combat.01.desc3:0 "Прошло около двух лет, и ваш Смертоносный мастер клинка с 25 [Concept('prowess', 'доблести')|E] улучшил ваши навыки. Насколько сильно — зависит от ваших усилий и легкости понимания техник мастера"
darkages_train_combat.01.desc4:0 "Прошло около двух лет, и ваш Элитный мастер клинка с 30 [Concept('prowess', 'доблести')|E] улучшил ваши навыки. Насколько сильно — зависит от ваших усилий и легкости понимания техник мастера"
darkages_train_combat.01.opta:0 "Продолжить тренировку"
darkages_train_combat.01.tt:0 "Если ваша [Concept('prowess', 'доблесть')|E] меньше, чем у вашего мастера, и вам меньше 40 лет, и вы не являетесь узником или [Concept('incapable', 'недееспособным')|E], вы можете оплатить еще два года обучения. Ваш мастер клинка нанимается в начале обучения, и его [Concept('prowess', 'доблесть')|E] составляет 15, если он Компетентный, 20 — если Опасный, 25 — если Смертоносный и 30 — если Элитный\n"
darkages_train_combat.01.tt2:0 "Помимо возможности всегда прекратить тренировки, если ваша [Concept('prowess', 'доблесть')|E] равна или больше, чем у вашего мастера, вы находитесь в заключении, вам больше 39 лет или вы [Concept('incapable', 'недееспособны')|E], вы будете вынуждены прекратить их\n"
darkages_train_combat.01.optb:0 "Это конец пути..."
darkages_add_shrewd_dull.01.t:0 "Острый ум"
darkages_add_shrewd_dull.01.desc:0 "Взрослея, общаясь с другими детьми и даже взрослыми, я, как правило, остро осознаю их мотивы, заговоры, интриги и интуитивно противостою — или незаметно поддерживаю — их конечные цели и задачи. В конце концов, мои суждения о людях и ситуациях кажутся верными в большинстве случаев, что чаще всего приводит к улучшению моих знаний и моих собственных планов..."
darkages_add_shrewd_dull.01.opta:0 "Оказывается, я [Concept('shrewd', 'Проницательный')|E]!"
darkages_add_shrewd_dull.02.t:0 "Дефектный ум"
darkages_add_shrewd_dull.02.desc:0 "Взрослея, общаясь с другими детьми и даже взрослыми, я, как правило, остаюсь чрезвычайно наивным в отношении их мотивов, заговоров и интриг.\n\nМне также не удается оценить личные мотивы каждого человека или то, чем, вероятно, закончится любой будущий сценарий.\n\nВ общем, мои суждения о людях и ситуациях кажутся ошибочными большую часть времени, что приводит к моим собственным ошибочным решениям и мнениям в большинстве условий и обстоятельств..."
darkages_add_shrewd_dull.02.opta:0 "Оказывается, я [Concept('dull', 'Тупой')|E]..."
darkages_add_deviant.01.t:0 "Коварные плотские искушения"
darkages_add_deviant.01.desc:0 "Будучи еще молодым взрослым и взрослея, я обнаруживаю в себе некоторые тревожные сексуальные вкусы. Эти чувства и вкусы, в целом отвергаемые обществом, слишком сильны, чтобы я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] сдержаться, даже если я знаю, что они вызывают отвращение у большинства моих сверстников и слуг. Тем не менее, зная о рисках, я предаюсь этим запретным удовольствиям при любой возможности."
darkages_add_deviant.01.opta:0 "Тщательно охраняемый секрет..."
darkages_add_deviant.02.tt:0 "Шанс того, что [da_character_discovery_deviant.GetName] сохранит ваше отклонение в тайне, положительно зависит от вашей высокой [Concept('intrigue', 'интриги')|E], от низкой [Concept('intrigue', 'интриги')|E] [da_character_discovery_deviant.GetFirstName], от вашего [Concept('dread', 'ужаса')|E] — чем выше, тем лучше эффект, пока [Select_CString(da_character_discovery_deviant.IsFemale, 'она', 'он')] не [Concept('brave', 'Отважный')|E] — [Select_CString(da_character_discovery_deviant.IsFemale, 'ее', 'его')] положительного мнения о вас, и является ли [Select_CString(da_character_discovery_deviant.IsFemale, 'она', 'он')] вашим другом, лучшим другом или любовником. Напротив, шансы на то, что [da_character_discovery_deviant.GetFirstName] раскроет ваше отклонение, увеличиваются из-за [Select_CString(da_character_discovery_deviant.IsFemale, 'ее', 'его')] негативного мнения о вас, высокой интриги, если [Select_CString(da_character_discovery_deviant.IsFemale, 'она', 'он')] ваш соперник или заклятый враг — почти гарантированная катастрофа! — [Select_CString(da_character_discovery_deviant.IsFemale, 'ее', 'его')] образования в дипломатии или, что еще хуже, в интриге. Если [da_character_discovery_deviant.GetFirstName] также [Concept('vengeful', 'Мстительный')|E], [Concept('callous', 'Черствый')|E] или [Concept('sadistic', 'Садист')|E], ваши шансы на раскрытие секрета возрастают.\n"
darkages_add_deviant.02.tt2:0 "[da_character_discovery_deviant.GetName] не замечает, что что-то явно не так.\n"
darkages_add_deviant.02.tt3:0 "[da_character_discovery_deviant.GetName] замечает ваш специфический вкус и узнает о вашем постыдном секрете... но не делает его публичным автоматически.\n"
darkages_add_deviant.02.tt4:0 "[da_character_discovery_deviant.GetName] замечает ваш специфический вкус и раскрывает его миру, предъявляя убедительные доказательства\n"
darkages_add_deviant.02.t:0 "Рискованное плотское поведение"
darkages_add_deviant.02.desc:0 "Представляется возможность организовать грандиозную оргию самых экстравагантных сексуальных вкусов, и мои импульсы толкают меня дать волю моим особым фантазиям. К несчастью, на этот раз все вышло из-под контроля, и кто-то значимый мог обнаружить мое отклонение..."
darkages_add_deviant.02.opta:0 "Я предаюсь своим изысканным плотским утехам..."
darkages_add_deviant.02.optb:0 "Я воздерживаюсь от организации оргии"
darkages_deviant_toast.1.t:0 "Незамеченным!"
darkages_deviant_toast.1.tt:0 "[da_character_discovery_deviant.GetName] так и не [Select_CString(da_character_discovery_deviant.IsFemale, 'почувствовала', 'почувствовал')] моих изысканных плотских утех"
darkages_deviant_toast.2.t:0 "Обнаружен!"
darkages_deviant_toast.2.tt:0 "[da_character_discovery_deviant.GetName] [Select_CString(da_character_discovery_deviant.IsFemale, 'обнаружила', 'обнаружил')] мое отклонение, но [Select_CString(da_character_discovery_deviant.IsFemale, 'решила', 'решил')] сохранить это в тайне"
darkages_deviant_toast.3.t:0 "Все тайное становится явным!"
darkages_deviant_toast.3.tt:0 "[da_character_discovery_deviant.GetName] [Select_CString(da_character_discovery_deviant.IsFemale, 'решила', 'решил')] рассказать всем о моем отклонении..."
darkages_barren1:0 "Плодовитость"
darkages_barren1_desc:0 "Этот персонаж имеет базовый 5% шанс быть бесплодным (не может иметь детей). В случае наличия черт «[Concept('infertile', 'Бесплодный')|E]» или «[Concept('impotent', 'Импотент')|E]» шанс намного выше. Персонажи с чертой «[Concept('fecund', 'Плодовитый')|E]» не получат никакого штрафа"
darkages_barren2:0 "Плодовитость"
darkages_barren2_desc:0 "Этот персонаж имеет базовый 5% шанс быть бесплодным (не может иметь детей). В случае наличия черт «[Concept('infertile', 'Бесплодный')|E]» или «[Concept('impotent', 'Импотент')|E]» шанс намного выше. Персонажи с чертой «[Concept('fecund', 'Плодовитый')|E]» не получат никакого штрафа"
darkages_barren3:0 "Плодовитость"
darkages_barren3_desc:0 "Этот персонаж имеет базовый 5% шанс быть бесплодным (не может иметь детей). В случае наличия черт «[Concept('infertile', 'Бесплодный')|E]» или «[Concept('impotent', 'Импотент')|E]» шанс намного выше. Персонажи с чертой «[Concept('fecund', 'Плодовитый')|E]» не получат никакого штрафа"
darkages_barren4:0 "Плодовитость"
darkages_barren4_desc:0 "Этот персонаж имеет базовый 5% шанс быть бесплодным (не может иметь детей). В случае наличия черт «[Concept('infertile', 'Бесплодный')|E]» или «[Concept('impotent', 'Импотент')|E]» шанс намного выше. Персонажи с чертой «[Concept('fecund', 'Плодовитый')|E]» не получат никакого штрафа"
darkages_barren5:0 "Плодовитость"
darkages_barren5_desc:0 "Этот персонаж имеет базовый 5% шанс быть бесплодным (не может иметь детей). В случае наличия черт «[Concept('infertile', 'Бесплодный')|E]» или «[Concept('impotent', 'Импотент')|E]» шанс намного выше. Персонажи с чертой «[Concept('fecund', 'Плодовитый')|E]» не получат никакого штрафа"
darkages_forge_heir_decision:0 "Сфабриковать наследника"
darkages_forge_heir_decision_desc:0 "Учитывая, что у вас нет наследника мужского пола и вы отчаянно хотите продолжить свой род, вы можете попытаться «завербовать» кого-то, чтобы он стал вашим признанным бастардом."
darkages_forge_heir_decision_tooltip:0 "Попытаться сфабриковать наследника. Для требований выберите решение."
darkages_forge_heir_decision_tt:0 "Это решение активно только если вам больше 39 лет, вы [Concept('barren', 'Бесплодны')|E] или [Concept('sterile', 'Стерильны')|E] и у вас есть 75 золотых, если вы граф, 125 золотых, если герцог, 250 золотых, если король, или 500 золотых, если император. Если у вашего персонажа нет ни одной черты из [Concept('deceitful', 'Вероломный')|E], [Concept('sadistic', 'Садист')|E], [Concept('vengeful', 'Мстительный')|E], [Concept('callous', 'Черствый')|E] или Интриган, вы получите определенное количество [Concept('stress', 'стресса')|E]. С другой стороны, если ваш персонаж [Concept('honest', 'Честный')|E], ожидайте, что штраф к стрессу будет действительно высоким.\n\nЭто решение, вероятно, займет больше года до получения результата. Ваш хороший шанс на успех будет зависеть от вашего навыка [Concept('intrigue', 'интриги')|E] (>=12), от того, являетесь ли вы Интриганом, [Concept('deceitful', 'Вероломным')|E], [Concept('ambitious', 'Амбициозным')|E], [Concept('arbitrary', 'Своенравным')|E], [Concept('callous', 'Черствым')|E], [Concept('eccentric', 'Эксцентричным')|E] и следуете ли вы жизненному пути Интриги. Низкая интрига (<8) дает штраф к вашим шансам на успех. Без каких-либо упомянутых черт и со средней интригой (от 8 до 11) у вас будет около 75% шанса найти кого-то\n"
darkages_forge_heir_decision_confirm:0 "Моей родословной очень нужна эта помощь"
darkages_forge_heir.01.t:0 "Мастер обмана"
darkages_forge_heir.01.desc:0 "В отчаянии от отсутствия детей и боясь умереть без наследника, я пытаюсь найти его, используя свои навыки хитрости. Учитывая, насколько деликатен этот вопрос, я не могу поделиться этим планом ни с кем другим..."
darkages_forge_heir.01.opta:0 "Попытаться найти новорожденного"
darkages_forge_heir.01.optb:0 "Попытаться найти ребенка"
darkages_forge_heir.01.optc:0 "Попытаться найти молодого взрослого"
darkages_forge_heir.01.tt1:0 "Новорожденные — идеальные кандидаты... но, учитывая нищенские условия, в которых вы его найдете, он может быть [Concept('sickly', 'Болезненным')|E] и рискует рано умереть в Темные века\n"
darkages_forge_heir.01.tt2:0 "Образование и черты ребенка могут быть сформированы вашими решениями... но, учитывая нищенские условия, в которых вы его найдете, он, вероятно, будет иметь... одну или две неприятные черты\n"
darkages_forge_heir.01.tt3:0 "Молодой взрослый идет в комплекте с полным набором образования и предопределенными чертами... но, учитывая нищенские условия, в которых вы его найдете, его мораль будет сомнительной, и он может иметь какую-нибудь неприятную дополнительную черту или две\n"
darkages_forge_heir.02.t:0 "Провал!"
darkages_forge_heir.02.desc:0 "К несчастью, мои поиски кого-то, кого можно было бы представить как моего наследника, не увенчались успехом. Надеюсь, у меня будет время попытаться снова..."
darkages_forge_heir.02.opta:0 "В следующий раз удача будет на моей стороне!"
darkages_forge_heir.03.t:0 "Успех!"
darkages_forge_heir.03.desc1:0 "После долгих поисков новорожденного, которого можно было бы объявить моим собственным сыном, в одну особенно дождливую ночь, в убогом жилище, где грязь скапливалась по углам и не было даже матрасов, я [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашел')] идеальную цель. Проникнув незамеченным, и пока ребенок оставался без присмотра и спал, я [Select_CString(ROOT.Char.IsFemale, 'похитила', 'похитил')] его в жизнь, полную роскоши..."
darkages_forge_heir.03.opta:0 "Мой новый малыш! Он мой, весь мой!"
darkages_questionable_bloodline:0 "Сомнительная родословная"
darkages_questionable_bloodline_desc:0 "Происхождение этого персонажа окутано спорами. Многие утверждают, что он самозванец."
darkages_ctt1:0 "Новый младенец, который станет вашим законным наследником, будет добавлен в вашу династию и близкую семью\n"
darkages_ctt2:0 "Новый ребенок, который станет вашим законным наследником, будет добавлен в вашу династию и близкую семью\n"
darkages_ctt3:0 "Молодой взрослый, который станет вашим законным наследником, будет добавлен в вашу династию и близкую семью\n"
darkages_forge_heir.03.optb:0 "Пойдем со мной, дитя мое..."
darkages_forge_heir.03.desc2:0 "После долгих осторожных поисков и долгих путешествий в одиночку по моим владениям, я наконец [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашел')] небольшую деревню, где в трущобах была лачуга с идеальным кандидатом. Его родители были готовы принять плату, которая для них была поистине королевской, чтобы продать мне своего сына..."
darkages_forge_heir.03.optc:0 "Добро пожаловать в семью!"
darkages_forge_heir.03.desc3:0 "После долгих и осторожных поисков в одиночку по моим владениям, я наконец [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашел')] в убогой таверне молодого человека с подходящим характером, чтобы принять сделку, которую я [Select_CString(ROOT.Char.IsFemale, 'предложила', 'предложил')] ему. Подмигнув, с хитрой улыбкой и полным энтузиазма кивком, он сразу же принял мое предложение, взвешивая новые золотые монеты в руке и предвкушая гораздо более богатую жизнь..."
darkages_prestige.01.t:0 "Урок бесчестия"
darkages_prestige.01.desc:0 "Однажды я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] получать известия от моих вестников и шпионов, что [target_prestige.GetName] очерняет мое имя из зависти к моему значительному [Concept('prestige', 'Престижу')|E]. Кажется, [Select_CString(target_prestige.IsFemale, 'она хочет', 'он хочет')] укрепить [Select_CString(target_prestige.IsFemale, 'свой', 'свой')] [Concept('prestige', 'Престиж')|E] за мой счет, высмеивая меня при каждой возможности.\n\nСпустя некоторое время и столкнувшись с возможностью огромной потери [Concept('prestige', 'Престижа')|E], если я не отвечу, я стою перед дилеммой..."
darkages_prestige.01.opta:0 "Пусть время идет, избегать конфронтации"
darkages_opinion_approval:0 "Одобрение поведения"
darkages_prestige.01.optb:0 "Вступить в перепалку с [target_prestige.GetName], оскорбив [Select_CString(target_prestige.IsFemale, 'ее', 'его')] собственные способности"
darkages_prestige.01.optc:0 "Изящно перехитрить [target_prestige.GetName]"
darkages_prestige.01.optd:0 "Разгромить аргументы [target_prestige.GetName]"
darkages_prestige.01.tt1:0 "Избегать конфронтации, чтобы сохранить общую картину. В конце концов, вам не нужны новые соперники, так как в Темные века это может быть опасно для жизни, и в итоге вы даже можете получить положительное мнение некоторых ваших придворных, которые [Concept('just', 'Справедливы')|E], [Concept('content', 'Сдержанны')|E], [Concept('forgiving', 'Всепрощающи')|E], [Concept('compassionate', 'Сострадательны')|E] или [Concept('lazy', 'Ленивы')|E] относительно вашего решения\n"
darkages_prestige.01.tt2:0 "Оскорбить и превратить обмен любезностями с [target_prestige.GetName] в «поливание грязью», где вы оба немного потеряете. Вы также можете нажить соперника, что может быть опасно для жизни в Темные века\n"
darkages_prestige.01.tt3:0 "Эта опция доступна, потому что у [target_prestige.GetName] меньше 12 [Concept('diplomacy', 'Дипломатии')|E], а у вас не менее 21 [Concept('diplomacy', 'Дипломатии')|E], или у вас есть достоинство «[Concept('open_minded_perk', 'Широкие взгляды')|E]», или достоинство «[Concept('defensive_negotiations_perk', 'Оборонительные переговоры')|E]». Выбрав этот вариант, вы преподадите своему противнику классный урок хороших манер и выйдете победителем. К сожалению, [Select_CString(target_prestige.IsFemale, 'она', 'он')] почувствует себя сильно [Select_CString(target_prestige.IsFemale, 'обиженной', 'обиженным')] и станет вашим соперником, что может быть угрозой для вашей жизни в Темные века\n"
darkages_prestige.01.tt4:0 "Эта опция доступна, потому что у [target_prestige.GetName] меньше 21 [Concept('learning', 'Учености')|E], а у вас не менее 21 [Concept('learning', 'Учености')|E], или вы [Concept('wrathful', 'Гневный')|E], [Concept('callous', 'Черствый')|E] или [Concept('vengeful', 'Мстительный')|E]. Вы полностью громите аргументы оппонента, высмеивая каждое слово, сказанное против вас, и выставляете [Select_CString(target_prestige.IsFemale, 'ее', 'его')] в жалком свете перед всем двором. Вы выйдете явным победителем. К сожалению, вы также наживете заклятого врага — что опасно в мире Темных веков\n"
darkages_opinion_disappointed:0 "Разочарование"
darkages_prestige.02.t:0 "Престижное приглашение"
darkages_prestige.02.desc1:0 "Мой канцлер сообщил мне некоторое время назад, что важное собрание самых значимых дипломатов соседних государств, включая мое, состоится недалеко от моих владений.\n\nСегодня, учитывая мой огромный [Concept('prestige', 'Престиж')|E], меня пригласили произнести вступительную речь на церемонии.\nУчитывая мои навыки в дипломатических делах и мои общие знания, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] тщательно взвесить преимущества принятия приглашения..."
darkages_prestige.02.desc2:0 "Мой канцлер сообщил мне некоторое время назад, что важное собрание самых значимых генералов и стратегов соседних государств, включая мое, состоится недалеко от моих владений.\n\nСегодня, учитывая мой огромный [Concept('prestige', 'Престиж')|E], меня пригласили произнести вступительную речь на церемонии.\nУчитывая мои навыки в военных делах и мои общие знания, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] тщательно взвесить преимущества принятия приглашения..."
darkages_prestige.02.desc3:0 "Мой канцлер сообщил мне некоторое время назад, что важное собрание самых значимых управляющих и торговцев соседних государств, включая мое, состоится недалеко от моих владений.\n\nСегодня, учитывая мой огромный [Concept('prestige', 'Престиж')|E], меня пригласили произнести вступительную речь на церемонии.\nУчитывая мои навыки в делах управления и мои общие знания, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] тщательно взвесить преимущества принятия приглашения..."
darkages_prestige.02.desc4:0 "Мой канцлер сообщил мне некоторое время назад, что важное собрание самых значимых теневых личностей — некоторые могли бы назвать их шпионами, но это слово никогда не произносится — соседних государств, включая мое, состоится недалеко от моих владений.\n\nСегодня, учитывая мой огромный [Concept('prestige', 'Престиж')|E], меня пригласили произнести вступительную речь на церемонии.\nУчитывая мои навыки в делах интриг и мои общие знания, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] тщательно взвесить преимущества принятия приглашения..."
darkages_prestige.02.desc5:0 "Мой канцлер сообщил мне некоторое время назад, что важное собрание самых значимых философов, теологов и мыслителей соседних государств, включая мое, состоится недалеко от моих владений.\n\nСегодня, учитывая мой огромный [Concept('prestige', 'Престиж')|E], меня пригласили произнести вступительную речь на церемонии.\nУчитывая мои навыки в делах учености, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] тщательно взвесить преимущества принятия приглашения..."
darkages_prestige.02.opta:0 "Я буду в центре внимания!"
darkages_prestige.02.tt1:0 "Вы примете приглашение, зная, что можете в итоге купаться в лучах славы вдохновляющей речи или уйти с запятнанным именем из-за плохой подачи. Будьте осторожны: на успех или провал вашего выступления положительно повлияет ваш соответствующий навык — от 8 до 11 в навыке считается средним шансом на успех — плюс ваши способности в [Concept('learning', 'Учености')|E] также будут иметь незначительное влияние — положительное или отрицательное. Также положительно скажется, если вы [Concept('gregarious', 'Общительный')|E], и отрицательно — если [Concept('shy', 'Застенчивый')|E]\n"
darkages_prestige.02.optb:0 "С извинениями отклонить приглашение"
darkages_prestige.02.tt2:0 "Отказавшись от приглашения, вы немедленно теряете изрядное количество [Concept('prestige', 'Престижа')|E], но будете избавлены от более сурового унижения скучной или безграмотной речи. Если вы уклонитесь от участия в событии, ваши вассалы, которые не являются [Concept('shy', 'Застенчивыми')|E], также ухудшат мнение о вас, так как ваши дела не соответствуют вашему [Concept('prestige', 'Престижу')|E]\n"
darkages_opinion_shamed:0 "Стыд"
darkages_prestige.03.t:0 "Речь на века"
darkages_prestige.03.desc:0 "Стоя перед достойной толпой, открывая мероприятие в большом зале и произнося свою речь, я чувствую себя свободно со словами и включаю притчи, семантические штрихи и удачно расставленные гиперболы, и все это в контексте компетенции моей аудитории.\n\nМои смелые и порой новые заявления и выводы по теме совершенно пленили слушателей.\nЯ даже [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал')] уверенность, чтобы предложить всем финансировать мои собственные начинания в смежных вопросах.\n\nВ конце, когда почти все встали, громкие приветствия и аплодисменты разнеслись по большому залу, и организаторы подошли ко мне, выражая свое глубочайшее уважение к моему выступлению, говоря, что собрание не могло начаться лучше."
darkages_prestige.03.opta:0 "Я был действительно [Select_CString(ROOT.Char.IsFemale, 'первой среди равных', 'первым среди равных')]!"
darkages_prestige.04.t:0 "Полное разочарование"
darkages_prestige.04.desc:0 "Стоя перед достойной толпой, открывая мероприятие в большом зале и произнося свою речь, я вскоре понимаю, насколько это мне не по силам, выдавая скучный и безыдейный монолог, который мне пришлось читать, так как нервы не позволили мне произнести мое серое содержание по памяти.\n\nС неправильной интонацией, разбавленной заиканием и монотонным голосом, аудитория была встревожена моим выступлением, и время от времени я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел')] здесь и там людей, начинающих засыпать, или среди тех, кто плохо обо мне думает, озорные улыбки, глядя на мое публичное унижение.\n\nБыло ясно, что моя речь далеко не соответствовала моему престижному положению среди собравшихся экспертов. В конце концов, это было очень плохо поданное произведение, и аудитория первой указала на это отсутствием энтузиазма..."
darkages_prestige.04.opta:0 "Какая катастрофа!"
darkages_prestige.04.tt1:0 "Помимо огромной потери [Concept('prestige', 'Престижа')|E], ваши вассалы чувствуют себя обесчещенными жалким выступлением своего сеньора, и последствия этого не скоро забудутся\n"
darkages_opinion_embaraced:0 "Смущение"
darkages_opinion_proud:0 "Гордость"
darkages_prestige.05.t:0 "Турнир"
darkages_prestige.05.desc:0 "Сегодня посланник из соседнего государства прибыл ко мне с почетным приглашением принять участие в грандиозном турнире, на котором будет присутствовать значительная часть знати нескольких королевств со своими дорогими свитами.\n\nЗная, что это должно быть зрелище поколения, если я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов')] оплатить расходы моих придворных и небольшой взнос за вход, я вполне могу выиграть приз, если моя [Concept('prowess', 'Доблесть')|E] и моя удача будут на высоте.\n\nВ послании есть многозначительное последнее предложение, призванное побудить читателя принять вызов... иначе можно услышать слухи о собственной трусости или бедности. Я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] скрыть своего раздражения при чтении, так как меня дипломатически загнали в угол!"
darkages_prestige.05.opta:0 "Я принимаю вызов!"
darkages_prestige.05.optb:0 "Я отклоняю приглашение..."
darkages_prestige.05.tt1:0 "Ваша [Concept('prowess', 'Доблесть')|E] будет испытана, как и ваша удача. Было бы хорошо, если вы [Concept('gallant', 'Галантны')|E] или [Concept('brave', 'Отважны')|E], и не так хорошо, если вы [Concept('craven', 'Трус')|E]. В конце концов, всегда может повезти, так как это тоже сыграет свою роль\n"
darkages_prestige.05.tt2:0 "Выбрав этот вариант, вы потеряете лицо среди своих сверстников и будете чувствовать себя более чем немного раздраженным\n"
darkages_nick_the_champion:0 "Чемпион"
darkages_prestige.06.t:0 "Победитель получает всё"
darkages_prestige.06.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'вступила', 'вступил')] в состязание полностью [Select_CString(ROOT.Char.IsFemale, 'сосредоточенная', 'сосредоточенный')], разум и тело действовали в унисон, совершая невероятные подвиги, побеждая противников одного за другим, безразлично к их рангу и способностям. Все было сделано с плавностью, которая приходит только от глубокого вдохновения.\n\nВ конце, под громкие приветствия огромной толпы, я [Select_CString(ROOT.Char.IsFemale, 'была коронована', 'был коронован')] как Чемпион Турнира!" 
darkages_prestige.06.opta:0 "Отлично!"
darkages_prestige.06.tt:0 "Помимо полученной королевской суммы и огромного количества полученного [Concept('prestige', 'Престижа')|E], вы с удовлетворением увидели, что ваш подвиг не остался незамеченным вашими вассалами\n"
darkages_prestige.07.t:0 "Сильное выступление"
darkages_prestige.07.desc:0 "Состязание прошло для меня очень хорошо, мне удавалось побеждать противника за противником ловкими и искусными боевыми приемами. Однако финальный поединок остался за [target_champion.GetName] после запоминающегося обмена ударами на поле боя, который длился долго и развлек огромную толпу. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'уступила', 'уступил')] [Select_CString(target_champion.IsFemale, 'ей', 'ему')] победу. В итоге меня чествовали как опасного противника, и я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] приз за второе место."
darkages_prestige.07.opta:0 "Превосходно!"
darkages_prestige.08.t:0 "Почетное место"
darkages_prestige.08.desc:0 "Я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] соревнование с сильного выступления и [Select_CString(ROOT.Char.IsFemale, 'победила', 'победил')] нескольких противников одного за другим. Мои боевые движения были естественными, но я остро [Select_CString(ROOT.Char.IsFemale, 'осознавала', 'осознавал')] слабость, которая становилась все хуже и хуже. К сожалению, мое левое колено получило небольшую травму, и я [Select_CString(ROOT.Char.IsFemale, 'проиграла', 'проиграл')] в полуфинале. После этого, в бою за третье место, я немного [Select_CString(ROOT.Char.IsFemale, 'восстановилась', 'восстановился')] и, в последней демонстрации моего мастерства, [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] выиграть бой.\n\nЗначит, третье место.\n\nС коленом, которое все еще не полностью восстановилось, слушая и видя огромную толпу, которая также болела за меня и мои общие выступления, я [Select_CString(ROOT.Char.IsFemale, 'смотрела', 'смотрел')] с небольшой долей зависти, но в основном с восхищением на победителя, [target_champion.GetName]."
darkages_prestige.08.opta:0 "Хорошее шоу..."
darkages_prestige.09.t:0 "Неудачная затея"
darkages_prestige.09.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с первым противником на турнире, я сразу же [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')], что мое выступление не принесет мне почетного места. Мои движения казались неловкими и слишком медленными, чтобы успешно противостоять лучшим бойцам. Расправившись с этим бедным первым бойцом, я иногда [Select_CString(ROOT.Char.IsFemale, 'побеждала', 'побеждал')], много раз [Select_CString(ROOT.Char.IsFemale, 'проигрывала', 'проигрывал')], но, казалось, все ожидали от меня большего.\n\nВ довершение всего, я неудачно [Select_CString(ROOT.Char.IsFemale, 'упала', 'упал')] со своего скакуна в моем последнем бою и [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] ранение. В конце концов, я не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] обеспечить себе почетное место в турнире и [Select_CString(ROOT.Char.IsFemale, 'не имела', 'не имел')] другого выбора, кроме как смотреть с восхищением на победителя состязания, приветствуемого огромной толпой, не кого иного, как [target_champion.GetName]..."
darkages_prestige.09.opta:0 "Очень жаль..."
darkages_prestige.10.t:0 "Позорное выступление"
darkages_prestige.10.desc:0 "Я очень [Select_CString(ROOT.Char.IsFemale, 'нервничала', 'нервничал')] прямо перед первым боем турнира, страх пожирал меня изнутри. К сожалению, моя трусость взяла верх над моим разумом, и я [Select_CString(ROOT.Char.IsFemale, 'застыла', 'застыл')], пока мой противник танцевал вокруг меня.\n\nБыло стыдно, что, дрожа, я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] мочиться от страха.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'стала', 'стал')] посмешищем для огромной толпы, и мой первый противник провел легкий прием, который я не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] парировать, и серьезно ранил меня.\n\nЭтот первый бой стал для меня концом турнира, и все смеялись над моим «выступлением». В итоге я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] бесконечно [Select_CString(ROOT.Char.IsFemale, 'далека', 'далек')] от таких, как [target_champion.GetName], победитель прославленного состязания."
darkages_prestige.10.opta:0 "Ох... какой позор!"
darkages_prestige.10.tt:0 "Этот катастрофический результат может произойти из-за того, что вы [Concept('craven', 'Трус')|E]\n"
darkages_prestige.12.t:0 "Особое собрание"
darkages_prestige.12.desc:0 "Как только мне представили чрезвычайно ухоженного эмиссара, прибывшего со двора [target_party.GetName], я сразу [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал')], что затевается что-то необычное. Как он объяснил, меня пригласили на очень закрытую вечеринку, где присутствовали только самые престижные из дипломатических кругов соседних лордов, чтобы обсудить вопросы международной важности в уютной обстановке.\n\nОн также подчеркнул, насколько важно мое присутствие, и терпеливо ждал моего ответа, который нужно было дать немедленно, чтобы вернуться к своему двору и все организовать.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался')] скрыть свою дилемму, потому что, если бы я [Select_CString(ROOT.Char.IsFemale, 'выступила', 'выступил')] плохо, мой [Concept('prestige', 'Престиж')|E] сильно пострадал бы, тогда как, если бы сносно — я бы ничего не [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')].\n\nКонечно, всегда был шанс оказаться в центре внимания вечеринки, пожиная лавры [Concept('prestige', 'Престижа')|E] в конце..."
darkages_prestige.12.opta:0 "Конечно, я буду!"
darkages_prestige.12.optb:0 "Я не могу пойти, извините..."
darkages_prestige.12.tt1:0 "Вас приглашают на очень эксклюзивную встречу, где ваша [Concept('diplomacy', 'Дипломатия')|E] подвергнется серьезному испытанию. Черты «[Concept('reveler', 'Гуляка')|E]» или «[Concept('gregarious', 'Общительный')|E]» дают бонусы ко всему взаимодействию, в то время как «[Concept('shy', 'Застенчивый')|E]» создаст дополнительное препятствие"
darkages_prestige.12.tt2:0 "Посещение встречи будучи [Concept('shy', 'Застенчивым')|E] вызывает у вас некоторый стресс\n" 
darkages_prestige.12.tt3:0 "Отказавшись пойти, вы потеряете лицо перед вашими ровней, и ваш [Concept('prestige', 'Престиж')|E] значительно пострадает"
darkages_opinion_impressed:0 "Под впечатлением"
darkages_prestige.13.t:0 "Сердце встречи"
darkages_prestige.13.desc:0 "Когда я [Select_CString(ROOT.Char.IsFemale, 'вошла', 'вошел')] в большой зал [target_party.GetName] и [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал')] общаться с другими присутствующими лордами, вскоре стало очевидно, что я свободно владею обсуждаемыми темами и всегда [Select_CString(ROOT.Char.IsFemale, 'имела', 'имел')] остроумный комментарий для каждого, с кем вступал в разговор.\n\nВскоре стало ясно, что я — душа компании, так как все больше и больше людей начинали обсуждать темы, которые интересовали меня, попивая и поедая множество великолепно поданных деликатесов.\n\nВ итоге именно я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] в центре внимания встречи, и мой [Concept('prestige', 'Престиж')|E] взлетел!"
darkages_prestige.13.opta:0 "Воистину серебряный язык!"
darkages_opinion_unimpressed:0 "Не под впечатлением"
darkages_prestige.14.t:0 "Жалкий провал"
darkages_prestige.14.desc:0 "В гостях у [target_party.GetName] меня представили нескольким видным лордам из разных государств, и, когда начался разговор, я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал')] себя совершенно не в своей тарелке. После нескольких банальностей у меня испортилось настроение, и все начали меня избегать.\n\nВсе это дело было пустой тратой времени, и даже если в конце ко мне любезно обратились, я прекрастно [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал')], что мое выступление стало настоящей катастрофой для моего [Concept('prestige', 'Престижа')|E]..."
darkages_prestige.14.opta:0 "Мне следовало остаться в моем [ROOT.Char.Custom('FortifiedBuilding')]!"
darkages_prestige.15.t:0 "Невидимка"
darkages_prestige.15.desc:0 "Когда [target_party.GetName] [Select_CString(target_party.IsFemale, 'представила', 'представил')] меня другим престижным ровесникам, мы начали общаться, и я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал')] себя не в состоянии сказать что-либо действительно существенное. К счастью, моей сдержанной позы и избегания серьезных оплошностей было достаточно, чтобы меня особо не замечали.\n\nВ конце концов мне удалось остаться незамеченным, и даже если я не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог')] сделать каких-либо смелых или умных заявлений, мой [Concept('prestige', 'Престиж')|E] почти не пострадал от моего очень скромного присутствия."
darkages_prestige.15.opta:0 "По крайней мере, еда была хорошей..."
darkages_opinion_enraged:0 "Ярость"
darkages_prestige.16.t:0 "Дело о Всемирной выставке"
darkages_prestige.16.desc:0 "В последние месяцы и мой [target_spymaster.GetCouncilTitle], [target_spymaster.GetName], и мой [target_chaplain.GetCouncilTitle], [target_chaplain.GetName], донимали меня идеей организации грандиозной выставки артефактов, которая потенциально может охватить всех моих дипломатических знакомых.\n\nПоскольку золото для организации такого мероприятия — это большие расходы, я не [Select_CString(ROOT.Char.IsFemale, 'была убеждена', 'был убежден')] в достоинствах этой идеи.\n\nЭта пара слуг, однако, ввязалась во всевозможные политические интриги и предательства, чтобы убедиться, что и весь совет, и иностранные правители знают об этой идее, говоря, что мероприятие состоится, тем самым подставив меня под организацию всей выставки.\n\nВ бешенстве от ситуации, я теперь сталкиваюсь с серьезными последствиями, если не продолжу и не приму «свершившийся факт»..."
darkages_prestige.16.opta:0 "Организовать выставку с низкой безопасностью"
darkages_prestige.16.optb:0 "Организовать выставку со средней безопасностью"
darkages_prestige.16.optc:0 "Организовать выставку с высокой безопасностью"
darkages_prestige.16.optd:0 "Послать всю эту идею к черту!"
darkages_prestige.16.tt1:0 "Вы финансируете выставку с низкой безопасностью, максимизируя риск кражи артефакта. На этот риск влияет в ту или иную сторону ваша [Concept('intrigue', 'Интрига')|E] и положительно — если вы [Concept('schemer', 'Интриган')|E]. Выставка также может стать успехом, в этом случае вы получите огромное количество [Concept('prestige', 'Престижа')|E], или провалом, в этом случае пострадает ваша [Concept('fame', 'Слава')|E]. На успех предприятия положительно или отрицательно влияет ваш навык [Concept('learning', 'Учености')|E] и положительно — имеет ли вы образование в сфере [Concept('learning', 'Учености')|E]. Если вы [Concept('scholar', 'Ученый')|E], значительный бонус также будет дан вашим шансам\n"
darkages_prestige.16.tt2:0 "Вы финансируете выставку со средней безопасностью, балансируя риск кражи артефакта. На этот риск влияет в ту или иную сторону ваша [Concept('intrigue', 'Интрига')|E] и положительно — если вы [Concept('schemer', 'Интриган')|E]. Выставка также может стать успехом, в этом случае вы получите огромное количество [Concept('prestige', 'Престижа')|E], или провалом, в этом случае пострадает ваша [Concept('fame', 'Слава')|E]. На успех предприятия положительно или отрицательно влияет ваш навык [Concept('learning', 'Учености')|E] и положительно — имеет ли вы образование в сфере [Concept('learning', 'Учености')|E]. Если вы [Concept('scholar', 'Ученый')|E], значительный бонус также будет дан вашим шансам\n"
darkages_prestige.16.tt3:0 "Вы финансируете выставку с высокой безопасностью, минимизируя риск кражи артефакта. На этот риск влияет в ту или иную сторону ваша [Concept('intrigue', 'Интрига')|E] и положительно — если вы [Concept('schemer', 'Интриган')|E]. Выставка также может стать успехом, в этом случае вы получите огромное количество [Concept('prestige', 'Престижа')|E], или провалом, в этом случае пострадает ваша [Concept('fame', 'Слава')|E]. На успех предприятия положительно или отрицательно влияет ваш навык [Concept('learning', 'Учености')|E] и положительно — имеет ли вы образование в сфере [Concept('learning', 'Учености')|E]. Если вы [Concept('scholar', 'Ученый')|E], значительный бонус также будет дан вашим шансам\n"
darkages_prestige.16.tt4:0 "Вы твердо отклоняете идею организации выставки артефактов в вашем государстве. Огромные ожидания, созданные вашим [target_spymaster.GetCouncilTitle] и вашим [target_chaplain.GetCouncilTitle] в вашем совете и среди ваших вассалов, аннулируются, и вы сильно страдаете из-за этого. Поскольку вся идея была распространена и среди иностранных правителей, ваш [Concept('prestige', 'Престиж')|E] и даже [Concept('fame', 'Слава')|E] пострадают\n"
darkages_prestige.17.tt1:0 "Вы неожиданно получаете немного золота в качестве комиссионных за продажу некоторых артефактов\n"
darkages_prestige.17.t:0 "Безошибочный успех!"
darkages_prestige.17.desc:0 "Выставка привлекла артефакты из самых отдаленных государств и стала успехом для образа, который я создаю за границей.\n\nЛюди всех слоев общества, от королей до торговцев, посетили ее и были поражены увиденным.\n\nКультурное смешение было особенно своеобразным, и многие важные сановники заключали сделки.\n\nВ общем, все предприятие имело огромный успех. Хвала моему преданному [target_spymaster.GetCouncilTitle], [target_spymaster.GetName], и моему просвещенному [target_chaplain.GetCouncilTitle], [target_chaplain.GetName]!"
darkages_prestige.17.opta:0 "Все прошло очень хорошо!"
darkages_prestige.17.optb:0 "Отлично!"
darkages_prestige.18.t:0 "Катастрофический провал..."
darkages_prestige.18.desc:0 "Выставка была плохо организована, и мое непонимание культурных вопросов еще больше ухудшило передаваемый опыт, так как моя непоследовательность была очевидна.\n\nМногие иностранцы были привлечены громкой кампанией моего [target_spymaster.GetCouncilTitle] и моего [target_chaplain.GetCouncilTitle], но суть дела была в том, что почти все почувствовали, что их время потрачено впустую.\n\nВ довершение всего, я [Select_CString(ROOT.Char.IsFemale, 'чувствовала', 'чувствовал')] себя неважно большую часть недели и [Select_CString(ROOT.Char.IsFemale, 'не показывалась', 'не показывался')] присутствующим сторонам большую часть времени. Как [Select_CString(target_robbed.IsFemale, 'сказала', 'сказал')] [target_robbed.GetName], [Select_CString(target_robbed.IsFemale, 'одна', 'один')] из присутствующих, это было «злополучное событие».\n\nВ конце концов, благодаря манипуляциям двух моих советников и моему катастрофическому выступлению, я [Select_CString(ROOT.Char.IsFemale, 'потеряла', 'потерял')] много [Concept('prestige', 'Престижа')|E] и [Concept('fame', 'Славы')|E]..."
darkages_prestige.18.opta:0 "Это очень плохие новости..."
darkages_prestige.18.tt:0 "Эта опция доступна, потому что вы не [Concept('generous', 'Щедрый')|E], [Concept('forgiving', 'Всепрощающий')|E] или [Concept('compassionate', 'Сострадательный')|E] и имеете более 29 [Concept('dread', 'Ужаса')|E] или являетесь [Concept('deceitful', 'Вероломным')|E], [Concept('paranoid', 'Параноиком')|E], [Concept('wrathful', 'Гневным')|E], [Concept('sadistic', 'Садистом')|E], [Concept('callous', 'Черствым')|E] или [Concept('vengeful', 'Мстительным')|E]. Вы казните своего [target_chaplain.GetCouncilTitle], и можете столкнуться с серьезными последствиями для мнения либо от вашего главы конфессии, либо от ваших придворных, имеющих положительное мнение о [target_chaplain.GetName]"
darkages_prestige.18.optb:0 "Обвинить и казнить [target_chaplain.GetCouncilTitle]"
darkages_opinion_incensed:0 "Разгневан"
darkages_opinion_crestfallen:0 "Удручен"
darkages_prestige.19.t:0 "Полная катастрофа!"
darkages_prestige.19.desc:0 "Когда выставка проходила с некоторым апломбом и множеством артефактов в большом зале в моем [ROOT.Char.Custom('FortifiedBuilding')], разделенном на несколько разных комнат, одной ночью, во время смены караула, произошла кража.\n\nК сожалению, ущерб был нанесен, и ничто из того, что я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог')] бы сказать, не могло спасти выставку... и мое лицо тоже.\n\nНеобходимость платить за украденные артефакты была наименьшей из моих проблем.\n\nБудь проклят мой бесполезный [target_spymaster.GetCouncilTitle] [target_spymaster.GetName] и мой тупой [target_chaplain.GetCouncilTitle] [target_chaplain.GetName]!"
darkages_prestige.19.opta:0 "Я совсем не [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад')]. Совсем!"
darkages_prestige.19.tt:0 "Эта опция доступна, потому что вы не [Concept('generous', 'Щедрый')|E], [Concept('forgiving', 'Всепрощающий')|E] или [Concept('compassionate', 'Сострадательный')|E] и имеете более 29 [Concept('dread', 'Ужаса')|E] или являетесь [Concept('deceitful', 'Вероломным')|E], [Concept('paranoid', 'Параноиком')|E], [Concept('wrathful', 'Гневным')|E], [Concept('sadistic', 'Садистом')|E], [Concept('callous', 'Черствым')|E] или [Concept('vengeful', 'Мстительным')|E]. Вы казните своего [target_spymaster.GetCouncilTitle], и можете столкнуться с серьезными последствиями для мнения от ваших придворных, имеющих положительное мнение о [target_spymaster.GetName]"
darkages_prestige.19.optb:0 "Обвинить и казнить [target_spymaster.GetCouncilTitle]"
