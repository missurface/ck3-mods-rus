darkages_dread.06.desc9:0 "Уже больше пары лет банда разбойников, именующая себя «Серебряные Пики», терроризирует части [darkages_dread_county.GetName|l]. Грабя крестьян и нападая на торговцев, они также отдавали значительную сумму монет поселениям в Графстве, помогая людям справляться с тяжелыми временами.\n\nБлагодаря отличному ходу моего ополчения и моих шпионов, эти бандиты наконец-то попали в блестяще разработанную ловушку, и теперь они схвачены.\n\nТребуется множество радикальных мер, от повешения до помилования воров. Совет также разделился во мнениях по этому вопросу.\nЧего не хватает, так это взвешенного взгляда на ситуацию..."
darkages_dread.06.desc10:0 "Уже больше пары лет банда разбойников, именующая себя «Смертоносные Смертные», терроризирует части [darkages_dread_county.GetName|l]. Грабя крестьян и нападая на торговцев, они также отдавали значительную сумму монет поселениям в Графстве, помогая людям справляться с тяжелыми временами.\n\nБлагодаря отличному ходу моего ополчения и моих шпионов, эти бандиты наконец-то попали в блестяще разработанную ловушку, и теперь они схвачены.\n\nТребуется множество радикальных мер, от повешения до помилования воров. Совет также разделился во мнениях по этому вопросу.\nЧего не хватает, так это взвешенного взгляда на ситуацию..."
darkages_dread.06.opta:0 "Пытать и повесить их всех"
darkages_dread.06.optb:0 "Помиловать их"
darkages_dread.06.optc:0 "Нанять их в качестве силовиков"
darkages_dread.06.optd:0 "Отправить их всех в тюрьму"
darkages_dread.06.tt1:0 "Вы пытаете воров, чтобы узнать местонахождение награбленного за последние пару лет. После этого будет назначено публичное повешение в поселении [darkages_dread_county.GetName|g], которое больше всего пострадало от действий бандитов\n"
darkages_dread.06.tt2:0 "Вы милуете воров и предоставляете некоторые средства в казну [darkages_dread_county.GetName|g]. Таким образом, вы надеетесь успокоить людей, настроенных на месть, а также улучшить положение в Графстве в среднесрочной перспективе\n"
darkages_dread.06.tt3:0 "Этот вариант доступен, потому что у вас не менее 12 в Навыках Интриги или Военного дела. Вы тайно нанимаете этих опытных разбойников, чтобы помочь вашим регулярным ополченцам обеспечить ваше правление во всем вашем Домене, надеясь значительно увеличить контроль над вашими собственными Графствами\n"
darkages_dread.06.tt4:0 "Вы идете по срединному пути. Ваше население равнодушно к вашему поведению, но общая суть в том, что вас обвиняют в том, что вы нерешительный правитель. Ваш Совет разделился во мнениях, и у каждого Советника свой взгляд на ситуацию\n"
darkages_dread.07.t:0 "Смертельная дилемма"
darkages_dread.07.desc:0 "Сегодня, когда я [Select_CString(ROOT.Char.IsFemale, 'заканчивала', 'заканчивал')] писать официальное письмо одному из моих вассалов, мой [darkages_dread_spymaster.GetCouncilTitle|i] [Select_CString(darkages_dread_spymaster.IsFemale, 'подошла', 'подошел')] ко мне с тем, что [Select_CString(darkages_dread_spymaster.IsFemale, 'она называет', 'он называет')] очень серьезными новостями.\n\n[darkages_dread_spymaster.GetFirstName] [Select_CString(darkages_dread_spymaster.IsFemale, 'продолжила', 'продолжил')] подробно описывать то, что [Select_CString(darkages_dread_spymaster.IsFemale, 'она считает', 'он считает')] государственной изменой со стороны того, кого я очень хорошо знаю при своем дворе: [darkages_dread_traitor.GetName|g].\n\nУглубляясь в предоставленную информацию, кажется, что какая-то неизвестная сторона планирует мое убийство с помощью моего придворного.\n\nОднако я [Select_CString(ROOT.Char.IsFemale, 'понимаю', 'понимаю')], что вопрос не окончательный, и в конце концов, я не [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')], [Select_CString(ROOT.Char.IsFemale, 'ведома ли я', 'ведом ли я')] моим [darkages_dread_spymaster.GetCouncilTitle|i] для выполнения какой-то скрытой повестки дня, или [darkages_dread_traitor.GetName] действительно помогает какому-то убийце убить меня..."
darkages_dread.07.opta:0 "Арестовать и казнить [darkages_dread_traitor.GetName|g]"
darkages_dread.07.optb:0 "Изгнать [darkages_dread_traitor.GetHerHim]!"
darkages_dread.07.optc:0 "Поверить в [darkages_dread_traitor.GetHerHis] невиновность"
darkages_dread.07.tt1:0 "Вы утверждаете свою позицию очень сильным действием. Это принесет вам немного Престижа, но все ваши Придворные будут в ужасе от вас. Следуя этому пути, вы пресечете в зародыше любую попытку покушения на вашу жизнь, которая могла быть запланирована\n"
darkages_dread.07.tt2:0 "Вы выбираете компромисс, пытаясь действовать как можно безопаснее. Ваши Придворные будут испытывать Отвращение к изгнанию, так как, учитывая косвенные доказательства, они чувствуют косвенную угрозу. Даже если есть заговор с целью убить вас, шанс его осуществления будет намного ниже\n"
darkages_dread.07.tt3:0 "Вы решаете поверить в невиновность [darkages_dread_traitor.GetName|g]. Чтобы принять взвешенное решение, проверьте, есть ли у [darkages_dread_traitor.GetHerHim] черты Черствый, Обманщик, Мстительный или Интриган. Затем проверьте, является ли [darkages_dread_traitor.GetSheHe] вашим Соперником или, что хуже, вашим Заклятым врагом. Наконец, проверьте, есть ли у [darkages_dread_traitor.GetHerHim] негативные отношения с вами - чем хуже, тем подозрительнее вы можете стать. Хотя все эти факторы способствуют вероятности предательства [darkages_dread_traitor.GetName|g], отсутствия таких факторов недостаточно, чтобы полностью успокоить вас\n"
darkages_dread.08.t:0 "Нож в темноте"
darkages_dread.08.desc:0 "Сегодня вечером, когда мой разум играл с моим прошлым решением относительно [darkages_dread_traitor.GetName|g], пока я в одиночестве [Select_CString(ROOT.Char.IsFemale, 'шла', 'шел')] в один из своих кабинетов, передо мной материализовалась темная тень и быстро направила угрожающий нож мне в грудь!\n\nДумая, что [darkages_dread_traitor.GetName] все-таки [Select_CString(darkages_dread_traitor.IsFemale, 'была виновна', 'был виновен')], у меня есть доля секунды, чтобы избежать смерти..."
darkages_dread.08.opta:0 "Быстрее!"
darkages_dread.08.tt1:0 "Вы переживаете покушение на убийство!"
darkages_tyranny.01.t:0 "Налог солидарности"
darkages_tyranny.01.desc1:0 "В последнее время, беспокоясь о финансах Державы, мой Совет заканчивает детали так называемого «Налога солидарности», взимаемого с моих Вассалов для покрытия всевозможных расходов, которые я [Select_CString(ROOT.Char.IsFemale, 'могла бы понести', 'мог бы понести')].\n\nЭто не самые приятные новости для моих Вассалов, и я знаю, что нарушаю общественный договор, на котором основано мое правление, поскольку у меня нет легитимности вводить еще один налог сейчас...\n\nС удивлением отмечая, что мои вассалы, представленные в Совете, представили предложение, которое позволит им уклониться от этого налога, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я буду с этим разбираться."
darkages_tyranny.01.desc2:0 "В последнее время, беспокоясь о финансах Державы, мой Совет заканчивает детали так называемого «Налога солидарности», взимаемого с моих Вассалов для покрытия всевозможных расходов, которые я [Select_CString(ROOT.Char.IsFemale, 'могла бы понести', 'мог бы понести')].\n\nЭто не самые приятные новости для моих Вассалов, и я знаю, что нарушаю общественный договор, на котором основано мое правление, поскольку у меня нет легитимности вводить еще один налог сейчас...\n\nУчитывая нюансы подходов, которых может заслуживать этот вопрос, я теперь [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] решить, как я буду с этим разбираться."
darkages_tyranny.01.opta:0 "Собрать Налог солидарности"
darkages_tyranny.01.tt1:0 "Вы собираете налог без лишних слов. Ваши Вассалы, не являющиеся Советниками, будут раздражены вами\n"
darkages_tyranny.01.optb:0 "Наложить вето на идею"
darkages_tyranny.01.tt2:0 "Вы отвергаете идею своего Совета. Будет казаться, что правительство не работает слаженно, и это заставит вас потерять немного Престижа. Ваши Советники не будут счастливы\n"
darkages_tyranny.01.optc:0 "Успокоить тревоги Вассалов"
darkages_tyranny.01.tt3:0 "Этот вариант доступен, потому что ваша Дипломатия не менее 12. Вы используете свой превосходный Навык Дипломатии и мыслите нестандартно, чтобы взимать налог, не впадая в Тиранию. Успех этого действия зависит от вашего очень хорошего Навыка Дипломатии (>=15), от наличия Достоинства Истинный правитель, от того, являетесь ли вы Общительным, Эксцентричным, Хитрым политиком или Дипломатом. Наличие менее чем Очень хорошей Дипломатии, отсутствие Образования в Дипломатии, черты Гневный, Мстительный, Черствый или Произвольный снизят ваши шансы\n"
darkages_tyranny.01.optd:0 "Подтвердить свою позицию демонстрацией военной силы"
darkages_tyranny.01.tt4:0 "Этот вариант доступен, потому что ваш Военный навык не менее 12. Вы используете свой превосходный Военный взгляд, чтобы донести сообщение об истинной ценности налога. Успех этого действия зависит от вашего очень хорошего Военного Навыка (>=15), от наличия Достоинства Жесткое правление, от того, являетесь ли вы Храбрым, Высокомерным, Садистом или Надсмотрщиком. Наличие менее чем очень хорошего Военного Навыка, отсутствие Образования в Военном деле, черты Переменчивый, Трусливый, Сострадательный или Справедливый снизят ваши шансы\n"
darkages_tyranny_toast.01.tt1:0 "Вам удалось успокоить тревоги ваших Вассалов!"
darkages_tyranny_toast.01.tt2:0 "Вам не удалось успокоить тревоги ваших Вассалов..."
darkages_tyranny_toast.01.tt3:0 "Вы утверждаете свою позицию сверх того, что ожидалось!"
darkages_tyranny_toast.01.tt4:0 "Вам не удалось утвердить свою позицию, используя Военную позу..."
darkages_tyranny.02.t:0 "Несчастные указы"
darkages_tyranny.02.desc:0 "Вчера на официальной встрече с моими вассалами был поднят большой вопрос.\n\nКода я [Select_CString(ROOT.Char.IsFemale, 'представила', 'представил')] свой политический план развития Державы, я вскоре [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с сопротивлением моих вассалов. В общем, они жаловались на мое вмешательство в их частные дела и собственность.\nК сожалению, я [Select_CString(ROOT.Char.IsFemale, 'потеряла', 'потерял')] самообладание, и вскоре защита моей позиции стала рассматриваться как большой признак тирании с моей стороны.\n\n[da_tyranny02_councillor.GetFirstName], мой [da_tyranny02_councillor.GetCouncilTitle|i], [Select_CString(da_tyranny02_councillor.IsFemale, 'присутствовала', 'присутствовал')] за столом и [Select_CString(da_tyranny02_councillor.IsFemale, 'сигнализировала', 'сигнализировал')] о [da_tyranny02_councillor.GetHerHis] намерении помочь мне решить вопрос как можно более гладко. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] быстро решить, что я буду делать, чтобы разрешить эту неудачную ситуацию..."
darkages_tyranny.02.opta:0 "Подтвердить мою предыдущую позицию"
darkages_tyranny.02.tt1:0 "Вы навязываете вассалам свои политические взгляды, касающиеся их собственных владений. Помимо представленных эффектов, все Графства ваших вассалов получат очень положительный эффект на некоторое время\n"
darkages_tyranny.02.optb:0 "Оставить этот вопрос и раскаяться в своем поведении"
darkages_tyranny.02.tt2:0 "Вы прекращаете попытки диктовать, как ваши вассалы управляют своими владениями, тем самым уменьшая последствия вашей предыдущей оплошности\n"
darkages_tyranny.02.optc:0 "Принять посредничество моего [da_tyranny02_councillor.GetCouncilTitle|r]"
darkages_tyranny.02.tt3:0 "[da_tyranny02_councillor.GetFirstName] попытается смягчить влияние вашего прошлого поведения на вашу Тиранию, продвигая при этом вашу политическую повестку. Значение [da_tyranny02_councillor.GetHerHis] основного Навыка, если оно не менее 15, даст вам бонус, так же как и ваши черты Общительный, Смиренный, Дипломат и Проницательный. И наоборот, если ваш [da_tyranny02_councillor.GetCouncilTitle] имеет основной Навык менее 15 и у вас есть черты Переменчивый, Высокомерный, Нетерпеливый или Тупой, ваши шансы на успешный исход будут ниже\n"
darkages_tyranny.02.optd:0 "Подойти к вопросу философски"
darkages_tyranny.02.tt4:0 "Вы пытаетесь впечатлить своих вассалов знанием классики и силой своего интеллекта. В случае успеха вы меньше пострадаете от Тирании и реализуете свою политику в владениях ваших вассалов. Ваши шансы на успех зависят от вашего хорошего Навыка Учености (>=12), от наличия Достоинства Ученые круги и от ваших черт Смиренный, Терпеливый, Спокойный и Ученый. Если у вас Ученость ниже среднего (<8), другой образ жизни, отличный от Учености, и среди ваших черт есть Гневный, Нетерпеливый, Садист и Черствый, вы снизите свои шансы на успех\n"
darkages_tyranny_toast.02.tt1:0 "Ваш [da_tyranny02_councillor.GetCouncilTitle] [Select_CString(da_tyranny02_councillor.IsFemale, 'добилась', 'добился')] успеха!"
darkages_tyranny_toast.02.tt2:0 "Ваш [da_tyranny02_councillor.GetCouncilTitle] [Select_CString(da_tyranny02_councillor.IsFemale, 'потерпела', 'потерпел')] неудачу..."
darkages_tyranny_toast.02.tt4:0 "Вам удалось впечатлить всех до подчинения!"
darkages_tyranny_toast.02.tt5:0 "Вы произвели на всех очень плохое впечатление..."
darkages_county_ordinances:0 "Несчастные указы"
darkages_county_ordinances_desc:0 "По приказу Сюзерена владельца Графства, даже если это действительно позитивно, вокруг принятия этой политики было много политической драмы"
darkages_tyranny.03.t:0 "Неудачные обещания"
darkages_tyranny.03.desc1:0 "В настоящее время я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с серьезной политической дилеммой из-за силы моего собственного слова.\n\nВопрос касается сложного управленческого предложения, подкрепленного увеличением бюрократии, что ляжет бременем на способность управлять моим Доменом и принесет пользу моим вассалам, одновременно снижая мои будущие провинциальные доходы.\n\nПоскольку мои вассалы долго лоббировали Совет, мне удавалось до сих пор откладывать этот вопрос, обещая, что я [Select_CString(ROOT.Char.IsFemale, 'поддерживала', 'поддерживал')] всю эту схему, чтобы все были довольны.\n\nК сожалению, теперь меня приперли к стенке, где я либо приму политику, либо откажусь от нее, накапливая тиранию в процессе..."
darkages_tyranny.03.desc2:0 "В настоящее время я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся')] с серьезной политической дилеммой из-за силы моего собственного слова.\n\nВопрос касается сложного управленческого предложения, подкрепленного увеличением бюрократии, что ляжет бременем на способность управлять моим Доменом и принесет пользу моим вассалам, одновременно снижая мои будущие провинциальные доходы.\n\nПоскольку мои вассалы долго лоббировали Совет, мне удавалось до сих пор откладывать этот вопрос, обещая, что я [Select_CString(ROOT.Char.IsFemale, 'поддерживала', 'поддерживал')] всю эту схему, чтобы все были довольны.\n\nК сожалению, теперь меня приперли к стенке, где я либо приму политику, либо откажусь от нее, накапливая тиранию в процессе... или, может быть, есть третий вариант, если я проявлю творческий подход и буду мыслить нестандартно!"
darkages_tyranny.03.opta:0 "Принять политику"
darkages_tyranny.03.optb:0 "Отказаться от своего слова"
darkages_tyranny.03.optc:0 "Представить творческую альтернативу"
darkages_tyranny.03.tt1:0 "Вы реализуете политику. Баланс казначейств ваших вассалов увеличится\n"
darkages_tyranny.03.tt2:0 "Вы отказываетесь реализовать политику, отказываясь от своего слова. Ваше действие увеличит вашу Тиранию, следовательно, мнение ваших вассалов о вас. Советники, не являющиеся вашими вассалами, также будут недовольны вами\n"
darkages_tyranny.03.tt3:0 "Вы действуете творчески и нестандартно, чтобы одурачить всех в вопросе финансов. Высокая Ученость (>=12), наличие Достоинства 'Централизация', черты Жадный, Эксцентричный, Переменчивый и Администратор способствуют вашему возможному успеху. И наоборот, наличие менее 8 в Учености, отсутствие Образования в Учености, черты Щедрый, Упрямый, Честный и Сдержанный способствуют вашей возможной неудаче\n"
darkages_tyranny_toast.03.tt1:0 "Вам удается одурачить всех своим мастерством Управления и творческим мышлением!"
darkages_tyranny_toast.03.tt2:0 "Все разгадали вашу попытку мистификации..."
darkages_poor_bargain:0 "Плохая сделка"
darkages_poor_bargain_desc:0 "Этого правителя загнали в угол на плохую политическую сделку его вассалы и Советники"
darkages_political_maneuvering:0 "Политическая борьба"
darkages_political_maneuvering_desc:0 "Этому правителю удалось достичь компромисса со своими вассалами и Советниками, который минимизировал политические и финансовые потери от его первоначальной позиции"
rule_darkages_dangerous_stress_thresholds_rule:0 "#B #Bold Dark Ages#!:#! Опасные пороги стресса"
setting_darkages_dangerous_stress_thresholds_yes:0 "Включено"
setting_darkages_dangerous_stress_thresholds_no:0 "Отключено"
setting_darkages_dangerous_stress_thresholds_yes_desc:0 "При повышении уровня стресса персонаж имеет 5% шанс получить опасный удар"
setting_darkages_dangerous_stress_thresholds_no_desc:0 "Повышение уровня стресса происходит так же, как и в базовой игре"
rule_darkages_high_stress_risk_rule:0 "#B #Bold Dark Ages#!:#! Высокие риски стресса"
setting_darkages_high_stress_risk_yes:0 "Активно"
setting_darkages_high_stress_risk_no:0 "Неактивно"
setting_darkages_high_stress_risk_yes_desc:0 "Когда у персонажа более 99 стресса, каждый год есть шанс получить негативные события"
setting_darkages_high_stress_risk_no_desc:0 "Негативные события стресса отключены"
darkages_levies_curtailed:0 "Ополчение сокращено"
darkages_levies_curtailed_desc:0 "Этот персонаж позволил своим вассалам использовать согласованные вассальные ополчения в качестве рабочей силы"
darkages_tyranny.04.t:0 "Пропавшие солдаты"
darkages_tyranny.04.desc:0 "Недавно на заседании Совета на меня давили, чтобы я выполнил обещание, которое я [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал')] давным-давно, о том, чтобы позволить моим Вассалам сохранить большое количество причитающихся мне вассальных ополчений, а также финансировать небольшие проекты развития в их землях.\n\nМне ясно, что мои вассалы упорно лоббировали это предложение перед моими Советниками, и я не [Select_CString(ROOT.Char.IsFemale, 'удивилась бы', 'удивился бы')], если бы было задействовано золото, чтобы повысить готовность моих Советников заниматься этим вопросом.\n\nВ сложившейся ситуации я [Select_CString(ROOT.Char.IsFemale, 'заявила', 'заявил')], что дам окончательный ответ по этому вопросу в ближайшие несколько дней."
darkages_tyranny.04.opta:0 "Наложить вето на закон"
darkages_tyranny.04.tt1:0 "Вы накладываете вето на закон, нарушая свое обещание вассалам. Из-за серьезности вопроса ваша Тирания может значительно возрасти. Ваши безземельные Советники будут разочарованы вашим решением. Ваши земельные Советники уже имеют штраф к мнению о вас из-за примененной Тирании\n"
darkages_tyranny.04.optb:0 "Опубликовать закон"
darkages_tyranny.04.tt2:0 "Вы публикуете закон, теряя 50% вассального ополчения на следующие 10 лет, финансируя казну ваших вассалов и улучшая прогресс Развития в одном из Графств вашего Вассала. Ваши Вассалы одобрят ваше поведение\n"
darkages_tyranny.04.optc:0 "Использовать мой Ужас, чтобы запугать всех до подчинения"
darkages_tyranny.04.tt3:0 "Вы твердо намерены отказаться от своего обещания и будете угрожать своим вассалам, заставляя их принять это, используя свой Ужас. Начиная с шансов не в вашу пользу, наличие достоинства 'Скрытая угроза', наличие высокого Ужаса - все, что лучше 14, уже дает бонус - или наличие черт Садист, Мстительный, Черствый, Гневный и Пыточных дел мастер даст вам бонусы к вашему успеху. Если у вас менее 10 Ужаса, вы Сострадательный, Справедливый, Всепрощающий, Щедрый или Сдержанный, вы получите дополнительные штрафы к вашим шансам на успех\n"
rule_darkages_pregnancy_rule:0 "#B #Bold Dark Ages#!:#! Общие беременности"
setting_darkages_pregnancy_highrisk:0 "Высокий риск"
setting_darkages_pregnancy_lowrisk:0 "Низкий риск"
setting_darkages_pregnancy_highrisk_desc:0 "Как и в средние века, беременность — дело рискованное, когда нередко возникают серьезные осложнения"
setting_darkages_pregnancy_lowrisk_desc:0 "Шансы того, что с беременностью что-то пойдет не так, значительно снижены"
rule_darkages_pregnancy_PC_rule:0 "#B #Bold Dark Ages#!:#! Беременности Игрока"
setting_darkages_pregnancy_PC_highrisk:0 "Высокий риск"
setting_darkages_pregnancy_PC_lowrisk:0 "Низкий риск"
setting_darkages_pregnancy_PC_highrisk_desc:0 "Женский персонаж игрока будет иметь высокий риск смерти при каждой беременности (максимум около 6%-7%)"
setting_darkages_pregnancy_PC_lowrisk_desc:0 "Женский персонаж игрока будет иметь более низкий риск смерти при каждой беременности (максимум около 3%-3.5%)"
darkages_tyranny.05.t:0 "Грязная пьеса"
darkages_tyranny.05.desc:0 "[darkages_vassal_tyr_5.GetName] долго [Select_CString(darkages_vassal_tyr_5.IsFemale, 'готовила', 'готовил')] пьесу, вдохновленную классикой старых времен.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] приглашение сегодня утром, но к моему удивлению и разочарованию, даже если я [darkages_vassal_tyr_5.GetHerHis] Сюзерен, похоже, я не буду присутствовать на спектакле на почетном месте.\n\nЯ чувствую своего рода критику и скрытый сигнал неповиновения всех моих вассалов в этой наглости.\nЕсли я [Select_CString(ROOT.Char.IsFemale, 'хочу', 'хочу')] хорошо выглядеть и утвердить свое истинное место в моей Державе, мне нужно принять определенные меры..."
darkages_tyranny.05.opta:0 "Принять скромное место, отведенное для меня"
darkages_tyranny.05.tt1:0 "Вы принимаете место, которое [darkages_vassal_tyr_5.GetFirstName] [Select_CString(darkages_vassal_tyr_5.IsFemale, 'зарезервировала', 'зарезервировал')] для вас, зная, что это оскорбление вашей личности и положения в присутствии всех ваших вассалов. Каждый вассал, кроме организатора, который не является Смиренным, будет смущен ситуацией, и вы получите соответствующий штраф к мнению\n"
darkages_tyranny.05.optb:0 "Я силой займу почетное место!"
darkages_tyranny.05.tt2:0 "Вы навяжете свое присутствие как главного гостя пьесы, унизив своего вассала\n"
darkages_tyranny.05.optc:0 "Использовать творческий подход и хитрость, чтобы стать почетным гостем"
darkages_tyranny.05.tt3:0 "Успех этого варианта положительно зависит от вашей высокой Интриги (>=12), от следования Образу жизни Интриги, от того, являетесь ли вы Эксцентричным, Обманщиком, Переменчивым и Интриганом. Отрицательно влияют на исход ваш низкий Навык Интриги (<8), то, что вы Честный, Упрямый, Справедливый и Смиренный\n"
darkages_tyranny_toast.05.tt1:0 "Вам удалось утвердить свое законное место!"
darkages_tyranny_toast.05.tt2:0 "Вам не удалось утвердить свое законное место..."
