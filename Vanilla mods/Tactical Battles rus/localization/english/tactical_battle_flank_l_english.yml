l_english:
# Event 0001 - Left Flank Envelopment SUCCESS
tactical_flank_battle.0001.t:0 "Left Flank Sweeps Forward!"
tactical_flank_battle.0001.desc:0 "[scope:flank_commander.GetTitledFirstName], commanding our left flank, has found an opening! The enemy's right is exposed, and we have the opportunity to envelope their position. [enemy_commander.GetTitledFirstName]'s forces are vulnerable to a devastating flanking maneuver!"
tactical_flank_battle.0001.a:0 "Press the advantage aggressively! (Prowess vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0001.a.success:0 "Our left flank charges with fury, rolling up their line!"
tactical_flank_battle.0001.a.failure:0 "The aggressive push is contained."
tactical_flank_battle.0001.b:0 "Coordinate with the center! (Stewardship vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0001.b.success:0 "Perfect coordination amplifies our advantage!"
tactical_flank_battle.0001.b.failure:0 "The coordination fails to materialize."
tactical_flank_battle.0001.c:0 "Execute a pincer movement! (Martial vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0001.c.success:0 "We trap them in a devastating pincer!"
tactical_flank_battle.0001.c.failure:0 "They evade the pincer maneuver."
tactical_flank_battle.0001.d:0 "Hold position and observe."

# Event 0002 - Left Flank Envelopment FAILURE
tactical_flank_battle.0002.t:0 "Left Flank Under Pressure!"
tactical_flank_battle.0002.desc:0 "[scope:flank_commander.GetTitledFirstName], commanding our left flank, is in trouble! [enemy_commander.GetTitledFirstName] has turned our attempted envelopment against us. Our left is now vulnerable and falling back. We must act quickly or risk losing the entire flank!"
tactical_flank_battle.0002.a:0 "Reform the flank! (Martial vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0002.a.success:0 "We restore order to the left flank!"
tactical_flank_battle.0002.a.failure:0 "The flank continues to crumble."
tactical_flank_battle.0002.b:0 "Call for support from the center! (Diplomacy vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0002.b.success:0 "Reinforcements shore up our left!"
tactical_flank_battle.0002.b.failure:0 "No help arrives in time."
tactical_flank_battle.0002.c:0 "Execute a fighting withdrawal! (Stewardship vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0002.c.success:0 "We pull back in good order!"
tactical_flank_battle.0002.c.failure:0 "The withdrawal becomes a rout."
tactical_flank_battle.0002.d:0 "Accept the setback."

# Event 0003 - Center Hold SUCCESS
tactical_flank_battle.0003.t:0 "The Center Holds Firm!"
tactical_flank_battle.0003.desc:0 "[scope:flank_commander.GetTitledFirstName], commanding our center, has proven their worth! While [enemy_commander.GetTitledFirstName] throws everything at our line, the center stands like a fortress. Our position is strong, and we can dictate the flow of battle from here!"
tactical_flank_battle.0003.a:0 "Push forward aggressively! (Martial vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0003.a.success:0 "The center drives them back!"
tactical_flank_battle.0003.a.failure:0 "They resist our push."
tactical_flank_battle.0003.b:0 "Anchor the entire line! (Prowess vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0003.b.success:0 "Our center becomes an immovable anchor!"
tactical_flank_battle.0003.b.failure:0 "The anchor position weakens."
tactical_flank_battle.0003.c:0 "Send support to both flanks! (Stewardship vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0003.c.success:0 "The center reinforces our entire line!"
tactical_flank_battle.0003.c.failure:0 "We spread ourselves too thin."
tactical_flank_battle.0003.d:0 "Maintain steady pressure."

# Event 0004 - Center Collapsing FAILURE
tactical_flank_battle.0004.t:0 "The Center is Breaking!"
tactical_flank_battle.0004.desc:0 "[scope:flank_commander.GetTitledFirstName] desperately tries to hold the center, but [enemy_commander.GetTitledFirstName] is breaking through! If the center collapses, both flanks will be cut off and destroyed. This is the critical moment of the battle!"
tactical_flank_battle.0004.a:0 "Rally the center personally! (Martial vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0004.a.success:0 "My presence steadies the center!"
tactical_flank_battle.0004.a.failure:0 "Even my presence cannot stop the collapse."
tactical_flank_battle.0004.b:0 "Commit all reserves! (Stewardship vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0004.b.success:0 "Fresh troops plug the gap!"
tactical_flank_battle.0004.b.failure:0 "The reserves are swallowed up."
tactical_flank_battle.0004.c:0 "Refuse the center and strengthen flanks! (Learning vs [enemy_commander.GetShortUINameNoTooltip])"
tactical_flank_battle.0004.c.success:0 "We form a new defensive line!"
tactical_flank_battle.0004.c.failure:0 "The maneuver fails catastrophically."
tactical_flank_battle.0004.d:0 "Brace for impact and hope."


