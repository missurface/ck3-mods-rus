tactical_overmatched_enemy_commander:0 "Outmatched Enemy Commander"
tactical_overmatched_enemy_commander_desc:0 "This character's experience and skill on the battlefield vastly exceeds the enemy commanders they face, giving them a significant advantage in combat and tactics."
tactical_outmatched_enemy_commander:0 "Over My Head"
tactical_outmatched_enemy_commander_desc:0 "This character is facing an enemy commander whose experience and skill on the battlefield vastly exceeds their own, putting them at a significant disadvantage in combat and tactics."


trait_lifestyle_flank_commander: "Flank Commander"
trait_lifestyle_flank_commander_desc: "#soft_glow #difficulty_hard Unassigned \n\n#![ROOT.GetCharacter.GetFirstNameNoTooltip] has experience in commanding a flank, tasked with executing flanking maneuvers and exploiting weaknesses on the enemy's right side."
lifestyle_assigned_flank_commander_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] was chosen to command a flank in [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy] army, tasked with executing flanking maneuvers and exploiting weaknesses on the enemy's right side."
trait_lifestyle_flank_commander_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] commands the left flank in [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy] army, tasked with executing flanking maneuvers and exploiting weaknesses on the enemy's right side."
trait_track_left:0 "Left Flank Commander"
trait_track_left_desc:0 "Fighting on the left side of the flank and maneuvering against the enemies right flank, this character has experience against the enemies most formidable troops."
trait_track_center:0 "Center Flank Commander"
trait_track_center_desc:0 "Fighting in the center of the flank and maneuvering against the enemies main line, this character fights against the main force of the enemy and has experience against their most disciplined troops."
trait_track_right:0 "Right Flank Commander"
trait_track_right_desc:0 "Fighting in the right of the flank and maneuvering against the enemies left flank, this character commands the armies most noble and elite troops in battle."

lifestyle_left_flank_commander_desc: "This character leads the left flank of an army, responsible for carrying out flanking maneuvers and taking advantage of vulnerabilities on the enemy's right side."
lifestyle_assigned_left_flank_commander_desc: "#soft_glow #difficulty_easy Leads Left\n\n#!This character commands the left flank of [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy] army, responsible for carrying out flanking maneuvers and taking advantage of vulnerabilities on the enemy's right side."
lifestyle_assigned_center_flank_commander_desc: "#soft_glow #difficulty_easy Leads Center\n\n#!This character commands the center of [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy] army, responsible for maintaining the main battle line and coordinating strategies with the flanks."
lifestyle_assigned_right_flank_commander_desc: "#soft_glow #difficulty_easy Leads Right\n\n#!This character commands the right flank of [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy] army, responsible for carrying out flanking maneuvers and taking advantage of vulnerabilities on the enemy's left side."

trait_lifestyle_war_commander: "War Commander"
trait_lifestyle_war_commander_desc: "This character commands the army for a country at war, receiving increased prestige from military successes and bonuses to martial skill during wartime."
trait_lifestyle_war_commander_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] commands the army of [ROOT.GetCharacter.GetLiegeTitleEvenWhenDead.GetNameNoTier] during wartime. Overseeing the battlefield, he commands respect and strikes fear into the hearts of his enemies."

lifestyle_war_commander_desc: "This character leads the army during wartime, responsible for directing military operations and achieving victory for their nation."
trait_track_lifestyle_war_commander: "Commander of War"
trait_track_lifestyle_war_commander_desc: "This character commands the army in wartime, tasked with leading military efforts and securing victories for their country."
trait_track_skill:0 "Experience in Battle"
trait_track_skill_desc:0 "This character has led successful manuevers during battle, demonstrating their skill and experience in commanding troops."
trait_track_victories:0 "Victor in Battle"
trait_track_victories_desc:0 "This character's number of victories in battles during wartime, demonstrating their skill and success on the battlefield."
trait_track_foreign_fighter:0 "Fighting on Foreign Soil"
trait_track_foreign_fighter_desc:0 "This character's experience in leading men to victory outside the borders of their realm, demonstrating their skill in navigating foreign terrain and overcoming the challenges of fighting away from home."
trait_track_local_fighter:0 "Defending the Homeland"
trait_track_local_fighter_desc:0 "This character's experience in successfully leading men to defend their homeland, demonstrating their skill in utilizing familiar terrain and local resources to their advantage."
trait_track_outnumbered:0 "Against The Odds"
trait_track_outnumbered_desc:0 "This character's experience in successfully leading men in battle against forces larger than their own, demonstrating their skill in utilizing superior tactics and strategy to overcome the odds."


