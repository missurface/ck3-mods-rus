 # tactical_forest_battle.9416 - Harrying left flank, enemy bleeding
tactical_forest_battle.9416.t:0 "Their Left Is Bleeding!"
tactical_forest_battle.9416.desc:0 "[enemy_commander.GetFirstNamePossessive] forces are reeling from our hit-and-run tactics. Their left flank is severely depleted and their wounded are slowing their movements. We must act quickly to capitalize on their weakness before they can reorganize."
tactical_forest_battle.9416.a:0 "Coordinate a charge with our elite crack units"
tactical_forest_battle.9416.a.success:0 "Our elite units sweep through their left flank, sending them into disarray!"
tactical_forest_battle.9416.a.failure:0 "The charge is unable to break through their stubborn defense!"
tactical_forest_battle.9416.b:0 "Coordinate a charge with our knights"
tactical_forest_battle.9416.b.success:0 "Our knights smash into the weakened enemy left, sending them into disarray!"
tactical_forest_battle.9416.b.failure:0 "The assault smashes into the weakened enemy left, sending them into disarray!"
tactical_forest_battle.9416.c:0 "The charge is unable to break through their stubborn defense!"
tactical_forest_battle.9416.c.success:0 "Our left flank drive scatters the weakened enemy!"
tactical_forest_battle.9416.c.failure:0 "They maintain formation despite their losses!"
tactical_forest_battle.9416.d:0 "Feign a retreat a turn on them"
tactical_forest_battle.9416.d.success:0 "The enemy falls for our deception and pursues into an unexpected strike!"
tactical_forest_battle.9416.d.failure:0 "They see through our deception and maintain their formation!!"
tactical_forest_battle.9416.e:0 "Press the advantage"
tactical_forest_battle.9416.e.success:0 "Their left flank is crumbling under the immense pressure!"
tactical_forest_battle.9416.e.failure:0 "They maintain formation despite their losses!"


