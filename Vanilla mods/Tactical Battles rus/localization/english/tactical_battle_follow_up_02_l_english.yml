 # tactical_forest_battle.7320 - Failure event, enemy reorganizes and stands strong
tactical_forest_battle.7320.t:0 "Enemy Stand Strong Behind Our Lines"
tactical_forest_battle.7320.desc:0 "[enemy_commander.GetFirstNamePossessive] forces have rallied and reorganized their line behind ours. They are now dug in deeper, with their back toward our lines and their formation strengthened. We must decide whether to continue pressing them or change our tactics."
tactical_forest_battle.7320.a:0 "Send a charge with our elite crack units to attack their flank"
tactical_forest_battle.7320.a.success:0 "Our crack units take them unaware and sweep through their lines!"
tactical_forest_battle.7320.a.failure:0 "Our crack units are unable to break through their solid defense!"
tactical_forest_battle.7320.b:0 "Send knights to attack their flank"
tactical_forest_battle.7320.b.success:0 "Our knights smash into their flank, breaking their formation!"
tactical_forest_battle.7320.b.failure:0 "The knights are intercepted by enemy reserves!"
tactical_forest_battle.7320.c:0 "Break off center reserves to smash their rear"
tactical_forest_battle.7320.c.success:0 "Our center reserves smash into their rear, causing chaos!"
tactical_forest_battle.7320.c.failure:0 "Our center reserves are unable to disengage due to a sudden push!"
tactical_forest_battle.7320.d:0 "Break off right reserves to smash their rear"
tactical_forest_battle.7320.d.success:0 "Our center reserves smash into their rear, causing chaos!"
tactical_forest_battle.7320.d.failure:0 "Our center reserves are unable to disengage due to a sudden push!"
tactical_forest_battle.7320.e:0 "Feign a retreat and turn on the pursuers"
tactical_forest_battle.7320.e.success:0 "The enemy falls for our deception and pursues into an unexpected strike!"
tactical_forest_battle.7320.e.failure:0 "The enemy retreats to our exposed center!"


 # tactical_forest_battle.7322 - Enemy attacks our depleted right flank
tactical_forest_battle.7322.t:0 "Enemy Strikes Right Flank"
tactical_forest_battle.7322.desc:0 "[enemy_commander.GetFirstNamePossessive] has recognized our weakened right flank and is launching an assault. Without our reserves, we make a crucial decision to keep our right flank."
tactical_forest_battle.7322.a:0 "Right flank stands strong against the assault"
tactical_forest_battle.7322.a.success:0 "Our right flank holds firm against the enemy onslaught!"
tactical_forest_battle.7322.a.failure:0 "The right flank is overwhelmed and begins to falter!"
tactical_forest_battle.7322.b:0 "Send knights to reinforce the right"
tactical_forest_battle.7322.b.success:0 "Fresh knights stabilize the right flank!"
tactical_forest_battle.7322.b.failure:0 "The knights are intercepted before reaching the right!"
tactical_forest_battle.7322.c:0 "Send our elite crack units to reinforce the right flank"
tactical_forest_battle.7322.c.success:0 "Our reinforcements stablize the right flank!"
tactical_forest_battle.7322.c.failure:0 "Our right is crumbling despite the reinforcements!"
tactical_forest_battle.7322.d:0 "Try to retreat and get their left flank out of position while reinforcements arrive"
tactical_forest_battle.7322.d.success:0 "Their left flank begins to follow our retreat, exposing them!"
tactical_forest_battle.7322.d.failure:0 "The right is unable to disengage under pressure!"
tactical_forest_battle.7322.e:0 "Feign a retreat and turn on the pursuers"
tactical_forest_battle.7322.e.success:0 "The enemy falls for our deception and pursues into an unexpected strike!"
tactical_forest_battle.7322.e.failure:0 "They see through our deception and maintain their formation!"


tactical_forest_battle.231.t:0 "Charged Our False Gap"
tactical_forest_battle.231.desc:0 "[enemy_commander.GetFirstNameNoTooltip] has taken the bait and charged into the false gap we created our right flank. Their left is now exposed and vulnerable. We must act quickly to exploit this opportunity before they can recover."
tactical_forest_battle.231.a:0 "Send our elite crack units to charge their exposed left flank"
tactical_forest_battle.231.a.success:0 "Our elite units are sweeping through their left flank, breaking their formation!"
tactical_forest_battle.231.a.failure:0 "Their right holds ground against our elite assault!"
tactical_forest_battle.231.b:0 "Send knights to break their left flank"
tactical_forest_battle.231.b.success:0 "[left_flank_commander.GetFullNameNicknamedOrMe] charge and send their flank into disarray!"
tactical_forest_battle.231.b.failure:0 "The assault smashes into their left flank, sending them into disarray!"
tactical_forest_battle.231.c:0 "Right flank charges to break their formation"
tactical_forest_battle.231.c.success:0 "[right_flank_commander.GetFullNameNicknamedOrMe] charge and send their flank into disarray!"
tactical_forest_battle.231.c.failure:0 "Their left remains steadfast and refused to break!"
tactical_forest_battle.231.d:0 "Perform a feigned retreat and turn on them"
tactical_forest_battle.231.d.success:0 "The enemy falls for our deception and pursues!"
tactical_forest_battle.231.d.failure:0 "They see through our deception and maintain their formation!"
tactical_forest_battle.231.e:0 "Press the advantage"
tactical_forest_battle.231.e.success:0 "The enemies left crumbles under the relentless assault!"
tactical_forest_battle.231.e.failure:0 "Enemy reserves arrive to shore up the line!"
tactical_forest_battle.231.f:0 "Break off left reserves to encricle"
tactical_forest_battle.231.f.success:0 "Our left disengage and are in position to encricle the enemy!"
tactical_forest_battle.231.f.failure:0 "Our left reserves are unable to disengage!"

tactical_forest_battle.5907.t:0 "Our Center Is Routing"
tactical_forest_battle.5907.desc:0 "Our center is breaking! [enemy_commander.GetFirstNamePossessive] has routed our center and the entire army is in danger of collapse. We must act immediately to prevent catastrophe!"
tactical_forest_battle.5907.b:0 "Screen retreat with counter-attack"
tactical_forest_battle.5907.b.success:0 "The counter-attack buys time for our troops to consolidate!"
tactical_forest_battle.5907.b.failure:0 "The counter-attack fails and the rout continues!"
tactical_forest_battle.5907.c:0 "Desperate charge to break those chasing the routed right flank"
tactical_forest_battle.5907.c.success:0 "Our right manages to escape!"
tactical_forest_battle.5907.c.failure:0 "Our charge is repulsed and rout continues!"
tactical_forest_battle.5907.a:0 "Retreat to defensive positions"
tactical_forest_battle.5907.a.success:0 "We manage to pull back and establish a new defensive line!"
tactical_forest_battle.5907.a.failure:0 "Our men take heavy losses!"

