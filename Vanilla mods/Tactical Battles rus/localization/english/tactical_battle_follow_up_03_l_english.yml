l_english:
tactical_forest_battle.7327.t:0 "Enemy Presses Advantage"
tactical_forest_battle.7327.desc:0 "[enemy_commander.GetFirstNamePossessive] forces have recognized our disorganization and are pressing their advantage ruthlessly. Our center is in chaos, and we must act decisively to prevent catastrophe."
tactical_forest_battle.7327.a:0 "Center retreats, setting an ambush trap"
tactical_forest_battle.7327.a.success:0 "The enemy folows our retreating center and is out of position"
tactical_forest_battle.7327.a.failure:0 "Our forces are unable to disengage!"
tactical_forest_battle.7327.b:0 "Send right reserves to stabilize center"
tactical_forest_battle.7327.b.success:0 "Fresh reserves arrive and restore the line!"
tactical_forest_battle.7327.b.failure:0 "The reserves fail to stem the tide!"
tactical_forest_battle.7327.c:0 "Send knights to reinforce center"
tactical_forest_battle.7327.c.success:0 "The knights stabilize the crumbling center!"
tactical_forest_battle.7327.c.failure:0 "The knights are overwhelmed!"
tactical_forest_battle.7327.d:0 "Send our elite crack units to  to reinforce center"
tactical_forest_battle.7327.d.success:0 "The elite regiment reinforcements shore up the center!"
tactical_forest_battle.7327.d.failure:0 "The center cannot gain cohesion!"
tactical_forest_battle.7327.e:0 "Command the center to hold!"
tactical_forest_battle.7327.e.success:0 "Our center is inspired to hold strong!"
tactical_forest_battle.7327.e.failure:0 "Morale continues to crumble despite our efforts!"

tactical_forest_battle.7332.t:0 "Enemy Attack on Right Flank"
tactical_forest_battle.7332.desc:0 "[enemy_commander.GetFirstNamePossessive] has withdrawn their pursuing center forces and is preparing to strike hard at our right flank. We must respond immediately or our right will be overwhelmed. Their retreat has left their flank of their center forces exposed! We can use this to our advantage."
tactical_forest_battle.7332.a:0 "Our center charges their exposed flank"
tactical_forest_battle.7332.a.success:0 "Our unexpected charge shatters their formation!"
tactical_forest_battle.7332.a.failure:0 "The center remains steadfast and absorbs our charge!"
tactical_forest_battle.7332.b:0 "Retreat right trying to string their line out"
tactical_forest_battle.7332.b.success:0 "The enemy follows our retreat and is out of position!"
tactical_forest_battle.7332.b.failure:0 "Our forces are unable to disengage!"
tactical_forest_battle.7332.c:0 "Send knights to charge the exposed center flank"
tactical_forest_battle.7332.c.success:0 "Knights cause chaos in the enemy center!"
tactical_forest_battle.7332.c.failure:0 "Knights charge is absorbed by the center!"
tactical_forest_battle.7332.d:0 "Send elite crack units to charge their exposed flank"
tactical_forest_battle.7332.d.success:0 "Our crack units take their center by surprise!"
tactical_forest_battle.7332.d.failure:0 "The right continues to weaken!"
tactical_forest_battle.7332.e:0 "Break off left flank to try and encircle their center"
tactical_forest_battle.7332.e.success:0 "Our left flank is able to disengage and moves into position!"
tactical_forest_battle.7332.e.failure:0 "Our left flank is unable to disengage!"

tactical_forest_battle.0446.t:0 "Our Right Stabilized"
tactical_forest_battle.0446.desc:0 "The battle has descended into a grinding war of attrition on our right flank. Both sides are locked in fierce combat, and victory will go to whoever can outlast the other."
tactical_forest_battle.0446.a:0 "Command the right to hold firm and grind down the enemy"
tactical_forest_battle.0446.a.success:0 "The enemy line buckles under our relentless pressure!"
tactical_forest_battle.0446.a.failure:0 "The enemy holds firm against our grinding assault!"
tactical_forest_battle.0446.b:0 "Send knights to reinforce right flank"
tactical_forest_battle.0446.b.success:0 "The reinforcements give life!"
tactical_forest_battle.0446.b.failure:0 "The knights cannot reach the right in time!"
tactical_forest_battle.0446.c:0 "Send our elite crack regiments to reinforce our right flank"
tactical_forest_battle.0446.c.success:0 "The crack units relieve pressure from the right!"
tactical_forest_battle.0446.c.failure:0 "Our units are intercepted and unable to assist!"
tactical_forest_battle.0446.d:0 "Break off left flank to try and encircle their center"
tactical_forest_battle.0446.d.success:0 "Our left flank is able to disengage and moves into position!"
tactical_forest_battle.0446.d.failure:0 "Our left flank is unable to disengage!"
tactical_forest_battle.0446.e:0 "Feign a retreat and turn on the pursuers"
tactical_forest_battle.0446.e.success:0 "Our sudden attack on the pursuers takes them unaware!"
tactical_forest_battle.0446.e.failure:0 "They see through our expected our sudden attack!"
tactical_forest_battle.0446.f:0 "Retreat the right, stringing their lines out"
tactical_forest_battle.0446.f.success:0 "Their left follows our retreat and is out of position!"
tactical_forest_battle.0446.f.failure:0 "Our forces are unable to disengage!"


tactical_forest_battle.9423.t:0 "Right Flank Routing"
tactical_forest_battle.9423.desc:0 "Our right flank is collapsing under the enemy assault! [enemy_commander.GetFirstNamePossessive] left is breaking through, and we must act immediately to prevent a complete rout."
tactical_forest_battle.9423.a:0 "Retreat the center of the right flank while commanding it's flanks hold strong"
tactical_forest_battle.9423.a.success:0 "Their left flank is starting to get surrounded!"
tactical_forest_battle.9423.a.failure:0 "The center is unable to withstand the pressure!"
tactical_forest_battle.9423.b:0 "Feign a retreat and turn on the pursuers"
tactical_forest_battle.9423.b.success:0 "Our sudden attack on the pursuers takes them unaware!"
tactical_forest_battle.9423.b.failure:0 "Their left is prepared for the sudden attack"
tactical_forest_battle.9423.c:0 "Send knights to reinforce"
tactical_forest_battle.9423.c.success:0 "Knights form a rear guard and slow the pursuit!"
tactical_forest_battle.9423.c.failure:0 "Knights are swept aside by the onslaught!"
tactical_forest_battle.9423.d:0 "Send our elite crack units to reinforce"
tactical_forest_battle.9423.d.success:0 "Our elite crack units help stablize the right!"
tactical_forest_battle.9423.d.failure:0 "The crack units get bogged down by the overwhelming force!"
tactical_forest_battle.9423.e:0 "Rally troops and counter-attack"
tactical_forest_battle.9423.e.success:0 "Troops rally and turn to face the enemy!"
tactical_forest_battle.9423.e.failure:0 "The counter-attack falters!"
tactical_forest_battle.9423.f:0 "Send covert flanking force from the left to sneak through and crash into their left flank"
tactical_forest_battle.9423.f.success:0 "Our troops go undetected and cause cause among their left flank!"
tactical_forest_battle.9423.f.failure:0 "Our covert force is discovered and thrown into combat unable to aid!"


tactical_forest_battle.0447.t:0 "Right Flank Defeated"
tactical_forest_battle.0447.desc:0 "Our right flank has been routed and is in complete disarray. [enemy_commander.GetFirstNamePossessive] is pushing through the gap. We must decide whether to consolidate our position or make a desperate stand."
tactical_forest_battle.0447.a:0 "Retreat to defensive positions"
tactical_forest_battle.0447.a.success:0 "We manage to pull back and establish a new defensive line!"
tactical_forest_battle.0447.a.failure:0 "Our men take heavy losses!"
tactical_forest_battle.0447.b:0 "Screen retreat with counter-attack"
tactical_forest_battle.0447.b.success:0 "The counter-attack buys time for our right flank troops to consolidate!"
tactical_forest_battle.0447.b.failure:0 "The counter-attack fails and the rout continues!"
tactical_forest_battle.0447.c:0 "Desperate charge to break those chasing the routed right flank"
tactical_forest_battle.0447.c.success:0 "Our right manages to escape!"
tactical_forest_battle.0447.c.failure:0 "Pur charge is repulsed and rout continues!"


tactical_forest_battle.0442.t:0 "Enemy in Disarray"
tactical_forest_battle.0442.desc:0 "The enemy is pursuing our retreating right flank in a disorganized fashion. Half of the army is preparing to strike the center while groups of men chase our retreating forces. We can exploit this chaos to strike back."
tactical_forest_battle.0442.a:0 "Center breaks off to charge with our knights"
tactical_forest_battle.0442.a.success:0 "The enemy is caught off guard by our sudden charge and not in formation!"
tactical_forest_battle.0442.a.failure:0 "Their left flank reorganizes quickly and absorbs our charge!"
tactical_forest_battle.0442.b:0 "Send knights cut down the pursuers and turn on the disorganized enemy flank"
tactical_forest_battle.0442.b.success:0 "Our knights descend on the unorganized kill parties and turn on the flank"
tactical_forest_battle.0442.b.failure:0 "Our knights are bogged down hunting down killing parties"
tactical_forest_battle.0442.c:0 "Send elite crack units to cut down the pursuers and turn on the disorganized enemy flank"
tactical_forest_battle.0442.c.success:0 "Our elite crack units descend on the unorganized kill parties and turn on the flank"
tactical_forest_battle.0442.c.failure:0 "Our elite crack units are bogged down hunting down killing parties"
tactical_forest_battle.0442.d:0 "Send and unexpected push from our left flank to try and circle around and hit their center"
tactical_forest_battle.0442.d.success:0 "Our charge manages to disorient their right flank, creating a gap!"
tactical_forest_battle.0442.d.failure:0 "Our chage is absorbed by their right flank!"


tactical_forest_battle.0240.t:0 "Left Flank Routing"
tactical_forest_battle.0240.desc:0 "Our left flank is crumbling under the enemy onslaught! If they rout, the entire army could be in danger."
tactical_forest_battle.0240.a:0 "Send reserves to stabilize left"
tactical_forest_battle.0240.a.success:0 "Reserves arrive just in time and shore up the left!"
tactical_forest_battle.0240.a.failure:0 "The reserves cannot reach the left in time!"
tactical_forest_battle.0240.b:0 "Left flank fights harder"
tactical_forest_battle.0240.b.success:0 "The left flank holds against the assault!"
tactical_forest_battle.0240.b.failure:0 "The left flank breaks!"

tactical_forest_battle.0449.t:0 "Our Left is Routed"
tactical_forest_battle.0449.desc:0 "Our left flank has been completely routed! The enemy breakthrough threatens to encircle our entire army. We must act decisively to contain this disaster."
tactical_forest_battle.0449.a:0 "Retreat and reset positions"
tactical_forest_battle.0449.a.success:0 "We manage to pull back and establish a new defensive line!"
tactical_forest_battle.0449.a.failure:0 "The retreat becomes disorganized and uncontrolled!"
tactical_forest_battle.0449.b:0 "Screen the retreat with rearguard"
tactical_forest_battle.0449.b.success:0 "Our rearguard holds long enough for the main force to withdraw!"
tactical_forest_battle.0449.b.failure:0 "The rearguard is overwhelmed!"
tactical_forest_battle.0449.c:0 "Make a desperate charge to break through"
tactical_forest_battle.0449.c.success:0 "Against all odds, our desperate charge succeeds!"
tactical_forest_battle.0449.c.failure:0 "The desperate charge is crushed!"


tactical_forest_battle.0443.t:0 "Left Flank Retreated"
tactical_forest_battle.0443.desc:0 "Our left flank has fallen back in disarray! The enemy senses weakness and is pressing their advantage. Our center must hold strong or all is lost."
tactical_forest_battle.0443.a:0 "Center stands strong against pressure"
tactical_forest_battle.0443.a.success:0 "Our center holds firm despite the pressure!"
tactical_forest_battle.0443.a.failure:0 "The center cannot hold and begins to give way!"
tactical_forest_battle.0443.b:0 "Send knights to cut down pursuing enemies"
tactical_forest_battle.0443.b.success:0 "Knights sweep into the pursuing enemy column!"
tactical_forest_battle.0443.b.failure:0 "The knights cannot reach the pursuing forces in time!"
tactical_forest_battle.0443.c:0 "Send our elite crack units to cut down their pursuers"
tactical_forest_battle.0443.c.success:0 "Our reinforcements arrive and shore up the line!"
tactical_forest_battle.0443.c.failure:0 "The enemy presses the attack!"
tactical_forest_battle.0443.d:0 "Center feigns a retreat to lure enemy"
tactical_forest_battle.0443.d.success:0 "The enemy is following our center
tactical_forest_battle.0443.d.failure:0 "The enemy isn't fooled and stands firm"
tactical_forest_battle.0443.e:0 "Center launches a sudden charge!"
tactical_forest_battle.0443.e.success:0 "Our sudden charge shocks the enemy!"
tactical_forest_battle.0443.e.failure:0 "Our charge is absorbed!"

tactical_forest_battle.9222.t:0 "Rally the Army"
tactical_forest_battle.9222.desc:0 "Despite the chaos on our flanks, we still have reserves and fresh troops. If we can coordinate them properly, we might yet turn this battle around!"
tactical_forest_battle.9222.a:0 "Rally the center for a breakthrough"
tactical_forest_battle.9222.a.success:0 "Our center presses the attack!"
tactical_forest_battle.9222.a.failure:0 "The center cant break through"
tactical_forest_battle.9222.b:0 "Left flank charges with all their might"
tactical_forest_battle.9222.b.success:0 "The left flank charges hard and  tries to get behind their center!"
tactical_forest_battle.9222.b.failure:0 "The left flank charge is repulsed!"
tactical_forest_battle.9222.c:0 "Send our elite crack units to charge their center lines"
tactical_forest_battle.9222.c.success:0 "The charge from our crack units overwhelms the enemy!"
tactical_forest_battle.9222.c.failure:0 "The charge is blunted by enemy resistance!"
tactical_forest_battle.9222.d:0 "Send knights to break through their center lines"
tactical_forest_battle.9222.d.success:0 "Our combined forces begin to overwhelm the enemy!"
tactical_forest_battle.9222.d.failure:0 "The knights cannot break through!"
tactical_forest_battle.9222.e:0 "Feign a retreat and turn on the pursing enemy"
tactical_forest_battle.9222.e.success:0 "Our sudden attack on the pursuers takes them unaware!"
tactical_forest_battle.9222.e.failure:0 "The enemies reorganize quickly and absorb our charge!"


tactical_forest_battle.0703.t:0 "Our Left is Under Pressure"
tactical_forest_battle.0703.desc:0 "Our left flank is buckling under heavy pressure from [enemy_commander.GetFirstNamePossessive] right. If we do not act quickly, they will break through and threaten to encircle our entire army."
tactical_forest_battle.0703.a:0 "Retreat and lure into a trap"
tactical_forest_battle.0703.a.success:0 "The enemy follows our retreat into an ambush!"
tactical_forest_battle.0703.a.failure:0 "The enemy sees through our retreat and presses the attack!"
tactical_forest_battle.0703.b:0 "Feign a retreat and turn on the enemy"
tactical_forest_battle.0703.b.success:0 "Against all odds, the line holds!"
tactical_forest_battle.0703.b.failure:0 "The left flank breaks and routs!"
tactical_forest_battle.0703.c:0 "Send our elite crack units to reinforce our left"
tactical_forest_battle.0703.c.success:0 "The elite units arrive and stabilize the left!"
tactical_forest_battle.0703.c.failure:0 "The left is folding despite reinforcements"
tactical_forest_battle.0703.d:0 "Send our knights to reinforce our left "
tactical_forest_battle.0703.d.success:0 "The knights arrive and bolster the left!"
tactical_forest_battle.0703.d.failure:0 "The left continues to collapse edspite reinforcements!"
tactical_forest_battle.0703.e:0 "Send center reserves to help left"
tactical_forest_battle.0703.e.success:0 "Center reserves arrive and shore up the left!"
tactical_forest_battle.0703.e.failure:0 "Despite the reinforcements the left continues to waver"
tactical_forest_battle.0703.e:0 "Send right reserves to help left"
tactical_forest_battle.0703.e.success:0 "Despite the reinforcements the left continues to waver"
tactical_forest_battle.0703.e.failure:0 "The reserves cannot reach in time!"


tactical_forest_battle.0651.t:0 "Reserves Reinforce"
tactical_forest_battle.0651.desc:0 "Reinforcements arrived to shore up their right flank, threatening to blunt our left flank's advance. We must act quickly to maintain the momentum of our attack."
tactical_forest_battle.0651.a:0 "Left flank launches fierce push"
tactical_forest_battle.0651.a.success:0 "Their reinforcements are no match"
tactical_forest_battle.0651.a.failure:0 "The reinforcements absorb the charge"
tactical_forest_battle.0651.b:0 "Send our elite crack units to charge into the fray"
tactical_forest_battle.0651.b.success:0 "Elite units support allows left to break through!"
tactical_forest_battle.0651.b.failure:0 "Even with elite support the push fails!"
tactical_forest_battle.0651.c:0 "Send knights to break the reinforcements"
tactical_forest_battle.0651.c.success:0 "Our combined forces break through the reinforcements!"
tactical_forest_battle.0651.c.failure:0 "The knights cannot break through!"
tactical_forest_battle.0651.d:0 "Feign a retreat and turn on the pursing enemies"
tactical_forest_battle.0651.d.success:0 "The enemies are taken by surprise!"
tactical_forest_battle.0651.d.failure:0 "Their right flank reorganizes quickly and absorbs our charge!"
tactical_forest_battle.0651.e:0 "Charge hard into their depleted right flank"
tactical_forest_battle.0651.e.success:0 "The enemy right flank collapses under our assault!"
tactical_forest_battle.0651.e.failure:0 "The charge is blunted by enemy resistance!"

tactical_forest_battle.0018.t:0 "Enemy Right Distracted"
tactical_forest_battle.0018.desc:0 "Our right flank has successfully distracted the enemy center! They are confused and disorganized. We must capitalize on this advantage immediately."
tactical_forest_battle.0018.a:0 "Cavalry charges the distracted center"
tactical_forest_battle.0018.a.success:0 "Cavalry smashes through the confused enemy center!"
tactical_forest_battle.0018.a.failure:0 "The charge fails against enemy resistance!"
tactical_forest_battle.0018.b:0 "All-out infantry assault on center"
tactical_forest_battle.0018.b.success:0 "The infantry assault breaks the center!"
tactical_forest_battle.0018.b.failure:0 "The assault is repulsed!"
tactical_forest_battle.0018.c:0 "Send MAA to exploit confusion"
tactical_forest_battle.0018.c.success:0 "MAA units exploit the confusion and breakthrough!"
tactical_forest_battle.0018.c.failure:0 "The MAA cannot exploit the confusion!"

tactical_forest_battle.9434.t:0 "Knights At The Ready"
tactical_forest_battle.9434.desc:0 "Our knights can prove pivotal in turning the tide of the battle, the cruicial choice is where to send them."
tactical_forest_battle.9434.a:0 "Our knights press the attack on the left flank"
tactical_forest_battle.9434.a.success:0 "[enemy_commander.GetFirstNamePossessive] right flank is under heavy pressure"
tactical_forest_battle.9434.a.failure:0 "The knights aren't able to break through"
tactical_forest_battle.9434.b:0 "Our knights press the attack on the right flank"
tactical_forest_battle.9434.b.success:0 "[enemy_commander.GetFirstNamePossessive] left flank is under heavy pressure"
tactical_forest_battle.9434.b.failure:0 "The knights aren't able to break through"
tactical_forest_battle.9434.c:0 "Hit and run the enemies right flank"
tactical_forest_battle.9434.c.success:0 "Their flank is bleeding!"
tactical_forest_battle.9434.c.failure:0 "Their line holds!"
tactical_forest_battle.9434.d:0 "Hit and run the enemies left flank"
tactical_forest_battle.9434.d.success:0 "Their flank is bleeding!"
tactical_forest_battle.9434.d.failure:0 "Their line holds!"
tactical_forest_battle.9434.e:0 "Create a hidden flank on our left side"
tactical_forest_battle.9434.e.success:0 "Our hidden flank catches the enemy off guard!"
tactical_forest_battle.9434.e.failure:0 "The hidden flank is discovered!"
tactical_forest_battle.9434.f:0 "Create a hidden flank on our right side"
tactical_forest_battle.9434.f.success:0 "Our hidden flank catches the enemy off guard!"
tactical_forest_battle.9434.f.failure:0 "The hidden flank is discovered!"

tactical_forest_battle.9328.t:0 "Unaware Of The Hidden Flank On The Right"
tactical_forest_battle.9328.desc:0 "We weakened our right side with plans to retreat and lure the enemy in. Our hidden flank has gone unnoticed and lie behind the pushing left flank. We can strike a decisive blow if we act quickly."
tactical_forest_battle.9328.a:0 "Emerge and crash into their exposed flank"
tactical_forest_battle.9328.a.success:0 "The hidden flank strikes hard and takes the enemy unaware"
tactical_forest_battle.9328.a.failure:0 "The enemy spots our hidden flank and prepares!"
tactical_forest_battle.9328.b:0 "Try to surround the enemy with our hidden flank"
tactical_forest_battle.9328.b.success:0 "Our knights emerge and begin to encircle the enemy!"
tactical_forest_battle.9328.b.failure:0 "The knights get bogged down in combat!"


tactical_forest_battle.9329.t:0 "Unaware Of The Hidden Flank On The Left"
tactical_forest_battle.9329.desc:0 "We weakened our left side with plans to retreat and lure the enemy in. Our hidden flank has gone unnoticed and lie behind the pushing right flank. We can strike a decisive blow if we act quickly."
tactical_forest_battle.9329.a:0 "Emerge and crash into their exposed flank"
tactical_forest_battle.9329.a.success:0 "Their right flank is taken unaware and scrambles to reorganize!"
tactical_forest_battle.9329.a.failure:0 "The absorbs our charge"
tactical_forest_battle.9329.b:0 "Try to surround the enemy with our hidden flank"
tactical_forest_battle.9329.b.success:0 "Knights deliver a devastating charge that wins the battle!"
tactical_forest_battle.9329.b.failure:0 "The knights are repulsed!"

tactical_forest_battle.9465.t:0 "Charged Our False Gap On The Left"
tactical_forest_battle.9465.desc:0 "[enemy_commander.GetFirstNameNoTooltip] has taken the bait and charged into the false gap we created our left flank. Their left is now exposed and vulnerable. We must act quickly to exploit this opportunity before they can recover."
tactical_forest_battle.9465.a:0 "Send our elite crack units to charge their exposed right flank"
tactical_forest_battle.9465.a.success:0 "Our elite units are sweeping through their right flank, breaking their formation!"
tactical_forest_battle.9465.a.failure:0 "Their right holds ground against our elite assault!"
tactical_forest_battle.9465.b:0 "Send knights to break their right flank"
tactical_forest_battle.9465.b.success:0 "The charge of our knights shatters their right flank, sending them into disarray!"
tactical_forest_battle.9465.b.failure:0 "The assault smashes into their right flank, sending them into disarray!"
tactical_forest_battle.9465.c:0 "Left flank charges to break their formation"
tactical_forest_battle.9465.c.success:0 "[left_flank_commander.GetFullNameNicknamedOrMe] charge and send their flank into disarray!"
tactical_forest_battle.9465.c.failure:0 "Their right remains steadfast and refused to break!"
tactical_forest_battle.9465.d:0 "Perform a feigned retreat and turn on them"
tactical_forest_battle.9465.d.success:0 "The enemy falls for our deception and pursues!"
tactical_forest_battle.9465.d.failure:0 "They see through our deception and maintain their formation!"
tactical_forest_battle.9465.e:0 "Press the advantage"
tactical_forest_battle.9465.e.success:0 "The enemies right crumbles under the relentless assault!"
tactical_forest_battle.9465.e.failure:0 "Enemy reserves arrive to shore up the line!"
tactical_forest_battle.9465.f:0 "Break off center reserves to encricle"
tactical_forest_battle.9465.f.success:0 "Our center disengage and are in position to encricle the enemy!"
tactical_forest_battle.9465.f.failure:0 "Our center reserves are unable to disengage!"
