tactical_forest_battle.6321.f.success:0 "Troops counterattack with fury!"
tactical_forest_battle.6321.f.failure:0 "Morale fails and rout continues!"

tactical_forest_battle.6322.t:0 "Break Off from Left to Attack Chasing Enemies"
tactical_forest_battle.6322.desc:0 "Enemy forces are pursuing our left flank! We can break off units to turn and strike the pursuers, breaking their momentum."
