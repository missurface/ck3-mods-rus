tactical_forest_battle.7244.e.success:0 "Center attack strikes while they're disorganized!"
tactical_forest_battle.7244.e.failure:0 "Center attack fails to capitalize!"


tactical_forest_battle.2011.t:0 "Center Flank Exposed"
tactical_forest_battle.2011.desc:0 "Our center flank is now exposed because the enemy didn't fall for our feint! They're in a position to strike our vulnerable flank hard. We must act quickly to either reinforce or reposition."
tactical_forest_battle.2011.a:0 "Send our crack units to reinforce center"
tactical_forest_battle.2011.a.success:0 "Reserves arrive and shore up the center!"
tactical_forest_battle.2011.a.failure:0 "Reserves cannot reach in time!"
tactical_forest_battle.2011.b:0 "Turn our center reserves to form a refusing flank"
tactical_forest_battle.2011.b.success:0 "Center wheels and forms refusing flank!"
tactical_forest_battle.2011.b.failure:0 "The wheel fails and we're exposed!"
tactical_forest_battle.2011.c:0 "Left turns and charge their backs"
tactical_forest_battle.2011.c.success:0 "Our charge disorients their attack!"
tactical_forest_battle.2011.c.failure:0 "They reform and absorb the charge!"
tactical_forest_battle.2011.d:0 "Right flank charges to relieve pressure"
tactical_forest_battle.2011.d.success:0 "Right flank charges relieve the pressure!"
tactical_forest_battle.2011.d.failure:0 "Right flank charge cannot reach!"
tactical_forest_battle.2011.e:0 "Send our knights to charge their flank"
tactical_forest_battle.2011.e.success:0 "The knights charge breaks their attack!"
tactical_forest_battle.2011.e.failure:0 "The enemy reforms and holds!"


tactical_forest_battle.7330.t:0 "Enemy Launches Center Assault"
tactical_forest_battle.7330.desc:0 "[enemy_commander.GetFirstNamePossessive] is committing a strong push directly at our center! Our center is under immense pressure and we must decide whether to hold, reinforce, or maneuver."
tactical_forest_battle.7330.a:0 "Rally the center"
tactical_forest_battle.7330.a.success:0 "The center absorbs the assault and holds!"
tactical_forest_battle.7330.a.failure:0 "The center cannot withstand the pressure!"
tactical_forest_battle.7330.b:0 "Send left reserves to reinforce center"
tactical_forest_battle.7330.b.success:0 "Left reserves arrive and stabilize center!"
tactical_forest_battle.7330.b.failure:0 "Left reserves fail to reinforce in time!"
tactical_forest_battle.7330.c:0 "Send right reserves to reinforce center"
tactical_forest_battle.7330.c.success:0 "Right reserves arrive and stabilize center!"
tactical_forest_battle.7330.c.failure:0 "Right reserves fail to reinforce in time!"
tactical_forest_battle.7330.d:0 "Center launches a desperate charge"
tactical_forest_battle.7330.d.success:0 "Their center is taken aback by the charge!"
tactical_forest_battle.7330.d.failure:0 "Their center holds strong and presses the attack"
tactical_forest_battle.7330.e:0 "Feign a retreat to lure enemy in and turn on them"
tactical_forest_battle.7330.e.success:0 "The enemy thinks we're retreating and falls into our trap!"
tactical_forest_battle.7330.e.failure:0 "We cannot disengage!"
tactical_forest_battle.7330.f:0 "Retreat the center to try and get them out of position"
tactical_forest_battle.7330.f.success:0 "We successfully disengage and reposition!"
tactical_forest_battle.7330.f.failure:0 "We cannot disengage!"


tactical_forest_battle.9475.t:0 "Rally the Army"
tactical_forest_battle.9475.desc:0 "The battle has reached a critical point. Our forces are wavering but not yet broken. With strong leadership and bold action, we can restore order and turn this around!"
tactical_forest_battle.9475.a:0 "Center presses the attack"
tactical_forest_battle.9475.a.success:0 "Our army hears the call and rallies!"
tactical_forest_battle.9475.a.failure:0 "The army continues to waver!"
tactical_forest_battle.9475.b:0 "Feign a retreat to lure enemy in and counter-attack"
tactical_forest_battle.9475.b.success:0 "The counter-attack succeeds and morale soars!"
tactical_forest_battle.9475.b.failure:0 "The counter-attack fails and morale crumbles!"
tactical_forest_battle.9475.c:0 "Left charges hard into the right flank to ease pressure"
tactical_forest_battle.9475.c.success:0 "The charge disorients their right flank!"
tactical_forest_battle.9475.c.failure:0 "The enemy remains steadfast!"
tactical_forest_battle.9475.d:0 "Right flanks charges hard to ease pressure"
tactical_forest_battle.9475.d.success:0 "The charge disorients their left flank!"
tactical_forest_battle.9475.d.failure:0 "The enemy remains steadfast!"
tactical_forest_battle.9475.e:0 "Send knights to reinforce"
tactical_forest_battle.9475.e.success:0 "Reserves arrive and strengthen the line!"
tactical_forest_battle.9475.e.failure:0 "Reserves are too scattered to help!"
tactical_forest_battle.9475.f:0 "Send elite crack units to reinforce"
tactical_forest_battle.9475.f.success:0 "Our crack units cause chaos among the enemy!"
tactical_forest_battle.9475.f.failure:0 "Our crack units are overwhelmed!"


tactical_forest_battle.6321.desc:0 "[enemy_commander.GetFirstNamePossessive] forces are pursuing our troops! We can use our knights to turn and attack the pursuers, disrupting their advance."
