tactical_forest_battle.9468.t:0 "MAA Launch Charge"
tactical_forest_battle.9468.desc:0 "Our Men-at-Arms have recognized an opening to press their advantage! Our elite heavy troops can drive hard at the enemy center and potentially break their formation entirely."
tactical_forest_battle.9468.a:0 "MAA press advantage"
tactical_forest_battle.9468.a.success:0 "The MAA crash through the enemy line!"
tactical_forest_battle.9468.a.failure:0 "The MAA charge is repulsed!"
tactical_forest_battle.9468.b:0 "Perform another charge hard to break"
tactical_forest_battle.9468.b.success:0 "The second charge breaks the enemy formation!"
tactical_forest_battle.9468.b.failure:0 "The second charge fails to achieve breakthrough!"
tactical_forest_battle.9468.c:0 "Consolidate position and hold ground"
tactical_forest_battle.9468.c.success:0 "The MAA secure an excellent position!"
tactical_forest_battle.9468.c.failure:0 "The consolidation leaves us exposed!"
tactical_forest_battle.9468.d:0 "Execute flank maneuver"
tactical_forest_battle.9468.d.success:0 "The flank maneuver succeeds brilliantly!"
tactical_forest_battle.9468.d.failure:0 "The flank maneuver fails to develop!"
tactical_forest_battle.9468.e:0 "Maintain steady advance"
tactical_forest_battle.9468.e.success:0 "The steady advance grinds down enemy resistance!"
tactical_forest_battle.9468.e.failure:0 "The advance stalls against enemy resistance!"

tactical_forest_battle.9471.t:0 "Enemy Following the Bait"
tactical_forest_battle.9471.desc:0 "Our strategy is going to plan! Our weakened center has been luring the enemy in, [enemy_commander.GetFirstNamePossessive] center has slowly advanced out of position while the flanks of our center have held strong. Their center is seeing enemies all around! We can now launch a counter-attack to crush their disorganized forces."
tactical_forest_battle.9471.a:0 "Launch a sudden charge"
tactical_forest_battle.9471.a.success:0 "The enemy is in disarray over the sudden attack"
tactical_forest_battle.9471.a.failure:0 "Theior center holds strong"
tactical_forest_battle.9471.b:0 "Hard push from the left flank of our center line to begin encircling"
tactical_forest_battle.9471.b.success:0 "Our push leaks our forces through and allows our forces to get behind them!"
tactical_forest_battle.9471.b.failure:0 "The charge is absorbed!"
tactical_forest_battle.9471.c:0 "Hard push from the right flank of our center line to begin encircling"
tactical_forest_battle.9471.c.success:0 "Our push leaks our forces through and allows our forces to get behind them!"
tactical_forest_battle.9471.c.failure:0 "The charge is absorbed!"
tactical_forest_battle.9471.d:0 "Send our crack units to the center to keep the enemy in position"
tactical_forest_battle.9471.d.success:0 "Our center is stablized while our flanks get into position to encircle"
tactical_forest_battle.9471.d.failure:0 "The enemy takes heart!"
tactical_forest_battle.9471.e:0 "Send our knights to reinforce the center while our flanks get into position"
tactical_forest_battle.9471.e.success:0 "The enemy attacks exhaust themselves!"
tactical_forest_battle.9471.e.failure:0 "The enemy pushes through our line!"


tactical_forest_battle.9470.t:0 "Knights Launch Charge"
tactical_forest_battle.9470.desc:0 "Our knight contingent sees an opening to charge! With the enemy somewhat disorganized, a well-timed cavalry charge could shatter their morale."
tactical_forest_battle.9470.a:0 "Knights press advantage"
tactical_forest_battle.9470.a.success:0 "The knights charge breaks the enemy!"
tactical_forest_battle.9470.a.failure:0 "The knights are repulsed!"
tactical_forest_battle.9470.b:0 "Combine charge with MAA support"
tactical_forest_battle.9470.b.success:0 "The combined cavalry and MAA charge succeeds!"
tactical_forest_battle.9470.b.failure:0 "The combined charge fails!"
tactical_forest_battle.9470.c:0 "Execute wide flanking maneuver"
tactical_forest_battle.9470.c.success:0 "The knights encircle the enemy flank!"
tactical_forest_battle.9470.c.failure:0 "The flanking maneuver doesn't develop!"
tactical_forest_battle.9470.d:0 "Knights shield the center retreat"
tactical_forest_battle.9470.d.success:0 "Knights successfully screen the retreat!"
tactical_forest_battle.9470.d.failure:0 "Knights cannot hold the line!"
tactical_forest_battle.9470.e:0 "Charge uphill at enemy"
tactical_forest_battle.9470.e.success:0 "The uphill charge still breaks through!"
tactical_forest_battle.9470.e.failure:0 "The uphill charge is impossible!"

tactical_forest_battle.7243.t:0 "Enemy turns to stop the encircle "
tactical_forest_battle.7243.desc:0 "[enemy_commander.GetFirstNamePossessive] has turned their forces to face our eclosing forces from the left, attempting to break out before we can trap them. We must respond quickly to this new threat."
tactical_forest_battle.7243.a:0 "Charge their back"
tactical_forest_battle.7243.a.success:0 "We charge their exposed rear!"
tactical_forest_battle.7243.a.failure:0 "The enemy rearguard holds!"
tactical_forest_battle.7243.b:0 "Charge the force head on"
tactical_forest_battle.7243.b.success:0 "Our left flank crashes"
tactical_forest_battle.7243.b.failure:0 "The left flank cannot reach in time!"
tactical_forest_battle.7243.c:0 "Feign a retreat and charge the force head on"
tactical_forest_battle.7243.c.success:0 "Their counter-attack is broken!"
tactical_forest_battle.7243.c.failure:0 "The feint fails to draw them in!"
tactical_forest_battle.7243.d:0 "Our right charges to get behind and into position"
tactical_forest_battle.7243.d.success:0 "Our right flank breaks bleeds through and gets behind their center"
tactical_forest_battle.7243.d.failure:0 "The left flank continues to struggle!"
tactical_forest_battle.7243.e:0 "Strike their center while they turn"
tactical_forest_battle.7243.e.success:0 "Center attack strikes while they're disorganized!"
tactical_forest_battle.7243.e.failure:0 "Center attack fails to capitalize!"

