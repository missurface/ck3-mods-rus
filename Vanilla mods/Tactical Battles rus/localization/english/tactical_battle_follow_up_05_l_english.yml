tactical_forest_battle.6310.t:0 "The Trap is Sprung!"
tactical_forest_battle.6310.desc:0 "[right_flank_commander.GetTitledFirstNamePossessive] feint worked perfectly! [enemy_commander.GetFirstNamePossessive] commands to hold were drown out, and [enemy_commander.GetHerHis] vanguard broke formation to take the bait. The left side of their line is now stretched thin and disorganized."
tactical_forest_battle.6310.a:0 "[right_flank_commander.GetTitledFirstName] leads the disorganized army into a trap of our crack units"
tactical_forest_battle.6310.a.success:0 "[enemy_commander.GetFirstNamePossessive] right side follows [right_flank_commander.GetFirstNamePossessive] fleeing forces straight into an ambush!"
tactical_forest_battle.6310.a.failure:0 "The right doesn't take the bait!"
tactical_forest_battle.6310.b:0 "Send knights to crush their overextended flank"
tactical_forest_battle.6310.b.success:0 "The knights smash into the enemy's exposed flank, breaking their formation!"
tactical_forest_battle.6310.b.failure:0 "The enemy reorganizes quickly and turns on our knights"
tactical_forest_battle.6310.c:0 "Break off forces from [left_flank_commander.GetTitledFirstNamePossessive] flank to encircle their lured units"
tactical_forest_battle.6310.c.success:0 "[right_flank_commander.GetTitledFirstName] successfully encircles the enemy units, cutting off their retreat!"
tactical_forest_battle.6310.c.failure:0 "The enemy leads a devastating charge into our depleted right flank"
tactical_forest_battle.6310.d:0 "Rotate [center_flank_commander.GetFirstNamePossessive] reserves to encircle the lured units"
tactical_forest_battle.6310.d.success:0 "The reserves move swiftly and are in position to encircle"
tactical_forest_battle.6310.d.failure:0 "[enemy_commander.GetFirstNamePossessive] recognizes our depleted center!"
tactical_forest_battle.6310.e:0 "Turn and kill the lured units with a full charge"
tactical_forest_battle.6310.e.success:0 "The full charge takes the enemy by surprise!"
tactical_forest_battle.6310.e.failure:0 "The enemy remains steadfast and repels our charge!"


tactical_forest_battle.7320.t:0 "Enemy Stand Strong Behind Our Lines"
tactical_forest_battle.7320.desc:0 "[enemy_commander.GetFirstNamePossessive] forces have rallied and reorganized their line behind ours. They are now dug in deeper, with their back toward our lines and their formation strengthened. We must decide whether to continue pressing them or change our tactics."
tactical_forest_battle.7320.a:0 "Send a charge with our elite crack units to attack their flank"
tactical_forest_battle.7320.a.success:0 "Our crack units take them unaware and sweep through their lines!"
tactical_forest_battle.7320.a.failure:0 "Our crack units are unable to break through their solid defense!"
tactical_forest_battle.7320.b:0 "Send knights to attack their flank"
tactical_forest_battle.7320.b.failure:0 "The knights are intercepted by enemy reserves!"
tactical_forest_battle.7320.c:0 "Break off center reserves to smash their rear"
tactical_forest_battle.7320.c.success:0 "Our center reserves smash into their rear, causing chaos!"
tactical_forest_battle.7320.c.failure:0 "Our center reserves are unable to disengage due to a sudden push!"
tactical_forest_battle.7320.d:0 "Break off right reserves to smash their rear"
tactical_forest_battle.7320.d.success:0 "Our center reserves smash into their rear, causing chaos!"
tactical_forest_battle.7320.d.failure:0 "Our center reserves are unable to disengage due to a sudden push!"
tactical_forest_battle.7320.e:0 "Feign a retreat and turn on the pursuers"
tactical_forest_battle.7320.e.success:0 "The enemy falls for our deception and pursues into an unexpected strike!"
tactical_forest_battle.7320.e.failure:0 "The enemy retreats to our exposed center!"

