l_english:


game_concept_captain_trait_concept:0 "Captain Trait"
game_concept_captain_trait_concept_desc:0 "Captain Traits are traits given to men recruited from a squad of men-at-arms. During battle when using an option that involves men-at-arms, if successful, there is a chance to recruit a commander with a special Captain Trait after battle. These traits provide various bonuses to your army during battles\n\n Examples are: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"
game_concept_player_title_concept:0 " player"
game_concept_player_title_concept_desc:0 "Captain Traits are traits given to men recruited from a squad of men-at-arms. During battle when using an option that involves men-at-arms, if successful, there is a chance to recruit a commander with a special Captain Trait after battle. These traits provide various bonuses to your army during battles\n\n Examples are: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"

tactical_forest_battle.0498.t:0 "A Celebrated Soldier"
tactical_forest_battle.0498.desc:0 "After getting a report on our recent battle, my officers informed me that one of our soldiers from an elite regiment of [chosen_unit.GetName] had performed admirably in the thick of the fighting. Taking [commander.GetHerHim] into my service could inspire the other men."
tactical_forest_battle.0498.a:0 "Recruit [commander.GetName] into my service. ([commander.GetFirstName] gains a [captain_trait_concept|e])"
tactical_forest_battle.0498.b:0 "I'll think on it."

