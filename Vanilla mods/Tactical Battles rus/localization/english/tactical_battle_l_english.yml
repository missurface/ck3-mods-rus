# Event 7323 - Left Encircles (Outcomes)
tactical_forest_battle.7323.t:0 "The Right Flank is Encircled!"
tactical_forest_battle.7323.desc:0 "[left_flank_commander.GetTitledFirstName] has successfully enclosed [enemy_commander.GetFirstNamePossessive] right flank! Thousands of enemy soldiers are now trapped, cut off from retreat or reinforcement. [enemy_commander.GetTitledFirstName] watches helplessly as their trapped forces face annihilation. We must decide their fate—do we show them the mercy of honorable surrender, or do we utterly destroy them as an example?"
tactical_forest_battle.7323.a:0 "Begin the Slaughter!"
tactical_forest_battle.7323.a.success:0 "[left_flank_commander.GetTitledFirstName] leads the assault on the trapped forces!"
tactical_forest_battle.7323.a.failure:0 "The trapped forces stage a desperate breakout and many escape!"
tactical_forest_battle.7323.b:0 "Take Captives!"
tactical_forest_battle.7323.b.success:0 "The trapped forces surrender and become prisoners of war!"
tactical_forest_battle.7323.b.failure:0 "Many of the trapped forces refuse to surrender and fight to the death!"

 # Event 9466 - Their Center is Shocked
tactical_forest_battle.9466.t:0 "Flanked and Confused"
tactical_forest_battle.9466.desc:0 "[enemy_commander.GetTitledFirstNamePossessiveOrMy] center is reeling in shock! Ther panic is a perfect opportunity! If we can break through here we can turn on the center."
tactical_forest_battle.9466.a:0 "Feign a retreat and turn on the pursuers "
tactical_forest_battle.9466.a.success:0 "[center_flank_commander.GetFullNameNicknamedPossessiveOrMy] feign a retreat and smash into their center!"
tactical_forest_battle.9466.a.failure:0 "The enemy reorganizes and stands firm!"
tactical_forest_battle.9466.b:0 "Coordinate a charge with our knights"
tactical_forest_battle.9466.b.success:0 "Our combined charge smashes into their center"
tactical_forest_battle.9466.b.failure:0 "The enemy stands firm against our charge!"
tactical_forest_battle.9466.c:0 "Coordinate with our crack regiments to charge their right"
tactical_forest_battle.9466.c.success:0 "Our combined assault causes chaos on their center!"
tactical_forest_battle.9466.c.failure:0 "The enemy has time to establish a new defensive line!"
tactical_forest_battle.9466.d:0 "Press the advantage with full force"
tactical_forest_battle.9466.d.success:0 "We press the attack on their center!"
tactical_forest_battle.9466.d.failure:0 "The enemy holds despite the pressure!"
tactical_forest_battle.9466.e:0 "[center_flank_commander.GetTitledFirstNameOrMeRegnal] charges hard to crush their center!"
tactical_forest_battle.9466.e.success:0 "Our charge breaks enemy cohesion!"
tactical_forest_battle.9466.e.failure:0 "Their holds strong and we can't break through!"

# Event .220 - Left Begins Encircle
tactical_forest_battle.220.t:0 "Left Flank Begins Encirclement"
tactical_forest_battle.220.desc:0 "[left_flank_commander.GetTitledFirstNamePossessiveOrMy] force has leaked behind the enemy lines. We must press this advantage before [enemy_commander.GetFirstNamePossessive] reinforcements arrive. The men believe stalling the enemy for long enough will alow them to surround our enemy."
tactical_forest_battle.220.a:0 "Pincer with Right Flank!"
tactical_forest_battle.220.a.success:0 "[left_flank_commander.GetTitledFirstName] and our right flank coordinate a devastating pincer movement!"
tactical_forest_battle.220.a.failure:0 "The coordination between flanks breaks down, and the enemy escapes the pincer!"
tactical_forest_battle.220.b:0 "Send our knights to keep them busy!"
tactical_forest_battle.220.b.success:0 "Our knights are engaged, distracting them from surrounding enemies!"
tactical_forest_battle.220.b.failure:0 "The enemy sees the encircling force!"
tactical_forest_battle.220.c:0 "Send our crack units to keep them busy"
tactical_forest_battle.220.c.success:0 "Our crack units engage with the enemy, allowing the encirclement to proceed!"
tactical_forest_battle.220.c.failure:0 "The enemy regroup and push back our units!"
tactical_forest_battle.220.d:0 "Form an anvil while the leaked forces attack from behind"
tactical_forest_battle.220.d.success:0 "[center_flank_commander.GetTitledFirstName] right flank is smashed between two forces!"
tactical_forest_battle.220.d.failure:0 "Their right stands strong for the moment!"
tactical_forest_battle.220.e:0 "Inspire our troops to fight harder until the encirclement is complete"
tactical_forest_battle.220.e.success:0 "[center_flank_commander.GetTitledFirstName] right flank is smashed between two forces!"
tactical_forest_battle.220.e.failure:0 "Their right stands strong for the moment!"


