tactical_forest_battle.0061.t:0 "The Fate Of [sc_loser.GetFullNameNicknamed]"
tactical_forest_battle.0061.desc:0 "With my last blow [sc_loser.GetFirstName] falls to one knee, bloodied and beaten. While the battlefield around me rages on, [sc_loser.GetTitledFirstNamePossessive] eyes look up at me, filled with a mix of defiance and resignation. The time has come to decide [sc_loser.GetHerHis] fate."
tactical_forest_battle.0061.a:0 "Kill [sc_loser.GetFirstName]"
tactical_forest_battle.0061.a.success:0 "[sc_loser.GetFirstName] meets [sc_loser.GetHerHis] end on the battlefield."
tactical_forest_battle.0061.b:0 "Capture [sc_loser.GetFirstName]"
tactical_forest_battle.0061.b.success:0 "[sc_loser.GetFirstName] is taken prisoner."
tactical_forest_battle.0061.c:0 "Take [sc_loser.GetFirstNamePossessive] eye and release [sc_loser.GetHerHim] to [sc_loser.GetHerHis] fate."
tactical_forest_battle.0061.c.success:0 "Blinding [sc_loser.GetFirstName] ensures [sc_loser.GetHerHis] survival, but at a great cost."
tactical_forest_battle.0061.d:0 "Leave [sc_loser.GetFirstName] permanently scarred and release [sc_loser.GetHerHim] to [sc_loser.GetHerHis] fate."
tactical_forest_battle.0061.d.success:0 "The scars will serve as a lasting reminder of [sc_loser.GetFirstNamePossessive] defeat."
tactical_forest_battle.0061.e:0 "Maim [sc_loser.GetFirstName] and release [sc_loser.GetHerHim] to [sc_loser.GetHerHis] fate"
tactical_forest_battle.0061.e.success:0 "[sc_loser.GetFirstName] will carry the burden of [sc_loser.GetHerHis] injuries for the rest of [sc_loser.GetHerHis] life."


# Event 0005 - First tactical decision (Forest)
tactical_forest_battle.0005.t:0 "Battle in the [battle_location.GetProvince.GetTerrain.GetName|l] of [battle_location.GetProvince.GetName]"
tactical_forest_battle.0005.desc:0 "While fighting in the war for [fighting_war.GetName] against [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], My army clashes in the [battle_location.GetProvince.GetTerrain.GetName|l] of [battle_location.GetProvince.GetName] against the forces of [enemy_war_leader.GetFullNameNicknamedOrMeRegnal]. Our scouts report of [enemy_commander.GetFullNameNicknamedOrMeRegnal] being at the command. As the commander, I must choose our move to overcome the [enemy_commander.GetTitleTierName]."
tactical_forest_battle.0005.a:0 "Focus on the left flank ([left_flank_commander.GetSkill( 'martial' )]#! [martial|E] [left_flank_commander.GetTitledFirstNameOrMe] vs [enemy_right_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_right_flank_commander.GetSkill( 'martial' )]#! [martial|E])"
tactical_forest_battle.0005.b:0 "Focus on the center ([center_flank_commander.GetSkill( 'martial' )]#! [martial|E] [center_flank_commander.GetTitledFirstNameOrMe] vs [enemy_center_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_center_flank_commander.GetSkill( 'martial' )]#! [martial|E])"
tactical_forest_battle.0005.c:0 "Focus on the right flank ([right_flank_commander.GetSkill( 'martial' )]#! [martial|E] [right_flank_commander.GetTitledFirstNameOrMe] vs [enemy_left_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_left_flank_commander.GetSkill( 'martial' )]#! [martial|E])"
tactical_forest_battle.0005.d:0 "Hold my knights in reserve"
tactical_forest_battle.0005.d.success:0 "My knights are perfectly positioned to exploit any opening!"
tactical_forest_battle.0005.d.failure:0 "The battle develops too quickly, and my knights are caught out of position."
tactical_forest_battle.0005.e:0 "Focus on our elite ranged units"
tactical_forest_battle.0005.f:0 "Focus on our elite cavalry"
tactical_forest_battle.0005.n:0 "Charge for their commander!"
tactical_forest_battle.0005.n.success:0 "[left_flank_commander.GetFullNameNicknamedOrMe] duels [enemy_right_flank_commander.GetFullNameNicknamed]"
tactical_forest_battle.0005.n.failure:0 "Our charge is unable to break through!"
tactical_forest_battle.0005.kc:0 "Duel Victory!"
tactical_forest_battle.0005.kc.success:0 "[left_flank_commander.GetFullNameNicknamed] has slain [enemy_right_flank_commander.GetFullNameNicknamed] in single combat, demoralizing their troops!"
tactical_forest_battle.0005.cc:0 "Duel Victory!"
tactical_forest_battle.0005.cc.success:0 "[left_flank_commander.GetFullNameNicknamed] has captured [enemy_right_flank_commander.GetFullNameNicknamed] after defeating [enemy_right_flank_commander.GetHerHim] in single combat, demoralizing their troops!"
tactical_forest_battle.0005.ld:0 "Defeated in Duel!"
tactical_forest_battle.0005.ld.failure:0 "[left_flank_commander.GetFullNameNicknamed] was defeated by [enemy_right_flank_commander.GetFullNameNicknamed] after surrounding [enemy_right_flank_commander.GetFirstName]! in battle!"
tactical_forest_battle.0005.ldk:0 "Killed in Duel!"
tactical_forest_battle.0005.ldk.failure:0 "[left_flank_commander.GetFullNameNicknamed] was killed by [enemy_right_flank_commander.GetFullNameNicknamed] after surrounding [enemy_right_flank_commander.GetFirstName] in battle!"
tactical_forest_battle.0005.j:0 "Charge [enemy_right_flank_commander.GetFullNameNicknamed]!"
tactical_forest_battle.0005.j.failure:0 "[left_flank_commander.GetFullNameNicknamed] was unable to breakthrough to [enemy_right_flank_commander.GetFullNameNicknamed]"
tactical_forest_battle.0005.dtt.success:0 "Our flank charges and surrounds [enemy_right_flank_commander.GetFirstName]"
# Event 0110 - Cavalry Feint SUCCESS Follow-up: Trap Sprung
tactical_forest_battle.0110.t:0 "The Trap is Sprung!"
tactical_forest_battle.0110.desc:0 "[left_flank_commander.GetTitledFirstNamePossessive] feint worked perfectly! [enemy_commander.GetFirstNamePossessive] commands to hold were drown out, and [enemy_commander.GetHerHis] vanguard broke formation to take the bait. The right side of their line is now stretched thin and disorganized."
tactical_forest_battle.0110.a:0 "[left_flank_commander.GetTitledFirstName] leads the disorganized army into a trap of our crack units"
tactical_forest_battle.0110.a.success:0 "[enemy_commander.GetFirstNamePossessive] right side follows [left_flank_commander.GetFirstNamePossessive] fleeing forces straight into an ambush!"
tactical_forest_battle.0110.a.failure:0 "The right doesn't take the bait and holds position, rotating units to support other flanks"
tactical_forest_battle.0110.b:0 "Send knights to crush their overextended flank"
tactical_forest_battle.0110.b.success:0 "The knights smash into the enemy's exposed flank, breaking their formation!"
tactical_forest_battle.0110.b.failure:0 "The enemy reorganizes quickly and turns on our knights"
tactical_forest_battle.0110.c:0 "Break off forces from [right_flank_commander.GetTitledFirstNamePossessive] flank to encircle their lured units"
tactical_forest_battle.0110.c.success:0 "[right_flank_commander.GetTitledFirstName] successfully encircles the enemy units, cutting off their retreat!"
tactical_forest_battle.0110.c.failure:0 "The enemy leads a devastating charge into our depleted right flank"
tactical_forest_battle.0110.d:0 "Rotate [center_flank_commander.GetFirstNamePossessive] reserves to encircle the lured units"
tactical_forest_battle.0110.d.success:0 "The reserves move swiftly and are in position to encircle"
tactical_forest_battle.0110.d.failure:0 "[enemy_commander.GetFirstNamePossessive] recognizes our depleted center!"
tactical_forest_battle.0110.e:0 "Turn and kill the lured units with a full charge"
tactical_forest_battle.0110.e.success:0 "The full charge takes the enemy by surprise!"
tactical_forest_battle.0110.e.failure:0 "The enemy remains steadfast and repels our charge!"


