# Event 0210 - Cavalry Feint FAILURE Follow-up: Feint Unmasked
tactical_forest_battle.0210.t:0 "Feint Unmasked!"
tactical_forest_battle.0210.desc:0 "[enemy_commander.GetTitledFirstName] saw through our cavalry feint! Their forces held discipline instead of pursuing, and now our horsemen face braced infantry, volleys of missiles, or counter-cavalry waiting in ambush. The tactical situation has turned against us—I must decide how to salvage this disaster."
tactical_forest_battle.0210.a:0 "Push through the trap! Charge with everything! (Martial + Prowess vs [enemy_commander.GetShortUINameNoTooltip], very risky)"
tactical_forest_battle.0210.a.success:0 "Against all odds, our sheer audacity breaks their formation! The enemy reels from our desperate charge!"
tactical_forest_battle.0210.a.failure:0 "The charge collapses into a catastrophic rout. Our cavalry are scattered and broken!"
tactical_forest_battle.0210.b:0 "Dismount and hold the line! (Requires infantry support)"
tactical_forest_battle.0210.c:0 "Screen the retreat with the cavalry. (Sacrifice cavalry to save the army)"
tactical_forest_battle.0210.d:0 "Rally the wavering horse with personal leadership! (Requires Brave, Inspiring Leader, or Martial 14+)"
tactical_forest_battle.0210.d.success:0 "My leadership steadies the cavalry! They reform and prepare to fight on!"
tactical_forest_battle.0210.d.failure:0 "The cavalry refuse to rally. Morale continues to crumble."



# Event 0120 - Infantry Ambush SUCCESS Follow-up: Kill Zone in the Woods
tactical_forest_battle.0120.t:0 "Kill Zone in the Woods!"
tactical_forest_battle.0120.desc:0 "The enemy column has walked straight into our concealed infantry and missile troops! The forest visibility is poor, their formations are stretched thin, and their command structure is in chaos. [enemy_commander.GetTitledFirstName]'s forces are caught in a perfect killing ground. How shall we capitalize on this opportunity?"
tactical_forest_battle.0120.a:0 "Close the jaws of the trap! Seal their front and rear!"
tactical_forest_battle.0120.b:0 "Let the arrows and javelins speak. Keep our infantry in cover. (Requires archers/skirmishers)"
tactical_forest_battle.0120.b.success:0 "Our missile barrage devastates their exposed column!"
tactical_forest_battle.0120.b.failure:0 "Their shields and armor limit the effectiveness of our barrage."
tactical_forest_battle.0120.c:0 "Strike the officers first—target banners and commanders!"
tactical_forest_battle.0120.c.success:0 "Our strike teams eliminate key officers! Their command collapses!"
tactical_forest_battle.0120.c.failure:0 "The strike teams are isolated and take heavy casualties!"
tactical_forest_battle.0120.d:0 "Leave them bleeding, then fade back into the woods."


# Event 0220 - Infantry Ambush FAILURE Follow-up: Ambush Detected
tactical_forest_battle.0220.t:0 "Ambush Detected!"
tactical_forest_battle.0220.desc:0 "[enemy_commander.GetTitledFirstName] saw through our ambush! Their scouts detected our concealed positions, and their forces adapted before we could spring the trap. Our scattered infantry units are caught exposed in [battle_location.GetName] with no coordinated advantage. I must decide how to salvage this tactical disaster."
tactical_forest_battle.0220.a:0 "Retreat and consolidate defensive positions! Regroup into strongholds."
tactical_forest_battle.0220.b:0 "Change formation and counter-charge through enemy pressure! (Martial 11+, high risk)"
tactical_forest_battle.0220.b.success:0 "Our unexpected aggression catches the enemy off-guard! Their formation breaks!"
tactical_forest_battle.0220.b.failure:0 "The counter-charge exposes our infantry even further. Disaster!"
tactical_forest_battle.0220.c:0 "Use the forest to scatter units and reform elsewhere. (Stewardship 10+)"
tactical_forest_battle.0220.c.success:0 "Our units slip away through the trees and regroup safely!"
tactical_forest_battle.0220.c.failure:0 "The scattered units cannot reform. They remain disorganized and vulnerable."
tactical_forest_battle.0220.d:0 "Hold our ground and fight through the pressure! Accept heavy casualties."

# Event 0130 - Levy Braced SUCCESS Follow-up: Spears and Trees
tactical_forest_battle.0130.t:0 "Spears and Trees!"
tactical_forest_battle.0130.desc:0 "The levy spearwall holds like stone! The forest itself becomes a fortress as our soldiers plant themselves between the trees. [enemy_commander.GetTitledFirstName]'s forces crash against our bristling formation and falter. Now comes the moment to press our advantage—how shall we exploit their weakness?"
tactical_forest_battle.0130.a:0 "Hold the line and grind them down. Let attrition work for us."
tactical_forest_battle.0130.b:0 "Strike suddenly through their center! (Learning + Martial 9+, moderate risk)"
tactical_forest_battle.0130.b.success:0 "The sudden thrust breaks their resolve! The enemy formation collapses!"
tactical_forest_battle.0130.b.failure:0 "The thrust slows but the line holds. They refuse to break."
tactical_forest_battle.0130.c:0 "Let the archers massacre them in the killing field. (Requires archers MaA)"
tactical_forest_battle.0130.c.success:0 "Devastating volleys rain down! The killing field claims hundreds!"
tactical_forest_battle.0130.c.failure:0 "Archers run low on arrows and lose their advantage."
tactical_forest_battle.0130.d:0 "Form an anvil to shatter their charge! (Focus on toughness)"

# Event 0230 - Levy Scattered FAILURE Follow-up: Formation Broken
tactical_forest_battle.0230.t:0 "Formation Broken!"
tactical_forest_battle.0230.desc:0 "The levies scatter in panic! Instead of forming a bristling spearwall, the soldiers spread between the trees, unable to coordinate or hold a line. [enemy_commander.GetTitledFirstName] sees the weakness and exploits it. The formation is broken—I must act quickly to salvage this disaster."
tactical_forest_battle.0230.a:0 "Rally them with personal example! Lead from the front! (Prowess 10+, Martial 9+)"
tactical_forest_battle.0230.a.success:0 "My personal valor rallies the soldiers! They reform and steel themselves!"
tactical_forest_battle.0230.a.failure:0 "The soldiers remain frightened and scattered. Morale does not recover."
tactical_forest_battle.0230.b:0 "Commit your elite knights to shore up the line. (Requires 2+ knights)"
tactical_forest_battle.0230.c:0 "Reposition scattered units to better terrain. (Stewardship 9+)"
tactical_forest_battle.0230.c.success:0 "The scattered levies are gathered and repositioned to stronger ground!"
tactical_forest_battle.0230.c.failure:0 "The repositioning attempt fails. Units become even more scattered!"
tactical_forest_battle.0230.d:0 "Focus on reducing enemy morale instead. (Intrigue 8+, psychological warfare)"


# Event 0140 - Knights in Reserve SUCCESS Follow-up: Knights Ready
tactical_forest_battle.0140.t:0 "Knights Ready!"
tactical_forest_battle.0140.desc:0 "The knights wait in perfect readiness, hidden from the enemy's view. [enemy_commander.GetTitledFirstName]'s forces are committed to their current positions, unaware of our cavalry reserve waiting to strike. Now is the moment to unleash them—how shall we use their devastating potential?"
tactical_forest_battle.0140.a:0 "Hammer strike—devastating cavalry charge! (Prowess 11+, very high risk/reward)"
tactical_forest_battle.0140.a.success:0 "The charge is executed flawlessly! Our knights shatter the enemy formation like glass!"
tactical_forest_battle.0140.a.failure:0 "The charge overextends and knights are caught isolated!"
tactical_forest_battle.0140.b:0 "Flanking maneuver—circle around the enemy! (Martial 10+)"
tactical_forest_battle.0140.b.success:0 "The flanking maneuver succeeds! The enemy is caught off-guard from behind!"
tactical_forest_battle.0140.b.failure:0 "The maneuver is blocked before it can develop!"
tactical_forest_battle.0140.c:0 "Pursuit—capitalize on retreating units! (Intrigue 9+)"
tactical_forest_battle.0140.c.success:0 "The pursuit routs the enemy! They cannot reorganize!"
tactical_forest_battle.0140.c.failure:0 "The pursuit is blocked and our cavalry take casualties."
tactical_forest_battle.0140.d:0 "Disciplined withdrawal—use knights to cover retreat. (Stewardship 9+)"

