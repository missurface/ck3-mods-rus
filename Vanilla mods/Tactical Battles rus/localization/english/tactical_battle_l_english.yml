# EVENT 9474 - Rally Army After Being Pressured
# ============================================

tactical_forest_battle.9474.t:0 "Rally the Army"
tactical_forest_battle.9474.desc:0 "The battle on the left has reached a critical point. Our forces are wavering but not yet broken. With strong leadership and bold action, we can restore order and turn this around!"
tactical_forest_battle.9474.a:0 "Left presses the attack"
tactical_forest_battle.9474.a.success:0 "Our army hears the call and rallies!"
tactical_forest_battle.9474.a.failure:0 "The army continues to waver!"
tactical_forest_battle.9474.b:0 "Feign a retreat to lure enemy in and counter-attack"
tactical_forest_battle.9474.b.success:0 "The counter-attack succeeds and morale soars!"
tactical_forest_battle.9474.b.failure:0 "The counter-attack fails and morale crumbles!"
tactical_forest_battle.9474.c:0 "Center charges hard to ease pressure"
tactical_forest_battle.9474.c.success:0 "The charge disorients their right flank!"
tactical_forest_battle.9474.c.failure:0 "The enemy remains steadfast!"
tactical_forest_battle.9474.d:0 "Right flanks charges hard to ease pressure"
tactical_forest_battle.9474.d.success:0 "The charge disorients their left flank!"
tactical_forest_battle.9474.d.failure:0 "The enemy remains steadfast!"
tactical_forest_battle.9474.e:0 "Send knights to reinforce"
tactical_forest_battle.9474.e.success:0 "Reserves arrive and strengthen the line!"
tactical_forest_battle.9474.e.failure:0 "Reserves are too scattered to help!"
tactical_forest_battle.9474.f:0 "Send elite crack units to reinforce"
tactical_forest_battle.9474.f.success:0 "Our crack units cause chaos among the enemy!"
tactical_forest_battle.9474.f.failure:0 "Our crack units are overwhelmed!"

# ============================================
# EVENT 0650 - Right Flank Reserves Intercept
# ============================================
tactical_forest_battle.0650.t:0 "Right Flank Intercepts Enemy Movement"
tactical_forest_battle.0650.desc:0 "Our right flank reserves have detected [enemy_commander.GetFirstNamePossessive] forces attempting to maneuver against our position. We have a brief window to act before the enemy completes their movement."

tactical_forest_battle.0650.a:0 "Launch a fierce push by the right flank"
tactical_forest_battle.0650.a.success:0 "The right flank delivers a crushing blow, collapsing the enemy's right side!"
tactical_forest_battle.0650.a.failure:0 "The push is driven back, and the enemy gains the initiative!"

tactical_forest_battle.0650.b:0 "Wheel the left flank to attack from behind"
tactical_forest_battle.0650.b.success:0 "Our wheel maneuver catches the enemy in a devastating crossfire!"
tactical_forest_battle.0650.b.failure:0 "The flanking maneuver is detected and disrupted by enemy counterattacks!"

tactical_forest_battle.0650.c:0 "Inspire the troops with a bold rallying call"
tactical_forest_battle.0650.c.success:0 "The troops are inspired and push back the enemy advance!"
tactical_forest_battle.0650.c.failure:0 "Our rallying call goes unheeded, and the army continues to lose ground!"

tactical_forest_battle.0650.d:0 "Turn on the right reserves and create confusion"
tactical_forest_battle.0650.d.success:0 "The reserves create enough confusion for us to reposition favorably!"
tactical_forest_battle.0650.d.failure:0 "The intrigue backfires, and the enemy exploits our confusion!"

tactical_forest_battle.0650.e:0 "Send knights to reinforce the right flank"
tactical_forest_battle.0650.e.success:0 "The knights reinforce the flank and secure the position!"
tactical_forest_battle.0650.e.failure:0 "The knights are cut off and surrounded by superior enemy numbers!"

