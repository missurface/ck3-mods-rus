tactical_forest_battle.1014.t:0 "Center Pull Back Strategy"
tactical_forest_battle.1014.desc:0 "The enemy center is pulling back to regroup and coordinate with other forces. We must decide whether to pursue, lure them into a trap, or reposition our own units for maximum impact."
tactical_forest_battle.1014.a:0 "Lure enemy to our MAA trap"
tactical_forest_battle.1014.a.success:0 "The enemy walks directly into our trap and is devastated!"
tactical_forest_battle.1014.a.failure:0 "The enemy recognizes the trap and avoids it!"
tactical_forest_battle.1014.b:0 "Left flank charges hard at left"
tactical_forest_battle.1014.b.success:0 "Our left charge breaks the enemy left completely!"
tactical_forest_battle.1014.b.failure:0 "The left charge is repulsed by enemy reserves!"
tactical_forest_battle.1014.c:0 "Center turns around and slaughters enemy"
tactical_forest_battle.1014.c.success:0 "Our center wheels and destroys the enemy center!"
tactical_forest_battle.1014.c.failure:0 "The enemy repels the counterattack!"
tactical_forest_battle.1014.d:0 "Lure enemy center to knights"
tactical_forest_battle.1014.d.success:0 "The enemy center is lured perfectly and destroyed by our knights!"
tactical_forest_battle.1014.d.failure:0 "The enemy escapes the lure and retreats!"
tactical_forest_battle.1014.e:0 "Press the advantage"
tactical_forest_battle.1014.e.success:0 "Relentless pressure completely demoralizes the enemy!"
tactical_forest_battle.1014.e.failure:0 "The enemy makes a stand and holds their ground!"

 # Event 0010 - Left Flank Focus Follow-up
tactical_forest_battle.0010.t:0 "Left Flank Engagement"
tactical_forest_battle.0010.desc:0 "The battle rages on, and our forces engage along the left flank. [center_flank_commander.GetTitledFirstName] commands in the center, with [right_flank_commander.GetFirstName] on the right flank. [left_flank_commander.GetTitledFirstName] commands the left, using [left_flank_commander.GetHerHis] forces could prove pivotal to securing victory."
tactical_forest_battle.0010.a:0 "Execute a feint retreat on the left flank"
tactical_forest_battle.0010.a.success:0 "The feint succeeds! The enemy breaks formation to pursue our fleeing troops, creating a fatal vulnerability."
tactical_forest_battle.0010.a.failure:0 "The enemy sees through our deception and maintains discipline, turning our feint against us!"
tactical_forest_battle.0010.b:0 "Perform a flanking maneuver"
tactical_forest_battle.0010.b.success:0 "Our flanking forces sweep around their left flank, shattering their cohesion!"
tactical_forest_battle.0010.b.failure:0 "This commander anticipates our maneuver and rotates forces to meet us."
tactical_forest_battle.0010.e:0 "Hit and run harassment tactics on their right flank"
tactical_forest_battle.0010.e.success:0 "Our harassment tactics wear them down! Their right is bleeding!"
tactical_forest_battle.0010.e.failure:0 "The enemy holds firm and maintain their formation!"
tactical_forest_battle.0010.f:0 "Break off a hidden flanking force and slowly fallback"
tactical_forest_battle.0010.f.success:0 "Our flanking force successfully disengages and loops around the pressing attack!"
tactical_forest_battle.0010.f.failure:0 "Our flanking force is spotted and brought into combat!"
tactical_forest_battle.0010.g:0 "Create a false gap enticing their right to charge into a trap"
tactical_forest_battle.0010.g.success:0 "Their right begin to charge into the gap, falling into our trap!"
tactical_forest_battle.0010.g.failure:0 "Their right refuses to take the bait and maintains discipline!"

