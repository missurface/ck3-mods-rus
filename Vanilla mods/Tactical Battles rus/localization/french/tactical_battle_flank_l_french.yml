 grant_left_interaction_desc: "Nommez [recipient.GetTitledFirstName] comme commandant de votre centre, en lui accordant autorité tactique et prestige."
 grant_center_interaction_desc: "Nommez [scope:recipient.GetTitledFirstName] comme commandant de votre centre, en lui accordant autorité tactique et prestige."
 grant_right_flank_interaction_desc: "Nommez [scope:recipient.GetTitledFirstName] comme commandant de votre flanc droit, en lui accordant autorité tactique et prestige."
  
 # Custom Tooltips 
 grant_left_flank_commander_tt: "[scope:recipient.GetTitledFirstName] a été nommé pour commander le flanc gauche."
 grant_center_commander_tt: "[scope:recipient.GetTitledFirstName] a été nommé pour commander le centre."
 grant_right_flank_commander_tt: "[scope:recipient.GetTitledFirstName] a été nommé pour commander le flanc droit."
  
 tactical_overmatched_enemy_commander: "Commandant ennemi surpassé"
 tactical_overmatched_enemy_commander_desc: "L'expérience et les compétences de ce personnage sur le champ de bataille dépassent largement celles des commandants ennemis auxquels il fait face, ce qui lui confère un avantage significatif en termes de combat et de tactique."
 tactical_outmatched_enemy_commander: "Au-dessus de ma tête"
 tactical_outmatched_enemy_commander_desc: "Ce personnage fait face à un commandant ennemi dont l'expérience et les compétences sur le champ de bataille dépassent largement les leurs, ce qui le désavantage considérablement en termes de combat et de tactique."
  
  
 trait_lifestyle_flank_commander: "Commandant de flanc"
 trait_lifestyle_flank_commander_desc: "#soft_glow #difficulty_hard Non affecté \n\n#![ROOT.GetCharacter.GetFirstNameNoTooltip] a de l'expérience dans le commandement d'un flanc, chargé d'exécuter des manœuvres de flanc et d'exploiter les faiblesses du côté droit de l'ennemi."
 lifestyle_assigned_flank_commander_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] a été choisi pour commander un flanc dans l'armée [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy], chargé d'exécuter des manœuvres de flanc et d'exploiter les faiblesses du côté droit de l'ennemi."
 trait_lifestyle_flank_commander_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] commande le flanc gauche de l'armée [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy], chargé d'exécuter des manœuvres de flanc et d'exploiter les faiblesses du côté droit de l'ennemi."
 trait_track_left: "Commandant du flanc gauche"
 trait_track_left_desc: "Combattant sur le côté gauche du flanc et manoeuvrant contre le flanc droit de l'ennemi, ce personnage a de l'expérience contre les troupes les plus redoutables de l'ennemi."
 trait_track_center: "Commandant du flanc central"
 trait_track_center_desc: "Combattant au centre du flanc et manœuvrant contre la ligne principale de l'ennemi, ce personnage se bat contre la force principale de l'ennemi et possède de l'expérience contre ses troupes les plus disciplinées."
 trait_track_right: "Commandant du flanc droit"
 trait_track_right_desc: "Combattant sur le flanc droit et manœuvrant contre le flanc gauche de l'ennemi, ce personnage commande les troupes les plus nobles et les plus élites de l'armée au combat."
  
 lifestyle_left_flank_commander_desc: "Ce personnage dirige le flanc gauche d'une armée, chargé d'effectuer des manœuvres de flanc et de profiter des vulnérabilités du côté droit de l'ennemi."
 lifestyle_assigned_left_flank_commander_desc: "#soft_glow #difficulty_easy Non assigné\n\n#!Ce personnage a été choisi pour commander le flanc gauche d'une armée, chargé d'effectuer des manœuvres de flanc et de tirer parti des vulnérabilités du côté droit de l'ennemi."
 lifestyle_assigned_center_flank_commander_desc: "#soft_glow #difficulty_easy Non assigné\n\n#!Ce personnage a été choisi pour commander le centre d'une armée, responsable du maintien de la ligne de bataille principale et de la coordination des stratégies avec les flancs."
 lifestyle_assigned_right_flank_commander_desc: "#soft_glow #difficulty_easy Non assigné\n\n#!Ce personnage a été choisi pour commander le flanc droit d'une armée, chargé d'effectuer des manœuvres de flanc et de tirer parti des vulnérabilités du côté gauche de l'ennemi."
  
 trait_lifestyle_war_commander: "Commandant de guerre"
 trait_lifestyle_war_commander_desc: "Ce personnage commande l'armée d'un pays en guerre, recevant un prestige accru grâce aux succès militaires et des bonus aux compétences martiales en temps de guerre."
 trait_lifestyle_war_commander_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] commande l'armée de [ROOT.GetCharacter.GetLiegeTitleEvenWhenDead.GetNameNoTier] en temps de guerre. Supervisant le champ de bataille, il impose le respect et sème la peur dans le cœur de ses ennemis."
  
 lifestyle_war_commander_desc: "Ce personnage dirige l'armée en temps de guerre, chargé de diriger les opérations militaires et de remporter la victoire de sa nation."
 trait_track_lifestyle_war_commander: "Commandant de guerre"
 trait_track_lifestyle_war_commander_desc: "Ce personnage commande l'armée en temps de guerre, chargé de diriger les efforts militaires et d'assurer les victoires de son pays."
 trait_track_skill: "Expérience au combat"
 trait_track_skill_desc: "Ce personnage a mené des manœuvres réussies au cours de la bataille, démontrant ses compétences et son expérience dans le commandement de troupes."
 trait_track_victories: "Victorieux au combat"
 trait_track_victories_desc: "Le nombre de victoires de ce personnage dans des batailles en temps de guerre, démontrant son habileté et son succès sur le champ de bataille."
 trait_track_foreign_fighter: "Combattre sur un sol étranger"
 trait_track_foreign_fighter_desc: "L'expérience de ce personnage pour mener les hommes à la victoire en dehors des frontières de leur royaume, démontrant leur habileté à naviguer sur des terrains étrangers et à surmonter les défis des combats loin de chez eux."
 trait_track_local_fighter: "Défendre la patrie"
 trait_track_local_fighter_desc: "L'expérience de ce personnage dans la conduite réussie d'hommes pour défendre leur patrie, démontrant leur habileté à utiliser un terrain familier et des ressources locales à leur avantage."
 trait_track_outnumbered: "Contre toute attente"
 trait_track_outnumbered_desc: "L'expérience de ce personnage dans la conduite réussie d'hommes dans des combats contre des forces plus grandes que la leur, démontrant son habileté à utiliser des tactiques et une stratégie supérieures pour surmonter les obstacles."
  
  
 trait_lifestyle_home_terrain_expert: "Défenseur de la Patrie"
 trait_track_lifestyle_home_terrain_expert: "Défenseur de la Patrie"
 trait_track_lifestyle_home_terrain_expert_desc: "Ce personnage est expérimenté dans les combats à l'intérieur des frontières de son royaume, connaissant le terrain et ses avantages, il constitue un adversaire redoutable lorsqu'il combat en terrain familier."
 trait_lifestyle_home_terrain_expert_desc: "Ce personnage est expérimenté dans les combats à l'intérieur des frontières de son royaume, connaissant le terrain et ses avantages, il constitue un adversaire redoutable lorsqu'il combat en terrain familier."
