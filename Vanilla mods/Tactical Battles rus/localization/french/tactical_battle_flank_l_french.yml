 lifestyle_outnumbered_fighter_expert_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] est expérimenté dans la conduite d'hommes contre des forces plus grandes que celles de [ROOT.GetCharacter.GetHerHis], démontrant l'habileté de [ROOT.GetCharacter.GetHerHis] à utiliser des tactiques et une stratégie supérieures pour surmonter les obstacles."
  
  
