 # Event 0001 - Left Flank Envelopment SUCCESS 
 tactical_flank_battle.0001.t: "Le flanc gauche avance !"
 tactical_flank_battle.0001.desc: "[scope:flank_commander.GetTitledFirstName], commandant notre flanc gauche, a trouvé une ouverture ! La droite de l'ennemi est exposée et nous avons la possibilité d'envelopper sa position. Les forces de [enemy_commander.GetTitledFirstName] sont vulnérables à une manœuvre de flanc dévastatrice !"
 tactical_flank_battle.0001.a: "Appuyez agressivement sur l'avantage ! (Prouesses contre [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0001.a.success: "Notre flanc gauche charge avec fureur, enroulant sa ligne !"
 tactical_flank_battle.0001.a.failure: "La poussée agressive est contenue."
 tactical_flank_battle.0001.b: "Coordonnez-vous avec le centre! (Intendance vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0001.b.success: "Une coordination parfaite amplifie notre avantage !"
 tactical_flank_battle.0001.b.failure: "La coordination ne parvient pas à se concrétiser."
 tactical_flank_battle.0001.c: "Exécutez un mouvement de tenaille ! (Martial contre [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0001.c.success: "On les piége dans une pince dévastatrice !"
 tactical_flank_battle.0001.c.failure: "Ils échappent à la manœuvre de la pince."
 tactical_flank_battle.0001.d: "Maintenez la position et observez."
  
 # Event 0002 - Left Flank Envelopment FAILURE 
 tactical_flank_battle.0002.t: "Le flanc gauche sous pression !"
 tactical_flank_battle.0002.desc: "[scope:flank_commander.GetTitledFirstName], commandant notre flanc gauche, est en difficulté ! [enemy_commander.GetTitledFirstName] a retourné notre tentative d'enveloppement contre nous. Notre gauche est désormais vulnérable et recule. Nous devons agir vite, sinon nous risquons de perdre tout le flanc !"
 tactical_flank_battle.0002.a: "Reformez le flanc ! (Martial contre [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0002.a.success: "On rétablit l'ordre sur le flanc gauche !"
 tactical_flank_battle.0002.a.failure: "Le flanc continue de s'effondrer."
 tactical_flank_battle.0002.b: "Appel au soutien du centre ! (Diplomatie contre [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0002.b.success: "Des renforts soutiennent notre gauche !"
 tactical_flank_battle.0002.b.failure: "Aucune aide n'arrive à temps."
 tactical_flank_battle.0002.c: "Exécutez un retrait de combat ! (Intendance vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0002.c.success: "On recule en bon ordre !"
 tactical_flank_battle.0002.c.failure: "Le retrait devient une déroute."
 tactical_flank_battle.0002.d: "Acceptez le revers."
  
 # Event 0003 - Center Hold SUCCESS 
 tactical_flank_battle.0003.t: "Le Centre tient bon !"
 tactical_flank_battle.0003.desc: "[scope:flank_commander.GetTitledFirstName], commandant notre centre, a fait ses preuves ! Pendant que [enemy_commander.GetTitledFirstName] jette tout sur notre ligne, le centre se dresse comme une forteresse. Notre position est forte et nous pouvons dicter le déroulement de la bataille à partir d’ici !"
 tactical_flank_battle.0003.a: "Avancez de manière agressive ! (Martial contre [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0003.a.success: "Le centre les repousse !"
 tactical_flank_battle.0003.a.failure: "Ils résistent à notre poussée."
 tactical_flank_battle.0003.b: "Ancrez toute la ligne ! (Prouesses contre [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0003.b.success: "Notre centre devient un point d'ancrage inamovible !"
 tactical_flank_battle.0003.b.failure: "La position d’ancrage s’affaiblit."
 tactical_flank_battle.0003.c: "Envoyez du soutien sur les deux flancs ! (Intendance vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0003.c.success: "Le centre renforce toute notre gamme !"
 tactical_flank_battle.0003.c.failure: "Nous nous éparpillons trop."
 tactical_flank_battle.0003.d: "Maintenez une pression constante."
  
 # Event 0004 - Center Collapsing FAILURE 
 tactical_flank_battle.0004.t: "Le Centre est en rupture !"
 tactical_flank_battle.0004.desc: "[scope:flank_commander.GetTitledFirstName] essaie désespérément de tenir le centre, mais [enemy_commander.GetTitledFirstName] réussit à percer ! Si le centre s’effondre, les deux flancs seront coupés et détruits. C'est le moment critique de la bataille !"
 tactical_flank_battle.0004.a: "Rassemblez personnellement le centre ! (Martial contre [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0004.a.success: "Ma présence stabilise le centre !"
 tactical_flank_battle.0004.a.failure: "Même ma présence ne peut arrêter l’effondrement."
 tactical_flank_battle.0004.b: "Engagez toutes les réserves ! (Intendance vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0004.b.success: "De nouvelles troupes comblent le vide !"
 tactical_flank_battle.0004.b.failure: "Les réserves sont englouties."
 tactical_flank_battle.0004.c: "Refusez le centre et renforcez les flancs ! (Apprentissage contre [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0004.c.success: "Nous formons une nouvelle ligne défensive !"
 tactical_flank_battle.0004.c.failure: "La manœuvre échoue catastrophiquement."
 tactical_flank_battle.0004.d: "Préparez-vous à l’impact et à l’espoir."
  
  
 tactical_forest_battle.0251.tt: "[center_flank_commander.GetFirstNameOrMe] expertise dans le [battle_location.GetProvince.GetTerrain.GetName]"
 tactical_forest_battle.0251.tt.success: "Les prouesses de [center_flank_commander.GetFirstNameOrMe] dans le [battle_location.GetProvince.GetTerrain.GetName] à [battle_location.GetProvince.GetName] les ont distingués parmi leurs pairs."
  
