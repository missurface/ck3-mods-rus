 tactical_outnumbered_lands.tt: "Succès en [battle_location.GetName]"
 tactical_outnumbered_lands.tt.success: "[this.GetFirstName] était sur le point de vaincre [enemy_commander.GetFirstName] en [battle_location.GetName] malgré son infériorité numérique ! [this.GetFirstName] s'est révélé être un brillant commandant et a gagné le respect de tous ceux qui ont été témoins de la bataille."
  
  # tactical_forest_battle.9416 - Harrying left flank, enemy bleeding 
 tactical_forest_battle.9416.t: "Leur gauche saigne !"
 tactical_forest_battle.9416.desc: "Les forces de [enemy_commander.GetFirstNamePossessive] sont sous le choc de nos tactiques de délit de fuite. Leur flanc gauche est gravement épuisé et leurs blessés ralentissent leurs mouvements. Nous devons agir rapidement pour capitaliser sur leur faiblesse avant qu’ils ne puissent se réorganiser."
 tactical_forest_battle.9416.a: "Coordonner une charge avec nos unités de crack d'élite"
 tactical_forest_battle.9416.a.success: "Nos unités d'élite balayent leur flanc gauche, les plongeant dans le désarroi !"
 tactical_forest_battle.9416.a.failure: "La charge est incapable de briser leur défense obstinée !"
 tactical_forest_battle.9416.b: "Coordonner une charge avec nos chevaliers"
 tactical_forest_battle.9416.b.success: "Nos chevaliers s'abattent sur la gauche ennemie affaiblie, les plongeant dans le désarroi !"
 tactical_forest_battle.9416.b.failure: "L’assaut s’écrase sur la gauche ennemie affaiblie, les plongeant dans le désarroi !"
 tactical_forest_battle.9416.c: "La charge est incapable de briser leur défense obstinée !"
 tactical_forest_battle.9416.c.success: "Notre offensive sur le flanc gauche disperse l’ennemi affaibli !"
 tactical_forest_battle.9416.c.failure: "Ils maintiennent la formation malgré leurs pertes !"
 tactical_forest_battle.9416.d: "Feignez une retraite et tournez-vous contre eux"
 tactical_forest_battle.9416.d.success: "L’ennemi tombe dans le piège de notre tromperie et lance une attaque inattendue !"
 tactical_forest_battle.9416.d.failure: "Ils voient clair dans notre tromperie et maintiennent leur formation !!"
 tactical_forest_battle.9416.e: "Appuyez sur l'avantage"
 tactical_forest_battle.9416.e.success: "Leur flanc gauche s’effondre sous la pression immense !"
 tactical_forest_battle.9416.e.failure: "Ils maintiennent la formation malgré leurs pertes !"
  
  
  # tactical_forest_battle.9418 - Hit and run successful, enemy bleeding 
 tactical_forest_battle.9418.t: "Leur droit est de saigner !"
 tactical_forest_battle.9418.desc: "Les forces de [enemy_commander.GetFirstNamePossessive] sont sous le choc de nos tactiques de délit de fuite. Leur flanc droit est gravement épuisé et leurs blessés ralentissent leurs mouvements. Nous devons agir rapidement pour capitaliser sur leur faiblesse avant qu’ils ne puissent se réorganiser."
 tactical_forest_battle.9418.a: "Coordonner une charge avec nos unités de crack d'élite"
 tactical_forest_battle.9418.a.success: "Nos unités d'élite balayent leur flanc droit, les plongeant dans le désarroi !"
 tactical_forest_battle.9418.a.failure: "La charge est incapable de briser leur défense obstinée !"
 tactical_forest_battle.9418.b: "Coordonner une charge avec nos chevaliers"
 tactical_forest_battle.9418.b.success: "Nos chevaliers s'abattent sur l'ennemi affaibli, le plongeant dans le désarroi !"
 tactical_forest_battle.9418.b.failure: "L'assaut s'écrase sur la droite de l'ennemi affaibli, le plongeant dans le désarroi !"
 tactical_forest_battle.9418.c: "Chargez leur ligne dispersée"
 tactical_forest_battle.9418.c.success: "Notre offensive sur le flanc gauche disperse l’ennemi affaibli !"
 tactical_forest_battle.9418.c.failure: "Ils maintiennent la formation malgré leurs pertes !"
 tactical_forest_battle.9418.d: "Feignez une retraite et tournez-vous contre eux"
 tactical_forest_battle.9418.d.success: "L’ennemi tombe dans le piège de notre tromperie et lance une attaque inattendue !"
 tactical_forest_battle.9418.d.failure: "Ils voient clair dans notre tromperie et maintiennent leur formation !!"
 tactical_forest_battle.9418.e: "Appuyez sur l'avantage"
 tactical_forest_battle.9418.e.success: "Leur flanc droit s'effondre sous la pression immense !"
 tactical_forest_battle.9418.e.failure: "Ils maintiennent la formation malgré leurs pertes !"
  
  # tactical_forest_battle.7320 - Failure event, enemy reorganizes and stands strong 
 tactical_forest_battle.7320.t: "L’ennemi reste fort derrière nos lignes"
 tactical_forest_battle.7320.desc: "Les forces [enemy_commander.GetFirstNamePossessive] se sont ralliées et ont réorganisé leur ligne derrière la nôtre. Ils sont désormais enfouis plus profondément, tournant le dos à nos lignes et leur formation renforcée. Nous devons décider s’il faut continuer à faire pression sur eux ou changer de tactique."
 tactical_forest_battle.7320.a: "Envoyez une charge avec nos unités d'élite d'élite pour attaquer leur flanc"
 tactical_forest_battle.7320.a.success: "Nos unités de crack les prennent par surprise et balayent leurs lignes !"
 tactical_forest_battle.7320.a.failure: "Nos unités d'élite sont incapables de percer leur solide défense !"
 tactical_forest_battle.7320.b: "Envoyez des chevaliers attaquer leur flanc"
 tactical_forest_battle.7320.b.success: "Nos chevaliers s'écrasent sur leur flanc, brisant leur formation !"
 tactical_forest_battle.7320.b.failure: "Les chevaliers sont interceptés par les réserves ennemies !"
 tactical_forest_battle.7320.c: "Rompre les réserves centrales pour briser leurs arrières"
 tactical_forest_battle.7320.c.success: "Nos réserves centrales s'écrasent sur leurs arrières, provoquant le chaos !"
 tactical_forest_battle.7320.c.failure: "Nos réserves centrales sont incapables de se désengager à cause d'une poussée soudaine !"
 tactical_forest_battle.7320.d: "Rompre les réserves de droit pour fracasser leurs arrières"
 tactical_forest_battle.7320.d.success: "Nos réserves centrales s'écrasent sur leurs arrières, provoquant le chaos !"
 tactical_forest_battle.7320.d.failure: "Nos réserves centrales sont incapables de se désengager à cause d'une poussée soudaine !"
 tactical_forest_battle.7320.e: "Feignez une retraite et allumez-vous contre les poursuivants"
 tactical_forest_battle.7320.e.success: "L’ennemi tombe dans le piège de notre tromperie et lance une attaque inattendue !"
 tactical_forest_battle.7320.e.failure: "L'ennemi se replie vers notre centre exposé !"
  
  
  # tactical_forest_battle.7322 - Enemy attacks our depleted right flank 
 tactical_forest_battle.7322.t: "L'ennemi frappe le flanc droit"
 tactical_forest_battle.7322.desc: "[enemy_commander.GetFirstNamePossessive] a reconnu notre flanc droit affaibli et lance un assaut. Sans nos réserves, nous prenons la décision cruciale de conserver notre flanc droit."
 tactical_forest_battle.7322.a: "Le flanc droit résiste fermement à l'assaut"
 tactical_forest_battle.7322.a.success: "Notre flanc droit tient bon face à l’assaut ennemi !"
 tactical_forest_battle.7322.a.failure: "Le flanc droit est débordé et commence à faiblir !"
 tactical_forest_battle.7322.b: "Envoyez des chevaliers pour renforcer la droite"
 tactical_forest_battle.7322.b.success: "De nouveaux chevaliers stabilisent le flanc droit !"
 tactical_forest_battle.7322.b.failure: "Les chevaliers sont interceptés avant d'arriver à droite !"
 tactical_forest_battle.7322.c: "Envoyez nos unités d'élite d'élite pour renforcer le flanc droit"
 tactical_forest_battle.7322.c.success: "Nos renforts stabilisent le flanc droit !"
 tactical_forest_battle.7322.c.failure: "Notre droite s'effondre malgré les renforts !"
 tactical_forest_battle.7322.d: "Essayez de battre en retraite et de déplacer leur flanc gauche pendant que les renforts arrivent."
 tactical_forest_battle.7322.d.success: "Leur flanc gauche commence à suivre notre retraite, les exposant !"
 tactical_forest_battle.7322.d.failure: "La droite ne peut pas se désengager sous la pression !"
 tactical_forest_battle.7322.e: "Feignez une retraite et allumez-vous contre les poursuivants"
 tactical_forest_battle.7322.e.success: "L’ennemi tombe dans le piège de notre tromperie et lance une attaque inattendue !"
 tactical_forest_battle.7322.e.failure: "Ils voient clair dans notre tromperie et maintiennent leur formation !"
  
  
 tactical_forest_battle.231.t: "Chargé notre faux écart"
 tactical_forest_battle.231.desc: "[enemy_commander.GetFirstNameNoTooltip] a mordu à l'hameçon et a chargé dans la fausse brèche que nous avons créée sur notre flanc droit. Leur gauche est désormais exposée et vulnérable. Nous devons agir rapidement pour exploiter cette opportunité avant qu’ils puissent se rétablir."
 tactical_forest_battle.231.a: "Envoyez nos unités d'élite d'élite charger leur flanc gauche exposé."
 tactical_forest_battle.231.a.success: "Nos unités d'élite balayent leur flanc gauche, brisant leur formation !"
 tactical_forest_battle.231.a.failure: "Leur droite tient bon face à notre assaut d’élite !"
 tactical_forest_battle.231.b: "Envoyez des chevaliers pour briser leur flanc gauche"
 tactical_forest_battle.231.b.success: "[left_flank_commander.GetFullNameNicknamedOrMe] charge et envoie son flanc dans le désarroi !"
 tactical_forest_battle.231.b.failure: "L’assaut s’écrase sur leur flanc gauche, les plongeant dans le désarroi !"
 tactical_forest_battle.231.c: "Le flanc droit charge pour briser leur formation"
 tactical_forest_battle.231.c.success: "[right_flank_commander.GetFullNameNicknamedOrMe] charge et envoie son flanc dans le désarroi !"
 tactical_forest_battle.231.c.failure: "Leur gauche reste inébranlable et refuse de rompre !"
 tactical_forest_battle.231.d: "Effectuez une feinte retraite et allumez-les"
 tactical_forest_battle.231.d.success: "L'ennemi tombe dans le piège de notre tromperie et nous poursuit !"
 tactical_forest_battle.231.d.failure: "Ils voient clair dans notre tromperie et maintiennent leur formation !"
 tactical_forest_battle.231.e: "Appuyez sur l'avantage"
 tactical_forest_battle.231.e.success: "Les ennemis laissés s’effondrent sous les assauts incessants !"
 tactical_forest_battle.231.e.failure: "Les réserves ennemies arrivent pour consolider la ligne !"
 tactical_forest_battle.231.f: "Rompre les réserves de gauche pour encriler"
 tactical_forest_battle.231.f.success: "Notre gauche se désengage et est en position d’encercler l’ennemi !"
 tactical_forest_battle.231.f.failure: "Nos réserves de gauche ne parviennent pas à se désengager !"
  
 tactical_forest_battle.5907.t: "Notre centre effectue le routage"
 tactical_forest_battle.5907.desc: "Notre centre est en panne ! [enemy_commander.GetFirstNamePossessive] a mis notre centre en déroute et toute l'armée est en danger de s'effondrer. Nous devons agir immédiatement pour éviter une catastrophe !"
 tactical_forest_battle.5907.b: "Retraite d'écran avec contre-attaque"
 tactical_forest_battle.5907.b.success: "La contre-attaque fait gagner du temps à nos troupes pour se consolider !"
 tactical_forest_battle.5907.b.failure: "La contre-attaque échoue et la déroute continue !"
 tactical_forest_battle.5907.c: "Charge désespérée pour briser ceux qui poursuivent le flanc droit en déroute"
 tactical_forest_battle.5907.c.success: "Notre droite parvient à s'échapper !"
 tactical_forest_battle.5907.c.failure: "Notre charge est repoussée et la déroute continue !"
 tactical_forest_battle.5907.a: "Retrait vers des positions défensives"
 tactical_forest_battle.5907.a.success: "Nous parvenons à reculer et à établir une nouvelle ligne défensive !"
 tactical_forest_battle.5907.a.failure: "Nos hommes subissent de lourdes pertes !"
  
