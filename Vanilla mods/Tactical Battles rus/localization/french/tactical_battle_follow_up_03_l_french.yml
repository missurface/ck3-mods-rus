l_french:
 tactical_forest_battle.7327.t: "L’ennemi presse l’avantage"
 tactical_forest_battle.7327.desc: "Les forces [enemy_commander.GetFirstNamePossessive] ont reconnu notre désorganisation et exploitent impitoyablement leur avantage. Notre centre est plongé dans le chaos et nous devons agir de manière décisive pour éviter une catastrophe."
 tactical_forest_battle.7327.a: "Le centre se retire, tendant une embuscade"
 tactical_forest_battle.7327.a.success: "L'ennemi suit notre centre en retraite et est hors de position"
 tactical_forest_battle.7327.a.failure: "Nos forces sont incapables de se désengager !"
 tactical_forest_battle.7327.b: "Envoyer des réserves de droits pour stabiliser le centre"
 tactical_forest_battle.7327.b.success: "De nouvelles réserves arrivent et rétablissent la ligne !"
 tactical_forest_battle.7327.b.failure: "Les réserves ne parviennent pas à endiguer la marée !"
 tactical_forest_battle.7327.c: "Envoyez des chevaliers pour renforcer le centre"
 tactical_forest_battle.7327.c.success: "Les chevaliers stabilisent le centre en ruine !"
 tactical_forest_battle.7327.c.failure: "Les chevaliers sont débordés !"
 tactical_forest_battle.7327.d: "Envoyez nos unités d'élite d'élite pour renforcer le centre"
 tactical_forest_battle.7327.d.success: "Les renforts du régiment d'élite consolident le centre !"
 tactical_forest_battle.7327.d.failure: "Le centre ne peut pas gagner en cohésion !"
 tactical_forest_battle.7327.e: "Ordonnez au centre de tenir !"
 tactical_forest_battle.7327.e.success: "Notre centre est inspiré pour tenir bon !"
 tactical_forest_battle.7327.e.failure: "Le moral continue de s'effriter malgré nos efforts !"
  
 tactical_forest_battle.7332.t: "Attaque ennemie sur le flanc droit"
 tactical_forest_battle.7332.desc: "[enemy_commander.GetFirstNamePossessive] a retiré ses forces centrales de poursuite et se prépare à frapper fort sur notre flanc droit. Nous devons réagir immédiatement, sinon notre droit sera dépassé. Leur retraite a laissé leurs flancs de leurs forces centrales exposés ! Nous pouvons utiliser cela à notre avantage."
 tactical_forest_battle.7332.a: "Notre centre charge son flanc exposé"
 tactical_forest_battle.7332.a.success: "Notre charge inattendue brise leur formation !"
 tactical_forest_battle.7332.a.failure: "Le centre reste inébranlable et absorbe notre charge !"
 tactical_forest_battle.7332.b: "Retraite à droite en essayant d'étendre leur ligne"
 tactical_forest_battle.7332.b.success: "L'ennemi suit notre retraite et est hors de position !"
 tactical_forest_battle.7332.b.failure: "Nos forces sont incapables de se désengager !"
 tactical_forest_battle.7332.c: "Envoyez des chevaliers charger le flanc central exposé"
 tactical_forest_battle.7332.c.success: "Les chevaliers sèment le chaos dans le centre ennemi !"
 tactical_forest_battle.7332.c.failure: "La charge des chevaliers est absorbée par le centre !"
 tactical_forest_battle.7332.d: "Envoyez des unités d'élite d'élite charger leur flanc exposé"
 tactical_forest_battle.7332.d.success: "Nos unités de crack prennent leur centre par surprise !"
 tactical_forest_battle.7332.d.failure: "La droite continue de faiblir !"
 tactical_forest_battle.7332.e: "Rompre le flanc gauche pour tenter d'encercler leur centre"
 tactical_forest_battle.7332.e.success: "Notre flanc gauche parvient à se désengager et se met en position !"
 tactical_forest_battle.7332.e.failure: "Notre flanc gauche est incapable de se désengager !"
  
 tactical_forest_battle.0446.t: "Notre droit stabilisé"
 tactical_forest_battle.0446.desc: "La bataille s’est transformée en une guerre d’usure acharnée sur notre flanc droit. Les deux camps s’engagent dans un combat acharné et la victoire reviendra à celui qui parviendra à survivre à l’autre."
 tactical_forest_battle.0446.a: "Commandez le droit de tenir bon et d'écraser l'ennemi"
 tactical_forest_battle.0446.a.success: "La ligne ennemie cède sous notre pression incessante !"
 tactical_forest_battle.0446.a.failure: "L’ennemi tient bon face à notre assaut brutal !"
 tactical_forest_battle.0446.b: "Envoyez des chevaliers pour renforcer le flanc droit"
 tactical_forest_battle.0446.b.success: "Les renforts donnent de la vie !"
 tactical_forest_battle.0446.b.failure: "Les chevaliers ne peuvent pas atteindre la droite à temps !"
 tactical_forest_battle.0446.c: "Envoyez nos régiments d'élite d'élite pour renforcer notre flanc droit"
 tactical_forest_battle.0446.c.success: "Les unités de crack soulagent la pression de la droite !"
 tactical_forest_battle.0446.c.failure: "Nos unités sont interceptées et incapables de vous aider !"
 tactical_forest_battle.0446.d: "Rompre le flanc gauche pour tenter d'encercler leur centre"
 tactical_forest_battle.0446.d.success: "Notre flanc gauche parvient à se désengager et se met en position !"
 tactical_forest_battle.0446.d.failure: "Notre flanc gauche est incapable de se désengager !"
 tactical_forest_battle.0446.e: "Feignez une retraite et allumez-vous contre les poursuivants"
 tactical_forest_battle.0446.e.success: "Notre attaque soudaine contre les poursuivants les prend par surprise !"
 tactical_forest_battle.0446.e.failure: "Ils voient à travers notre attente notre attaque soudaine !"
 tactical_forest_battle.0446.f: "Reculez vers la droite, enfilant leurs lignes"
 tactical_forest_battle.0446.f.success: "Leur gauche suit notre retraite et est hors de position !"
 tactical_forest_battle.0446.f.failure: "Nos forces sont incapables de se désengager !"
  
  
 tactical_forest_battle.9423.t: "Acheminement du flanc droit"
 tactical_forest_battle.9423.desc: "Notre flanc droit s’effondre sous l’assaut ennemi ! [enemy_commander.GetFirstNamePossessive] est en train de percer et nous devons agir immédiatement pour éviter une déroute complète."
 tactical_forest_battle.9423.a: "Reculez le centre du flanc droit tout en commandant que ses flancs tiennent bon."
 tactical_forest_battle.9423.a.success: "Leur flanc gauche commence à être encerclé !"
 tactical_forest_battle.9423.a.failure: "Le centre ne résiste pas à la pression !"
 tactical_forest_battle.9423.b: "Feignez une retraite et allumez-vous contre les poursuivants"
 tactical_forest_battle.9423.b.success: "Notre attaque soudaine contre les poursuivants les prend par surprise !"
 tactical_forest_battle.9423.b.failure: "Leur gauche est prête à l'attaque soudaine"
 tactical_forest_battle.9423.c: "Envoyez des chevaliers en renfort"
 tactical_forest_battle.9423.c.success: "Les chevaliers forment une arrière-garde et ralentissent la poursuite !"
 tactical_forest_battle.9423.c.failure: "Les chevaliers sont balayés par l'assaut !"
 tactical_forest_battle.9423.d: "Envoyez nos unités d'élite d'élite en renfort"
 tactical_forest_battle.9423.d.success: "Nos unités de crack d’élite aident à stabiliser le droit !"
 tactical_forest_battle.9423.d.failure: "Les unités d'élite s'enlisent sous la force écrasante !"
 tactical_forest_battle.9423.e: "Ralliement des troupes et contre-attaque"
 tactical_forest_battle.9423.e.success: "Les troupes se rassemblent et se tournent pour affronter l'ennemi !"
 tactical_forest_battle.9423.e.failure: "La contre-attaque échoue !"
 tactical_forest_battle.9423.f: "Envoyez une force de flanc secrète depuis la gauche pour vous faufiler et s'écraser sur leur flanc gauche."
 tactical_forest_battle.9423.f.success: "Nos troupes passent inaperçues et font cause commune sur leur flanc gauche !"
 tactical_forest_battle.9423.f.failure: "Notre force secrète est découverte et lancée au combat, incapable de vous aider !"
  
  
 tactical_forest_battle.0447.t: "Flanc droit vaincu"
 tactical_forest_battle.0447.desc: "Notre flanc droit est en déroute et est en plein désarroi. [enemy_commander.GetFirstNamePossessive] passe à travers l'espace. Nous devons décider s’il faut consolider notre position ou adopter une position désespérée."
 tactical_forest_battle.0447.a: "Retrait vers des positions défensives"
 tactical_forest_battle.0447.a.success: "Nous parvenons à reculer et à établir une nouvelle ligne défensive !"
 tactical_forest_battle.0447.a.failure: "Nos hommes subissent de lourdes pertes !"
 tactical_forest_battle.0447.b: "Retraite d'écran avec contre-attaque"
 tactical_forest_battle.0447.b.success: "La contre-attaque fait gagner du temps à nos troupes du flanc droit pour se consolider !"
 tactical_forest_battle.0447.b.failure: "La contre-attaque échoue et la déroute continue !"
 tactical_forest_battle.0447.c: "Charge désespérée pour briser ceux qui poursuivent le flanc droit en déroute"
 tactical_forest_battle.0447.c.success: "Notre droite parvient à s'échapper !"
 tactical_forest_battle.0447.c.failure: "Pur charge est repoussée et la déroute continue !"
  
  
 tactical_forest_battle.0442.t: "Ennemi en désarroi"
 tactical_forest_battle.0442.desc: "L’ennemi poursuit notre flanc droit en retraite de manière désorganisée. La moitié de l’armée se prépare à frapper le centre tandis que des groupes d’hommes poursuivent nos forces en retraite. Nous pouvons exploiter ce chaos pour riposter."
 tactical_forest_battle.0442.a: "Le centre s'interrompt pour charger avec nos chevaliers"
 tactical_forest_battle.0442.a.success: "L'ennemi est pris au dépourvu par notre charge soudaine et n'est pas en formation !"
 tactical_forest_battle.0442.a.failure: "Leur flanc gauche se réorganise rapidement et absorbe notre charge !"
 tactical_forest_battle.0442.b: "Envoyez des chevaliers abattre les poursuivants et attaquer le flanc ennemi désorganisé"
 tactical_forest_battle.0442.b.success: "Nos chevaliers descendent sur les groupes de mise à mort non organisés et se tournent sur le flanc"
 tactical_forest_battle.0442.b.failure: "Nos chevaliers s'enlisent dans la traque des groupes de tueurs"
 tactical_forest_battle.0442.c: "Envoyez des unités d'élite d'élite pour abattre les poursuivants et attaquer le flanc ennemi désorganisé."
 tactical_forest_battle.0442.c.success: "Nos unités d'élite d'élite descendent sur les groupes de mise à mort non organisés et se tournent vers le flanc."
 tactical_forest_battle.0442.c.failure: "Nos unités d'élite d'élite s'enlisent dans la traque des groupes meurtriers."
 tactical_forest_battle.0442.d: "Envoi et poussée inattendue de notre flanc gauche pour essayer de faire le tour et frapper leur centre"
 tactical_forest_battle.0442.d.success: "Notre charge parvient à désorienter son flanc droit, créant ainsi une brèche !"
 tactical_forest_battle.0442.d.failure: "Notre chage est absorbé par leur flanc droit !"
  
  
 tactical_forest_battle.0240.t: "Acheminement du flanc gauche"
 tactical_forest_battle.0240.desc: "Notre flanc gauche s’effondre sous les assauts de l’ennemi ! En cas de déroute, l’armée entière pourrait être en danger."
 tactical_forest_battle.0240.a: "Envoyer des réserves pour stabiliser la gauche"
 tactical_forest_battle.0240.a.success: "Les réserves arrivent juste à temps et confortent la gauche !"
 tactical_forest_battle.0240.a.failure: "Les réserves ne peuvent pas atteindre la gauche à temps !"
 tactical_forest_battle.0240.b: "Le flanc gauche se bat plus fort"
 tactical_forest_battle.0240.b.success: "Le flanc gauche résiste à l’assaut !"
 tactical_forest_battle.0240.b.failure: "Le flanc gauche se brise !"
  
 tactical_forest_battle.0449.t: "Notre gauche est en déroute"
 tactical_forest_battle.0449.desc: "Notre flanc gauche est complètement mis en déroute ! La percée ennemie menace d’encercler toute notre armée. Nous devons agir de manière décisive pour contenir ce désastre."
 tactical_forest_battle.0449.a: "Retrait et réinitialisation des positions"
 tactical_forest_battle.0449.a.success: "Nous parvenons à reculer et à établir une nouvelle ligne défensive !"
 tactical_forest_battle.0449.a.failure: "La retraite devient désorganisée et incontrôlée !"
 tactical_forest_battle.0449.b: "Écran la retraite avec l'arrière-garde"
 tactical_forest_battle.0449.b.success: "Notre arrière-garde tient assez longtemps pour que la force principale se retire !"
 tactical_forest_battle.0449.b.failure: "L'arrière-garde est débordée !"
 tactical_forest_battle.0449.c: "Lancez une charge désespérée pour percer"
 tactical_forest_battle.0449.c.success: "Contre toute attente, notre charge désespérée réussit !"
 tactical_forest_battle.0449.c.failure: "La charge désespérée est écrasée !"
  
  
 tactical_forest_battle.0443.t: "Le flanc gauche recule"
 tactical_forest_battle.0443.desc: "Notre flanc gauche est retombé en déroute ! L’ennemi sent sa faiblesse et met l’accent sur son avantage. Notre centre doit tenir bon, sinon tout est perdu."
 tactical_forest_battle.0443.a: "Le centre résiste à la pression"
 tactical_forest_battle.0443.a.success: "Notre centre tient bon malgré la pression !"
 tactical_forest_battle.0443.a.failure: "Le centre ne tient plus et commence à céder !"
 tactical_forest_battle.0443.b: "Envoyez des chevaliers pour abattre les ennemis qui vous poursuivent"
 tactical_forest_battle.0443.b.success: "Les chevaliers se lancent dans la colonne ennemie qui les poursuit !"
 tactical_forest_battle.0443.b.failure: "Les chevaliers ne peuvent pas atteindre les forces qui les poursuivent à temps !"
 tactical_forest_battle.0443.c: "Envoyez nos unités d'élite d'élite pour abattre leurs poursuivants"
 tactical_forest_battle.0443.c.success: "Nos renforts arrivent et renforcent la ligne !"
 tactical_forest_battle.0443.c.failure: "L'ennemi pousse l'attaque !"
 tactical_forest_battle.0443.d: "Le Centre feint une retraite pour attirer l'ennemi"
 tactical_forest_battle.0443.d.success:0 "The enemy is following our center 
 tactical_forest_battle.0443.d.failure: "L'ennemi n'est pas dupe et tient bon"
 tactical_forest_battle.0443.e: "Le Centre lance une charge soudaine !"
 tactical_forest_battle.0443.e.success: "Notre charge soudaine choque l'ennemi !"
 tactical_forest_battle.0443.e.failure: "Notre charge est absorbée !"
  
 tactical_forest_battle.9222.t: "Rassembler l'armée"
 tactical_forest_battle.9222.desc: "Malgré le chaos sur nos flancs, nous disposons encore de réserves et de troupes fraîches. Si nous parvenons à les coordonner correctement, nous pourrions renverser la situation !"
 tactical_forest_battle.9222.a: "Rallier le centre pour une percée"
 tactical_forest_battle.9222.a.success: "Notre centre pousse à l'attaque !"
 tactical_forest_battle.9222.a.failure: "Le centre ne peut pas percer"
 tactical_forest_battle.9222.b: "Le flanc gauche charge de toutes ses forces"
 tactical_forest_battle.9222.b.success: "Le flanc gauche charge fort et tente de se placer derrière son centre !"
 tactical_forest_battle.9222.b.failure: "La charge du flanc gauche est repoussée !"
 tactical_forest_battle.9222.c: "Envoyez nos unités d'élite d'élite charger leurs lignes centrales"
 tactical_forest_battle.9222.c.success: "La charge de nos unités d'élite submerge l'ennemi !"
 tactical_forest_battle.9222.c.failure: "La charge est émoussée par la résistance ennemie !"
 tactical_forest_battle.9222.d: "Envoyez des chevaliers percer leurs lignes médianes"
 tactical_forest_battle.9222.d.success: "Nos forces combinées commencent à submerger l'ennemi !"
 tactical_forest_battle.9222.d.failure: "Les chevaliers ne peuvent pas percer !"
 tactical_forest_battle.9222.e: "Feignez une retraite et allumez l'ennemi qui vous poursuit"
 tactical_forest_battle.9222.e.success: "Notre attaque soudaine contre les poursuivants les prend par surprise !"
 tactical_forest_battle.9222.e.failure: "Les ennemis se réorganisent rapidement et absorbent notre charge !"
  
  
 tactical_forest_battle.0703.t: "Notre gauche est sous pression"
 tactical_forest_battle.0703.desc: "Notre flanc gauche fléchit sous la forte pression venant de la droite [enemy_commander.GetFirstNamePossessive]. Si nous n’agissons pas rapidement, ils perceront et menaceront d’encercler toute notre armée."
 tactical_forest_battle.0703.a: "Battez-vous et attirez-vous dans un piège"
 tactical_forest_battle.0703.a.success: "L'ennemi suit notre retraite dans une embuscade !"
 tactical_forest_battle.0703.a.failure: "L’ennemi voit clair dans notre retraite et lance l’attaque !"
 tactical_forest_battle.0703.b: "Feignez une retraite et allumez l'ennemi"
 tactical_forest_battle.0703.b.success: "Contre toute attente, la ligne tient !"
 tactical_forest_battle.0703.b.failure: "Le flanc gauche se brise et déroute !"
 tactical_forest_battle.0703.c: "Envoyez nos unités d'élite d'élite pour renforcer notre gauche"
 tactical_forest_battle.0703.c.success: "Les unités d'élite arrivent et stabilisent la gauche !"
 tactical_forest_battle.0703.c.failure: "La gauche replie malgré les renforts"
 tactical_forest_battle.0703.d: "Envoyons nos chevaliers pour renforcer notre gauche"
 tactical_forest_battle.0703.d.success: "Les chevaliers arrivent et renforcent la gauche !"
 tactical_forest_battle.0703.d.failure: "La gauche continue de s’effondrer malgré les renforts !"
 tactical_forest_battle.0703.e: "Envoyez les réserves du centre pour aider à gauche"
 tactical_forest_battle.0703.e.success: "Les réserves centrales arrivent et confortent la gauche !"
 tactical_forest_battle.0703.e.failure: "Malgré les renforts la gauche continue de vaciller"
 tactical_forest_battle.0703.e: "Envoyer des réserves de droite pour aider à gauche"
 tactical_forest_battle.0703.e.success: "Malgré les renforts la gauche continue de vaciller"
 tactical_forest_battle.0703.e.failure: "Les réserves ne peuvent pas arriver à temps !"
  
  
 tactical_forest_battle.0651.t: "Renforcement des réserves"
 tactical_forest_battle.0651.desc: "Des renforts sont arrivés pour renforcer leur flanc droit, menaçant de freiner l'avancée de notre flanc gauche. Nous devons agir rapidement pour maintenir l’élan de notre attaque."
 tactical_forest_battle.0651.a: "Le flanc gauche lance une offensive féroce"
 tactical_forest_battle.0651.a.success: "Leurs renforts ne sont pas à la hauteur"
 tactical_forest_battle.0651.a.failure: "Les renforts absorbent la charge"
 tactical_forest_battle.0651.b: "Envoyez nos unités d'élite d'élite se lancer dans la mêlée"
 tactical_forest_battle.0651.b.success: "Le soutien des unités d’élite permet à la gauche de percer !"
 tactical_forest_battle.0651.b.failure: "Même avec le soutien de l’élite, la poussée échoue !"
 tactical_forest_battle.0651.c: "Envoyez des chevaliers pour briser les renforts"
 tactical_forest_battle.0651.c.success: "Nos forces combinées percent les renforts !"
 tactical_forest_battle.0651.c.failure: "Les chevaliers ne peuvent pas percer !"
 tactical_forest_battle.0651.d: "Feignez une retraite et allumez les ennemis qui vous poursuivent"
 tactical_forest_battle.0651.d.success: "Les ennemis sont pris par surprise !"
 tactical_forest_battle.0651.d.failure: "Leur flanc droit se réorganise rapidement et absorbe notre charge !"
 tactical_forest_battle.0651.e: "Chargez fort sur leur flanc droit épuisé"
 tactical_forest_battle.0651.e.success: "Le flanc droit ennemi s’effondre sous notre assaut !"
 tactical_forest_battle.0651.e.failure: "La charge est émoussée par la résistance ennemie !"
  
 tactical_forest_battle.0018.t: "Ennemi droit distrait"
 tactical_forest_battle.0018.desc: "Notre flanc droit a réussi à distraire le centre ennemi ! Ils sont confus et désorganisés. Nous devons immédiatement capitaliser sur cet avantage."
 tactical_forest_battle.0018.a: "La cavalerie charge le centre distrait"
 tactical_forest_battle.0018.a.success: "La cavalerie écrase le centre ennemi confus !"
 tactical_forest_battle.0018.a.failure: "La charge échoue face à la résistance ennemie !"
 tactical_forest_battle.0018.b: "Assaut général d'infanterie au centre"
 tactical_forest_battle.0018.b.success: "L'assaut de l'infanterie brise le centre !"
 tactical_forest_battle.0018.b.failure: "L'assaut est repoussé !"
 tactical_forest_battle.0018.c: "Envoyez MAA pour exploiter la confusion"
 tactical_forest_battle.0018.c.success: "Les unités MAA exploitent la confusion et la percée !"
 tactical_forest_battle.0018.c.failure: "Le MAA ne peut pas exploiter la confusion !"
  
 tactical_forest_battle.9434.t: "Chevaliers prêts"
 tactical_forest_battle.9434.desc: "Nos chevaliers peuvent s'avérer essentiels pour inverser le cours de la bataille. Le choix crucial est de savoir où les envoyer."
 tactical_forest_battle.9434.a: "Nos chevaliers poussent l'attaque sur le flanc gauche"
 tactical_forest_battle.9434.a.success: "[enemy_commander.GetFirstNamePossessive] le flanc droit subit une forte pression"
 tactical_forest_battle.9434.a.failure: "Les chevaliers ne sont pas capables de percer"
 tactical_forest_battle.9434.b: "Nos chevaliers poussent l'attaque sur le flanc droit"
 tactical_forest_battle.9434.b.success: "[enemy_commander.GetFirstNamePossessive] le flanc gauche subit une forte pression"
 tactical_forest_battle.9434.b.failure: "Les chevaliers ne sont pas capables de percer"
 tactical_forest_battle.9434.c: "Frappez et courez sur le flanc droit de l'ennemi"
 tactical_forest_battle.9434.c.success: "Leur flanc saigne !"
 tactical_forest_battle.9434.c.failure: "Leur ligne tient !"
 tactical_forest_battle.9434.d: "Frappez et courez sur le flanc gauche des ennemis"
 tactical_forest_battle.9434.d.success: "Leur flanc saigne !"
 tactical_forest_battle.9434.d.failure: "Leur ligne tient !"
 tactical_forest_battle.9434.e: "Créer un flanc caché sur notre côté gauche"
 tactical_forest_battle.9434.e.success: "Notre flanc caché prend l'ennemi au dépourvu !"
 tactical_forest_battle.9434.e.failure: "Le flanc caché est découvert !"
 tactical_forest_battle.9434.f: "Créer un flanc caché sur notre côté droit"
 tactical_forest_battle.9434.f.success: "Notre flanc caché prend l'ennemi au dépourvu !"
 tactical_forest_battle.9434.f.failure: "Le flanc caché est découvert !"
  
 tactical_forest_battle.9328.t: "Ignorant le flanc caché à droite"
 tactical_forest_battle.9328.desc: "Nous avons affaibli notre côté droit avec des plans pour battre en retraite et attirer l'ennemi. Notre flanc caché est passé inaperçu et se trouve derrière le flanc gauche qui pousse. Nous pouvons porter un coup décisif si nous agissons rapidement."
 tactical_forest_battle.9328.a: "Émergez et écrasez-vous sur leur flanc exposé"
 tactical_forest_battle.9328.a.success: "Le flanc caché frappe fort et prend l'ennemi par surprise"
 tactical_forest_battle.9328.a.failure: "L'ennemi repère notre flanc caché et se prépare !"
 tactical_forest_battle.9328.b: "Essayez d'encercler l'ennemi avec notre flanc caché"
 tactical_forest_battle.9328.b.success: "Nos chevaliers émergent et commencent à encercler l'ennemi !"
 tactical_forest_battle.9328.b.failure: "Les chevaliers s'enlisent dans le combat !"
  
  
 tactical_forest_battle.9329.t: "Ignorant le flanc caché sur la gauche"
 tactical_forest_battle.9329.desc: "Nous avons affaibli notre côté gauche avec des plans pour battre en retraite et attirer l'ennemi. Notre flanc caché est passé inaperçu et se trouve derrière le flanc droit qui pousse. Nous pouvons porter un coup décisif si nous agissons rapidement."
 tactical_forest_battle.9329.a: "Émergez et écrasez-vous sur leur flanc exposé"
 tactical_forest_battle.9329.a.success: "Leur flanc droit est pris par surprise et se réorganise !"
 tactical_forest_battle.9329.a.failure: "Le absorbe notre charge"
 tactical_forest_battle.9329.b: "Essayez d'encercler l'ennemi avec notre flanc caché"
 tactical_forest_battle.9329.b.success: "Les chevaliers lancent une charge dévastatrice qui remporte la bataille !"
 tactical_forest_battle.9329.b.failure: "Les chevaliers sont repoussés !"
  
 tactical_forest_battle.9465.t: "Chargé notre faux écart à gauche"
 tactical_forest_battle.9465.desc: "[enemy_commander.GetFirstNameNoTooltip] a mordu à l'hameçon et a chargé dans la fausse brèche que nous avons créée sur notre flanc gauche. Leur gauche est désormais exposée et vulnérable. Nous devons agir rapidement pour exploiter cette opportunité avant qu’ils puissent se rétablir."
 tactical_forest_battle.9465.a: "Envoyez nos unités d'élite d'élite charger leur flanc droit exposé."
 tactical_forest_battle.9465.a.success: "Nos unités d'élite balayent leur flanc droit, brisant leur formation !"
 tactical_forest_battle.9465.a.failure: "Leur droite tient bon face à notre assaut d’élite !"
 tactical_forest_battle.9465.b: "Envoyez des chevaliers pour briser leur flanc droit"
 tactical_forest_battle.9465.b.success: "La charge de nos chevaliers brise leur flanc droit, les plongeant dans le désarroi !"
 tactical_forest_battle.9465.b.failure: "L’assaut s’abat sur leur flanc droit, les plongeant dans le désarroi !"
 tactical_forest_battle.9465.c: "Le flanc gauche charge pour briser leur formation"
 tactical_forest_battle.9465.c.success: "[left_flank_commander.GetFullNameNicknamedOrMe] charge et envoie son flanc dans le désarroi !"
 tactical_forest_battle.9465.c.failure: "Leur droite reste inébranlable et refuse de céder !"
 tactical_forest_battle.9465.d: "Effectuez une feinte retraite et allumez-les"
 tactical_forest_battle.9465.d.success: "L'ennemi tombe dans le piège de notre tromperie et nous poursuit !"
 tactical_forest_battle.9465.d.failure: "Ils voient clair dans notre tromperie et maintiennent leur formation !"
 tactical_forest_battle.9465.e: "Appuyez sur l'avantage"
 tactical_forest_battle.9465.e.success: "Les ennemis s'effondrent sous l'assaut incessant !"
 tactical_forest_battle.9465.e.failure: "Les réserves ennemies arrivent pour consolider la ligne !"
 tactical_forest_battle.9465.f: "Rompre les réserves centrales pour encriler"
 tactical_forest_battle.9465.f.success: "Notre centre se désengage et est en position d'encercler l'ennemi !"
 tactical_forest_battle.9465.f.failure: "Nos réserves de centre ne parviennent pas à se désengager !"
