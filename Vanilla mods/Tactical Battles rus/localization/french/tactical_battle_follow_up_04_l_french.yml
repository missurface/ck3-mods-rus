l_french:
 tactical_forest_battle.9468.t: "Frais de lancement MAA"
 tactical_forest_battle.9468.desc: "Nos hommes d'armes ont reconnu une opportunité pour tirer profit de leur avantage ! Nos troupes lourdes d’élite peuvent conduire fort au centre de l’ennemi et potentiellement briser complètement leur formation."
 tactical_forest_battle.9468.a: "L'avantage presse MAA"
 tactical_forest_battle.9468.a.success: "Le MAA s'écrase à travers la ligne ennemie !"
 tactical_forest_battle.9468.a.failure: "La charge MAA est repoussée !"
 tactical_forest_battle.9468.b: "Effectuez une autre charge difficile à briser"
 tactical_forest_battle.9468.b.success: "La deuxième charge brise la formation ennemie !"
 tactical_forest_battle.9468.b.failure: "La deuxième charge ne parvient pas à percer !"
 tactical_forest_battle.9468.c: "Consolider sa position et tenir le terrain"
 tactical_forest_battle.9468.c.success: "Le MAA obtient une excellente position !"
 tactical_forest_battle.9468.c.failure: "La consolidation nous laisse exposés !"
 tactical_forest_battle.9468.d: "Exécuter une manœuvre de flanc"
 tactical_forest_battle.9468.d.success: "La manœuvre de flanc réussit brillamment !"
 tactical_forest_battle.9468.d.failure: "La manœuvre de flanc ne parvient pas à se développer !"
 tactical_forest_battle.9468.e: "Maintenir une avance constante"
 tactical_forest_battle.9468.e.success: "L’avancée constante réduit la résistance ennemie !"
 tactical_forest_battle.9468.e.failure: "L’avancée s’arrête face à la résistance ennemie !"
  
 tactical_forest_battle.9471.t: "Ennemi suivant l'appât"
 tactical_forest_battle.9471.desc: "Notre stratégie va planifier! Notre centre affaibli a attiré l'ennemi, le centre [enemy_commander.GetFirstNamePossessive] a lentement avancé hors de sa position tandis que les flancs de notre centre ont tenu bon. Leur centre est de voir les ennemis tout autour ! Nous pouvons désormais lancer une contre-attaque pour écraser leurs forces désorganisées."
 tactical_forest_battle.9471.a: "Lancez une charge soudaine"
 tactical_forest_battle.9471.a.success: "L'ennemi est en désarroi face à cette attaque soudaine"
 tactical_forest_battle.9471.a.failure: "Le centre Theior tient bon"
 tactical_forest_battle.9471.b: "Forte poussée du flanc gauche de notre ligne médiane pour commencer à encercler"
 tactical_forest_battle.9471.b.success: "Notre poussée fait passer nos forces et permet à nos forces de se placer derrière elles !"
 tactical_forest_battle.9471.b.failure: "La charge est absorbée !"
 tactical_forest_battle.9471.c: "Forte poussée du flanc droit de notre ligne médiane pour commencer à encercler"
 tactical_forest_battle.9471.c.success: "Notre poussée fait passer nos forces et permet à nos forces de se placer derrière elles !"
 tactical_forest_battle.9471.c.failure: "La charge est absorbée !"
 tactical_forest_battle.9471.d: "Envoyez nos unités d'élite au centre pour maintenir l'ennemi en position"
 tactical_forest_battle.9471.d.success: "Notre centre est stabilisé pendant que nos flancs se mettent en position pour encercler"
 tactical_forest_battle.9471.d.failure: "L'ennemi prend courage !"
 tactical_forest_battle.9471.e: "Envoyez nos chevaliers renforcer le centre pendant que nos flancs se mettent en position"
 tactical_forest_battle.9471.e.success: "Les attaques ennemies s'épuisent !"
 tactical_forest_battle.9471.e.failure: "L'ennemi passe à travers nos lignes !"
  
  
 tactical_forest_battle.9470.t: "Charge de lancement des chevaliers"
 tactical_forest_battle.9470.desc: "Notre contingent de chevaliers voit une opportunité pour charger ! L'ennemi étant quelque peu désorganisé, une charge de cavalerie au bon moment pourrait briser son moral."
 tactical_forest_battle.9470.a: "Les chevaliers pressent l'avantage"
 tactical_forest_battle.9470.a.success: "La charge des chevaliers brise l'ennemi !"
 tactical_forest_battle.9470.a.failure: "Les chevaliers sont repoussés !"
 tactical_forest_battle.9470.b: "Combinez la charge avec le support MAA"
 tactical_forest_battle.9470.b.success: "La charge combinée de cavalerie et de MAA réussit !"
 tactical_forest_battle.9470.b.failure: "La charge combinée échoue !"
 tactical_forest_battle.9470.c: "Exécuter une large manœuvre de flanc"
 tactical_forest_battle.9470.c.success: "Les chevaliers encerclent le flanc ennemi !"
 tactical_forest_battle.9470.c.failure: "La manœuvre de flanc ne se développe pas !"
 tactical_forest_battle.9470.d: "Les chevaliers protègent la retraite centrale"
 tactical_forest_battle.9470.d.success: "Les chevaliers ont réussi à masquer la retraite !"
 tactical_forest_battle.9470.d.failure: "Les chevaliers ne peuvent pas tenir la ligne !"
 tactical_forest_battle.9470.e: "Chargez l'ennemi en montée"
 tactical_forest_battle.9470.e.success: "La charge ascendante perce toujours !"
 tactical_forest_battle.9470.e.failure: "La montée en charge est impossible !"
  
 tactical_forest_battle.7243.t: "L'ennemi se retourne pour arrêter l'encerclement"
 tactical_forest_battle.7243.desc: "[enemy_commander.GetFirstNamePossessive] a orienté ses forces pour faire face à nos forces proches par la gauche, tentant de s'échapper avant que nous puissions les piéger. Nous devons réagir rapidement à cette nouvelle menace."
 tactical_forest_battle.7243.a: "Chargez leur dos"
 tactical_forest_battle.7243.a.success: "Nous chargeons leur arrière exposé !"
 tactical_forest_battle.7243.a.failure: "L’arrière-garde ennemie tient !"
 tactical_forest_battle.7243.b: "Chargez la force de front"
 tactical_forest_battle.7243.b.success: "Notre flanc gauche s'écrase"
 tactical_forest_battle.7243.b.failure: "Le flanc gauche ne peut pas atteindre à temps !"
 tactical_forest_battle.7243.c: "Feignez une retraite et chargez la force de front"
 tactical_forest_battle.7243.c.success: "Leur contre-attaque est brisée !"
 tactical_forest_battle.7243.c.failure: "La feinte ne parvient pas à les attirer !"
 tactical_forest_battle.7243.d: "Nos bonnes charges pour se mettre derrière et se positionner"
 tactical_forest_battle.7243.d.success: "Notre flanc droit saigne et se place derrière leur centre"
 tactical_forest_battle.7243.d.failure: "Le flanc gauche continue de lutter !"
 tactical_forest_battle.7243.e: "Frappez leur centre pendant qu'ils tournent"
 tactical_forest_battle.7243.e.success: "L'attaque centrale frappe alors qu'ils sont désorganisés !"
 tactical_forest_battle.7243.e.failure: "L'attaque centrale ne parvient pas à capitaliser !"
  
 tactical_forest_battle.7244.t: "L'ennemi se retourne pour arrêter l'encerclement"
 tactical_forest_battle.7244.desc: "[enemy_commander.GetFirstNamePossessive] a transformé les forces de [enemy_commander.GetHerHis] pour faire face à nos forces proches par la droite, essayant de s'échapper avant que nous puissions les piéger. Nous devons réagir rapidement à cette nouvelle menace."
 tactical_forest_battle.7244.a: "Chargez leur dos"
 tactical_forest_battle.7244.a.success: "Nous chargeons leur arrière exposé !"
 tactical_forest_battle.7244.a.failure: "L’arrière-garde ennemie tient !"
 tactical_forest_battle.7244.b: "Chargez la force de front"
 tactical_forest_battle.7244.b.success: "Notre flanc droit s'écrase"
 tactical_forest_battle.7244.b.failure: "Le flanc droit ne peut pas percer !"
 tactical_forest_battle.7244.c: "Feignez une retraite et chargez la force de front"
 tactical_forest_battle.7244.c.success: "Leur contre-attaque est brisée !"
 tactical_forest_battle.7244.c.failure: "La feinte ne parvient pas à les attirer !"
 tactical_forest_battle.7244.d: "Nos charges gauches pour se mettre en position"
 tactical_forest_battle.7244.d.success: "Notre flanc gauche saigne et se place derrière leur centre."
 tactical_forest_battle.7244.d.failure: "Le flanc gauche continue de lutter !"
 tactical_forest_battle.7244.e: "Frappez leur centre pendant qu'ils tournent"
 tactical_forest_battle.7244.e.success: "L'attaque centrale frappe alors qu'ils sont désorganisés !"
 tactical_forest_battle.7244.e.failure: "L'attaque centrale ne parvient pas à capitaliser !"
  
  
 tactical_forest_battle.2011.t: "Flanc central exposé"
 tactical_forest_battle.2011.desc: "Notre flanc central est désormais exposé car l'ennemi n'est pas tombé dans le piège de notre feinte ! Ils sont en mesure de frapper durement notre flanc vulnérable. Nous devons agir rapidement soit pour renforcer, soit pour repositionner."
 tactical_forest_battle.2011.a: "Envoyez nos unités de crack pour renforcer le centre"
 tactical_forest_battle.2011.a.success: "Les réserves arrivent et renforcent le centre !"
 tactical_forest_battle.2011.a.failure: "Les réserves ne peuvent pas arriver à temps !"
 tactical_forest_battle.2011.b: "Transformez nos réserves centrales pour former un flanc refusant"
 tactical_forest_battle.2011.b.success: "Centrez les roues et les formes refusant le flanc !"
 tactical_forest_battle.2011.b.failure: "La roue tombe en panne et nous sommes exposés !"
 tactical_forest_battle.2011.c: "Tourne à gauche et charge leur dos"
 tactical_forest_battle.2011.c.success: "Notre charge désoriente leur attaque !"
 tactical_forest_battle.2011.c.failure: "Ils se reforment et absorbent la charge !"
 tactical_forest_battle.2011.d: "Le flanc droit charge pour relâcher la pression"
 tactical_forest_battle.2011.d.success: "Les charges du flanc droit soulagent la pression !"
 tactical_forest_battle.2011.d.failure: "La charge sur le flanc droit ne peut pas atteindre !"
 tactical_forest_battle.2011.e: "Envoyez nos chevaliers charger leur flanc"
 tactical_forest_battle.2011.e.success: "La charge des chevaliers interrompt leur attaque !"
 tactical_forest_battle.2011.e.failure: "L'ennemi se reforme et tient !"
  
  
 tactical_forest_battle.7330.t: "L'ennemi lance l'assaut du centre"
 tactical_forest_battle.7330.desc: "[enemy_commander.GetFirstNamePossessive] engage une forte poussée directement dans notre centre ! Notre centre est soumis à une pression immense et nous devons décider s’il faut tenir, renforcer ou manœuvrer."
 tactical_forest_battle.7330.a: "Rallier le centre"
 tactical_forest_battle.7330.a.success: "Le centre absorbe l'assaut et tient !"
 tactical_forest_battle.7330.a.failure: "Le centre ne peut pas résister à la pression !"
 tactical_forest_battle.7330.b: "Envoyer des réserves de gauche pour renforcer le centre"
 tactical_forest_battle.7330.b.success: "Les réserves gauche arrivent et stabilisent le centre !"
 tactical_forest_battle.7330.b.failure: "Les réserves de gauche ne parviennent pas à se renforcer à temps !"
 tactical_forest_battle.7330.c: "Envoyer des réserves de droits pour renforcer le centre"
 tactical_forest_battle.7330.c.success: "Les réserves de droite arrivent et stabilisent le centre !"
 tactical_forest_battle.7330.c.failure: "Les réserves de droit ne parviennent pas à se renforcer à temps !"
 tactical_forest_battle.7330.d: "Le Centre lance une charge désespérée"
 tactical_forest_battle.7330.d.success: "Leur centre est interloqué par la charge !"
 tactical_forest_battle.7330.d.failure: "Leur centre tient bon et pousse l'attaque"
 tactical_forest_battle.7330.e: "Feignez une retraite pour attirer l'ennemi et vous retourner contre lui."
 tactical_forest_battle.7330.e.success: "L'ennemi croit que nous battons en retraite et tombe dans notre piège !"
 tactical_forest_battle.7330.e.failure: "Nous ne pouvons pas nous désengager !"
 tactical_forest_battle.7330.f: "Reculez le centre pour essayer de les sortir de leur position"
 tactical_forest_battle.7330.f.success: "Nous réussissons à nous désengager et à nous repositionner !"
 tactical_forest_battle.7330.f.failure: "Nous ne pouvons pas nous désengager !"
  
  
 tactical_forest_battle.9475.t: "Rassembler l'armée"
 tactical_forest_battle.9475.desc: "La bataille a atteint un point critique. Nos forces vacillent mais ne sont pas encore brisées. Avec un leadership fort et des actions audacieuses, nous pouvons rétablir l’ordre et renverser la situation !"
 tactical_forest_battle.9475.a: "Le centre pousse l'attaque"
 tactical_forest_battle.9475.a.success: "Notre armée entend l’appel et se mobilise !"
 tactical_forest_battle.9475.a.failure: "L'armée continue de vaciller !"
 tactical_forest_battle.9475.b: "Feignez une retraite pour attirer l'ennemi et contre-attaquer."
 tactical_forest_battle.9475.b.success: "La contre-attaque réussit et le moral s'envole !"
 tactical_forest_battle.9475.b.failure: "La contre-attaque échoue et le moral s'effondre !"
 tactical_forest_battle.9475.c: "La gauche charge lourdement sur le flanc droit pour alléger la pression"
 tactical_forest_battle.9475.c.success: "La charge désoriente leur flanc droit !"
 tactical_forest_battle.9475.c.failure: "L'ennemi reste inébranlable !"
 tactical_forest_battle.9475.d: "Le flanc droit charge vigoureusement pour alléger la pression"
 tactical_forest_battle.9475.d.success: "La charge désoriente leur flanc gauche !"
 tactical_forest_battle.9475.d.failure: "L'ennemi reste inébranlable !"
 tactical_forest_battle.9475.e: "Envoyez des chevaliers en renfort"
 tactical_forest_battle.9475.e.success: "Les réserves arrivent et renforcent la ligne !"
 tactical_forest_battle.9475.e.failure: "Les réserves sont trop dispersées pour aider !"
 tactical_forest_battle.9475.f: "Envoyez des unités d'élite d'élite en renfort"
 tactical_forest_battle.9475.f.success: "Nos unités d'élite sèment le chaos parmi l'ennemi !"
 tactical_forest_battle.9475.f.failure: "Nos unités de crack sont débordées !"
  
  
 tactical_forest_battle.6321.desc: "[enemy_commander.GetFirstNamePossessive] forces poursuivent nos troupes ! Nous pouvons utiliser nos chevaliers pour faire demi-tour et attaquer les poursuivants, perturbant ainsi leur avance."
 tactical_forest_battle.6321.a: "Envoyez des chevaliers à Flood Gap"
 tactical_forest_battle.6321.a.success: "Nos chevaliers comblent la brèche et obtiennent !"
 tactical_forest_battle.6321.a.failure: "Le flanc droit ne peut pas exploiter l'ouverture !"
 tactical_forest_battle.6321.b: "Envoyez le régiment MAA en renfort"
 tactical_forest_battle.6321.b.success: "MAA réussit à renforcer sa position !"
 tactical_forest_battle.6321.b.failure: "MAA ne peut pas arriver à temps !"
 tactical_forest_battle.6321.c: "Les chevaliers se retournent et chargent"
 tactical_forest_battle.6321.c.success: "La charge des chevaliers interrompt la poursuite !"
 tactical_forest_battle.6321.c.failure: "La charge des chevaliers est trop lente !"
 tactical_forest_battle.6321.d: "Le Centre se mobilise pour soutenir"
 tactical_forest_battle.6321.d.success: "Le rassemblement au centre renforce la défense !"
 tactical_forest_battle.6321.d.failure: "Le Centre ne peut pas se rallier à temps !"
 tactical_forest_battle.6321.e: "Tenir une embuscade pour les poursuivants"
 tactical_forest_battle.6321.e.success: "L'embuscade arrête la poursuite !"
 tactical_forest_battle.6321.e.failure: "Les ennemis évitent l'embuscade !"
 tactical_forest_battle.6321.f: "Inspirez les troupes pour la contre-attaque"
 tactical_forest_battle.6321.f.success: "Les troupes contre-attaquent avec fureur !"
 tactical_forest_battle.6321.f.failure: "Le moral baisse et la déroute continue !"
  
 tactical_forest_battle.6322.t: "Se détacher de la gauche pour attaquer en poursuivant les ennemis"
 tactical_forest_battle.6322.desc: "Les forces ennemies poursuivent notre flanc gauche ! Nous pouvons détacher des unités pour faire demi-tour et frapper les poursuivants, brisant ainsi leur élan."
 tactical_forest_battle.6322.a: "Le détachement de gauche charge les poursuivants"
 tactical_forest_battle.6322.a.success: "Les charges du détachement s'écrasent sur les poursuivants !"
 tactical_forest_battle.6322.a.failure: "Le détachement est coupé !"
 tactical_forest_battle.6322.b: "Les chevaliers protègent le flanc gauche"
 tactical_forest_battle.6322.b.success: "Les chevaliers retiennent leur poursuite !"
 tactical_forest_battle.6322.b.failure: "Les chevaliers sont débordés !"
 tactical_forest_battle.6322.c: "Envoyez MAA en renfort à gauche"
 tactical_forest_battle.6322.c.success: "Les renforts MAA soutiennent à gauche !"
 tactical_forest_battle.6322.c.failure: "MAA ne peut pas atteindre la gauche à temps !"
 tactical_forest_battle.6322.d: "Le centre pivote pour aider à gauche"
 tactical_forest_battle.6322.d.success: "Le centre délivre une passe décisive à gauche face aux poursuivants !"
 tactical_forest_battle.6322.d.failure: "Le centre ne peut pas pivoter à temps !"
 tactical_forest_battle.6322.e: "Rallier les défenseurs du flanc gauche"
 tactical_forest_battle.6322.e.success: "Rassemblements sur le flanc gauche et contre-attaques !"
 tactical_forest_battle.6322.e.failure: "Le flanc gauche déroute malgré le rassemblement !"
 tactical_forest_battle.6322.f: "Feindre la retraite pour tendre un piège"
 tactical_forest_battle.6322.f.success: "Les poursuivants tombent dans notre piège !"
 tactical_forest_battle.6322.f.failure: "L'ennemi évite le piège !"
  
 tactical_forest_battle.6323.t: "Faites pivoter le centre pour attaquer les ennemis qui poursuivent"
 tactical_forest_battle.6323.desc: "[enemy_commander.GetFirstNamePossessive] poursuit notre centre ! Nous pouvons faire pivoter nos forces centrales pour les affronter de front et freiner leur avance."
 tactical_forest_battle.6323.a: "Le centre se tourne vers ses poursuivants"
 tactical_forest_battle.6323.a.success: "Le centre affronte ses poursuivants de manière décisive !"
 tactical_forest_battle.6323.a.failure: "Le virage central n’est pas coordonné !"
 tactical_forest_battle.6323.b: "Les flancs attaquent les flancs ennemis tandis que le centre leur fait face"
 tactical_forest_battle.6323.b.success: "L'attaque à la pince perturbe la poursuite !"
 tactical_forest_battle.6323.b.failure: "Les attaques de flanc ne parviennent pas à se développer !"
 tactical_forest_battle.6323.c: "Envoyez tous les chevaliers contre-attaquer"
