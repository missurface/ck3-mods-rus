 tactical_forest_battle.6323.c.failure: "La contre-attaque du chevalier échoue !"
 tactical_forest_battle.6323.d: "Centre de rassemblement et avance"
 tactical_forest_battle.6323.d.success: "Centrer les rassemblements et les contre-attaques !"
 tactical_forest_battle.6323.d.failure: "Le centre ne peut pas se rallier !"
 tactical_forest_battle.6323.e: "Le MAA forme un mur défensif"
 tactical_forest_battle.6323.e.success: "Le mur MAA arrête la poursuite !"
 tactical_forest_battle.6323.e.failure: "Le mur du MAA est brisé !"
 tactical_forest_battle.6323.f: "Autoriser la poursuite dans le piège"
 tactical_forest_battle.6323.f.success: "Les poursuivants sont pris au piège !"
 tactical_forest_battle.6323.f.failure: "L'ennemi évite le piège !"
  
