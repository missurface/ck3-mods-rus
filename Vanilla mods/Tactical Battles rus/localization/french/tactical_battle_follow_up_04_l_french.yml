 tactical_forest_battle.6325.t: "Le centre se retire lentement"
 tactical_forest_battle.6325.desc: "Notre centre recule sous la pression ! Nous devons nous assurer que cette retraite reste ordonnée, sinon nous risquons d'être flanqués et vaincus !"
 tactical_forest_battle.6325.a: "Le centre maintient la discipline"
 tactical_forest_battle.6325.a.success: "Centre de retraite en bon ordre !"
 tactical_forest_battle.6325.a.failure: "Le centre commence à se briser !"
 tactical_forest_battle.6325.b: "Les flancs couvrent le retrait"
 tactical_forest_battle.6325.b.success: "Les flancs tiennent et couvrent la retraite !"
