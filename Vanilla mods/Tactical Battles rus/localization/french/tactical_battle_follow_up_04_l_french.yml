 tactical_forest_battle.9420.desc: "[enemy_commander.GetFirstNamePossessive] effectue une forte poussée directement sur notre gauche ! Notre gauche est soumise à une pression immense et nous devons décider si nous devons tenir, renforcer ou manœuvrer."
