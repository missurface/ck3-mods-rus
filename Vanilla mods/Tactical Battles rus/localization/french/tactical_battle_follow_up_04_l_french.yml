 tactical_forest_battle.9420.b: "Envoyer des réserves centrales pour renforcer la gauche"
 tactical_forest_battle.9420.b.success: "Les réserves centrales arrivent et se stabilisent à gauche !"
 tactical_forest_battle.9420.b.failure: "Les réserves de droit ne parviennent pas à se renforcer à temps !"
