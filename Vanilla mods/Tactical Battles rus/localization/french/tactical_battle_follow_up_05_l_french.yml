 tactical_forest_battle.9453.t: "Cercles à droite"
 tactical_forest_battle.9453.desc: "Nous avons encerclé avec succès le flanc droit de [enemy_commander.GetFirstNamePossessive] ! Ils sont piégés et risquent d’être détruits. Nous devons porter le coup fatal !"
 tactical_forest_battle.9453.a: "Commencer le massacre des troupes encerclées"
 tactical_forest_battle.9453.a.success: "Les troupes encerclées sont massacrées !"
 tactical_forest_battle.9453.a.failure: "Les troupes encerclées éclatent !"
 tactical_forest_battle.9453.b: "Faire des prisonniers"
 tactical_forest_battle.9453.b.success: "Nous capturons de nombreux prisonniers !"
 tactical_forest_battle.9453.b.failure: "Les prisonniers s'échappent !"
  
 tactical_forest_battle.9473.t: "Armée de rassemblement"
 tactical_forest_battle.9473.desc: "La bataille fait rage ! Nos forces ont besoin d'inspiration pour vaincre la résistance farouche de l'ennemi !"
 tactical_forest_battle.9473.a: "Appel à une grève décisive"
 tactical_forest_battle.9473.a.success: "L'armée lance une frappe décisive !"
 tactical_forest_battle.9473.a.failure: "La grève ne se concrétise pas !"
 tactical_forest_battle.9473.b: "Repositionner pour un meilleur terrain"
 tactical_forest_battle.9473.b.success: "Les forces se repositionnent sur un meilleur terrain !"
 tactical_forest_battle.9473.b.failure: "Le repositionnement échoue !"
 tactical_forest_battle.9473.c: "Envoyez des renforts de réserve"
 tactical_forest_battle.9473.c.success: "Les réserves renforcent la ligne !"
 tactical_forest_battle.9473.c.failure: "Les réserves prennent du retard !"
 tactical_forest_battle.9473.d: "Charge de tête contre le centre ennemi"
 tactical_forest_battle.9473.d.success: "La charge contre le centre réussit !"
 tactical_forest_battle.9473.d.failure: "La charge est repoussée !"
  
 tactical_forest_battle.7220.t: "La gauche commence à encercler"
 tactical_forest_battle.7220.desc: "Notre flanc gauche a entamé une manœuvre d’encerclement autour de l’ennemi ! Si nous parvenons à compléter cet encerclement, nous pourrons les piéger et les détruire !"
 tactical_forest_battle.7220.a: "Terminer l'encerclement"
 tactical_forest_battle.7220.a.success: "Nous terminons l'encerclement !"
 tactical_forest_battle.7220.a.failure: "L'ennemi éclate !"
 tactical_forest_battle.7220.b: "Envoyez nos chevaliers pour les maintenir en position"
 tactical_forest_battle.7220.b.success: "Nos chevaliers maintiennent l'ennemi en place !"
 tactical_forest_battle.7220.b.failure: "L'ennemi passe à travers !"
 tactical_forest_battle.7220.c: "Envoyez nos unités d'élite pour maintenir l'ennemi en place !"
 tactical_forest_battle.7220.c.success: "L'ennemi est incapable de se désengager !"
 tactical_forest_battle.7220.c.failure: "L'ennemi sort de l'encerclement !"
 tactical_forest_battle.7220.d: "Calez-les avec le centre tandis que la gauche encercle"
 tactical_forest_battle.7220.d.success: "L'ennemi ne peut pas se désengager !"
 tactical_forest_battle.7220.d.failure: "L'ennemi échappe au piège !"
 tactical_forest_battle.7220.e: "Rassemblez les troupes pour maintenir la ligne pendant que les unités encerclent"
 tactical_forest_battle.7220.e.success: "L'ennemi ne peut pas se désengager !"
 tactical_forest_battle.7220.e.failure: "L'ennemi échappe au piège !"
  
  
