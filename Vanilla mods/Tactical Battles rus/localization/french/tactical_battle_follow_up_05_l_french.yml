 tactical_forest_battle.6310.t: "Le piège est ouvert !"
 tactical_forest_battle.6310.desc: "[right_flank_commander.GetTitledFirstNamePossessive] feinte a parfaitement fonctionné ! [enemy_commander.GetFirstNamePossessive] commandes à tenir ont été noyées, et [enemy_commander.GetHerHis] avant-garde ont rompu la formation pour mordre à l'hameçon. Le côté gauche de leur ligne est désormais étiré et désorganisé."
 tactical_forest_battle.6310.a: "[right_flank_commander.GetTitledFirstName] mène l'armée désorganisée dans un piège de nos unités d'élite"
 tactical_forest_battle.6310.a.success: "[enemy_commander.GetFirstNamePossessive] le côté droit suit [right_flank_commander.GetFirstNamePossessive] les forces en fuite directement dans une embuscade !"
 tactical_forest_battle.6310.a.failure: "La droite ne mord pas à l’hameçon !"
 tactical_forest_battle.6310.b: "Envoyez des chevaliers écraser leur flanc trop étendu"
 tactical_forest_battle.6310.b.success: "Les chevaliers s'écrasent sur le flanc exposé de l'ennemi, brisant leur formation !"
 tactical_forest_battle.6310.b.failure: "L'ennemi se réorganise rapidement et se retourne contre nos chevaliers"
 tactical_forest_battle.6310.c: "Séparez les forces du flanc [left_flank_commander.GetTitledFirstNamePossessive] pour encercler leurs unités attirées."
 tactical_forest_battle.6310.c.success: "[right_flank_commander.GetTitledFirstName] réussit à encercler les unités ennemies, leur coupant ainsi la retraite !"
 tactical_forest_battle.6310.c.failure: "L'ennemi mène une charge dévastatrice sur notre flanc droit épuisé."
 tactical_forest_battle.6310.d: "Faites pivoter [center_flank_commander.GetFirstNamePossessive] réserves pour encercler les unités attirées"
 tactical_forest_battle.6310.d.success: "Les réserves se déplacent rapidement et sont en mesure d'encercler"
 tactical_forest_battle.6310.d.failure: "[enemy_commander.GetFirstNamePossessive] reconnaît notre centre épuisé !"
 tactical_forest_battle.6310.e: "Tournez et tuez les unités attirées avec une charge complète"
 tactical_forest_battle.6310.e.success: "La charge complète surprend l’ennemi !"
 tactical_forest_battle.6310.e.failure: "L'ennemi reste inébranlable et repousse notre charge !"
  
  
 tactical_forest_battle.7320.t: "L’ennemi reste fort derrière nos lignes"
 tactical_forest_battle.7320.desc: "Les forces [enemy_commander.GetFirstNamePossessive] se sont ralliées et ont réorganisé leur ligne derrière la nôtre. Ils sont désormais enfouis plus profondément, tournant le dos à nos lignes et leur formation renforcée. Nous devons décider s’il faut continuer à faire pression sur eux ou changer de tactique."
 tactical_forest_battle.7320.a: "Envoyez une charge avec nos unités d'élite d'élite pour attaquer leur flanc"
 tactical_forest_battle.7320.a.success: "Nos unités de crack les prennent par surprise et balayent leurs lignes !"
 tactical_forest_battle.7320.a.failure: "Nos unités d'élite sont incapables de percer leur solide défense !"
 tactical_forest_battle.7320.b: "Envoyez des chevaliers attaquer leur flanc"
 tactical_forest_battle.7320.b.failure: "Les chevaliers sont interceptés par les réserves ennemies !"
 tactical_forest_battle.7320.c: "Rompre les réserves centrales pour briser leurs arrières"
 tactical_forest_battle.7320.c.success: "Nos réserves centrales s'écrasent sur leurs arrières, provoquant le chaos !"
 tactical_forest_battle.7320.c.failure: "Nos réserves centrales sont incapables de se désengager à cause d'une poussée soudaine !"
 tactical_forest_battle.7320.d: "Rompre les réserves de droit pour fracasser leurs arrières"
 tactical_forest_battle.7320.d.success: "Nos réserves centrales s'écrasent sur leurs arrières, provoquant le chaos !"
 tactical_forest_battle.7320.d.failure: "Nos réserves centrales sont incapables de se désengager à cause d'une poussée soudaine !"
 tactical_forest_battle.7320.e: "Feignez une retraite et allumez-vous contre les poursuivants"
 tactical_forest_battle.7320.e.success: "L’ennemi tombe dans le piège de notre tromperie et lance une attaque inattendue !"
 tactical_forest_battle.7320.e.failure: "L'ennemi se replie vers notre centre exposé !"
  
