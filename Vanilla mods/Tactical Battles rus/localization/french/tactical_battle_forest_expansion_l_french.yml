 game_concept_captain_trait_concept: "Capitaine Trait"
 game_concept_captain_trait_concept_desc: "Les traits de capitaine sont des traits donnés aux hommes recrutés dans une escouade d'hommes d'armes. Pendant la bataille, lorsque vous utilisez une option impliquant des hommes d'armes, en cas de succès, il y a une chance de recruter un commandant avec un trait de capitaine spécial après la bataille. Ces traits fournissent divers bonus à votre armée pendant les batailles.\n\n Exemples : [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]."
 game_concept_player_title_concept: "joueur"
 game_concept_player_title_concept_desc: "Les traits de capitaine sont des traits donnés aux hommes recrutés dans une escouade d'hommes d'armes. Pendant la bataille, lorsque vous utilisez une option impliquant des hommes d'armes, en cas de succès, il y a une chance de recruter un commandant avec un trait de capitaine spécial après la bataille. Ces traits fournissent divers bonus à votre armée pendant les batailles.\n\n Exemples : [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]."
  
 tactical_forest_battle.0498.t: "Un soldat célèbre"
 tactical_forest_battle.0498.desc: "Après avoir reçu un rapport sur notre récente bataille, mes officiers m'ont informé qu'un de nos soldats d'un régiment d'élite de [chosen_unit.GetName] s'était admirablement comporté au cœur des combats. Prendre [commander.GetHerHim] à mon service pourrait inspirer les autres hommes."
 tactical_forest_battle.0498.a: "Recrutez [commander.GetName] à mon service. ([commander.GetFirstName] gagne un [captain_trait_concept|e])"
 tactical_forest_battle.0498.b: "Je vais y réfléchir."
  
