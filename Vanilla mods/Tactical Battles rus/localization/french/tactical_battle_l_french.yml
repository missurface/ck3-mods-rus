 # EVENT 7324 - Enemy Reorganizes Turns to Meet our center 
  
  
 tactical_forest_battle.7324.t: "L'ennemi frappe le flanc central"
 tactical_forest_battle.7324.desc: "[enemy_commander.GetFirstNamePossessive] a reconnu notre flanc central affaibli et lance un assaut. Sans nos réserves, nous prenons la décision cruciale de conserver notre flanc central."
 tactical_forest_battle.7324.a: "le flanc central résiste à l'assaut"
 tactical_forest_battle.7324.a.success: "Notre flanc central tient bon face à l’assaut ennemi !"
 tactical_forest_battle.7324.a.failure: "Le flanc central est débordé et commence à faiblir !"
 tactical_forest_battle.7324.b: "Envoyez des chevaliers pour renforcer le centre"
 tactical_forest_battle.7324.b.success: "De nouveaux chevaliers stabilisent le flanc central !"
 tactical_forest_battle.7324.b.failure: "Les chevaliers sont interceptés avant d'atteindre le centre !"
 tactical_forest_battle.7324.c: "Envoyez nos unités d'élite d'élite pour renforcer le flanc central"
 tactical_forest_battle.7324.c.success: "Nos renforts stabilisent le flanc central !"
 tactical_forest_battle.7324.c.failure: "Notre centre s'effondre malgré les renforts !"
 tactical_forest_battle.7324.d: "Essayez de battre en retraite lentement et de déplacer leur centre pendant que les renforts arrivent"
 tactical_forest_battle.7324.d.success: "Leur centre commence à suivre notre retraite, les exposant !"
 tactical_forest_battle.7324.d.failure: "Le centre est incapable de se désengager sous la pression !"
 tactical_forest_battle.7324.e: "Feignez une retraite et allumez-vous contre les poursuivants"
 tactical_forest_battle.7324.e.success: "L’ennemi tombe dans le piège de notre tromperie et lance une attaque inattendue !"
 tactical_forest_battle.7324.e.failure: "Ils voient clair dans notre tromperie et maintiennent leur formation !"
  
