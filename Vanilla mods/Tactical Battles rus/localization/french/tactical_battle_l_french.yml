 tactical_forest_battle.0061.t: "Le destin de [sc_loser.GetFullNameNicknamed]"
 tactical_forest_battle.0061.desc: "Avec mon dernier coup, [sc_loser.GetFirstName] tombe à genoux, ensanglanté et battu. Tandis que le champ de bataille autour de moi fait rage, [sc_loser.GetTitledFirstNamePossessive] me regarde avec un mélange de défi et de résignation. Le moment est venu de décider du sort de [sc_loser.GetHerHis]."
 tactical_forest_battle.0061.a: "Tuer [sc_loser.GetFirstName]"
 tactical_forest_battle.0061.a.success: "[sc_loser.GetFirstName] rencontre la fin [sc_loser.GetHerHis] sur le champ de bataille."
 tactical_forest_battle.0061.b: "Capturer [sc_loser.GetFirstName]"
 tactical_forest_battle.0061.b.success: "[sc_loser.GetFirstName] est fait prisonnier."
 tactical_forest_battle.0061.c: "Prenez l'œil [sc_loser.GetFirstNamePossessive] et relâchez le destin [sc_loser.GetHerHim] vers [sc_loser.GetHerHis]."
 tactical_forest_battle.0061.c.success: "L'aveuglement [sc_loser.GetFirstName] assure la survie de [sc_loser.GetHerHis], mais à un coût élevé."
 tactical_forest_battle.0061.d: "Laissez [sc_loser.GetFirstName] marqué de façon permanente et libérez le destin de [sc_loser.GetHerHim] à [sc_loser.GetHerHis]."
 tactical_forest_battle.0061.d.success: "Les cicatrices serviront de rappel durable de la défaite de [sc_loser.GetFirstNamePossessive]."
 tactical_forest_battle.0061.e: "Mutiler [sc_loser.GetFirstName] et libérer le destin de [sc_loser.GetHerHim] à [sc_loser.GetHerHis]"
 tactical_forest_battle.0061.e.success: "[sc_loser.GetFirstName] portera le fardeau des blessures de [sc_loser.GetHerHis] pour le reste de sa vie [sc_loser.GetHerHis]."
  
  
 # Event 0005 - First tactical decision (Forest) 
 tactical_forest_battle.0005.t: "Combattez dans le [battle_location.GetProvince.GetTerrain.GetName|l] du [battle_location.GetProvince.GetName]"
 tactical_forest_battle.0005.desc: "Alors qu'il combat pour [fighting_war.GetName] contre [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], mon armée s'affronte dans le [battle_location.GetProvince.GetTerrain.GetName|l] de [battle_location.GetProvince.GetName] contre les forces de [enemy_war_leader.GetFullNameNicknamedOrMeRegnal]. Nos éclaireurs rapportent que [enemy_commander.GetFullNameNicknamedOrMeRegnal] est au commandement. En tant que commandant, je dois choisir notre mouvement pour vaincre le [enemy_commander.GetTitleTierName]."
 tactical_forest_battle.0005.a: "Concentrez-vous sur le flanc gauche ([left_flank_commander.GetSkill( 'martial' )]#! [martial|E] [left_flank_commander.GetTitledFirstNameOrMe] vs [enemy_right_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_right_flank_commander.GetSkill( 'martial' )]#! [martial|E])"
 tactical_forest_battle.0005.b: "Concentrez-vous sur le centre ([center_flank_commander.GetSkill( 'martial' )]#! [martial|E] [center_flank_commander.GetTitledFirstNameOrMe] vs [enemy_center_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_center_flank_commander.GetSkill( 'martial' )]#! [martial|E])"
 tactical_forest_battle.0005.c: "Concentrez-vous sur le flanc droit ([right_flank_commander.GetSkill( 'martial' )]#! [martial|E] [right_flank_commander.GetTitledFirstNameOrMe] vs [enemy_left_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_left_flank_commander.GetSkill( 'martial' )]#! [martial|E])"
 tactical_forest_battle.0005.d: "Tiens mes chevaliers en réserve"
 tactical_forest_battle.0005.d.success: "Mes chevaliers sont parfaitement positionnés pour exploiter n'importe quelle ouverture !"
 tactical_forest_battle.0005.d.failure: "La bataille se déroule trop rapidement et mes chevaliers se retrouvent hors de position."
 tactical_forest_battle.0005.e: "Focus sur nos unités d'élite à distance"
 tactical_forest_battle.0005.f: "Focus sur notre cavalerie d'élite"
 tactical_forest_battle.0005.n: "Chargez leur commandant !"
 tactical_forest_battle.0005.n.success: "[left_flank_commander.GetFullNameNicknamedOrMe] duels [enemy_right_flank_commander.GetFullNameNicknamed]"
 tactical_forest_battle.0005.n.failure: "Notre charge est incapable de percer !"
 tactical_forest_battle.0005.kc: "Victoire en duel !"
 tactical_forest_battle.0005.kc.success: "[left_flank_commander.GetFullNameNicknamed] a tué [enemy_right_flank_commander.GetFullNameNicknamed] en combat singulier, démoralisant ses troupes !"
 tactical_forest_battle.0005.cc: "Victoire en duel !"
 tactical_forest_battle.0005.cc.success: "[left_flank_commander.GetFullNameNicknamed] a capturé [enemy_right_flank_commander.GetFullNameNicknamed] après avoir vaincu [enemy_right_flank_commander.GetHerHim] en combat singulier, démoralisant ses troupes !"
 tactical_forest_battle.0005.ld: "Vaincu en Duel !"
 tactical_forest_battle.0005.ld.failure: "[left_flank_commander.GetFullNameNicknamed] a été vaincu par [enemy_right_flank_commander.GetFullNameNicknamed] après avoir encerclé [enemy_right_flank_commander.GetFirstName] ! au combat !"
 tactical_forest_battle.0005.ldk: "Tué en Duel !"
 tactical_forest_battle.0005.ldk.failure: "[left_flank_commander.GetFullNameNicknamed] a été tué par [enemy_right_flank_commander.GetFullNameNicknamed] après avoir encerclé [enemy_right_flank_commander.GetFirstName] au combat !"
 tactical_forest_battle.0005.j: "Chargez [enemy_right_flank_commander.GetFullNameNicknamed] !"
 tactical_forest_battle.0005.j.failure: "[left_flank_commander.GetFullNameNicknamed] n'a pas pu passer à [enemy_right_flank_commander.GetFullNameNicknamed]"
 tactical_forest_battle.0005.dtt.success: "Notre flanc charge et encercle [enemy_right_flank_commander.GetFirstName]"
 # Event 0110 - Cavalry Feint SUCCESS Follow-up: Trap Sprung 
 tactical_forest_battle.0110.t: "Le piège est ouvert !"
 tactical_forest_battle.0110.desc: "[left_flank_commander.GetTitledFirstNamePossessive] feinte a parfaitement fonctionné ! [enemy_commander.GetFirstNamePossessive] commandes à tenir ont été noyées, et [enemy_commander.GetHerHis] avant-garde ont rompu la formation pour mordre à l'hameçon. Le côté droit de leur ligne est désormais étiré et désorganisé."
 tactical_forest_battle.0110.a: "[left_flank_commander.GetTitledFirstName] mène l'armée désorganisée dans un piège de nos unités d'élite"
 tactical_forest_battle.0110.a.success: "[enemy_commander.GetFirstNamePossessive] le côté droit suit [left_flank_commander.GetFirstNamePossessive] les forces en fuite directement dans une embuscade !"
 tactical_forest_battle.0110.a.failure: "La droite ne mord pas à l'hameçon et maintient sa position, faisant tourner les unités pour soutenir les autres flancs."
 tactical_forest_battle.0110.b: "Envoyez des chevaliers écraser leur flanc trop étendu"
 tactical_forest_battle.0110.b.success: "Les chevaliers s'écrasent sur le flanc exposé de l'ennemi, brisant leur formation !"
 tactical_forest_battle.0110.b.failure: "L'ennemi se réorganise rapidement et se retourne contre nos chevaliers"
 tactical_forest_battle.0110.c: "Séparez les forces du flanc [right_flank_commander.GetTitledFirstNamePossessive] pour encercler leurs unités attirées."
 tactical_forest_battle.0110.c.success: "[right_flank_commander.GetTitledFirstName] réussit à encercler les unités ennemies, leur coupant ainsi la retraite !"
 tactical_forest_battle.0110.c.failure: "L'ennemi mène une charge dévastatrice sur notre flanc droit épuisé."
 tactical_forest_battle.0110.d: "Faites pivoter [center_flank_commander.GetFirstNamePossessive] réserves pour encercler les unités attirées"
 tactical_forest_battle.0110.d.success: "Les réserves se déplacent rapidement et sont en mesure d'encercler"
 tactical_forest_battle.0110.d.failure: "[enemy_commander.GetFirstNamePossessive] reconnaît notre centre épuisé !"
 tactical_forest_battle.0110.e: "Tournez et tuez les unités attirées avec une charge complète"
 tactical_forest_battle.0110.e.success: "La charge complète surprend l’ennemi !"
 tactical_forest_battle.0110.e.failure: "L'ennemi reste inébranlable et repousse notre charge !"
  
  
 # ============================================ 
 # EVENT 9474 - Rally Army After Being Pressured 
 # ============================================ 
  
 tactical_forest_battle.9474.t: "Rassembler l'armée"
 tactical_forest_battle.9474.desc: "La bataille à gauche a atteint un point critique. Nos forces vacillent mais ne sont pas encore brisées. Avec un leadership fort et des actions audacieuses, nous pouvons rétablir l’ordre et renverser la situation !"
 tactical_forest_battle.9474.a: "La gauche appuie sur l'attaque"
 tactical_forest_battle.9474.a.success: "Notre armée entend l’appel et se mobilise !"
 tactical_forest_battle.9474.a.failure: "L'armée continue de vaciller !"
 tactical_forest_battle.9474.b: "Feignez une retraite pour attirer l'ennemi et contre-attaquer."
 tactical_forest_battle.9474.b.success: "La contre-attaque réussit et le moral s'envole !"
 tactical_forest_battle.9474.b.failure: "La contre-attaque échoue et le moral s'effondre !"
 tactical_forest_battle.9474.c: "Le centre charge durement pour alléger la pression"
 tactical_forest_battle.9474.c.success: "La charge désoriente leur flanc droit !"
 tactical_forest_battle.9474.c.failure: "L'ennemi reste inébranlable !"
 tactical_forest_battle.9474.d: "Le flanc droit charge vigoureusement pour alléger la pression"
 tactical_forest_battle.9474.d.success: "La charge désoriente leur flanc gauche !"
 tactical_forest_battle.9474.d.failure: "L'ennemi reste inébranlable !"
 tactical_forest_battle.9474.e: "Envoyez des chevaliers en renfort"
 tactical_forest_battle.9474.e.success: "Les réserves arrivent et renforcent la ligne !"
 tactical_forest_battle.9474.e.failure: "Les réserves sont trop dispersées pour aider !"
 tactical_forest_battle.9474.f: "Envoyez des unités d'élite d'élite en renfort"
 tactical_forest_battle.9474.f.success: "Nos unités d'élite sèment le chaos parmi l'ennemi !"
 tactical_forest_battle.9474.f.failure: "Nos unités de crack sont débordées !"
  
 # ============================================ 
 # EVENT 0650 - Right Flank Reserves Intercept 
 # ============================================ 
 tactical_forest_battle.0650.t: "Le flanc droit intercepte le mouvement ennemi"
 tactical_forest_battle.0650.desc: "Nos réserves du flanc droit ont détecté [enemy_commander.GetFirstNamePossessive] forces tentant de manœuvrer contre notre position. Nous disposons d’une brève fenêtre pour agir avant que l’ennemi ne termine son mouvement."
  
 tactical_forest_battle.0650.a: "Lancer une poussée féroce par le flanc droit"
 tactical_forest_battle.0650.a.success: "Le flanc droit porte un coup dévastateur, effondrant le côté droit de l'ennemi !"
 tactical_forest_battle.0650.a.failure: "La poussée est repoussée et l’ennemi prend l’initiative !"
  
 tactical_forest_battle.0650.b: "Faites rouler le flanc gauche pour attaquer par derrière"
 tactical_forest_battle.0650.b.success: "Notre manœuvre de roue attrape l'ennemi dans un feu croisé dévastateur !"
 tactical_forest_battle.0650.b.failure: "La manœuvre de flanc est détectée et perturbée par les contre-attaques ennemies !"
  
 tactical_forest_battle.0650.c: "Inspirez les troupes avec un appel de ralliement audacieux"
 tactical_forest_battle.0650.c.success: "Les troupes sont inspirées et repoussent l’avancée ennemie !"
 tactical_forest_battle.0650.c.failure: "Notre appel à la mobilisation reste lettre morte et l’armée continue de perdre du terrain !"
  
 tactical_forest_battle.0650.d: "Activez les bonnes réserves et créez la confusion"
 tactical_forest_battle.0650.d.success: "Les réserves créent suffisamment de confusion pour que nous puissions nous repositionner favorablement !"
 tactical_forest_battle.0650.d.failure: "L’intrigue se retourne contre nous et l’ennemi exploite notre confusion !"
  
 tactical_forest_battle.0650.e: "Envoyez des chevaliers pour renforcer le flanc droit"
 tactical_forest_battle.0650.e.success: "Les chevaliers renforcent le flanc et sécurisent la position !"
 tactical_forest_battle.0650.e.failure: "Les chevaliers sont isolés et encerclés par un nombre supérieur d'ennemis !"
  
