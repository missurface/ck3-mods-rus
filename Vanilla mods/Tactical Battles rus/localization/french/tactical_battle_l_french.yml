 # Event 0210 - Cavalry Feint FAILURE Follow-up: Feint Unmasked 
 tactical_forest_battle.0210.t: "Feinte démasquée !"
 tactical_forest_battle.0210.desc: "[enemy_commander.GetTitledFirstName] a vu à travers notre feinte de cavalerie ! Leurs forces ont maintenu la discipline au lieu de poursuivre, et maintenant nos cavaliers font face à une infanterie musclée, à des volées de missiles ou à une contre-cavalerie en embuscade. La situation tactique s'est retournée contre nous : je dois décider comment sauver ce désastre."
 tactical_forest_battle.0210.a: "Traversez le piège ! Chargez de tout ! (Martial + Prouesse vs [enemy_commander.GetShortUINameNoTooltip], très risqué)"
 tactical_forest_battle.0210.a.success: "Contre toute attente, notre audace brise leur formation ! L'ennemi chancelle devant notre charge désespérée !"
 tactical_forest_battle.0210.a.failure: "La charge s’effondre dans une déroute catastrophique. Notre cavalerie est dispersée et brisée !"
 tactical_forest_battle.0210.b: "Descendez et tenez la ligne ! (Nécessite le soutien de l'infanterie)"
 tactical_forest_battle.0210.c: "Écran la retraite avec la cavalerie. (Sacrifiez la cavalerie pour sauver l'armée)"
 tactical_forest_battle.0210.d: "Ralliez le cheval vacillant avec un leadership personnel ! (Nécessite Brave, Inspiring Leader ou Martial 14+)"
 tactical_forest_battle.0210.d.success: "Mon leadership stabilise la cavalerie ! Ils se reforment et se préparent à continuer le combat !"
 tactical_forest_battle.0210.d.failure: "La cavalerie refuse de se rallier. Le moral continue de s’effriter."
  
  
  
 # Event 0120 - Infantry Ambush SUCCESS Follow-up: Kill Zone in the Woods 
 tactical_forest_battle.0120.t: "Tuez Zone dans les bois !"
 tactical_forest_battle.0120.desc: "La colonne ennemie a marché droit sur nos troupes d'infanterie et de missiles dissimulées ! La visibilité dans la forêt est mauvaise, leurs formations sont étirées et leur structure de commandement est dans le chaos. Les forces de [enemy_commander.GetTitledFirstName] sont prises dans un terrain de massacre parfait. Comment allons-nous capitaliser sur cette opportunité ?"
 tactical_forest_battle.0120.a: "Fermez les mâchoires du piège ! Scellez leur avant et arrière !"
 tactical_forest_battle.0120.b: "Laissez parler les flèches et les javelots. Gardez notre infanterie à couvert. (Nécessite des archers/tirailleurs)"
 tactical_forest_battle.0120.b.success: "Notre barrage de missiles dévaste leur colonne exposée !"
 tactical_forest_battle.0120.b.failure: "Leurs boucliers et armures limitent l’efficacité de notre barrage."
 tactical_forest_battle.0120.c: "Frappez d'abord les officiers : ciblez les bannières et les commandants !"
 tactical_forest_battle.0120.c.success: "Nos équipes de grève éliminent les officiers clés ! Leur commandement s'effondre !"
 tactical_forest_battle.0120.c.failure: "Les équipes d'attaque sont isolées et subissent de lourdes pertes !"
 tactical_forest_battle.0120.d: "Laissez-les saigner, puis retournez dans les bois."
  
  
 # Event 0220 - Infantry Ambush FAILURE Follow-up: Ambush Detected 
 tactical_forest_battle.0220.t: "Embuscade détectée !"
 tactical_forest_battle.0220.desc: "[enemy_commander.GetTitledFirstName] a déjoué notre embuscade ! Leurs éclaireurs ont détecté nos positions cachées et leurs forces se sont adaptées avant que nous puissions ouvrir le piège. Nos unités d'infanterie dispersées sont exposées dans [battle_location.GetName] sans avantage coordonné. Je dois décider comment sauver ce désastre tactique."
 tactical_forest_battle.0220.a: "Retraitez et consolidez les positions défensives ! Regroupez-vous dans des forteresses."
 tactical_forest_battle.0220.b: "Changez de formation et contre-chargez sous la pression ennemie ! (Martial 11+, risque élevé)"
 tactical_forest_battle.0220.b.success: "Notre agression inattendue prend l’ennemi par surprise ! Leur formation se brise !"
 tactical_forest_battle.0220.b.failure: "La contre-charge expose encore plus notre infanterie. Catastrophe!"
 tactical_forest_battle.0220.c: "Utilisez la forêt pour disperser les unités et vous reformer ailleurs. (Intendance 10+)"
 tactical_forest_battle.0220.c.success: "Nos unités s'éclipsent à travers les arbres et se regroupent en toute sécurité !"
 tactical_forest_battle.0220.c.failure: "Les unités dispersées ne peuvent pas se reformer. Ils restent désorganisés et vulnérables."
 tactical_forest_battle.0220.d: "Tenez bon et combattez malgré la pression ! Acceptez de lourdes pertes."
  
 # Event 0130 - Levy Braced SUCCESS Follow-up: Spears and Trees 
 tactical_forest_battle.0130.t: "Des lances et des arbres !"
 tactical_forest_battle.0130.desc: "Le mur de lance de prélèvement tient comme de la pierre ! La forêt elle-même devient une forteresse lorsque nos soldats s'installent entre les arbres. Les forces de [enemy_commander.GetTitledFirstName] s'écrasent contre notre formation hérissée et vacillent. Le moment est maintenant venu d’exploiter notre avantage : comment exploiter leur faiblesse ?"
 tactical_forest_battle.0130.a: "Tenez la ligne et broyez-les. Laissons l’attrition travailler pour nous."
 tactical_forest_battle.0130.b: "Frappez soudainement en leur centre ! (Apprentissage + Martial 9+, risque modéré)"
 tactical_forest_battle.0130.b.success: "Cette poussée soudaine brise leur détermination ! La formation ennemie s'effondre !"
 tactical_forest_battle.0130.b.failure: "La poussée ralentit mais la ligne tient. Ils refusent de rompre."
 tactical_forest_battle.0130.c: "Que les archers les massacrent sur le champ de bataille. (Nécessite les archers MaA)"
 tactical_forest_battle.0130.c.success: "Des volées dévastatrices pleuvent ! Le champ de la mort en réclame des centaines !"
 tactical_forest_battle.0130.c.failure: "Les archers manquent de flèches et perdent leur avantage."
 tactical_forest_battle.0130.d: "Formez une enclume pour briser leur charge ! (Concentrez-vous sur la ténacité)"
  
 # Event 0230 - Levy Scattered FAILURE Follow-up: Formation Broken 
 tactical_forest_battle.0230.t: "Formation brisée !"
 tactical_forest_battle.0230.desc: "Les prélèvements se dispersent en panique ! Au lieu de former un mur de lance hérissé, les soldats se sont dispersés entre les arbres, incapables de se coordonner ou de maintenir une ligne. [enemy_commander.GetTitledFirstName] voit la faiblesse et l'exploite. La formation est brisée – je dois agir rapidement pour sauver ce désastre."
 tactical_forest_battle.0230.a: "Rassemblez-les avec l'exemple personnel ! Menez de face ! (Prouesses 10+, Martiaux 9+)"
 tactical_forest_battle.0230.a.success: "Ma valeur personnelle rallie les soldats ! Ils se reforment et s'aguerrissent !"
 tactical_forest_battle.0230.a.failure: "Les soldats restent effrayés et dispersés. Le moral ne se rétablit pas."
 tactical_forest_battle.0230.b: "Engagez vos chevaliers d’élite pour consolider la ligne. (Nécessite 2+ chevaliers)"
 tactical_forest_battle.0230.c: "Repositionnez les unités dispersées sur un meilleur terrain. (Intendance 9+)"
 tactical_forest_battle.0230.c.success: "Les levées dispersées sont rassemblées et repositionnées sur un terrain plus solide !"
 tactical_forest_battle.0230.c.failure: "La tentative de repositionnement échoue. Les unités deviennent encore plus dispersées !"
 tactical_forest_battle.0230.d: "Concentrez-vous plutôt sur la réduction du moral de l’ennemi. (Intrigue 8+, guerre psychologique)"
  
  
 # Event 0140 - Knights in Reserve SUCCESS Follow-up: Knights Ready 
 tactical_forest_battle.0140.t: "Chevaliers prêts !"
 tactical_forest_battle.0140.desc: "Les chevaliers attendent, parfaitement prêts, à l'abri des regards de l'ennemi. Les forces de [enemy_commander.GetTitledFirstName] sont concentrées sur leurs positions actuelles, ignorant que notre réserve de cavalerie attend pour frapper. Le moment est venu de les libérer : comment allons-nous utiliser leur potentiel dévastateur ?"
 tactical_forest_battle.0140.a: "Frappe au marteau : charge de cavalerie dévastatrice ! (Prouesses 11+, risque/récompense très élevé)"
 tactical_forest_battle.0140.a.success: "La charge est parfaitement exécutée ! Nos chevaliers brisent la formation ennemie comme du verre !"
 tactical_forest_battle.0140.a.failure: "La charge s'étend trop loin et les chevaliers se retrouvent isolés !"
 tactical_forest_battle.0140.b: "Manœuvre de flanc : contournez l'ennemi ! (Martiaux 10+)"
 tactical_forest_battle.0140.b.success: "La manœuvre de flanc réussit ! L'ennemi est pris par surprise par derrière !"
 tactical_forest_battle.0140.b.failure: "La manœuvre est bloquée avant de pouvoir se développer !"
 tactical_forest_battle.0140.c: "Poursuite : capitalisez sur les unités en retraite ! (Intrigues 9+)"
 tactical_forest_battle.0140.c.success: "La poursuite met l'ennemi en déroute ! Ils ne peuvent pas se réorganiser !"
 tactical_forest_battle.0140.c.failure: "La poursuite est bloquée et notre cavalerie subit des pertes."
 tactical_forest_battle.0140.d: "Retrait discipliné : utilisez des chevaliers pour couvrir la retraite. (Intendance 9+)"
  
 martial_positive: "Avantage tactique"
 martial_negative: "Inconvénient tactique"
  
