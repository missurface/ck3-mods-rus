 tactical_forest_battle.2012.a: "Le flanc gauche inonde la brèche"
 tactical_forest_battle.2012.a.success: "[left_flank_commander.GetFullNameNicknamedPossessiveOrMy] le flanc inonde la formation ennemie brisée !"
