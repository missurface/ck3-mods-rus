  # Event 0010 - Left Flank Focus Follow-up 
 tactical_forest_battle.0010.t: "Engagement du flanc gauche"
 tactical_forest_battle.0010.desc: "La bataille fait rage et nos forces s’engagent sur le flanc gauche. Commandes [center_flank_commander.GetTitledFirstName] au centre, avec [right_flank_commander.GetFirstName] sur le flanc droit. [left_flank_commander.GetTitledFirstName] commande la gauche, l'utilisation des forces [left_flank_commander.GetHerHis] pourrait s'avérer cruciale pour assurer la victoire."
 tactical_forest_battle.0010.a: "Exécuter une feinte de retraite sur le flanc gauche"
 tactical_forest_battle.0010.a.success: "La feinte réussit ! L'ennemi brise sa formation pour poursuivre nos troupes en fuite, créant ainsi une vulnérabilité fatale."
 tactical_forest_battle.0010.a.failure: "L'ennemi voit clair dans notre tromperie et maintient la discipline, retournant notre feinte contre nous !"
 tactical_forest_battle.0010.b: "Effectuer une manœuvre de flanc"
 tactical_forest_battle.0010.b.success: "Nos forces de flanc contournent leur flanc gauche, brisant leur cohésion !"
 tactical_forest_battle.0010.b.failure: "Ce commandant anticipe notre manœuvre et fait tourner ses forces pour nous rencontrer."
 tactical_forest_battle.0010.e: "Tactiques de harcèlement par frappe et fuite sur leur flanc droit"
 tactical_forest_battle.0010.e.success: "Nos tactiques de harcèlement les épuisent ! Leur droite saigne !"
 tactical_forest_battle.0010.e.failure: "L'ennemi tient bon et maintient sa formation !"
 tactical_forest_battle.0010.f: "Éliminez une force de flanc cachée et repliez-vous lentement"
 tactical_forest_battle.0010.f.success: "Notre force de flanc réussit à se désengager et à contourner l’attaque pressante !"
 tactical_forest_battle.0010.f.failure: "Notre force de flanc est repérée et engagée au combat !"
 tactical_forest_battle.0010.g: "Créer une fausse brèche leur donnant le droit de se jeter dans un piège"
 tactical_forest_battle.0010.g.success: "Leur droite commence à charger dans la brèche, tombant dans notre piège !"
 tactical_forest_battle.0010.g.failure: "Leur droite refuse de mordre à l’hameçon et maintient la discipline !"
  
 # Event 0011 - Center Flank Engagement 
 tactical_forest_battle.0011.t: "Engagement du flanc central"
 tactical_forest_battle.0011.desc: "La bataille fait rage et nos forces s’engagent sur le flanc central. Commandes [left_flank_commander.GetTitledFirstName] à gauche, avec [right_flank_commander.GetFirstName] sur le flanc droit. [center_flank_commander.GetTitledFirstName] commande le centre, et l'utilisation des forces [center_flank_commander.GetHerHis] pourrait s'avérer essentielle pour assurer la victoire."
 tactical_forest_battle.0011.a: "Créer un faux vide sur la partie gauche de notre centre"
 tactical_forest_battle.0011.a.success: "Leur centre charge l'espace, tombant dans notre piège !"
 tactical_forest_battle.0011.a.failure: "L’ennemi refuse de se laisser entraîner et de tenir bon !"
 tactical_forest_battle.0011.b: "Créer un faux vide sur la partie droite de notre centre"
 tactical_forest_battle.0011.b.success: "Leur centre charge l'espace, tombant dans notre piège !"
 tactical_forest_battle.0011.b.failure: "L’ennemi refuse de se laisser entraîner et de tenir bon !"
 tactical_forest_battle.0011.c: "Envoyez nos régiments d'élite percer leur centre"
 tactical_forest_battle.0011.c.success: "L’attaque des élites brise leur cohésion ! Le centre commence à s'effondrer !"
 tactical_forest_battle.0011.c.failure: "L’ennemi anticipe et nos forces d’élite sont repoussées !"
 tactical_forest_battle.0011.d: "Engagez nos chevaliers à briser leur centre"
 tactical_forest_battle.0011.d.success: "Les chevaliers chargent avec une force dévastatrice ! Leur centre s'effondre !"
 tactical_forest_battle.0011.d.failure: "L'ennemi prépare une contre-charge et nos chevaliers sont repoussés !"
 tactical_forest_battle.0011.e: "Tirez lentement le centre vers l'arrière pour essayer d'encercler"
 tactical_forest_battle.0011.e.success: "Leur centre est soudainement exposé sur les deux flancs !"
 tactical_forest_battle.0011.e.failure: "Ils refusent de se laisser entraîner et tiennent bon !"
 tactical_forest_battle.0011.f: "Lancez une charge dévastatrice à travers leur centre"
 tactical_forest_battle.0011.f.success: "Notre charge écrase leur centre ! Leur formation se brise sous l'impact !"
 tactical_forest_battle.0011.f.failure: "L’ennemi tient bon et notre charge ne parvient pas à percer !"
  
 # Event 0012 - Right Flank Engagement 
 tactical_forest_battle.0012.t: "Engagement du flanc droit"
 tactical_forest_battle.0012.desc: "Nos forces engagent les ennemis du côté gauche, avec [right_flank_commander.GetTitledFirstNameOrMeRegnal] commandant le flanc droit, nous pouvons inverser le cours de la bataille en notre faveur."
 tactical_forest_battle.0012.a: "Exécuter une feinte de retraite sur le flanc gauche de l'ennemi"
 tactical_forest_battle.0012.a.success: "La feinte réussit ! L'ennemi brise sa formation pour poursuivre nos troupes en fuite !"
 tactical_forest_battle.0012.a.succes.desc: "La feinte réussit ! L'ennemi brise sa formation pour poursuivre nos troupes en fuite !"
 tactical_forest_battle.0012.a.failure: "[enemy_commander.GetFirstName] voit à travers notre tromperie et bat en retraite pour attaquer notre centre !"
 tactical_forest_battle.0012.b: "Effectuer une manœuvre de flanc sur son flanc gauche"
 tactical_forest_battle.0012.b.success: "Nos forces de flanc contournent leur flanc gauche, brisant leur cohésion !"
 tactical_forest_battle.0012.b.failure: "[enemy_commander.GetFirstName] fait tourner les réserves depuis la gauche pour renforcer !"
 tactical_forest_battle.0012.c: "Éliminez une force de flanc cachée et repliez-vous lentement"
 tactical_forest_battle.0012.c.success: "Notre force de flanc réussit à se désengager et à contourner l’attaque pressante !"
 tactical_forest_battle.0012.c.failure: "Notre force de flanc est repérée et engagée au combat !"
 tactical_forest_battle.0012.d: "S'engager dans des tactiques de délit de fuite sur leur flanc gauche"
 tactical_forest_battle.0012.d.success: "Nos tactiques de délit de fuite perturbent leur formation ! Ils ont du mal à se réorganiser !"
 tactical_forest_battle.0012.d.failure: "L’ennemi tient bon et nos forces ne peuvent pas exploiter l’instant présent !"
 tactical_forest_battle.0012.e: "Créer un faux écart incitant leur gauche à charger dans un piège"
 tactical_forest_battle.0012.e.success: "Leur gauche commence à charger dans la brèche, tombant dans notre piège !"
 tactical_forest_battle.0012.e.failure: "La gauche refuse de mordre à l’hameçon et maintient la discipline !"
  
  
  
 # Event 8005 - Enemy Left Flank Routing 
  
 # Event 5750 - Begin to Fallback Center 
 tactical_forest_battle.5750.t: "Commencer au centre de repli"
 tactical_forest_battle.5750.desc: "Notre centre subit une forte pression de la part de l'ennemi et nous devons décider si nous devons tenir, battre en retraite ou contre-attaquer."
 tactical_forest_battle.5750.a: "Charge d'attaque MAA"
 tactical_forest_battle.5750.a.success: "La charge MAA interrompt l'assaut ennemi !"
 tactical_forest_battle.5750.a.failure: "La charge MAA est repoussée !"
 tactical_forest_battle.5750.b: "Charge sur le flanc gauche"
 tactical_forest_battle.5750.b.success: "La charge sur le flanc gauche soulage la pression !"
 tactical_forest_battle.5750.b.failure: "La charge sur le flanc gauche ne parvient pas à se développer !"
 tactical_forest_battle.5750.c: "Charge de retraite des chevaliers"
 tactical_forest_battle.5750.c.success: "Les chevaliers chargent tout en battant en retraite, c'est réussi !"
 tactical_forest_battle.5750.c.failure: "La charge des chevaliers échoue !"
 tactical_forest_battle.5750.d: "Les chevaliers se retirent en embuscade"
 tactical_forest_battle.5750.d.success: "L'ennemi poursuit notre embuscade !"
 tactical_forest_battle.5750.d.failure: "L'ennemi évite l'embuscade !"
 tactical_forest_battle.5750.e: "Inspirez les troupes"
 tactical_forest_battle.5750.e.success: "Les troupes sont inspirées et tiennent bon !"
 tactical_forest_battle.5750.e.failure: "L’inspiration ne parvient pas à prendre le dessus !"
  
 # Event 9251 - Enemy Is Retreating 
  
 # Event 0656 - Right Flank Reserves Intercepted 
 tactical_forest_battle.0656.t: "Réserves du flanc droit interceptées"
 tactical_forest_battle.0656.desc: "[enemy_commander.GetFirstNamePossessive] a intercepté nos réserves du flanc droit ! Nous devons décider comment répondre à cette menace."
 tactical_forest_battle.0656.a: "Poussée féroce par la gauche"
 tactical_forest_battle.0656.a.success: "La poussée féroce du flanc gauche réussit !"
 tactical_forest_battle.0656.a.failure: "La poussée du flanc gauche ne parvient pas à se développer !"
 tactical_forest_battle.0656.b: "Feindre la retraite"
 tactical_forest_battle.0656.b.success: "Une retraite feinte attire l'ennemi dans un piège !"
 tactical_forest_battle.0656.b.failure: "La retraite devient incontrôlée !"
 tactical_forest_battle.0656.c: "Inspirez les troupes"
 tactical_forest_battle.0656.c.success: "Les troupes s'inspirent et se mobilisent !"
 tactical_forest_battle.0656.c.failure: "L’inspiration tombe dans l’oreille d’un sourd !"
 tactical_forest_battle.0656.d: "Activer les réserves de droits"
 tactical_forest_battle.0656.d.success: "Les réserves de droite se retournent et contre-attaquent !"
 tactical_forest_battle.0656.d.failure: "Les réserves de droit ne peuvent pas manœuvrer !"
 tactical_forest_battle.0656.e: "Tirez en arrière et piège à leurre"
 tactical_forest_battle.0656.e.success: "L'ennemi poursuit dans notre piège !"
 tactical_forest_battle.0656.e.failure: "L'ennemi évite le piège !"
 tactical_forest_battle.0656.f: "Le flanc droit avance"
 tactical_forest_battle.0656.f.success: "Le flanc droit traverse l'ennemi !"
 tactical_forest_battle.0656.f.failure: "Le flanc droit est contenu !"
  
  
 # Event 7323 - Left Encircles (Outcomes) 
 tactical_forest_battle.7323.t: "Le flanc droit est encerclé !"
 tactical_forest_battle.7323.desc: "[left_flank_commander.GetTitledFirstName] a réussi à encercler le flanc droit de [enemy_commander.GetFirstNamePossessive] ! Des milliers de soldats ennemis sont désormais piégés, privés de retraite ou de renforts. [enemy_commander.GetTitledFirstName] regarde, impuissant, ses forces piégées face à l'anéantissement. Nous devons décider de leur sort : leur montrons-nous la miséricorde d’une reddition honorable, ou les détruisons-nous complètement à titre d’exemple ?"
 tactical_forest_battle.7323.a: "Commencez le massacre !"
 tactical_forest_battle.7323.a.success: "[left_flank_commander.GetTitledFirstName] mène l'assaut contre les forces piégées !"
 tactical_forest_battle.7323.a.failure: "Les forces piégées organisent une évasion désespérée et beaucoup s'échappent !"
 tactical_forest_battle.7323.b: "Faites des prisonniers !"
 tactical_forest_battle.7323.b.success: "Les forces piégées se rendent et deviennent prisonniers de guerre !"
 tactical_forest_battle.7323.b.failure: "De nombreuses forces piégées refusent de se rendre et se battent jusqu’à la mort !"
  
  # Event 9466 - Their Center is Shocked 
 tactical_forest_battle.9466.t: "Flanqué et confus"
 tactical_forest_battle.9466.desc: "Le centre [enemy_commander.GetTitledFirstNamePossessiveOrMy] est sous le choc ! La panique est une opportunité parfaite ! Si nous pouvons percer ici, nous pouvons nous attaquer au centre."
 tactical_forest_battle.9466.a: "Feignez une retraite et allumez-vous contre les poursuivants"
 tactical_forest_battle.9466.a.success: "[center_flank_commander.GetFullNameNicknamedPossessiveOrMy] simule une retraite et s'écrase sur son centre !"
 tactical_forest_battle.9466.a.failure: "L'ennemi se réorganise et tient bon !"
 tactical_forest_battle.9466.b: "Coordonner une charge avec nos chevaliers"
 tactical_forest_battle.9466.b.success: "Notre charge combinée s'écrase sur leur centre"
 tactical_forest_battle.9466.b.failure: "L'ennemi tient bon face à notre charge !"
 tactical_forest_battle.9466.c: "Coordonnez-vous avec nos régiments d'élite pour charger leur droit"
 tactical_forest_battle.9466.c.success: "Notre assaut combiné provoque le chaos dans leur centre !"
 tactical_forest_battle.9466.c.failure: "L'ennemi a le temps d'établir une nouvelle ligne défensive !"
 tactical_forest_battle.9466.d: "Appuyez sur l'avantage de toutes vos forces"
 tactical_forest_battle.9466.d.success: "On pousse l'attaque sur leur centre !"
 tactical_forest_battle.9466.d.failure: "L'ennemi tient malgré la pression !"
 tactical_forest_battle.9466.e: "[center_flank_commander.GetTitledFirstNameOrMeRegnal] charges difficiles à écraser leur centre !"
 tactical_forest_battle.9466.e.success: "Notre charge brise la cohésion ennemie !"
 tactical_forest_battle.9466.e.failure: "Ils tiennent bon et nous ne pouvons pas percer !"
  
 # Event .220 - Left Begins Encircle 
 tactical_forest_battle.220.t: "Le flanc gauche commence l'encerclement"
 tactical_forest_battle.220.desc: "La force [left_flank_commander.GetTitledFirstNamePossessiveOrMy] s'est infiltrée derrière les lignes ennemies. Nous devons exploiter cet avantage avant l'arrivée de [enemy_commander.GetFirstNamePossessive] renforts. Les hommes croient que bloquer l’ennemi suffisamment longtemps leur permettra d’encercler notre ennemi."
 tactical_forest_battle.220.a: "Tenaille avec flanc droit !"
 tactical_forest_battle.220.a.success: "[left_flank_commander.GetTitledFirstName] et notre flanc droit coordonnent un mouvement de tenaille dévastateur !"
 tactical_forest_battle.220.a.failure: "La coordination entre les flancs est rompue et l'ennemi échappe à la pince !"
 tactical_forest_battle.220.b: "Envoyez nos chevaliers pour les occuper !"
 tactical_forest_battle.220.b.success: "Nos chevaliers sont engagés, les distrayant des ennemis environnants !"
 tactical_forest_battle.220.b.failure: "L'ennemi voit la force encerclant !"
 tactical_forest_battle.220.c: "Envoyez nos unités de crack pour les occuper"
 tactical_forest_battle.220.c.success: "Nos unités d'élite engagent le combat avec l'ennemi, permettant ainsi à l'encerclement de se poursuivre !"
 tactical_forest_battle.220.c.failure: "L'ennemi se regroupe et repousse nos unités !"
 tactical_forest_battle.220.d: "Formez une enclume pendant que les forces qui fuient attaquent par derrière"
 tactical_forest_battle.220.d.success: "[center_flank_commander.GetTitledFirstName] le flanc droit est écrasé entre deux forces !"
 tactical_forest_battle.220.d.failure: "Leur droite tient bon pour le moment !"
 tactical_forest_battle.220.e: "Inspirez nos troupes à combattre plus fort jusqu'à ce que l'encerclement soit terminé"
 tactical_forest_battle.220.e.success: "[center_flank_commander.GetTitledFirstName] le flanc droit est écrasé entre deux forces !"
 tactical_forest_battle.220.e.failure: "Leur droite tient bon pour le moment !"
  
  
