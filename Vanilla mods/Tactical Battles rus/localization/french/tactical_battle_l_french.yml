 # EVENT 8010 - Broken Left Flank Exposed Center 
 # ============================================ 
 tactical_forest_battle.8010.t: "Centre exposé !"
 tactical_forest_battle.8010.desc: "Ce qui reste du flanc gauche [enemy_commander.GetFirstNamePossessive] bat en retraite ! Nous avons une opportunité cruciale de les poursuivre et de les détruire avant qu’ils ne puissent se regrouper !"
 tactical_forest_battle.8010.a: "Allumez le flanc de leur centre"
 tactical_forest_battle.8010.a.success: "[right_flank_commander.GetFirstNameNicknamedPossessiveOrMyRegnal] se retourne et se dirige vers le flanc de son centre !"
 tactical_forest_battle.8010.a.failure: "Le flanc droit s’enlise"
 tactical_forest_battle.8010.b: "Capturer des prisonniers"
 tactical_forest_battle.8010.b.success: "Nous capturons de nombreux prisonniers !"
 tactical_forest_battle.8010.b.failure: "Les prisonniers s'échappent !"
 tactical_forest_battle.8010.c: "Envoyez les chevaliers s'écraser sur le flanc exposé de leur centre."
 tactical_forest_battle.8010.c.success: "La charge des chevaliers fait des ravages"
 tactical_forest_battle.8010.c.failure: "La charge des chevaliers est absorbée"
 tactical_forest_battle.8010.d: "Envoyez nos unités d'élite d'élite s'écraser sur le flanc exposé de leur centre."
