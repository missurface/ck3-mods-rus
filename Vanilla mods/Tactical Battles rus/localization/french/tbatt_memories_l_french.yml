l_french:
  
 right_commander_feign_broke: "Ils ont brisé leur gauche"
 right_commander_feign_broke_first: "Au cours de la [ROOT.Var('fighting_war').War.GetName] contre [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], j'ai dirigé le flanc droit lors de la « Bataille de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip] ». J'ai lancé une attaque surprise suite à une feinte retraite tactique, perçant le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal]."
 right_commander_feign_broke_01_first: "Durant la [ROOT.Var('fighting_war').War.GetName] contre [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], j'ai commandé le flanc droit lors de la 'Bataille de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip]'. J'ai lancé un assaut surprise après une feinte retraite stratégique, brisant le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal]."
 right_commander_feign_broke_02_first: "Alors que j'étais engagé dans le [ROOT.Var('fighting_war').War.GetName] contre [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], j'étais aux commandes du flanc droit lors de la « Bataille de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip] ». J'ai exécuté une offensive surprise après une feinte retraite calculée, dévastant le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal]."
 right_commander_feign_broke_second: "Alors que vous combattez dans la guerre pour [fighting_war.GetName] contre [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], vous menez une retraite simulée qui a mis en déroute le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal] lors de la bataille de [battle_location.GetProvince.GetName]."
 right_commander_feign_broke_third: "Alors qu'il combattait pour [fighting_war.GetName] contre [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], [ROOT.GetTitledFirstName] a mené une feinte retraite qui a mis en déroute le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal] lors de la bataille de [battle_location.GetProvince.GetNameNoTooltip]."
  
  
 right_commander_charge_broke: "Charge féroce"
 right_commander_charge_broke_first: "Durant la [ROOT.Var('fighting_war').War.GetName] contre [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], j'ai commandé le flanc droit lors de la 'Bataille de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip]'. J'ai mené la charge féroce qui a brisé le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal]"
 right_commander_charge_broke_nk_first: "J'ai mené la charge féroce qui a brisé le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal] lors de la « Bataille de [ROOT.Var('battle_location').GetProvince.GetBaronyNameExplicitly] »."
 right_commander_charge_broke_01_first: "Alors que j'étais engagé dans le [ROOT.Var('fighting_war').War.GetName] contre [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], j'étais aux commandes du flanc droit lors de la « Bataille de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip] ». J'ai mené une puissante charge qui a décimé le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal]."
 right_commander_charge_broke_nk1_first: "Alors que je commandais le flanc droit lors de la « Bataille de [ROOT.Var('battle_location').GetProvince.GetBaronyNameExplicitly] », j'ai mené une puissante charge qui a décimé le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal]."
 right_commander_charge_broke_02_first: "Au cours de la [ROOT.Var('fighting_war').War.GetName] contre [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], j'ai dirigé le flanc droit lors de la « Bataille de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip] ». J'ai mené une charge incessante qui a submergé le flanc gauche de [enemy_commander.GetFullNameNicknamedOrMeRegnal]."
