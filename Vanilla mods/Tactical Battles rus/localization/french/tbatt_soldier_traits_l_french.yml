 # Huscarl 
 trait_tbat_soldier_huscarl: "Capitaine Huscarl"
 tbat_soldier_huscarl_desc: "Ce soldat a été promu au sein d'une unité d'élite de Huscarls après avoir joué un rôle déterminant dans le succès d'un régiment au combat. Leur présence au combat incite ceux qui les entourent à de plus grands faits d’armes."
