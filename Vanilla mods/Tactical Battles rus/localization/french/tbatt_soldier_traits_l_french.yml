 tbat_soldier_conrois_desc: "Ce soldat a été promu d'une unité d'élite de Conrois après avoir joué un rôle déterminant dans le succès d'un régiment au combat. Leur présence au combat incite ceux qui les entourent à de plus grands faits d’armes."
 trait_tbat_soldier_conrois_character_desc: "[ROOT.Char.GetFullNameNicknamedOrMe] a été promu dans une unité d'élite de Conrois après avoir joué un rôle déterminant dans le succès d'un régiment au combat. Leur présence au combat incite ceux qui les entourent à de plus grands faits d’armes."
  
