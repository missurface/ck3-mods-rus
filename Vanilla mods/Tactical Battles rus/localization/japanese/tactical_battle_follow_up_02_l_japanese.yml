 tactical_outnumbered_lands.tt: "Success in [battle_location.GetName]"  <"[battle_location.GetName] で成功しました">  #NT!
 tactical_outnumbered_lands.tt.success: "[this.GetFirstName] was about to defeat [enemy_commander.GetFirstName] in [battle_location.GetName] despite beihng outnumbered! [this.GetFirstName] has proven to be a brilliant commander and has earned the respect of all who witnessed the battle."  <"[this.GetFirstName] は多勢に無勢にもかかわらず、[battle_location.GetName] で [enemy_commander.GetFirstName] を倒そうとしていました! [this.GetFirstName] は優秀な指揮官であることが証明され、戦闘を目撃したすべての人々の尊敬を集めました。">  #NT!
  
  # tactical_forest_battle.9416 - Harrying left flank, enemy bleeding 
 tactical_forest_battle.9416.t: "Their Left Is Bleeding!"  <"彼らの左翼は血を流している！">  #NT!
 tactical_forest_battle.9416.desc: "[enemy_commander.GetFirstNamePossessive] forces are reeling from our hit-and-run tactics. Their left flank is severely depleted and their wounded are slowing their movements. We must act quickly to capitalize on their weakness before they can reorganize."  <"[enemy_commander.GetFirstNamePossessive] 部隊は私たちの一撃離脱戦術に動揺しています。彼らの左脇腹はひどく消耗しており、負傷者は動きが鈍くなっている。彼らが組織を再編する前に、私たちは彼らの弱点を突くために迅速に行動しなければなりません。">  #NT!
 tactical_forest_battle.9416.a: "Coordinate a charge with our elite crack units"  <"当社の精鋭クラック部隊と連携して突撃を行う">  #NT!
 tactical_forest_battle.9416.a.success: "Our elite units sweep through their left flank, sending them into disarray!"  <"我が精鋭部隊が彼らの左翼を掃討し、彼らを混乱に陥れます！">  #NT!
 tactical_forest_battle.9416.a.failure: "The charge is unable to break through their stubborn defense!"  <"突撃は頑固な守備を突破できない！">  #NT!
 tactical_forest_battle.9416.b: "Coordinate a charge with our knights"  <"騎士たちと突撃を調整する">  #NT!
 tactical_forest_battle.9416.b.success: "Our knights smash into the weakened enemy left, sending them into disarray!"  <"我らが騎士団が弱体化した敵左翼に激突し、混乱に陥れる！">  #NT!
 tactical_forest_battle.9416.b.failure: "The assault smashes into the weakened enemy left, sending them into disarray!"  <"攻撃は弱体化した敵左翼を打ち破り、混乱に陥る！">  #NT!
 tactical_forest_battle.9416.c: "The charge is unable to break through their stubborn defense!"  <"突撃は頑固な守備を突破できない！">  #NT!
 tactical_forest_battle.9416.c.success: "Our left flank drive scatters the weakened enemy!"  <"我らの左翼機動が弱体化した敵を蹴散らす！">  #NT!
 tactical_forest_battle.9416.c.failure: "They maintain formation despite their losses!"  <"負けてもフォーメーションを維持！">  #NT!
 tactical_forest_battle.9416.d: "Feign a retreat a turn on them"  <"退却したふりをして彼らに敵対する">  #NT!
 tactical_forest_battle.9416.d.success: "The enemy falls for our deception and pursues into an unexpected strike!"  <"敵は私たちの欺瞞に陥り、予期せぬ攻撃を仕掛けてきます!">  #NT!
 tactical_forest_battle.9416.d.failure: "They see through our deception and maintain their formation!!"  <"彼らは我々の欺瞞を見抜き、隊列を維持する!!">  #NT!
 tactical_forest_battle.9416.e: "Press the advantage"  <"利点を押してください">  #NT!
 tactical_forest_battle.9416.e.success: "Their left flank is crumbling under the immense pressure!"  <"巨大なプレッシャーに彼らの左翼は崩れ去る！">  #NT!
 tactical_forest_battle.9416.e.failure: "They maintain formation despite their losses!"  <"負けてもフォーメーションを維持！">  #NT!
  
  
