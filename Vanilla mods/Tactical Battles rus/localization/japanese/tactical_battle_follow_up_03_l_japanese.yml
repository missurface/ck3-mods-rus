 tactical_forest_battle.0651.t: "リザーブが強化される"  #NT!
 tactical_forest_battle.0651.desc: "増援が彼らの右翼を強化するために到着し、我々の左翼の前進を鈍らせる恐れがあった。攻撃の勢いを維持するには迅速に行動しなければなりません。"  #NT!
 tactical_forest_battle.0651.a: "左サイドが猛プッシュを開始"  #NT!
 tactical_forest_battle.0651.a.success: "彼らの援軍は太刀打ちできない"  #NT!
 tactical_forest_battle.0651.a.failure: "増援が電荷を吸収する"  #NT!
 tactical_forest_battle.0651.b: "精鋭部隊を派遣して戦いに突撃させましょう"  #NT!
 tactical_forest_battle.0651.b.success: "精鋭部隊のサポートで左突破可能！"  #NT!
 tactical_forest_battle.0651.b.failure: "エリートのサポートがあってもプッシュは失敗します。"  #NT!
 tactical_forest_battle.0651.c: "増援を打ち破るために騎士を派遣する"  #NT!
 tactical_forest_battle.0651.c.success: "我らの連合軍が援軍を突破せよ！"  #NT!
 tactical_forest_battle.0651.c.failure: "騎士団は突破できない！"  #NT!
 tactical_forest_battle.0651.d: "退却を装い、追撃する敵を攻撃する"  #NT!
 tactical_forest_battle.0651.d.success: "敵は不意を突かれます！"  #NT!
 tactical_forest_battle.0651.d.failure: "彼らの右翼はすぐに組織を立て直し、我々の突撃を吸収した！"  #NT!
 tactical_forest_battle.0651.e: "消耗した右翼に猛突進する"  #NT!
 tactical_forest_battle.0651.e.success: "敵の右翼は我らの攻撃により崩壊する！"  #NT!
 tactical_forest_battle.0651.e.failure: "敵の抵抗により突撃が鈍くなってしまう！"  #NT!
  
 tactical_forest_battle.0018.t: "敵の注意が逸れる"  #NT!
 tactical_forest_battle.0018.desc: "我が右翼は敵中央の注意をそらすことに成功しました！彼らは混乱し、混乱しています。私たちはこの利点を直ちに活用しなければなりません。"  #NT!
 tactical_forest_battle.0018.a: "騎兵隊が気を散らした中央部に突撃する"  #NT!
 tactical_forest_battle.0018.a.success: "騎兵隊が混乱した敵中枢を打ち破る！"  #NT!
 tactical_forest_battle.0018.a.failure: "敵の抵抗の前に突撃は失敗します！"  #NT!
 tactical_forest_battle.0018.b: "歩兵による中央部への総攻撃"  #NT!
 tactical_forest_battle.0018.b.success: "歩兵の突撃で中央突破！"  #NT!
 tactical_forest_battle.0018.b.failure: "攻撃は撃退されました！"  #NT!
 tactical_forest_battle.0018.c: "混乱を利用してMAAを送信"  #NT!
 tactical_forest_battle.0018.c.success: "MAA部隊は混乱を利用して突破口を開く！"  #NT!
 tactical_forest_battle.0018.c.failure: "MAA はこの混乱を利用することはできません。"  #NT!
  
 tactical_forest_battle.9434.t: "ナイツ・アット・ザ・レディ"  #NT!
 tactical_forest_battle.9434.desc: "私たちの騎士は戦いの流れを変える上で極めて重要であることがわかります。重要な選択は彼らをどこに送るかです。"  #NT!
 tactical_forest_battle.9434.a: "我らが騎士団は左翼から攻撃を仕掛ける"  #NT!
 tactical_forest_battle.9434.a.success: "[enemy_commander.GetFirstNamePossessive] 右側面に大きな圧力がかかっています"  #NT!
 tactical_forest_battle.9434.a.failure: "騎士団は突破できない"  #NT!
 tactical_forest_battle.9434.b: "我が騎士団は右翼から攻撃を仕掛ける"  #NT!
 tactical_forest_battle.9434.b.success: "[enemy_commander.GetFirstNamePossessive] 左側面に大きな圧力がかかっています"  #NT!
 tactical_forest_battle.9434.b.failure: "騎士団は突破できない"  #NT!
 tactical_forest_battle.9434.c: "敵の右翼を一撃離脱する"  #NT!
 tactical_forest_battle.9434.c.success: "彼らの脇腹は血を流しています！"  #NT!
 tactical_forest_battle.9434.c.failure: "彼らの方針は保たれています！"  #NT!
 tactical_forest_battle.9434.d: "敵の左翼を一撃離脱する"  #NT!
 tactical_forest_battle.9434.d.success: "彼らの脇腹は血を流しています！"  #NT!
 tactical_forest_battle.9434.d.failure: "彼らの方針は保たれています！"  #NT!
 tactical_forest_battle.9434.e: "左側に隠れた側面を作成します"  #NT!
 tactical_forest_battle.9434.e.success: "我らの隠れた側面が敵の不意を突く！"  #NT!
 tactical_forest_battle.9434.e.failure: "隠れていた側面が発見されました！"  #NT!
 tactical_forest_battle.9434.f: "右側に隠れた側面を作成します"  #NT!
 tactical_forest_battle.9434.f.success: "我らの隠れた側面が敵の不意を突く！"  #NT!
 tactical_forest_battle.9434.f.failure: "隠れていた側面が発見されました！"  #NT!
  
 tactical_forest_battle.9328.t: "右側の隠れた側面に気づかない"  #NT!
 tactical_forest_battle.9328.desc: "我々は撤退して敵を誘い込む計画で右側面を弱体化させた。我々の隠れた側面は気付かれず、押し寄せる左側側面の背後に隠れている。迅速に行動すれば、決定的な打撃を与えることができます。"  #NT!
 tactical_forest_battle.9328.a: "現れて露出した側面に激突する"  #NT!
 tactical_forest_battle.9328.a.success: "隠れた側面が強力に攻撃し、敵を気づかせません"  #NT!
 tactical_forest_battle.9328.a.failure: "敵は私たちの隠れた側面を発見し、準備を整えています。"  #NT!
 tactical_forest_battle.9328.b: "隠れた側面で敵を包囲してみてください"  #NT!
 tactical_forest_battle.9328.b.success: "我らの騎士たちが現れ、敵を包囲し始める！"  #NT!
 tactical_forest_battle.9328.b.failure: "騎士団は戦闘に泥沼化！"  #NT!
  
  
 tactical_forest_battle.9329.t: "左側の隠れた側面に気づかない"  #NT!
 tactical_forest_battle.9329.desc: "我々は後退して敵を誘い込む計画で左側を弱体化させた。我々の隠れた側面は気付かれず、押し寄せる右側の背後に隠れている。迅速に行動すれば、決定的な打撃を与えることができます。"  #NT!
 tactical_forest_battle.9329.a: "現れて露出した側面に激突する"  #NT!
 tactical_forest_battle.9329.a.success: "右翼は気づかれずに再編に奔走する！"  #NT!
 tactical_forest_battle.9329.a.failure: "が私たちの負担を吸収します"  #NT!
 tactical_forest_battle.9329.b: "隠れた側面で敵を包囲してみてください"  #NT!
 tactical_forest_battle.9329.b.success: "騎士団が破壊的な突撃を繰り出し、戦いに勝利します!"  #NT!
 tactical_forest_battle.9329.b.failure: "騎士団は撃退されました！"  #NT!
  
 tactical_forest_battle.9465.t: "左側の誤ったギャップを突撃しました"  #NT!
 tactical_forest_battle.9465.desc: "[enemy_commander.GetFirstNameNoTooltip] が餌を取って、私たちが左側面に作った誤った隙間に突撃してきました。彼らの左翼は今露出しており、脆弱です。彼らが回復する前に、私たちはこの機会を利用するために迅速に行動しなければなりません。"  #NT!
 tactical_forest_battle.9465.a: "我が精鋭精鋭部隊を派遣して、露出した右翼を突撃させる"  #NT!
 tactical_forest_battle.9465.a.success: "我が精鋭部隊が陣形を崩しながら右翼を掃討中！"  #NT!
 tactical_forest_battle.9465.a.failure: "彼らの権利は、私たちのエリートの攻撃に対して根拠を持っています!"  #NT!
 tactical_forest_battle.9465.b: "騎士を送って右翼を突破させよう"  #NT!
 tactical_forest_battle.9465.b.success: "我らの騎士たちの突撃が彼らの右翼を粉砕し、彼らを混乱に陥れる！"  #NT!
 tactical_forest_battle.9465.b.failure: "攻撃は彼らの右翼を打ち破り、彼らを混乱に陥らせます！"  #NT!
 tactical_forest_battle.9465.c: "左翼が陣形を崩すために突撃する"  #NT!
 tactical_forest_battle.9465.c.success: "[left_flank_commander.GetFullNameNicknamedOrMe] 突撃して側面を混乱させましょう!"  #NT!
 tactical_forest_battle.9465.c.failure: "彼らの権利は堅固であり、破られることを拒否しました。"  #NT!
 tactical_forest_battle.9465.d: "偽りの撤退を実行し、彼らを攻撃します"  #NT!
 tactical_forest_battle.9465.d.success: "敵は私たちの欺瞞に陥り、追撃してきます！"  #NT!
 tactical_forest_battle.9465.d.failure: "彼らは私たちの欺瞞を見抜き、その陣形を維持しているのです！"  #NT!
 tactical_forest_battle.9465.e: "利点を押してください"  #NT!
 tactical_forest_battle.9465.e.success: "容赦ない攻撃に敵は崩れ去る！"  #NT!
 tactical_forest_battle.9465.e.failure: "敵の予備軍が戦線を強化するために到着します！"  #NT!
 tactical_forest_battle.9465.f: "中央の予備を打ち破って包囲する"  #NT!
 tactical_forest_battle.9465.f.success: "私たちの中央は戦闘を解除し、敵を包囲する位置にいます！"  #NT!
 tactical_forest_battle.9465.f.failure: "私たちのセンター予備は解放できません!"  #NT!
