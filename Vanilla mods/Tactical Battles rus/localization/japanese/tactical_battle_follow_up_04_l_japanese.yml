 tactical_forest_battle.9420.c: "右の予備選手を左の補強に送る"  #NT!
 tactical_forest_battle.9420.c.success: "右のリザーブが到着して左が安定します！"  #NT!
 tactical_forest_battle.9420.c.failure: "権利リザーブの補強が間に合わない！"  #NT!
 tactical_forest_battle.9420.d: "左は必死の突撃を開始する"  #NT!
 tactical_forest_battle.9420.d.success: "彼らの左は突撃に驚いた！"  #NT!
 tactical_forest_battle.9420.d.failure: "左がしっかりと構えて攻撃を仕掛ける"  #NT!
