 tactical_forest_battle.6324.t:0 "Flanked and Confused 
 tactical_forest_battle.6324.desc: "我々の側面作戦の後、彼らの左翼は方向感覚を失った。この混乱を利用して、中央を回転させて攻撃し、サイドが攻撃を仕掛けることができます。"  #NT!
 tactical_forest_battle.6324.a: "サイドを回って中央を攻撃する"  #NT!
 tactical_forest_battle.6324.a.success: "彼らの中心は不意を突かれた！"  #NT!
 tactical_forest_battle.6324.a.failure: "我が軍は行き詰まってしまった！"  #NT!
 tactical_forest_battle.6324.b: "騎士を派遣して左翼を破壊する"  #NT!
 tactical_forest_battle.6324.b.success: "私たちの騎士たちは仲間内で大混乱を引き起こします！"  #NT!
 tactical_forest_battle.6324.b.failure: "我らの騎士たちは泥沼にはまってしまった！"  #NT!
 tactical_forest_battle.6324.c: "我々の精鋭部隊を派遣して彼らの左翼を突破せよ"  #NT!
 tactical_forest_battle.6324.c.success: "我が精鋭部隊が左翼全体に大混乱を引き起こす！"  #NT!
 tactical_forest_battle.6324.c.failure: "私たちの部隊は突破できません!"  #NT!
 tactical_forest_battle.6324.d: "混乱したラインを攻撃する"  #NT!
 tactical_forest_battle.6324.d.success: "我らの右翼が混乱した戦列に激突！"  #NT!
 tactical_forest_battle.6324.d.failure: "私たちの突撃は撃退されました！"  #NT!
 tactical_forest_battle.6324.e: "アドバンテージを押してラリーする"  #NT!
 tactical_forest_battle.6324.e.success: "部隊が結集して攻撃を開始します！"  #NT!
 tactical_forest_battle.6324.e.failure: "彼らのラインが再編されます！"  #NT!
 tactical_forest_battle.6324.f: "退却を装い、左翼を狙う"  #NT!
 tactical_forest_battle.6324.f.success: "彼らは私たちのフェイントを追って、私たちの罠に侵入します！"  #NT!
 tactical_forest_battle.6324.f.failure: "彼らのラインが再編されます！"  #NT!
  
  
 tactical_forest_battle.9420.t: "敵が左翼攻撃を開始"  #NT!
