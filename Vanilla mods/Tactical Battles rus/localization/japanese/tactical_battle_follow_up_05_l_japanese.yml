 tactical_forest_battle.9453.t: "右の円"  #NT!
 tactical_forest_battle.9453.desc: "[enemy_commander.GetFirstNamePossessive]右翼を包囲することに成功しました！彼らは閉じ込められ、破滅に直面しています。必殺の一撃を与えなければなりません！"  #NT!
 tactical_forest_battle.9453.a: "包囲された軍隊の虐殺を開始する"  #NT!
 tactical_forest_battle.9453.a.success: "包囲された部隊は皆殺しにされる！"  #NT!
 tactical_forest_battle.9453.a.failure: "包囲された部隊が脱出する！"  #NT!
 tactical_forest_battle.9453.b: "捕虜を取る"  #NT!
 tactical_forest_battle.9453.b.success: "多くの捕虜を捕らえます！"  #NT!
 tactical_forest_battle.9453.b.failure: "捕虜が逃げ出す！"  #NT!
  
 tactical_forest_battle.9473.t: "ラリー・アーミー"  #NT!
 tactical_forest_battle.9473.desc: "戦いはさらに激化！私たちの軍隊には、敵の激しい抵抗を押し切るためのインスピレーションが必要です!"  #NT!
 tactical_forest_battle.9473.a: "決定的な攻撃を呼びかける"  #NT!
 tactical_forest_battle.9473.a.success: "陸軍は決定的な攻撃を開始します！"  #NT!
 tactical_forest_battle.9473.a.failure: "ストライキは実現しない！"  #NT!
 tactical_forest_battle.9473.b: "より良い地面のために位置を変更する"  #NT!
 tactical_forest_battle.9473.b.success: "より良い地面に強制的に位置を変更します!"  #NT!
 tactical_forest_battle.9473.b.failure: "再配置に失敗します。"  #NT!
 tactical_forest_battle.9473.c: "予備の援軍を送る"  #NT!
 tactical_forest_battle.9473.c.success: "リザーブでラインを強化！"  #NT!
 tactical_forest_battle.9473.c.failure: "予約が遅れています！"  #NT!
 tactical_forest_battle.9473.d: "敵中央への突撃を先導する"  #NT!
 tactical_forest_battle.9473.d.success: "センターへのチャージ成功！"  #NT!
 tactical_forest_battle.9473.d.failure: "チャージは弾かれる！"  #NT!
  
 tactical_forest_battle.7220.t: "左が囲み始めます"  #NT!
 tactical_forest_battle.7220.desc: "我が左翼は敵を包囲する作戦を開始した！この包囲を完了できれば、彼らを罠にはめて破壊することができます!"  #NT!
 tactical_forest_battle.7220.a: "包囲を完了する"  #NT!
 tactical_forest_battle.7220.a.success: "包囲網を完成させます！"  #NT!
 tactical_forest_battle.7220.a.failure: "敵が暴れ出す！"  #NT!
 tactical_forest_battle.7220.b: "騎士たちを送って彼らを定位置に留めてください"  #NT!
 tactical_forest_battle.7220.b.success: "我らの騎士が敵を阻止する！"  #NT!
 tactical_forest_battle.7220.b.failure: "敵が突破してきました！"  #NT!
 tactical_forest_battle.7220.c: "敵をその場に留めるために私たちの優秀なユニットを送ってください！"  #NT!
 tactical_forest_battle.7220.c.success: "敵は撤退できません！"  #NT!
 tactical_forest_battle.7220.c.failure: "敵が包囲を突破！"  #NT!
 tactical_forest_battle.7220.d: "左が囲みながら中央で失速させる"  #NT!
 tactical_forest_battle.7220.d.success: "敵は撤退できません！"  #NT!
 tactical_forest_battle.7220.d.failure: "敵は罠から逃れる！"  #NT!
 tactical_forest_battle.7220.e: "部隊が包囲している間、部隊を結集させて前線を維持する"  #NT!
 tactical_forest_battle.7220.e.success: "敵は撤退できません！"  #NT!
 tactical_forest_battle.7220.e.failure: "敵は罠から逃れる！"  #NT!
  
  
