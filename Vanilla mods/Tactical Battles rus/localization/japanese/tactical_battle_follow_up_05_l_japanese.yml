 tactical_forest_battle.6310.t: "罠が仕掛けられた！"  #NT!
 tactical_forest_battle.6310.desc: "[right_flank_commander.GetTitledFirstNamePossessive]フェイントが完璧に効きました！ [enemy_commander.GetFirstNamePossessive] の保留命令はかき消され、[enemy_commander.GetHerHis] 前衛が陣形を崩して餌を取りました。彼らの戦列の左側は今や薄く伸びており、組織化されていない。"  #NT!
 tactical_forest_battle.6310.a: "[right_flank_commander.GetTitledFirstName] が混乱した軍隊を私たちの優秀な部隊の罠に導きます"  #NT!
 tactical_forest_battle.6310.a.success: "[enemy_commander.GetFirstNamePossessive] の右側が[right_flank_commander.GetFirstNamePossessive] の逃走部隊に続き、待ち伏せに突入します!"  #NT!
 tactical_forest_battle.6310.a.failure: "右派は餌には応じない！"  #NT!
 tactical_forest_battle.6310.b: "騎士を派遣して、彼らの伸びすぎた側面を粉砕しましょう"  #NT!
 tactical_forest_battle.6310.b.success: "騎士たちは敵のむき出しの側面に激突し、陣形を崩す！"  #NT!
 tactical_forest_battle.6310.b.failure: "敵はすぐに組織を再編成し、私たちの騎士に攻撃を仕掛けます"  #NT!
 tactical_forest_battle.6310.c: "[left_flank_commander.GetTitledFirstNamePossessive] の側面から部隊を打ち破り、おびき寄せられたユニットを包囲します"  #NT!
 tactical_forest_battle.6310.c.success: "[right_flank_commander.GetTitledFirstName] は敵部隊を包囲し、退路を断ち切ることに成功しました!"  #NT!
 tactical_forest_battle.6310.c.failure: "敵は消耗した我が国の右翼に壊滅的な突撃を仕掛ける"  #NT!
 tactical_forest_battle.6310.d: "[center_flank_commander.GetFirstNamePossessive] リザーブを回転させて、おびき寄せられたユニットを取り囲みます"  #NT!
 tactical_forest_battle.6310.d.success: "予備軍は素早く移動し、包囲できる位置にある"  #NT!
 tactical_forest_battle.6310.d.failure: "[enemy_commander.GetFirstNamePossessive] は私たちの消耗した中心を認識します!"  #NT!
 tactical_forest_battle.6310.e: "フルチャージで誘惑されたユニットを方向転換して倒す"  #NT!
 tactical_forest_battle.6310.e.success: "フルチャージで敵の意表を突く！"  #NT!
 tactical_forest_battle.6310.e.failure: "敵は毅然とした態度を保ち、我々の突撃を撃退します！"  #NT!
  
  
 tactical_forest_battle.7320.t: "敵は我々の前線の背後に強力に立つ"  #NT!
 tactical_forest_battle.7320.desc: "[enemy_commander.GetFirstNamePossessive] 部隊が結集し、我々の後方で戦列を再編成しました。彼らは今、より深く掘り下げられ、我々の前線に背を向け、その陣形を強化している。私たちは彼らにプレスを続けるか、それとも戦術を変更するかを決断しなければなりません。"  #NT!
 tactical_forest_battle.7320.a: "精鋭部隊を率いて突撃を送り、側面を攻撃しましょう"  #NT!
 tactical_forest_battle.7320.a.success: "私たちの特殊部隊は彼らに気づかれずに彼らの戦線を一掃します!"  #NT!
 tactical_forest_battle.7320.a.failure: "我が精鋭部隊は堅守を突破できない！"  #NT!
 tactical_forest_battle.7320.b: "側面を攻撃するために騎士を送ります"  #NT!
 tactical_forest_battle.7320.b.failure: "騎士団が敵の予備軍に迎撃される！"  #NT!
 tactical_forest_battle.7320.c: "中央の予備を打ち破って後方を粉砕する"  #NT!
 tactical_forest_battle.7320.c.success: "我がセンターの予備兵が彼らの後方に激突し、大混乱を引き起こした！"  #NT!
 tactical_forest_battle.7320.c.failure: "突然のプッシュにより、センターの予備軍が離脱できなくなりました。"  #NT!
 tactical_forest_battle.7320.d: "右のリザーブを振り切って後方を粉砕する"  #NT!
 tactical_forest_battle.7320.d.success: "我がセンターの予備兵が彼らの後方に激突し、大混乱を引き起こした！"  #NT!
 tactical_forest_battle.7320.d.failure: "突然のプッシュにより、センターの予備軍が離脱できなくなりました。"  #NT!
 tactical_forest_battle.7320.e: "退却したふりをして追手を迎え撃つ"  #NT!
 tactical_forest_battle.7320.e.success: "敵は私たちの欺瞞に陥り、予期せぬ攻撃を仕掛けてきます!"  #NT!
 tactical_forest_battle.7320.e.failure: "敵は露出した中心部に後退します！"  #NT!
  
