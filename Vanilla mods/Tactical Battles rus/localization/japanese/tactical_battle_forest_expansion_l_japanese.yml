 # Huscarl 
 trait_tbat_soldier_huscarl: "Huscarl Captain"  <"ハスカール船長">  #NT!
 tbat_soldier_huscarl_desc: "This soldier was promoted from an elite unit of Huscarls after proving instrumental of a regiment's success in battle. Their presence in battle inspires those around them to greater feats of arms."  <"この兵士は、連隊の戦闘での成功に貢献した後、ハスカールのエリート部隊から昇進しました。戦いにおける彼らの存在は、周囲の人々にさらなる武功へのインスピレーションを与えます。">  #NT!
