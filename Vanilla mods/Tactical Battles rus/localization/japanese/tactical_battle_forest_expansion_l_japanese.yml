 tactical_home_lands_fighter_2_desc: "This character's prowess in battle has been honed by fighting within the borders of where they rule. Defending their lands they have become knowledgeable of the home terrain."  <"このキャラクターの戦闘能力は、彼らが統治する境界内で戦うことで磨かれてきました。自分たちの土地を守ることで、彼らは故郷の地形について詳しくなりました。">  #NT!
  
