l_korean:
  
  
 game_concept_captain_trait_concept: "Captain Trait"  <"キャプテンの特徴">  #NT!
 game_concept_captain_trait_concept_desc: "Captain Traits are traits given to men recruited from a squad of men-at-arms. During battle when using an option that involves men-at-arms, if successful, there is a chance to recruit a commander with a special Captain Trait after battle. These traits provide various bonuses to your army during battles\n\n Examples are: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"  <"キャプテンの特性は、武装部隊から採用された兵士に与えられる特性です。戦闘中に兵士を伴うオプションを使用する場合、成功すると、戦闘後に特別なキャプテン特性を持つ指揮官を雇用するチャンスがあります。これらの特性は、戦闘中に軍隊にさまざまなボーナスをもたらします\n\n 例: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)]、[GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)]、[GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)]、[GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]">  #NT!
 game_concept_player_title_concept: " player"  <"プレーヤー">  #NT!
 game_concept_player_title_concept_desc: "Captain Traits are traits given to men recruited from a squad of men-at-arms. During battle when using an option that involves men-at-arms, if successful, there is a chance to recruit a commander with a special Captain Trait after battle. These traits provide various bonuses to your army during battles\n\n Examples are: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"  <"キャプテンの特性は、武装部隊から採用された兵士に与えられる特性です。戦闘中に兵士を伴うオプションを使用する場合、成功すると、戦闘後に特別なキャプテン特性を持つ指揮官を雇用するチャンスがあります。これらの特性は、戦闘中に軍隊にさまざまなボーナスをもたらします\n\n 例: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)]、[GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)]、[GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)]、[GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]">  #NT!
  
 tactical_forest_battle.0498.t: "A Celebrated Soldier"  <"有名な兵士">  #NT!
 tactical_forest_battle.0498.desc: "After getting a report on our recent battle, my officers informed me that one of our soldiers from an elite regiment of [chosen_unit.GetName] had performed admirably in the thick of the fighting. Taking [commander.GetHerHim] into my service could inspire the other men."  <"私たちの最近の戦いについて報告を受けた後、私の士官は、[chosen_unit.GetName] の精鋭連隊の兵士の 1 人が戦闘の最中に見事な活躍をしたと私に知らせてくれました。 [commander.GetHerHim] を私の奉仕に参加させれば、他の男性たちに刺激を与えることができるでしょう。">  #NT!
 tactical_forest_battle.0498.a: "Recruit [commander.GetName] into my service. ([commander.GetFirstName] gains a [captain_trait_concept|e])"  <"[commander.GetName] を私のサービスに採用してください。 ([commander.GetFirstName] は [captain_trait_concept|e] を獲得します)">  #NT!
 tactical_forest_battle.0498.b: "I'll think on it."  <"考えてみます。">  #NT!
  
