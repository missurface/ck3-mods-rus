 # Event 0210 - Cavalry Feint FAILURE Follow-up: Feint Unmasked 
 tactical_forest_battle.0210.t: "フェイント・アンマスクド！"  #NT!
 tactical_forest_battle.0210.desc: "[enemy_commander.GetTitledFirstName] は私たちの騎兵のフェイントを見破りました!彼らの軍隊は追撃する代わりに規律を保ち、今では我が国の騎兵は、武装した歩兵、ミサイルの一斉射撃、または待ち伏せして待っている対騎兵に直面しています。戦術的な状況は私たちに不利になりました。私はこの惨事をどうやって解決するかを決めなければなりません。"  #NT!
 tactical_forest_battle.0210.a: "罠を突き抜けろ！全てをチャージしてください！ (武闘+勇気 vs [enemy_commander.GetShortUINameNoTooltip]、非常に危険)"  #NT!
 tactical_forest_battle.0210.a.success: "あらゆる予想に反して、私たちの大胆な行動が彼らの陣形を打ち破ります！私たちの必死の突撃に敵はよろめきます！"  #NT!
 tactical_forest_battle.0210.a.failure: "突撃は壊滅的な惨敗に終わる。我らの騎兵隊は散り散りに砕け散った！"  #NT!
 tactical_forest_battle.0210.b: "降りてラインを保持してください！ (歩兵の支援が必要)"  #NT!
 tactical_forest_battle.0210.c: "騎兵隊で退却を阻止します。 (軍を救うために騎兵を犠牲にする)"  #NT!
 tactical_forest_battle.0210.d: "個人のリーダーシップで揺れる馬を立て直せ！ (勇敢、鼓舞するリーダー、または武勇の 14 歳以上が必要)"  #NT!
 tactical_forest_battle.0210.d.success: "私のリーダーシップが騎兵隊を安定させます！彼らは改革し、戦い続ける準備をしています！"  #NT!
 tactical_forest_battle.0210.d.failure: "騎兵隊は結集を拒否する。士気は崩れ続けている。"  #NT!
  
  
  
 # Event 0120 - Infantry Ambush SUCCESS Follow-up: Kill Zone in the Woods 
 tactical_forest_battle.0120.t: "森の中のキルゾーン！"  #NT!
 tactical_forest_battle.0120.desc: "敵の縦隊が我々の隠れていた歩兵部隊とミサイル部隊に真っ直ぐ突っ込んできた！森林の視界は悪く、編隊は薄く伸び、指揮系統は混乱している。 [enemy_commander.GetTitledFirstName] の部隊は完璧な殺しの場に捕らえられています。このチャンスをどう活かすべきでしょうか？"  #NT!
 tactical_forest_battle.0120.a: "罠の顎を閉めてください！前後を封印せよ！"  #NT!
 tactical_forest_battle.0120.b: "矢と投げ槍に語らせましょう。私たちの歩兵を援護してください。 (射手/散兵が必要)"  #NT!
 tactical_forest_battle.0120.b.success: "私たちのミサイルの集中砲火は、露出した縦隊を壊滅させます！"  #NT!
 tactical_forest_battle.0120.b.failure: "彼らの盾と装甲は、我々の弾幕の有効性を制限します。"  #NT!
 tactical_forest_battle.0120.c: "まず将校を攻撃し、旗と指揮官を狙いましょう!"  #NT!
 tactical_forest_battle.0120.c.success: "我がストライキチームは主要将校を排除せよ！彼らの指揮は崩壊する！"  #NT!
 tactical_forest_battle.0120.c.failure: "攻撃チームは孤立し、多大な死傷者を出しました。"  #NT!
 tactical_forest_battle.0120.d: "血を流したままにして、森の中に消えていきます。"  #NT!
  
  
 # Event 0220 - Infantry Ambush FAILURE Follow-up: Ambush Detected 
 tactical_forest_battle.0220.t: "待ち伏せを発見！"  #NT!
 tactical_forest_battle.0220.desc: "[enemy_commander.GetTitledFirstName]は私たちの待ち伏せを見破りました！彼らの偵察隊は私たちの隠れた位置を発見し、私たちが罠を仕掛ける前に彼らの軍隊が適応しました。散在する我が歩兵部隊は[battle_location.GetName]にさらされ、連携した優位性が得られずに捕らえられる。この戦術的災害をどうやって解決するかを決めなければなりません。"  #NT!
 tactical_forest_battle.0220.a: "撤退して守備陣地を固めろ！要塞に再集結する。"  #NT!
 tactical_forest_battle.0220.b: "陣形を変えて敵の圧力を逆襲せよ！ (マルシャル 11 歳以上、高リスク)"  #NT!
 tactical_forest_battle.0220.b.success: "私たちの予期せぬ攻撃性が敵の不意を突く！彼らの隊列は崩れる！"  #NT!
 tactical_forest_battle.0220.b.failure: "反撃により、歩兵はさらに危険にさらされます。災害！"  #NT!
 tactical_forest_battle.0220.c: "森林を利用してユニットを分散させ、他の場所で改革します。 (スチュワードシップ 10+)"  #NT!
 tactical_forest_battle.0220.c.success: "私たちのユニットは木々の間をすり抜け、安全に再集合します!"  #NT!
 tactical_forest_battle.0220.c.failure: "分散したユニットは再結成できない。彼らは依然として無秩序で脆弱なままです。"  #NT!
 tactical_forest_battle.0220.d: "立場を堅持してプレッシャーを乗り越えましょう！多大な死傷者を受け入れる。"  #NT!
  
 # Event 0130 - Levy Braced SUCCESS Follow-up: Spears and Trees 
 tactical_forest_battle.0130.t: "槍と木！"  #NT!
 tactical_forest_battle.0130.desc: "徴税の槍壁は石のように持ちこたえる！私たちの兵士が木の間に植えると、森自体が要塞になります。 [enemy_commander.GetTitledFirstName] の部隊は我々の剛毛陣形に衝突し、たじろぎます。さあ、我々の優位性を押しつける時が来ました――どうやって彼らの弱点を突くでしょうか？"  #NT!
 tactical_forest_battle.0130.a: "ラインを保持して粉砕します。消耗を私たちのために働かせてください。"  #NT!
 tactical_forest_battle.0130.b: "いきなり中央を突き抜け！ (学習 + 格闘 9+、中程度のリスク)"  #NT!
 tactical_forest_battle.0130.b.success: "突然の突き上げに決意は打ち砕かれる！敵陣崩れ！"  #NT!
 tactical_forest_battle.0130.b.failure: "推力は遅くなりますが、ラインは保持されます。彼らは壊れることを拒否します。"  #NT!
 tactical_forest_battle.0130.c: "射手に彼らを殺戮場で虐殺させましょう。 (射手MaAが必要)"  #NT!
 tactical_forest_battle.0130.c.success: "破壊的なボレーが降り注ぐ！殺人現場では数百人が犠牲になっている！"  #NT!
 tactical_forest_battle.0130.c.failure: "射手は矢が少なくなり、優位性を失います。"  #NT!
 tactical_forest_battle.0130.d: "彼らの突撃を粉砕するために金床を形成してください! （靭性重視）"  #NT!
  
 # Event 0230 - Levy Scattered FAILURE Follow-up: Formation Broken 
 tactical_forest_battle.0230.t: "フォーメーション崩壊！"  #NT!
 tactical_forest_battle.0230.desc: "徴収金はパニックに陥って四散する！兵士たちは剛毛の槍壁を形成する代わりに、木々の間に広がり、調整したり前線を維持したりすることができなかった。 [enemy_commander.GetTitledFirstName] は弱点を見てそれを利用します。陣形は崩れています。この惨状を救うには迅速に行動しなければなりません。"  #NT!
 tactical_forest_battle.0230.a: "個人的な模範を示して彼らを結集させましょう！前からリードしてください！ (武勇 10+、武勇 9+)"  #NT!
 tactical_forest_battle.0230.a.success: "私の個人的な勇気が兵士たちを結集させます！彼らは改革し、自らを鍛え直します！"  #NT!
 tactical_forest_battle.0230.a.failure: "兵士たちは怯えて散り散りになったままだ。士気が回復しない。"  #NT!
 tactical_forest_battle.0230.b: "精鋭の騎士たちを投入して戦線を強化しましょう。 (2人以上の騎士が必要)"  #NT!
 tactical_forest_battle.0230.c: "散らばったユニットをより良い地形に再配置します。 (スチュワードシップ 9+)"  #NT!
 tactical_forest_battle.0230.c.success: "散らばった徴兵が集められ、より強力な場所に再配置されます。"  #NT!
 tactical_forest_battle.0230.c.failure: "再配置の試行は失敗します。ユニットはさらにバラバラに！"  #NT!
 tactical_forest_battle.0230.d: "代わりに敵の士気を下げることに集中してください。 (陰謀 8+、心理戦)"  #NT!
  
  
 # Event 0140 - Knights in Reserve SUCCESS Follow-up: Knights Ready 
 tactical_forest_battle.0140.t: "騎士団準備完了！"  #NT!
 tactical_forest_battle.0140.desc: "騎士たちは敵の目から隠れて完璧な準備を整えて待ちます。 [enemy_commander.GetTitledFirstName] の部隊は攻撃を待っている騎兵予備隊に気づかず、現在の位置に専念しています。今こそそれらを解き放つ時です。その破壊的な可能性をどのように活用すればよいでしょうか?"  #NT!
 tactical_forest_battle.0140.a: "ハンマーストライク - 壊滅的な騎兵突撃! (勇気 11+、非常に高いリスク/報酬)"  #NT!
 tactical_forest_battle.0140.a.success: "突撃は無事に完了しました！我らの騎士が敵陣をガラスのように打ち砕く！"  #NT!
 tactical_forest_battle.0140.a.failure: "突撃が伸びすぎて騎士達が孤立してしまう！"  #NT!
 tactical_forest_battle.0140.b: "側面機動—敵の周りを旋回してください! (格闘家 10+)"  #NT!
 tactical_forest_battle.0140.b.success: "側面作戦は成功する！敵は背後から不意を突かれた！"  #NT!
 tactical_forest_battle.0140.b.failure: "作戦は展開する前に阻止されてしまいます!"  #NT!
 tactical_forest_battle.0140.c: "追撃—退却中のユニットを攻撃しましょう! (陰謀 9+)"  #NT!
 tactical_forest_battle.0140.c.success: "追撃で敵を敗走させます！彼らは組織を再編することはできません！"  #NT!
 tactical_forest_battle.0140.c.failure: "追跡は阻止され、私たちの騎兵隊は死傷者を出しました。"  #NT!
 tactical_forest_battle.0140.d: "規律ある撤退 — 騎士を使って撤退をカバーします。 (スチュワードシップ 9+)"  #NT!
  
 martial_positive: "戦術的優位性"  #NT!
 martial_negative: "戦術的な不利な点"  #NT!
  
 frontline_commander: "最前線の指揮官"  #NT!
 frontline_commander_desc: "このキャラクターは戦闘の最中で軍隊を率い、勇気と効果のより大きな偉業を鼓舞します。"  #NT!
 tactical_commander: "戦術司令官"  #NT!
  
 # ============================================ 
 # EVENT 2010 - Left Flank Tactics 
 # ============================================ 
 tactical_forest_battle.2010.t: "フェイントに続いて"  #NT!
 tactical_forest_battle.2010.desc: "右翼でのこちらのフェイントが敵の注意を引き、左翼を脆弱なままにしました。彼らが反応して強化する前に、この機会を最大限に活用する方法を決定する必要があります。"  #NT!
  
 tactical_forest_battle.2010.a: "向きを変えて追ってくる敵を倒す"  #NT!
