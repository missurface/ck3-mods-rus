 trait_track_maims_desc: "このキャラクターは戦場で敵の外見を永続的に損ないます。"  #NT!
 trait_track_wounds: "スカーギバー"  #NT!
 trait_track_wounds_desc: "このキャラクターは戦場で敵に永久的な傷を与えました。"  #NT!
