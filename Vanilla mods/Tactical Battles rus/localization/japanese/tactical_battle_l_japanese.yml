 tactical_forest_battle.5750.a: "MAA攻撃チャージ"  #NT!
 tactical_forest_battle.5750.a.success: "MAAチャージが敵の攻撃を打ち破る！"  #NT!
 tactical_forest_battle.5750.a.failure: "MAAの突撃は撃退されました！"  #NT!
 tactical_forest_battle.5750.b: "左翼突撃"  #NT!
 tactical_forest_battle.5750.b.success: "左サイド突撃でプレッシャーを軽減！"  #NT!
 tactical_forest_battle.5750.b.failure: "左翼突撃が展開できない！"  #NT!
 tactical_forest_battle.5750.c: "騎士団撤退突撃"  #NT!
 tactical_forest_battle.5750.c.success: "騎士団は撤退しながら突撃成功！"  #NT!
 tactical_forest_battle.5750.c.failure: "ナイツ突撃失敗！"  #NT!
 tactical_forest_battle.5750.d: "騎士団は待ち伏せに退却する"  #NT!
 tactical_forest_battle.5750.d.success: "敵が我々の待ち伏せに追撃してくる！"  #NT!
 tactical_forest_battle.5750.d.failure: "敵は待ち伏せを回避！"  #NT!
 tactical_forest_battle.5750.e: "軍隊を鼓舞する"  #NT!
 tactical_forest_battle.5750.e.success: "部隊は奮起し、しっかりと踏ん張ります！"  #NT!
 tactical_forest_battle.5750.e.failure: "インスピレーションが定着しない！"  #NT!
  
 # Event 9251 - Enemy Is Retreating 
  
 # Event 0656 - Right Flank Reserves Intercepted 
 tactical_forest_battle.0656.t: "右翼の予備をインターセプト"  #NT!
 tactical_forest_battle.0656.desc: "[enemy_commander.GetFirstNamePossessive] が我々の右翼予備軍を迎撃しました!私たちはこの脅威にどう対処するかを決めなければなりません。"  #NT!
 tactical_forest_battle.0656.a: "左サイドの猛プッシュ"  #NT!
 tactical_forest_battle.0656.a.success: "左サイドの猛プッシュが成功！"  #NT!
 tactical_forest_battle.0656.a.failure: "左サイドからのプッシュが展開できない！"  #NT!
 tactical_forest_battle.0656.b: "撤退を装う"  #NT!
 tactical_forest_battle.0656.b.success: "退却を装って敵を罠に誘い込む！"  #NT!
 tactical_forest_battle.0656.b.failure: "後退は制御不能になります！"  #NT!
 tactical_forest_battle.0656.c: "軍隊を鼓舞する"  #NT!
 tactical_forest_battle.0656.c.success: "軍隊は奮起して結集します！"  #NT!
 tactical_forest_battle.0656.c.failure: "インスピレーションは耳が聞こえません！"  #NT!
 tactical_forest_battle.0656.d: "ライトリザーブをオンにする"  #NT!
 tactical_forest_battle.0656.d.success: "右控えがターンして反撃！"  #NT!
 tactical_forest_battle.0656.d.failure: "右予備軍は機動できない！"  #NT!
 tactical_forest_battle.0656.e: "後ろに引いてトラップを誘う"  #NT!
 tactical_forest_battle.0656.e.success: "敵がこちらの罠に迫ってくる！"  #NT!
 tactical_forest_battle.0656.e.failure: "敵が罠を回避！"  #NT!
 tactical_forest_battle.0656.f: "右サイドが前進する"  #NT!
 tactical_forest_battle.0656.f.success: "右翼が敵を突破！"  #NT!
 tactical_forest_battle.0656.f.failure: "右翼は封じ込められている！"  #NT!
  
  
 # Event 7323 - Left Encircles (Outcomes) 
 tactical_forest_battle.7323.t: "右翼は包囲された！"  #NT!
 tactical_forest_battle.7323.desc: "[left_flank_commander.GetTitledFirstName]が[enemy_commander.GetFirstNamePossessive]の右翼を囲い込むことに成功しました！数千人の敵兵が現在閉じ込められており、退却も援軍も絶たれている。 [enemy_commander.GetTitledFirstName] は閉じ込められた部隊が全滅に直面するのを無力に見守っています。我々は彼らの運命を決めなければならない――名誉ある降伏という慈悲を彼らに示すのか、それとも見せしめとして徹底的に破壊するのか。"  #NT!
 tactical_forest_battle.7323.a: "虐殺を始めましょう！"  #NT!
 tactical_forest_battle.7323.a.success: "[left_flank_commander.GetTitledFirstName] が罠にかかった部隊への攻撃を指揮します!"  #NT!
 tactical_forest_battle.7323.a.failure: "閉じ込められた部隊は必死の突破を図り、多くの者が脱出します。"  #NT!
 tactical_forest_battle.7323.b: "捕虜を連れて行け！"  #NT!
 tactical_forest_battle.7323.b.success: "閉じ込められた部隊は降伏し、捕虜となります。"  #NT!
 tactical_forest_battle.7323.b.failure: "閉じ込められた軍隊の多くは降伏を拒否し、死ぬまで戦います。"  #NT!
  
  # Event 9466 - Their Center is Shocked 
 tactical_forest_battle.9466.t: "挟まれて混乱"  #NT!
 tactical_forest_battle.9466.desc: "[enemy_commander.GetTitledFirstNamePossessiveOrMy] センターが衝撃を受けています!パニックは絶好のチャンスです！ここを突破できれば中央を狙うことができる。"  #NT!
 tactical_forest_battle.9466.a: "退却したふりをして追手を迎え撃つ"  #NT!
 tactical_forest_battle.9466.a.success: "[center_flank_commander.GetFullNameNicknamedPossessiveOrMy] 退却を装い、敵の中心部に激突！"  #NT!
 tactical_forest_battle.9466.a.failure: "敵は態勢を立てて毅然と立ち向かう！"  #NT!
 tactical_forest_battle.9466.b: "騎士たちと突撃を調整する"  #NT!
 tactical_forest_battle.9466.b.success: "我々の合体突撃が彼らの中心に激突する"  #NT!
 tactical_forest_battle.9466.b.failure: "敵は我々の突撃に対して断固として立ち向かう！"  #NT!
 tactical_forest_battle.9466.c: "我が精鋭連隊と連携して彼らの権利を突撃する"  #NT!
 tactical_forest_battle.9466.c.success: "私たちの連合攻撃は彼らの中心に混乱を引き起こします！"  #NT!
 tactical_forest_battle.9466.c.failure: "敵には新たな防衛線を確立する時間があります!"  #NT!
 tactical_forest_battle.9466.d: "アドバンテージを全力で押し出す"  #NT!
 tactical_forest_battle.9466.d.success: "彼らの中心に攻撃を押し込みます！"  #NT!
 tactical_forest_battle.9466.d.failure: "プレッシャーにもかかわらず敵は持ちこたえる！"  #NT!
 tactical_forest_battle.9466.e: "[center_flank_commander.GetTitledFirstNameOrMeRegnal]は中央を粉砕するために激しく突進します!"  #NT!
 tactical_forest_battle.9466.e.success: "我々の突撃は敵の結束を打ち砕く！"  #NT!
 tactical_forest_battle.9466.e.failure: "彼らの保持力は強力で、我々は突破できません!"  #NT!
  
 # Event .220 - Left Begins Encircle 
 tactical_forest_battle.220.t: "左翼が包囲を開始"  #NT!
 tactical_forest_battle.220.desc: "[left_flank_commander.GetTitledFirstNamePossessiveOrMy] 兵力が敵陣の背後に漏れました。 [enemy_commander.GetFirstNamePossessive] の増援が到着する前に、このアドバンテージを活用する必要があります。彼らは、敵を十分に長く阻止すれば、我々の敵を包囲できると信じている。"  #NT!
 tactical_forest_battle.220.a: "右翼で挟み撃ち！"  #NT!
 tactical_forest_battle.220.a.success: "[left_flank_commander.GetTitledFirstName] と我々の右翼が連携して、壊滅的な挟み撃ちの動きをします！"  #NT!
 tactical_forest_battle.220.a.failure: "両翼の連携が崩れ、敵は挟み撃ちを逃れる！"  #NT!
 tactical_forest_battle.220.b: "彼らを忙しくさせるために私たちの騎士を派遣してください！"  #NT!
 tactical_forest_battle.220.b.success: "私たちの騎士たちは周囲の敵から注意をそらしながら交戦中です!"  #NT!
 tactical_forest_battle.220.b.failure: "敵は包囲部隊を発見しました！"  #NT!
 tactical_forest_battle.220.c: "彼らを忙しくさせるために私たちのクラックユニットを送ります"  #NT!
 tactical_forest_battle.220.c.success: "我が精鋭部隊が敵と交戦し、包囲を進めます！"  #NT!
 tactical_forest_battle.220.c.failure: "敵は再集結し、我々の部隊を押し返します！"  #NT!
 tactical_forest_battle.220.d: "漏れ出た力が背後から攻撃する間に金床を形成する"  #NT!
 tactical_forest_battle.220.d.success: "[center_flank_commander.GetTitledFirstName] 右翼が両軍の間で粉砕されました!"  #NT!
 tactical_forest_battle.220.d.failure: "彼らの権利は今のところ強力です!"  #NT!
 tactical_forest_battle.220.e: "包囲が完了するまで、私たちの軍隊にもっと激しく戦うよう鼓舞してください"  #NT!
 tactical_forest_battle.220.e.success: "[center_flank_commander.GetTitledFirstName] 右翼が両軍の間で粉砕されました!"  #NT!
 tactical_forest_battle.220.e.failure: "彼らの権利は今のところ強力です!"  #NT!
  
  
