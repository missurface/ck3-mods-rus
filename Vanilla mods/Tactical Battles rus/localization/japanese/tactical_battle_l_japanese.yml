 tactical_forest_battle.0061.t: "[sc_loser.GetFullNameNicknamed] の運命"  #NT!
 tactical_forest_battle.0061.desc: "私の最後の一撃で、[sc_loser.GetFirstName] は片膝をつき、血まみれになり殴られました。周囲の戦場が激しさを増す中、[sc_loser.GetTitledFirstNamePossessive]の瞳は反抗と諦めが入り混じった表情で私を見上げている。 [sc_loser.GetHerHis] 運命を決める時が来ました。"  #NT!
 tactical_forest_battle.0061.a: "殺す [sc_loser.GetFirstName]"  #NT!
 tactical_forest_battle.0061.a.success: "[sc_loser.GetFirstName] が戦場で [sc_loser.GetHerHis] エンドと出会います。"  #NT!
 tactical_forest_battle.0061.b: "キャプチャ [sc_loser.GetFirstName]"  #NT!
 tactical_forest_battle.0061.b.success: "[sc_loser.GetFirstName]が捕虜になりました。"  #NT!
 tactical_forest_battle.0061.c: "[sc_loser.GetFirstNamePossessive]の目を取り、[sc_loser.GetHerHim]から[sc_loser.GetHerHis]の運命を解放します。"  #NT!
 tactical_forest_battle.0061.c.success: "[sc_loser.GetFirstName] を盲目にすると [sc_loser.GetHerHis] の生存が保証されますが、多大な代償が伴います。"  #NT!
 tactical_forest_battle.0061.d: "[sc_loser.GetFirstName] に永久的な傷跡を残して、[sc_loser.GetHerHim] から [sc_loser.GetHerHis] の運命を解放します。"  #NT!
 tactical_forest_battle.0061.d.success: "その傷跡は[sc_loser.GetFirstNamePossessive]の敗北を永遠に思い出させるものとなるだろう。"  #NT!
 tactical_forest_battle.0061.e: "[sc_loser.GetFirstName] を傷つけ、[sc_loser.GetHerHim] から [sc_loser.GetHerHis] の運命を解放します"  #NT!
 tactical_forest_battle.0061.e.success: "[sc_loser.GetFirstName] は、[sc_loser.GetHerHis] の怪我の重荷を残りの [sc_loser.GetHerHis] の人生にわたって背負うことになります。"  #NT!
  
  
 # Event 0005 - First tactical decision (Forest) 
 tactical_forest_battle.0005.t: "[battle_location.GetProvince.GetName]の[battle_location.GetProvince.GetTerrain.GetName|l]での戦い"  #NT!
 tactical_forest_battle.0005.desc: "[fighting_war.GetName] 対 [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal] の戦争で戦っている間、私の軍隊は [battle_location.GetProvince.GetName] の [battle_location.GetProvince.GetTerrain.GetName|l] で [enemy_war_leader.GetFullNameNicknamedOrMeRegnal] の勢力と衝突しました。私たちの偵察隊は、[enemy_commander.GetFullNameNicknamedOrMeRegnal] が指揮をとっていると報告しています。指揮官として、私は[enemy_commander.GetTitleTierName]を克服するための手を選択しなければなりません。"  #NT!
 tactical_forest_battle.0005.a: "左側面に注目 ([left_flank_commander.GetSkill( 'martial' )]#! [martial|E] [left_flank_commander.GetTitledFirstNameOrMe] vs [enemy_right_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_right_flank_commander.GetSkill( 'martial' )]#! [martial|E])"  #NT!
 tactical_forest_battle.0005.b: "中心に注目 ([center_flank_commander.GetSkill( 'martial' )]#! [martial|E] [center_flank_commander.GetTitledFirstNameOrMe] vs [enemy_center_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_center_flank_commander.GetSkill( 'martial' )]#! [martial|E])"  #NT!
 tactical_forest_battle.0005.c: "右側面に注目 ([right_flank_commander.GetSkill( 'martial' )]#! [martial|E] [right_flank_commander.GetTitledFirstNameOrMe] vs [enemy_left_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_left_flank_commander.GetSkill( 'martial' )]#! [martial|E])"  #NT!
 tactical_forest_battle.0005.d: "私の騎士たちを予備として留めておく"  #NT!
 tactical_forest_battle.0005.d.success: "私の騎士たちはあらゆる隙を突く完璧な位置にあります!"  #NT!
 tactical_forest_battle.0005.d.failure: "戦いの展開が早すぎて、私の騎士たちは位置を失って捕らえられました。"  #NT!
 tactical_forest_battle.0005.e: "精鋭遠距離ユニットに注目"  #NT!
 tactical_forest_battle.0005.f: "我が精鋭騎兵に集中せよ"  #NT!
 tactical_forest_battle.0005.n: "彼らの指揮官に突撃してください！"  #NT!
 tactical_forest_battle.0005.n.success: "[left_flank_commander.GetFullNameNicknamedOrMe] デュエル [enemy_right_flank_commander.GetFullNameNicknamed]"  #NT!
 tactical_forest_battle.0005.n.failure: "我々の突撃は突破できません！"  #NT!
 tactical_forest_battle.0005.kc: "デュエル勝利！"  #NT!
 tactical_forest_battle.0005.kc.success: "[left_flank_commander.GetFullNameNicknamed] は一騎打ちで [enemy_right_flank_commander.GetFullNameNicknamed] を殺害し、軍隊の士気を低下させました。"  #NT!
 tactical_forest_battle.0005.cc: "デュエル勝利！"  #NT!
 tactical_forest_battle.0005.cc.success: "[left_flank_commander.GetFullNameNicknamed] は一騎打ちで [enemy_right_flank_commander.GetHerHim] を破り、軍隊の士気を下げた後、[enemy_right_flank_commander.GetFullNameNicknamed] を占領しました。"  #NT!
 tactical_forest_battle.0005.ld: "デュエルで負けた！"  #NT!
 tactical_forest_battle.0005.ld.failure: "[enemy_right_flank_commander.GetFirstName]を囲んで[left_flank_commander.GetFullNameNicknamed]が[enemy_right_flank_commander.GetFullNameNicknamed]に倒された！戦闘中！"  #NT!
 tactical_forest_battle.0005.ldk: "デュエルで殺された！"  #NT!
 tactical_forest_battle.0005.ldk.failure: "[left_flank_commander.GetFullNameNicknamed] は、[enemy_right_flank_commander.GetFirstName] を囲んで戦闘した後、[enemy_right_flank_commander.GetFullNameNicknamed] によって殺されました。"  #NT!
 tactical_forest_battle.0005.j: "充電[enemy_right_flank_commander.GetFullNameNicknamed]!"  #NT!
 tactical_forest_battle.0005.j.failure: "[left_flank_commander.GetFullNameNicknamed] は [enemy_right_flank_commander.GetFullNameNicknamed] に突破できませんでした"  #NT!
 tactical_forest_battle.0005.dtt.success: "側面が突撃して包囲します [enemy_right_flank_commander.GetFirstName]"  #NT!
 # Event 0110 - Cavalry Feint SUCCESS Follow-up: Trap Sprung 
 tactical_forest_battle.0110.t: "罠が仕掛けられた！"  #NT!
 tactical_forest_battle.0110.desc: "[left_flank_commander.GetTitledFirstNamePossessive]フェイントが完璧に効きました！ [enemy_commander.GetFirstNamePossessive] の保留命令はかき消され、[enemy_commander.GetHerHis] 前衛が陣形を崩して餌を取りました。彼らの戦列の右側は今や薄く伸びており、組織化されていない。"  #NT!
 tactical_forest_battle.0110.a: "[left_flank_commander.GetTitledFirstName] が混乱した軍隊を私たちの優秀な部隊の罠に導きます"  #NT!
 tactical_forest_battle.0110.a.success: "[enemy_commander.GetFirstNamePossessive] の右側が[left_flank_commander.GetFirstNamePossessive] の逃走部隊に続き、待ち伏せに突入します!"  #NT!
 tactical_forest_battle.0110.a.failure: "右翼は餌を取らずに位置を保持し、ユニットを回転させて他の側面をサポートします"  #NT!
 tactical_forest_battle.0110.b: "騎士を派遣して、彼らの伸びすぎた側面を粉砕しましょう"  #NT!
 tactical_forest_battle.0110.b.success: "騎士たちは敵のむき出しの側面に激突し、陣形を崩す！"  #NT!
 tactical_forest_battle.0110.b.failure: "敵はすぐに組織を再編成し、私たちの騎士に攻撃を仕掛けます"  #NT!
 tactical_forest_battle.0110.c: "[right_flank_commander.GetTitledFirstNamePossessive] の側面から部隊を打ち破り、おびき寄せられたユニットを包囲します"  #NT!
 tactical_forest_battle.0110.c.success: "[right_flank_commander.GetTitledFirstName] は敵部隊を包囲し、退路を断ち切ることに成功しました!"  #NT!
 tactical_forest_battle.0110.c.failure: "敵は消耗した我が国の右翼に壊滅的な突撃を仕掛ける"  #NT!
 tactical_forest_battle.0110.d: "[center_flank_commander.GetFirstNamePossessive] リザーブを回転させて、おびき寄せられたユニットを取り囲みます"  #NT!
 tactical_forest_battle.0110.d.success: "予備軍は素早く移動し、包囲できる位置にある"  #NT!
 tactical_forest_battle.0110.d.failure: "[enemy_commander.GetFirstNamePossessive] は私たちの消耗した中心を認識します!"  #NT!
 tactical_forest_battle.0110.e: "フルチャージで誘惑されたユニットを方向転換して倒す"  #NT!
 tactical_forest_battle.0110.e.success: "フルチャージで敵の意表を突く！"  #NT!
 tactical_forest_battle.0110.e.failure: "敵は毅然とした態度を保ち、我々の突撃を撃退します！"  #NT!
  
  
 # ============================================ 
 # EVENT 9474 - Rally Army After Being Pressured 
 # ============================================ 
  
 tactical_forest_battle.9474.t: "軍隊を結集する"  #NT!
 tactical_forest_battle.9474.desc: "左派の戦いは重大な点に達した。私たちの力は揺らいでいますが、まだ壊れていません。強力なリーダーシップと大胆な行動があれば、私たちは秩序を回復し、状況を好転させることができます。"  #NT!
 tactical_forest_battle.9474.a: "左押しで攻撃"  #NT!
 tactical_forest_battle.9474.a.success: "私たちの軍隊はその呼びかけを聞いて集結します！"  #NT!
 tactical_forest_battle.9474.a.failure: "軍勢は揺れ続ける！"  #NT!
 tactical_forest_battle.9474.b: "退却を装い敵を誘い込み反撃する"  #NT!
 tactical_forest_battle.9474.b.success: "反撃が成功し士気は高まる！"  #NT!
 tactical_forest_battle.9474.b.failure: "反撃は失敗し、士気は崩壊する！"  #NT!
 tactical_forest_battle.9474.c: "センターチャージがプレッシャーを和らげるのが難しい"  #NT!
 tactical_forest_battle.9474.c.success: "突撃で彼らの右翼は方向感覚を失った!"  #NT!
 tactical_forest_battle.9474.c.failure: "敵は依然として不動です！"  #NT!
 tactical_forest_battle.9474.d: "右サイドがプレッシャーを和らげるために激しく突進する"  #NT!
 tactical_forest_battle.9474.d.success: "突撃は彼らの左翼を混乱させます!"  #NT!
 tactical_forest_battle.9474.d.failure: "敵は依然として不動です！"  #NT!
 tactical_forest_battle.9474.e: "騎士を増援に派遣する"  #NT!
 tactical_forest_battle.9474.e.success: "リザーブが到着してラインを強化！"  #NT!
 tactical_forest_battle.9474.e.failure: "備蓄が散在しすぎて役に立たない！"  #NT!
 tactical_forest_battle.9474.f: "精鋭の精鋭ユニットを増援のために派遣する"  #NT!
 tactical_forest_battle.9474.f.success: "私たちの優秀なユニットが敵に混乱を引き起こします!"  #NT!
 tactical_forest_battle.9474.f.failure: "私たちのクラックユニットは圧倒されています！"  #NT!
  
 # ============================================ 
 # EVENT 0650 - Right Flank Reserves Intercept 
 # ============================================ 
 tactical_forest_battle.0650.t: "右翼が敵の動きを阻止"  #NT!
 tactical_forest_battle.0650.desc: "我々の右翼予備部隊は、我々の陣地に逆らって機動しようとしている[enemy_commander.GetFirstNamePossessive]部隊を検知した。敵が移動を完了する前に、私たちには行動できる短い時間があります。"  #NT!
  
 tactical_forest_battle.0650.a: "右サイドから猛プッシュを仕掛ける"  #NT!
 tactical_forest_battle.0650.a.success: "右翼が壊滅的な打撃を与え、敵陣右翼を崩壊させる！"  #NT!
 tactical_forest_battle.0650.a.failure: "その押しを押し返し、敵が主導権を握る！"  #NT!
  
 tactical_forest_battle.0650.b: "左サイドを動かして背後から攻撃する"  #NT!
 tactical_forest_battle.0650.b.success: "私たちの操縦桿は、壊滅的な十字砲火で敵を捕らえます!"  #NT!
 tactical_forest_battle.0650.b.failure: "側面攻撃は探知され、敵の反撃によって妨害されます。"  #NT!
  
 tactical_forest_battle.0650.c: "大胆な結集で軍隊を鼓舞する"  #NT!
 tactical_forest_battle.0650.c.success: "軍隊は奮起し、敵の進撃を押し返します！"  #NT!
 tactical_forest_battle.0650.c.failure: "私たちの結集の呼びかけは無視され、軍は劣勢を続けています。"  #NT!
  
 tactical_forest_battle.0650.d: "適切なリザーブをオンにして混乱を引き起こす"  #NT!
 tactical_forest_battle.0650.d.success: "予備軍は、私たちが有利な位置に再配置するのに十分な混乱を引き起こします。"  #NT!
 tactical_forest_battle.0650.d.failure: "陰謀は裏目に出て、敵は私たちの混乱につけ込みます!"  #NT!
  
 tactical_forest_battle.0650.e: "右翼を強化するために騎士を派遣する"  #NT!
 tactical_forest_battle.0650.e.success: "騎士団が側面を強化して陣地を確保！"  #NT!
 tactical_forest_battle.0650.e.failure: "騎士達は切り離され、数の優勢な敵に囲まれる！"  #NT!
  
