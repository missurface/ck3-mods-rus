 # EVENT 7324 - Enemy Reorganizes Turns to Meet our center 
  
  
 tactical_forest_battle.7324.t: "敵は中央の側面を攻撃します"  #NT!
 tactical_forest_battle.7324.desc: "[enemy_commander.GetFirstNamePossessive] は私たちの弱体化した中央側面を認識し、攻撃を開始しています。予備がいないため、私たちは中央のサイドを維持するという重要な決断を下します。"  #NT!
 tactical_forest_battle.7324.a: "中央の側面は攻撃に対して強力に耐える"  #NT!
 tactical_forest_battle.7324.a.success: "我らの中央部は敵の猛攻を断固阻止せよ！"  #NT!
 tactical_forest_battle.7324.a.failure: "中央サイドが圧倒され、よろめき始める！"  #NT!
 tactical_forest_battle.7324.b: "中央を強化するために騎士を派遣する"  #NT!
 tactical_forest_battle.7324.b.success: "フレッシュナイツが中央サイドを安定させる！"  #NT!
 tactical_forest_battle.7324.b.failure: "中央に到達する前に騎士団が迎撃される！"  #NT!
 tactical_forest_battle.7324.c: "中央側面を強化するために精鋭の亀裂部隊を派遣します"  #NT!
 tactical_forest_battle.7324.c.success: "私たちの援軍が中央側面を安定させます!"  #NT!
 tactical_forest_battle.7324.c.failure: "我々の中心部は援軍にもかかわらず崩壊しつつある！"  #NT!
 tactical_forest_battle.7324.d: "増援が到着するまでにゆっくりと後退し、中心を位置から外してください。"  #NT!
 tactical_forest_battle.7324.d.success: "彼らの中心部が私たちの撤退を追跡し始め、彼らを暴露します！"  #NT!
 tactical_forest_battle.7324.d.failure: "中央はプレッシャーに耐えられない！"  #NT!
 tactical_forest_battle.7324.e: "退却したふりをして追手を迎え撃つ"  #NT!
 tactical_forest_battle.7324.e.success: "敵は私たちの欺瞞に陥り、予期せぬ攻撃を仕掛けてきます!"  #NT!
 tactical_forest_battle.7324.e.failure: "彼らは私たちの欺瞞を見抜き、その陣形を維持しているのです！"  #NT!
  
