 trait_lifestyle_battlefield_veteran: "戦場のベテラン"  #NT!
 lifestyle_battlefield_veteran_desc: "このキャラクターは戦闘での豊富な戦闘経験があり、数多くの交戦を生き延び、その経験から貴重な教訓を学んでいます。"  #NT!
