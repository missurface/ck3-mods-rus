 # EVENT 9476 - Rally Army 
 tactical_forest_battle.9476.t: "軍隊を結集する"  #NT!
 tactical_forest_battle.9476.desc: "右派の戦いは重大な点に達した。私たちの力は揺らいでいますが、まだ壊れていません。強力なリーダーシップと大胆な行動があれば、私たちは秩序を回復し、状況を好転させることができます。"  #NT!
 tactical_forest_battle.9476.a: "右押しで攻撃"  #NT!
 tactical_forest_battle.9476.a.success: "私たちの軍隊はその呼びかけを聞いて集結します！"  #NT!
 tactical_forest_battle.9476.a.failure: "軍勢は揺れ続ける！"  #NT!
 tactical_forest_battle.9476.b: "退却を装い敵を誘い込み反撃する"  #NT!
 tactical_forest_battle.9476.b.success: "反撃が成功し士気は高まる！"  #NT!
 tactical_forest_battle.9476.b.failure: "反撃は失敗し、士気は崩壊する！"  #NT!
 tactical_forest_battle.9476.c: "センターチャージがプレッシャーを和らげるのが難しい"  #NT!
 tactical_forest_battle.9476.c.success: "突撃で彼らの右翼は方向感覚を失った!"  #NT!
 tactical_forest_battle.9476.c.failure: "敵は依然として不動です！"  #NT!
 tactical_forest_battle.9476.d: "左サイドがプレッシャーを和らげるために激しく突進する"  #NT!
 tactical_forest_battle.9476.d.success: "突撃は彼らの左翼を混乱させます!"  #NT!
 tactical_forest_battle.9476.d.failure: "敵は依然として不動です！"  #NT!
 tactical_forest_battle.9476.e: "騎士を増援に派遣する"  #NT!
 tactical_forest_battle.9476.e.success: "リザーブが到着してラインを強化！"  #NT!
 tactical_forest_battle.9476.e.failure: "備蓄が散在しすぎて役に立たない！"  #NT!
 tactical_forest_battle.9476.f: "精鋭の精鋭ユニットを増援のために派遣する"  #NT!
 tactical_forest_battle.9476.f.success: "私たちの優秀なユニットが敵に混乱を引き起こします!"  #NT!
 tactical_forest_battle.9476.f.failure: "私たちのクラックユニットは圧倒されています！"  #NT!
  
