 trait_tbat_soldier_burenjia_character_desc: "[ROOT.Char.GetFullNameNicknamedOrMe] は、戦闘で連隊の成功に貢献した後、ブレンジアのエリート部隊から昇進しました。戦いにおける彼らの存在は、周囲の人々にさらなる武功へのインスピレーションを与えます。"  #NT!
  
