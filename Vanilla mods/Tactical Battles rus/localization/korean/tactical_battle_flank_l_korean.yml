l_korean:
 # Event 0001 - Left Flank Envelopment SUCCESS 
 tactical_flank_battle.0001.t: ""왼쪽 측면이 전진합니다!"
 tactical_flank_battle.0001.desc: "왼쪽 측면을 지휘하는 [scope:flank_commander.GetTitledFirstName]이(가) 틈을 찾았습니다! 적의 권리가 노출되고, 우리는 그들의 위치를 ​​포위할 기회를 갖게 됩니다. [enemy_commander.GetTitledFirstName]의 병력은 파괴적인 측면 공격에 취약합니다!"
 tactical_flank_battle.0001.a: "공격적으로 우위를 압박하라! (기량 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0001.a.success: "우리의 왼쪽 측면은 분노로 돌진하며 전열을 펼칩니다!"
 tactical_flank_battle.0001.a.failure: "공격적인 푸시가 포함되어 있습니다."
 tactical_flank_battle.0001.b: "센터와 함께 코디해보세요! (관리 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0001.b.success: "완벽한 조화가 우리의 장점을 증폭시킵니다!"
 tactical_flank_battle.0001.b.failure: "조율이 실현되지 않습니다."
 tactical_flank_battle.0001.c: "협공 동작을 실행하세요! (마샬 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0001.c.success: "우리는 그들을 파괴적인 집게발에 가두었습니다!"
 tactical_flank_battle.0001.c.failure: "그들은 협공 작전을 회피합니다."
 tactical_flank_battle.0001.d: "위치를 잡고 관찰하세요."
  
 # Event 0002 - Left Flank Envelopment FAILURE 
 tactical_flank_battle.0002.t: "압박을 받고 있는 왼쪽 측면!"
 tactical_flank_battle.0002.desc: "왼쪽 측면을 지휘하는 [scope:flank_commander.GetTitledFirstName]이 위기에 빠졌습니다! [enemy_commander.GetTitledFirstName]은 우리의 포위 시도를 우리에게 불리하게 만들었습니다. 우리 좌파는 이제 취약하고 후퇴하고 있습니다. 신속하게 행동하지 않으면 전체 측면을 잃을 위험이 있습니다!"
 tactical_flank_battle.0002.a: "측면을 개혁하라! (마샬 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0002.a.success: "왼쪽 측면의 질서를 회복합니다!"
 tactical_flank_battle.0002.a.failure: "측면이 계속 무너지고 있습니다."
 tactical_flank_battle.0002.b: "센터에 지원을 요청하세요! (외교 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0002.b.success: "지원군이 우리 왼쪽을 지탱하고 있습니다!"
 tactical_flank_battle.0002.b.failure: "제때에 도움이 도착하지 않습니다."
 tactical_flank_battle.0002.c: "전투철수를 실행하라! (관리 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0002.c.success: "우리는 순서대로 물러납니다!"
 tactical_flank_battle.0002.c.failure: "철수는 패주가 됩니다."
 tactical_flank_battle.0002.d: "좌절을 받아들이십시오."
  
 # Event 0003 - Center Hold SUCCESS 
 tactical_flank_battle.0003.t: "센터가 굳건히 자리잡고 있습니다!"
 tactical_flank_battle.0003.desc: "우리 센터를 지휘하는 [scope:flank_commander.GetTitledFirstName]님의 가치가 입증되었습니다! [enemy_commander.GetTitledFirstName]이 우리 라인에 모든 것을 던지는 동안 중앙은 요새처럼 서 있습니다. 우리의 위치는 막강하고, 여기에서 전투의 흐름을 좌지우지할 수 있습니다!"
 tactical_flank_battle.0003.a: "적극적으로 추진하라! (마샬 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0003.a.success: "센터가 그들을 다시 몰아냅니다!"
 tactical_flank_battle.0003.a.failure: "그들은 우리의 압박에 저항합니다."
 tactical_flank_battle.0003.b: "전체 라인을 고정하십시오! (기량 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0003.b.success: "우리 센터는 흔들리지 않는 닻이 됩니다!"
 tactical_flank_battle.0003.b.failure: "앵커 위치가 약해집니다."
 tactical_flank_battle.0003.c: "양쪽 측면에 지원을 보내세요! (관리 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0003.c.success: "센터는 전체 라인을 강화합니다!"
 tactical_flank_battle.0003.c.failure: "우리는 우리 자신을 너무 얇게 퍼트렸습니다."
 tactical_flank_battle.0003.d: "일정한 압력을 유지하십시오."
  
 # Event 0004 - Center Collapsing FAILURE 
 tactical_flank_battle.0004.t: "센터가 무너지고 있다!"
 tactical_flank_battle.0004.desc: "[scope:flank_commander.GetTitledFirstName]이 필사적으로 중앙을 지키려고 하는데 [enemy_commander.GetTitledFirstName]이 돌파하고 있어요! 중앙이 무너지면 양쪽 측면이 모두 잘려 파괴됩니다. 지금이 전투의 결정적인 순간입니다!"
 tactical_flank_battle.0004.a: "센터를 직접 모아보세요! (마샬 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0004.a.success: "내 존재가 중심을 굳건히 한다!"
 tactical_flank_battle.0004.a.failure: "나의 존재조차도 붕괴를 막을 수는 없다."
 tactical_flank_battle.0004.b: "모든 준비금을 커밋하세요! (관리 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0004.b.success: "새로운 군대가 격차를 메워줍니다!"
 tactical_flank_battle.0004.b.failure: "매장량은 삼켜집니다."
 tactical_flank_battle.0004.c: "중앙을 거부하고 측면을 강화하라! (학습 대 [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0004.c.success: "우리는 새로운 방어선을 형성한다!"
 tactical_flank_battle.0004.c.failure: "작전은 치명적으로 실패합니다."
 tactical_flank_battle.0004.d: "영향력과 희망에 대비하세요."
  
  
 tactical_forest_battle.0251.tt: "[center_flank_commander.GetFirstNameOrMe] [battle_location.GetProvince.GetTerrain.GetName] 전문 지식"
 tactical_forest_battle.0251.tt.success: "[battle_location.GetProvince.GetName]의 [battle_location.GetProvince.GetTerrain.GetName]에서 [center_flank_commander.GetFirstNameOrMe]의 기량은 동료들 사이에서 두각을 나타냈습니다."
  
 tactical_forest_battle.0250.tt: "[left_flank_commander.GetFirstNameOrMe] [battle_location.GetProvince.GetTerrain.GetName] 전문 지식"
 tactical_forest_battle.0250.tt.success: "[battle_location.GetProvince.GetName]의 [battle_location.GetProvince.GetTerrain.GetName]에서 [left_flank_commander.GetFirstNameOrMe]의 기량은 동료들 사이에서 두각을 나타냈습니다."
  
 tactical_forest_battle.0252.tt: "[right_flank_commander.GetFirstNameOrMe] [battle_location.GetProvince.GetTerrain.GetName] 전문 지식"
 tactical_forest_battle.0252.tt.success: "[battle_location.GetProvince.GetName]의 [battle_location.GetProvince.GetTerrain.GetName]에서 [right_flank_commander.GetFirstNameOrMe]의 기량은 동료들 사이에서 두각을 나타냈습니다."
  
 grant_left_interaction_desc: "[recipient.GetTitledFirstName]을 중앙 사령관으로 임명하여 전술적 권한과 명성을 부여하세요."
 grant_center_interaction_desc: "[scope:recipient.GetTitledFirstName]을 중앙 사령관으로 임명하여 전술적 권한과 명성을 부여하세요."
 grant_right_flank_interaction_desc: "[scope:recipient.GetTitledFirstName]을 오른쪽 측면 사령관으로 임명하여 전술적 권한과 명성을 부여하세요."
  
 # Custom Tooltips 
 grant_left_flank_commander_tt: "[scope:recipient.GetTitledFirstName]이 왼쪽 측면을 지휘하도록 임명되었습니다."
 grant_center_commander_tt: "[scope:recipient.GetTitledFirstName]이 중앙을 지휘하도록 임명되었습니다."
 grant_right_flank_commander_tt: "[scope:recipient.GetTitledFirstName]이 오른쪽 측면을 지휘하도록 임명되었습니다."
  
 tactical_overmatched_enemy_commander: "압도적인 적 사령관"
 tactical_overmatched_enemy_commander_desc: "이 캐릭터의 전장에서의 경험과 기술은 그들이 직면하는 적 사령관을 훨씬 능가하므로 전투와 전술에서 상당한 이점을 제공합니다."
 tactical_outmatched_enemy_commander: "내 머리 위로"
 tactical_outmatched_enemy_commander_desc: "이 캐릭터는 전장에서의 경험과 기술이 자신보다 훨씬 뛰어나 전투와 전술에서 상당한 불리함을 느끼는 적 사령관과 마주하고 있습니다."
  
  
 trait_lifestyle_flank_commander: "측면 사령관"
 trait_lifestyle_flank_commander_desc: "#soft_glow #difficulty_hard 할당되지 않음 \n\n#![ROOT.GetCharacter.GetFirstNameNoTooltip]는 측면 지휘 경험이 있으며 측면 기동을 실행하고 적 오른쪽의 약점을 이용하는 임무를 맡고 있습니다."
 lifestyle_assigned_flank_commander_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]은 [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy] 군대의 측면을 지휘하도록 선택되었으며, 측면 기동을 실행하고 적 오른쪽의 약점을 이용하는 임무를 맡았습니다."
 trait_lifestyle_flank_commander_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]은 [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy] 군대의 왼쪽 측면을 지휘하며 측면 기동을 실행하고 적 오른쪽의 약점을 이용하는 임무를 맡습니다."
 trait_track_left: "왼쪽 측면 사령관"
 trait_track_left_desc: "왼쪽 측면에서 싸우고 적 오른쪽 측면에서 기동하는 이 캐릭터는 적의 가장 강력한 병력을 상대한 경험이 있습니다."
 trait_track_center: "중앙 측면 사령관"
 trait_track_center_desc: "측면 중앙에서 싸우고 적의 본선을 상대로 기동하는 캐릭터로, 적의 주력 부대와 싸우며 가장 훈련된 부대를 상대한 경험이 있습니다."
 trait_track_right: "오른쪽 측면 사령관"
 trait_track_right_desc: "오른쪽 측면에서 싸우고 적의 왼쪽 측면을 상대로 기동하는 이 캐릭터는 전투에서 군대의 가장 고귀한 정예 부대를 지휘합니다."
  
 lifestyle_left_flank_commander_desc: "이 캐릭터는 군대의 왼쪽 측면을 지휘하며, 측면 기동을 수행하고 적 오른쪽의 취약성을 활용하는 역할을 담당합니다."
 lifestyle_assigned_left_flank_commander_desc: "#soft_glow #difficulty_easy 할당되지 않음\n\n#!캐릭터가 군대의 왼쪽 측면을 지휘하도록 선택되었으며, 측면 기동을 수행하고 적 오른쪽의 취약성을 활용하는 역할을 담당했습니다."
 lifestyle_assigned_center_flank_commander_desc: "#soft_glow #difficulty_easy 미할당\n\n#!캐릭터가 군대의 중앙을 지휘하도록 선택되었으며, 주 전선을 유지하고 측면과 전략을 조정하는 역할을 담당했습니다."
 lifestyle_assigned_right_flank_commander_desc: "#soft_glow #difficulty_easy 할당되지 않음\n\n#!캐릭터가 군대의 오른쪽 측면을 지휘하도록 선택되었으며, 측면 기동을 수행하고 적 왼쪽의 취약성을 활용하는 역할을 담당했습니다."
  
 trait_lifestyle_war_commander: "전쟁 사령관"
 trait_lifestyle_war_commander_desc: "이 캐릭터는 전쟁 중인 국가의 군대를 지휘하며, 전쟁 중 군사적 성공과 무술 보너스로 인해 증가된 명성을 얻습니다."
 trait_lifestyle_war_commander_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]은 전시 중에 [ROOT.GetCharacter.GetLiegeTitleEvenWhenDead.GetNameNoTier]의 군대를 지휘합니다. 전장을 감독하는 그는 존경심을 표하고 적들의 마음에 두려움을 심어줍니다."
  
 lifestyle_war_commander_desc: "이 캐릭터는 전쟁 중에 군대를 이끌고 군사 작전을 지휘하고 국가의 승리를 달성하는 역할을 담당합니다."
 trait_track_lifestyle_war_commander: "전쟁의 사령관"
 trait_track_lifestyle_war_commander_desc: "이 캐릭터는 전시에 군대를 지휘하며 군사 노력을 이끌고 국가의 승리를 보장하는 임무를 맡습니다."
 trait_track_skill: "전투 경험"
 trait_track_skill_desc: "이 캐릭터는 전투 중 성공적인 작전을 이끌며 군대를 지휘하는 기술과 경험을 보여줍니다."
 trait_track_victories: "전투의 승리자"
 trait_track_victories_desc: "이 캐릭터는 전쟁 중 전투에서 승리한 횟수를 나타내며, 전장에서 그들의 기술과 성공을 보여줍니다."
 trait_track_foreign_fighter: "외국 땅에서의 싸움"
 trait_track_foreign_fighter_desc: "자신의 영역 경계 밖에서 사람들을 승리로 이끌고, 외국 지형을 탐색하고 고향을 떠나 싸우는 어려움을 극복하는 기술을 보여주는 이 캐릭터의 경험입니다."
 trait_track_local_fighter: "조국 수호"
 trait_track_local_fighter_desc: "이 캐릭터는 사람들이 고국을 방어하도록 성공적으로 이끌고 익숙한 지형과 지역 자원을 유리하게 활용하는 기술을 보여줍니다."
 trait_track_outnumbered: "확률에 맞서"
 trait_track_outnumbered_desc: "자신보다 더 큰 힘에 맞서 전투에서 사람들을 성공적으로 이끄는 이 캐릭터의 경험은 역경을 극복하기 위해 뛰어난 전술과 전략을 활용하는 기술을 보여줍니다."
  
  
 trait_lifestyle_home_terrain_expert: "조국의 수호자"
 trait_track_lifestyle_home_terrain_expert: "조국의 수호자"
 trait_track_lifestyle_home_terrain_expert_desc: "이 캐릭터는 자신의 영역 내에서 전투를 벌인 경험이 있으며, 토지와 그 이점에 대한 지식을 갖추고 있어 익숙한 지역에서 싸울 때 강력한 상대가 됩니다."
 trait_lifestyle_home_terrain_expert_desc: "이 캐릭터는 자신의 영역 내에서 전투를 벌인 경험이 있으며, 토지와 그 이점에 대한 지식을 갖추고 있어 익숙한 지역에서 싸울 때 강력한 상대가 됩니다."
 trait_lifestyle_home_terrain_expert_character_desc: "이 캐릭터는 자신의 영역 내에서 전투를 벌인 경험이 있으며, 토지와 그 이점에 대한 지식을 갖추고 있어 익숙한 지역에서 싸울 때 강력한 상대가 됩니다."
  
 trait_lifestyle_foreign_terrain_expert: "외국 땅 전투기"
 trait_track_lifestyle_foreign_terrain_expert: "외국 땅 전투기"
 trait_track_lifestyle_foreign_terrain_expert_desc: "이 캐릭터는 자신의 영역 밖에서 싸우는 경험이 있으며, 땅에 익숙함에도 불구하고 외국 땅을 통해 군대를 조종하는 데 능숙합니다."
 trait_lifestyle_foreign_terrain_expert_desc: "이 캐릭터는 자신의 영역 밖에서 싸우는 경험이 있으며, 땅에 익숙함에도 불구하고 외국 땅을 통해 군대를 조종하는 데 능숙합니다."
 trait_lifestyle_foreign_terrain_expert_character_desc: "이 캐릭터는 자신의 영역 밖에서 싸우는 경험이 있으며, 땅에 익숙함에도 불구하고 외국 땅을 통해 군대를 조종하는 데 능숙합니다."
 lifestyle_foreign_terrain_expert_desc: "이 캐릭터는 자신의 영역 밖에서 싸우는 경험이 있으며, 땅에 익숙함에도 불구하고 외국 땅을 통해 군대를 조종하는 데 능숙합니다."
  
 trait_lifestyle_outnumbered_fighter_expert: "수적으로 열세인 병력 사령관"
 trait_track_lifestyle_outnumbered_fighter_expert: "수적으로 열세인 병력 사령관"
