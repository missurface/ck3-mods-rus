  # tactical_forest_battle.9416 - Harrying left flank, enemy bleeding 
 tactical_forest_battle.9416.t: "그들의 왼쪽은 피를 흘리고 있습니다!"
 tactical_forest_battle.9416.desc: "[enemy_commander.GetFirstNamePossessive] 병력이 우리의 뺑소니 전술로 인해 휘청거리고 있습니다. 왼쪽 측면은 심하게 약해졌고 부상자들은 움직임을 둔화시키고 있습니다. 그들이 재편성되기 전에 그들의 약점을 활용하기 위해 신속하게 조치를 취해야 합니다."
 tactical_forest_battle.9416.a: "우리의 엘리트 크랙 유닛으로 돌격을 조정하세요"
 tactical_forest_battle.9416.a.success: "우리 정예 부대가 왼쪽 측면을 휩쓸어 그들을 혼란에 빠뜨리고 있습니다!"
 tactical_forest_battle.9416.a.failure: "돌격은 그들의 완고한 방어를 뚫을 수 없습니다!"
 tactical_forest_battle.9416.b: "우리 기사들과 함께 돌격을 조율하세요"
 tactical_forest_battle.9416.b.success: "우리 기사들은 왼쪽의 약해진 적들을 강타하여 그들을 혼란에 빠뜨립니다!"
 tactical_forest_battle.9416.b.failure: "공격은 약해진 왼쪽 적군을 강타하여 혼란에 빠뜨립니다!"
 tactical_forest_battle.9416.c: "돌격은 그들의 완고한 방어를 뚫을 수 없습니다!"
 tactical_forest_battle.9416.c.success: "우리의 왼쪽 측면 공격이 약해진 적을 분산시킵니다!"
 tactical_forest_battle.9416.c.failure: "그들은 손실에도 불구하고 대형을 유지합니다!"
 tactical_forest_battle.9416.d: "후퇴하는 척하고 그들에게 돌아서세요"
 tactical_forest_battle.9416.d.success: "적은 우리의 속임수에 넘어가 예상치 못한 공격을 가합니다!"
 tactical_forest_battle.9416.d.failure: "그들은 우리의 속임수를 간파하고 그들의 진형을 유지합니다!!"
 tactical_forest_battle.9416.e: "장점을 누르세요"
 tactical_forest_battle.9416.e.success: "엄청난 압력에 왼쪽 측면이 무너지고 있습니다!"
 tactical_forest_battle.9416.e.failure: "그들은 손실에도 불구하고 대형을 유지합니다!"
  
  
  # tactical_forest_battle.9418 - Hit and run successful, enemy bleeding 
 tactical_forest_battle.9418.t: "그들의 권리는 피를 흘리고 있습니다!"
 tactical_forest_battle.9418.desc: "[enemy_commander.GetFirstNamePossessive] 병력이 우리의 뺑소니 전술로 인해 휘청거리고 있습니다. 오른쪽 측면은 심하게 쇠약해졌고 부상자들은 움직임을 둔화시키고 있습니다. 그들이 재편성되기 전에 그들의 약점을 활용하기 위해 신속하게 조치를 취해야 합니다."
 tactical_forest_battle.9418.a: "우리의 엘리트 크랙 유닛으로 돌격을 조정하세요"
 tactical_forest_battle.9418.a.success: "우리 정예 부대가 오른쪽 측면을 휩쓸어 그들을 혼란에 빠뜨리고 있습니다!"
 tactical_forest_battle.9418.a.failure: "돌격은 그들의 완고한 방어를 뚫을 수 없습니다!"
 tactical_forest_battle.9418.b: "우리 기사들과 함께 돌격을 조율하세요"
 tactical_forest_battle.9418.b.success: "우리 기사들은 약해진 적의 우익을 강타하여 그들을 혼란에 빠뜨립니다!"
 tactical_forest_battle.9418.b.failure: "공격은 약해진 적의 우익을 강타하여 그들을 혼란에 빠뜨립니다!"
 tactical_forest_battle.9418.c: "흩어진 라인을 충전하세요"
 tactical_forest_battle.9418.c.success: "우리의 왼쪽 측면 공격이 약해진 적을 분산시킵니다!"
 tactical_forest_battle.9418.c.failure: "그들은 손실에도 불구하고 대형을 유지합니다!"
 tactical_forest_battle.9418.d: "후퇴하는 척하고 그들에게 돌아서세요"
 tactical_forest_battle.9418.d.success: "적은 우리의 속임수에 넘어가 예상치 못한 공격을 가합니다!"
 tactical_forest_battle.9418.d.failure: "그들은 우리의 속임수를 간파하고 그들의 진형을 유지합니다!!"
 tactical_forest_battle.9418.e: "장점을 누르세요"
 tactical_forest_battle.9418.e.success: "엄청난 압박감에 오른쪽 측면이 무너지고 있습니다!"
 tactical_forest_battle.9418.e.failure: "그들은 손실에도 불구하고 대형을 유지합니다!"
  
  # tactical_forest_battle.7320 - Failure event, enemy reorganizes and stands strong 
 tactical_forest_battle.7320.t: "적군이 우리 전선 뒤에 굳건히 서있습니다"
 tactical_forest_battle.7320.desc: "[enemy_commander.GetFirstNamePossessive] 군대가 집결하여 우리 뒤에서 전선을 재편성했습니다. 그들은 이제 우리 전선을 등지고 진형이 강화된 채 더 깊이 파고들었습니다. 우리는 그들을 계속 압박할지, 아니면 전술을 바꿀지 결정해야 합니다."
 tactical_forest_battle.7320.a: "우리의 정예 특수 부대로 돌격을 보내 그들의 측면을 공격하세요"
 tactical_forest_battle.7320.a.success: "우리의 크랙 유닛은 그들을 눈치 채지 못하고 라인을 휩쓸고 있습니다!"
 tactical_forest_battle.7320.a.failure: "우리 크랙 부대는 그들의 견고한 방어를 뚫을 수 없습니다!"
 tactical_forest_battle.7320.b: "기사를 보내 측면을 공격하게 하세요."
 tactical_forest_battle.7320.b.success: "우리 기사들이 그들의 측면을 강타하여 진형을 무너뜨렸습니다!"
 tactical_forest_battle.7320.b.failure: "기사들이 적군 예비군에 의해 차단되었습니다!"
 tactical_forest_battle.7320.c: "후방을 부수기 위해 중앙 예비군을 이탈하세요"
 tactical_forest_battle.7320.c.success: "우리 중앙 예비군이 후방을 강타하여 혼란을 야기합니다!"
 tactical_forest_battle.7320.c.failure: "우리 센터 예비군은 갑작스러운 압박으로 인해 철수할 수 없습니다!"
 tactical_forest_battle.7320.d: "우익 예비군을 무너뜨려 후방을 박살내세요"
 tactical_forest_battle.7320.d.success: "우리 중앙 예비군이 후방을 강타하여 혼란을 야기합니다!"
 tactical_forest_battle.7320.d.failure: "우리 센터 예비군은 갑작스러운 압박으로 인해 철수할 수 없습니다!"
 tactical_forest_battle.7320.e: "후퇴하는 척하고 추격자들을 공격하세요"
 tactical_forest_battle.7320.e.success: "적은 우리의 속임수에 넘어가 예상치 못한 공격을 가합니다!"
 tactical_forest_battle.7320.e.failure: "적군은 노출된 중앙으로 후퇴합니다!"
  
  
  # tactical_forest_battle.7322 - Enemy attacks our depleted right flank 
 tactical_forest_battle.7322.t: "적군이 오른쪽 측면을 공격합니다."
 tactical_forest_battle.7322.desc: "[enemy_commander.GetFirstNamePossessive]은 우리의 약해진 오른쪽 측면을 인식하고 공격을 시작합니다. 예비군이 없는 상황에서 우리는 오른쪽 측면을 유지하기 위해 중요한 결정을 내립니다."
 tactical_forest_battle.7322.a: "공격에 강한 오른쪽 측면"
 tactical_forest_battle.7322.a.success: "우리의 오른쪽 측면은 적의 공격을 막아내고 있습니다!"
 tactical_forest_battle.7322.a.failure: "오른쪽 측면이 압도되어 흔들리기 시작합니다!"
 tactical_forest_battle.7322.b: "기사를 보내 권리를 강화하세요"
 tactical_forest_battle.7322.b.success: "신선한 기사들이 오른쪽 측면을 안정시킵니다!"
 tactical_forest_battle.7322.b.failure: "기사들은 오른쪽에 도달하기 전에 차단됩니다!"
 tactical_forest_battle.7322.c: "우리 정예 부대를 보내 오른쪽 측면을 강화하세요"
 tactical_forest_battle.7322.c.success: "우리 지원군이 오른쪽 측면을 안정시킵니다!"
 tactical_forest_battle.7322.c.failure: "증원에도 불구하고 우리의 권리는 무너지고 있습니다!"
 tactical_forest_battle.7322.d: "증원군이 도착하는 동안 후퇴하여 왼쪽 측면을 제자리에서 벗어나게 하세요."
 tactical_forest_battle.7322.d.success: "그들의 왼쪽 측면이 우리의 후퇴를 따르기 시작하여 그들을 노출시킵니다!"
 tactical_forest_battle.7322.d.failure: "우익은 압박 속에서도 헤어질 수 없습니다!"
 tactical_forest_battle.7322.e: "후퇴하는 척하고 추격자들을 공격하세요"
 tactical_forest_battle.7322.e.success: "적은 우리의 속임수에 넘어가 예상치 못한 공격을 가합니다!"
 tactical_forest_battle.7322.e.failure: "그들은 우리의 속임수를 간파하고 그들의 대형을 유지합니다!"
  
  
 tactical_forest_battle.231.t: "우리의 거짓 격차를 청구했습니다"
 tactical_forest_battle.231.desc: "[enemy_commander.GetFirstNameNoTooltip]은(는) 미끼를 물고 우리가 오른쪽 측면에 만든 허위 틈으로 돌진했습니다. 그들의 왼쪽은 이제 노출되어 취약해졌습니다. 우리는 그들이 회복하기 전에 이 기회를 활용하기 위해 신속하게 조치를 취해야 합니다."
 tactical_forest_battle.231.a: "우리 정예 부대를 보내 노출된 왼쪽 측면을 돌격하세요"
 tactical_forest_battle.231.a.success: "우리 정예 부대가 왼쪽 측면을 휩쓸고 진형을 무너뜨리고 있습니다!"
 tactical_forest_battle.231.a.failure: "그들의 권리는 우리의 정예 공격에 맞설 기반을 마련하고 있습니다!"
 tactical_forest_battle.231.b: "기사를 보내 왼쪽 측면을 파괴하세요."
 tactical_forest_battle.231.b.success: "[left_flank_commander.GetFullNameNicknamedOrMe] 돌진하여 측면을 혼란에 빠뜨리세요!"
 tactical_forest_battle.231.b.failure: "공격이 그들의 왼쪽 측면을 강타하여 그들을 혼란에 빠뜨립니다!"
 tactical_forest_battle.231.c: "대형을 무너뜨리기 위한 오른쪽 측면 돌격"
 tactical_forest_battle.231.c.success: "[right_flank_commander.GetFullNameNicknamedOrMe] 돌진하여 측면을 혼란에 빠뜨리세요!"
 tactical_forest_battle.231.c.failure: "그들의 좌익은 확고부동하며 부서지기를 거부했습니다!"
 tactical_forest_battle.231.d: "가짜 후퇴를 수행하고 전원을 켜십시오."
 tactical_forest_battle.231.d.success: "적은 우리의 속임수에 넘어져 추격합니다!"
 tactical_forest_battle.231.d.failure: "그들은 우리의 속임수를 간파하고 그들의 대형을 유지합니다!"
 tactical_forest_battle.231.e: "장점을 누르세요"
 tactical_forest_battle.231.e.success: "남겨진 적들은 무자비한 공격에 무너졌습니다!"
 tactical_forest_battle.231.e.failure: "적군 예비군이 전선을 강화하기 위해 도착했습니다!"
 tactical_forest_battle.231.f: "좌익 보유금을 분리하여 암호화"
 tactical_forest_battle.231.f.success: "우리 좌익은 교전을 중단하고 적을 포위할 수 있는 위치에 있습니다!"
 tactical_forest_battle.231.f.failure: "우리 좌익 예비군은 철수할 수 없습니다!"
  
 tactical_forest_battle.5907.t: "우리 센터는 라우팅 중입니다"
 tactical_forest_battle.5907.desc: "우리 센터가 무너지고 있어요! [enemy_commander.GetFirstNamePossessive]이 우리 중앙을 패주시켰고 군대 전체가 붕괴될 위험에 처해 있습니다. 재앙을 막기 위해서는 즉각 행동해야 합니다!"
 tactical_forest_battle.5907.b: "역습으로 화면 후퇴"
 tactical_forest_battle.5907.b.success: "반격으로 인해 우리 군대가 통합될 시간이 벌어졌습니다!"
 tactical_forest_battle.5907.b.failure: "반격은 실패하고 패배는 계속됩니다!"
 tactical_forest_battle.5907.c: "패주한 오른쪽 측면을 쫓는 자들을 무너뜨리기 위한 필사적인 돌격"
 tactical_forest_battle.5907.c.success: "우리의 권리는 탈출에 성공했습니다!"
 tactical_forest_battle.5907.c.failure: "우리의 돌격은 격퇴되고 대패는 계속됩니다!"
 tactical_forest_battle.5907.a: "수비 위치로 후퇴"
 tactical_forest_battle.5907.a.success: "우리는 후퇴하고 새로운 방어선을 구축하는데 성공했습니다!"
 tactical_forest_battle.5907.a.failure: "우리 병사들은 큰 손실을 입었습니다!"
  
