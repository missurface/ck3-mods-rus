 tactical_forest_battle.0651.c.failure: "기사들은 돌파할 수 없습니다!" #NT!
 tactical_forest_battle.0651.d: "후퇴하는 척하고 쫓아오는 적들을 공격하세요" #NT!
 tactical_forest_battle.0651.d.success: "적들은 깜짝 놀랐습니다!" #NT!
 tactical_forest_battle.0651.d.failure: "그들의 오른쪽 측면이 빠르게 재편되어 우리의 돌격을 흡수했습니다!" #NT!
