 tactical_forest_battle.9328.t: "오른쪽의 숨겨진 측면을 인식하지 못함" #NT!
 tactical_forest_battle.9328.desc: "우리는 후퇴하여 적을 유인하려는 계획으로 오른쪽을 약화시켰습니다. 우리의 숨겨진 측면은 눈에 띄지 않고 밀고 있는 왼쪽 측면 뒤에 있습니다. 빠르게 행동하면 결정적인 타격을 가할 수 있다." #NT!
 tactical_forest_battle.9328.a: "노출된 측면으로 나타나 충돌합니다." #NT!
 tactical_forest_battle.9328.a.success: "숨겨진 측면은 강력한 공격을 가해 적을 알아차리지 못하게 합니다." #NT!
 tactical_forest_battle.9328.a.failure: "적은 우리의 숨겨진 측면을 발견하고 준비합니다!" #NT!
 tactical_forest_battle.9328.b: "우리의 숨겨진 측면으로 적을 포위하려고 노력하세요" #NT!
