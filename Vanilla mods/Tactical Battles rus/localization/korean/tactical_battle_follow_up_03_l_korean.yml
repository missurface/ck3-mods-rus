 tactical_forest_battle.9465.a.success: "우리 정예 부대가 오른쪽 측면을 휩쓸고 진형을 무너뜨리고 있습니다!" #NT!
 tactical_forest_battle.9465.a.failure: "그들의 권리는 우리의 정예 공격에 맞설 기반을 마련하고 있습니다!" #NT!
