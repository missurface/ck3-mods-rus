l_korean:
 tactical_forest_battle.7327.t: "적의 압박이 유리하다" #NT!
 tactical_forest_battle.7327.desc: "[enemy_commander.GetFirstNamePossessive] 군대는 우리의 무질서를 인식하고 무자비하게 자신들의 이점을 압박하고 있습니다. 우리의 중심은 혼란에 빠졌고, 재앙을 막기 위해 단호하게 행동해야 합니다." #NT!
 tactical_forest_battle.7327.a: "중앙 후퇴, 매복 함정 설치" #NT!
 tactical_forest_battle.7327.a.success: "적군이 후퇴하는 중앙을 따라오며 위치를 벗어났습니다." #NT!
 tactical_forest_battle.7327.a.failure: "우리 병력은 철수할 수 없습니다!" #NT!
 tactical_forest_battle.7327.b: "센터를 안정시키기 위해 권리 보유금을 보내십시오." #NT!
 tactical_forest_battle.7327.b.success: "새로운 예비품이 도착하여 라인을 복구합니다!" #NT!
 tactical_forest_battle.7327.b.failure: "예비군은 조류를 막지 못했습니다!" #NT!
 tactical_forest_battle.7327.c: "기사를 보내 중앙을 강화하세요" #NT!
 tactical_forest_battle.7327.c.success: "기사들이 무너져가는 중앙을 안정시키다!" #NT!
 tactical_forest_battle.7327.c.failure: "기사들이 압도당했습니다!" #NT!
 tactical_forest_battle.7327.d: "중앙을 강화하기 위해 우리의 정예 부대를 보내세요" #NT!
 tactical_forest_battle.7327.d.success: "정예 연대 증원군이 중앙을 지탱하고 있습니다!" #NT!
 tactical_forest_battle.7327.d.failure: "센터는 응집력을 얻을 수 없습니다!" #NT!
 tactical_forest_battle.7327.e: "중앙에 사수하라고 명령하라!" #NT!
 tactical_forest_battle.7327.e.success: "우리 센터는 굳건히 버틸 수 있도록 영감을 받았습니다!" #NT!
 tactical_forest_battle.7327.e.failure: "우리의 노력에도 불구하고 사기는 계속해서 무너지고 있습니다!" #NT!
  
 tactical_forest_battle.7332.t: "적의 오른쪽 측면 공격" #NT!
 tactical_forest_battle.7332.desc: "[enemy_commander.GetFirstNamePossessive]은 추격하는 중앙군을 철수하고 우리 오른쪽 측면에서 강력한 공격을 준비하고 있습니다. 우리는 즉시 대응해야 합니다. 그렇지 않으면 우리의 권리가 압도당할 것입니다. 그들의 후퇴로 인해 중앙군의 측면이 노출되었습니다! 우리는 이것을 유리하게 활용할 수 있습니다." #NT!
 tactical_forest_battle.7332.a: "우리 센터는 노출된 측면을 충전합니다" #NT!
 tactical_forest_battle.7332.a.success: "우리의 예상치 못한 돌격이 그들의 대형을 깨뜨렸습니다!" #NT!
 tactical_forest_battle.7332.a.failure: "중심은 굳건하게 남아 우리의 전하를 흡수합니다!" #NT!
 tactical_forest_battle.7332.b: "그들의 라인을 끈으로 묶으려고 오른쪽으로 후퇴" #NT!
 tactical_forest_battle.7332.b.success: "적군이 우리의 후퇴를 따라오며 위치를 벗어났습니다!" #NT!
 tactical_forest_battle.7332.b.failure: "우리 병력은 철수할 수 없습니다!" #NT!
 tactical_forest_battle.7332.c: "기사를 보내 노출된 중앙 측면을 돌격하세요." #NT!
 tactical_forest_battle.7332.c.success: "기사들은 적 중앙에 혼란을 일으킨다!" #NT!
 tactical_forest_battle.7332.c.failure: "기사단 돌격을 중앙으로 흡수!" #NT!
 tactical_forest_battle.7332.d: "정예 부대를 보내 노출된 측면을 돌격하세요." #NT!
 tactical_forest_battle.7332.d.success: "우리 크랙 유닛이 갑자기 중앙을 차지했습니다!" #NT!
 tactical_forest_battle.7332.d.failure: "권리가 계속 약화되고 있습니다!" #NT!
 tactical_forest_battle.7332.e: "중앙을 포위하기 위해 왼쪽 측면을 무너뜨리세요" #NT!
 tactical_forest_battle.7332.e.success: "우리의 왼쪽 측면은 분리되어 위치로 이동할 수 있습니다!" #NT!
 tactical_forest_battle.7332.e.failure: "우리 왼쪽 측면은 분리할 수 없습니다!" #NT!
  
 tactical_forest_battle.0446.t: "우리의 권리가 안정되었습니다" #NT!
 tactical_forest_battle.0446.desc: "전투는 우리 오른쪽 측면에서 치열한 소모전으로 이어졌습니다. 양쪽 모두 치열한 전투를 벌이고 있으며, 상대방보다 오래 버틸 수 있는 사람이 승리할 것입니다." #NT!
 tactical_forest_battle.0446.a: "적을 굳게 잡고 분쇄하는 권리를 지휘하십시오." #NT!
 tactical_forest_battle.0446.a.success: "우리의 끊임없는 압력으로 적진이 무너졌습니다!" #NT!
 tactical_forest_battle.0446.a.failure: "적은 우리의 맹렬한 공격에 맞서 굳건히 버티고 있습니다!" #NT!
 tactical_forest_battle.0446.b: "기사를 보내 오른쪽 측면을 강화하세요." #NT!
 tactical_forest_battle.0446.b.success: "지원군은 생명을 불어넣습니다!" #NT!
 tactical_forest_battle.0446.b.failure: "기사들은 제 시간에 오른쪽에 도달할 수 없습니다!" #NT!
 tactical_forest_battle.0446.c: "우리의 오른쪽 측면을 강화하기 위해 정예 부대를 보내세요" #NT!
 tactical_forest_battle.0446.c.success: "크랙 유닛은 오른쪽의 압력을 완화합니다!" #NT!
 tactical_forest_battle.0446.c.failure: "우리 부대가 차단되어 도움을 줄 수 없습니다!" #NT!
 tactical_forest_battle.0446.d: "중앙을 포위하기 위해 왼쪽 측면을 무너뜨리세요" #NT!
 tactical_forest_battle.0446.d.success: "우리의 왼쪽 측면은 분리되어 위치로 이동할 수 있습니다!" #NT!
 tactical_forest_battle.0446.d.failure: "우리 왼쪽 측면은 분리할 수 없습니다!" #NT!
 tactical_forest_battle.0446.e: "후퇴하는 척하고 추격자들을 공격하세요" #NT!
 tactical_forest_battle.0446.e.success: "추격자들에 대한 우리의 갑작스런 공격은 그들을 눈치채지 못하게 합니다!" #NT!
 tactical_forest_battle.0446.e.failure: "그들은 우리의 예상된 갑작스런 공격을 간파하고 있습니다!" #NT!
 tactical_forest_battle.0446.f: "우익을 후퇴시켜 전선을 끈으로 묶는다" #NT!
 tactical_forest_battle.0446.f.success: "그들의 왼쪽은 우리의 퇴각을 따라가며 위치를 벗어났습니다!" #NT!
 tactical_forest_battle.0446.f.failure: "우리 병력은 철수할 수 없습니다!" #NT!
  
  
 tactical_forest_battle.9423.t: "오른쪽 측면 라우팅" #NT!
 tactical_forest_battle.9423.desc: "적의 공격으로 우리 오른쪽 측면이 무너지고 있습니다! [enemy_commander.GetFirstNamePossessive] 왼쪽이 돌파 중이므로 완전한 패배를 방지하려면 즉시 조치를 취해야 합니다." #NT!
 tactical_forest_battle.9423.a: "오른쪽 측면 중앙을 후퇴시키면서 측면을 강하게 장악하세요." #NT!
 tactical_forest_battle.9423.a.success: "왼쪽 측면이 포위되기 시작했습니다!" #NT!
 tactical_forest_battle.9423.a.failure: "센터는 압력을 견딜 수 없습니다!" #NT!
 tactical_forest_battle.9423.b: "후퇴하는 척하고 추격자들을 공격하세요" #NT!
 tactical_forest_battle.9423.b.success: "추격자들에 대한 우리의 갑작스런 공격은 그들을 눈치채지 못하게 합니다!" #NT!
 tactical_forest_battle.9423.b.failure: "그들의 왼쪽은 기습공격에 대비하고 있다" #NT!
 tactical_forest_battle.9423.c: "기사를 보내 강화하세요" #NT!
 tactical_forest_battle.9423.c.success: "기사들이 후방을 구성하고 추격 속도를 늦춥니다!" #NT!
 tactical_forest_battle.9423.c.failure: "기사들은 맹공격에 휩쓸려갔습니다!" #NT!
 tactical_forest_battle.9423.d: "강화를 위해 우리의 정예 부대를 보내세요" #NT!
 tactical_forest_battle.9423.d.success: "우리의 엘리트 크랙 유닛은 우익을 안정시키는 데 도움이 됩니다!" #NT!
 tactical_forest_battle.9423.d.failure: "압도적인 힘에 크랙 유닛들이 꼼짝 못하게 된다!" #NT!
 tactical_forest_battle.9423.e: "군대를 모아 반격" #NT!
 tactical_forest_battle.9423.e.success: "군대가 집결하여 적과 맞서게 됩니다!" #NT!
 tactical_forest_battle.9423.e.failure: "반격이 흔들리다!" #NT!
 tactical_forest_battle.9423.f: "왼쪽에서 은밀한 측면 병력을 보내 몰래 들어가 왼쪽 측면을 공격하세요." #NT!
 tactical_forest_battle.9423.f.success: "우리 군대는 들키지 않고 왼쪽 측면에 공격을 가합니다!" #NT!
 tactical_forest_battle.9423.f.failure: "우리의 비밀 부대가 발견되어 도움을 줄 수 없는 채 전투에 투입되었습니다!" #NT!
  
  
 tactical_forest_battle.0447.t: "오른쪽 측면 패배" #NT!
 tactical_forest_battle.0447.desc: "우리의 오른쪽 측면은 패주했고 완전히 혼란에 빠졌습니다. [enemy_commander.GetFirstNamePossessive]이 그 틈을 뚫고 나가고 있습니다. 우리는 입장을 확고히 할 것인지, 아니면 필사적인 입장을 취할 것인지를 결정해야 합니다." #NT!
 tactical_forest_battle.0447.a: "수비 위치로 후퇴" #NT!
 tactical_forest_battle.0447.a.success: "우리는 후퇴하고 새로운 방어선을 구축하는데 성공했습니다!" #NT!
 tactical_forest_battle.0447.a.failure: "우리 병사들은 큰 손실을 입었습니다!" #NT!
 tactical_forest_battle.0447.b: "역습으로 화면 후퇴" #NT!
 tactical_forest_battle.0447.b.success: "반격은 우리 오른쪽 측면 부대가 통합할 시간을 벌어줍니다!" #NT!
 tactical_forest_battle.0447.b.failure: "반격은 실패하고 패배는 계속됩니다!" #NT!
 tactical_forest_battle.0447.c: "패주한 오른쪽 측면을 쫓는 자들을 무너뜨리기 위한 필사적인 돌격" #NT!
 tactical_forest_battle.0447.c.success: "우리의 권리는 탈출에 성공했습니다!" #NT!
 tactical_forest_battle.0447.c.failure: "Pur 돌격이 격퇴되고 패배가 계속됩니다!" #NT!
  
  
 tactical_forest_battle.0442.t: "혼란에 빠진 적" #NT!
 tactical_forest_battle.0442.desc: "적은 무질서하게 후퇴하는 우리의 오른쪽 측면을 추격하고 있습니다. 군대의 절반이 중앙 공격을 준비하고 있고, 한 무리의 사람들이 후퇴하는 군대를 쫓고 있습니다. 우리는 이 혼란을 이용하여 반격할 수 있습니다." #NT!
 tactical_forest_battle.0442.a: "우리 기사들과 함께 돌격하기 위해 센터가 이탈합니다" #NT!
 tactical_forest_battle.0442.a.success: "우리의 갑작스러운 돌격에 적군이 허를 찔린 것입니다!" #NT!
 tactical_forest_battle.0442.a.failure: "그들의 왼쪽 측면이 빠르게 재편되어 우리의 돌격을 흡수했습니다!" #NT!
 tactical_forest_battle.0442.b: "기사를 보내 추격자를 베어넘기고 무질서한 적의 측면을 공격하세요" #NT!
 tactical_forest_battle.0442.b.success: "우리 기사들은 조직화되지 않은 킬러 부대로 내려와 측면을 공격합니다." #NT!
 tactical_forest_battle.0442.b.failure: "우리 기사들은 살인 파티를 사냥하는 데 수렁에 빠졌습니다." #NT!
 tactical_forest_battle.0442.c: "정예 부대를 보내 추격자를 쓰러뜨리고 무질서한 적의 측면을 공격하세요." #NT!
 tactical_forest_battle.0442.c.success: "우리의 정예 특수 부대가 조직되지 않은 킬러 파티로 내려와 측면을 공격합니다." #NT!
 tactical_forest_battle.0442.c.failure: "우리의 엘리트 부대는 살인 파티를 사냥하는 데 어려움을 겪고 있습니다." #NT!
 tactical_forest_battle.0442.d: "왼쪽 측면에서 예상치 못한 푸시를 보내어 원을 그리며 중앙을 공격하려고 합니다." #NT!
 tactical_forest_battle.0442.d.success: "우리 돌격이 적의 오른쪽 측면을 혼란스럽게 만들어 틈을 만들었습니다!" #NT!
 tactical_forest_battle.0442.d.failure: "우리의 차이지가 그들의 오른쪽 측면을 흡수했습니다!" #NT!
  
  
 tactical_forest_battle.0240.t: "왼쪽 측면 라우팅" #NT!
 tactical_forest_battle.0240.desc: "우리 왼쪽 측면이 적의 공격으로 무너지고 있습니다! 그들이 패주하면 군대 전체가 위험에 빠질 수 있습니다." #NT!
 tactical_forest_battle.0240.a: "좌파 안정을 위해 준비금 보내기" #NT!
 tactical_forest_battle.0240.a.success: "예비군은 제 시간에 도착하여 왼쪽을 지탱합니다!" #NT!
 tactical_forest_battle.0240.a.failure: "예비군은 제 시간에 왼쪽에 도달할 수 없습니다!" #NT!
 tactical_forest_battle.0240.b: "왼쪽 측면이 더 열심히 싸운다" #NT!
 tactical_forest_battle.0240.b.success: "왼쪽 측면이 공격을 막아냅니다!" #NT!
 tactical_forest_battle.0240.b.failure: "왼쪽 측면이 부서졌습니다!" #NT!
  
 tactical_forest_battle.0449.t: "우리 좌파는 길을 잃었다" #NT!
 tactical_forest_battle.0449.desc: "우리 왼쪽 측면이 완전히 무너졌습니다! 적의 돌파가 우리 군대 전체를 포위할 위험이 있습니다. 우리는 이 재난을 막기 위해 단호하게 행동해야 합니다." #NT!
 tactical_forest_battle.0449.a: "후퇴 및 위치 재설정" #NT!
 tactical_forest_battle.0449.a.success: "우리는 후퇴하고 새로운 방어선을 구축하는데 성공했습니다!" #NT!
 tactical_forest_battle.0449.a.failure: "퇴각은 무질서해지고 통제되지 않게 됩니다!" #NT!
 tactical_forest_battle.0449.b: "후위대와 함께 퇴각을 감시" #NT!
 tactical_forest_battle.0449.b.success: "우리 후위대는 주력이 철수할 만큼 오랫동안 버티고 있습니다!" #NT!
 tactical_forest_battle.0449.b.failure: "후방 수비대가 압도당했습니다!" #NT!
 tactical_forest_battle.0449.c: "돌파를 위해 필사적으로 돌진하라" #NT!
 tactical_forest_battle.0449.c.success: "모든 역경에도 불구하고 우리의 절박한 돌격은 성공했습니다!" #NT!
 tactical_forest_battle.0449.c.failure: "절박한 돌격이 분쇄된다!" #NT!
  
  
 tactical_forest_battle.0443.t: "왼쪽 측면 후퇴" #NT!
 tactical_forest_battle.0443.desc: "우리 왼쪽 측면이 혼란에 빠졌습니다! 적은 약점을 감지하고 이점을 압박하고 있습니다. 우리 센터는 굳건히 버텨야 합니다. 그렇지 않으면 모든 것이 사라집니다." #NT!
 tactical_forest_battle.0443.a: "센터는 압박에 강하다" #NT!
 tactical_forest_battle.0443.a.success: "우리 센터는 압력에도 불구하고 굳건히 자리잡고 있습니다!" #NT!
 tactical_forest_battle.0443.a.failure: "중심이 버티지 못하고 무너지기 시작합니다!" #NT!
 tactical_forest_battle.0443.b: "기사를 보내 추격하는 적을 쓰러뜨리세요" #NT!
 tactical_forest_battle.0443.b.success: "기사들이 추격하는 적군을 휩쓸고 있습니다!" #NT!
 tactical_forest_battle.0443.b.failure: "기사들은 제때에 추격군에 도달할 수 없습니다!" #NT!
 tactical_forest_battle.0443.c: "우리의 정예 부대를 보내 추격자들을 쓰러뜨리세요" #NT!
 tactical_forest_battle.0443.c.success: "우리 지원군이 도착하여 전선을 강화했습니다!" #NT!
 tactical_forest_battle.0443.c.failure: "적이 공격을 가한다!" #NT!
