 tactical_forest_battle.9222.t: "군대를 집결시키다" #NT!
 tactical_forest_battle.9222.desc: "우리 측면의 혼란에도 불구하고 우리에게는 여전히 예비군과 새로운 병력이 있습니다. 만약 우리가 그것들을 적절히 조율할 수 있다면, 우리는 이 전투를 역전시킬 수도 있습니다!" #NT!
 tactical_forest_battle.9222.a: "획기적인 발전을 위해 센터를 집결시키세요" #NT!
 tactical_forest_battle.9222.a.success: "우리 센터가 공격을 압박합니다!" #NT!
 tactical_forest_battle.9222.a.failure: "중앙은 뚫을 수 없어" #NT!
 tactical_forest_battle.9222.b: "온 힘을 다해 왼쪽 측면 돌격" #NT!
 tactical_forest_battle.9222.b.success: "왼쪽 측면이 강하게 돌격하며 중앙 뒤로 가려고 합니다!" #NT!
 tactical_forest_battle.9222.b.failure: "왼쪽 측면 돌격이 격퇴되었습니다!" #NT!
 tactical_forest_battle.9222.c: "우리의 정예 부대를 보내 중앙선을 충전하세요" #NT!
 tactical_forest_battle.9222.c.success: "우리 크랙 유닛의 돌격이 적을 압도합니다!" #NT!
 tactical_forest_battle.9222.c.failure: "적의 저항으로 인해 돌격이 둔해졌습니다!" #NT!
 tactical_forest_battle.9222.d: "기사를 보내 중앙선을 돌파하세요." #NT!
 tactical_forest_battle.9222.d.success: "우리 연합군이 적을 압도하기 시작합니다!" #NT!
 tactical_forest_battle.9222.d.failure: "기사들은 돌파할 수 없습니다!" #NT!
 tactical_forest_battle.9222.e: "후퇴하는 척하고 추격하는 적을 공격하세요" #NT!
 tactical_forest_battle.9222.e.success: "추격자들에 대한 우리의 갑작스런 공격은 그들을 눈치채지 못하게 합니다!" #NT!
 tactical_forest_battle.9222.e.failure: "적들은 빠르게 재편성하고 우리의 돌격을 흡수합니다!" #NT!
  
  
 tactical_forest_battle.0703.t: "우리 좌파는 압박을 받고 있다" #NT!
 tactical_forest_battle.0703.desc: "우리 왼쪽 측면은 [enemy_commander.GetFirstNamePossessive] 오른쪽의 강한 압력으로 인해 좌굴되고 있습니다. 우리가 신속하게 행동하지 않으면 그들이 돌파하여 우리 군대 전체를 포위하겠다고 위협할 것입니다." #NT!
 tactical_forest_battle.0703.a: "후퇴하여 함정으로 유인" #NT!
 tactical_forest_battle.0703.a.success: "적이 우리의 후퇴를 따라 매복 공격을 가하고 있습니다!" #NT!
 tactical_forest_battle.0703.a.failure: "적군이 우리의 후퇴를 간파하고 공격을 가하고 있습니다!" #NT!
 tactical_forest_battle.0703.b: "후퇴하는 척하고 적을 공격하라" #NT!
 tactical_forest_battle.0703.b.success: "모든 역경에도 불구하고 라인은 유지됩니다!" #NT!
 tactical_forest_battle.0703.b.failure: "왼쪽 측면이 부서지고 패주합니다!" #NT!
 tactical_forest_battle.0703.c: "우리 좌익을 강화하기 위해 정예 부대를 보내세요" #NT!
 tactical_forest_battle.0703.c.success: "정예 부대가 도착하여 좌익을 안정시키다!" #NT!
 tactical_forest_battle.0703.c.failure: "보강에도 불구하고 왼쪽은 접혀 있습니다." #NT!
 tactical_forest_battle.0703.d: "우리 기사들을 보내 좌익을 강화하도록 하세요" #NT!
 tactical_forest_battle.0703.d.success: "기사들이 도착하여 좌익을 강화합니다!" #NT!
 tactical_forest_battle.0703.d.failure: "좌파는 증원에도 불구하고 계속 무너지고 있다!" #NT!
 tactical_forest_battle.0703.e: "왼쪽을 돕기 위해 센터 예비군을 보내십시오." #NT!
 tactical_forest_battle.0703.e.success: "중앙 예비군이 도착하여 왼쪽을 지탱합니다!" #NT!
 tactical_forest_battle.0703.e.failure: "강화에도 불구하고 좌파는 계속 흔들리고 있다" #NT!
 tactical_forest_battle.0703.e: "좌익을 돕기 위해 우익 예비군을 보내세요" #NT!
 tactical_forest_battle.0703.e.success: "강화에도 불구하고 좌파는 계속 흔들리고 있다" #NT!
 tactical_forest_battle.0703.e.failure: "예비금은 제 시간에 도달할 수 없습니다!" #NT!
  
  
 tactical_forest_battle.0651.t: "예비 강화" #NT!
 tactical_forest_battle.0651.desc: "지원군이 오른쪽 측면을 지탱하기 위해 도착했고, 우리 왼쪽 측면의 전진을 둔화시키겠다고 위협했습니다. 우리는 공격의 추진력을 유지하기 위해 신속하게 행동해야 합니다." #NT!
