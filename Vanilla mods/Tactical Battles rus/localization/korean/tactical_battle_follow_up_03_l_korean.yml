 tactical_forest_battle.9434.desc: "우리 기사들은 전투의 흐름을 바꾸는 데 중추적인 역할을 할 수 있으며, 가장 중요한 선택은 그들을 어디로 보낼 것인가입니다." #NT!
 tactical_forest_battle.9434.a: "우리 기사들은 왼쪽 측면에서 공격을 가하고 있습니다." #NT!
