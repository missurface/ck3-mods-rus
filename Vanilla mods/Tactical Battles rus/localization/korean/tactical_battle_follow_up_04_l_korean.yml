 tactical_forest_battle.6325.b.failure: "측면 보호 실패!" #NT!
 tactical_forest_battle.6325.c: "기사들이 퇴각을 막는다." #NT!
 tactical_forest_battle.6325.c.success: "중앙이 철수하는 동안 기사들이 라인을 유지합니다!" #NT!
 tactical_forest_battle.6325.c.failure: "기사는 참을 수 없습니다!" #NT!
