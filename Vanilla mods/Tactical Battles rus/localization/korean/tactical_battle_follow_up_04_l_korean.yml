 tactical_forest_battle.6323.c.failure: "기사의 반격 실패!" #NT!
 tactical_forest_battle.6323.d: "랠리 센터 및 전진" #NT!
 tactical_forest_battle.6323.d.success: "중앙 집결과 반격!" #NT!
 tactical_forest_battle.6323.d.failure: "센터는 집결할 수 없습니다!" #NT!
 tactical_forest_battle.6323.e: "MAA 형태의 방어벽" #NT!
 tactical_forest_battle.6323.e.success: "MAA 벽은 추격을 중지합니다!" #NT!
 tactical_forest_battle.6323.e.failure: "MAA 벽이 무너졌습니다!" #NT!
 tactical_forest_battle.6323.f: "함정으로의 추격을 허용" #NT!
