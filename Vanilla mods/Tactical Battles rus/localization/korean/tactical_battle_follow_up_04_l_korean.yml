 tactical_forest_battle.6322.b: "기사단은 왼쪽 측면을 차단합니다." #NT!
 tactical_forest_battle.6322.b.success: "기사들이 추격을 막고 있습니다!" #NT!
 tactical_forest_battle.6322.b.failure: "기사들이 압도당했습니다!" #NT!
 tactical_forest_battle.6322.c: "좌파를 강화하기 위해 MAA를 보내세요" #NT!
