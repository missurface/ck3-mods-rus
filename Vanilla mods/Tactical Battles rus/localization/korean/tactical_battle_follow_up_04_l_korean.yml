l_korean:
 tactical_forest_battle.9468.t: "MAA 실행 요금" #NT!
 tactical_forest_battle.9468.desc: "우리의 Men-at-Arms가 우위를 점할 수 있는 기회를 인식했습니다! 우리의 정예 중무장 부대는 적의 중앙으로 세게 진격하여 적의 진형을 완전히 무너뜨릴 수 있습니다." #NT!
 tactical_forest_battle.9468.a: "MAA 언론의 장점" #NT!
 tactical_forest_battle.9468.a.success: "MAA가 적진을 돌파합니다!" #NT!
 tactical_forest_battle.9468.a.failure: "MAA 혐의가 격퇴되었습니다!" #NT!
 tactical_forest_battle.9468.b: "깨지기 어려운 또 다른 충전 수행" #NT!
 tactical_forest_battle.9468.b.success: "두 번째 돌격은 적진을 무너뜨립니다!" #NT!
 tactical_forest_battle.9468.b.failure: "두 번째 돌격은 돌파에 실패합니다!" #NT!
 tactical_forest_battle.9468.c: "입지를 굳건히 하고 입지를 굳건히 하라" #NT!
 tactical_forest_battle.9468.c.success: "MAA는 훌륭한 위치를 확보했습니다!" #NT!
 tactical_forest_battle.9468.c.failure: "통합으로 인해 우리가 노출되었습니다!" #NT!
 tactical_forest_battle.9468.d: "측면 기동을 실행" #NT!
 tactical_forest_battle.9468.d.success: "측면 기동이 훌륭하게 성공합니다!" #NT!
 tactical_forest_battle.9468.d.failure: "측면 기동이 발전하지 못했습니다!" #NT!
 tactical_forest_battle.9468.e: "꾸준한 전진 유지" #NT!
 tactical_forest_battle.9468.e.success: "꾸준한 전진으로 적의 저항을 무너뜨립니다!" #NT!
 tactical_forest_battle.9468.e.failure: "적의 저항에 맞서 전진이 지연됩니다!" #NT!
  
 tactical_forest_battle.9471.t: "미끼를 쫓는 적" #NT!
 tactical_forest_battle.9471.desc: "우리의 전략은 계획대로 진행됩니다! 우리의 약해진 중앙은 적을 유인해 왔고, [enemy_commander.GetFirstNamePossessive] 중앙은 천천히 제자리에서 벗어나고 있는 반면 우리 중앙의 측면은 굳건히 버티고 있습니다. 그들의 중심에는 사방에 적들이 보입니다! 이제 우리는 그들의 무질서한 병력을 분쇄하기 위해 반격을 시작할 수 있습니다." #NT!
 tactical_forest_battle.9471.a: "갑작스런 충전 시작" #NT!
 tactical_forest_battle.9471.a.success: "갑작스러운 공격에 적군은 혼란에 빠진다." #NT!
 tactical_forest_battle.9471.a.failure: "Theior 센터는 강세를 유지하고 있습니다." #NT!
 tactical_forest_battle.9471.b: "중앙선 왼쪽 측면에서 세게 밀면 포위가 시작됩니다." #NT!
 tactical_forest_battle.9471.b.success: "우리가 밀어붙이면 우리 병력이 빠져나와서 우리 병력이 뒤처지게 됩니다!" #NT!
 tactical_forest_battle.9471.b.failure: "충전이 흡수되었습니다!" #NT!
 tactical_forest_battle.9471.c: "중앙선의 오른쪽 측면에서 강하게 밀어서 포위를 시작합니다." #NT!
 tactical_forest_battle.9471.c.success: "우리가 밀어붙이면 우리 병력이 빠져나와서 우리 병력이 뒤처지게 됩니다!" #NT!
 tactical_forest_battle.9471.c.failure: "충전이 흡수되었습니다!" #NT!
 tactical_forest_battle.9471.d: "적의 위치를 ​​유지하기 위해 크랙 유닛을 중앙으로 보냅니다." #NT!
 tactical_forest_battle.9471.d.success: "우리의 중앙은 안정되어 있고 측면은 포위할 수 있는 위치에 있습니다." #NT!
 tactical_forest_battle.9471.d.failure: "적이 용기를 얻습니다!" #NT!
 tactical_forest_battle.9471.e: "우리 기사들을 보내 중앙을 강화하고 우리 측면이 위치를 잡는 동안" #NT!
 tactical_forest_battle.9471.e.success: "적의 공격은 스스로를 소진시킵니다!" #NT!
 tactical_forest_battle.9471.e.failure: "적이 우리 전선을 뚫고 들어옵니다!" #NT!
  
  
 tactical_forest_battle.9470.t: "나이츠 발사 충전" #NT!
 tactical_forest_battle.9470.desc: "우리 기사 파견대가 돌격할 기회를 포착했습니다! 적군이 다소 혼란스러운 상태에서 시기 적절한 기병 돌격은 사기를 꺾을 수 있습니다." #NT!
 tactical_forest_battle.9470.a: "나이츠 프레스 어드밴티지" #NT!
 tactical_forest_battle.9470.a.success: "기사들의 돌격으로 적을 무너뜨립니다!" #NT!
 tactical_forest_battle.9470.a.failure: "기사들은 격퇴된다!" #NT!
 tactical_forest_battle.9470.b: "MAA 지원과 요금 결합" #NT!
 tactical_forest_battle.9470.b.success: "기병과 MAA의 연합 돌격이 성공했습니다!" #NT!
 tactical_forest_battle.9470.b.failure: "결합 충전이 실패합니다!" #NT!
 tactical_forest_battle.9470.c: "넓은 측면 기동을 실행" #NT!
 tactical_forest_battle.9470.c.success: "기사들이 적의 측면을 포위합니다!" #NT!
 tactical_forest_battle.9470.c.failure: "측면 기동이 발전하지 않습니다!" #NT!
 tactical_forest_battle.9470.d: "기사단은 중앙 후퇴를 보호합니다." #NT!
 tactical_forest_battle.9470.d.success: "기사들이 퇴각을 성공적으로 차단했습니다!" #NT!
 tactical_forest_battle.9470.d.failure: "기사들은 전선을 지킬 수 없습니다!" #NT!
 tactical_forest_battle.9470.e: "오르막길에서 적에게 돌진하다" #NT!
 tactical_forest_battle.9470.e.success: "오르막 돌격은 여전히 ​​​​돌파됩니다!" #NT!
 tactical_forest_battle.9470.e.failure: "오르막 충전은 불가능합니다!" #NT!
  
 tactical_forest_battle.7243.t: "적이 포위를 막기 위해 돌아선다" #NT!
 tactical_forest_battle.7243.desc: "[enemy_commander.GetFirstNamePossessive]은 그들의 군대를 왼쪽에서 다가오는 우리 군대와 맞서도록 방향을 바꾸고 우리가 그들을 가두기 전에 탈출하려고 시도했습니다. 우리는 이 새로운 위협에 신속하게 대응해야 합니다." #NT!
 tactical_forest_battle.7243.a: "등을 충전하세요" #NT!
 tactical_forest_battle.7243.a.success: "노출된 후방을 충전합니다!" #NT!
 tactical_forest_battle.7243.a.failure: "적의 후위대가 버티고 있다!" #NT!
 tactical_forest_battle.7243.b: "포스 헤드를 충전하세요" #NT!
 tactical_forest_battle.7243.b.success: "우리 왼쪽 측면이 무너졌어" #NT!
 tactical_forest_battle.7243.b.failure: "왼쪽 측면은 제때에 도달할 수 없습니다!" #NT!
 tactical_forest_battle.7243.c: "후퇴하는 척하고 정면으로 공격을 가하세요." #NT!
 tactical_forest_battle.7243.c.success: "그들의 반격이 무너졌습니다!" #NT!
 tactical_forest_battle.7243.c.failure: "페인트는 그들을 끌어들이지 못합니다!" #NT!
 tactical_forest_battle.7243.d: "뒤쳐져 위치를 잡기 위한 우리의 올바른 책임" #NT!
 tactical_forest_battle.7243.d.success: "우리의 오른쪽 측면은 출혈을 뚫고 중앙 뒤로 이동합니다." #NT!
 tactical_forest_battle.7243.d.failure: "왼쪽 측면은 계속해서 어려움을 겪고 있습니다!" #NT!
 tactical_forest_battle.7243.e: "회전하는 동안 중앙을 공격합니다." #NT!
 tactical_forest_battle.7243.e.success: "흐트러진 상태에서 중앙공격을 가한다!" #NT!
 tactical_forest_battle.7243.e.failure: "중앙 공격이 활용되지 않습니다!" #NT!
  
 tactical_forest_battle.7244.t: "적이 포위를 막기 위해 돌아선다" #NT!
 tactical_forest_battle.7244.desc: "[enemy_commander.GetFirstNamePossessive]은 [enemy_commander.GetHerHis] 병력을 오른쪽에서 우리를 둘러싸고 있는 병력과 마주하도록 방향을 바꾸어 우리가 그들을 가두기 전에 돌파하려고 시도했습니다. 우리는 이 새로운 위협에 신속하게 대응해야 합니다." #NT!
