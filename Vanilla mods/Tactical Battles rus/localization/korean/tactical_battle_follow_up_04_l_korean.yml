 tactical_forest_battle.7244.c: "후퇴하는 척하고 정면으로 공격을 가하세요." #NT!
 tactical_forest_battle.7244.c.success: "그들의 반격이 무너졌습니다!" #NT!
 tactical_forest_battle.7244.c.failure: "페인트는 그들을 끌어들이지 못합니다!" #NT!
 tactical_forest_battle.7244.d: "뒤쳐져 위치를 잡는 우리의 왼쪽 돌격" #NT!
 tactical_forest_battle.7244.d.success: "우리의 왼쪽 측면은 출혈을 뚫고 중앙 뒤로 이동합니다." #NT!
 tactical_forest_battle.7244.d.failure: "왼쪽 측면은 계속해서 어려움을 겪고 있습니다!" #NT!
 tactical_forest_battle.7244.e: "회전하는 동안 중앙을 공격합니다." #NT!
 tactical_forest_battle.7244.e.success: "흐트러진 상태에서 중앙공격을 가한다!" #NT!
 tactical_forest_battle.7244.e.failure: "중앙 공격이 활용되지 않습니다!" #NT!
  
  
 tactical_forest_battle.2011.t: "노출된 중앙 측면" #NT!
 tactical_forest_battle.2011.desc: "적군이 우리의 속임수에 넘어가지 않았기 때문에 이제 우리의 중앙 측면이 노출되었습니다! 그들은 우리의 취약한 측면을 강하게 공격할 수 있는 위치에 있습니다. 강화하거나 재배치하려면 신속하게 조치를 취해야 합니다." #NT!
 tactical_forest_battle.2011.a: "중앙을 강화하기 위해 크랙 유닛을 보내세요" #NT!
 tactical_forest_battle.2011.a.success: "예비군이 도착하여 중앙을 강화합니다!" #NT!
 tactical_forest_battle.2011.a.failure: "예비금은 제 시간에 도달할 수 없습니다!" #NT!
 tactical_forest_battle.2011.b: "중앙 예비군을 돌려 거부 측면을 형성하세요" #NT!
 tactical_forest_battle.2011.b.success: "측면을 거부하는 센터 휠과 형태!" #NT!
 tactical_forest_battle.2011.b.failure: "바퀴가 고장나고 우리는 노출됩니다!" #NT!
 tactical_forest_battle.2011.c: "좌회전하고 등을 돌린다" #NT!
 tactical_forest_battle.2011.c.success: "우리의 돌격으로 인해 그들의 공격이 혼란스러워졌습니다!" #NT!
 tactical_forest_battle.2011.c.failure: "그들은 개혁하고 전하를 흡수합니다!" #NT!
 tactical_forest_battle.2011.d: "압력을 완화하기 위해 오른쪽 측면 충전" #NT!
 tactical_forest_battle.2011.d.success: "오른쪽 측면 충전으로 압박감이 완화됩니다!" #NT!
 tactical_forest_battle.2011.d.failure: "오른쪽 측면 돌격은 도달할 수 없습니다!" #NT!
 tactical_forest_battle.2011.e: "우리 기사들을 보내 측면을 돌격하게 하세요" #NT!
 tactical_forest_battle.2011.e.success: "기사들의 돌격으로 공격이 중단됩니다!" #NT!
 tactical_forest_battle.2011.e.failure: "적군이 개혁하고 유지합니다!" #NT!
  
  
 tactical_forest_battle.7330.t: "적군이 중앙 공격을 시작합니다" #NT!
 tactical_forest_battle.7330.desc: "[enemy_commander.GetFirstNamePossessive]가 저희 센터에서 직접 강력한 추진을 하고 있습니다! 우리 센터는 엄청난 압박을 받고 있으며, 사수할지, 강화할지, 기동할지 결정해야 합니다." #NT!
 tactical_forest_battle.7330.a: "센터를 집결시키다" #NT!
 tactical_forest_battle.7330.a.success: "중앙이 공격을 흡수하고 막아냅니다!" #NT!
 tactical_forest_battle.7330.a.failure: "센터는 압력을 견딜 수 없습니다!" #NT!
 tactical_forest_battle.7330.b: "중앙을 강화하기 위해 좌익 예비군을 보내라" #NT!
 tactical_forest_battle.7330.b.success: "좌익 예비군 도착 및 중앙 안정!" #NT!
 tactical_forest_battle.7330.b.failure: "왼쪽 예비군은 제때에 강화되지 않습니다!" #NT!
 tactical_forest_battle.7330.c: "중앙 강화를 위해 우익 예비군 파견" #NT!
 tactical_forest_battle.7330.c.success: "오른쪽 예비군 도착 및 센터 안정!" #NT!
 tactical_forest_battle.7330.c.failure: "권리 예비군은 제때에 강화되지 않습니다!" #NT!
 tactical_forest_battle.7330.d: "센터, 필사적으로 돌격 개시" #NT!
 tactical_forest_battle.7330.d.success: "그들의 센터는 돌격에 깜짝 놀랐습니다!" #NT!
 tactical_forest_battle.7330.d.failure: "중앙이 굳건히 자리 잡고 공격을 압박하고 있습니다." #NT!
 tactical_forest_battle.7330.e: "후퇴하는 척하여 적을 유인하고 공격합니다." #NT!
 tactical_forest_battle.7330.e.success: "적은 우리가 후퇴하고 있다고 생각하고 함정에 빠졌습니다!" #NT!
 tactical_forest_battle.7330.e.failure: "우리는 헤어질 수 없습니다!" #NT!
 tactical_forest_battle.7330.f: "센터를 후퇴시켜 그들이 제자리에서 벗어나도록 노력하세요." #NT!
 tactical_forest_battle.7330.f.success: "성공적으로 분리하고 위치를 변경했습니다!" #NT!
 tactical_forest_battle.7330.f.failure: "우리는 헤어질 수 없습니다!" #NT!
  
  
 tactical_forest_battle.9475.t: "군대를 집결시키다" #NT!
 tactical_forest_battle.9475.desc: "전투가 중요한 지점에 도달했습니다. 우리 군대는 흔들리고 있지만 아직 무너지지는 않았습니다. 강력한 리더십과 과감한 행동으로 질서를 회복하고 상황을 반전시킬 수 있습니다!" #NT!
 tactical_forest_battle.9475.a: "센터가 공격을 가한다" #NT!
 tactical_forest_battle.9475.a.success: "우리 군대는 부름을 듣고 집결합니다!" #NT!
 tactical_forest_battle.9475.a.failure: "군대는 계속 흔들리고 있습니다!" #NT!
 tactical_forest_battle.9475.b: "후퇴하는 척하여 적을 유인하고 반격" #NT!
 tactical_forest_battle.9475.b.success: "반격이 성공하고 사기가 치솟습니다!" #NT!
 tactical_forest_battle.9475.b.failure: "반격은 실패하고 사기는 무너진다!" #NT!
 tactical_forest_battle.9475.c: "압박을 완화하기 위해 왼쪽이 오른쪽 측면을 세게 돌진합니다." #NT!
 tactical_forest_battle.9475.c.success: "돌격으로 인해 오른쪽 측면이 혼란스러워졌습니다!" #NT!
 tactical_forest_battle.9475.c.failure: "적은 여전히 ​​굳건합니다!" #NT!
 tactical_forest_battle.9475.d: "오른쪽 측면은 압박을 완화하기 위해 강하게 돌진합니다." #NT!
 tactical_forest_battle.9475.d.success: "돌격으로 인해 왼쪽 측면이 혼란스러워졌습니다!" #NT!
 tactical_forest_battle.9475.d.failure: "적은 여전히 ​​굳건합니다!" #NT!
 tactical_forest_battle.9475.e: "기사를 보내 강화하세요" #NT!
 tactical_forest_battle.9475.e.success: "예비군이 도착하여 라인을 강화합니다!" #NT!
 tactical_forest_battle.9475.e.failure: "예비금이 너무 흩어져 도움이 되지 않습니다!" #NT!
 tactical_forest_battle.9475.f: "강화를 위해 정예 부대를 보내세요" #NT!
 tactical_forest_battle.9475.f.success: "우리 크랙 유닛은 적들에게 혼란을 야기합니다!" #NT!
 tactical_forest_battle.9475.f.failure: "우리 크랙 유닛이 압도당했습니다!" #NT!
  
  
 tactical_forest_battle.6321.desc: "[enemy_commander.GetFirstNamePossessive] 부대가 우리 부대를 추격하고 있습니다! 우리는 기사들을 이용해 추격자들을 공격하여 그들의 전진을 방해할 수 있습니다." #NT!
 tactical_forest_battle.6321.a: "플러드 갭으로 기사 보내기" #NT!
