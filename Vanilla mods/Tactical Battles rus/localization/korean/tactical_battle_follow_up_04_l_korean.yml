 tactical_forest_battle.6323.t: "중앙을 회전하여 추격하는 적을 공격하세요" #NT!
 tactical_forest_battle.6323.desc: "[enemy_commander.GetFirstNamePossessive]님이 우리 센터를 쫓고 있어요! 우리는 중앙군을 회전시켜 그들과 정면으로 맞서고 그들의 진격을 저지할 수 있습니다." #NT!
 tactical_forest_battle.6323.a: "센터가 추격자들을 향해 돌진합니다." #NT!
 tactical_forest_battle.6323.a.success: "센터는 추격자들과 결사적으로 맞서고 있습니다!" #NT!
 tactical_forest_battle.6323.a.failure: "센터턴이 조화롭지 않아요!" #NT!
 tactical_forest_battle.6323.b: "측면은 중앙이 적의 측면을 향하고 있는 동안 적의 측면을 공격합니다." #NT!
 tactical_forest_battle.6323.b.success: "협공 공격으로 추격이 방해됩니다!" #NT!
 tactical_forest_battle.6323.b.failure: "측면 공격이 전개되지 않습니다!" #NT!
 tactical_forest_battle.6323.c: "모든 기사를 보내 반격하게 하세요" #NT!
