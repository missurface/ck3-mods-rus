 tactical_forest_battle.6323.f.failure: "적들이 함정을 피한다!" #NT!
  
 tactical_forest_battle.6324.t:0 "Flanked and Confused 
 tactical_forest_battle.6324.desc: "우리의 측면 기동 이후 그들의 왼쪽 측면은 방향 감각을 잃었습니다. 우리는 측면이 공격을 압박하는 동안 중앙을 회전하여 공격함으로써 이러한 혼란을 이용할 수 있습니다." #NT!
 tactical_forest_battle.6324.a: "중앙을 공격하기 위해 측면을 공격하세요" #NT!
 tactical_forest_battle.6324.a.success: "그들의 센터가 방심하고 있습니다!" #NT!
 tactical_forest_battle.6324.a.failure: "우리 병력이 수렁에 빠졌습니다!" #NT!
 tactical_forest_battle.6324.b: "기사를 보내 좌익을 무너뜨리세요" #NT!
 tactical_forest_battle.6324.b.success: "우리 기사들이 대열에 큰 혼란을 일으키고 있습니다!" #NT!
 tactical_forest_battle.6324.b.failure: "우리 기사들이 수렁에 빠졌어요!" #NT!
 tactical_forest_battle.6324.c: "우리의 정예 부대를 보내 그들의 좌익을 무너뜨리세요" #NT!
 tactical_forest_battle.6324.c.success: "우리 정예 부대가 왼쪽 측면 전체에 혼란을 일으키고 있습니다!" #NT!
 tactical_forest_battle.6324.c.failure: "우리 부대는 돌파할 수 없습니다!" #NT!
 tactical_forest_battle.6324.d: "방향 감각을 잃은 라인을 충전하세요" #NT!
 tactical_forest_battle.6324.d.success: "우리의 오른쪽 측면이 혼란스러운 라인에 부딪칩니다!" #NT!
 tactical_forest_battle.6324.d.failure: "우리의 혐의는 거부되었습니다!" #NT!
 tactical_forest_battle.6324.e: "이점을 누르고 집결하세요" #NT!
 tactical_forest_battle.6324.e.success: "군대가 집결하여 공격을 가합니다!" #NT!
 tactical_forest_battle.6324.e.failure: "그들의 라인이 재편성됩니다!" #NT!
 tactical_forest_battle.6324.f: "후퇴하는 척하고 왼쪽 측면을 공격하세요" #NT!
 tactical_forest_battle.6324.f.success: "그들은 우리의 속임수를 따라가며 우리의 함정에 들어갑니다!" #NT!
 tactical_forest_battle.6324.f.failure: "그들의 라인이 재편성됩니다!" #NT!
  
  
 tactical_forest_battle.9420.t: "적군이 왼쪽 공격을 시작합니다" #NT!
 tactical_forest_battle.9420.desc: "[enemy_commander.GetFirstNamePossessive]이(가) 우리 왼쪽에서 직접 강하게 밀고 있습니다! 우리 좌파는 엄청난 압박을 받고 있으며, 우리는 방어할 것인지, 강화할 것인지, 아니면 기동할 것인지를 결정해야 합니다." #NT!
 tactical_forest_battle.9420.a: "왼쪽 집결" #NT!
 tactical_forest_battle.9420.a.success: "좌파는 공격을 흡수하고 버틴다!" #NT!
 tactical_forest_battle.9420.a.failure: "좌파는 압력을 견딜 수 없습니다!" #NT!
 tactical_forest_battle.9420.b: "좌파를 강화하기 위해 중앙 예비군을 보내라" #NT!
 tactical_forest_battle.9420.b.success: "중앙 예비군 도착 및 좌회전 안정!" #NT!
 tactical_forest_battle.9420.b.failure: "권리 예비군은 제때에 강화되지 않습니다!" #NT!
 tactical_forest_battle.9420.c: "좌파를 강화하기 위해 우파 예비군을 보내라" #NT!
 tactical_forest_battle.9420.c.success: "오른쪽 예비군이 도착하고 왼쪽을 안정시킵니다!" #NT!
 tactical_forest_battle.9420.c.failure: "권리 예비군은 제때에 강화되지 않습니다!" #NT!
 tactical_forest_battle.9420.d: "좌파는 필사적인 돌격을 개시한다" #NT!
 tactical_forest_battle.9420.d.success: "그들의 왼쪽은 돌격에 깜짝 놀랐습니다!" #NT!
 tactical_forest_battle.9420.d.failure: "그들의 좌파는 강하게 버티고 공격을 압박합니다." #NT!
 tactical_forest_battle.9420.e: "측면에서 후퇴하는 척하여 적을 유인하고 공격하세요." #NT!
 tactical_forest_battle.9420.e.success: "적은 우리가 후퇴하고 있다고 생각하고 함정에 빠졌습니다!" #NT!
 tactical_forest_battle.9420.e.failure: "우리는 헤어질 수 없습니다!" #NT!
  
 tactical_forest_battle.6325.t: "센터가 천천히 후퇴함" #NT!
 tactical_forest_battle.6325.desc: "우리 센터가 압력을 받고 철수하고 있습니다! 우리는 이 후퇴가 질서를 유지하도록 해야 합니다. 그렇지 않으면 측면 공격을 받아 패배할 위험이 있습니다!" #NT!
 tactical_forest_battle.6325.a: "센터는 규율을 유지합니다" #NT!
