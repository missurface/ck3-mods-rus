 tactical_forest_battle.6322.t: "쫓는 적을 공격하기 위해 왼쪽에서 벗어나십시오." #NT!
 tactical_forest_battle.6322.desc: "적군이 우리 왼쪽 측면을 추격하고 있습니다! 우리는 유닛을 부수어 방향을 바꾸고 추격자를 공격하여 추격자의 추진력을 깨뜨릴 수 있습니다." #NT!
 tactical_forest_battle.6322.a: "좌파분리 혐의 추격자들" #NT!
