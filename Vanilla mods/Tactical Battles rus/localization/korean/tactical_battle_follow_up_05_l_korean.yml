 tactical_forest_battle.6310.t: "함정이 터졌다!" #NT!
 tactical_forest_battle.6310.desc: "[right_flank_commander.GetTitledFirstNamePossessive] 페인트가 완벽하게 작동했습니다! [enemy_commander.GetFirstNamePossessive]개의 명령은 빠져나갔고, [enemy_commander.GetHerHis]개의 선봉대는 미끼를 잡기 위해 대형을 깨뜨렸습니다. 이제 그들의 라인의 왼쪽은 가늘고 무질서하게 뻗어있습니다." #NT!
 tactical_forest_battle.6310.a: "[right_flank_commander.GetTitledFirstName]은 무질서한 군대를 우리 특수 부대의 함정으로 이끌고 있습니다." #NT!
 tactical_forest_battle.6310.a.success: "[enemy_commander.GetFirstNamePossessive] 오른쪽이 [right_flank_commander.GetFirstNamePossessive] 도망가는 군대를 따라 매복 공격을 가합니다!" #NT!
 tactical_forest_battle.6310.a.failure: "권리는 미끼를 물지 않는다!" #NT!
 tactical_forest_battle.6310.b: "기사를 보내 지나치게 확장된 측면을 분쇄하세요." #NT!
 tactical_forest_battle.6310.b.success: "기사들이 적의 노출된 측면을 강타하여 진형을 무너뜨립니다!" #NT!
 tactical_forest_battle.6310.b.failure: "적은 빠르게 재편성하여 우리 기사들을 공격합니다" #NT!
 tactical_forest_battle.6310.c: "[left_flank_commander.GetTitledFirstNamePossessive] 측면에서 병력을 분리하여 유인된 유닛을 포위하세요." #NT!
 tactical_forest_battle.6310.c.success: "[right_flank_commander.GetTitledFirstName]이 적 유닛을 성공적으로 포위하여 후퇴를 차단했습니다!" #NT!
 tactical_forest_battle.6310.c.failure: "적이 우리의 고갈된 오른쪽 측면에 파괴적인 돌격을 가하고 있습니다." #NT!
 tactical_forest_battle.6310.d: "[center_flank_commander.GetFirstNamePossessive] 예비군을 회전시켜 유인된 유닛을 둘러쌉니다." #NT!
 tactical_forest_battle.6310.d.success: "예비군은 신속하게 이동하여 포위할 수 있는 위치에 있습니다." #NT!
 tactical_forest_battle.6310.d.failure: "[enemy_commander.GetFirstNamePossessive]이 우리의 고갈된 센터를 알아봤습니다!" #NT!
 tactical_forest_battle.6310.e: "완전 충전으로 유인된 유닛을 돌려서 처치하세요." #NT!
 tactical_forest_battle.6310.e.success: "완전 돌격으로 적을 깜짝 놀라게 합니다!" #NT!
 tactical_forest_battle.6310.e.failure: "적은 굳건히 남아 우리의 돌격을 격퇴합니다!" #NT!
  
  
 tactical_forest_battle.7320.t: "적군이 우리 전선 뒤에 굳건히 서있습니다" #NT!
 tactical_forest_battle.7320.desc: "[enemy_commander.GetFirstNamePossessive] 군대가 집결하여 우리 뒤에서 전선을 재편성했습니다. 그들은 이제 우리 전선을 등지고 진형이 강화된 채 더 깊이 파고들었습니다. 우리는 그들을 계속 압박할지, 아니면 전술을 바꿀지 결정해야 합니다." #NT!
 tactical_forest_battle.7320.a: "우리의 정예 특수 부대로 돌격을 보내 그들의 측면을 공격하세요" #NT!
 tactical_forest_battle.7320.a.success: "우리의 크랙 유닛은 그들을 눈치 채지 못하고 라인을 휩쓸고 있습니다!" #NT!
 tactical_forest_battle.7320.a.failure: "우리 크랙 부대는 그들의 견고한 방어를 뚫을 수 없습니다!" #NT!
 tactical_forest_battle.7320.b: "기사를 보내 측면을 공격하게 하세요." #NT!
 tactical_forest_battle.7320.b.failure: "기사들이 적군 예비군에 의해 차단되었습니다!" #NT!
 tactical_forest_battle.7320.c: "후방을 부수기 위해 중앙 예비군을 이탈하세요" #NT!
 tactical_forest_battle.7320.c.success: "우리 중앙 예비군이 후방을 강타하여 혼란을 야기합니다!" #NT!
 tactical_forest_battle.7320.c.failure: "우리 센터 예비군은 갑작스러운 압박으로 인해 철수할 수 없습니다!" #NT!
 tactical_forest_battle.7320.d: "우익 예비군을 무너뜨려 후방을 박살내세요" #NT!
 tactical_forest_battle.7320.d.success: "우리 중앙 예비군이 후방을 강타하여 혼란을 야기합니다!" #NT!
 tactical_forest_battle.7320.d.failure: "우리 센터 예비군은 갑작스러운 압박으로 인해 철수할 수 없습니다!" #NT!
 tactical_forest_battle.7320.e: "후퇴하는 척하고 추격자들을 공격하세요" #NT!
 tactical_forest_battle.7320.e.success: "적은 우리의 속임수에 넘어가 예상치 못한 공격을 가합니다!" #NT!
 tactical_forest_battle.7320.e.failure: "적군은 노출된 중앙으로 후퇴합니다!" #NT!
  
