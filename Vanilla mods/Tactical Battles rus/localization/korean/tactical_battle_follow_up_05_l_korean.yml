 tactical_forest_battle.8005.desc: "[enemy_commander.GetFirstNamePossessive] 왼쪽 측면이 라우팅 중입니다! 이것은 우위를 점하고 완전히 무너뜨릴 수 있는 기회입니다!" #NT!
