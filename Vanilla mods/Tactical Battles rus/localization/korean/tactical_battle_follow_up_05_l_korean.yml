l_korean:
 tactical_forest_battle.9453.t: "오른쪽 둘러싸기" #NT!
 tactical_forest_battle.9453.desc: "[enemy_commander.GetFirstNamePossessive] 오른쪽 측면을 성공적으로 포위했습니다! 그들은 갇혀서 파멸에 직면해 있습니다. 우리는 최후의 일격을 가해야 합니다!" #NT!
 tactical_forest_battle.9453.a: "포위된 병력 학살 시작" #NT!
 tactical_forest_battle.9453.a.success: "포위된 병력이 학살당했습니다!" #NT!
 tactical_forest_battle.9453.a.failure: "포위된 군대가 돌진한다!" #NT!
 tactical_forest_battle.9453.b: "포로를 잡아라" #NT!
 tactical_forest_battle.9453.b.success: "많은 포로를 포로로 잡는다!" #NT!
 tactical_forest_battle.9453.b.failure: "죄수들이 빠져나가다!" #NT!
  
 tactical_forest_battle.9473.t: "집결군" #NT!
 tactical_forest_battle.9473.desc: "전투가 계속됩니다! 우리 군대가 적의 맹렬한 저항을 뚫고 나가기 위해서는 영감이 필요합니다!" #NT!
 tactical_forest_battle.9473.a: "단호한 파업 촉구" #NT!
 tactical_forest_battle.9473.a.success: "육군이 결정적인 공격을 개시합니다!" #NT!
 tactical_forest_battle.9473.a.failure: "파업은 실현되지 않습니다!" #NT!
 tactical_forest_battle.9473.b: "더 나은 지면을 위한 재배치" #NT!
 tactical_forest_battle.9473.b.success: "강제로 더 나은 땅으로 재배치합니다!" #NT!
 tactical_forest_battle.9473.b.failure: "재배치 실패!" #NT!
 tactical_forest_battle.9473.c: "예비 지원군 보내기" #NT!
 tactical_forest_battle.9473.c.success: "예비군은 라인을 강화합니다!" #NT!
 tactical_forest_battle.9473.c.failure: "예약이 늦어졌습니다!" #NT!
 tactical_forest_battle.9473.d: "적 중앙에 대한 선두 돌격" #NT!
 tactical_forest_battle.9473.d.success: "센터 상대로 충전 성공!" #NT!
 tactical_forest_battle.9473.d.failure: "충전이 거부되었습니다!" #NT!
  
 tactical_forest_battle.7220.t: "왼쪽은 둘러싸기 시작" #NT!
 tactical_forest_battle.7220.desc: "우리 왼쪽 측면이 적 주위를 포위하는 기동을 시작했습니다! 이 포위를 완료할 수 있다면 그들을 가두어 파괴할 수 있습니다!" #NT!
 tactical_forest_battle.7220.a: "포위를 완료하세요" #NT!
 tactical_forest_battle.7220.a.success: "포위를 완료했습니다!" #NT!
 tactical_forest_battle.7220.a.failure: "적이 돌진한다!" #NT!
 tactical_forest_battle.7220.b: "우리 기사를 보내서 위치를 유지하도록 하세요." #NT!
 tactical_forest_battle.7220.b.success: "우리 기사들이 적을 제자리에 붙잡고 있습니다!" #NT!
 tactical_forest_battle.7220.b.failure: "적이 돌파합니다!" #NT!
 tactical_forest_battle.7220.c: "우리의 특수부대를 보내 적을 제자리에 붙잡아두세요!" #NT!
 tactical_forest_battle.7220.c.success: "적이 물러날 수 없습니다!" #NT!
 tactical_forest_battle.7220.c.failure: "적이 포위에서 탈출합니다!" #NT!
 tactical_forest_battle.7220.d: "왼쪽이 둘러싸는 동안 중앙에 고정하십시오." #NT!
 tactical_forest_battle.7220.d.success: "적이 물러날 수 없다!" #NT!
 tactical_forest_battle.7220.d.failure: "적들이 함정에서 탈출한다!" #NT!
 tactical_forest_battle.7220.e: "부대가 포위하는 동안 전선을 유지하기 위해 군대를 집결시키세요" #NT!
 tactical_forest_battle.7220.e.success: "적이 물러날 수 없다!" #NT!
 tactical_forest_battle.7220.e.failure: "적들이 함정에서 탈출한다!" #NT!
  
  
