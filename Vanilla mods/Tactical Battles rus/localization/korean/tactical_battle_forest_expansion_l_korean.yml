l_korean:
  
  
 game_concept_captain_trait_concept: "선장 특성"
 game_concept_captain_trait_concept_desc: "대장 특성은 중장병 분대에서 모집된 남성에게 부여되는 특성입니다. 전투 중 병사와 관련된 옵션을 사용할 때 성공하면 전투 후 특별한 대장 특성을 가진 사령관을 모집할 수 있는 기회가 있습니다. 이러한 특성은 전투 중 군대에 다양한 보너스를 제공합니다.\n\n 예: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"
 game_concept_player_title_concept: "플레이어"
 game_concept_player_title_concept_desc: "대장 특성은 중장병 분대에서 모집된 남성에게 부여되는 특성입니다. 전투 중 병사와 관련된 옵션을 사용할 때 성공하면 전투 후 특별한 대장 특성을 가진 사령관을 모집할 수 있는 기회가 있습니다. 이러한 특성은 전투 중 군대에 다양한 보너스를 제공합니다.\n\n 예: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"
  
 tactical_forest_battle.0498.t: "유명한 군인"
 tactical_forest_battle.0498.desc: "우리의 최근 전투에 대한 보고를 받은 후, 나의 장교들은 [chosen_unit.GetName] 정예 연대 소속의 우리 군인 중 한 명이 치열한 전투 속에서 훌륭하게 수행했다고 나에게 알려주었습니다. [commander.GetHerHim]을 내 서비스에 활용하면 다른 사람들에게 영감을 줄 수 있습니다."
 tactical_forest_battle.0498.a: "내 서비스에 [commander.GetName]을 모집합니다. ([commander.GetFirstName]이 [captain_trait_concept|e]를 얻습니다)"
 tactical_forest_battle.0498.b: "생각해 볼게요."
  
