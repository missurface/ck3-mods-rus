 tactical_forest_battle.0011.desc: "전투는 계속되고 우리 군대는 중앙 측면을 따라 교전합니다. [left_flank_commander.GetTitledFirstName] 명령은 왼쪽에 있고 [right_flank_commander.GetFirstName]은 오른쪽 측면에 있습니다. [center_flank_commander.GetTitledFirstName]가 중앙을 지휘하고, [center_flank_commander.GetHerHis] 병력을 활용하면 승리를 확보하는 데 중추적인 역할을 할 수 있습니다." #NT!
