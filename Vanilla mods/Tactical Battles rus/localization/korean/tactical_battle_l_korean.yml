 tactical_forest_battle.9466.t: "측면과 혼란" #NT!
 tactical_forest_battle.9466.desc: "[enemy_commander.GetTitledFirstNamePossessiveOrMy] 센터가 충격에 빠졌습니다! 그렇다면 패닉은 절호의 기회입니다! 여기를 돌파할 수 있다면 중앙을 켤 수 있습니다." #NT!
 tactical_forest_battle.9466.a: "후퇴하는 척하고 추격자들을 공격하세요" #NT!
 tactical_forest_battle.9466.a.success: "[center_flank_commander.GetFullNameNicknamedPossessiveOrMy] 후퇴하는 척하고 중앙으로 돌진하세요!" #NT!
 tactical_forest_battle.9466.a.failure: "적은 재편성되어 굳건히 서 있다!" #NT!
 tactical_forest_battle.9466.b: "우리 기사들과 함께 돌격을 조율하세요" #NT!
 tactical_forest_battle.9466.b.success: "우리의 결합된 돌격이 그들의 중앙을 강타합니다" #NT!
 tactical_forest_battle.9466.b.failure: "적은 우리의 돌격에 맞서 굳건히 맞서고 있습니다!" #NT!
 tactical_forest_battle.9466.c: "우리의 마약 연대와 협력하여 그들의 권리를 차지하세요" #NT!
 tactical_forest_battle.9466.c.success: "우리의 합동 공격이 중앙에 혼란을 야기합니다!" #NT!
 tactical_forest_battle.9466.c.failure: "적군은 새로운 방어선을 구축할 시간이 있습니다!" #NT!
 tactical_forest_battle.9466.d: "전력을 다해 우위를 압박하라" #NT!
 tactical_forest_battle.9466.d.success: "우리는 그들의 중앙을 공격합니다!" #NT!
 tactical_forest_battle.9466.d.failure: "압박에도 불구하고 적은 버티고 있습니다!" #NT!
 tactical_forest_battle.9466.e: "[center_flank_commander.GetTitledFirstNameOrMeRegnal]은 센터를 무너뜨리기 위해 열심히 돌진합니다!" #NT!
 tactical_forest_battle.9466.e.success: "우리의 돌격으로 적의 결속력이 무너졌습니다!" #NT!
 tactical_forest_battle.9466.e.failure: "놈들의 방어력이 강해서 우리는 돌파할 수 없습니다!" #NT!
  
 # Event .220 - Left Begins Encircle 
 tactical_forest_battle.220.t: "왼쪽 측면 포위 시작" #NT!
 tactical_forest_battle.220.desc: "[left_flank_commander.GetTitledFirstNamePossessiveOrMy] 병력이 적진 뒤로 누출되었습니다. [enemy_commander.GetFirstNamePossessive]명의 지원군이 도착하기 전에 이 이점을 활용해야 합니다. 병사들은 적을 충분히 오랫동안 지연시키면 적을 포위할 수 있다고 믿습니다." #NT!
 tactical_forest_battle.220.a: "오른쪽 측면의 협공!" #NT!
 tactical_forest_battle.220.a.success: "[left_flank_commander.GetTitledFirstName]과 우리의 오른쪽 측면이 파괴적인 협공 움직임을 조율합니다!" #NT!
 tactical_forest_battle.220.a.failure: "측면의 협치가 무너지고, 적군이 협공에서 탈출한다!" #NT!
 tactical_forest_battle.220.b: "우리 기사들을 보내서 바쁘게 만드세요!" #NT!
 tactical_forest_battle.220.b.success: "우리 기사들이 교전 중이어서 주변 적들로부터 주의를 돌리고 있습니다!" #NT!
 tactical_forest_battle.220.b.failure: "적이 포위하는 힘을 본다!" #NT!
 tactical_forest_battle.220.c: "우리의 크랙 유닛을 보내서 바쁘게 지내도록 하세요." #NT!
 tactical_forest_battle.220.c.success: "우리 크랙 유닛은 적과 교전하여 포위를 진행할 수 있습니다!" #NT!
 tactical_forest_battle.220.c.failure: "적이 재집결하여 우리 부대를 밀어냅니다!" #NT!
 tactical_forest_battle.220.d: "누출된 병력이 뒤에서 공격하는 동안 모루를 형성하십시오." #NT!
 tactical_forest_battle.220.d.success: "[center_flank_commander.GetTitledFirstName] 두 세력 사이에 오른쪽 측면이 박살났습니다!" #NT!
 tactical_forest_battle.220.d.failure: "그들의 권리는 현재도 굳건합니다!" #NT!
 tactical_forest_battle.220.e: "포위가 완료될 때까지 우리 군대가 더 열심히 싸울 수 있도록 격려하십시오." #NT!
 tactical_forest_battle.220.e.success: "[center_flank_commander.GetTitledFirstName] 두 세력 사이에 오른쪽 측면이 박살났습니다!" #NT!
 tactical_forest_battle.220.e.failure: "그들의 권리는 현재도 굳건합니다!" #NT!
  
  
