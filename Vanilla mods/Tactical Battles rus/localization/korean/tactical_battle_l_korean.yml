 # EVENT 7324 - Enemy Reorganizes Turns to Meet our center 
  
  
 tactical_forest_battle.7324.t: "적의 공격 중앙 측면" #NT!
 tactical_forest_battle.7324.desc: "[enemy_commander.GetFirstNamePossessive]은 우리의 약해진 중앙 측면을 인식하고 공격을 시작했습니다. 예비군이 없는 상황에서 우리는 중앙 측면을 유지하기 위해 중요한 결정을 내립니다." #NT!
 tactical_forest_battle.7324.a: "공격에 강한 중앙 측면" #NT!
 tactical_forest_battle.7324.a.success: "우리 중앙 측면은 적의 공격에 맞서 굳건히 방어하고 있습니다!" #NT!
 tactical_forest_battle.7324.a.failure: "중앙 측면이 압도되어 흔들리기 시작합니다!" #NT!
 tactical_forest_battle.7324.b: "기사를 보내 중앙을 강화하세요." #NT!
 tactical_forest_battle.7324.b.success: "신선한 기사들이 중앙 측면을 안정시킵니다!" #NT!
 tactical_forest_battle.7324.b.failure: "기사들은 중앙에 도달하기 전에 차단됩니다!" #NT!
 tactical_forest_battle.7324.c: "중앙 측면을 강화하기 위해 정예 부대를 보내십시오." #NT!
 tactical_forest_battle.7324.c.success: "우리 지원군이 중앙 측면을 안정시킵니다!" #NT!
 tactical_forest_battle.7324.c.failure: "지원군에도 불구하고 우리 센터가 무너지고 있어요!" #NT!
 tactical_forest_battle.7324.d: "증원군이 도착하는 동안 천천히 후퇴하여 중앙 위치를 벗어나도록 하세요." #NT!
 tactical_forest_battle.7324.d.success: "그들의 중심이 우리의 퇴각을 따라가기 시작하여 그들을 폭로합니다!" #NT!
 tactical_forest_battle.7324.d.failure: "센터는 압력을 받고도 헤어질 수 없습니다!" #NT!
 tactical_forest_battle.7324.e: "후퇴하는 척하고 추격자들을 공격하세요" #NT!
 tactical_forest_battle.7324.e.success: "적은 우리의 속임수에 넘어가 예상치 못한 공격을 가합니다!" #NT!
 tactical_forest_battle.7324.e.failure: "그들은 우리의 속임수를 간파하고 그들의 대형을 유지합니다!" #NT!
  
