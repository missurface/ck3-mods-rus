 tactical_forest_battle.8010.t: "노출된 센터!" #NT!
 tactical_forest_battle.8010.desc: "[enemy_commander.GetFirstNamePossessive] 왼쪽 측면에 남은 것은 후퇴하고 있습니다! 그들이 재집결하기 전에 그들을 추적하고 파괴할 절호의 기회가 왔습니다!" #NT!
 tactical_forest_battle.8010.a: "중앙의 측면을 켜세요" #NT!
 tactical_forest_battle.8010.a.success: "[right_flank_commander.GetFirstNameNicknamedPossessiveOrMyRegnal]이 방향을 돌려 중앙 측면으로 돌진합니다!" #NT!
 tactical_forest_battle.8010.a.failure: "오른쪽 측면이 막혀있습니다" #NT!
 tactical_forest_battle.8010.b: "포로 포획" #NT!
 tactical_forest_battle.8010.b.success: "많은 포로를 포로로 잡는다!" #NT!
 tactical_forest_battle.8010.b.failure: "죄수들이 빠져나가다!" #NT!
 tactical_forest_battle.8010.c: "기사를 보내 중앙의 노출된 측면을 공격하세요." #NT!
 tactical_forest_battle.8010.c.success: "기사단의 돌격이 혼란을 일으키고 있습니다" #NT!
 tactical_forest_battle.8010.c.failure: "기사단의 돌격이 흡수됩니다." #NT!
 tactical_forest_battle.8010.d: "우리 정예 부대를 보내 중앙의 노출된 측면을 공격하세요." #NT!
 tactical_forest_battle.8010.d.success: "우리의 정예 크랙 유닛이 적의 보급품을 파괴합니다!" #NT!
 tactical_forest_battle.8010.d.failure: "우리의 엘리트 크랙 유닛은 보급품을 찾을 수 없습니다!" #NT!
  
