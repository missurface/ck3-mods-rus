 # EVENT 9476 - Rally Army 
 tactical_forest_battle.9476.t: "군대를 집결시키다" #NT!
 tactical_forest_battle.9476.desc: "오른쪽의 전투는 중요한 지점에 도달했습니다. 우리 군대는 흔들리고 있지만 아직 무너지지는 않았습니다. 강력한 리더십과 과감한 행동으로 질서를 회복하고 상황을 반전시킬 수 있습니다!" #NT!
 tactical_forest_battle.9476.a: "오른쪽 누르기 공격" #NT!
 tactical_forest_battle.9476.a.success: "우리 군대는 부름을 듣고 집결합니다!" #NT!
 tactical_forest_battle.9476.a.failure: "군대는 계속 흔들리고 있습니다!" #NT!
 tactical_forest_battle.9476.b: "후퇴하는 척하여 적을 유인하고 반격" #NT!
 tactical_forest_battle.9476.b.success: "반격이 성공하고 사기가 치솟습니다!" #NT!
 tactical_forest_battle.9476.b.failure: "반격은 실패하고 사기는 무너진다!" #NT!
 tactical_forest_battle.9476.c: "부담을 덜어주기 위해 센터 충전이 어렵습니다." #NT!
 tactical_forest_battle.9476.c.success: "돌격으로 인해 오른쪽 측면이 혼란스러워졌습니다!" #NT!
 tactical_forest_battle.9476.c.failure: "적은 여전히 ​​굳건합니다!" #NT!
 tactical_forest_battle.9476.d: "압박을 완화하기 위해 왼쪽 측면이 강하게 돌진합니다." #NT!
 tactical_forest_battle.9476.d.success: "돌격으로 인해 왼쪽 측면이 혼란스러워졌습니다!" #NT!
 tactical_forest_battle.9476.d.failure: "적은 여전히 ​​굳건합니다!" #NT!
 tactical_forest_battle.9476.e: "기사를 보내 강화하세요" #NT!
 tactical_forest_battle.9476.e.success: "예비군이 도착하여 라인을 강화합니다!" #NT!
 tactical_forest_battle.9476.e.failure: "예비금이 너무 흩어져 도움이 되지 않습니다!" #NT!
 tactical_forest_battle.9476.f: "강화를 위해 정예 부대를 보내세요" #NT!
 tactical_forest_battle.9476.f.success: "우리 크랙 유닛은 적들에게 혼란을 야기합니다!" #NT!
 tactical_forest_battle.9476.f.failure: "우리 크랙 유닛이 압도당했습니다!" #NT!
  
