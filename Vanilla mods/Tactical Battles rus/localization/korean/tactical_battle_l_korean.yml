 # Event 7323 - Left Encircles (Outcomes) 
 tactical_forest_battle.7323.t: "오른쪽 측면이 포위되었습니다!" #NT!
 tactical_forest_battle.7323.desc: "[left_flank_commander.GetTitledFirstName]이(가) 오른쪽 측면 [enemy_commander.GetFirstNamePossessive]개를 성공적으로 포위했습니다! 이제 수천 명의 적군이 함정에 빠져 후퇴나 증원이 차단되었습니다. [enemy_commander.GetTitledFirstName]는 갇힌 세력이 전멸에 직면하는 것을 무기력하게 지켜보고 있습니다. 우리는 그들의 운명을 결정해야 합니다. 그들에게 명예로운 항복의 자비를 보여줄 것인가, 아니면 본보기로 그들을 완전히 파괴할 것인가?" #NT!
