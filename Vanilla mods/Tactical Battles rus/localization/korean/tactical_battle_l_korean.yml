 # EVENT 1014 - Center Pull Back Follow-up 
 # ============================================ 
 tactical_forest_battle.1014.t: "센터 풀백 전략" #NT!
 tactical_forest_battle.1014.desc: "적군 중앙은 재집결하고 다른 병력과 협력하기 위해 후퇴하고 있습니다. 우리는 추격할지, 함정으로 유인할지, 아니면 최대 효과를 위해 우리 부대의 위치를 ​​바꿀지 결정해야 합니다." #NT!
 tactical_forest_battle.1014.a: "적을 MAA 함정으로 유인하세요" #NT!
 tactical_forest_battle.1014.a.success: "적이 우리 함정에 직접 들어와서 파괴됩니다!" #NT!
 tactical_forest_battle.1014.a.failure: "적이 함정을 인지하고 회피한다!" #NT!
 tactical_forest_battle.1014.b: "왼쪽 측면이 왼쪽에서 강하게 돌격합니다." #NT!
 tactical_forest_battle.1014.b.success: "우리의 왼쪽 돌격은 왼쪽 적을 완전히 파괴합니다!" #NT!
 tactical_forest_battle.1014.b.failure: "왼쪽 돌격은 적의 예비군에 의해 격퇴됩니다!" #NT!
 tactical_forest_battle.1014.c: "센터가 돌아서 적을 학살합니다." #NT!
 tactical_forest_battle.1014.c.success: "우리 센터는 적 센터를 파괴합니다!" #NT!
 tactical_forest_battle.1014.c.failure: "적이 반격을 격퇴합니다!" #NT!
 tactical_forest_battle.1014.d: "적 중앙을 기사로 유인" #NT!
 tactical_forest_battle.1014.d.success: "우리 기사들에 의해 적 본부가 완벽하게 유인되어 파괴되었습니다!" #NT!
 tactical_forest_battle.1014.d.failure: "적은 미끼를 피해 퇴각한다!" #NT!
 tactical_forest_battle.1014.e: "장점을 누르세요" #NT!
 tactical_forest_battle.1014.e.success: "끊임없는 압력은 적의 사기를 완전히 꺾습니다!" #NT!
 tactical_forest_battle.1014.e.failure: "적은 버티고 자리를 지키고 있습니다!" #NT!
  
  # Event 0010 - Left Flank Focus Follow-up 
 tactical_forest_battle.0010.t: "왼쪽 측면 교전" #NT!
 tactical_forest_battle.0010.desc: "전투는 계속되고 우리 군대는 왼쪽 측면에서 교전합니다. [center_flank_commander.GetTitledFirstName] 명령은 중앙에 있고 [right_flank_commander.GetFirstName]은 오른쪽 측면에 있습니다. [left_flank_commander.GetTitledFirstName]는 왼쪽을 지휘하며, [left_flank_commander.GetHerHis] 병력을 사용하면 승리를 확보하는 데 중추적인 역할을 할 수 있습니다." #NT!
 tactical_forest_battle.0010.a: "왼쪽 측면에서 가짜 후퇴를 실행합니다." #NT!
 tactical_forest_battle.0010.a.success: "페이트 성공! 적군은 도망가는 병력을 추격하기 위해 진형을 무너뜨려 치명적인 취약점을 만들어냅니다." #NT!
 tactical_forest_battle.0010.a.failure: "적은 우리의 속임수를 간파하고 규율을 유지하며 우리의 속임수를 우리에게 돌리고 있습니다!" #NT!
 tactical_forest_battle.0010.b: "측면 기동을 수행" #NT!
 tactical_forest_battle.0010.b.success: "우리 측면 병력이 그들의 왼쪽 측면을 휩쓸며 그들의 결속력을 무너뜨렸습니다!" #NT!
 tactical_forest_battle.0010.b.failure: "이 사령관은 우리의 기동을 예상하고 우리를 만나기 위해 병력을 순환시킵니다." #NT!
 tactical_forest_battle.0010.e: "오른쪽 측면을 공격하고 실행하는 괴롭힘 전술" #NT!
 tactical_forest_battle.0010.e.success: "우리의 괴롭힘 전술이 그들을 지치게 합니다! 그들의 권리는 피를 흘리고 있습니다!" #NT!
 tactical_forest_battle.0010.e.failure: "적은 굳건히 자리 잡고 진형을 유지하고 있습니다!" #NT!
 tactical_forest_battle.0010.f: "숨겨진 측면 병력을 무너뜨리고 천천히 후퇴하세요." #NT!
 tactical_forest_battle.0010.f.success: "우리의 측면 부대는 성공적으로 교전을 해제하고 압박 공격을 우회합니다!" #NT!
 tactical_forest_battle.0010.f.failure: "우리의 측면 병력이 발견되어 전투에 투입되었습니다!" #NT!
 tactical_forest_battle.0010.g: "함정에 돌격할 권리를 유인하는 잘못된 간격을 만듭니다." #NT!
 tactical_forest_battle.0010.g.success: "그들의 권리가 틈새로 돌진하기 시작하고 우리의 함정에 빠지게 됩니다!" #NT!
 tactical_forest_battle.0010.g.failure: "그들의 권리는 미끼를 물기를 거부하고 규율을 유지합니다!" #NT!
  
 # Event 0011 - Center Flank Engagement 
