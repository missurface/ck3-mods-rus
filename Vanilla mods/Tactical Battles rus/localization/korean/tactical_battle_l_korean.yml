 tactical_forest_battle.0061.t: "[sc_loser.GetFullNameNicknamed]의 운명" #NT!
 tactical_forest_battle.0061.desc: "나의 마지막 일격으로 [sc_loser.GetFirstName]은 한쪽 무릎을 꿇고 피를 흘리며 구타당했습니다. 내 주변의 전쟁터가 맹위를 떨치는 동안 [sc_loser.GetTitledFirstNamePossessive]개의 눈은 반항과 체념이 뒤섞인 표정으로 나를 올려다본다. [sc_loser.GetHerHis] 운명을 결정할 때가 왔습니다." #NT!
 tactical_forest_battle.0061.a: "죽여라 [sc_loser.GetFirstName]" #NT!
 tactical_forest_battle.0061.a.success: "[sc_loser.GetFirstName]은 전장에서 [sc_loser.GetHerHis]의 끝을 만납니다." #NT!
 tactical_forest_battle.0061.b: "캡처 [sc_loser.GetFirstName]" #NT!
 tactical_forest_battle.0061.b.success: "[sc_loser.GetFirstName]이 포로로 잡혔습니다." #NT!
 tactical_forest_battle.0061.c: "[sc_loser.GetFirstNamePossessive] 눈을 빼앗고 [sc_loser.GetHerHim]을 [sc_loser.GetHerHis] 운명으로 풀어주세요." #NT!
 tactical_forest_battle.0061.c.success: "실명 [sc_loser.GetFirstName]은 [sc_loser.GetHerHis]의 생존을 보장하지만 비용이 많이 듭니다." #NT!
 tactical_forest_battle.0061.d: "[sc_loser.GetFirstName]에게 영구적인 상처를 남기고 [sc_loser.GetHerHim]을 [sc_loser.GetHerHis] 운명으로 풀어주세요." #NT!
 tactical_forest_battle.0061.d.success: "그 흉터는 [sc_loser.GetFirstNamePossessive] 패배를 영원히 상기시키는 역할을 할 것입니다." #NT!
 tactical_forest_battle.0061.e: "[sc_loser.GetFirstName]을 불구로 만들고 [sc_loser.GetHerHim]을 [sc_loser.GetHerHis] 운명으로 풀어주세요" #NT!
 tactical_forest_battle.0061.e.success: "[sc_loser.GetFirstName]은 남은 [sc_loser.GetHerHis] 생애 동안 [sc_loser.GetHerHis] 부상의 부담을 짊어지게 됩니다." #NT!
  
  
 # Event 0005 - First tactical decision (Forest) 
 tactical_forest_battle.0005.t: "[battle_location.GetProvince.GetName]의 [battle_location.GetProvince.GetTerrain.GetName|l]에서 전투" #NT!
 tactical_forest_battle.0005.desc: "[fighting_war.GetName]을 위해 [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal]과 전쟁을 벌이는 동안 내 군대는 [battle_location.GetProvince.GetName]의 [battle_location.GetProvince.GetTerrain.GetName|l]에서 [enemy_war_leader.GetFullNameNicknamedOrMeRegnal]의 군대와 충돌합니다. 우리 정찰병들은 [enemy_commander.GetFullNameNicknamedOrMeRegnal]가 지휘를 맡고 있다고 보고했습니다. 나는 지휘관으로서 [enemy_commander.GetTitleTierName]을 극복하기 위한 움직임을 선택해야 합니다." #NT!
 tactical_forest_battle.0005.a: "왼쪽 측면에 집중하세요([left_flank_commander.GetSkill( 'martial' )]#! [martial|E] [left_flank_commander.GetTitledFirstNameOrMe] 대 [enemy_right_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_right_flank_commander.GetSkill( 'martial' )]#! [martial|E])" #NT!
 tactical_forest_battle.0005.b: "중앙에 집중하세요([center_flank_commander.GetSkill( 'martial' )]#! [martial|E] [center_flank_commander.GetTitledFirstNameOrMe] vs [enemy_center_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_center_flank_commander.GetSkill( 'martial' )]#! [martial|E])" #NT!
 tactical_forest_battle.0005.c: "오른쪽 측면에 집중하세요([right_flank_commander.GetSkill( 'martial' )]#! [martial|E] [right_flank_commander.GetTitledFirstNameOrMe] vs [enemy_left_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_left_flank_commander.GetSkill( 'martial' )]#! [martial|E])" #NT!
 tactical_forest_battle.0005.d: "내 기사들을 예비해 두세요" #NT!
 tactical_forest_battle.0005.d.success: "내 기사들은 어떤 기회라도 활용할 수 있는 완벽한 위치에 있습니다!" #NT!
 tactical_forest_battle.0005.d.failure: "전투가 너무 빨리 전개되고, 내 기사들이 제자리에서 벗어나게 됩니다." #NT!
 tactical_forest_battle.0005.e: "엘리트 원거리 유닛에 집중하세요" #NT!
 tactical_forest_battle.0005.f: "우리의 정예 기병대에 집중하세요" #NT!
 tactical_forest_battle.0005.n: "지휘관을 위해 돌격하세요!" #NT!
 tactical_forest_battle.0005.n.success: "[left_flank_commander.GetFullNameNicknamedOrMe] 결투 [enemy_right_flank_commander.GetFullNameNicknamed]" #NT!
 tactical_forest_battle.0005.n.failure: "우리의 돌격은 돌파할 수 없습니다!" #NT!
 tactical_forest_battle.0005.kc: "결투 승리!" #NT!
 tactical_forest_battle.0005.kc.success: "[left_flank_commander.GetFullNameNicknamed]이 단일 전투에서 [enemy_right_flank_commander.GetFullNameNicknamed]을 죽여 군대의 사기를 저하시켰습니다!" #NT!
 tactical_forest_battle.0005.cc: "결투 승리!" #NT!
 tactical_forest_battle.0005.cc.success: "[left_flank_commander.GetFullNameNicknamed]이 단일 전투에서 [enemy_right_flank_commander.GetHerHim]를 격파한 후 [enemy_right_flank_commander.GetFullNameNicknamed]을 점령하여 군대의 사기를 저하시켰습니다!" #NT!
 tactical_forest_battle.0005.ld: "결투에서 패배했습니다!" #NT!
 tactical_forest_battle.0005.ld.failure: "[left_flank_commander.GetFullNameNicknamed]은 [enemy_right_flank_commander.GetFirstName]를 포위한 후 [enemy_right_flank_commander.GetFullNameNicknamed]에게 패배했습니다! 전투 중!" #NT!
 tactical_forest_battle.0005.ldk: "결투에서 사망했습니다!" #NT!
 tactical_forest_battle.0005.ldk.failure: "[left_flank_commander.GetFullNameNicknamed]은 전투에서 [enemy_right_flank_commander.GetFirstName]를 포위한 후 [enemy_right_flank_commander.GetFullNameNicknamed]에 의해 사망했습니다!" #NT!
 tactical_forest_battle.0005.j: "충전 [enemy_right_flank_commander.GetFullNameNicknamed]!" #NT!
 tactical_forest_battle.0005.j.failure: "[left_flank_commander.GetFullNameNicknamed]은 [enemy_right_flank_commander.GetFullNameNicknamed]을 돌파하지 못했습니다." #NT!
 tactical_forest_battle.0005.dtt.success: "우리의 측면 돌격과 주변 [enemy_right_flank_commander.GetFirstName]" #NT!
 # Event 0110 - Cavalry Feint SUCCESS Follow-up: Trap Sprung 
 tactical_forest_battle.0110.t: "함정이 터졌다!" #NT!
 tactical_forest_battle.0110.desc: "[left_flank_commander.GetTitledFirstNamePossessive] 페인트가 완벽하게 작동했습니다! [enemy_commander.GetFirstNamePossessive]개의 명령은 빠져나갔고, [enemy_commander.GetHerHis]개의 선봉대는 미끼를 잡기 위해 대형을 깨뜨렸습니다. 그들의 라인의 오른쪽은 이제 가늘고 무질서하게 뻗어있습니다." #NT!
 tactical_forest_battle.0110.a: "[left_flank_commander.GetTitledFirstName]은 무질서한 군대를 우리 특수 부대의 함정으로 이끌고 있습니다." #NT!
 tactical_forest_battle.0110.a.success: "[enemy_commander.GetFirstNamePossessive] 오른쪽이 [left_flank_commander.GetFirstNamePossessive] 도망가는 군대를 따라 매복 공격을 가합니다!" #NT!
 tactical_forest_battle.0110.a.failure: "오른쪽은 미끼를 물지 않고 위치를 유지하며 유닛을 회전시켜 다른 측면을 지원합니다." #NT!
 tactical_forest_battle.0110.b: "기사를 보내 지나치게 확장된 측면을 분쇄하세요." #NT!
 tactical_forest_battle.0110.b.success: "기사들이 적의 노출된 측면을 강타하여 진형을 무너뜨립니다!" #NT!
 tactical_forest_battle.0110.b.failure: "적은 빠르게 재편성하여 우리 기사들을 공격합니다" #NT!
 tactical_forest_battle.0110.c: "[right_flank_commander.GetTitledFirstNamePossessive] 측면에서 병력을 분리하여 유인된 유닛을 포위하세요." #NT!
 tactical_forest_battle.0110.c.success: "[right_flank_commander.GetTitledFirstName]이 적 유닛을 성공적으로 포위하여 후퇴를 차단했습니다!" #NT!
 tactical_forest_battle.0110.c.failure: "적이 우리의 고갈된 오른쪽 측면에 파괴적인 돌격을 가하고 있습니다." #NT!
 tactical_forest_battle.0110.d: "[center_flank_commander.GetFirstNamePossessive] 예비군을 회전시켜 유인된 유닛을 둘러쌉니다." #NT!
 tactical_forest_battle.0110.d.success: "예비군은 신속하게 이동하여 포위할 수 있는 위치에 있습니다." #NT!
 tactical_forest_battle.0110.d.failure: "[enemy_commander.GetFirstNamePossessive]이 우리의 고갈된 센터를 알아봤습니다!" #NT!
 tactical_forest_battle.0110.e: "완전 충전으로 유인된 유닛을 돌려서 처치하세요." #NT!
 tactical_forest_battle.0110.e.success: "완전 돌격으로 적을 깜짝 놀라게 합니다!" #NT!
 tactical_forest_battle.0110.e.failure: "적은 굳건히 남아 우리의 돌격을 격퇴합니다!" #NT!
  
  
 # ============================================ 
 # EVENT 9474 - Rally Army After Being Pressured 
 # ============================================ 
  
 tactical_forest_battle.9474.t: "군대를 집결시키다" #NT!
 tactical_forest_battle.9474.desc: "좌익의 전투는 임계점에 도달했습니다. 우리 군대는 흔들리고 있지만 아직 무너지지는 않았습니다. 강력한 리더십과 과감한 행동으로 질서를 회복하고 상황을 반전시킬 수 있습니다!" #NT!
 tactical_forest_battle.9474.a: "공격은 왼쪽 누르기" #NT!
 tactical_forest_battle.9474.a.success: "우리 군대는 부름을 듣고 집결합니다!" #NT!
 tactical_forest_battle.9474.a.failure: "군대는 계속 흔들리고 있습니다!" #NT!
 tactical_forest_battle.9474.b: "후퇴하는 척하여 적을 유인하고 반격" #NT!
 tactical_forest_battle.9474.b.success: "반격이 성공하고 사기가 치솟습니다!" #NT!
 tactical_forest_battle.9474.b.failure: "반격은 실패하고 사기는 무너진다!" #NT!
 tactical_forest_battle.9474.c: "부담을 덜어주기 위해 센터 충전이 어렵습니다." #NT!
 tactical_forest_battle.9474.c.success: "돌격으로 인해 오른쪽 측면이 혼란스러워졌습니다!" #NT!
 tactical_forest_battle.9474.c.failure: "적은 여전히 ​​굳건합니다!" #NT!
 tactical_forest_battle.9474.d: "오른쪽 측면은 압박을 완화하기 위해 강하게 돌진합니다." #NT!
 tactical_forest_battle.9474.d.success: "돌격으로 인해 왼쪽 측면이 혼란스러워졌습니다!" #NT!
 tactical_forest_battle.9474.d.failure: "적은 여전히 ​​굳건합니다!" #NT!
 tactical_forest_battle.9474.e: "기사를 보내 강화하세요" #NT!
 tactical_forest_battle.9474.e.success: "예비군이 도착하여 라인을 강화합니다!" #NT!
 tactical_forest_battle.9474.e.failure: "예비금이 너무 흩어져 도움이 되지 않습니다!" #NT!
 tactical_forest_battle.9474.f: "강화를 위해 정예 부대를 보내세요" #NT!
 tactical_forest_battle.9474.f.success: "우리 크랙 유닛은 적들에게 혼란을 야기합니다!" #NT!
 tactical_forest_battle.9474.f.failure: "우리 크랙 유닛이 압도당했습니다!" #NT!
  
 # ============================================ 
 # EVENT 0650 - Right Flank Reserves Intercept 
 # ============================================ 
 tactical_forest_battle.0650.t: "오른쪽 측면에서 적의 움직임을 차단" #NT!
 tactical_forest_battle.0650.desc: "우리 오른쪽 측면 예비군이 우리 위치에 맞서 기동을 시도하는 [enemy_commander.GetFirstNamePossessive]명의 병력을 감지했습니다. 적이 움직임을 완료하기 전에 행동할 수 있는 짧은 시간이 있습니다." #NT!
  
 tactical_forest_battle.0650.a: "오른쪽 측면에서 강력한 압박을 가한다." #NT!
 tactical_forest_battle.0650.a.success: "오른쪽 측면에서 압도적인 일격을 가해 적의 오른쪽 측면을 무너뜨립니다!" #NT!
 tactical_forest_battle.0650.a.failure: "압박은 뒤로 물러나고 적이 주도권을 잡습니다!" #NT!
  
 tactical_forest_battle.0650.b: "왼쪽 측면을 움직여 뒤에서 공격하세요." #NT!
 tactical_forest_battle.0650.b.success: "우리의 바퀴 기동은 파괴적인 일제 사격으로 적을 붙잡습니다!" #NT!
 tactical_forest_battle.0650.b.failure: "측면 기동이 감지되어 적의 반격으로 인해 방해를 받습니다!" #NT!
  
 tactical_forest_battle.0650.c: "대담한 집결 소집으로 군대에 영감을 주세요" #NT!
 tactical_forest_battle.0650.c.success: "부대는 고무되어 적의 진격을 밀어냅니다!" #NT!
 tactical_forest_battle.0650.c.failure: "우리의 집결 요청은 무시되었고 군대는 계속해서 입지를 잃어가고 있습니다!" #NT!
  
 tactical_forest_battle.0650.d: "적절한 예비금을 켜서 혼란을 조성하십시오." #NT!
 tactical_forest_battle.0650.d.success: "예비금은 우리가 호의적으로 재배치하기에 충분한 혼란을 야기합니다!" #NT!
 tactical_forest_battle.0650.d.failure: "음모는 역효과를 낳고 적들은 우리의 혼란을 이용합니다!" #NT!
  
 tactical_forest_battle.0650.e: "기사를 보내 오른쪽 측면을 강화하세요." #NT!
 tactical_forest_battle.0650.e.success: "기사들이 측면을 강화하고 위치를 확보합니다!" #NT!
 tactical_forest_battle.0650.e.failure: "수많은 적군에 의해 기사들이 단절되고 포위됩니다!" #NT!
  
 tact_duel_kills_commander_desc: "#alert_trial [left_flank_commander.GetFirstName] 전투에서 적을 죽입니다 [enemy_right_flank_commander.GetFirstName]#!" #NT!
 tact_duel_capture_desc: "#alert_trial [left_flank_commander.GetFirstName] 전투에서 적을 물리칩니다 [enemy_right_flank_commander.GetFirstName]#!" #NT!
 tact_duel_loses_desc: "#alert_trial [enemy_right_flank_commander.GetFirstName] 전투에서 우리 기사를 물리쳤습니다 [left_flank_commander.GetFirstName]#!" #NT!
 tact_duel_dies_desc: "#alert_trial [enemy_right_flank_commander.GetFirstName] 전투에서 우리 기사를 죽였습니다 [left_flank_commander.GetFirstName]#!" #NT!
 tact_duel_lost_injury_tt: "크게 다칠 수도 있어요!" #NT!
 tact_duel_captured_tt: "[enemy_right_flank_commander.GetFirstName]은 전투 후 포로가 됩니다." #NT!
 tactical_knight_lost_commander_tt: "#alert_trial 지휘관을 잃은 적의 측면이 흔들리고 있습니다. #!" #NT!
 tactical_our_charge_was_routed_tt: "#alert_trial 적은 우리의 돌격을 흡수하고 개혁합니다#!" #NT!
