 # Event 0210 - Cavalry Feint FAILURE Follow-up: Feint Unmasked 
 tactical_forest_battle.0210.t: "가면을 벗은 페인트!" #NT!
 tactical_forest_battle.0210.desc: "[enemy_commander.GetTitledFirstName] 우리 기병의 속임수를 간파했어요! 그들의 군대는 추격하는 대신 규율을 유지했고, 이제 우리 기병들은 든든한 보병, 미사일 일제 사격, 매복 대기 중인 반기병대와 마주하고 있습니다. 전술적 상황이 우리에게 불리하게 바뀌었습니다. 이 재난을 어떻게 구제할지 결정해야 합니다." #NT!
 tactical_forest_battle.0210.a: "함정을 뚫고 나가세요! 모든 것을 충전하세요! (무술 + 기량 vs [enemy_commander.GetShortUINameNoTooltip], 매우 위험함)" #NT!
 tactical_forest_battle.0210.a.success: "모든 역경에도 불구하고 우리의 순수한 대담함이 그들의 대형을 무너뜨렸습니다! 우리의 절박한 돌격에 적군이 비틀거리고 있습니다!" #NT!
 tactical_forest_battle.0210.a.failure: "혐의는 치명적인 패배로 무너집니다. 우리 기병대는 흩어지고 부서졌습니다!" #NT!
 tactical_forest_battle.0210.b: "내려서 라인을 유지하세요! (보병 지원 필요)" #NT!
 tactical_forest_battle.0210.c: "기병대와 함께 후퇴를 감시하세요. (군대를 구하기 위해 기병을 희생)" #NT!
 tactical_forest_battle.0210.d: "개인적인 리더십으로 흔들리는 말을 집결시키세요! (Brave, Inspiring Leader 또는 Martial 14+ 필요)" #NT!
 tactical_forest_battle.0210.d.success: "내 지도력이 기병대를 굳건히 지킨다! 그들은 개혁하고 계속해서 싸울 준비를 하고 있습니다!" #NT!
 tactical_forest_battle.0210.d.failure: "기병대는 집결을 거부합니다. 사기는 계속해서 무너지고 있습니다." #NT!
  
  
  
 # Event 0120 - Infantry Ambush SUCCESS Follow-up: Kill Zone in the Woods 
 tactical_forest_battle.0120.t: "숲속의 킬존!" #NT!
 tactical_forest_battle.0120.desc: "적군이 우리의 은폐된 보병과 미사일 부대로 곧장 걸어 들어왔습니다! 숲의 시야는 좋지 않고, 진형은 얇아져 있으며, 지휘 구조는 혼란에 빠져 있습니다. [enemy_commander.GetTitledFirstName]의 병력은 완벽한 학살장에 갇혔습니다. 이 기회를 어떻게 활용해야 할까요?" #NT!
 tactical_forest_battle.0120.a: "함정의 턱을 닫아라! 앞면과 뒷면을 밀봉하세요!" #NT!
 tactical_forest_battle.0120.b: "화살과 투창이 말하게 하십시오. 우리 보병을 엄폐해주세요. (궁수/척추병 필요)" #NT!
 tactical_forest_battle.0120.b.success: "우리의 미사일 포격이 그들의 노출된 종대를 파괴했습니다!" #NT!
 tactical_forest_battle.0120.b.failure: "그들의 방패와 갑옷은 우리 포격의 효과를 제한합니다." #NT!
 tactical_forest_battle.0120.c: "장교를 먼저 공격하세요. 배너와 지휘관을 목표로 삼으세요!" #NT!
 tactical_forest_battle.0120.c.success: "우리 공격팀은 주요 장교를 제거합니다! 그들의 명령은 무너진다!" #NT!
 tactical_forest_battle.0120.c.failure: "공격팀은 고립되어 있으며 막대한 사상자가 발생하고 있습니다!" #NT!
 tactical_forest_battle.0120.d: "피를 흘리게 한 다음 다시 숲 속으로 사라집니다." #NT!
  
  
 # Event 0220 - Infantry Ambush FAILURE Follow-up: Ambush Detected 
 tactical_forest_battle.0220.t: "매복 감지!" #NT!
 tactical_forest_battle.0220.desc: "[enemy_commander.GetTitledFirstName] 우리 매복 공격을 간파했어요! 그들의 정찰병들은 우리의 숨겨진 위치를 알아냈고, 그들의 군대는 우리가 함정을 치기 전에 적응했습니다. 우리의 분산된 보병 부대는 어떠한 협력적 이점도 없이 [battle_location.GetName]에 노출되었습니다. 나는 이 전술적 재난을 어떻게 해결할 것인지 결정해야 합니다." #NT!
 tactical_forest_battle.0220.a: "후퇴하고 방어진지를 강화하라! 요새로 재편성하세요." #NT!
 tactical_forest_battle.0220.b: "적의 압박을 통해 진형을 바꾸고 반격하세요! (마샬 11+, 고위험)" #NT!
 tactical_forest_battle.0220.b.success: "우리의 예상치 못한 공격이 적의 허를 찔렀습니다! 그들의 형성이 깨졌습니다!" #NT!
 tactical_forest_battle.0220.b.failure: "반격은 우리 보병을 더욱 노출시킵니다. 재해!" #NT!
 tactical_forest_battle.0220.c: "숲을 이용해 유닛을 분산시키고 다른 곳으로 재형성하세요. (청지기직 10+)" #NT!
 tactical_forest_battle.0220.c.success: "우리 부대는 나무 사이로 빠져나가 안전하게 재집결합니다!" #NT!
 tactical_forest_battle.0220.c.failure: "분산된 유닛은 재형성될 수 없습니다. 그들은 여전히 ​​무질서하고 취약한 상태로 남아 있습니다." #NT!
 tactical_forest_battle.0220.d: "우리의 입장을 지키고 압박감을 이겨내세요! 큰 사상자를 받아들입니다." #NT!
  
 # Event 0130 - Levy Braced SUCCESS Follow-up: Spears and Trees 
 tactical_forest_battle.0130.t: "창과 나무!" #NT!
 tactical_forest_battle.0130.desc: "부과금 창벽은 돌처럼 굳건합니다! 우리 병사들이 나무 사이에 몸을 심으면 숲 자체가 요새가 됩니다. [enemy_commander.GetTitledFirstName]의 병력이 우리의 뻣뻣한 대형에 부딪쳐 흔들리고 있습니다. 이제 우리의 이점을 활용할 순간이 왔습니다. 어떻게 그들의 약점을 이용해야 할까요?" #NT!
 tactical_forest_battle.0130.a: "줄을 잡고 갈아주세요. 소모가 우리를 위해 일하게 해주세요." #NT!
 tactical_forest_battle.0130.b: "중앙을 갑자기 공격하세요! (Learning + Martial 9+, 중간 위험)" #NT!
 tactical_forest_battle.0130.b.success: "갑작스러운 추격으로 그들의 결심이 무너졌습니다! 적진이 무너진다!" #NT!
 tactical_forest_battle.0130.b.failure: "추력은 느려지지만 선은 유지됩니다. 그들은 깨지기를 거부합니다." #NT!
 tactical_forest_battle.0130.c: "궁수들이 킬링필드에서 그들을 학살하게 하세요. (궁수 MaA 필요)" #NT!
 tactical_forest_battle.0130.c.success: "파괴적인 발리슛이 쏟아집니다! 킬링 필드는 수백 명을 요구합니다!" #NT!
 tactical_forest_battle.0130.c.failure: "궁수는 화살이 부족해 이점을 잃습니다." #NT!
 tactical_forest_battle.0130.d: "모루를 만들어 그들의 돌격을 분쇄하세요! (인성에 중점)" #NT!
  
 # Event 0230 - Levy Scattered FAILURE Follow-up: Formation Broken 
 tactical_forest_battle.0230.t: "대형이 깨졌습니다!" #NT!
 tactical_forest_battle.0230.desc: "공황 상태에서 부과금이 흩어집니다! 뻣뻣한 창벽을 형성하는 대신 병사들은 나무 사이로 퍼져서 조직을 맞추거나 줄을 유지할 수 없었습니다. [enemy_commander.GetTitledFirstName]은 약점을 보고 이를 이용합니다. 대형이 붕괴되었습니다. 이 재난을 복구하려면 신속하게 조치를 취해야 합니다." #NT!
 tactical_forest_battle.0230.a: "개인적인 모범으로 그들을 단결시키십시오! 앞에서부터 이끌어라! (기량 10+, 무술 9+)" #NT!
 tactical_forest_battle.0230.a.success: "내 개인적인 용기가 군인들을 집결시킵니다! 그들은 개혁하고 단련합니다!" #NT!
 tactical_forest_battle.0230.a.failure: "군인들은 겁에 질려 흩어졌습니다. 사기가 회복되지 않습니다." #NT!
 tactical_forest_battle.0230.b: "정예 기사를 투입해 전선을 강화하세요. (기사 2명 이상 필요)" #NT!
 tactical_forest_battle.0230.c: "흩어져 있는 유닛을 더 나은 지형으로 재배치합니다. (청지기직 9+)" #NT!
 tactical_forest_battle.0230.c.success: "흩어진 부담금을 모아서 더 강한 땅으로 재배치합니다!" #NT!
 tactical_forest_battle.0230.c.failure: "재배치 시도가 실패합니다. 유닛이 더욱 분산됩니다!" #NT!
 tactical_forest_battle.0230.d: "대신 적의 사기를 낮추는 데 집중하세요. (음모 8+, 심리전)" #NT!
  
  
 # Event 0140 - Knights in Reserve SUCCESS Follow-up: Knights Ready 
 tactical_forest_battle.0140.t: "기사 준비 완료!" #NT!
 tactical_forest_battle.0140.desc: "기사들은 적의 시야에서 숨어 완벽한 준비를 하고 기다리고 있습니다. [enemy_commander.GetTitledFirstName]의 군대는 공격을 기다리고 있는 우리 기병 예비군을 알지 못한 채 현재 위치에 전념하고 있습니다. 이제 그들을 풀어줄 순간입니다. 그들의 파괴적인 잠재력을 어떻게 활용해야 할까요?" #NT!
 tactical_forest_battle.0140.a: "해머 스트라이크 - 파괴적인 기병 돌격! (기량 11+, 매우 높은 위험/보상)" #NT!
 tactical_forest_battle.0140.a.success: "청구가 완벽하게 실행되었습니다! 우리 기사들은 적의 진형을 유리처럼 박살냅니다!" #NT!
 tactical_forest_battle.0140.a.failure: "돌격이 과도하게 확대되어 기사들이 고립되었습니다!" #NT!
 tactical_forest_battle.0140.b: "측면 기동—적 주위를 돌으세요! (마샬 10+)" #NT!
 tactical_forest_battle.0140.b.success: "측면공격 성공! 적이 뒤에서 허를 찔립니다!" #NT!
 tactical_forest_battle.0140.b.failure: "기동이 전개되기 전에 차단됩니다!" #NT!
 tactical_forest_battle.0140.c: "추격—후퇴하는 유닛을 활용하세요! (음모 9+)" #NT!
 tactical_forest_battle.0140.c.success: "추격으로 적을 패주시키세요! 그들은 재구성할 수 없습니다!" #NT!
 tactical_forest_battle.0140.c.failure: "추격이 막히고 우리 기병대가 사상자를 냈습니다." #NT!
 tactical_forest_battle.0140.d: "규율 있는 철수 - 기사를 이용해 퇴각을 엄호하십시오. (청지기직 9+)" #NT!
  
 martial_positive: "전술적 이점" #NT!
 martial_negative: "전술적 단점" #NT!
  
 frontline_commander: "최전선 사령관" #NT!
 frontline_commander_desc: "이 캐릭터는 치열한 전투에서 군대를 이끌고 더 큰 용기와 효율성을 발휘하도록 영감을 줍니다." #NT!
 tactical_commander: "전술지휘관" #NT!
  
 # ============================================ 
 # EVENT 2010 - Left Flank Tactics 
 # ============================================ 
 tactical_forest_battle.2010.t: "페인트를 따라가다" #NT!
 tactical_forest_battle.2010.desc: "오른쪽 측면에 대한 우리의 페인트 공격으로 인해 적의 주의가 집중되었고, 왼쪽 측면이 취약해졌습니다. 우리는 그들이 반응하고 강화하기 전에 이 기회를 가장 잘 활용하는 방법을 결정해야 합니다." #NT!
  
 tactical_forest_battle.2010.a: "뒤쫓는 적을 돌아서 죽여라" #NT!
 tactical_forest_battle.2010.a.success: "왼쪽 측면이 갑자기 추격자를 공격합니다." #NT!
 tactical_forest_battle.2010.a.failure: "[enemy_commander.GetFirstNamePossessive] 오른쪽 측면은 우리의 갑작스러운 공격에도 굳건히 버티고 있습니다" #NT!
  
 tactical_forest_battle.2010.b: "우리 정예 부대의 매복 공격을 유인하세요" #NT!
 tactical_forest_battle.2010.b.success: "오른쪽 측면이 함정에 빠졌습니다!" #NT!
 tactical_forest_battle.2010.b.failure: "그들의 권리는 규율을 유지하고 거짓을 따르기를 거부합니다." #NT!
  
 tactical_forest_battle.2010.c: "오른쪽 리저브를 회전시켜 아웃 포지션 오른쪽 측면을 포위하려고 시도합니다." #NT!
 tactical_forest_battle.2010.c.success: "우리 군대는 이탈하여 적을 포위할 위치에 있습니다!" #NT!
 tactical_forest_battle.2010.c.failure: "다가오는 포위 세력이 정면으로 마주합니다." #NT!
  
 tactical_forest_battle.2010.d: "중앙 예비군을 회전시켜 위치가 벗어난 오른쪽 측면을 포위하려고 시도합니다." #NT!
 tactical_forest_battle.2010.d.success: "우리 군대는 이탈하여 적을 포위할 위치에 있습니다!" #NT!
 tactical_forest_battle.2010.d.failure: "다가오는 포위군이 정면으로 맞닥뜨린다." #NT!
  
 tactical_forest_battle.2010.e: "장점을 누르세요" #NT!
 tactical_forest_battle.2010.e.success: "위치를 벗어난 적을 활용하자!" #NT!
 tactical_forest_battle.2010.e.failure: "우리가 그들의 위치를 ​​이용하기 전에 적이 강화됩니다." #NT!
  
 # ============================================ 
 # EVENT 2012 - Knights Break Left Flank 
 # ============================================ 
 tactical_forest_battle.2012.t: "기사단은 오른쪽을 뚫고 나갑니다." #NT!
 tactical_forest_battle.2012.desc: "우리 기사들이 [enemy_commander.GetFirstNameNicknamedPossessiveOrMyRegnal]의 오른쪽 측면을 찢어서 혼란에 빠뜨렸습니다. 지금 공격을 가하면 노출된 중앙을 켜고 회복하기 전에 분쇄할 수 있습니다." #NT!
  
 tactical_forest_battle.2012.a: "왼쪽 측면이 공백을 메우고 있다" #NT!
 tactical_forest_battle.2012.a.success: "[left_flank_commander.GetFullNameNicknamedPossessiveOrMy] 측면이 부서진 적 진형을 뚫고 돌진합니다!" #NT!
 tactical_forest_battle.2012.a.failure: "적은 빠르게 안정되어 추가 침투를 막아냅니다!" #NT!
  
 tactical_forest_battle.2012.b: "우리의 정예 연대를 보내 그들의 권리를 무너뜨리세요" #NT!
 tactical_forest_battle.2012.b.success: "우리의 정예 연대가 적을 쳐부수고 있습니다!" #NT!
 tactical_forest_battle.2012.b.failure: "그들의 우파는 집회를 열고 혐의에 맞서고 있습니다!" #NT!
  
 tactical_forest_battle.2012.c: "왼쪽 측면은 오른쪽 측면을 파괴하기 위해 열심히 돌격합니다." #NT!
 tactical_forest_battle.2012.c.success: "[left_flank_commander.GetFullNameNicknamedPossessiveOrMy] 측면이 오른쪽 측면을 무너뜨립니다." #NT!
 tactical_forest_battle.2012.c.failure: "그들의 우파는 집회를 열고 혐의에 맞서고 있습니다!" #NT!
  
 tactical_forest_battle.2012.d: "장점을 누르세요" #NT!
 tactical_forest_battle.2012.d.success: "[left_flank_commander.GetFullNameNicknamedOrMe]이 계속해서 오른쪽 측면을 압박하고 있습니다!" #NT!
 tactical_forest_battle.2012.d.failure: "침해를 악용하기 전에 권리가 강화됩니다!" #NT!
  
 tactical_forest_battle.2012.f: "중앙 예비군을 회전시켜 나머지 오른쪽 측면을 압도하세요" #NT!
 tactical_forest_battle.2012.f.success: "중앙 예비군이 회전하여 나머지 오른쪽 측면을 분쇄합니다!" #NT!
 tactical_forest_battle.2012.f.failure: "예비군은 중앙에서 밀어낸 후에는 분리될 수 없습니다!" #NT!
  
  
  
 # ============================================ 
 # EVENT 2014 - Right Flank Reserves Flood Left 
 # ============================================ 
 tactical_forest_battle.2014.t: "왼쪽 측면에 대한 연합 공격" #NT!
 tactical_forest_battle.2014.desc: "우리 오른쪽 측면 예비군과 [left_flank_commander.GetFullNameNicknamedPossessiveOrMy] 왼쪽 병력의 연합 공격이 그들의 오른쪽 측면 공격을 압박하고 있습니다. 여기서 돌파할 수 있다면 중앙을 공격할 수 있습니다." #NT!
 tactical_forest_battle.2014.a: "연합군이 격차를 메우다" #NT!
 tactical_forest_battle.2014.a.success: "연합군이 적을 압도하고 혼란에 빠지게 됩니다!" #NT!
 tactical_forest_battle.2014.a.failure: "적군은 틈을 메우기 위해 빠르게 병력을 이동합니다!" #NT!
  
 tactical_forest_battle.2014.b: "우리 정예 연대를 보내 그들의 무질서한 측면을 돌격하게 하세요" #NT!
 tactical_forest_battle.2014.b.success: "우리 크랙 유닛이 오른쪽 측면에 대혼란을 일으키고 있습니다!" #NT!
 tactical_forest_battle.2014.b.failure: "적군이 재집결하여 공격을 격퇴합니다!" #NT!
  
 tactical_forest_battle.2014.c: "기사를 보내 오른쪽 측면을 돌격하세요." #NT!
 tactical_forest_battle.2014.c.success: "기사와 예비군이 함께 돌격하고 그들의 우익은 패닉 상태에 빠지게 됩니다." #NT!
 tactical_forest_battle.2014.c.failure: "합동공격에 맹렬한 반격이 만난다!" #NT!
  
 tactical_forest_battle.2014.d: "왼쪽을 플러딩하여 중앙 뒤로 가려고 시도합니다." #NT!
 tactical_forest_battle.2014.d.success: "우리는 그들의 오른쪽 측면을 통해 약간의 병력을 확보할 수 있었습니다." #NT!
 tactical_forest_battle.2014.d.failure: "적군은 움직임을 예상하고 정면으로 홍수를 맞이합니다." #NT!
  
 tactical_forest_battle.2014.e: "공격을 눌러라" #NT!
 tactical_forest_battle.2014.e.success: "우리의 공격은 파괴적인 결과를 가져오며 계속됩니다!" #NT!
 tactical_forest_battle.2014.e.failure: "적이 안정되고 추진력이 느려집니다!" #NT!
  
 # ============================================ 
 # EVENT 2016 - Center Flank Tactics 
 # ============================================ 
 tactical_forest_battle.2016.t: "왼쪽의 결합 공격" #NT!
 tactical_forest_battle.2016.desc: "우리 중앙 예비군과 [left_flank_commander.GetFullNameNicknamedPossessiveOrMy] 좌익의 합동 공격이 그들의 오른쪽 측면 공격을 압박하고 있습니다. 여기서 돌파할 수 있다면 중앙을 공격할 수 있습니다." #NT!
  
 tactical_forest_battle.2016.a: "센터 예비금이 격차를 메우고 있습니다." #NT!
 tactical_forest_battle.2016.a.success: "중앙 예비군이 쏟아져 나와 적을 완전히 무너뜨린다!" #NT!
 tactical_forest_battle.2016.a.failure: "적은 중앙을 안정시키고 굳건히 지키고 있습니다!" #NT!
  
 tactical_forest_battle.2016.b: "중앙을 무너뜨리기 위해 우리의 정예 부대를 보내세요" #NT!
 tactical_forest_battle.2016.b.success: "크랙 유닛이 적 중앙을 강타합니다!" #NT!
 tactical_forest_battle.2016.b.failure: "크랙 유닛의 공격은 큰 손실을 입고 격퇴됩니다!" #NT!
  
 tactical_forest_battle.2016.c: "공격을 지원하기 위해 기사를 보내세요" #NT!
 tactical_forest_battle.2016.c.success: "기사들이 중앙으로 돌격하여 적을 흩어지게 합니다!" #NT!
 tactical_forest_battle.2016.c.failure: "기사들은 적군 예비군에 의해 쫓겨났습니다!" #NT!
  
 tactical_forest_battle.2016.d: "권리 보유가 센터를 지원합니다" #NT!
 tactical_forest_battle.2016.d.success: "오른쪽 예비군은 중앙 위치를 완벽하게 측면에 배치합니다!" #NT!
 tactical_forest_battle.2016.d.failure: "기동은 실패하고 중앙은 깨지지 않은 채로 남아 있습니다!" #NT!
  
 tactical_forest_battle.2016.e: "계속해서 중앙을 공격하라" #NT!
 tactical_forest_battle.2016.e.success: "우리의 공격으로 적의 중앙이 완전히 박살났습니다!" #NT!
 tactical_forest_battle.2016.e.failure: "적이 중앙 위치를 차지하고 있습니다!" #NT!
  
 # ============================================ 
 # EVENT 1010 - Left Flank Exposed Center Follow-up 
 # ============================================ 
 tactical_forest_battle.1010.t: "측면과 혼란" #NT!
 tactical_forest_battle.1010.desc: "[left_flank_commander.GetTitledFirstNamePossessiveOrMy] 측면 기동이 적의 오른쪽 측면에 혼란을 야기했고 그들의 병력이 돌파하고 있습니다. 여기를 돌파할 수 있다면 중앙을 공격할 수 있습니다." #NT!
  
 tactical_forest_battle.1010.a: "중심을 감싸고 측면에 배치" #NT!
 tactical_forest_battle.1010.a.success: "[left_flank_commander.GetFullNameNicknamedPossessiveOrMy]명의 병력이 적 중앙의 측면을 성공적으로 공격했습니다!" #NT!
 tactical_forest_battle.1010.a.failure: "적이 기동을 예상하고 막아낸다!" #NT!
  
 tactical_forest_battle.1010.b: "기사를 보내 권리를 주장하세요" #NT!
