 setting_tbatt_martial_skill_increase_value_3_desc: "#high 지휘관은 '기술 증가 기회'에 따라 더 숙련된 지휘관의 측면을 라우팅하여 최대 3 [martial|E] 스킬 포인트를 얻을 수 있는 기회를 갖습니다." #NT!
 setting_tbatt_martial_skill_increase_value_4: "4 무술" #NT!
 setting_tbatt_martial_skill_increase_value_4_desc: "#high 지휘관은 '기술 증가 기회'에 따라 더 숙련된 지휘관의 측면을 라우팅하여 최대 4 [martial|E] 스킬 포인트를 얻을 수 있는 기회를 갖습니다." #NT!
