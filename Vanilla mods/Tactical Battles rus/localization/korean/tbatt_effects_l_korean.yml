 # Martial Skill Increase Value Rule 
 rule_tactical_martial_increase_skill_value: "#bold #difficulty_hard • 전술적 전투 • #!\nMax 무술 기술 증가" #NT!
 setting_tbatt_martial_skill_increase_default_value: "3 무술(기본값)" #NT!
 setting_tbatt_martial_skill_increase_default_value_desc: "#high 지휘관은 더 숙련된 지휘관의 측면을 라우팅하여 최대 3 [martial|E] 스킬 포인트를 얻을 수 있는 기회('기술 증가 기회' 기준)를 갖습니다." #NT!
 setting_tbatt_martial_skill_increase_value_1: "1 무술" #NT!
 setting_tbatt_martial_skill_increase_value_1_desc: "#high 지휘관은 '기술 증가 기회'에 따라 더 숙련된 지휘관의 측면을 라우팅하여 1 [martial|E] 기술 포인트를 얻을 수 있는 기회를 갖습니다." #NT!
 setting_tbatt_martial_skill_increase_value_2: "2 무술" #NT!
 setting_tbatt_martial_skill_increase_value_2_desc: "#high 지휘관은 '기술 증가 기회'에 따라 더 숙련된 지휘관의 측면을 라우팅하여 최대 2 [martial|E] 스킬 포인트를 얻을 수 있는 기회를 갖습니다." #NT!
