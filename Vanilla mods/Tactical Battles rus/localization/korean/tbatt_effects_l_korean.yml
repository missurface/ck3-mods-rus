 # Commander Martial Difference Value Rule 
 rule_tactical_martial_increase_diff_value: "#bold #difficulty_hard • 전술적 전투 • #!\nCommander 무술의 차이" #NT!
 setting_tbatt_commander_martial_diff_default_value: "4 스킬 차이 (기본)" #NT!
 setting_tbatt_commander_martial_diff_default_value_desc: "#high 측면 사령관 중 한 명이 적 측면 사령관보다 기술이 4 이상일 때 [martial|E] 더 숙련된 사령관을 라우팅할 때 해당 사령관의 [martial|E] 기술이 향상될 가능성이 있습니다." #NT!
 setting_tbatt_commander_martial_diff_value_1: "1 스킬 차이" #NT!
 setting_tbatt_commander_martial_diff_value_1_desc: "#high 당신의 측면 사령관 중 한 명이 적의 측면 사령관보다 1 이상 능숙할 때 [martial|E], 더 숙련된 사령관을 라우팅할 때 그들의 [martial|E] 기술을 높일 수 있는 기회가 있습니다." #NT!
