l_polish:
 # Event 0001 - Left Flank Envelopment SUCCESS 
 tactical_flank_battle.0001.t: "Lewe skrzydło atakuje!"
 tactical_flank_battle.0001.desc: "[scope:flank_commander.GetTitledFirstName], dowodzący naszą lewą flanką, znalazł lukę! Prawa strona wroga jest odsłonięta, a my mamy okazję otoczyć jego pozycję. Siły [enemy_commander.GetTitledFirstName] są podatne na niszczycielski manewr flankujący!"
 tactical_flank_battle.0001.a: "Agresywnie naciskaj przewagę! (Waleczność vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0001.a.success: "Nasza lewa flanka szarżuje z wściekłością, wzmacniając linię!"
 tactical_flank_battle.0001.a.failure: "Agresywne pchnięcie zostało powstrzymane."
 tactical_flank_battle.0001.b: "Koordynuj z centrum! (Zarządzanie vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0001.b.success: "Doskonała koordynacja wzmacnia naszą przewagę!"
 tactical_flank_battle.0001.b.failure: "Koordynacja nie zostaje zrealizowana."
 tactical_flank_battle.0001.c: "Wykonaj ruch szczypcami! (Martial kontra [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0001.c.success: "Uwięziliśmy ich w niszczycielskich szczypcach!"
 tactical_flank_battle.0001.c.failure: "Unikają manewru szczypiec."
 tactical_flank_battle.0001.d: "Utrzymaj pozycję i obserwuj."
  
 # Event 0002 - Left Flank Envelopment FAILURE 
 tactical_flank_battle.0002.t: "Lewa flanka pod presją!"
 tactical_flank_battle.0002.desc: "[scope:flank_commander.GetTitledFirstName], dowodzący naszą lewą flanką, ma kłopoty! [enemy_commander.GetTitledFirstName] obrócił naszą próbę okrążenia przeciwko nam. Nasza lewica jest teraz bezbronna i cofa się. Musimy działać szybko, w przeciwnym razie zaryzykujemy utratę całej flanki!"
 tactical_flank_battle.0002.a: "Zreformuj flankę! (Martial kontra [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0002.a.success: "Przywracamy porządek na lewym skrzydle!"
 tactical_flank_battle.0002.a.failure: "Flanka nadal się rozpada."
 tactical_flank_battle.0002.b: "Wezwij wsparcie z centrum! (Dyplomacja kontra [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0002.b.success: "Posiłki wzmacniają naszą lewą stronę!"
 tactical_flank_battle.0002.b.failure: "Żadna pomoc nie dotrze na czas."
 tactical_flank_battle.0002.c: "Wykonaj wycofanie bojowe! (Zarządzanie vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0002.c.success: "Wycofujemy się w dobrym stanie!"
 tactical_flank_battle.0002.c.failure: "Wycofanie się staje się porażką."
 tactical_flank_battle.0002.d: "Zaakceptuj porażkę."
  
 # Event 0003 - Center Hold SUCCESS 
 tactical_flank_battle.0003.t: "Centrum trzyma poziom!"
 tactical_flank_battle.0003.desc: "[scope:flank_commander.GetTitledFirstName] dowodzący naszym ośrodkiem udowodnili swoją wartość! Podczas gdy [enemy_commander.GetTitledFirstName] rzuca wszystkim na naszą linię, środek stoi jak forteca. Nasza pozycja jest silna i stąd możemy dyktować przebieg bitwy!"
 tactical_flank_battle.0003.a: "Pchnij agresywnie do przodu! (Martial kontra [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0003.a.success: "Centrum ich wypędza!"
 tactical_flank_battle.0003.a.failure: "Opierają się naszym naciskom."
 tactical_flank_battle.0003.b: "Zakotwicz całą linię! (Waleczność vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0003.b.success: "Nasz ośrodek staje się nieruchomą kotwicą!"
 tactical_flank_battle.0003.b.failure: "Pozycja kotwicy słabnie."
 tactical_flank_battle.0003.c: "Wyślij wsparcie na obie flanki! (Zarządzanie vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0003.c.success: "Środek wzmacnia całą naszą linię!"
 tactical_flank_battle.0003.c.failure: "Rozłożyliśmy się zbyt cienko."
 tactical_flank_battle.0003.d: "Utrzymuj stałe ciśnienie."
  
 # Event 0004 - Center Collapsing FAILURE 
 tactical_flank_battle.0004.t: "Centrum pęka!"
 tactical_flank_battle.0004.desc: "[scope:flank_commander.GetTitledFirstName] desperacko próbuje utrzymać środek, ale [enemy_commander.GetTitledFirstName] się przebija! Jeśli centrum się zawali, obie flanki zostaną odcięte i zniszczone. To krytyczny moment bitwy!"
 tactical_flank_battle.0004.a: "Zbierz centrum osobiście! (Martial kontra [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0004.a.success: "Moja obecność stabilizuje centrum!"
 tactical_flank_battle.0004.a.failure: "Nawet moja obecność nie może powstrzymać upadku."
 tactical_flank_battle.0004.b: "Zaangażuj wszystkie rezerwy! (Zarządzanie vs [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0004.b.success: "Świeże oddziały wypełniają lukę!"
 tactical_flank_battle.0004.b.failure: "Rezerwy zostały pochłonięte."
 tactical_flank_battle.0004.c: "Odrzuć środek i wzmocnij flanki! (Nauka kontra [enemy_commander.GetShortUINameNoTooltip])"
 tactical_flank_battle.0004.c.success: "Tworzymy nową linię obrony!"
 tactical_flank_battle.0004.c.failure: "Manewr kończy się katastrofalnie."
 tactical_flank_battle.0004.d: "Przygotuj się na uderzenie i nadzieję."
  
  
 tactical_forest_battle.0251.tt: "[center_flank_commander.GetFirstNameOrMe] wiedza specjalistyczna w [battle_location.GetProvince.GetTerrain.GetName]"
 tactical_forest_battle.0251.tt.success: "[center_flank_commander.GetFirstNameOrMe] sprawność w [battle_location.GetProvince.GetTerrain.GetNameNoTooltip] w [battle_location.GetProvince.GetName] wyróżniła ich wśród rówieśników."
  
