 tactical_forest_battle.0250.tt.success: "[left_flank_commander.GetFirstNameOrMe] sprawność w [battle_location.GetProvince.GetTerrain.GetNameNoTooltip] w [battle_location.GetProvince.GetName] wyróżniła ich na tle rówieśników."
  
