 tactical_outnumbered_lands.tt: "Sukces w [battle_location.GetName]"
 tactical_outnumbered_lands.tt.success: "[this.GetFirstName] miał pokonać [enemy_commander.GetFirstName] w [battle_location.GetName], mimo że miał przewagę liczebną! [this.GetFirstName] okazał się genialnym dowódcą i zyskał szacunek wszystkich, którzy byli świadkami bitwy."
  
  # tactical_forest_battle.9416 - Harrying left flank, enemy bleeding 
 tactical_forest_battle.9416.t: "Ich lewica krwawi!"
 tactical_forest_battle.9416.desc: "[enemy_commander.GetFirstNamePossessive] sił chwieje się po naszej taktyce uderzenia i ucieczki. Ich lewa flanka jest poważnie wyczerpana, a ranni spowalniają swoje ruchy. Musimy działać szybko, aby wykorzystać ich słabość, zanim zdążą się zreorganizować."
 tactical_forest_battle.9416.a: "Koordynuj szarżę z naszymi elitarnymi jednostkami zajmującymi się crackiem"
 tactical_forest_battle.9416.a.success: "Nasze elitarne jednostki przemierzają lewą flankę, wprawiając je w chaos!"
 tactical_forest_battle.9416.a.failure: "Szarża nie jest w stanie przełamać ich upartej obrony!"
 tactical_forest_battle.9416.b: "Koordynuj szarżę z naszymi rycerzami"
 tactical_forest_battle.9416.b.success: "Nasi rycerze uderzają w osłabionego wroga, wprawiając go w chaos!"
 tactical_forest_battle.9416.b.failure: "Atak uderza w osłabionego wroga po lewej stronie, wprawiając go w chaos!"
 tactical_forest_battle.9416.c: "Szarża nie jest w stanie przełamać ich upartej obrony!"
 tactical_forest_battle.9416.c.success: "Nasz atak na lewą flankę rozprasza osłabionego wroga!"
 tactical_forest_battle.9416.c.failure: "Utrzymują formację pomimo strat!"
 tactical_forest_battle.9416.d: "Udawaj odwrót i zwróć się przeciwko nim"
 tactical_forest_battle.9416.d.success: "Wróg daje się nabrać na nasze oszustwo i przystępuje do nieoczekiwanego ataku!"
 tactical_forest_battle.9416.d.failure: "Przejrzeli nasze oszustwo i podtrzymali swoją formację!!"
 tactical_forest_battle.9416.e: "Naciśnij przewagę"
 tactical_forest_battle.9416.e.success: "Ich lewa flanka rozpada się pod ogromnym naciskiem!"
 tactical_forest_battle.9416.e.failure: "Utrzymują formację pomimo strat!"
  
  
  # tactical_forest_battle.9418 - Hit and run successful, enemy bleeding 
 tactical_forest_battle.9418.t: "Ich prawem jest krwawienie!"
 tactical_forest_battle.9418.desc: "[enemy_commander.GetFirstNamePossessive] sił chwieje się po naszej taktyce uderzenia i ucieczki. Ich prawa flanka jest poważnie wyczerpana, a ranni spowalniają swoje ruchy. Musimy działać szybko, aby wykorzystać ich słabość, zanim zdążą się zreorganizować."
 tactical_forest_battle.9418.a: "Koordynuj szarżę z naszymi elitarnymi jednostkami zajmującymi się crackiem"
 tactical_forest_battle.9418.a.success: "Nasze elitarne jednostki przedostają się przez ich prawą flankę, wprawiając je w chaos!"
 tactical_forest_battle.9418.a.failure: "Szarża nie jest w stanie przełamać ich upartej obrony!"
 tactical_forest_battle.9418.b: "Koordynuj szarżę z naszymi rycerzami"
 tactical_forest_battle.9418.b.success: "Nasi rycerze uderzają w osłabionego wroga z prawej strony, wprawiając go w chaos!"
 tactical_forest_battle.9418.b.failure: "Atak uderza w osłabionego wroga z prawej strony, wprawiając go w chaos!"
 tactical_forest_battle.9418.c: "Naładuj ich rozproszoną linię"
 tactical_forest_battle.9418.c.success: "Nasz atak na lewą flankę rozprasza osłabionego wroga!"
 tactical_forest_battle.9418.c.failure: "Utrzymują formację pomimo strat!"
 tactical_forest_battle.9418.d: "Udawaj odwrót i zwróć się przeciwko nim"
 tactical_forest_battle.9418.d.success: "Wróg daje się nabrać na nasze oszustwo i przystępuje do nieoczekiwanego ataku!"
 tactical_forest_battle.9418.d.failure: "Przejrzeli nasze oszustwo i podtrzymali swoją formację!!"
 tactical_forest_battle.9418.e: "Naciśnij przewagę"
 tactical_forest_battle.9418.e.success: "Ich prawe skrzydło kruszy się pod ogromnym naciskiem!"
 tactical_forest_battle.9418.e.failure: "Utrzymują formację pomimo strat!"
  
  # tactical_forest_battle.7320 - Failure event, enemy reorganizes and stands strong 
 tactical_forest_battle.7320.t: "Wróg stoi silny za naszymi liniami"
 tactical_forest_battle.7320.desc: "Siły [enemy_commander.GetFirstNamePossessive] zebrały się i zreorganizowały swoje linie za naszymi. Są teraz okopani głębiej, zwróceni tyłem do naszych linii, a ich formacja została wzmocniona. Musimy zdecydować, czy dalej na nich naciskać, czy zmienić taktykę."
 tactical_forest_battle.7320.a: "Wyślij szarżę z naszymi elitarnymi jednostkami cracku, aby zaatakować ich flankę"
 tactical_forest_battle.7320.a.success: "Nasze jednostki cracku zaskakują ich i przeczesują ich linie!"
 tactical_forest_battle.7320.a.failure: "Nasze jednostki cracku nie są w stanie przełamać swojej solidnej obrony!"
 tactical_forest_battle.7320.b: "Wyślij rycerzy, aby zaatakowali ich flankę"
 tactical_forest_battle.7320.b.success: "Nasi rycerze uderzają w ich flankę, rozbijając ich szyk!"
 tactical_forest_battle.7320.b.failure: "Rycerze zostają przechwyceni przez rezerwy wroga!"
 tactical_forest_battle.7320.c: "Oderwij środkowych rezerwowych, aby rozwalić im tyły"
 tactical_forest_battle.7320.c.success: "Nasze środkowe rezerwy uderzają w ich tyły, powodując chaos!"
 tactical_forest_battle.7320.c.failure: "Nasze środkowe rezerwy nie mogą się rozłączyć z powodu nagłego pchnięcia!"
 tactical_forest_battle.7320.d: "Oderwij prawe rezerwy i rozwal im tyły"
 tactical_forest_battle.7320.d.success: "Nasze środkowe rezerwy uderzają w ich tyły, powodując chaos!"
 tactical_forest_battle.7320.d.failure: "Nasze środkowe rezerwy nie mogą się rozłączyć z powodu nagłego pchnięcia!"
 tactical_forest_battle.7320.e: "Udawaj odwrót i zwróć się przeciwko prześladowcom"
 tactical_forest_battle.7320.e.success: "Wróg daje się nabrać na nasze oszustwo i przystępuje do nieoczekiwanego ataku!"
 tactical_forest_battle.7320.e.failure: "Wróg wycofuje się do naszego odsłoniętego centrum!"
  
  
  # tactical_forest_battle.7322 - Enemy attacks our depleted right flank 
 tactical_forest_battle.7322.t: "Wróg uderza na prawą flankę"
 tactical_forest_battle.7322.desc: "[enemy_commander.GetFirstNamePossessive] rozpoznał naszą osłabioną prawą flankę i rozpoczyna atak. Bez naszych rezerw podejmujemy kluczową decyzję o utrzymaniu prawej flanki."
 tactical_forest_battle.7322.a: "Prawa flanka jest silna wobec ataku"
 tactical_forest_battle.7322.a.success: "Nasza prawa flanka opiera się atakowi wroga!"
 tactical_forest_battle.7322.a.failure: "Prawa flanka jest przytłoczona i zaczyna słabnąć!"
 tactical_forest_battle.7322.b: "Wyślij rycerzy, żeby wzmocnili prawicę"
 tactical_forest_battle.7322.b.success: "Świezi rycerze stabilizują prawą flankę!"
 tactical_forest_battle.7322.b.failure: "Rycerze zostają przechwyceni, zanim dotrą w prawo!"
 tactical_forest_battle.7322.c: "Wyślij nasze elitarne jednostki cracku, aby wzmocniły prawą flankę"
 tactical_forest_battle.7322.c.success: "Nasze posiłki stabilizują prawą flankę!"
 tactical_forest_battle.7322.c.failure: "Nasza prawica kruszy się pomimo wzmocnień!"
 tactical_forest_battle.7322.d: "Spróbuj się wycofać i przesuń lewą flankę na czas przybycia posiłków"
 tactical_forest_battle.7322.d.success: "Ich lewa flanka zaczyna podążać za naszym odwrotem, odsłaniając ich!"
 tactical_forest_battle.7322.d.failure: "Prawica nie jest w stanie wycofać się pod presją!"
 tactical_forest_battle.7322.e: "Udawaj odwrót i zwróć się przeciwko prześladowcom"
 tactical_forest_battle.7322.e.success: "Wróg daje się nabrać na nasze oszustwo i przystępuje do nieoczekiwanego ataku!"
 tactical_forest_battle.7322.e.failure: "Przejrzeli nasze oszustwo i podtrzymują swoją formację!"
  
  
 tactical_forest_battle.231.t: "Naliczono naszą fałszywą lukę"
 tactical_forest_battle.231.desc: "[enemy_commander.GetFirstNameNoTooltip] chwycił przynętę i zaatakował fałszywą lukę, którą stworzyliśmy na naszej prawej flance. Ich lewica jest teraz odsłonięta i bezbronna. Musimy działać szybko, aby wykorzystać tę szansę, zanim będą mogli odzyskać siły."
 tactical_forest_battle.231.a: "Wyślij nasze elitarne jednostki cracku, aby zaatakowały ich odsłoniętą lewą flankę"
 tactical_forest_battle.231.a.success: "Nasze elitarne jednostki przemierzają lewą flankę, rozbijając formację!"
 tactical_forest_battle.231.a.failure: "Ich prawo utrzymuje grunt pod naszym elitarnym atakiem!"
 tactical_forest_battle.231.b: "Wyślij rycerzy, aby rozbili ich lewą flankę"
 tactical_forest_battle.231.b.success: "[left_flank_commander.GetFullNameNicknamedOrMe] szarżują i wprawiają flankę w chaos!"
 tactical_forest_battle.231.b.failure: "Atak uderza w ich lewą flankę, wprawiając ich w chaos!"
 tactical_forest_battle.231.c: "Prawa flanka szarżuje, aby rozbić ich formację"
 tactical_forest_battle.231.c.success: "[right_flank_commander.GetFullNameNicknamedOrMe] szarżują i wprawiają flankę w chaos!"
 tactical_forest_battle.231.c.failure: "Ich lewica pozostaje niezachwiana i nie chce się złamać!"
 tactical_forest_battle.231.d: "Wykonaj pozorowany odwrót i zwróć się przeciwko nim"
 tactical_forest_battle.231.d.success: "Wróg daje się nabrać na nasze oszustwo i ściga!"
 tactical_forest_battle.231.d.failure: "Przejrzeli nasze oszustwo i podtrzymują swoją formację!"
 tactical_forest_battle.231.e: "Naciśnij przewagę"
 tactical_forest_battle.231.e.success: "Wrogowie pozostawili po sobie ruiny pod bezlitosnym atakiem!"
 tactical_forest_battle.231.e.failure: "Rezerwy wroga przybywają, aby wzmocnić linię!"
 tactical_forest_battle.231.f: "Oderwij lewe rezerwy, aby je otoczyć"
 tactical_forest_battle.231.f.success: "Nasza lewica wycofuje się i jest w stanie otoczyć wroga!"
 tactical_forest_battle.231.f.failure: "Nasze lewe rezerwy nie mogą się wycofać!"
  
 tactical_forest_battle.5907.t: "Nasze centrum wyznacza trasę"
 tactical_forest_battle.5907.desc: "Nasze centrum pęka! [enemy_commander.GetFirstNamePossessive] rozgromił nasze centrum i całej armii grozi upadek. Musimy działać natychmiast, aby zapobiec katastrofie!"
 tactical_forest_battle.5907.b: "Odwrót za zasłoną z kontratakiem"
 tactical_forest_battle.5907.b.success: "Kontratak daje naszym żołnierzom czas na konsolidację!"
 tactical_forest_battle.5907.b.failure: "Kontratak kończy się niepowodzeniem i pogrom trwa nadal!"
 tactical_forest_battle.5907.c: "Desperacka szarża, by rozbić tych, którzy ścigali rozbitą prawą flankę"
 tactical_forest_battle.5907.c.success: "Nasza prawica udaje się uciec!"
 tactical_forest_battle.5907.c.failure: "Nasza szarża zostaje odparta i pogrom trwa dalej!"
 tactical_forest_battle.5907.a: "Wycofaj się na pozycje obronne"
 tactical_forest_battle.5907.a.success: "Udaje nam się wycofać i stworzyć nową linię obrony!"
 tactical_forest_battle.5907.a.failure: "Nasi ludzie ponoszą ciężkie straty!"
  
