 tactical_forest_battle.0018.t: "Wróg jest rozkojarzony"  #NT!
 tactical_forest_battle.0018.desc: "Nasza prawa flanka skutecznie odwróciła uwagę centrum wroga! Są zdezorientowani i zdezorganizowani. Musimy natychmiast wykorzystać tę przewagę."  #NT!
