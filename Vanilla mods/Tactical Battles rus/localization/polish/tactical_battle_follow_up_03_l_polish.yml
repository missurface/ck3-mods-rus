 tactical_forest_battle.9328.t: "Nieświadomi ukrytej flanki po prawej stronie"  #NT!
 tactical_forest_battle.9328.desc: "Osłabiliśmy naszą prawą stronę planami odwrotu i zwabienia wroga. Nasza ukryta flanka przeszła niezauważona i znalazła się za nacierającą lewą flanką. Jeśli będziemy działać szybko, możemy zadać decydujący cios."  #NT!
