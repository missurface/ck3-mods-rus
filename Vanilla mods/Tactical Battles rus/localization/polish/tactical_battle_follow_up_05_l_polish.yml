 tactical_forest_battle.6310.t: "Pułapka została uruchomiona!"  #NT!
 tactical_forest_battle.6310.desc: "[right_flank_commander.GetTitledFirstNamePossessive] zwód zadziałał doskonale! [enemy_commander.GetFirstNamePossessive] polecenia zatrzymania zostały zagłuszone, a [enemy_commander.GetHerHis] straż przednia złamała szyk, aby złapać przynętę. Lewa strona ich linii jest teraz rozciągnięta i zdezorganizowana."  #NT!
 tactical_forest_battle.6310.a: "[right_flank_commander.GetTitledFirstName] prowadzi zdezorganizowaną armię w pułapkę naszych jednostek cracku"  #NT!
 tactical_forest_battle.6310.a.success: "[enemy_commander.GetFirstNamePossessive] prawa strona podąża za [right_flank_commander.GetFirstNamePossessive] uciekającymi siłami prosto w zasadzkę!"  #NT!
 tactical_forest_battle.6310.a.failure: "Prawica nie bierze przynęty!"  #NT!
 tactical_forest_battle.6310.b: "Wyślij rycerzy, aby zmiażdżyli ich nadmiernie rozciągniętą flankę"  #NT!
 tactical_forest_battle.6310.b.success: "Rycerze uderzają w odsłoniętą flankę wroga, rozbijając formację!"  #NT!
 tactical_forest_battle.6310.b.failure: "Wróg szybko się reorganizuje i zwraca się przeciwko naszym rycerzom"  #NT!
 tactical_forest_battle.6310.c: "Oderwij siły z flanki [left_flank_commander.GetTitledFirstNamePossessive], aby otoczyć zwabione jednostki"  #NT!
 tactical_forest_battle.6310.c.success: "[right_flank_commander.GetTitledFirstName] skutecznie okrąża jednostki wroga, odcinając im odwrót!"  #NT!
 tactical_forest_battle.6310.c.failure: "Wróg prowadzi niszczycielski atak na naszą uszczuploną prawą flankę"  #NT!
 tactical_forest_battle.6310.d: "Obróć [center_flank_commander.GetFirstNamePossessive] rezerw, aby otoczyć zwabione jednostki"  #NT!
 tactical_forest_battle.6310.d.success: "Rezerwy poruszają się szybko i są w pozycji do okrążenia"  #NT!
 tactical_forest_battle.6310.d.failure: "[enemy_commander.GetFirstNamePossessive] rozpoznaje nasze wyczerpane centrum!"  #NT!
 tactical_forest_battle.6310.e: "Odwróć się i zabij zwabione jednostki przy pełnym naładowaniu"  #NT!
 tactical_forest_battle.6310.e.success: "Pełna szarża zaskakuje wroga!"  #NT!
 tactical_forest_battle.6310.e.failure: "Wróg pozostaje nieugięty i odpiera naszą szarżę!"  #NT!
  
  
 tactical_forest_battle.7320.t: "Wróg stoi silny za naszymi liniami"  #NT!
 tactical_forest_battle.7320.desc: "Siły [enemy_commander.GetFirstNamePossessive] zebrały się i zreorganizowały swoje linie za naszymi. Są teraz okopani głębiej, zwróceni tyłem do naszych linii, a ich formacja została wzmocniona. Musimy zdecydować, czy dalej na nich naciskać, czy zmienić taktykę."  #NT!
 tactical_forest_battle.7320.a: "Wyślij szarżę z naszymi elitarnymi jednostkami cracku, aby zaatakować ich flankę"  #NT!
 tactical_forest_battle.7320.a.success: "Nasze jednostki cracku zaskakują ich i przeczesują ich linie!"  #NT!
 tactical_forest_battle.7320.a.failure: "Nasze jednostki cracku nie są w stanie przełamać ich solidnej obrony!"  #NT!
 tactical_forest_battle.7320.b: "Wyślij rycerzy, aby zaatakowali ich flankę"  #NT!
 tactical_forest_battle.7320.b.failure: "Rycerze zostają przechwyceni przez rezerwy wroga!"  #NT!
 tactical_forest_battle.7320.c: "Oderwij środkowych rezerwowych, aby rozwalić im tyły"  #NT!
 tactical_forest_battle.7320.c.success: "Nasze środkowe rezerwy uderzają w ich tyły, powodując chaos!"  #NT!
 tactical_forest_battle.7320.c.failure: "Nasze środkowe rezerwy nie mogą się rozłączyć z powodu nagłego pchnięcia!"  #NT!
 tactical_forest_battle.7320.d: "Oderwij prawe rezerwy i rozwal im tyły"  #NT!
 tactical_forest_battle.7320.d.success: "Nasze środkowe rezerwy uderzają w ich tyły, powodując chaos!"  #NT!
 tactical_forest_battle.7320.d.failure: "Nasze środkowe rezerwy nie mogą się rozłączyć z powodu nagłego pchnięcia!"  #NT!
 tactical_forest_battle.7320.e: "Udawaj odwrót i zwróć się przeciwko prześladowcom"  #NT!
 tactical_forest_battle.7320.e.success: "Wróg daje się nabrać na nasze oszustwo i przystępuje do nieoczekiwanego ataku!"  #NT!
 tactical_forest_battle.7320.e.failure: "Wróg wycofuje się do naszego odsłoniętego centrum!"  #NT!
  
