 tactical_forest_battle.9453.t: "Prawe okrążenia"  #NT!
 tactical_forest_battle.9453.desc: "Udało nam się okrążyć prawą flankę [enemy_commander.GetFirstNamePossessive]! Są uwięzieni i grozi im zagłada. Musimy zadać zabójczy cios!"  #NT!
 tactical_forest_battle.9453.a: "Rozpocznij rzeź okrążonych żołnierzy"  #NT!
 tactical_forest_battle.9453.a.success: "Okrążone wojska zostają wymordowane!"  #NT!
 tactical_forest_battle.9453.a.failure: "Otoczone oddziały uciekają!"  #NT!
 tactical_forest_battle.9453.b: "Brać jeńców"  #NT!
 tactical_forest_battle.9453.b.success: "Łapiemy wielu więźniów!"  #NT!
 tactical_forest_battle.9453.b.failure: "Więźniowie wymykają się!"  #NT!
  
 tactical_forest_battle.9473.t: "Armia Rajdu"  #NT!
 tactical_forest_battle.9473.desc: "Bitwa trwa! Nasze siły potrzebują inspiracji, aby przełamać zaciekły opór wroga!"  #NT!
 tactical_forest_battle.9473.a: "Wezwij do zdecydowanego strajku"  #NT!
 tactical_forest_battle.9473.a.success: "Armia rozpoczyna zdecydowane uderzenie!"  #NT!
 tactical_forest_battle.9473.a.failure: "Strajk nie dochodzi do skutku!"  #NT!
 tactical_forest_battle.9473.b: "Zmień położenie, aby uzyskać lepsze podłoże"  #NT!
 tactical_forest_battle.9473.b.success: "Wymusza zmianę pozycji na lepszy grunt!"  #NT!
 tactical_forest_battle.9473.b.failure: "Zmiana położenia nie powiodła się!"  #NT!
 tactical_forest_battle.9473.c: "Wyślij posiłki rezerwowe"  #NT!
 tactical_forest_battle.9473.c.success: "Rezerwy wzmacniają linię!"  #NT!
 tactical_forest_battle.9473.c.failure: "Rezerwy są opóźnione!"  #NT!
 tactical_forest_battle.9473.d: "Prowadź szarżę na centrum wroga"  #NT!
 tactical_forest_battle.9473.d.success: "Szarża na środek powiodła się!"  #NT!
 tactical_forest_battle.9473.d.failure: "Ładunek został odparty!"  #NT!
  
 tactical_forest_battle.7220.t: "Lewa zaczyna się od okrążenia"  #NT!
 tactical_forest_battle.7220.desc: "Nasza lewa flanka rozpoczęła manewr okrążający wroga! Jeśli uda nam się dokończyć okrążenie, możemy ich uwięzić i zniszczyć!"  #NT!
 tactical_forest_battle.7220.a: "Uzupełnij okrążenie"  #NT!
 tactical_forest_battle.7220.a.success: "Kończymy okrążenie!"  #NT!
 tactical_forest_battle.7220.a.failure: "Wróg wybucha!"  #NT!
 tactical_forest_battle.7220.b: "Wyślij naszych rycerzy, żeby utrzymali ich na pozycjach"  #NT!
 tactical_forest_battle.7220.b.success: "Nasi rycerze utrzymują wroga w miejscu!"  #NT!
 tactical_forest_battle.7220.b.failure: "Wróg się przebija!"  #NT!
 tactical_forest_battle.7220.c: "Wyślij nasze jednostki cracku, aby utrzymać wroga w miejscu!"  #NT!
 tactical_forest_battle.7220.c.success: "Wróg nie może się wycofać!"  #NT!
 tactical_forest_battle.7220.c.failure: "Wróg wyrywa się z okrążenia!"  #NT!
 tactical_forest_battle.7220.d: "Zatrzymaj je środkiem, podczas gdy lewe otaczają"  #NT!
 tactical_forest_battle.7220.d.success: "Wróg nie może się wycofać!"  #NT!
 tactical_forest_battle.7220.d.failure: "Wróg ucieka z pułapki!"  #NT!
 tactical_forest_battle.7220.e: "Zbierz żołnierzy, aby utrzymać linię podczas okrążania jednostek"  #NT!
