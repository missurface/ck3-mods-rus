 tactical_forest_battle.9251.desc: "[enemy_commander.GetFirstNamePossessive] armia wycofuje się! Mamy wyjątkową okazję, aby ich ścigać i zniszczyć, zanim zdążą się przegrupować!"  #NT!
 tactical_forest_battle.9251.t: "Ich Centrum w Chaosie"  #NT!
 tactical_forest_battle.9251.a: "Włącz ich prawą flankę"  #NT!
 tactical_forest_battle.9251.a.success: "Odwracamy się i szarżujemy na flankę po ich prawej stronie!"  #NT!
 tactical_forest_battle.9251.a.failure: "Organizuje się, aby sprostać naszym zarzutom!"  #NT!
 tactical_forest_battle.9251.b: "Schwytaj więźniów"  #NT!
 tactical_forest_battle.9251.b.success: "Łapiemy wielu więźniów!"  #NT!
 tactical_forest_battle.9251.b.failure: "Więźniowie wymykają się!"  #NT!
 tactical_forest_battle.9251.c: "Wyślij rycerzy, aby rozbili ich prawą flankę"  #NT!
 tactical_forest_battle.9251.c.success: "Szarża Rycerzy powoduje spustoszenie"  #NT!
 tactical_forest_battle.9251.c.failure: "Szarża rycerzy zostaje wchłonięta"  #NT!
 tactical_forest_battle.9251.d: "Wyślij nasze elitarne jednostki cracku, aby uderzyły w ich prawą flankę"  #NT!
 tactical_forest_battle.9251.d.success: "Nasze jednostki cracku sieją spustoszenie na prawej flance!"  #NT!
 tactical_forest_battle.9251.d.failure: "Wróg trzyma się mocno!!"  #NT!
  
  
