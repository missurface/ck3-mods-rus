 tactical_foreign_lands.tt: "Walka o obce ziemie"
 tactical_foreign_lands.tt.success: "Zaznajomiłem się z walką poza naszymi granicami, walcząc poza naszym królestwem!"
  
  
 # Huscarl 
 trait_tbat_soldier_huscarl: "Kapitan huskarlowy"
 tbat_soldier_huscarl_desc: "Żołnierz ten awansował z elitarnej jednostki huskarli po tym, jak odegrał kluczową rolę w sukcesie pułku w bitwie. Ich obecność w bitwie inspiruje otaczających ich ludzi do większych wyczynów zbrojnych."
 trait_tbat_soldier_huscarl_character_desc: "[ROOT.Char.GetFullNameNicknamedOrMe] został awansowany z elitarnej jednostki huskarli po tym, jak odegrał kluczową rolę w sukcesie pułku w bitwie. Ich obecność w bitwie inspiruje otaczających ich ludzi do większych wyczynów zbrojnych."
  
