l_polish:
  
  
 game_concept_captain_trait_concept: "Kapitan Cecha"
 game_concept_captain_trait_concept_desc: "Cechy Kapitana to cechy nadawane ludziom rekrutowanym z oddziału zbrojnych. Podczas bitwy, gdy korzystasz z opcji obejmującej zbrojnych, jeśli się powiedzie, istnieje szansa na zrekrutowanie dowódcy ze specjalną cechą Kapitana po bitwie. Te cechy zapewniają twojej armii różne bonusy podczas bitew\n\n Przykładami są: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"
 game_concept_player_title_concept: "odtwarzacz"
 game_concept_player_title_concept_desc: "Cechy Kapitana to cechy nadawane ludziom rekrutowanym z oddziału zbrojnych. Podczas bitwy, gdy korzystasz z opcji obejmującej zbrojnych, jeśli się powiedzie, istnieje szansa na zrekrutowanie dowódcy ze specjalną cechą Kapitana po bitwie. Te cechy zapewniają twojej armii różne bonusy podczas bitew\n\n Przykładami są: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"
  
 tactical_forest_battle.0498.t: "Wybitny Żołnierz"
 tactical_forest_battle.0498.desc: "Po otrzymaniu raportu z naszej ostatniej bitwy moi oficerowie poinformowali mnie, że jeden z naszych żołnierzy z elitarnego pułku [chosen_unit.GetName] spisał się znakomicie w samym środku walk. Przyjęcie [commander.GetHerHim] do mojej służby mogłoby zainspirować innych mężczyzn."
 tactical_forest_battle.0498.a: "Zrekrutuj [commander.GetName] do mojej służby. ([commander.GetFirstName] zyskuje [captain_trait_concept|e])"
 tactical_forest_battle.0498.b: "Pomyślę o tym."
  
