 tactical_forest_battle.0011.c.failure: "Wróg przewiduje i nasze elitarne siły zostają odrzucone!"  #NT!
 tactical_forest_battle.0011.d: "Zobowiąż naszych rycerzy, aby przebili ich środek"  #NT!
 tactical_forest_battle.0011.d.success: "Rycerze szarżują z niszczycielską siłą! Ich centrum się zawala!"  #NT!
 tactical_forest_battle.0011.d.failure: "Wróg przygotowuje kontratak i nasi rycerze zostają odrzuceni!"  #NT!
