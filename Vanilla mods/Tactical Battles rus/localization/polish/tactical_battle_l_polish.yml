 tactical_forest_battle.7323.a.failure: "Uwięzione siły organizują desperacką ucieczkę i wielu ucieka!"  #NT!
 tactical_forest_battle.7323.b: "Weź jeńców!"  #NT!
 tactical_forest_battle.7323.b.success: "Uwięzione siły poddają się i stają się jeńcami wojennymi!"  #NT!
 tactical_forest_battle.7323.b.failure: "Wiele uwięzionych sił odmawia poddania się i walki na śmierć i życie!"  #NT!
  
  # Event 9466 - Their Center is Shocked 
 tactical_forest_battle.9466.t: "Oskrzydlony i zdezorientowany"  #NT!
 tactical_forest_battle.9466.desc: "[enemy_commander.GetTitledFirstNamePossessiveOrMy] środkowy jest w szoku! Panika to doskonała okazja! Jeśli uda nam się tu przebić, możemy zaatakować centrum."  #NT!
 tactical_forest_battle.9466.a: "Udawaj odwrót i zwróć się przeciwko prześladowcom"  #NT!
 tactical_forest_battle.9466.a.success: "[center_flank_commander.GetFullNameNicknamedPossessiveOrMy] udaj odwrót i wbij się w ich środek!"  #NT!
 tactical_forest_battle.9466.a.failure: "Wróg reorganizuje się i pozostaje niezmienny!"  #NT!
 tactical_forest_battle.9466.b: "Koordynuj szarżę z naszymi rycerzami"  #NT!
 tactical_forest_battle.9466.b.success: "Nasz połączony ładunek uderza w ich środek"  #NT!
 tactical_forest_battle.9466.b.failure: "Wróg niewzruszenie stawia czoła naszym atakom!"  #NT!
 tactical_forest_battle.9466.c: "Współpracuj z naszymi pułkami cracku, aby zaatakować ich prawą stronę"  #NT!
 tactical_forest_battle.9466.c.success: "Nasz połączony atak powoduje chaos w ich centrum!"  #NT!
 tactical_forest_battle.9466.c.failure: "Wróg ma czas na ustanowienie nowej linii obrony!"  #NT!
 tactical_forest_battle.9466.d: "Naciśnij przewagę z pełną siłą"  #NT!
 tactical_forest_battle.9466.d.success: "Naciskamy na ich środek!"  #NT!
 tactical_forest_battle.9466.d.failure: "Wróg trzyma się pomimo nacisku!"  #NT!
 tactical_forest_battle.9466.e: "[center_flank_commander.GetTitledFirstNameOrMeRegnal] szarżuje, by zmiażdżyć ich środek!"  #NT!
 tactical_forest_battle.9466.e.success: "Nasza szarża niszczy spójność wroga!"  #NT!
 tactical_forest_battle.9466.e.failure: "Trzymają się mocno i nie możemy się przebić!"  #NT!
  
 # Event .220 - Left Begins Encircle 
 tactical_forest_battle.220.t: "Lewa flanka rozpoczyna okrążenie"  #NT!
 tactical_forest_battle.220.desc: "Siła [left_flank_commander.GetTitledFirstNamePossessiveOrMy] wyciekła za linie wroga. Musimy wykorzystać tę przewagę, zanim przybędzie [enemy_commander.GetFirstNamePossessive] posiłków. Ludzie wierzą, że wystarczająco długie zwlekanie pozwoli im otoczyć wroga."  #NT!
 tactical_forest_battle.220.a: "Kleszcze z prawą flanką!"  #NT!
 tactical_forest_battle.220.a.success: "[left_flank_commander.GetTitledFirstName] i nasza prawa flanka koordynują niszczycielski ruch szczypiec!"  #NT!
 tactical_forest_battle.220.a.failure: "Koordynacja między flankami zostaje zerwana, a wróg ucieka przed szczypcami!"  #NT!
 tactical_forest_battle.220.b: "Wyślij naszych rycerzy, żeby mieli zajęcie!"  #NT!
 tactical_forest_battle.220.b.success: "Nasi rycerze są zaangażowani, odwracając ich uwagę od otaczających wrogów!"  #NT!
 tactical_forest_battle.220.b.failure: "Wróg widzi otaczającą siłę!"  #NT!
 tactical_forest_battle.220.c: "Wyślij nasze jednostki cracku, żeby byli zajęci"  #NT!
 tactical_forest_battle.220.c.success: "Nasze jednostki cracku nawiązują kontakt z wrogiem, umożliwiając kontynuację okrążenia!"  #NT!
 tactical_forest_battle.220.c.failure: "Wróg przegrupowuje się i odpiera nasze jednostki!"  #NT!
 tactical_forest_battle.220.d: "Uformuj kowadło, podczas gdy wyciekające siły atakują od tyłu"  #NT!
 tactical_forest_battle.220.d.success: "[center_flank_commander.GetTitledFirstName] prawa flanka zostaje rozbita pomiędzy dwiema siłami!"  #NT!
 tactical_forest_battle.220.d.failure: "Ich prawo jest na razie mocne!"  #NT!
 tactical_forest_battle.220.e: "Zainspiruj nasze wojska do cięższej walki, aż do całkowitego okrążenia"  #NT!
 tactical_forest_battle.220.e.success: "[center_flank_commander.GetTitledFirstName] prawa flanka zostaje rozbita pomiędzy dwiema siłami!"  #NT!
 tactical_forest_battle.220.e.failure: "Ich prawo jest na razie mocne!"  #NT!
  
  
