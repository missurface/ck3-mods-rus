 tactical_forest_battle.9476.c: "Centralne ładowanie jest trudne, aby zmniejszyć nacisk"  #NT!
 tactical_forest_battle.9476.c.success: "Szarża dezorientuje ich prawą flankę!"  #NT!
 tactical_forest_battle.9476.c.failure: "Wróg pozostaje niezłomny!"  #NT!
 tactical_forest_battle.9476.d: "Lewa flanka ostro szarżuje, aby złagodzić presję"  #NT!
 tactical_forest_battle.9476.d.success: "Szarża dezorientuje ich lewą flankę!"  #NT!
 tactical_forest_battle.9476.d.failure: "Wróg pozostaje niezłomny!"  #NT!
 tactical_forest_battle.9476.e: "Wyślij rycerzy jako wsparcie"  #NT!
 tactical_forest_battle.9476.e.success: "Rezerwy przybywają i wzmacniają linię!"  #NT!
 tactical_forest_battle.9476.e.failure: "Rezerwy są zbyt rozproszone, aby pomóc!"  #NT!
 tactical_forest_battle.9476.f: "Wyślij elitarne jednostki cracku w celu wzmocnienia"  #NT!
 tactical_forest_battle.9476.f.success: "Nasze jednostki cracku powodują chaos wśród wroga!"  #NT!
 tactical_forest_battle.9476.f.failure: "Nasze jednostki cracku są przeciążone!"  #NT!
  
