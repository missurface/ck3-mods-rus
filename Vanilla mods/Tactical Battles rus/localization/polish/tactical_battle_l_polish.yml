 tactical_forest_battle.2016.e.success: "Nasz atak całkowicie rozbija centrum wroga!"  #NT!
 tactical_forest_battle.2016.e.failure: "Wróg utrzymuje środkową pozycję!"  #NT!
  
 # ============================================ 
 # EVENT 1010 - Left Flank Exposed Center Follow-up 
 # ============================================ 
 tactical_forest_battle.1010.t: "Oskrzydlony i zdezorientowany"  #NT!
 tactical_forest_battle.1010.desc: "[left_flank_commander.GetTitledFirstNamePossessiveOrMy] manewr flankujący wywołał chaos na prawej flance wroga, ich ludzie przełamują się, jeśli uda nam się tu przebić, możemy zawrócić na środek."  #NT!
  
 tactical_forest_battle.1010.a: "Owiń i flankuj ich środek"  #NT!
 tactical_forest_battle.1010.a.success: "[left_flank_commander.GetFullNameNicknamedPossessiveOrMy] sił skutecznie flankuje centrum wroga!"  #NT!
 tactical_forest_battle.1010.a.failure: "Wróg przewiduje manewr i blokuje go!"  #NT!
  
 tactical_forest_battle.1010.b: "Wyślij rycerzy, aby zaatakowali swoje prawo"  #NT!
 tactical_forest_battle.1010.b.success: "Rycerze szarżują i całkowicie rozbijają lewicę!"  #NT!
 tactical_forest_battle.1010.b.failure: "Rycerze napotkali większy opór, niż się spodziewano!"  #NT!
  
 tactical_forest_battle.1010.c: "Wyślij nasze pułki cracku, żeby zaatakowały ich prawą stronę"  #NT!
 tactical_forest_battle.1010.c.success: "Nasze pułki cracku rozpadają się"  #NT!
 tactical_forest_battle.1010.c.failure: "Wróg ma czas na ustanowienie nowej linii obrony!"  #NT!
  
 tactical_forest_battle.1010.d: "Naciśnij przewagę z pełną siłą"  #NT!
 tactical_forest_battle.1010.d.success: "Pełne ciśnienie przełamuje całą obronę wroga!"  #NT!
 tactical_forest_battle.1010.d.failure: "Wróg trzyma się pomimo nacisku!"  #NT!
  
 tactical_forest_battle.1010.e: "Rozpocznij mocną szarżę, aby przełamać ich prawą flankę"  #NT!
 tactical_forest_battle.1010.e.success: "Lewa flanka niszczy spójność wroga!"  #NT!
 tactical_forest_battle.1010.e.failure: "Trzymają się mocno i nie możemy się przebić!"  #NT!
  
  
 # ============================================ 
 # EVENT 1014 - Center Pull Back Follow-up 
 # ============================================ 
 tactical_forest_battle.1014.t: "Strategia wycofania środka"  #NT!
 tactical_forest_battle.1014.desc: "Centrum wroga wycofuje się, aby przegrupować się i skoordynować działania z innymi siłami. Musimy zdecydować, czy kontynuować pościg, zwabić ich w pułapkę, czy zmienić położenie naszych jednostek, aby uzyskać maksymalny efekt."  #NT!
 tactical_forest_battle.1014.a: "Zwab wroga w naszą pułapkę MAA"  #NT!
 tactical_forest_battle.1014.a.success: "Wróg wchodzi bezpośrednio w naszą pułapkę i jest zdruzgotany!"  #NT!
 tactical_forest_battle.1014.a.failure: "Wróg rozpoznaje pułapkę i unika jej!"  #NT!
 tactical_forest_battle.1014.b: "Lewa flanka ostro szarżuje po lewej stronie"  #NT!
 tactical_forest_battle.1014.b.success: "Nasza lewa szarża całkowicie rozbija pozostawionego wroga!"  #NT!
 tactical_forest_battle.1014.b.failure: "Lewa szarża zostaje odparta przez rezerwy wroga!"  #NT!
 tactical_forest_battle.1014.c: "Centrum odwraca się i morduje wroga"  #NT!
 tactical_forest_battle.1014.c.success: "Nasze centrum kręci i niszczy centrum wroga!"  #NT!
 tactical_forest_battle.1014.c.failure: "Wróg odpiera kontratak!"  #NT!
 tactical_forest_battle.1014.d: "Zwab centrum wroga do rycerzy"  #NT!
 tactical_forest_battle.1014.d.success: "Centrum wroga zostało doskonale zwabione i zniszczone przez naszych rycerzy!"  #NT!
 tactical_forest_battle.1014.d.failure: "Wróg ucieka przed przynętą i wycofuje się!"  #NT!
 tactical_forest_battle.1014.e: "Naciśnij przewagę"  #NT!
 tactical_forest_battle.1014.e.success: "Bezlitosny nacisk całkowicie demoralizuje wroga!"  #NT!
 tactical_forest_battle.1014.e.failure: "Wróg stawia opór i utrzymuje pozycję!"  #NT!
  
  # Event 0010 - Left Flank Focus Follow-up 
 tactical_forest_battle.0010.t: "Walka na lewej flance"  #NT!
 tactical_forest_battle.0010.desc: "Bitwa trwa, a nasze siły atakują lewą flankę. [center_flank_commander.GetTitledFirstName] dowodzi w środku, z [right_flank_commander.GetFirstName] na prawym skrzydle. [left_flank_commander.GetTitledFirstName] dowodzi lewą stroną, użycie sił [left_flank_commander.GetHerHis] może okazać się kluczowe dla zapewnienia zwycięstwa."  #NT!
 tactical_forest_battle.0010.a: "Wykonaj zwodniczy odwrót na lewym skrzydle"  #NT!
 tactical_forest_battle.0010.a.success: "Zwód się udał! Wróg przerywa formację, aby ścigać nasze uciekające wojska, tworząc śmiertelną bezbronność."  #NT!
 tactical_forest_battle.0010.a.failure: "Wróg widzi nasze oszustwa i utrzymuje dyscyplinę, zwracając naszą uwagę przeciwko nam!"  #NT!
 tactical_forest_battle.0010.b: "Wykonaj manewr flankujący"  #NT!
 tactical_forest_battle.0010.b.success: "Nasze siły flankujące omiatają ich lewą flankę, niszcząc ich spójność!"  #NT!
 tactical_forest_battle.0010.b.failure: "Dowódca ten przewiduje nasz manewr i kieruje siły na spotkanie z nami."  #NT!
 tactical_forest_battle.0010.e: "Taktyka ataku i ucieczki na prawym skrzydle"  #NT!
 tactical_forest_battle.0010.e.success: "Nasze taktyki nękania ich wyniszczają! Ich prawo krwawi!"  #NT!
 tactical_forest_battle.0010.e.failure: "Wróg trzyma się mocno i utrzymuje formację!"  #NT!
 tactical_forest_battle.0010.f: "Oderwij ukryte siły flankujące i powoli wycofaj się"  #NT!
 tactical_forest_battle.0010.f.success: "Nasze siły flankujące skutecznie wycofują się i okrążają nacierający atak!"  #NT!
 tactical_forest_battle.0010.f.failure: "Nasze flankujące siły zostają wykryte i wciągnięte do walki!"  #NT!
 tactical_forest_battle.0010.g: "Stwórz fałszywą lukę, zachęcając ich do szarży w pułapkę"  #NT!
 tactical_forest_battle.0010.g.success: "Ich prawa strona zaczyna szarżować w wyrwę, wpadając w naszą pułapkę!"  #NT!
 tactical_forest_battle.0010.g.failure: "Ich prawica nie bierze przynęty i utrzymuje dyscyplinę!"  #NT!
  
 # Event 0011 - Center Flank Engagement 
