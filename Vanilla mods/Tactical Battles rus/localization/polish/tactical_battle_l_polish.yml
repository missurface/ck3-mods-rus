 # ============================================ 
 # EVENT 2014 - Right Flank Reserves Flood Left 
 # ============================================ 
 tactical_forest_battle.2014.t: "Połączony atak na lewą flankę"  #NT!
 tactical_forest_battle.2014.desc: "Połączony atak rezerw naszej prawej flanki i [left_flank_commander.GetFullNameNicknamedPossessiveOrMy] lewej flanki naciska atak na ich prawą flankę, jeśli uda nam się tu przebić, możemy zawrócić na środek."  #NT!
 tactical_forest_battle.2014.a: "Połączone siły zalewają lukę"  #NT!
 tactical_forest_battle.2014.a.success: "Połączone siły przytłaczają wroga, który popada w chaos!"  #NT!
 tactical_forest_battle.2014.a.failure: "Wróg szybko zmienia siły, aby zakryć lukę!"  #NT!
  
 tactical_forest_battle.2014.b: "Wyślij nasze elitarne pułki cracków, aby zaatakowały ich zdezorganizowaną flankę"  #NT!
 tactical_forest_battle.2014.b.success: "Nasze jednostki cracku sieją spustoszenie na prawej flance!"  #NT!
 tactical_forest_battle.2014.b.failure: "Wróg przegrupowuje się i odpiera atak!"  #NT!
  
 tactical_forest_battle.2014.c: "Wyślij rycerzy, aby zaatakowali ich prawą flankę"  #NT!
 tactical_forest_battle.2014.c.success: "Rycerze i rezerwy szarżują razem, a ich prawica popada w panikę"  #NT!
 tactical_forest_battle.2014.c.failure: "Połączony atak spotyka się z zaciekłym kontratakiem!"  #NT!
  
 tactical_forest_battle.2014.d: "Zalej lewą stronę i spróbuj przedostać się za ich środek"  #NT!
 tactical_forest_battle.2014.d.success: "Udaje nam się przeforsować część sił przez ich prawą flankę"  #NT!
 tactical_forest_battle.2014.d.failure: "Wróg przewiduje ten ruch i napiera na powódź"  #NT!
  
 tactical_forest_battle.2014.e: "Naciśnij atak"  #NT!
 tactical_forest_battle.2014.e.success: "Nasz atak trwa nadal z niszczycielskim skutkiem!"  #NT!
 tactical_forest_battle.2014.e.failure: "Wróg stabilizuje się, a dynamika zwalnia!"  #NT!
  
 # ============================================ 
 # EVENT 2016 - Center Flank Tactics 
 # ============================================ 
 tactical_forest_battle.2016.t: "Połączony atak z lewej strony"  #NT!
 tactical_forest_battle.2016.desc: "Połączony atak naszych środkowych rezerw i [left_flank_commander.GetFullNameNicknamedPossessiveOrMy] lewicy naciska atak na ich prawą flankę, jeśli uda nam się tu przebić, możemy zwrócić się na środek."  #NT!
  
 tactical_forest_battle.2016.a: "Rezerwy środka wypełniają lukę"  #NT!
 tactical_forest_battle.2016.a.success: "Rezerwy środkowe napływają, całkowicie rozbijając wroga!"  #NT!
 tactical_forest_battle.2016.a.failure: "Wróg stabilizuje środek i trzyma mocno!"  #NT!
  
 tactical_forest_battle.2016.b: "Wyślij nasze elitarne jednostki cracków, aby rozbiły centrum"  #NT!
 tactical_forest_battle.2016.b.success: "Jednostki cracku przebijają centrum wroga!"  #NT!
 tactical_forest_battle.2016.b.failure: "Atak jednostek cracku został odparty z ciężkimi stratami!"  #NT!
  
 tactical_forest_battle.2016.c: "Wyślij rycerzy, aby wsparli atak"  #NT!
 tactical_forest_battle.2016.c.success: "Rycerze szarżują na środek, rozpraszając wroga!"  #NT!
