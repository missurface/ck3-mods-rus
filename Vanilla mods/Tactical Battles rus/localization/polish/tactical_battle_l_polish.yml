 # Event 0210 - Cavalry Feint FAILURE Follow-up: Feint Unmasked 
 tactical_forest_battle.0210.t: "Zwód zdemaskowany!"  #NT!
 tactical_forest_battle.0210.desc: "[enemy_commander.GetTitledFirstName] przejrzał zwód naszej kawalerii! Ich siły zamiast ścigać, utrzymywały dyscyplinę, a teraz nasi jeźdźcy stawiają czoła zwartej piechocie, salwom rakiet lub kontrkawalerii czekającej w zasadzce. Sytuacja taktyczna obróciła się przeciwko nam – muszę zdecydować, jak uratować tę katastrofę."  #NT!
 tactical_forest_battle.0210.a: "Przepchnij się przez pułapkę! Naładuj się wszystkim! (Walka + Zręczność vs [enemy_commander.GetShortUINameNoTooltip], bardzo ryzykowne)"  #NT!
 tactical_forest_battle.0210.a.success: "Wbrew wszystkiemu nasza śmiałość przełamuje ich formację! Wróg cofa się przed naszą desperacką szarżą!"  #NT!
 tactical_forest_battle.0210.a.failure: "Szarża kończy się katastrofalną porażką. Nasza kawaleria jest rozproszona i rozbita!"  #NT!
 tactical_forest_battle.0210.b: "Zsiądź i trzymaj linę! (Wymaga wsparcia piechoty)"  #NT!
 tactical_forest_battle.0210.c: "Osłaniaj odwrót kawalerią. (Poświęć kawalerię, aby ocalić armię)"  #NT!
 tactical_forest_battle.0210.d: "Zbierz chwiejnego konia dzięki osobistemu przywództwu! (Wymaga Odważnego, Inspirującego Lidera lub Martiala 14+)"  #NT!
 tactical_forest_battle.0210.d.success: "Moje dowództwo utrzymuje kawalerię! Reformują się i przygotowują do dalszej walki!"  #NT!
 tactical_forest_battle.0210.d.failure: "Kawaleria odmawia zgromadzenia się. Morale nadal spada."  #NT!
  
  
  
 # Event 0120 - Infantry Ambush SUCCESS Follow-up: Kill Zone in the Woods 
 tactical_forest_battle.0120.t: "Strefa Zabij w lesie!"  #NT!
 tactical_forest_battle.0120.desc: "Kolumna wroga wkroczyła prosto na naszą ukrytą piechotę i oddziały rakietowe! Widoczność w lasach jest słaba, ich formacje są rozciągnięte, a struktura dowodzenia pogrążona jest w chaosie. Siły [enemy_commander.GetTitledFirstName] znajdują się na idealnym polu śmierci. Jak wykorzystamy tę szansę?"  #NT!
 tactical_forest_battle.0120.a: "Zamknij szczęki pułapki! Uszczelnij ich przód i tył!"  #NT!
 tactical_forest_battle.0120.b: "Niech przemówią strzały i oszczepy. Trzymaj naszą piechotę w ukryciu. (Wymaga łuczników/harcowników)"  #NT!
 tactical_forest_battle.0120.b.success: "Nasz ostrzał rakietowy niszczy ich odsłoniętą kolumnę!"  #NT!
 tactical_forest_battle.0120.b.failure: "Ich tarcze i pancerze ograniczają skuteczność naszego ostrzału."  #NT!
 tactical_forest_battle.0120.c: "Najpierw uderzaj w oficerów — celuj w sztandary i dowódców!"  #NT!
 tactical_forest_battle.0120.c.success: "Nasze zespoły uderzeniowe eliminują kluczowych oficerów! Ich dowództwo upada!"  #NT!
 tactical_forest_battle.0120.c.failure: "Zespoły uderzeniowe są odizolowane i ponoszą ciężkie straty!"  #NT!
 tactical_forest_battle.0120.d: "Zostaw ich krwawiących, a potem zniknij z powrotem w lesie."  #NT!
  
  
 # Event 0220 - Infantry Ambush FAILURE Follow-up: Ambush Detected 
 tactical_forest_battle.0220.t: "Wykryto zasadzkę!"  #NT!
 tactical_forest_battle.0220.desc: "[enemy_commander.GetTitledFirstName] przejrzał naszą zasadzkę! Ich zwiadowcy wykryli nasze ukryte pozycje, a ich siły przystosowały się, zanim zdążyliśmy zastawić pułapkę. Nasze rozproszone jednostki piechoty zostają zdemaskowane w [battle_location.GetName] bez skoordynowanej przewagi. Muszę zdecydować, jak uratować tę taktyczną katastrofę."  #NT!
 tactical_forest_battle.0220.a: "Wycofaj się i skonsoliduj pozycje obronne! Przegrupuj się w twierdze."  #NT!
 tactical_forest_battle.0220.b: "Zmień formację i kontratakuj poprzez nacisk wroga! (Martial 11+, wysokie ryzyko)"  #NT!
 tactical_forest_battle.0220.b.success: "Nasza nieoczekiwana agresja zaskakuje wroga! Ich formacja pęka!"  #NT!
 tactical_forest_battle.0220.b.failure: "Kontrszarża jeszcze bardziej odsłoniła naszą piechotę. Katastrofa!"  #NT!
 tactical_forest_battle.0220.c: "Użyj lasu, aby rozproszyć jednostki i zreformować się gdzie indziej. (Zarządzanie 10+)"  #NT!
 tactical_forest_battle.0220.c.success: "Nasze jednostki wymykają się między drzewami i bezpiecznie przegrupowują!"  #NT!
 tactical_forest_battle.0220.c.failure: "Rozproszone jednostki nie mogą się zreformować. Pozostają zdezorganizowani i bezbronni."  #NT!
 tactical_forest_battle.0220.d: "Utrzymaj naszą pozycję i walcz z presją! Zaakceptuj ciężkie straty."  #NT!
  
 # Event 0130 - Levy Braced SUCCESS Follow-up: Spears and Trees 
 tactical_forest_battle.0130.t: "Włócznie i drzewa!"  #NT!
 tactical_forest_battle.0130.desc: "Włócznia opłat trzyma się jak kamień! Sam las staje się fortecą, gdy nasi żołnierze zasadzają się między drzewami. Siły [enemy_commander.GetTitledFirstName] zderzają się z naszą najeżoną formacją i słabną. Teraz nadchodzi moment, aby wykorzystać naszą przewagę – jak wykorzystamy ich słabość?"  #NT!
 tactical_forest_battle.0130.a: "Przytrzymaj linię i zetrzyj je. Niech ścieranie się pracuje dla nas."  #NT!
 tactical_forest_battle.0130.b: "Uderz nagle przez ich środek! (Nauka + Martial 9+, umiarkowane ryzyko)"  #NT!
 tactical_forest_battle.0130.b.success: "Nagłe pchnięcie łamie ich determinację! Formacja wroga rozpada się!"  #NT!
 tactical_forest_battle.0130.b.failure: "Pchnięcie zwalnia, ale lina trzyma. Nie chcą się łamać."  #NT!
 tactical_forest_battle.0130.c: "Niech łucznicy zmasakrują ich na polu śmierci. (Wymaga łuczników MaA)"  #NT!
 tactical_forest_battle.0130.c.success: "Padają niszczycielskie salwy! Pole śmierci pochłania setki!"  #NT!
 tactical_forest_battle.0130.c.failure: "Łucznikom zaczyna brakować strzał i tracą przewagę."  #NT!
 tactical_forest_battle.0130.d: "Stwórz kowadło, aby rozbić ich ładunek! (Skoncentruj się na wytrzymałości)"  #NT!
  
 # Event 0230 - Levy Scattered FAILURE Follow-up: Formation Broken 
 tactical_forest_battle.0230.t: "Formacja rozbita!"  #NT!
 tactical_forest_battle.0230.desc: "Opłaty rozproszyły się w panice! Zamiast utworzyć najeżony mur włóczni, żołnierze rozproszyli się między drzewami, nie mogąc skoordynować działań ani utrzymać linii. [enemy_commander.GetTitledFirstName] widzi słabość i wykorzystuje ją. Formacja jest rozbita – muszę działać szybko, aby uratować tę katastrofę."  #NT!
 tactical_forest_battle.0230.a: "Zdobądź ich osobistym przykładem! Prowadź od przodu! (Waleczność 10+, Walka 9+)"  #NT!
 tactical_forest_battle.0230.a.success: "Moje osobiste męstwo jednoczy żołnierzy! Reformują się i hartują!"  #NT!
 tactical_forest_battle.0230.a.failure: "Żołnierze są przestraszeni i rozproszeni. Morale nie wraca do normy."  #NT!
 tactical_forest_battle.0230.b: "Zaangażuj swoich elitarnych rycerzy, aby wzmocnili linię. (Wymaga 2+ rycerzy)"  #NT!
 tactical_forest_battle.0230.c: "Przenieś rozproszone jednostki na lepszy teren. (Zarządzanie 9+)"  #NT!
 tactical_forest_battle.0230.c.success: "Rozproszone ładunki są zbierane i przenoszone na silniejszy teren!"  #NT!
 tactical_forest_battle.0230.c.failure: "Próba zmiany położenia kończy się niepowodzeniem. Jednostki stają się jeszcze bardziej rozproszone!"  #NT!
 tactical_forest_battle.0230.d: "Zamiast tego skup się na obniżeniu morale wrogów. (Intryga 8+, wojna psychologiczna)"  #NT!
  
  
 # Event 0140 - Knights in Reserve SUCCESS Follow-up: Knights Ready 
 tactical_forest_battle.0140.t: "Rycerze gotowi!"  #NT!
 tactical_forest_battle.0140.desc: "Rycerze czekają w doskonałej gotowości, ukryci przed wzrokiem wroga. Siły [enemy_commander.GetTitledFirstName] pozostają na swoich obecnych pozycjach, nieświadome naszej rezerwy kawalerii czekającej na atak. Nadszedł moment, aby je uwolnić – jak wykorzystać ich niszczycielski potencjał?"  #NT!
 tactical_forest_battle.0140.a: "Uderzenie młotem – niszczycielska szarża kawalerii! (Wyczyn 11+, bardzo wysokie ryzyko/nagroda)"  #NT!
 tactical_forest_battle.0140.a.success: "Ładunek wykonany bez zarzutu! Nasi rycerze rozbijają formację wroga jak szkło!"  #NT!
 tactical_forest_battle.0140.a.failure: "Szarża przekracza zasięg i rycerze zostają złapani w izolacji!"  #NT!
 tactical_forest_battle.0140.b: "Manewr flankujący — okrąż wroga! (Wojna 10+)"  #NT!
 tactical_forest_battle.0140.b.success: "Manewr flankujący powiódł się! Wróg zostaje zaskoczony od tyłu!"  #NT!
 tactical_forest_battle.0140.b.failure: "Manewr zostaje zablokowany, zanim będzie mógł się rozwinąć!"  #NT!
 tactical_forest_battle.0140.c: "Pościg — wykorzystaj wycofujące się jednostki! (Intryga 9+)"  #NT!
 tactical_forest_battle.0140.c.success: "Pościg rozgromił wroga! Nie mogą się zreorganizować!"  #NT!
 tactical_forest_battle.0140.c.failure: "Pościg zostaje zablokowany, a nasza kawaleria ponosi straty."  #NT!
 tactical_forest_battle.0140.d: "Zdyscyplinowane wycofanie się – użyj rycerzy do osłony odwrotu. (Zarządzanie 9+)"  #NT!
  
 martial_positive: "Przewaga taktyczna"  #NT!
 martial_negative: "Wada taktyczna"  #NT!
  
 frontline_commander: "Dowódca Linii Frontu"  #NT!
 frontline_commander_desc: "Ta postać prowadzi żołnierzy w wirze bitwy, inspirując ich do większych wyczynów męstwa i skuteczności."  #NT!
 tactical_commander: "Dowódca Taktyczny"  #NT!
  
 # ============================================ 
 # EVENT 2010 - Left Flank Tactics 
 # ============================================ 
 tactical_forest_battle.2010.t: "Podążając za zwódką"  #NT!
 tactical_forest_battle.2010.desc: "Nasz zwód na prawej flance przyciągnął uwagę wroga, pozostawiając jego lewą flankę bezbronną. Musimy zdecydować, jak najlepiej wykorzystać tę szansę, zanim będą mogli zareagować i wzmocnić."  #NT!
  
 tactical_forest_battle.2010.a: "Odwróć się i zabij ścigającego wroga"  #NT!
 tactical_forest_battle.2010.a.success: "Lewa flanka nagle zwraca się przeciwko pościgowi"  #NT!
 tactical_forest_battle.2010.a.failure: "[enemy_commander.GetFirstNamePossessive] prawa flanka opiera się naszemu nagłemu atakowi"  #NT!
  
 tactical_forest_battle.2010.b: "Zwab zasadzkę naszych elitarnych pułkowników"  #NT!
 tactical_forest_battle.2010.b.success: "Ich prawa flanka zostaje wciągnięta w pułapkę!"  #NT!
 tactical_forest_battle.2010.b.failure: "Ich prawica utrzymuje dyscyplinę i odmawia stosowania się do zwodów"  #NT!
  
 tactical_forest_battle.2010.c: "Zmień prawe rezerwy, aby spróbować okrążyć prawą flankę nie na pozycji"  #NT!
 tactical_forest_battle.2010.c.success: "Nasze siły odrywają się i są w stanie okrążyć wroga!"  #NT!
 tactical_forest_battle.2010.c.failure: "Nadciągające siły okrążające spotykają się z twarzą o"  #NT!
  
 tactical_forest_battle.2010.d: "Zmień środkową rezerwę, aby spróbować okrążyć nieustawioną prawą flankę"  #NT!
 tactical_forest_battle.2010.d.success: "Nasze siły odrywają się i są w stanie okrążyć wroga!"  #NT!
 tactical_forest_battle.2010.d.failure: "Nadciągające siły okrążające spotykają się twarzą w twarz"  #NT!
  
 tactical_forest_battle.2010.e: "Naciśnij przewagę"  #NT!
 tactical_forest_battle.2010.e.success: "Wykorzystujemy nieobecnego wroga!"  #NT!
 tactical_forest_battle.2010.e.failure: "Wróg zostanie wzmocniony, zanim będziemy mogli wykorzystać jego pozycję"  #NT!
  
 # ============================================ 
 # EVENT 2012 - Knights Break Left Flank 
 # ============================================ 
 tactical_forest_battle.2012.t: "Rycerze przedzierają się przez prawicę"  #NT!
 tactical_forest_battle.2012.desc: "Nasi rycerze przedarli się przez [enemy_commander.GetFirstNameNicknamedPossessiveOrMyRegnal] z prawej flanki, pozostawiając ją w chaosie. Jeśli teraz naciśniemy atak, możemy zwrócić się przeciwko odsłoniętemu centrum i zmiażdżyć ich, zanim zdążą się zregenerować."  #NT!
  
 tactical_forest_battle.2012.a: "Lewa flanka zalewa lukę"  #NT!
 tactical_forest_battle.2012.a.success: "[left_flank_commander.GetFullNameNicknamedPossessiveOrMy] flanka zalewa rozbitą formację wroga!"  #NT!
 tactical_forest_battle.2012.a.failure: "Wróg szybko się stabilizuje i zapobiega dalszej penetracji!"  #NT!
  
 tactical_forest_battle.2012.b: "Wyślij nasze elitarne pułki, aby złamały swoje prawa"  #NT!
 tactical_forest_battle.2012.b.success: "Nasze elitarne pułki rozbijają wroga prosto!"  #NT!
 tactical_forest_battle.2012.b.failure: "Ich prawica podnosi swoje siły i sprzeciwia się szarży!"  #NT!
  
 tactical_forest_battle.2012.c: "Lewa flanka szarżuje ciężko, aby rozbić prawą flankę"  #NT!
 tactical_forest_battle.2012.c.success: "Flanka [left_flank_commander.GetFullNameNicknamedPossessiveOrMy] łamie ich prawą flankę"  #NT!
