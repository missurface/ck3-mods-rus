 tactical_forest_battle.0011.e.success: "Ich środek zostaje nagle odsłonięty na obu flankach!"  #NT!
 tactical_forest_battle.0011.e.failure: "Nie dają się wciągnąć i trzymają się mocno!"  #NT!
