 # EVENT 8010 - Broken Left Flank Exposed Center 
 # ============================================ 
 tactical_forest_battle.8010.t: "Odsłonięte centrum!"  #NT!
 tactical_forest_battle.8010.desc: "To, co zostało z [enemy_commander.GetFirstNamePossessive] lewej flanki, wycofuje się! Mamy wyjątkową okazję, aby ich ścigać i zniszczyć, zanim zdążą się przegrupować!"  #NT!
 tactical_forest_battle.8010.a: "Włącz ich środkową flankę"  #NT!
 tactical_forest_battle.8010.a.success: "[right_flank_commander.GetFirstNameNicknamedPossessiveOrMyRegnal] skręca i wjeżdża na flankę ich środka!"  #NT!
 tactical_forest_battle.8010.a.failure: "Prawa flanka ugrzęzła"  #NT!
 tactical_forest_battle.8010.b: "Schwytaj więźniów"  #NT!
 tactical_forest_battle.8010.b.success: "Łapiemy wielu więźniów!"  #NT!
 tactical_forest_battle.8010.b.failure: "Więźniowie wymykają się!"  #NT!
 tactical_forest_battle.8010.c: "Wyślij rycerzy, aby rozbili się na odsłoniętej flance ich centrum"  #NT!
 tactical_forest_battle.8010.c.success: "Szarża Rycerzy powoduje spustoszenie"  #NT!
 tactical_forest_battle.8010.c.failure: "Szarża rycerzy zostaje wchłonięta"  #NT!
 tactical_forest_battle.8010.d: "Wyślij nasze elitarne jednostki cracku, aby rozbiły się na odsłoniętej flance ich centrum"  #NT!
 tactical_forest_battle.8010.d.success: "Nasze elitarne jednostki cracku niszczą zapasy wroga!"  #NT!
 tactical_forest_battle.8010.d.failure: "Nasze elitarne jednostki zajmujące się crackiem nie mogą zlokalizować zapasów!"  #NT!
  
