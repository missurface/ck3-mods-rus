 # EVENT 7324 - Enemy Reorganizes Turns to Meet our center 
  
  
 tactical_forest_battle.7324.t: "Wróg uderza w środkową flankę"  #NT!
 tactical_forest_battle.7324.desc: "[enemy_commander.GetFirstNamePossessive] rozpoznał naszą osłabioną środkową flankę i rozpoczyna atak. Bez naszych rezerw podejmujemy kluczową decyzję o utrzymaniu środkowej flanki."  #NT!
 tactical_forest_battle.7324.a: "Środkowa flanka jest silna wobec ataku"  #NT!
 tactical_forest_battle.7324.a.success: "Nasza środkowa flanka opiera się atakowi wroga!"  #NT!
 tactical_forest_battle.7324.a.failure: "Środkowa flanka jest przytłoczona i zaczyna słabnąć!"  #NT!
 tactical_forest_battle.7324.b: "Wyślij rycerzy, żeby wzmocnili centrum"  #NT!
 tactical_forest_battle.7324.b.success: "Świezi rycerze stabilizują środkową flankę!"  #NT!
 tactical_forest_battle.7324.b.failure: "Rycerze zostają przechwyceni, zanim dotrą do centrum!"  #NT!
 tactical_forest_battle.7324.c: "Wyślij nasze elitarne jednostki cracku, aby wzmocniły środkową flankę"  #NT!
 tactical_forest_battle.7324.c.success: "Nasze posiłki stabilizują środkową flankę!"  #NT!
 tactical_forest_battle.7324.c.failure: "Nasz ośrodek kruszy się mimo wzmocnień!"  #NT!
 tactical_forest_battle.7324.d: "Spróbuj powoli się wycofać i przesunąć swoje centrum z pozycji, zanim nadejdą posiłki"  #NT!
 tactical_forest_battle.7324.d.success: "Ich centrum zaczyna podążać za naszym odwrotem, odsłaniając ich!"  #NT!
 tactical_forest_battle.7324.d.failure: "Centrum nie jest w stanie rozłączyć się pod ciśnieniem!"  #NT!
 tactical_forest_battle.7324.e: "Udawaj odwrót i zwróć się przeciwko prześladowcom"  #NT!
 tactical_forest_battle.7324.e.success: "Wróg daje się nabrać na nasze oszustwo i przystępuje do nieoczekiwanego ataku!"  #NT!
 tactical_forest_battle.7324.e.failure: "Przejrzeli nasze oszustwo i podtrzymują swoją formację!"  #NT!
  
