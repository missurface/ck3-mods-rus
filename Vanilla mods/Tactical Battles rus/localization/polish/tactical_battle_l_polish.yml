 tactical_forest_battle.0061.t: "Los [sc_loser.GetFullNameNicknamed]"  #NT!
 tactical_forest_battle.0061.desc: "Z moim ostatnim ciosem [sc_loser.GetFirstName] pada na jedno kolano, zakrwawiony i pobity. Podczas gdy pole bitwy wokół mnie trwa, [sc_loser.GetTitledFirstNamePossessive] oczy spoglądają na mnie, wypełnione mieszaniną buntu i rezygnacji. Nadszedł czas, aby zdecydować o losie [sc_loser.GetHerHis]."  #NT!
 tactical_forest_battle.0061.a: "Zabij [sc_loser.GetFirstName]"  #NT!
 tactical_forest_battle.0061.a.success: "[sc_loser.GetFirstName] spotyka się z [sc_loser.GetHerHis] końcem na polu bitwy."  #NT!
 tactical_forest_battle.0061.b: "Przechwyć [sc_loser.GetFirstName]"  #NT!
 tactical_forest_battle.0061.b.success: "[sc_loser.GetFirstName] zostaje wzięty do niewoli."  #NT!
 tactical_forest_battle.0061.c: "Weź [sc_loser.GetFirstNamePossessive] oko i wypuść [sc_loser.GetHerHim] do [sc_loser.GetHerHis] losu."  #NT!
 tactical_forest_battle.0061.c.success: "Oślepienie [sc_loser.GetFirstName] zapewnia [sc_loser.GetHerHis] przetrwanie, ale dużym kosztem."  #NT!
 tactical_forest_battle.0061.d: "Zostaw [sc_loser.GetFirstName] trwale bliznami i uwolnij los [sc_loser.GetHerHim] do [sc_loser.GetHerHis]."  #NT!
 tactical_forest_battle.0061.d.success: "Blizny będą trwałą pamiątką po porażce [sc_loser.GetFirstNamePossessive]."  #NT!
 tactical_forest_battle.0061.e: "Okalecz [sc_loser.GetFirstName] i uwolnij los od [sc_loser.GetHerHim] do [sc_loser.GetHerHis]"  #NT!
 tactical_forest_battle.0061.e.success: "[sc_loser.GetFirstName] będzie dźwigał ciężar [sc_loser.GetHerHis] obrażeń przez resztę [sc_loser.GetHerHis] życia."  #NT!
  
  
 # Event 0005 - First tactical decision (Forest) 
 tactical_forest_battle.0005.t: "Bitwa w [battle_location.GetProvince.GetTerrain.GetName|l] z [battle_location.GetProvince.GetName]"  #NT!
 tactical_forest_battle.0005.desc: "Walcząc w wojnie o [fighting_war.GetName] przeciwko [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], Moja armia ściera się w [battle_location.GetProvince.GetTerrain.GetName|l] z [battle_location.GetProvince.GetName] z siłami [enemy_war_leader.GetFullNameNicknamedOrMeRegnal]. Nasi zwiadowcy meldują, że [enemy_commander.GetFullNameNicknamedOrMeRegnal] dowodził. Jako dowódca muszę wybrać nasz ruch, aby pokonać [enemy_commander.GetTitleTierName]."  #NT!
 tactical_forest_battle.0005.a: "Skup się na lewej flance ([left_flank_commander.GetSkill( 'martial' )]#! [martial|E] [left_flank_commander.GetTitledFirstNameOrMe] vs [enemy_right_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_right_flank_commander.GetSkill( 'martial' )]#! [martial|E])"  #NT!
 tactical_forest_battle.0005.b: "Skup się na środku ([center_flank_commander.GetSkill( 'martial' )]#! [martial|E] [center_flank_commander.GetTitledFirstNameOrMe] vs [enemy_center_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_center_flank_commander.GetSkill( 'martial' )]#! [martial|E])"  #NT!
 tactical_forest_battle.0005.c: "Skup się na prawej flance ([right_flank_commander.GetSkill( 'martial' )]#! [martial|E] [right_flank_commander.GetTitledFirstNameOrMe] vs [enemy_left_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_left_flank_commander.GetSkill( 'martial' )]#! [martial|E])"  #NT!
 tactical_forest_battle.0005.d: "Trzymaj moich rycerzy w rezerwie"  #NT!
 tactical_forest_battle.0005.d.success: "Moi rycerze są doskonale przygotowani, aby wykorzystać każdą okazję!"  #NT!
 tactical_forest_battle.0005.d.failure: "Bitwa rozwija się zbyt szybko i moi rycerze zostają złapani na nieodpowiednich pozycjach."  #NT!
 tactical_forest_battle.0005.e: "Skoncentruj się na naszych elitarnych jednostkach dystansowych"  #NT!
 tactical_forest_battle.0005.f: "Skup się na naszej elitarnej kawalerii"  #NT!
 tactical_forest_battle.0005.n: "Szarża za ich dowódcę!"  #NT!
 tactical_forest_battle.0005.n.success: "[left_flank_commander.GetFullNameNicknamedOrMe] pojedynków [enemy_right_flank_commander.GetFullNameNicknamed]"  #NT!
 tactical_forest_battle.0005.n.failure: "Nasza szarża nie jest w stanie się przebić!"  #NT!
 tactical_forest_battle.0005.kc: "Zwycięstwo pojedynku!"  #NT!
 tactical_forest_battle.0005.kc.success: "[left_flank_commander.GetFullNameNicknamed] zabił [enemy_right_flank_commander.GetFullNameNicknamed] w pojedynczej walce, demoralizując swoje wojska!"  #NT!
 tactical_forest_battle.0005.cc: "Zwycięstwo pojedynku!"  #NT!
 tactical_forest_battle.0005.cc.success: "[left_flank_commander.GetFullNameNicknamed] zdobył [enemy_right_flank_commander.GetFullNameNicknamed] po pokonaniu [enemy_right_flank_commander.GetHerHim] w pojedynczej walce, demoralizując ich wojska!"  #NT!
 tactical_forest_battle.0005.ld: "Pokonany w pojedynku!"  #NT!
 tactical_forest_battle.0005.ld.failure: "[left_flank_commander.GetFullNameNicknamed] został pokonany przez [enemy_right_flank_commander.GetFullNameNicknamed] po okrążeniu [enemy_right_flank_commander.GetFirstName]! w bitwie!"  #NT!
 tactical_forest_battle.0005.ldk: "Zabity w pojedynku!"  #NT!
 tactical_forest_battle.0005.ldk.failure: "[left_flank_commander.GetFullNameNicknamed] został zabity przez [enemy_right_flank_commander.GetFullNameNicknamed] po okrążeniu [enemy_right_flank_commander.GetFirstName] w bitwie!"  #NT!
 tactical_forest_battle.0005.j: "Naładuj [enemy_right_flank_commander.GetFullNameNicknamed]!"  #NT!
 tactical_forest_battle.0005.j.failure: "[left_flank_commander.GetFullNameNicknamed] nie był w stanie przedostać się do [enemy_right_flank_commander.GetFullNameNicknamed]"  #NT!
 tactical_forest_battle.0005.dtt.success: "Nasza flanka szarżuje i otacza [enemy_right_flank_commander.GetFirstName]"  #NT!
 # Event 0110 - Cavalry Feint SUCCESS Follow-up: Trap Sprung 
 tactical_forest_battle.0110.t: "Pułapka została uruchomiona!"  #NT!
 tactical_forest_battle.0110.desc: "[left_flank_commander.GetTitledFirstNamePossessive] zwód zadziałał doskonale! [enemy_commander.GetFirstNamePossessive] polecenia zatrzymania zostały zagłuszone, a [enemy_commander.GetHerHis] straż przednia złamała szyk, aby złapać przynętę. Prawa strona ich linii jest teraz rozciągnięta i zdezorganizowana."  #NT!
 tactical_forest_battle.0110.a: "[left_flank_commander.GetTitledFirstName] prowadzi zdezorganizowaną armię w pułapkę naszych jednostek cracku"  #NT!
 tactical_forest_battle.0110.a.success: "[enemy_commander.GetFirstNamePossessive] prawa strona podąża za [left_flank_commander.GetFirstNamePossessive] uciekającymi siłami prosto w zasadzkę!"  #NT!
 tactical_forest_battle.0110.a.failure: "Prawa strona nie bierze przynęty i utrzymuje pozycję, obracając jednostki, aby wesprzeć inne flanki"  #NT!
 tactical_forest_battle.0110.b: "Wyślij rycerzy, aby zmiażdżyli ich nadmiernie rozciągniętą flankę"  #NT!
 tactical_forest_battle.0110.b.success: "Rycerze uderzają w odsłoniętą flankę wroga, rozbijając formację!"  #NT!
 tactical_forest_battle.0110.b.failure: "Wróg szybko się reorganizuje i zwraca się przeciwko naszym rycerzom"  #NT!
 tactical_forest_battle.0110.c: "Oderwij siły z flanki [right_flank_commander.GetTitledFirstNamePossessive], aby otoczyć zwabione jednostki"  #NT!
 tactical_forest_battle.0110.c.success: "[right_flank_commander.GetTitledFirstName] skutecznie okrąża jednostki wroga, odcinając im odwrót!"  #NT!
 tactical_forest_battle.0110.c.failure: "Wróg prowadzi niszczycielski atak na naszą uszczuploną prawą flankę"  #NT!
 tactical_forest_battle.0110.d: "Obróć [center_flank_commander.GetFirstNamePossessive] rezerw, aby otoczyć zwabione jednostki"  #NT!
 tactical_forest_battle.0110.d.success: "Rezerwy poruszają się szybko i są w pozycji do okrążenia"  #NT!
 tactical_forest_battle.0110.d.failure: "[enemy_commander.GetFirstNamePossessive] rozpoznaje nasze wyczerpane centrum!"  #NT!
 tactical_forest_battle.0110.e: "Odwróć się i zabij zwabione jednostki przy pełnym naładowaniu"  #NT!
 tactical_forest_battle.0110.e.success: "Pełna szarża zaskakuje wroga!"  #NT!
 tactical_forest_battle.0110.e.failure: "Wróg pozostaje nieugięty i odpiera naszą szarżę!"  #NT!
  
  
 # ============================================ 
 # EVENT 9474 - Rally Army After Being Pressured 
 # ============================================ 
  
 tactical_forest_battle.9474.t: "Zbierz armię"  #NT!
 tactical_forest_battle.9474.desc: "Bitwa na lewicy osiągnęła punkt krytyczny. Nasze siły są chwiejne, ale jeszcze nie zniszczone. Dzięki silnemu przywództwu i odważnym działaniom możemy przywrócić porządek i odwrócić tę sytuację!"  #NT!
 tactical_forest_battle.9474.a: "Lewy atakuje"  #NT!
 tactical_forest_battle.9474.a.success: "Nasza armia słyszy wezwanie i gromadzi się!"  #NT!
 tactical_forest_battle.9474.a.failure: "Armia nadal się waha!"  #NT!
 tactical_forest_battle.9474.b: "Udawaj odwrót, aby zwabić wroga i przeprowadzić kontratak"  #NT!
 tactical_forest_battle.9474.b.success: "Kontratak się powiódł i morale wzrosło!"  #NT!
 tactical_forest_battle.9474.b.failure: "Kontratak kończy się niepowodzeniem i morale spada!"  #NT!
 tactical_forest_battle.9474.c: "Centralne ładowanie jest trudne, aby zmniejszyć nacisk"  #NT!
 tactical_forest_battle.9474.c.success: "Szarża dezorientuje ich prawą flankę!"  #NT!
 tactical_forest_battle.9474.c.failure: "Wróg pozostaje niezłomny!"  #NT!
 tactical_forest_battle.9474.d: "Prawe flanki ostro szarżują, aby złagodzić presję"  #NT!
 tactical_forest_battle.9474.d.success: "Szarża dezorientuje ich lewą flankę!"  #NT!
 tactical_forest_battle.9474.d.failure: "Wróg pozostaje niezłomny!"  #NT!
 tactical_forest_battle.9474.e: "Wyślij rycerzy jako wsparcie"  #NT!
 tactical_forest_battle.9474.e.success: "Rezerwy przybywają i wzmacniają linię!"  #NT!
 tactical_forest_battle.9474.e.failure: "Rezerwy są zbyt rozproszone, aby pomóc!"  #NT!
 tactical_forest_battle.9474.f: "Wyślij elitarne jednostki cracku w celu wzmocnienia"  #NT!
 tactical_forest_battle.9474.f.success: "Nasze jednostki cracku powodują chaos wśród wroga!"  #NT!
 tactical_forest_battle.9474.f.failure: "Nasze jednostki cracku są przeciążone!"  #NT!
  
 # ============================================ 
 # EVENT 0650 - Right Flank Reserves Intercept 
 # ============================================ 
 tactical_forest_battle.0650.t: "Prawa flanka przechwytuje ruch wroga"  #NT!
 tactical_forest_battle.0650.desc: "Nasze rezerwy prawej flanki wykryły siły [enemy_commander.GetFirstNamePossessive] próbujące manewrować przeciwko naszej pozycji. Mamy krótkie okno na działanie, zanim wróg zakończy swój ruch."  #NT!
  
 tactical_forest_battle.0650.a: "Rozpocznij mocny atak prawą flanką"  #NT!
 tactical_forest_battle.0650.a.success: "Prawa flanka zadaje miażdżący cios, zawalając prawą stronę wroga!"  #NT!
 tactical_forest_battle.0650.a.failure: "Natarcie zostaje odparte, a wróg przejmuje inicjatywę!"  #NT!
  
 tactical_forest_battle.0650.b: "Obróć lewą flankę, aby zaatakować od tyłu"  #NT!
 tactical_forest_battle.0650.b.success: "Nasz manewr kołem łapie wroga w niszczycielskim ogniu krzyżowym!"  #NT!
 tactical_forest_battle.0650.b.failure: "Manewr flankujący zostaje wykryty i przerwany przez kontrataki wroga!"  #NT!
  
 tactical_forest_battle.0650.c: "Zainspiruj żołnierzy odważnym wezwaniem bojowym"  #NT!
 tactical_forest_battle.0650.c.success: "Żołnierze są zainspirowani i odpierają natarcie wroga!"  #NT!
 tactical_forest_battle.0650.c.failure: "Nasze wezwanie do zgromadzenia zostaje zlekceważone, a armia nadal traci grunt pod nogami!"  #NT!
  
 tactical_forest_battle.0650.d: "Włącz odpowiednie rezerwy i wywołaj zamieszanie"  #NT!
 tactical_forest_battle.0650.d.success: "Rezerwy powodują wystarczające zamieszanie, abyśmy mogli zmienić pozycję na korzyść!"  #NT!
 tactical_forest_battle.0650.d.failure: "Intryga przynosi odwrotny skutek, a wróg wykorzystuje nasze zamieszanie!"  #NT!
  
 tactical_forest_battle.0650.e: "Wyślij rycerzy, żeby wzmocnili prawą flankę"  #NT!
 tactical_forest_battle.0650.e.success: "Rycerze wzmacniają flankę i zabezpieczają pozycję!"  #NT!
 tactical_forest_battle.0650.e.failure: "Rycerze zostają odcięci i otoczeni przez większą liczbę wrogów!"  #NT!
  
