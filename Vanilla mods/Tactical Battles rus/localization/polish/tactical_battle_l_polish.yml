 tactical_forest_battle.0011.desc: "Bitwa trwa, a nasze siły atakują środkową flankę. Polecenia [left_flank_commander.GetTitledFirstName] po lewej stronie, z [right_flank_commander.GetFirstName] na prawym skrzydle. [center_flank_commander.GetTitledFirstName] dowodzi środkiem, a użycie sił [center_flank_commander.GetHerHis] może okazać się kluczowe dla zapewnienia zwycięstwa."  #NT!
 tactical_forest_battle.0011.a: "Utwórz fałszywą lukę po lewej stronie naszego środka"  #NT!
 tactical_forest_battle.0011.a.success: "Ich środek atakuje lukę, wpadając w naszą pułapkę!"  #NT!
 tactical_forest_battle.0011.a.failure: "Wróg nie daje się wciągnąć i utrzymać mocno!"  #NT!
 tactical_forest_battle.0011.b: "Utwórz fałszywą lukę po prawej stronie naszego środka"  #NT!
 tactical_forest_battle.0011.b.success: "Ich środek atakuje lukę, wpadając w naszą pułapkę!"  #NT!
