 # Event 7323 - Left Encircles (Outcomes) 
 tactical_forest_battle.7323.t: "Prawa flanka jest otoczona!"  #NT!
 tactical_forest_battle.7323.desc: "[left_flank_commander.GetTitledFirstName] pomyślnie otoczył [enemy_commander.GetFirstNamePossessive] prawą flankę! Tysiące żołnierzy wroga jest teraz uwięzionych, odciętych od odwrotu i posiłków. [enemy_commander.GetTitledFirstName] bezradnie patrzy, jak ich uwięzione siły stają w obliczu zagłady. Musimy zadecydować o ich losie – czy okażemy im łaskę honorowego poddania się, czy też całkowicie ich zniszczymy jako przykład?"  #NT!
 tactical_forest_battle.7323.a: "Rozpocznij rzeź!"  #NT!
