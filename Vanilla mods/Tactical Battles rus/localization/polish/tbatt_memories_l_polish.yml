 center_commander_knights_broke_second: "Walcząc w wojnie za [fighting_war.GetName] przeciwko [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], dowodziłeś szarżą naszych rycerzy, którzy rozgromili centrum [enemy_commander.GetFullNameNicknamedOrMeRegnal] w bitwie pod [battle_location.GetProvince.GetName]."  #NT!
