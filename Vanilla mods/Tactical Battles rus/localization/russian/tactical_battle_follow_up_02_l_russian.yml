  # tactical_forest_battle.7320 - Failure event, enemy reorganizes and stands strong 
 tactical_forest_battle.7320.t: "Враг крепко стоит за нашими позициями"
 tactical_forest_battle.7320.desc: "[enemy_commander.GetFirstNamePossessive] сил сплотились и реорганизовали свою линию позади нашей. Теперь они окопались глубже, повернувшись спиной к нашим позициям, и их строй усилился. Мы должны решить, продолжать ли давить на них или изменить нашу тактику."
 tactical_forest_battle.7320.a: "Отправьте атаку нашими элитными отрядами, чтобы атаковать их фланг."
 tactical_forest_battle.7320.a.success: "Наши лучшие подразделения застают их врасплох и прорываются через их позиции!"
 tactical_forest_battle.7320.a.failure: "Нашим лучшим подразделениям не под силу прорвать их прочную оборону!"
 tactical_forest_battle.7320.b: "Отправьте рыцарей атаковать их фланг."
 tactical_forest_battle.7320.b.success: "Наши рыцари врезаются им во фланг, разрывая строй!"
 tactical_forest_battle.7320.b.failure: "Рыцари перехвачены резервами противника!"
 tactical_forest_battle.7320.c: "Вырвите центральные резервы, чтобы разбить их тыл"
 tactical_forest_battle.7320.c.success: "Наши центральные резервы врываются в их тыл, вызывая хаос!"
 tactical_forest_battle.7320.c.failure: "Наши центральные резервы не могут выйти из боя из-за внезапного толчка!"
 tactical_forest_battle.7320.d: "Оторвите правые резервы, чтобы разбить им тылы"
 tactical_forest_battle.7320.d.success: "Наши центральные резервы врываются в их тыл, вызывая хаос!"
 tactical_forest_battle.7320.d.failure: "Наши центральные резервы не могут выйти из боя из-за внезапного толчка!"
 tactical_forest_battle.7320.e: "Симулируйте отступление и нападите на преследователей."
 tactical_forest_battle.7320.e.success: "Враг попадается на наш обман и преследует неожиданный удар!"
 tactical_forest_battle.7320.e.failure: "Враг отступает к нашему незащищенному центру!"
  
  
  # tactical_forest_battle.7322 - Enemy attacks our depleted right flank 
 tactical_forest_battle.7322.t: "Враг наносит удар по правому флангу"
 tactical_forest_battle.7322.desc: "[enemy_commander.GetFirstNamePossessive] заметил наш ослабленный правый фланг и начал наступление. Без наших резервов мы принимаем решающее решение сохранить свой правый фланг."
 tactical_forest_battle.7322.a: "Правый фланг стойко противостоит атаке."
 tactical_forest_battle.7322.a.success: "Наш правый фланг стойко выдерживает натиск врага!"
 tactical_forest_battle.7322.a.failure: "Правый фланг разбит и начинает давать сбои!"
 tactical_forest_battle.7322.b: "Отправьте рыцарей, чтобы укрепить право"
 tactical_forest_battle.7322.b.success: "Свежие рыцари стабилизируют правый фланг!"
 tactical_forest_battle.7322.b.failure: "Рыцари перехвачены, не дойдя до правого края!"
 tactical_forest_battle.7322.c: "Отправьте наши элитные подразделения для усиления правого фланга."
 tactical_forest_battle.7322.c.success: "Наши подкрепления стабилизируют правый фланг!"
 tactical_forest_battle.7322.c.failure: "Наше право рушится, несмотря на подкрепление!"
 tactical_forest_battle.7322.d: "Постарайтесь отступить и вывести их левый фланг с позиции, пока не прибудет подкрепление."
 tactical_forest_battle.7322.d.success: "Их левый фланг начинает преследовать наше отступление, разоблачая их!"
 tactical_forest_battle.7322.d.failure: "Правые не способны расцепиться под давлением!"
 tactical_forest_battle.7322.e: "Симулируйте отступление и нападите на преследователей."
 tactical_forest_battle.7322.e.success: "Враг попадается на наш обман и преследует неожиданный удар!"
 tactical_forest_battle.7322.e.failure: "Они видят наш обман и поддерживают свой строй!"
  
  
 tactical_forest_battle.231.t: "Зарядил наш ложный разрыв"
 tactical_forest_battle.231.desc: "[enemy_commander.GetFirstNameNoTooltip] клюнул на наживку и ворвался в ложную брешь, которую мы создали на нашем правом фланге. Их левые силы теперь обнажены и уязвимы. Мы должны действовать быстро, чтобы воспользоваться этой возможностью, прежде чем они смогут восстановиться."
 tactical_forest_battle.231.a: "Отправьте наши элитные подразделения для атаки на их незащищенный левый фланг."
 tactical_forest_battle.231.a.success: "Наши элитные подразделения прорываются через их левый фланг, разрывая их строй!"
 tactical_forest_battle.231.a.failure: "Их право противостоит нападению нашей элиты!"
 tactical_forest_battle.231.b: "Отправьте рыцарей прорвать их левый фланг."
 tactical_forest_battle.231.b.success: "[left_flank_commander.GetFullNameNicknamedOrMe] атакуйте и приведите их фланг в замешательство!"
 tactical_forest_battle.231.b.failure: "Атака обрушивается на их левый фланг, приводя их в замешательство!"
 tactical_forest_battle.231.c: "Правый фланг атакует, чтобы прорвать их строй."
 tactical_forest_battle.231.c.success: "[right_flank_commander.GetFullNameNicknamedOrMe] атакуйте и приведите их фланг в замешательство!"
 tactical_forest_battle.231.c.failure: "Их левые остаются стойкими и отказываются сломиться!"
 tactical_forest_battle.231.d: "Выполните притворное отступление и начните атаковать их."
 tactical_forest_battle.231.d.success: "Враг попадается на наш обман и преследует!"
 tactical_forest_battle.231.d.failure: "Они видят наш обман и поддерживают свой строй!"
 tactical_forest_battle.231.e: "Нажмите на преимущество"
 tactical_forest_battle.231.e.success: "Оставшиеся враги рушатся под беспощадной атакой!"
 tactical_forest_battle.231.e.failure: "Резервы противника прибывают, чтобы укрепить линию!"
 tactical_forest_battle.231.f: "Отломать левые резервы, чтобы закрепить"
 tactical_forest_battle.231.f.success: "Наши левые силы выходят из боя и готовы окружить врага!"
 tactical_forest_battle.231.f.failure: "Наши левые резервы не могут выйти из боя!"
  
 tactical_forest_battle.5907.t: "Наш центр занимается маршрутизацией"
 tactical_forest_battle.5907.desc: "Наш центр ломается! [enemy_commander.GetFirstNamePossessive] разгромил наш центр, и вся армия находится под угрозой краха. Мы должны действовать немедленно, чтобы предотвратить катастрофу!"
 tactical_forest_battle.5907.b: "Экранное отступление с контратакой"
 tactical_forest_battle.5907.b.success: "Контратака дает нашим войскам время для консолидации!"
 tactical_forest_battle.5907.b.failure: "Контратака провалилась, и разгром продолжается!"
 tactical_forest_battle.5907.c: "Отчаянная атака с целью сломить преследователей разбитого правого фланга."
 tactical_forest_battle.5907.c.success: "Нашим правым удается уйти!"
 tactical_forest_battle.5907.c.failure: "Наша атака отбита, и разгром продолжается!"
 tactical_forest_battle.5907.a: "Отступление на оборонительные позиции"
 tactical_forest_battle.5907.a.success: "Нам удается отступить и создать новую линию обороны!"
 tactical_forest_battle.5907.a.failure: "Наши люди несут большие потери!"
  
