 tactical_outnumbered_lands.tt: "Успех в [battle_location.GetName]"
 tactical_outnumbered_lands.tt.success: "[this.GetFirstName] собирался победить [enemy_commander.GetFirstName] в [battle_location.GetName], несмотря на численное превосходство! [this.GetFirstName] показал себя блестящим полководцем и заслужил уважение всех, кто был свидетелем боя."
  
  # tactical_forest_battle.9416 - Harrying left flank, enemy bleeding 
 tactical_forest_battle.9416.t: "Их левая кровь кровоточит!"
 tactical_forest_battle.9416.desc: "[enemy_commander.GetFirstNamePossessive] сил шатаются от нашей тактики «нападай и беги». Их левый фланг сильно истощен, а раненые замедляют движение. Мы должны действовать быстро, чтобы извлечь выгоду из их слабостей, прежде чем они смогут реорганизоваться."
 tactical_forest_battle.9416.a: "Координируйте атаку с нашими элитными подразделениями по взлому"
 tactical_forest_battle.9416.a.success: "Наши элитные подразделения прорываются через их левый фланг, приводя их в замешательство!"
 tactical_forest_battle.9416.a.failure: "Нападению не удалось прорвать их упорную оборону!"
 tactical_forest_battle.9416.b: "Координируйте атаку с нашими рыцарями"
 tactical_forest_battle.9416.b.success: "Наши рыцари врезаются в ослабленного врага слева, приводя его в замешательство!"
 tactical_forest_battle.9416.b.failure: "Атака обрушивается на ослабленных левых противников, приводя их в замешательство!"
 tactical_forest_battle.9416.c: "Нападению не удалось прорвать их упорную оборону!"
 tactical_forest_battle.9416.c.success: "Наш левый фланговый удар рассеивает ослабленного противника!"
 tactical_forest_battle.9416.c.failure: "Они поддерживают строй, несмотря на свои потери!"
 tactical_forest_battle.9416.d: "Притворись отступлением и поверни их"
 tactical_forest_battle.9416.d.success: "Враг попадается на наш обман и преследует неожиданный удар!"
 tactical_forest_battle.9416.d.failure: "Они видят наш обман и поддерживают свой строй!!"
 tactical_forest_battle.9416.e: "Нажмите на преимущество"
 tactical_forest_battle.9416.e.success: "Их левый фланг рушится под огромным давлением!"
 tactical_forest_battle.9416.e.failure: "Они поддерживают строй, несмотря на свои потери!"
  
  
