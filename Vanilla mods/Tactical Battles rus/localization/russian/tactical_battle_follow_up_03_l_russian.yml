 tactical_forest_battle.0018.t: "Враг справа отвлечен"
 tactical_forest_battle.0018.desc: "Наш правый фланг успешно отвлек центр противника! Они растеряны и дезорганизованы. Мы должны немедленно воспользоваться этим преимуществом."
 tactical_forest_battle.0018.a: "Кавалерия атакует отвлеченный центр"
 tactical_forest_battle.0018.a.success: "Кавалерия прорывается через растерянный центр противника!"
 tactical_forest_battle.0018.a.failure: "Атака провалилась, несмотря на сопротивление врага!"
 tactical_forest_battle.0018.b: "Тотальный штурм пехоты в центре"
