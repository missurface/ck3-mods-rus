l_russian:
 tactical_forest_battle.7327.t: "Враг прессует преимущество"
 tactical_forest_battle.7327.desc: "[enemy_commander.GetFirstNamePossessive] силы осознали нашу дезорганизацию и безжалостно используют свое преимущество. В нашем центре царит хаос, и мы должны действовать решительно, чтобы предотвратить катастрофу."
 tactical_forest_battle.7327.a: "Центр отступает, устраивая засаду"
 tactical_forest_battle.7327.a.success: "Противник следует за нашим отступающим центром и находится вне позиции."
 tactical_forest_battle.7327.a.failure: "Наши силы не могут выйти из боя!"
 tactical_forest_battle.7327.b: "Отправьте правые резервы для стабилизации центра"
 tactical_forest_battle.7327.b.success: "Прибывают свежие резервы и восстанавливают строй!"
 tactical_forest_battle.7327.b.failure: "Резервам не удалось остановить волну!"
 tactical_forest_battle.7327.c: "Отправьте рыцарей в укрепление центра"
 tactical_forest_battle.7327.c.success: "Рыцари стабилизируют рушащийся центр!"
 tactical_forest_battle.7327.c.failure: "Рыцари в шоке!"
 tactical_forest_battle.7327.d: "Отправьте наши элитные подразделения для усиления центра."
 tactical_forest_battle.7327.d.success: "Подкрепление элитного полка укрепляет центр!"
 tactical_forest_battle.7327.d.failure: "Центр не может обрести сплоченность!"
 tactical_forest_battle.7327.e: "Прикажите центру держаться!"
 tactical_forest_battle.7327.e.success: "Наш центр вдохновлен держаться!"
 tactical_forest_battle.7327.e.failure: "Моральный дух продолжает рушиться, несмотря на наши усилия!"
  
 tactical_forest_battle.7332.t: "Атака противника на правом фланге"
 tactical_forest_battle.7332.desc: "[enemy_commander.GetFirstNamePossessive] отвела преследующие центральные силы и готовится нанести сильный удар по нашему правому флангу. Мы должны отреагировать немедленно, иначе наши права будут нарушены. Их отступление оставило незащищенным фланг центральных сил! Мы можем использовать это в своих интересах."
 tactical_forest_battle.7332.a: "Наш центр атакует их незащищенный фланг"
 tactical_forest_battle.7332.a.success: "Наша неожиданная атака разрушает их строй!"
 tactical_forest_battle.7332.a.failure: "Центр остается стойким и принимает на себя наш заряд!"
 tactical_forest_battle.7332.b: "Отступите вправо, пытаясь вытянуть свою линию."
 tactical_forest_battle.7332.b.success: "Враг следует за нашим отступлением и находится вне позиции!"
 tactical_forest_battle.7332.b.failure: "Наши силы не могут выйти из боя!"
 tactical_forest_battle.7332.c: "Отправьте рыцарей атаковать незащищенный центральный фланг."
 tactical_forest_battle.7332.c.success: "Рыцари сеют хаос в центре противника!"
 tactical_forest_battle.7332.c.failure: "Атака коня поглощается центром!"
 tactical_forest_battle.7332.d: "Отправьте элитные отряды для атаки на их незащищенный фланг."
 tactical_forest_battle.7332.d.success: "Наши отряды застают центр врасплох!"
 tactical_forest_battle.7332.d.failure: "Правые продолжают слабеть!"
 tactical_forest_battle.7332.e: "Оторвите левый фланг, чтобы попытаться окружить их центр."
 tactical_forest_battle.7332.e.success: "Наш левый фланг способен выйти из боя и занять позицию!"
 tactical_forest_battle.7332.e.failure: "Наш левый фланг не может выйти из боя!"
  
 tactical_forest_battle.0446.t: "Наши права стабилизировались"
 tactical_forest_battle.0446.desc: "Битва на нашем правом фланге превратилась в изнурительную войну на истощение. Обе стороны ведут жестокую битву, и победа достанется тому, кто сможет пережить другую."
 tactical_forest_battle.0446.a: "Командуйте правом держаться и сокрушать врага"
 tactical_forest_battle.0446.a.success: "Вражеская линия прогибается под нашим неустанным давлением!"
 tactical_forest_battle.0446.a.failure: "Враг стойко сопротивляется нашему сокрушительному нападению!"
 tactical_forest_battle.0446.b: "Отправьте рыцарей для усиления правого фланга."
 tactical_forest_battle.0446.b.success: "Подкрепления дают жизнь!"
 tactical_forest_battle.0446.b.failure: "Рыцари не могут вовремя добраться направо!"
 tactical_forest_battle.0446.c: "Отправьте наши элитные полки для усиления нашего правого фланга."
 tactical_forest_battle.0446.c.success: "Тресковые агрегаты снимают давление справа!"
 tactical_forest_battle.0446.c.failure: "Наши подразделения перехвачены и не могут оказать помощь!"
 tactical_forest_battle.0446.d: "Оторвите левый фланг, чтобы попытаться окружить их центр."
 tactical_forest_battle.0446.d.success: "Наш левый фланг способен выйти из боя и занять позицию!"
 tactical_forest_battle.0446.d.failure: "Наш левый фланг не может выйти из боя!"
 tactical_forest_battle.0446.e: "Симулируйте отступление и нападите на преследователей."
 tactical_forest_battle.0446.e.success: "Наша внезапная атака на преследователей застала их врасплох!"
 tactical_forest_battle.0446.e.failure: "Они видят насквозь нашу ожидаемую внезапную атаку!"
 tactical_forest_battle.0446.f: "Отступите вправо, вытянув свои линии"
 tactical_forest_battle.0446.f.success: "Их левый фланг следует за нашим отступлением и находится вне позиции!"
 tactical_forest_battle.0446.f.failure: "Наши силы не могут выйти из боя!"
  
  
 tactical_forest_battle.9423.t: "Правофланговый маршрут"
 tactical_forest_battle.9423.desc: "Наш правый фланг рушится под натиском противника! [enemy_commander.GetFirstNamePossessive] слева прорывается, и мы должны действовать немедленно, чтобы не допустить полного разгрома."
 tactical_forest_battle.9423.a: "Отступите центр правого фланга, сохраняя при этом фланги сильными."
 tactical_forest_battle.9423.a.success: "Их левый фланг начинает окружать!"
 tactical_forest_battle.9423.a.failure: "Центр не выдерживает давления!"
 tactical_forest_battle.9423.b: "Симулируйте отступление и нападите на преследователей."
 tactical_forest_battle.9423.b.success: "Наша внезапная атака на преследователей застала их врасплох!"
 tactical_forest_battle.9423.b.failure: "Их левый фланг готов к внезапной атаке."
 tactical_forest_battle.9423.c: "Отправьте рыцарей на подкрепление"
 tactical_forest_battle.9423.c.success: "Рыцари образуют арьергард и замедляют преследование!"
 tactical_forest_battle.9423.c.failure: "Рыцари отброшены натиском!"
 tactical_forest_battle.9423.d: "Отправьте наши элитные подразделения для подкрепления."
 tactical_forest_battle.9423.d.success: "Наши элитные подразделения по борьбе с наркотиками помогают стабилизировать правых!"
 tactical_forest_battle.9423.d.failure: "Отряды увязли в превосходящей силе!"
 tactical_forest_battle.9423.e: "Сплочение войск и контратака"
 tactical_forest_battle.9423.e.success: "Войска собираются и поворачиваются лицом к врагу!"
 tactical_forest_battle.9423.e.failure: "Контратака сорвалась!"
 tactical_forest_battle.9423.f: "Отправьте тайные фланговые силы слева, чтобы пробраться и врезаться в их левый фланг."
 tactical_forest_battle.9423.f.success: "Наши войска остаются незамеченными и создают помехи на своем левом фланге!"
 tactical_forest_battle.9423.f.failure: "Наши тайные силы обнаружены и брошены в бой, не имея возможности помочь!"
  
  
 tactical_forest_battle.0447.t: "Правый фланг разгромлен"
 tactical_forest_battle.0447.desc: "Наш правый фланг разгромлен и находится в полном беспорядке. [enemy_commander.GetFirstNamePossessive] проталкивается сквозь пропасть. Мы должны решить, укреплять ли нашу позицию или занять отчаянную позицию."
 tactical_forest_battle.0447.a: "Отступление на оборонительные позиции"
 tactical_forest_battle.0447.a.success: "Нам удается отступить и создать новую линию обороны!"
 tactical_forest_battle.0447.a.failure: "Наши люди несут большие потери!"
 tactical_forest_battle.0447.b: "Экранное отступление с контратакой"
 tactical_forest_battle.0447.b.success: "Контратака дает время нашим войскам на правом фланге для консолидации!"
 tactical_forest_battle.0447.b.failure: "Контратака провалилась, и разгром продолжается!"
 tactical_forest_battle.0447.c: "Отчаянная атака с целью сломить преследователей разбитого правого фланга."
 tactical_forest_battle.0447.c.success: "Нашим правым удается уйти!"
 tactical_forest_battle.0447.c.failure: "Пур-атака отбита, и разгром продолжается!"
  
  
 tactical_forest_battle.0442.t: "Враг в смятении"
 tactical_forest_battle.0442.desc: "Противник беспорядочно преследует наш отступающий правый фланг. Половина армии готовится нанести удар по центру, в то время как группы людей преследуют наши отступающие силы. Мы можем использовать этот хаос, чтобы нанести ответный удар."
 tactical_forest_battle.0442.a: "Центр отрывается, чтобы атаковать наших коней"
 tactical_forest_battle.0442.a.success: "Враг застигнут врасплох нашей внезапной атакой, а не в строю!"
 tactical_forest_battle.0442.a.failure: "Их левый фланг быстро реорганизуется и принимает на себя нашу атаку!"
 tactical_forest_battle.0442.b: "Отправьте рыцарей истребить преследователей и атаковать дезорганизованный фланг противника."
 tactical_forest_battle.0442.b.success: "Наши рыцари нападают на неорганизованные отряды и поворачивают с фланга."
 tactical_forest_battle.0442.b.failure: "Наши рыцари увязли в охоте на группы убийц."
 tactical_forest_battle.0442.c: "Отправьте элитные отряды, чтобы уничтожить преследователей и атаковать дезорганизованный фланг противника."
 tactical_forest_battle.0442.c.success: "Наши элитные подразделения нападают на неорганизованные истребительные группы и поворачивают с фланга."
 tactical_forest_battle.0442.c.failure: "Наши элитные подразделения увязли в охоте на группы убийц."
 tactical_forest_battle.0442.d: "Направьте неожиданный толчок с нашего левого фланга, чтобы попытаться обойти их и поразить их центр."
 tactical_forest_battle.0442.d.success: "Нашему наступлению удается дезориентировать их правый фланг, создавая брешь!"
 tactical_forest_battle.0442.d.failure: "Нашу атаку поглощает их правый фланг!"
  
  
 tactical_forest_battle.0240.t: "Левый фланговый маршрут"
 tactical_forest_battle.0240.desc: "Наш левый фланг рушится под натиском врага! Если они разгромятся, вся армия может оказаться в опасности."
 tactical_forest_battle.0240.a: "Отправьте резервы для стабилизации левых"
 tactical_forest_battle.0240.a.success: "Резервисты прибывают как раз вовремя и укрепляют левый фланг!"
 tactical_forest_battle.0240.a.failure: "Резервы не могут вовремя дойти до левого фланга!"
 tactical_forest_battle.0240.b: "Левый фланг сражается сильнее"
 tactical_forest_battle.0240.b.success: "Левый фланг выдерживает нападение!"
 tactical_forest_battle.0240.b.failure: "Левый фланг прорвался!"
  
 tactical_forest_battle.0449.t: "Наши левые разбиты"
 tactical_forest_battle.0449.desc: "Наш левый фланг полностью разгромлен! Прорыв противника грозит окружением всей нашей армии. Мы должны действовать решительно, чтобы сдержать эту катастрофу."
 tactical_forest_battle.0449.a: "Отступление и сброс позиций"
 tactical_forest_battle.0449.a.success: "Нам удается отступить и создать новую линию обороны!"
 tactical_forest_battle.0449.a.failure: "Отступление становится дезорганизованным и бесконтрольным!"
 tactical_forest_battle.0449.b: "Прикрыть отступление арьергардом"
 tactical_forest_battle.0449.b.success: "Наш арьергард продержится достаточно долго, чтобы основные силы могли отойти!"
 tactical_forest_battle.0449.b.failure: "Арьергард разбит!"
 tactical_forest_battle.0449.c: "Сделайте отчаянную попытку прорваться"
 tactical_forest_battle.0449.c.success: "Несмотря ни на что, наша отчаянная атака увенчалась успехом!"
 tactical_forest_battle.0449.c.failure: "Отчаянная атака разбита!"
  
  
 tactical_forest_battle.0443.t: "Левый фланг отступил"
 tactical_forest_battle.0443.desc: "Наш левый фланг в смятении отступил! Враг чувствует слабость и использует свое преимущество. Наш центр должен держаться крепко, иначе все потеряно."
 tactical_forest_battle.0443.a: "Центр стойко противостоит давлению"
 tactical_forest_battle.0443.a.success: "Наш центр держится, несмотря на давление!"
 tactical_forest_battle.0443.a.failure: "Центр не может удержаться и начинает поддаваться!"
 tactical_forest_battle.0443.b: "Отправляйте рыцарей, чтобы уничтожить преследующих врагов"
 tactical_forest_battle.0443.b.success: "Рыцари врываются в преследующую колонну противника!"
 tactical_forest_battle.0443.b.failure: "Рыцари не могут вовремя добраться до преследующих сил!"
 tactical_forest_battle.0443.c: "Отправьте наши элитные подразделения, чтобы уничтожить преследователей."
 tactical_forest_battle.0443.c.success: "Прибывает наше подкрепление и укрепляет линию!"
 tactical_forest_battle.0443.c.failure: "Враг продолжает атаку!"
 tactical_forest_battle.0443.d: "Центр симулирует отступление, чтобы заманить врага"
 tactical_forest_battle.0443.d.success:0 "The enemy is following our center 
 tactical_forest_battle.0443.d.failure: "Враг не обманывается и стоит твердо"
 tactical_forest_battle.0443.e: "Центр запускает внезапную атаку!"
 tactical_forest_battle.0443.e.success: "Наша внезапная атака шокирует врага!"
 tactical_forest_battle.0443.e.failure: "Наш заряд поглощен!"
  
 tactical_forest_battle.9222.t: "Сплотить армию"
 tactical_forest_battle.9222.desc: "Несмотря на хаос на наших флангах, у нас еще есть резервы и свежие войска. Если мы сможем скоординировать их должным образом, мы еще сможем переломить ход этой битвы!"
 tactical_forest_battle.9222.a: "Сплотите центр ради прорыва"
 tactical_forest_battle.9222.a.success: "Наш центр идет в атаку!"
 tactical_forest_battle.9222.a.failure: "Центр не может прорваться"
 tactical_forest_battle.9222.b: "Левый фланг атакует изо всех сил."
 tactical_forest_battle.9222.b.success: "Левый фланг мощно атакует и пытается отойти от центра!"
 tactical_forest_battle.9222.b.failure: "Левофланговая атака отбита!"
 tactical_forest_battle.9222.c: "Отправьте наши элитные подразделения для атаки на их центральные линии."
 tactical_forest_battle.9222.c.success: "Атака наших лучших подразделений сокрушает врага!"
 tactical_forest_battle.9222.c.failure: "Натиск притупляется сопротивлением врага!"
 tactical_forest_battle.9222.d: "Отправьте рыцарей прорваться через их центральные линии."
 tactical_forest_battle.9222.d.success: "Наши объединенные силы начинают сокрушать врага!"
 tactical_forest_battle.9222.d.failure: "Рыцарям не прорваться!"
 tactical_forest_battle.9222.e: "Симулируйте отступление и атакуйте преследующего врага."
 tactical_forest_battle.9222.e.success: "Наша внезапная атака на преследователей застала их врасплох!"
 tactical_forest_battle.9222.e.failure: "Враги быстро реорганизуются и поглощают наш заряд!"
  
  
 tactical_forest_battle.0703.t: "Наши левые находятся под давлением"
 tactical_forest_battle.0703.desc: "Наш левый фланг не выдерживает сильного давления со стороны [enemy_commander.GetFirstNamePossessive] правого фланга. Если мы не будем действовать быстро, они прорвутся и будут угрожать окружением всей нашей армии."
 tactical_forest_battle.0703.a: "Отступить и заманить в ловушку"
 tactical_forest_battle.0703.a.success: "Враг преследует наше отступление и попадает в засаду!"
 tactical_forest_battle.0703.a.failure: "Враг видит наше отступление и продолжает атаку!"
 tactical_forest_battle.0703.b: "Симулируйте отступление и нападите на врага"
 tactical_forest_battle.0703.b.success: "Несмотря ни на что, линия держится!"
 tactical_forest_battle.0703.b.failure: "Левый фланг прорывается и обращается в бегство!"
 tactical_forest_battle.0703.c: "Отправьте наши элитные отряды для усиления наших левых сил."
 tactical_forest_battle.0703.c.success: "Элитные подразделения прибывают и стабилизируют левые силы!"
 tactical_forest_battle.0703.c.failure: "Левая складывается, несмотря на подкрепление"
 tactical_forest_battle.0703.d: "Отправьте наших рыцарей, чтобы усилить наш левый фланг."
 tactical_forest_battle.0703.d.success: "Рыцари прибывают и поддерживают левых!"
 tactical_forest_battle.0703.d.failure: "Левые продолжают разрушаться, несмотря на подкрепление!"
 tactical_forest_battle.0703.e: "Отправьте центральные резервы на помощь левым"
 tactical_forest_battle.0703.e.success: "Прибывают центральные резервы и укрепляют левый фланг!"
 tactical_forest_battle.0703.e.failure: "Несмотря на подкрепление, левые продолжают колебаться"
 tactical_forest_battle.0703.e: "Отправьте правые резервы на помощь левым"
 tactical_forest_battle.0703.e.success: "Несмотря на подкрепление, левые продолжают колебаться"
 tactical_forest_battle.0703.e.failure: "Резервы не могут добраться вовремя!"
  
  
 tactical_forest_battle.0651.t: "Резервы пополняются"
 tactical_forest_battle.0651.desc: "Подкрепление прибыло, чтобы укрепить их правый фланг, угрожая остановить продвижение нашего левого фланга. Мы должны действовать быстро, чтобы сохранить темп нашей атаки."
 tactical_forest_battle.0651.a: "Левый фланг начинает яростный натиск"
 tactical_forest_battle.0651.a.success: "Их подкрепления не могут сравниться"
 tactical_forest_battle.0651.a.failure: "Подкрепление поглощает заряд"
 tactical_forest_battle.0651.b: "Отправьте наши элитные отряды в бой"
 tactical_forest_battle.0651.b.success: "Поддержка элитных подразделений позволяет левым прорваться!"
 tactical_forest_battle.0651.b.failure: "Даже при поддержке элиты попытка провалится!"
 tactical_forest_battle.0651.c: "Отправьте рыцарей, чтобы разбить подкрепление"
