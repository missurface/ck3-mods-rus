 tactical_forest_battle.0018.b.failure: "Штурм отбит!"
 tactical_forest_battle.0018.c: "Отправьте MAA, чтобы воспользоваться путаницей"
 tactical_forest_battle.0018.c.success: "Подразделения МАА используют замешательство и прорыв!"
 tactical_forest_battle.0018.c.failure: "МАА не может использовать эту путаницу!"
  
 tactical_forest_battle.9434.t: "Рыцари готовы"
 tactical_forest_battle.9434.desc: "Наши рыцари могут сыграть решающую роль в переломе хода битвы, и решающий выбор — куда их послать."
