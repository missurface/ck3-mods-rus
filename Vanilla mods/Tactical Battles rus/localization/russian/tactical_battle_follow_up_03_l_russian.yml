 tactical_forest_battle.9328.t: "Не зная о скрытом фланге справа"
 tactical_forest_battle.9328.desc: "Мы ослабили правый фланг планами отступить и заманить противника. Наш скрытый фланг остался незамеченным и лежит за наступающим левым флангом. Мы сможем нанести решающий удар, если будем действовать быстро."
 tactical_forest_battle.9328.a: "Выйти и врезаться в их незащищенный фланг."
 tactical_forest_battle.9328.a.success: "Скрытый фланг наносит сильный удар и застает противника врасплох."
 tactical_forest_battle.9328.a.failure: "Враг замечает наш скрытый фланг и готовится!"
 tactical_forest_battle.9328.b: "Постарайтесь окружить врага своим скрытым флангом."
 tactical_forest_battle.9328.b.success: "Наши рыцари появляются и начинают окружать врага!"
 tactical_forest_battle.9328.b.failure: "Рыцари увязли в бою!"
  
  
 tactical_forest_battle.9329.t: "Не подозревая о скрытом фланге слева"
 tactical_forest_battle.9329.desc: "Мы ослабили наш левый фланг планами отступить и заманить противника. Наш скрытый фланг остался незамеченным и лежит за наступающим правым флангом. Мы сможем нанести решающий удар, если будем действовать быстро."
 tactical_forest_battle.9329.a: "Выйти и врезаться в их незащищенный фланг."
 tactical_forest_battle.9329.a.success: "Их правый фланг застигнут врасплох и пытается реорганизоваться!"
 tactical_forest_battle.9329.a.failure: "Поглощает наш заряд"
 tactical_forest_battle.9329.b: "Постарайтесь окружить врага своим скрытым флангом."
 tactical_forest_battle.9329.b.success: "Рыцари наносят сокрушительный удар, который приносит победу в битве!"
 tactical_forest_battle.9329.b.failure: "Рыцари отбиты!"
  
 tactical_forest_battle.9465.t: "Зарядил наш ложный разрыв слева"
 tactical_forest_battle.9465.desc: "[enemy_commander.GetFirstNameNoTooltip] клюнул на наживку и ворвался в ложную брешь, которую мы создали на нашем левом фланге. Их левые силы теперь обнажены и уязвимы. Мы должны действовать быстро, чтобы воспользоваться этой возможностью, прежде чем они смогут восстановиться."
 tactical_forest_battle.9465.a: "Отправьте наши элитные подразделения для атаки на их незащищенный правый фланг."
 tactical_forest_battle.9465.a.success: "Наши элитные подразделения прорываются через их правый фланг, разрывая строй!"
 tactical_forest_battle.9465.a.failure: "Их право противостоит нападению нашей элиты!"
 tactical_forest_battle.9465.b: "Отправьте рыцарей прорвать их правый фланг."
 tactical_forest_battle.9465.b.success: "Атака наших рыцарей разрушает их правый фланг, приводя их в замешательство!"
 tactical_forest_battle.9465.b.failure: "Атака обрушивается на их правый фланг, приводя их в замешательство!"
 tactical_forest_battle.9465.c: "Левый фланг атакует, чтобы сломать их строй."
 tactical_forest_battle.9465.c.success: "[left_flank_commander.GetFullNameNicknamedOrMe] атакуйте и приведите их фланг в замешательство!"
 tactical_forest_battle.9465.c.failure: "Их право остается непоколебимым и отказывается нарушаться!"
 tactical_forest_battle.9465.d: "Выполните притворное отступление и начните атаковать их."
 tactical_forest_battle.9465.d.success: "Враг попадается на наш обман и преследует!"
 tactical_forest_battle.9465.d.failure: "Они видят наш обман и поддерживают свой строй!"
 tactical_forest_battle.9465.e: "Нажмите на преимущество"
 tactical_forest_battle.9465.e.success: "Враги рушатся под безжалостным натиском!"
 tactical_forest_battle.9465.e.failure: "Резервы противника прибывают, чтобы укрепить линию!"
