 tactical_forest_battle.6324.t:0 "Flanked and Confused 
 tactical_forest_battle.6324.desc: "Их левый фланг дезориентирован после наших фланговых маневров. Мы можем воспользоваться этой путаницей, поворачивая наш центр для нанесения удара, в то время как наши фланги продолжают атаковать."
 tactical_forest_battle.6324.a: "Обойти с фланга, чтобы атаковать центр"
 tactical_forest_battle.6324.a.success: "Их центр застигнут врасплох!"
 tactical_forest_battle.6324.a.failure: "Наши силы увязли!"
 tactical_forest_battle.6324.b: "Отправьте рыцарей сломать левый фланг"
 tactical_forest_battle.6324.b.success: "Наши рыцари сеют хаос в своих рядах!"
 tactical_forest_battle.6324.b.failure: "Наши рыцари увязли!"
 tactical_forest_battle.6324.c: "Отправьте наши элитные отряды взлома, чтобы сломать их левую сторону."
 tactical_forest_battle.6324.c.success: "Наши элитные подразделения сеют хаос на своем левом фланге!"
 tactical_forest_battle.6324.c.failure: "Наши части не способны к прорыву!"
 tactical_forest_battle.6324.d: "Зарядите свою дезориентированную линию"
 tactical_forest_battle.6324.d.success: "Наш правый фланг врезается в их дезориентированную линию!"
 tactical_forest_battle.6324.d.failure: "Наша атака отбита!"
 tactical_forest_battle.6324.e: "Используйте преимущество и сплотитесь"
 tactical_forest_battle.6324.e.success: "Войска собираются и идут в атаку!"
 tactical_forest_battle.6324.e.failure: "Их линия реорганизуется!"
 tactical_forest_battle.6324.f: "Симулируйте отступление и разверните их левый фланг."
 tactical_forest_battle.6324.f.success: "Они следуют за нашим маневром и попадают в нашу ловушку!"
 tactical_forest_battle.6324.f.failure: "Их линия реорганизуется!"
  
  
 tactical_forest_battle.9420.t: "Враг начинает атаку слева"
 tactical_forest_battle.9420.desc: "[enemy_commander.GetFirstNamePossessive] совершает сильный толчок прямо слева от нас! Наши левые находятся под огромным давлением, и мы должны решить, держаться, усиливать или маневрировать."
 tactical_forest_battle.9420.a: "Сплочение левых"
 tactical_forest_battle.9420.a.success: "Левые поглощают атаку и удерживаются!"
 tactical_forest_battle.9420.a.failure: "Левые не выдерживают давления!"
 tactical_forest_battle.9420.b: "Отправьте центральные резервы для усиления левых"
 tactical_forest_battle.9420.b.success: "Прибывают центральные резервы и стабилизируются левые!"
 tactical_forest_battle.9420.b.failure: "Правые резервы не успевают пополниться!"
 tactical_forest_battle.9420.c: "Отправьте правые резервы для усиления левых."
 tactical_forest_battle.9420.c.success: "Правые резервы прибывают и стабилизируют левые!"
 tactical_forest_battle.9420.c.failure: "Правые резервы не успевают пополниться!"
 tactical_forest_battle.9420.d: "левый бросается в отчаянную атаку"
 tactical_forest_battle.9420.d.success: "Их левые застигнуты врасплох атакой!"
 tactical_forest_battle.9420.d.failure: "Их левый фланг держится и продолжает атаку."
 tactical_forest_battle.9420.e: "Симулируйте отступление на флангах, чтобы заманить противника и атаковать его."
 tactical_forest_battle.9420.e.success: "Враг думает, что мы отступаем, и попадает в нашу ловушку!"
 tactical_forest_battle.9420.e.failure: "Мы не можем оторваться!"
  
 tactical_forest_battle.6325.t: "Центр медленно отступает"
 tactical_forest_battle.6325.desc: "Наш центр отступает под давлением! Мы должны обеспечить, чтобы это отступление оставалось упорядоченным, иначе мы рискуем быть окруженными с фланга и побежденными!"
 tactical_forest_battle.6325.a: "Центр поддерживает дисциплину"
 tactical_forest_battle.6325.a.success: "Центр отступает в полном порядке!"
 tactical_forest_battle.6325.a.failure: "Центр начинает ломаться!"
 tactical_forest_battle.6325.b: "Фланги прикрывают отход"
 tactical_forest_battle.6325.b.success: "Фланги держат и прикрывают отступление!"
 tactical_forest_battle.6325.b.failure: "Фланговая защита не сработала!"
 tactical_forest_battle.6325.c: "Рыцари прикрывают отступление"
 tactical_forest_battle.6325.c.success: "Кони держат линию, а центр отступает!"
 tactical_forest_battle.6325.c.failure: "Рыцари не могут удержаться!"
 tactical_forest_battle.6325.d: "Устроить засаду на пути отступления"
 tactical_forest_battle.6325.d.success: "Засада останавливает преследование врага!"
 tactical_forest_battle.6325.d.failure: "Враг избегает засады!"
 tactical_forest_battle.6325.e: "Сплотиться и удержать новую позицию"
 tactical_forest_battle.6325.e.success: "Новая должность учреждена!"
 tactical_forest_battle.6325.e.failure: "Сильная позиция не найдена!"
 tactical_forest_battle.6325.f: "Позвольте флангам окружить отступающий центр."
 tactical_forest_battle.6325.f.success: "Мы допускаем окружение!"
 tactical_forest_battle.6325.f.failure: "Окружения удалось избежать!"
  
