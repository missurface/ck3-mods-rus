l_russian:
 tactical_forest_battle.9468.t: "Пусковой заряд МАА"
 tactical_forest_battle.9468.desc: "Наши солдаты увидели возможность воспользоваться своим преимуществом! Наши элитные тяжелые войска могут нанести мощный удар по центру противника и потенциально полностью сломать его строй."
 tactical_forest_battle.9468.a: "Преимущество прессы МАА"
 tactical_forest_battle.9468.a.success: "МАА прорывается через линию врага!"
 tactical_forest_battle.9468.a.failure: "Заряд МАА отбит!"
 tactical_forest_battle.9468.b: "Выполните еще один заряд, который трудно сломать."
 tactical_forest_battle.9468.b.success: "Второй заряд разрывает строй противника!"
 tactical_forest_battle.9468.b.failure: "Второй заряд не может добиться прорыва!"
 tactical_forest_battle.9468.c: "Закрепить позицию и удержать позиции"
 tactical_forest_battle.9468.c.success: "МАА занимает отличную позицию!"
 tactical_forest_battle.9468.c.failure: "Консолидация оставляет нас незащищенными!"
 tactical_forest_battle.9468.d: "Выполнить фланговый маневр."
 tactical_forest_battle.9468.d.success: "Фланговый маневр удался блестяще!"
 tactical_forest_battle.9468.d.failure: "Фланговый маневр не развивается!"
 tactical_forest_battle.9468.e: "Поддерживать устойчивый прогресс"
 tactical_forest_battle.9468.e.success: "Неуклонное наступление подавляет сопротивление врага!"
 tactical_forest_battle.9468.e.failure: "Наступление останавливается, преодолевая сопротивление врага!"
  
 tactical_forest_battle.9471.t: "Враг, преследующий наживку"
 tactical_forest_battle.9471.desc: "Наша стратегия будет планировать! Наш ослабленный центр заманивал врага, центр [enemy_commander.GetFirstNamePossessive] медленно выдвигался с позиции, в то время как фланги нашего центра держались крепко. Их центр видит врагов повсюду! Теперь мы можем начать контратаку, чтобы сокрушить их дезорганизованные силы."
 tactical_forest_battle.9471.a: "Запустить внезапный заряд"
 tactical_forest_battle.9471.a.success: "Враг в замешательстве из-за внезапного нападения"
 tactical_forest_battle.9471.a.failure: "Центр Теора держится крепко"
 tactical_forest_battle.9471.b: "Сильный удар с левого фланга нашей центральной линии, чтобы начать окружение."
 tactical_forest_battle.9471.b.success: "Наш натиск пропускает наши силы и позволяет нашим силам отойти от них!"
 tactical_forest_battle.9471.b.failure: "Заряд поглощен!"
 tactical_forest_battle.9471.c: "Сильный удар с правого фланга нашей центральной линии, чтобы начать окружение."
 tactical_forest_battle.9471.c.success: "Наш натиск пропускает наши силы и позволяет нашим силам отойти от них!"
 tactical_forest_battle.9471.c.failure: "Заряд поглощен!"
 tactical_forest_battle.9471.d: "Отправьте наши лучшие подразделения в центр, чтобы удерживать врага на позициях."
 tactical_forest_battle.9471.d.success: "Наш центр стабилизирован, а наши фланги занимают позицию для окружения."
 tactical_forest_battle.9471.d.failure: "Враг мужествует!"
 tactical_forest_battle.9471.e: "Отправьте наших рыцарей для усиления центра, пока наши фланги займут позиции."
 tactical_forest_battle.9471.e.success: "Вражеские атаки исчерпывают себя!"
 tactical_forest_battle.9471.e.failure: "Враг прорывает нашу линию!"
  
  
 tactical_forest_battle.9470.t: "Рыцари запускают атаку"
 tactical_forest_battle.9470.desc: "Наш отряд рыцарей видит возможность атаковать! Поскольку противник несколько дезорганизован, своевременная кавалерийская атака могла подорвать его боевой дух."
 tactical_forest_battle.9470.a: "«Рыцари» прессуют преимущество"
 tactical_forest_battle.9470.a.success: "Атака рыцарей сломила врага!"
 tactical_forest_battle.9470.a.failure: "Рыцари отбиты!"
 tactical_forest_battle.9470.b: "Комбинируйте зарядку с поддержкой MAA"
 tactical_forest_battle.9470.b.success: "Объединенная атака кавалерии и МАА увенчалась успехом!"
 tactical_forest_battle.9470.b.failure: "Комбинированная зарядка не удалась!"
 tactical_forest_battle.9470.c: "Выполнить широкий фланговый маневр."
 tactical_forest_battle.9470.c.success: "Рыцари окружают вражеский фланг!"
 tactical_forest_battle.9470.c.failure: "Фланговый маневр не развивается!"
 tactical_forest_battle.9470.d: "Рыцари защищают центральное отступление"
 tactical_forest_battle.9470.d.success: "Рыцари успешно прикрывают отступление!"
 tactical_forest_battle.9470.d.failure: "Рыцари не могут держать оборону!"
 tactical_forest_battle.9470.e: "Нападайте на врага в гору"
 tactical_forest_battle.9470.e.success: "Заряд в гору все еще прорывается!"
 tactical_forest_battle.9470.e.failure: "Заряд в гору невозможен!"
  
 tactical_forest_battle.7243.t: "Враг поворачивается, чтобы остановить окружение"
 tactical_forest_battle.7243.desc: "[enemy_commander.GetFirstNamePossessive] повернули свои силы лицом к нашим силам, закрывающим их слева, пытаясь прорваться, прежде чем мы сможем их поймать. Мы должны быстро отреагировать на эту новую угрозу."
 tactical_forest_battle.7243.a: "Взвинтите их обратно"
 tactical_forest_battle.7243.a.success: "Мы атакуем их открытые тылы!"
 tactical_forest_battle.7243.a.failure: "Арьергард противника держится!"
 tactical_forest_battle.7243.b: "Зарядите силовую голову"
 tactical_forest_battle.7243.b.success: "Наш левый фланг терпит крах"
 tactical_forest_battle.7243.b.failure: "Левый фланг не может дойти вовремя!"
 tactical_forest_battle.7243.c: "Притворитесь отступающим и начните атаку."
 tactical_forest_battle.7243.c.success: "Их контратака сорвана!"
 tactical_forest_battle.7243.c.failure: "Уловка не может их привлечь!"
 tactical_forest_battle.7243.d: "Наши правильные атаки, чтобы отойти и занять позицию."
 tactical_forest_battle.7243.d.success: "Наш правый фланг прорывается и выходит за их центр."
 tactical_forest_battle.7243.d.failure: "Левый фланг продолжает борьбу!"
 tactical_forest_battle.7243.e: "Ударьте их по центру, пока они поворачиваются"
 tactical_forest_battle.7243.e.success: "Центральная атака наносит удар, пока они дезорганизованы!"
 tactical_forest_battle.7243.e.failure: "Центральная атака не может извлечь выгоду!"
  
 tactical_forest_battle.7244.t: "Враг поворачивается, чтобы остановить окружение"
 tactical_forest_battle.7244.desc: "[enemy_commander.GetFirstNamePossessive] развернул [enemy_commander.GetHerHis] силы лицом к нашим окружающим силам справа, пытаясь прорваться, прежде чем мы сможем их поймать. Мы должны быстро отреагировать на эту новую угрозу."
 tactical_forest_battle.7244.a: "Взвинтите их обратно"
 tactical_forest_battle.7244.a.success: "Мы атакуем их открытые тылы!"
 tactical_forest_battle.7244.a.failure: "Арьергард противника держится!"
 tactical_forest_battle.7244.b: "Зарядите силовую голову"
 tactical_forest_battle.7244.b.success: "Наш правый фланг терпит крах"
 tactical_forest_battle.7244.b.failure: "Правый фланг не может прорваться!"
 tactical_forest_battle.7244.c: "Притворитесь отступающим и начните атаку."
 tactical_forest_battle.7244.c.success: "Их контратака сорвана!"
 tactical_forest_battle.7244.c.failure: "Уловка не может их привлечь!"
 tactical_forest_battle.7244.d: "Наш левый атакует, чтобы отойти и занять позицию."
 tactical_forest_battle.7244.d.success: "Наш левый фланг прорывается и выходит за их центр."
 tactical_forest_battle.7244.d.failure: "Левый фланг продолжает борьбу!"
 tactical_forest_battle.7244.e: "Ударьте их по центру, пока они поворачиваются"
 tactical_forest_battle.7244.e.success: "Центральная атака наносит удар, пока они дезорганизованы!"
 tactical_forest_battle.7244.e.failure: "Центральная атака не может извлечь выгоду!"
  
  
 tactical_forest_battle.2011.t: "Центральный фланг открыт"
 tactical_forest_battle.2011.desc: "Наш центральный фланг теперь открыт, потому что враг не поддался на наш маневр! Они в состоянии нанести сильный удар по нашему уязвимому флангу. Мы должны действовать быстро, чтобы либо усилить, либо изменить позицию."
 tactical_forest_battle.2011.a: "Отправьте наши отряды трещин в армирующий центр."
 tactical_forest_battle.2011.a.success: "Прибывают резервы и укрепляют центр!"
 tactical_forest_battle.2011.a.failure: "Резервы не могут прийти вовремя!"
 tactical_forest_battle.2011.b: "Поверните наши центральные резервы, чтобы сформировать отказывающийся фланг."
 tactical_forest_battle.2011.b.success: "Центральные колеса и формы отказываются от фланга!"
 tactical_forest_battle.2011.b.failure: "Колесо выходит из строя, и мы разоблачены!"
 tactical_forest_battle.2011.c: "Левые повороты и атаковать спину"
 tactical_forest_battle.2011.c.success: "Наш подопечный дезориентирует их атаку!"
 tactical_forest_battle.2011.c.failure: "Они реформируются и поглощают заряд!"
 tactical_forest_battle.2011.d: "Правый фланг атакует, чтобы ослабить давление"
 tactical_forest_battle.2011.d.success: "Атаки правого фланга ослабляют давление!"
 tactical_forest_battle.2011.d.failure: "Правый фланговый заряд не может дойти!"
 tactical_forest_battle.2011.e: "Отправьте наших рыцарей атаковать их фланг."
 tactical_forest_battle.2011.e.success: "Атака рыцарей отбивает атаку!"
 tactical_forest_battle.2011.e.failure: "Враг реформируется и держится!"
  
  
 tactical_forest_battle.7330.t: "Противник начинает атаку по центру"
 tactical_forest_battle.7330.desc: "[enemy_commander.GetFirstNamePossessive] совершает сильный рывок прямо в наш центр! Наш центр находится под огромным давлением, и мы должны решить, держаться, усиливать или маневрировать."
 tactical_forest_battle.7330.a: "Митинг в центре"
 tactical_forest_battle.7330.a.success: "Центр принимает штурм и держится!"
 tactical_forest_battle.7330.a.failure: "Центр не выдерживает давления!"
 tactical_forest_battle.7330.b: "Отправьте левые резервы для усиления центра."
 tactical_forest_battle.7330.b.success: "Прибывают левые резервы и стабилизируют центр!"
 tactical_forest_battle.7330.b.failure: "Левые резервы не успевают пополниться!"
 tactical_forest_battle.7330.c: "Отправьте правые резервы для усиления центра"
 tactical_forest_battle.7330.c.success: "Правые резервы прибывают и стабилизируют центр!"
 tactical_forest_battle.7330.c.failure: "Правые резервы не успевают пополниться!"
 tactical_forest_battle.7330.d: "Центр предпринимает отчаянную атаку"
 tactical_forest_battle.7330.d.success: "Их центр ошарашен атакой!"
 tactical_forest_battle.7330.d.failure: "Их центр держится крепко и прессингует атаку."
 tactical_forest_battle.7330.e: "Симулируйте отступление, чтобы заманить врага и напасть на него."
 tactical_forest_battle.7330.e.success: "Враг думает, что мы отступаем, и попадает в нашу ловушку!"
 tactical_forest_battle.7330.e.failure: "Мы не можем оторваться!"
 tactical_forest_battle.7330.f: "Отступите из центра, чтобы попытаться вывести их из позиции."
 tactical_forest_battle.7330.f.success: "Мы успешно отключаемся и меняем положение!"
 tactical_forest_battle.7330.f.failure: "Мы не можем оторваться!"
  
  
 tactical_forest_battle.9475.t: "Сплотить армию"
 tactical_forest_battle.9475.desc: "Битва достигла критической точки. Наши силы колеблются, но еще не сломлены. Благодаря сильному руководству и смелым действиям мы можем восстановить порядок и изменить ситуацию!"
 tactical_forest_battle.9475.a: "Центр атакует"
 tactical_forest_battle.9475.a.success: "Наша армия слышит призыв и сплачивается!"
 tactical_forest_battle.9475.a.failure: "Армия продолжает колебаться!"
 tactical_forest_battle.9475.b: "Симулируйте отступление, чтобы заманить врага и контратаковать."
 tactical_forest_battle.9475.b.success: "Контратака увенчалась успехом, и боевой дух поднялся!"
 tactical_forest_battle.9475.b.failure: "Контратака провалилась, и боевой дух рушится!"
 tactical_forest_battle.9475.c: "Левый резко атакует правый фланг, чтобы ослабить давление"
 tactical_forest_battle.9475.c.success: "Атака дезориентирует их правый фланг!"
 tactical_forest_battle.9475.c.failure: "Враг остается стойким!"
 tactical_forest_battle.9475.d: "Правый фланг атакует с трудом, чтобы ослабить давление"
 tactical_forest_battle.9475.d.success: "Атака дезориентирует их левый фланг!"
 tactical_forest_battle.9475.d.failure: "Враг остается стойким!"
 tactical_forest_battle.9475.e: "Отправьте рыцарей на подкрепление"
 tactical_forest_battle.9475.e.success: "Прибывают резервы и укрепляют строй!"
 tactical_forest_battle.9475.e.failure: "Резервы слишком разбросаны, чтобы помочь!"
 tactical_forest_battle.9475.f: "Отправьте элитные отряды для подкрепления"
 tactical_forest_battle.9475.f.success: "Наши лучшие отряды сеют хаос среди врага!"
 tactical_forest_battle.9475.f.failure: "Наши подразделения по борьбе с наркотиками перегружены!"
  
  
 tactical_forest_battle.6321.desc: "[enemy_commander.GetFirstNamePossessive] сил преследуют наши войска! Мы можем использовать наших рыцарей, чтобы развернуться и атаковать преследователей, сорвав их продвижение."
 tactical_forest_battle.6321.a: "Отправьте рыцарей в затопленный провал"
 tactical_forest_battle.6321.a.success: "Наши рыцари затопляют брешь и добираются!"
 tactical_forest_battle.6321.a.failure: "Правый фланг не может использовать брешь!"
 tactical_forest_battle.6321.b: "Отправить полк МАА на подкрепление"
 tactical_forest_battle.6321.b.success: "МАА успешно укрепляет свои позиции!"
 tactical_forest_battle.6321.b.failure: "МАА не может добраться вовремя!"
 tactical_forest_battle.6321.c: "Рыцари поворачиваются и атакуют"
 tactical_forest_battle.6321.c.success: "Рыцарский натиск прерывает погоню!"
 tactical_forest_battle.6321.c.failure: "Рыцари атакуют слишком медленно!"
 tactical_forest_battle.6321.d: "Центр митингует в поддержку"
 tactical_forest_battle.6321.d.success: "Митинг центра усиливает защиту!"
 tactical_forest_battle.6321.d.failure: "Центр не может вовремя сплотиться!"
 tactical_forest_battle.6321.e: "Устроить засаду преследователям"
 tactical_forest_battle.6321.e.success: "Засада останавливает преследование!"
 tactical_forest_battle.6321.e.failure: "Враги избегают засады!"
 tactical_forest_battle.6321.f: "Вдохновить войска на контратаку"
 tactical_forest_battle.6321.f.success: "Войска яростно контратакуют!"
 tactical_forest_battle.6321.f.failure: "Моральный дух падает, и разгром продолжается!"
  
 tactical_forest_battle.6322.t: "Отрывайтесь слева, чтобы атаковать преследующих врагов."
 tactical_forest_battle.6322.desc: "Вражеские силы преследуют наш левый фланг! Мы можем отрывать отряды, чтобы развернуться и нанести удар по преследователям, лишив их импульса."
 tactical_forest_battle.6322.a: "Левый отряд нападает на преследователей"
 tactical_forest_battle.6322.a.success: "Заряды отряда врезаются в преследователей!"
 tactical_forest_battle.6322.a.failure: "Отстраненность отрезана!"
 tactical_forest_battle.6322.b: "Рыцари прикрывают левый фланг"
 tactical_forest_battle.6322.b.success: "Рыцари сдерживают погоню!"
 tactical_forest_battle.6322.b.failure: "Рыцари в шоке!"
 tactical_forest_battle.6322.c: "Отправьте МАА на подкрепление слева."
 tactical_forest_battle.6322.c.success: "Подкрепления МАА укрепляются слева!"
 tactical_forest_battle.6322.c.failure: "МАА не может вовремя добраться налево!"
 tactical_forest_battle.6322.d: "Центральные повороты, чтобы помочь левому"
 tactical_forest_battle.6322.d.success: "Центр помогает левому против преследователей!"
 tactical_forest_battle.6322.d.failure: "Центр не может поворачиваться во времени!"
 tactical_forest_battle.6322.e: "Сплотить защитников левого фланга"
 tactical_forest_battle.6322.e.success: "Левофланговые митинги и контратаки!"
 tactical_forest_battle.6322.e.failure: "Левый фланг разгромлен, несмотря на митинг!"
 tactical_forest_battle.6322.f: "Притворитесь отступающим, чтобы поставить ловушку"
 tactical_forest_battle.6322.f.success: "Преследователи попадают в нашу ловушку!"
 tactical_forest_battle.6322.f.failure: "Враг избегает ловушки!"
  
 tactical_forest_battle.6323.t: "Поверните центр, чтобы атаковать преследующих врагов"
 tactical_forest_battle.6323.desc: "[enemy_commander.GetFirstNamePossessive] преследует наш центр! Мы можем повернуть наши центральные силы, чтобы встретиться с ними лицом к лицу и остановить их наступление."
 tactical_forest_battle.6323.a: "Центр развернулся лицом к преследователям"
 tactical_forest_battle.6323.a.success: "Центр решительно встречает преследователей!"
 tactical_forest_battle.6323.a.failure: "Центральный поворот нескоординирован!"
 tactical_forest_battle.6323.b: "Фланги атакуют фланги противника, а центр обращен к ним."
 tactical_forest_battle.6323.b.success: "Атака клещей прерывает преследование!"
 tactical_forest_battle.6323.b.failure: "Фланговые атаки не развиваются!"
 tactical_forest_battle.6323.c: "Отправьте всех рыцарей в контратаку"
 tactical_forest_battle.6323.c.success: "Контратака рыцаря разбивает преследователей!"
 tactical_forest_battle.6323.c.failure: "Контратака рыцаря провалилась!"
 tactical_forest_battle.6323.d: "Центр сбора и продвижение"
 tactical_forest_battle.6323.d.success: "Центровые митинги и контратаки!"
 tactical_forest_battle.6323.d.failure: "Центр не может сплотиться!"
 tactical_forest_battle.6323.e: "МАА образует защитную стену"
 tactical_forest_battle.6323.e.success: "Стена МАА прекращает преследование!"
 tactical_forest_battle.6323.e.failure: "Стена МАА прорвана!"
 tactical_forest_battle.6323.f: "Разрешить преследование в ловушку"
