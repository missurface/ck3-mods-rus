 tactical_forest_battle.9453.t: "Правый окружает"
 tactical_forest_battle.9453.desc: "Мы успешно окружили правый фланг [enemy_commander.GetFirstNamePossessive]! Они в ловушке и им грозит уничтожение. Мы должны нанести смертельный удар!"
 tactical_forest_battle.9453.a: "Начать резню окруженных войск"
 tactical_forest_battle.9453.a.success: "Окруженные войска уничтожены!"
 tactical_forest_battle.9453.a.failure: "Окруженные войска прорываются!"
 tactical_forest_battle.9453.b: "Возьмите пленных"
 tactical_forest_battle.9453.b.success: "Мы захватываем много пленных!"
 tactical_forest_battle.9453.b.failure: "Заключенные убегают!"
  
 tactical_forest_battle.9473.t: "Ралли Армия"
 tactical_forest_battle.9473.desc: "Битва продолжается! Нашим силам нужно вдохновение, чтобы преодолеть ожесточенное сопротивление врага!"
 tactical_forest_battle.9473.a: "Призыв к решающему удару"
 tactical_forest_battle.9473.a.success: "Армия наносит решающий удар!"
 tactical_forest_battle.9473.a.failure: "Удар не состоялся!"
 tactical_forest_battle.9473.b: "Измените положение для лучшего грунта"
 tactical_forest_battle.9473.b.success: "Силы перемещаются на лучшую позицию!"
 tactical_forest_battle.9473.b.failure: "Перепозиционирование не удалось!"
 tactical_forest_battle.9473.c: "Отправьте резервное подкрепление"
 tactical_forest_battle.9473.c.success: "Резервы укрепляют линию!"
 tactical_forest_battle.9473.c.failure: "Резервы задерживаются!"
 tactical_forest_battle.9473.d: "Ведущая атака на центр противника"
 tactical_forest_battle.9473.d.success: "Атака по центру удалась!"
 tactical_forest_battle.9473.d.failure: "Заряд отбит!"
  
 tactical_forest_battle.7220.t: "Левый начинает окружать"
 tactical_forest_battle.7220.desc: "Наш левый фланг начал обход противника! Если мы сможем завершить окружение, мы сможем поймать и уничтожить их!"
 tactical_forest_battle.7220.a: "Завершить окружение"
 tactical_forest_battle.7220.a.success: "Завершаем окружение!"
 tactical_forest_battle.7220.a.failure: "Враг вырывается!"
 tactical_forest_battle.7220.b: "Отправьте наших рыцарей, чтобы они удерживали позиции."
 tactical_forest_battle.7220.b.success: "Наши рыцари удерживают врага на месте!"
 tactical_forest_battle.7220.b.failure: "Враг прорывается!"
 tactical_forest_battle.7220.c: "Отправьте наши лучшие отряды, чтобы удержать врага на месте!"
 tactical_forest_battle.7220.c.success: "Враг не может выйти из боя!"
 tactical_forest_battle.7220.c.failure: "Враг вырывается из окружения!"
 tactical_forest_battle.7220.d: "Остановите их в центре, пока левая окружает"
 tactical_forest_battle.7220.d.success: "Враг не может отступить!"
 tactical_forest_battle.7220.d.failure: "Враг вырывается из ловушки!"
 tactical_forest_battle.7220.e: "Соберите войска, чтобы удерживать оборону, пока подразделения окружают"
 tactical_forest_battle.7220.e.success: "Враг не может отступить!"
 tactical_forest_battle.7220.e.failure: "Враг вырывается из ловушки!"
  
  
