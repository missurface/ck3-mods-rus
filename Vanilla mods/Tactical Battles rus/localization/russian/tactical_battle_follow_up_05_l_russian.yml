 tactical_forest_battle.7221.b.success: "Наши рыцари удерживают врага на месте!"
 tactical_forest_battle.7221.b.failure: "Враг прорывается!"
 tactical_forest_battle.7221.c: "Отправьте наши лучшие отряды, чтобы удержать врага на месте!"
 tactical_forest_battle.7221.c.success: "Враг не может выйти из боя!"
 tactical_forest_battle.7221.c.failure: "Враг вырывается из окружения!"
