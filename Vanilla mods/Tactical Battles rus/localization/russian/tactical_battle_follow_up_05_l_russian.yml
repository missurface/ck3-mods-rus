 tactical_forest_battle.9251.desc: "[enemy_commander.GetFirstNamePossessive] армия отступает! У нас есть прекрасная возможность преследовать и уничтожить их, прежде чем они смогут перегруппироваться!"
 tactical_forest_battle.9251.t: "Их центр в хаосе"
 tactical_forest_battle.9251.a: "Поверните на их правый фланг"
 tactical_forest_battle.9251.a.success: "Мы разворачиваемся и атакуем их правый фланг!"
 tactical_forest_battle.9251.a.failure: "Организаторы отвечают за наше обвинение!"
 tactical_forest_battle.9251.b: "Захват пленных"
 tactical_forest_battle.9251.b.success: "Мы захватываем много пленных!"
 tactical_forest_battle.9251.b.failure: "Заключенные убегают!"
 tactical_forest_battle.9251.c: "Отправьте рыцарей врезаться в их правый фланг."
 tactical_forest_battle.9251.c.success: "Атака рыцарей вызывает хаос"
 tactical_forest_battle.9251.c.failure: "Рыцарский заряд поглощен"
 tactical_forest_battle.9251.d: "Отправьте наши элитные отряды врезаться в их правый фланг."
 tactical_forest_battle.9251.d.success: "Наши лучшие подразделения сеют хаос на их правом фланге!"
 tactical_forest_battle.9251.d.failure: "Враг держится!!"
  
  
