 tactical_forest_battle.7221.d.failure: "Враг вырывается из ловушки!"
  
  
  
 tactical_forest_battle.6310.t: "Ловушка захлопнулась!"
 tactical_forest_battle.6310.desc: "[right_flank_commander.GetTitledFirstNamePossessive] финт сработал отлично! [enemy_commander.GetFirstNamePossessive] команды удерживать были заглушены, а [enemy_commander.GetHerHis] авангард сломал строй, чтобы проглотить наживку. Левая часть их линии теперь растянута и дезорганизована."
 tactical_forest_battle.6310.a: "[right_flank_commander.GetTitledFirstName] ведет дезорганизованную армию в ловушку наших первоклассных отрядов"
 tactical_forest_battle.6310.a.success: "[enemy_commander.GetFirstNamePossessive] правая сторона следует за [right_flank_commander.GetFirstNamePossessive] бегущими силами прямо в засаду!"
 tactical_forest_battle.6310.a.failure: "Правые не клюют на удочку!"
 tactical_forest_battle.6310.b: "Отправьте рыцарей сокрушить их чрезмерно растянутый фланг."
 tactical_forest_battle.6310.b.success: "Рыцари врезаются в незащищенный фланг врага, разрывая его строй!"
 tactical_forest_battle.6310.b.failure: "Враг быстро перестраивается и атакует наших рыцарей."
 tactical_forest_battle.6310.c: "Оторвите силы с фланга [left_flank_commander.GetTitledFirstNamePossessive], чтобы окружить заманенные отряды."
 tactical_forest_battle.6310.c.success: "[right_flank_commander.GetTitledFirstName] успешно окружает отряды противника, отрезая им путь к отступлению!"
 tactical_forest_battle.6310.c.failure: "Противник ведет разрушительную атаку на наш истощенный правый фланг."
 tactical_forest_battle.6310.d: "Поверните [center_flank_commander.GetFirstNamePossessive] резервов, чтобы окружить заманенные отряды."
 tactical_forest_battle.6310.d.success: "Резервы движутся быстро и готовы окружить"
 tactical_forest_battle.6310.d.failure: "[enemy_commander.GetFirstNamePossessive] узнает наш истощенный центр!"
 tactical_forest_battle.6310.e: "Поворачивайте и убивайте приманенные отряды с полным зарядом"
 tactical_forest_battle.6310.e.success: "Полный заряд застает врага врасплох!"
 tactical_forest_battle.6310.e.failure: "Враг остается стойким и отражает нашу атаку!"
  
  
 tactical_forest_battle.7320.t: "Враг крепко стоит за нашими позициями"
 tactical_forest_battle.7320.desc: "[enemy_commander.GetFirstNamePossessive] сил сплотились и реорганизовали свою линию позади нашей. Теперь они окопались глубже, повернувшись спиной к нашим позициям, и их строй усилился. Мы должны решить, продолжать ли давить на них или изменить нашу тактику."
 tactical_forest_battle.7320.a: "Отправьте атаку нашими элитными отрядами, чтобы атаковать их фланг."
 tactical_forest_battle.7320.a.success: "Наши лучшие подразделения застают их врасплох и прорываются через их позиции!"
 tactical_forest_battle.7320.a.failure: "Нашим лучшим подразделениям не под силу прорвать их прочную оборону!"
 tactical_forest_battle.7320.b: "Отправьте рыцарей атаковать их фланг."
 tactical_forest_battle.7320.b.failure: "Рыцари перехвачены резервами противника!"
 tactical_forest_battle.7320.c: "Вырвите центральные резервы, чтобы разбить их тыл"
 tactical_forest_battle.7320.c.success: "Наши центральные резервы врываются в их тыл, вызывая хаос!"
 tactical_forest_battle.7320.c.failure: "Наши центральные резервы не могут выйти из боя из-за внезапного толчка!"
 tactical_forest_battle.7320.d: "Оторвите правые резервы, чтобы разбить им тылы"
 tactical_forest_battle.7320.d.success: "Наши центральные резервы врываются в их тыл, вызывая хаос!"
 tactical_forest_battle.7320.d.failure: "Наши центральные резервы не могут выйти из боя из-за внезапного толчка!"
 tactical_forest_battle.7320.e: "Симулируйте отступление и нападите на преследователей."
 tactical_forest_battle.7320.e.success: "Враг попадается на наш обман и преследует неожиданный удар!"
 tactical_forest_battle.7320.e.failure: "Враг отступает к нашему незащищенному центру!"
  
