l_russian:
  
  
 game_concept_captain_trait_concept: "Капитан Трейт"
 game_concept_captain_trait_concept_desc: "Черты капитана — это черты, данные людям, набранным из отряда латников. Во время боя при использовании варианта с участием вооруженных людей в случае успеха есть шанс после боя нанять командира с особой чертой капитана. Эти черты дают вашей армии различные бонусы во время сражений.\n\n Примеры: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]."
 game_concept_player_title_concept: "игрок"
 game_concept_player_title_concept_desc: "Черты капитана — это черты, данные людям, набранным из отряда латников. Во время боя при использовании варианта с участием вооруженных людей в случае успеха есть шанс после боя нанять командира с особой чертой капитана. Эти черты дают вашей армии различные бонусы во время сражений.\n\n Примеры: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]."
  
 tactical_forest_battle.0498.t: "Знаменитый солдат"
 tactical_forest_battle.0498.desc: "Получив отчет о нашем недавнем бою, мои офицеры сообщили мне, что один из наших солдат из элитного полка [chosen_unit.GetName] превосходно показал себя в гуще боя. Взяв [commander.GetHerHim] на службу, я мог бы вдохновить других мужчин."
 tactical_forest_battle.0498.a: "Примите [commander.GetName] к себе на службу. ([commander.GetFirstName] получает [captain_trait_concept|e])"
 tactical_forest_battle.0498.b: "Я подумаю об этом."
  
