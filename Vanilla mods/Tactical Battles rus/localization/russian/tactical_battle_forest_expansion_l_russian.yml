 tbat_soldier_black_armor_cavalry_desc: "Этот солдат был повышен в элитном подразделении кавалерии Черных доспехов после того, как сыграл важную роль в успехе полка в бою. Их присутствие в бою вдохновляет окружающих на большие боевые подвиги."
