 trait_tbat_soldier_armored_infantry_character_desc : "[ROOT.Char.GetFullNameNicknamedOrMe] was promoted from an elite unit of Armored Infantry after proving instrumental of a regiment's success in battle. Their presence in battle inspires those around them to greater feats of arms."  <"[ROOT.Char.GetFullNameNicknamedOrMe] был повышен в элитном подразделении бронетанковой пехоты после того, как сыграл важную роль в успехе полка в бою. Их присутствие в бою вдохновляет окружающих на большие боевые подвиги.">  #NT!
 trait_tbat_soldier_varangian: "Варяжский солдат"
 tbat_soldier_varangian_desc: "Этот солдат был повышен в звании из элитного отряда варягов после того, как сыграл важную роль в успехе полка в бою. Их присутствие в бою вдохновляет окружающих на большие боевые подвиги."
 trait_tbat_soldier_varangian_character_desc: "[ROOT.Char.GetFullNameNicknamedOrMe] был повышен в элитном подразделении варягов после того, как сыграл важную роль в успехе полка в бою. Их присутствие в бою вдохновляет окружающих на большие боевые подвиги."
 trait_tbat_soldier_light_infantry: "Легкий пехотный солдат"
 tbat_soldier_light_infantry_desc: "Этот солдат был повышен в должности из элитного отделения легкой пехоты после того, как сыграл важную роль в успехе полка в бою. Их присутствие в бою вдохновляет окружающих на большие боевые подвиги."
 trait_tbat_soldier_light_infantry_character_desc: "[ROOT.Char.GetFullNameNicknamedOrMe] был повышен в элитном подразделении легкой пехоты после того, как сыграл важную роль в успехе полка в бою. Их присутствие в бою вдохновляет окружающих на большие боевые подвиги."
