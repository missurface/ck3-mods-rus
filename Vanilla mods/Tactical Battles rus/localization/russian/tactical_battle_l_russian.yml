 # EVENT 9476 - Rally Army 
 tactical_forest_battle.9476.t: "Сплотить армию"
 tactical_forest_battle.9476.desc: "Бой на правом фланге достиг критической точки. Наши силы колеблются, но еще не сломлены. Благодаря сильному руководству и смелым действиям мы можем восстановить порядок и изменить ситуацию!"
 tactical_forest_battle.9476.a: "Правый прессингует атаку"
 tactical_forest_battle.9476.a.success: "Наша армия слышит призыв и сплачивается!"
 tactical_forest_battle.9476.a.failure: "Армия продолжает колебаться!"
 tactical_forest_battle.9476.b: "Симулируйте отступление, чтобы заманить врага и контратаковать."
 tactical_forest_battle.9476.b.success: "Контратака увенчалась успехом, и боевой дух поднялся!"
 tactical_forest_battle.9476.b.failure: "Контратака провалилась, и боевой дух рушится!"
 tactical_forest_battle.9476.c: "Центровые сборы с трудом ослабляют давление"
