 # Event 0210 - Cavalry Feint FAILURE Follow-up: Feint Unmasked 
 tactical_forest_battle.0210.t: "Финт разоблачен!"
 tactical_forest_battle.0210.desc: "[enemy_commander.GetTitledFirstName] раскусил наш кавалерийский финт! Их войска сохраняли дисциплину, а не преследовали, и теперь наши всадники сталкиваются с подготовленной пехотой, залпами ракет или контр-кавалерией, ожидающей в засаде. Тактическая ситуация обернулась против нас — я должен решить, как спасти эту катастрофу."
 tactical_forest_battle.0210.a: "Прорвитесь через ловушку! Заряжайте всем! (Боевое + Доблесть против [enemy_commander.GetShortUINameNoTooltip], очень рискованно)"
 tactical_forest_battle.0210.a.success: "Несмотря ни на что, наша явная смелость разрушает их строй! Враг отшатнулся от нашей отчаянной атаки!"
 tactical_forest_battle.0210.a.failure: "Атака превращается в катастрофическое бегство. Наша кавалерия рассеяна и разбита!"
 tactical_forest_battle.0210.b: "Спешитесь и держите строй! (Требуется поддержка пехоты)"
 tactical_forest_battle.0210.c: "Прикройте отступление кавалерией. (Пожертвуйте кавалерией, чтобы спасти армию)"
 tactical_forest_battle.0210.d: "Сплотите колеблющегося коня под личным руководством! (Требуется «Храбрый», «Вдохновляющий лидер» или «Воинственный» 14+)"
 tactical_forest_battle.0210.d.success: "Мое руководство поддерживает кавалерию! Они реформируются и готовятся сражаться дальше!"
 tactical_forest_battle.0210.d.failure: "Кавалерия отказывается объединяться. Моральный дух продолжает рушиться."
  
  
  
 # Event 0120 - Infantry Ambush SUCCESS Follow-up: Kill Zone in the Woods 
 tactical_forest_battle.0120.t: "Зона убийства в лесу!"
 tactical_forest_battle.0120.desc: "Вражеская колонна подошла прямо к нашим замаскированным пехотным и ракетным войскам! Видимость в лесу плохая, их соединения растянуты, а в их командной структуре царит хаос. Войска [enemy_commander.GetTitledFirstName] оказались на идеальном поле боя. Как мы воспользуемся этой возможностью?"
 tactical_forest_battle.0120.a: "Закройте пасть ловушки! Запечатайте их спереди и сзади!"
 tactical_forest_battle.0120.b: "Пусть говорят стрелы и копья. Держите нашу пехоту в укрытии. (Требуются лучники/застрельщики)"
 tactical_forest_battle.0120.b.success: "Наш ракетный обстрел опустошает их незащищенную колонну!"
 tactical_forest_battle.0120.b.failure: "Их щиты и броня ограничивают эффективность нашего обстрела."
 tactical_forest_battle.0120.c: "Ударьте первыми офицеров — цельтесь в знамена и командиров!"
 tactical_forest_battle.0120.c.success: "Наши ударные группы устраняют ключевых офицеров! Их командование разваливается!"
 tactical_forest_battle.0120.c.failure: "Ударные группы изолированы и несут тяжелые потери!"
 tactical_forest_battle.0120.d: "Оставьте их истекать кровью, а затем исчезните обратно в лес."
  
  
 # Event 0220 - Infantry Ambush FAILURE Follow-up: Ambush Detected 
 tactical_forest_battle.0220.t: "Засада обнаружена!"
 tactical_forest_battle.0220.desc: "[enemy_commander.GetTitledFirstName] разглядел нашу засаду! Их разведчики обнаружили наши замаскированные позиции, и их силы адаптировались прежде, чем мы успели захлопнуть ловушку. Наши рассредоточенные пехотные подразделения оказались незащищенными в [battle_location.GetName], не имея скоординированного преимущества. Я должен решить, как спасти эту тактическую катастрофу."
 tactical_forest_battle.0220.a: "Отступайте и укрепляйте оборонительные позиции! Перегруппируйтесь в опорные пункты."
 tactical_forest_battle.0220.b: "Меняйте строй и контратакуйте под давлением противника! (Боевой 11+, высокий риск)"
 tactical_forest_battle.0220.b.success: "Наша неожиданная агрессия застает врага врасплох! Их строй ломается!"
 tactical_forest_battle.0220.b.failure: "Контратака еще больше подвергает нашу пехоту опасности. Катастрофа!"
 tactical_forest_battle.0220.c: "Используйте лес, чтобы рассредоточить отряды и реформироваться в другом месте. (Управление 10+)"
 tactical_forest_battle.0220.c.success: "Наши подразделения ускользают через деревья и благополучно перегруппировываются!"
 tactical_forest_battle.0220.c.failure: "Разрозненные подразделения не могут реформироваться. Они остаются дезорганизованными и уязвимыми."
 tactical_forest_battle.0220.d: "Держитесь и боритесь с давлением! Примите тяжелые потери."
  
 # Event 0130 - Levy Braced SUCCESS Follow-up: Spears and Trees 
 tactical_forest_battle.0130.t: "Копья и деревья!"
 tactical_forest_battle.0130.desc: "Копье ополчения держится как камень! Сам лес становится крепостью, когда наши солдаты садятся между деревьями. Силы [enemy_commander.GetTitledFirstName] врезаются в наш ощетинившийся строй и колеблются. Теперь настал момент воспользоваться нашим преимуществом — как нам использовать их слабость?"
 tactical_forest_battle.0130.a: "Держите леску и заточите их. Пусть истощение работает на нас."
 tactical_forest_battle.0130.b: "Нанесите внезапный удар через их центр! (Обучение + Боевой 9+, умеренный риск)"
 tactical_forest_battle.0130.b.success: "Внезапный толчок ломает их решимость! Вражеский строй рушится!"
 tactical_forest_battle.0130.b.failure: "Тяга замедляется, но веревка держится. Они отказываются ломаться."
 tactical_forest_battle.0130.c: "Пусть лучники убьют их на поле смерти. (Требуется лучник МаА)"
 tactical_forest_battle.0130.c.success: "Разрушительные залпы обрушиваются! Поле смерти требует сотен людей!"
 tactical_forest_battle.0130.c.failure: "У лучников кончаются стрелы, и они теряют преимущество."
 tactical_forest_battle.0130.d: "Сформируйте наковальню, чтобы разбить их заряд! (Сосредоточьтесь на прочности)"
  
 # Event 0230 - Levy Scattered FAILURE Follow-up: Formation Broken 
 tactical_forest_battle.0230.t: "Формирование нарушено!"
 tactical_forest_battle.0230.desc: "Наемники в панике разбегаются! Вместо того, чтобы образовать ощетинившуюся стену копий, солдаты рассредоточились между деревьями, не имея возможности координировать свои действия или удерживать строй. [enemy_commander.GetTitledFirstName] видит слабость и использует ее. Построение нарушено — я должен действовать быстро, чтобы спасти эту катастрофу."
 tactical_forest_battle.0230.a: "Сплотите их личным примером! Веди с фронта! (Доблесть 10+, Боевое 9+)"
 tactical_forest_battle.0230.a.success: "Моя личная доблесть сплачивает солдат! Они реформируются и закаляют себя!"
 tactical_forest_battle.0230.a.failure: "Солдаты по-прежнему напуганы и рассеяны. Моральный дух не восстанавливается."
 tactical_forest_battle.0230.b: "Поручите своим элитным рыцарям укрепить линию обороны. (Требуется 2+ рыцаря)"
 tactical_forest_battle.0230.c: "Переставьте разбросанные отряды на лучшую местность. (Управление 9+)"
 tactical_forest_battle.0230.c.success: "Разрозненные рекруты собираются и перебрасываются на более прочную почву!"
 tactical_forest_battle.0230.c.failure: "Попытка изменения положения не удалась. Отряды становятся еще более разрозненными!"
 tactical_forest_battle.0230.d: "Вместо этого сосредоточьтесь на снижении боевого духа врага. (Интрига 8+, психологическая война)"
  
  
 # Event 0140 - Knights in Reserve SUCCESS Follow-up: Knights Ready 
 tactical_forest_battle.0140.t: "Рыцари готовы!"
 tactical_forest_battle.0140.desc: "Рыцари ждут в полной готовности, скрытые от глаз врага. Войска [enemy_commander.GetTitledFirstName] занимают свои текущие позиции, не подозревая о нашем кавалерийском резерве, ожидающем удара. Настал момент дать им волю – как нам использовать их разрушительный потенциал?"
 tactical_forest_battle.0140.a: "Удар молота — сокрушительная кавалерийская атака! (Удалить 11+, очень высокий риск/награда)"
 tactical_forest_battle.0140.a.success: "Заряд выполнен безупречно! Наши рыцари разбивают вражеский строй, как стекло!"
 tactical_forest_battle.0140.a.failure: "Атака слишком расширяется, и рыцари оказываются изолированными!"
 tactical_forest_battle.0140.b: "Фланговый маневр – кружить вокруг противника! (Боевой 10+)"
 tactical_forest_battle.0140.b.success: "Фланговый маневр удался! Враг застигнут врасплох сзади!"
 tactical_forest_battle.0140.b.failure: "Маневр блокируется до того, как он сможет развиться!"
 tactical_forest_battle.0140.c: "Преследование — извлекайте выгоду из отступающих подразделений! (Интрига 9+)"
 tactical_forest_battle.0140.c.success: "Преследование разгромило врага! Они не могут реорганизоваться!"
 tactical_forest_battle.0140.c.failure: "Преследование заблокировано, и наша кавалерия несет потери."
 tactical_forest_battle.0140.d: "Дисциплинированный отход — используйте рыцарей для прикрытия отступления. (Управление 9+)"
  
 martial_positive: "Тактическое преимущество"
 martial_negative: "Тактическое преимущество"
  
 frontline_commander: "Командир передовой"
 frontline_commander_desc: "Этот персонаж возглавляет войска в гуще битвы, вдохновляя их на еще более доблестные и эффективные подвиги."
 tactical_commander: "Тактический командир"
  
 # ============================================ 
 # EVENT 2010 - Left Flank Tactics 
 # ============================================ 
 tactical_forest_battle.2010.t: "После финта"
 tactical_forest_battle.2010.desc: "Наш маневр на правом фланге привлек внимание противника, сделав его левый фланг уязвимым. Мы должны решить, как лучше всего использовать эту возможность, прежде чем они смогут отреагировать и подкрепиться."
  
 tactical_forest_battle.2010.a: "Повернитесь и убейте преследующего врага"
 tactical_forest_battle.2010.a.success: "Левый фланг неожиданно нападает на преследователей"
 tactical_forest_battle.2010.a.failure: "[enemy_commander.GetFirstNamePossessive] правый фланг стойко выдерживает наш внезапный натиск"
  
 tactical_forest_battle.2010.b: "Выманить в засаду наши элитные полки"
 tactical_forest_battle.2010.b.success: "Их правый фланг заведён в ловушку!"
 tactical_forest_battle.2010.b.failure: "Их право поддерживает дисциплину и отказывается следовать финту."
  
 tactical_forest_battle.2010.c: "Ротация правых резервов, чтобы попытаться окружить правый фланг, находящийся вне позиции."
 tactical_forest_battle.2010.c.success: "Наши силы отрываются и готовы окружить врага!"
 tactical_forest_battle.2010.c.failure: "Прибывающие окружающие силы встречают лицом к лицу."
  
 tactical_forest_battle.2010.d: "Ротация центральных резервов, чтобы попытаться окружить правый фланг, находящийся вне позиции."
 tactical_forest_battle.2010.d.success: "Наши силы отрываются и готовы окружить врага!"
 tactical_forest_battle.2010.d.failure: "Прибывающие войска окружения встречаются лицом к лицу."
  
 tactical_forest_battle.2010.e: "Нажмите на преимущество"
 tactical_forest_battle.2010.e.success: "Мы пользуемся преимуществом вне позиции врага!"
 tactical_forest_battle.2010.e.failure: "Враг получает подкрепление прежде, чем мы сможем использовать его позицию."
  
 # ============================================ 
 # EVENT 2012 - Knights Break Left Flank 
 # ============================================ 
 tactical_forest_battle.2012.t: "Рыцари прорываются сквозь правую сторону"
 tactical_forest_battle.2012.desc: "Наши кони прорвали правый фланг [enemy_commander.GetFirstNameNicknamedPossessiveOrMyRegnal] из позиции, приведя его в замешательство. Если мы продолжим атаку сейчас, мы сможем включить незащищенный центр и сокрушить их, прежде чем они смогут восстановиться."
  
 tactical_forest_battle.2012.a: "Левый фланг закрывает брешь"
 tactical_forest_battle.2012.a.success: "[left_flank_commander.GetFullNameNicknamedPossessiveOrMy] фланг прорывает разбитый строй противника!"
 tactical_forest_battle.2012.a.failure: "Противник быстро стабилизируется и предотвращает дальнейшее проникновение!"
  
 tactical_forest_battle.2012.b: "Отправьте наши элитные полки нарушить их право"
 tactical_forest_battle.2012.b.success: "Наши элитные полки прорывают врага верно!"
 tactical_forest_battle.2012.b.failure: "Их право сплачивается и сопротивляется обвинению!"
  
 tactical_forest_battle.2012.c: "Левый фланг сильно атакует, чтобы прорвать правый фланг."
 tactical_forest_battle.2012.c.success: "[left_flank_commander.GetFullNameNicknamedPossessiveOrMy] фланг прорывает их правый фланг"
 tactical_forest_battle.2012.c.failure: "Их право сплачивается и сопротивляется обвинению!"
  
 tactical_forest_battle.2012.d: "Нажмите на преимущество"
 tactical_forest_battle.2012.d.success: "[left_flank_commander.GetFullNameNicknamedOrMe] продолжает прессинговать правый фланг!"
 tactical_forest_battle.2012.d.failure: "Право усиливается до того, как мы сможем воспользоваться брешью!"
  
 tactical_forest_battle.2012.f: "Ротация центральных резервов, чтобы сокрушить оставшийся правый фланг."
 tactical_forest_battle.2012.f.success: "Центральные резервы вращаются и сокрушают оставшийся правый фланг!"
 tactical_forest_battle.2012.f.failure: "Резервы не могут выйти из боя после натиска из центра!"
  
  
  
