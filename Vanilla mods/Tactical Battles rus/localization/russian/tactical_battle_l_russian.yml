 tactical_forest_battle.0061.t: "Судьба [sc_loser.GetFullNameNicknamed]"
 tactical_forest_battle.0061.desc: "От моего последнего удара [sc_loser.GetFirstName] падает на одно колено, окровавленный и избитый. Пока вокруг меня бушует поле битвы, на меня смотрят [sc_loser.GetTitledFirstNamePossessive] глаза, наполненные смесью неповиновения и смирения. Пришло время решить [sc_loser.GetHerHis] судьбу."
 tactical_forest_battle.0061.a: "Убить [sc_loser.GetFirstName]"
 tactical_forest_battle.0061.a.success: "[sc_loser.GetFirstName] встречает [sc_loser.GetHerHis] конец на поле битвы."
 tactical_forest_battle.0061.b: "Захватить [sc_loser.GetFirstName]"
 tactical_forest_battle.0061.b.success: "[sc_loser.GetFirstName] взят в плен."
 tactical_forest_battle.0061.c: "Возьмите [sc_loser.GetFirstNamePossessive] глаз и отпустите судьбу от [sc_loser.GetHerHim] до [sc_loser.GetHerHis]."
 tactical_forest_battle.0061.c.success: "Ослепление [sc_loser.GetFirstName] гарантирует выживание [sc_loser.GetHerHis], но дорогой ценой."
 tactical_forest_battle.0061.d: "Оставь [sc_loser.GetFirstName] навсегда покрытым шрамами и отпусти судьбу от [sc_loser.GetHerHim] до [sc_loser.GetHerHis]."
 tactical_forest_battle.0061.d.success: "Шрамы будут служить постоянным напоминанием о поражении [sc_loser.GetFirstNamePossessive]."
 tactical_forest_battle.0061.e: "Искалечить [sc_loser.GetFirstName] и освободить судьбу от [sc_loser.GetHerHim] до [sc_loser.GetHerHis]."
 tactical_forest_battle.0061.e.success: "[sc_loser.GetFirstName] будет нести бремя [sc_loser.GetHerHis] травм до конца [sc_loser.GetHerHis] жизни."
  
  
 # Event 0005 - First tactical decision (Forest) 
 tactical_forest_battle.0005.t: "Битва в [battle_location.GetProvince.GetTerrain.GetName|l] из [battle_location.GetProvince.GetName]"
 tactical_forest_battle.0005.desc: "Сражаясь в войне [fighting_war.GetName] против [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], Моя армия сражается в [battle_location.GetProvince.GetTerrain.GetName|l] из [battle_location.GetProvince.GetName] против сил [enemy_war_leader.GetFullNameNicknamedOrMeRegnal]. Наши разведчики докладывают, что под командованием находится [enemy_commander.GetFullNameNicknamedOrMeRegnal]. Как командир, я должен выбрать ход, чтобы преодолеть [enemy_commander.GetTitleTierName]."
 tactical_forest_battle.0005.a: "Сосредоточьтесь на левом фланге ([left_flank_commander.GetSkill( 'martial' )]#! [martial|E] [left_flank_commander.GetTitledFirstNameOrMe] против [enemy_right_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_right_flank_commander.GetSkill( 'martial' )]#! [martial|E])"
 tactical_forest_battle.0005.b: "Сосредоточьтесь на центре ([center_flank_commander.GetSkill( 'martial' )]#! [martial|E] [center_flank_commander.GetTitledFirstNameOrMe] vs [enemy_center_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_center_flank_commander.GetSkill( 'martial' )]#! [martial|E])"
 tactical_forest_battle.0005.c: "Сосредоточьтесь на правом фланге ([right_flank_commander.GetSkill( 'martial' )]#! [martial|E] [right_flank_commander.GetTitledFirstNameOrMe] против [enemy_left_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_left_flank_commander.GetSkill( 'martial' )]#! [martial|E])"
 tactical_forest_battle.0005.d: "Держи моих рыцарей в резерве"
 tactical_forest_battle.0005.d.success: "Мои кони прекрасно подготовлены к использованию любого открытия!"
 tactical_forest_battle.0005.d.failure: "Битва развивается слишком быстро, и мои рыцари оказываются не на своих позициях."
 tactical_forest_battle.0005.e: "Сосредоточьтесь на наших элитных юнитах дальнего боя"
 tactical_forest_battle.0005.f: "Сосредоточьтесь на нашей элитной кавалерии"
 tactical_forest_battle.0005.n: "Взять на себя ответственность за своего командира!"
 tactical_forest_battle.0005.n.success: "[left_flank_commander.GetFullNameNicknamedOrMe] дуэлей [enemy_right_flank_commander.GetFullNameNicknamed]"
 tactical_forest_battle.0005.n.failure: "Наш заряд не способен прорваться!"
 tactical_forest_battle.0005.kc: "Дуэльная победа!"
 tactical_forest_battle.0005.kc.success: "[left_flank_commander.GetFullNameNicknamed] убил [enemy_right_flank_commander.GetFullNameNicknamed] в единоборстве, деморализовав его войска!"
 tactical_forest_battle.0005.cc: "Дуэльная победа!"
 tactical_forest_battle.0005.cc.success: "[left_flank_commander.GetFullNameNicknamed] захватил [enemy_right_flank_commander.GetFullNameNicknamed] после победы над [enemy_right_flank_commander.GetHerHim] в единоборстве, деморализовав его войска!"
 tactical_forest_battle.0005.ld: "Победил в Дуэли!"
 tactical_forest_battle.0005.ld.failure: "[left_flank_commander.GetFullNameNicknamed] потерпел поражение от [enemy_right_flank_commander.GetFullNameNicknamed] после окружения [enemy_right_flank_commander.GetFirstName]! в бою!"
 tactical_forest_battle.0005.ldk: "Убит в дуэли!"
 tactical_forest_battle.0005.ldk.failure: "[left_flank_commander.GetFullNameNicknamed] был убит [enemy_right_flank_commander.GetFullNameNicknamed] после окружения [enemy_right_flank_commander.GetFirstName] в бою!"
 tactical_forest_battle.0005.j: "Заряд [enemy_right_flank_commander.GetFullNameNicknamed]!"
 tactical_forest_battle.0005.j.failure: "[left_flank_commander.GetFullNameNicknamed] не смог прорваться к [enemy_right_flank_commander.GetFullNameNicknamed]"
 tactical_forest_battle.0005.dtt.success: "Наш фланг атакует и окружает [enemy_right_flank_commander.GetFirstName]"
 # Event 0110 - Cavalry Feint SUCCESS Follow-up: Trap Sprung 
 tactical_forest_battle.0110.t: "Ловушка захлопнулась!"
 tactical_forest_battle.0110.desc: "[left_flank_commander.GetTitledFirstNamePossessive] финт сработал отлично! [enemy_commander.GetFirstNamePossessive] команды удерживать были заглушены, а [enemy_commander.GetHerHis] авангард сломал строй, чтобы проглотить наживку. Правая часть их линии теперь растянута и дезорганизована."
 tactical_forest_battle.0110.a: "[left_flank_commander.GetTitledFirstName] ведет дезорганизованную армию в ловушку наших первоклассных отрядов"
 tactical_forest_battle.0110.a.success: "[enemy_commander.GetFirstNamePossessive] правая сторона следует за [left_flank_commander.GetFirstNamePossessive] бегущими силами прямо в засаду!"
 tactical_forest_battle.0110.a.failure: "Правые не клюют на наживку и удерживают позицию, меняя подразделения для поддержки других флангов."
 tactical_forest_battle.0110.b: "Отправьте рыцарей сокрушить их чрезмерно растянутый фланг."
 tactical_forest_battle.0110.b.success: "Рыцари врезаются в незащищенный фланг врага, разрывая его строй!"
 tactical_forest_battle.0110.b.failure: "Враг быстро перестраивается и атакует наших рыцарей."
 tactical_forest_battle.0110.c: "Оторвите силы с фланга [right_flank_commander.GetTitledFirstNamePossessive], чтобы окружить заманенные отряды."
 tactical_forest_battle.0110.c.success: "[right_flank_commander.GetTitledFirstName] успешно окружает отряды противника, отрезая им путь к отступлению!"
 tactical_forest_battle.0110.c.failure: "Противник ведет разрушительную атаку на наш истощенный правый фланг."
 tactical_forest_battle.0110.d: "Поверните [center_flank_commander.GetFirstNamePossessive] резервов, чтобы окружить заманенные отряды."
 tactical_forest_battle.0110.d.success: "Резервы движутся быстро и готовы окружить"
 tactical_forest_battle.0110.d.failure: "[enemy_commander.GetFirstNamePossessive] узнает наш истощенный центр!"
 tactical_forest_battle.0110.e: "Поворачивайте и убивайте приманенные отряды с полным зарядом"
 tactical_forest_battle.0110.e.success: "Полный заряд застает врага врасплох!"
 tactical_forest_battle.0110.e.failure: "Враг остается стойким и отражает нашу атаку!"
  
  
 # ============================================ 
 # EVENT 9474 - Rally Army After Being Pressured 
 # ============================================ 
  
 tactical_forest_battle.9474.t: "Сплотить армию"
 tactical_forest_battle.9474.desc: "Битва на левом фланге достигла критической точки. Наши силы колеблются, но еще не сломлены. Благодаря сильному руководству и смелым действиям мы можем восстановить порядок и изменить ситуацию!"
 tactical_forest_battle.9474.a: "Левый прессингует атаку"
 tactical_forest_battle.9474.a.success: "Наша армия слышит призыв и сплачивается!"
 tactical_forest_battle.9474.a.failure: "Армия продолжает колебаться!"
 tactical_forest_battle.9474.b: "Симулируйте отступление, чтобы заманить врага и контратаковать."
 tactical_forest_battle.9474.b.success: "Контратака увенчалась успехом, и боевой дух поднялся!"
 tactical_forest_battle.9474.b.failure: "Контратака провалилась, и боевой дух рушится!"
 tactical_forest_battle.9474.c: "Центровые сборы с трудом ослабляют давление"
 tactical_forest_battle.9474.c.success: "Атака дезориентирует их правый фланг!"
 tactical_forest_battle.9474.c.failure: "Враг остается стойким!"
 tactical_forest_battle.9474.d: "Правый фланг атакует с трудом, чтобы ослабить давление"
 tactical_forest_battle.9474.d.success: "Атака дезориентирует их левый фланг!"
 tactical_forest_battle.9474.d.failure: "Враг остается стойким!"
 tactical_forest_battle.9474.e: "Отправьте рыцарей на подкрепление"
 tactical_forest_battle.9474.e.success: "Прибывают резервы и укрепляют строй!"
 tactical_forest_battle.9474.e.failure: "Резервы слишком разбросаны, чтобы помочь!"
 tactical_forest_battle.9474.f: "Отправьте элитные отряды для подкрепления"
 tactical_forest_battle.9474.f.success: "Наши лучшие отряды сеют хаос среди врага!"
 tactical_forest_battle.9474.f.failure: "Наши подразделения по борьбе с наркотиками перегружены!"
  
 # ============================================ 
 # EVENT 0650 - Right Flank Reserves Intercept 
 # ============================================ 
 tactical_forest_battle.0650.t: "Правый фланг перехватывает движение противника"
 tactical_forest_battle.0650.desc: "Наши правофланговые резервы обнаружили [enemy_commander.GetFirstNamePossessive] сил, пытающихся маневрировать против нашей позиции. У нас есть короткое время, чтобы действовать, прежде чем враг завершит свое движение."
  
 tactical_forest_battle.0650.a: "Начать яростный натиск правым флангом."
 tactical_forest_battle.0650.a.success: "Правый фланг наносит сокрушительный удар, обрушивая правый фланг противника!"
 tactical_forest_battle.0650.a.failure: "Натиск отбит, и противник перехватывает инициативу!"
  
 tactical_forest_battle.0650.b: "Разверните левый фланг, чтобы атаковать сзади."
 tactical_forest_battle.0650.b.success: "Наш маневр с колесом застал врага под разрушительным перекрестным огнем!"
 tactical_forest_battle.0650.b.failure: "Фланговый маневр обнаружен и сорван контратаками противника!"
  
 tactical_forest_battle.0650.c: "Вдохновите войска смелым призывом к сплочению"
 tactical_forest_battle.0650.c.success: "Войска воодушевлены и отбрасывают наступление врага!"
 tactical_forest_battle.0650.c.failure: "Наш призыв к сплочению остается без внимания, и армия продолжает сдавать позиции!"
  
 tactical_forest_battle.0650.d: "Включите правильные резервы и создайте путаницу"
 tactical_forest_battle.0650.d.success: "Резервы создают достаточную путаницу, чтобы мы могли выгодно изменить позицию!"
 tactical_forest_battle.0650.d.failure: "Интрига имеет неприятные последствия, и враг пользуется нашей растерянностью!"
  
 tactical_forest_battle.0650.e: "Отправьте рыцарей для усиления правого фланга."
 tactical_forest_battle.0650.e.success: "Рыцари усиливают фланг и закрепляют позицию!"
 tactical_forest_battle.0650.e.failure: "Рыцари отрезаны и окружены превосходящими силами противника!"
  
