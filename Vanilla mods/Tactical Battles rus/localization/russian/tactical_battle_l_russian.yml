 tactical_forest_battle.9476.d: "Левый фланг атакует с трудом, чтобы ослабить давление"
 tactical_forest_battle.9476.d.success: "Атака дезориентирует их левый фланг!"
 tactical_forest_battle.9476.d.failure: "Враг остается стойким!"
 tactical_forest_battle.9476.e: "Отправьте рыцарей на подкрепление"
 tactical_forest_battle.9476.e.success: "Прибывают резервы и укрепляют строй!"
 tactical_forest_battle.9476.e.failure: "Резервы слишком разбросаны, чтобы помочь!"
 tactical_forest_battle.9476.f: "Отправьте элитные отряды для подкрепления"
