 tactical_forest_battle.2014.t: "Комбинированный штурм левого фланга"
 tactical_forest_battle.2014.desc: "Совместная атака наших правых фланговых резервов и [left_flank_commander.GetFullNameNicknamedPossessiveOrMy] левого фланга усиливает атаку на их правом фланге. Если мы сможем прорваться сюда, мы сможем атаковать центр."
 tactical_forest_battle.2014.a: "Объединенные силы заполняют брешь"
 tactical_forest_battle.2014.a.success: "Объединенные силы сокрушают врага и приходит в беспорядок!"
 tactical_forest_battle.2014.a.failure: "Противник быстро перебрасывает силы, чтобы закрыть брешь!"
  
 tactical_forest_battle.2014.b: "Отправьте наши элитные отборные полки атаковать их дезорганизованный фланг."
 tactical_forest_battle.2014.b.success: "Наши лучшие подразделения сеют хаос на их правом фланге!"
 tactical_forest_battle.2014.b.failure: "Враг перегруппировывается и отбивает штурм!"
  
 tactical_forest_battle.2014.c: "Отправьте рыцарей атаковать их правый фланг."
 tactical_forest_battle.2014.c.success: "Рыцари и резервисты атакуют вместе, и их правые погружаются в панику."
 tactical_forest_battle.2014.c.failure: "Комбинированная атака встречена яростной контратакой!"
  
 tactical_forest_battle.2014.d: "Затопите левых, чтобы попытаться обойти их центр."
 tactical_forest_battle.2014.d.success: "Нам удается провести часть сил через их правый фланг."
 tactical_forest_battle.2014.d.failure: "Противник предвидит это движение и встречает наводнение лицом к лицу."
  
 tactical_forest_battle.2014.e: "Нажмите на штурм"
 tactical_forest_battle.2014.e.success: "Наше нападение продолжается с разрушительным эффектом!"
 tactical_forest_battle.2014.e.failure: "Враг стабилизируется, а скорость замедляется!"
  
