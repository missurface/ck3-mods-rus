 # Event 7323 - Left Encircles (Outcomes) 
 tactical_forest_battle.7323.t: "Правый фланг окружен!"
 tactical_forest_battle.7323.desc: "[left_flank_commander.GetTitledFirstName] успешно окружил правый фланг [enemy_commander.GetFirstNamePossessive]! Тысячи вражеских солдат теперь оказались в ловушке, отрезанные от возможности отступления или подкрепления. [enemy_commander.GetTitledFirstName] беспомощно наблюдает, как их попавшие в ловушку силы сталкиваются с уничтожением. Мы должны решить их судьбу: покажем ли мы им милость почетной капитуляции или же полностью уничтожим их по примеру?"
 tactical_forest_battle.7323.a: "Начни резню!"
 tactical_forest_battle.7323.a.success: "[left_flank_commander.GetTitledFirstName] возглавляет атаку на попавшие в ловушку силы!"
 tactical_forest_battle.7323.a.failure: "Попавшие в ловушку силы предпринимают отчаянный побег, и многие сбегают!"
 tactical_forest_battle.7323.b: "Возьмите пленников!"
 tactical_forest_battle.7323.b.success: "Попавшие в ловушку силы сдаются и становятся военнопленными!"
 tactical_forest_battle.7323.b.failure: "Многие из попавших в ловушку сил отказываются сдаваться и сражаются насмерть!"
  
  # Event 9466 - Their Center is Shocked 
 tactical_forest_battle.9466.t: "Захваченный и сбитый с толку"
 tactical_forest_battle.9466.desc: "[enemy_commander.GetTitledFirstNamePossessiveOrMy] центр в шоке! Тогда паника — прекрасная возможность! Если мы сможем прорваться сюда, мы сможем атаковать центр."
 tactical_forest_battle.9466.a: "Симулируйте отступление и нападите на преследователей."
 tactical_forest_battle.9466.a.success: "[center_flank_commander.GetFullNameNicknamedPossessiveOrMy] симулируйте отступление и ворвитесь в их центр!"
 tactical_forest_battle.9466.a.failure: "Враг реорганизуется и стоит твердо!"
 tactical_forest_battle.9466.b: "Координируйте атаку с нашими рыцарями"
 tactical_forest_battle.9466.b.success: "Наша объединенная атака врезается в их центр."
 tactical_forest_battle.9466.b.failure: "Враг стойко противостоит нашему нападению!"
 tactical_forest_battle.9466.c: "Координируйте свои действия с нашими первоклассными полками, чтобы защитить свои права."
 tactical_forest_battle.9466.c.success: "Наша совместная атака вызывает хаос в их центре!"
 tactical_forest_battle.9466.c.failure: "У врага есть время установить новую линию обороны!"
 tactical_forest_battle.9466.d: "Используйте преимущество в полную силу"
 tactical_forest_battle.9466.d.success: "Нажимаем атаку на их центр!"
 tactical_forest_battle.9466.d.failure: "Враг держится, несмотря на давление!"
 tactical_forest_battle.9466.e: "[center_flank_commander.GetTitledFirstNameOrMeRegnal] зарядов с трудом сокрушает их центр!"
 tactical_forest_battle.9466.e.success: "Наша атака разрушает сплоченность врага!"
 tactical_forest_battle.9466.e.failure: "Их держится крепко, и нам не прорваться!"
  
 # Event .220 - Left Begins Encircle 
 tactical_forest_battle.220.t: "Левый фланг начинает окружение"
 tactical_forest_battle.220.desc: "[left_flank_commander.GetTitledFirstNamePossessiveOrMy] сил просочилось в тыл врага. Мы должны воспользоваться этим преимуществом до прибытия [enemy_commander.GetFirstNamePossessive] подкрепления. Мужчины считают, что если задержать врага на достаточно долгое время, они смогут окружить врага."
 tactical_forest_battle.220.a: "Клещи с правого фланга!"
 tactical_forest_battle.220.a.success: "[left_flank_commander.GetTitledFirstName] и наш правый фланг координируют разрушительное движение клешней!"
 tactical_forest_battle.220.a.failure: "Нарушается координация между флангами, и враг ускользает из клещей!"
 tactical_forest_battle.220.b: "Отправьте наших рыцарей занять их!"
 tactical_forest_battle.220.b.success: "Наши рыцари заняты, отвлекая их от окружающих врагов!"
 tactical_forest_battle.220.b.failure: "Враг видит окружающие силы!"
 tactical_forest_battle.220.c: "Отправьте наши взломанные подразделения, чтобы они были заняты"
 tactical_forest_battle.220.c.success: "Наши лучшие подразделения вступают в бой с противником, позволяя продолжить окружение!"
 tactical_forest_battle.220.c.failure: "Враг перегруппировывается и отбрасывает наши части!"
 tactical_forest_battle.220.d: "Сформируйте наковальню, пока вытекшие силы атакуют сзади."
 tactical_forest_battle.220.d.success: "[center_flank_commander.GetTitledFirstName] правый фланг разбит между двумя силами!"
 tactical_forest_battle.220.d.failure: "Их права на данный момент сильны!"
 tactical_forest_battle.220.e: "Вдохновите наши войска сражаться сильнее, пока окружение не будет завершено."
 tactical_forest_battle.220.e.success: "[center_flank_commander.GetTitledFirstName] правый фланг разбит между двумя силами!"
 tactical_forest_battle.220.e.failure: "Их права на данный момент сильны!"
  
  
