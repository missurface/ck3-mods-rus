 # EVENT 7324 - Enemy Reorganizes Turns to Meet our center 
  
  
 tactical_forest_battle.7324.t: "Враг наносит удары по центру и с фланга"
 tactical_forest_battle.7324.desc: "[enemy_commander.GetFirstNamePossessive] обнаружил наш ослабленный центральный фланг и начал атаку. Без наших резервов мы принимаем решающее решение сохранить наш центральный фланг."
 tactical_forest_battle.7324.a: "центральный фланг устойчиво противостоит нападению"
 tactical_forest_battle.7324.a.success: "Наш центральный фланг стойко выдерживает натиск врага!"
 tactical_forest_battle.7324.a.failure: "Центральный фланг разбит и начинает давать сбои!"
 tactical_forest_battle.7324.b: "Отправьте рыцарей, чтобы укрепить центр."
 tactical_forest_battle.7324.b.success: "Свежие рыцари стабилизируют центральный фланг!"
 tactical_forest_battle.7324.b.failure: "Рыцари перехвачены, не дойдя до центра!"
 tactical_forest_battle.7324.c: "Отправьте наши элитные подразделения для усиления центрального фланга."
 tactical_forest_battle.7324.c.success: "Наши подкрепления стабилизируют центральный фланг!"
 tactical_forest_battle.7324.c.failure: "Наш центр рушится, несмотря на подкрепление!"
 tactical_forest_battle.7324.d: "Постарайтесь медленно отступить и вывести их центр из позиции, пока не прибудет подкрепление."
 tactical_forest_battle.7324.d.success: "Их центр начинает следить за нашим отступлением, разоблачая их!"
 tactical_forest_battle.7324.d.failure: "Центр не способен выйти из боя под давлением!"
 tactical_forest_battle.7324.e: "Симулируйте отступление и нападите на преследователей."
 tactical_forest_battle.7324.e.success: "Враг попадается на наш обман и преследует неожиданный удар!"
 tactical_forest_battle.7324.e.failure: "Они видят наш обман и поддерживают свой строй!"
  
