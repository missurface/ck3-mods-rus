 setting_tbatt_martial_skill_increase_default_value: "3 Боевых (по умолчанию)"
 setting_tbatt_martial_skill_increase_default_value_desc: "#high У командиров есть шанс (в зависимости от «Шанса на повышение навыков») получить максимум 3 [martial|E] очка навыков за разгром фланга более опытного командира."
