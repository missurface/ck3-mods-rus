 setting_tbatt_martial_skill_increase_value_4: "4 Боевых"
 setting_tbatt_martial_skill_increase_value_4_desc: "#high Командиры имеют шанс, основанный на «Шансе повышения навыков», получить максимум 4 [martial|E] очка навыков, разгромив фланг более опытного командира."
