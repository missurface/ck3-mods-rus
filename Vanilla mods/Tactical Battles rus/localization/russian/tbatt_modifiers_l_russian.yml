l_russian:
  
 FLANK_COMMANDERS_TAB: "Фланговые командиры"
 tactical_turn_and_kill_success_commander: "Повернуть и убить"
 tactical_turn_and_kill_success_commander_desc: "Армия этого персонажа успешно заманила врага врасплох и внезапно напала на него, вызвав мощный шок на его линии."
 tactical_turn_and_kill_success_troops: "Убийственное безумие"
 tactical_turn_and_kill_success_troops_desc: "Армия этого персонажа пользуется потрясенной линией, прорезая обезумевшую линию врага, как масло."
 tactical_turn_and_kill_success_enemy_commander: "Наживка"
 tactical_turn_and_kill_success_enemy_commander_desc: "Этот командир попался на уловку и несет тяжелые потери после того, как был застигнут врасплох внезапным разворотом сил."
 tactical_turn_and_kill_success_enemy_troops: "Заманили"
 tactical_turn_and_kill_success_enemy_troops_desc: "Войска этого персонажа пошли на приманку и перешли в разрушительную контратаку, понеся большие потери."
 tactical_turn_and_kill_failure_commander: "Сдержано"
 tactical_turn_and_kill_failure_commander_desc: "Попытка этого персонажа уловить не увенчалась успехом, поскольку враг удержался и сопротивлялся контратаке."
 tactical_turn_and_kill_failure_troops: "Оборонительный стенд"
 tactical_turn_and_kill_failure_troops_desc: "Наши войска построили прочную оборонительную линию, но не сумели воспользоваться маневром."
 tactical_turn_and_kill_failure_enemy_commander: "Стойкая защита"
 tactical_turn_and_kill_failure_enemy_commander_desc: "Этот командир раскусил уловку и сохранил дисциплинированный контроль над своими силами."
 tactical_turn_and_kill_failure_enemy_troops: "Отпугиватели"
 tactical_turn_and_kill_failure_enemy_troops_desc: "Войска противника отразили контратаку, удерживая свой строй от внезапного разворота."
  
 tactical_maa_ambush_success_commander: "Засада"
 tactical_maa_ambush_success_commander_desc: "Этот командир успешно устроил засаду на врага, застигнув его врасплох."
 tactical_maa_ambush_success_troops: "Видя красный"
 tactical_maa_ambush_success_troops_desc: "Наши войска в ярости и яростно атакуют после успешной засады."
 tactical_maa_ambush_success_enemy_commander: "Засада"
 tactical_maa_ambush_success_enemy_commander_desc: "Этот командир был застигнут врасплох засадой и изо всех сил пытается ответить."
 tactical_maa_ambush_success_enemy_troops: "Принятие потерь"
 tactical_maa_ambush_success_enemy_troops_desc: "Войска противника несут большие потери из-за засады."
 tactical_maa_ambush_failure_commander: "Повернуто в сторону"
 tactical_maa_ambush_failure_commander_desc: "Этот командир успешно провел ротацию своих сил, чтобы избежать засады."
 tactical_maa_ambush_failure_troops: "По моим пяткам"
 tactical_maa_ambush_failure_troops_desc: "Наши войска с трудом справляются с задачей после неудачной засады."
 tactical_maa_ambush_failure_enemy_commander: "Умные инстинкты"
 tactical_maa_ambush_failure_enemy_commander_desc: "Этот командир проявил сообразительность и избежал засады."
 tactical_maa_ambush_failure_enemy_troops: "В атаке"
  
  
 tactical_flank_breakoff_success_commander: "Ротация армии"
 tactical_flank_breakoff_success_commander_desc: "Фланг успешно разворачивался, чтобы атаковать новых врагов или изменить позицию для получения преимущества."
 tactical_flank_breakoff_success_troops: "Готов к бою"
 tactical_flank_breakoff_success_troops_desc: "Войска полны сил и готовы сражаться на новых позициях."
 tactical_flank_breakoff_success_enemy_commander: "Давление"
 tactical_flank_breakoff_success_enemy_commander_desc: "Враг чувствует давление, поскольку наш фланг меняет позицию против него."
 tactical_flank_breakoff_success_enemy_troops: "Враги усилены"
 tactical_flank_breakoff_success_enemy_troops_desc: "Силы противника усиливаются перед фланговым маневром."
 tactical_flank_breakoff_failure_commander: "Увязший"
 tactical_flank_breakoff_failure_commander_desc: "Фланг застрял и не смог выполнить ротацию."
 tactical_flank_breakoff_failure_troops: "Не могу отключиться"
 tactical_flank_breakoff_failure_troops_desc: "Войска не имеют возможности оторваться от противника и перегруппироваться."
 tactical_flank_breakoff_failure_enemy_commander: "Держите давление"
 tactical_flank_breakoff_failure_enemy_commander_desc: "Противник продолжает оказывать давление и не дает нашему флангу выйти из боя."
 tactical_flank_breakoff_failure_enemy_troops: "Мечи готовы"
 tactical_flank_breakoff_failure_enemy_troops_desc: "Вражеские силы готовы и полны решимости удерживать свои позиции."
  
