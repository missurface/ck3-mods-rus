l_spanish:
 # Event 0001 - Left Flank Envelopment SUCCESS 
 tactical_flank_battle.0001.t: "Left Flank Sweeps Forward!"  <"¡El flanco izquierdo avanza!">  #NT!
 tactical_flank_battle.0001.desc: "[scope:flank_commander.GetTitledFirstName], commanding our left flank, has found an opening! The enemy's right is exposed, and we have the opportunity to envelope their position. [enemy_commander.GetTitledFirstName]'s forces are vulnerable to a devastating flanking maneuver!"  <"[scope:flank_commander.GetTitledFirstName], al mando de nuestro flanco izquierdo, ¡ha encontrado una abertura! La derecha del enemigo está expuesta y tenemos la oportunidad de rodear su posición. ¡Las fuerzas de [enemy_commander.GetTitledFirstName] son vulnerables a una devastadora maniobra de flanqueo!">  #NT!
 tactical_flank_battle.0001.a: "Press the advantage aggressively! (Prowess vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Aprovecha la ventaja agresivamente! (Destreza vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0001.a.success: "Our left flank charges with fury, rolling up their line!"  <"¡Nuestro flanco izquierdo carga con furia, enrollando su línea!">  #NT!
 tactical_flank_battle.0001.a.failure: "The aggressive push is contained."  <"El impulso agresivo está contenido.">  #NT!
 tactical_flank_battle.0001.b: "Coordinate with the center! (Stewardship vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Coordina con el centro! (Responsabilidad vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0001.b.success: "Perfect coordination amplifies our advantage!"  <"¡La perfecta coordinación amplifica nuestra ventaja!">  #NT!
 tactical_flank_battle.0001.b.failure: "The coordination fails to materialize."  <"La coordinación no se materializa.">  #NT!
 tactical_flank_battle.0001.c: "Execute a pincer movement! (Martial vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Ejecuta un movimiento de pinza! (Marcial vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0001.c.success: "We trap them in a devastating pincer!"  <"¡Los atrapamos en una pinza devastadora!">  #NT!
 tactical_flank_battle.0001.c.failure: "They evade the pincer maneuver."  <"Evaden la maniobra de pinza.">  #NT!
 tactical_flank_battle.0001.d: "Hold position and observe."  <"Mantenga la posición y observe.">  #NT!
  
 # Event 0002 - Left Flank Envelopment FAILURE 
 tactical_flank_battle.0002.t: "Left Flank Under Pressure!"  <"¡Flanco izquierdo bajo presión!">  #NT!
 tactical_flank_battle.0002.desc: "[scope:flank_commander.GetTitledFirstName], commanding our left flank, is in trouble! [enemy_commander.GetTitledFirstName] has turned our attempted envelopment against us. Our left is now vulnerable and falling back. We must act quickly or risk losing the entire flank!"  <"[scope:flank_commander.GetTitledFirstName], al mando de nuestro flanco izquierdo, ¡está en problemas! [enemy_commander.GetTitledFirstName] ha vuelto nuestro intento de encierro en nuestra contra. Nuestra izquierda ahora es vulnerable y está retrocediendo. ¡Debemos actuar rápidamente o arriesgarnos a perder todo el flanco!">  #NT!
 tactical_flank_battle.0002.a: "Reform the flank! (Martial vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Reforma el flanco! (Marcial vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0002.a.success: "We restore order to the left flank!"  <"¡Restauramos el orden en el flanco izquierdo!">  #NT!
 tactical_flank_battle.0002.a.failure: "The flank continues to crumble."  <"El flanco sigue desmoronándose.">  #NT!
 tactical_flank_battle.0002.b: "Call for support from the center! (Diplomacy vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Llame para obtener ayuda del centro! (Diplomacia vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0002.b.success: "Reinforcements shore up our left!"  <"¡Refuerzos apuntalan nuestra izquierda!">  #NT!
 tactical_flank_battle.0002.b.failure: "No help arrives in time."  <"Ninguna ayuda llega a tiempo.">  #NT!
 tactical_flank_battle.0002.c: "Execute a fighting withdrawal! (Stewardship vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Ejecuta una retirada de combate! (Responsabilidad vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0002.c.success: "We pull back in good order!"  <"¡Regresamos en buen orden!">  #NT!
 tactical_flank_battle.0002.c.failure: "The withdrawal becomes a rout."  <"La retirada se convierte en derrota.">  #NT!
 tactical_flank_battle.0002.d: "Accept the setback."  <"Acepta el revés.">  #NT!
  
 # Event 0003 - Center Hold SUCCESS 
 tactical_flank_battle.0003.t: "The Center Holds Firm!"  <"¡El Centro se mantiene firme!">  #NT!
 tactical_flank_battle.0003.desc: "[scope:flank_commander.GetTitledFirstName], commanding our center, has proven their worth! While [enemy_commander.GetTitledFirstName] throws everything at our line, the center stands like a fortress. Our position is strong, and we can dictate the flow of battle from here!"  <"[scope:flank_commander.GetTitledFirstName], al mando de nuestro centro, ¡ha demostrado su valía! Mientras [enemy_commander.GetTitledFirstName] lanza todo contra nuestra línea, el centro se mantiene como una fortaleza. ¡Nuestra posición es fuerte y podemos dictar el flujo de la batalla desde aquí!">  #NT!
 tactical_flank_battle.0003.a: "Push forward aggressively! (Martial vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Avanza agresivamente! (Marcial vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0003.a.success: "The center drives them back!"  <"¡El centro los hace retroceder!">  #NT!
 tactical_flank_battle.0003.a.failure: "They resist our push."  <"Se resisten a nuestro empuje.">  #NT!
 tactical_flank_battle.0003.b: "Anchor the entire line! (Prowess vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Ancla toda la línea! (Destreza vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0003.b.success: "Our center becomes an immovable anchor!"  <"¡Nuestro centro se convierte en un ancla inamovible!">  #NT!
 tactical_flank_battle.0003.b.failure: "The anchor position weakens."  <"La posición del ancla se debilita.">  #NT!
 tactical_flank_battle.0003.c: "Send support to both flanks! (Stewardship vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Envía apoyo a ambos flancos! (Responsabilidad vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0003.c.success: "The center reinforces our entire line!"  <"¡El centro refuerza toda nuestra línea!">  #NT!
 tactical_flank_battle.0003.c.failure: "We spread ourselves too thin."  <"Nos extendimos demasiado.">  #NT!
 tactical_flank_battle.0003.d: "Maintain steady pressure."  <"Mantenga una presión constante.">  #NT!
  
 # Event 0004 - Center Collapsing FAILURE 
 tactical_flank_battle.0004.t: "The Center is Breaking!"  <"¡El Centro se está rompiendo!">  #NT!
 tactical_flank_battle.0004.desc: "[scope:flank_commander.GetTitledFirstName] desperately tries to hold the center, but [enemy_commander.GetTitledFirstName] is breaking through! If the center collapses, both flanks will be cut off and destroyed. This is the critical moment of the battle!"  <"[scope:flank_commander.GetTitledFirstName] intenta desesperadamente mantener el centro, ¡pero [enemy_commander.GetTitledFirstName] se abre paso! Si el centro colapsa, ambos flancos quedarán cortados y destruidos. ¡Este es el momento crítico de la batalla!">  #NT!
 tactical_flank_battle.0004.a: "Rally the center personally! (Martial vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Reúne el centro personalmente! (Marcial vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0004.a.success: "My presence steadies the center!"  <"¡Mi presencia estabiliza el centro!">  #NT!
 tactical_flank_battle.0004.a.failure: "Even my presence cannot stop the collapse."  <"Ni siquiera mi presencia puede detener el colapso.">  #NT!
 tactical_flank_battle.0004.b: "Commit all reserves! (Stewardship vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Comprometa todas las reservas! (Responsabilidad vs [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0004.b.success: "Fresh troops plug the gap!"  <"¡Tropas frescas cubren la brecha!">  #NT!
 tactical_flank_battle.0004.b.failure: "The reserves are swallowed up."  <"Las reservas están consumidas.">  #NT!
 tactical_flank_battle.0004.c: "Refuse the center and strengthen flanks! (Learning vs [enemy_commander.GetShortUINameNoTooltip])"  <"¡Rechaza el centro y fortalece los flancos! (Aprendizaje frente a [enemy_commander.GetShortUINameNoTooltip])">  #NT!
 tactical_flank_battle.0004.c.success: "We form a new defensive line!"  <"¡Formamos una nueva línea defensiva!">  #NT!
 tactical_flank_battle.0004.c.failure: "The maneuver fails catastrophically."  <"La maniobra fracasa catastróficamente.">  #NT!
 tactical_flank_battle.0004.d: "Brace for impact and hope."  <"Prepárate para el impacto y la esperanza.">  #NT!
  
  
 tactical_forest_battle.0251.tt: "[center_flank_commander.GetFirstNameOrMe] expertise in the [battle_location.GetProvince.GetTerrain.GetName]"  <"[center_flank_commander.GetFirstNameOrMe] experiencia en el [battle_location.GetProvince.GetTerrain.GetName]">  #NT!
 tactical_forest_battle.0251.tt.success: "[center_flank_commander.GetFirstNameOrMe] prowess in the [battle_location.GetProvince.GetTerrain.GetNameNoTooltip] at [battle_location.GetProvince.GetName] has distingushed thems among their peers."  <"La destreza de [center_flank_commander.GetFirstNameOrMe] en [battle_location.GetProvince.GetTerrain.GetNameNoTooltip] y [battle_location.GetProvince.GetName] los ha distinguido entre sus pares.">  #NT!
  
 tactical_forest_battle.0250.tt: "[left_flank_commander.GetFirstNameOrMe] expertise in the [battle_location.GetProvince.GetTerrain.GetName]"  <"[left_flank_commander.GetFirstNameOrMe] experiencia en el [battle_location.GetProvince.GetTerrain.GetName]">  #NT!
 tactical_forest_battle.0250.tt.success: "[left_flank_commander.GetFirstNameOrMe] prowess in the [battle_location.GetProvince.GetTerrain.GetNameNoTooltip] at [battle_location.GetProvince.GetName] has distingushed them among their peers."  <"La destreza de [left_flank_commander.GetFirstNameOrMe] en [battle_location.GetProvince.GetTerrain.GetNameNoTooltip] en [battle_location.GetProvince.GetName] los ha distinguido entre sus pares.">  #NT!
  
 tactical_forest_battle.0252.tt: "[right_flank_commander.GetFirstNameOrMe] expertise in the [battle_location.GetProvince.GetTerrain.GetName]"  <"[right_flank_commander.GetFirstNameOrMe] experiencia en el [battle_location.GetProvince.GetTerrain.GetName]">  #NT!
 tactical_forest_battle.0252.tt.success: "[right_flank_commander.GetFirstNameOrMe] prowess in the [battle_location.GetProvince.GetTerrain.GetNameNoTooltip] at [battle_location.GetProvince.GetName] has distingushed them among their peers."  <"La destreza de [right_flank_commander.GetFirstNameOrMe] en [battle_location.GetProvince.GetTerrain.GetNameNoTooltip] en [battle_location.GetProvince.GetName] los ha distinguido entre sus pares.">  #NT!
  
 grant_left_interaction_desc: "Appoint [recipient.GetTitledFirstName] as your center commander, granting them tactical authority and prestige."  <"Nombra a [recipient.GetTitledFirstName] como tu comandante central, otorgándole autoridad táctica y prestigio.">  #NT!
 grant_center_interaction_desc: "Appoint [recipient.GetTitledFirstName] as your center commander, granting them tactical authority and prestige."  <"Nombra a [recipient.GetTitledFirstName] como tu comandante central, otorgándole autoridad táctica y prestigio.">  #NT!
 grant_right_flank_interaction_desc: "Appoint [recipient.GetTitledFirstName] as your right flank commander, granting them tactical authority and prestige."  <"Nombra a [recipient.GetTitledFirstName] como tu comandante del flanco derecho, otorgándole autoridad táctica y prestigio.">  #NT!
  
 # Custom Tooltips 
 grant_left_flank_commander_tt: "[recipient.GetTitledFirstName] has been appointed to command the left flank."  <"[recipient.GetTitledFirstName] ha sido designado para comandar el flanco izquierdo.">  #NT!
 grant_center_commander_tt: "[recipient.GetTitledFirstName] has been appointed to command the center."  <"[recipient.GetTitledFirstName] ha sido designado para comandar el centro.">  #NT!
 grant_right_flank_commander_tt: "[recipient.GetTitledFirstName] has been appointed to command the right flank."  <"[recipient.GetTitledFirstName] ha sido designado para comandar el flanco derecho.">  #NT!
  
 tactical_overmatched_enemy_commander: "Outmatched Enemy Commander"  <"Comandante enemigo superado">  #NT!
 tactical_overmatched_enemy_commander_desc: "This character's experience and skill on the battlefield vastly exceeds the enemy commanders they face, giving them a significant advantage in combat and tactics."  <"La experiencia y habilidad de este personaje en el campo de batalla supera ampliamente a los comandantes enemigos a los que se enfrenta, dándoles una ventaja significativa en combate y tácticas.">  #NT!
 tactical_outmatched_enemy_commander: "Over My Head"  <"Sobre mi cabeza">  #NT!
 tactical_outmatched_enemy_commander_desc: "This character is facing an enemy commander whose experience and skill on the battlefield vastly exceeds their own, putting them at a significant disadvantage in combat and tactics."  <"Este personaje se enfrenta a un comandante enemigo cuya experiencia y habilidad en el campo de batalla supera con creces las suyas, lo que le sitúa en una importante desventaja en combate y tácticas.">  #NT!
  
  
 trait_lifestyle_flank_commander: "Flank Commander"  <"Comandante de flanco">  #NT!
 trait_lifestyle_flank_commander_desc: "#soft_glow #difficulty_hard Unassigned \n\n#![ROOT.GetCharacter.GetFirstNameNoTooltip] has experience in commanding a flank, tasked with executing flanking maneuvers and exploiting weaknesses on the enemy's right side."  <"#soft_glow #difficulty_hard No asignado \n\n#![ROOT.GetCharacter.GetFirstNameNoTooltip] tiene experiencia en el mando de un flanco, con la tarea de ejecutar maniobras de flanqueo y explotar las debilidades en el lado derecho del enemigo.">  #NT!
 lifestyle_assigned_flank_commander_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] was chosen to command a flank in [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy] army, tasked with executing flanking maneuvers and exploiting weaknesses on the enemy's right side."  <"[ROOT.GetCharacter.GetFirstNameNoTooltip] fue elegido para comandar un flanco en el ejército [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy], con la tarea de ejecutar maniobras de flanqueo y explotar las debilidades en el lado derecho del enemigo.">  #NT!
 trait_lifestyle_flank_commander_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] commands the left flank in [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy] army, tasked with executing flanking maneuvers and exploiting weaknesses on the enemy's right side."  <"[ROOT.GetCharacter.GetFirstNameNoTooltip] comanda el flanco izquierdo en el ejército [ROOT.GetCharacter.GetLiegeEvenWhenDead.GetTitledHouseNameOrFirstNamePossessiveOrMy], con la tarea de ejecutar maniobras de flanqueo y explotar las debilidades en el lado derecho del enemigo.">  #NT!
 trait_track_left: "Left Flank Commander"  <"Comandante del flanco izquierdo">  #NT!
 trait_track_left_desc: "Fighting on the left side of the flank and maneuvering against the enemies right flank, this character has experience against the enemies most formidable troops."  <"Luchando en el lado izquierdo del flanco y maniobrando contra el flanco derecho del enemigo, este personaje tiene experiencia contra las tropas más formidables del enemigo.">  #NT!
 trait_track_center: "Center Flank Commander"  <"Comandante del flanco central">  #NT!
 trait_track_center_desc: "Fighting in the center of the flank and maneuvering against the enemies main line, this character fights against the main force of the enemy and has experience against their most disciplined troops."  <"Luchando en el centro del flanco y maniobrando contra la línea principal enemiga, este personaje lucha contra la fuerza principal del enemigo y tiene experiencia contra sus tropas más disciplinadas.">  #NT!
 trait_track_right: "Right Flank Commander"  <"Comandante del flanco derecho">  #NT!
 trait_track_right_desc: "Fighting in the right of the flank and maneuvering against the enemies left flank, this character commands the armies most noble and elite troops in battle."  <"Luchando en el flanco derecho y maniobrando contra los enemigos en el flanco izquierdo, este personaje comanda los ejércitos más nobles y las tropas de élite en batalla.">  #NT!
  
 lifestyle_left_flank_commander_desc: "This character leads the left flank of an army, responsible for carrying out flanking maneuvers and taking advantage of vulnerabilities on the enemy's right side."  <"Este personaje lidera el flanco izquierdo de un ejército, encargándose de realizar maniobras de flanqueo y aprovechar las vulnerabilidades del lado derecho del enemigo.">  #NT!
 lifestyle_assigned_left_flank_commander_desc: "#soft_glow #difficulty_easy Unassigned\n\n#!This character was chosen to command the left flank of an army, responsible for carrying out flanking maneuvers and taking advantage of vulnerabilities on the enemy's right side."  <"#soft_glow #difficulty_easy Sin asignar\n\n#!This personaje fue elegido para comandar el flanco izquierdo de un ejército, responsable de realizar maniobras de flanqueo y aprovechar las vulnerabilidades del lado derecho del enemigo.">  #NT!
 lifestyle_assigned_center_flank_commander_desc: "#soft_glow #difficulty_easy Unassigned\n\n#!This character was chosen to command the center of an army, responsible for maintaining the main battle line and coordinating strategies with the flanks."  <"#soft_glow #difficulty_easy No asignado\n\n#!This personaje fue elegido para comandar el centro de un ejército, responsable de mantener la línea de batalla principal y coordinar estrategias con los flancos.">  #NT!
 lifestyle_assigned_right_flank_commander_desc: "#soft_glow #difficulty_easy Unassigned\n\n#!This character was chosen to command the right flank of an army, responsible for carrying out flanking maneuvers and taking advantage of vulnerabilities on the enemy's left side."  <"#soft_glow #difficulty_easy Sin asignar\n\n#!This personaje fue elegido para comandar el flanco derecho de un ejército, responsable de realizar maniobras de flanqueo y aprovechar las vulnerabilidades del lado izquierdo del enemigo.">  #NT!
  
 trait_lifestyle_war_commander: "War Commander"  <"comandante de guerra">  #NT!
 trait_lifestyle_war_commander_desc: "This character commands the army for a country at war, receiving increased prestige from military successes and bonuses to martial skill during wartime."  <"Este personaje comanda el ejército de un país en guerra y recibe un mayor prestigio por sus éxitos militares y bonificaciones a sus habilidades marciales durante tiempos de guerra.">  #NT!
 trait_lifestyle_war_commander_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] commands the army of [ROOT.GetCharacter.GetLiegeTitleEvenWhenDead.GetNameNoTier] during wartime. Overseeing the battlefield, he commands respect and strikes fear into the hearts of his enemies."  <"[ROOT.GetCharacter.GetFirstNameNoTooltip] comanda el ejército de [ROOT.GetCharacter.GetLiegeTitleEvenWhenDead.GetNameNoTier] durante tiempos de guerra. Supervisando el campo de batalla, inspira respeto e infunde miedo en los corazones de sus enemigos.">  #NT!
  
 lifestyle_war_commander_desc: "This character leads the army during wartime, responsible for directing military operations and achieving victory for their nation."  <"Este personaje lidera el ejército durante tiempos de guerra, siendo responsable de dirigir las operaciones militares y lograr la victoria de su nación.">  #NT!
 trait_track_lifestyle_war_commander: "Commander of War"  <"comandante de guerra">  #NT!
 trait_track_lifestyle_war_commander_desc: "This character commands the army in wartime, tasked with leading military efforts and securing victories for their country."  <"Este personaje comanda el ejército en tiempos de guerra y tiene la tarea de liderar los esfuerzos militares y asegurar victorias para su país.">  #NT!
 trait_track_skill: "Experience in Battle"  <"Experiencia en batalla">  #NT!
 trait_track_skill_desc: "This character has led successful manuevers during battle, demonstrating their skill and experience in commanding troops."  <"Este personaje ha liderado maniobras exitosas durante la batalla, demostrando su habilidad y experiencia al mando de tropas.">  #NT!
 trait_track_victories: "Victor in Battle"  <"Vencedor en la batalla">  #NT!
 trait_track_victories_desc: "This character's number of victories in battles during wartime, demonstrating their skill and success on the battlefield."  <"Número de victorias de este personaje en batallas durante tiempos de guerra, demostrando su habilidad y éxito en el campo de batalla.">  #NT!
 trait_track_foreign_fighter: "Fighting on Foreign Soil"  <"Luchando en suelo extranjero">  #NT!
 trait_track_foreign_fighter_desc: "This character's experience in leading men to victory outside the borders of their realm, demonstrating their skill in navigating foreign terrain and overcoming the challenges of fighting away from home."  <"La experiencia de este personaje al llevar a hombres a la victoria fuera de las fronteras de su reino, demostrando su habilidad para navegar en terrenos extranjeros y superar los desafíos de luchar fuera de casa.">  #NT!
 trait_track_local_fighter: "Defending the Homeland"  <"Defender la Patria">  #NT!
 trait_track_local_fighter_desc: "This character's experience in successfully leading men to defend their homeland, demonstrating their skill in utilizing familiar terrain and local resources to their advantage."  <"La experiencia de este personaje en liderar con éxito a hombres para defender su patria, demostrando su habilidad para utilizar terreno familiar y recursos locales en su beneficio.">  #NT!
 trait_track_outnumbered: "Against The Odds"  <"Contra las probabilidades">  #NT!
 trait_track_outnumbered_desc: "This character's experience in successfully leading men in battle against forces larger than their own, demonstrating their skill in utilizing superior tactics and strategy to overcome the odds."  <"La experiencia de este personaje en liderar con éxito a hombres en batallas contra fuerzas más grandes que las suyas, demostrando su habilidad en el uso de tácticas y estrategias superiores para superar las probabilidades.">  #NT!
  
  
 trait_lifestyle_home_terrain_expert: "Defender of the Homeland"  <"Defensor de la Patria">  #NT!
 trait_track_lifestyle_home_terrain_expert: "Defender of the Homeland"  <"Defensor de la Patria">  #NT!
 trait_track_lifestyle_home_terrain_expert_desc: "This character is experienced in fighting within the borders of their realm, with knowledge of the land and its advantages, they make a formidable opponent when fighting on familiar ground."  <"Este personaje tiene experiencia en luchar dentro de los límites de su reino, con conocimiento de la tierra y sus ventajas, es un oponente formidable cuando lucha en terreno familiar.">  #NT!
 trait_lifestyle_home_terrain_expert_desc: "This character is experienced in fighting within the borders of their realm, with knowledge of the land and its advantages, they make a formidable opponent when fighting on familiar ground."  <"Este personaje tiene experiencia en luchar dentro de los límites de su reino, con conocimiento de la tierra y sus ventajas, es un oponente formidable cuando lucha en terreno familiar.">  #NT!
 trait_lifestyle_home_terrain_expert_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] is experienced in fighting within the borders of [ROOT.GetCharacter.GetHerHis] realm, with knowledge of the land and its advantages, [ROOT.GetCharacter.GetSheHe] makes a formidable opponent when fighting on familiar ground."  <"[ROOT.GetCharacter.GetFirstNameNoTooltip] tiene experiencia en luchar dentro de las fronteras del reino [ROOT.GetCharacter.GetHerHis], con conocimiento de la tierra y sus ventajas, [ROOT.GetCharacter.GetSheHe] es ​​un oponente formidable cuando lucha en terreno familiar.">  #NT!
  
 trait_lifestyle_foreign_terrain_expert: "Foreign Lands Fighter"  <"Luchador de tierras extranjeras">  #NT!
 trait_track_lifestyle_foreign_terrain_expert: "Foreign Lands Fighter"  <"Luchador de tierras extranjeras">  #NT!
 trait_track_lifestyle_foreign_terrain_expert_desc: "This character is experienced in fighting outside the borders of their realm, despite being familiar with the land, they are proficient at manuvering an army through foreign lands."  <"Este personaje tiene experiencia en luchar fuera de las fronteras de su reino, a pesar de estar familiarizado con la tierra, es competente para maniobrar un ejército a través de tierras extranjeras.">  #NT!
