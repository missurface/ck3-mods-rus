 tactical_outnumbered_lands.tt: "Success in [battle_location.GetName]"  <"Éxito en [battle_location.GetName]">  #NT!
 tactical_outnumbered_lands.tt.success: "[this.GetFirstName] was about to defeat [enemy_commander.GetFirstName] in [battle_location.GetName] despite beihng outnumbered! [this.GetFirstName] has proven to be a brilliant commander and has earned the respect of all who witnessed the battle."  <"¡[this.GetFirstName] estuvo a punto de derrotar a [enemy_commander.GetFirstName] en [battle_location.GetName] a pesar de estar superado en número! [this.GetFirstName] ha demostrado ser un comandante brillante y se ha ganado el respeto de todos los que presenciaron la batalla.">  #NT!
  
  # tactical_forest_battle.9416 - Harrying left flank, enemy bleeding 
 tactical_forest_battle.9416.t: "¡Su izquierda está sangrando!"
 tactical_forest_battle.9416.desc: "[enemy_commander.GetFirstNamePossessive] fuerzas se están tambaleando por nuestras tácticas de atropello y fuga. Su flanco izquierdo está gravemente agotado y sus heridos ralentizan sus movimientos. Debemos actuar rápidamente para aprovechar su debilidad antes de que puedan reorganizarse."
 tactical_forest_battle.9416.a: "Coordina una carga con nuestras unidades de élite de crack."
 tactical_forest_battle.9416.a.success: "¡Nuestras unidades de élite barren su flanco izquierdo y los desorganizan!"
 tactical_forest_battle.9416.a.failure: "¡La carga no puede atravesar su obstinada defensa!"
 tactical_forest_battle.9416.b: "Coordinar una carga con nuestros caballeros."
 tactical_forest_battle.9416.b.success: "¡Nuestros caballeros chocan contra el enemigo debilitado que queda, enviándolos al caos!"
 tactical_forest_battle.9416.b.failure: "¡El asalto choca contra el enemigo debilitado que queda, enviándolos al caos!"
 tactical_forest_battle.9416.c: "¡La carga no puede atravesar su obstinada defensa!"
 tactical_forest_battle.9416.c.success: "¡Nuestro avance por el flanco izquierdo dispersa al enemigo debilitado!"
 tactical_forest_battle.9416.c.failure: "¡Mantienen la formación a pesar de sus pérdidas!"
 tactical_forest_battle.9416.d: "Fingir una retirada y volverse contra ellos."
 tactical_forest_battle.9416.d.success: "¡El enemigo cae en nuestro engaño y persigue un ataque inesperado!"
 tactical_forest_battle.9416.d.failure: "¡¡Ven a través de nuestro engaño y mantienen su formación!!"
 tactical_forest_battle.9416.e: "Presione la ventaja"
 tactical_forest_battle.9416.e.success: "¡Su flanco izquierdo se está desmoronando bajo la inmensa presión!"
 tactical_forest_battle.9416.e.failure: "¡Mantienen la formación a pesar de sus pérdidas!"
  
  
