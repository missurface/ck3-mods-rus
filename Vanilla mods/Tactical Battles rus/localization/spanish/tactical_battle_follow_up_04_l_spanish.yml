 tactical_forest_battle.6324.f.failure: "¡Su línea se reorganiza!"  #NT!
  
  
 tactical_forest_battle.9420.t: "El enemigo lanza asalto izquierdo"  #NT!
 tactical_forest_battle.9420.desc: "¡[enemy_commander.GetFirstNamePossessive] está dando un fuerte empujón directamente a nuestra izquierda! Nuestra izquierda está bajo una inmensa presión y debemos decidir si aguantar, reforzar o maniobrar."  #NT!
 tactical_forest_battle.9420.a: "Reunir a la izquierda"  #NT!
 tactical_forest_battle.9420.a.success: "¡La izquierda absorbe el asalto y aguanta!"  #NT!
 tactical_forest_battle.9420.a.failure: "¡La izquierda no puede soportar la presión!"  #NT!
 tactical_forest_battle.9420.b: "Enviar reservas centrales para reforzar la izquierda"  #NT!
 tactical_forest_battle.9420.b.success: "¡Llegan reservas del centro y se estabilizan por izquierda!"  #NT!
 tactical_forest_battle.9420.b.failure: "¡Las reservas de derecha no logran reforzarse a tiempo!"  #NT!
 tactical_forest_battle.9420.c: "Enviar reservas de derecha para reforzar la izquierda"  #NT!
 tactical_forest_battle.9420.c.success: "¡Llegan reservas derechas y se estabilizan izquierdas!"  #NT!
 tactical_forest_battle.9420.c.failure: "¡Las reservas de derecha no logran reforzarse a tiempo!"  #NT!
 tactical_forest_battle.9420.d: "La izquierda lanza una carga desesperada"  #NT!
 tactical_forest_battle.9420.d.success: "¡Su izquierda queda desconcertada por la carga!"  #NT!
 tactical_forest_battle.9420.d.failure: "Su izquierda se mantiene fuerte y presiona el ataque."  #NT!
 tactical_forest_battle.9420.e: "Finge una retirada en los flancos para atraer al enemigo y volverte contra él."  #NT!
 tactical_forest_battle.9420.e.success: "¡El enemigo cree que nos retiramos y cae en nuestra trampa!"  #NT!
 tactical_forest_battle.9420.e.failure: "¡No podemos desconectarnos!"  #NT!
  
 tactical_forest_battle.6325.t: "El centro se retira lentamente"  #NT!
 tactical_forest_battle.6325.desc: "¡Nuestro centro está retrocediendo bajo presión! ¡Debemos asegurarnos de que esta retirada siga ordenada o corremos el riesgo de ser flanqueados y derrotados!"  #NT!
 tactical_forest_battle.6325.a: "El centro mantiene la disciplina"  #NT!
 tactical_forest_battle.6325.a.success: "¡Retiros del centro en buen estado!"  #NT!
 tactical_forest_battle.6325.a.failure: "¡El centro comienza a romperse!"  #NT!
 tactical_forest_battle.6325.b: "Los flancos cubren la retirada"  #NT!
 tactical_forest_battle.6325.b.success: "¡Los flancos aguantan y cubren la retirada!"  #NT!
 tactical_forest_battle.6325.b.failure: "¡La protección de flanco falla!"  #NT!
 tactical_forest_battle.6325.c: "Los caballeros protegen la retirada"  #NT!
 tactical_forest_battle.6325.c.success: "¡Los caballeros mantienen la línea mientras el centro se retira!"  #NT!
 tactical_forest_battle.6325.c.failure: "¡Los caballeros no pueden aguantar!"  #NT!
 tactical_forest_battle.6325.d: "Establecer una emboscada a lo largo de la ruta de retirada."  #NT!
 tactical_forest_battle.6325.d.success: "¡La emboscada detiene la persecución enemiga!"  #NT!
 tactical_forest_battle.6325.d.failure: "¡El enemigo evita la emboscada!"  #NT!
 tactical_forest_battle.6325.e: "Reunirse y mantener una nueva posición"  #NT!
 tactical_forest_battle.6325.e.success: "¡Se establece una nueva posición!"  #NT!
 tactical_forest_battle.6325.e.failure: "¡No se encontró ninguna posición fuerte!"  #NT!
 tactical_forest_battle.6325.f: "Permitir que los flancos rodeen el centro en retirada."  #NT!
 tactical_forest_battle.6325.f.success: "¡Permitimos el cerco!"  #NT!
 tactical_forest_battle.6325.f.failure: "¡Se evita el cerco!"  #NT!
  
