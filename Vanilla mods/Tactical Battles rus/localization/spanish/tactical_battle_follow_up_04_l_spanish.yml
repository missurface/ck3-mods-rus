 tactical_forest_battle.9471.t: "Enemigo siguiendo el cebo"  #NT!
 tactical_forest_battle.9471.desc: "¡Nuestra estrategia va a planificar! Nuestro centro debilitado ha estado atrayendo al enemigo, el centro [enemy_commander.GetFirstNamePossessive] ha avanzado lentamente fuera de posición mientras los flancos de nuestro centro se han mantenido fuertes. ¡Su centro ve enemigos por todas partes! Ahora podemos lanzar un contraataque para aplastar sus fuerzas desorganizadas."  #NT!
