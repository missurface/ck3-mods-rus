 tactical_forest_battle.9453.t: "Círculos a la derecha"  #NT!
 tactical_forest_battle.9453.desc: "¡Hemos rodeado con éxito [enemy_commander.GetFirstNamePossessive] flanco derecho! Están atrapados y enfrentando la destrucción. ¡Debemos asestar el golpe mortal!"  #NT!
