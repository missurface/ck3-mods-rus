 tactical_forest_battle.6310.t: "¡La trampa ha saltado!"  #NT!
 tactical_forest_battle.6310.desc: "[right_flank_commander.GetTitledFirstNamePossessive] finta funcionó perfectamente! [enemy_commander.GetFirstNamePossessive] las órdenes de mantener se ahogaron y [enemy_commander.GetHerHis] vanguardia rompieron la formación para morder el anzuelo. El lado izquierdo de su línea ahora está extendido y desorganizado."  #NT!
 tactical_forest_battle.6310.a: "[right_flank_commander.GetTitledFirstName] lleva al ejército desorganizado a una trampa de nuestras unidades de crack"  #NT!
 tactical_forest_battle.6310.a.success: "[enemy_commander.GetFirstNamePossessive] el lado derecho sigue a [right_flank_commander.GetFirstNamePossessive] que huyen directamente a una emboscada."  #NT!
 tactical_forest_battle.6310.a.failure: "¡La derecha no muerde el anzuelo!"  #NT!
 tactical_forest_battle.6310.b: "Envía caballeros para aplastar su flanco demasiado extendido."  #NT!
 tactical_forest_battle.6310.b.success: "¡Los caballeros chocan contra el flanco expuesto del enemigo, rompiendo su formación!"  #NT!
 tactical_forest_battle.6310.b.failure: "El enemigo se reorganiza rápidamente y se vuelve contra nuestros caballeros."  #NT!
 tactical_forest_battle.6310.c: "Separe las fuerzas del flanco [left_flank_commander.GetTitledFirstNamePossessive] para rodear a sus unidades atraídas."  #NT!
 tactical_forest_battle.6310.c.success: "[right_flank_commander.GetTitledFirstName] rodea con éxito a las unidades enemigas, cortando su retirada."  #NT!
 tactical_forest_battle.6310.c.failure: "El enemigo lidera una carga devastadora contra nuestro mermado flanco derecho."  #NT!
 tactical_forest_battle.6310.d: "Gira [center_flank_commander.GetFirstNamePossessive] reservas para rodear las unidades atraídas."  #NT!
 tactical_forest_battle.6310.d.success: "Las reservas se mueven rápidamente y están en posición de rodear"  #NT!
 tactical_forest_battle.6310.d.failure: "[enemy_commander.GetFirstNamePossessive] reconoce nuestro centro agotado!"  #NT!
 tactical_forest_battle.6310.e: "Gira y mata a las unidades atraídas con una carga completa."  #NT!
 tactical_forest_battle.6310.e.success: "¡La carga completa toma al enemigo por sorpresa!"  #NT!
 tactical_forest_battle.6310.e.failure: "¡El enemigo se mantiene firme y rechaza nuestra carga!"  #NT!
  
  
 tactical_forest_battle.7320.t: "El enemigo se mantiene firme detrás de nuestras líneas"  #NT!
