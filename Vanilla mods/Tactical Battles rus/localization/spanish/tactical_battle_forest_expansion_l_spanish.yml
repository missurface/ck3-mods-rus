 tactical_foreign_lands_fighter_2: "Thriving While Down"  <"Prosperando mientras estás abajo">  #NT!
 tactical_foreign_lands_fighter_2_desc: "This character's prowess in battle has been honed by fighting in foreign lands and has become knowledgeable of foreign terrain."  <"La destreza de este personaje en la batalla se ha perfeccionado luchando en tierras extranjeras y ha adquirido conocimientos sobre terrenos extranjeros.">  #NT!
  
