 tactical_home_lands_fighter_2_desc: "This character's prowess in battle has been honed by fighting within the borders of where they rule. Defending their lands they have become knowledgeable of the home terrain."  <"La destreza de este personaje en la batalla se ha perfeccionado luchando dentro de las fronteras de donde gobierna. Al defender sus tierras, se han vuelto conocedores del terreno natal.">  #NT!
  
