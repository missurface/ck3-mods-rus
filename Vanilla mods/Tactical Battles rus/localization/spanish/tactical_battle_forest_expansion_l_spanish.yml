l_spanish:
  
  
 game_concept_captain_trait_concept: "Captain Trait"  <"Capitán rasgo">  #NT!
 game_concept_captain_trait_concept_desc: "Captain Traits are traits given to men recruited from a squad of men-at-arms. During battle when using an option that involves men-at-arms, if successful, there is a chance to recruit a commander with a special Captain Trait after battle. These traits provide various bonuses to your army during battles\n\n Examples are: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"  <"Los Rasgos de Capitán son rasgos otorgados a los hombres reclutados de un escuadrón de hombres de armas. Durante la batalla, cuando se utiliza una opción que involucra hombres de armas, si tiene éxito, existe la posibilidad de reclutar a un comandante con un rasgo de Capitán especial después de la batalla. Estos rasgos proporcionan varias bonificaciones a tu ejército durante las batallas\n\n Ejemplos son: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]">  #NT!
 game_concept_player_title_concept: " player"  <"jugador">  #NT!
 game_concept_player_title_concept_desc: "Captain Traits are traits given to men recruited from a squad of men-at-arms. During battle when using an option that involves men-at-arms, if successful, there is a chance to recruit a commander with a special Captain Trait after battle. These traits provide various bonuses to your army during battles\n\n Examples are: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]"  <"Los Rasgos de Capitán son rasgos otorgados a los hombres reclutados de un escuadrón de hombres de armas. Durante la batalla, cuando se utiliza una opción que involucra hombres de armas, si tiene éxito, existe la posibilidad de reclutar a un comandante con un rasgo de Capitán especial después de la batalla. Estos rasgos proporcionan varias bonificaciones a tu ejército durante las batallas\n\n Ejemplos son: [GetTrait('tbat_soldier_varangian').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_gendarme').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_mulaththamun').GetName(GetNullCharacter)], [GetTrait('tbat_soldier_samurai').GetName(GetNullCharacter)]">  #NT!
  
 tactical_forest_battle.0498.t: "A Celebrated Soldier"  <"Un soldado célebre">  #NT!
 tactical_forest_battle.0498.desc: "After getting a report on our recent battle, my officers informed me that one of our soldiers from an elite regiment of [chosen_unit.GetName] had performed admirably in the thick of the fighting. Taking [commander.GetHerHim] into my service could inspire the other men."  <"Después de recibir un informe sobre nuestra reciente batalla, mis oficiales me informaron que uno de nuestros soldados de un regimiento de élite de [chosen_unit.GetName] se había desempeñado admirablemente en el fragor de la lucha. Tomar a [commander.GetHerHim] a mi servicio podría inspirar a los demás hombres.">  #NT!
 tactical_forest_battle.0498.a: "Recruit [commander.GetName] into my service. ([commander.GetFirstName] gains a [captain_trait_concept|e])"  <"Recluta a [commander.GetName] a mi servicio. ([commander.GetFirstName] gana un [captain_trait_concept|e])">  #NT!
 tactical_forest_battle.0498.b: "I'll think on it."  <"Lo pensaré.">  #NT!
  
