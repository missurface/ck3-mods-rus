 tactical_forest_battle.0061.t: "El destino de [sc_loser.GetFullNameNicknamed]"  #NT!
 tactical_forest_battle.0061.desc: "Con mi último golpe [sc_loser.GetFirstName] cae de rodillas, ensangrentado y golpeado. Mientras el campo de batalla a mi alrededor continúa, [sc_loser.GetTitledFirstNamePossessive] ojos me miran, llenos de una mezcla de desafío y resignación. Ha llegado el momento de decidir el destino de [sc_loser.GetHerHis]."  #NT!
 tactical_forest_battle.0061.a: "Matar [sc_loser.GetFirstName]"  #NT!
 tactical_forest_battle.0061.a.success: "[sc_loser.GetFirstName] se encuentra con [sc_loser.GetHerHis] final en el campo de batalla."  #NT!
 tactical_forest_battle.0061.b: "Captura [sc_loser.GetFirstName]"  #NT!
 tactical_forest_battle.0061.b.success: "[sc_loser.GetFirstName] es hecho prisionero."  #NT!
 tactical_forest_battle.0061.c: "Toma [sc_loser.GetFirstNamePossessive] ojo y suelta [sc_loser.GetHerHim] a [sc_loser.GetHerHis] destino."  #NT!
 tactical_forest_battle.0061.c.success: "Cegar a [sc_loser.GetFirstName] garantiza la supervivencia de [sc_loser.GetHerHis], pero a un gran coste."  #NT!
 tactical_forest_battle.0061.d: "Deja a [sc_loser.GetFirstName] con una cicatriz permanente y libera el destino de [sc_loser.GetHerHim] a [sc_loser.GetHerHis]."  #NT!
 tactical_forest_battle.0061.d.success: "Las cicatrices servirán como un recordatorio duradero de la derrota de [sc_loser.GetFirstNamePossessive]."  #NT!
 tactical_forest_battle.0061.e: "Mutilar a [sc_loser.GetFirstName] y liberar a [sc_loser.GetHerHim] al destino [sc_loser.GetHerHis]"  #NT!
 tactical_forest_battle.0061.e.success: "[sc_loser.GetFirstName] soportará la carga de [sc_loser.GetHerHis] lesiones por el resto de [sc_loser.GetHerHis] vida."  #NT!
  
  
 # Event 0005 - First tactical decision (Forest) 
 tactical_forest_battle.0005.t: "Batalla en el [battle_location.GetProvince.GetTerrain.GetName|l] de [battle_location.GetProvince.GetName]"  #NT!
 tactical_forest_battle.0005.desc: "Mientras luchaba en la guerra de [fighting_war.GetName] contra [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], Mi ejército se enfrenta en el [battle_location.GetProvince.GetTerrain.GetName|l] de [battle_location.GetProvince.GetName] contra las fuerzas de [enemy_war_leader.GetFullNameNicknamedOrMeRegnal]. Nuestros exploradores informan que [enemy_commander.GetFullNameNicknamedOrMeRegnal] está al mando. Como comandante, debo elegir nuestro movimiento para superar el [enemy_commander.GetTitleTierName]."  #NT!
 tactical_forest_battle.0005.a: "Centrarse en el flanco izquierdo ([left_flank_commander.GetSkill( 'martial' )]#! [martial|E] [left_flank_commander.GetTitledFirstNameOrMe] vs [enemy_right_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_right_flank_commander.GetSkill( 'martial' )]#! [martial|E])"  #NT!
 tactical_forest_battle.0005.b: "Concéntrate en el centro ([center_flank_commander.GetSkill( 'martial' )]#! [martial|E] [center_flank_commander.GetTitledFirstNameOrMe] vs [enemy_center_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_center_flank_commander.GetSkill( 'martial' )]#! [martial|E])"  #NT!
 tactical_forest_battle.0005.c: "Centrarse en el flanco derecho ([right_flank_commander.GetSkill( 'martial' )]#! [martial|E] [right_flank_commander.GetTitledFirstNameOrMe] vs [enemy_left_flank_commander.GetTitledFirstNameNicknamedRegnal] [enemy_left_flank_commander.GetSkill( 'martial' )]#! [martial|E])"  #NT!
 tactical_forest_battle.0005.d: "Mantenga a mis caballeros en reserva"  #NT!
 tactical_forest_battle.0005.d.success: "¡Mis caballos están perfectamente posicionados para aprovechar cualquier apertura!"  #NT!
 tactical_forest_battle.0005.d.failure: "La batalla se desarrolla demasiado rápido y mis caballeros quedan fuera de posición."  #NT!
 tactical_forest_battle.0005.e: "Concéntrate en nuestras unidades de élite a distancia"  #NT!
 tactical_forest_battle.0005.f: "Centrarse en nuestra caballería de élite"  #NT!
 tactical_forest_battle.0005.n: "¡Carguen por su comandante!"  #NT!
 tactical_forest_battle.0005.n.success: "[left_flank_commander.GetFullNameNicknamedOrMe] duelos [enemy_right_flank_commander.GetFullNameNicknamed]"  #NT!
 tactical_forest_battle.0005.n.failure: "¡Nuestra carga no puede abrirse paso!"  #NT!
 tactical_forest_battle.0005.kc: "¡Victoria del duelo!"  #NT!
 tactical_forest_battle.0005.kc.success: "[left_flank_commander.GetFullNameNicknamed] ha matado a [enemy_right_flank_commander.GetFullNameNicknamed] en combate singular, ¡desmoralizando a sus tropas!"  #NT!
 tactical_forest_battle.0005.cc: "¡Victoria del duelo!"  #NT!
 tactical_forest_battle.0005.cc.success: "[left_flank_commander.GetFullNameNicknamed] ha capturado a [enemy_right_flank_commander.GetFullNameNicknamed] tras derrotar a [enemy_right_flank_commander.GetHerHim] en combate singular, ¡desmoralizando a sus tropas!"  #NT!
 tactical_forest_battle.0005.ld: "¡Derrotado en duelo!"  #NT!
 tactical_forest_battle.0005.ld.failure: "¡[left_flank_commander.GetFullNameNicknamed] fue derrotado por [enemy_right_flank_commander.GetFullNameNicknamed] después de rodear a [enemy_right_flank_commander.GetFirstName]! en batalla!"  #NT!
 tactical_forest_battle.0005.ldk: "¡Muerto en duelo!"  #NT!
 tactical_forest_battle.0005.ldk.failure: "¡[left_flank_commander.GetFullNameNicknamed] fue asesinado por [enemy_right_flank_commander.GetFullNameNicknamed] después de rodear a [enemy_right_flank_commander.GetFirstName] en la batalla!"  #NT!
 tactical_forest_battle.0005.j: "¡Carga [enemy_right_flank_commander.GetFullNameNicknamed]!"  #NT!
 tactical_forest_battle.0005.j.failure: "[left_flank_commander.GetFullNameNicknamed] no pudo avanzar hasta [enemy_right_flank_commander.GetFullNameNicknamed]"  #NT!
 tactical_forest_battle.0005.dtt.success: "Nuestro flanco carga y rodea [enemy_right_flank_commander.GetFirstName]"  #NT!
 # Event 0110 - Cavalry Feint SUCCESS Follow-up: Trap Sprung 
 tactical_forest_battle.0110.t: "¡La trampa ha saltado!"  #NT!
 tactical_forest_battle.0110.desc: "[left_flank_commander.GetTitledFirstNamePossessive] finta funcionó perfectamente! [enemy_commander.GetFirstNamePossessive] las órdenes de mantener se ahogaron y [enemy_commander.GetHerHis] vanguardia rompieron la formación para morder el anzuelo. El lado derecho de su línea ahora está extendido y desorganizado."  #NT!
 tactical_forest_battle.0110.a: "[left_flank_commander.GetTitledFirstName] lleva al ejército desorganizado a una trampa de nuestras unidades de crack"  #NT!
 tactical_forest_battle.0110.a.success: "[enemy_commander.GetFirstNamePossessive] el lado derecho sigue a [left_flank_commander.GetFirstNamePossessive] que huyen directamente a una emboscada."  #NT!
 tactical_forest_battle.0110.a.failure: "La derecha no muerde el anzuelo y mantiene la posición, rotando unidades para apoyar a otros flancos."  #NT!
 tactical_forest_battle.0110.b: "Envía caballeros para aplastar su flanco demasiado extendido."  #NT!
 tactical_forest_battle.0110.b.success: "¡Los caballeros chocan contra el flanco expuesto del enemigo, rompiendo su formación!"  #NT!
 tactical_forest_battle.0110.b.failure: "El enemigo se reorganiza rápidamente y se vuelve contra nuestros caballeros."  #NT!
 tactical_forest_battle.0110.c: "Separe las fuerzas del flanco [right_flank_commander.GetTitledFirstNamePossessive] para rodear a sus unidades atraídas."  #NT!
 tactical_forest_battle.0110.c.success: "[right_flank_commander.GetTitledFirstName] rodea con éxito a las unidades enemigas, cortando su retirada."  #NT!
 tactical_forest_battle.0110.c.failure: "El enemigo lidera una carga devastadora contra nuestro mermado flanco derecho."  #NT!
 tactical_forest_battle.0110.d: "Gira [center_flank_commander.GetFirstNamePossessive] reservas para rodear las unidades atraídas."  #NT!
 tactical_forest_battle.0110.d.success: "Las reservas se mueven rápidamente y están en posición de rodear"  #NT!
 tactical_forest_battle.0110.d.failure: "[enemy_commander.GetFirstNamePossessive] reconoce nuestro centro agotado!"  #NT!
 tactical_forest_battle.0110.e: "Gira y mata a las unidades atraídas con una carga completa."  #NT!
 tactical_forest_battle.0110.e.success: "¡La carga completa toma al enemigo por sorpresa!"  #NT!
 tactical_forest_battle.0110.e.failure: "¡El enemigo se mantiene firme y rechaza nuestra carga!"  #NT!
  
  
 # ============================================ 
 # EVENT 9474 - Rally Army After Being Pressured 
 # ============================================ 
  
 tactical_forest_battle.9474.t: "Reunir al ejército"  #NT!
 tactical_forest_battle.9474.desc: "La batalla de la izquierda ha llegado a un punto crítico. Nuestras fuerzas están vacilando pero aún no están rotas. ¡Con un liderazgo fuerte y acciones audaces, podemos restablecer el orden y cambiar la situación!"  #NT!
 tactical_forest_battle.9474.a: "La izquierda presiona el ataque"  #NT!
 tactical_forest_battle.9474.a.success: "¡Nuestro ejército escucha el llamado y se moviliza!"  #NT!
 tactical_forest_battle.9474.a.failure: "¡El ejército sigue flaqueando!"  #NT!
 tactical_forest_battle.9474.b: "Finge una retirada para atraer al enemigo y contraatacar."  #NT!
 tactical_forest_battle.9474.b.success: "¡El contraataque tiene éxito y la moral se dispara!"  #NT!
 tactical_forest_battle.9474.b.failure: "¡El contraataque fracasa y la moral se desmorona!"  #NT!
 tactical_forest_battle.9474.c: "El central carga con fuerza para aliviar la presión"  #NT!
 tactical_forest_battle.9474.c.success: "¡La carga desorienta su flanco derecho!"  #NT!
 tactical_forest_battle.9474.c.failure: "¡El enemigo permanece firme!"  #NT!
 tactical_forest_battle.9474.d: "La banda derecha ataca con fuerza para aliviar la presión"  #NT!
 tactical_forest_battle.9474.d.success: "¡La carga desorienta su flanco izquierdo!"  #NT!
 tactical_forest_battle.9474.d.failure: "¡El enemigo permanece firme!"  #NT!
 tactical_forest_battle.9474.e: "Enviar caballeros para reforzar"  #NT!
 tactical_forest_battle.9474.e.success: "¡Llegan reservas y fortalecen la línea!"  #NT!
 tactical_forest_battle.9474.e.failure: "¡Las reservas están demasiado dispersas para ayudar!"  #NT!
 tactical_forest_battle.9474.f: "Envía unidades de élite para reforzar"  #NT!
 tactical_forest_battle.9474.f.success: "¡Nuestras unidades de crack provocan el caos entre el enemigo!"  #NT!
 tactical_forest_battle.9474.f.failure: "¡Nuestras unidades de crack están abrumadas!"  #NT!
  
 # ============================================ 
 # EVENT 0650 - Right Flank Reserves Intercept 
 # ============================================ 
 tactical_forest_battle.0650.t: "El flanco derecho intercepta el movimiento enemigo."  #NT!
 tactical_forest_battle.0650.desc: "Nuestras reservas del flanco derecho han detectado [enemy_commander.GetFirstNamePossessive] fuerzas intentando maniobrar contra nuestra posición. Tenemos una breve ventana para actuar antes de que el enemigo complete su movimiento."  #NT!
  
 tactical_forest_battle.0650.a: "Lanzar un empujón feroz por el flanco derecho"  #NT!
 tactical_forest_battle.0650.a.success: "¡El flanco derecho asesta un golpe aplastante, colapsando el lado derecho del enemigo!"  #NT!
 tactical_forest_battle.0650.a.failure: "¡El empuje es rechazado y el enemigo toma la iniciativa!"  #NT!
  
 tactical_forest_battle.0650.b: "Gira el flanco izquierdo para atacar por detrás."  #NT!
 tactical_forest_battle.0650.b.success: "¡Nuestra maniobra de volante atrapa al enemigo en un devastador fuego cruzado!"  #NT!
 tactical_forest_battle.0650.b.failure: "¡La maniobra de flanqueo es detectada e interrumpida por contraataques enemigos!"  #NT!
  
 tactical_forest_battle.0650.c: "Inspira a las tropas con un llamamiento audaz"  #NT!
 tactical_forest_battle.0650.c.success: "¡Las tropas se inspiran y hacen retroceder el avance enemigo!"  #NT!
 tactical_forest_battle.0650.c.failure: "¡Nuestro llamamiento no se escucha y el ejército sigue perdiendo terreno!"  #NT!
  
 tactical_forest_battle.0650.d: "Activar las reservas correctas y crear confusión."  #NT!
 tactical_forest_battle.0650.d.success: "¡Las reservas crean suficiente confusión para que podamos reposicionarnos favorablemente!"  #NT!
 tactical_forest_battle.0650.d.failure: "¡La intriga fracasa y el enemigo explota nuestra confusión!"  #NT!
  
 tactical_forest_battle.0650.e: "Envía caballeros para reforzar el flanco derecho."  #NT!
 tactical_forest_battle.0650.e.success: "¡Los caballeros refuerzan el flanco y aseguran la posición!"  #NT!
 tactical_forest_battle.0650.e.failure: "¡Los caballeros están aislados y rodeados por un número superior de enemigos!"  #NT!
  
