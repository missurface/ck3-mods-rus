 tactical_forest_battle.7324.desc: "[enemy_commander.GetFirstNamePossessive] ha reconocido nuestro flanco central debilitado y está lanzando un ataque. Sin nuestras reservas, tomamos una decisión crucial para mantener nuestro flanco central."  #NT!
