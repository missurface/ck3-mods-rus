  # Event 0010 - Left Flank Focus Follow-up 
 tactical_forest_battle.0010.t: "Compromiso del flanco izquierdo"  #NT!
 tactical_forest_battle.0010.desc: "La batalla continúa y nuestras fuerzas se enfrentan a lo largo del flanco izquierdo. [center_flank_commander.GetTitledFirstName] manda en el centro, con [right_flank_commander.GetFirstName] en el flanco derecho. [left_flank_commander.GetTitledFirstName] comanda la izquierda, usar las fuerzas de [left_flank_commander.GetHerHis] podría resultar fundamental para asegurar la victoria."  #NT!
