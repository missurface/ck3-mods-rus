 # Event 0210 - Cavalry Feint FAILURE Follow-up: Feint Unmasked 
 tactical_forest_battle.0210.t: "¡Falta desenmascarada!"  #NT!
 tactical_forest_battle.0210.desc: "[enemy_commander.GetTitledFirstName] vio a través de nuestra finta de caballería! Sus fuerzas mantuvieron la disciplina en lugar de perseguir, y ahora nuestros jinetes se enfrentan a infantería reforzada, descargas de misiles o contracaballería esperando en emboscada. La situación táctica se ha vuelto en nuestra contra: debo decidir cómo salvar este desastre."  #NT!
 tactical_forest_battle.0210.a: "¡Atraviesa la trampa! ¡Carga con todo! (Marcial + Destreza vs [enemy_commander.GetShortUINameNoTooltip], muy arriesgado)"  #NT!
 tactical_forest_battle.0210.a.success: "¡Contra todo pronóstico, nuestra pura audacia rompe su formación! ¡El enemigo se tambalea ante nuestra desesperada carga!"  #NT!
 tactical_forest_battle.0210.a.failure: "La carga colapsa en una derrota catastrófica. ¡Nuestra caballería está dispersa y destrozada!"  #NT!
 tactical_forest_battle.0210.b: "¡Desmontad y mantened la línea! (Requiere apoyo de infantería)"  #NT!
 tactical_forest_battle.0210.c: "Protege la retirada con la caballería. (Sacrificar caballería para salvar al ejército)"  #NT!
 tactical_forest_battle.0210.d: "¡Reúna al caballo vacilante con liderazgo personal! (Requiere líder valiente, inspirador o marcial 14+)"  #NT!
 tactical_forest_battle.0210.d.success: "¡Mi liderazgo estabiliza la caballería! ¡Se reforman y se preparan para seguir luchando!"  #NT!
 tactical_forest_battle.0210.d.failure: "La caballería se niega a unirse. La moral sigue desmoronándose."  #NT!
  
  
  
 # Event 0120 - Infantry Ambush SUCCESS Follow-up: Kill Zone in the Woods 
 tactical_forest_battle.0120.t: "¡Zona de muerte en el bosque!"  #NT!
 tactical_forest_battle.0120.desc: "¡La columna enemiga se ha dirigido directamente hacia nuestras tropas ocultas de infantería y misiles! La visibilidad del bosque es escasa, sus formaciones son escasas y su estructura de mando es un caos. Las fuerzas de [enemy_commander.GetTitledFirstName] están atrapadas en un terreno perfecto para matar. ¿Cómo aprovecharemos esta oportunidad?"  #NT!
 tactical_forest_battle.0120.a: "¡Cierra las fauces de la trampa! ¡Sella su parte delantera y trasera!"  #NT!
 tactical_forest_battle.0120.b: "Que hablen las flechas y las jabalinas. Mantenga a nuestra infantería a cubierto. (Requiere arqueros/hostigadores)"  #NT!
 tactical_forest_battle.0120.b.success: "¡Nuestra andanada de misiles devasta su columna expuesta!"  #NT!
 tactical_forest_battle.0120.b.failure: "Sus escudos y armaduras limitan la eficacia de nuestro bombardeo."  #NT!
 tactical_forest_battle.0120.c: "Golpea primero a los oficiales: ¡apunta a los estandartes y a los comandantes!"  #NT!
 tactical_forest_battle.0120.c.success: "¡Nuestros equipos de ataque eliminan a oficiales clave! ¡Su mando colapsa!"  #NT!
 tactical_forest_battle.0120.c.failure: "¡Los equipos de ataque están aislados y sufren muchas bajas!"  #NT!
 tactical_forest_battle.0120.d: "Déjalos sangrando y luego vuelve a desaparecer en el bosque."  #NT!
  
  
 # Event 0220 - Infantry Ambush FAILURE Follow-up: Ambush Detected 
 tactical_forest_battle.0220.t: "¡Emboscada detectada!"  #NT!
 tactical_forest_battle.0220.desc: "[enemy_commander.GetTitledFirstName] vio nuestra emboscada! Sus exploradores detectaron nuestras posiciones ocultas y sus fuerzas se adaptaron antes de que pudiéramos lanzar la trampa. Nuestras unidades de infantería dispersas quedan atrapadas expuestas en [battle_location.GetName] sin ninguna ventaja coordinada. Debo decidir cómo salvar este desastre táctico."  #NT!
 tactical_forest_battle.0220.a: "¡Retírese y consolide posiciones defensivas! Reagruparse en fortalezas."  #NT!
 tactical_forest_battle.0220.b: "¡Cambia de formación y contraataca a través de la presión enemiga! (Marcial 11+, alto riesgo)"  #NT!
 tactical_forest_battle.0220.b.success: "¡Nuestra agresión inesperada toma al enemigo con la guardia baja! ¡Su formación se rompe!"  #NT!
 tactical_forest_battle.0220.b.failure: "La contracarga expone aún más a nuestra infantería. ¡Desastre!"  #NT!
 tactical_forest_battle.0220.c: "Utilice el bosque para dispersar unidades y reformarlas en otros lugares. (Responsabilidad 10+)"  #NT!
 tactical_forest_battle.0220.c.success: "¡Nuestras unidades se escabullen entre los árboles y se reagrupan de forma segura!"  #NT!
 tactical_forest_battle.0220.c.failure: "Las unidades dispersas no pueden reformarse. Siguen desorganizados y vulnerables."  #NT!
 tactical_forest_battle.0220.d: "¡Manténgase firme y luche contra la presión! Acepta muchas bajas."  #NT!
  
 # Event 0130 - Levy Braced SUCCESS Follow-up: Spears and Trees 
 tactical_forest_battle.0130.t: "¡Lanzas y árboles!"  #NT!
 tactical_forest_battle.0130.desc: "¡El muro de lanza de la leva se mantiene como piedra! El bosque mismo se convierte en una fortaleza cuando nuestros soldados se plantan entre los árboles. Las fuerzas de [enemy_commander.GetTitledFirstName] chocan contra nuestra erizada formación y fallan. Ahora llega el momento de aprovechar nuestra ventaja: ¿cómo explotaremos su debilidad?"  #NT!
 tactical_forest_battle.0130.a: "Mantenga la línea y muélalas. Dejemos que el desgaste trabaje para nosotros."  #NT!
 tactical_forest_battle.0130.b: "¡Golpea repentinamente su centro! (Aprendizaje + Marcial 9+, riesgo moderado)"  #NT!
 tactical_forest_battle.0130.b.success: "¡El repentino empuje rompe su resolución! ¡La formación enemiga colapsa!"  #NT!
 tactical_forest_battle.0130.b.failure: "El empuje disminuye pero la línea aguanta. Se niegan a romper."  #NT!
 tactical_forest_battle.0130.c: "Que los arqueros los masacren en el campo de exterminio. (Requiere arqueros MaA)"  #NT!
 tactical_forest_battle.0130.c.success: "¡Llueven voleas devastadoras! ¡El campo de exterminio reclama cientos!"  #NT!
 tactical_forest_battle.0130.c.failure: "Los arqueros se quedan sin flechas y pierden su ventaja."  #NT!
 tactical_forest_battle.0130.d: "¡Forma un yunque para destruir su carga! (Céntrese en la dureza)"  #NT!
  
 # Event 0230 - Levy Scattered FAILURE Follow-up: Formation Broken 
 tactical_forest_battle.0230.t: "¡Formación rota!"  #NT!
 tactical_forest_battle.0230.desc: "¡Los impuestos se dispersan presa del pánico! En lugar de formar un muro de lanzas erizado, los soldados se dispersaron entre los árboles, incapaces de coordinarse o mantener una línea. [enemy_commander.GetTitledFirstName] ve la debilidad y la explota. La formación está rota; debo actuar rápidamente para salvar este desastre."  #NT!
 tactical_forest_battle.0230.a: "¡Únelos con tu ejemplo personal! ¡Lidera desde el frente! (Destreza 10+, Marcial 9+)"  #NT!
 tactical_forest_battle.0230.a.success: "¡Mi valor personal reúne a los soldados! ¡Se reforman y se arman de valor!"  #NT!
 tactical_forest_battle.0230.a.failure: "Los soldados siguen asustados y dispersos. La moral no se recupera."  #NT!
 tactical_forest_battle.0230.b: "Encomienda a tus caballeros de élite para apuntalar la línea. (Requiere 2+ caballeros)"  #NT!
 tactical_forest_battle.0230.c: "Reposiciona las unidades dispersas en un mejor terreno. (Responsabilidad 9+)"  #NT!
 tactical_forest_battle.0230.c.success: "¡Los impuestos dispersos se reúnen y se reubican en terrenos más fuertes!"  #NT!
 tactical_forest_battle.0230.c.failure: "El intento de reposicionamiento falla. ¡Las unidades se vuelven aún más dispersas!"  #NT!
 tactical_forest_battle.0230.d: "En lugar de eso, concéntrate en reducir la moral del enemigo. (Intriga 8+, guerra psicológica)"  #NT!
  
  
 # Event 0140 - Knights in Reserve SUCCESS Follow-up: Knights Ready 
 tactical_forest_battle.0140.t: "¡Caballeros listos!"  #NT!
 tactical_forest_battle.0140.desc: "Los caballeros esperan perfectamente preparados, ocultos a la vista del enemigo. Las fuerzas de [enemy_commander.GetTitledFirstName] están comprometidas en sus posiciones actuales, sin darse cuenta de que nuestra reserva de caballería espera para atacar. Ahora es el momento de liberarlos: ¿cómo utilizaremos su potencial devastador?"  #NT!
 tactical_forest_battle.0140.a: "Golpe de martillo: ¡carga de caballería devastadora! (Destreza 11+, riesgo/recompensa muy alto)"  #NT!
 tactical_forest_battle.0140.a.success: "¡La carga se ejecuta perfectamente! ¡Nuestros caballeros rompen la formación enemiga como si fuera cristal!"  #NT!
 tactical_forest_battle.0140.a.failure: "¡La carga se extiende demasiado y los caballeros quedan aislados!"  #NT!
 tactical_forest_battle.0140.b: "Maniobra de flanqueo: ¡rodea en círculo al enemigo! (Marcial 10+)"  #NT!
 tactical_forest_battle.0140.b.success: "¡La maniobra de flanqueo tiene éxito! ¡El enemigo es pillado por sorpresa por detrás!"  #NT!
 tactical_forest_battle.0140.b.failure: "¡La maniobra se bloquea antes de que pueda desarrollarse!"  #NT!
 tactical_forest_battle.0140.c: "Persecución: ¡aprovecha las unidades en retirada! (Intriga 9+)"  #NT!
 tactical_forest_battle.0140.c.success: "¡La persecución derrota al enemigo! ¡No pueden reorganizarse!"  #NT!
 tactical_forest_battle.0140.c.failure: "La persecución está bloqueada y nuestra caballería sufre bajas."  #NT!
 tactical_forest_battle.0140.d: "Retirada disciplinada: utiliza caballeros para cubrir la retirada. (Responsabilidad 9+)"  #NT!
  
