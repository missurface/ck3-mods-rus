 right_commander_feign_broke_first: "En el transcurso de la batalla [ROOT.Var('fighting_war').War.GetName] contra [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], lideré el flanco derecho durante la 'Batalla de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip]'. Inicié un ataque sorpresa tras una fingida retirada táctica, rompiendo el flanco izquierdo de [enemy_commander.GetFullNameNicknamedOrMeRegnal]."  #NT!
