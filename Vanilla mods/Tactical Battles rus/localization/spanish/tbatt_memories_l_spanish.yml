 center_commander_maa_broke_01_first: "En el transcurso de la [ROOT.Var('fighting_war').War.GetName] contra [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], tomé el mando del centro durante la 'Batalla de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip]'. Encabecé el asalto con unidades de élite que atravesaron el centro de [enemy_commander.GetFullNameNicknamedOrMeRegnal]."  #NT!
 center_commander_maa_broke_02_first: "Mientras participaba en la [ROOT.Var('fighting_war').War.GetName] contra [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], lideré el centro en la 'Batalla de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip]'. Dirigí la carga de las fuerzas de élite que diezmaron el centro de [enemy_commander.GetFullNameNicknamedOrMeRegnal]."  #NT!
 center_commander_maa_broke_second: "Mientras luchabas en la guerra de [fighting_war.GetName] contra [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], comandaste la carga de nuestras unidades de élite que derrotaron el centro de [enemy_commander.GetFullNameNicknamedOrMeRegnal] en la batalla de [battle_location.GetProvince.GetName]."  #NT!
 center_commander_maa_broke_third: "Mientras luchaba en la guerra por [fighting_war.GetName] contra [fighting_war.GetPrimaryPlayerEnemy.GetFullNameNicknamedOrMeRegnal], [ROOT.GetTitledFirstName] comandó la carga de nuestras unidades de élite que derrotaron el centro de [enemy_commander.GetFullNameNicknamedOrMeRegnal] en la batalla de [battle_location.GetProvince.GetName]."  #NT!
  
  
