 commander_encircled_army: "Rodeó a un ejército"  #NT!
 commander_encircled_army_first: "Durante el [ROOT.Var('fighting_war').War.GetName] contra [enemy_commander.GetLiegeEvenWhenDead.GetFirstNameNicknamedRegnal], planeé el cerco de las fuerzas de [enemy_commander.GetFullNameNicknamedOrMeRegnal] en la 'Batalla de [ROOT.Var('battle_location').GetProvince.GetNameNoTooltip]'. Cortando sus líneas de suministro y rutas de escape."  #NT!
